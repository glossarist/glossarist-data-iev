eng:
  id: 426-13-01
  terms:
  - type: expression
    normative_status: preferred
    designation: Type of Protection "n"
  definition: Type of Protection applied to electrical equipment such that, in normal
    operation and in certain specified regular expected occurrences, it is not capable
    of igniting a surrounding explosive gas atmosphere
  language_code: eng
  notes:
  - 'Additionally, the requirements of IEC 60079-15,_Explosive atmospheres – Part
    15: Equipment protection by Type of Protection "n"_, are intended to ensure that
    a malfunction capable of causing ignition is not likely to occur.'
  examples: []
  entry_status: Standard
