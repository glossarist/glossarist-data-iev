    designation: lower limiting (connector) temperature
  - type: expression
    designation: LLT
  definition: in the specification of a connector, smallest admissable value of the
    temperature at which the connector, as defined by the climatic category, is intended
    to operate
  language_code: eng
  notes:
  - The climatic category is defined according to IEC 60068-1 and covers the upper
    and lower temperatures and the duration of damp heat.
