eng:
  id: 845-24-062
  terms:
  - type: expression
    normative_status: preferred
    designation: Lambert's cosine law
  definition: Lambert's law for a surface element whose radiance or luminance is the
    same in all directions of the hemisphere above the surface
  language_code: eng
  notes:
  - |-
    Lambert's cosine law can be expressed by

    stem:[I](stem:[θ]) = stem:[I]~n ~cos stem:[θ]

    where stem:[I](stem:[θ]) and stem:[I]~n~ are the radiant intensities or luminous intensities of the surface element in a direction at an angle, stem:[θ], from the normal to the surface and in the direction of that normal, respectively.
  - This entry was numbered 845-04-56 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
