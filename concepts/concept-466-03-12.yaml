eng:
  id: 466-03-12
  terms:
  - type: expression
    normative_status: preferred
    designation: equivalent span
  - type: expression
    normative_status: preferred
    designation: ruling span
  definition: fictitious single span in which tension variations due to load or temperature
    changes are nearly the same as in the actual spans in a section
  language_code: eng
  notes:
  - |-
    The approximate value stem:[a]~c~ of the equivalent span is calculated from:

    stem:[a_c ≃ sqrt(((sum a_i^3))/((sum a_i)))]

    where stem:[a]~stem:[i]~ is the length of the span stem:[i] in the section.
  examples: []
  entry_status: Standard
  classification: Preferred
