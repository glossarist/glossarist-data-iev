eng:
  id: 705-05-18
  terms:
  - type: expression
    normative_status: preferred
    designation: reference atmosphere for refraction
  definition: |-
    an atmosphere in which the refractivity is determined by the equation:

    stem:[N (h)] = 315 exp (-0,136 stem:[h])

    where stem:[h] is the altitude in kilometres above sea-level
  language_code: eng
  notes:
  - Up to a height of 1 km, the reference atmosphere for refraction may in practice
    be regarded as identical to the standard radio atmosphere.
  examples: []
  entry_status: Standard
  date_accepted: '1995-09-01T00:00:00+00:00'
  date_amended: '1995-09-01T00:00:00+00:00'
