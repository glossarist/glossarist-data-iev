eng:
  id: 445-01-14
  terms:
  - type: expression
    normative_status: preferred
    designation: interval relay with control signal
  - type: expression
    normative_status: preferred
    designation: single shot relay
  definition: |-
    time relay in which the output immediately changes to the operate condition and the time delay starts when applying the power supply and the control signal; the output switches to the release condition after the setting time has elapsed (see Figure 11)

    image::/assets/images/parts/445/445-01-14en.gif[]
  language_code: eng
  notes:
  - "– Cycling the control signal during the time delay will not retrigger the time
    delay."
  examples: []
  entry_status: Standard
  classification: Preferred
