  terms:
  - type: expression
    normative_status: preferred
    designation: relais d'intervalle avec signal de commande, m
  definition: |-
    relais temporisé dont la sortie passe à l'état de travail et dont la temporisation démarre dès l’application de l’alimentation et du signal de commande, et dont la sortie passe à l’état de repos lorsque la temporisation réglée est écoulée (voir Figure 11)

    image::/assets/images/parts/445/445-01-14fr.gif[]
  language_code: fra
  notes:
