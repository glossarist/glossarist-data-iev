eng:
  id: 511-01-04
  terms:
  - type: expression
    normative_status: preferred
    designation: nanomaterial
  definition: material with any external dimension in the {{nanoscale, IEV:511-01-03}}
    or having internal structure or surface structure in the nanoscale
  language_code: eng
  notes:
  - This generic term is inclusive of {{nano-object, IEV:511-01-07}} and {{nanostructured
    material, IEV:511-01-09}}.
  - "{{Engineered nanomaterial, IEV:511-01-05}}  and {{manufactured nanomaterial,
    IEV:511-01-06}} are different types of nanomaterial."
