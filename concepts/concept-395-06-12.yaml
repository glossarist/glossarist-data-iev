eng:
  id: 395-06-12
  terms:
  - type: expression
    normative_status: preferred
    designation: controlled area
  definition: defined area in which specific protection measures and safety provisions
    are or could be required for controlling radiation exposures or preventing the
    spread of contamination during normal working conditions
  language_code: eng
  notes:
  - These areas are designed to preventing or limiting the extent of potential exposures.
  - This entry was numbered 393-19-13 in IEC 60050-393:2003.
  examples: []
