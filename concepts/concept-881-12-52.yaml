eng:
  id: 881-12-52
  terms:
  - type: expression
    normative_status: preferred
    designation: total mass stopping power
  - type: symbol
    designation: stem:[(S)/(rho)]
    international: true
  definition: |-
    the quotient of dstem:[E] by the product of stem:[ρ] and dstem:[l] where dstem:[E] is the energy lost by a charged particle of specified energy in traversing a path length dstem:[l] in a material of density stem:[ρ]

    stem:[(S)/(rho) = (1)/(rho) ((d E))/((d l))]
  language_code: eng
  notes:
  - For energies at which nuclear interaction can be neglected, the total mass stopping
    power is the sum of the collision mass stopping power and the radiative mass stopping
    power.
