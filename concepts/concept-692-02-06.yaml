eng:
  id: 692-02-06
  terms:
  - type: expression
    normative_status: preferred
    usage_info: of an electric power system
    designation: emergency state
  - type: expression
    usage_info: of an electric power system
    designation: inadequate state
  definition: |-
    {{stable state, IEV:692-02-02}} in which some system components are stressed beyond their ratings, or some bus voltages or system frequency are outside tolerances

    image::/assets/images/parts/692/692-fig6-en.png[Figure 6 - Examples of electric power system states and corresponding system operation status]
  language_code: eng
  notes:
  - In an emergency state, urgent actions (such as load shedding; reducing voltage;
    and starting emergency generators) are required to prevent equipment damage and/or
    further degradation of system state.
  - Although {{loss of load, IEV:692-01-16}} can occur, it is not a criterion for
    an emergency state.
  - This entry was numbered 191-22-05 in IEC 60050-191:1990.
  examples: []
  entry_status: Standard
