eng:
  id: 395-01-31
  terms:
  - type: expression
    normative_status: preferred
    designation: mean energy expended per ion pair formed
  - type: symbol
    designation: stem:[W]~i~
    international: true
  definition: |-
    quotient of stem:[E] by stem:[bar N], where stem:[bar N] is the mean number of ion pairs formed when the initial kinetic energy stem:[E] of a charged particle is completely dissipated

    stem:[W_i = E // bar N]
  language_code: eng
  notes:
  - This quantity is expressed in joules (J) or electronvolts (eV).
  - This entry was numbered 393-14-54 in IEC 60050-393:2003.
