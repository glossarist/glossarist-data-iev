eng:
  id: 704-21-07
  terms:
  - type: expression
    normative_status: preferred
    designation: negative justification
  - type: expression
    designation: negative pulse stuffing
  definition: |-
    a method of justification in which the digit time-slots used to convey a digital signal have a digit rate that is always lower than the digit rate of the original signal, and in which at each justification instant, depending on the prevailing conditions, either:

    a) one digit of the original signal is transmitted in the justifiable digit time-slot, or

    b) two digits of the original signal are transmitted, one in the justifiable digit time-slot with the other digit being removed and then transmitted by another means,

    with these alternative justification states being indicated by unique signals formed from justification service digits
  language_code: eng
  notes: []
  examples: []
  entry_status: Standard
  date_accepted: '1993-08-01T00:00:00+00:00'
  date_amended: '1993-08-01T00:00:00+00:00'
