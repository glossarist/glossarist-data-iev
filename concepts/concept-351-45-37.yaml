eng:
  id: 351-45-37
  terms:
  - type: expression
    normative_status: preferred
    designation: settling time
  definition: |-
    for a step response the duration of the time interval between the instant of the step change of an input variable and the instant, when the difference between the step response and their steady-state value remains smaller than the transient value tolerance

    SEE: Figure 5.
