eng:
  id: 112-02-05
  terms:
  - type: expression
    normative_status: preferred
    designation: metre
  - type: expression
    normative_status: preferred
    designation: meter
    geographical_area: US
  - type: symbol
    designation: m
    international: true
  definition: "{{SI, IEV:112-02-02}} {{unit, IEV:112-01-14}} of {{length, IEV:113-01-19}},
    equal to the length of the path travelled by light in vacuum in a {{duration,
    IEV:113-01-13}} of 1/299 792 458 {{s, IEV:112-02-04}}"
  language_code: eng
  notes:
  - 'The definition in the SI Brochure is: "The metre, symbol m, is the SI unit of
    length. It is defined by taking the fixed numerical value of the speed of light
    in vacuum stem:[c] to be 299 792 458 when expressed in the unit m s^−1^, where
    the second is defined in terms of the caesium frequency Δstem:[ν]~Cs~."'
  - 'The metre is one of the seven SI {{base units, IEV:112-01-18}}: {{second, IEV:112-02-04}}
    (s), metre (m), {{kilogram, IEV:112-02-06}} (kg), {{ampere, IEV:112-02-07}} (A),
    {{kelvin, IEV:112-02-08}} (K), {{mole, IEV:112-02-09}} (mol) and {{candela, IEV:112-02-10}}
    (cd).'
  examples: []
  entry_status: Standard
  classification: Preferred
  authoritative_source:
  - ref: BBIPM SI Brochure TEMP DISABLED DUE TO RELATON
    clause: 2.3.1
    relationship:
      :type: :modified
      :modification: The definition in the SI Brochure has been revised to comply
        with the IEV rules. Notes 1 and 2 to entry have been added.
    original: SI Brochure, 9th edition, 2019, 2.3.1, modified – The definition in
      the SI Brochure has been revised to comply with the IEV rules. Notes 1 and 2
      to entry have been added.
  date_accepted: '2020-12-01T00:00:00+00:00'
