eng:
  id: 131-12-14
  terms:
  - type: expression
    normative_status: preferred
    designation: differential capacitance
  definition: |-
    for a capacitive two-terminal element with terminals A and B, derivative of the electric charge stem:[q] with respect to the voltage stem:[u]~AB~ ({{131-11-56, IEV:131-11-56}}) between the terminals:

    image::/assets/images/parts/131/131-12-14en.gif[]

    where the sign of the electric charge is determined by taking the current in the time integral defining the electric charge as positive if its direction is from A to B and negative in the opposite case
  language_code: eng
  notes:
  - For an ideal capacitor, the differential capacitance stem:[C]~d~ is equal to its
    capacitance stem:[C].
  examples: []
  entry_status: Standard
  date_accepted: '2008-09-01T00:00:00+00:00'
  date_amended: '2008-09-01T00:00:00+00:00'
