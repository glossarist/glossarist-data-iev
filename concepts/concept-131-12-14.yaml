fra:
  id: 131-12-14
  terms:
  - type: expression
    normative_status: preferred
    designation: capacité différentielle
    gender: f
    plurality: singular
  definition: |-
    pour un bipôle capacitif de bornes A et B, dérivée de la charge électrique stem:[q] en A par rapport à la tension électrique stem:[u]~AB~ ({{131-11-56, IEV:131-11-56}}) entre les bornes:

    stem:[C_d = ((d q))/((d u_((A B))))]

    où le signe de la charge électrique est déterminé en prenant positif le courant électrique qui la définit si le sens du courant est de A vers B et négatif dans le cas contraire
  language_code: fra
  notes:
  - Pour une capacité idéale, la capacité différentielle stem:[C]~d~ est égale à sa
    capacité stem:[C].
  examples: []
  entry_status: Standard
