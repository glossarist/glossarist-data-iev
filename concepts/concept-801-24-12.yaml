eng:
  id: 801-24-12
  terms:
  - type: expression
    normative_status: preferred
    designation: quality factor
  definition: a measure of sharpness of resonance of a system, being 2π times the
    ratio of the maximum stored energy to the energy dissipated during one cycle
  language_code: eng
  notes:
  - Historically, the letter stem:[Q] was an arbitrarily chosen symbol to designate
    the ratio of reactance to resistance of a circuit element. The name "quality factor"
    was introduced later.
  examples: []
  entry_status: Standard
