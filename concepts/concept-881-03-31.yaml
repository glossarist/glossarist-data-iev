  terms:
  - type: expression
    normative_status: preferred
    designation: courbe d'atténuation
    gender: f
    plurality: singular
  - type: expression
    normative_status: preferred
    designation: courbe de transmission
    gender: f
    plurality: singular
  definition: courbe représentant la valeur d'une grandeur liée au rayonnement en
    fonction de l'épaisseur de la matière traversée par le rayonnement
  language_code: fra
  notes:
  - |-
    En cas d'emploi de ce terme, on doit préciser:

    1. quelle grandeur de rayonnement constitue la variable dépendante;

    2. si cette fonction est le logarithme de la grandeur de rayonnement;

    3. si le faisceau incident est étroit et collimaté et le dispositif de mesure derrière l'absorbeur est relativement petit et loin de celui-ci (cas des mesures en faisceau étroit) ou si le faisceau incident est large et non collimaté et le dispositif de mesure derrière l'absorbeur relativement proche de celui-ci (cas des mesures en faisceau large).
  examples: []
