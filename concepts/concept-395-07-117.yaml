eng:
  id: 395-07-117
  terms:
  - type: expression
    normative_status: preferred
    designation: external event
  definition: events unconnected with the operation of a facility or activity which
    could have an effect on the safety of the facility or activity
  language_code: eng
  notes:
  - Typical examples for nuclear facilities include earthquakes, tornadoes, tsunamis
    or aircraft crashes.
  examples: []
