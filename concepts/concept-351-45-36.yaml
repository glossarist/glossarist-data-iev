    gender: m
    plurality: singular
  definition: |-
    durée de l'intervalle de temps compris entre l'instant où une variation en échelon est appliquée à l'une des variables d'entrée, et l'instant où la variable de sortie atteint pour la première fois un pourcentage spécifié de la différence entre ses valeurs de régime établi final et initial

    VOIR: Figure 5.
  language_code: fra
  notes:
