eng:
  id: 351-45-36
  terms:
  - type: expression
    normative_status: preferred
    designation: step response time
  definition: |-
    for a step response the duration of the time interval between the instant of the step change of an input variable and the instant when the output variable reaches for the first time a specified percentage of the difference between the final and the initial steady-state value

    SEE: Figure 5.
  language_code: eng
  notes:
