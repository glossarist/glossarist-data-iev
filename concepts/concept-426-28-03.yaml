eng:
  id: 426-28-03
  terms:
  - type: expression
    normative_status: preferred
    usage_info: non-electrical equipment
    designation: malfunction
  definition: situation where equipment or components do not perform their intended
    function with respect to explosion protection
  language_code: eng
  notes:
  - See also ISO 12100, stem:[Safety] stem:[of] stem:[machinery] stem:[–] stem:[General]
    stem:[principles] stem:[for] stem:[design] stem:[–] stem:[Risk] stem:[assessment]
    stem:[and] stem:[risk] stem:[reduction].
  - |-
    This can happen for a variety of reasons, including:

    . variation of a property or of a dimension of the processed material or of the work-piece;. failure of one (or more) of the component parts of the equipment, protective systems and components;. external disturbances (e.g. shocks, vibration, electromagnetic fields);. design error or deficiency (e.g. software errors);. disturbance of the power supply or other services;. loss of control by the operator (especially for hand-held machines).
  examples: []
  entry_status: Standard
  date_accepted: '2020-03-01T00:00:00+00:00'
  date_amended: '2020-03-01T00:00:00+00:00'
