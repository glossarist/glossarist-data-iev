  terms:
  - type: expression
    normative_status: preferred
    designation: contacts séquentiels
    gender: m
    plurality: singular
  definition: contacts fournissant différents niveaux de contact et séquences
  language_code: fra
  notes:
  - Au cours de l’insertion du module de connecteur, au moins un contact du niveau
    supérieur doit se connecter avant tout contact d’un niveau de contact inférieur;
    tandis qu’au cours de l’extraction du module de connecteur, au moins un contact
    du niveau supérieur ne se déconnectera pas avant n’importe quel contact d'un niveau
    inférieur.
