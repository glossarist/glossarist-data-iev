  terms:
  - type: expression
    normative_status: preferred
    designation: first make/last break contacts
  definition: contacts which provide different contact levels and sequencing
  language_code: eng
  notes:
  - During connector module engaging (insertion), at least one contact of the higher
    level shall connect before any contact of a lower contact level; whilst during
    connector module disengaging (withdrawal), at least one contact of the higher
    level will not disconnect before any contact of a lower contact level.
