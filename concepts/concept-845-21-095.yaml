eng:
  id: 845-21-095
  terms:
  - type: expression
    normative_status: preferred
    usage_info: for radiation of arbitrary relative spectral distribution
    designation: equivalent luminance
  - type: symbol
    designation: stem:[L]~eq~
    international: true
  definition: luminance of a comparison field in which radiation of {{frequency, IEV:103-06-02}}
    540 × 10^12^ Hz has the same brightness as the field considered under the specified
    photometric conditions of measurement, where the comparison field must have a
    specified size and shape which can be different from that of the field considered
  language_code: eng
  notes:
  - Radiation at a frequency of 540 × 10^12^ Hz has a wavelength in standard air of
    approximately 555,017 nm.
  - A comparison field can also be used in which the radiation has any <a href="IEV845-21-030">relative
    spectral distribution</a>, if the equivalent luminance of this field is known
    under the same conditions of measurement.
  - The equivalent luminance is expressed in candela per square metre (cd·m^−2^).
  - This entry was numbered 845-01-58 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-21-095
  terms:
  - type: expression
    normative_status: preferred
    usage_info: pour un rayonnement de répartition spectrale relative arbitraire
    designation: luminance équivalente
    gender: f
    plurality: singular
  definition: luminance d'un champ de comparaison dont le rayonnement de {{fréquence,
    IEV:103-06-02}} 540 × 10^12^ Hz a la même luminosité que le champ pris en considération
    dans les conditions de mesure photométrique spécifiées et le champ de comparaison
    doit avoir une dimension et une forme définies qui peuvent être différentes de
    celles du champ pris en considération
  language_code: fra
  notes:
  - Le rayonnement à une fréquence de 540 × 10^12^ Hz a une longueur d'onde dans l'air
    normal de 555,017 nm environ.
  - Un champ de comparaison, dont le rayonnement a une <a href="IEV845-21-030">répartition
    spectrale relative</a> quelconque peut également être utilisé, si la luminance
    équivalente de ce champ est connue dans les mêmes conditions de mesure.
  - La luminance équivalente est exprimée en candela par mètre carré (cd·m^−2^).
  - Cet article était numéroté 845-01-58 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
