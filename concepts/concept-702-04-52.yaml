eng:
  id: 702-04-52
  terms:
  - type: expression
    normative_status: preferred
    designation: analytic signal
  definition: |-
    complex function whose {{real part, IEV:102-02-11}} is the real function stem:[f](stem:[t]) representing a signal and whose imaginary part is the Hilbert transform stem:[g](stem:[t]) of the function stem:[f](stem:[t]):

    stem:[f ( t ) + j g ( t ) = f ( t ) - (j)/(pi) int_(- oo)^(+ oo) ((f ( t )))/((tau - t)) d tau]
  language_code: eng
  notes:
  - The real part stem:[f](stem:[t]) of an analytic signal is the opposite of the
    Hilbert transform of the imaginary part stem:[g](stem:[t]).
  - If it exists, the complex {{Fourier transform, IEV:103-04-01}} of an analytic
    signal is zero for all negative frequencies so that, for instance, the analytic
    signal can be used to represent a single sideband modulated signal.
  examples: []
  entry_status: Standard
  date_accepted: '1992-03-01T00:00:00+00:00'
  date_amended: '1992-03-01T00:00:00+00:00'
  review_date: '1992-03-01T00:00:00+00:00'
  review_decision_date: '1992-03-01T00:00:00+00:00'
  review_decision_event: published
