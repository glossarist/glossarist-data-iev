eng:
  id: 845-29-116
  terms:
  - type: expression
    normative_status: preferred
    designation: total cloud amount
  - type: expression
    designation: fractional cloud cover
  definition: quotient of the sum of the solid angles subtended by clouds and the
    solid angle 2π sr of the whole sky
  language_code: eng
  notes:
  - Observation of total cloud amount is usually recorded in tenths or oktas, where
    one okta indicates an extent of cloud cover equal to one eighth of the sky.
  - The total cloud amount has unit one.
  - This entry was numbered 845-09-92 in IEC 60050-845:1987.
  examples: []
