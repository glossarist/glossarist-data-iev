eng:
  id: 845-27-105
  terms:
  - type: expression
    normative_status: preferred
    designation: failure
  definition: termination of the ability of an item to perform a required function
  language_code: eng
  notes:
  - After the failure the item is in fault condition.
  - A failure is an event, as distinguished from a fault, which is a state.
  - This concept as defined does not apply to items consisting of software only.
