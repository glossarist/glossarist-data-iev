eng:
  id: 112-01-27
  terms:
  - type: expression
    normative_status: preferred
    designation: binary prefix
  definition: unit prefix used to form a multiple of a unit obtained by multiplying
    this unit by a power of two
  language_code: eng
  notes:
  - "SI prefixes refer strictly to powers of 10 and should not be used for power of
    2. For example, 1 kilobit should not be used to represent 1 024 bits ((2^10^ bits)
    bits), which is 1 kibibit.\n\nPrefixes for binary multiples are:\n\n<table style=\"width:
    543px;\" cellpadding=\"5\" border=\"solid\">\r\n<tbody>\r\n<tr>\r\n<td rowspan=\"2\"
    style=\"width: 76px; text-align: center;\">\n\n<strong>Factor</strong>\r\n</td>\r\n<td
    rowspan=\"2\" style=\"width: 388px; text-align: center;\">\n\n<strong>Value</strong>\r\n</td>\r\n<td
    colspan=\"2\" style=\"width: 74px; text-align: center;\">\n\n<strong>Prefix</strong>\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
    style=\"width: 22.6333px; text-align: center;\">\n\n<strong>Name</strong>\r\n</td>\r\n<td
    style=\"width: 51.3667px; text-align: center;\">\n\n<strong>Symbol</strong>\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
    style=\"width: 76px; text-align: center;\">\n\n(2^10^)^1^\r\n</td>\r\n<td style=\"width:
    388px; text-align: right;\">\n\n1 024\r\n</td>\r\n<td style=\"width: 22.6333px;
    text-align: center;\">\n\nkibi\r\n</td>\r\n<td style=\"width: 51.3667px; text-align:
    center;\">\n\nKi\r\n</td>\r\n</tr>\r\n<tr>\r\n<td style=\"width: 76px; text-align:
    center;\">\n\n(2^10^)^2^\r\n</td>\r\n<td style=\"width: 388px; text-align: right;\">\n\n1
    048 576\r\n</td>\r\n<td style=\"width: 22.6333px; text-align: center;\">\n\nmebi\r\n</td>\r\n<td
    style=\"width: 51.3667px; text-align: center;\">\n\nMi\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
    style=\"width: 76px; text-align: center;\">\n\n(2^10^)^3^\r\n</td>\r\n<td style=\"width:
    388px; text-align: right;\">\n\n1 073 741 824\r\n</td>\r\n<td style=\"width: 22.6333px;
    text-align: center;\">\n\ngibi\r\n</td>\r\n<td style=\"width: 51.3667px; text-align:
    center;\">\n\nGi\r\n</td>\r\n</tr>\r\n<tr>\r\n<td style=\"width: 76px; text-align:
    center;\">\n\n(2^10^)^4^\r\n</td>\r\n<td style=\"width: 388px; text-align: right;\">\n\n1
    099 511 627 776\r\n</td>\r\n<td style=\"width: 22.6333px; text-align: center;\">\n\ntebi\r\n</td>\r\n<td
    style=\"width: 51.3667px; text-align: center;\">\n\nTi\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
    style=\"width: 76px; text-align: center;\">\n\n(2^10^)^5^\r\n</td>\r\n<td style=\"width:
    388px; text-align: right;\">\n\n1 125 899 906 842 624\r\n</td>\r\n<td style=\"width:
    22.6333px; text-align: center;\">\n\npebi\r\n</td>\r\n<td style=\"width: 51.3667px;
    text-align: center;\">\n\nPi\r\n</td>\r\n</tr>\r\n<tr>\r\n<td style=\"width: 76px;
    text-align: center;\">\n\n(2^10^)^6^\r\n</td>\r\n<td style=\"width: 388px; text-align:
    right;\">\n\n1 152 921 504 606 846 976\r\n</td>\r\n<td style=\"width: 22.6333px;
    text-align: center;\">\n\nexbi\r\n</td>\r\n<td style=\"width: 51.3667px; text-align:
    center;\">\n\nEi\r\n</td>\r\n</tr>\r\n<tr>\r\n<td style=\"width: 76px; text-align:
    center;\">\n\n(2^10^)^7^\r\n</td>\r\n<td style=\"width: 388px; text-align: right;\">\n\n1
    180 591 620 717 411 303 424\r\n</td>\r\n<td style=\"width: 22.6333px; text-align:
    center;\">\n\nzebi\r\n</td>\r\n<td style=\"width: 51.3667px; text-align: center;\">\n\nZi\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
    style=\"width: 76px; text-align: center;\">\n\n(2^10^)^8^\r\n</td>\r\n<td style=\"width:
    388px; text-align: right;\">\n\n1 208 925 819 614 629 174 706 176\r\n</td>\r\n<td
    style=\"width: 22.6333px; text-align: center;\">\n\nyobi\r\n</td>\r\n<td style=\"width:
    51.3667px; text-align: center;\">\n\nYi\r\n</td>\r\n</tr>\r\n</tbody>\r\n</table>\n\n"
