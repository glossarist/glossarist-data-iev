  review_decision_event: published
fra:
  id: 845-21-041
  terms:
  - type: expression
    normative_status: preferred
    designation: énergie rayonnante
    gender: f
    plurality: singular
  definition: énergie émise, transférée ou reçue sous forme d'ondes électromagnétiques
  language_code: fra
  notes:
  - |-
    L'énergie rayonnante peut être exprimée par l'intégrale par rapport au temps du flux énergétique, stem:[Φ]~e~, pendant une durée donnée Δstem:[t]:

    stem:[Q_e = int_((Delta t)) Phi_e d t]
  - L'énergie rayonnante est exprimée soit en fonction de la longueur d'onde, stem:[λ],
    en fonction de la {{fréquence, IEV:103-06-02}}, stem:[ν], ou en fonction du <a
    href="IEV845-21-026">nombre d'onde</a>, stem:[σ].
  - La grandeur photométrique correspondante est l'"<a href="IEV845-21-037">énergie
    lumineuse</a>". La grandeur correspondante pour les photons est l'"énergie photonique".
  - L'énergie rayonnante est exprimée en joules (J = W·s).
  - Cet article était numéroté 845-01-27 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
