    Integrity function</td>\r\n<td>Fonction d’intégrité du réseau</td>\r\n</tr>\r\n<tr>\r\n<td>Optional</td>\r\n<td>Facultatif</td>\r\n</tr>\r\n<tr>\r\n<td>Mandatory</td>\r\n<td>Obligatoire</td>\r\n</tr>\r\n</table>\n\nAu
