    designation: Gaussian pulse
  definition: a pulse that has the waveform of a Gaussian distribution
  language_code: eng
  notes:
  - |-
    In the time domain, the waveform is :

    stem:[f(t)] = stem:[A] ехр [– (stem:[t] / stem:[a])^2^]

