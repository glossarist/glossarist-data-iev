eng:
  id: 351-45-45
  terms:
  - type: expression
    normative_status: preferred
    designation: phase angle
  definition: |-
    for a linear time-invariant system with sinusoidal input variable in steady state of the output variable the phase difference between the phase of the output variable and the phase of the corresponding input variable at a given angular frequency

    SEE: Figure 10.
  language_code: eng
  notes:
  - The phase angle is the argument of the frequency response at a given angular frequency.
  - This entry was numbered 351-24-37 in IEC 60050-351:2006.
  examples: []
  entry_status: Standard
