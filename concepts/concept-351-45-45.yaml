fra:
  id: 351-45-45
  terms:
  - type: expression
    normative_status: preferred
    designation: déphasage
    gender: m
    plurality: singular
  definition: |-
    pour un système linéaire invariant dans le temps avec une variable d'entrée sinusoïdale en régime établi de la variable de sortie, différence de phase entre la phase de la variable de sortie et la phase de la variable d'entrée correspondante à une pulsation donnée

    VOIR: Figure 10.
  language_code: fra
  notes:
  - Le déphasage est l’argument de la réponse en fréquence à une pulsation donnée.
  - |-
    Cet article était numéroté 351-24-37 dans la CEI 60050-351:2006.

    <simg>

    *Figure 10 – Open-loop frequency response characteristic; Bode diagram; Bode chart*

