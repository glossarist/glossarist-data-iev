eng:
  id: 531-44-15
  terms:
  - type: expression
    normative_status: preferred
    designation: fall time
  definition: the time required for the photoelectric current to fall from a stated
    high percentage to a stated lower percentage of the maximum value when a steady
    state of radiation is instantaneously removed
  language_code: eng
  notes:
  - It is usual to consider the 90% and 10% levels.
  examples: []
