eng:
  id: 845-26-067
  terms:
  - type: expression
    normative_status: preferred
    designation: erythemal irradiance
  - type: symbol
    designation: stem:[E]~er~
    international: true
  definition: effective irradiance with the spectral irradiance, stem:[Eλ], spectrally
    weighted with the erythema spectral weighting function, stem:[s]~er~(stem:[λ]),
    normalized to 1 at its maximum
  language_code: eng
  notes:
  - This definition is based on the assumption that an action spectrum is adopted
    for the actinic effect considered, and that its maximum value is 1.
  - It is essential to specify which action spectrum is used, as the unit is the same
    for any action spectrum.
  - The erythemal irradiance is expressed in watt per square metre (W·m^−2^).
  examples: []
  entry_status: Standard
