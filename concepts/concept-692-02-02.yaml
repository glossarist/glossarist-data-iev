eng:
  id: 692-02-02
  terms:
  - type: expression
    normative_status: preferred
    usage_info: of an electric power system
    designation: stable state
  definition: |-
    state wherein the system, if not disturbed, remains in a {{steady state, IEV:692-02-01}}, or returns to a {{steady state, IEV:692-02-01}} after being subjected to a {{disturbance, IEV:692-01-09}} of prescribed magnitude

    image::/assets/images/parts/692/692-fig2-en.png[Figure 2 - Electric power system states

    <simg></simg>
  language_code: eng
  notes:
  - |-
    The arrows indicate the most important state transitions caused by credible events. Recovery transitions, in opposite directions, are effected by operator intervention.

    Figure 3 – Examples of transitions within electric power system states]
  - This entry was numbered 191-22-01 in IEC 60050-191:1990.
