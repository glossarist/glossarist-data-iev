eng:
  id: 902-02-03
  terms:
  - type: expression
    normative_status: preferred
    designation: product
  definition: |-
    result of a process

    [ISO 9000:2000, 3.4.2]
  language_code: eng
  notes:
  - 'Four generic product categories are noted in ISO 9000:2000: services (e.g. transport);
    software (e.g. computer program, dictionary); hardware (e.g. engine, mechanical
    part); processed materials (e.g. lubricant). Many products comprise elements belonging
    to different generic product categories. Whether the product is then called service,
    software, hardware or processed material depends on the dominant element.'
  - The statement of conformity described in Note 1 to {{902-04-02, IEV:902-04-02}}
    can be regarded as a product of {{attestation, IEV:902-04-02}}.
  examples: []
  entry_status: Standard
  authoritative_source:
  - ref: ISO/IEC 17000:2004
    clause: '3.3'
    link: https://www.iso.org/standard/29316.html
    relationship:
      :type: :modified
      :modification: The references to other terms within ISO/IEC 17000 have been
        replaced by hyperlinks to entries in the IEV.
    original: ISO/IEC 17000:2004, 3.3, modified – The references to other terms within
      ISO/IEC 17000 have been replaced by hyperlinks to entries in the IEV.
