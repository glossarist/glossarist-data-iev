    normative_status: preferred
    designation: facteur de participation à la pointe
    gender: m
    plurality: singular
  definition: rapport, exprimé en valeur numérique ou en %, de la puissance à la pointe
    de charge d'un client, d'un groupe de clients ou d'un groupe d'installations,
