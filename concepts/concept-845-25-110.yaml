eng:
  id: 845-25-110
  terms:
  - type: expression
    normative_status: preferred
    usage_info: in photometric or radiometric measurements
    designation: reference plane
  definition: plane in which the surface of a sample or standard is placed during
    measurements
  language_code: eng
  notes:
  - For reflection measurements, the geometry is defined with respect to the reference
    plane. For transmission measurements, there is a reference plane for the incident
    light and a second reference plane, displaced by the sample thickness, for the
    transmitted light.
  examples: []
  entry_status: Standard
