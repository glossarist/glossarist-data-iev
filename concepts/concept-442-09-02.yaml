  terms:
  - type: expression
    normative_status: preferred
    designation: homogeneous electric field
  - type: expression
    normative_status: preferred
    designation: uniform electric field
  - type: expression
    normative_status: preferred
    designation: homogeneous electric field distribution
  definition: electric field which has an essentially constant voltage gradient between
    electrodes, such as that between two spheres where the radius of each sphere is
    greater than the distance between them
  language_code: eng
  notes:
  - The homogeneous field condition is referred to as case B in IEC 60664-1.
