eng:
  id: 102-04-08
  terms:
  - type: expression
    normative_status: preferred
    designation: parallel
  definition: "qualifies in a point space:\n\n* a straight line with respect to a
    coplanar straight line when they have no common point or when they are merged;
    \n\n* a straight line with respect to a plane when the plane contains a line parallel
    to the given line; \n\n* a plane with respect to another plane when any line in
    one plane has a parallel line in the other plane"
  language_code: eng
  notes:
  - Parallelism is an equivalence relation for two lines or for two planes.
  - Usual wordings for lines are "a line A is parallel to line B", or "lines A and
    B are parallel", or " A and B are parallel lines". Similar wordings are used for
    the other cases.
  examples: []
  entry_status: Standard
  date_accepted: '2008-08-01T00:00:00+00:00'
  date_amended: '2008-08-01T00:00:00+00:00'
  review_date: '2008-08-01T00:00:00+00:00'
  review_decision_date: '2008-08-01T00:00:00+00:00'
  review_decision_event: published
