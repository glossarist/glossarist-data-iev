eng:
  id: 845-25-112
  terms:
  - type: expression
    normative_status: preferred
    usage_info: of a luminaire
    designation: tilt during measurement
  - type: symbol
    designation: stem:[θ]~m~
    international: true
  definition: angle between a defined datum axis related to the luminaire and the
    horizontal when the luminaire is mounted for photometric measurement
  language_code: eng
  notes:
  - The defined datum axis can be any feature of the luminaire, but it will usually
    relate to a feature that is nominally aligned with the horizontal such as an axis
    through the luminous opening or an axis through an array of LEDs or a fixing spigot
    entry axis.
  - The tilt during measurement is expressed in radian (rad) or degree (°).
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
