eng:
  id: 102-06-19
  terms:
  - type: expression
    normative_status: preferred
    designation: Hermitian conjugate matrix
  definition: 'for a complex matrix *stem:[A]* with elements stem:[Aij], matrix denoted
    by *stem:[A]*^H^, equal to the complex conjugate of the transpose matrix: *stem:[A]*^H^
    = (*stem:[A]*^T^)* or for elements stem:[(( A^( H ) ))_((i j)) = A_(j i)^( * )]'
  language_code: eng
  notes:
  - If the matrix *stem:[A]* is real, the Hermitian conjugate matrix reduces to the
    transpose matrix.
  - The Hermitian conjugate matrix of a matrix *stem:[A]* is denoted by *stem:[A]*^H^
    or sometimes *stem:[A]*^†^. The notation *stem:[A]** is also used in mathematics.
  examples: []
  entry_status: Standard
  date_accepted: '2008-08-01T00:00:00+00:00'
  date_amended: '2008-08-01T00:00:00+00:00'
  review_date: '2008-08-01T00:00:00+00:00'
