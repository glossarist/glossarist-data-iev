eng:
  id: 442-05-49
  terms:
  - type: expression
    normative_status: preferred
    designation: ultimate short-circuit breaking capacity
  definition: breaking capacity for which the prescribed conditions according to a
    specified test sequence do not include the capability of the residual current
    operated circuit-breaker with integral overcurrent protection to carry 0,85 times
    its non-tripping current for the conventional time
  language_code: eng
  notes:
  - For the conventional time, see {{IEV 442-05-54, IEV:442-05-54}} and {{IEV 442-05-55,
    IEV:442-05-55}}.
