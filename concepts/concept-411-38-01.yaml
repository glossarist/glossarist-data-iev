  terms:
  - type: expression
    normative_status: preferred
    designation: spire
    gender: f
    plurality: singular
  definition: conducteur ou groupe de conducteurs formant une seule boucle conductrice
  language_code: fra
  notes:
  - Ce conducteur peut être constitué d'un certain nombre d'éléments ronds ou méplats.
    Chacun de ces éléments se présente sous forme de fil, de tige, de ruban ou de
    barre selon sa section. Chaque élément rond ou méplat individuel peut être non
    isolé ou isolé, par exemple pour réduire les courants de Foucault.
