eng:
  id: 221-03-38
  terms:
  - type: expression
    normative_status: preferred
    designation: loss anisotropy factor
  - type: symbol
    designation: stem:[T]
    international: true
  definition: |-
    of electrical steel, the ratio of the difference between, and the sum of, the magnetic losses stem:[P]~90~ , measured perpendicular to, and stem:[P]~0~, measured parallel to the direction of rolling, the ratio being expressed as a percentage:

    stem:[T = ((P_((90)) - P_0))/((P_((90)) + P_0)) xx 100 %]
  language_code: eng
  notes:
  - The measurements of stem:[P]~90~ and stem:[P]~0~ are to be made under the same
    conditions.
  examples: []
  entry_status: Standard
  date_accepted: '1990-10-01T00:00:00+00:00'
  date_amended: '1990-10-01T00:00:00+00:00'
  review_date: '1990-10-01T00:00:00+00:00'
  review_decision_date: '1990-10-01T00:00:00+00:00'
  review_decision_event: published
