  terms:
  - type: expression
    normative_status: preferred
    designation: superconductor
  definition: material which exhibits superconductivity under appropriate conditions
  language_code: eng
  notes:
  - Often refers to electrical wires, bulks or thin films made of superconducting
    materials.
  - Appropriate conditions apply to temperature, magnetic field strength, strain and
    electric current density.
