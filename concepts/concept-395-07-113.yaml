eng:
  id: 395-07-113
  terms:
  - type: expression
    normative_status: preferred
    designation: channel
  definition: an arrangement of interconnected components within a system that initiates
    a single output. A channel loses its identity where single output signals are
    combined with signals from other channels (e.g. from a monitoring channel or a
    safety actuation channel)
  language_code: eng
  notes: []
