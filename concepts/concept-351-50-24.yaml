eng:
  id: 351-50-24
  terms:
  - type: expression
    normative_status: preferred
    designation: switching value
  definition: |-
    for a multi-position element any value of the input variable at which the value of the output variable changes

    SEE: Figures 19 and 20.
  language_code: eng
  notes:
  - The change of the output variable can occur at a pair of switching values, that
    is at different values of the input variable depending on direction of change;
    the difference in these values is called the differential gap (see 351-50-25).
  - This entry was numbered 351-28-35 in IEC 60050-351:2006.
