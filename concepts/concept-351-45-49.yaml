eng:
  id: 351-45-49
  terms:
  - type: expression
    normative_status: preferred
    designation: frequency response locus
  - type: expression
    normative_status: preferred
    designation: Nyquist plot
  definition: |-
    graphical representation of the frequency response by polar coordinates as a curve in the complex plane with the angular frequency as the curve parameter

    SEE: Figure 9.
  language_code: eng
  notes:
  - At the frequency response locus the modulus (absolute value) of the polar coordinates
    is the gain and its argument is the phase angle at a given angular frequency.
  - This entry was numbered 351-24-41 in IEC 60050-351:2006.
