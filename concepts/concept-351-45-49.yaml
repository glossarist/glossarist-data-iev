    designation: lieu de la réponse en fréquence
    gender: m
    plurality: singular
  - type: expression
    normative_status: preferred
    designation: diagramme de Nyquist
    gender: m
    plurality: singular
  definition: |-
    représentation graphique de la réponse en fréquence par une courbe en coordonnées polaires dans le plan complexe, la pulsation étant le paramètre de la courbe

    VOIR: Figure 9.
  language_code: fra
  notes:
  - Sur le lieu de réponse en fréquence, le module des coordonnées polaires est le
    gain et son argument est le déphasage à une pulsation donnée.
  - |-
