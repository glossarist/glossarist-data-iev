  - type: expression
    normative_status: preferred
    usage_info: of a piezoelectric ceramic
    designation: coupling factor
  - type: expression
    normative_status: deprecated
    usage_info: of a piezoelectric ceramic
    designation: coupling coefficient
  - type: symbol
    designation: stem:[k]
    international: true
  definition: constant representing the efficiency of electromechanical coupling
  language_code: eng
  notes:
  - |-
    It represents the efficiency of converting electric energy into mechanical energy by the electro-mechanical coupling effect, and it is defined as the square root of the ratio of the mechanical energy stored (stem:[U]~m~) to the total input electric energy transferred (stem:[U]~i~):

    stem:[k = sqrt(((U_m ))/((U_i)))]
