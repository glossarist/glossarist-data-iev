eng:
  id: 131-11-44
  terms:
  - type: expression
    normative_status: preferred
    designation: reactive power
  - type: symbol
    designation: stem:[Q]
    international: true
  definition: |-
    for a linear two-terminal element or two-terminal circuit, under sinusoidal conditions, quantity equal to the product of the apparent power stem:[S] and the sine of the displacement angle stem:[φ]

    stem:[Q = S sin phi]
  language_code: eng
  notes:
  - The reactive power is the imaginary part of the complex power stem:[underset(_)(S)],
    thus stem:[Q = Im underset(_)(S)]. Its absolute value is equal to the non-active
    power, thus stem:[| Q | = Q_( ∼ )].
  - The coherent SI unit for reactive power is voltampere, VA. The special name var
    and its symbol var are also used. See {{131-11-45, IEV:131-11-45}}.
  examples: []
  entry_status: Standard
  date_accepted: '2013-08-01T00:00:00+00:00'
