eng:
  id: 561-04-16
  terms:
  - type: expression
    normative_status: preferred
    designation: infrared absorption coefficient
  - type: expression
    normative_status: preferred
    designation: stem:[α]-value
  definition: |-
    coefficient established by determining the relationship between the absorption of two wavelengths, one with minimal absorption due to OH impurity, the other with high absorption due to presence of OH impurities in the crystal lattice

    stem:[alpha = (1)/(t) (log)_((10)) ((T_1))/((T_2))]

    where

    stem:[α] is the infrared absorption coefficient;

    stem:[t] is the thickness of the Y-cut sample, in centimetres;

    stem:[T]~1~ is the per cent transmission at a wave number of 3 800 cm^–1^ or 3 979 cm^–1^;

    stem:[T]~2~ is the per cent transmission at a wave number of 3 410 cm^–1^, 3 500 cm^–1^ or 3 585 cm^–1^
  language_code: eng
  notes:
  - The OH impurity creates mechanical loss in resonators and its presence is correlated
    to the presence of other loss-inducing impurities. The stem:[α]-value is a measure
    of OH concentration and is correlated with expected mechanical losses due to material
    impurities.
  examples: []
