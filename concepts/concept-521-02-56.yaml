fra:
  id: 521-02-56
  terms:
  - type: expression
    normative_status: preferred
    designation: vitesse de recombinaison en surface
    gender: f
    plurality: singular
  definition: vitesse à laquelle les électrons et les trous devraient diffuser vers
    la surface d’un semi-conducteur pour obtenir le taux de recombinaison conduisant
    à leur disparition en surface
  language_code: fra
  notes:
  - |-
    La vitesse de recombinaison en surface est égale au quotient :

    a) du nombre de recombinaisons qui ont lieu à la surface par unités de temps et de surface ;

    b) par la concentration en porteurs minoritaires en excès immédiatement sous la surface.
  examples: []
