eng:
  id: 722-10-15
  terms:
  - type: expression
    normative_status: preferred
    designation: calling duration
  definition: the time interval between unhooking and either receipt by the calling
    party of some indication of the success or failure of the call attempt or abandonment
    of the call attempt
  language_code: eng
  notes:
  - The calling duration is the sum of the dial tone delay, the dialling duration
    and the post-dialling delay.
  examples: []
  entry_status: Standard
