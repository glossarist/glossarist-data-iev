fra:
  id: 121-11-28
  terms:
  - type: expression
    normative_status: preferred
    designation: tension induite
    gender: f
    plurality: singular
  definition: |-
    grandeur scalaire égale à la circulation d’une grandeur vectorielle le long d’un chemin C reliant le point a au point b, dans lequel des porteurs de charge peuvent se déplacer:

    stem:[U_i = int_((r_a ( C )))^((r_b)) ( - ((del A))/((del t)) + v xx B ) * d r]

    où *stem:[A]* et *stem:[B]* sont respectivement un potentiel vecteur magnétique et l’induction magnétique en un point du chemin, stem:[v] est la vitesse de déplacement de ce point, *stem:[r]* est le vecteur de position et stem:[t] est le temps
  language_code: fra
  notes:
  - La tension induite est égale à la dérivée par rapport au temps du flux totalisé
    correspondant au chemin, avec les signes positif ou négatif selon la convention
    exposée dans la CEI 60375.
  examples: []
