eng:
  id: 881-04-33
  terms:
  - type: expression
    normative_status: preferred
    designation: mass energy-absorption coefficient
  - type: symbol
    designation: stem:[((mu_((en))))/(rho)]
    international: true
  definition: the product of the mass energy transfer coefficient stem:[( ((mu_((tr))))/(rho)
    )] for that energy and (1– stem:[g]) where stem:[g] is the fraction of the energy
    of secondary charged particles that is lost to bremsstrahlung in the material
  language_code: eng
  notes:
  - When the material is air, stem:[((mu_((en))))/(rho)] is proportional to the quotient
    of exposure by energy fluence in the usual case of constant W.
  examples: []
  entry_status: Standard
  date_accepted: '1983-01-01T00:00:00+00:00'
