eng:
  id: 113-06-47
  terms:
  - type: expression
    normative_status: preferred
    designation: recombination coefficient
  - type: symbol
    designation: ''
    international: true
  definition: quotient of the recombination rate by the product of the number densities
    stem:[n]^+^ and stem:[n]^−^ of the recombining charge carriers, thus stem:[- ((d
    n^( + )))/((d t)) = - ((d n^( - )))/((d t)) = alpha n^( + ) n^( - )]
  language_code: eng
  notes:
  - The coherent SI unit of recombination coefficient is metre cube per second, m^3^
    / s.
