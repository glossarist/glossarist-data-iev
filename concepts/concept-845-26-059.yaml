eng:
  id: 845-26-059
  terms:
  - type: expression
    normative_status: preferred
    designation: blue light hazard radiant exposure
  - type: symbol
    designation: stem:[H]~B~
    international: true
  definition: effective radiant exposure with the spectral radiant exposure, stem:[Hλ],
    spectrally weighted with the blue light hazard spectral weighting function, stem:[B](stem:[λ])
  language_code: eng
  notes:
  - The wavelength range for the blue light hazard radiant exposure is specified in
    ICNIRP-recommendations as stem:[λ] = 300 nm to stem:[λ] = 700 nm.
  - This definition is based on the assumption that an action spectrum is adopted
    for the actinic effect considered, and that its maximum value is 1.
  - It is essential to specify which actinic action spectrum is used, as the unit
    is the same for any action spectrum.
  - The blue light hazard radiant exposure is expressed in joule per square metre
    (J·m^−2^).
  examples: []
  entry_status: Standard
