eng:
  id: 436-04-05
  terms:
  - type: expression
    normative_status: preferred
    designation: "(voltage) ratio of a capacitor divider"
  definition: the ratio of the voltage applied to the capacitor divider to the open
    circuit intermediate voltage
  language_code: eng
  notes:
  - This ratio corresponds to the sum of the capacitances of the high-voltage and
    intermediate-voltage capacitors divided by the capacitance of the high-voltage
    capacitor.
  examples: []
  entry_status: Standard
