eng:
  id: 731-03-23
  terms:
  - type: expression
    normative_status: preferred
    designation: critical angle
  definition: the greatest angle of incidence for which a wave propagating in a homogeneous
    medium of relatively high refractive index strikes an interface with a medium
    having a lower refractive index, and for which refraction is just possible
  language_code: eng
  notes:
  - |-
    When light propagates in a homogeneous medium of relatively high refractive index (stem:[n]~high~) onto a planar interface with a homogeneous material of lower index (stem:[n]~low~ ), the critical angle is defined by :

    arcsin (stem:[n]~low~ / stem:[n]~high~)
  examples: []
  entry_status: Standard
  date_accepted: '1991-10-01T00:00:00+00:00'
  date_amended: '1991-10-01T00:00:00+00:00'
  review_date: '1991-10-01T00:00:00+00:00'
  review_decision_date: '1991-10-01T00:00:00+00:00'
  review_decision_event: published
