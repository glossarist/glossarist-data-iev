eng:
  id: 113-06-40
  terms:
  - type: expression
    normative_status: preferred
    designation: probability of ionization
  definition: ratio of the number of collisions in a specified time interval between
    particles resulting in the formation of ions to the total number of interactions
    during that time interval
  language_code: eng
  notes:
  - The probability of ionization strongly depends on the interaction energy and on
    the collision parameters.
