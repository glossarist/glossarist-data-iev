eng:
  id: 901-06-14
  terms:
  - type: expression
    normative_status: preferred
    usage_info: in regulations
    designation: reference to standards
  definition: reference to one or more {{standard, IEV:901-02-02}}s in place of detailed
    {{provision, IEV:901-05-01}}s within a {{regulation, IEV:901-02-10}}
  language_code: eng
  notes:
  - A reference to standards is either dated, undated or general, and at the same
    time either exclusive or indicative.
  - A reference to standards may be linked to a more general legal provision referring
    to the {{state of the art, IEV:901-01-04}} or {{acknowledged rules of technology,
    IEV:901-01-05}}. Such a provision may also stand alone.
  examples: []
  entry_status: Standard
