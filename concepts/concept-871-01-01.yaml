eng:
  id: 871-01-01
  terms:
  - type: expression
    normative_status: preferred
    designation: accessibility
  definition: extent to which products, systems, services, environments and facilities
    can be used by people from a population with the widest range of user needs, characteristics
    and capabilities to achieve identified goals in identified contexts of use
  language_code: eng
  notes:
  - Context of use includes direct use or use supported by assistive technologies.
  examples: []
  entry_status: Standard
  authoritative_source:
  - ref: ISO 9241-11
    clause: 3.1.14
    link: https://www.iso.org/standard/63500.html
    relationship:
      :type: :identical
    original: ISO 9241-11:–, 3.1.14
