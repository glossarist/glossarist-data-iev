eng:
  id: 426-11-03
  terms:
  - type: expression
    normative_status: preferred
    designation: associated apparatus
  definition: electrical apparatus that contains both intrinsically safe circuits
    and non-intrinsically safe circuits and is constructed so that the non-intrinsically
    safe circuits cannot adversely affect the intrinsically safe circuits
  language_code: eng
  notes:
  - |-
    Associated apparatus is either:

    <ol type="a">. additionally protected by a Type of Protection suitable for use in the appropriate explosive atmosphere, or. not protected by a Type of Protection suitable for use in the appropriate explosive atmosphere and, therefore, is not to be used within an explosive atmosphere.
  examples: []
  entry_status: Standard
  date_accepted: '2020-03-01T00:00:00+00:00'
