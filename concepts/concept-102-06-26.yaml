eng:
  id: 102-06-26
  terms:
  - type: expression
    normative_status: preferred
    designation: orthogonal matrix
  definition: square matrix *stem:[A]* for which the inverse *stem:[A]*^−1^ is equal
    to the transpose matrix *stem:[A]*^T^
  language_code: eng
  notes:
  - |-
    For an orthogonal matrix with elements stem:[Aij]:

    stem:[underset(i)( sum ) A_((i j)) A_((i k)) = delta_((j k))] and stem:[underset(k)( sum ) A_((i k)) A_((j k)) = delta_((i j))]

    where δ~stem:[jk]~ and δ~stem:[ij]~ are Kronecker deltas.
  examples: []
  entry_status: Standard
  date_accepted: '2008-08-01T00:00:00+00:00'
  date_amended: '2008-08-01T00:00:00+00:00'
  review_date: '2008-08-01T00:00:00+00:00'
  review_decision_date: '2008-08-01T00:00:00+00:00'
  review_decision_event: published
