eng:
  id: 725-12-28
  terms:
  - type: expression
    normative_status: preferred
    designation: multi-satellite link
  definition: a connection by satellite between a transmitting station and a receiving
    station through two or more satellites without any intermediate earth station
  language_code: eng
  notes:
  - |-
    A multi-satellite link between earth stations comprises one up-link, one or more inter-satellite links and one down-link.

