  terms:
  - type: expression
    normative_status: preferred
    designation: élément de retard du premier ordre
    gender: m
    plurality: singular
  definition: élément de transfert linéaire invariant dans le temps dont la fonction
    de transfert a exactement un pôle de valeur réelle négative et pas de zéro
  language_code: fra
  notes:
  - "La fonction de transfert d'un élément de retard de premier ordre est donnée par\n\nstem:[((V
    ( s )))/((U ( s ))) = ((K_Ρ))/((1 + T_1 * s))]\n\noù<table>\r\n<tr>\n<td>\nstem:[K]~P~\n</td>\n<td>est
    le coefficient d’action proportionnelle;</td>\n</tr>\r\n<tr>\n<td>\nstem:[T]~1~\n</td>\n<td>est
    la constante de temps;</td>\n</tr>\r\n<tr>\n<td>stem:[s]</td>\n<td>est la variable
    complexe de la transformée de Laplace;</td>\n</tr>\r\n<tr>\n<td>\nstem:[U](stem:[s])</td>\n<td>est
    la transformée de la variable d’entrée;</td>\n</tr>\r\n<tr>\n<td>\nstem:[V](stem:[s])</td>\n<td>est
    la transformée de la variable de sortie.</td>\n</tr>\r\n</table>"
  - Cet article était numéroté 351-28-13 dans la CEI 60050-351:2006.
