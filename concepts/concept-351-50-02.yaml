eng:
  id: 351-50-02
  terms:
  - type: expression
    normative_status: preferred
    designation: first-order lag element
  definition: linear time-invariant transfer element the transfer function of which
    has exactly one real-value negative pole and no zero
  language_code: eng
  notes:
  - "The transfer function of a first-order lag element is given as\n\nstem:[((V (
    s )))/((U ( s ))) = ((K_Ρ))/((1 + T_1 * s))]\n\nwhere<table>\r\n<tr>\n<td>\nstem:[K]~P~\n</td>\n<td>is
    the proportional action coefficient;</td>\n</tr>\r\n<tr>\n<td>\nstem:[T]~1~\n</td>\n<td>is
    the time constant;</td>\n</tr>\r\n<tr>\n<td>stem:[s]</td>\n<td>is the complex
    variable of the Laplace transform;</td>\n</tr>\r\n<tr>\n<td>\nstem:[U](stem:[s])</td>\n<td>is
    the input transform;</td>\n</tr>\r\n<tr>\n<td>\nstem:[V](stem:[s])</td>\n<td>is
    the output transform.</td>\n</tr>\r\n</table>"
  - This entry was numbered 351-28-13 in IEC 60050-351:2006.
  examples: []
  entry_status: Standard
  date_accepted: '2013-11-01T00:00:00+00:00'
