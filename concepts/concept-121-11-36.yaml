eng:
  id: 121-11-36
  terms:
  - type: expression
    normative_status: preferred
    designation: electric dipole moment (2)
  - type: symbol
    designation: stem:[*p*]
    international: true
  definition: for a substance within a domain, vector quantity equal to the vector
    sum of the electric dipole moments of all elementary electric dipoles included
    in the domain
  language_code: eng
  notes:
  - |-
    The electric dipole moment of a substance within a domain V is the volume integral of the electric polarization *stem:[P]*:

    stem:[p = underset(V)( int ) P d V]
  examples: []
  entry_status: Standard
