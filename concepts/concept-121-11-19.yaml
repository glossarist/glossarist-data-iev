eng:
  id: 121-11-19
  terms:
  - type: expression
    normative_status: preferred
    designation: magnetic flux density
  - type: expression
    designation: magnetic induction
  - type: symbol
    designation: stem:[*B*]
    international: true
  definition: |-
    vector field quantity stem:[*B*]  which exerts on any charged particle having velocity stem:[*v*] a force stem:[*F*]  equal to the product of the vector product stem:[*v*] x stem:[*B*]  and the electric charge  stem:[Q] of the particle:

    stem:[*F*] = stem:[Q*v*] x stem:[*B*]
  language_code: eng
  notes:
  - |-
    The divergence of stem:[*B*]  is zero at all points:

    div stem:[*B*] = 0
  - The magnetic flux density stem:[*B*] is sometimes called “magnetic field”, risking
    confusion with the magnetic field strength stem:[*H*] .
  examples: []
  entry_status: Standard
  date_accepted: '1998-08-01T00:00:00+00:00'
  date_amended: '1998-08-01T00:00:00+00:00'
  review_date: '1998-08-01T00:00:00+00:00'
  review_decision_date: '1998-08-01T00:00:00+00:00'
  review_decision_event: published
