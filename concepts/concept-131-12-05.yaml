eng:
  id: 131-12-05
  terms:
  - type: expression
    normative_status: preferred
    designation: differential resistance
  - type: symbol
    designation: stem:[R]~d~
    international: true
  definition: |-
    for a resistive two-terminal element or two-terminal circuit with terminals A and B, derivative of the voltage stem:[u]~AB~ &amp;lsqb;{{131-11-56, IEV:131-11-56}}&amp;rsqb; between the terminals with respect to the electric current stem:[i] in the element or circuit:

    stem:[R_d = ((d u_((AB))))/((d i))]

    where the electric current is taken as positive if its direction is from A to B and negative in the opposite case
  language_code: eng
  notes:
  - For an ideal resistor, the differential resistance stem:[R]~d~ is equal to its
    resistance stem:[R].
  examples: []
  entry_status: Standard
  date_accepted: '2008-09-01T00:00:00+00:00'
  date_amended: '2008-09-01T00:00:00+00:00'
  review_date: '2008-09-01T00:00:00+00:00'
  review_decision_date: '2008-09-01T00:00:00+00:00'
  review_decision_event: published
