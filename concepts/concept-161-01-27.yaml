eng:
  id: 161-01-27
  terms:
  - type: expression
    normative_status: preferred
    usage_info: in electromagnetic compatibility
    designation: port
  definition: |-
    particular interface of an equipment which couples this equipment with the external electromagnetic environment ({{161-01-01, IEV:161-01-01}}) and through which the equipment is influenced by this environment

    EXAMPLE Examples of ports of interest are shown in Figure 1. The enclosure port is the physical boundary of the apparatus (e.g. enclosure). The enclosure port provides for radiated and electrostatic discharge ({{161-01-22, IEV:161-01-22}}) energy transfer, whereas the other ports provide for conducted energy transfer.

    image::/assets/images/parts/161/ACEC-Guide107_2009_F1_en.png[]

    *Figure 1 – Examples of ports*
  language_code: eng
  notes:
  - Ports in the subject area of electromagnetic compatibility are specific cases
    of the port defined in {{131-12-60, IEV:131-12-60}}.
  examples: []
  entry_status: Standard
  authoritative_source:
  - ref: IEC Guide 107:2009
    clause: 3.1.12
    link: https://webstore.iec.ch/publication/20532
    relationship:
