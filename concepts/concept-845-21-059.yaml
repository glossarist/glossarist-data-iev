eng:
  id: 845-21-059
  terms:
  - type: expression
    normative_status: preferred
    designation: photon spherical irradiance
  - type: expression
    designation: photon fluence rate
  - type: symbol
    designation: stem:[E]~p,o~
    international: true
  definition: mean value of photon irradiance on the outer curved surface of a very
    small (real or imaginary) sphere at a point in space
  language_code: eng
  notes:
  - |-
    The photon spherical irradiance can be expressed by

    stem:[E_((p ,o)) = underset((4 pi))( int ) L_p d omega]

    where stem:[Ω] is solid angle and stem:[L]~p~ is photon radiance.
  - The photon spherical irradiance is expressed in second to the power minus one
    per square metre (s^−1^·m^−2^).
  examples: []
  entry_status: Standard
