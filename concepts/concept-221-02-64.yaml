    quotient of the relative change of saturation magnetic polarization due to a change in temperature by that change in temperature

    stem:[alpha_((J s)) = ((J_((s Theta)) - J_((sref))))/((J_((sref)) ( Theta - Theta_((ref)) )))]

    where stem:[J]~sstem:[Θ]~ and stem:[J]~sref~ are the saturation magnetizations at temperatures of stem:[Θ] and stem:[Θ]~ref~ respectively
