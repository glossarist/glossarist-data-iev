eng:
  id: 221-02-52
  terms:
  - type: expression
    normative_status: preferred
    designation: temperature coefficient of inductance
  - type: symbol
    designation: stem:[αL]
    international: true
  definition: |-
    the fractional change of inductance due to a change in temperature divided by that change in temperature:

    stem:[alpha_L = ((L_(theta) - L_((ref))))/((L_((ref)) ( theta - theta_((ref)) )))]

    where stem:[Lθ] and stem:[L]~ref~ are the inductances at temperatures stem:[θ] and stem:[θ]~ref~ respectively
  language_code: eng
  notes: []
  examples: []
  entry_status: Standard
  date_accepted: '1990-10-01T00:00:00+00:00'
  date_amended: '1990-10-01T00:00:00+00:00'
  review_date: '1990-10-01T00:00:00+00:00'
