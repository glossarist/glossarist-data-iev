fra:
  id: 102-03-31
  terms:
  - type: expression
    normative_status: preferred
    designation: trièdre rétrograde
    gender: m
    plurality: singular
  - type: expression
    designation: trièdre inverse
    gender: m
    plurality: singular
  definition: dans l'espace euclidien à trois dimensions, ensemble ordonné de trois
    vecteurs linéairement indépendants *stem:[U]*, *stem:[V]* et *stem:[W]*, tel que,
    pour un observateur regardant dans la direction de *stem:[W]*, la rotation d'angle
    minimal qui amène *stem:[U]* sur *stem:[V]* se fait dans le sens inverse des aiguilles
    d'une montre
  language_code: fra
  notes:
  - Les vecteurs d'un trièdre rétrograde ont des directions qui correspondent respectivement
    à celles du pouce (*stem:[U]*), de l'index (*stem:[V]*) et du majeur (*stem:[W]*)
    de la main gauche, lorsque l'index est en extension et le majeur pointe à angle
    droit des autres doigts.
  examples: []
  entry_status: Standard
  review_decision_event: published
