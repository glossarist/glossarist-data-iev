eng:
  id: 561-01-24
  terms:
  - type: expression
    normative_status: preferred
    usage_info: of a piezoelectric resonator
    designation: equivalent circuit
  definition: |-
    electrical circuit which has the same characteristics as a piezoelectric resonator in the immediate neighbourhood of resonance



    image::/assets/images/parts/561/561-fig2-en.png[]

    *Figure 2 – Equivalent circuit of a piezoelectric vibrator (one-port resonator)*
  language_code: eng
  notes:
  - This entry was numbered 561-02-07 in IEC 60050-561:1991.
  examples:
  - A one-port piezoelectric resonator (see Figure 2) consists of series elements
    stem:[L]~1~, stem:[C]~1~, stem:[R]~1~ in parallel with stem:[C]~0~, where stem:[L]~1~,
    stem:[C]~1~, stem:[R]~1~ represent the motional inductance, capacitance and resistance
    respectively and stem:[C]~0~ the shunt capacitance. The circuit of Figure 2 has
    the same impedance as a piezoelectric resonator in the neighbourhood of resonance.
  entry_status: Standard
  date_accepted: '2014-11-01T00:00:00+00:00'
  date_amended: '2014-11-01T00:00:00+00:00'
  review_date: '2014-11-01T00:00:00+00:00'
  review_decision_date: '2014-11-01T00:00:00+00:00'
  review_decision_event: published
