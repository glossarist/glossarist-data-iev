eng:
  id: 421-05-03
  terms:
  - type: expression
    normative_status: preferred
    designation: tapping factor
  definition: |-
    the ratio stem:[U]~d~/ stem:[U]~N~ (tapping factor) or 100 stem:[U]~d~/ stem:[U]~N~ (tapping factor expressed as a percentage)

    where:

    stem:[U]~N~ is the rated voltage of the winding

    stem:[U]~d~ is the voltage which would be developed at no-load at the terminals of the winding, connected on the tapping concerned, by applying rated voltage to an untapped winding
  language_code: eng
  notes:
  - The tapping factor expresses the relative value of the "effective number of turns"
    of the tapped winding at the relevant tapping, the basis 1 being the effective
    number of turns of this winding at the principal tapping.
  examples: []
  entry_status: Standard
  date_accepted: '1990-10-01T00:00:00+00:00'
  date_amended: '1990-10-01T00:00:00+00:00'
  review_date: '1990-10-01T00:00:00+00:00'
  review_decision_date: '1990-10-01T00:00:00+00:00'
  review_decision_event: published
