eng:
  id: 426-11-01
  terms:
  - type: expression
    normative_status: preferred
    designation: intrinsically safe circuit
  definition: circuit, in which any spark or any thermal effect produced under specific
    conditions, which include normal operation and specified fault conditions, is
    not capable of causing ignition of a given explosive atmosphere
  language_code: eng
  notes:
  - 'The conditions are specified in IEC 60079-11, _Explosive atmospheres – Part 11:
    Equipment protection by intrinsic safety "i"_.'
  examples: []
