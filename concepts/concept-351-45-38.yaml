fra:
  id: 351-45-38
  terms:
  - type: expression
    normative_status: preferred
    designation: taux de dépassement
    gender: m
    plurality: singular
  definition: |-
    pour une réponse à un échelon d’un élément de transfert, la déviation transitoire maximale de la variable de sortie à partir de sa valeur de régime établi final, habituellement exprimée en pourcentage de la différence entre les valeurs de régime établi initial et final, et pour la réponse à un échelon de la variable de référence ou la réponse à un échelon de la variable perturbatrice d’un système de commande, la déviation transitoire maximale à partir de la valeur desirée

    VOIR: Figure 5 et Figure 11.
  language_code: fra
  notes:
  - |-
    Cet article était numéroté 351-24-30 dans la CEI 60050-351:2006.

