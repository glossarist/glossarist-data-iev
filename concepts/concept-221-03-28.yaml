fra:
  id: 221-03-28
  terms:
  - type: expression
    normative_status: preferred
    designation: angle de pertes (magnétiques)
    gender: m
    plurality: singular
  definition: différence de phase entre les composantes fondamentales de l'induction
    magnétique et du champ magnétique
  language_code: fra
  notes:
  - Lorsqu'une différence de phase peut être associée aux pertes par courants de Foucault,
    aux pertes par hystérésis ou aux pertes résiduelles, l'angle de pertes peut être
    représenté par stem:[δ]~F~ pour les pertes par courant de Foucault, stem:[δ]~h~
    pour les pertes par hystérésis et stem:[δ]~r~ pour les pertes résiduelles.
  - |-
    La tangente de l'angle de perte est fréquemment utilisée pour exprimer les pertes dans un matériau magnétique:

    stem:[tan delta_m = (mu^( ″ ))/(mu^( ' ))]

    où stem:[µ]′ et stem:[µ]″ sont respectivement la partie réelle et la partie imaginaire de la perméabilité complexe (symb.: stem:[µ]).
  examples: []
