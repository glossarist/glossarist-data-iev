  terms:
  - type: expression
    normative_status: preferred
    usage_info: of system components
    designation: interchangeability
  definition: capability of system components to be procured from any number of suppliers
    and replaced without any substantial change in functionality or performance
  language_code: eng
  notes:
  - Interchangeability also allows the system to be adapted to technology evolutions
    without significant modification to its architecture.
