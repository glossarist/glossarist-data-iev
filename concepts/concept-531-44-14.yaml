eng:
  id: 531-44-14
  terms:
  - type: expression
    normative_status: preferred
    designation: rise time
  definition: the time required for the photoelectric current to rise from a stated
    low percentage to a stated higher percentage of the maximum value when a steady
    state of radiation is instantaneously applied
  language_code: eng
  notes:
  - It is usual to consider the. 10 % and 90% levels.
