eng:
  id: 881-04-27
  terms:
  - type: expression
    normative_status: preferred
    designation: mass attenuation coefficient
  - type: symbol
    designation: stem:[(mu)/(rho)]
    international: true
  definition: |-
    of a material for indirectly ionizing particles, the quotient dstem:[N]/stem:[N] by stem:[ρ] dstem:[l],where dstem:[N]/stem:[N] is the fraction of particles that experience interactions in traversing a distance dstem:[l] in a medium of density stem:[ρ]

    stem:[(mu)/(rho) = (1)/((rho N)) ((d N))/((d l))]
  language_code: eng
  notes:
  - The mass attenuation coefficient stem:[(mu)/(rho)] for X-radiation and gamma-radiation
    may be expressed as the sum of several parts, each attributed to a particular
    phenomenon; stem:[(tau)/(rho)] for the photoelectric effect; stem:[((sigma_c))/(rho)]
    for the Compton effect; stem:[((sigma_((coh))))/(rho)] for coherent scattering;
    and stem:[(kappa)/(rho)] for pair production.
  examples: []
  entry_status: Standard
  date_accepted: '1983-01-01T00:00:00+00:00'
  date_amended: '1983-01-01T00:00:00+00:00'
  review_date: '1983-01-01T00:00:00+00:00'
  review_decision_date: '1983-01-01T00:00:00+00:00'
  review_decision_event: published
