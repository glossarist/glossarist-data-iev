  terms:
  - type: expression
    normative_status: preferred
    designation: centralized control structure
  definition: |-
    control structure with interconnected subprocesses, in which each partial control equipment takes into account the information of all subprocesses to form its output information

    SEE: Figure 24.
  language_code: eng
  notes:
