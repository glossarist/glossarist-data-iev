eng:
  id: 351-44-05
  terms:
  - type: expression
    normative_status: preferred
    designation: direction of action
  definition: direction of the action path in a functional diagram
  language_code: eng
  notes:
  - In a functional block the direction of action goes from the input of the block
    to its output (see Figures 1 and 2).
  - The direction of action needs not be the same as the direction of mass or energy
    flow.
  - |-
    This entry was numbered 351-23-05 in IEC 60050-351:2006.

    image::/assets/images/parts/351/351-fig2-en.png[Figure 2 - Functional diagram indicating typical elements of an elementary closed-loop control system]
