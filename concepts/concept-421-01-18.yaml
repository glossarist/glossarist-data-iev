eng:
  id: 421-01-18
  terms:
  - type: expression
    normative_status: preferred
    designation: sealed transformer
  definition: a transformer which is non-breathing, that is, so sealed that there
    can be no significant interchange between its contents and the external atmosphere
  language_code: eng
  notes:
  - In the case of oil-immersed transformers, these may or may not have a cushion
    of air (or other gas).
  - |-
    Sealed transformers fall into two categories:

    a) transformers in which the total volume of oil, together with air (or other gas), or any combination thereof, remains constant over the temperature range.

    b) transformers in which the total volume of oil, air (or other gas), or any combination thereof, varies over the temperature range and this variation is accommodated by a sealed flexible container or a flexible membrane.
  examples: []
  entry_status: Standard
  date_accepted: '1990-10-01T00:00:00+00:00'
  date_amended: '1990-10-01T00:00:00+00:00'
  review_date: '1990-10-01T00:00:00+00:00'
