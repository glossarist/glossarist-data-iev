  - type: expression
    normative_status: preferred
    designation: residual resistivity
  definition: finite resistivity remaining at 0 K for a normal conductor
  language_code: eng
  notes:
  - The residual resistivity is due to electron scattering by impurities and lattice
    defects and does not depend on temperature in the low temperature region.
