eng:
  id: 395-05-31
  terms:
  - type: expression
    normative_status: preferred
    designation: source efficiency
  definition: ratio between the surface emission rate and the number of particles
    of the same type created or released within the source per unit time
  language_code: eng
  notes:
  - Source efficiency will be affected by self-absorption and backscatter.
  - This entry was numbered 393-14-89 in IEC 60050-393:2003.
