eng:
  id: 845-29-071
  terms:
  - type: expression
    normative_status: preferred
    designation: room index
  - type: expression
    designation: installation index
  - type: symbol
    designation: stem:[K]
    international: true
  definition: quotient of the sum of the areas of the working plane and the plane
    of the luminaires and the sum of the area of the walls bounded by the working
    plane and the plane of the luminaires, used in the calculation of the utilization
    factor or utilance
  language_code: eng
  notes:
  - |-
    The room index is expressed by the formula

    stem:[K = ((a b))/((h ( a + b )))]

    where stem:[a] and stem:[b] are the dimensions of the sides of the room and stem:[h] the mounting height, that is the distance between the working plane and the plane of the luminaires.
  - See also "<a href="IEV845-29-073">ceiling cavity index</a>" and "<a href="IEV845-29-075">floor
    cavity index</a>".
  - The room index has unit one.
  - This entry was numbered 845-09-55 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
