eng:
  id: 561-01-74
  terms:
  - type: expression
    normative_status: preferred
    usage_info: of a resonator
    designation: quality factor for a series resonance circuit
  - type: symbol
    designation: stem:[Q]~s~
    international: true
  definition: |-
    value showing the sharpness of the resonance, commonly used to represent the merit of the resonator, defined as

    stem:[Q_S = ((omega_r L_1))/((R_1))]

    where

    stem:[omega_r = 2 pi f_r] is the angular resonance frequency;

    stem:[f]~r~  is the resonance frequency;

    stem:[L]~1~ is the motional inductance;

    stem:[R]~1~ is the motional resistance
  language_code: eng
  notes: []
  examples: []
