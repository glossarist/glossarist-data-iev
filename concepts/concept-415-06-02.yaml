eng:
  id: 415-06-02
  terms:
  - type: expression
    normative_status: preferred
    designation: weighted sound pressure level
  - type: expression
    designation: sound level
  definition: logarithm of the ratio of a given sound pressure to the reference sound
    pressure of 20 µPa, the sound pressure being obtained with a standard frequency
    weighting and with a standard exponential time weighting.
  language_code: eng
  notes:
  - Sound level in decibels is twenty times the logarithm to the base ten of that
    ratio.
  - 'Standard frequency weightings A and B used in IEC 61400-11 are given in IEC 60651
    (1979): Sound level meters.'
  examples: []
