eng:
  id: 351-50-13
  terms:
  - type: expression
    normative_status: preferred
    designation: derivative element
  - type: expression
    normative_status: preferred
    designation: D element
  definition: linear time-invariant transfer element in which the value of the output
    variable is proportional to the time derivative of the input variable
  language_code: eng
  notes:
  - "The transfer function of a derivative element is given by\n\nstem:[((V ( s )))/((U
    ( s ))) = K_D * s]\n\nwhere<table>\r\n<tr>\n<td>\nstem:[K]~D~\n</td>\n<td>is the
    derivative action coefficient;</td>\n</tr>\r\n<tr>\n<td>stem:[s]</td>\n<td>is
    the complex variable of the Laplace transform;</td>\n</tr>\r\n<tr>\n<td>\nstem:[U](stem:[s])</td>\n<td>is
    the input transform;</td>\n</tr>\r\n<tr>\n<td>\nstem:[V](stem:[s])</td>\n<td>is
    the output transform.</td>\n</tr>\r\n</table>"
  - This entry was numbered 351-28-24 in IEC 60050-351:2006.
  examples: []
