eng:
  id: 521-01-05
  terms:
  - type: expression
    normative_status: preferred
    designation: Maxwell-Boltzmann velocity-distribution law
  definition: |-
    algebraic equation giving the number dstem:[N] of particles of a non-quantized system, the components of velocity of which are comprised in the intervals (stem:[u], stem:[u] + dstem:[u]), (stem:[v], stem:[v] + dstem:[v]), (stem:[w], stem:[w] + dstem:[w]) respectively:

    stem:[d N = A * exp ((- m ( u^2 + v^2 + w^2 )))/((2 k T)) d u * d v * d w]

    where

    stem:[A = N (m)/((( 2 pi * k T )))^(3 // 2)]

    stem:[N] is the total number of particles

    stem:[m] is the mass of a particle

    stem:[T] is the thermodynamic temperature

    stem:[k] is the Boltzmann constant
  language_code: eng
  notes:
  - dstem:[N]/stem:[N] represents the probability that a particle has its components
    of velocity within the intervals considered.
  examples: []
  entry_status: Standard
  date_accepted: '2002-05-01T00:00:00+00:00'
  date_amended: '2002-05-01T00:00:00+00:00'
  review_date: '2002-05-01T00:00:00+00:00'
  review_decision_date: '2002-05-01T00:00:00+00:00'
  review_decision_event: published
