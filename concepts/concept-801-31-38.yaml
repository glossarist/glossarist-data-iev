eng:
  id: 801-31-38
  terms:
  - type: expression
    normative_status: preferred
    designation: normalized level difference
  definition: in decibels, level difference between rooms plus ten times the common
    logarithm of the ratio of the reverberation time in the receiving room to the
    reference reverberation time
  language_code: eng
  notes:
  - For dwellings, reference reverberation time is 0,5s.
  examples: []
  entry_status: Standard
  authoritative_source:
