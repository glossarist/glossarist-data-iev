      :type: :modified
      :modification: The preferred term "AAL use case" has been added; in the synonym,
        "ambient" has been replaced by "active"; in the definition, "hypothetically
        possible" has been replaced by "typical" and "where AAL concepts, products
        and services may improve the quality of life" has been replaced by "in which
        active assisted living can be realized"; the note has been modified for clarity.
