  terms:
  - type: expression
    normative_status: preferred
    designation: AAL use case
  - type: expression
    designation: active assisted living use case
  definition: description of a typical situation or series of events in which active
    assisted living can be realized
  language_code: eng
  notes:
  - The aim of an AAL use case is to describe a problem scenario in such a way that
    AAL approaches to solutions are made evident in their temporal, spatial as well
    as technical dimension.
  examples: []
  entry_status: Standard
  authoritative_source:
