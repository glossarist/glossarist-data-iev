eng:
  id: 482-05-54
  terms:
  - type: expression
    normative_status: preferred
    designation: thermal runaway
  definition: unstable condition arising during constant voltage charge in which the
    rate of heat dissipation capability, causing a continuous temperature increase
    with resulting further charge current increase, which can lead to the destruction
    of the battery
  language_code: eng
  notes:
  - In lithium batteries thermal runaway may cause melting of lithium.
  examples: []
  entry_status: Standard
