eng:
  id: 121-12-28
  terms:
  - type: expression
    normative_status: preferred
    designation: "(absolute) permeability"
  - type: symbol
    designation: stem:[μ]
    international: true
  definition: |-
    scalar or tensor quantity the product of which by the magnetic field strength stem:[*H*]  in a medium is equal to the magnetic flux density stem:[*B*] :

    stem:[*B*] = stem:[μ] stem:[*H*]
  language_code: eng
  notes:
  - For an isotropic medium the absolute permeability is a scalar; for an anisotropic
    medium it is a tensor.
  examples: []
  entry_status: Standard
