  terms:
  - type: expression
    normative_status: preferred
    designation: maximum rated input power
  definition: the maximum apparent power, in kVA, taken from the supply mains by the
    X-ray generator. On single phase it is equal to the product of the declared supply
    voltage and the maximum rated supply current. For three-phase use it is necessary
    to multiply this product by √3
