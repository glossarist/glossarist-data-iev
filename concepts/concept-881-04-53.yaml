eng:
  id: 881-04-53
  terms:
  - type: expression
    normative_status: preferred
    designation: air kerma-rate constant
  - type: symbol
    designation: stem:[Γδ]
    international: true
  definition: |-
    for a radionuclide emitting photons, the quotient of stem:[l^2 overset(˙)(K)_(delta)] by stem:[A], where stem:[Kδ] is the air kerma-rate due to photons of energy greater than δ, at a distance 1 from a point source of this nuclide having an activity stem:[A]

    stem:[Gamma_(delta) = ((l^2 overset(˙)(K)_(delta)))/(A)]
  language_code: eng
  notes:
  - |-
    The SI unit of air kerma-rate constant is m^2^ • J • kg^−1^.

    When the special names gray (Gy) and becquerel (Bq) are used m^2^ • J • kg^−1^ becomes m^2^ • Gy • Bq^−1^ • s^−1^.

    When the earlier special units of activity (the curie) and kerma (the rad) are used

    stem:[1 rad * m^2 * Ci^(- 1) * s^(- 1) = ((10^(- 12)))/((3,7)) m^2 * J * kg^(- 1) ( exactly )]
  examples: []
  entry_status: Standard
  date_accepted: '1983-01-01T00:00:00+00:00'
  date_amended: '1983-01-01T00:00:00+00:00'
  review_date: '1983-01-01T00:00:00+00:00'
