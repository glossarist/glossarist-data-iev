eng:
  id: 351-42-21
  terms:
  - type: expression
    normative_status: preferred
    designation: asymptotic stability
  definition: |-
    property of a system which implies that its state variables return to the original steady state after an initial displacement

    Note 1 to entry:  This is equally the case, when the state variables are displaced from a steady state by a disturbance of the input variable and the disturbance has ceased.
  language_code: eng
  notes:
  - This entry was numbered 351-21-31 in IEC 60050-351:2006.
