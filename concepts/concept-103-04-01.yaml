eng:
  id: 103-04-01
  terms:
  - type: expression
    normative_status: preferred
    designation: Fourier transform
  definition: |-
    for a real or complex function stem:[f](stem:[t]) of the real variable stem:[t], complex function stem:[F ( omega )] of the real variable stem:[ω], given by the integral transformation

    stem:[F ( omega ) = int_( - oo)^( + oo) f ( t ) e^(- j omega t) d t]

    where j is the imaginary unit
  language_code: eng
  notes:
  - If stem:[t] is time, the variable stem:[ω] represents angular frequency.
  - The Fourier transform of the function stem:[f] is also denoted Fstem:[f] or ℱstem:[f].
  examples: []
  entry_status: Standard
  date_accepted: '2009-12-01T00:00:00+00:00'
  date_amended: '2009-12-01T00:00:00+00:00'
  review_date: '2009-12-01T00:00:00+00:00'
  review_decision_date: '2009-12-01T00:00:00+00:00'
  review_decision_event: published
