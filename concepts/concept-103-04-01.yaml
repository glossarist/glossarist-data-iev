fra:
  id: 103-04-01
  terms:
  - type: expression
    normative_status: preferred
    designation: transformée de Fourier
    gender: f
    plurality: singular
  definition: |-
    pour une fonction réelle ou complexe stem:[f](stem:[t]) de la variable réelle stem:[t], fonction complexe stem:[F ( omega )] de la variable réelle stem:[ω], donnée par la transformation intégrale

    stem:[F ( omega ) = int_( - oo)^( + oo) f ( t ) e^(- j omega t) d t]

    où j est l’unité imaginaire
  language_code: fra
  notes:
  - Si stem:[t] est le temps, la variable stem:[ω] représente la pulsation.
  - La transformée de Fourier de la fonction stem:[f] est notée aussi Fstem:[f] ou
    ℱstem:[f].
  examples: []
  entry_status: Standard
  review_decision_event: published
