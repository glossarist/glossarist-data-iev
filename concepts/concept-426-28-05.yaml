eng:
  id: 426-28-05
  terms:
  - type: expression
    normative_status: preferred
    usage_info: non-electrical equipment
    designation: maximum surface temperature
  definition: highest temperature that can be attained in service under the most adverse
    operating conditions (but within the recognized tolerance) by any part or surface
    of the equipment, protective system or component that can produce an ignition
    of the surrounding explosive atmosphere
  language_code: eng
  notes:
  - The maximum surface temperature marked on the equipment includes safety margins
    depending on the EPL of the equipment.
  - The surface temperature which is relevant can be internal or external depending
    upon the Type of Protection concerned.
  - For {{Ex Equipment, IEV:426-01-14}} in an explosive dust atmosphere, this temperature
    occurs on the external surface of the enclosure and can include a defined dust
    layer condition.
  examples: []
  entry_status: Standard
  authoritative_source:
  - ref: IEC 60079-0:2017
    clause: '3.57'
    link: https://webstore.iec.ch/publication/62232
    relationship:
      :type: :modified
      :modification: In the definition, "any part or surface of Ex Equipment" has
        been replaced by "any part or surface of the equipment, protective system
        or component that can produce an ignition of the surrounding explosive atmosphere";
        the notes to entry have been added.
    original: IEC 60079-0:2017, 3.57, modified – In the definition, "any part or surface
      of Ex Equipment" has been replaced by "any part or surface of the equipment,
      protective system or component that can produce an ignition of the surrounding
      explosive atmosphere"; the notes to entry have been added.
