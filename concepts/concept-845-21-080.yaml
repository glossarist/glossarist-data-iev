eng:
  id: 845-21-080
  terms:
  - type: expression
    normative_status: preferred
    designation: radiant exitance
  - type: symbol
    designation: |-
      stem:[M]~e~
      stem:[M]
    international: true
  definition: |-
    density of exiting radiant flux with respect to area at a point on a real or imaginary surface

    stem:[M_e = ((d Phi_e))/((d A))]

    where stem:[Φ]~e~ is radiant flux and stem:[A] is the area from which the radiant flux leaves
  language_code: eng
  notes:
  - For Planckian radiation, stem:[M]~e~ = stem:[σT]^4^ where stem:[σ] is the Stefan-Boltzmann
    constant and stem:[T] is thermodynamic temperature.
  - The corresponding photometric quantity is "luminous exitance". The corresponding
    photon quantity is "photon exitance".
  - The radiant exitance is expressed in watt per square metre (W·m^−2^).
  - This entry was numbered 845-01-47 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-21-080
  terms:
  - type: expression
    normative_status: preferred
    designation: exitance énergétique
    gender: f
    plurality: singular
  definition: |-
    densité du flux énergétique exitant par rapport à l'aire en un point d'une surface réelle ou fictive

    stem:[M_e = ((d Phi_e))/((d A))]

    où stem:[Φ]~e~ est le flux énergétique et stem:[A] est l'aire de laquelle part ce flux
  language_code: fra
  notes:
  - Pour le rayonnement de Planck, stem:[M]~e~ = stem:[σT]^4^ où stem:[σ] est la constante
    de Stefan-Boltzmann et stem:[T] est la température thermodynamique.
  - La grandeur photométrique correspondante est l'"exitance lumineuse". La grandeur
    photonique correspondante est l'"exitance photonique".
  - L'exitance énergétique est exprimée en watt par mètre carré (W·m^−2^).
  - Cet article était numéroté 845-01-47 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
