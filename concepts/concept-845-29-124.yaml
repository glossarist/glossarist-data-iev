eng:
  id: 845-29-124
  terms:
  - type: expression
    normative_status: preferred
    designation: internally reflected component of daylight factor
  - type: symbol
    designation: stem:[D]~i~
    international: true
  definition: quotient of that part of the illuminance at a point on a given plane
    in an interior which is received directly from internal reflecting surfaces illuminated
    directly or indirectly by a sky of assumed or known luminance distribution and
    the illuminance on a horizontal plane due to an unobstructed hemisphere of this
    sky, where the contribution of direct sunlight to both illuminances is excluded
  language_code: eng
  notes:
  - When calculating the lighting of interiors, the contribution of direct sunlight
    has to be considered separately.
  - The internally reflected component of daylight factor has unit one.
  - This entry was numbered 845-09-100 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-29-124
  terms:
  - type: expression
    normative_status: preferred
    designation: composante réfléchie interne du facteur de lumière du jour
    gender: f
    plurality: singular
  definition: quotient de la partie de l'éclairement lumineux en un point d'un plan
    donné dans un intérieur, qui est due directement à la réflexion par des surfaces
    intérieures éclairées directement ou indirectement par un ciel dont la distribution
    des luminances est réputée ou connue, par l'éclairement sur un plan horizontal
    provenant d'un hémisphère sans obstruction de ce ciel, la contribution de la lumière
    solaire directe à ces deux éclairements étant exclue
  language_code: fra
  notes:
  - Pour le calcul de l'éclairage intérieur, la contribution de la lumière solaire
    directe doit être prise en considération séparément.
  - L'unité de composante réfléchie interne du facteur de lumière du jour est un.
  - Cet article était numéroté 845-09-100 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
