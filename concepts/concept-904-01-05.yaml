eng:
  id: 904-01-05
  terms:
  - type: expression
    normative_status: preferred
    usage_info: in environmental standardization
    designation: process
  definition: set of interrelated or interacting activities which transforms {{inputs,
    IEV:901-07-05}} into {{outputs, IEV:901-07-06}}
  language_code: eng
  notes:
  - Inputs to a process are generally outputs of other processes.
  - Processes in an {{organization, IEV:901-03-02}} are generally planned and carried
    out under controlled conditions to add value.
  examples: []
  entry_status: Standard
  authoritative_source:
  - ref: ISO 9000:2005
    clause: definition 3
    link: https://www.iso.org/standard/42180.html
    relationship:
      :type: :modified
      :modification: '"NOTE 3   A process where the conformity of the resulting product
        cannot be readily or economically verified is frequently referred to as a
        "special process". deleted.'
    original: ISO 9000:2005, definition 3.4.1, modified – "NOTE 3   A process where
      the conformity of the resulting product cannot be readily or economically verified
      is frequently referred to as a "special process". deleted.
