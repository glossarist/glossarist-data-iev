    stem:[underset(V)( ∭ ) ( f_1 Delta f_2 - f_2 Delta f_1 ) d V = underset(S)( ∯ ) ( f_1 grad f_2 - f_2 grad f_1 ) * e_n d A]

    où dstem:[V] est l’élément de volume, *stem:[e]*~n~dstem:[A] est l’élément vectoriel de surface et Δ est l'opérateur laplacien
  language_code: fra
