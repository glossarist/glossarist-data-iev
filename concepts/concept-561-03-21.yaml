eng:
  id: 561-03-21
  terms:
  - type: expression
    normative_status: preferred
    designation: phase jitter
  definition: |-
    short-term variations of the zero crossings of the oscillator output signal from their ideal position in time

    image::/assets/images/parts/561/561-fig20-en.png[]

    *Légende*

    stem:[T]~ref~ is the period of an ideal reference signal

    *Figure 20 – Clock signal with phase jitter*
  language_code: eng
  notes:
  - The phase variation Δstem:[φ] with frequency components is greater than or equal
    to 10 Hz. Variations slower than 10 Hz are called “wander”.
  examples: []
  entry_status: Standard
  date_accepted: '2014-11-01T00:00:00+00:00'
