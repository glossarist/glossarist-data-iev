  terms:
  - type: expression
    normative_status: preferred
    designation: facteur d'insertion
    gender: m
    plurality: singular
  definition: pour un quadripôle inséré entre une source de tension ou de courant
    sinusoïdale donnée et une charge donnée, rapport du phaseur représentant la tension
    ou le courant relatif à la charge supposée connectée directement à la source,
    au phaseur représentant la tension ou le courant relatif à la charge lorsqu'elle
    est connectée à la source par l'intermédiaire du quadripôle
  language_code: fra
  notes:
  - Il faut spécifier si l’on choisit une source de tension ou de courant et si l’on
    choisit la tension ou le courant relatif à la charge.
