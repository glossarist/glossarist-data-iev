fra:
  id: 131-12-13
  terms:
  - type: expression
    normative_status: preferred
    designation: capacité
    gender: f
    plurality: singular
  definition: |-
    pour un bipôle capacitif de bornes A et B, quotient de la charge électrique stem:[q] en A par la tension électrique ({{131-11-56, IEV:131-11-56}}) stem:[u]~AB~ entre les bornes

    stem:[C = (q)/((u_((AB))))]

    où le signe de la charge électrique est déterminé en prenant, dans l’intégrale par rapport au temps qui définit cette charge, le courant électrique positif si le sens du courant est de A vers B et négatif si son sens est de B vers A
  language_code: fra
  notes:
  - Une capacité ne peut pas être négative.
  - L’unité SI cohérente de capacité est le farad, F.
  examples: []
  entry_status: Standard
  review_decision_event: published
