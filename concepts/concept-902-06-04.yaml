eng:
  id: 902-06-04
  terms:
  - type: expression
    normative_status: preferred
    designation: equivalence
  - type: expression
    normative_status: preferred
    designation: equivalence of conformity assessment results
  definition: sufficiency of different conformity assessment results to provide the
    same level of assurance of conformity with regard to the same {{specified requirements,
    IEV:902-02-01}}
  language_code: eng
  notes:
  - The general expression “conformity assessment result” is used in {{902-06-04,
    IEV:902-06-04}} to {{902-06-09, IEV:902-06-09}} to mean the {{product, IEV:902-02-03}}
    of any conformity assessment activity (e.g. a report or certificate) and may include
    a finding of nonconformity.
