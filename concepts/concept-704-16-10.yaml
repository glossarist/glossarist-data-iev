eng:
  id: 704-16-10
  terms:
  - type: expression
    normative_status: preferred
    designation: effective digit rate
  definition: the number of digits per second provided by a time-slot, equal to the
    product of the number of digit time-slots and the number of repetitions of that
    time-slot per second
  language_code: eng
  notes:
  - The term may be qualified, for example, "effective bit rate".
