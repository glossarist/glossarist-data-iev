eng:
  id: 395-01-43
  terms:
  - type: expression
    normative_status: preferred
    designation: exposure rate coefficient
  - type: symbol
    designation: stem:[Γ]
    international: true
  definition: |-
    for a photon emitter, the product of the exposure rate stem:[overset(˙)(X)], at a given distance stem:[l] from a point radiation source of that emitter and the square of that distance divided by the activity stem:[A] of the radiation source neglecting attenuation

    stem:[Gamma = overset(˙)(X) ( l^2 // A )]
  language_code: eng
  notes:
  - This entry was numbered 393-14-82 in IEC 60050-393:2003.
