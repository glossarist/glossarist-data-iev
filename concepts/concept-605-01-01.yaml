fra:
  id: 605-01-01
  terms:
  - type: expression
    normative_status: preferred
    designation: poste (d'un réseau électrique)
    gender: m
    plurality: singular
  definition: partie d'un réseau électrique, située en un même lieu, comprenant principalement
    les extrémités des lignes de transport ou de distribution, de l'appareillage électrique,
    des bâtiments et, éventuellement, des transformateurs. Un poste comprend généralement
    les dispositifs destinés à la sécurité et à la conduite du réseau (par exemple
    les protections)
  language_code: fra
  notes:
  - |-
    Selon le type de réseau auquel appartient le poste, il peut être qualifié par la désignation du réseau.

    Exemples: postes de transport (d'un réseau de transport), poste de distribution, poste à 400 kV, poste à 20 kV.
