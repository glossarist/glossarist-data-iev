eng:
  id: 605-01-01
  terms:
  - type: expression
    normative_status: preferred
    designation: substation (of a power system)
  definition: the part of a power system, concentrated in a given place, including
    mainly the terminations of transmission or distribution lines switchgear and housing
    and which may also include transformers. It generally includes facilities necessary
    for system security and control (e.g. the protective devices)
  language_code: eng
  notes:
  - |-
    According to the nature of the system within which the substation is included, a prefix may qualify it.

    Examples: transmission substation (of a transmission system), distribution substation, 400 kV substation, 20 kV substation.
  examples: []
  entry_status: Standard
