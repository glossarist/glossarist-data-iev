  terms:
  - type: expression
    normative_status: preferred
    usage_info: of a nuclear reactor
    designation: self-regulation
  definition: inherent tendency under certain conditions of a nuclear reactor to operate
    at a constant power level because of the opposite feedback on reactivity of a
    change in power level
