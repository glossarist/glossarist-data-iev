eng:
  id: 845-21-111
  terms:
  - type: expression
    normative_status: preferred
    usage_info: of a directional light source
    designation: useful luminous flux
  - type: symbol
    designation: |-
      stem:[Φ]~v,u,~stem:[α]~
      ~stem:[Φ]~u,~stem:[α]
    international: true
  definition: part of the luminous flux of a light source that contributes predominantly
    to the lighting task
  language_code: eng
  notes:
  - For non-directional light sources, the useful luminous flux is the total luminous
    flux of the light source.
  - For directional light sources the useful luminous flux is the partial luminous
    flux in a defined cone angle, the axis of the cone being the optical beam axis
    of the light source.
  - The cone angle, stem:[α], which can be expressed either in degree (°) or radian
    (rad), is given by the full conic angle and has to be specified, e.g. stem:[Φ]~u,90°~
    or stem:[Φ]~u,π/2~.
  - The optical beam axis of a light source is the axis about which the luminous intensity
    is substantially symmetrical.
  - The useful luminous flux is expressed in lumen (lm).
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-21-111
  terms:
  - type: expression
    normative_status: preferred
    usage_info: d'une source de lumière dirigée
    designation: flux lumineux utile
    gender: m
    plurality: singular
  definition: partie du flux lumineux d'une source de lumière qui contribue essentiellement
    à l'éclairage
  language_code: fra
  notes:
  - Pour les sources de lumière non dirigée, le flux lumineux utile est le flux lumineux
    total de la source de lumière.
  - Pour les sources de lumière dirigée, le flux lumineux utile est le flux lumineux
    partiel dans un angle conique défini, l'axe du cône étant l'axe optique du faisceau
    de la source de lumière.
  - L'angle conique, stem:[α], qui peut être exprimé soit en degré (°) soit en radian
    (rad), est donné par l'angle conique complet et doit être précisé, par exemple
    stem:[Φ]~u,90°~ ou stem:[Φ]~u,π/2~.
  - L'axe du faisceau optique d'une source de lumière est l'axe de symétrie essentielle
    de l'intensité lumineuse.
  - Le flux lumineux utile est exprimé en lumen (lm).
  examples: []
  entry_status: Standard
  review_decision_event: published
