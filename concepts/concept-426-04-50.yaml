  terms:
  - type: expression
    normative_status: preferred
    designation: rated insulation voltage
  definition: RMS withstand voltage value assigned by the manufacturer to the equipment
    or to a part of it, characterizing the specified (long-term) withstand capability
    of its insulation
  language_code: eng
  notes:
  - The rated insulation voltage is not necessarily equal to the rated voltage of
    equipment which is primarily related to functional performance.
