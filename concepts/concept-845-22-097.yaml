eng:
  id: 845-22-097
  terms:
  - type: expression
    normative_status: preferred
    designation: Talbot's law
  definition: law stating that when a point on the retina is excited by a light stimulus
    that undergoes periodic variations in magnitude at a {{frequency, IEV:103-06-02}}
    that exceeds the <a href="IEV845-22-093">critical flicker frequency</a>, the visual
    perception produced is identical to that produced by a steady stimulus whose magnitude
    is equal to the mean magnitude of the variable stimulus taken over one period
  language_code: eng
  notes:
  - This entry was numbered 845-02-51 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-22-097
  terms:
  - type: expression
    normative_status: preferred
    designation: loi de Talbot
    gender: f
    plurality: singular
  definition: loi stipulant que lorsqu'un point de la rétine est excité par un stimulus
    lumineux dont la valeur photométrique subit des variations périodiques de {{fréquence,
    IEV:103-06-02}} supérieure à la <a href="IEV845-22-093">fréquence critique de
    papillotement</a>, la perception visuelle produite est identique à celle qui est
    obtenue par un stimulus de valeur constante égale à la valeur moyenne du stimulus
    variable émis pendant une période
  language_code: fra
  notes:
  - Cet article était numéroté 845-02-51 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
