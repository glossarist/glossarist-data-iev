    designation: decoupled output
  definition: |-
    design of a physical unit or a device so that the output variable does not change its value if the output is burdened with the inputs of other physical units or devices



    EXAMPLE 2 outputs with tristate characteristic

    EXAMPLE 3 diode-decoupled outputs.
