  terms:
  - type: expression
    normative_status: preferred
    designation: proportional element
  - type: expression
    normative_status: preferred
    designation: P element
  definition: linear time-invariant transfer element the variation of the output variable
    of which is proportional to the corresponding variation of the input variable
  language_code: eng
  notes:
  - "The transfer function of a P element is given as\n\nstem:[((V ( s )))/((U ( s
    ))) = K_Ρ]\n\nwhere<table>\r\n<tr>\n<td>\nstem:[K]~P~\n</td>\n<td>is the proportional
    action coefficient;</td>\n</tr>\r\n<tr>\n<td>stem:[s]</td>\n<td>is the complex
    variable of the Laplace transform;</td>\n</tr>\r\n<tr>\n<td>\nstem:[U](stem:[s])</td>\n<td>is
    the input transform;</td>\n</tr>\r\n<tr>\n<td>\nstem:[V](stem:[s])</td>\n<td>is
    the output transform.</td>\n</tr>\r\n</table>"
  - This entry was numbered 351-28-16 in IEC 60050-351:2006.
