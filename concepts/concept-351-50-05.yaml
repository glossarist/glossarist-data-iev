    gender: m
    plurality: singular
  - type: expression
    normative_status: preferred
    designation: élément P
    gender: m
    plurality: singular
  definition: élément de transfert pour lequel la variation de la variable de sortie
    est proportionnelle à la variation correspondante de la variable d'entrée
  language_code: fra
  notes:
  - "La fonction de transfert d'un élément P est donnée par\n\nstem:[((V ( s )))/((U
    ( s ))) = K_Ρ]\n\noù<table>\r\n<tr>\n<td>\nstem:[K]~P~\n</td>\n<td>est le coefficient
    d’action proportionnelle;</td>\n</tr>\r\n<tr>\n<td>stem:[s]</td>\n<td>est la variable
    complexe de la transformée de Laplace;</td>\n</tr>\r\n<tr>\n<td>\nstem:[U](stem:[s])</td>\n<td>est
    la transformée de la variable d’entrée;</td>\n</tr>\r\n<tr>\n<td>\nstem:[V](stem:[s])</td>\n<td>est
    la transformée de la variable de sortie.</td>\n</tr>\r\n</table>"
  - Cet article était numéroté 351-28-16 dans la CEI 60050-351:2006.
