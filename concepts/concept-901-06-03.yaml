eng:
  id: 901-06-03
  terms:
  - type: expression
    normative_status: preferred
    designation: identical standards
  definition: "{{harmonized standards, IEV:901-06-01}} that are identical in both
    substance and presentation"
  language_code: eng
  notes:
  - Identification of the standards may be different.
  - If in different languages, the standards are accurate translations.
  - "{{Technical regulations, IEV:901-02-11}} can be harmonized like standards. Corresponding
    terms and definitions are obtained by replacing “standards” by “technical regulations”
    in the definitions {{IEV 901-06-01, IEV:901-06-01}} to {{IEV 901-06-09, IEV:901-06-09}},
    and “standardizing bodies” by “authorities” in definition {{IEV 901-06-01, IEV:901-06-01}}."
  examples: []
  entry_status: Standard
