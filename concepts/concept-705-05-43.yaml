eng:
  id: 705-05-43
  terms:
  - type: expression
    normative_status: preferred
    designation: "(tropospheric) layer"
  definition: a part of the atmosphere having radio propagation properties which are
    clearly distinguished from those of the surrounding atmosphere, in which the horizontal
    dimensions greatly exceed the vertical dimensions
  language_code: eng
  notes:
  - In French, the term "feuillet troposphérique" applies essentially to tropospheric
    layers of relatively small sizes.
