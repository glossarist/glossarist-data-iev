eng:
  id: 121-11-55
  terms:
  - type: expression
    normative_status: preferred
    designation: magnetic dipole moment
  - type: symbol
    designation: stem:[*j*]
    international: true
  definition: for a substance within a domain, vector quantity equal to the volume
    integral of the magnetic polarization
  language_code: eng
  notes:
  - |-
    The magnetic dipole moment is related to the magnetic area moment stem:[*m*] by the expression

    stem:[*j*] = stem:[μ]~0~ stem:[*m*]

    where stem:[μ]~0~ is the magnetic constant.
  examples: []
