fra:
  id: 704-21-06
  terms:
  - type: expression
    normative_status: preferred
    designation: justification positive
    gender: f
    plurality: singular
  definition: |-
    méthode de justification employée lorsque la suite des créneaux temporels élémentaires destinée à la transmission d'un signal numérique a constamment un débit numérique supérieur à celui du signal original; à chaque instant justifiable et selon la relation temporelle à cet instant:

    a) soit aucun élément numérique du signal original n'est transmis, mais un élément numérique de justification est inséré dans le créneau temporel élémentaire justifiable;

    b) soit un élément numérique du signal original est inséré dans le créneau temporel élémentaire justifiable;

    ces deux cas sont distingués par des signaux particuliers formés à l'aide des éléments numériques de service de justification
  language_code: fra
