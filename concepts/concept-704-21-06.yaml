eng:
  id: 704-21-06
  terms:
  - type: expression
    normative_status: preferred
    designation: positive justification
  - type: expression
    designation: positive pulse stuffing
  definition: |-
    a method of justification in which the digit time-slots used to convey a digital signal have a digit rate that is always higher than the digit rate of the original signal, and in which at each justification instant, depending on the prevailing conditions, either:

    a) no digit of the original signal is transmitted but, instead, a justifying digit is transmitted in the justifiable digit time-slot, or

    b) one digit of the original signal is transmitted in the justifiable digit time-slot,

    with these two alternative justification states being indicated by unique signals formed from justification service digits
  language_code: eng
  notes: []
  examples: []
  entry_status: Standard
  date_accepted: '1993-08-01T00:00:00+00:00'
  date_amended: '1993-08-01T00:00:00+00:00'
