fra:
  id: 903-03-01
  terms:
  - type: expression
    normative_status: preferred
    designation: surface fonctionnelle chaude
    gender: f
    plurality: singular
  definition: |-
    surface qui est volontairement chauffée par une source de chaleur interne et qui doit être chaude pour assurer la fonction pour laquelle l'équipement est destiné à être utilisé

    EXEMPLE Le fer à friser, la semelle d'un fer à repasser et le four d'une machine à photocopier comporte une surface fonctionnelle chaude.
  language_code: fra
  notes:
  - Certains équipements possèdent des surfaces chaudes en raison de la chaleur qu'ils
    dégagent, (par exemple, les lampes à l'intérieur d'un luminaire ou le four d'une
    machine à photocopier), et ces surfaces sont considérées, pour leur traitement,
    comme équivalentes à une surface fonctionnelle chaude.
  examples: []
  entry_status: Standard
  authoritative_source:
  - ref: IEC Guide 117:2010
    clause: '3.5'
    link: https://webstore.iec.ch/publication/7526
