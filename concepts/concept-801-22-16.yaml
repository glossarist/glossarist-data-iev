eng:
  id: 801-22-16
  terms:
  - type: expression
    normative_status: preferred
    designation: time-average sound level
  - type: expression
    designation: equivalent continuous sound level
  definition: logarithm of the ratio of a given time-mean-square standard-frequency-weighted
    sound pressure for a stated time period, to the square of the reference sound
    pressure of 20 μPa. Time-average sound level in decibels is ten times the logarithm
    to the base ten of that ratio
  language_code: eng
  notes:
  - If a frequency weighting is not specified, the A-frequency weighting is understood.
  - In principle, exponential time weighting is not involved.
  examples: []
  entry_status: Standard
  date_accepted: '1994-07-01T00:00:00+00:00'
  date_amended: '1994-07-01T00:00:00+00:00'
  review_date: '1994-07-01T00:00:00+00:00'
