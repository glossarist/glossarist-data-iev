  terms:
  - type: expression
    normative_status: preferred
    designation: dielectric loss angle
  definition: |-
    for a sinusoidal wave, the angle δ~E~ defined by the equation:

    stem:[delta_E = arctan ( ((epsilon_r^( ″ )))/((epsilon_r^( ' ))) )]

    where stem:[epsilon_r^( ″ )] and stem:[epsilon_r^( ' )] are the negative imaginary part and the real part, respectively, of the relative complex permittivity <u>stem:[ε]</u>~r~
