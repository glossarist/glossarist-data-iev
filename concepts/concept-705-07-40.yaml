eng:
  id: 705-07-40
  terms:
  - type: expression
    normative_status: preferred
    designation: extraordinary wave
  definition: |-
    the magneto-ionic component which, at vertical incidence, is reflected at the height at which the electron density and the Earth's magnetic field are such that:

    stem:[f]~p~^2^ = stem:[f] ^2^ -stem:[f f] ~B~

    where stem:[f]~p~ is the plasma frequency, stem:[f] is the wave frequency, and stem:[f] ~B~ is the electron gyro frequency
  language_code: eng
  notes:
  - This component has left-handed or right-handed elliptical polarization depending
    on whether the direction of propagation is at an obtuse or acute angle to the
    Earth's magnetic field vector.
  - When the direction of propagation is perpendicular to the Earth's magnetic field
    this component has linear polarization with the electric flux density vector perpendicular
    to the plane defined by the direction of propagation and the magnetic field.
  examples: []
  entry_status: Standard
  date_accepted: '1995-09-01T00:00:00+00:00'
  date_amended: '1995-09-01T00:00:00+00:00'
  review_date: '1995-09-01T00:00:00+00:00'
  review_decision_date: '1995-09-01T00:00:00+00:00'
  review_decision_event: published
