  definition: high-density plasma generated by a high-intensity inductively coupled
    {{electromagnetic field, IEV:121-11-61}}
  language_code: eng
  notes:
  - Inductively coupled plasma is used in etching processes such as {{deep reactive
    ion etching, IEV:523-05-13}}.
  - This note applies to the French language only.
