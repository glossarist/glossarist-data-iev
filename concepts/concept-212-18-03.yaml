  terms:
  - type: expression
    normative_status: preferred
    designation: "(dynamic) viscosity"
  definition: property of a liquid resulting from internal flow resistance opposing
    the relative movement of adjacent layers
  language_code: eng
  notes:
  - |-
    In ISO 80000-4, (dynamic) viscosity <!--><i>stem:[eta]</i> is defined by means of the equation

    <i><!-->τ<!--><sub>xz</sub> = <!-->stem:[ηdv]~x~ /stem:[dz]

    where _xz is the shear stress in a fluid moving with a velocity gradient dvx/dz perpendicular to the plane of shear._
