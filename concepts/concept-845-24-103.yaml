eng:
  id: 845-24-103
  terms:
  - type: expression
    normative_status: preferred
    designation: coefficient of retroreflection
  - type: symbol
    designation: stem:[RA]
    international: true
  definition: |-
    quotient of the coefficient of luminous intensity, stem:[R], of a plane retroreflective surface and its area, stem:[A]

    stem:[R_A = (R)/(A) = ((I // E_( _|_ )))/(A)]

    where stem:[I] is the luminous intensity of the retroreflector in the direction of observation, and stem:[E_( _|_ )] is the illuminance at the retroreflector on a plane perpendicular to the direction of the incident light
  language_code: eng
  notes:
  - The coefficient of retroreflection is particularly suitable for describing materials
    in sheet form.
  - Formerly, the symbol stem:[R]′ was used for this quantity.
  - The coefficient of retroreflection is expressed in candela per lux per square
    metre (cd·lx^−1^·m^−2^).
  - This entry was numbered 845-04-97 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
