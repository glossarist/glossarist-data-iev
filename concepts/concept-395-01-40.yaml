eng:
  id: 395-01-40
  terms:
  - type: expression
    normative_status: preferred
    designation: tissue equivalent material
  definition: |-
    material that approximates to the composition and physical interaction of soft tissue in the human body, with respect to penetrating ionizing radiation, within specified limits, with a density of 1 g cm^−3^ and a mass composition of:

    * 76,2 % oxygène, * 10,1 % hydrogène, * 11,1 % carbone,  * 2,6 % azote
  language_code: eng
  notes:
  - Water can be considered as tissue-equivalent for all the penetrating ionizing
    radiations met in radioprotection.
  - This entry was numbered 393-14-78 in IEC 60050-393:2003.
  examples: []
  entry_status: Standard
