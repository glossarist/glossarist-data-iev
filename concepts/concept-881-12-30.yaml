  - type: expression
    normative_status: preferred
    designation: débit d'exposition
    gender: m
    plurality: singular
  definition: |-
    quotient de l'accroissement dstem:[X] de l'exposition pendant un temps dstem:[t] par ce temps:

    stem:[overset(˙)(X) = ((d X))/((d t))]
  language_code: fra
  notes:
  - L'unité SI de débit d'exposition est égale à C kg^−1^ s^−1^ (A kg^−1^). D'autres
