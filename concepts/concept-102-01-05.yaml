eng:
  id: 102-01-05
  terms:
  - type: expression
    normative_status: preferred
    designation: proper subset
  definition: subset of a set, which is different from the set
  language_code: eng
  notes:
  - The notation stem:[A sub B] expresses that the set stem:[A] is a proper subset
    of the set stem:[B]. The symbol stem:[underset(!=)( sub )] is sometimes used instead
    of stem:[sub] but is not recommended, and it should be used when the latter is
    used for any subset of stem:[B]. stem:[A] is also said to be properly included
    in stem:[B].
  examples: []
  entry_status: Standard
  date_accepted: '2008-08-01T00:00:00+00:00'
