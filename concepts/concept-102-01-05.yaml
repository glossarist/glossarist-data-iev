fra:
  id: 102-01-05
  terms:
  - type: expression
    normative_status: preferred
    designation: sous-ensemble strict
    gender: m
    plurality: singular
  definition: sous-ensemble d'un ensemble, qui est différent de l'ensemble
  language_code: fra
  notes:
  - La notation stem:[A sub B] exprime que l'ensemble stem:[A] est un sous-ensemble
    strict de l'ensemble stem:[B]. Le symbole stem:[underset(!=)( sub )] est parfois
    employé au lieu de stem:[sub] mais n'est pas recommandé, et il convient qu’il
    soit employé lorsque ce dernier est employé pour un sous-ensemble quelconque de
    stem:[B]. On dit aussi que stem:[A] est strictement inclus dans stem:[B].
  examples: []
  entry_status: Standard
  review_decision_event: published
