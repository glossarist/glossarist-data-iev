eng:
  id: 561-01-76
  terms:
  - type: expression
    normative_status: preferred
    usage_info: of a resonator
    designation: reference temperature
  definition: temperature, as measured on the enclosure, at which certain resonator
    measurements are made
  language_code: eng
  notes:
  - |-
    For controlled temperature resonators, the reference temperature is the mid-point of the controlled temperature range. For non-controlled temperature resonators, the reference temperature is normally 25 °C ± 2 °C.

    Note 2 to entry: This entry was numbered 561-02-24 in IEC 60050-561:1991.
