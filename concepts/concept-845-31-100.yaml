  terms:
  - type: expression
    normative_status: preferred
    usage_info: of a sign
    designation: backing board
  - type: expression
    usage_info: of a sign
    designation: backboard
  definition: |-
    surround or extension to a sign used



    * to improve conspicuity of a sign by increasing its size and isolating it from its background;

    * to improve conspicuity of a sign by virtue of the colour of the backing board;

    * to reduce the effects of glare when the Sun is low and behind the sign
