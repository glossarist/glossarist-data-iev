eng:
  id: 351-45-29
  terms:
  - type: expression
    normative_status: preferred
    designation: unit-impulse response
  - type: expression
    normative_status: preferred
    designation: weighting function
  - type: symbol
    designation: stem:[g](stem:[t])
    international: true
  definition: |-
    quotient impulse response Δstem:[v]~δ~(stem:[t]) divided by the impulse area stem:[K]~δ~ of the impulse function, the quotient described by

    stem:[g ( t ) = (1)/((K_(delta))) * Delta v_( delta ) ( t )]
  language_code: eng
  notes:
  - |-
    The unit-impulse response stem:[g](stem:[t]) of a system contains all properties of the system and is used to calculate the response Δstem:[v](stem:[t]) of the system to any input variable Δstem:[u](stem:[t]) by the convolution integral

    stem:[Delta v ( t ) = int_((- oo))^(oo) g ( tau ) * Delta u ( t - tau ) d tau].
  - |-
    The systems frequency response stem:[G ( j * omega )] may be calculated by Fourier transformation of stem:[g](stem:[t]):

    stem:[G ( j * omega ) = ℱ { g ( t ) }].
  - The unit-impulse response of a system mathematically may be considered to result
    from application of a unit impulse to an input variable.
  - This entry was numbered 351-24-19 in IEC 60050-351:2006.
  examples: []
  entry_status: Standard
  classification: Preferred
  date_accepted: '2013-11-01T00:00:00+00:00'
