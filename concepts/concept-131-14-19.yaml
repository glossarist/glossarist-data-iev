  terms:
  - type: expression
    normative_status: preferred
    designation: reverse transfer ratio
  definition: for a linear two-port, quotient of the phasor representing a quantity
    at the input port by the phasor representing a quantity of the same kind at the
    output port
  language_code: eng
  notes:
  - According to the kind of quantity, examples are an open-circuit reverse voltage
    transfer ratio, a short-circuit reverse current transfer ratio.
