eng:
  id: 221-03-03
  terms:
  - type: expression
    normative_status: preferred
    designation: Polder's tensor permeability
  - type: expression
    normative_status: preferred
    designation: tensor permeability for a magnetostatically saturated medium
  - type: symbol
    designation: stem:[underset(_)(underset(_)(mu))_p]
    international: true
  definition: |-
    the tensor permeability of a material saturated by a static magnetic field that is collinear with the time-varying field, with the direction of the static field defining the z-axis:

    stem:[( [[ underset(_)(mu)_((()_r)),- j (underset(_)(kappa))_r,0],[(underset(_)(underset(_)(mu)))_p = j underset(_)(kappa)_r,(underset(_)(mu))_((()_r)),0],[ 0,0,1]] )]

    where stem:[μ]~r~ and stem:[κ]~r~ are complex permeabilities
  language_code: eng
  notes: []
  examples: []
  entry_status: Standard
  classification: Preferred
