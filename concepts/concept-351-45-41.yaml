fra:
  id: 351-45-41
  terms:
  - type: expression
    normative_status: preferred
    designation: réponse en fréquence
    gender: f
    plurality: singular
  definition: |-
    pour un système linéaire invariant dans le temps avec une variable d'entrée sinusoïdale en régime établi de la variable de sortie, rapport du phaseur de la variable de sortie au phaseur de la variable d'entrée correspondante, représenté en fonction de la pulsation stem:[ω]

    VOIR: Figures 9 et 10.
  language_code: fra
  notes:
  - La réponse en fréquence coïncide avec la fonction de transfert prise sur l'axe
    imaginaire du plan complexe.
  - |-
    Cet article était numéroté 351-24-33 dans la CEI 60050-351:2006.

