eng:
  id: 351-45-41
  terms:
  - type: expression
    normative_status: preferred
    designation: frequency response
  definition: |-
    for a linear time-invariant system with a sinusoidal input variable in steady state of the output variable the ratio of the phasor of the output variable to the phasor of the corresponding input variable, represented as a function of the angular frequency stem:[ω]

    SEE: Figures 9 and 10.
  language_code: eng
  notes:
  - The frequency response coincides with the transfer function taken on the imaginary
    axis of the complex plane.
  - This entry was numbered 351-24-33 in IEC 60050-351:2006.
