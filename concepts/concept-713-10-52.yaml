eng:
  id: 713-10-52
  terms:
  - type: expression
    normative_status: preferred
    designation: sensitivity
  definition: |-
    1 – ability of a radio receiver to provide an output signal of required level and quality from a weak input signal

    2 – the minimum level of signal at the input of a radio receiver which produces an output signal of specified level and quality
  language_code: eng
  notes:
  - The output signal quality is usually expressed by a signal-to-noise ratio or an
    error ratio.
  examples: []
  entry_status: Standard
  date_accepted: '1998-04-01T00:00:00+00:00'
