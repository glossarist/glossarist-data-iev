  definition: |-
    mesure sans dimension du degré de désadaptation entre deux impédances stem:[Z]~a~ et stem:[Z]~b~ donnée par l’expression

    stem:[| ((Z_a - Z_b))/((Z_a + Z_b)) |]

    où stem:[Z]~a~ et stem:[Z]~b~ représentent respectivement l’impédance d’entrée et l’impédance source ou l’impédance de sortie et l’impédance de charge
