eng:
  id: 421-01-09
  terms:
  - type: expression
    normative_status: preferred
    designation: shell-type transformer
  definition: a transformer where the packets of laminations forming the core and
    yokes surround the windings and enclose generally the major parts of them
  language_code: eng
  notes:
  - Generally, shell-type transformers incorporate sandwich windings.
  - Since there are types of transformer which do not come clearly within the categories
    of "core-type" and "shell-type", the use of these terms is deprecated. Generally
    they can be avoided by indicating the type of windings, i.e. "concentric" or "sandwich",
    and/or whether or not the magnetic circuit has unwound magnetic return paths.
  examples: []
  entry_status: Standard
