  terms:
  - type: expression
    normative_status: preferred
    designation: paraxial ray
  definition: a light ray that is close to and nearly parallel with the fibre axis
  language_code: eng
  notes:
  - For purposes of computation, the angle, stem:[θ], between the ray and the optical
    axis is small enough for sin stem:[θ] or tan stem:[θ] to be replaced by stem:[θ]
    (radians).
