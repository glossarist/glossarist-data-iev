fra:
  id: 901-06-12
  terms:
  - type: expression
    normative_status: preferred
    designation: application directe d'une norme internationale
    gender: f
    plurality: singular
  definition: application d'une {{norme internationale, IEV:901-02-03}} indépendamment
    de la {{reprise, IEV:901-06-10}} de ladite norme internationale dans un autre
    {{document normatif, IEV:901-02-01}}
  language_code: fra
  notes:
  - 'Un document normatif peut être mis en œuvre de deux façons: soit par mise en
    application dans la production, le commerce, etc., soit par reprise, totale ou
    partielle, dans un autre document normatif. Il peut être alors mis en application
    par le biais de ce second document ou repris de nouveau dans un autre document
    normatif.'
  examples: []
  entry_status: Standard
  authoritative_source:
  - ref: ISO/IEC Guide 2:2004
    clause: 10.2.1
    link: https://www.iso.org/standard/39976.html
    relationship:
