eng:
  id: 845-21-043
  terms:
  - type: expression
    normative_status: preferred
    designation: photon number
  - type: expression
    designation: number of photons
  - type: symbol
    designation: stem:[N]~p~
    international: true
  definition: |-
    quotient of radiant energy and photon energy

    stem:[N_p = ((Q_e))/((h nu))]

    where stem:[Q]~e~ is radiant energy, stem:[h] is the Planck constant, and stem:[ν] is the {{frequency, IEV:103-06-02}} of the corresponding electromagnetic wave
  language_code: eng
  notes:
  - |-
    Photon number can also be expressed by the time integral of the photon flux, stem:[Φ]~p~, over a given duration, Δstem:[t]:

    stem:[N_p = int_((Delta t)) Phi_p d t]
  - The photon number has unit one.
  - This entry was numbered 845-01-29 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
