eng:
  id: 395-07-73
  terms:
  - type: expression
    normative_status: preferred
    designation: nuclear safety
  definition: achievement of proper operating conditions, prevention of accidents
    or mitigation of accident consequences, resulting in protection of workers, the
    public and the environment from radiation hazards.
  language_code: eng
  notes:
  - This entry was numbered 393-18-02 in IEC 60050-393:2003.
