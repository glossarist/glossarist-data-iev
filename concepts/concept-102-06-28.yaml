eng:
  id: 102-06-28
  terms:
  - type: expression
    normative_status: preferred
    designation: unitary matrix
  definition: regular square matrix *stem:[A]* with complex elements for which the
    inverse *stem:[A]*^−1^ is equal to the Hermitian conjugate matrix *stem:[A]*^H^
  language_code: eng
  notes:
  - |-
    For a unitary matrix with elements stem:[Aij]:

    stem:[underset(i)( sum ) A_((i j)) A_(i k)^( * ) = delta_((j k))] and stem:[underset(k)( sum ) A_((i k)) A_(j k)^( * ) = delta_((i j))]

    where stem:[delta_((j k))] and stem:[delta_((i j))] are Kronecker deltas.
  - Any orthogonal matrix with real elements is a unitary matrix.
  examples: []
  entry_status: Standard
  date_accepted: '2008-08-01T00:00:00+00:00'
  date_amended: '2008-08-01T00:00:00+00:00'
  review_date: '2008-08-01T00:00:00+00:00'
  review_decision_date: '2008-08-01T00:00:00+00:00'
  review_decision_event: published
