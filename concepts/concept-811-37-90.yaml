eng:
  id: 811-37-90
  terms:
  - type: expression
    normative_status: preferred
    usage_info: in a train communication network
    designation: repeater
  definition: connection at the physical layer between bus segments, providing an
    extension of the bus beyond the limits permitted by passive means
  language_code: eng
  notes:
  - The connected segments operate at the same speed and with the same protocol. The
    delay introduced by a repeater is in the order of one bit duration.
  examples: []
  entry_status: Standard
  authoritative_source:
