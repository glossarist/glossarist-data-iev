eng:
  id: 845-25-066
  terms:
  - type: expression
    normative_status: preferred
    usage_info: of a detector whose output varies exponentially with time
    designation: time constant
  definition: time required for the output to change, after a step variation from
    one steady input to another steady input, by the fraction (1 − 1/e) of its total
    change in value, where the total change in value is the difference between the
    initial value and the final (asymptotic) value
  language_code: eng
  notes:
  - The time constant is expressed in seconds (s).
  - This entry was numbered 845-05-59 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-25-066
  terms:
  - type: expression
    normative_status: preferred
    usage_info: d'un récepteur dont la réponse varie exponentiellement avec le temps
    designation: constante de temps
    gender: f
    plurality: singular
  definition: durée exigée pour que la réponse se modifie, à la suite du passage brusque
    d'une excitation stationnaire à une autre, de la fraction (1 − 1/e) de la variation
    totale de sa valeur, lorsque cette variation est la différence entre la valeur
    initiale et la valeur (asymptote) finale
  language_code: fra
  notes:
  - La constante de temps est exprimée en secondes (s).
  - Cet article était numéroté 845-05-59 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
