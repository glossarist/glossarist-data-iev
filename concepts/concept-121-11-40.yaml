fra:
  id: 121-11-40
  terms:
  - type: expression
    normative_status: preferred
    designation: induction électrique
    gender: f
    plurality: singular
  - type: expression
    normative_status: preferred
    designation: déplacement
    gender: m
    plurality: singular
  definition: |-
    grandeur vectorielle obtenue en un point donné en ajoutant la polarisation électrique *stem:[P]* au produit du champ électrique  *stem:[E]* par la constante électrique stem:[ε]~0~:

    *stem:[D]* = stem:[ε]~0~ *stem:[E]* + *stem:[P]*
  language_code: fra
  notes:
  - |-
    Dans le vide, l'induction électrique est en tout point égale au produit du champ électrique par la constante électrique:

    *stem:[D]* = stem:[ε]~0~ *stem:[E]*
  - |-
    La divergence de l'induction électrique est égale à la charge électrique volumique stem:[ρ]:

    div *stem:[D]* = stem:[ρ]
  examples: []
