eng:
  id: 351-46-02
  terms:
  - type: expression
    normative_status: preferred
    designation: control settling time
  - type: symbol
    designation: stem:[T]~cs~
    international: true
  definition: |-
    duration of the time interval after a stepwise change of the reference variable or a stepwise change of a disturbance variable beginning, when the controlled variable for the first time leaves a specified tolerance band, placed around the desired value of the controlled variable, and ending, when the controlled variable for the first time returns into this tolerance band and remains within it

    SEE: Figure 11.
  language_code: eng
  notes:
  - This entry was numbered 351-25-02 in IEC 60050-351:2006.
