    gender: m
    plurality: singular
  - type: expression
    normative_status: preferred
    designation: TEL
    gender: m
    plurality: singular
  definition: |-
    quotient de dstem:[EΔ] par dstem:[l], pour un matériau et pour des particules chargées, où dstem:[EΔ] est l’énergie perdue par une particule pendant la traversée d’une distance dstem:[l] due à des collisions avec des électrons correspondant à un transfert d’énergie inférieur à une valeur spécifiée

    stem:[LΔ] = (dstem:[EΔ]/dstem:[l])
  language_code: fra
  notes:
  - Cette grandeur s'exprime en électronvolts par mètre (eV/m) ou en Joules par mètre
    (J m^−1^).
  - Cet article était numéroté 393-14-53 dans la CEI 60050-393:2003.
