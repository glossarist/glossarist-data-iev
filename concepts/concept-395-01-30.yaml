eng:
  id: 395-01-30
  terms:
  - type: expression
    normative_status: preferred
    designation: linear energy transfer
  - type: expression
    designation: linear energy transfer coefficient
  - type: expression
    designation: LET
  - type: symbol
    designation: stem:[LΔ]
    international: true
  definition: |-
    quotient of dstem:[EΔ] by dstem:[l], where dstem:[EΔ] is the energy lost by a charged particle due to electronic collisions in traversing a distance dstem:[l,] minus the sum of the kinetic energies of all the electrons released with kinetic energies in excess of threshold energy delta

    stem:[LΔ] = (dstem:[EΔ]/dstem:[l])
  language_code: eng
  notes:
  - This quantity is expressed in joules per metre.
  - This entry was numbered 393-14-53 in IEC 60050-393:2003.
  examples: []
