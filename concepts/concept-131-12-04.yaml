fra:
  id: 131-12-04
  terms:
  - type: expression
    normative_status: preferred
    designation: résistance
    gender: f
    plurality: singular
  definition: |-
    pour un bipôle résistif, élémentaire ou non, de bornes A et B, quotient de la tension électrique ({{131-11-56, IEV:131-11-56}}) stem:[u]~AB~ entre les bornes par le courant électrique stem:[i] dans le bipôle

    stem:[R = ((u_((AB))))/(i)]

    où le courant est positif si le sens du courant est de A vers B et négatif si son sens est de B vers A
  language_code: fra
  notes:
  - Une résistance ne peut pas être négative.
  - Le terme «résistance» désigne aussi elliptiquement la résistance en courant alternatif
    ({{131-12-45, IEV:131-12-45}}).
  - En français, le terme «résistance» désigne aussi un dispositif, en anglais «resistor»
    (voir {{151-13-19, IEV:151-13-19}}).
  - L’unité SI cohérente de résistance est l’ohm, Ω.
  examples: []
  entry_status: Standard
  review_decision_event: published
