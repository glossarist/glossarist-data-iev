eng:
  id: 131-12-04
  terms:
  - type: expression
    normative_status: preferred
    designation: resistance
  - type: symbol
    designation: stem:[R]
    international: true
  definition: |-
    for a resistive two-terminal element or two-terminal circuit with terminals A and B, quotient of the voltage ({{131-11-56, IEV:131-11-56}}) stem:[u]~AB~ between the terminals by the electric current stem:[i] in the element or circuit

    stem:[R = ((u_((AB))))/(i)]

    where the electric current is taken positive if its direction is from A to B and negative if its direction is from B to A
  language_code: eng
  notes:
  - A resistance cannot be negative.
  - The term "resistance" is also a short term for “resistance to alternating current”
    ({{131-12-45, IEV:131-12-45}}).
  - In French, the term "résistance" also denotes a device, in English "resistor"
    (see {{151-13-19, IEV:151-13-19}}).
  - The coherent SI unit of resistance is ohm, Ω.
  examples: []
  entry_status: Standard
  date_accepted: '2013-08-01T00:00:00+00:00'
