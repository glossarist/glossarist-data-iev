  terms:
  - type: expression
    normative_status: preferred
    designation: interchannel interference
  definition: |-
    in a given transmission channel, the interference resulting from signals in one or more other channels

    Examples of interchannel interference: crosstalk in telephony; cross-view and cross-colour in television.
