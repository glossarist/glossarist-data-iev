eng:
  id: 102-02-11
  terms:
  - type: expression
    normative_status: preferred
    designation: real part
  definition: the part stem:[a] of a complex number stem:[c = a + j b], where stem:[a]
    and stem:[b] are real numbers
  language_code: eng
  notes:
  - The real part of a complex number stem:[c] is denoted by stem:[Re c] or sometimes
    by stem:[c]′ in electrotechnology.
  - The concept of real part may be applied to complex scalar, vector or tensor quantities
    or to matrices of complex elements.
