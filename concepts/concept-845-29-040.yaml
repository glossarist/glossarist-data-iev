  terms:
  - type: expression
    normative_status: preferred
    usage_info: of a light source
    designation: mean spherical luminous intensity
  - type: symbol
    designation: |-
      stem:[I]~v,s~
      stem:[I]~s~
    international: true
  definition: average value of the luminous intensity of the light source in all directions,
    equal to the quotient of its luminous flux and the solid angle 4π sr
  language_code: eng
  notes:
  - The mean spherical luminous intensity is expressed in candela (cd).
  - This entry was numbered 845-09-27 in IEC 60050-845:1987.
