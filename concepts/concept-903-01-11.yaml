eng:
  id: 903-01-11
  terms:
  - type: expression
    normative_status: preferred
    designation: residual risk
  definition: |-
    {{risk, IEV:903-01-07}} remaining after {{protective measures, IEV:903-01-17}} have been taken

    <simg acos-guide116_2010_f1_en>

    NOTE Sometimes it is possible that tolerable risk is already achieved by applying step 1 or steps 1 and 2.

    *Figure 1 – Principle of safety integration*</simg>
  language_code: eng
  notes:
  - "IEC Guide 116 distinguishes:\r\n\r\n* the residual risk after protective measures
    have been taken by the designer;\r\n* the residual risk remaining after all protective
    measures have been implemented by the user.\r\n\n\n[ISO/IEC Guide 51:1999, definition
    3.9, modified]"
  examples: []
  entry_status: Standard
  authoritative_source:
  - ref: IEC Guide 116:2010
    clause: '3.12'
