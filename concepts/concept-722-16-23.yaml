eng:
  id: 722-16-23
  terms:
  - type: expression
    normative_status: preferred
    designation: reference system for the determination of AEN
  - type: expression
    designation: SRAEN
  definition: |-
    a fundamental reference system of the CCITT comprising:

    the reference apparatus for the determination of transmission performance ratings or ARAEN;

    a band-pass filter cutting off at 300 and 3400 Hz;

    a device allowing specified electrical background noise to be injected at the input of the receiving system of the ARAEN
  language_code: eng
  notes:
  - The SRAEN is described in the CCITT Recommendation P44 from the Volume V of the
    Yellow Book, 1981.
  examples: []
  entry_status: Standard
  date_accepted: '1992-11-01T00:00:00+00:00'
