eng:
  id: 485-06-20
  terms:
  - type: expression
    normative_status: preferred
    designation: dead-end flow
  definition: "{{single cell, IEV:485-05-02}} or {{fuel cell stack, IEV:485-06-01}}
    configuration, characterized by the absence of a fuel outlet port, an oxidant
    outlet port or both"
  language_code: eng
  notes:
  - In dead-end operation, almost 100 % of the reactant fed to the cell or fuel cell
    stack is consumed. A small fraction of reactants can be vented out from {{fuel
    cell power systems, IEV:485-09-01}}, which requires periodic purging of the {{electrode,
    IEV:485-02-01}} compartment(s).
