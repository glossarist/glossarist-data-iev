  definition: |-
    moyenne par {{caractère, IEV:702-05-10}} de la {{transinformation moyenne, IEV:171-07-27}}, étendue à tous les messages issus d'une {{source de messages stationnaire, IEV:171-07-09}}

    stem:[T^( ' ) = underset((m -&gt; oo))((lim)) ((T_m))/(m)]

