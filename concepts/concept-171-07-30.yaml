eng:
  id: 171-07-30
  terms:
  - type: expression
    normative_status: preferred
    designation: character mean transinformation content
  - type: symbol
    designation: stem:[T]^′^
    international: true
  definition: |-
    mean per {{character, IEV:702-05-10}} of the {{mean transinformation content, IEV:171-07-27}} for all possible messages from a {{stationary message source, IEV:171-07-09}}

    stem:[T^( ' ) = underset((m -&gt; oo))((lim)) ((T_m))/(m)]

    where stem:[Tm] is the mean transinformation content for all pairs of corresponding input and output sequences of stem:[m] characters each
  language_code: eng
  notes:
  - The character mean transinformation content can be expressed in a unit such as
    the shannon per character.
  examples: []
  entry_status: Standard
  authoritative_source:
  - ref: IEC 80000-13:2008
    clause: 13-39
