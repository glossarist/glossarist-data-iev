  terms:
  - type: expression
    normative_status: preferred
    designation: weight span
  definition: the horizontal distance between the lowest points of a conductor on
    either side of a support
  language_code: eng
  notes:
  - In steeply sloping terrain, the lowest points of the catenary curves of both adjacent
    spans can be on the same side of the support.
