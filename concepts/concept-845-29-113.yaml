eng:
  id: 845-29-113
  terms:
  - type: expression
    normative_status: preferred
    designation: CIE standard general sky
  definition: set of 15 sky luminance distributions which model the sky from heavily
    overcast sky to cloudless sky
  language_code: eng
  notes:
  - The relative luminance distributions are described in ISO 15469/CIE S 011, _Spatial
    distribution of daylight – CIE standard general sky_. The CIE standard clear sky
    is incorporated as a particular case, and the CIE standard overcast sky is added
    as a separate formula.
  examples: []
  entry_status: Standard
