fra:
  id: 131-14-21
  terms:
  - type: expression
    normative_status: preferred
    designation: en court-circuit
  definition: qualifie une immittance d'entrée, de sortie ou de transfert lorsque
    les autres accès ont des impédances de fermeture nulles, ou un rapport de transfert
    direct ou inverse lorsque l'accès correspondant au numérateur a une impédance
    de fermeture nulle
  language_code: fra
  notes:
  - Des exemples dans la CEI 60027-2 sont l’admittance d’entrée en court-circuit,
    l’impédance d’entrée en court-circuit et le rapport de transfert inverse du courant
    en court-circuit.
