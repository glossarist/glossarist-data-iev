  definition: "difference between two colour stimuli, defined as the Euclidean distance
    between the points representing them in the <a href=\"IEV845-23-076\">CIE 1976
    L*a*b* colour space</a> and calculated as:\r\n<ul style=\"list-style-type:none;\">*
    stem:[Delta E_(ab)^* = ( Delta L_()^* )^2 + ( Delta a_()^* )^2 + ( Delta b_()^*
    )^2^(1 // 2)]"
  language_code: eng
  notes:
  - See also CIE 15, stem:[Colorimetry].
  - 'See also ISO/CIE 11664-4, _Colorimetry – Part 4: CIE 1976 L*a*b* Colour Space_.'
  - This entry was numbered 845-03-57 in IEC 60050-845:1987.
