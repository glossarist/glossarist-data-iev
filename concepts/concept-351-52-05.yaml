eng:
  id: 351-52-05
  terms:
  - type: expression
    normative_status: preferred
    designation: binary-logic element
  definition: combinatorial circuit which performs a Boolean operation in one or two
    stages
  language_code: eng
  notes:
  - |-
    Examples of binary-logic elements are:

    <table>
    <tr>
    <td>NOT element</td>
    <td>complementation;</td>
    </tr>
    <tr>
    <td>AND element</td>
    <td>logical product;</td>
    </tr>
    <tr>
    <td>OR element</td>
    <td>logical sum;</td>
    </tr>
    <tr>
    <td>NAND element</td>
    <td>complemented logical product;</td>
    </tr>
    <tr>
    <td>NOR element</td>
    <td>complemented logical sum;</td>
    </tr>
    <tr>
    <td>XOR element</td>
    <td>exclusive OR.</td>
    </tr>
    </table>
  - This entry was numbered 351-29-13 in IEC 60050-351:2006.
