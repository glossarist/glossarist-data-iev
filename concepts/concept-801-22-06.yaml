eng:
  id: 801-22-06
  terms:
  - type: expression
    normative_status: preferred
    designation: sound intensity level
  - type: expression
    designation: sound energy flux density level
  definition: logarithm of the ratio of a given intensity of sound in a stated direction
    to the reference sound intensity. Such intensity level in decibels is ten times
    the logarithm to the base ten of the ratio
  language_code: eng
  notes:
  - Unless otherwise specified, the reference sound intensity is 1 pW/m^2^.
