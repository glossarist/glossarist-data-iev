eng:
  id: 131-12-20
  terms:
  - type: expression
    normative_status: preferred
    designation: differential inductance
  - type: symbol
    designation: stem:[L]~d~
    international: true
  definition: |-
    for an inductive two-terminal element with terminals A and B, derivative of the linked flux stem:[Ψ] between the terminals with respect to the electric current stem:[i] in the element:

    stem:[L_d = ((d Psi))/((d i))]

    where the sign of the linked flux is determined by taking the voltage, in the time integral defining it, as the difference of the electric potentials at A and B, and where the current is taken as positive if its direction is from A to B and negative in the opposite case
  language_code: eng
  notes:
  - For an ideal inductor, the differential inductance stem:[L]~d~ is equal to its
    inductance stem:[L].
  examples: []
  entry_status: Standard
  date_accepted: '2008-09-01T00:00:00+00:00'
  date_amended: '2008-09-01T00:00:00+00:00'
  review_date: '2008-09-01T00:00:00+00:00'
