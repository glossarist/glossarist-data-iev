eng:
  id: 881-04-46
  terms:
  - type: expression
    normative_status: preferred
    designation: radioactive half-life
  - type: symbol
    designation: stem:[T_(((1)/(2)))]
    international: true
  definition: for a single radioactive decay process, the time stem:[( T_(((1)/(2)))
    )] in which the activity of the radionuclide is reduced to half of its initial
    value by that process
  language_code: eng
  notes:
  - |-
    The radioactive half-life is related to the decay constant by:

    stem:[T_(((1)/(2))) = ((ln 2))/(lambda) ≃ ((0,693))/(lambda)]

    stem:[λ] = decay constant
  examples: []
