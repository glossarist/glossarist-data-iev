fra:
  id: 395-01-11
  terms:
  - type: expression
    normative_status: preferred
    designation: constante de désintégration
    gender: f
    plurality: singular
  definition: |-
    quotient du nombre dstem:[N] de désintégrations d’un {{noyau atomique, IEV:113-05-21}}, pendant un court intervalle de temps, par la durée dstem:[t] de cet intervalle et par le nombre stem:[N] de noyaux existants au même instant stem:[t]

    stem:[lambda = - (1)/(N) xx ((d N))/((d t))]
  language_code: fra
  notes:
  - Cette grandeur s'exprime en secondes à la puissance moins un (s^−1^).
  - La constante de désintégration est la probabilité totale de décroissance radioactive
    (désintégration ou transition nucléaire).
  - Cet article était numéroté 393-14-18 dans la CEI 60050-393:2003.
  examples: []
  entry_status: Standard
  authoritative_source:
