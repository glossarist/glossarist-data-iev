eng:
  id: 102-06-22
  terms:
  - type: expression
    normative_status: preferred
    designation: norm of a matrix
  definition: |-
    for a square matrix *stem:[A]* of order stem:[n] with the real or complex elements stem:[Aij], non-negative number

    stem:[‖ A ‖ = sqrt(tr ( A A^H )) = sqrt(sum_((i , j = 1))^n | A_((i j)) |^2)]
  language_code: eng
  notes:
  - The described norm is the "Euclidean norm" or the "Hermitian norm" for the real
    and the complex case, respectively. Several other norms of a matrix can be defined.
    Any norm of a matrix has properties similar to the properties of the magnitude
    of a vector (see Note 1 to entry in {{IEV 102-03-23, IEV:102-03-23}}).
  examples: []
  entry_status: Standard
  date_accepted: '2008-08-01T00:00:00+00:00'
  date_amended: '2008-08-01T00:00:00+00:00'
  review_date: '2008-08-01T00:00:00+00:00'
  review_decision_date: '2008-08-01T00:00:00+00:00'
  review_decision_event: published
