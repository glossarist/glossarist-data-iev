  terms:
  - type: expression
    normative_status: preferred
    designation: measurement principle
  - type: expression
    normative_status: preferred
    designation: principle of measurement
  definition: phenomenon serving as the basis of a measurement
  language_code: eng
  notes:
  - "The phenomenon can be of a physical, chemical, or biological nature.\r\nExamples:\n\n•
    Thermoelectric effect applied to the measurement of temperature.\n\n• Energy absorption
    applied to the measurement of amount-of-substance concentration.\n\n• Hall effect
    applied to the measurement of magnetic flux density."
