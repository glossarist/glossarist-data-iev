eng:
  id: 845-30-036
  terms:
  - type: expression
    normative_status: preferred
    designation: shielding angle
  definition: complementary angle of the cut-off angle
  language_code: eng
  notes:
  - The shielding angle is the angle measured from the horizontal, down to which the
    light source(s) is (are) screened by the luminaire.
  - The shielding angle is expressed in radian (rad) or degree (°).
  - This entry was numbered 845-10-31 in IEC 60050-845:1987.
