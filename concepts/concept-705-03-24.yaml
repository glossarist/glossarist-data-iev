  language_code: fra
  notes:
  - |-
    Dans le Système International d'unités (SI) l'impédance intrinsèque du vide est égale à:

    stem:[Z]~0~ = stem:[c]~0~ · 4π × 10^−7^ H/m

    stem:[c]~0~ étant la vitesse de propagation des ondes électromagnétiques dans le vide; stem:[Z]~0~ est approximativement égal à 120π Ω ou 377 Ω.
