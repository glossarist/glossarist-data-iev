eng:
  id: 705-03-24
  terms:
  - type: expression
    normative_status: preferred
    designation: characteristic impedance of vacuum
  definition: |-
    the square root stem:[Z]~0~ of the magnetic constant stem:[μ]~0~ divided by the electric constant stem:[ε]~0~

    stem:[Z_0 = sqrt(((mu_0))/((epsilon_0)))]
  language_code: eng
  notes:
  - |-
    In the International System of units (SI), the characteristic impedance of vacuum is equal to:

    stem:[Z]~0~ = stem:[c]~0~ · 4π × 10^−7^ H/m

    stem:[c]~0~ being the velocity of electromagnetic waves in vacuum; stem:[Z]~0~ is approximately equal to 120π Ω or 377 Ω.
  examples: []
  entry_status: Standard
  date_accepted: '1995-09-01T00:00:00+00:00'
