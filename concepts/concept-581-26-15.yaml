eng:
  id: 581-26-15
  terms:
  - type: expression
    normative_status: preferred
    designation: rack-and-panel connector
  definition: one of two mating fixed connectors intended to provide a connection
    between a unit and its mounting rack
  language_code: eng
  notes:
  - A rack-and-panel connector is usually provided with an alignment device to ensure
    correct mating. It normally has no coupling device and is mated by the movement
    between the unit and the rack (does not apply to the printed boards).
  examples: []
