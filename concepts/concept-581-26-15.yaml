fra:
  id: 581-26-15
  terms:
  - type: expression
    normative_status: preferred
    designation: connecteur de baie et tiroir
    gender: m
    plurality: singular
  definition: l’un des deux connecteurs fixes destinés à établir une connexion entre
    un ensemble et son tiroir
  language_code: fra
  notes:
  - Un connecteur de baie et tiroir est habituellement muni d’un dispositif d’alignement
    qui permet un accouplement correct. Il n’a normalement aucun dispositif d’accouplement,
    celui-ci étant obtenu par le déplacement du tiroir dans la baie (ne s’applique
    pas aux cartes imprimées).
  examples: []
