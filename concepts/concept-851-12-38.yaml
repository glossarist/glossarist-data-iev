fra:
  id: 851-12-38
  terms:
  - type: expression
    normative_status: preferred
    designation: courants maximaux en court circuit lors du soudage
    gender: m
    plurality: singular
  definition: |-
    pour la tension assignée d'alimentation, valeurs efficaces des courants obtenus au réglage le plus élevé de la tension secondaire, les électrodes étant court-circuitées dans les conditions d'essai spécifiées et la machine étant réglée pour obtenir successivement:

    a) une impédance minimale correspondant à l'écartement minimal et à la longueur minimale des bras;

    b) une impédance maximale correspondant à l'écartement maximal et à la longueur maximale des bras.
