fra:
  id: 731-03-84
  terms:
  - type: expression
    normative_status: preferred
    designation: angle d'admission
    gender: m
    plurality: singular
  definition: demi-angle au sommet du cône qui contient la puissance rayonnante susceptible
    de produire des modes liés à l'entrée d'une fibre optique
  language_code: fra
  notes:
  - |-
    L'angle d'admission dépend de la position sur la face d'entrée de la fibre si l'indice de réfraction varie radialement dans le coeur. Il est alors égal à:

    stem:[arcsin n^2 ( r ) - n_2^2^(1 // 2)]

    où stem:[n](stem:[r]) est l'indice à la distance stem:[r] de l'axe de la fibre et stem:[n]~2~ l'indice minimal dans la gaine.
  - La puissance rayonnante extérieure au cône qui définit l'angle d'admission peut
    produire des modes de fuite.
  examples: []
  entry_status: Standard
