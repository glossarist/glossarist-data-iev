eng:
  id: 731-03-84
  terms:
  - type: expression
    normative_status: preferred
    designation: acceptance angle
  definition: half the vertex angle of that cone within which optical power may be
    coupled into bound modes of an optical fibre
  language_code: eng
  notes:
  - |-
    Acceptance angle is a function of position on the entrance face of the core when the refractive index is a function of radius in the core. In that case, it is:

    stem:[arcsin n^2 ( r ) - n_2^2^(1 // 2)]

    where stem:[n] (stem:[r]) is the refractive index and stem:[n]~2~ is the minimum refractive index of the cladding.
  - Power may be coupled into leaky modes at angles exceeding the acceptance angle.
  examples: []
  entry_status: Standard
  date_accepted: '1991-10-01T00:00:00+00:00'
  date_amended: '1991-10-01T00:00:00+00:00'
  review_date: '1991-10-01T00:00:00+00:00'
  review_decision_date: '1991-10-01T00:00:00+00:00'
  review_decision_event: published
