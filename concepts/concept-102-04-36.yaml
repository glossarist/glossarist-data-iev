  terms:
  - type: expression
    normative_status: preferred
    usage_info: of a surface
    designation: orientation
  definition: for a surface having a tangent plane at any point, property determined
    by the choice, continuously from point to point, of one of the two normal unit
    vectors at each point
  language_code: eng
  notes:
