eng:
  id: 702-07-25
  terms:
  - type: expression
    normative_status: preferred
    designation: return loss
  definition: the modulus of the reciprocal of the reflection factor, generally expressed
    in decibels
  language_code: eng
  notes:
  - |-
    When impedances can be defined, the return loss is given by the formula:

    stem:[- 20 lg | r | = 20 lg | ((underset(_)(Z) - underset(_)(Z)^( ' )))/((underset(_)(Z) + underset(_)(Z)^( ' ))) |]

    where stem:[Z] is the characteristic impedance of a transmission line ahead of a discontinuity, or the impedance of a source, and stem:[Z]′ is the impedance after the discontinuity or the load impedance seen from the junction between the source and the load.
  examples: []
  entry_status: Standard
  date_accepted: '1992-03-01T00:00:00+00:00'
