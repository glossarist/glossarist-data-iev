eng:
  id: 705-07-87
  terms:
  - type: expression
    normative_status: preferred
    designation: twelve-month running-mean sunspot number
  - type: symbol
    designation: stem:[R]~12~
    international: true
  definition: |-
    the mean value of the international relative sunspot number for the month n obtained by the following equation:

    stem:[R_((12)) = (1)/((12)) [ ((R_((n - 6)) + R_((n + 6))))/(2) + underset(k)( sum ) R_k ]]

    for stem:[k] = stem:[n] − 5, stem:[n] − 4, ..., stem:[n], ..., stem:[n] + 5

    where stem:[R]~stem:[k]~ is the mean international relative sunspot number for the stem:[k]th month
  language_code: eng
  notes: []
  examples: []
  entry_status: Standard
  date_accepted: '1995-09-01T00:00:00+00:00'
