eng:
  id: 845-21-046
  terms:
  - type: expression
    normative_status: preferred
    designation: photon intensity
  - type: symbol
    designation: |-
      stem:[I]~p~
      stem:[I]
    international: true
  definition: |-
    density of photon flux with respect to solid angle in a specified direction

    stem:[I_p = ((d Phi_p))/((d omega))]

    where stem:[Φ]~p~ is the photon flux emitted in the given direction, and stem:[Ω] is the solid angle containing that direction
  language_code: eng
  notes:
  - |-
    The distribution of the photon intensities as a function of the direction of emission, e.g. given by the polar angles (stem:[ϑ], stem:[φ]), is used to determine the photon flux, stem:[Φ]~p~, within a certain solid angle, stem:[Ω], of a source:

    stem:[Phi_p = underset(omega)( ∬ ) I_p ( vartheta , phi ) sin vartheta \ d phi \ d vartheta].
  - The corresponding radiometric quantity is "radiant intensity". The corresponding
    photometric quantity is "luminous intensity".
  - The photon intensity is expressed in second to the power minus one times steradian
    to the power minus one (s^−1^·sr^−1^).
  - This entry was numbered 845-01-32 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-21-046
  terms:
  - type: expression
    normative_status: preferred
    designation: intensité photonique
    gender: f
    plurality: singular
  definition: |-
    densité du flux photonique par rapport à un angle solide dans une direction spécifiée

    stem:[I_p = ((d Phi_p))/((d omega))]

    où stem:[Φ]~p~ est le flux photonique émis dans la direction donnée, et stem:[Ω] est l'angle solide contenant cette direction
  language_code: fra
  notes:
  - |-
    La répartition des intensités photoniques en fonction de la direction d'émission, par exemple, donnée par les angles polaires (stem:[ϑ], stem:[φ]), permet de déterminer le flux photonique stem:[Φ]~v~, dans un certain angle solide, stem:[Ω], d'une source:

    stem:[Phi_p = underset(omega)( ∬ ) I_p ( vartheta , phi ) sin vartheta \ d phi \ d vartheta].
  - La grandeur radiométrique correspondante est l'"intensité énergétique". La grandeur
    photométrique correspondante est l'"intensité lumineuse".
  - L'intensité photonique est exprimée en seconde à la puissance moins un multipliée
    par le stéradian à la puissance moins un (s^−1^·sr^−1^).
  - Cet article était numéroté 845-01-32 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
