eng:
  id: 121-11-24
  terms:
  - type: expression
    normative_status: preferred
    designation: linked flux
  - type: symbol
    designation: stem:[Ψ]
    international: true
  definition: |-
    scalar line integral of a magnetic vector potential *stem:[A]* along a curve C:

    stem:[Psi = underset(C)( int ) A * d r]

    where d*stem:[r]* is the vector line element
  language_code: eng
  notes:
  - |-
    For a closed curve C, the linked flux is equal to the magnetic flux through any surface S bounded by the curve:

    stem:[underset(C)( oint ) A * d r = underset(S)( int ) B * e_n d A]

    where *stem:[B]* is the magnetic flux density and *stem:[e]*~n~dstem:[A] the vector surface element.
  - For a coil with N turns, the linked flux is approximately equal to stem:[NΦ] where
    stem:[Φ] is the magnetic flux through any surface bounded by one turn.
  examples: []
  entry_status: Standard
  date_accepted: '1998-08-01T00:00:00+00:00'
  date_amended: '1998-08-01T00:00:00+00:00'
  review_date: '1998-08-01T00:00:00+00:00'
  review_decision_date: '1998-08-01T00:00:00+00:00'
  review_decision_event: published
