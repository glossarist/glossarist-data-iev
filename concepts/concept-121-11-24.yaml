fra:
  id: 121-11-24
  terms:
  - type: expression
    normative_status: preferred
    designation: flux totalisé
    gender: m
    plurality: singular
  definition: |-
    circulation d’un potentiel vecteur magnétique *stem:[A]* le long d’une courbe C:

    stem:[Psi = underset(C)( int ) A * d r]

    où d*stem:[r]* est l’élément vectoriel d’arc
  language_code: fra
  notes:
  - |-
    Pour une courbe fermée C, le flux totalisé est égal au flux magnétique à travers toute surface S délimitée par la courbe:

    stem:[underset(C)( oint ) A * d r = underset(S)( int ) B * e_n d A]

    où *stem:[B]* est l’induction magnétique et *stem:[e]*~n~dstem:[A] l’élément vectoriel de surface.
  - Pour une bobine de stem:[N] tours, le flux totalisé est approximativement égal
    à stem:[NΦ] où stem:[Φ] est le flux magnétique à travers toute surface délimitée
    par un tour.
  examples: []
  entry_status: Standard
  date_accepted: '1998-08-01T00:00:00+00:00'
