eng:
  id: 845-29-106
  terms:
  - type: expression
    normative_status: preferred
    usage_info: of the atmosphere
    designation: optical thickness
  - type: expression
    usage_info: of the atmosphere
    designation: optical depth
  - type: symbol
    designation: stem:[δ](stem:[ε])
    international: true
  definition: |-
    stem:[delta ( epsilon ) = - ln ((Phi^( ' )_e))/((Phi_e))]

    where stem:[Φ]~e~ is the radiant flux of a collimated beam entering the upper limit layers of the atmosphere at an angle stem:[ε] to the vertical, and stem:[Phi^( ' )_e] is the attenuated radiant flux of that beam reaching the surface of the Earth
  language_code: eng
  notes:
  - See also "<a href="IEV845-24-087">spectral optical thickness</a>".
  - The optical thickness has unit one.
  - This entry was numbered 845-09-86 in IEC 60050-845:1987.
