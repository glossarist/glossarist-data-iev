  terms:
  - type: expression
    normative_status: preferred
    designation: magnetic loss angle
  definition: |-
    for a sinusoidal wave, the angle δ~M~ defined by the equation:

    stem:[delta_M = arctan ((mu_r^( ″ )))/((mu_r^( ' )))]

    where stem:[mu_r^( ' )] and stem:[mu_r^( ″ )] are the negative imaginary part and the real part, respectively, of the relative complex permeability stem:[μ]~r~
