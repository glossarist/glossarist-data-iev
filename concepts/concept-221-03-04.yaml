eng:
  id: 221-03-04
  terms:
  - type: expression
    normative_status: preferred
    designation: scalar permeability for circularly polarized fields
  - type: symbol
    designation: stem:[μ]~+~,  stem:[μ]~−~
    international: true
  definition: |-
    of a material saturated by a magnetostatic field, the complex permeability when it is subjected to an electromagnetic wave having a circularly polarized stem:[vec H] field component in the plane perpendicular to the magnetostatic field strength:

    stem:[μ]~+~ = stem:[μ]~r~ + stem:[κ]~r~

    stem:[μ]~−~ = stem:[μ]~r~ − stem:[κ]~r~

    where stem:[μ]~r~ and stem:[κ]~r~ are components of Polder's tensor permeability
  language_code: eng
  notes:
  - The subscript of stem:[µ] corresponds to the sign in the mathematical expression;
    stem:[μ]~+~ is applicable where the stem:[vec H] field rotates counterclockwise
    as a function of time when seen in the direction of the applied magnetostatic
    field; stem:[μ]~−~ is applicable to the reverse rotation.
  examples: []
  entry_status: Standard
  date_accepted: '1990-10-01T00:00:00+00:00'
  date_amended: '1990-10-01T00:00:00+00:00'
  review_date: '1990-10-01T00:00:00+00:00'
  review_decision_date: '1990-10-01T00:00:00+00:00'
  review_decision_event: published
