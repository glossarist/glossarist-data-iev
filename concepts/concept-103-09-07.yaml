eng:
  id: 103-09-07
  terms:
  - type: expression
    normative_status: preferred
    designation: autocorrelation function
  definition: ". for a deterministic function, correlation function of the function
    and a time-delayed replica \n.  for a stationary random function, mathematical
    expectation of the product of the function and a time-delayed replica:\n\nstem:[C
    ( t ) = E f ( tau ) f ( t + tau )]"
  language_code: eng
  notes:
  - The autocorrelation function of a deterministic function or a stationary random
    function is the inverse Fourier transform of its power spectral density.
  - |-
    When a stationary random function can be considered as ergodic, its autocorrelation function can be calculated from a particular sample:

    stem:[C ( t ) = underset((T -&gt; oo))((lim)) (1)/((2 T)) int_( - T)^( + T) f ( tau ) f ( t + tau ) d tau]
  examples: []
  entry_status: Standard
  date_accepted: '2009-12-01T00:00:00+00:00'
  date_amended: '2009-12-01T00:00:00+00:00'
  review_date: '2009-12-01T00:00:00+00:00'
  review_decision_date: '2009-12-01T00:00:00+00:00'
  review_decision_event: published
