  terms:
  - type: expression
    normative_status: preferred
    designation: lattice filter
  definition: |-
    filter having at least four SAW resonators connected in series to form a mesh, where two non-adjacent junction points are used as input terminals, while the remaining two junction points are used as output terminals (bridge circuit)

    <simg>

    *Figure 13 – Configuration of a lattice filter*</simg>
  language_code: eng
  notes:
  - A lattice filter can be used for balanced circuits.
