fra:
  id: 351-50-20
  terms:
  - type: expression
    normative_status: preferred
    designation: élément à multiposition
    gender: m
    plurality: singular
  definition: élément dont la variable de sortie peut prendre toutes les valeurs dans
    un ensemble de valeurs discrètes
  language_code: fra
  notes:
  - La variation de la variable de sortie peut se produire à une paire de valeurs
    de commutation qui est à des valeurs différentes de la variable d’entrée en fonction
    de la direction de la variation; la différence de ces valeurs est appelée recouvrement
    (voir 351-50-25).
  - Cet article était numéroté 351-28-31 dans la CEI 60050-351:2006.
  examples: []
