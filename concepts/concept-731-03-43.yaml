    international: true
  definition: the imaginary part of the propagation coefficient
  language_code: eng
  notes:
  - The phase coefficient of an optical waveguide is the limit of the phase change
    of a field quantity between two points on the axis of the guide divided by the
    distance between the points when this distance tends to zero.
  examples: []
