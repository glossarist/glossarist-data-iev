eng:
  id: 845-31-025
  terms:
  - type: expression
    normative_status: preferred
    designation: Allard's law
  definition: |-
    law relating the illuminance, stem:[E]~v~, produced on a surface (which is normal to the direction of the light source and sufficiently distant for the light source to be considered as a <a href="IEV845-21-033">point source</a>) by a light source to the luminous intensity, stem:[I]~v~, of the light source in the direction of the surface, to the distance, stem:[d], between the surface and the light source, and to the atmospheric transmissivity, stem:[T], which is assumed to be uniform

    stem:[E_v = ((I_v))/((d^2)) T^(d // d_0)]

    where stem:[d]~0~ is the length specified in the definition of stem:[T]
  language_code: eng
  notes:
  - |-
    The formula in the definition is sometimes written:

    stem:[E_v = ((I_v))/((d^2)) T^(delta)]

    where the exponent, stem:[δ], in stem:[Tδ] is the numerical value of the distance, stem:[d], measured with stem:[d]~0~ as "unit".
  - |-
    Taking into account the relationship between atmospheric transmissivity, stem:[T], and <a href="IEV845-31-018">meteorological optical range</a>, stem:[v], given in Note 2 to entry of the definition of "meteorological optical range", Allard's law can also be written as:

    stem:[E_v = ((I_v))/((d^2)) ( 0,05^(d // v) )].
  - This entry was numbered 845-11-27 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-31-025
  terms:
  - type: expression
    normative_status: preferred
    designation: loi d'Allard
    gender: f
    plurality: singular
  definition: |-
    loi associant l'éclairement lumineux stem:[E]~v~, produit sur une surface (perpendiculairement à la direction de la source de lumière et à une distance suffisante pour que la source de lumière soit considérée comme <a href="IEV845-21-033">source ponctuelle</a>) par une source de lumière, à l'intensité lumineuse stem:[I]~v~, de la source de lumière dans la direction de la surface, par rapport à la distance, stem:[d], entre la surface et la source de lumière, et la transmissivité atmosphérique, stem:[T], réputée uniforme

    stem:[E_v = ((I_v))/((d^2)) T^(d // d_0)]

    où stem:[d]~0~ est la longueur spécifiée dans la définition de stem:[T]
  language_code: fra
  notes:
  - |-
    La formule dans la définition est parfois écrite sous la forme:

    stem:[E_v = ((I_v))/((d^2)) T^(delta)]

    où l'exposant, stem:[δ], dans stem:[Tδ] est la valeur numérique de la distance, stem:[d,] mesurée avec stem:[d]~0~ comme "unité".
  - |-
    Compte tenu de la relation entre la transmissivité atmosphérique stem:[T], et la <a href="IEV845-31-018">portée optique météorologique</a>, stem:[v], donnée à la Note 2 à l'article de la définition "portée optique météorologique", la loi d'Allard peut aussi s'écrire sous la forme:

    stem:[E_v = ((I_v))/((d^2)) ( 0,05^(d // v) )].
  - Cet article était numéroté 845-11-27 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
