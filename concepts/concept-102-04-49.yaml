fra:
  id: 102-04-49
  terms:
  - type: expression
    normative_status: preferred
    designation: symétrique
  definition: "se dit d'un configuration de points de l'espace euclidien à trois dimensions
    lorsque la configuration est invariante par une application donnée de l'espace
    dans lui-même qui conserve les distances euclidiennes\n\nEXEMPLE\n\n\n\n* symétrique
    par translation pour une configuration périodique, \n\n* symétrique par rotation
    de 2π/stem:[n], où stem:[n] est un entier, ou par toute rotation, \n\n* symétrique
    par rapport à un plan, \n\n* et leurs combinaisons."
  language_code: fra
  notes: []
