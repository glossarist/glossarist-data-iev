fra:
  id: 114-01-24
  terms:
  - type: expression
    normative_status: preferred
    designation: force ionique
    gender: f
    plurality: singular
  definition: |-
    moitié de la somme, étendue aux différents types d'ions d'une solution, des produits de leur molalité stem:[b]~stem:[i]~ par le carré de leur nombre de charge stem:[z]~stem:[i]~

    stem:[I = (1)/(2) sum z_i^2 b_i]
  language_code: fra
  notes:
  - Le nombre de charge est une grandeur sans dimension définie en 113-05-17.
  - L’unité SI cohérente de force ionique est la mole par kilogramme, mol/kg.
  - 'Cet article était numéroté 111-15-29 dans la CEI 60050-111:1996. Il a été modifié
    comme suit: une formule a été ajoutée.'
  examples: []
  entry_status: Standard
