eng:
  id: 426-11-43
  terms:
  - type: expression
    normative_status: preferred
    designation: intrinsic safety "iD"
  definition: Type of Protection based on the restriction of electrical energy within
    apparatus and of interconnecting wiring exposed to the potentially explosive atmosphere
    to a level below that which can cause ignition by either sparking or heating effects
  language_code: eng
  notes:
  - 'Type of Protection "iD" has been replaced by Type of Protection "i" in accordance
    with IEC 60079-11, _Explosive atmospheres – Part 11: Equipment protection by intrinsic
    safety "i"_.'
  - This entry was numbered 426-19-01 in IEC 60050-426:2008.
  examples: []
  entry_status: Standard
