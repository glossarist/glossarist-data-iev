  terms:
  - type: expression
    normative_status: preferred
    designation: écart de vitesse par rapport à la vitesse nominale
    gender: m
    plurality: singular
  definition: écart relatif de la vitesse réelle (de défilement ou de rotation) par
    rapport à la vitesse nominale (de défilement ou de rotation)
  language_code: fra
  notes:
  - |-
    L'écart est exprimé en pourcentage, affecté du signe (+) ou du signe (-) selon que la vitesse réelle est supérieure ou inférieure à la vitesse nominale. Il est donné par l'expression:

    stem:[((vitesse moyenne réelle - vitesse nominale))/((vitesse nominale)) xx 100 %]
  examples: []
