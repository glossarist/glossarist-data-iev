eng:
  id: 806-12-26
  terms:
  - type: expression
    normative_status: preferred
    designation: deviation from rated speed
  definition: the relative deviation of the mean measured speed (tape speed or speed
    of rotation) with respect to the rated speed (tape speed or speed of rotation)
  language_code: eng
  notes:
  - |-
    The deviation is expressed in percentage, regarded either as positive (+) when the measured speed is higher than the rated speed, or as negative (-) when it is lower. It is given by:

    stem:[((mean measured speed - rated speed))/((rated speed)) xx 100 %]
  examples: []
  entry_status: Standard
