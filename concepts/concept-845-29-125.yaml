eng:
  id: 845-29-125
  terms:
  - type: expression
    normative_status: preferred
    usage_info: of glazing material
    designation: solar factor
  - type: expression
    usage_info: of glazing material
    designation: total transmittance
  - type: expression
    usage_info: of glazing material
    designation: total energy transmittance
  - type: symbol
    designation: stem:[g]
    international: true
  definition: quotient of the quantity of heat penetrating into an interior through
    the glazing and the solar radiant energy incident on that glazing
  language_code: eng
  notes:
  - |-
    The solar factor is the sum of two quantities: the radiant transmittance, stem:[τ]~e~, of the glazing and the quantity equal to the quotient of the convected and radiated heat gain from the glazing into the interior, stem:[Q]~2~, and the solar radiant energy, stem:[Q]~1~, incident on the glazing:

    stem:[g] = stem:[τ]~e~ + stem:[Q]~2~ / stem:[Q]~1~
  - The solar factor has unit one.
  - This entry was numbered 845-09-106 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
