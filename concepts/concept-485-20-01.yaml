  terms:
  - type: expression
    normative_status: preferred
    designation: generating time
  definition: accumulative duration of the time intervals during which a {{fuel cell
    power system, IEV:485-09-01}} generates electric power
  language_code: eng
  notes:
  - The generating time includes both the duration that the power system supplies
    electricity to the grid and the duration that the generating power is consumed
    for the {{parasitic load, IEV:485-09-08}} only.
