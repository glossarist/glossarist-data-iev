eng:
  id: 845-23-021
  terms:
  - type: expression
    normative_status: preferred
    designation: CIE standard illuminant
  definition: illuminant standardized by the CIE for the purpose of harmonization
  language_code: eng
  notes:
  - CIE standard illuminants should be used whenever appropriate in order to facilitate
    the comparison of published results.
  - See also CIE 15, stem:[Colorimetry].
  - 'See also ISO 11664-2/CIE S 014-2, _Colorimetry – Part 2: CIE Standard llluminants
    for Colorimetry_, in which examples are given for applications of use of CIE standard
    illuminants.'
  - Illuminants B, C and other <a href="IEV845-23-020">daylight illuminants</a>, previously
    denoted as "standard illuminants", should now be termed "<a href="IEV845-23-019">CIE
    illuminants</a>".
  - This entry was numbered 845-03-12 in IEC 60050-845:1987.
  examples:
  - 'Examples of CIE standard illuminants are:* CIE standard illuminant A: relative
    spectral distribution of radiant flux based on Planckian radiation at a temperature
    of about 2 855,5 K;* CIE standard illuminant D65: relative spectral distribution
    of radiant flux representing a phase of daylight with a correlated colour temperature
    of approximately 6 500 K (called also "nominal correlated colour temperature of
    the daylight illuminant").'
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-23-021
  terms:
  - type: expression
    normative_status: preferred
    designation: illuminant CIE normalisé
    gender: m
    plurality: singular
  definition: illuminant normalisé par la CIE à des fins d'harmonisation
  language_code: fra
  notes:
  - Il convient d'utiliser les illuminants normalisés CIE lorsque cela est approprié
    afin de faciliter la comparaison des résultats publiés.
  - Voir aussi CIE 15, stem:[Colorimetry].
  - 'Voir aussi l''ISO 11664-2/CIE S 014-2, _Colorimétrie – Partie 2: Illuminants
    CIE normalisés,_ qui donne des exemples pour les applications d''emploi des illuminants
    CIE normalisés.'
  - Il convient désormais d'appeler "<a href="IEV845-23-019">illuminants CIE</a>"
    les illuminants B, C et autres <a href="IEV845-23-020">illuminants lumière du
    jour</a>, précédemment appelés "illuminants normalisés".
  - Cet article était numéroté 845-03-12 dans l'IEC 60050-845:1987.
  examples:
  - 'Des exemples d''illuminant CIE normalisé sont:* Illuminant normalisé A de la
    CIE: répartition spectrale relative de flux énergétique basée sur le rayonnement
    d''un radiateur de Planck à une température d''environ 2 855,5 K;* Illuminant
    normalisé D65 de la CIE: répartition spectrale relative de flux énergétique représentant
    une phase de la lumière du jour avec une température de couleur corrélée de 6
    500 K environ (également appelée "température de couleur corrélée nominale de
    l''illuminant lumière du jour").'
  entry_status: Standard
  review_decision_event: published
