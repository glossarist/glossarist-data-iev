eng:
  id: 845-24-076
  terms:
  - type: expression
    normative_status: preferred
    designation: total spectral radiance factor
  - type: symbol
    designation: stem:[β]~T~(stem:[λ])
    international: true
  definition: |-
    sum of the reflected spectral radiance factor, stem:[β]~R~(stem:[λ]), and the luminescent spectral radiance factor, stem:[β]~L~(stem:[λ])

    stem:[β]~T~(stem:[λ]) = stem:[β]~R~(stem:[λ]) + stem:[β]~L~(stem:[λ])
  language_code: eng
  notes:
  - For fluorescence colorimetric applications, it is implicit that the quantity used
    in the colorimetric calculations is the total radiance factor, and it is common
    to omit the subscript T.
  - The total spectral radiance factor has unit one.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
