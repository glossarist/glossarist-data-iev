eng:
  id: 845-21-040
  terms:
  - type: expression
    normative_status: preferred
    designation: photon flux
  - type: symbol
    designation: |-
      stem:[Φ]~p~
      stem:[Φ]
    international: true
  definition: |-
    rate of photon number per time interval

    stem:[Phi_p = ((d N_p))/((d t))]

    where stem:[N]~p~ is photon number, transmitted or received, and stem:[t] is time
  language_code: eng
  notes:
  - |-
    Photon flux, stem:[Φ]~p~, is related to radiant flux, stem:[Φ]~e~, of <a href="IEV845-21-014">monochromatic radiation</a> by

    stem:[Phi_p = ((Phi_e))/((h nu))]

    where stem:[h] is the Planck constant, and stem:[ν] is the frequency of the corresponding electromagnetic wave.
  - For a beam of radiation whose spectral distribution is stem:[((d Phi_e ( lambda
    )))/((d lambda))] or stem:[((d Phi_e ( nu )))/((d nu))], the photon flux can be
    expressed by stem:[Phi_p = int_0^(oo) ((d Phi_e ( lambda )))/((d lambda)) * (lambda)/((h
    c_0)) d lambda = int_0^(oo) ((d Phi_e ( nu )))/((d nu)) * (1)/((h nu)) d nu],
    where stem:[h] is Planck's constant and stem:[c]~0~ is the {{speed of light in
    vacuum, IEV:113-01-34}}.
  - The corresponding radiometric quantity is "radiant flux". The corresponding photometric
    quantity is "luminous flux".
  - The photon flux is expressed in second to the power minus one (s^−1^).
  - This entry was numbered 845-01-26 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-21-040
  terms:
  - type: expression
    normative_status: preferred
    designation: flux photonique
    gender: m
    plurality: singular
  definition: |-
    taux du nombre de photons par intervalle de temps

    stem:[Phi_p = ((d N_p))/((d t))]

    où stem:[N]~p~ est le nombre de photons, transmis ou reçu, et stem:[t] est le temps
  language_code: fra
  notes:
  - |-
    Le flux photonique, stem:[Φ]~p~, est associé au flux énergétique, stem:[Φ]~e~, de rayonnement monochromatique, par

    stem:[Phi_p = ((Phi_e))/((h nu))]

    où stem:[h] est la constante de Planck, et stem:[ν] est la {{fréquence, IEV:103-06-02}} de l'onde électromagnétique correspondante.
  - Pour un faisceau de rayonnement dont la répartition spectrale est stem:[((d Phi_e
    ( lambda )))/((d lambda))] ou stem:[((d Phi_e ( nu )))/((d nu))], le flux photonique
    peut être exprimé par stem:[Phi_p = int_0^(oo) ((d Phi_e ( lambda )))/((d lambda))
    * (lambda)/((h c_0)) d lambda = int_0^(oo) ((d Phi_e ( nu )))/((d nu)) * (1)/((h
    nu)) d nu], où stem:[h] est la constante de Planck et stem:[c]~0~ est la {{vitesse
    de la lumière dans le vide, IEV:113-01-34}}.
  - La grandeur radiométrique correspondante est le "flux énergétique". La grandeur
    photométrique correspondante est le "flux lumineux".
  - Le flux photonique est exprimé en seconde à la puissance moins un (s^−1^).
  - Cet article était numéroté 845-01-26 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
