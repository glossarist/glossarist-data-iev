eng:
  id: 102-03-29
  terms:
  - type: expression
    normative_status: preferred
    usage_info: between two vectors
    designation: angle
  definition: |-
    real number stem:[ϑ] such that 0 ≤ stem:[ϑ] ≤ π, the cosine of which is the ratio of the scalar product of two given real vectors *stem:[U]* and *stem:[V]* to the product of their magnitudes

    stem:[vartheta = arccos ((U * V))/((| U | * | V |))]
  language_code: eng
  notes:
  - The angle of two vectors is always defined because the inequality stem:[| U *
    V | &lt;= | U | * | V |] is valid for the scalar product.
  examples: []
  entry_status: Standard
  date_accepted: '2008-08-01T00:00:00+00:00'
