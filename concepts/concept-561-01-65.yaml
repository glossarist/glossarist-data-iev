eng:
  id: 561-01-65
  terms:
  - type: expression
    normative_status: preferred
    designation: overtone order
  definition: integral numbers given to the successive overtones of a given mode of
    vibration, in order of increasing frequency commencing with the fundamental as
    unity frequency
  language_code: eng
  notes:
  - For shear and extension modes, the overtone order is the quotient of the frequency
    of the overtone by the fundamental frequency rounded to the nearest whole number.
  - This entry was numbered 561-02-04 in IEC 60050-561:1991.
  examples: []
