  terms:
  - type: expression
    normative_status: preferred
    designation: temperature cyclic drift of mid-band frequency
  definition: maximum irreversible variation of the mid-band frequency observed at
    room temperature during or after the completion of a number of specified temperature
    cycles
  language_code: eng
  notes:
  - It is expressed normally as a percentage of the mid-band frequency related to
    the reference temperature. This is normally 25 °C.
