eng:
  id: 826-15-02
  terms:
  - type: expression
    normative_status: preferred
    designation: building void
  definition: space within the structure or the components of a building accessible
    only at certain points
  language_code: eng
  notes:
  - Examples are space within partitions, suspended floors, ceilings and certain types
    of window frames, door frames and architraves.
  - A specially formed building void in an element of building is also known as a
    duct.
