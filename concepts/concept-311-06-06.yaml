fra:
  id: 311-06-06
  terms:
  - type: expression
    normative_status: preferred
    designation: répétabilité (des mesures)
    gender: f
    plurality: singular
  definition: |-
    étroitesse de l'accord entre les résultats des mesures successives du même mesurande, effectuées dans les mêmes conditions de mesure, c’est-à-dire:

    – suivant le même mode opératoire,

    – par le même observateur,

    – au moyen des mêmes appareils de mesure, utilisés dans les mêmes conditions,

    – dans le même laboratoire,

    – à des intervalles de temps assez courts.
  language_code: fra
  notes:
  - La notion de "mode opératoire" est définie en 2.5 dans le VIM.
  examples: []
