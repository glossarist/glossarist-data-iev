eng:
  id: 845-21-071
  terms:
  - type: expression
    normative_status: preferred
    designation: radiant exposure
  - type: symbol
    designation: |-
      stem:[H]~e~
      stem:[H]
    international: true
  definition: |-
    density of incident radiant energy with respect to area at a point on a real or imaginary surface

    stem:[H_e = ((d Q_e))/((d A))]

    where stem:[Q]~e~ is radiant energy and stem:[A] is the area on which the radiant energy is incident
  language_code: eng
  notes:
  - The quantity "radiant exposure" defined here must not be confused with the quantity
    named "exposure" which is used in the field of X- and γ-rays, the unit of which
    is coulomb per kilogram (C·kg^−1^).
  - The corresponding photometric quantity is "luminous exposure". The corresponding
    quantity for photons is "photon exposure".
  - The radiant exposure is expressed in joule per square metre (J·m^−2^ = W·s·m^−2^).
  - This entry was numbered 845-01-42 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-21-071
  terms:
  - type: expression
    normative_status: preferred
    designation: exposition énergétique
    gender: f
    plurality: singular
  definition: |-
    densité d'énergie rayonnante incidente par rapport à l'aire en un point d'une surface réelle ou fictive

    stem:[H_e = ((d Q_e))/((d A))]

    où stem:[Q]~e~ est l'énergie rayonnante et stem:[A] est l'aire qui reçoit cette énergie
  language_code: fra
  notes:
  - La grandeur "exposition énergétique" définie ici ne doit pas être confondue avec
    la grandeur appelée "exposition" utilisée dans le champ des rayons X et γ, dont
    l'unité est le coulomb par kilogramme (C·kg^−1^).
  - La grandeur photométrique correspondante est l'"exposition lumineuse". La grandeur
    correspondante pour les photons est l'"exposition photonique".
  - L'exposition énergétique est exprimée en joule par mètre carré (J·m^−2^ = W·s·m^−2^).
  - Cet article était numéroté 845-01-42 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
