eng:
  id: 845-23-040
  terms:
  - type: expression
    normative_status: preferred
    designation: colour equation
  definition: |-
    algebraic or vector representation of the match of two colour stimuli, of which, for instance, one can be an additive mixture of three reference colour stimuli



    In this equation, the sign "≡" indicates a colour match and is read as "matches". The unbracketed symbols represent the amounts of the stimuli indicated by the bracketed symbols: thus stem:[R]&amp;lsqb;R&amp;rsqb; means stem:[R] units of stimulus &amp;lsqb;R&amp;rsqb;, and the sign "+" means an additive mixture of colour stimuli. In such an equation, a minus sign means that the stimulus is added to those on the other side of the equation when the colour match is made.
  language_code: eng
  notes:
  - 'The reference stimuli are represented as &amp;lsqb;R&amp;rsqb;, &amp;lsqb;G&amp;rsqb;
    and &amp;lsqb;B&amp;rsqb; in which case the sign "≡", read as "matches" should
    be used. As an alternative, the colour equation can be written using boldface
    Roman letters when the equal sign "&amp;equals;", read as "equals" should be used:
    *C* = stem:[X]*X* + stem:[Y]*Y* + stem:[Z]*Z*'
  - This entry was numbered 845-03-24 in IEC 60050-845:1987.
  examples:
  - "&amp;lsqb;stem:[C]&amp;rsqb; ≡ stem:[X]&amp;lsqb;X&amp;rsqb; + stem:[Y]&amp;lsqb;Y&amp;rsqb;
    + stem:[Z]&amp;lsqb;Z&amp;rsqb;"
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-23-040
  terms:
  - type: expression
    normative_status: preferred
    designation: équation chromatique
    gender: f
    plurality: singular
  definition: |-
    représentation algébrique ou vectorielle de l'égalité de deux stimuli de couleurs dont l'un, par exemple, peut être un mélange additif de trois stimuli de couleurs de référence



    Dans cette équation, Le signe "≡" signifie l'égalisation de couleur et se lit "égalise" ; les lettres sans crochets indiquent les quantités des stimuli représentés par ces mêmes lettres entre crochets : ainsi stem:[R]&amp;lsqb;R&amp;rsqb; signifie stem:[R] unités du stimulus &amp;lsqb;R&amp;rsqb;; le signe "+" indique un mélange additif de stimuli de couleur. Dans une telle équation, un signe moins signifie que le stimulus est ajouté à ceux de l'autre membre de l'équation lors de l'égalisation de couleur.
  language_code: fra
  notes:
  - 'Les stimuli de référence sont représentés par les lettres &amp;lsqb;R&amp;rsqb;,
    &amp;lsqb;G&amp;rsqb; et &amp;lsqb;B&amp;rsqb; auquel cas, il convient d''utiliser
    le signe "≡", qui se lit "égalise". En variante, l''équation chromatique peut
    être écrite en caractères latins en gras lorsqu''il convient d''utiliser le signe
    "&amp;equals;", qui se lit "égale": *C* = stem:[X]*X* + stem:[Y]*Y* + stem:[Z]*Z*.'
  - Cet article était numéroté 845-03-24 dans l'IEC 60050-845:1987.
  examples:
  - "&amp;lsqb;stem:[C]&amp;rsqb; ≡ stem:[X]&amp;lsqb;X&amp;rsqb; + stem:[Y]&amp;lsqb;Y&amp;rsqb;
    + stem:[Z]&amp;lsqb;Z&amp;rsqb;"
  entry_status: Standard
  review_decision_event: published
