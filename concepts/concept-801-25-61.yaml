fra:
  id: 801-25-61
  terms:
  - type: expression
    normative_status: preferred
    designation: coefficient de réciprocité
    gender: m
    plurality: singular
  definition: |-
    pour un transducteur électroacoustique réciproque, à une fréquence spécifiée:

    a) quotient de la sensibilité en tension du transducteur fonctionnant en récepteur de son (par exemple un microphone), par la sensibilité au courant du même transducteur fonctionnant en émetteur de son; ou

    b) quotient de la sensibilité en courant du transducteur fonctionnant en récepteur de son (par exemple un microphone), par la sensibilité à la tension du même transducteur, fonctionnant en émetteur de son
  language_code: fra
  notes: []
