eng:
  id: 447-01-50
  terms:
  - type: expression
    normative_status: preferred
    designation: arc flash protection device
  definition: |-
    {{device, IEV:151-11-20}} intended to detect {{arc faults, IEV:442-05-66}} and provide a signal for operation of a mitigation or current interruption device

    Note 1 to entry: An arc flash protection device relies primarily on sensing other than traditional {{overcurrents, IEV:151-15-28}}, such as light sensing, pressure sensing, and current spectra sensing. The device can, or not, use traditional current sensing as an additional signal.
  language_code: eng
  notes: []
  examples: []
