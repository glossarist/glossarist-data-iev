eng:
  id: 705-08-05
  terms:
  - type: expression
    normative_status: preferred
    designation: free-space basic transmission loss
  - type: symbol
    designation: |-
      stem:[A]~o~
      stem:[L]~bf~
    international: true
  definition: the transmission loss, usually expressed in decibels, that would occur
    if the antennas were replaced by isotropic antennas located in a perfectly dielectric,
    homogeneous, isotropic and unlimited environment, the distance between the antennas
    being retained
  language_code: eng
  notes:
  - |-
    If the distance d between the antennas is much greater than the wavelength stem:[λ], the free-space attenuation in decibels will be:

    stem:[A_0 = 20 log ( ((4 pi d))/(lambda) )]
  examples: []
  entry_status: Standard
