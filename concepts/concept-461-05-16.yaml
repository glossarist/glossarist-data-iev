eng:
  id: 461-05-16
  terms:
  - type: expression
    normative_status: preferred
    designation: water blocking tape
  - type: expression
    designation: swelling tape
  definition: tape applied under a sheath or into the interstices of a conductor in
    order to prevent water migration along the cable
  language_code: eng
  notes:
  - Water migration can occur a) under the sheath, for example when the sheath has
    been damaged, or b) through the conductor, for example when cable layers through
    to the conductor have become damaged.
  examples: []
  entry_status: Standard
