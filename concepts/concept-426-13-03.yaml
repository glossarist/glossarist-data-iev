eng:
  id: 426-13-03
  terms:
  - type: expression
    normative_status: preferred
    designation: encapsulated device "nC"
  definition: device, which can or can not contain voids, constructed in such a manner
    that it is totally immersed in an encapsulating compound so that it is sealed
    to prevent entry of an external atmosphere
  language_code: eng
  notes:
  - 'Encapsulated Device "nC" has been replaced by "mc" in IEC 60079-18, _Explosive
    atmospheres – Part 18: Equipment protection by encapsulation "m"_.'
