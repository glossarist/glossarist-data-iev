eng:
  id: 845-24-111
  terms:
  - type: expression
    normative_status: preferred
    designation: complex refractive index
  - type: symbol
    designation: stem:[hat n ( lambda )]
    international: true
  definition: |-
    complex value where the real part is the refractive index and the imaginary part is related to the spectral absorption index

    stem:[hat n ( lambda ) = n ( lambda ) - i kappa ( lambda )]

    where where stem:[n](stem:[λ]) is the refractive index at wavelength stem:[λ], stem:[κ](stem:[λ]) is the spectral absorption index and stem:[i = sqrt(- 1)]
  language_code: eng
  notes:
  - The complex refractive index has unit one.
  - This entry was numbered 845-04-103 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
