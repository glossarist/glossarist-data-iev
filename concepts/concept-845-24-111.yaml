  review_decision_event: published
fra:
  id: 845-24-111
  terms:
  - type: expression
    normative_status: preferred
    designation: indice de réfraction complexe
    gender: m
    plurality: singular
  definition: |-
    valeur complexe pour laquelle la partie réelle est l'indice de réfraction et la partie imaginaire associée à l'indice d'absorption spectral

    stem:[hat n ( lambda ) = n ( lambda ) - i kappa ( lambda )]

    où stem:[n](stem:[λ]) est l'indice de réfraction à la longueur d'onde stem:[λ], stem:[κ](stem:[λ]) est l'indice d'absorption spectral et stem:[i = sqrt(- 1)]
  language_code: fra
  notes:
  - L'unité d'indice de réfraction complexe est un.
  - Cet article était numéroté 845-04-103 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
