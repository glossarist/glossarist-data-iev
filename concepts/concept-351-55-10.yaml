fra:
  id: 351-55-10
  terms:
  - type: expression
    normative_status: preferred
    designation: structure de commande décentralisée
    gender: f
    plurality: singular
  definition: |-
    structure de commande avec des sous-processus interconnectés, dans lesquels chaque équipement de commande partiel prend en compte les informations de son sous-processus associé, pour constituer ses informations de sortie

    VOIR: Figure 24.
  language_code: fra
  notes:
  - Un système à calculateur de processus compact constitue des structures de commande
    décentralisées si des régulateurs uniques sont utilisés pour chaque boucle d'asservissement,
    sans prendre en compte les liens entre les sous-processus.
  - |-
    Cet article était numéroté 351-31-10 dans la CEI 60050-351:2006.

