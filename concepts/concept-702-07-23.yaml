eng:
  id: 702-07-23
  terms:
  - type: expression
    normative_status: preferred
    designation: reflected wave
  definition: |-
    1. a wave which appears when a wave meets a surface separating two different media and which propagates away from the surface in the same medium as the incident wave

    2. a wave associated with an incident wave at a port of an electrical network or at a discontinuity in a transmission line, and propagating from this point in a direction opposite to that of the incident wave
  language_code: eng
  notes: []
  examples: []
  entry_status: Standard
  date_accepted: '1992-03-01T00:00:00+00:00'
  date_amended: '1992-03-01T00:00:00+00:00'
