eng:
  id: 131-15-38
  terms:
  - type: expression
    normative_status: preferred
    designation: ideal filter
  definition: two-port network for which the modulus of the transfer function is equal
    to one within one or more frequency bands, and equal to zero at all other frequencies
  language_code: eng
  notes:
  - Frequency band is defined in IEC 60050-101 and IEC 60050-702.
