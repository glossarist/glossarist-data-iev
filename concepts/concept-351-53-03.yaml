    gender: f
    plurality: singular
  definition: |-
    ensemble de relations qui détermine l'état suivant d'un système à partir d'un état donné et de la ou des valeurs simultanées de la ou des variables d'entrée

    VOIR: Figure 22.
  language_code: fra
  notes:
