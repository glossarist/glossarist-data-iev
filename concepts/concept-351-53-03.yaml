eng:
  id: 351-53-03
  terms:
  - type: expression
    normative_status: preferred
    designation: transition function
  definition: |-
    set of relationships which determines the following state of a system from a given state and the simultaneous value(s) of the input variable(s)

    SEE: Figure 22.
  language_code: eng
  notes:
  - The transition function may be described completely by a table, given by the columns
    1, 2 and 4 of the state transition table (see Figure 21).
  - |-
