eng:
  id: 441-14-06
  terms:
  - type: expression
    normative_status: preferred
    designation: divided support disconnector
  definition: a disconnector in which the fixed and moving contacts of each pole are
    not supported by a common base or frame
  language_code: eng
  notes:
  - A typical example is the pantograph or semi-pantograph disconnector.
  - This term applies to high-voltage disconnectors only.
  examples: []
  entry_status: Standard
