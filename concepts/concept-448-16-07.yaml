eng:
  id: 448-16-07
  terms:
  - type: expression
    normative_status: preferred
    designation: dead time
  definition: the time during automatic reclosing when the power line or phase is
    not connected to any network voltage
  language_code: eng
  notes:
  - |-
    For radial fed power lines the dead time is equal to the autoreclose open time.

    See figure 448-11.

    image::/assets/images/parts/448/448-fig11-en.gif[]
