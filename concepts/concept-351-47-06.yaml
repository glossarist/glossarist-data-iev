eng:
  id: 351-47-06
  terms:
  - type: expression
    normative_status: preferred
    designation: open action
  definition: |-
    action in an open action path or in a closed action path, where the output variable influences the input variable only under certain non-permanently acting conditions

    SEE: Figure 12.
  language_code: eng
  notes:
  - A reset circuit has an open action in spite of the fact that the structure has
    a closed action path.
  - This entry was numbered 351-26-06 in IEC 60050-351:2006.
