fra:
  id: 351-47-06
  terms:
  - type: expression
    normative_status: preferred
    designation: action ouverte
    gender: f
    plurality: singular
  definition: |-
    action, dans une chaîne d'action ouverte ou dans une chaîne d'action fermée, où la variable de sortie n'influence la variable d'entrée que dans certaines conditions d'action non permanentes

    VOIR: Figure 12.
  language_code: fra
  notes:
  - Un circuit de réarmement a une action ouverte, bien que la structure ait une chaîne
    d'action fermée.
  - |-
    Cet article était numéroté 351-26-06 dans la CEI 60050-351:2006.

