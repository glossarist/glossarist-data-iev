eng:
  id: 801-24-05
  terms:
  - type: expression
    normative_status: preferred
    designation: resonance
  definition: phenomenon of a system in forced oscillation such that any change, however
    small, in the frequency of excitation results in a decrease in a response of the
    system
  language_code: eng
  notes:
  - The quantity that is the measure of response should be indicated; for example,
    velocity resonance.
  examples: []
  entry_status: Standard
