fra:
  id: 102-06-13
  terms:
  - type: expression
    normative_status: preferred
    designation: matrice unité
    gender: f
    plurality: singular
  definition: |-
    matrice carrée *stem:[E]* dont les éléments sont les symboles de Kronecker

    stem:[Eij] = δstem:[ij]
  language_code: fra
  notes:
  - 'La matrice unité est l''élément unité pour la multiplication: *stem:[AE]* = *stem:[EA]*
    = *stem:[A]* pour toute matrice *stem:[A]* d''ordre donné.'
  - La matrice unité d’ordre stem:[n] est notée *stem:[E]*stem:[n] ou *stem:[I]*stem:[n].
  examples: []
  entry_status: Standard
  review_decision_event: published
