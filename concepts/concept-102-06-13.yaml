eng:
  id: 102-06-13
  terms:
  - type: expression
    normative_status: preferred
    designation: unit matrix
  definition: |-
    square matrix *stem:[E]* the elements of which are the Kronecker deltas

    stem:[Eij] = δstem:[ij]
  language_code: eng
  notes:
  - 'The unit matrix is the unit element for the multiplication: *stem:[AE]* = *stem:[EA]*
    = *stem:[A]* for every square matrix *stem:[A]* of a given order.'
  - The unit matrix of order stem:[n] is denoted by *stem:[E]*stem:[n] or *stem:[I]*stem:[n].
  examples: []
  entry_status: Standard
  date_accepted: '2008-08-01T00:00:00+00:00'
