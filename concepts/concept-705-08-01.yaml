eng:
  id: 705-08-01
  terms:
  - type: expression
    normative_status: preferred
    designation: total loss
  - type: symbol
    designation: |-
      stem:[A]~1~
      stem:[L]~1~
    international: true
  definition: the ratio, usually expressed in decibels, between the radio-frequency
    power supplied by the transmitter of a radio link and the radio-frequency power
    supplied to the corresponding receiver in real installation, propagation and operational
    conditions
  language_code: eng
  notes:
  - |-
    It is necessary to specify in each case the points at which the power supplied by the transmitter and the power to the receiver are determined, for example:

    - before or after the radio-frequency filters or multiplexers that may be employed at the sending or the receiving end,

    - at the input or at the output of the transmitting and receiving antenna feed lines.
  examples: []
  entry_status: Standard
  date_accepted: '1995-09-01T00:00:00+00:00'
  date_amended: '1995-09-01T00:00:00+00:00'
  review_date: '1995-09-01T00:00:00+00:00'
  review_decision_date: '1995-09-01T00:00:00+00:00'
  review_decision_event: published
