eng:
  id: 448-16-10
  terms:
  - type: expression
    normative_status: preferred
    designation: autoreclose interruption time
  definition: the time during automatic reclosing when the power line or phase cannot
    transfer any power
  language_code: eng
  notes:
  - |-
    For radial fed power lines the autoreclose interruption time is equal to the dead time and to the autoreclose open time.

    See figure 448-11.

    image::/assets/images/parts/448/448-fig11-en.gif[]
