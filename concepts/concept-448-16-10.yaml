fra:
  id: 448-16-10
  terms:
  - type: expression
    normative_status: preferred
    designation: durée d'interruption avant réenclenchement
    gender: f
    plurality: singular
  definition: durée, au cours du réenclenchement automatique, pendant laquelle la
    ligne d'énergie ou la phase ne peut transporter aucune énergie
  language_code: fra
  notes:
  - |-
    Pour les lignes d'énergie en réseau radial, la durée d'interruption avant réenclenchement est égale à la durée de pause et à la durée d'ouverture avant réenclenchement.

    Voir figure 448-11.

