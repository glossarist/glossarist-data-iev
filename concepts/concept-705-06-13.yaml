  terms:
  - type: expression
    normative_status: preferred
    designation: exosphere
  definition: the outer part of the Earth's atmosphere located above the thermosphere,
    in which the collision frequency is sufficiently low that the probability that
    certain particles will escape towards free space is relatively high when the vertical
    velocity of these particles is sufficiently high
