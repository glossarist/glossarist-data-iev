eng:
  id: 151-12-33
  terms:
  - type: expression
    normative_status: preferred
    designation: overhead line
  definition: "{{electric line, IEV:151-12-27}} with one or more conductors or a cable
    supported above ground by appropriate means"
  language_code: eng
  notes:
  - An overhead line may consist of only one conductor when the circuit is closed
    by the Earth.
  - An overhead line may be constructed with bare conductors, generally supported
    by insulators, or with insulated conductors.
  - The concept of overhead line generally includes the supporting elements.
  examples: []
