eng:
  id: 845-26-039
  terms:
  - type: expression
    normative_status: preferred
    designation: photobiological fluence rate
  - type: symbol
    designation: stem:[E]~eff,o~
    international: true
  definition: spherical irradiance spectrally weighted with a stated photobiological
    action spectrum
  language_code: eng
  notes:
  - This definition is based on the assumption that an action spectrum is adopted
    for the photobiological effect considered, and that its maximum value is 1.
  - It is essential to specify which action spectrum is used, as the unit is the same
    for any action spectrum.
  - The photobiological fluence rate is expressed in watt per square metre (W·m^−2^).
  examples: []
