  terms:
  - type: expression
    normative_status: preferred
    designation: joint d'étanchéité
    gender: m
    plurality: singular
  definition: |-
    garniture insérée entre les faces de raccordement de deux brides de guide d'ondes afin d'assurer au moins une des fonctions essentielles suivantes:

    a) réduire les fuites de gaz qui altèrent la pression interne du guide d'ondes,

    b) prévenir l'introduction de tout corps étranger à l'intérieur d'un guide d'ondes,

    c) réduire les fuites d'énergie et les amorçages d'arcs
