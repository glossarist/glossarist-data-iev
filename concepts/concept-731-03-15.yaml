  terms:
  - type: expression
    normative_status: preferred
    designation: microbending
  definition: sharp curvatures of an optical fibre involving local axial displacement
    of the order of a few micrometers and spatial wavelengths of the order of a few
    millimetres
  language_code: eng
  notes:
