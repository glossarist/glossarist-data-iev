  terms:
  - type: expression
    normative_status: preferred
    designation: résistance (équivalente) de bruit
    gender: f
    plurality: singular
  definition: |-
    grandeur stem:[R]~eq~ ayant les dimensions d'une résistance et servant à exprimer la force électromotrice de bruit stem:[E]~n~ d'un monoporte par la relation:

    stem:[R_((eq)) = ((E_n^2))/((4 k T_0 Delta f))]

    où stem:[T]~0~ est la température thermodynamique de référence fixée conventionnellement au voisinage de 290 K, Δstem:[f] la largeur de bande considérée, et stem:[k] la constante de Boltzmann
  language_code: fra
  notes:
