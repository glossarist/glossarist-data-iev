eng:
  id: 702-08-52
  terms:
  - type: expression
    normative_status: preferred
    designation: "(equivalent) noise resistance"
  - type: symbol
    designation: stem:[R]~eq~
    international: true
  definition: |-
    quantity stem:[R]~eq~, having the dimensions of resistance, used to express the equivalent noise voltage stem:[E]~n~ of a one port device through the relationship:

    stem:[R_((eq)) = ((E_n^2))/((4 k T_0 Delta f))]

    where stem:[T]~0~ is a reference thermodynamic temperature, fixed by convention around 290 K, Δstem:[f] is the bandwidth considered and stem:[k] is Boltzmann's constant
  language_code: eng
  notes:
  - A receiving antenna can be regarded as a one-port device when viewed from its
    output port.
  examples: []
  entry_status: Standard
  date_accepted: '1992-03-01T00:00:00+00:00'
  date_amended: '1992-03-01T00:00:00+00:00'
  review_date: '1992-03-01T00:00:00+00:00'
  review_decision_date: '1992-03-01T00:00:00+00:00'
  review_decision_event: published
