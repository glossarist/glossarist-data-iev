eng:
  id: 103-04-07
  terms:
  - type: expression
    normative_status: preferred
    designation: inverse Laplace transform
  definition: |-
    representation of a real or complex function stem:[f](stem:[t]) of the real variable stem:[t] by the integral transformation

    stem:[f ( t ) = (1)/((2 pi j)) int_( sigma - j oo)^( sigma + j oo) F ( s ) e^(s t) d s]

    where stem:[F ( s )] is the Laplace transform of the function stem:[f](stem:[t]), stem:[σ] is greater or equal to the abscissa of convergence of stem:[F ( s )] and j is the imaginary unit
  language_code: eng
  notes: []
  examples: []
  entry_status: Standard
  date_accepted: '2009-12-01T00:00:00+00:00'
  date_amended: '2009-12-01T00:00:00+00:00'
