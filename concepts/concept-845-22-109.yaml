eng:
  id: 845-22-109
  terms:
  - type: expression
    normative_status: preferred
    designation: colour rendering index
  - type: expression
    designation: CRI
  - type: symbol
    designation: stem:[R]
    international: true
  definition: measure of the degree to which the psychophysical colour of an object
    illuminated by the test illuminant conforms to that of the same object illuminated
    by the reference illuminant, suitable allowance having been made for the state
    of chromatic adaptation
  language_code: eng
  notes:
  - See also CIE 13, _Method of Measuring and Specifying Colour Rendering of Light
    Sources_.
  - This entry was numbered 845-02-61 in IEC 60050-845:1987.
  - This note applies to the French language only.
