eng:
  id: 821-03-48
  terms:
  - type: expression
    normative_status: preferred
    designation: factor of safety
  definition: margin between the level of per train emissions and the actual susceptibility
    of the track circuit
  language_code: eng
  notes:
  - The factor of safety covers safety or availability depending on whether wrong-side
    failure or right-side failure mechanism is considered.
