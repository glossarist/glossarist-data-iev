eng:
  id: 131-12-29
  terms:
  - type: expression
    normative_status: preferred
    designation: permeance
  - type: symbol
    designation: stem:[Λ]
    international: true
  definition: |-
    for a reluctant element, quotient of the magnetic flux stem:[Φ] by the magnetic tension stem:[V]~m~

    stem:[Lambda = (Phi)/((V_m))]
  language_code: eng
  notes:
  - The permeance is the reciprocal of the reluctance.
  - The coherent SI unit of permeance is henry, H.
  - In an electric equivalent circuit, the permeances are represented by conductances,
    magnetic fluxes by electric currents and magnetic tensions by voltages.
