eng:
  id: 426-01-03
  terms:
  - type: expression
    normative_status: preferred
    designation: equipment grouping
  definition: classification system of equipment related to the explosive atmosphere
    for which they are intended to be used
  language_code: eng
  notes:
  - |-
    IEC 60079-0, _Explosive atmospheres – Part 0: Equipment – General requirements_, identifies three equipment groups:

    . Group I, equipment for mines susceptible to firedamp;. Group II, which is divided into sub-groups, equipment for all places with an explosive gas atmosphere other than mines susceptible to firedamp;. Group III, which is divided into sub-groups, equipment for all places with an explosive dust atmosphere other than mines susceptible to firedamp.
  examples: []
  entry_status: Standard
