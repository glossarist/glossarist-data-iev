  terms:
  - type: expression
    normative_status: preferred
    designation: spectral linear absorption coefficient
  - type: symbol
    designation: stem:[a](stem:[λ])
    international: true
  definition: |-
    relative decrease in radiant flux caused by absorption, expressed by the relative density of the spectral radiant flux, stem:[Φ]~e,~stem:[λ](stem:[λ]), with respect to propagation length, stem:[l], of a collimated beam at a point in an absorbing medium

    stem:[a ( lambda ) = (1)/((Phi_((e , lambda)) ( lambda ))) ((d Phi_((e , lambda)) ( lambda )))/((d l))]
  language_code: eng
  notes:
  - The spectral linear absorption coefficient is expressed in metre to the power
    minus one (m^−1^).
  - This entry was numbered 845-04-78 in IEC 60050-845:1987.
