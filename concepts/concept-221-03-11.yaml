eng:
  id: 221-03-11
  terms:
  - type: expression
    normative_status: preferred
    designation: pulse permeability
  - type: symbol
    designation: stem:[μ]~p~
    international: true
  definition: |-
    the relative permeability obtained from the total change in magnetic flux density and the corresponding change in the magnetic field strength when either quantity is alternating with an arbitrary waveform between stated limits:

    stem:[mu_p = (1)/((mu_0)) ((Delta B))/((Delta H))]
  language_code: eng
  notes:
  - The value of the pulse permeability depends strongly on the limits of the flux
    density or field strength excursions; these limits need not be symmetrical with
    respect to zero.
  - Often pulse permeability refers to the special case of rectangular voltage pulses
    being applied to an exciting winding, the flux density waveform is then approximately
    triangular provided saturation is not approached.
  examples: []
  entry_status: Standard
  date_accepted: '1990-10-01T00:00:00+00:00'
  date_amended: '1990-10-01T00:00:00+00:00'
  review_date: '1990-10-01T00:00:00+00:00'
  review_decision_date: '1990-10-01T00:00:00+00:00'
  review_decision_event: published
