fra:
  id: 121-12-02
  terms:
  - type: expression
    normative_status: preferred
    designation: milieu conducteur
    gender: m
    plurality: singular
  - type: expression
    usage_info: milieu
    designation: conducteur
    gender: m
    plurality: singular
  definition: milieu dans lequel un champ électrique variable en fonction du temps
    produit une densité de courant électrique dont la composante suivant une direction
    donnée a une norme grande par rapport à celle de la composante suivant cette direction
    de la densité de courant de déplacement, dans une bande de fréquences déterminée
  language_code: fra
  notes:
  - |-
    Dans un milieu isotrope, la propriété d’être conducteur se traduit en régime sinusoïdal par la condition:

    stem:[(gamma)/((epsilon_0 omega)) ≫ epsilon^( ' )_r]

    où stem:[γ] est la conductivité, stem:[ε]~0~ la constante électrique, stem:[ω] la pulsation et stem:[ε′]~r~ la permittivité relative réelle. En régime statique, le milieu est conducteur si la conductivité n’est pas nulle.
  - Un milieu anisotrope peut n’être conducteur que dans certaines directions.
  - Le terme "conducteur" désigne aussi tout élément destiné à assurer le passage
    d’un courant électrique.
  examples: []
  entry_status: Standard
