eng:
  id: 903-02-02
  terms:
  - type: expression
    normative_status: preferred
    designation: group safety publication
  definition: publication covering all safety aspects of a specific group of products
    within the scope of two or more {{product TCs, IEV:903-02-04}}
  language_code: eng
  notes:
  - Group safety publications are primarily intended to be stand-alone {{product safety
    publications, IEV:903-02-03}}, but may also be used by TCs as source material
