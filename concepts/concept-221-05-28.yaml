eng:
  id: 221-05-28
  terms:
  - type: expression
    normative_status: preferred
    designation: cross coupling
  definition: in a circulator having four or more ports, the attenuation between an
    input port and any other port that is not adjacent to the input port according
    to the order of sequence
  language_code: eng
  notes:
  - The cross coupling should not be confused with the reverse loss occurring between
    adjacent ports.
  examples: []
  entry_status: Standard
  date_accepted: '1990-10-01T00:00:00+00:00'
