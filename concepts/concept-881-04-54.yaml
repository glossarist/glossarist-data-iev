eng:
  id: 881-04-54
  terms:
  - type: expression
    normative_status: preferred
    designation: exposure rate constant
  - type: symbol
    designation: stem:[Γδ]
    international: true
  definition: |-
    for a gamma or X-ray emitting nuclide, the quotient of stem:[l^2 (( ((d X))/((d t)) ))_(delta)] by stem:[A], where (dstem:[Х]/dstem:[t])~stem:[δ]~ is the exposure rate due to photons of energy greater than stem:[δ] at a distance stem:[I] from a point source of this nuclide having an activity stem:[A]

    stem:[Gamma_(delta) = ((l^2))/(A) (( ((d X))/((d t)) ))_(delta)]

    A special unit of exposure rate constant is Rm^2^h^−1^Ci^−1^.
  language_code: eng
  notes:
  - It is assumed that the attenuation in the source and along stem:[I] is negligible.
    In the case of radium, the value of stem:[Γ] is determined for a filter thickness
    of 0,5 mm platinum. Moreover, stem:[Γ] is related not to the activity but to the
    mass of ^226^Ra; a special unit is then Rm^2^h^−1^g^−1^.
  examples: []
  entry_status: Standard
  date_accepted: '1983-01-01T00:00:00+00:00'
  date_amended: '1983-01-01T00:00:00+00:00'
  review_date: '1983-01-01T00:00:00+00:00'
  review_decision_date: '1983-01-01T00:00:00+00:00'
  review_decision_event: published
