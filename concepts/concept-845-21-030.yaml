  definition: |-
    quotient of the <a href="IEV845-21-029">spectral distribution</a>, stem:[Xλ](stem:[λ]), of a radiant, luminous or photon quantity, stem:[X](stem:[λ]), and a fixed reference value, stem:[R], which can be an average value, a maximum value or an arbitrarily chosen value of this distribution

