    designation: stem:[G]-value
  definition: |-
    the quotient of the mean number stem:[N] of specified elementary entities (ions, radicals, or molecules) produced, destroyed or changed, and the mean value stem:[E]~D~ of energy imparted to matter:

    stem:[G = (N)/((E_D))]

    The unit of the stem:[G] value is (100 eV)^−1^.
