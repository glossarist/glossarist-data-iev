  definition: |-
    ensemble des points d'un espace affine à trois dimensions dont le rayon vecteur est une fonction continue *stem:[f]* des couples de nombres réels stem:[u] et stem:[v] appartenant à un certain domaine U

    stem:[r = f ( u , v )] où stem:[( u , v ) in U sube R^2]
  language_code: fra
  notes:
