eng:
  id: 722-16-28
  terms:
  - type: expression
    normative_status: preferred
    designation: reference speech power for the measurement of AEN
  definition: the acoustical speech power which causes the ARAEN speech voltmeter
    connected at the output of the sending system of the reference system for the
    determination of AEN or SRAEN to indicate 0 under specified conditions
  language_code: eng
  notes:
  - The specified conditions are defined in the CCITT Recommendation P45 from the
    Volume V of the Yellow Book, 1981.
  examples: []
  entry_status: Standard
  date_accepted: '1992-11-01T00:00:00+00:00'
