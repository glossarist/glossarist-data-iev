  terms:
  - type: expression
    normative_status: preferred
    designation: puissance vocale de référence pour l'ARAEN
    gender: f
    plurality: singular
  definition: puissance vocale telle que le volumètre de l'ARAEN indique 0 dans des
    conditions spécifiées lorsqu'il est relié à la sortie du système émetteur du système
    de référence pour la détermination des affaiblissements équivalents pour la netteté
    ou SRAEN
  language_code: fra
  notes:
