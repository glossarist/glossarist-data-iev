eng:
  id: 845-29-107
  terms:
  - type: expression
    normative_status: preferred
    designation: Linke turbidity factor
  - type: expression
    designation: total turbidity factor
  - type: symbol
    designation: stem:[T]~L~
    international: true
  definition: quotient of the vertical optical thickness of a turbid atmosphere and
    the vertical optical thickness of the pure and dry atmosphere (Rayleigh atmosphere),
    related to the whole solar spectrum
  language_code: eng
  notes:
  - |-
    The total turbidity factor can be expressed by

    stem:[T]~L~ = (stem:[δ]~R~ + stem:[δ]~A~ + stem:[δ]~Z~ + stem:[δ]~W~) / stem:[δ]~R~

    ~

    where~ stem:[δ]~R~ is the optical thickness with respect to Rayleigh scattering at the air molecules, and stem:[δ]~A~, stem:[δ]~Z~, stem:[δ]~W~ are the optical thicknesses with respect to Mie scattering and absorption at the aerosol particles, to ozone absorption, and to water vapour absorption respectively.
  - The total turbidity factor has unit one.
  - This entry was numbered 845-09-87 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-29-107
  terms:
  - type: expression
    normative_status: preferred
    designation: facteur de trouble selon Linke
    gender: m
