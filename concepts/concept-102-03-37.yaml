fra:
  id: 102-03-37
  terms:
  - type: expression
    normative_status: preferred
    usage_info: de <i
    designation: déterminant
    gender: m
    plurality: singular
  definition: pour un ensemble ordonné de stem:[n] vecteurs dans un espace à stem:[n]
    dimensions muni d'une base donnée, scalaire attribué à cet ensemble par la seule
    forme multilinéaire qui prend la valeur 0 lorsque les vecteurs sont linéairement
    dépendants et la valeur 1 pour les vecteurs de base
  language_code: fra
  notes:
  - |-
    Lorsque les coordonnées des stem:[n] vecteurs stem:[U_1 , U_2 , ... , U_n] sont disposés selon les colonnes ou les lignes d'une matrice stem:[n xx n] , le déterminant des vecteurs est égal au déterminant de la matrice:

    stem:[det ( U_1 , U_2 , ... , U_n ) = | [[U_((11)),U_((12)),cdots,U_((1 n))],[U_((21)),U_((22)),cdots,U_((2 n))],[vdots,vdots,ddots,vdots],[U_((n 1)),U_((n 2)),cdots,U_((n n))]] |]
  - Selon le signe du déterminant, l'ensemble de vecteurs et la base donnée ont la
    même orientation ou des orientations contraires.
  - Pour l'espace euclidien à trois dimensions, le déterminant de trois vecteurs est
    le produit mixte des vecteurs.
  examples: []
  entry_status: Standard
  review_decision_event: published
