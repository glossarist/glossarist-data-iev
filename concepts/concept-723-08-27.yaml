    stem:[P](stem:[λ]) est la puissance spectrique rayonnée par la source à la longueur d'onde stem:[λ];

    stem:[V](stem:[λ]) est l'efficacité lumineuse relative spectrale en vision photoptique;

    stem:[K]~m~ est une constante
  language_code: fra
  notes:
