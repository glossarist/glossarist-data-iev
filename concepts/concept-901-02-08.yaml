eng:
  id: 901-02-08
  terms:
  - type: expression
    normative_status: preferred
    designation: technical specification
  definition: document that prescribes technical {{requirement, IEV:901-05-05}}s to
    be fulfilled by a product, process or service
  language_code: eng
  notes:
  - A technical specification should indicate, whenever appropriate, the procedure(s)
    by means of which it may be determined whether the requirements given are fulfilled.
  - A technical specification may be a {{standard, IEV:901-02-02}}, a part of a standard
    or independent of a standard.
