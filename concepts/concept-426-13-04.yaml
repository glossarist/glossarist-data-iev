eng:
  id: 426-13-04
  terms:
  - type: expression
    normative_status: preferred
    designation: enclosed-break device "nC"
  definition: device, incorporating electrical contacts that are made and broken,
    that will withstand an internal explosion of the flammable gas or vapour, which
    can enter it without it suffering damage and without communicating the internal
    explosion to the external flammable gas or vapour
  language_code: eng
  notes:
  - 'Enclosed-break device "nC" has been replaced by "dc" in IEC 60079-1, _Explosive
    atmospheres – Part 1: Equipment protection by flameproof enclosures "d"_.'
  examples: []
  entry_status: Standard
