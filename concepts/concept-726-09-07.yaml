eng:
  id: 726-09-07
  terms:
  - type: expression
    normative_status: preferred
    designation: binomial corner
  definition: a composite waveguide corner formed by more than two waveguide corners
    in succession approximately a quarter of a wavelength apart, each causing by itself
    an amplitude reflection factor approximately proportional in magnitude to a coefficient
    of a binomial series
  language_code: eng
  notes:
  - The exponent of the binomial will be (stem:[n] —1) where stem:[n] is the number
    of corners.
