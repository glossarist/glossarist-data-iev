eng:
  id: 801-22-05
  terms:
  - type: expression
    normative_status: preferred
    designation: sound power level
  definition: logarithm of the ratio of a given sound power to the reference sound
    power. Such power level in decibels is ten times the logarithm to the base ten
    of the ratio
  language_code: eng
  notes:
  - Unless otherwise specified, the reference sound power is 1 pW.
