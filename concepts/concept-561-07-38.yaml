eng:
  id: 561-07-38
  terms:
  - type: expression
    normative_status: preferred
    designation: warp
  definition: |-
    deformation of an unclamped wafer, defined as the maximum difference between a point on the front surface and a reference plane

    image::/assets/images/parts/561/561-fig27-en.png[]

    *Figure 27 – Schematic diagram of warp*
  language_code: eng
  notes:
  - The reference plane is defined by three points as described in {{561-07-27, IEV:561-07-27}},
    Note 1 to entry, item 2. Warp is a bulk property of a wafer and not of the exposed
    surface alone.
