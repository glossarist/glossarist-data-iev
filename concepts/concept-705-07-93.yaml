eng:
  id: 705-07-93
  terms:
  - type: expression
    normative_status: preferred
    designation: "(ionospheric) transmission factor"
  - type: expression
    designation: distance factor
  - type: expression
    designation: MUF factor
  - type: symbol
    designation: 'symbole: stem:[M]'
    international: true
  definition: in the case of a hop comprising only one ionospheric reflection at a
    given ionospheric layer and for a given distance, the ratio of the basic MUF to
    the critical frequency at the reflection point
  language_code: eng
  notes:
  - |-
    The symbol stem:[M] must be followed by the distance in kilometres, between parentheses and by the name of the ionospheric layer.

    Example: stem:[M](3000)F2.
  examples: []
  entry_status: Standard
  date_accepted: '1995-09-01T00:00:00+00:00'
