    stem:[T_v = ((- ln ( E_((vs)) // E_v )))/((a_v m))]

    où stem:[E]~vs~ est l'éclairement direct de faisceau sur une surface horizontale (au sol), stem:[E]~v~ est l'éclairement horizontal extraterrestre, stem:[a]~v~ est le coefficient d'extinction lumineuse, et stem:[m] est la masse d'air optique relative
  - L'unité de facteur lumineux réel est un.
