eng:
  id: 722-01-15
  terms:
  - type: expression
    normative_status: preferred
    designation: logatom
  definition: |-
    a phonetic element, chosen without inherent meaning, for use in telephonometry, consisting of a vowel sound preceded and followed by a consonant sound or a consonant combination sound

    Examples: BALP, KID, FROP.
  language_code: eng
  notes: []
  examples: []
