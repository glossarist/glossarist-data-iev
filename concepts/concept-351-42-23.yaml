eng:
  id: 351-42-23
  terms:
  - type: expression
    normative_status: preferred
    designation: observability
  definition: |-
    property of a system which implies that its initial state may be determined from input and output variables, which are observed within a finite time interval

    Note 1 to entry:  The observability is a global observability if this calculation is valid whatever this initial state may be.
  language_code: eng
  notes:
