eng:
  id: 845-25-104
  terms:
  - type: expression
    normative_status: preferred
    designation: photometric distance law
  definition: |-
    law relating the illuminance, stem:[E], on a real or imaginary surface to the luminous intensity, stem:[I], of an illuminating <a href="IEV845-21-033">point source</a> whereby

    stem:[E = ((I cos theta))/((d^2))]

    where stem:[θ] is the angle between the normal to the surface and the line between the surface and the source and stem:[d] is the distance between the source and the surface
  language_code: eng
  notes:
  - The photometric distance law strictly only applies for a point source. However,
    it can also be applied for non-point sources at sufficiently large distances within
    acceptable limits of error or measurement uncertainty; in this case the degree
    of approximation at the distance used should be confirmed by measurement.
  - For radiometric sources the equivalent term is "radiometric distance law".
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-25-104
  terms:
  - type: expression
    normative_status: preferred
    designation: loi de distance photométrique
    gender: f
    plurality: singular
  definition: |-
    loi qui associe l'éclairement, stem:[E], sur une surface réelle ou imaginaire à l'intensité lumineuse, stem:[I], d'une <a href="IEV845-21-033">source ponctuelle</a> éclairante selon laquelle

    stem:[E = ((I cos theta))/((d^2))]

    où stem:[θ] est l'angle entre la perpendiculaire à la surface et la ligne entre cette surface et la source et stem:[d] est la distance entre la source et la surface
  language_code: fra
  notes:
  - La loi de la distance photométrique s'applique strictement à une source ponctuelle
    uniquement. Toutefois, elle peut aussi s'appliquer aux sources non ponctuelles
    à des distances suffisamment grandes dans des limites acceptables d'erreur ou
    d'incertitude de mesure; dans ce cas, il convient de confirmer par mesurage le
    degré d'approximation à la distance utilisée.
  - Pour les sources radiométriques, le terme équivalent est "loi de distance radiométrique".
  examples: []
  entry_status: Standard
  review_decision_event: published
