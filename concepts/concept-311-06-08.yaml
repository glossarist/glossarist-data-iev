eng:
  id: 311-06-08
  terms:
  - type: expression
    normative_status: preferred
    designation: accuracy (of a measuring instrument)
  definition: quality which characterizes the ability of a measuring instrument to
    provide an indicated value close to a true value of the measurand
  language_code: eng
  notes:
  - This term is used in the "true value" approach.
  - Accuracy is all the better when the indicated value is closer to the corresponding
    true value.
  examples: []
  entry_status: Standard
