eng:
  id: 103-09-06
  terms:
  - type: expression
    normative_status: preferred
    designation: correlation function
  definition: |-
    . function stem:[f ( t )] which is a measure of the similarity of two deterministic functions stem:[f_1 ( t )] and stem:[f_2 ( t )], defined by

    stem:[f ( t ) = int_( - oo)^( + oo) f_1 ( tau ) f_2 ( t + tau ) d tau]
    .  function stem:[f ( t )] which is a measure of the similarity of two stationary random functions stem:[f_1 ( t )] and stem:[f_2 ( t )], defined by

    stem:[f ( t ) = underset((T -&gt; oo))((lim)) (1)/((2 T)) int_( - T)^( + T) f_1 ( tau ) f_2 ( t + tau ) d tau]
  language_code: eng
  notes:
  - |-
    The Fourier transform of stem:[f ( t )] is equal to the product of the conjugate of the Fourier transform of stem:[f_1 ( t )] and the Fourier transform of stem:[f_2 ( t )]:

    stem:[F ( omega ) = F_1^( ** ) ( omega ) F_2 ( omega )]
  examples: []
  entry_status: Standard
  date_accepted: '2009-12-01T00:00:00+00:00'
  date_amended: '2009-12-01T00:00:00+00:00'
