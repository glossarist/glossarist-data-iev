eng:
  id: 871-04-08
  terms:
  - type: expression
    normative_status: preferred
    designation: assistive technology
  definition: equipment, product system, hardware, software or service that is used
    to increase, maintain or improve capabilities of persons
  language_code: eng
  notes:
  - Assistive technology is an umbrella term that is broader than {{assistive products,
    IEV:871-04-04}}.
  - Assistive technology can include assistive services, and professional services
    needed for assessment, recommendation and provision.
