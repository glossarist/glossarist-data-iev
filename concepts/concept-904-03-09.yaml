    normative_status: preferred
    designation: mode
    gender: m
    plurality: singular
  definition: état ou condition de fonctionnement distinct d'un système
  language_code: fra
  notes:
  - Il convient de ne pas considérer comme partie de l’un de ces modes une éventuelle
    transition de l'équipement à partir ou vers un mode voisin, soit par intervention
    de l'utilisateur, soit automatiquement.
  - Le retard entre un stimulus et une réponse peut être remplacé par la consommation
    d’énergie en mode courant.
  - "Le Tableau 1 fournit une présentation structurée qui permet de mieux comprendre
    ce concept ainsi que d'autres concepts relatifs à l'efficacité énergétique et
    à la consommation d'énergie qui s'appliquent à tous les produits électrotechniques.
