eng:
  id: 904-03-05
  terms:
  - type: expression
    normative_status: preferred
    designation: protective function
  definition: function that operates after the occurrence of a failure in the equipment
    so as to prevent harm to persons or damage to property
  language_code: eng
  notes:
  - "The protective function can operate in different modes, for instance\r\n\r\n*
    a back-siphonage device fitted to a dishwasher can operate in an {{off mode, IEV:904-03-12}},\r\n*
    a flood protection device fitted to a washing machine can operate in an off mode
    or a {{partial on mode, IEV:904-03-11}}, and\r\n* a no-movement deactivation  switch
    \ fitted to an iron can operate in an {{on mode, IEV:904-03-10}}.\r\n"
  - |-
    Table 1 provides a structured overview as an aid to understanding this and other concepts relating to energy efficiency and power consumption applicable in electrotechnical products. Additional terms to fulfil the particular needs of particular product sectors should be defined within the structure of the concepts shown in Table 1.

    *Table 1 – Operating conditions of equipment in respect to power demand*

    <simg>

    As the number of functions increases from left to right in Table 1, the relevant modes will generally have higher energy consumption. The existence of a mode in Table 1 does not imply that a particular piece of equipment will offer that mode.</simg>
