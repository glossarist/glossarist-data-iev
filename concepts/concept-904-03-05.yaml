    designation: fonction de protection
    gender: f
    plurality: singular
  definition: fonction qui se déclenche suite à une défaillance de l'équipement, de
    manière à prévenir des dommages corporels et matériels
  language_code: fra
  notes:
  - "La fonction de protection peut fonctionner en diverses modes, par exemple\r\n\r\n*
    un dispositif de contre-siphonnement d'un lave-vaisselle peut fonctionner en {{mode
    d’arrêt, IEV:904-03-12}},\r\n* un dispositif de protection contre les inondations
    d'une machine à laver peut fonctionner en mode d’arrêt ou en {{mode de marche
    partielle, IEV:904-03-11}}, et\r\n* un contacteur de désactivation en l'absence
    de mouvement d'un fer à repasser peut fonctionner en {{mode de marche, IEV:904-03-10}}.\r\n"
