eng:
  id: 713-08-11
  terms:
  - type: expression
    normative_status: preferred
    designation: rebroadcast transmitter
  - type: expression
    designation: transposer
  definition: equipment for reception of the emissions of a sound or television broadcast
    transmitter and simultaneous transmission of the same programme on a different
    radio channel
  language_code: eng
  notes:
  - In English, the term “transposer” is used if the frequency translation is performed
    without demodulation.
