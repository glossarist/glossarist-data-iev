  terms:
  - type: expression
    normative_status: preferred
    designation: call congestion
  definition: the proportion of bids for a particular pool of resources which does
    not result in an immediate seizure estimated within a specified time interval
    by the ratio of unsuccessful bids to the total number of bids
  language_code: eng
  notes:
