fra:
  id: 821-12-21
  terms:
  - type: expression
    normative_status: preferred
    designation: taux de défaillance
    gender: m
    plurality: singular
  definition: limite du quotient de la probabilité conditionnelle pour que l'instant
    stem:[T] d'une défaillance d'un produit soit compris dans un intervalle de temps
    donné (stem:[t], stem:[t] &amp;plus; Δstem:[t]) par la durée Δstem:[t]de l'intervalle
    de temps lorsque Δstem:[t] tend vers zéro, en supposant que l'entité soit en état
    de disponibilité au début de l'intervalle de temps
  language_code: fra
  notes:
  - Pour les applications où la distance parcourue ou le nombre de cycles d’exploitation
    est mieux adaptée que le temps, l’unité de temps peut être remplacée par l’unité
    de distance ou le nombre de cycles, suivant le cas.
  - Le terme “taux de défaillance” est souvent utilisé dans le sens du “taux moyen
    de défaillance” définit en {{IEV 192-05-07, IEV:192-05-07}}.
  examples: []
  entry_status: Standard
