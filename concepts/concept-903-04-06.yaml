eng:
  id: 903-04-06
  terms:
  - type: expression
    normative_status: preferred
    designation: movable equipment
  definition: "equipment that is \r\n\r\n* either limited in mass and not fixed in
    place, \r\n* or provided with wheels, casters, or other means to facilitate movement
    by an {{ordinary person, IEV:195-04-03}} as required to perform its intended use"
  language_code: eng
  notes:
  - In some domains, "limited in mass" is considered to be "18 kg or less in mass".
  examples: []
  entry_status: Standard
  authoritative_source:
  - ref: IEC 62368-1:2010
    clause: 3.3.3.3
