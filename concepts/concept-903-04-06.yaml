fra:
  id: 903-04-06
  terms:
  - type: expression
    normative_status: preferred
    designation: équipement déplaçable
    gender: m
    plurality: singular
  definition: "équipement qui est\r\n\r\n* soit de masse limitée et non fixé en place,\r\n*
    soit fourni avec des roues, des roulettes ou un autre moyen permettant de faciliter
    les mouvements qu'une {{personne ordinaire, IEV:195-04-03}} doit exécuter selon
    son utilisation prévue"
  language_code: fra
  notes:
  - Dans certains domaines, "de masse limitée" est considéré comme étant "de masse
    inférieure ou égale à 18 kg".
