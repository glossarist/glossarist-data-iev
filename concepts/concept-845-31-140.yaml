eng:
  id: 845-31-140
  terms:
  - type: expression
    normative_status: preferred
    usage_info: in road lighting
    designation: installation azimuth
  - type: symbol
    designation: stem:[φ]
    international: true
  definition: angle a chosen reference direction makes with the vertical plane through
    a given point on a road surface and the first axis of a luminaire, when the luminaire
    is at its tilt during measurement
  language_code: eng
  notes:
  - The reference direction for a straight road is by convention the longitudinal
    direction.
  - The installation azimuth is expressed in radian (rad) or degree (°).
  examples: []
  entry_status: Standard
