eng:
  id: 114-02-02
  terms:
  - type: expression
    normative_status: preferred
    designation: reaction rate
  - type: symbol
    designation: |-
      stem:[r]
      stem:[K]
      stem:[v]
    international: true
  definition: |-
    for a given chemical reaction stem:[α]A + stem:[β]B + … ↔ stem:[σ]S + stem:[τ]T + …, quantity given by

    stem:[r = (1)/(alpha) ((d c ( A )))/((d t)) = (1)/(beta) ((d c ( B )))/((d t)) = (1)/(sigma) ((d c ( S )))/((d t)) = (1)/(tau) ((d c ( T )))/((d t))]

    where A, B, ... denote reactants, S, T, ... denote products, −stem:[α], −stem:[β], …, stem:[σ], stem:[τ], … are the corresponding stoichiometric numbers, and stem:[c](A), stem:[c](B), …, stem:[c](S), stem:[c](T), … are the amount-of-substance concentrations of A, B, ... S, T, ..., respectively
  language_code: eng
  notes:
  - The coherent SI unit of reaction rate is mole per cubic metre second, mol m^−3^
    s^−1^.
  examples: []
  entry_status: Standard
  date_accepted: '2014-03-01T00:00:00+00:00'
  date_amended: '2014-03-01T00:00:00+00:00'
  review_date: '2014-03-01T00:00:00+00:00'
  review_decision_date: '2014-03-01T00:00:00+00:00'
  review_decision_event: published
