fra:
  id: 845-21-089
  terms:
  - type: expression
    normative_status: preferred
    usage_info: d'une source de lumière
    designation: efficacité lumineuse
    gender: f
    plurality: singular
  definition: |-
    quotient du flux lumineux émis par la puissance consommée

    stem:[eta_v = ((Phi_v))/(P)]

    où stem:[Φ]~v~ est le flux lumineux et stem:[P] est la puissance consommée par la source de lumière
  language_code: fra
  notes:
  - Il faut spécifier si la puissance consommée par la source de lumière inclut ou
    non la puissance dissipée par d'éventuels équipements auxiliaires tels que des
    ballasts.
  - L'efficacité lumineuse d'une source de lumière est exprimée en lumen par watt
    (lm·W^−1^).
  - Cet article était numéroté 845-01-55 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
