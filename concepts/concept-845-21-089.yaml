eng:
  id: 845-21-089
  terms:
  - type: expression
    normative_status: preferred
    usage_info: of a light source
    designation: luminous efficacy
  - type: symbol
    designation: |-
      stem:[η]~v~
      stem:[η]
    international: true
  definition: |-
    quotient of the emitted luminous flux and the power consumed

    stem:[eta_v = ((Phi_v))/(P)]

    where stem:[Φ]~v~ is luminous flux and stem:[P] is the power consumed by the light source
  language_code: eng
  notes:
  - It has to be specified whether or not the power dissipated by auxiliary equipment
    such as ballasts, if any, is included in the power consumed by the light source.
  - The luminous efficacy of a light source is expressed in lumen per watt (lm·W^−1^).
  - This entry was numbered 845-01-55 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
