eng:
  id: 351-44-01
  terms:
  - type: expression
    normative_status: preferred
    designation: functional diagram
  definition: |-
    symbolic representation of the actions in a system by functional blocks, summing points and branching points linked by action lines

    SEE: Figures 1 and 2.
  language_code: eng
  notes:
  - The action lines do not necessarily represent physical connections, like electrical
    wires.
  - Functional blocks, action lines, summing points, and branching points are elements
    of the functional diagram.
  - |-
    This entry was numbered 351-23-01 in IEC 60050-351:2006.

    image::/assets/images/parts/351/351-fig2-en.png[Figure 2 - Functional diagram indicating typical elements of an elementary closed-loop control system]
