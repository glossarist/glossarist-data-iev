fra:
  id: 351-44-01
  terms:
  - type: expression
    normative_status: preferred
    designation: schéma fonctionnel
    gender: m
    plurality: singular
  definition: |-
    représentation symbolique des actions dans un système par des blocs fonctionnels, points de sommation et points de branchement reliés par des lignes d'action

    VOIR: Figures 1 et 2.
  language_code: fra
  notes:
  - Les lignes d'action ne représentent pas nécessairement des connexions physiques,
    comme des fils électriques.
  - Les blocs fonctionnels, lignes d’actions, points de sommation et points de branchement
    sont les éléments du schéma fonctionnel.
  - |-
    Cet article était numéroté 351-23-01 dans la CEI 60050-351:2006.

    image::/assets/images/parts/351/351-fig2-fr.png[Figure 2 - Schéma fonctionnel montrant les composants types d'un système élémentaire de commande en boucle fermée]
