eng:
  id: 415-06-01
  terms:
  - type: expression
    normative_status: preferred
    designation: sound pressure level
  definition: logarithm of the ratio of the r.m.s. value of a given sound pressure
    to the reference sound pressure.
  language_code: eng
  notes:
  - Sound pressure level in decibels is 20 times the logarithm to the base ten of
    this ratio
  - For WTGS, the reference sound pressure is equal to 20 µPa.
  examples: []
  entry_status: Standard
