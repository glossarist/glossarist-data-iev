  terms:
  - type: expression
    normative_status: preferred
    designation: relative error
  definition: ratio of the absolute error to a comparison value
  language_code: eng
  notes:
  - This term is used in the "true value" approach.
  - The comparison value should be a true value of the quantity but, since a true
    value cannot be determined, in general, a conventional true value is used.
