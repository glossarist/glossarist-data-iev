eng:
  id: 845-25-064
  terms:
  - type: expression
    normative_status: preferred
    usage_info: of a detector
    designation: relative spectral responsivity
  - type: symbol
    designation: stem:[s]~r~(stem:[λ])
    international: true
  definition: |-
    quotient of the spectral responsivity, stem:[s](stem:[λ]), of the detector at wavelength, stem:[λ], and a specified reference value, stem:[s]~m~

    stem:[s_r ( lambda ) = ((s ( lambda )))/((s_m))]
  language_code: eng
  notes:
  - The specified reference value, stem:[s]~m~, can be an average value, a maximum
    value or an arbitrarily chosen value of stem:[s](stem:[λ]).
  - The relative spectral responsivity has unit one.
  - This entry was numbered 845-05-57 in IEC 60050-845:1987.
