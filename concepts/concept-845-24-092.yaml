eng:
  id: 845-24-092
  terms:
  - type: expression
    normative_status: preferred
    usage_info: of a homogeneous non-diffusing layer
    designation: Napierian spectral absorption coefficient
  - type: symbol
    designation: stem:[a]~n~(stem:[λ])
    international: true
  definition: |-
    quotient of the natural (Napierian) logarithm of the reciprocal of the spectral internal transmittance, stem:[τ]~i~(stem:[λ]), of a layer of the medium and the length, stem:[l], of the path of a beam of radiation traversing that layer

    stem:[a_n ( lambda ) = - ((ln tau_i ( lambda )))/(l) = ((log tau_i ( lambda )))/(l) ln(10) = ((A_n ( lambda )))/(l)]

    where stem:[A]~n~(stem:[λ]) is Napierian spectral absorbance.
  language_code: eng
  notes:
  - The Napierian spectral absorption coefficient is expressed in metre to the power
    minus one (m^−1^).
  - This entry was numbered 845-04-85 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-24-092
  terms:
  - type: expression
    normative_status: preferred
    usage_info: d'une couche homogène non diffusante
    designation: coefficient d'absorption spectral népérien
    gender: m
    plurality: singular
  definition: |-
    quotient du logarithme naturel (népérien) de l'inverse du facteur de transmission interne spectral stem:[τ]~i~(stem:[λ]), d'une couche du milieu par la longueur, stem:[l], du trajet d'un faisceau de rayonnement traversant cette couche

    stem:[a_n ( lambda ) = - ((ln tau_i ( lambda )))/(l) = ((log tau_i ( lambda )))/(l) ln(10) = ((A_n ( lambda )))/(l)]

    où stem:[A]~n~(stem:[λ]) est l'absorbance spectrale népérienne.
  language_code: fra
  notes:
  - Le coefficient d'absorption spectral népérien est exprimé en mètre à la puissance
    moins un (m^−1^).
  - Cet article était numéroté 845-04-85 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
