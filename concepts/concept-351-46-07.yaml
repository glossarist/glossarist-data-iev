    normative_status: preferred
    designation: marge de gain
    gender: f
    plurality: singular
  definition: |-
    inverse de la réponse en gain en boucle ouverte à la pulsation critique

    VOIR: Figure 9.
  language_code: fra
  notes:
  - Dans la représentation logarithmique de la réponse en gain en boucle ouverte,
    la valeur de la marge de gain stem:[G]~m~ peut être lue comme le logarithme négatif
    −lgstem:[G]~m~ à la pulsation critique. stem:[G]~m~ résulte de stem:[G]~m~ = |stem:[G]~0~(jstem:[ω]~π~)|^–1^
    (voir Figure 10).
  - |-
