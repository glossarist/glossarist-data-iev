fra:
  id: 112-01-03
  terms:
  - type: expression
    normative_status: preferred
    designation: symbole de grandeur
    gender: m
    plurality: singular
  definition: caractère ou combinaison de caractères représentant une {{grandeur,
    IEV:112-01-01}}
  language_code: fra
  notes:
  - Les symboles de grandeur simples sont constitués de préférence par une seule lettre,
    ou dans certains cas par deux lettres, de l'alphabet latin ou grec, et peuvent
    comprendre des indices inférieurs ou supérieurs ou d'autres signes modificateurs.
    Les lettres sont imprimées en caractères italiques (penchés), en utilisant de
    préférence une police avec empattements. Les indices sont imprimés en caractères
    romains (droits) ou, s'ils désignent des grandeurs, des variables ou des nombres,
    en caractères italiques (penchés). Voir l'ISO 80000-1  et l'IEC 60027-1 pour plus
    de détails et pour la combinaison de symboles.
  - "Des symboles de grandeur normalisés sont donnés dans les Normes internationales
    ISO 80000, IEC 80000 et IEC 60027. Exemples\n\n<table style=\"width: 384px;\"
    cellpadding=\"2\" border=\"solid\">\r\n<tbody>\r\n<tr>\r\n<td style=\"width: 294px;\">\n\n<strong><span>Nom
    de grandeur</span></strong>\r\n</td>\r\n<td style=\"width: 70px;\">\n\n<strong><span>Symbole
    de grandeur</span></strong>\r\n</td>\r\n</tr>\r\n<tr>\r\n<td style=\"width: 294px;\">\n\ntemps,
    durée\r\n</td>\r\n<td style=\"width: 70px;\">\n\nstem:[t]\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
    style=\"width: 294px;\">\n\nlongueur d'onde\r\n</td>\r\n<td style=\"width: 70px;\">\n\nstem:[λ]\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
    style=\"width: 294px;\">\n\nangle solide\r\n</td>\r\n<td style=\"width: 70px;\">\n\nstem:[Ω]\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
    style=\"width: 294px;\">\n\nrésistance électrique\r\n</td>\r\n<td style=\"width:
    70px;\">\n\nstem:[R]\r\n</td>\r\n</tr>\r\n<tr>\r\n<td style=\"width: 294px;\">\n\nfacteur
    de frottement statique\r\n</td>\r\n<td style=\"width: 70px;\">\n\nstem:[µ]~s~\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
    style=\"width: 294px;\">\n\ndébit-volume\r\n</td>\r\n<td style=\"width: 70px;\">\n\nstem:[qV]\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
    style=\"width: 294px;\">\n\nstem:[k]^ème^ force dans un système de forces\r\n</td>\r\n<td
    style=\"width: 70px;\">\n\nstem:[Fk]\r\n</td>\r\n</tr>\r\n<tr>\r\n<td style=\"width:
    294px;\">\n\nchamp électrique\r\n</td>\r\n<td style=\"width: 70px;\">\n\nstem:[E]\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
    style=\"width: 294px;\">\n\ncomposante stem:[x] du champ électrique\r\n</td>\r\n<td
    style=\"width: 70px;\">\n\nstem:[Ex]\r\n</td>\r\n</tr>\r\n<tr>\r\n<td style=\"width:
    294px;\">\n\nnombre de Reynolds\r\n</td>\r\n<td style=\"width: 70px;\">\n\nstem:[Re]\r\n</td>\r\n</tr>\r\n</tbody>\r\n</table>"
