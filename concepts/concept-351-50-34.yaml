eng:
  id: 351-50-34
  terms:
  - type: expression
    normative_status: preferred
    designation: dividing element
  definition: "functional unit with two inputs and one output the value of the output
    variable of which is equal to the quotient of the value of the first input variable
    multiplied by a constant weighting factor to the second input variable multiplied
    by a constant weighting factor according to the formula\n\nstem:[v ( t ) = K_0
    * ((K_1 * u_1 ( t )))/((K_2 * u_2 ( t )))]\n\nwhere<table>\r\n<tr>\n<td>stem:[t]</td>\n<td>is
    the time;</td>\n</tr>\r\n<tr>\n<td>\nstem:[K]~0~, stem:[K]~1~ ...</td>\n<td>are
    the weighting factors;</td>\n</tr>\r\n<tr>\n<td>\nstem:[u]~1~, stem:[u]~2~\n</td>\n<td>are
    the input variables;</td>\n</tr>\r\n<tr>\n<td>stem:[v]</td>\n<td>is the division
    result.</td>\n</tr>\r\n</table>"
  language_code: eng
  notes:
  - This entry was numbered 351-32-18 in IEC 60050-351:2006.
  examples: []
  entry_status: Standard
  date_accepted: '2013-11-01T00:00:00+00:00'
