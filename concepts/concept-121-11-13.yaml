eng:
  id: 121-11-13
  terms:
  - type: expression
    normative_status: preferred
    designation: "(electric) current"
  - type: expression
    normative_status: preferred
    designation: "(conduction) current"
  - type: symbol
    designation: stem:[I]
    international: true
  definition: |-
    scalar quantity equal to the flux of the electric current density *stem:[J]* through a given directed surface S:

    stem:[I = underset(S)( int ) J * e_n d A]

    where stem:[*e*]~n~dstem:[A] is the vector surface element
  language_code: eng
  notes:
  - The electric current through a surface is equal to the limit of the quotient of
    the electric charge transferred through that surface during a time interval by
    the duration of this interval when this duration tends to zero.
  - For charge carriers confined to a surface, the electric current is defined through
    a curve of this surface (see the note to term “lineic electric current”).
  examples: []
  entry_status: Standard
  classification: Preferred
  date_accepted: '1998-08-01T00:00:00+00:00'
  date_amended: '1998-08-01T00:00:00+00:00'
  review_date: '1998-08-01T00:00:00+00:00'
