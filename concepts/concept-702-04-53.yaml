eng:
  id: 702-04-53
  terms:
  - type: expression
    normative_status: preferred
    designation: quadrature signal
  - type: expression
    normative_status: preferred
    designation: harmonic conjugate signal
  definition: imaginary part stem:[g](stem:[t]) of an {{analytic signal, IEV:702-04-52}}
  language_code: eng
  notes:
  - |-
    The name "quadrature signal" is justified by the fact that, apart from sign changes, sin stem:[ωt] and cos stem:[ωt] are Hilbert transforms of each other and that consequently the analytic signal corresponding to the real signal cos stem:[ωt] is:

    e^jstem:[ωt]^
