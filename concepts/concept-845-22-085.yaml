fra:
  id: 845-22-085
  terms:
  - type: expression
    normative_status: preferred
    designation: niveau de visibilité
    gender: m
    plurality: singular
  definition: |-
    quotient de la différence réelle de luminance entre la cible et son fond, Δstem:[L], par la différence de luminance nécessaire entre une cible d'une certaine dimension angulaire et son fond pour que la cible soit simplement visible, Δstem:[L]~th~, à savoir au niveau du seuil

    stem:[F]~VL~ = Δstem:[L] / Δstem:[L]~th~
  language_code: fra
  notes:
  - Le niveau de visibilité indique le degré d'élévation du contraste de la cible
    par rapport au contraste seuil.
  - L'unité de niveau de visibilité est un.
  examples: []
  entry_status: Standard
  review_decision_event: published
