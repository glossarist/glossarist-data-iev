eng:
  id: 171-02-15
  terms:
  - type: expression
    normative_status: preferred
    designation: mebi
  - type: symbol
    designation: Mi
    international: true
  definition: "{{binary prefix, IEV:112-01-27}} used to form the multiple 2^20^ of
    a measurement unit"
  language_code: eng
  notes:
  - The prefix mebi has for origin megabinary, (2^10^)^2^, derived from the SI prefix
    mega, (10^3^)^2^.
  examples:
  - One mebibyte = 1 MiB = (1 024)^2^ B = 1 048 576 B.
  entry_status: Standard
