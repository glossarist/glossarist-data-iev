  terms:
  - type: expression
    normative_status: preferred
    designation: roll axis
  definition: the first of a set of three orthogonal coordinate axes, called the roll,
    pitch and yaw axes, defined by convention for a spacecraft and used as a reference
    for locating elements of the spacecraft, for describing rotation of the spacecraft
    and for specifying the attitude of the spacecraft relative to a system of external
    coordinates
  language_code: eng
  notes:
  - For a geostationary satellite the roll axis is usually made approximately tangent
    to the orbit.
