eng:
  id: 445-01-16
  terms:
  - type: expression
    normative_status: preferred
    designation: retriggerable interval relay with control signal off
  - type: expression
    normative_status: preferred
    designation: fleeting off delay relay
  definition: |-
    time relay in which the output immediately changes to the operate condition and the time delay starts when applying the power supply and removing the control signal; the output switches to the release condition after the setting time has elapsed (see Figure 13)

    image::/assets/images/parts/445/445-01-16en.gif[]
  language_code: eng
  notes:
  - "– Cycling the control signal during the time delay will retrigger the time delay."
  examples: []
  entry_status: Standard
  classification: Preferred
