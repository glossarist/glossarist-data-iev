eng:
  id: 221-03-40
  terms:
  - type: expression
    normative_status: preferred
    designation: magnetic field strength anisotropy factor
  - type: symbol
    designation: stem:[T]~stem:[H]~
    international: true
  definition: |-
    of electrical steel, the ratio of the difference between the peak value of the magnetic field strength stem:[hat H_(alpha)] measured at an angle stem:[α] to the direction of rolling, and the peak value of the magnetic field strength stem:[hat H_0] measured along the direction of rolling, to stem:[hat H_0], at a stated peak value of the magnetic flux density, the ratio being expressed as a percentage:

    stem:[T_H = ((hat H_(alpha) - hat H_0))/((hat H_0)) xx 100 %]
  language_code: eng
  notes:
  - The measurements of stem:[hat H_(alpha)] andstem:[hat H_0] are to be made under
    the same conditions.
  examples: []
  entry_status: Standard
  date_accepted: '1990-10-01T00:00:00+00:00'
  date_amended: '1990-10-01T00:00:00+00:00'
  review_date: '1990-10-01T00:00:00+00:00'
  review_decision_date: '1990-10-01T00:00:00+00:00'
  review_decision_event: published
