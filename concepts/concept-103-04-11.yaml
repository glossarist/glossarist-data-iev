eng:
  id: 103-04-11
  terms:
  - type: expression
    normative_status: preferred
    designation: wavelet
  definition: small localized wave, represented by a function having a zero mean value
    and a practically finite duration
  language_code: eng
  notes:
  - 'From a mother wavelet stem:[psi ( t )], daughter wavelets are obtained through
    shifting and scaling (expansion or compression): stem:[psi_((a , b)) ( t ) = (1)/((sqrt(a)))
    psi ( ((t - b))/(a) )], where stem:[a] is a scale parameter and stem:[b] a position
    parameter.'
  - "Examples (see Figures 3 and 4):\n\n\n\n* Haar wavelet: stem:[psi ( t ) = - 1]
    for −1/2 &lt; stem:[t] &lt; 0, stem:[psi ( t ) = 1] for 0 &lt; stem:[t] &lt; 1/2,
    stem:[psi ( t ) = 0] outside; \n\n* Morlet wavelet: stem:[psi ( t ) = e^(- t^2
    // 2) e^(- j omega t)] (example of exponential damping; Figure 4 gives the real
    part). \n\n\nimage::/assets/images/parts/103/103-04-118.png[Figure 4 - Morlet
    wavelet ; Ondelette de Morlet]"
  examples: []
  entry_status: Standard
  date_accepted: '2009-12-01T00:00:00+00:00'
  date_amended: '2009-12-01T00:00:00+00:00'
  review_date: '2009-12-01T00:00:00+00:00'
  review_decision_date: '2009-12-01T00:00:00+00:00'
  review_decision_event: published
