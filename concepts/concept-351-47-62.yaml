fra:
  id: 351-47-62
  terms:
  - type: expression
    normative_status: preferred
    designation: circuit de réarmement
    gender: m
    plurality: singular
  definition: |-
    système de commutation comportant une chaîne d’action fermée, contenant au moins un élément de mémoire binaire, de sorte qu’en commençant par une commande de démarrage, une variable réglante constante influe sur le système commandé pour réduire la valeur absolue de la différence (stem:[w]−stem:[x]) jusqu’à ce que la valeur de la variable commandée stem:[x] atteigne la valeur de la variable de référence stem:[w] pour la première fois

    VOIR: Figure 12.
  language_code: fra
  notes:
  - Un circuit de réarmement a une action ouverte, bien que la structure ait une chaîne
    d'action fermée (voir Figure 12).
  - |-
    Cet article était numéroté 351-26-56 dans la CEI 60050-351:2006.

