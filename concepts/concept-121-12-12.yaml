eng:
  id: 121-12-12
  terms:
  - type: expression
    normative_status: preferred
    designation: "(absolute) permittivity"
  - type: symbol
    designation: stem:[ε]
    international: true
  definition: |-
    scalar or tensor quantity the product of which by the electric field strength stem:[*E*]  in a medium is equal to the electric flux density stem:[*D*]:

    stem:[*D*] = stem:[ε *E*]
  language_code: eng
  notes:
  - For an isotropic medium the permittivity is a scalar quantity; for an anisotropic
    medium it is a tensor quantity.
  examples: []
  entry_status: Standard
