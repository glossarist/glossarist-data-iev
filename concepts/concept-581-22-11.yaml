fra:
  id: 581-22-11
  terms:
  - type: expression
    normative_status: preferred
    designation: contact à souder
    gender: m
    plurality: singular
  definition: contact destiné à la fixation d’un conducteur par soudure
  language_code: fra
  notes:
  - |-
    Les contacts à souder peuvent comprendre, notamment, les types suivants:

    a) le fil est entouré par la sortie: fût, godet, coupe, puits, etc.,

    b) le fil entoure la sortie: poteau, borne, queue, etc.,

    c) le fil passe à travers la sortie: œillet, crochet, etc.,

    d) aucun fil n’est mis en œuvre comme dans les applications pour circuit imprimé: bornes de broches à souder, sorties TMS (par exemple ailes en plier) coulée, queue, etc.
  examples: []
