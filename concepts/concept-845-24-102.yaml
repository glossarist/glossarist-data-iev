eng:
  id: 845-24-102
  terms:
  - type: expression
    normative_status: preferred
    usage_info: of a retroreflector
    designation: coefficient of luminous intensity
  - type: symbol
    designation: stem:[R]
    international: true
  definition: |-
    quotient of the luminous intensity, stem:[I], of the retroreflector in the direction of observation and the illuminance, stem:[E_( _|_ )], at the retroreflector on a plane perpendicular to the direction of the incident light

    stem:[R = (I)/((E_( _|_ )))]
  language_code: eng
  notes:
  - The coefficient of luminous intensity is expressed in candela per lux (cd·lx^−1^).
  - This entry was numbered 845-04-96 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
