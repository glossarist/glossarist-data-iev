  terms:
  - type: expression
    normative_status: preferred
    designation: equivocation
  - type: symbol
    designation: stem:[H_( + ) ( X | Y )]
    international: true
  definition: "{{conditional entropy, IEV:171-07-23}} of a specific set of messages
    stem:[X] at a message source given a specific set of messages stem:[Y] at a message
    sink that is connected to the message source by a specific channel"
  language_code: eng
  notes:
  - The equivocation is the mean additional {{information content, IEV:171-07-14}}
