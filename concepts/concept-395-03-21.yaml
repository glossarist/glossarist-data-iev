eng:
  id: 395-03-21
  terms:
  - type: expression
    normative_status: preferred
    designation: well-type ionization chamber
  definition: ionization chamber for measuring the activity of radiation emitters
    of appreciable volume where the solid angle for detection of the radiation is
    approximately 4π steradians, and comprising a central cylindrical well in which
    the sources are placed for measurement
  language_code: eng
  notes:
  - This entry was numbered 394-25-24 in IEC 60050-394:2007.
