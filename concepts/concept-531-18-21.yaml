  terms:
  - type: expression
    normative_status: preferred
    designation: class B operation
  definition: the operation of an electronic tube in such a way that output current
    flows for approximately half of each electrical cycle when a pure sinusoidal input
    signal is used
  language_code: eng
  notes:
  - |-
