eng:
  id: 212-17-11
  terms:
  - type: expression
    normative_status: preferred
    designation: polychlorinated benzene
  definition: insulating liquid consisting of a mixture of several isomeric and homologous
    compounds, obtained by replacement of three or four atoms of hydrogen in the benzene
    molecule with chlorine atoms
  language_code: eng
  notes:
  - Due to the chlorine content, chlorinated compounds are considered harmful to the
    environment, and their use is prohibited in many countries.
