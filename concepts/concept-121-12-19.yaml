eng:
  id: 121-12-19
  terms:
  - type: expression
    normative_status: preferred
    designation: electric susceptibility
  - type: symbol
    designation: |-
      stem:[χ]
      stem:[χ]~e~
    international: true
  definition: |-
    scalar or tensor quantity the product of which by the electric constant stem:[ε]~0~ and by the electric field strength stem:[*E*]  is equal to the electric polarization stem:[*P*]:

    stem:[*P*] = stem:[ε]~0~ stem:[χ] stem:[*E*]
  language_code: eng
  notes:
  - For an isotropic medium the electric susceptibility is a scalar; for an anisotropic
    medium it is a tensor.
  examples: []
  entry_status: Standard
  date_accepted: '1998-08-01T00:00:00+00:00'
  date_amended: '1998-08-01T00:00:00+00:00'
