  terms:
  - type: expression
    normative_status: preferred
    designation: susceptibilité électrique
    gender: f
    plurality: singular
  definition: |-
    grandeur scalaire ou tensorielle dont le produit par la constante électrique stem:[ε]~0~ et par le champ électrique stem:[*E*] est égal à la polarisation électrique stem:[*P*]:

    stem:[*P*] = stem:[ε]~0~ stem:[χ] stem:[*E*]
  language_code: fra
  notes:
  - La susceptibilité électrique est une grandeur scalaire dans un milieu isotrope,
    une grandeur tensorielle dans un milieu anisotrope.
  examples: []
