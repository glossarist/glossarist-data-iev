    gender: f
    plurality: singular
  definition: |-
    structure fonctionnelle d'un système de régulation avec plusieurs niveaux de commande se recouvrant, dans laquelle le régulateur affecté au plus haut niveau coordonne le travail des régulateurs affectés au niveau inférieur suivant, générant par exemple les variables de commande, les variables de référence ou les variables commandées finales

    VOIR: Figure 24.
  language_code: fra
