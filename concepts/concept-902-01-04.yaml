  terms:
  - type: expression
    normative_status: preferred
    designation: third-party conformity assessment activity
  definition: conformity assessment activity that is performed by a person or body
    that is independent of the person or organization that provides the object, and
    of user interests in that object
  language_code: eng
  notes:
  - Criteria for the independence of conformity assessment bodies and accreditation
    bodies are provided in the International Standards and Guides applicable to their
    activities (see Bibliography in ISO/IEC 17000).
