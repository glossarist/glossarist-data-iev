eng:
  id: 102-05-29
  terms:
  - type: expression
    normative_status: preferred
    usage_info: of a vector field
    designation: Laplacian
  definition: |-
    vector Δ*stem:[U]* associated at each point of a given space region with a vector *stem:[U]*, equal to the gradient of the divergence of the vector field minus the rotation of the rotation of this vector field

    Δ*stem:[U]* = *grad* div *stem:[U]* − *rot rot stem:[U]*
  language_code: eng
  notes:
  - |-
    In orthonormal Cartesian coordinates, the three components of the Laplacian of a vector field are:

    stem:[((del^2 U_x))/((del x^2)) + ((del^2 U_x))/((del y^2)) + ((del^2 U_x))/((del z^2)) , ((del^2 U_y))/((del x^2)) + ((del^2 U_y))/((del y^2)) + ((del^2 U_y))/((del z^2)) , ((del^2 U_z))/((del x^2)) + ((del^2 U_z))/((del y^2)) + ((del^2 U_z))/((del z^2))].
  - The Laplacian of the vector field *stem:[U]* is denoted by Δ*stem:[U]* or ∇^2^*stem:[U]*,
    where Δ is the Laplacian operator.
  examples: []
  entry_status: Standard
  date_accepted: '2008-08-01T00:00:00+00:00'
  date_amended: '2008-08-01T00:00:00+00:00'
  review_date: '2008-08-01T00:00:00+00:00'
  review_decision_date: '2008-08-01T00:00:00+00:00'
  review_decision_event: published
