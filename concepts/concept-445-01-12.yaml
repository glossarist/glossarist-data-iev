eng:
  id: 445-01-12
  terms:
  - type: expression
    normative_status: preferred
    designation: pulse delayed relay with control signal
  definition: |-
    time relay in which the time delay starts when applying the power supply and the control signal; the output momentarily switches for an interval to the operate condition after the setting time has elapsed (see Figure 9)

    image::/assets/images/parts/445/445-01-12en.gif[]
  language_code: eng
  notes:
  - 1 – Cycling the control signal during the time delay will not retrigger the time
    delay.
  - 2 – Manufacturer should specify if interval is fixed or variable.
  examples: []
  entry_status: Standard
  date_accepted: '2010-10-01T00:00:00+00:00'
  date_amended: '2010-10-01T00:00:00+00:00'
  review_date: '2010-10-01T00:00:00+00:00'
  review_decision_date: '2010-10-01T00:00:00+00:00'
  review_decision_event: published
