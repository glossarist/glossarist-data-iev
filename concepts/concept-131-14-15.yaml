eng:
  id: 131-14-15
  terms:
  - type: expression
    normative_status: preferred
    designation: forward transfer admittance
  - type: expression
    designation: transfer admittance
  definition: for a linear two-terminal-pair network or stem:[n]-terminal-pair network,
    quotient of the phasor representing the electric current at an output port by
    the phasor representing the voltage at an input port, when all other ports are
    connected to specified terminating immittances
  language_code: eng
  notes:
  - The output is usually short-circuited.
