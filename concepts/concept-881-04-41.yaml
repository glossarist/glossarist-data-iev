  definition: |-
    probabilité par unité de temps pour que le noyau d'un radionucléide se désintègre spontanément. Elle est donnée par:

    stem:[lambda = - (1)/(N) * ((d N))/((d t))]

    où stem:[N] est le nombre de noyaux existant à l'instant stem:[t]
