eng:
  id: 881-04-41
  terms:
  - type: expression
    normative_status: preferred
    designation: decay constant
  - type: expression
    normative_status: preferred
    designation: disintegration constant
  - type: symbol
    designation: stem:[λ]
    international: true
  definition: |-
    for a radionuclide, the probability per unit time for the spontaneous decay if one of its nuclei. It is given by:

    stem:[lambda = - (1)/(N) * ((d N))/((d t))]

    in which stem:[N] is the number of nuclei of concern existing at time stem:[t]
  language_code: eng
