eng:
  id: 103-03-01
  terms:
  - type: expression
    normative_status: preferred
    designation: unit step function
  - type: expression
    designation: Heaviside function
  - type: symbol
    designation: ε
    international: true
  definition: function, zero for all negative values of the independent variable and
    equal to one for all positive values
  language_code: eng
  notes:
  - See Figure 1 below for a graphical representation of ε(stem:[t]). The value ε(0)
    may remain undefined or may be defined according to the context.
  - ε(stem:[x] − stem:[x]~0~) denotes a unit step at the value stem:[x]~0~ of the
    independent variable stem:[x].
  - |-
    Notation H(stem:[x]) is also used. Notation ϑ(stem:[t]) is used for the unit step function of time. Notation ϒ(stem:[x]) has also been used.

    image::/assets/images/parts/103/103-03-015.png[Figure 1 - Représentation graphique de ε(stem:[t]); Graphical representation of ε(stem:[t])]
