eng:
  id: 102-01-04
  terms:
  - type: expression
    normative_status: preferred
    designation: subset
  definition: set, the elements of which all belong to a given set
  language_code: eng
  notes:
  - The notation stem:[A sube B] expresses that the set stem:[A] is a subset of the
    set stem:[B]. The symbol stem:[sub] is sometimes used instead of stem:[sube],
    but this is not recommended. stem:[A] is also said to be included in stem:[B].
  examples: []
  entry_status: Standard
