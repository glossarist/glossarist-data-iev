fra:
  id: 102-01-04
  terms:
  - type: expression
    normative_status: preferred
    designation: sous-ensemble
    gender: m
    plurality: singular
  - type: expression
    usage_info: d'un ensemble
    designation: partie
    gender: f
    plurality: singular
  definition: ensemble dont les éléments appartiennent tous à un ensemble donné
  language_code: fra
  notes:
  - La notation stem:[A sube B] exprime que l'ensemble stem:[A] est un sous-ensemble
    ou une partie de l'ensemble stem:[B]. Le symbole stem:[sub] est parfois employé
    au lieu de stem:[sube], mais ce n'est pas recommandé. On dit aussi que stem:[A]
    est inclus ou contenu dans stem:[B].
  examples: []
  entry_status: Standard
  review_decision_event: published
