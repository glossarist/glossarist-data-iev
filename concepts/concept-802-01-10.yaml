fra:
  id: 802-01-10
  terms:
  - type: expression
    normative_status: preferred
    designation: intensité instantanée
    gender: f
    plurality: singular
  definition: débit de l’énergie acoustique dans le sens de propagation par unité
    d’aire perpendiculaire au sens de propagation
  language_code: fra
  notes:
  - |-
    L’intensité instantanée est le produit de la pression acoustique instantanée et de la vitesse acoustique instantanée des particules. Il est difficile de mesurer l’intensité dans la plage de fréquences ultrasoniques. À des fins de mesure et s’il est raisonnable de prendre pour hypothèse que la pression acoustique instantanée et la vitesse instantanée des particules sont substantiellement en phase le long de l’axe (d’alignement) du faisceau pour une fréquence donnée, alors l’intensité instantanée, [stem:[I(t)]], est approchée comme suit

    stem:[p(t)]^2^/stem:[ρc]

    où

    stem:[p(t)] est la pression acoustique instantanée;

    stem:[ρ]  est la densité du milieu;

    stem:[c]  est la vitesse du son dans le milieu.
  examples: []
  entry_status: Standard
  authoritative_source:
