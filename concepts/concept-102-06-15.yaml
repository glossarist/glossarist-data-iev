eng:
  id: 102-06-15
  terms:
  - type: expression
    normative_status: preferred
    designation: singular matrix
  definition: square matrix of order stem:[n] with elements stem:[A]~stem:[ij]~, for
    which the stem:[n] vectors *stem:[V]*~stem:[i]~ with coordinates being the elements
    of row stem:[i], i.e. stem:[A]~stem:[i]1~, stem:[A]~stem:[i]2~, …, stem:[A]~stem:[in]~,
    are linearly dependent
  language_code: eng
  notes:
  - It is equivalent to consider the stem:[n] vectors associated with the columns.
