eng:
  id: 881-12-49
  terms:
  - type: expression
    normative_status: preferred
    designation: total linear stopping power
  - type: symbol
    designation: stem:[S]
    international: true
  definition: |-
    the quotient of the energy dstem:[E] lost by a charged particle of specified energy in traversing a path length dstem:[l] in a material:

    stem:[S = ((d E))/((d l))]
  language_code: eng
  notes:
  - For energies at which nuclear interactions can be neglected, the total linear
    stoping power is the sum of the linear collision stopping power and the linear
    radiative stopping power.
  examples: []
  entry_status: Standard
  date_accepted: '1983-01-01T00:00:00+00:00'
