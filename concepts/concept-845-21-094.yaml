eng:
  id: 845-21-094
  terms:
  - type: expression
    normative_status: preferred
    usage_info: for a specified photometric condition
    designation: luminous efficiency
  - type: symbol
    designation: |-
      stem:[V], &lt;for photopic vision&gt; &lt;pour la vision photopique&gt;
      stem:[V]′, &lt;for scotopic vision&gt; &lt;pour la vision scotopique&gt;
      stem:[V]~mes;~stem:[m], &lt;for mesopic vision&gt; &lt;pour la vision mésopique&gt;
      stem:[V]~10~, &lt;for the CIE 10° photopic photometric observer&gt; &lt;pour l'observateur photométrique photopique 10° CIE&gt;
      stem:[V]~M~, &lt;for the CIE 1988 modified 2° spectral luminous efficiency function for photopic vision&gt; &lt;pour la fonction d'efficacité lumineuse relative spectrale de 2° pour vision photopique (CIE 1988 modifiée)&gt;
    international: true
  definition: quotient of radiant flux weighted by the <a href="IEV845-21-035">spectral
    luminous efficiency</a> and the corresponding radiant flux for a specified photometric
    condition
  language_code: eng
  notes:
  - The photometric condition should be specified (e.g. photopic, scotopic, mesopic).
    If it is not specified, photopic vision is assumed and the symbol stem:[V] is
    used. For other photometric conditions, the respective symbol for identification
    shall be used.
  - |-
    Luminous efficiency for photopic vision is expressed by

    stem:[V = ((int_0^(oo) Phi_((e , lambda)) ( lambda ) V ( lambda ) d lambda))/((int_0^(oo) Phi_((e , lambda)) ( lambda ) d lambda)) = (K)/((K_m))]

    where stem:[Φ]~e,~stem:[λ] is spectral radiant flux, stem:[V](stem:[λ]) is spectral luminous efficiency, stem:[λ] is wavelength, stem:[K] is luminous efficacy of radiation, and stem:[K]~m~ is maximum luminous efficacy.
  - The luminous efficiency has unit one.
  - This entry was numbered 845-01-57 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-21-094
  terms:
  - type: expression
    normative_status: preferred
    usage_info: pour une condition photométrique spécifiée
    designation: efficacité lumineuse relative
    gender: f
    plurality: singular
  definition: quotient du flux énergétique pondéré par l'<a href="IEV845-21-035">efficacité
    lumineuse relative spectrale</a> sur le flux énergétique correspondant pour une
    condition photométrique spécifiée
  language_code: fra
  notes:
  - Il convient de spécifier la condition photométrique (par exemple, photopique,
    scotopique, mésopique). En l'absence de spécification, la vision photopique est
    par hypothèse utilisée, de même que le symbole stem:[V.] Pour les autres conditions
    photométriques, le symbole respectif pour l'identification doit être utilisé.
  - |-
    L'efficacité lumineuse relative pour la vision photopique est exprimée par

    stem:[V = ((int_0^(oo) Phi_((e , lambda)) ( lambda ) V ( lambda ) d lambda))/((int_0^(oo) Phi_((e , lambda)) ( lambda ) d lambda)) = (K)/((K_m))]

    où stem:[Φ]~e,~stem:[λ] est le flux énergétique spectral, stem:[V](stem:[λ]) est l'efficacité lumineuse relative spectrale, stem:[λ] est la longueur d'onde, stem:[K] est l'efficacité lumineuse du rayonnement, et stem:[K]~m~ est l'efficacité lumineuse maximale.
  - L'unité d'efficacité lumineuse relative est un.
  - Cet article était numéroté 845-01-57 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
