eng:
  id: 725-14-32
  terms:
  - type: expression
    normative_status: preferred
    designation: frequency hopping spread spectrum modulation
  definition: a form of spread spectrum modulation in which the carrier frequency
    is automatically changed at short intervals, selection being made in a pseudo-random
    way from a set of frequencies covering a frequency band much wider than the bandwidth
    required for the information to be transmitted
  language_code: eng
  notes:
  - The rate at which the frequency is changed may be faster or slower than the bit
    rate of the information signal.
  examples: []
  entry_status: Standard
  date_accepted: '1994-08-01T00:00:00+00:00'
