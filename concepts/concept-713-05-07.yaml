eng:
  id: 713-05-07
  terms:
  - type: expression
    normative_status: preferred
    designation: Earth exploration-satellite service
  definition: |-
    space radiocommunication service in which:

    – information relating to the characteristics of the Earth and its natural phenomena is obtained from active or passive sensors on Earth satellites;

    – similar information is collected by an Earth satellite from airborne or Earth-based platforms which transmit automatically or by interrogation;

    – such information may be distributed to Earth stations
  language_code: eng
  notes:
  - "– This radiocommunication service may also include feeder links necessary for
    its operation and intersatellite links."
  examples: []
  entry_status: Standard
  authoritative_source:
