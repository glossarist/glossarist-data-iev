eng:
  id: 705-07-23
  terms:
  - type: expression
    normative_status: preferred
    designation: lowest usable frequency
  - type: expression
    designation: LUF
  definition: the lowest frequency that would permit acceptable performance of a radio
    circuit by signal propagation via the ionosphere between given terminals below
    the ionosphere at a given time, under specified working conditions
  language_code: eng
  notes:
  - Acceptable performance may for example be quoted in terms of maximum error ratio
    or required signal/noise ratio.
  - Specified working conditions may include such factors as antenna types, transmitter
    power, class of emission and required information rate.
  examples: []
  entry_status: Standard
