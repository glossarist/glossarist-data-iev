eng:
  id: 826-10-04
  terms:
  - type: expression
    normative_status: preferred
    designation: electric supply system for safety services
  definition: |-
    supply system intended to maintain the operation of essential electrical installation and equipment:

    – for the health and safety of persons and livestock, and/or

    – if required by national regulations, to avoid damage to the environment and to other equipment
  language_code: eng
  notes:
  - The supply system includes the source and the electric circuits up to the terminals
    of electric equipment. In certain cases it may also include the equipment.
