eng:
  id: 845-31-020
  terms:
  - type: expression
    normative_status: preferred
    designation: Koschmieder's law
  definition: |-
    law relating the apparent contrast, stem:[Cd], of an object against a sky background, at a given distance of observation, stem:[d], to the inherent contrast, stem:[C]~0~, and to the atmospheric transmissivity, stem:[T], which is assumed to be uniform

    stem:[C_d = C_0 T^(d // d_0)]

    where stem:[d]~0~ is the length specified for the definition of stem:[T]
  language_code: eng
  notes:
  - |-
    The formula is sometimes written

    stem:[C_d = C_0 T^(delta)]

    where the exponent, stem:[δ], in stem:[Tδ] is the numerical value of stem:[d] measured with stem:[d]~0~ as "unit".
  - |-
    Taking into account the relationship between atmospheric transmissivity, stem:[T], and meteorological optical range, stem:[v], given in Note 2 to entry of "<a href="IEV845-31-018">meteorological optical range</a>", Koschmieder's law can be also written as

    stem:[C_d = C_0 ( 0,05^(d // v) )]
  - The contrast is taken to be the quotient of the difference between the luminance
    of the object and the luminance of the background, and the luminance of the background.
  - This entry was numbered 845-11-22 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-31-020
  terms:
  - type: expression
    normative_status: preferred
    designation: loi de Koschmieder
    gender: f
    plurality: singular
  definition: |-
    loi associant le contraste apparent stem:[Cd], d'un objet sur un fond de ciel à une distance d'observation donnée, stem:[d], au contraste propre stem:[C]~0~, de cet objet et à la transmissivité atmosphérique stem:[T] réputée uniforme

    stem:[C_d = C_0 T^(d // d_0)]

    où stem:[d]~0~ est la longueur spécifiée pour la définition de stem:[T]
  language_code: fra
  notes:
  - |-
    La formule est parfois écrite sous la forme

    stem:[C_d = C_0 T^(delta)]

    où l'exposant, stem:[δ], dans stem:[Tδ] est la valeur numérique de stem:[d] mesurée avec stem:[d]~0~ comme "unité".
  - |-
    Compte tenu de la relation entre la transmissivité atmosphérique stem:[T], et la portée optique météorologique, stem:[v], donnée à la Note 2 à l'article de la définition "<a href="IEV845-31-018">portée optique météorologique</a>", la loi de Koschmieder peut aussi s'écrire sous la forme

    stem:[C_d = C_0 ( 0,05^(d // v) )]
  - Le contraste est considéré comme étant le quotient de la différence entre la luminance
    de l'objet et la luminance du fond par la luminance du fond.
  - Cet article était numéroté 845-11-22 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
