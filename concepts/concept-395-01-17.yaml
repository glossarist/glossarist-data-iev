    normative_status: preferred
    designation: energy fluence
  - type: symbol
    designation: stem:[Ψ]
    international: true
  definition: |-
    quotient of the radiant energy dstem:[R] incident on a sphere of cross-sectional area dstem:[a]

    stem:[Ψ] = dstem:[R]/dstem:[a]
  language_code: eng
  notes:
  - It is the time-integral of the energy flux.
  - This quantity is expressed in joules per square metre (J/m^2^).
  - This entry was numbered 393-14-28 in IEC 60050-393:2003.
