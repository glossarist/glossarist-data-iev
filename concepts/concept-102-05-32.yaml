eng:
  id: 102-05-32
  terms:
  - type: expression
    normative_status: preferred
    designation: first Green formula
  definition: |-
    identity resulting from the divergence theorem applied to the vector field stem:[f_1 grad f_2], where stem:[f]~1~ and stem:[f]~2~ are two scalar fields given at each point of a three-dimensional domain V limited by a closed surface S

    stem:[underset(V)( ∭ ) ( grad f_1 * g r a d f_2 + f_1 Delta f_2 ) d V = underset(S)( ∯ ) f_1 g r a d f_2 * e_n d A]

    where dstem:[V] is the volume element, *stem:[e]*~n~dstem:[A] is the vector surface element and Δ is the Laplacian operator
  language_code: eng
  notes:
  - In English the first Green formula is sometimes called “first Green theorem” or
    “first Green identity”.
  examples: []
  entry_status: Standard
  date_accepted: '2008-08-01T00:00:00+00:00'
  date_amended: '2008-08-01T00:00:00+00:00'
  review_date: '2008-08-01T00:00:00+00:00'
  review_decision_date: '2008-08-01T00:00:00+00:00'
  review_decision_event: published
