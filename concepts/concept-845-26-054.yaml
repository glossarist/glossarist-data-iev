eng:
  id: 845-26-054
  terms:
  - type: expression
    normative_status: preferred
    designation: ultraviolet hazard spectral weighting function
  - type: symbol
    designation: |-
      stem:[S]~UV~(stem:[λ])
      stem:[S](stem:[λ])
    international: true
  definition: weighting function that combines the normalized spectral sensitivities
    of the human eye and skin to <a href="IEV845-21-008">ultraviolet radiation</a>
    for radiation protection purposes
  language_code: eng
  notes:
  - The wavelength range for the ultraviolet hazard spectral weighting function is
    specified in ICNIRP-recommendations as stem:[λ] = 180 nm to stem:[λ] = 400 nm.
