eng:
  id: 721-03-06
  terms:
  - type: expression
    normative_status: preferred
    designation: anisochronous transmission
  definition: a transmission such that between any two significant instants in the
    same block or character, there is always an integral number of unit intervals.
    Between two significant instants located in a different block or character, there
    is not always an integral number of unit intervals
  language_code: eng
