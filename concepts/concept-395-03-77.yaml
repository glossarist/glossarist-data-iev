eng:
  id: 395-03-77
  terms:
  - type: expression
    normative_status: preferred
    usage_info: in an ionization chamber
    designation: saturation current
  definition: ionization current obtained when the applied voltage is high enough
    to collect all the ions and electrons produced
  language_code: eng
  notes:
  - The applied voltage is less than that required for gas multiplication.
  - This entry was numbered 394-38-30 in IEC 60050-394:2007.
  examples: []
