fra:
  id: 121-11-52
  terms:
  - type: expression
    normative_status: preferred
    designation: aimantation
    gender: f
    plurality: singular
  definition: |-
    en un point donné à l’intérieur d’un domaine de volume quasi-infinitésimal stem:[V], grandeur vectorielle égale au quotient, par le volume stem:[V], du moment magnétique stem:[*m*] de la substance contenue dans le domaine d’espace:

    stem:[M = (m)/(V)]
  language_code: fra
  notes:
  - |-
    L’aimantation stem:[*M*] vérifie la relation

    stem:[*B*] = stem:[μ]~0~(stem:[*H*] + stem:[*M*])

    où stem:[*B*] est l’induction magnétique, stem:[*H*] le champ magnétique et stem:[μ]~0~ la constante magnétique.
  examples: []
  entry_status: Standard
  date_accepted: '1998-08-01T00:00:00+00:00'
  date_amended: '1998-08-01T00:00:00+00:00'
  review_date: '1998-08-01T00:00:00+00:00'
  review_decision_date: '1998-08-01T00:00:00+00:00'
  review_decision_event: published
