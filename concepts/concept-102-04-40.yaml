eng:
  id: 102-04-40
  terms:
  - type: expression
    normative_status: preferred
    designation: volume
  - type: symbol
    designation: stem:[V]
    international: true
  definition: "unique positive value, if it exists, associated with a three-dimensional
    domain, with the following properties:\n\n\n\n* for a rectangular parallelepiped,
    the value is the product of the three side lengths, \n\n* for a disjoint union
    of domains, the value is the sum of the values associated to these domains, \n\n*
    for more complicated domains, the value can be approximated by sums and given
    by an integral"
  language_code: eng
  notes:
  - The volume stem:[V] of the three-dimensional domain D is determined by the volume
    integral stem:[underset(D)( ∭ ) d V], where dstem:[V] is the volume element ({{IEV
    102-05-10, IEV:102-05-10}}).
  - In the usual geometrical space, the volume is a quantity of dimension length cubed.
  examples: []
  entry_status: Standard
  date_accepted: '2008-08-01T00:00:00+00:00'
  date_amended: '2008-08-01T00:00:00+00:00'
  review_date: '2008-08-01T00:00:00+00:00'
  review_decision_date: '2008-08-01T00:00:00+00:00'
  review_decision_event: published
