  terms:
  - type: expression
    normative_status: preferred
    designation: anisotropic etching
  definition: etching process in which the etching rate differs depending on the crystallographic
    orientation or direction of the energy beams
  language_code: eng
  notes:
  - A typical anisotropic etchant for silicon is potassium hydroxide (KOH). It is
