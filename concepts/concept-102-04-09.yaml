eng:
  id: 102-04-09
  terms:
  - type: expression
    normative_status: preferred
    designation: perpendicular
  definition: "qualifies in a Euclidean space:\n\n* a straight line with respect to
    another straight line when their associated vectors are orthogonal; \n\n* a straight
    line with respect to a plane when the line is perpendicular to any line of the
    plane; \n\n* a plane with respect to another plane when it contains a straight
    line which is perpendicular to any line of the other plane"
  language_code: eng
  notes:
  - Usual wordings for lines are "line A is perpendicular to line B", or "lines A
    and B are perpendicular", or " A and B are perpendicular lines". Similar wordings
    are used for the other cases.
  examples: []
  entry_status: Standard
  date_accepted: '2008-08-01T00:00:00+00:00'
  date_amended: '2008-08-01T00:00:00+00:00'
