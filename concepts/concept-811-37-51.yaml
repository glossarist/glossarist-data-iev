eng:
  id: 811-37-51
  terms:
  - type: expression
    normative_status: preferred
    designation: linear topology
  definition: topology where the nodes are connected in series, with two nodes each
    connected to only one other node and all others each connected to two other nodes
    (i.e. connected in the shape of a line)
