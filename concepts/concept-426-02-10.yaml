eng:
  id: 426-02-10
  terms:
  - type: expression
    normative_status: preferred
    designation: upper flammable limit
  - type: expression
    designation: UFL
  definition: concentration of flammable gas or vapour in air, above which an explosive
    gas atmosphere does not form
  language_code: eng
  notes:
  - For the purposes of {{Ex Equipment, IEV:426-01-14}}, this was previously referred
    to as the upper explosive limit (UEL).
  - The concentration can be expressed as either a volume fraction or a mass per unit
    volume.
