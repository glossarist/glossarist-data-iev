  definition: |-
    unité de {{rapidité de modulation, IEV:721-03-26}} en {{télégraphie, IEV:701-01-07}} et en {{communication de données, IEV:701-01-12}} ou de {{rapidité de modulation, IEV:704-17-03}} en {{transmission numérique, IEV:704-01-08}}, égale à une seconde à la puissance moins un

    1 Bd := 1 s^−1^
  language_code: fra
  notes:
