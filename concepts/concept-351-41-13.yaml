eng:
  id: 351-41-13
  terms:
  - type: expression
    normative_status: preferred
    designation: quantize
  definition: |-
    divide a range of values that a variable quantity may assume into a finite number of predetermined adjacent intervals, not necessarily equal, in which any value within a given interval is represented by a single predetermined value within this interval, called "quantized value"

    Note 1 to entry: To quantize means to convert a continuous-value variable into a discrete-value variable.
  language_code: eng
  notes: []
  examples: []
  entry_status: Standard
  authoritative_source:
