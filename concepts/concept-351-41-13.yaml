    clause: 702-04-07
    link: https://webstore.iec.ch/publication/239
    relationship:
      :type: :modified
      :modification: The definition has been changed to describe an action rather
        than a process.
    original: IEC 60050-702:1992, 702-04-07, modified – The definition has been changed
      to describe an action rather than a process.
