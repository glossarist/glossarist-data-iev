eng:
  id: 801-25-48
  terms:
  - type: expression
    normative_status: preferred
    designation: electroacoustic coupling coefficient (1)
  definition: |-
    one of the following two quotients:

    a) for transduction of an electric signal into an acoustic signal, quotient of the resulting sound pressure in the blocked acoustical system by the excitation current in the electrical system;

    b) for transduction of an acoustic signal into an electric signal, quotient of the resulting open-circuit voltage in the electrical system by the excitation volume velocity in the acoustical system
  language_code: eng
  notes:
  - These definitions are best applied to a reciprocal electroacoustic transducer
    with gyroscopic coupling, for example an electromagnetic transducer, in which
    case the two quotients have equal magnitude.
  examples: []
  entry_status: Standard
  date_accepted: '1994-07-01T00:00:00+00:00'
  date_amended: '1994-07-01T00:00:00+00:00'
  review_date: '1994-07-01T00:00:00+00:00'
