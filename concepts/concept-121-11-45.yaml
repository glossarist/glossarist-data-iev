  - type: expression
    normative_status: preferred
    designation: courant électrique total
    gender: m
    plurality: singular
  definition: |-
    grandeur scalaire égale au flux de la densité de courant total *stem:[J]*~t~ à travers une surface orientée donnée S:

    stem:[I_t = underset(S)( int ) J_t * e_n d A]

    où *stem:[e]*~n~dstem:[A]  est l'élément vectoriel de surface
  language_code: fra
  notes:
  - |-
    Le courant électrique total *stem:[I]*~t~ est donné par

    *stem:[I]*~t~ = *stem:[I]* + *stem:[I]*~stem:[D]~

    où *stem:[I]* est le courant électrique et *stem:[I]*~stem:[D]~ le courant de déplacement.
