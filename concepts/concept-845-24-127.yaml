eng:
  id: 845-24-127
  terms:
  - type: expression
    normative_status: preferred
    designation: haze
  definition: cloudy appearance due to contrast reduction, usually attributable to
    light scattering
  language_code: eng
  notes:
  - Correlated measures in reflection are:<ol type="a">. scattering of light at the
    glossy surface of a specimen responsible for the apparent reduction in contrast
    of objects viewed by reflection at the surface;. percentage of reflected light
    scattered by a specimen having a glossy surface so that its direction deviates
    more than a specified angle from the direction of specular reflection.
  - Correlated measures in transmission are:<ol type="a">. scattering of light by
    a specimen responsible for the apparent reduction in contrast of objects viewed
    through it;. percentage of transmitted light that is scattered so that its direction
    deviates more than a specified angle from the direction of the incident beam.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-24-127
  terms:
  - type: expression
    normative_status: preferred
    designation: voile
    gender: m
    plurality: singular
  definition: aspect trouble dû à la réduction de contraste, généralement attribuable
    à la diffusion de la lumière
  language_code: fra
  notes:
  - Les mesures de réflexion corrélées sont les suivantes:<ol type="a">. diffusion
    de lumière sur la surface luisante d'une éprouvette responsable de la réduction
    apparente du contraste des objets observés par réflexion à la surface;. pourcentage
    de lumière réfléchie diffusée par une éprouvette dont la surface luisante est
    telle que sa direction s'écarte de plus d'un angle spécifié par rapport à la direction
    de réflexion spéculaire.
  - Les mesures de transmission corrélées sont les suivantes:<ol type="a">. diffusion
    de lumière par une éprouvette responsable de la réduction apparente du contraste
    des objets observés au travers de cette éprouvette;. pourcentage de lumière transmise
    qui est diffusée de sorte que sa direction s'écarte de plus d'un angle spécifié
    par rapport à la direction du faisceau incident.
  examples: []
  entry_status: Standard
  review_decision_event: published
