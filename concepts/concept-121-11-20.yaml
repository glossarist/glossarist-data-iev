eng:
  id: 121-11-20
  terms:
  - type: expression
    normative_status: preferred
    designation: Coulomb-Lorentz force
  definition: |-
    force *stem:[F]*  exerted on a particle having electric charge stem:[Q]  and velocity *stem:[v]* , given by the relation

    *stem:[F]* = stem:[Q](*stem:[E]* + *stem:[v]* x *stem:[B]*)

    where *stem:[E]*  is the electric field strength and *stem:[B]*  the magnetic flux density
  language_code: eng
  notes:
  - The component vector stem:[Q] *stem:[E]*  is the Coulomb force.
  - The component vector stem:[Q] *stem:[v]* × *stem:[B]*  is the Lorentz force.
  examples: []
  entry_status: Standard
  date_accepted: '1998-08-01T00:00:00+00:00'
  date_amended: '1998-08-01T00:00:00+00:00'
  review_date: '1998-08-01T00:00:00+00:00'
  review_decision_date: '1998-08-01T00:00:00+00:00'
  review_decision_event: published
