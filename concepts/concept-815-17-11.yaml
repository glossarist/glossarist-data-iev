fra:
  id: 815-17-11
  terms:
  - type: expression
    normative_status: preferred
    designation: susceptibilité magnétique
    gender: f
    plurality: singular
  definition: |-
    grandeur scalaire ou tensorielle dont le produit par le champ magnétique *stem:[H]* est égal à l’aimantation *stem:[M]*

    *stem:[M]* = stem:[κ]*stem:[H]*
  language_code: fra
  notes:
  - Dans un milieu isotrope, la susceptibilité magnétique est une grandeur scalaire
    alors que dans un milieu anisotrope c’est une grandeur tensorielle.
  - Dans certains documents, le symbole stem:[χ]~m~ (au lieu de stem:[κ]) est utilisé
    pour la "susceptibilité magnétique".
  examples: []
