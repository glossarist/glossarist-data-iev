eng:
  id: 815-17-11
  terms:
  - type: expression
    normative_status: preferred
    designation: magnetic susceptibility
  - type: symbol
    designation: stem:[κ]
    international: true
  definition: |-
    scalar or tensor quantity the product of which by the magnetic field strength *stem:[H]* is equal to the magnetization *stem:[M]*

    *stem:[M]* = stem:[κ]*stem:[H]*
  language_code: eng
  notes:
  - In an isotropic medium the magnetic susceptibility is a scalar, and in an anisotropic
    medium it is a tensor.
  - In some literature, the symbol stem:[χ]~m~ (rather than stem:[κ]) is used for
    the "magnetic susceptibility".
  examples: []
