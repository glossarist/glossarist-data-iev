eng:
  id: 171-07-29
  terms:
  - type: expression
    normative_status: preferred
    designation: average information rate
  - type: symbol
    designation: stem:[H]^*^
    international: true
  definition: |-
    quotient of the {{character mean entropy, IEV:171-07-28}} stem:[H]^′^ by the mean duration of a character

    stem:[H]^*^ &amp;equals; stem:[H]^′^/stem:[t](stem:[X])

    where stem:[X] &amp;equals; {stem:[x]~1~, …, stem:[x]~stem:[n]~} is the set of input characters stem:[xi] (stem:[i] &amp;equals; 1, …, stem:[n]) and stem:[t ( X ) = sum_((n = 1))^n p ( x_i ) * t ( x_i )] is the mean value of the duration stem:[t](stem:[xi]) of a character stem:[xi] which occurs with probability stem:[p](stem:[xi])
  language_code: eng
  notes:
  - The average information rate can be expressed in a unit such as the shannon per
    character and second.
  examples: []
  entry_status: Standard
  authoritative_source:
  - ref: IEC 80000-13:2008
    clause: 13-38
    link: https://webstore.iec.ch/publication/7479
    relationship:
      :type: :modified
