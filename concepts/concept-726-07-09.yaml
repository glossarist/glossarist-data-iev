eng:
  id: 726-07-09
  terms:
  - type: expression
    normative_status: preferred
    designation: standing-wave ratio
  - type: expression
    designation: SWR
  - type: expression
    designation: voltage standingwave ratio
  - type: expression
    designation: VSWR
  definition: the ratio, along a transmission line, of a maximum to an adjacent minimum
    magnitude of a particular field component of a standing wave
  language_code: eng
  notes:
  - 'This ratio is equal to: (1 + stem:[r]) / (1 — stem:[r]) where stem:[r] is the
    modulus of the amplitude reflection factor.'
  - The standing-wave ratio expressed as the reciprocal of the ratio defined above
    is occasionally used, but this usage is deprecated.
  examples: []
  entry_status: Standard
