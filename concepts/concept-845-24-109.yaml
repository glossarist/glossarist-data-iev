fra:
  id: 845-24-109
  terms:
  - type: expression
    normative_status: preferred
    designation: indice de réfraction
    gender: m
    plurality: singular
  definition: quotient de la {{vitesse de la lumière dans le vide, IEV:113-01-34}}
    par la vitesse de la lumière dans un milieu
  language_code: fra
  notes:
  - La valeur de l'indice de réfraction peut dépendre de la {{fréquence, IEV:103-06-02}},
    de la polarisation et de la direction.
  - L'indice de réfraction est exprimé par stem:[n] = stem:[c]~0~/stem:[c,] où stem:[c]~0~
    est la vitesse de la lumière dans le vide et stem:[c] est la vitesse de la lumière
    dans le milieu.
  - Voir aussi "<a href="IEV845-24-111">indice de réfraction complexe</a>".
  - La réfractivité est exprimée par stem:[n] − 1, où stem:[n] est l'indice de réfraction.
  - L'unité d'indice de réfraction est un.
  - Cet article était numéroté 845-04-101 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
