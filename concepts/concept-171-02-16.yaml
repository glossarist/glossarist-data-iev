  - type: symbol
    designation: Gi
    international: true
  definition: "{{binary prefix, IEV:112-01-27}} used to form the multiple 2^30^ of
    a measurement unit"
  language_code: eng
  notes:
  - The prefix gibi has for origin gigabinary, (2^10^)^3^, derived from the SI prefix
    giga, (10^3^)^3^.
  examples:
  - One gibibit = 1 Gibit = (1 024)^3^ bit.
