eng:
  id: 531-18-20
  terms:
  - type: expression
    normative_status: preferred
    designation: class AB operation
  definition: the operation of an electronic tube in such a way that output current
    flows for appreciably more than half but for less than the whole of the electrical
    cycle when a pure sinusoidal input signal is used
  language_code: eng
  notes:
  - |-
    The suffix 1 may be used to denote that input current does not flow.

    The suffix 2 may be used to denote that input current flows during some part of the cycle.
  examples: []
  entry_status: Standard
