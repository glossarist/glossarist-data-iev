eng:
  id: 171-07-26
  terms:
  - type: expression
    normative_status: preferred
    designation: transinformation content
  - type: expression
    normative_status: preferred
    designation: transferred information
  - type: expression
    normative_status: preferred
    designation: transmitted information
  - type: expression
    normative_status: preferred
    designation: mutual information
  - type: symbol
    designation: stem:[T](stem:[x],stem:[y])
    international: true
  definition: |-
    difference between the {{information content, IEV:171-07-14}} stem:[I](stem:[x]) conveyed by the occurrence of an event stem:[x], and the conditional information content stem:[I ( x | y )] conveyed by the occurrence of the same event, given the occurrence of another event stem:[y]

    stem:[T ( x , y ) = I ( x ) - I ( x | y )]
  language_code: eng
  notes:
  - The two events are particularly a message at the message source of a channel and
    a message at the message sink of the channel.
  - 'The transinformation content can also be expressed as: stem:[T ( x , y ) = I
    ( x ) + I ( y ) - I ( x , y )], where stem:[I](stem:[y]) is the information content
    of the event stem:[y]. From this follows that it is symmetric in stem:[x] and
    stem:[y]: stem:[T ( x , y ) = T ( y , x )].'
  examples: []
  entry_status: Standard
  classification: Preferred
  authoritative_source:
  - ref: IEC 80000-13:2008
    clause: 13-35
    link: https://webstore.iec.ch/publication/7479
    relationship:
      :type: :modified
      :modification: Addition of information useful for the context of the IEV, and
        adaptation to the IEV rules
    original: IEC 80000-13:2008, 13-35, modified – Addition of information useful
      for the context of the IEV, and adaptation to the IEV rules
