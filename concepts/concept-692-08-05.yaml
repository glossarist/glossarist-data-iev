eng:
  id: 692-08-05
  terms:
  - type: expression
    normative_status: preferred
    designation: mean duration of a customer interruption
  - type: expression
    normative_status: preferred
    designation: customer average interruption duration index
    geographical_area: US
  - type: expression
    normative_status: preferred
    designation: CAIDI
  - type: symbol
    designation: stem:[T]~I~
    international: true
  definition: sum of durations of all {{supply interruptions, IEV:692-07-01}} to individual
    customers during a time interval, divided by the number of these supply interruptions
  language_code: eng
  notes:
  - |-
    If stem:[t]~stem:[ij]~ is the duration of the stem:[i]th interruption of supply to customer stem:[j] and stem:[n]~stem:[j]~ is the number of times customer stem:[j] is affected during a time interval of duration stem:[T], then the mean duration of a customer interruption is given by

    stem:[T_I = ((sum_i sum_j t_((i j))))/((sum_j n_j))]
  - Only {{sustained interruptions, IEV:692-07-02}} are considered.
  - The term "customer" represents the end user and not some intermediate distribution
    system or company.
  - Mean duration of a customer interruption can be used to describe past performance
    or to estimate expected future performance.
  - This measure is also equal to {{service unavailability per customer served, IEV:692-08-03}}
    divided by {{interruption frequency per customer served, IEV:692-08-01}}.
  - This entry was numbered 191-27-05 in IEC 60050-191:1990.
  examples: []
  entry_status: Standard
  classification: Preferred
  date_accepted: '2017-12-01T00:00:00+00:00'
  date_amended: '2017-12-01T00:00:00+00:00'
  review_date: '2017-12-01T00:00:00+00:00'
