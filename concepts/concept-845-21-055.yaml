fra:
  id: 845-21-055
  terms:
  - type: expression
    normative_status: preferred
    designation: éclairement cylindrique énergétique
    gender: m
    plurality: singular
  definition: valeur moyenne de l'éclairement énergétique sur la surface courbe extérieure
    d'un très petit cylindre (réel ou fictif) orienté verticalement en un point dans
    l'espace
  language_code: fra
  notes:
  - |-
    L'éclairement cylindrique énergétique est parfois également défini comme la moyenne arithmétique de l'éclairement énergétique vertical stem:[E]~e,v~ en un point

    stem:[E_((e ,c)) = (1)/((2 pi)) int_0^((2 pi)) E_((e ,v)) d phi]

    où stem:[E]~e,v~ est l'éclairement énergétique vertical pour un élément de surface, avec sa perpendiculaire dans la direction stem:[φ], et stem:[φ] est l'angle dans le plan perpendiculaire à l'axe du cylindre.
  - La grandeur photométrique correspondante est l'"éclairement lumineux cylindrique".
    La grandeur correspondante pour les photons est l'"éclairement cylindrique énergétique
    photonique".
  - L'éclairement cylindrique énergétique est exprimé en watt par mètre carré (W·m^−2^).
  - Cet article était numéroté 845-01-41 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
