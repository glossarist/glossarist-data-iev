fra:
  id: 421-01-19
  terms:
  - type: expression
    normative_status: preferred
    designation: bobine d'inductance hermétique
    gender: f
    plurality: singular
  definition: bobine d'inductance qui ne respire pas, c'est-à-dire qui est scellée
    de sorte qu'il ne peut pas se produire d'échange notable entre ses composants
    internes et l'atmosphère externe
  language_code: fra
  notes:
  - Dans le cas de bobines d'inductance immergées dans l'huile, l'appareil peut ou
    non être doté d'un coussin d'air (ou autre gaz).
  - |-
    Les bobines d'inductance hermétiques entrent dans deux catégories:

    a) les appareils dans lesquels le volume total d'huile, d'air (ou autre gaz), ou de toute combinaison reste constant dans toute la plage de température.

    b) les appareils dans lesquels le volume total d'huile, d'air (ou autre gaz), ou de toute combinaison varie dans toute la plage de température, cette variation étant absorbée par un réservoir flexible hermétique ou une membrane souple.
  examples: []
