eng:
  id: 421-01-19
  terms:
  - type: expression
    normative_status: preferred
    designation: sealed reactor
  definition: a reactor which is non-breathing, that is, so sealed that there can
    be no significant interchange between its contents and the external atmosphere
  language_code: eng
  notes:
  - In the case of oil-immersed reactors, these may or may not have a cushion of air
    (or other gas).
  - |-
    Sealed reactors fall into two categories:

    a) reactors in which the total volume of oil, together with air (or other gas), or any combination thereof, remains constant over the temperature range.

    b) reactors in which the total volume of oil, air (or other gas), or any combination thereof, varies over the temperature range and this variation is accommodated by a sealed flexible container or a flexible membrane.
  examples: []
  entry_status: Standard
  date_accepted: '1990-10-01T00:00:00+00:00'
  date_amended: '1990-10-01T00:00:00+00:00'
  review_date: '1990-10-01T00:00:00+00:00'
  review_decision_date: '1990-10-01T00:00:00+00:00'
  review_decision_event: published
