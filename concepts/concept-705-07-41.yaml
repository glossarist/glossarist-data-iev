eng:
  id: 705-07-41
  terms:
  - type: expression
    normative_status: preferred
    designation: Z component
  definition: |-
    the magneto-ionic component which, at vertical incidence, is reflected at the height at which the electron density and the Earth's magnetic field are such that:

    stem:[f]~p~^2^ = stem:[f] ^2^ + stem:[f f]~ B~

    where stem:[f]~p~ is the plasma frequency, stem:[f] is the wave frequency, and stem:[f]~ B~ is the electron gyro frequency
  language_code: eng
  notes:
  - This component may appear when the direction of propagation of the wave is close
    to the direction of the Earth's magnetic field, or when the wave frequency is
    less than the electron gyro-frequency, and also in top-side ionospheric sounding.
  - The polarization of this component is either that of the ordinary wave, or that
    of the extraordinary wave, depending on the value of its frequency relative to
    the values of the plasma frequency and electron gyro-frequency on the wave path
    before reflection.
  examples: []
  entry_status: Standard
  date_accepted: '1995-09-01T00:00:00+00:00'
  date_amended: '1995-09-01T00:00:00+00:00'
  review_date: '1995-09-01T00:00:00+00:00'
  review_decision_date: '1995-09-01T00:00:00+00:00'
  review_decision_event: published
