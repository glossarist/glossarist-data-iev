  id: 691-10-03
  terms:
  - type: expression
    normative_status: preferred
    designation: facteur de simultanéité
    gender: m
    plurality: singular
  definition: rapport, exprimé en valeur numérique ou en %, de la puissance maximale
    appelée par un ensemble de clients ou un groupe d'appareils électriques, au cours
    d'une période déterminée, à la somme des puissances maximales individuelles appelées
    pendant la même période
  language_code: fra
  notes:
  - Il convient d'utiliser ce terme en précisant à quel niveau du réseau il se rapporte.
