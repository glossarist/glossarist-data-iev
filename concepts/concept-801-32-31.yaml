eng:
  id: 801-32-31
  terms:
  - type: expression
    normative_status: preferred
    designation: backscattering cross-section of an object or a volume
  definition: 4π multiplied by the square of backscattered sound pressure multiplied
    by the square of distance from the acoustic centre of the scatterer divided by
    the square of the sound pressure incident on the scatterers in the stated volume.
    The angle of incidence must be indicated, and the angle of scattering if other
    than backward
