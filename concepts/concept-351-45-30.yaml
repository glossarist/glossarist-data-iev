fra:
  id: 351-45-30
  terms:
  - type: expression
    normative_status: preferred
    designation: réponse unitaire à un échelon
    gender: f
    plurality: singular
  definition: |-
    quotient représenté par la réponse à un échelon Δstem:[v]~ε~(stem:[t]) divisé par la hauteur de l’échelon stem:[K]*~ε~* de la fonction échelon, le quotient étant décrit par

    stem:[h ( t ) = (1)/((K_(epsilon))) . Delta v_(epsilon) ( t )]
  language_code: fra
  notes:
  - |-
    La réponse unitaire à un échelon peut être calculée à partir de la réponse impulsionnelle unité avec l’équation suivante

    stem:[h ( t ) = int_((- oo))^t g ( tau ) d tau].
  - La réponse unitaire à un échelon d’un système peut mathématiquement être considérée
    comme le résultat de l’application d’un échelon unité à une variable d’entrée.
