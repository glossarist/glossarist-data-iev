eng:
  id: 705-04-07
  terms:
  - type: expression
    normative_status: preferred
    designation: refracted wave
  definition: |-
    1) a wave, which appears beyond a surface separating two different media when an incident wave meets the surface, which propagates away from the surface, generally in a different direction, and which is interpretable by geometrical optics

    2) a wave which propagates in a medium with properties varying continuously in space and which is interpretable by geometrical optics
  language_code: eng
  notes:
  - In the first case but not in the second one, the refracted wave is associated
    with a reflected wave.
  examples: []
  entry_status: Standard
  date_accepted: '1995-09-01T00:00:00+00:00'
  date_amended: '1995-09-01T00:00:00+00:00'
  review_date: '1995-09-01T00:00:00+00:00'
