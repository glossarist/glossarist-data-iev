eng:
  id: 845-29-017
  terms:
  - type: expression
    normative_status: preferred
    designation: semi-indirect lighting
  definition: lighting by means of luminaires having a distribution of luminous intensity
    such that the fraction of the emitted luminous flux directly reaching the working
    plane, assumed to be of infinite extent, is 10 % to 40 %
  language_code: eng
  notes:
  - This entry was numbered 845-09-17 in IEC 60050-845:1987.
