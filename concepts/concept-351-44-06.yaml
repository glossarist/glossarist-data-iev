eng:
  id: 351-44-06
  terms:
  - type: expression
    normative_status: preferred
    designation: summing point
  definition: element in a functional diagram at which variable quantities are added
    algebraically
  language_code: eng
  notes:
  - In a functional diagram the summing point is primarily symbolized by a circle
    (see Figure 2).
  - The algebraic sign is positioned at the right side of the incoming action line,
    seen in the direction of the arrow.
  - |-
    This entry was numbered 351-23-06 in IEC 60050-351:2006.

    image::/assets/images/parts/351/351-fig2-en.png[Figure 2 - Functional diagram indicating typical elements of an elementary closed-loop control system]
