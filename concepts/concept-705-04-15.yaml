eng:
  id: 705-04-15
  terms:
  - type: expression
    normative_status: preferred
    designation: Rayleigh criterion
  definition: |-
    a criterion which characterizes the degree of roughness of a surface, for a given grazing angle of an electromagnetic wave according to the value of the quantity:

    stem:[((h sin theta))/(lambda)]

    where

    stem:[h] is the average height of the surface irregularities,

    stem:[θ] is the grazing angle relative to the average surface,

    stem:[λ] is the wavelength
  language_code: eng
  notes:
  - |-
    In practice, roughness is negligible and the surface is considered specular if:

    stem:[((h sin theta))/(lambda) (1)/((1 0 0))]
  examples: []
  entry_status: Standard
  date_accepted: '1995-09-01T00:00:00+00:00'
  date_amended: '1995-09-01T00:00:00+00:00'
  review_date: '1995-09-01T00:00:00+00:00'
