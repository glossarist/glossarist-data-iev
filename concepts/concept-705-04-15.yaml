fra:
  id: 705-04-15
  terms:
  - type: expression
    normative_status: preferred
    designation: critère de Rayleigh
    gender: m
    plurality: singular
  definition: |-
    critère caractérisant le degré de rugosité d'une surface, pour une onde électromagnétique sinusoïdale d'angle d'inclinaison donné, par la valeur de la quantité:

    stem:[((h sin theta))/(lambda)]

    où:

    stem:[h] est la hauteur moyenne des irrégularités de la surface,

    stem:[θ] est l'angle d'inclinaison par rapport à la surface moyenne,

    stem:[λ] est la longueur d'onde
  language_code: fra
  notes:
  - |-
    Dans la pratique, la rugosité est négligeable et la surface est considérée comme lisse si:

    stem:[((h sin theta))/(lambda) (1)/((1 0 0))]
  examples: []
