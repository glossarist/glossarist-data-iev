eng:
  id: 102-01-14
  terms:
  - type: expression
    normative_status: preferred
    designation: negative
    gender: n
    plurality: singular
  - type: expression
    designation: opposite
    gender: n
    plurality: singular
  definition: for any element of a set in which an addition with a neutral element
    is defined, the unique element of the set, if it exists, such that the sum of
    the two elements is the neutral element
  language_code: eng
  notes:
  - In English, the term "negative" applies in particular to numbers and matrices,
    whereas the term "opposite" is used for vectors and tensors.
  - The negative of element stem:[a] is denoted by −stem:[a], and inversely.
