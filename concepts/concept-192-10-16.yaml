eng:
  id: 192-10-16
  terms:
  - type: expression
    normative_status: preferred
    designation: error recovery
  definition: automatic detection, control and correction of an internal erroneous
    state
  language_code: eng
  notes:
  - |-
    The purpose of error recovery is to avoid a failure of the whole system, following a failure of one of its subsystems or components.

    Note 2: See also backward error recovery ({{192-10-17, IEV:192-10-17}}) and forward error recovery ({{192-10-18, IEV:192-10-18}}).

    Note 3: Error recovery often makes use of redundancy and diversity.
  examples: []
