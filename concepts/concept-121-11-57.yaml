eng:
  id: 121-11-57
  terms:
  - type: expression
    normative_status: preferred
    designation: magnetic tension
  - type: symbol
    designation: stem:[V]~m~
    international: true
  definition: |-
    scalar quantity equal to the line integral of the magnetic field strength stem:[*H*] along a specified path linking two points a and b:

    stem:[V_((m ,ab)) = int_((r_a))^((r_b)) H * d r]

    where stem:[*r*]~a~ and stem:[*r*]~b~ are the position vectors for a and b, respectively, and dstem:[*r*]  is the vector line element
  language_code: eng
  notes: []
  examples: []
