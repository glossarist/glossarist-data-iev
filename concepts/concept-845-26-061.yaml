eng:
  id: 845-26-061
  terms:
  - type: expression
    normative_status: preferred
    usage_info: of a source
    designation: blue light hazard efficacy of luminous radiation
  - type: symbol
    designation: stem:[K]~B,v~
    international: true
  definition: |-
    quotient of blue light hazard weighted radiant flux, stem:[Φ]~B~, and luminous flux, stem:[Φ]~v~

    stem:[K_((B ,v)) = ((Phi_B))/((Phi_v)) = ((int Phi_((e , lambda)) ( lambda ) * B ( lambda ) * d lambda))/((K_m * int Phi_((e , lambda)) ( lambda ) * V ( lambda ) * d lambda))]

    where stem:[λ] is wavelength, stem:[Φ]~e,stem:[λ]~(stem:[λ]) is spectral radiant flux, stem:[B](stem:[λ]) is the blue light hazard spectral weighting function, stem:[V](stem:[λ]) is the CIE <a href="IEV845-21-035">spectral luminous efficiency</a> function for photopic vision, and stem:[K]~m~ is maximum luminous efficacy (≈ 683 lm·W^−1^)
  language_code: eng
  notes:
  - The term "luminous radiation" refers to <a href="IEV845-21-002">optical radiation</a>
    weighted with the CIE spectral luminous efficiency function for photopic vision,
    stem:[V](stem:[λ]).
  - The use of this term is only reasonable if parts of the optical radiation are
    in the visible range and thus stem:[Φ]~v~ ≠ 0.
  - The blue light hazard efficacy of luminous radiation is expressed in watt per
    lumen (W·lm^−1^), possibly with a metric prefix.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-26-061
  terms:
  - type: expression
    normative_status: preferred
    usage_info: d'une source
    designation: efficacité d'un rayonnement lumineux avec danger de la lumière bleue
    gender: f
    plurality: singular
  definition: |-
    quotient du flux énergétique pondéré par le danger de la lumière bleue, stem:[Φ]~B~, par le flux lumineux, stem:[Φ]~v~

    stem:[K_((B ,v)) = ((Phi_B))/((Phi_v)) = ((int Phi_((e , lambda)) ( lambda ) * B ( lambda ) * d lambda))/((K_m * int Phi_((e , lambda)) ( lambda ) * V ( lambda ) * d lambda))]

    où stem:[λ] est la longueur d'onde, stem:[Φ]~e,stem:[λ]~(stem:[λ]) est le flux énergétique spectral, stem:[B](stem:[λ]) est la fonction de pondération spectrale du danger de la lumière bleue, stem:[V](stem:[λ]) est la fonction d'<a href="IEV845-21-035">efficacité lumineuse relative spectrale</a> de la CIE pour la vision photopique, et stem:[K]~m~ est l'efficacité lumineuse maximale (≈ 683 lm·W^−1^)
  language_code: fra
  notes:
  - Le terme "rayonnement lumineux" fait référence à un <a href="IEV845-21-002">rayonnement
    optique</a> pondéré par la fonction d'efficacité lumineuse relative spectrale
    de la CIE pour la vision photopique, stem:[V](stem:[λ]).
  - L'emploi de ce terme est raisonnable uniquement si des éléments constitutifs du
    rayonnement optique se situent dans le domaine visible et ainsi stem:[Φ]~v~ ≠
    0.
  - L'efficacité d'un rayonnement lumineux avec danger de la lumière bleue est exprimée
    en watt par lumen (W·lm^−1^), éventuellement avec un préfixe de mesure.
  examples: []
  entry_status: Standard
  review_decision_event: published
