eng:
  id: 845-24-089
  terms:
  - type: expression
    normative_status: preferred
    usage_info: of a homogeneous non-diffusing layer
    designation: spectral internal absorptance
  - type: symbol
    designation: stem:[α]~i~(stem:[λ])
    international: true
  definition: quotient of the spectral radiant flux absorbed between the internal
    entry and exit surfaces of the layer and the spectral flux that enters into the
    layer after crossing the entry surface
  language_code: eng
  notes:
  - For a given layer the spectral internal absorptance depends on the path length
    of the radiation in the layer, and hence, in particular, on the angle of incidence.
  - The spectral internal absorptance has unit one.
  - This entry was numbered 845-04-82 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-24-089
  terms:
  - type: expression
    normative_status: preferred
    usage_info: d'une couche homogène non diffusante
    designation: facteur d'absorption interne spectral
    gender: m
    plurality: singular
  definition: quotient du flux énergétique spectral absorbé entre les faces internes
    d'entrée et de sortie de la couche par le flux spectral qui pénètre dans la couche
    après traversée de la face d'entrée
  language_code: fra
  notes:
  - Pour une couche donnée, le facteur d'absorption interne spectral dépend de la
    longueur du trajet du rayonnement dans la couche, donc en particulier de l'angle
    d'incidence.
  - L'unité de facteur d'absorption interne spectral est un.
  - Cet article était numéroté 845-04-82 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
