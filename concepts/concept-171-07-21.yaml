eng:
  id: 171-07-21
  terms:
  - type: expression
    normative_status: preferred
    designation: conditional information content
  - type: symbol
    designation: stem:[I ( x | y )]
    international: true
  definition: |-
    logarithm of the reciprocal of the conditional probability stem:[p ( x | y )] of the event stem:[x] given the occurrence of the event stem:[y]

    stem:[I ( x | y ) = log (1)/((p ( x | y )))]
  language_code: eng
  notes:
  - 'The conditional information content is also the amount by which the {{joint information
    content, IEV:171-07-20}} of the two events exceeds the {{information content,
    IEV:171-07-14}} of the second: stem:[I ( x | y ) = I ( x , y ) - I ( y )].'
  examples: []
  entry_status: Standard
  authoritative_source:
