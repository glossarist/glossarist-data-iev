eng:
  id: 845-21-113
  terms:
  - type: expression
    normative_status: preferred
    designation: S/P ratio
  - type: symbol
    designation: stem:[R]~SP~
    international: true
  definition: ratio of the luminous output of a source evaluated according to the
    CIE scotopic <a href="IEV845-21-035">spectral luminous efficiency</a>, stem:[V′](stem:[λ]),
    to the luminous output evaluated according to the CIE photopic spectral luminous
    efficiency, stem:[V](stem:[λ])
  language_code: eng
  notes:
  - |-
    The S/P ratio can be expressed by

    stem:[R_((SP)) = ((K^( ' )_m int_0^(oo) S ( lambda ) V^( ' ) ( lambda ) d lambda))/((K_m int_0^(oo) S ( lambda ) V ( lambda ) d lambda))]

    where stem:[K]′~m~ ≈ 1 700 lm·W^−1^ is the maximum luminous efficacy for scotopic vision, stem:[K]~m~ ≈ 683 lm·W^−1^ is the maximum luminous efficacy for photopic vision, stem:[S](stem:[λ]) is the <a href="IEV845-21-030">relative spectral distribution</a> of the source, and stem:[λ] is the wavelength.
  - The S/P ratio has unit one.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-21-113
  terms:
  - type: expression
    normative_status: preferred
    designation: rapport S/P
    gender: m
    plurality: singular
  definition: rapport de la réponse lumineuse d'une source évaluée selon l'<a href="IEV845-21-035">efficacité
    lumineuse relative spectrale</a> scotopique CIE, stem:[V]′(stem:[λ]), à la réponse
    lumineuse évaluée selon l'efficacité lumineuse relative spectrale photopique,
    stem:[V](stem:[λ])
  language_code: fra
  notes:
  - |-
    Le rapport S/P peut être exprimé par

    stem:[R_((SP)) = ((K^( ' )_m int_0^(oo) S ( lambda ) V^( ' ) ( lambda ) d lambda))/((K_m int_0^(oo) S ( lambda ) V ( lambda ) d lambda))]

    où stem:[K]′~m~ ≈ 1 700 lm·W^−1^ est l'efficacité lumineuse maximale pour la vision scotopique, stem:[K]~m~ ≈ 683 lm·W^−1^ est l'efficacité lumineuse maximale pour la vision photopique, stem:[S](stem:[λ]) est la <a href="IEV845-21-030">répartition spectrale relative</a> de la source, et stem:[λ] est la longueur d'onde.
  - L'unité de rapport S/P est un.
  examples: []
  entry_status: Standard
  review_decision_event: published
