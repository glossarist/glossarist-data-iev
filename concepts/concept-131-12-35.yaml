    designation: self-inductance
  - type: symbol
    designation: stem:[L]~stem:[ii]~
    international: true
  definition: diagonal term of the inductance matrix
  language_code: eng
  notes:
  - 'For a winding of stem:[N]~stem:[i]~ turns following the same path, the self-inductance
