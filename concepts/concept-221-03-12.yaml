eng:
  id: 221-03-12
  terms:
  - type: expression
    normative_status: preferred
    designation: permeability rise factor
  - type: symbol
    designation: stem:[δH]
    international: true
  definition: |-
    the fractional change in the amplitude permeability between two specified peak values of the sinusoidal magnetic field strength, divided by the difference in the peak values of the field strength:

    stem:[delta_H = ((mu_((a 2)) - mu_((a 1))))/((mu_((a 1)) ( hat H_2 - hat H_1 )))]
  language_code: eng
  notes: []
  examples: []
  entry_status: Standard
  date_accepted: '1990-10-01T00:00:00+00:00'
  date_amended: '1990-10-01T00:00:00+00:00'
  review_date: '1990-10-01T00:00:00+00:00'
  review_decision_date: '1990-10-01T00:00:00+00:00'
  review_decision_event: published
