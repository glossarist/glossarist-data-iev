fra:
  id: 421-05-10
  terms:
  - type: expression
    normative_status: preferred
    designation: grandeurs de prise
    gender: f
    plurality: singular
  definition: |-
    grandeurs dont les valeurs numériques définissent le régime de prise. Les grandeurs de prise comprennent pour chaque enroulement et pour chaque prise:

    a) une tension de prise,

    b) une puissance de prise,

    c) un courant de prise
  language_code: fra
  notes:
  - Les grandeurs de prise sont rattachées à une connexion de prise donnée du transformateur
    et s'appliquent donc à tout enroulement, même s'il n'a pas de prises.
  examples: []
