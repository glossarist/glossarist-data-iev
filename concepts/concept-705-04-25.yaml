eng:
  id: 705-04-25
  terms:
  - type: expression
    normative_status: preferred
    designation: convergence factor
  definition: at a given point, the amplitude of a specified electromagnetic wave
    which has met convergence effects, divided by the amplitude of a wave which would
    have existed at the same point without these effects
  language_code: eng
  notes:
  - When the specified wave is a wave reflected by a curved surface, the corresponding
    factor may be considered as a factor which multiplies the reflection factor of
    the reflecting surface assumed to be flat.
  examples: []
  entry_status: Standard
  date_accepted: '1995-09-01T00:00:00+00:00'
  date_amended: '1995-09-01T00:00:00+00:00'
  review_date: '1995-09-01T00:00:00+00:00'
