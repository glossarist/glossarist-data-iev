eng:
  id: 845-21-092
  terms:
  - type: expression
    normative_status: preferred
    usage_info: for a specified photometric condition
    designation: maximum luminous efficacy
  - type: symbol
    designation: |-
      stem:[K]~m~, &lt;for photopic vision&gt; &lt;pour la vision photopique&gt;
      stem:[K]′~m~, &lt;for scotopic vision&gt; &lt;pour la vision scotopique&gt;
      stem:[K]~m,mes;stem:[m]~, &lt;for mesopic vision&gt; &lt;pour la vision mésopique&gt;
      stem:[K]~m,10~, &lt;for the CIE 10° photopic photometric observer&gt; &lt;pour l'observateur photométrique photopique 10° CIE&gt;
      stem:[K]~m,M~, &lt;for the CIE 1988 modified 2° spectral luminous efficiency function for photopic vision&gt; &lt;pour la fonction d'efficacité lumineuse relative spectrale de 2° pour vision photopique (CIE 1988 modifiée)&gt;
    international: true
  definition: maximum value of <a href="IEV845-21-091">spectral luminous efficacy</a>
    for a specified photometric condition
  language_code: eng
  notes:
  - The photometric condition should be specified (e.g. photopic, scotopic, mesopic).
    If it is not specified, photopic vision is assumed and the symbol stem:[K]~m~
    is used. For other photometric conditions, the respective symbol for identification
    shall be used.
  - |-
    The value of maximum luminous efficacy for photopic vision is calculated by

    stem:[K_m = ((683))/((V ( lambda_((cd)) ))) cd * sr * W^(- 1) tildetilde 683 \ lm * W^(- 1)]

    where stem:[V](stem:[λ]) is the <a href="IEV845-21-035">spectral luminous efficiency</a> for photopic vision and stem:[λ]~cd~ is the wavelength in air corresponding to the {{frequency, IEV:103-06-02}} 540 × 10^12^ Hz specified in the definition of the SI unit candela.
  - The maximum luminous efficacy is expressed in lumen per watt (lm·W^−1^).
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-21-092
  terms:
  - type: expression
    normative_status: preferred
    usage_info: pour une condition photométrique spécifiée
    designation: efficacité lumineuse maximale
    gender: f
    plurality: singular
  definition: valeur maximale de l'<a href="IEV845-21-091">efficacité lumineuse relative
    spectrale</a> pour une condition photométrique spécifiée
  language_code: fra
  notes:
  - Il convient de spécifier la condition photométrique (par exemple, photopique,
    scotopique, mésopique). En l'absence de spécification, la vision photopique est
    par hypothèse utilisée, de même que le symbole stem:[K]~m~stem:[.] Pour les autres
    conditions photométriques, le symbole respectif pour l'identification doit être
    utilisé.
  - |-
    La valeur de l'efficacité lumineuse maximale pour la vision photopique est calculée par

    stem:[K_m = ((683))/((V ( lambda_((cd)) ))) cd * sr * W^(- 1) tildetilde 683 \ lm * W^(- 1)]

    où stem:[V](stem:[λ]) est l'<a href="IEV845-21-035">efficacité lumineuse relative spectrale</a> pour la vision photopique et stem:[λ]~cd~ est la longueur d'onde dans l'air correspondant à la {{fréquence, IEV:103-06-02}} 540 × 10^12^ Hz spécifiée dans la définition de l'unité SI (candela).
  - L'efficacité lumineuse maximale est exprimée en lumen par watt (lm·W^−1^).
  examples: []
  entry_status: Standard
  review_decision_event: published
