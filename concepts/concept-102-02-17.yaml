eng:
  id: 102-02-17
  terms:
  - type: expression
    normative_status: preferred
    usage_info: of a complex number
    designation: argument
  definition: for a non-zero complex number stem:[c], the real number stem:[φ] restricted
    to stem:[- pi phi &lt;= pi], such that stem:[c = | c | e^(j phi)]
  language_code: eng
  notes:
  - |-
    The argument stem:[arg c] of the complex number stem:[c = a + j b = | c | e^(j phi)] is equal to:
    stem:[arccos ( a // sqrt(a^2 + b^2) )] if stem:[b &gt;= 0] and stem:[- arccos ( a // sqrt(a^2 + b^2) )] if stem:[b 0], where stem:[0 &lt;= arccos x &lt;= pi].
    It is not defined if stem:[a = b = 0].
  - The concept of argument may be applied to complex scalar quantities.
  examples: []
  entry_status: Standard
  date_accepted: '2008-08-01T00:00:00+00:00'
  date_amended: '2008-08-01T00:00:00+00:00'
  review_date: '2008-08-01T00:00:00+00:00'
  review_decision_date: '2008-08-01T00:00:00+00:00'
  review_decision_event: published
