    normative_status: preferred
    designation: sampling element
  - type: expression
    normative_status: preferred
    designation: sampler
  definition: |-
    transfer element which at specific instants observes the value of the input variable and converts them into an impulse-function sequence

    SEE: {{351-45-33, IEV:351-45-33}} and Figure 8c).
  language_code: eng
  notes:
  - The analog-to-digital converter of a process computer system operates as a sampling
    element.
  - In most cases the specific instants are equidistant.
  - This entry was numbered 351-28-39 in IEC 60050-351:2006.
  examples: []
