eng:
  id: 845-24-087
  terms:
  - type: expression
    normative_status: preferred
    usage_info: of a medium
    designation: spectral optical thickness
  - type: expression
    usage_info: of a medium
    designation: spectral optical depth
  - type: symbol
    designation: stem:[δ](stem:[λ])
    international: true
  definition: |-
    integral of the <a href="IEV845-24-083">spectral linear attenuation coefficient</a>, stem:[μ](stem:[x], stem:[λ]), of the medium between the points stem:[x]~1~ and stem:[x]~2~, as given by the equation

    stem:[delta ( lambda ) = int_((x_1))^((x_2)) mu ( x , lambda ) d x]
  language_code: eng
  notes:
  - The spectral optical thickness is used in atmospheric physics and physical oceanography.
  - The spectral optical thickness has unit one.
  - This entry was numbered 845-04-80 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
