fra:
  id: 121-11-56
  terms:
  - type: expression
    normative_status: preferred
    designation: champ magnétique
    gender: m
    plurality: singular
  - type: expression
    normative_status: preferred
    designation: excitation magnétique
    gender: f
    plurality: singular
  definition: |-
    grandeur vectorielle obtenue en un point donné en soustrayant l'aimantation stem:[*M*] du quotient de l'induction magnétique stem:[*B*] par la constante magnétique stem:[μ]~0~:

    stem:[H = (B)/((mu_0)) - M]
  language_code: fra
  notes:
  - |-
    Dans le vide le champ magnétique est en tout point égal au quotient de l'induction magnétique par la constante magnétique:

    stem:[H = (B)/((mu_0))]
  - |-
    Le rotationnel du champ magnétique est égal à la densité de courant total *stem:[J]*~t~:

    *rot stem:[H]* = *stem:[J]*~t~
  - L’induction magnétique stem:[*B*] est parfois appelée "champ magnétique", ce qui
    peut entraîner une confusion avec le champ magnétique stem:[*H*].
  examples: []
