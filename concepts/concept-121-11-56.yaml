eng:
  id: 121-11-56
  terms:
  - type: expression
    normative_status: preferred
    designation: magnetic field strength
  - type: expression
    normative_status: preferred
    designation: magnetizing field strength
  - type: symbol
    designation: "*stem:[H]*"
    international: true
  definition: |-
    vector quantity obtained at a given point by subtracting the magnetization stem:[*M*] from the magnetic flux density stem:[*B*] divided by the magnetic constant stem:[μ]~0~:

    stem:[H = (B)/((mu_0)) - M]
  language_code: eng
  notes:
  - |-
    In vacuum, the magnetic field strength is at all points equal to the magnetic flux density divided by the magnetic constant:

    stem:[H = (B)/((mu_0))]
  - |-
    The rotation of the magnetic field strength is the total current density *stem:[J]*~t~:

    *rot stem:[H]* = *stem:[J]*~t~
  - The magnetic flux density stem:[*B*] is sometimes called “magnetic field”, risking
    confusion with the magnetic field strength stem:[*H*].
  examples: []
  entry_status: Standard
  classification: Preferred
