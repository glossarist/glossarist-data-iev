eng:
  id: 314-01-07
  terms:
  - type: expression
    normative_status: preferred
    designation: scale length
  definition: length of the line (curved or straight) which passes through the centres
    of all the shortest scale marks, contained between the first and last scale marks
  language_code: eng
  notes:
  - Scale length is expressed in units of length, regardless of the units of the measurand,
    or the units marked on the scale.
