fra:
  id: 845-26-066
  terms:
  - type: expression
    normative_status: preferred
    designation: dose érythémale
    gender: f
    plurality: singular
  - type: expression
    normative_status: admitted
    designation: exposition énergétique érythémale
    gender: f
    plurality: singular
  definition: |-
    intégrale de temps de l'éclairement érythémal énergétique

    stem:[H_((er)) = int int E_(lambda) ( lambda , t ) s_((er)) ( lambda ) d lambda d t]

    où stem:[Eλ](stem:[λ], stem:[t]) est l'éclairement spectral énergétique et stem:[s]~er~(stem:[λ]) est la fonction de pondération spectrale d'un érythème normalisée à 1 comme valeur maximale
  language_code: fra
  notes:
  - Cette définition est basée sur l'hypothèse selon laquelle un spectre d'action
    est adopté pour l'effet actinique pris en considération, et selon laquelle sa
    valeur maximale est égale à 1.
  - Il est essentiel de spécifier quel spectre d'action est utilisé, dans la mesure
    où l'unité est la même pour tout spectre d'action.
  - Voir aussi <a href="IEV845-26-068">dose érythémale minimale</a>, "<a href="IEV845-26-069">dose
    érythémale normalisée</a>".
  - La dose érythémale est exprimée en joule par mètre carré (J·m^−2^).
  examples: []
