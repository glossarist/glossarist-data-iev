eng:
  id: 845-26-066
  terms:
  - type: expression
    normative_status: preferred
    designation: erythemal dose
  - type: expression
    designation: erythemal radiant exposure
  - type: symbol
    designation: stem:[H]~er~
    international: true
  definition: |-
    time integral of erythemal irradiance

    stem:[H_((er)) = int int E_(lambda) ( lambda , t ) s_((er)) ( lambda ) d lambda d t]

    where stem:[Eλ](stem:[λ], stem:[t]) is spectral irradiance and stem:[s]~er~(stem:[λ]) is the erythema spectral weighting function normalized to 1 at its maximum
  language_code: eng
  notes:
  - This definition is based on the assumption that an action spectrum is adopted
    for the actinic effect considered, and that its maximum value is 1.
  - It is essential to specify which action spectrum is used, as the unit is the same
    for any action spectrum.
  - See also "<a href="IEV845-26-068">minimal erythema dose</a>", "<a href="IEV845-26-069">standard
    erythema dose</a>".
  - The erythemal dose is expressed in joule per square metre (J·m^−2^).
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
