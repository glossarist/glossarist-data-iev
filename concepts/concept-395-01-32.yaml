eng:
  id: 395-01-32
  terms:
  - type: expression
    normative_status: preferred
    designation: exposure
  - type: symbol
    designation: stem:[X]
    international: true
  definition: |-
    quotient of dstem:[Q] by dstem:[m], where dstem:[Q] is the absolute value of the total charge of the ions of one sign produced in air when all the electrons and positrons liberated or created by photons in air of mass dm are completely stopped

    stem:[X] = dstem:[Q]/dstem:[m]
  language_code: eng
  notes:
  - This quantity is expressed in coulombs per kilogram (C/kg). Formerly it was expressed
    in roentgens R (1 R = 2,58 x 10^−4^ C·kg ^−1^).
  - This term is used in the metrology of ionizing radiation.
  - This entry was numbered 393-14-57 in IEC 60050-393:2003.
  examples: []
  entry_status: Standard
  authoritative_source:
  - ref: ISO 921:1997
    clause: definition 434
    link: https://www.iso.org/standard/5333.html
    relationship:
      :type: :modified
    original: ISO 921:1997, definition 434, modified
  date_accepted: '2014-03-01T00:00:00+00:00'
  date_amended: '2014-03-01T00:00:00+00:00'
