eng:
  id: 221-02-50
  terms:
  - type: expression
    normative_status: preferred
    designation: temperature coefficient of permeability
  - type: symbol
    designation: stem:[αμ]
    international: true
  definition: |-
    the fractional change of permeability due to a change in temperature divided by that change in temperature:

    stem:[alpha_(mu) = ((mu_(theta) - mu_((ref))))/((mu_((ref)) ( theta - theta_((ref)) )))]

    where stem:[µθ] and stem:[µ]~ref~ are the permeabilities at temperatures stem:[θ] and stem:[θ]~ref~ respectively
  language_code: eng
  notes: []
  examples: []
  entry_status: Standard
  date_accepted: '1990-10-01T00:00:00+00:00'
