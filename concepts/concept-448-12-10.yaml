eng:
  id: 448-12-10
  terms:
  - type: expression
    normative_status: preferred
    designation: principle failure
  definition: an incorrect operation of protection caused by a mistake in the planning
    or design or setting or application of the protection
  language_code: eng
  notes:
  - This kind of failure cannot normally be discovered by maintenance testing.
  - |-
    A failure attributable to software in a digital relay is a principle failure.

    See figure 448-2.

    image::/assets/images/parts/448/448-fig2-en.gif[]
