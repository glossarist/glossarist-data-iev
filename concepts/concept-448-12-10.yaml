fra:
  id: 448-12-10
  terms:
  - type: expression
    normative_status: preferred
    designation: défaillance de principe
    gender: f
    plurality: singular
  definition: fonctionnement incorrect d'une protection dû à une erreur d'organisation,
    de conception, de réglage ou d'application de la protection
  language_code: fra
  notes:
  - Ce type de défaillance ne peut en général pas être décelé par des essais de maintenance.
