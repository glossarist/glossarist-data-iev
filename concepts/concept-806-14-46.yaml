  terms:
  - type: expression
    normative_status: preferred
    designation: tilt of a stylus
  definition: angular deviation between the longitudinal axis of the stylus and a
    line perpendicular to the disk surface, both of which lie in a plane perpendicular
    to the record surface and to the groove motion at the stylus tip
