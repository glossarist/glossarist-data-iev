eng:
  id: 801-29-33
  terms:
  - type: expression
    normative_status: preferred
    designation: auditory critical band
  definition: |-
    a) frequency band within which the loudness of a band of continuously distributed sound of constant sound pressure level is independent of bandwidth

    b) frequency band of sound, being a portion of a continuous-spectrum noise covering a wide band, that contains a sound pressure level equal to that of a continuous pure tone centred in the critical band and just audible in the presence of the wideband noise
  language_code: eng
  notes:
  - Ву "just audible" is meant audible in a specified fraction of the trials, for
    a specified manner of listening.
  examples: []
  entry_status: Standard
  date_accepted: '1994-07-01T00:00:00+00:00'
