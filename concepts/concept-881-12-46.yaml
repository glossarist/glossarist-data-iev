fra:
  id: 881-12-46
  terms:
  - type: expression
    normative_status: preferred
    designation: perte moyenne d'énergie par paire d'ions (dans un gaz)
    gender: f
    plurality: singular
  definition: |-
    quotient de stem:[E] par stem:[bar N], stem:[bar N] étant le nombre de paires d'ions formées lorsqu'une particule directement ionisante d'énergie initiale stem:[E] est complètement arrêtée par le gaz

    stem:[W = (E)/(bar N)]
  language_code: fra
  notes:
  - On doit inclure dans stem:[bar N] les ions provenant de l'absorption du rayonnement
    de freinage émis par les particules chargées.
  examples: []
