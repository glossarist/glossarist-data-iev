eng:
  id: 881-12-46
  terms:
  - type: expression
    normative_status: preferred
    designation: mean energy expended in a gas per ion pair formed
  - type: symbol
    designation: stem:[W]
    international: true
  definition: |-
    the quotient of stem:[E] by stem:[bar N], where stem:[bar N] is the mean number of ion pairs formed when the initial kinetic energy stem:[E] of a charged particle is completely dissipated in the gas

    stem:[W = (E)/(bar N)]
  language_code: eng
  notes:
  - The ions produced by the bremsstrahlung emitted by the charged particle must be
    counted in stem:[bar N].
  examples: []
  entry_status: Standard
  date_accepted: '1983-01-01T00:00:00+00:00'
  date_amended: '1983-01-01T00:00:00+00:00'
  review_date: '1983-01-01T00:00:00+00:00'
  review_decision_date: '1983-01-01T00:00:00+00:00'
  review_decision_event: published
