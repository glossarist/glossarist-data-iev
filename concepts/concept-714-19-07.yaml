  terms:
  - type: expression
    normative_status: preferred
    designation: overflow meter
  definition: a traffic meter associated with a group of circuits to records the incidence
    of calls which fail to find free outlets
  language_code: eng
  notes:
  - In some systems, every such call is individually registered, whereas in other
