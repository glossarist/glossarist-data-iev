  definition: "difference between two colour stimuli, defined as the Euclidean distance
    between the points representing them in the CIE 1976 L*u*v* colour space and calculated
    as:\r\n<ul style=\"list-style-type:none;\">* stem:[Delta E_(uv)^* = ( Delta L_()^*
    )^2 + ( Delta u_()^* )^2 + ( Delta v_()^* )^2^(1 // 2)]"
  language_code: eng
  notes:
  - See also CIE 15, stem:[Colorimetry].
  - 'See also ISO/CIE 11664-5, _Colorimetry – Part 5: CIE 1976 L*u*v* Colour Space
    and u'', v'' Uniform Chromaticity Scale Diagram_.'
  - This entry was numbered 845-03-55 in IEC 60050-845:1987.
