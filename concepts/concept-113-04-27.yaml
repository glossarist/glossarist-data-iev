eng:
  id: 113-04-27
  terms:
  - type: expression
    normative_status: preferred
    designation: coefficient of linear expansion
  - type: expression
    normative_status: preferred
    designation: linear expansion coefficient
  - type: symbol
    designation: |-
      stem:[α]~stem:[l]~
      stem:[α]
    international: true
  definition: quantity characterizing the variation with thermodynamic temperature
    stem:[T] of the distance stem:[l] between two points of a body, under given conditions,
    thus stem:[alpha_l = (1)/(l) ((d l))/((d T))]
  language_code: eng
  notes:
  - 1 Usually the condition is absence of external forces.
  - 2 The coherent SI unit of linear expansion coefficient is kelvin to the power
    minus one, K^−1^.
