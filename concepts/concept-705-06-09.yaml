eng:
  id: 705-06-09
  terms:
  - type: expression
    normative_status: preferred
    designation: gyro-frequency
  - type: expression
    normative_status: preferred
    designation: cyclotron frequency
  definition: the frequency of rotation of a charged particle of specified nature
    describing, in the presence of a uniform magnetic field, a helical curve around
    the lines of force of the field
  language_code: eng
  notes:
  - |-
    The gyro-frequency stem:[f]~c~ is given by the expression:

    stem:[f_c = (1)/((2 pi)) ((q B))/(m)]

    where stem:[B] is the magnetic flux density, stem:[m] and stem:[q] are the mass and the charge of the particle respectively.
