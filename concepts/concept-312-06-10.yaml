  terms:
  - type: expression
    normative_status: preferred
    designation: symmetrical input
  - type: expression
    designation: balanced input
  definition: three terminal input circuit where the nominal values of the impedances
    between the common terminal and each of the other two terminals are equal
  language_code: eng
  notes:
  - The common terminals of the input and the output need not necessarily both be
    accessible, nor need they be at the same potential.
