  terms:
  - type: expression
    normative_status: preferred
    designation: absolute error
  definition: algebraic difference between the indicated value and a comparison value
  language_code: eng
  notes:
  - This term is used in the "true value" approach.
  - The comparison value should be a true value of the quantity but, since a true
    value cannot be determined, in general, a conventional true value is used.
  examples: []
  entry_status: Standard
