fra:
  id: 311-01-05
  terms:
  - type: expression
    normative_status: preferred
    designation: erreur absolue
    gender: f
    plurality: singular
  definition: différence algébrique entre la valeur indiquée et une valeur de comparaison
  language_code: fra
  notes:
  - Ce terme est utilisé dans l’approche "valeur vraie".
  - La valeur de comparaison devrait être une valeur vraie de la grandeur, mais étant
    donné qu’une valeur vraie ne peut pas être déterminée, on utilise en pratique
    une valeur conventionnellement vraie.
  examples: []
  entry_status: Standard
