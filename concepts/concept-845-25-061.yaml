fra:
  id: 845-25-061
  terms:
  - type: expression
    normative_status: preferred
    usage_info: d'un récepteur
    designation: sensibilité
    gender: f
    plurality: singular
  definition: |-
    quotient de la réponse du récepteur, stem:[Y], par son excitation, stem:[X]

    stem:[s = (Y)/(X)]
  language_code: fra
  notes:
  - Si le signal du récepteur est stem:[Y]~0~ en l'absence d'excitation, et stem:[Y]~t~
    pour une excitation stem:[X], la sensibilité est stem:[s = ((Y_t - Y_0))/(X)].
  - En anglais, le terme "sensitivity" n'est plus usité.
  - Cet article était numéroté 845-05-54 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
