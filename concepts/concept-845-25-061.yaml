eng:
  id: 845-25-061
  terms:
  - type: expression
    normative_status: preferred
    usage_info: of a detector
    designation: responsivity
  - type: expression
    normative_status: deprecated
    designation: sensitivity
  - type: symbol
    designation: stem:[s]
    international: true
  definition: |-
    quotient of the detector output, stem:[Y], and the detector input, stem:[X]

    stem:[s = (Y)/(X)]
  language_code: eng
  notes:
  - If the detector signal is stem:[Y]~0~ in the absence of input, and is stem:[Y]~t~
    when there is an input stem:[X], the responsivity is stem:[s = ((Y_t - Y_0))/(X)].
  - The term "sensitivity" is no longer used.
  - This entry was numbered 845-05-54 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  classification: Deprecated
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
