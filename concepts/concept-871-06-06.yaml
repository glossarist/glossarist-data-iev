eng:
  id: 871-06-06
  terms:
  - type: expression
    normative_status: preferred
    designation: medical device
  definition: |-
    instrument, apparatus, implement, machine, appliance, implant, reagent for in vitro use, software, material or other similar or related article, intended by the manufacturer to be used, alone or in combination, for human beings, for one or more of the specific medical purpose(s) of:* diagnosis, prevention, monitoring, treatment or alleviation of disease;* diagnosis, monitoring, treatment, alleviation of or compensation for an injury;* investigation, replacement, modification, or support of the anatomy or of a physiological process;* supporting or sustaining life;* control of conception;* disinfection of medical devices;* providing information by means of in vitro examination of specimens derived from the human body;

    and does not achieve its primary intended action by pharmacological, immunological or metabolic means, in or on the human body, but which can be assisted in its intended function by such means
  language_code: eng
  notes:
  - Products that can be considered to be medical devices in some jurisdictions but
    not in others include:* disinfection substances;* aids for persons with disabilities;*
    devices incorporating animal and/or human tissues;* devices for in vitro fertilization
    or assisted reproduction technologies.
  examples: []
  entry_status: Standard
  authoritative_source:
  - ref: ISO 13485:2016
    clause: '3.11'
    link: https://www.iso.org/standard/59752.html
    relationship:
      :type: :modified
      :modification: '"may" corrected to "can", and the source reference omitted.'
    original: ISO 13485:2016, 3.11, modified – "may" corrected to "can", and the source
      reference omitted.
  date_accepted: '2018-05-01T00:00:00+00:00'
  date_amended: '2018-05-01T00:00:00+00:00'
