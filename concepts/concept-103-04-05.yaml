eng:
  id: 103-04-05
  terms:
  - type: expression
    normative_status: preferred
    designation: Laplace transform
  definition: |-
    for a real or complex function stem:[f](stem:[t]) of the real variable stem:[t], complex function stem:[F](stem:[s]) of a complex variable stem:[s], given by the integral transformation

    stem:[F ( s ) = int_( 0)^( + oo) f ( t ) e^(- s t) d t]
  language_code: eng
  notes:
  - If stem:[t] is time, the variable stem:[s] represents complex angular frequency.
  - The Laplace transform of the function stem:[f] is also denoted Lstem:[f] or ℒstem:[f].
  examples: []
  entry_status: Standard
  date_accepted: '2009-12-01T00:00:00+00:00'
