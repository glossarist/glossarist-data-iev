  terms:
  - type: expression
    normative_status: preferred
    designation: constant linear velocity system
  - type: expression
    designation: CLV system
  definition: disk recording and playback system in which the relative velocity between
    the scanning spot and the track is maintained at a constant value, in order to
    keep the linear density of data constant over the whole disk
  language_code: eng
  notes:
