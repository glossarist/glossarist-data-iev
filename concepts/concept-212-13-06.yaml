eng:
  id: 212-13-06
  terms:
  - type: expression
    normative_status: preferred
    designation: fluidized bed coating
  definition: coating process in which a part to be coated is dipped into a fluidized
    bed of powdered plastic particles and usually subsequently heated to fuse the
    particles adhering to it
  language_code: eng
  notes:
  - |-
    The process may be executed either:

    1) by preheating the part to be coated to make powdered plastic particles in the fluidized bed adhere to it, or

    2) by dipping the part to be coated, which must be at least slightly electrically conductive and earthed, cold into a fluidized bed of electrostatically charged powdered plastic particles and subsequently fuse  the adhering particles to it by heating.
  examples: []
  entry_status: Standard
  date_accepted: '2010-06-01T00:00:00+00:00'
