eng:
  id: 845-27-115
  terms:
  - type: expression
    normative_status: preferred
    designation: amplitude of fluctuation of the luminous flux
  definition: |-
    relative amplitude of the periodic fluctuation of the luminous flux as calculated by the ratio of the difference between the maximum and the minimum instantaneous luminous flux, stem:[Φ]~max~ and stem:[Φ]~min~ respectively, to the sum of both of these values:

    stem:[((Phi_((max)) - Phi_((min))))/((Phi_((max)) + Phi_((min))))]
  language_code: eng
  notes:
  - The amplitude of fluctuation can be applied also for "luminance" and "illuminance".
    Additional photometric quantities can be used.
  - The amplitude of fluctuation of the luminous flux has unit one and is usually
    expressed in per cent (%).
  - This entry was numbered 845-07-66 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-27-115
  terms:
  - type: expression
    normative_status: preferred
    designation: amplitude de fluctuation du flux lumineux
    gender: f
    plurality: singular
  definition: |-
    amplitude relative de la fluctuation périodique du flux lumineux calculée par le rapport de la différence entre le flux lumineux instantané maximal et minimal, stem:[Φ]~max~ et stem:[Φ]~min~ respectivement, à la somme de ces deux valeurs

    stem:[((Phi_((max)) - Phi_((min))))/((Phi_((max)) + Phi_((min))))]
  language_code: fra
  notes:
  - L'amplitude de fluctuation peut être appliquée également pour la "luminance" et
    l'"éclairement". D'autres grandeurs photométriques peuvent être utilisées.
  - L'unité d'amplitude de fluctuation du flux lumineux exprimée habituellement en
    pour cent (%) est un.
  - Cet article était numéroté 845-07-66 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
