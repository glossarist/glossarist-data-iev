eng:
  id: 395-02-11
  terms:
  - type: expression
    normative_status: preferred
    designation: delayed neutron
  definition: neutron emitted by a nucleus in an excited state which was formed during
    the ß-decay of a fission product
  language_code: eng
  notes:
  - The neutron emission itself is prompt, so that the observed delay is due to the
    preceding beta emission or emissions.
  - This entry was numbered 393-12-71 in IEC 60050-393:2003.
