  terms:
  - type: expression
    normative_status: preferred
    designation: photon radiance dose
  - type: symbol
    designation: |-
      stem:[L]~p,~stem:[t]
      stem:[Lt]
    international: true
  definition: |-
    time integral of photon radiance, stem:[L]~p~, over a given duration, Δstem:[t]

    stem:[L_((p , t)) = underset((Delta t))( int ) L_p d t]
  language_code: eng
  notes:
  - The corresponding radiometric quantity is "radiance dose". The corresponding photometric
    quantity is "luminance dose".
  - The photon radiance dose is expressed in metre to the power minus two per steradian
    (m^−2^·sr^−1^).
