    normative_status: preferred
    designation: dose de luminance photonique
    gender: f
    plurality: singular
  definition: |-
    intégrale par rapport au temps de la luminance photonique, stem:[L]~p~, pendant une durée donnée, Δstem:[t]

    stem:[L_((p , t)) = underset((Delta t))( int ) L_p d t]
  language_code: fra
  notes:
  - La grandeur radiométrique correspondante est la "dose de luminance énergétique".
