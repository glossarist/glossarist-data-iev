  terms:
  - type: expression
    normative_status: preferred
    designation: coefficient de désacommodation (de la perméabilité)
    gender: m
    plurality: singular
  definition: |-
    rapport de la désaccomodation de la perméabilité après conditionnement magnétique au logarithme décimal du rapport des intervalles de temps entre la fin de ce conditionnement et respectivement la seconde et la première mesure:

    stem:[d = (D)/((lg ((t_2))/((t_1))))]

    où stem:[D] est la désaccommodation mesurée entre les instants stem:[t]~1~ et stem:[t]~2~ après le conditionnement magnétique
