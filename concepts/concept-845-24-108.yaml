    usage_info: of electromagnetic waves
    designation: refraction
  definition: process by which the direction of propagation of an {{electromagnetic
    wave, IEV:121-11-63}} is changed as a result of changes in its velocity of propagation
    in passing through an optically non-homogeneous medium, or in crossing a surface
    separating media with different refractive indexes
