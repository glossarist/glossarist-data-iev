eng:
  id: 426-11-52
  terms:
  - type: expression
    normative_status: preferred
    designation: infallible connections
  definition: connections, including joints and interconnecting wiring and printed
    circuit board tracks, that are not considered as becoming open-circuited in service
    or storage
  language_code: eng
  notes:
  - 'The specific conditions to be considered are specified in IEC 60079-11, _Explosive
    atmospheres – Part 11: Equipment protection by intrinsic safety "i"_.'
  examples: []
