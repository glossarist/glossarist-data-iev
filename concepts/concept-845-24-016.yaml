  terms:
  - type: expression
    normative_status: preferred
    usage_info: of a thermal radiator, for a specified wavelength
    designation: radiance temperature
  definition: temperature of the Planckian radiator for which the radiance at the
    specified wavelength has the same spectral concentration as for the thermal radiator
    considered
  language_code: eng
  notes:
