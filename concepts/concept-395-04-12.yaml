  terms:
  - type: expression
    normative_status: preferred
    designation: spectrum stabilizer
  definition: assembly which reduces the distortion of a spectrum by compensating
    for the drift of certain elements, for example the detector, the high-voltage
    power supply, the amplifier or the analyser
