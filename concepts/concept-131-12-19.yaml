fra:
  id: 131-12-19
  terms:
  - type: expression
    normative_status: preferred
    designation: inductance
    gender: f
    plurality: singular
  definition: |-
    pour un bipôle inductif de bornes A et B, quotient du flux totalisé stem:[Ψ] entre les bornes par le courant électrique stem:[i] dans le bipôle

    stem:[L = (Psi)/(i)]

    où le signe du flux totalisé est déterminé en prenant la tension électrique, dans l'intégrale qui le définit, comme la différence des potentiels électriques en A et B et où le courant est pris positif si le sens du courant est de A vers B et négatif si son sens est de B vers A
  language_code: fra
  notes:
  - Une inductance ne peut pas être négative.
  - En français, le terme «inductance» désigne aussi elliptiquement une bobine d’inductance,
    en anglais «inductor» ({{151-13-25, IEV:151-13-25}}).
  - L’unité SI cohérente de l’inductance est le henry, H.
  examples: []
  entry_status: Standard
  review_decision_event: published
