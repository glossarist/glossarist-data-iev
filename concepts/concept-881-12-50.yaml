eng:
  id: 881-12-50
  terms:
  - type: expression
    normative_status: preferred
    designation: collision mass stopping power
  - type: symbol
    designation: stem:[S]~col~/stem:[ρ]
    international: true
  definition: |-
    the quotient of dstem:[E]~col~ by the product of stem:[ρ] and dstem:[l], where dstem:[E]~col~ is the energy lost by a charged particle of specified energy by collisions in traversing the path length dstem:[l] in a material of density stem:[ρ] :

    stem:[((S_((col))))/(rho) = (1)/(rho) * (( ((d E))/((d l)) ))_((col))]
  language_code: eng
  notes:
  - The energy losses included are those that produce excitation and ionization of
    atoms as well as those producing recoil atoms.
  examples: []
  entry_status: Standard
  date_accepted: '1983-01-01T00:00:00+00:00'
  date_amended: '1983-01-01T00:00:00+00:00'
  review_date: '1983-01-01T00:00:00+00:00'
  review_decision_date: '1983-01-01T00:00:00+00:00'
  review_decision_event: published
