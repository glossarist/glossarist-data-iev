eng:
  id: 871-06-01
  terms:
  - type: expression
    normative_status: preferred
    designation: electronic health record
  definition: repository of information regarding the health status of a person, in
    computer processable form, stored and transmitted securely, and accessible by
    multiple authorized users
  language_code: eng
  notes:
  - An electronic health record has a standardized or commonly agreed logical information
    model which is independent of electronic health record systems. Its primary purpose
    is the support of continuing, efficient and quality integrated healthcare.
  - An electronic health record contains information which is retrospective, concurrent,
    and prospective.
  examples: []
  entry_status: Standard
  authoritative_source:
  - ref: ISO/TR 20514:2005
    clause: '2.11'
    link: https://www.iso.org/standard/39525.html
    relationship:
      :type: :modified
      :modification: The abbreviated term EHR has been omitted; in the definition,
        "a subject of care" has been replaced by "a person", and the text ", stored
        and transmitted securely, and accessible by multiple authorized users" has
        been added; the note has been replaced by Notes 1 and 2 to entry.
    original: ISO/TR 20514:2005, 2.11, modified – The abbreviated term EHR has been
      omitted; in the definition, "a subject of care" has been replaced by "a person",
      and the text ", stored and transmitted securely, and accessible by multiple
      authorized users" has been added; the note has been replaced by Notes 1 and
      2 to entry.
