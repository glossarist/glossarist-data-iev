eng:
  id: 466-03-14
  terms:
  - type: expression
    normative_status: preferred
    designation: catenary constant
  definition: constant in the catenary and parabola equations, geometrically represented
    by the radius of curvature at the lowest point of the span
  language_code: eng
  notes:
  - |-
    The catenary constant stem:[ρ] is equal to the quotient of the horizontal tension in the conductor stem:[T]~o~ at a given temperature (see Figure 466-1) by its unit weight stem:[ω], which must take into account the ice or wind overloads, if applicable.

    stem:[rho = ((T_o))/(omega)]
  examples: []
  entry_status: Standard
  date_accepted: '1990-10-01T00:00:00+00:00'
