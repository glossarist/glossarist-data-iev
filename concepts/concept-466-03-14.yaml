fra:
  id: 466-03-14
  terms:
  - type: expression
    normative_status: preferred
    designation: paramètre
    gender: m
    plurality: singular
  definition: constante des équations de la chaînette et de la parabole représentée
    géométriquement par le rayon de courbure au point où la tangente à la courbe est
    horizontale
  language_code: fra
  notes:
  - |-
    Le paramètre stem:[ρ] est égal au quotient de la tension horizontale du conducteur stem:[T]~o~ à une température donnée (voir Figure 466-1) par le poids linéique stem:[ω] du conducteur, en tenant compte des surcharges éventuelles de givre ou de vent.

    stem:[rho = ((T_o))/(omega)]

