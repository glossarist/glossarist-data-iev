eng:
  id: 845-29-112
  terms:
  - type: expression
    normative_status: preferred
    designation: CIE standard clear sky
  definition: |-
    cloudless sky for which the relative luminance distribution is given by the luminance gradation function, stem:[φ](stem:[Z]), which relates the luminance of a sky element to its zenith angle, stem:[Z]:

    stem:[phi ( Z ) = 1 - e^(((- 0,32))/((cos Z)))] if stem:[0 &lt;= Z (pi)/(2)], and stem:[phi ( Z ) = 1]

    if stem:[Z = (pi)/(2)] (at the horizon)
  language_code: eng
  notes:
  - For additional information, see ISO 15469/CIE S 011, _Spatial distribution of
    daylight – CIE standard general sky_.
  - This entry was numbered 845-09-91 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-29-112
  terms:
  - type: expression
    normative_status: preferred
    designation: ciel serein normalisé CIE
    gender: m
    plurality: singular
  definition: |-
    ciel sans nuage dont la distribution relative de luminance est donnée par la fonction de gradation de luminance stem:[φ](stem:[Z]), qui associe la luminance d'un élément de ciel à son angle zénithal, stem:[Z]:

    stem:[phi ( Z ) = 1 - e^(((- 0,32))/((cos Z)))] si stem:[0 &lt;= Z (pi)/(2)], et stem:[phi ( Z ) = 1]

    si stem:[Z = (pi)/(2)] (au niveau de l'horizon)
  language_code: fra
  notes:
  - Pour des informations complémentaires, voir l'ISO 15469/CIE S 011, _Répartition
    spatiale de la lumière du jour – Ciel général normalisé CIE._
  - Cet article était numéroté 845-09-91 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
