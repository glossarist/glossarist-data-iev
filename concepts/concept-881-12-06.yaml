  id: 881-12-06
  terms:
  - type: expression
    normative_status: preferred
    designation: dose absorbée
    gender: f
    plurality: singular
  definition: |-
    quotient de l'énergie moyenne stem:[d bar epsilon] communiquée par un rayonnement ionisant à une matière par la masse dstem:[m] de cette matière

    stem:[D = ((d bar epsilon))/((d m))]
  language_code: fra
  notes:
  - |-
    L'unité SI de dose absorbée est le joule par kilogramme et a reçu le nom de gray (Gy). L'ancienne unité de dose absorbée, utilisée encore temporairement, est le rad.

    1 Gy = 1 J kg^−1^ = 100 rad
