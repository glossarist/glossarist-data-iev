eng:
  id: 845-21-097
  terms:
  - type: expression
    normative_status: preferred
    usage_info: of an astronomical object
    designation: apparent magnitude
  - type: symbol
    designation: stem:[m]
    international: true
  definition: |-
    quantity that correlates with the more or less luminous aspect of a star and that is defined by the formula

    stem:[m] = stem:[m]~o~ − 2,5 log~10~(stem:[E]~pb~/stem:[E]~o~)

    where stem:[E]~pb~ is the point brilliance of the star considered, stem:[m]~o~ and stem:[E]~o~ are constants based on the magnitudes ascribed to certain standard stars
  language_code: eng
  notes:
  - In addition to the (visual) apparent magnitude defined here, other apparent magnitudes
    (photographic, bolometric, etc.) are defined by the same formula, but where stem:[E]~pb~
    and stem:[E]~o~ are the responses of a detector having a specified spectral responsivity.
  - The apparent magnitude has unit one.
  - This entry was numbered 845-01-60 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-21-097
  terms:
  - type: expression
    normative_status: preferred
    usage_info: d'un objet astronomique
    designation: magnitude apparente
    gender: f
    plurality: singular
  definition: |-
    grandeur en relation avec l'aspect plus ou moins lumineux d'une étoile, et définie par la formule

    stem:[m] = stem:[m]~o~ − 2,5 log~10~(stem:[E]~pb~/stem:[E]~o~)

    où stem:[E]~pb~ est l'éclat apparent de l'étoile prise en considération, stem:[m]~o~ et stem:[E]~o~ sont des constantes dont la valeur résulte des magnitudes attribuées à certaines étoiles de référence
  language_code: fra
  notes:
  - Outre la magnitude apparente (visuelle) définie ici, d'autres magnitudes apparentes
    (photographiques, bolométriques, etc.) sont définies par la même formule, mais
    stem:[E]~pb~ et stem:[E]~o~ sont alors les réponses d'un récepteur ayant une sensibilité
    spectrale spécifiée.
  - L'unité de magnitude apparente est un.
  - Cet article était numéroté 845-01-60 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
