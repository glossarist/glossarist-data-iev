  terms:
  - type: expression
    normative_status: preferred
    usage_info: of an item
    designation: failure
  definition: loss of ability to perform as required
  language_code: eng
  notes:
  - Qualifiers, such as catastrophic, critical, major, minor, marginal and insignificant,
    may be used to categorize failures according to the severity of consequences,
    the choice and definitions of severity criteria depending upon the field of application.
  - Qualifiers, such as misuse, mishandling and weakness, may be used to categorize
    failures according to the cause of failure.
