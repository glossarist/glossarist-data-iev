eng:
  id: 845-25-069
  terms:
  - type: expression
    normative_status: preferred
    usage_info: of a detector
    designation: noise-equivalent input
  definition: value of the detector input that produces an output equal to the root
    mean square (RMS) noise output, for a stated {{frequency, IEV:103-06-02}} and
    bandwidth of the measuring instrument
  language_code: eng
  notes:
  - It is usual to consider a 1 Hz bandwidth, and this value is implied unless stated
    otherwise.
  - This entry was numbered 845-05-62 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
