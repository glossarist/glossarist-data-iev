eng:
  id: 426-13-02
  terms:
  - type: expression
    normative_status: preferred
    designation: non-sparking device "nA"
  definition: device constructed to minimize the risk of occurrence of arcs or sparks
    capable of creating an ignition hazard during conditions of normal operation
  language_code: eng
  notes:
  - Normal operation is considered to exclude the removal or insertion of components
    with the circuit energized.
  - '"nA" has been replaced by "ec" in IEC 60079-7, _Explosive atmospheres – Part
    7: Equipment protection by increased safety "e"_.'
