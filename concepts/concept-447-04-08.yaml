  terms:
  - type: expression
    normative_status: preferred
    designation: output make circuit
  definition: "{{output circuit, IEV:447-04-01}} which, when the {{measuring relay,
    IEV:447-01-02}} or {{protection equipment, IEV:447-01-49}} is in its {{operate
    condition, IEV:447-02-01}}, either is closed by a contact or is effectively conducting,
    and when the relay is in its {{reset condition, IEV:447-02-02}}, either is open
