eng:
  id: 131-14-23
  terms:
  - type: expression
    normative_status: preferred
    designation: open-circuit
  definition: qualifies an input, output or transfer immittance when the other ports
    have zero terminating admittances, or a forward or reverse transfer ratio when
    the port corresponding to the numerator has zero terminating admittance
  language_code: eng
  notes:
  - Examples in IEC 60027-2 are the open-circuit output impedance, the open-circuit
    output admittance, the open-circuit reverse voltage transfer ratio.
  examples: []
  entry_status: Standard
  date_accepted: '2002-06-01T00:00:00+00:00'
