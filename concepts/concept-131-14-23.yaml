fra:
  id: 131-14-23
  terms:
  - type: expression
    normative_status: preferred
    designation: en circuit ouvert
  definition: qualifie une immittance d'entrée, de sortie ou de transfert lorsque
    les autres accès ont des admittances de fermeture nulles, ou un rapport de transfert
    direct ou inverse lorsque l'accès correspondant au numérateur a une admittance
    de fermeture nulle
  language_code: fra
  notes:
  - Des exemples dans la CEI 60027-2 sont l’impédance de sortie en circuit ouvert,
    l’admittance de sortie en circuit ouvert et le rapport de transfert inverse de
    la tension en circuit ouvert.
  examples: []
