eng:
  id: 112-01-32
  terms:
  - type: expression
    normative_status: preferred
    designation: unit equation
  definition: mathematical relation between base units, coherent derived units or
    other units of measurement
  language_code: eng
  notes:
  - "For the quantities stem:[Q]~1~, stem:[Q]~2~, and stem:[Q]~3~ related by the quantity
    equation stem:[Q]~1~ = stem:[ζ] stem:[Q]~2~ stem:[Q]~3~, the unit equation is
    &amp;lsqb;stem:[Q]~1~&amp;rsqb; = &amp;lsqb;stem:[Q]~2~&amp;rsqb; &amp;lsqb;stem:[Q]~3~&amp;rsqb;,
    where &amp;lsqb;stem:[Q]~1~&amp;rsqb;, &amp;lsqb;stem:[Q]~2~&amp;rsqb;, and &amp;lsqb;stem:[Q]~3~&amp;rsqb;
    denote the units of stem:[Q]~1~, stem:[Q]~2~, and stem:[Q]~3~, respectively, provided
    that these units are in a coherent system of units.\n\nExamples: \r\n\r\n* J :=
    kg m^2^ s^−2^, where J, kg, m, and s are the symbols for the joule, kilogram,
    metre, and second, respectively (the symbol := denotes “is by definition equal
    to”); \r\n* 1 km/h = (1/3,6) m/s.\r\n"
  examples: []
  entry_status: Standard
  authoritative_source:
  - ref: ISO/IEC Guide 99:2007
    clause: '1.23'
    link: https://www.iso.org/standard/45324.html
    relationship:
      :type: :modified
    original: ISO/IEC GUIDE 99:2007 1.23 MOD
  date_accepted: '2010-01-01T00:00:00+00:00'
  date_amended: '2010-01-01T00:00:00+00:00'
  review_date: '2010-01-01T00:00:00+00:00'
  review_decision_date: '2010-01-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 112-01-32
  terms:
  - type: expression
    normative_status: preferred
    designation: équation aux unités
    gender: f
    plurality: singular
  definition: relation d'égalité entre des unités de base, des unités dérivées cohérentes
    ou d'autres unités de mesure
  language_code: fra
  notes:
  - "Pour les grandeurs stem:[Q]~1~, stem:[Q]~2~ et stem:[Q]~3~ reliées par l'équation
    aux grandeurs stem:[Q]~1~ = stem:[ζ] stem:[Q]~2~ stem:[Q]~3~, l'équation aux unités
    est &amp;lsqb;stem:[Q]~1~&amp;rsqb; = &amp;lsqb;stem:[Q]~2~&amp;rsqb; &amp;lsqb;stem:[Q]~3~&amp;rsqb;,
    où &amp;lsqb;stem:[Q]~1~&amp;rsqb;, &amp;lsqb;stem:[Q]~2~&amp;rsqb; et &amp;lsqb;stem:[Q]~3~&amp;rsqb;
    représentent respectivement les unités de stem:[Q]~1~, stem:[Q]~2~ et stem:[Q]~3~,
    pourvu que ces unités soient dans un système cohérent d'unités.\n\nExemples:\r\n\r\n*
    J := kg m^2^ s^−2^, où J, kg, m et s sont respectivement les symboles du joule,
    du kilogramme, du mètre et de la seconde (le symbole := signifie «est par définition
    égal à»);\r\n* 1 km/h = (1/3,6) m/s.\r\n"
  examples: []
  entry_status: Standard
  authoritative_source:
