eng:
  id: 845-24-066
  terms:
  - type: expression
    normative_status: preferred
    designation: regular reflectance
  - type: symbol
    designation: stem:[ρ]~r~
    international: true
  definition: quotient of the regularly reflected part of the (whole) reflected flux
    and the incident flux
  language_code: eng
  notes:
  - 'Reflectance, stem:[ρ], is the sum of regular reflectance, stem:[ρ]~r~, and diffuse
    reflectance, stem:[ρ]~d~: stem:[ρ] = stem:[ρ]~r~ + stem:[ρ]~d~.'
  - The regular reflectance has unit one.
  - This entry was numbered 845-04-60 in IEC 60050-845:1987.
