eng:
  id: 561-02-22
  terms:
  - type: expression
    normative_status: preferred
    usage_info: of a filter
    designation: insertion attenuation
  definition: ratio of the power delivered to the load impedance before insertion
    of the filter to the power delivered to the load impedance after insertion of
    the filter
  language_code: eng
  notes:
  - The insertion attenuation is generally expressed in decibels.
  - |-
    An example of the frequency responses of a filter is shown in Figure 11. In this figure, various insertion attenuation levels are shown.

    image::/assets/images/parts/561/561-fig11-en.png[]

    *Figure 11 – Frequency response of insertion attenuation of a filter*
  - This entry was numbered 561-03-21 in IEC 60050-561:1991.
