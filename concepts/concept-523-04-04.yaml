    clause: 2.4.15
    link: https://webstore.iec.ch/publication/23992
    relationship:
      :type: :modified
      :modification: '"Microgyroscopes are expected to be applied as microrobot attitude
        sensors." omitted from Note 1 to entry'
    original: IEC 62047-1:2016, 2.4.15, modified – "Microgyroscopes are expected to
      be applied as microrobot attitude sensors." omitted from Note 1 to entry
