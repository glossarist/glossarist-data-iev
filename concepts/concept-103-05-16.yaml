eng:
  id: 103-05-16
  terms:
  - type: expression
    normative_status: preferred
    designation: local minimum
  definition: property of a function stem:[f ( t )] for a value stem:[t]~0~ of its
    argument, characterised by the existence of a positive number stem:[ε] such that
    stem:[f ( t_0 ) f ( t )] for any stem:[t] with stem:[0 | t - t_0 | epsilon]
  language_code: eng
  notes:
  - If the condition stem:[f ( t_0 ) f ( t )] is replaced with stem:[f ( t_0 ) &lt;=
    f ( t )], the property may occur for an interval of values of the argument.
  examples: []
  entry_status: Standard
