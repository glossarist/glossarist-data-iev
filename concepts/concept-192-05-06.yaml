eng:
  id: 192-05-06
  terms:
  - type: expression
    normative_status: preferred
    designation: instantaneous failure rate
  - type: expression
    normative_status: preferred
    designation: failure rate
  - type: symbol
    designation: stem:[λ](stem:[t])
    international: true
  definition: |-
    limit, if it exists, of the quotient of the conditional probability that the failure of a non-repairable item occurs within time interval (stem:[t], stem:[t] + Δstem:[t]) by Δstem:[t], when Δstem:[t] tends to zero, given that failure has not occurred within time interval (0, stem:[t])

    stem:[lambda ( t ) = underset((Delta t -&gt; 0))((lim)) (1)/((Delta t)) ((F ( t + Delta t ) – F ( t )))/((R ( t ))) = ((f ( t )))/((R ( t )))]

    where stem:[F](stem:[t]) and stem:[f](stem:[t]) are, respectively, the distribution function and the probability density at the failure instant, and where stem:[R](stem:[t]) is the reliability function, related to the reliability stem:[R](stem:[t]~1~, stem:[t]~2~) by stem:[R](stem:[t]) = stem:[R](0, stem:[t]).
  language_code: eng
  notes:
  - See IEC 61703, _Mathematical expressions for reliability, availability, maintainability
    and maintenance support terms_, for more detail.
  - 'Other terms used for instantaneous failure rate are: “hazard function”; “hazard
    rate”; and “force of mortality” (abbreviation FOM).'
  examples: []
  entry_status: Standard
  classification: Preferred
  date_accepted: '2015-02-01T00:00:00+00:00'
  date_amended: '2015-02-01T00:00:00+00:00'
  review_date: '2015-02-01T00:00:00+00:00'
  review_decision_date: '2015-02-01T00:00:00+00:00'
