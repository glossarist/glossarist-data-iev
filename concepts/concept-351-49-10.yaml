eng:
  id: 351-49-10
  terms:
  - type: expression
    normative_status: preferred
    designation: reference-variable generating element
  definition: |-
    functional unit that generates in closed-loop control the reference variable at its output from the command variable at its input

    SEE: Figure 2.



    EXAMPLE 2: A turbine wall temperature measuring device ensures that the turbine output power is varied at such a rate that the temperature difference between the various zones of the turbine wall does not exceed permissible values.
  language_code: eng
  notes:
  - Reference-variable generating elements are in many cases used to prevent critical
    limit values of the reference variable, its derivatives or other process variables
    being exceeded.
  - |-
    This entry was numbered 351-28-10 in IEC 60050-351:2006.

    image::/assets/images/parts/351/351-fig2-en.png[Figure 2 - Functional diagram indicating typical elements of an elementary closed-loop control system]
  examples:
  - '1: Electronic ramp-function generator the output signal of which follows variations
    of the input signal only up to a maximum permissible rate of change. If the rate
    of change of the input signal exceeds the permissible limit, the output signal
    follows only at a preset maximum rate of change.'
  entry_status: Standard
  date_accepted: '2013-11-01T00:00:00+00:00'
  date_amended: '2013-11-01T00:00:00+00:00'
  review_date: '2013-11-01T00:00:00+00:00'
  review_decision_date: '2013-11-01T00:00:00+00:00'
  review_decision_event: published
