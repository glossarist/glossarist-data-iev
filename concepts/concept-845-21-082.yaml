eng:
  id: 845-21-082
  terms:
  - type: expression
    normative_status: preferred
    designation: photon exitance
  - type: symbol
    designation: |-
      stem:[M]~p~
      stem:[M]
    international: true
  definition: |-
    density of exiting photon flux with respect to area at a point on a real or imaginary surface

    stem:[M_p = ((d Phi_p))/((d A))]

    where stem:[Φ]~p~ is photon flux and stem:[A] is the area from which the photon flux leaves
  language_code: eng
  notes:
  - The corresponding radiometric quantity is "radiant exitance". The corresponding
    photometric quantity is "luminous exitance".
  - The photon exitance is expressed in second to the power minus one per square metre
    (s^−1^·m^−2^).
  - This entry was numbered 845-01-49 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-21-082
  terms:
  - type: expression
    normative_status: preferred
    designation: exitance photonique
    gender: f
    plurality: singular
  definition: |-
    densité du flux photonique exitant par rapport à l'aire en un point d'une surface réelle ou fictive

    stem:[M_p = ((d Phi_p))/((d A))]

    où stem:[Φ]~p~ est le flux photonique et stem:[A] est l'aire de laquelle part ce flux
  language_code: fra
  notes:
  - La grandeur radiométrique correspondante est l'"exitance énergétique". La grandeur
    photométrique correspondante est l'"exitance lumineuse".
  - L'exitance photonique est exprimée en seconde à la puissance moins un par mètre
    carré (s^−1^·m^−2^).
  - Cet article était numéroté 845-01-49 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
