fra:
  id: 845-21-068
  terms:
  - type: expression
    normative_status: preferred
    designation: dose de luminance
    gender: f
    plurality: singular
  definition: |-
    intégrale par rapport au temps de la luminance, stem:[L]~v~, pendant une durée donnée, Δstem:[t]

    stem:[L_((v , t)) = underset((Delta t))( int ) L_v d t]
  language_code: fra
  notes:
  - La grandeur radiométrique correspondante est la "dose de luminance énergétique".
    La grandeur correspondante pour les photons est la "dose de luminance photonique".
  - La dose de luminance est exprimée en candela seconde par mètre carré (cd·s·m^−2^).
  examples: []
  entry_status: Standard
  review_decision_event: published
