eng:
  id: 845-21-068
  terms:
  - type: expression
    normative_status: preferred
    designation: luminance dose
  - type: symbol
    designation: |-
      stem:[L]~v,~stem:[t]
      stem:[Lt]
    international: true
  definition: |-
    time integral of luminance, stem:[L]~v~, over a given duration, Δstem:[t]

    stem:[L_((v , t)) = underset((Delta t))( int ) L_v d t]
  language_code: eng
  notes:
  - The corresponding radiometric quantity is "radiance dose". The corresponding quantity
    for photons is "photon radiance dose".
  - The luminance dose is expressed in candela times second per square metre (cd·s·m^−2^).
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
