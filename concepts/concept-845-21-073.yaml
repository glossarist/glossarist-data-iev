eng:
  id: 845-21-073
  terms:
  - type: expression
    normative_status: preferred
    designation: photon exposure
  - type: symbol
    designation: |-
      stem:[H]~p~
      stem:[H]
    international: true
  definition: |-
    density of incident photon number with respect to area at a point on a real or imaginary surface

    stem:[H_p = ((d N_p))/((d A))]

    where stem:[N]~p~ is photon number and stem:[A] is the area on which the photons are incident
  language_code: eng
  notes:
  - The corresponding radiometric quantity is "radiant exposure". The corresponding
    photometric quantity is "luminous exposure".
  - The photon exposure is expressed in metre to the power minus two (m^−2^).
  - This entry was numbered 845-01-44 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-21-073
  terms:
  - type: expression
    normative_status: preferred
    designation: exposition photonique
    gender: f
    plurality: singular
  definition: |-
    densité du nombre de photons incidents par rapport à une aire en un point d'une surface réelle ou fictive

    stem:[H_p = ((d N_p))/((d A))]

    où stem:[N]~p~ est le nombre de photons et stem:[A] est l'aire qui reçoit les photons
  language_code: fra
  notes:
  - La grandeur radiométrique correspondante est l'"exposition énergétique". La grandeur
    photométrique correspondante est l'"exposition lumineuse".
  - L'exposition photonique est exprimée en mètre à la puissance moins deux (m^−2^).
  - Cet article était numéroté 845-01-44 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
