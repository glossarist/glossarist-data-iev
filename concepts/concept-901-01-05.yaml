eng:
  id: 901-01-05
  terms:
  - type: expression
    normative_status: preferred
    designation: acknowledged rule of technology
  definition: technical {{provision, IEV:901-05-01}} acknowledged by a majority of
    representative experts as reflecting the {{state of the art, IEV:901-01-04}}
  language_code: eng
  notes:
  - A {{normative document, IEV:901-02-01}} on a technical subject, if prepared with
    the cooperation of concerned interests by consultation and {{consensus, IEV:901-01-11}}
    procedures, is presumed to constitute an acknowledged rule of technology at the
    time of its approval.
