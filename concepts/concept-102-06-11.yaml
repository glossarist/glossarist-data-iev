eng:
  id: 102-06-11
  terms:
  - type: expression
    normative_status: preferred
    usage_info: of square matrices
    designation: multiplication
  definition: operation defined on the set of square matrices of a given order, which
    associates to any ordered pair (*stem:[A]*, *stem:[B]*) of matrices their product
    *stem:[AB]*
  language_code: eng
  notes:
  - The multiplication of square matrices is associative, (*stem:[AB]*)*stem:[C]*
    = *stem:[A]*(*stem:[BC]*), but not commutative, generally *stem:[AB]* ≠ *stem:[BA]*.
