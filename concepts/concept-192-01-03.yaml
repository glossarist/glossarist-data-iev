fra:
  id: 192-01-03
  terms:
  - type: expression
    normative_status: preferred
    usage_info: en sûreté de fonctionnement
    designation: système
    gender: m
    plurality: singular
  definition: ensemble d’entités reliées entre elles qui satisfont collectivement
    à une exigence
  language_code: fra
  notes:
  - Un système est considéré comme ayant une frontière définie, réelle ou abstraite.
  - Des ressources externes (provenant d’au-delà de la frontière) peuvent être nécessaires
    au fonctionnement du système.
  - La structure d’un système peut être hiérarchique, par exemple, système, sous-système,
    composant, etc.
  - Il convient d’exprimer ou de sous-entendre les conditions d’utilisation et de
    maintenance dans l’exigence.
  examples: []
  entry_status: Standard
  authoritative_source:
  - ref: IEC 60050-151:2001
    clause: 151-11-27
    link: https://webstore.iec.ch/publication/176
    relationship:
      :type: :modified
      :modification: pour adapter au contexte de la sûreté de fonctionnement
    original: IEC 60050-151:2001, 151-11-27, modifié pour adapter au contexte de la
      sûreté de fonctionnement
  review_decision_event: published
