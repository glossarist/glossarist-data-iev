fra:
  id: 692-04-07
  terms:
  - type: expression
    normative_status: preferred
    designation: indisponibilité transitoire
    gender: f
    plurality: singular
  definition: |-
    {{indisponibilité non différable, IEV:692-04-05}} pour laquelle le matériel associé est remis automatiquement en service dans un intervalle de temps spécifié

    image::/assets/images/parts/692/692-fig4-fr.png[Figure 4 - Relations entre indisponibilités]
  language_code: fra
  notes:
  - La durée de cet intervalle de temps est normalement inférieure à une minute.
  - Une indisponibilité transitoire implique généralement une remise en service automatique
    (programmes de protection).
  examples: []
  entry_status: Standard
  review_decision_event: published
