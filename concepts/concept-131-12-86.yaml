fra:
  id: 131-12-86
  terms:
  - type: expression
    normative_status: preferred
    designation: ligne de transmission
    gender: f
    plurality: singular
  definition: |-
    élément de circuit à deux paires de bornes et à paramètres répartis selon une dimension, caractérisé par une inductance linéique stem:[l], une capacité linéique stem:[c], une résistance linéique stem:[r] et une conductance linéique stem:[g], qui peuvent toutes être fonction de la même coordonnée spatiale stem:[x], et où la tension stem:[u](stem:[x, t]) et le courant stem:[i](stem:[x, t]), où stem:[t] est le temps, sont liés par les équations aux dérivées partielles:

    stem:[- ((del u ( x , t )))/((del x)) = r i + l ((del i ( x , t )))/((del t))]

    stem:[- ((del i ( x , t )))/((del x)) = g u + c ((del u ( x , t )))/((del t))]
  language_code: fra
  notes:
  - Pour l'adjectif "linéique", voir la CEI 60050-111.
  examples: []
