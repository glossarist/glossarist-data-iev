eng:
  id: 131-12-86
  terms:
  - type: expression
    normative_status: preferred
    designation: transmission line
  definition: |-
    one-dimensionally distributed two-terminal-pair circuit element characterized by lineic inductance stem:[l], lineic capacitance stem:[c], lineic resistance stem:[r] and lineic conductance stem:[g] which may all be functions of the same space coordinate stem:[x], where the voltage stem:[u](stem:[x, t]) and the electric current stem:[i](stem:[x, t]), where stem:[t] is the time, are related by the partial differential equations:

    stem:[- ((del u ( x , t )))/((del x)) = r i + l ((del i ( x , t )))/((del t))]

    stem:[- ((del i ( x , t )))/((del x)) = g u + c ((del u ( x , t )))/((del t))]
  language_code: eng
  notes:
  - For the qualifier "lineic", see IEC 60050-111.
  examples: []
  entry_status: Standard
  date_accepted: '2002-06-01T00:00:00+00:00'
  date_amended: '2002-06-01T00:00:00+00:00'
  review_date: '2002-06-01T00:00:00+00:00'
  review_decision_date: '2002-06-01T00:00:00+00:00'
  review_decision_event: published
