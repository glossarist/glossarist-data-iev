eng:
  id: 445-01-15
  terms:
  - type: expression
    normative_status: preferred
    designation: retriggerable interval relay with control signal on
  - type: expression
    normative_status: preferred
    designation: watchdog relay
  definition: |-
    time relay in which the output immediately switches to the operate condition and the time delay starts when applying the power supply and the control signal; the output switches to the release condition after the setting time has elapsed and if the control signal is not operated during the setting time

    image::/assets/images/parts/445/445-01-15en.gif[]
  language_code: eng
  notes:
  - "– Cycling the control signal during the time delay will retrigger the time delay."
  examples: []
  entry_status: Standard
  classification: Preferred
