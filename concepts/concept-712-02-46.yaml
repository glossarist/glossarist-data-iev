    gender: f
    plurality: singular
  - type: expression
    normative_status: preferred
    designation: surface effective
    gender: f
    plurality: singular
  definition: rapport de la puissance disponible aux bornes d'une antenne de réception,
    à la puissance surfacique d'une onde plane incidente de direction de propagation
    et de polarisation données
  language_code: fra
  notes:
  - Si aucune direction n'est spécifiée, on considère celle qui correspond au maximum
    de puissance disponible.
  - |-
    En espace libre, pour une polarisation et une direction de propagation données, l'aire équivalente partielle stem:[A]~ep~ d'une antenne utilisée à la réception est liée au gain isotrope partiel stem:[G]~p~ de la même antenne utilisée à l'émission par la relation:

    stem:[G_p = ((4 pi A_((ep))))/((lambda^2))]

    où stem:[λ] est la longueur d'onde.
  examples: []
