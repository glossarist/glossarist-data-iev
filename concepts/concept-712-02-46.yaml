eng:
  id: 712-02-46
  terms:
  - type: expression
    normative_status: preferred
    designation: partial effective area
  definition: in a given direction, the ratio of the available power at the terminals
    of a receiving antenna to the power flux density of a plane wave of specified
    polarization incident on the antenna from that direction
  language_code: eng
  notes:
  - If no direction is specified, the direction corresponding to maximum available
    power is implied.
  - |-
    In free space, for a given polarization and direction, the partial effective area stem:[A]~ep~ of an antenna used for reception is related to the partial gain stem:[G]~p~ of the same antenna used for transmission, by the equation:

    stem:[G_p = ((4 pi A_((ep))))/((lambda^2))]

    where stem:[λ] is the wavelength.
  examples: []
  entry_status: Standard
  date_accepted: '1992-04-01T00:00:00+00:00'
  date_amended: '1992-04-01T00:00:00+00:00'
  review_date: '1992-04-01T00:00:00+00:00'
  review_decision_date: '1992-04-01T00:00:00+00:00'
  review_decision_event: published
