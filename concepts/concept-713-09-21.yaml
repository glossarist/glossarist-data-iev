fra:
  id: 713-09-21
  terms:
  - type: expression
    normative_status: preferred
    designation: gain isotrope
    gender: m
    plurality: singular
  definition: rapport, généralement exprimé en décibels, de l'intensité de rayonnement
    d'une antenne dans une direction donnée, à l'intensité de rayonnement qui serait
    obtenue si la totalité de la puissance fournie à l'antenne était rayonnée également
    dans toutes les directions de l'espace
  language_code: fra
  notes:
  - Si aucune direction n'est spécifiée, on considère celle dans laquelle l'intensité
    de rayonnement de l'antenne est maximale.
  - Lorsque le gain isotrope est exprimé en décibels, la notation dBi est recommandée
    par l'Union internationale des télécommunications comme symbole d'unité.
  - L'intensité de rayonnement d'une antenne dans une direction est la puissance rayonnée
    par unité d'angle solide.
  examples: []
