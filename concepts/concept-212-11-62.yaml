    designation: partial discharge test voltage
  - type: symbol
    designation: stem:[U]~t~
    international: true
  definition: peak value of the voltage in a partial discharge test, where the apparent
    charge is less than the specified discharge magnitude
  language_code: eng
  notes:
  - The test procedure is defined in IEC 60664-1.
  - For AC tests the rms value may be used.
