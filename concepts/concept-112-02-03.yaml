eng:
  id: 112-02-03
  terms:
  - type: expression
    normative_status: preferred
    designation: SI prefix
  definition: unit prefix used together with a SI unit to form decimal multiples or
    submultiples of this unit
  language_code: eng
  notes:
  - "The list of approved SI prefixes is given in the following table:\n\n<table cellpadding=\"5\"
    border=\"solid\">\r\n<tbody>\r\n<tr>\r\n<td colspan=\"3\" style=\"text-align:
    center;\" width=\"265\">\n\n<strong>Multiples</strong>\r\n</td>\r\n<td colspan=\"3\"
    style=\"text-align: center;\" width=\"245\">\n\n<strong>Submultiples</strong>\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
    rowspan=\"2\" style=\"text-align: center;\" width=\"66\">\n\n<strong>Factor</strong>\r\n</td>\r\n<td
    colspan=\"2\" style=\"text-align: center;\" width=\"199\">\n\n<strong>Prefix</strong>\r\n</td>\r\n<td
    rowspan=\"2\" style=\"text-align: center;\" width=\"66\">\n\n<strong>Factor</strong>\r\n</td>\r\n<td
    colspan=\"2\" style=\"text-align: center;\" width=\"180\">\n\n<strong>Prefix</strong>\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
    style=\"text-align: center;\" width=\"132\">\n\n<strong>Name</strong>\r\n</td>\r\n<td
    style=\"text-align: center;\" width=\"67\">\n\n<strong>Symbol</strong>\r\n</td>\r\n<td
    style=\"text-align: center;\" width=\"104\">\n\n<strong>Name</strong>\r\n</td>\r\n<td
    style=\"text-align: center;\" width=\"76\">\n\n<strong>Symbol</strong>\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
    width=\"66\">\n\n10^1^\r\n</td>\r\n<td width=\"132\">\n\ndeca\r\n</td>\r\n<td
    width=\"67\">\n\nda\r\n</td>\r\n<td width=\"66\">\n\n10^–1^\r\n</td>\r\n<td width=\"104\">\n\ndeci\r\n</td>\r\n<td
    width=\"76\">\n\nd\r\n</td>\r\n</tr>\r\n<tr>\r\n<td width=\"66\">\n\n10^2^\r\n</td>\r\n<td
    width=\"132\">\n\nhecto\r\n</td>\r\n<td width=\"67\">\n\nh\r\n</td>\r\n<td width=\"66\">\n\n10^–2^\r\n</td>\r\n<td
    width=\"104\">\n\ncenti\r\n</td>\r\n<td width=\"76\">\n\nc\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
    width=\"66\">\n\n10^3^\r\n</td>\r\n<td width=\"132\">\n\nkilo\r\n</td>\r\n<td
    width=\"67\">\n\nk\r\n</td>\r\n<td width=\"66\">\n\n10^–3^\r\n</td>\r\n<td width=\"104\">\n\nmilli\r\n</td>\r\n<td
    width=\"76\">\n\nm\r\n</td>\r\n</tr>\r\n<tr>\r\n<td width=\"66\">\n\n10^6^\r\n</td>\r\n<td
    width=\"132\">\n\nmega\r\n</td>\r\n<td width=\"67\">\n\nM\r\n</td>\r\n<td width=\"66\">\n\n10^–6^\r\n</td>\r\n<td
    width=\"104\">\n\nmicro\r\n</td>\r\n<td width=\"76\">\n\nμ\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
    width=\"66\">\n\n10^9^\r\n</td>\r\n<td width=\"132\">\n\ngiga\r\n</td>\r\n<td
    width=\"67\">\n\nG\r\n</td>\r\n<td width=\"66\">\n\n10^–9^\r\n</td>\r\n<td width=\"104\">\n\nnano\r\n</td>\r\n<td
    width=\"76\">\n\nn\r\n</td>\r\n</tr>\r\n<tr>\r\n<td width=\"66\">\n\n10^12^\r\n</td>\r\n<td
    width=\"132\">\n\ntera\r\n</td>\r\n<td width=\"67\">\n\nT\r\n</td>\r\n<td width=\"66\">\n\n10^–12^\r\n</td>\r\n<td
    width=\"104\">\n\npico\r\n</td>\r\n<td width=\"76\">\n\np\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
    width=\"66\">\n\n10^15^\r\n</td>\r\n<td width=\"132\">\n\npeta\r\n</td>\r\n<td
    width=\"67\">\n\nP\r\n</td>\r\n<td width=\"66\">\n\n10^–15^\r\n</td>\r\n<td width=\"104\">\n\nfemto\r\n</td>\r\n<td
    width=\"76\">\n\nf\r\n</td>\r\n</tr>\r\n<tr>\r\n<td width=\"66\">\n\n10^18^\r\n</td>\r\n<td
    width=\"132\">\n\nexa\r\n</td>\r\n<td width=\"67\">\n\nE\r\n</td>\r\n<td width=\"66\">\n\n10^–18^\r\n</td>\r\n<td
    width=\"104\">\n\natto\r\n</td>\r\n<td width=\"76\">\n\na\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
    width=\"66\">\n\n10^21^\r\n</td>\r\n<td width=\"132\">\n\nzetta\r\n</td>\r\n<td
    width=\"67\">\n\nZ\r\n</td>\r\n<td width=\"66\">\n\n10^–21^\r\n</td>\r\n<td width=\"104\">\n\nzepto\r\n</td>\r\n<td
    width=\"76\">\n\nz\r\n</td>\r\n</tr>\r\n<tr>\r\n<td width=\"66\">\n\n10^24^\r\n</td>\r\n<td
    width=\"132\">\n\nyotta\r\n</td>\r\n<td width=\"67\">\n\nY\r\n</td>\r\n<td width=\"66\">\n\n10^–24^\r\n</td>\r\n<td
    width=\"104\">\n\nyocto\r\n</td>\r\n<td width=\"76\">\n\ny\r\n</td>\r\n</tr>\r\n</tbody>\r\n</table>\n\n"
  - "When the prefixes are used, the prefix name and the unit name are combined to
    form a single word, and similarly the prefix symbol and the unit symbol are written
    without any space to form a single symbol, which may itself be raised to any power.
    For example, we may write: kilometre, km; microvolt, μV; femtosecond, fs;  \r\n50
    V/cm = 50 V (10^–2^ m)^–1^ = 5000 V/m. See the SI Brochure for more information."
  - 'As an exception, multiples and submultiples of the kilogram are written by combining
    a prefix with the gram, such we write: milligram, mg, not microkilogram, µkg.'
