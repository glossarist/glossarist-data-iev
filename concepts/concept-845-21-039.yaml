eng:
  id: 845-21-039
  terms:
  - type: expression
    normative_status: preferred
    designation: luminous flux
  - type: symbol
    designation: |-
      stem:[Φ]~v~
      stem:[Φ]
    international: true
  definition: |-
    change in <a href="IEV845-21-037">luminous energy</a> with time

    stem:[Phi_v = ((d Q_v))/((d t))]

    where stem:[Q]~v~ is the luminous energy emitted, transferred or received, and stem:[t] is time
  language_code: eng
  notes:
  - |-
    Luminous flux is a quantity derived from the radiant flux, stem:[Φ]~e~, by evaluating the radiation according to its action upon the <a href="IEV845-21-036">CIE standard photometric observer</a>. Luminous flux can be derived from the spectral radiant flux distribution by

    stem:[Phi_v = K_m int_0^(oo) Phi_((e , lambda)) ( lambda ) V ( lambda ) d lambda]

    where stem:[K]~m~ is maximum luminous efficacy, stem:[Φ]~e,stem:[λ]~(stem:[λ]) is spectral radiant flux, stem:[V](stem:[λ]) is <a href="IEV845-21-035">spectral luminous efficiency</a> and stem:[λ] is wavelength.
  - |-
    The distribution of the luminous intensities as a function of the direction of emission, e.g. given by the polar angles (stem:[ϑ], stem:[φ]), is used to determine the luminous flux, stem:[Φ]~v~, within a certain solid angle, stem:[Ω], of a source:

    stem:[Phi_v = underset(omega)( ∬ ) I_v ( vartheta , phi ) sin vartheta \ d phi \ d vartheta].
  - The corresponding radiometric quantity is "radiant flux". The corresponding quantity
    for photons is "photon flux".
  - The luminous flux is expressed in lumen (lm).
  - This entry was numbered 845-01-25 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-21-039
  terms:
  - type: expression
    normative_status: preferred
    designation: flux lumineux
    gender: m
    plurality: singular
  definition: |-
    variation dans le temps de l'énergie lumineuse

    stem:[Phi_v = ((d Q_v))/((d t))]

    où stem:[Q]~v~ est l'énergie lumineuse émise, transférée ou reçue, et stem:[t] est le temps
  language_code: fra
  notes:
  - |-
    Le flux lumineux est la grandeur dérivée du flux énergétique, stem:[Φ]~e~, par l'évaluation du rayonnement d'après son action sur l'<a href="IEV845-21-036">observateur de référence photométrique CIE</a>. Le flux lumineux peut être dérivé de la répartition spectrale du flux énergétique par

    stem:[Phi_v = K_m int_0^(oo) Phi_((e , lambda)) ( lambda ) V ( lambda ) d lambda]

    où stem:[K]~m~ est l'efficacité lumineuse maximale, stem:[Φ]~e,stem:[λ]~(stem:[λ]) est le flux énergétique spectral, stem:[V](stem:[λ]) est l'efficacité lumineuse spectrale et stem:[λ] est la longueur d'onde.
  - |-
    La répartition des intensités lumineuses en fonction de la direction d'émission, par exemple, donnée par les angles polaires (stem:[ϑ], stem:[φ]), permet de déterminer le flux lumineux, stem:[Φ]~v~, selon un certain angle solide, stem:[Ω], d'une source:

    stem:[Phi_v = underset(omega)( ∬ ) I_v ( vartheta , phi ) sin vartheta \ d phi \ d vartheta].
  - La grandeur radiométrique correspondante est le "flux énergétique". La grandeur
    correspondante pour photons est le "flux photonique".
  - Le flux lumineux est exprimé en lumen (lm).
  - Cet article était numéroté 845-01-25 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
