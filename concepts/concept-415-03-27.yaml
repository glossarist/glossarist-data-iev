eng:
  id: 415-03-27
  terms:
  - type: expression
    normative_status: preferred
    designation: inertial sub-range
  definition: frequency interval of the wind turbulence spectrum, where eddies, after
    attaining isotropy, undergo successive break-up with negligible energy dissipation
  language_code: eng
  notes:
  - At a typical 10 m/s wind speed, the inertial sub-range is roughly from 0,02 Hz
    to 2 kHz.
