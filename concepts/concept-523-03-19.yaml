    normative_status: preferred
    designation: coefficient de traction
    gender: m
    plurality: singular
  definition: |-
    rapport entre la modification de {{résistance, IEV:131-12-04}} électrique divisée par le produit de la résistence originale (stem:[R]~o~, résistance en configuration non déformée) et la déformation d'ingénierie (stem:[e])

    stem:[G]~F~&amp;equals;(stem:[R]−stem:[R]~o~)/stem:[R]~o~stem:[e]

    où stem:[R] est a résistance électrique dans la configuration déformée.
