eng:
  id: 523-03-19
  terms:
  - type: expression
    normative_status: preferred
    designation: gauge factor
  - type: symbol
    designation: stem:[G]~F~
    international: true
  definition: |-
    ratio of the change in electrical {{resistance, IEV:131-12-04}} divided by the product of the original resistance (stem:[R]~o~, resistance in the undeformed configuration) and the engineering strain (stem:[e])

    stem:[G]~F~&amp;equals;(stem:[R]−stem:[R]~o~)/stem:[R]~o~stem:[e]

    where stem:[R] is the electrical resistance in the deformed configuration.
  language_code: eng
  notes: []
  examples: []
  entry_status: Standard
  authoritative_source:
  - ref: IEC 62047-22:2014
    clause: 3.1.1
    link: https://webstore.iec.ch/publication/6365
    relationship:
      :type: :modified
      :modification: In the definition, "the product of" has been added. Note 1 to
        entry has been deleted; its content is now part of the definition.
    original: IEC 62047-22:2014, 3.1.1, modified – In the definition, "the product
      of" has been added. Note 1 to entry has been deleted; its content is now part
      of the definition.
  date_accepted: '2018-12-01T00:00:00+00:00'
  date_amended: '2018-12-01T00:00:00+00:00'
  review_date: '2018-12-01T00:00:00+00:00'
  review_decision_date: '2018-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 523-03-19
