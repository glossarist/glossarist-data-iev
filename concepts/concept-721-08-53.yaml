eng:
  id: 721-08-53
  terms:
  - type: expression
    normative_status: preferred
    designation: parity digit
  definition: an n-ary digit appended to an array of n-ary digits to make the sum
    modulo n of all the digits always equal to zero or to any predetermined digit
  language_code: eng
  notes:
  - In the binary case the parity digit becomes parity bit.
  examples: []
  entry_status: Standard
  date_accepted: '1991-11-01T00:00:00+00:00'
