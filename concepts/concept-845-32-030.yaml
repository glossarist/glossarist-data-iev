eng:
  id: 845-32-030
  terms:
  - type: expression
    normative_status: preferred
    usage_info: of a display illuminant
    designation: white point
  definition: point in a chromaticity diagram that represents the colour of the addition
    of 100 % of the three display primaries measured in a direction perpendicular
    to the display faceplate
  language_code: eng
  notes:
  - Some displays incorporate more than three display primaries and in those cases,
    the manufacturer of the display decides how to create the white point.
  examples: []
