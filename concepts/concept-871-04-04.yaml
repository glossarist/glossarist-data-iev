eng:
  id: 871-04-04
  terms:
  - type: expression
    normative_status: preferred
    designation: assistive product
  definition: product (including devices, equipment, instruments and software), used
    by or for persons with {{disability, IEV:871-02-08}}* for participation,* to protect,
    support, train, measure or substitute for body functions/structures and activities,
    or* to prevent {{impairments, IEV:871-02-07}}, {{activity limitations, IEV:871-02-06}}
    or participation restrictions
  language_code: eng
  notes: []
  examples: []
  entry_status: Standard
  authoritative_source:
  - ref: ISO 9999:2016
    clause: '2.3'
    link: https://www.iso.org/standard/60547.html
    relationship:
      :type: :modified
      :modification: '"any" and "especially produced or generally available" deleted
        from the definition since they are superfluous; cross-references adapted to
        this document; Note 1 to entry omitted'
    original: ISO 9999:2016, 2.3, modified – "any" and "especially produced or generally
      available" deleted from the definition since they are superfluous; cross-references
      adapted to this document; Note 1 to entry omitted
