    designation: produit d’assistance
    gender: m
    plurality: singular
  definition: produit (y compris tout dispositif, équipement, instrument et logiciel),
    utilisé par ou pour les personnes en situation de {{handicap, IEV:871-02-08}},
    destiné à* favoriser la participation,* protéger, soutenir, entraîner, mesurer
    ou remplacer les fonctions organiques, les structures anatomiques et les activités,
    ou* prévenir les {{déficiences, IEV:871-02-07}}, les {{limitations d’activité,
