eng:
  id: 731-02-26
  terms:
  - type: expression
    normative_status: preferred
    designation: reference surface centre
  definition: for a cross-section of an optical fibre it is the centre of that circle
    which best fits the reference surface
  language_code: eng
  notes:
  - The reference surface centre may not be the same as the core centre and the cladding
    centre.
  - The method of best fitting has to be specified.
