eng:
  id: 395-02-34
  terms:
  - type: expression
    normative_status: preferred
    designation: aerodynamic equivalent diameter
  definition: diameter of unit-density sphere having the same gravitational settling
    velocity as the particle of concern
  language_code: eng
  notes:
  - The aerodynamic equivalent diameter concerns particles with a diameter from 0,1
    μm to 2 mm.
  - This entry was numbered 393-11-41 in IEC 60050-393:2003.
