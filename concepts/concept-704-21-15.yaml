fra:
  id: 704-21-15
  terms:
  - type: expression
    normative_status: preferred
    designation: taux minimal de justification
    gender: m
    plurality: singular
  definition: taux de justification qui serait obtenu si le signal numérique original
    et la suite des créneaux temporels élémentaires destinée à sa transmission avaient
    leurs débits numériques respectivement à la limite supérieure et à la limite inférieure
    des plages de tolérance
  language_code: fra
  notes:
  - Le taux minimal de justification limite inférieurement les valeurs du taux de
    justification qui peuvent être obtenues en pratique.
