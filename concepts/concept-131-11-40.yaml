  - type: symbol
    designation: stem:[S]~∼~
    international: true
  definition: |-
    under sinusoidal conditions, product of the phasor stem:[U] representing the voltage between the terminals of a linear two-terminal element or two-terminal element circuit and the phasor stem:[I] representing the electric current in the element or circuit:

    stem:[S]~∼~ = stem:[U]  stem:[I]
  language_code: eng
  notes:
  - The SI unit for complex alternating power is the voltampere.
