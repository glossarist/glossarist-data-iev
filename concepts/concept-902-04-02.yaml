      :type: :modified
      :modification: The references to other terms within ISO/IEC 17000 have been
        replaced by hyperlinks to entries in the IEV.
    original: ISO/IEC 17000:2004, 5.2, modified – The references to other terms within
      ISO/IEC 17000 have been replaced by hyperlinks to entries in the IEV.
