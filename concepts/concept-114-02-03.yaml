eng:
  id: 114-02-03
  terms:
  - type: expression
    normative_status: preferred
    designation: electrode
  definition: conductive part in electric contact with a medium of lower conductivity
    and intended to perform one or more of the functions of emitting charge carriers
    to or receiving charge carriers from that medium or to establish an electric field
    in that medium
