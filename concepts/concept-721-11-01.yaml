eng:
  id: 721-11-01
  terms:
  - type: expression
    normative_status: preferred
    designation: telegraph channel
  definition: means of transmission of telegraph signals in one direction between
    two points
  language_code: eng
  notes:
  - |-
    A telegraph channel can be qualified by the number of significant conditions and by the modulation rate it is designed to admit.

    Example: A 50 baud channel for two-condition modulation.
  - Several telegraph channels can share a common path; for example each channel is
    allocated a particular frequency band or a particular time-slot.
  examples: []
  entry_status: Standard
