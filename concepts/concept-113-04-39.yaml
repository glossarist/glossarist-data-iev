fra:
  id: 113-04-39
  terms:
  - type: expression
    normative_status: preferred
    designation: coefficient de transmission thermique
    gender: m
    plurality: singular
  - type: expression
    normative_status: preferred
    designation: transmittance thermique
    gender: f
    plurality: singular
  definition: en un point d'une surface séparant deux milieux de températures thermodynamiques
    différentes, quotient de la norme du flux thermique surfacique *stem:[φ]* par
    la valeur absolue de la différence de température Δstem:[T], soit stem:[K = ((|
    phi |))/((| Delta T |))]
  language_code: fra
  notes:
  - 1 Le coefficient de transmission thermique est nul pour une limite adiabatique
    et infini pour une limite diathermique.
  - 2 Le nom «transmittance thermique» et le symbole stem:[U] sont surtout utilisés
    en technologie des bâtiments.
  - 3 L'unité SI cohérente de coefficient de transmission thermique est le watt par
    mètre carré kelvin, W/(m^2^·K).
  examples: []
