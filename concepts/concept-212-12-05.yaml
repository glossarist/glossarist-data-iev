eng:
  id: 212-12-05
  terms:
  - type: expression
    normative_status: preferred
    designation: factor of influence
  definition: stress imposed by conditions of operation, environment or test that
    affects the life of an electric insulating material or insulation system
  language_code: eng
  notes:
  - The term “factor of influence” designates external factors (such as ambient temperature)
    inducing stress in an insulation system as different from stress factors being
    part of the duty cycle of the equipment (e.g. temperature rise due to load).
  examples: []
  entry_status: Standard
  date_accepted: '2010-06-01T00:00:00+00:00'
