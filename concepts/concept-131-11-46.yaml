eng:
  id: 131-11-46
  terms:
  - type: expression
    normative_status: preferred
    designation: power factor
  - type: symbol
    designation: stem:[λ]
    international: true
  definition: |-
    under periodic conditions, ratio of the absolute value of the active power stem:[P]  to the apparent power stem:[S]:

    stem:[lambda = ((| P |))/(S)]
  language_code: eng
  notes:
  - Under sinusoidal conditions, the power factor is the absolute value of the active
    factor.
