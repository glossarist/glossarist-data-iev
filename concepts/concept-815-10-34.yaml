eng:
  id: 815-10-34
  terms:
  - type: expression
    normative_status: preferred
    designation: Ginzburg-Landau parameter
  - type: expression
    normative_status: preferred
    designation: G-L parameter
  - type: symbol
    designation: stem:[κ]~GL~
    international: true
  definition: |-
    ratio of penetration depth, stem:[λ], to coherence length, stem:[ξ]

    stem:[kappa_((GL)) = lambda // xi]
  language_code: eng
  notes:
  - For a type II superconductor, stem:[kappa_((GL)) &gt; 1 // sqrt(2)]; stem:[kappa_((GL))
    = H_((c2)) // ( sqrt(2) H_c )], where stem:[H_(c2)] is the upper critical field
    strength and stem:[H_c] is the critical field strength.
  - For a type I superconductor, stem:[kappa_((GL)) 1 // sqrt(2)].
  examples: []
  entry_status: Standard
  classification: Preferred
