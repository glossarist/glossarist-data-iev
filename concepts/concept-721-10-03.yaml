eng:
  id: 721-10-03
  terms:
  - type: expression
    normative_status: preferred
    designation: control character
  definition: a character whose occurrence in a particular context, initiates, modifies
    or stops an operation
  language_code: eng
  notes:
  - A control character may be recorded for use in subsequent action.
  - A control character is not a graphic character but may have a graphic representation
    in some circumstances.
