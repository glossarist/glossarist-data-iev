  - type: expression
    normative_status: preferred
    designation: facteur de réflexion de Fresnel
    gender: m
    plurality: singular
  definition: facteur de réflexion complexe dans le cas d'une onde plane incidente
    sur une surface plane illimitée
  language_code: fra
  notes:
