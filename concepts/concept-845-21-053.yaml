eng:
  id: 845-21-053
  terms:
  - type: expression
    normative_status: preferred
    designation: irradiance
  - type: symbol
    designation: |-
      stem:[E]~e~
      stem:[E]
    international: true
  definition: |-
    density of incident radiant flux with respect to area at a point on a real or imaginary surface

    stem:[E_e = ((d Phi_e))/((d A))]

    where stem:[Φ]~e~ is radiant flux and stem:[A] is the area on which the radiant flux is incident
  language_code: eng
  notes:
  - The corresponding photometric quantity is "illuminance". The corresponding quantity
    for photons is "photon irradiance".
  - The irradiance is expressed in watt per square metre (W·m^−2^).
  - This entry was numbered 845-01-37 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-21-053
  terms:
  - type: expression
    normative_status: preferred
    designation: éclairement énergétique
    gender: m
    plurality: singular
  definition: |-
    densité du flux énergétique incident par rapport à l'aire en un point d'une surface réelle ou fictive

    stem:[E_e = ((d Phi_e))/((d A))]

    où stem:[Φ]~e~ est le flux énergétique et stem:[A] est l'aire qui reçoit ce flux
  language_code: fra
  notes:
  - La grandeur photométrique correspondante est l'"éclairement lumineux". La grandeur
    correspondante pour les photons est l'"éclairement énergétique photonique".
  - L'éclairement énergétique est exprimé en watt par mètre carré (W·m^−2^).
  - Cet article était numéroté 845-01-37 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
