eng:
  id: 845-21-058
  terms:
  - type: expression
    normative_status: preferred
    designation: photon irradiance
  - type: symbol
    designation: |-
      stem:[E]~p~
      stem:[E]
    international: true
  definition: |-
    density of incident photon flux with respect to area at a point on a real or imaginary surface

    stem:[E_p = ((d Phi_p))/((d A))]

    where stem:[Φ]~p~ is photon flux and stem:[A] is the area on which the photon flux is incident
  language_code: eng
  notes:
  - The corresponding radiometric quantity is "irradiance". The corresponding photometric
    quantity is "illuminance".
  - The photon irradiance is expressed in second to the power minus one per square
    metre (s^−1^·m^−2^).
  - This entry was numbered 845-01-39 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-21-058
  terms:
  - type: expression
    normative_status: preferred
    designation: éclairement photonique
    gender: m
    plurality: singular
  definition: |-
    densité du flux photonique incident par rapport à l'aire en un point d'une surface réelle ou fictive

    stem:[E_p = ((d Phi_p))/((d A))]

    où stem:[Φ]~p~ est le flux photonique et stem:[A] est l'aire qui reçoit ce flux
  language_code: fra
  notes:
  - La grandeur radiométrique correspondante est l'"éclairement énergétique". La grandeur
    photométrique correspondante est l'"éclairement lumineux".
  - L'éclairement photonique est exprimé en secondes à la puissance moins un par mètre
    carré (s^−1^·m^−2^).
  - Cet article était numéroté 845-01-39 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
