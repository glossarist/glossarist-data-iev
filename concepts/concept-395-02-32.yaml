eng:
  id: 395-02-32
  terms:
  - type: expression
    normative_status: preferred
    designation: dust
  definition: particulate in suspension in a gas that would have a gravitational settling
    velocity in air greater than 0,25 m/s
  language_code: eng
  notes:
  - Equivalent aerodynamic diameter of dust is generally included between 100 μm to
    2 mm.
  - This entry was numbered 393-11-39 in IEC 60050-393:2003.
