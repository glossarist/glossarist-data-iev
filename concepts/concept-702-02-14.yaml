eng:
  id: 702-02-14
  terms:
  - type: expression
    normative_status: preferred
    designation: attenuation coefficient
  - type: expression
    designation: attenuation constant
  - type: symbol
    designation: 'symb.: stem:[α]'
    international: true
  definition: the real part of the propagation coefficient
  language_code: eng
  notes:
  - The attenuation coefficient of a transmission line or waveguide is the limit of
    the attenuation between two points on the axis of the guide, divided by the distance
    between the points when this distance tends to zero.
