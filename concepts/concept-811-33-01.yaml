eng:
  id: 811-33-01
  terms:
  - type: expression
    normative_status: preferred
    designation: contact line
  definition: conductor system for supplying electric energy to vehicles through current-collecting
    equipment
  language_code: eng
  notes:
  - "This includes all current-collecting conductors and conducting rails or bars,
    including the following:* reinforcing feeders;* cross-track feeders;* disconnectors;*
    section insulators;* over-voltage protection devices;* supports that are not insulated
    from the conductors;* insulators connected to live parts;* dropper;* auxiliary
    catenary wire;* stitch wire;\r\n\n\nbut excluding other conductors, such as the
    following:* along-track feeders;* earth wires and return conductors."
  examples: []
  entry_status: Standard
  date_accepted: '2017-11-01T00:00:00+00:00'
