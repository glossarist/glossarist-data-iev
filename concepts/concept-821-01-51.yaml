eng:
  id: 821-01-51
  terms:
  - type: expression
    normative_status: preferred
    designation: commercial speed
  definition: nominal average speed of passenger service trains between two terminus
    stations of the line (dwell times at stations taken into account)
  language_code: eng
  notes:
  - Commercial speed is equal to the length between two terminus stations divided
    by the nominal journey time.
  examples: []
  entry_status: Standard
