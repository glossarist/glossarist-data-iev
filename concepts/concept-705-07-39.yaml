fra:
  id: 705-07-39
  terms:
  - type: expression
    normative_status: preferred
    designation: oncle ordinaire
    gender: f
    plurality: singular
  definition: composante magnéto-ionique qui, en incidence verticale, se réfléchit
    à l'altitude où la densité électronique est telle que la fréquence de plasma est
    égale à la fréquence de l'onde
  language_code: fra
  notes:
  - Cette composante a une polarisation elliptique dextrorsum ou senestrorsum suivant
    que sa direction de propagation fait un angle obtus ou aigu avec le vecteur champ
    magnétique terrestre.
  - Lorsque la direction de propagation est perpendiculaire au champ magnétique terrestre,
    cette composante a une polarisation rectiligne, le vecteur induction électrique
    étant dans le plan défini par la direction de propagation et le champ magnétique.
  examples: []
