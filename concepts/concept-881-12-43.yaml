eng:
  id: 881-12-43
  terms:
  - type: expression
    normative_status: preferred
    designation: energy imparted
  - type: symbol
    designation: stem:[ε]
    international: true
  definition: |-
    the energy imparted by ionizing radiation to the matter in a volume

    stem:[epsilon = sum epsilon_((in)) - sum epsilon_((ex)) + sum Q]

    where Σstem:[ε]~in~ is the sum of the energies (excluding rest energies) of all directly and indirectly ionizing particles incident on the volume, Σstem:[ε]~ex~ is the sum of the energies (excluding rest energies) of all directly and indirectly ionizing particles emerging from the volume, and Σstem:[Q] is the sum of all changes (decreases: positive sign; increases: negative sign) of rest energy of nuclei and elementary particles in any transformations which occur in the volume
  language_code: eng
  notes:
  - stem:[ε] is a stochastic quantity.
  examples: []
  entry_status: Standard
  date_accepted: '1983-01-01T00:00:00+00:00'
  date_amended: '1983-01-01T00:00:00+00:00'
