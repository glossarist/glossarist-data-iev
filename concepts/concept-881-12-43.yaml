fra:
  id: 881-12-43
  terms:
  - type: expression
    normative_status: preferred
    designation: énergie communiquée à la matière
    gender: f
    plurality: singular
  definition: |-
    énergie communiquée par un rayonnement ionisant à un volume donné de matière, égale à:

    stem:[epsilon = sum epsilon_((in)) - sum epsilon_((ex)) + sum Q]

    où Σstem:[ε]~in~ est la somme des énergies, à l'exclusion des énergies au repos, de toutes les particules directement et indirectement ionisantes ayant pénétré dans le volume; Σstem:[ε]~ex~ est la somme des énergies, à l'exclusion des énergies au repos, de toutes les particules directement ou indirectement ionisantes ayant quitté le volume; Σstem:[Q] est la somme de toutes les énergies  développées dans les réactions nucléaires, transformations et interactions entre particules élémentaires qui ont eu lieu dans ce volume
  language_code: fra
  notes:
  - stem:[ε] est une grandeur aléatoire.
