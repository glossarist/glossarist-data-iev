eng:
  id: 712-04-16
  terms:
  - type: expression
    normative_status: preferred
    designation: mutual impedance
  definition: |-
    for an antenna consisting of several, fed or not, radiating elements, the coefficient stem:[Z]~ij~, with i different from j, relating the current in the element of rank j to the voltage stem:[E]~i~ at its terminals of the element of rank i, in the set of linear equations:

    stem:[E]~i~ = Σstem:[Z]~ij~ stem:[I]~j~
