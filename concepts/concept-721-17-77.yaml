eng:
  id: 721-17-77
  terms:
  - type: expression
    normative_status: preferred
    designation: channel associated signalling
  definition: a signalling method in which the signals for the traffic carried by
    a single transmission channel are transmitted over the channel itself or over
    a signalling channel permanently associated with it
  language_code: eng
  notes:
  - This term also may be applied when the signals for a circuit are transmitted over
    that channel.
  examples: []
  entry_status: Standard
