eng:
  id: 845-24-079
  terms:
  - type: expression
    normative_status: preferred
    designation: luminance coefficient
  - type: symbol
    designation: |-
      stem:[q]~v~
      stem:[q]
    international: true
  definition: |-
    quotient of the <a href="IEV845-21-050">luminance</a> at a surface element of a medium in a given direction and the <a href="IEV845-21-060">illuminance</a> on the medium

    stem:[q_v = ((L_v))/((E_v))]

    where stem:[L]~v~ is luminance and stem:[E]~v~ is illuminance
  language_code: eng
  notes:
  - The bi-directional reflectance distribution function (BRDF) is similar to the
    luminance coefficient except that it is defined for directional incident radiation.
  - The luminance coefficient is expressed in steradian to the power minus one (sr^−1^).
  - This entry was numbered 845-04-71 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-24-079
  terms:
  - type: expression
    normative_status: preferred
    designation: coefficient de luminance
    gender: m
    plurality: singular
  definition: |-
    quotient de la <a href="IEV845-21-050">luminance</a> à un élément de surface d'un milieu dans une direction donnée par l'<a href="IEV845-21-060">éclairement</a> du milieu

    stem:[q_v = ((L_v))/((E_v))]

    où stem:[L]~v~ est la luminance et stem:[E]~v~ est l'éclairement
  language_code: fra
  notes:
  - La fonction de répartition bidirectionnelle du facteur de réflexion (BRDF ou bi-directional
    reflectance distribution function en anglais) est similaire au coefficient de
    luminance sauf qu'elle est définie pour un rayonnement incident directionnel.
  - Le coefficient de luminance est exprimé en stéradian à la puissance moins un (sr^−1^).
  - Cet article était numéroté 845-04-71 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
