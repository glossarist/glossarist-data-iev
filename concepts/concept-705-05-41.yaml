eng:
  id: 705-05-41
  terms:
  - type: expression
    normative_status: preferred
    designation: effective Earth-radius factor
  - type: symbol
    designation: stem:[k]
    international: true
  definition: ratio of the effective radius of the Earth to the actual Earth radius
  language_code: eng
  notes:
  - |-
    This factor stem:[k] is related to the vertical gradient dstem:[n]/dstem:[h] of the refractive index n and to the actual Earth radius stem:[a] by the equation:

    stem:[k = (1)/((1 + a ((d n))/((d h))))]
  - For an atmosphere having a standard refractivity gradient the value of stem:[k]
    is taken as 4/3, corresponding to an effective radius of the Earth of approximately
    8 500 km.
  examples: []
  entry_status: Standard
  date_accepted: '1995-09-01T00:00:00+00:00'
  date_amended: '1995-09-01T00:00:00+00:00'
  review_date: '1995-09-01T00:00:00+00:00'
  review_decision_date: '1995-09-01T00:00:00+00:00'
  review_decision_event: published
