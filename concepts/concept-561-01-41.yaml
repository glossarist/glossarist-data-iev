    designation: IDT
  - type: expression
    normative_status: preferred
    designation: interdigital transducer
  definition: |-
    SAW transducer made of a comb-like conductive structure that is deposited on a piezoelectric substrate and consists of interleaved metal electrodes (fingers) whose function is to transform electrical energy into acoustic energy or vice versa by means of the piezoelectric effect

    image::/assets/images/parts/561/561-fig5-en.png[]

    *Figure 5 – Configuration of an interdigital transducer (IDT)*
