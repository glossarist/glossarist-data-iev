eng:
  id: 845-29-027
  terms:
  - type: expression
    normative_status: preferred
    designation: adaptive lighting
  definition: lighting responding to circumstances or according to predefined conditions,
    while maintaining the lighting quality within the specified requirements for these
    circumstances or conditions
  language_code: eng
  notes:
  - The requirements can focus on different aspects such as energy efficiency, dynamic
    user needs, visual task or ambience.
  - The terms "smart lighting" and "intelligent lighting" are sometimes used with
    a similar meaning.
  examples: []
  entry_status: Standard
