eng:
  id: 121-12-70
  terms:
  - type: expression
    normative_status: preferred
    designation: magnetically hard material
  definition: magnetic material having high coercivities for the magnetic flux density
    as well as for the magnetic polarization
  language_code: eng
  notes:
  - A specific value of coercivity defining the boundary between magnetically hard
    and soft materials cannot easily be stated but it generally lies in the range
    1 kA/m  to 10 kA/m .
  examples: []
