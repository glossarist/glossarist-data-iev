fra:
  id: 614-02-16
  terms:
  - type: expression
    normative_status: preferred
    designation: défaut à la terre
    gender: m
    plurality: singular
  definition: occurrence d’un chemin conducteur accidentel entre un conducteur sous
    tension et la terre
  language_code: fra
  notes:
  - Le chemin conducteur peut passer par une isolation défectueuse, par des structures
    (par exemple supports de ligne, échafaudages, grues, échelles), ou encore par
    la végétation (par exemple arbres, buissons) et peut présenter une impédance non
    négligeable.
  - Les défauts à la terre d'impédance de défaut négligeable, dans un système à neutre
    directement à la terre ou dans un système à neutre faiblement impédant, sont aussi
    appelés court-circuits phase-terre.
  examples: []
