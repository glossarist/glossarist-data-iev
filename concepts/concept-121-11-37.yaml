eng:
  id: 121-11-37
  terms:
  - type: expression
    normative_status: preferred
    designation: electric polarization
  - type: symbol
    designation: stem:[*P*]
    international: true
  definition: |-
    at a given point within a domain of quasi-infinitesimal volume stem:[V], vector quantity equal to the electric dipole moment stem:[*p*]  of the substance contained within the domain divided by the volume stem:[V]:

    stem:[P = (p)/(V)]
  language_code: eng
  notes:
  - |-
    The electric polarization stem:[*P*] satisfies the relation

    stem:[*D*] = stem:[ε]~0~stem:[*E*] + stem:[*P*]

    where stem:[*D*] is the electric flux density, stem:[*E*]  the electric field strength and stem:[ε]~0~ the electric constant.
  examples: []
  entry_status: Standard
  date_accepted: '1998-08-01T00:00:00+00:00'
  date_amended: '1998-08-01T00:00:00+00:00'
  review_date: '1998-08-01T00:00:00+00:00'
  review_decision_date: '1998-08-01T00:00:00+00:00'
  review_decision_event: published
