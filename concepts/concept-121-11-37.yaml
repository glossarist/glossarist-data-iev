fra:
  id: 121-11-37
  terms:
  - type: expression
    normative_status: preferred
    designation: polarisation électrique
    gender: f
    plurality: singular
  definition: |-
    en un point donné à l’intérieur d’un domaine de volume quasi-infinitésimal stem:[V], grandeur vectorielle égale au quotient, par le volume stem:[V], du moment électrique stem:[*p*] de la substance contenue dans le domaine:

    stem:[P = (p)/(V)]
  language_code: fra
  notes:
  - |-
    – La polarisation électrique stem:[*P*] vérifie la relation

    stem:[*D*] = stem:[ε]~0~stem:[*E*] + stem:[*P*]

    où stem:[*D*] est l’induction électrique, stem:[*E*] le champ électrique et stem:[ε]~0~ la constante électrique.
  examples: []
  entry_status: Standard
