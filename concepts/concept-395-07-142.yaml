eng:
  id: 395-07-142
  terms:
  - type: expression
    normative_status: preferred
    designation: very high temperature reactor
  - type: expression
    designation: VHTR
  definition: nuclear reactor operated with inert gases as reactor coolant and extensive
    use of refractory materials in the nuclear reactor core under high outlet temperatures
    of the reactor coolant
  language_code: eng
  notes:
  - Typically, the outlet temperature is included above 900°C.
  - This type of reactor is one of the six reactors of generation IV.
  - This entry was numbered 393-16-28 in IEC 60050-393:2003.
  examples: []
