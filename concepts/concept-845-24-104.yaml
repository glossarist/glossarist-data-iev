eng:
  id: 845-24-104
  terms:
  - type: expression
    normative_status: preferred
    designation: coefficient of retroreflected luminance
  - type: symbol
    designation: stem:[RL]
    international: true
  definition: |-
    quotient of the luminance, stem:[L], of a plane retroreflective surface in the direction of observation and the illuminance, stem:[E_( _|_ )], at the retroreflector on a plane perpendicular to the direction of the incident light

    stem:[R_L = (L)/((E_( _|_ )))]
  language_code: eng
  notes:
  - The coefficient of retroreflected luminance is particularly suitable for describing
    materials in sheet form.
  - The coefficient of retroreflected luminance is expressed in candela per square
    metre per lux (cd·m^−2^·lx^−1^).
  - This entry was numbered 845-04-98 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
