eng:
  id: 561-06-08
  terms:
  - type: expression
    normative_status: preferred
    designation: coefficient of linear thermal expansion
  - type: symbol
    designation: stem:[α]
    international: true
  definition: |-
    relative change in length due to a change in thermodynamic temperature divided by the change in temperature

    stem:[alpha = ((l_T – l_((ref))))/((l_((ref)) ( T – T_((ref)) )))]

    where

    stem:[l]~stem:[T]~  is the length at temperature stem:[T];

    stem:[l]~ref~  is the length at reference temperature stem:[T]~ref~
  language_code: eng
  notes:
  - The coefficient of linear thermal expansion is generally expressed in megakelvins
    to the power minus one (1/MK).
  examples: []
  entry_status: Standard
