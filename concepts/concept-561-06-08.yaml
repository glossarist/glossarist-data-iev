    designation: coefficient de dilatation thermique linéaire
    gender: m
    plurality: singular
  definition: |-
    variation relative de la longueur due à une variation de la température thermodynamique divisée par la variation de température

    stem:[alpha = ((l_T – l_((ref))))/((l_((ref)) ( T – T_((ref)) )))]

    où

    stem:[l]~stem:[T]~ est la longueur à la température stem:[T];

    stem:[l]~ref~ est la longueur à la température de référence stem:[T]~ref~
  language_code: fra
  notes:
  - Le coefficient de dilatation thermique linéaire s’exprime généralement en mégakelvin
    à la puissance moins un (1/MK).
