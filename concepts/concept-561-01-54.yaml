eng:
  id: 561-01-54
  terms:
  - type: expression
    normative_status: preferred
    designation: motional resonance frequency
  - type: symbol
    designation: stem:[f]~s~
    international: true
  definition: |-
    resonance frequency of the motional (series) arm of the equivalent circuit of the resonator defined by

    stem:[f_s = (1)/((2 pi sqrt(L_1 C_1)))]

    where stem:[L]~1~ and stem:[C]~1~ represent the motional inductance and the motional capacitance respectively

    image::/assets/images/parts/561/561-fig2-en.png[]

    *Figure 2 – Equivalent circuit of a piezoelectric vibrator (one-port resonator)*
