  terms:
  - type: expression
    normative_status: preferred
    designation: traffic routing plan
  definition: a set of rules which govern the setting up of connections in a circuit
    switched network
  language_code: eng
  notes:
  - |-
    Such rules settle, among others:

    - the class of each exchange

    - the circuit groups interconnecting two circuit switching exchanges, as well as the connection line groups,

    - at least one potential route for each call, between the terminal points involved.
