eng:
  id: 845-32-066
  terms:
  - type: expression
    normative_status: preferred
    usage_info: imaging
    designation: veiling glare
  - type: expression
    normative_status: deprecated
    usage_info: imaging
    designation: ambient flare
  definition: light, reflected from an imaging medium, that has not been modulated
    by the means used to produce the image
  language_code: eng
  notes:
  - Veiling glare lightens and reduces the contrast of the darker parts of an image.
  - Formerly the English term "ambient flare" and the French term "lumière parasite
    ambiante" were used, but these terms are deprecated.
  examples: []
