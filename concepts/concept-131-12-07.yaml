fra:
  id: 131-12-07
  terms:
  - type: expression
    normative_status: preferred
    designation: conductance différentielle
    gender: f
    plurality: singular
  definition: |-
    pour un bipôle résistif, élémentaire ou non, de bornes A et B, dérivée du courant électrique  i dans le bipôle par rapport à la tension électrique u~AB~ ({{131-11-56, IEV:131-11-56}}) entre les bornes:

    stem:[G_d = ((d i))/((d u_((AB))))]

    où le courant est positif si le sens du courant est de A vers B et négatif dans le cas contraire
  language_code: fra
  notes:
  - Pour une résistance idéale, la conductance différentielle G~d~ est égale à sa
    conductance G.
  examples: []
