eng:
  id: 811-06-41
  terms:
  - type: expression
    normative_status: preferred
    designation: mean deceleration as a function of time
  definition: |-
    value of deceleration stem:[γ]~a~ obtained by dividing the reduction in speed by the time taken to effect it

    stem:[gamma_a = ((V_i - V_t))/(t)]

    where

    stem:[V]~i~ is the initial speed measured at the moment of the operation of the control device for the brake;
    stem:[V]~t~ is the final speed obtained at the end of the braking;
    stem:[t] is the time between the moment of operation of the control device for the brake and the moment at which the final speed is attained
  language_code: eng
  notes: []
  examples: []
  entry_status: Standard
  date_accepted: '2017-11-01T00:00:00+00:00'
