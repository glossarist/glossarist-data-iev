eng:
  id: 731-03-30
  terms:
  - type: expression
    normative_status: preferred
    designation: group index
  - type: symbol
    designation: stem:[N]
    international: true
  definition: the speed of light in vacuum, divided by the magnitude of the group
    velocity of the mode
  language_code: eng
  notes:
  - |-
    For a plane wave of wavelength stem:[λ], it is related thus to the refractive index stem:[n]:

    stem:[N = n - lambda ((d n))/((d lambda))]

    where stem:[λ] is the wavelength.
  - Each mode has its own group index.
  examples: []
