eng:
  id: 845-24-096
  terms:
  - type: expression
    normative_status: preferred
    usage_info: of a diffusing surface, by reflection or by transmission
    designation: diffusion factor
  - type: symbol
    designation: stem:[σ]
    international: true
  definition: |-
    quotient of the mean of the values of luminance, stem:[L], measured at 20° and 70° (0,35 rad and 1,22 rad) and the luminance measured at 5° (0,09 rad) from the normal, when the surface considered is illuminated normally

    stem:[sigma = ((L ( 20 ° ) + L ( 70 ° )))/((2 L ( 5 ° )))]
  language_code: eng
  notes:
  - The diffusion factor is intended to give an indication of the spatial distribution
    of the diffused flux. It is equal to 1 for every isotropic diffuser, whatever
    the value of the diffuse reflectance or diffuse transmittance.
  - This way of defining the diffusion factor can be applied only to materials for
    which the scattering indicatrix does not differ appreciably from that of ordinary
    opal glasses.
  - For indicating the shape of the scattering indicatrix it is recommended that the
    diffusion factor, stem:[σ], be used for strongly diffusing materials, and the
    half-value angle, stem:[γ], for poorly diffusing materials.
  - The diffusion factor has unit one.
  - This entry was numbered 845-04-89 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-24-096
  terms:
  - type: expression
    normative_status: preferred
    usage_info: d'une surface diffusante, par réflexion ou par transmission
    designation: facteur de diffusion
    gender: m
    plurality: singular
  definition: |-
    quotient de la moyenne des luminances lumineuses mesurées sous des angles de 20° et 70° (0,35 rad et 1,22 rad), par la luminance mesurée sous un angle de 5° (0,09 rad) par rapport à la perpendiculaire, la surface prise en considération étant éclairée en incidence normale

    stem:[sigma = ((L ( 20 ° ) + L ( 70 ° )))/((2 L ( 5 ° )))]
  language_code: fra
  notes:
  - Le facteur de diffusion sert à fournir une indication sur la répartition spatiale
    du flux diffusé. Il est égal à 1 pour chaque diffuseur isotrope, quelle que soit
    la valeur du facteur de réflexion ou de transmission diffuse.
  - Cette façon de définir le facteur de diffusion ne peut être appliquée qu'aux matériaux
    dont l'indicatrice de diffusion ne diffère guère de celle des verres opales usuels.
  - Pour caractériser l'indicatrice de diffusion, il est recommandé d'utiliser le
    facteur de diffusion stem:[σ], pour des matériaux fortement diffusants, et l'angle
    de demi-valeur, stem:[γ], pour les matériaux faiblement diffusants.
  - L'unité de facteur de diffusion est un.
  - Cet article était numéroté 845-04-89 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
