eng:
  id: 212-13-18
  terms:
  - type: expression
    normative_status: preferred
    designation: reclaiming
  definition: bringing material back from waste condition to earlier useful state
    by removing harmful components
  language_code: eng
  notes:
  - |-
    Examples of reclaiming:

    – reclaiming of rubber by removal of vulcanizing agents;

    – reclaiming of insulating liquids by removal of soluble and insoluble impurities by chemical absorption means in addition to mechanical means in order to restore properties as close as possible to the original values, possibly also by use of antioxidants.
  examples: []
  entry_status: Standard
  date_accepted: '2010-06-01T00:00:00+00:00'
