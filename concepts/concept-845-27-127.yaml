eng:
  id: 845-27-127
  terms:
  - type: expression
    normative_status: preferred
    designation: fundamental power factor
  - type: symbol
    designation: stem:[λ]~1~
    international: true
  definition: |-
    ratio of the absolute value of the fundamental active power stem:[P]~1~ to the fundamental apparent power stem:[S]~1~

    stem:[λ]~1~ = |stem:[P]~1~| / stem:[S]~1~
  language_code: eng
  notes:
  - |-
    The fundamental power factor is also given by:

    stem:[λ]~1~ = |cos stem:[φ]~1~|
  - The fundamental power factor only refers to fundamental quantities.
  - The fundamental power factor is sometimes called displacement factor or displacement
    power factor.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
