eng:
  id: 131-12-08
  terms:
  - type: expression
    normative_status: preferred
    designation: ideal diode
  definition: asymmetric resistive two-terminal element characterized by zero voltage
    between the terminals when the electric current in it is directed from one terminal
    denoted A to the other denoted B and zero electric current when the electric potential
    at terminal A is less than or equal to the potential at terminal B
  language_code: eng
  notes:
  - |-
    The functional relation between voltage stem:[u]~AB~ and electric current stem:[i] is:

    stem:[u]~AB~ = 0 when stem:[i] ≥ 0

    stem:[i] = 0 when stem:[u]~AB~ ≤ 0

    where the reference direction for the electric current is from A to B.
  examples: []
  entry_status: Standard
  date_accepted: '2002-06-01T00:00:00+00:00'
  date_amended: '2002-06-01T00:00:00+00:00'
  review_date: '2002-06-01T00:00:00+00:00'
  review_decision_date: '2002-06-01T00:00:00+00:00'
  review_decision_event: published
