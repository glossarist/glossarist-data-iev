eng:
  id: 221-03-34
  terms:
  - type: expression
    normative_status: preferred
    designation: hysteresis core constant
  - type: symbol
    designation: stem:[η]~stem:[i]~
    international: true
  definition: |-
    in a magnetic core operating in the Rayleigh region, the tangent of the magnetic loss angle due to hysteresis divided by the product of the peak current stem:[î] in, and the square root of the inductance stem:[L] of, the measuring coil:

    stem:[eta_i = ((tan delta_h))/((î sqrt(L)))]
  language_code: eng
  notes:
  - |-
    The relation between the hysteresis material constant stem:[η]~B~ and the hysteresis core constant is:

    stem:[eta_i = eta_B sqrt(((mu_0 mu_e^3))/((V_e)))]

    where stem:[μ]~e~ is the effective permeability and stem:[V]~e~ the effective volume.
  examples: []
  entry_status: Standard
  date_accepted: '1990-10-01T00:00:00+00:00'
  date_amended: '1990-10-01T00:00:00+00:00'
  review_date: '1990-10-01T00:00:00+00:00'
  review_decision_date: '1990-10-01T00:00:00+00:00'
  review_decision_event: published
