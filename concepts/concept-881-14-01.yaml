eng:
  id: 881-14-01
  terms:
  - type: expression
    normative_status: preferred
    designation: dose equivalent
  - type: symbol
    designation: stem:[H]
    international: true
  definition: |-
    the product of stem:[D, Q] and stem:[N] at the point of interest in tissue, where stem:[D] is the absorbed dose, stem:[Q] is the quality factor and stem:[N] is the product of all other modifying factors

    stem:[H]= stem:[DQN]
  language_code: eng
  notes:
  - |-
    — The SI unit of dose equivalent is joule per kilogram and is given the special name sievert Thearlier special unit of dose equivalent, still in temporary use, was the rem.

    1 Sv = 100 rem

    = 1J • kg^-1^
  - Dose equivalent is used only for radiation protection purposes and only for values
    of stem:[H] up to the order of the applicable dose equivalent limit.
  examples: []
  entry_status: Standard
  date_accepted: '1983-01-01T00:00:00+00:00'
  date_amended: '1983-01-01T00:00:00+00:00'
  review_date: '1983-01-01T00:00:00+00:00'
  review_decision_date: '1983-01-01T00:00:00+00:00'
  review_decision_event: published
