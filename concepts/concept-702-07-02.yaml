eng:
  id: 702-07-02
  terms:
  - type: expression
    normative_status: preferred
    designation: decibel
  - type: symbol
    designation: dB
    international: true
  definition: a unit used to express the ratio of two powers by ten times the decimal
    logarithm of this ratio
  language_code: eng
  notes:
  - |-
    1 – The decibel may also be used to express the ratio of two field quantities. To obtain the same numerical value as for the corresponding power ratio, the logarithm of the field quantity ratio is multiplied by the factor 20, assuming that the impedances are equal.

    If stem:[P]~1~ and stem:[P]~2~ are two powers, their ratio expressed in decibels is:

    stem:[10 lg ((P_1))/((P_2))]

    The relation between a field quantity ratio and the corresponding power ratio is dependent on the impedances.

    If stem:[P]~1~ and stem:[P]~2~ represent the powers dissipated by currents stem:[I]~1~ and stem:[I]~2~ in resistances stem:[R]~1~ and stem:[R]~2~, then:

    stem:[10 lg ((P_1))/((P_2)) = 10 lg ((I_1^2))/((I_2^2)) ((R_1))/((R_2)) = 20 lg ((I_1))/((I_2)) + 10 lg ((R_1))/((R_2))]
  - 2 – Guidance for the use of the decibel and appropriate symbols to represent the
    ratios of various quantities is given in CCIR Recommendation 574, in CCITT Recommendation
    B.12, and in IEC publication 27-3.
  examples: []
  entry_status: Standard
  date_accepted: '1992-03-01T00:00:00+00:00'
