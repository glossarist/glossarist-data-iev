fra:
  id: 702-07-02
  terms:
  - type: expression
    normative_status: preferred
    designation: décibel
    gender: m
    plurality: singular
  definition: unité servant à exprimer le rapport de deux puissances par dix fois
    le logarithme décimal de ce rapport
  language_code: fra
  notes:
  - |-
    1 – Le décibel permet aussi d'exprimer le rapport de deux grandeurs de champ. Pour obtenir la même valeur numérique qu'avec le rapport des puissances correspondantes, le logarithme du rapport des grandeurs de champ est multiplié par le facteur 20, en supposant que les impédances soient égales.

    Si stem:[P]~1~ et stem:[P]~2~ sont deux puissances, leur rapport exprimé en décibels est:

    stem:[10 lg ((P_1))/((P_2))]

    La relation entre un rapport de grandeurs de champ et le rapport des puissances correspondantes dépend des impédances.

    Si stem:[P]~1~ et stem:[P]~2~ représentent les puissances dissipées par les courants stem:[I]~1~ et stem:[I]~2~ dans les résistances stem:[R]~1~ et stem:[R]~2~:

    stem:[10 lg ((P_1))/((P_2)) = 10 lg ((I_1^2))/((I_2^2)) ((R_1))/((R_2)) = 20 lg ((I_1))/((I_2)) + 10 lg ((R_1))/((R_2))]
  - 2 – Des directives pour l'emploi du décibel et de certains symboles pour désigner
    les rapports de certaines quantités sont données dans la recommandation 574 du
    CCIR, dans la recommandation B.12 du CCITT, ainsi que dans la publication 27-3
    de la CEI.
