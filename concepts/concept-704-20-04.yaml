eng:
  id: 704-20-04
  terms:
  - type: expression
    normative_status: preferred
    designation: digital multiplex equipment
  definition: the combination of a digital multiplexer and a digital demultiplexer
    at the same location but working in opposite directions
  language_code: eng
  notes:
  - The multiplexer and demultiplexer may or may not be combined into a single equipment.
  - A digital multiplex equipment may be qualified by the digit rate or the multiplex
    order of the composite digital signal it handles.
