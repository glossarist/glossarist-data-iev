    designation: free current operation
  - type: expression
    designation: natural excitation
  definition: |-
    a mode of operation of a transductor in which the waveshape of the output current is developed without influence from the control circuit

    Example: the mode of operation of a parallel transductor or of a series transductor with low control circuit impedance.
