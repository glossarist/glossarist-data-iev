eng:
  id: 561-02-77
  terms:
  - type: expression
    normative_status: preferred
    designation: transversal filter
  definition: filter consisting of input and output IDTs on a piezoelectric substrate
  language_code: eng
  notes:
  - |-
    The impulse response of a transversal filter is given by the convolution of the impulse response of the first IDT with the conjugate complex impulse response of the second IDT. The frequency response is given by the Fourier transform of the impulse response. A simple example of a transversal filter is shown in Figure 16.

    image::/assets/images/parts/561/561-fig16-en.png[]

    *Figure 16 – Transversal filter*
