eng:
  id: 692-08-02
  terms:
  - type: expression
    normative_status: preferred
    designation: interruption frequency per customer interrupted
  - type: expression
    normative_status: preferred
    designation: customer average interruption frequency index
    geographical_area: US
  - type: expression
    normative_status: preferred
    designation: CAIFI
  - type: symbol
    designation: stem:[f]~CI~
    international: true
  definition: number of {{supply interruptions, IEV:692-07-01}} experienced by the
    individual customers affected at least once during a time interval, divided by
    the product of the number of affected customers and the duration of that time
    interval
  language_code: eng
  notes:
  - |-
    If stem:[N]~NS~ is the number of customers affected and the supply of customer stem:[j] is interrupted stem:[n]~stem:[j]~ times during a time interval of duration stem:[T], then the interruption frequency per customer interrupted is given by

    stem:[f_((CI)) = ((sum_j n_j))/((N_(NS) T))]

    When determining stem:[N]~NS~, each customer affected must be counted only once, regardless of the number of interruptions experienced during that time interval.
  - Usually, only {{sustained interruptions, IEV:692-07-02}} are considered.
  - The term "customer" represents the end user and not some intermediate distribution
    system or company.
  - Interruption frequency per customer interrupted can be used to describe past performance
    or to estimate expected future performance.
  - This entry was numbered 191-27-02 in IEC 60050-191:1990.
  examples: []
  entry_status: Standard
  classification: Preferred
  date_accepted: '2017-12-01T00:00:00+00:00'
  date_amended: '2017-12-01T00:00:00+00:00'
