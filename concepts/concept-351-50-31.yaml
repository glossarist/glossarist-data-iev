eng:
  id: 351-50-31
  terms:
  - type: expression
    normative_status: preferred
    designation: dead-time element
  definition: linear time-invariant transfer element the output variable of which
    reproduces the input variable shifted by an interval equal to the dead time
  language_code: eng
  notes:
  - "The transfer function of a dead-time element is given by\n\nstem:[((V ( s )))/((U
    ( s ))) = e^(- s * T_t)]\n\nwhere<table>\r\n<tr>\n<td>\nstem:[T]~t~\n</td>\n<td>is
    the dead time;</td>\n</tr>\r\n<tr>\n<td>stem:[s]</td>\n<td>is the complex variable
    of the Laplace transform;</td>\n</tr>\r\n<tr>\n<td>\nstem:[U](stem:[s])</td>\n<td>is
    the input transform;</td>\n</tr>\r\n<tr>\n<td>\nstem:[V](stem:[s])</td>\n<td>is
    the output transform.</td>\n</tr>\r\n</table>"
  - Transportation lags of mass, energy or information are described by dead-time
    elements.
  - This entry was numbered 351-28-42 in IEC 60050-351:2006.
  examples: []
  entry_status: Standard
  date_accepted: '2013-11-01T00:00:00+00:00'
