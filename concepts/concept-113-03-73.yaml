eng:
  id: 113-03-73
  terms:
  - type: expression
    normative_status: preferred
    designation: generalized coordinate
  - type: symbol
    designation: stem:[q]~stem:[i]~
    international: true
  definition: one of the coordinates that is used to describe the position within
    a system, where stem:[i] = 1, 2, …, stem:[N], and stem:[N] is the degree of freedom
    or lowest number of coordinates necessary to fully define the position
  language_code: eng
  notes:
  - The unit depends on the type of representation of the system. In mechanics, the
    generalized coordinates may be length or angle.
