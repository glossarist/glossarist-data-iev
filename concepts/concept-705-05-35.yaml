  terms:
  - type: expression
    normative_status: preferred
    designation: radio horizon
  definition: the locus of points at which the direct rays from a point source of
    radio waves are tangential to the surface of the Earth
  language_code: eng
  notes:
  - As a general rule, the radio and geometrical horizons are different because of
    atmospheric refraction.
