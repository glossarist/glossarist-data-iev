fra:
  id: 723-05-17
  terms:
  - type: expression
    normative_status: preferred
    usage_info: d'une image
    designation: trame
    gender: f
    plurality: singular
  definition: l'un des ensembles de lignes provenant de la subdivision d'une {{image
    complète, IEV:723-05-25}} en lignes équiréparties sur toute la hauteur de l'image
    et balayées successivement, la fréquence de répétition de ces ensembles étant
    un multiple de la fréquence d'image
  language_code: fra
  notes:
  - En anglais, le terme "frame" a divers sens dans les domaines de la transmission
    numérique (voir {{IEV 704-14-01, IEV:704-14-01}}), de la commutation (voir {{IEV
    714-15-09, IEV:714-15-09}}), de la télévision (voir {{IEV 723-05-25, IEV:723-05-25}}),
    de l'accès multiple par répartition temporelle (voir {{IEV 725-14-18, IEV:725-14-18}}),
    du traitement numérique (voir {{IEV 807-01-03, IEV:807-01-03}}), des machines
    électriques tournantes (voir {{IEV 811-14-02, IEV:811-14-02}}), et des réseaux
    embarqués de train (voir {{IEV 811-37-40, IEV:811-37-40}}). Dans certains pays
    anglophones, le terme "frame" est également employé pour désigner une subdivision
    d'une trame définie dans la présente entrée de l'IEV, c'est-à-dire la {{trame,
    IEV:723-05-17}} d'une image.
  - En français, le terme "trame" a divers sens dans les domaines de la concentration
    et la déviation des faisceaux des tubes électroniques (voir {{IEV 531-14-20, IEV:531-14-20}}),
    de la transmission numérique (voir {{IEV 704-14-01, IEV:704-14-01}}), de la commutation
    (voir {{IEV 714-15-09, IEV:714-15-09}}), de la télévision (voir {{IEV 723-05-17,
    IEV:723-05-17}} et l'{{IEV 723-05-25, IEV:723-05-25}}), de l'accès multiple par
    répartition temporelle (voir {{IEV 725-14-08, IEV:725-14-08}}), du traitement
    numérique (voir {{IEV 807-01-03, IEV:807-01-03}}), et des réseaux embarqués de
    train (voir {{IEV 811-37-40, IEV:811-37-40}}).
