eng:
  id: 421-06-01
  terms:
  - type: expression
    normative_status: preferred
    designation: no-load loss
  definition: the active power absorbed when a given voltage at rated frequency is
    applied to the terminals of one of the windings, the other winding(s) being open-circuited
  language_code: eng
  notes:
  - Normally the applied voltage is the rated voltage and the energized winding, if
    fitted with tappings, is connected on its principal tapping.
