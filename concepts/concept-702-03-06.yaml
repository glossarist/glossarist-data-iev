eng:
  id: 702-03-06
  terms:
  - type: expression
    normative_status: preferred
    designation: decay time
  - type: expression
    designation: fall time
  definition: the time interval between the instants at which the instantaneous value
    of a pulse again reaches a specified upper value and then a specified lower value
  language_code: eng
  notes:
  - Unless otherwise specified, the upper and lower values are fixed at 90 % and 10
    % of the pulse magnitude.
