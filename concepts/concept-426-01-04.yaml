eng:
  id: 426-01-04
  terms:
  - type: expression
    normative_status: preferred
    designation: maximum surface temperature
  definition: highest temperature which is attained in service under the most adverse
    conditions (but within the specified tolerances) by any part or surface of {{Ex
    Equipment, IEV:426-01-14}}
  language_code: eng
  notes:
  - |-
    For Ex Equipment in an explosive gas atmosphere, this temperature may occur on an internal component or on the external surface of the enclosure, depending upon the Type of Protection employed.

    Note 2 to entry: For Ex Equipment in an explosive dust atmosphere, this temperature occurs on the external surface of the enclosure and may include a defined dust layer condition.
  examples: []
  entry_status: Standard
