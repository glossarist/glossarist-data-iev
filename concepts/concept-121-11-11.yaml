eng:
  id: 121-11-11
  terms:
  - type: expression
    normative_status: preferred
    designation: "(electric) current density"
  - type: expression
    normative_status: preferred
    designation: "(conduction) current density"
  - type: expression
    normative_status: preferred
    designation: areic electric current
  - type: symbol
    designation: stem:[*J*]
    international: true
  definition: |-
    at a given point within a volume element of quasi-infinitesimal volume stem:[V], vector quantity equal to the sum, for all free charge carriers within the volume element, of the products of electric charge and velocity, divided by the volume stem:[V]:

    stem:[J = (1)/(V) sum_((i = 1))^n Q_i v_i]

    where stem:[n] is the number of free carriers within the volume element, stem:[Q]~stem:[i]~ the electric charge of the stem:[i]^th^ carrier and stem:[*v*]~stem:[i]~ its velocity
  language_code: eng
  notes:
  - |-
    The flux of the electric current density *stem:[J]* through any directed surface S is equal to the electric current stem:[I] through that surface:

    stem:[I = underset(S)( int ) J * e_n d A]

    where stem:[*e*]~n~dstem:[A] is the vector surface element.
  examples: []
  entry_status: Standard
  classification: Preferred
  date_accepted: '1998-08-01T00:00:00+00:00'
  date_amended: '1998-08-01T00:00:00+00:00'
  review_date: '1998-08-01T00:00:00+00:00'
  review_decision_date: '1998-08-01T00:00:00+00:00'
  review_decision_event: published
