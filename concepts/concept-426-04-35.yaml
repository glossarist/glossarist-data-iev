  terms:
  - type: expression
    normative_status: preferred
    designation: dust-protected enclosure
  definition: enclosure in which the ingress of dust is not totally excluded, but
    is unlikely to enter in sufficient quantity to interfere with the safe operation
    of the equipment and does not accumulate in a position within the enclosure where
    it is liable to cause an ignition hazard
  language_code: eng
