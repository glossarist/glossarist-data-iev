  terms:
  - type: expression
    normative_status: preferred
    designation: region of limited proportionality
  definition: range of applied voltage of a counter tube, between the proportional
    and the Geiger-Müller regions, in which the gas multiplication factor is dependent
    on the total number of ion pairs initially produced in the sensitive volume
  language_code: eng
  notes:
  - This entry was numbered 394-38-42 in IEC 60050-394:2007.
