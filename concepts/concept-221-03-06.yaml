eng:
  id: 221-03-06
  terms:
  - type: expression
    normative_status: preferred
    designation: complex permeability
  - type: symbol
    designation: stem:[µ]
    international: true
  definition: |-
    the complex quotient of the magnetic flux density and magnetic field strength in a material when one of these quantities varies sinusoidally with time and that component of the other is chosen which varies sinusoidally with time at the same frequency, that is, the fundamental component. The vectors representing the flux density and field strength are assumed to be collinear :

    stem:[µ] = stem:[μ'] − j stem:[μ'']

    where stem:[µ'] and stem:[µ"] are the real and imaginary components respectively of the complex permeability
  language_code: eng
  notes:
  - In general, a number of the permeabilities defined herein may be expressed as
    complex permeability. Where such permeabilities are expressed by symbols not indicating
    that they are complex or that they are components of a complex number, the real
    part is assumed.
  examples: []
  entry_status: Standard
  date_accepted: '1990-10-01T00:00:00+00:00'
  date_amended: '1990-10-01T00:00:00+00:00'
  review_date: '1990-10-01T00:00:00+00:00'
  review_decision_date: '1990-10-01T00:00:00+00:00'
  review_decision_event: published
