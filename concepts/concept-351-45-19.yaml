eng:
  id: 351-45-19
  terms:
  - type: expression
    normative_status: preferred
    designation: damping ratio
  definition: "for a linear time-invariant system described by the second order differential
    equation\n\nstem:[((d^2 x))/((d t^2)) + 2 * vartheta * omega_0 * ((d x))/((d t))
    + omega_0^2 * x = 0]\n\nthe value of the coefficient stem:[vartheta],\n\nwhere\n\n<table>\r\n<tr>\n<td>stem:[t]</td>\n<td>is
    the time;</td>\n</tr>\r\n<tr>\n<td>stem:[x]</td>\n<td>is a state variable of the
    system;</td>\n</tr>\r\n<tr>\n<td>\nstem:[ω]~0~\n</td>\n<td>is the characteristic
    angular frequency of the system</td>\n</tr>\n</table>"
  language_code: eng
  notes:
  - When stem:[vartheta 1], stem:[omega_d = omega_0 * sqrt(1 - vartheta^2)] is the
    eigen angular frequency of the system.
  - This entry was numbered 351-24-18 in IEC 60050-351:2006.
  examples: []
  entry_status: Standard
  date_accepted: '2013-11-01T00:00:00+00:00'
  date_amended: '2013-11-01T00:00:00+00:00'
  review_date: '2013-11-01T00:00:00+00:00'
  review_decision_date: '2013-11-01T00:00:00+00:00'
  review_decision_event: published
