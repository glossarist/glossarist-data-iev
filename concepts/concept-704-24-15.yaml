eng:
  id: 704-24-15
  terms:
  - type: expression
    normative_status: preferred
    designation: slope overload distortion
  definition: the distortion due to peak limiting in a DPCM quantizer
  language_code: eng
  notes:
  - Slope overload distortion arises from the inability of the quantizer to respond
    adequately to large differences among a succession of samples applied to the input
    of the DPCM system.
  examples: []
  entry_status: Standard
