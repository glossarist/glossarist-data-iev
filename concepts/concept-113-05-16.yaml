eng:
  id: 113-05-16
  terms:
  - type: expression
    normative_status: preferred
    designation: elementary electric charge
  - type: expression
    normative_status: preferred
    designation: elementary charge
  - type: symbol
    designation: stem:[e]
    international: true
  definition: "{{fundamental physical constant, IEV:112-03-09}} equal to the {{quantum,
    IEV:113-05-06}} of {{electric charge, IEV:113-02-10}}, the value of which is set
    to exactly 1,602 176 634 × 10^−19^ {{C, IEV:113-02-11}}"
  language_code: eng
  notes:
  - The elementary electric charge is equal to the charge of the proton and opposite
    to the charge of the electron.
  - The elementary electric charge is used in the {{SI, IEV:112-02-02}} to define
    the {{ampere, IEV:112-02-07}}.
  examples: []
  entry_status: Standard
  classification: Preferred
  authoritative_source:
  - ref: BBIPM SI Brochure TEMP DISABLED DUE TO RELATON
    clause: '2.2'
    relationship:
      :type: :modified
      :modification: The full form of the term, including the adjective "electric",
        has been specified as the preferred term to differentiate clearly this quantity
        from other charges such as "color charge". The term specified in the SI Brochure
        has been given as a synonym. The definition in the SI Brochure has been revised
        to comply with the IEV rules.
    original: SI Brochure, 9th edition, 2019, 2.2, modified – The full form of the
