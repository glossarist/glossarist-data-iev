eng:
  id: 702-02-22
  terms:
  - type: expression
    normative_status: preferred
    designation: group velocity
  - type: symbol
    designation: stem:[| vec v_g |]
    international: true
  definition: the velocity vector at a point, in a propagation medium, of a signal
    which may be ideally represented by two superimposed sinusoidal waves of equal
    amplitude and slightly different frequencies approaching a common limiting value
  language_code: eng
  notes:
  - |-
    In the most general case the reciprocal of the magnitude stem:[| vec v_g |] of the group velocity vector is equal to the derivative of the reciprocal of the wavelength stem:[λ] with respect to the frequency stem:[f]:

    stem:[(1)/((| vec v_g |)) = ((d ( lambda^(- 1) )))/((d f))]
  examples: []
  entry_status: Standard
  date_accepted: '1992-03-01T00:00:00+00:00'
