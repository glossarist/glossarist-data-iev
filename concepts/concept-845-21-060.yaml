eng:
  id: 845-21-060
  terms:
  - type: expression
    normative_status: preferred
    designation: illuminance
  - type: symbol
    designation: |-
      stem:[E]~v~
      stem:[E]
    international: true
  definition: |-
    density of incident luminous flux with respect to area at a point on a real or imaginary surface

    stem:[E_v = ((d Phi_v))/((d A))]

    where stem:[Φ]~v~ is luminous flux and stem:[A] is the area on which the luminous flux is incident
  language_code: eng
  notes:
  - |-
    Illuminance can be derived from the spectral irradiance distribution by

    stem:[E_v \ = \ K_m int_0^(oo) E_((e , lambda)) ( lambda ) V ( lambda ) d lambda]

    where stem:[K]~m~ is maximum luminous efficacy, stem:[E]~e,stem:[λ]~(stem:[λ]) is the spectral irradiance at wavelength stem:[λ] and stem:[V](stem:[λ]) is <a href="IEV845-21-035">spectral luminous efficiency</a>.
  - The corresponding radiometric quantity is "irradiance". The corresponding quantity
    for photons is "photon irradiance".
  - The illuminance is expressed in lux (lx = lm·m^−2^).
  - This entry was numbered 845-01-38 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-21-060
  terms:
  - type: expression
    normative_status: preferred
    designation: éclairement
    gender: m
    plurality: singular
  - type: expression
    designation: éclairement lumineux
    gender: m
    plurality: singular
  definition: |-
    densité du flux lumineux incident par rapport à l'aire en un point d'une surface réelle ou fictive, exprimée par

    stem:[E_v = ((d Phi_v))/((d A))]

    où stem:[Φ]~v~ est le flux lumineux et stem:[A] est l'aire qui reçoit ce flux
  language_code: fra
  notes:
  - |-
    L'éclairement peut être dérivé de la distribution de l'éclairement spectral énergétique par

    stem:[E_v \ = \ K_m int_0^(oo) E_((e , lambda)) ( lambda ) V ( lambda ) d lambda]

    où stem:[K]~m~ est l'efficacité lumineuse maximale, stem:[E]~e,stem:[λ]~(stem:[λ]) est l'éclairement spectral énergétique à la longueur d'onde stem:[λ] et stem:[V](stem:[λ]) est l'<a href="IEV845-21-035">efficacité lumineuse spectrale</a>.
  - La grandeur radiométrique correspondante est l'"éclairement énergétique". La grandeur
    correspondante pour les photons est l'"éclairement photonique".
  - L'éclairement est exprimé en lux (lx = lm·m^−2^).
  - Cet article était numéroté 845-01-38 dans l'IEC 60050-845:1987.
  examples: []
  entry_status: Standard
  review_decision_event: published
