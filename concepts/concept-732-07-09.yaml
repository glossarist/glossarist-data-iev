eng:
  id: 732-07-09
  terms:
  - type: expression
    normative_status: preferred
    designation: top-level domain name
  definition: domain name identifying the highest hierarchical level in the geographical
    or organizational structure of the addressing system in the Internet
  language_code: eng
  notes:
  - In the Internet, the top-level domain name is a two-letter designation of a country
    or territory, in most cases an ISO country name, but also "eu", or another designation
    of a region (e.g. "asia"), or a generic designation such as "biz", "com", "int",
    "museum", "name", "net", "org".
