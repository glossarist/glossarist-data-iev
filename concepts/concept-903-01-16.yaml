eng:
  id: 903-01-16
  terms:
  - type: expression
    normative_status: preferred
    designation: malfunction
  definition: "situation for which the electrical equipment does not perform the intended
    function due to a variety of reasons, including:\r\n\r\n* variation of a property
    or of a dimension of the processed material or of the work piece;\r\n* failure
    of one (or more) of its component parts or services;\r\n* external disturbances
    (e.g. shocks, vibration, electromagnetic interference);\r\n* design error or deficiency
    (e.g. software errors);\r\n* disturbance of its power supply;\r\n* surrounding
    conditions (e.g.  condensation due to temperature change)."
  language_code: eng
  notes: []
  examples: []
  entry_status: Standard
