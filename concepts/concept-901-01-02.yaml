fra:
  id: 901-01-02
  terms:
  - type: expression
    normative_status: preferred
    designation: sujet de normalisation
    gender: m
    plurality: singular
  definition: matière à normaliser
  language_code: fra
  notes:
  - Le terme «matière», c'est-à-dire produit, processus ou service, a été adopté pour
    que les sujets de normalisation soient considérés dans un sens large; elle doit
    être interprétée comme pouvant recouvrir sans distinction tout matériau, composant,
    équipement, système, interface, protocole, procédure, fonction, méthode ou activité.
  - Le champ de la {{normalisation, IEV:901-01-01}} peut être limité à certains aspects
    particuliers d'un sujet quelconque. Dans le cas des chaussures par exemple, la
    pointure et les critères de durabilité peuvent être normalisés séparément.
  examples: []
  entry_status: Standard
  authoritative_source:
  - ref: ISO/IEC Guide 2:2004
    clause: '1.2'
    link: https://www.iso.org/standard/39976.html
    relationship:
      :type: :modified
      :modification: Une explication de l'utilisation du terme «matière» a été ajoutée
        à la Note 1 à l'article, et le texte «tout au long du Guide ISO/CEI 2» a été
        supprimé.
    original: Guide ISO/CEI 2:2004, 1.2, modifiée – Une explication de l'utilisation
      du terme «matière» a été ajoutée à la Note 1 à l'article, et le texte «tout
      au long du Guide ISO/CEI 2» a été supprimé.
  review_decision_event: published
