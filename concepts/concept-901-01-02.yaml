eng:
  id: 901-01-02
  terms:
  - type: expression
    normative_status: preferred
    designation: subject of standardization
  definition: topic to be standardized
  language_code: eng
  notes:
  - The term "topic", i.e. product, process or service, has been adopted to encompass
    the subject of standardization in a broad sense, and should be understood equally
    to cover, for example, any material, component, equipment, system, interface,
    protocol, procedure, function, method or activity.
  - "{{Standardization, IEV:901-01-01}} may be limited to particular aspects of any
    subject. For example, in the case of shoes, criteria could be standardized separately
    for sizes and durability."
  examples: []
  entry_status: Standard
  authoritative_source:
  - ref: ISO/IEC Guide 2:2004
    clause: '1.2'
    link: https://www.iso.org/standard/39976.html
    relationship:
      :type: :modified
      :modification: An explanation of the use of the term "topic" has been added
        to Note 1 to entry, and the text "throughout ISO/IEC Guide 2" has been deleted.
    original: ISO/IEC Guide 2:2004, 1.2, modified – An explanation of the use of the
      term "topic" has been added to Note 1 to entry, and the text "throughout ISO/IEC
      Guide 2" has been deleted.
  date_accepted: '2013-11-01T00:00:00+00:00'
