eng:
  id: 395-07-90
  terms:
  - type: expression
    normative_status: preferred
    designation: single failure criterion
  definition: "criterion (or requirement) applied to a system such that it must be
    capable of performing its task in the presence of any single failure\n\nEXAMPLE\n\n\n\n.
    \ Any single detectable failure within the safety systems concurrent with all
    identifiable, but non detectable failures. \n\n.  All failures caused by the single
    failure. \n\n.  All failures and spurious system actions that cause, or are caused
    by, the design basis event requiring the safety function."
  language_code: eng
  notes:
  - The single failure could occur prior to, or at any time during, the design basis
    event for which the safety system is required to function.
  - This entry was numbered 393-18-27 in IEC 60050-393:2003.
  examples: []
  entry_status: Standard
  date_accepted: '2014-03-01T00:00:00+00:00'
