eng:
  id: 705-02-10
  terms:
  - type: expression
    normative_status: preferred
    designation: complex Poynting vector
  definition: |-
    for a sinusoidal wave of angular frequency stem:[ω], the vector product:

    stem:[(1)/(2) vec underset(_)(E) xx vec underset(_)(H)^( ** )]

    when the electric field vector stem:[vec E ( t )] and the magnetic field vector stem:[vec H ( t )] are represented at the same point, in complex notation, by the equations:

    stem:[vec E ( t ) = Re ( underset(_)((vec E)) e^(j omega t) )]

    stem:[vec H ( t ) = Re ( underset(_)((vec H)) e^(j omega t) )]

    where stem:[vec underset(_)(E)] and stem:[vec underset(_)(H)] are not time-dependent and are generally complex, stem:[vec underset(_)(H)^( ** )] being the complex conjugate of stem:[vec underset(_)(H)]
  language_code: eng
  notes:
  - The real part of the complex Poynting vector is the average of the Poynting vector
    during one cycle.
  - The imaginary part of the complex Poynting vector is a vector of which, with certain
    reservations, the direction may be considered as being that of reactive energy
    propagation, and the magnitude may be regarded as the reactive power flux per
    unit surface area perpendicular to this direction, with a sign assigned conventionally.
  examples: []
  entry_status: Standard
  date_accepted: '1995-09-01T00:00:00+00:00'
  date_amended: '1995-09-01T00:00:00+00:00'
  review_date: '1995-09-01T00:00:00+00:00'
  review_decision_date: '1995-09-01T00:00:00+00:00'
  review_decision_event: published
