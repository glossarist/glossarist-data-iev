eng:
  id: 121-11-64
  terms:
  - type: expression
    normative_status: preferred
    designation: electromagnetic energy
  definition: energy associated with an electromagnetic field
  language_code: eng
  notes:
  - |-
    In a linear medium the electromagnetic energy within a domain V is given by the volume integral

    stem:[(1)/(2) underset(V)( int ) ( E * D + H * B ) d V]

    where stem:[*E*], stem:[*D*], stem:[*H*] and stem:[*B*] are the four vector quantities determining the electromagnetic field.
  examples: []
