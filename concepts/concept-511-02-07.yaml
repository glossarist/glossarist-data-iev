eng:
  id: 511-02-07
  terms:
  - type: expression
    normative_status: preferred
    designation: plasmonic photovoltaic cell
  definition: photovoltaic {{device, IEV:511-01-01}} in which its optical properties
    are modified by incorporating metallic {{nanoparticles, IEV:511-01-12}} to the
    {{semiconductor, IEV:121-12-06}} layer of the device
  language_code: eng
  notes:
  - The {{nanostructure, IEV:511-01-08}} of the metallic particles increases the {{absorption,
    IEV:705-02-07}} and {{scattering, IEV:705-04-46}} of incident light and supports
    strong localized collective electron excitations known as surface plasmons.
  - Plasmon-resonance-generating metallic nanostructures are provided on the semiconductor
    layer of the device for resonantly coupling light into the absorbing layer and
    transporting photo-induced {{charge carriers, IEV:113-06-25}} out of the absorbing
    layer, thereby improving the performance of the device.
  examples: []
  entry_status: Standard
  authoritative_source:
  - ref: IEC/TS 80004-9:2017
    clause: 3.2.7
    link: https://webstore.iec.ch/publication/30528
    relationship:
      :type: :modified
      :modification: In the definition, deletion of "special type of" and replacement
        of "metal" by "metallic". In Note 1 to entry, replacement of "metal nanoparticles"
        by "metallic particles".  In Note 2 to entry, replacement of "A plasmon resonance
        generating metallic nanostructure is" by "Plasmon-resonance-generating metallic
        nanostructures are".
    original: IEC TS 80004-9:2017, 3.2.7, modified – In the definition, deletion of
      "special type of" and replacement of "metal" by "metallic". In Note 1 to entry,
      replacement of "metal nanoparticles" by "metallic particles".  In Note 2 to
      entry, replacement of "A plasmon resonance generating metallic nanostructure
      is" by "Plasmon-resonance-generating metallic nanostructures are".
  date_accepted: '2018-04-01T00:00:00+00:00'
  date_amended: '2018-04-01T00:00:00+00:00'
  review_date: '2018-04-01T00:00:00+00:00'
  review_decision_date: '2018-04-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 511-02-07
  terms:
  - type: expression
    normative_status: preferred
    designation: cellule photovoltaïque plasmonique
    gender: f
    plurality: singular
  definition: "{{dispositif, IEV:511-01-01}} photovoltaïque dont les propriétés optiques
    sont modifiées en déposant des {{nanoparticules, IEV:511-01-12}} métalliques sur
    la couche {{semiconductrice, IEV:121-12-06}} du dispositif"
  language_code: fra
  notes:
  - La {{nanostructure, IEV:511-01-08}} des particules métalliques augmente l'{{absorption,
    IEV:705-02-07}} et la {{diffusion, IEV:705-04-46}} de la lumière incidente et
    supporte de fortes excitations collectives localisées d'électrons connues sous
    le nom de plasmons de surface.
  - Les nanostructures métalliques qui génèrent une résonance plasmonique sont déposées
    sur la couche semiconductrice du dispositif pour produire, par résonance, un couplage
    de la lumière dans la couche absorbante et pour transporter les {{porteurs de
    charge, IEV:113-06-25}} photo-induits hors de la couche absorbante, améliorant
    ainsi la performance du dispositif.
  examples: []
  entry_status: Standard
  authoritative_source:
