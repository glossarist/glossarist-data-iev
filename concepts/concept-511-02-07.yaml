        de "nanostructure des nanoparticules" par "structures métalliques à l'échelle
        nanométrique".  Dans la Note 1 à l'article, remplacement de "La nanostructure
        des nanoparticules métalliques" par "Les structures métalliques à l'échelle
        nanométrique".  Dans la Note 2 à l'article, remplacement d'"Une nanostructure
        métallique qui génère" par "Les nanostructures métalliques qui génèrent".
