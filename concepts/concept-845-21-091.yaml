eng:
  id: 845-21-091
  terms:
  - type: expression
    normative_status: preferred
    usage_info: for a specified photometric condition
    designation: spectral luminous efficacy
  - type: symbol
    designation: |-
      stem:[K](stem:[λ]),&lt;for photopic vision&gt; &lt;pour la vision photopique&gt;
      stem:[K]′(stem:[λ]), &lt;for scotopic vision&gt; &lt;pour la vision scotopique&gt;
      stem:[K]~mes;~stem:[m](stem:[λ]), &lt;for mesopic vision&gt; &lt;pour la vision mésopique&gt;
      stem:[K]~10~(stem:[λ]), &lt;for the CIE 10° photopic photometric observer&gt; &lt;pour l'observateur photométrique photopique 10° CIE&gt;
      stem:[K]~M~(stem:[λ]), &lt;for the CIE 1988 modified 2° spectral luminous efficiency function for photopic vision&gt; &lt;pour la fonction d'efficacité lumineuse relative spectrale de 2° pour vision photopique (CIE 1988 modifiée)&gt;
    international: true
  definition: product of <a href="IEV845-21-035">spectral luminous efficiency</a>
    and maximum luminous efficacy for a specified photometric condition
  language_code: eng
  notes:
  - The photometric condition should be specified (e.g. photopic, scotopic, mesopic).
    If it is not specified, photopic vision is assumed and the symbol stem:[K](stem:[λ])
    is used. For other photometric conditions, the respective symbol for identification
    shall be used.
  - |-
    Spectral luminous efficacy for photopic vision is expressed by

    stem:[K](stem:[λ]) = stem:[K]~m~ stem:[V](stem:[λ])

    where stem:[K]~m~ is maximum luminous efficacy, stem:[V](stem:[λ]) is spectral luminous efficiency and stem:[λ] is wavelength.
  - The spectral luminous efficacy is expressed in lumen per watt (lm·W^−1^).
  examples: []
  entry_status: Standard
  date_accepted: '2020-12-01T00:00:00+00:00'
  date_amended: '2020-12-01T00:00:00+00:00'
  review_date: '2020-12-01T00:00:00+00:00'
  review_decision_date: '2020-12-01T00:00:00+00:00'
  review_decision_event: published
fra:
  id: 845-21-091
  terms:
  - type: expression
    normative_status: preferred
    usage_info: pour une condition photométrique spécifiée
    designation: efficacité lumineuse relative spectrale
    gender: f
    plurality: singular
  definition: produit de l'<a href="IEV845-21-035">efficacité lumineuse relative spectrale</a>
    et de l'efficacité lumineuse maximale pour une condition photométrique spécifiée
  language_code: fra
  notes:
  - Il convient de spécifier la condition photométrique (par exemple, photopique,
    scotopique, mésopique). En l'absence de spécification, la vision photopique est
    par hypothèse utilisée, de même que le symbole stem:[K](stem:[λ])stem:[.] Pour
    les autres conditions photométriques, le symbole respectif pour l'identification
    doit être utilisé.
  - |-
    L'efficacité lumineuse relative spectrale pour la vision photopique est exprimée par

    stem:[K](stem:[λ]) = stem:[K]~m~ stem:[V](stem:[λ])

    où stem:[K]~m~ est l'efficacité lumineuse maximale, stem:[V](stem:[λ]) est l'efficacité lumineuse relative spectrale et stem:[λ] est la longueur d'onde.
  - L'efficacité lumineuse relative spectrale est exprimée en lumen par watt (lm·W^−1^).
  examples: []
  entry_status: Standard
  review_decision_event: published
