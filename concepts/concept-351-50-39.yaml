fra:
  id: 351-50-39
  terms:
  - type: expression
    normative_status: preferred
    designation: élément de signe
    gender: m
    plurality: singular
  definition: "unité fonctionnelle qui génère une variable de sortie dont la valeur
    dépend du signe de la valeur de sa variable d'entrée, suivant la formule\n\nstem:[v
    ( t ) = { [[V_1],[0],[- V_1]] [[ pour u ( t ) &gt; 0],[ pour u ( t ) = 0],[ pour
    u ( t ) 0]]]\n\noù<table>\r\n<tr>\n<td>stem:[t]</td>\n<td>est le temps;</td>\n</tr>\r\n<tr>\n<td>\nstem:[u](stem:[t])</td>\n<td>est
    la variable d’entrée;</td>\n</tr>\r\n<tr>\n<td>\nstem:[v](stem:[t])</td>\n<td>est
    la variable de sortie;</td>\n</tr>\r\n<tr>\n<td>\nstem:[V]~1~\n</td>\n<td>est
    une valeur constant de la variable de sortie.</td>\n</tr>\r\n</table>"
  language_code: fra
  notes:
  - Cet article était numéroté 351-32-23 dans la CEI 60050-351:2006.
  examples: []
