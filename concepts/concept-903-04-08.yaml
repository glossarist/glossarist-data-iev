  terms:
  - type: expression
    normative_status: preferred
    designation: pluggable equipment type A
  definition: equipment that is intended for connection to the mains via a non-industrial
    plug and socket-outlet or via a non-industrial appliance coupler, or both
  language_code: eng
  notes:
  - For non-industrial plug and socket-outlets, see IEC/TR 60083 or a national equivalent.
    For non-industrial appliance couplers, see IEC 60320-1.
