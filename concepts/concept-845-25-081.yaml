eng:
  id: 845-25-081
  terms:
  - type: expression
    normative_status: preferred
    designation: aspecular angle
  definition: angle subtended at the point of incidence by a given ray in the viewing
    direction and the specular direction defined by the incident ray and the surface
    normal
  language_code: eng
  notes:
  - The incident and viewing rays, the surface normal and the specular direction all
    lie in a common plane.
  - |-
    The aspecular angle is calculated as the difference between the viewing direction and the specular direction and is understood to be positive when it lies between the specular direction and the incident (illuminating) ray (see the figure below).

    image::/assets/images/parts/845/845-25-081-en.png[]
  - The aspecular angle is measured in radian (rad) or degree (°).
  examples: []
  entry_status: Standard
