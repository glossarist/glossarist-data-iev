eng:
  id: 581-27-07
  terms:
  - type: expression
    normative_status: preferred
    designation: contact size
  definition: designation used to differentiate one contact from another
  language_code: eng
  notes:
  - |-
    The contact size may be denoted by one of the following systems:

    a) numbering system: assigned numbers used to denote the size of the contact and its related conductor accommodation,

    b) current rating system: the related current-carrying capacity is used to denote the size of the contact,

    c) cross-sectional area system: reference is made to the cross-sectional area of the maximum conductor accommodation to denote the size of the contact.
  examples: []
