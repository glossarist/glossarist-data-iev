eng:
  id: 845-24-086
  terms:
  - type: expression
    normative_status: preferred
    designation: spectral mass attenuation coefficient
  - type: symbol
    designation: stem:[μ]~m~(stem:[λ])
    international: true
  definition: |-
    quotient of the <a href="IEV845-24-083">spectral linear attenuation coefficient</a>, stem:[μ](stem:[λ]), and the mass density, stem:[ρ], of the medium

    stem:[mu_m ( lambda ) = ((mu ( lambda )))/((rho_(())))]
  language_code: eng
  notes:
  - The spectral mass attenuation coefficient is expressed in square metre per kilogram
    (m^2^·kg^−1^).
  - This entry was numbered 845-04-79 in IEC 60050-845:1987.
  examples: []
  entry_status: Standard
