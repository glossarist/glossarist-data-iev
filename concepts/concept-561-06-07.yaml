eng:
  id: 561-06-07
  terms:
  - type: expression
    normative_status: preferred
    designation: temperature coefficient of permittivity
  - type: symbol
    designation: stem:[TCε]
    international: true
  definition: |-
    relative change in permittivity due to a change in temperature divided by the change in temperature

    stem:[T C epsilon = ((epsilon_T – epsilon_((ref))))/((epsilon_((ref)) ( T – T_((ref)) )))]

    where

    stem:[ε]~stem:[T]~ is the permittivity at temperature stem:[T];

    stem:[ε]~ref~ is the permittivity at reference temperature stem:[T]~ref~
  language_code: eng
  notes:
  - The temperature coefficient of permittivity is generally expressed in megakelvins
    to the power minus one (1/MK).
  examples: []
  entry_status: Standard
  date_accepted: '2016-07-01T00:00:00+00:00'
