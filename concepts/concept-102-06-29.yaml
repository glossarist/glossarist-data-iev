eng:
  id: 102-06-29
  terms:
  - type: expression
    normative_status: preferred
    designation: positive definite matrix
  definition: 'Hermitian matrix *stem:[A]* such that, for any non-zero column matrix
    *stem:[U]* with complex elements, the 1 × 1 matrix *stem:[U]*^H^*stem:[AU]* has
    a unique element which is real and positive: (*stem:[U]*^H^*stem:[AU]*)~11~ &gt;
    0'
  language_code: eng
  notes:
  - A symmetric matrix *stem:[A]* with real elements is a positive definite matrix
    if *stem:[U]*^T^*stem:[AU]* &gt; 0 for any non-zero column matrix *stem:[U]* with
    real elements.
  - All eigenvalues of a positive definite matrix are positive.
  examples: []
  entry_status: Standard
  date_accepted: '2008-08-01T00:00:00+00:00'
  date_amended: '2008-08-01T00:00:00+00:00'
  review_date: '2008-08-01T00:00:00+00:00'
