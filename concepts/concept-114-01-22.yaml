    CH~4~ + 2 O~2~ → CO~2~ + 2 H~2~O, les nombres stœchiométriques de CH~4~ et de O~2~ sont respectivement −1 et −2, ceux de CO~2~ et de H~2~O sont respectivement 1 et 2.
