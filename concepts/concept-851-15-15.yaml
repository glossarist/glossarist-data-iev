eng:
  id: 851-15-15
  terms:
  - type: expression
    normative_status: preferred
    designation: crushing zone
  definition: place or area in which the human body or parts of the human body are
    exposed to a crushing hazard
  language_code: eng
  notes:
  - A crushing hazard will be generated, if two movable parts are moving towards each
    other, or one movable part is moving towards a fixed part
