  definition: pour un quadripôle linéaire ou un réseau linéaire à stem:[n] paires
    de bornes, quotient du phaseur représentant la tension à un accès de sortie par
    le phaseur représentant le courant à un accès d'entrée, lorsque tous les autres
    accès sont reliés à des immittances de fermeture spécifiées
  language_code: fra
  notes:
