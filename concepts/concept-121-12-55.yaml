eng:
  id: 121-12-55
  terms:
  - type: expression
    normative_status: preferred
    designation: Bloch wall
  definition: domain wall in which the vector component of the magnetic area moment
    perpendicular to the plane of the wall is substantially constant, within and on
    either side of the wall
  language_code: eng
  notes:
  - Bloch walls are normally found only in bulk materials and thick films; in thinner
    films below a critical thickness, the formation of Néel walls is favourable from
    energy considerations.
  examples: []
  entry_status: Standard
