eng:
  id: 731-01-34
  terms:
  - type: expression
    normative_status: preferred
    designation: gaussian beam
  definition: beam of optical radiation whose electric field amplitude distribution
    is Gaussian when measured across a cross-section
  language_code: eng
  notes:
  - |-
    When such a beam is circular in cross-section, the amplitude is:

    stem:[Е(r)] = stem:[E] (0) exp [– (stem:[r] / stem:[w])^2^]

    where stem:[r] is the distance from beam centre and stem:[w] is the radius at which the amplitude is 1/e of its value on the axis.
  examples: []
  entry_status: Standard
  date_accepted: '1991-10-01T00:00:00+00:00'
  date_amended: '1991-10-01T00:00:00+00:00'
