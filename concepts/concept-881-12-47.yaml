    designation: linear collision stopping power
  - type: symbol
    designation: stem:[S]~col~
    international: true
  definition: |-
    the quotient of the energy dstem:[E]~col~ lost by a charged particle of specified energy, by collision in traversing a path length dstem:[l] in a material:

    stem:[S_((col)) = (( ((d E))/((d l)) ))_((col))]
  language_code: eng
  notes:
