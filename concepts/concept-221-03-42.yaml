eng:
  id: 221-03-42
  terms:
  - type: expression
    normative_status: preferred
    designation: "(magnetic) total harmonic distortion"
  - type: symbol
    designation: stem:[THD]
    international: true
  definition: |-
    distortion of voltage waveform caused by a non-linear relation between the magnetic flux density and the magnetic field strength in the magnetic core and expressed in decibels by:

    stem:[THD] &amp;equals; 20 lg(stem:[V]~m~/stem:[V]~f~) dB

    where

    stem:[V_m = sqrt(sum_((n = 1))^(oo) V_n^2)]

    stem:[V]~stem:[n]~ is the amplitude of the stem:[n]-th harmonic component of the waveform and stem:[V]~f~ is the amplitude of its fundamental component
  language_code: eng
  notes: []
  examples: []
  entry_status: Standard
  date_accepted: '2007-04-01T00:00:00+00:00'
  date_amended: '2007-04-01T00:00:00+00:00'
  review_date: '2007-04-01T00:00:00+00:00'
