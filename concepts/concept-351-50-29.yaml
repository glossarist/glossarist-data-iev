  terms:
  - type: expression
    normative_status: preferred
    designation: élément de maintien
    gender: m
    plurality: singular
  definition: |-
    élément de transfert pour lequel la variable de sortie est maintenue constante pendant les intervalles de temps séparant les prises d'échantillon de la variable d'entrée

    VOIR: Figure 8d).
  language_code: fra
  notes:
  - La réponse dans le temps d’un élément de maintien est une fonction en échelons.
  - |-
    Cet article était numéroté 351-28-40 dans la CEI 60050-351:2006.

