      :modification: L'exemple a été mis avant la Note 1 à l'article. La référence
        à <a href=IEV448-11-04>IEV 448-11-04</a> a été ajoutée pour "système de protection".
    original: IEC 60050-448:1995, 448-11-03, modifié – L'exemple a été mis avant la
      Note 1 à l'article. La référence à <a href=IEV448-11-04>IEV 448-11-04</a> a
      été ajoutée pour "système de protection".
