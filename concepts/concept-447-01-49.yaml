fra:
  id: 447-01-49
  terms:
  - type: expression
    normative_status: preferred
    designation: équipement de protection
    gender: m
    plurality: singular
  definition: |-
    équipement qui intègre un ou plusieurs {{relais de protection, IEV:447-01-14}} et, si nécessaire, des éléments logiques conçus pour assurer une ou plusieurs fonctions de protection spécifiées



    Note 1 à l'article: Un "équipement de protection" fait partie d'un {{"système de protection", IEV:448-11-04}}. Par exemple, un équipement de protection à comparaison de phase fait partie, à une extrémité, d'un système de protection à comparaison de phases.
  language_code: fra
  notes: []
  examples:
  - Dispositif de protection de distance, dispositif de protection à comparaison de
    phases.
  entry_status: Standard
  authoritative_source:
  - ref: IEC 60050-448:1995
    clause: 448-11-03
    link: https://webstore.iec.ch/publication/211
    relationship:
