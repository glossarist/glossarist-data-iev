eng:
  id: 845-24-067
  terms:
  - type: expression
    normative_status: preferred
    designation: regular transmittance
  - type: symbol
    designation: stem:[τ]~r~
    international: true
  definition: quotient of the regularly transmitted part of the (whole) transmitted
    flux and the incident flux
  language_code: eng
  notes:
  - 'Transmittance, stem:[τ], is the sum of regular transmittance, stem:[τ]~r~, and
    diffuse transmittance, stem:[τ]~d~: stem:[τ] = stem:[τ]~r~ + stem:[τ]~d~.'
  - The regular transmittance has unit one.
  - This entry was numbered 845-04-61 in IEC 60050-845:1987.
