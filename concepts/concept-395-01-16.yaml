eng:
  id: 395-01-16
  terms:
  - type: expression
    normative_status: preferred
    designation: particle flux
  - type: expression
    designation: fluence rate
  - type: symbol
    designation: stem:[N]^0^
    international: true
  definition: |-
    quotient of dstem:[N] by dstem:[a] and by dstem:[t], where dstem:[N] is the increment of the number of particles incident on a cross-sectional area dstem:[a] in the time interval dstem:[t]

    stem:[N]^0^ = d^2^stem:[N]/dstem:[a] dstem:[t]
  language_code: eng
  notes:
  - Generally the term neutron (or other particle) flux is used.
  - This quantity is expressed in reciprocal seconds per unit area (m^−2^ s^−1^ or
    cm^−2^ s^−1^).
  - This entry was numbered 393-14-27 in IEC 60050-393:2003.
  examples: []
  entry_status: Standard
