  terms:
  - type: expression
    normative_status: preferred
    designation: susceptibilité magnétique alternative
    gender: f
    plurality: singular
  definition: série de coefficients complexes obtenus par décomposition en série de
    Fourier de l'aimantation en alternatif stem:[M(t)]
  language_code: fra
  notes:
  - |-
    L'aimantation en alternatif, stem:[M(t),] en présence d'un champ magnétique stem:[h_0 cos omega t] se développe comme suit:

    stem:[M ( t ) = h_0 sum_((n = 0))^(oo) kappa_n^' cos ( n omega t ) + kappa_n^″ sin ( n omega t )]

    où stem:[kappa_n^'] et stem:[kappa_n^″] sont les parties réelle et imaginaire de la susceptibilité magnétique alternative pour le rang stem:[n].
  - Les composantes fondamentales stem:[kappa_1^'] et stem:[kappa_1^″] sont surtout
    utilisées pour les mesures de transition supraconductrice.
  - |-
    La densité de puissance des pertes en courant alternatif stem:[W] est donnée par:

    stem:[W = pi mu_0 h_0^2 kappa_1^″]
  examples: []
  entry_status: Standard
  review_decision_event: published
