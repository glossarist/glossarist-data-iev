---
data:
  definition:
  - content: courbe décrivant la répartition spectrale du stimulus de couleur
  examples: []
  id: 845-23-003
  notes:
  - content: La courbe spectrale d'un stimulus de couleur est générée par la {{répartition
      spectrale, urn:iec:std:iec:60050-845-21-029}} d'une grandeur radiométrique,
      telle que la radiance ou un flux énergétique.
  - content: Pour les couleurs-objet, la courbe spectrale d'un stimulus de couleur,
      stem:[φ~λ~](stem:[λ]), est égale au produit de la {{répartition spectrale relative,
      urn:iec:std:iec:60050-845-21-030}}, stem:[S](stem:[λ]), et soit le facteur de
      réflexion spectrale, stem:[ρ](stem:[λ]), soit le facteur de luminance énergétique
      spectrale, stem:[β](stem:[λ]), soit le facteur de transmission spectrale, stem:[τ](stem:[λ]),
      selon l'application.
  - content: Cet article était numéroté 845-03-03 dans l'IEC 60050-845:1987.
