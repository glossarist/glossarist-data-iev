  definition:
  - content: 'durée de l''intervalle de temps compris entre l''instant d''une variation
      en échelon d''une variable d''entrée et l''instant défini par le point d''intersection
      de la tangente de la réponse unitaire à un échelon au point d''inflexion, avec
      l''axe horizontal correspondant à la valeur initiale VOIR: Figure 6.Note 1 à
      l’article: Cette définition ne s''applique qu''aux systèmes ne présentant pas
      de dépassement dans la réponse unitaire à un échelon.'
