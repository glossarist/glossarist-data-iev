---
data:
  definition:
  - content: dispositif optique qui modifie un faisceau de {{rayonnement optique,
      urn:iec:std:iec:60050-845-21-002}} afin de produire un faisceau avec un état
      de polarisation unique indépendamment de l'état de polarisation du rayonnement
      incident
  examples: []
  id: 845-24-014
  notes:
  - content: Un polariseur est appelé polariseur linéaire, circulaire ou elliptique
      selon l'état de polarisation produit.
  - content: Le terme non qualifié "polariseur" est utilisé fréquemment pour définir
      un polariseur linéaire.
  - content: Une distinction est faite entre un polariseur parfait qui émet seulement
      un état de polarisation unique et un polariseur imparfait qui, outre l'émission
      d'un état de polarisation unique, n'exclut pas entièrement tous les autres états
      de polarisation.
