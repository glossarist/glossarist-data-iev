  definition:
  - content: a mass attached to a suspension clamp to provide an increase in the vertical
      load applied to the clamp
  examples: []
  id: 466-11-15
  notes:
  - content: The effect of the counterweight is to reduce the angle of swing of the
      suspension insulator set under the influence of wind or in the case of flying
      angle supports. It also prevents radio-interference caused by bad contacts between
      metallic parts.
