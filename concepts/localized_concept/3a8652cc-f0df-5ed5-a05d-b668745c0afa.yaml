---
data:
  definition:
  - content: "{{norme, urn:iec:std:iec:60050-901-02-02}}s portant sur le même {{sujet,
      urn:iec:std:iec:60050-901-01-02}}, approuvées par différents {{organismes à
      activités normatives, urn:iec:std:iec:60050-901-03-03}}, assurant l'{{interchangeabilité,
      urn:iec:std:iec:60050-901-01-14}} de produits, de processus et de services,
      ou la compréhension mutuelle des résultats d'essais ou des informations fournies
      selon ces normes"
  examples: []
  id: 901-06-01
  notes:
  - content: Les normes harmonisées peuvent toutefois comporter des différences de
      présentation et même de fond, par exemple dans les notes explicatives, des indications
      relatives aux moyens de satisfaire aux {{exigence, urn:iec:std:iec:60050-901-05-05}}s
      de la norme, des préférences en cas d'alternative ou de choix (variété).
  - content: Les {{règlements techniques, urn:iec:std:iec:60050-901-02-11}} peuvent
      être harmonisés comme des normes. Les termes et définitions correspondants sont
      obtenus en remplaçant «normes» par «règlements techniques» dans les définitions
      {{IEV 901-06-01, urn:iec:std:iec:60050-901-06-01}} à {{IEV 901-06-09, urn:iec:std:iec:60050-901-06-09}},
      et «organismes à activités normatives» par «autorités» dans la définition {{IEV
      901-06-01, urn:iec:std:iec:60050-901-06-01}}.
