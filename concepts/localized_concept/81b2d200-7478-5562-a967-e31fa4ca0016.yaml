  definition:
  - content: in the field of nuclear fusion, a method of containing the fusible material
      within a limited volume
  examples: []
  id: 395-07-147
  notes:
  - content: This is achieved by an implosion in which the kinetic energy communicated
      to the centripetal fusible material is transformed into internal energy to obtain
      the conditions for ignition.
  - content: A series of many converging laser beams can achieve this confinement.
