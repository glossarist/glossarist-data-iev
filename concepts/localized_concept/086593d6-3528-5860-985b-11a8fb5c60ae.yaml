  definition:
  - content: mean per {{character, urn:iec:std:iec:60050-702-05-10}} of the {{entropy,
      urn:iec:std:iec:60050-171-07-15}} for all possible messages from a {{stationary
      message source, urn:iec:std:iec:60050-171-07-09}} stem:[H^(prime) = underset(m
      vec oo)(lim) frac(H_(m))(m)] where stem:[H~m~] is the entropy of the set of
      all sequences of stem:[m] characters from the source
  examples: []
  id: 171-07-28
  notes:
  - content: The character mean entropy can be expressed in a unit such as the shannon
      per character.
  - content: The limit might not exist if the source were not stationary.
