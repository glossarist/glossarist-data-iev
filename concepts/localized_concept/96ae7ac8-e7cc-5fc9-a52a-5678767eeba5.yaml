  definition:
  - content: actinic dose, using the erythema spectral weighting function, that produces
      a just noticeable actinic erythema on a single individual's previously unexposed
      skin
  examples: []
  id: 845-26-068
  notes:
  - content: 'The minimal erythema dose is a subjective measure based on the reddening
      of the skin; it depends on many variables, e.g. individual sensitivity to {{ultraviolet
      radiation, urn:iec:std:iec:60050-845-21-008}}, radiometric characteristics of
      the source, skin pigmentation, anatomic site, elapsed time between irradiation
      and observation of the reddening (typical value: 24 h). Since the minimal erythema
      dose varies with each individual, the use of this quantity should be reserved
      solely for observational studies in humans and other animals.'
  - content: See also "{{standard erythema dose, urn:iec:std:iec:60050-845-26-069}}".
  - content: The minimal erythema dose is expressed in joule per square metre (J·m^−2^).
  - content: This entry was numbered 845-06-24 in IEC 60050-845:1987.
