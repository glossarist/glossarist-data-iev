  definition:
  - content: 'quotient représenté par la réponse à un échelon Δstem:[v]~ε~(stem:[t])
      divisé par la hauteur de l’échelon stem:[K]*~ε~* de la fonction échelon, le
      quotient étant décrit parstem:[h (t) = frac(1)(K_("epsilon")) . Delta v_("epsilon")
      (t)]Note 1 à l’article: La réponse unitaire à un échelon peut être calculée
      à partir de la réponse impulsionnelle unité avec l’équation suivantestem:[h
      (t) = int_(- oo)^(t) g (tau) "d" tau].Note 2 à l’article: La réponse unitaire
      à un échelon d’un système peut mathématiquement être considérée comme le résultat
      de l’application d’un échelon unité à une variable d’entrée.'
