  notes:
  - content: Une molécule constitue la plus petite partie d’une substance pure qui
      peut exister à l’état libre tout en conservant les propriétés chimiques caractéristiques
      de la substance. Certaines molécules sont constituées d’un seul atome, par exemple
      l’argon.
