  definition:
  - content: "quotient de dstem:[E]~tr~/stem:[E]~stem:[N]~ par le produit de stem:[ρ] dstem:[l]
      où dstem:[E]~tr~/stem:[E]~stem:[N]~ est la fraction des énergies des particules
      incidentes, à l'exclusion des énergies au repos, des particules indirectement
      ionisantes qui traversent sous une incidence normale une couche d'épaisseur
      dstem:[l] d'une substance de masse spécifique stem:[ρ] et dstem:[E]~tr~ la somme
      des énergies cinétiques de toutes les particules chargées libérées de cette
      couche\r\nstem:[frac(mu_(\"tr\"))(rho) = frac(1)(E_(N) rho) * frac(\"d\" E_(\"tr\"))(\"d\"
      l)]"
