  notes:
  - content: "Pour un rayonnement monoénergétique, la relation entre le kerma (stem:[K])
      et la fluence énergétique (stem:[Ψ]) peut s'exprimer comme suit:\r\nstem:[K
      = Psi frac(mu_(tr))(rho)]"
