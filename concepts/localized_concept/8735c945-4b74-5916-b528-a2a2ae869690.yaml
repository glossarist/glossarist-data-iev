  definition:
  - content: quotient of that part of the illuminance at a point on a given plane
      in an interior, which is received directly from external reflecting surfaces
      illuminated directly or indirectly by a sky of assumed or known luminance distribution
      and the illuminance on a horizontal plane due to an unobstructed hemisphere
      of this sky, where the contribution of direct sunlight to both illuminances
      is excluded
  examples: []
  id: 845-29-123
  notes:
  - content: When calculating the lighting of interiors, the contribution of direct
      sunlight has to be considered separately.
  - content: The externally reflected component of daylight factor has unit one.
  - content: This entry was numbered 845-09-99 in IEC 60050-845:1987.
  terms:
  - type: expression
    normative_status: preferred
    designation: externally reflected component of daylight factor
