  definition:
  - content: area associated with a terrestrial transmitting station for a given radiocommunication
      service, within which a receiving station must be located for radiocommunication
      of a specified nature to be established under specified technical conditions
  examples: []
  id: 713-02-17
  notes:
  - content: Several coverage areas may be associated with the same station.
  - content: 'The technical conditions include, inter alia, the following: frequency,
      characteristics of the equipment used both at the transmitting and receiving
      stations, how it is installed, quality of transmission desired, e.g. protection
      ratios, and operating conditions.'
  - content: "The following may be distinguishable: \r\n– the coverage area in the
      absence of RF interference, i.e. that limited solely by natural or artificial
      noise; \r\n– the nominal coverage area which is defined, when establishing a
      frequency plan by taking into account the foreseen transmitters; \r\n– the actual
      coverage area, i.e., with allowance made for the noise and interference which
      exist in practice."
