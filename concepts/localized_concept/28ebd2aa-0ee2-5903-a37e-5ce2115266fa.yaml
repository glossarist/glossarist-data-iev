  definition:
  - content: density of exiting luminous flux with respect to area at a point on a
      real or imaginary surfacestem:[M_("v") = frac("d" Phi_("v"))("d" A)]where stem:[Φ]~v~
      is luminous flux and stem:[A] is the area from which the luminous flux leaves
  examples: []
  id: 845-21-081
  notes:
  - content: Luminous exitance can be derived from the spectral radiant exitance distribution
      bystem:[M_("v") = K_("m") int_(0)^(oo) M_("e" "," lambda) ( lambda ) " " V (
      lambda ) " " "d" lambda]where stem:[K]~m~ is maximum luminous efficacy, stem:[M]~e,~stem:[~λ~](stem:[λ])
      is the spectral radiant exitance at wavelength stem:[λ] and stem:[V](stem:[λ])
      is {{spectral luminous efficiency, urn:iec:std:iec:60050-845-21-035}}.Integral
      limits can be confined depending on the spectral {{responsivity, urn:iec:std:iec:60050-845-25-061}}
      of the detectors used as a sensor.
  - content: The corresponding radiometric quantity is "radiant exitance". The corresponding
      quantity for photons is "photon exitance".
  - content: The luminous exitance is expressed in lumen per square metre (lm·m^−2^).
  - content: This entry was numbered 845-01-48 in IEC 60050-845:1987.
  terms:
