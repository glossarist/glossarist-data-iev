---
data:
  definition:
  - content: "{{système, urn:iec:std:iec:60050-151-11-27}} constitué d’un ou plusieurs
      {{composants, urn:iec:std:iec:60050-151-11-21}} microminiaturisés intégrés,
      tels que des {{capteurs, urn:iec:std:iec:60050-151-13-48}}, des {{actionneurs,
      urn:iec:std:iec:60050-151-13-49}}, des {{transducteurs, urn:iec:std:iec:60050-151-13-34}},
      des résonateurs, des {{oscillateurs, urn:iec:std:iec:60050-151-13-51}}, des
      composants mécaniques, ou des {{circuits électriques, urn:iec:std:iec:60050-131-11-07}}\r\nNote
      1 à l’article: Dans la définition, “microminiaturisé” est employé pour désigner
      une dimension inférieure à quelques millimètres.\r\nNote 2 à l’article: L'étendue
      des technologies associées aux MEMS est extrêmement vaste et inclut des technologies
      fondamentales (telles que la conception, les matériaux, le traitement, les éléments
      fonctionnels, les commandes systèmes, l'alimentation énergétique, les {{collages,
      urn:iec:std:iec:60050-523-06-01}} et les assemblages, les circuits électriques
      et l'appréciation), des sciences fondamentales (telles que les microsciences
      et microtechniques) ainsi que la thermodynamique à l'échelle microscopique et
      la {{microtribologie, urn:iec:std:iec:60050-523-02-02}}.\r\nNote 3 à l’article:
      \"MEMS\" est l’acronyme de l’anglais   \"micro-electromechanical systems\",
      qui était utilisé pour un dispositif microélectromécanique. Les formes singulier
      et pluriel du terme \"MEMS\" sont identiques."
