  definition:
  - content: opération par laquelle on réduit les valeurs instantanées d'un signal
      qui sont au-delà d'un seuil fixé, ou en dehors de l'intervalle compris entre
      deux seuils fixés, les autres valeurs instantanées du signal étant conservées
  examples: []
  id: 702-04-32
  notes:
  - content: "La réduction des valeurs instantanées peut être brusque ou progressive.\r\nExemples
      de limitation: écrêtage; éminçage; épiétage."
