  definition:
  - content: equipment incorporating one or more {{protection relays, urn:iec:std:iec:60050-447-01-14}}
      and, if necessary, logic elements intended to perform one or more specified
      protection functions
  examples:
  - content: Distance protection equipment, phase comparison protection equipment.
  id: 447-01-49
  notes:
  - content: '"Protection equipment" is part of a {{"protection system", urn:iec:std:iec:60050-448-11-04}}.
      For example, phase comparison equipment is part of one line-end of a phase comparison
      protection system.'
