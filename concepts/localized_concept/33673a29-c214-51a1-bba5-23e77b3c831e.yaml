---
data:
  definition:
  - content: "quotient du nombre d'{{interruptions de fourniture, urn:iec:std:iec:60050-692-07-01}}
      à des clients individuels affectés au moins une fois pendant un intervalle de
      temps, par le produit de la durée de cet intervalle de temps et du nombre de
      clients affectésNote 1 à l’article: Si sur un intervalle de temps de durée stem:[T],
      stem:[N]~NS~ est le nombre de clients ayant été affectés et si la fourniture
      d’énergie électrique au client stem:[j] a été interrompue stem:[n]~stem:[j]~
      fois, alors la fréquence d’interruption par client coupé est donnée par stem:[f_(\"CI\")
      = frac(sum_(j) n_(j))(N_(\"NS\") T)]\r\nDans la détermination de stem:[N]~NS~,
      tout client affecté ne doit être compté qu'une fois, quel que soit le nombre
      d'interruptions de service qu'il a subies pendant l’intervalle de temps. Note
      2 à l’article: En général, seules les {{interruptions longues, urn:iec:std:iec:60050-692-07-02}}
      sont prises en compte. Note 3 à l’article: Le terme \"client\" désigne l’utilisateur
      final et non un réseau ou une compagnie de distribution intermédiaire. Note
      4 à l’article: La fréquence d’interruption par client coupé peut être utilisée
      pour décrire des performances réalisées ou pour estimer les performances futures
      attendues. Note 5 à l’article: Cet article portait le numéro 191-27-02 dans
      l’IEC 60050-191:1990."
