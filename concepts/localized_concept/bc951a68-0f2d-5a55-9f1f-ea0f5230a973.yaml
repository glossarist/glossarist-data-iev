  id: 845-22-061
  notes:
  - content: 'Les adjectifs "{{lumineux, urn:iec:std:iec:60050-845-22-061}}" et "{{clair,
      urn:iec:std:iec:60050-845-22-064}}" ont principalement la même signification,
      mais ont généralement des applications différentes: les lumières sont décrites
      comme "lumineuses" ou "obscures", tandis que les couleurs de surface sont décrites
      comme "claires" ou "sombres". Cette distinction n''est toutefois pas universelle.'
