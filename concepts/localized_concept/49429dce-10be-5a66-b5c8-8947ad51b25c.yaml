  definition:
  - content: the acoustical speech power which causes the ARAEN speech voltmeter connected
      at the output of the sending system to the new fundamental system for the determination
      of reference equivalent or NOSFER to indicate —10 under specified conditions
  examples: []
  id: 722-16-27
  notes:
  - content: The specified conditions are defined in the CCITT Recommendations P42
      and P72 from the volume V of the Red Book, 1985.
  terms:
  - type: expression
    normative_status: preferred
    designation: normal speech power for voice-ear measurements
  - type: expression
    designation: reference speech power for the NOSFER
