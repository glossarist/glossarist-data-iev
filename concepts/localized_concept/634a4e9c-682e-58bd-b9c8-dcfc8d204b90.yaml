  definition:
  - content: quotient of the spectral radiant flux reaching the exit internal surface
      of the layer and the spectral flux that enters into the layer after crossing
      the entry surface
  examples: []
  id: 845-24-088
  notes:
  - content: For a given layer, the spectral internal transmittance depends on the
      path length of the radiation in the layer, and hence, in particular, on the
      angle of incidence.
  - content: The spectral internal transmittance has unit one.
  - content: This entry was numbered 845-04-81 in IEC 60050-845:1987.
