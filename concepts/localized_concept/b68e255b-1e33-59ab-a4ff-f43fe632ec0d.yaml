  definition:
  - content: "for a set of stem:[n] magnetic circuit elements forming a magnetic circuit,
      matrix expressing the magnetic fluxes stem:[Φ]~stem:[i]~ in the elements in
      terms of the current linkages stem:[Ө]~stem:[j]~ of the elements:\r\nstem:[([Phi_(1)],
      [Phi_(2)], [vdots], [Phi_(n)]) = ([Lambda_(11), Lambda_(12), ..., Lambda_(1
      n)], [Lambda_(21), , , vdots], [vdots, , , vdots], [Lambda_(n 1), ..., ...,
      Lambda_(n n)]) * ([Theta_(1)], [Theta_(2)], [vdots], [Theta_(n)])]"
  examples: []
  id: 131-12-37
  notes:
  - content: A permeance matrix is always symmetric and positive definite.
  - content: In electromagnetism, the permeance matrix can be defined, for a set of
      closed paths, as the matrix expressing linear relations between the magnetic
      fluxes through the surfaces bounded by the paths and the current linkages in
      the paths.
