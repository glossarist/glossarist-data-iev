  definition:
  - content: quantity stem:[Q] which can be represented by a tensor of the second
      order stem:[T] multiplied by a scalar quantity stem:[q] stem:[Q = q T]
  examples: []
  id: 102-03-40
  notes:
  - content: 'A tensor quantity often describes a linear transformation of a vector
      quantity *stem:[U]* into a vector quantity *stem:[V]*:  stem:[V_(i) = sum_(j)
      Q_(i j) U_(j)]'
  - content: The expression of a tensor quantity in terms of its components is similar
      to the expression of vector quantities (see Note 1 to entry in {{IEV 102-03-22,
      urn:iec:std:iec:60050-102-03-22}}). Examples of tensor quantities are the permittivity
      and the permeability in anisotropic media, see IEC 60050-121.
  - content: Operations defined for tensors apply to tensor quantities.
