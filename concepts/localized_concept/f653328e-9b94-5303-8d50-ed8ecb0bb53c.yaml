data:
  definition:
  - content: densité d'énergie rayonnante incidente par rapport à l'aire en un point
      d'une surface réelle ou fictivestem:[H_("e") = frac("d" Q_("e"))("d" A)]où stem:[Q]~e~
      est l'énergie rayonnante et stem:[A] est l'aire qui reçoit cette énergie
  examples: []
  id: 845-21-071
  notes:
  - content: La grandeur "exposition énergétique" définie ici ne doit pas être confondue
      avec la grandeur appelée "exposition" utilisée dans le champ des rayons X et
      γ, dont l'unité est le coulomb par kilogramme (C·kg^−1^).
  - content: La grandeur photométrique correspondante est l'"exposition lumineuse".
      La grandeur correspondante pour les photons est l'"exposition photonique".
  - content: L'exposition énergétique est exprimée en joule par mètre carré (J·m^−2^ =
      W·s·m^−2^).
  - content: Cet article était numéroté 845-01-42 dans l'IEC 60050-845:1987.
