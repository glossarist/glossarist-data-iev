  definition:
  - content: an exchange which is necessarily working whenever any terminal of a given
      set, said to be connected to this exchange, is involved in a communication;
      this exchange usually provides an interface between the signalling particular
      to the terminals and other types of signalling
  examples: []
  id: 715-08-11
  notes:
  - content: There is at least one, and generally only one, serving connection exchange
      to which a given terminal is interconnected by a set of lines in parallel.
  terms:
  - type: expression
    normative_status: preferred
    designation: serving connection exchange
  - type: expression
    designation: local switching exchange
