  definition:
  - content: "distribution, définie comme la limite d'une fonction positive, égale
      à zéro en dehors d’un petit intervalle contenant l’origine, dont l’intégrale
      reste égale à un lorsque cet intervalle tend vers zéro\r\nstem:[delta ( t )
      = { [[0], [oo], [0]] [[\" \" \"pour\" \" \" t lt 0], [\" \" \"pour\" \" \" t
      = 0], [\" \" \"pour\" \" \" t gt 0]] \" \" \"avec\" int_(- oo)^(+ oo) delta
      ( t ) \" \" rm(d) t = 1]\r\nVOIR: Figure 4a) et CEI 60027-6.Note 1 à l’article:
      Une distribution assigne un nombre à une fonction stem:[f](stem:[t]), suffisamment
      lisse pour stem:[t] = stem:[t]~0~ [voir CEI 60050-103:2009, 103-03-05].L’impulsion
      de Dirac effectue ceci conformément à l’équation suivantestem:[f (t_(0)) = int_(-
      oo)^(oo) delta (t - t_(0)) f (t) \"d\" t].Note 2 à l’article: Une forme quelconque
      avec la zone 1 peut être utilisée pour la définition de δ(t), ex.: une impulsion
      rectangulaire avec largeur stem:[τ] et hauteur stem:[τ]^–1^, ou une impulsion
      triangulaire, comme indiqué dans la Figure 4a), ainsi qu’une fonction gaussienne.stem:[frac(1)(tau
      * sqrt(pi)) * e^(- \" \" frac(t^(2))(tau^(2)))].Note 3 à l’article: Les formes
      mentionnées dans la Note 2 à l’article avec stem:[τ] plus petit que la constante
      de temps la plus petite en fonctionnement dans le système étudié peuvent être
      utilisées pour une approximation technique de l’impulsion de Dirac."
