  notes:
  - content: Dans la technologie de commande, la fonction de Dirac est principalement
      importante pour la définition des impulsions et est exclusivement utilisée comme
      fonction de temps. Par conséquent, le terme d’impulsion de Dirac est utilisé
      et la définition est adaptée en conséquence.image::/assets/images/parts/351/351-fig4.png[Figure
