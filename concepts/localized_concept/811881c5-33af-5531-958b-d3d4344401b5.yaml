  definition:
  - content: the surface described by the extremity of a radius vector whose magnitude
      is a specified function of the magnitude of a component of the field produced
      by an antenna at a constant distance in the direction of the vector
  examples: []
  id: 712-02-14
  notes:
  - content: The radiation pattern surface in the far-field region is most frequently
      considered.
  - content: In French, the term "surface de directivité" is the preferred term when
      the surface does not depend upon the power fed to the antenna.
