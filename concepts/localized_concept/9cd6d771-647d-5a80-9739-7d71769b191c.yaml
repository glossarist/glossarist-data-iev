  definition:
  - content: form of {{transmission, urn:iec:std:iec:60050-701-01-03}} in which the
      transmitted {{signal, urn:iec:std:iec:60050-101-12-02}} is the result of the
      {{modulation, urn:iec:std:iec:60050-701-03-08}} of one or more {{carriers, urn:iec:std:iec:60050-702-06-03}}
      by one or more signals
  examples: []
  id: 704-08-10
  notes:
  - content: The term "carrier transmission" is usually qualified by the method of
      modulation, e.g. “{{single sideband, urn:iec:std:iec:60050-702-06-26}} carrier
      transmission”.
  - content: A transmission system using carrier transmission is known as a “carrier
      system”.
