---
data:
  definition:
  - content: phénomène de renvoi d'un rayonnement par une surface ou un milieu, sans
      changement de {{fréquence, urn:iec:std:iec:60050-103-06-02}} de ses composantes
      monochromatiques
  examples: []
  id: 845-24-047
  notes:
  - content: Une partie du rayonnement tombant sur un milieu est réfléchie à la surface
      du milieu ("réflexion en surface"); une autre partie peut être rétrodiffusée
      de l'intérieur du milieu ("réflexion en volume").
  - content: La fréquence ne varie pas uniquement s'il ne se produit pas d'effet Doppler
      provenant du mouvement des matériaux qui renvoient le rayonnement.
  - content: Cet article était numéroté 845-04-42 dans l'IEC 60050-845:1987.
