data:
  definition:
  - content: 'variation de la valeur efficace ou de la valeur de crête d''une tension
      en un point du système électrique entre deux niveaux consécutifs qui se maintiennent
      d''une façon assez stable pendant des durées déterminées mais non spécifiéesNote
      1 à l’article: Le choix entre la valeur efficace et la valeur de crête dépend
      de l’application et il convient de la spécifier.'
