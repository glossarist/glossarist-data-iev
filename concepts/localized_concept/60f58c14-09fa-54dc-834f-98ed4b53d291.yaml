  definition:
  - content: "a unidirectional pulse defined as a function of time stem:[t] by the
      expressions:\r\nstem:[y] = k sin^2^ (stem:[π t]/2stem:[T]) for 0 ≤ stem:[t]
      ≤ 2stem:[T]\n\nstem:[y] = 0 for stem:[t] <0 and stem:[t] > 2stem:[T]\r\nwhere:\n\nstem:[y]
      is the instantaneous value of the characteristic quantity,\n\nk is the peak
      value of the pulse,\n\n2stem:[T] is the duration of the pulse, stem:[T] being
      the length of time during which the characteristic quantity is greater than
      k/2"
