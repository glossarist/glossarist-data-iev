  definition:
  - content: radio-frequency channel or radio-frequency band within which the emission
      of a given station is authorized
  examples: []
  id: 713-06-09
  notes:
  - content: The width of the assigned channel equals the necessary bandwidth plus
      twice the absolute value of the frequency tolerance.
  - content: Where space stations are concerned, the assigned frequency band includes
      twice the maximum Doppler shift that may occur in relation to any point of the
      Earth's surface.
