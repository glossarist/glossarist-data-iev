  definition:
  - content: identity resulting from the divergence theorem applied to the vector
      field stem:[f_(1) " " mathbf(grad) " " f_(2) - f_(2) " " mathbf(grad) " " f_(1)],
      where stem:[f]~1~ and stem:[f]~2~ are two scalar fields given at each point
      of a three-dimensional domain V limited by a closed surface S* *stem:["P{iiint}"_("V")
      (f_(1) " " rm(Delta) " " f_(2) - f_(2) " " rm(Delta) " " f_(1)) d V = "P{oiint}"_("S")
      (f_(1) " " mathbf(grad) " " f_(2) - f_(2) " " mathbf(grad) " " f_(1)) * e_("n")
      d A] where dstem:[V] is the volume element, *stem:[e]*~n~dstem:[A] is the vector
      surface element and Δ is the Laplacian operator
  examples: []
  id: 102-05-33
  notes:
  - content: The second Green formula is symmetric with respect to stem:[f]~1~ and
      stem:[f]~2~.
