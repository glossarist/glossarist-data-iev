  definition:
  - content: occurrence d'un chemin conducteur accidentel entre un conducteur sous
      tension et la terre
  examples: []
  id: 826-14-13
  notes:
  - content: Le chemin conducteur peut passer par une isolation défectueuse, par des
      structures (par exemple supports de ligne, échafaudages, grues, échelles) ou
      encore par la végétation (par exemple arbres, buissons) et peut présenter une
      impédance non négligeable.
  - content: Un chemin conducteur entre un conducteur qui n’est pas mis à la terre,
      pour des raisons fonctionnelles, et la Terre est aussi considérée comme un défaut
      à la terre.
