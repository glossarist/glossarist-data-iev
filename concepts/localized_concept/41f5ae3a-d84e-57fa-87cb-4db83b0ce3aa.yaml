  definition:
  - content: surface engendrée par l'extrémité d'un rayon vecteur dont la norme est
      proportionnelle à une fonction spécifiée de l'amplitude d'une composante spécifiée
      du champ électromagnétique produit par une antenne à distance constante dans
      la direction du rayon vecteur
  examples: []
  id: 712-02-14
  notes:
  - content: On considère le plus souvent la surface de rayonnement dans la région
      de champ lointain.
  - content: En français, le terme "surface de directivité" est le terme préféré lorsque
      la surface est indépendante de la puissance d'alimentation.
