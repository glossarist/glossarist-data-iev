  definition:
  - content: irradiance produced by direct sunlight on a surface on the Earth that
      is perpendicular to the direction of irradiation by the Sun
  examples: []
  id: 845-29-134
  notes:
  - content: Normal solar irradiance is not the same as {{direct solar irradiance,
      urn:iec:std:iec:60050-845-29-133}}, which is measured on a horizontal surface
      on the Earth, not necessarily perpendicular to the direction of irradiation
      by the Sun.
  - content: The normal solar irradiance is expressed in watt per square metre (W·m^−2^).
