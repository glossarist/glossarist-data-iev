  definition:
  - content: expression in the content of a {{normative document, urn:iec:std:iec:60050-901-02-01}},
      that takes the form of a {{statement, urn:iec:std:iec:60050-901-05-02}}, an
      {{instruction, urn:iec:std:iec:60050-901-05-03}}, a {{recommendation, urn:iec:std:iec:60050-901-05-04}}
      or a {{requirement, urn:iec:std:iec:60050-901-05-05}}
  examples: []
  id: 901-05-01
  notes:
  - content: These types of provision are distinguished by the form of wording they
      employ; e.g. instructions are expressed in the imperative mood, recommendations
      by the use of the auxiliary “should” and requirements by the use of the auxiliary
      “shall”.
