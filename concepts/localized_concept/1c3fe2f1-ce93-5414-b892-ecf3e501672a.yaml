  - content: thin film deposition technique at atomic-level resolution thickness
  examples: []
  id: 523-05-15
  notes:
  - content: By changing the precursor gases sequentially, a chemical deposition process
      can be controlled down to the atomic or molecular scale. In the molecular beam
      {{epitaxy, urn:iec:std:iec:60050-521-03-12}} process, one of the related techniques,
      the deposited layer has the same crystal structure as that of the mono-crystalline
      {{substrate, urn:iec:std:iec:60050-521-05-28}}.
  - content: This note applies to the French language only.
