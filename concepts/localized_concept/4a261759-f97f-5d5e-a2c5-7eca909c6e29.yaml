  id: 102-03-17
  notes:
  - content: 'In an stem:[n]-dimensional space with orthonormal base vectors the scalar
      product of two vectors *stem:[U]* and *stem:[V]* is the sum of the products
      of each coordinate stem:[U_(i)] of the vector *stem:[U]* and the corresponding
      coordinate stem:[V_(i)] of the vector *stem:[V]*: stem:[U * V = sum_(i) U_(i)
      V_(i)]'
  - content: For two complex vectors *stem:[U]* and *stem:[V]* either the scalar product
      stem:[U * V] or a Hermitian product stem:[U * V *] may be used depending on
      the application.
  - content: A scalar product can be similarly defined for a pair consisting of a
      polar vector and an axial vector and is then a pseudo-scalar, or for a pair
      of two axial vectors and is then a scalar.
  - content: The scalar product of two vector quantities is the scalar product of
      the associated unit vectors multiplied by the product of the scalar quantities.
  - content: The scalar product is denoted by a half-high dot (·) between the two
      symbols representing the vectors.
