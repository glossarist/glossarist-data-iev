  - content: thin layer of superconductor
  examples: []
  id: 815-13-27
  notes:
  - content: 'Superconducting thin film: superconductor film of average thickness
      less than some typical value, assumed conventionally 1 stem:[mu]m, that is typically
      obtained by PVD (Physical Vapour Deposition), CVD (Chemical Vapour Deposition)
      or other techniques.'
  - content: 'Superconducting thick film: superconductor film of average thickness
      of more than some typical value, assumed conventionally between 1 stem:[mu]m
      to 10 stem:[mu]m, that is typically obtained by screen printing, or doctor-blade
      or dip coating methods.'
