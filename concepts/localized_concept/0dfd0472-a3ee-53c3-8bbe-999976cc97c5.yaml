  definition:
  - content: "{{quantity, urn:iec:std:iec:60050-112-01-01}} represented by a single
      {{scalar, urn:iec:std:iec:60050-102-02-18}} which depends on the choice of a
      unit of measurement or on a reference to a measurement procedure"
  examples: []
  id: 102-02-19
  notes:
  - content: 'In the usual three-dimensional space, a scalar quantity is independent
      of {{direction, urn:iec:std:iec:60050-102-03-12}} and of the choice of the coordinate
      frame. Examples are: mass, electric charge, thermodynamic temperature, Rockwell
      C hardness, Engler viscosity for transformer oil.'
  - content: The concept of absolute value applies to real scalar quantities, the
      concepts of real part, imaginary part, modulus and argument apply to complex
      scalar quantities, and the concept of square root applies to both.
