  definition:
  - content: amplitude relative de la fluctuation périodique du flux lumineux calculée
      par le rapport de la différence entre le flux lumineux instantané maximal et
      minimal, stem:[Φ]~max~ et stem:[Φ]~min~ respectivement, à la somme de ces deux
      valeursstem:[frac(Phi_(max) - Phi_(min))(Phi_(max) + Phi_(min))]
