  definition:
  - content: 'for a three-position element without differential gap the range between
      the two switching values and for a three-position element with differential
      gaps the range between the two pairs of switching values according to special
      agreement SEE: Figure 20.'
  examples: []
  id: 351-50-26
  notes:
  - content: For a three-position element with differential gaps the neutral zone
      is normally defined as the difference between the mean values of the two pairs
      of switching values.
  - content: This entry was numbered 351-28-37 in IEC 60050-351:2006.
