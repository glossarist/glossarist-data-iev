  definition:
  - content: 'type de régulation pour laquelle l''indice de performance atteint une
      plus grande valeur ou une plus petite valeur, sous certaines conditions spécifiéesNote
      1 à l’article: L''indice de performance est une expression mathématique qui
      caractérise la qualité de la commande dans des conditions données.Note 2 à l’article:
      La détermination des paramètres de commande optimaux est fréquemment le résultat
      de la minimisation des critères intégraux qui sont souvent appelés "zones de
      commande" à partir de l''interprétation géométrique de l''intégrale. Les plus
      importantes sont:stem:[I_("IAE") = int_(0)^(oo) |e (t)| * "d" t] Critère pour
      l''intégrale de l''erreur absolue (Integral Absolute Error)stem:[I_("ISE") =
      int_(0)^(oo) e^(2) (t) * "d" t] Critère pour l''intégrale de l''erreur quadratique
      (Integral Squared Error)stem:[I_("ITAE") = int_(0)^(oo) t * |e (t)| * "d" t]
      Critère pour l''intégrale du temps multiplié par la valeur absolue de l''erreur
      (Integral of Time multiplied Absolute value of Error)Ci-dessus, stem:[e](stem:[t])
      est la variable de différence de régulation en fonction du temps et répond à
      une entrée appropriée à la tâche technique, par exemple une réponse à une variation
      en échelon de la variable de référence.'
