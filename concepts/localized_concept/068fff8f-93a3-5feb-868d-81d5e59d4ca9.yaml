  definition:
  - content: voie de transmission dont la bande de fréquences permet la transmission
      d'un signal téléphonique de qualité courante dans sa bande d'audiofréquences
      originale
  examples: []
  id: 704-09-05
  notes:
  - content: Une voie téléphonique audiofréquence occupe normalement la bande de fréquences
      normalisées 300-3 400 Hz.
  - content: Un signal autre qu'un signal vocal audiofréquence, mais ayant des caractéristiques
      spécifiées, peut occuper tout ou partie d'une voie téléphonique audio-fréquence.
  - content: Le terme "voie téléphonique audiofréquence" ne doit pas être employé
      pour désigner une voie de transmission à plus large bande, telle que celle qui
      permet une transmission sonore de haute qualité.
