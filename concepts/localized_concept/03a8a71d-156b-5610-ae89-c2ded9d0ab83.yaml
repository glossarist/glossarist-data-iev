  definition:
  - content: action d’arrêter le réacteur nucléaire le plus rapidement possible pour
      empêcher ou minimiser une situation dangereuse
  examples: []
  id: 395-07-19
  notes:
  - content: L’arrêt d’urgence est réalisé par un circuit dédié, souvent automatiquement
      ou parfois manuellement par action sur un bouton spécial.
  - content: SCRAM est un acronyme de "safety control rod axe man" utilisé pour le
      premier réacteur CP-1 à Chicago en 1942.
