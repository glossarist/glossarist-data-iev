  definition:
  - content: signal dont chaque paramètre informationnel représente directement la
      grandeur variable respective
  examples: []
  id: 351-41-24
  notes:
  - content: 'Un signal analogique peut être un signal continu ou discret ainsi qu’un
      signal à temps continu ou à temps discret. Exemples: la pression dans un élément
      de commande final pneumatique avec paramètre informationnel continu et à temps
      continu (valeur de la pression) ainsi qu’un signal impulsionnel modulé en position
      comme signal de sortie d’un régulateur informatisé.'
