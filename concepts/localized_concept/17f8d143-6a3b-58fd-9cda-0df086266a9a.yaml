  definition:
  - content: pertaining to a device that has at least one electrical port essential
      for its operation and that responds to optical power, emits or modifies optical
      radiation, or utilises optical radiation for its internal operation ; also used
      to denote the corresponding technique
  examples: []
  id: 731-01-59
  notes:
  - content: An opto-electronic device is any device that functions as an electrical-to-optical
      or optical-to-electrical transducer. Examples are photodiodes, LEDs and injection
      lasers.
  - content: '"Electro-optic" is often erroneously used as a synonym.'
