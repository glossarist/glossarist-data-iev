  definition:
  - content: évaluation pour un ensemble déterminé de conditions, des risques d'irradiation
      liés à l'existence, à la production, à l'emploi, à la libération et à l'élimination
      de matières radioactives ou d'autres sources de rayonnements pour un ensemble
      de conditions spécifiques
  examples: []
  id: 881-16-01
  notes:
  - content: "Cette évaluation comprend habituellement: \r\n— le contrôle matériel
      de la disposition des substances, du matériel et des parois de protection,\n\n—
      la mesure ou l'estimation des niveaux de rayonnement qui peuvent être mis en
      jeu,\n\n— une connaissance suffisante des opérations utilisant ou affectant
      ces substances pour estimer les risques présumés résultant de modifications
      probables ou possibles des substances, du matériel, des procédés de fabrication
      et des modes de fonctionnement."
