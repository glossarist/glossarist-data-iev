  id: 102-03-16
  notes:
  - content: Une forme bilinéaire sur un espace vectoriel à stem:[n] dimensions peut
      être représentée par une matrice carrée stem:[(k_(i j))] et le scalaire est
      stem:[f ( U "," " " V ) = sum_(i j) k_(i j) U_(i) V_(j)].
  - content: Les formes bilinéaires sur un espace vectoriel à stem:[n] dimensions
      constituent un espace vectoriel à stem:[n^(2)] dimensions.
  - content: Le concept de forme bilinéaire se généralise à celui de «forme linéaire»
      dans le cas d'un seul vecteur et de «forme multilinéaire» (ou stem:[m]-linéaire)
      dans le cas d'un ensemble ordonné de stem:[m] vecteurs.
