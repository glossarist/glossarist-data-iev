  definition:
  - content: the distribution in space of a quantity which characterizes the electromagnetic
      field produced by an antenna
  examples: []
  id: 712-02-12
  notes:
  - content: The distribution in the far-field region is most frequently considered.
  - content: The quantity which characterizes the field, may be for instance the magnitude
      of a specified component of the electromagnetic field or of the field strength-distance
      product, the radiation intensity, the directivity, the absolute gain or a relative
      gain.
  - content: In French, the term "caractéristique de directivité" is the preferred
      term when the quantity used to characterize the field does not depend upon the
      power fed to the antenna.
  terms:
  - type: expression
    normative_status: preferred
    designation: radiation pattern
