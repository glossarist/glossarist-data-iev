data:
  definition:
  - content: qualifie un phénomène variable dans le temps, une {{trame temporelle,
      urn:iec:std:iec:60050-702-04-11}} ou un {{signal, urn:iec:std:iec:60050-701-01-02}}
      dont les {{instants significatifs, urn:iec:std:iec:60050-704-13-03}} consécutifs
      sont séparés par des {{intervalles de temps, urn:iec:std:iec:60050-113-01-10}}
      qui ne sont pas tous astreints à avoir la même {{durée, urn:iec:std:iec:60050-113-01-13}}
      assignée ou des durées assignées égales à l'un des multiples d'une durée unitaire
