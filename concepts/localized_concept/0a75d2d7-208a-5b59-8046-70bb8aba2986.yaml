  definition:
  - content: "function describing the change with direction of irradiation (stem:[θ]~i~,stem:[&amp;phiv;]~i~)
      and direction of view (stem:[θ]~r~,stem:[&amp;phiv;]~r~) of the radiance of
      a surface element (stem:[x]~r~,stem:[y]~r~) in a given direction of view at
      a given wavelength stem:[λ], stem:[L_(\"r\") ( theta_(\"r\") , phi_(\"r\") ,
      x_(\"r\") , y_(\"r\") , lambda )], with respect to the irradiance incident on
      the medium from the given direction of irradiation at the given wavelength,
      stem:[E_(\"i\") ( theta_(\"i\") , phi_(\"i\") , lambda )]\r\nstem:[rho ( theta_(\"i\")
      , phi_(\"i\") , theta_(\"r\") , phi_(\"r\") , x_(\"r\") , y_(\"r\") , lambda
      ) = frac(rm(d) L_(\"r\") ( theta_(\"r\") , phi_(\"r\") , x_(\"r\") , y_(\"r\")
      , lambda ))(rm(d) E_(\"i\") ( theta_(\"i\") , phi_(\"i\") , lambda ))]"
  examples: []
  id: 845-25-089
  notes:
  - content: The bi-directional reflectance distribution function is expressed in
      steradian to the power minus one (sr^−1^).
  - content: See also "{{radiance coefficient, urn:iec:std:iec:60050-845-24-078}}".
  - content: This note applies to the French language only.
