---
data:
  definition:
  - content: quotient de cinq fois la somme de l'aire des parois délimitée par le
      plan de travail et le plan des luminaires par la somme des aires du plan de
      travail et du plan des luminaires, utilisé dans le calcul du facteur d'utilisation
      ou de l'utilance
  examples: []
  id: 845-29-072
  notes:
  - content: Le rapport du local est exprimé par la formulestem:[K = frac(5 h (a +
      b))(a " " b)]où stem:[a] et stem:[b] sont les dimensions des côtés du local
      et stem:[h] la distance entre le plan de travail et le plan des luminaires.
  - content: Voir aussi "{{rapport du plafond, urn:iec:std:iec:60050-845-29-074}}"
      et "{{rapport du sol, urn:iec:std:iec:60050-845-29-076}}".
  - content: L'unité de rapport du local est un.
