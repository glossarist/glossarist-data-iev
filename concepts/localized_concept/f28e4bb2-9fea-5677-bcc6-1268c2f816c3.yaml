  definition:
  - content: "distortion of voltage waveform caused by a non-linear relation between
      the magnetic flux density and the magnetic field strength in the magnetic core
      and expressed in decibels by:\r\nstem:[THD] &amp;equals; 20 lg(stem:[V]~m~/stem:[V]~f~)
      dB\n\nwhere\n\nstem:[V_(\"m\") = sqrt(sum_(n = 1)^(oo) V_(n)^(2))]\r\nstem:[V]~stem:[n]~
      is the amplitude of the stem:[n]-th harmonic component of the waveform and stem:[V]~f~
      is the amplitude of its fundamental component"
