  definition:
  - content: SI unit of luminous flux
  examples: []
  id: 845-21-084
  notes:
  - content: " lm is equal to the luminous flux of a beam of {{monochromatic radiation,
      urn:iec:std:iec:60050-845-21-014}} whose {{frequency, urn:iec:std:iec:60050-103-06-02}}
      is 540 × 10^12^ Hz and whose radiant flux is 1/683 W."
  - content: According to the 9^th^ General Conference of Weights and Measures (1948),
      the lumen is defined as the luminous flux emitted in unit solid angle (steradian)
      by a {{uniform point source, urn:iec:std:iec:60050-845-21-098}} having a luminous
      intensity of 1 cd.
  - content: This entry was numbered 845-01-51 in IEC 60050-845:1987.
