  definition:
  - content: "quantity stem:[R]~eq~, having the dimensions of resistance, used to
      express the equivalent noise voltage stem:[E]~n~ of a one port device through
      the relationship:\r\nstem:[R_(\"eq\") = frac(E_(\"n\")^(2))(4 \" \" k \" \"
      T_(0) \"Delta\" f)]\r\nwhere stem:[T]~0~ is a reference thermodynamic temperature,
      fixed by convention around 290 K, Δstem:[f] is the bandwidth considered and
      stem:[k] is Boltzmann's constant"
  examples: []
  id: 702-08-52
  notes:
  - content: A receiving antenna can be regarded as a one-port device when viewed
      from its output port.
  terms:
  - type: expression
    normative_status: preferred
    designation: "(equivalent) noise resistance"
