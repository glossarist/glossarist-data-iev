---
data:
  definition:
  - content: "{{quantité de données, urn:iec:std:iec:60050-171-02-09}} pouvant être
      contenue dans une {{mémoire, urn:iec:std:iec:60050-171-04-14}}, exprimée par
      un nombre d’{{éléments de données, urn:iec:std:iec:60050-171-02-01}} de nature
      spécifiée"
  examples:
  - content: 'Capacité de mémoire pour des bits, stem:[M]~b~ ou stem:[M]~bit~; capacité
      de mémoire pour des octets, stem:[M]~o~.Note 1 à l’article: Les éléments de
      données spécifiés dépendent de l''organisation de la mémoire; ce sont par exemple
      des {{éléments binaires, urn:iec:std:iec:60050-171-02-10}}, des {{octets, urn:iec:std:iec:60050-171-02-12}},
      des {{mots, urn:iec:std:iec:60050-171-02-27}} formés d''un nombre déterminé
      d’éléments binaires, des {{blocs, urn:iec:std:iec:60050-721-03-11}}. Un indice
      peut être ajouté au symbole pour indiquer un élément de données spécifié. Note
      2 à l’article: Pour les {{registres, urn:iec:std:iec:60050-171-04-19}}, on utilise
      plutôt, dans le même sens, le terme "longueur de registre".'
