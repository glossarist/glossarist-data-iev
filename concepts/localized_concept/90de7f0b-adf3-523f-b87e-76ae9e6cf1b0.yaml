  definition:
  - content: part of an electric lamp which provides connection to the power supply
      by means of a lampholder or lamp connector and, in most cases, also serves to
      retain the electric lamp in the lampholder
  examples: []
  id: 845-28-015
  notes:
  - content: In some cases a cap serves as a thermal connection to the luminaire (or
      its heatsink).
  - content: A cap can be an integral part of an electric lamp.
