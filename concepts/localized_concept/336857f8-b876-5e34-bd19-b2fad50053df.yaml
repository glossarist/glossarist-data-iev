  definition:
  - content: propriété d'une couleur caractérisée par la proportion d'un stimulus
      de couleur monochromatique, dans un mélange additif avec un stimulus achrome
      spécifié, qui égalise le stimulus de la couleur considérée
  examples: []
  id: 723-08-40
  notes:
  - content: La notion de saturation en télévision est analogue à la notion de pureté
      d'une couleur utilisée en colorimétrie.
  - content: La saturation d'une couleur est d'autant plus grande qu'elle se rapproche
      d'une couleur monochromatique.
  - content: Dans le cas de stimulus pourpres, on remplace le stimulus monochromatique
      par un stimulus qui correspond à un point de la droite des pourpres.
