data:
  definition:
  - content: technique produisant les données de sortie qui sont calculées au moyen
      d’un algorithme utilisant les données d’entrée et une clé comme paramètre
  examples: []
  id: 821-11-09
  notes:
  - content: Connaissant les données de sortie, il est impossible de calculer les
      données d’entrée dans un délai raisonnable sans connaître la clé. Il est également
      impossible de déduire la clé des données de sorties dans un délai raisonnable,
      même si les données d’entrée sont connues.
