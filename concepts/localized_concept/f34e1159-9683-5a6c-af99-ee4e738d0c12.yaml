  definition:
  - content: quotient de l'épaisseur optique verticale d'une atmosphère réelle par
      l'épaisseur optique verticale de l'atmosphère pure et sèche (atmosphère de Rayleigh)
      pour la partie visible du spectre solaire
  examples: []
  id: 845-29-108
  notes:
  - content: Le facteur lumineux réel peut être exprimé parstem:[T_("v") = frac(-
      lnE_("vs") / E_("v") ))(a_("v") m)]où stem:[E]~vs~ est l'éclairement direct
      de faisceau sur une surface horizontale (au sol), stem:[E]~v~ est l'éclairement
      horizontal extraterrestre, stem:[a]~v~ est le coefficient d'extinction lumineuse,
      et stem:[m] est la masse d'air optique relative
  - content: L'unité de facteur lumineux réel est un.
