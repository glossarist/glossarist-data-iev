  definition:
  - content: "{{règlement, urn:iec:std:iec:60050-901-02-10}} qui contient des {{exigence,
      urn:iec:std:iec:60050-901-05-05}}s techniques, soit directement, soit par référence
      à une {{norme, urn:iec:std:iec:60050-901-02-02}}, une {{spécification technique,
      urn:iec:std:iec:60050-901-02-08}} ou un {{code de bonne pratique, urn:iec:std:iec:60050-901-02-09}},
      ou bien en en intégrant le contenu"
  examples: []
  id: 901-02-11
  notes:
  - content: Un règlement technique peut s'accompagner d'indications techniques décrivant
      certains moyens pour se conformer aux exigences du règlement, c'est-à-dire une
      {{disposition réputée satisfaire à, urn:iec:std:iec:60050-901-05-08}} ces exigences.
