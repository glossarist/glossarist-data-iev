  definition:
  - content: a mechanical switching device which provides, in the open position, an
      isolating distance in accordance with specified requirements
  examples: []
  id: 441-14-05
  notes:
  - content: A disconnector is capable of opening and closing a circuit when either
      negligible current is broken or made, or when no significant change in the voltage
      across the terminals of each of the poles of the disconnector occurs. It is
      also capable of carrying currents under normal circuit conditions and carrying
      for a specified time currents under abnormal conditions such as those of short
      circuit.
