  definition:
  - content: design of products, environments, programmes and services to be usable
      by all persons, to the greatest extent possible, without the need for adaptation
      or specialized design
  examples: []
  id: 871-04-32
  notes:
  - content: Universal design shall not exclude assistive devices for particular groups
      or persons with disabilities where this is needed.
  - content: Terms such as "universal design", "accessible design", "design for all",
      "barrier-free design", "inclusive design" and "transgenerational design" are
      often used interchangeably with the same meaning.
