  definition:
  - content: logarithmic ratio, expressed in decibels, of the available power of the
      given source to the power that the device delivers to a load impedance under
      specified operating conditions
  examples: []
  id: 561-02-74
  notes:
  - content: "Transducer attenuation is given by \r\nstem:[\"TL\" = 10 log frac(P_(\"a\"))(P_(\"L\"))
      \" \" &amp;lsqb; \"dB\" &amp;rsqb;]\r\nwherestem:[P]~a~ is the available power
      stem:[P]~L~ is the power that device delivers to a load impedance"
