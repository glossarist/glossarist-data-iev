  definition:
  - content: "one of the following two quotients:\r\na) for transduction of an electric
      signal into a mechanical signal, quotient of the resulting force in the blocked
      mechanical system by the excitation voltage in the electrical system;\r\nb)
      for transduction of a mechanical signal into an electric signal, quotient of
      the resulting short-circuit current in the electrical system by the excitation
      velocity in the mechanical system"
  examples: []
  id: 801-25-34
  notes:
  - content: These definitions are best applied to a reciprocal electromechanical
      transducer with transformer coupling, for example an electrostatic or piezoelectric
      transducer, in which case the two quotients have equal magnitude.
  terms:
  - type: expression
    normative_status: preferred
    designation: electromechanical coupling coefficient (2)
