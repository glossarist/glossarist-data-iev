  definition:
  - content: an action whereby all the instantaneous values of a signal exceeding
      a predetermined threshold value, or outside two predetermined threshold values,
      are reduced, all other instantaneous values of the signal being preserved
  examples: []
  id: 702-04-32
  notes:
  - content: "The reduction of instantaneous values may be abrupt or progressive.
      \r\nExamples of limiting: clipping; slicing; base limiting."
