  definition:
  - content: pertaining to a {{transmission link, urn:iec:std:iec:60050-701-02-06}}
      where the transfer of users' information is possible simultaneously in both
      directions between two points
  examples: []
  id: 701-03-19
  notes:
  - content: The channel capacity and the transmission rate of the associated {{transmission
      channels, urn:iec:std:iec:60050-701-02-01}} between the two points are not necessarily
      the same in the two directions.
  - content: The term "bidirectional" should not be used to describe the direction
      of call set-ups (which is described by the term "{{both-way, urn:iec:std:iec:60050-701-03-21}}").
  - content: In French, the terms "bilatéral" and "bidirectionnel" should not be confused
      with the term "{{duplex, urn:iec:std:iec:60050-701-03-17}}".
