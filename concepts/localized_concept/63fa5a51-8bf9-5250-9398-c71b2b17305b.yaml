  definition:
  - content: "the fractional change of permeability due to a change in temperature
      divided by that change in temperature:\r\nstem:[alpha_(mu) = frac(mu_(theta)
      - mu_(\"ref\"))(mu_(\"ref\") (theta - theta_(\"ref\")))]\r\nwhere stem:[µ~θ~]
      and stem:[µ]~ref~ are the permeabilities at temperatures stem:[θ] and stem:[θ]~ref~
      respectively"
