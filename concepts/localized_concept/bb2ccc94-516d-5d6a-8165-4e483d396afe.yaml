  definition:
  - content: set of fission reactions in which the neutrons necessary to produce a
      fission are themselves produced by a previous fission
  examples: []
  id: 395-02-59
  notes:
  - content: The reactions are called sub-critical, critical or supercritical depending
      on the ratio between the number of reactions of generation n+1 and generation
      n being less than, equal to or bigger than unity, respectively.
