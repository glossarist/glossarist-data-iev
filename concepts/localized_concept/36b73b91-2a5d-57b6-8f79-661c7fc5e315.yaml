  definition:
  - content: a transformer which is non-breathing, that is, so sealed that there can
      be no significant interchange between its contents and the external atmosphere
  examples: []
  id: 421-01-18
  notes:
  - content: In the case of oil-immersed transformers, these may or may not have a
      cushion of air (or other gas).
  - content: "Sealed transformers fall into two categories:\r\na) transformers in
      which the total volume of oil, together with air (or other gas), or any combination
      thereof, remains constant over the temperature range.\r\nb) transformers in
      which the total volume of oil, air (or other gas), or any combination thereof,
      varies over the temperature range and this variation is accommodated by a sealed
      flexible container or a flexible membrane."
  terms:
  - type: expression
    normative_status: preferred
    designation: sealed transformer
