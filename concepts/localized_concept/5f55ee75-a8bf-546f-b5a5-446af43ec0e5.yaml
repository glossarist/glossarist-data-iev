---
data:
  definition:
  - content: espérance mathématique de la {{quantité d'information conditionnelle,
      urn:iec:std:iec:60050-171-07-21}} des événements d'un ensemble exhaustif d'événements
      s'excluant mutuellement, lorsque se sont réalisés les événements d'un autre
      ensemble exhaustif d'événements s'excluant mutuellement stem:[H ( X | Y ) =
      sum_(i = 1)^(n) sum_(j = 1)^(m) p ( x_(i) , y_(j) ) * I ( x_(i) | y_(j) )] où
      stem:[X = {x_(1) , " " ... , " " x_(n)}] est l'ensemble d'événements stem:[x_(i)
      (i = 1, " " ... , " " n)], stem:[Y = {y_(1) , " " ... , " " y_(m)}] est l'ensemble
      d'événements stem:[y_(j) (j = 1, " " ... , " " m)], stem:[I (x_(i) | y_(j))]
      est la quantité d'information conditionnelle de stem:[x_(i)] lorsque stem:[y_(j)]
      s'est réalisé, stem:[p (x_(i) , y_(j))] est la probabilité de réalisation simultanée
      des deux événements
