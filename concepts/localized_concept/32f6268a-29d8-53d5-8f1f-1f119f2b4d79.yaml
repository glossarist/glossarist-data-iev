  definition:
  - content: value consistent with the definition of a given particular quantity
  examples: []
  id: 311-01-04
  notes:
  - content: This term is used in the "true value" approach.
  - content: This is a value that would be obtained by a perfect measurement.
  - content: True values are by nature indeterminate.
  - content: The indefinite article "a", rather than the definite article "the", is
      used in conjunction with "true value" because there can be many values consistent
      with the definition of a given particular quantity.
