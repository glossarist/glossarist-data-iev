  definition:
  - content: element of a {{vector space, urn:iec:std:iec:60050-102-03-01}}
  examples: []
  id: 102-03-04
  notes:
  - content: |-
      An stem:[n]-dimensional vector is represented by an ordered set of stem:[n] scalars, usually real or complex numbers, which depend on the choice of the base. In matrix notation, these scalars are usually represented as a column matrix:

      stem:[mathbf(U) = ([U_(1)], [U_(2)], [vdots], [U_(n)])]
  - content: A vector in a Euclidean space is characterized by its {{magnitude, urn:iec:std:iec:60050-102-03-23}}
      and, if it is a non-zero vector, by its {{direction, urn:iec:std:iec:60050-102-03-12}}.
  - content: "A complex vector *stem:[U]* is defined by a real part and an imaginary
      part: \nstem:[U = A + rm(j) B] where *stem:[A]* and *stem:[B]* are real vectors."
  - content: 'A vector is indicated by a letter symbol in sloped boldface type or
      by an arrow above a sloped lightface letter symbol: *stem:[U]* or stem:[vec(U)].
      The vector *stem:[U]* with components stem:[U_(i)] can be denoted stem:[(U_(i))].'
  - content: The term "vector" is also used for a {{vector quantity, urn:iec:std:iec:60050-102-03-21}}.
  - content: In geometry, the term “vector” is often used for a directed line segment
      in a {{point space, urn:iec:std:iec:60050-102-03-02}}.
