  notes:
  - content: This form of telecommunication finds major application in {{television
      broadcasting, urn:iec:std:iec:60050-701-01-35}} and the word “television” is
      often used without qualification to describe this application. The same technique
      is also used for industrial, scientific, medical and other applications; such
      applications are often referred to as “{{closed-circuit television, urn:iec:std:iec:60050-723-01-19}}”.
