  definition:
  - content: plane containing the {{polarization ellipse, urn:iec:std:iec:60050-705-01-21}}
      or {{circle, urn:iec:std:iec:60050-102-04-28}}
  examples: []
  id: 705-01-22
  notes:
  - content: For a linearly polarized wave, the polarization ellipse degenerates into
      a line segment and then the plane of polarization is not uniquely defined. In
      an {{isotropic, urn:iec:std:iec:60050-113-02-03}} medium, the plane of polarization
      is now conventionally taken to be normal to the {{direction of propagation,
      urn:iec:std:iec:60050-103-10-05}}. This is a change from previous practice when
      the plane of polarization was conventionally taken to be the plane containing
      the direction of propagation and a field vector, generally the {{electric field,
      urn:iec:std:iec:60050-121-11-67}} vector in {{radio waves, urn:iec:std:iec:60050-701-02-12}}
      or the {{magnetic flux density, urn:iec:std:iec:60050-121-11-19}} vector in
      optics.
  terms:
  - type: expression
    normative_status: preferred
    designation: plane of polarization
