data:
  definition:
  - content: "événement par lequel une panne dormante donne lieu à une erreur\r\nNote
      1 à l’article: Une panne dormante devient active en réponse à un déclencheur
      ({{192-03-23, urn:iec:std:iec:60050-192-03-23}}) particulier et peut redevenir
      dormante après suppression du déclencheur. Note 2 à l’article: L’erreur ainsi
      générée peut se propager et donner lieu à une défaillance observée à la frontière
      du système, sauf si une reprise sur erreur ({{192-10-16, urn:iec:std:iec:60050-192-10-16}})
      l’empêche."
