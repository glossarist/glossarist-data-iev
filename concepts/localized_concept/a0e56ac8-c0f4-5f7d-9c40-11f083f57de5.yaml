  definition:
  - content: quotient of that part of the illuminance at a point on a given plane
      which is received directly (or through clear glass) from a sky of assumed or
      known luminance distribution and the illuminance on a horizontal plane due to
      an unobstructed hemisphere of this sky, where the contribution of direct sunlight
      to both illuminances is excluded
  examples: []
  id: 845-29-122
  notes:
  - content: When calculating the lighting of interiors, the contribution of direct
      sunlight has to be considered separately.
  - content: The sky component of daylight factor has unit one.
  - content: This entry was numbered 845-09-98 in IEC 60050-845:1987.
