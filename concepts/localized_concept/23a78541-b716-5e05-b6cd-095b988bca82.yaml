  definition:
  - content: in a set of radio channels arranged in the ascending order of their centre
      frequencies, the channel whose rank is next above or next below that of a given
      channel
  examples: []
  id: 713-06-21
  notes:
  - content: The adjacent channel above the given channel is known as the “upper adjacent
      channel” and the one below it as the “lower adjacent channel”.
  - content: Two adjacent channels may have a common part and this may be referred
      to as frequency overlap.
