data:
  definition:
  - content: "{{attestation, urn:iec:std:iec:60050-902-04-02}} réalisée par une tierce
      partie, relative à des {{produits, urn:iec:std:iec:60050-902-02-03}}, des processus,
      des systèmes ou des personnes"
  examples: []
  id: 902-04-05
  notes:
  - content: La certification d'un système de management est parfois désignée également
      sous le nom d'enregistrement.
  - content: Le concept de certification recouvre tous les objets de l'évaluation
      de la conformité, excepté les {{organismes d'évaluation de la conformité, urn:iec:std:iec:60050-902-01-05}}
      proprement dits, auxquels l'{{accréditation, urn:iec:std:iec:60050-902-04-06}}
      est applicable.
