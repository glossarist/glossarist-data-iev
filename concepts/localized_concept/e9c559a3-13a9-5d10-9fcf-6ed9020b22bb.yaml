  notes:
  - content: La vie moyenne est la constante de temps pour la décroissance des particules.
  - content: On ne connaît que des décroissances exponentielles. Cependant pour une
      combinaison de différentes espèces de particules ayant des vies moyennes différentes,
      la décroissance n'est pas exponentielle et la vie moyenne résultante varie dans
      le temps.
