  definition:
  - content: plan utilisé comme référence pour les mesures spatiales
  examples: []
  id: 561-07-27
  notes:
  - content: 'Le plan de référence peut être un des types suivants : . pour les mesures
      sous contrainte, de la surface plane d’une broche en contact avec la surface
      arrière de la plaquette; . de trois points en des endroits précis de la surface
      avant à l’intérieur de la zone de qualité fixe; . de l’ajustement des moindres
      carrés à la surface avant à l’aide de tous les points mesurés à l’intérieur
      de la zone de qualité fixe; . de l’ajustement des moindres carrés à la surface
      avant à l’aide de tous les points mesurés à l’intérieur d’un site.'
