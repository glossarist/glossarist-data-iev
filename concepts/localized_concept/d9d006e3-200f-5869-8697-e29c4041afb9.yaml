  definition:
  - content: "{{wafer, urn:iec:std:iec:60050-521-05-29}}-cutting technology using
      a laser light that is radiated and scanned along dicing lines on a {{substrate,
      urn:iec:std:iec:60050-521-05-28}}"
  examples: []
  id: 523-05-07
  notes:
  - content: In a cutting process where blade dicing is difficult to use, the laser
      dicing method is widely used where a laser light is focused inside the substrate
      and modified layers are formed beneath the scribe lines, and finally the wafer
      is diced by a mechanical expansion.
