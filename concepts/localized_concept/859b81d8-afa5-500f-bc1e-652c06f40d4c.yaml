  definition:
  - content: |-
      scalar or tensor quantity the product of which by the electric field strength stem:[*E*]  in a medium is equal to the electric flux density stem:[*D*]:

      stem:[*D*] = stem:[ε]stem:[ *E*]
  examples: []
  id: 121-12-12
  notes:
  - content: For an isotropic medium the permittivity is a scalar quantity; for an
      anisotropic medium it is a tensor quantity.
