  definition:
  - content: logarithm of the ratio of a given time-mean-square standard-frequency-weighted
      sound pressure for a stated time period, to the square of the reference sound
      pressure of 20 μPa. Time-average sound level in decibels is ten times the logarithm
      to the base ten of that ratio
  examples: []
  id: 801-22-16
  notes:
  - content: If a frequency weighting is not specified, the A-frequency weighting
      is understood.
  - content: In principle, exponential time weighting is not involved.
  terms:
  - type: expression
    normative_status: preferred
    designation: time-average sound level
  - type: expression
    designation: equivalent continuous sound level
