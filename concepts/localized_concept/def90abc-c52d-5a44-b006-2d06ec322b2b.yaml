  definition:
  - content: rapport de deux unités de mesure correspondant à des grandeurs de même
      nature
  examples: []
  id: 112-01-33
  notes:
  - content: 'Un exemple de facteur de conversion est: km/m = 1 000 et par conséquent
      1 km = 1 000 m.'
  - content: |-
      Les unités peuvent appartenir à des systèmes d'unités différents, par exemple:

      • h/s = 3 600 et par conséquent 1 h = 3 600 s;

      • (km/h)/(m/s) = (km/m)/(h/s) = (1 000/3 600) = (1/3,6), et par conséquent 1 km/h = (1/3,6) m/s.
