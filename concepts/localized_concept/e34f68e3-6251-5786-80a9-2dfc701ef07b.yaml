  definition:
  - content: 'functional unit forming part of the controlled system and arranged at
      its input, driven by the manipulated variable and manipulating the mass flow
      or energy flow SEE: Figures 1 and 2.'
  examples: []
  id: 351-49-08
  notes:
  - content: If the final controlling element is mechanically actuated, an additional
      actuator (positioner) is used in some cases.
  - content: The output variable of the final controlling equipment is usually not
      free from feedback. The interface between the actuator and the final controlling
      element should therefore be selected in such a way that the manipulated variable
      is not affected by feedback from the final controlling element.
  - content: This entry was numbered 351-28-08 in IEC 60050-351:2006.image::/assets/images/parts/351/351-fig1-en.png[Figure
