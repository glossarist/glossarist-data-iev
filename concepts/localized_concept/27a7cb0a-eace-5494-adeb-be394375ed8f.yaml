  definition:
  - content: "quotient of the average radiant flux density or luminous flux density,
      stem:[Φ]~2~/stem:[A]~2~ (or stem:[Φ]~1~/stem:[A]~1~), received over surface
      S~2~ (or S~1~) from surface S~1~ (or S~2~) and the radiant exitance or luminous
      exitance, stem:[M]~1~ (or stem:[M]~2~), of surface S~1~ (or S~2~)stem:[f_(21)
      = frac(Phi_(2))(A_(2) M_(1)) = frac(g)(A_(2))]\r\nor\r\nstem:[f_(12) = frac(Phi_(1))(A_(1)
      M_(2)) = frac(g)(A_(1))]\r\nwith\r\nstem:[A_(2) f_(21) = g = A_(1) f_(12)]where
      stem:[Φ]~2~ (or stem:[Φ]~1~) is the radiant flux or luminous flux received over
      surface S~2~ (or S~1~) from surface S~1~ (or S~2~), stem:[A]~2~ (or stem:[A]~1~)
      is the area of surface S~2~ (or S~1~) and stem:[g] is the mutual exchange coefficient"
