---
data:
  definition:
  - content: 'dépôt d''informations relatives à la santé d’une personne, sous une
      forme pouvant être informatisée, archivé et transmis en toute sécurité, et accessible
      à de multiples utilisateurs autorisésNote 1 à l’article: Un dossier de santé
      informatisé intègre un modèle d’informations logiques normalisé ou communément
      convenu indépendant des systèmes de dossiers de santé informatisés. Son but
      principal est la prise en charge de soins de santé intégrés permanents, efficaces
      et de qualité.Note 2 à l’article: Un dossier de santé informatisé contient des
      informations rétrospectives, concurrentielles et prospectives.'
