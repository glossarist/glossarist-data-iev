---
data:
  definition:
  - content: "aptitude à fonctionner quand et tel que requis\r\nNote 1 à l’article:
      La sûreté de fonctionnement comprend la disponibilité ({{192-01-23, urn:iec:std:iec:60050-192-01-23}}),
      la fiabilité ({{192-01-24, urn:iec:std:iec:60050-192-01-24}}), la récupérabilité
      ({{192-01-25, urn:iec:std:iec:60050-192-01-25}}), la maintenabilité ({{192-01-27,
      urn:iec:std:iec:60050-192-01-27}}), l’efficacité de la logistique de maintenance
      ({{192-01-29, urn:iec:std:iec:60050-192-01-29}}) et, dans certains cas, d’autres
      caractéristiques telles que la durabilité ({{192-01-21, urn:iec:std:iec:60050-192-01-21}}),
      la sûreté et la sécurité. Note 2 à l’article: Le terme «sûreté de fonctionnement»
      désigne collectivement l’ensemble des caractéristiques temporelles de qualité
      d’une entité."
