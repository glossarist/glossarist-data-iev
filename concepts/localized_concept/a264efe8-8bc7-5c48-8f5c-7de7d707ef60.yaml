  definition:
  - content: worldwide and open computer network which provides several types of communication
      services, using a common set of protocols specified for the routing of packets
  examples: []
  id: 732-07-01
  notes:
  - content: These services mainly comprise interpersonal messaging, computer conferences,
      file transfer, remote login, searching for information and inspecting documents.
  - content: The main protocols are the IP protocol and the TCP protocol, cooperating
      in the TCP/IP stack.
  - content: The Internet is open to any user having obtained an IP address from an
      Internet service provider.
