  definition:
  - content: "{{SI, urn:iec:std:iec:60050-112-02-02}} {{unit, urn:iec:std:iec:60050-112-01-14}}
      of {{electric current, urn:iec:std:iec:60050-121-11-13}}, equal to the electric
      current corresponding to the flow of (1/1,602 176 634) × 10^19^ {{elementary
      electric charges, urn:iec:std:iec:60050-113-05-16}} per {{second, urn:iec:std:iec:60050-112-02-04}}"
  examples: []
  id: 112-02-07
  notes:
  - content: 'The definition in the SI Brochure is: "The ampere, symbol A, is the
      SI unit of electric current. It is defined by taking the fixed numerical value
      of the elementary charge stem:[e] to be 1,602 176 634 × 10^−19^ when expressed
      in the unit C, which is equal to A s, where the second is defined in terms of
      Δstem:[ν]~Cs~."'
  - content: "The definition of the ampere in IEV 112-02-07:2010-01 was: \"SI unit
      of electric current, equal to the direct current which, if maintained constant
      in two straight parallel conductors of infinite length, of circular cross-section
      with negligible area, and placed 1 metre apart in vacuum, would produce between
      these conductors a force per length equal to 2 × 10^−7^ N/m\".\r\nNote 3  to
      entry: The new definition of the ampere fixes the value of the elementary charge
      stem:[e] instead of that of the magnetic constant, stem:[μ]~0~. As a consequence,
      the value of stem:[μ]~0~ has to be determined experimentally."
  - content: 'The ampere is one of the seven SI {{base units, urn:iec:std:iec:60050-112-01-18}}:
      {{second, urn:iec:std:iec:60050-112-02-04}} (s), {{metre, urn:iec:std:iec:60050-112-02-05}}
      (m), {{kilogram, urn:iec:std:iec:60050-112-02-06}} (kg), ampere (A), {{kelvin,
      urn:iec:std:iec:60050-112-02-08}} (K), {{mole, urn:iec:std:iec:60050-112-02-09}}
      (mol) and {{candela, urn:iec:std:iec:60050-112-02-10}} (cd).'
