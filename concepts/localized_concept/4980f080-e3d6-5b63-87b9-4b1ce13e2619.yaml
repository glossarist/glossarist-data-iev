  definition:
  - content: a device comprising one or more Т-B cells or T-R cells for automatically
      connecting a common antenna to the transmitter during the transmitting period
      and to the receiver during the receiving period no matter what the transmitter
      impedance may be, the receiver also being protected from the high power of the
      transmitter
