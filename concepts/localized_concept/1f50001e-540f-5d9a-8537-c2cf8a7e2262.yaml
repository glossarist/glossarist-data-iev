  definition:
  - content: for a particle, its mass when moving in an inertial frame
  examples: []
  id: 113-03-06
  notes:
  - content: A particle with rest mass stem:[m]~0~ and speed stem:[v] has a relativistic
      mass equal to stem:[m_(0) / sqrt(1 - v^(2) / c_(0)^(2))], where stem:[c]~0~
      is speed of light. When the speed stem:[v] is non-zero, the relativistic mass
      is greater than the rest mass.
  - content: In the theory of relativity, the term “mass” generally means relativistic
      mass.
