  definition:
  - content: "grandeur souvent utilisée pour caractériser les photodétecteurs, définie
      par la formule:\r\nstem:[D^(ast) = D sqrt(A * \"Delta\" f)]\r\noù stem:[D] est
      la détectivité, stem:[A] l'aire sensible du photodétecteur et Δstem:[f] la largeur
      de bande équivalente de bruit"
