  definition:
  - content: "{{system, urn:iec:std:iec:60050-151-11-27}} composed of one or more
      integrated microsized {{components, urn:iec:std:iec:60050-151-11-21}}, such
      as {{sensors, urn:iec:std:iec:60050-151-13-48}}, {{actuators, urn:iec:std:iec:60050-151-13-49}},
      {{transducers, urn:iec:std:iec:60050-151-13-34}}, resonators, {{oscillators,
      urn:iec:std:iec:60050-151-13-51}}, mechanical components, or {{electric circuits,
      urn:iec:std:iec:60050-131-11-07}}"
  examples: []
  id: 523-01-01
  notes:
  - content: In the definition,  "microsized" is used to mean a size of less than
      a few millimetres.
  - content: Technologies relating to MEMS are extremely diverse and include fundamental
      technologies (such as design, material, processing, functional element, system
      control, energy supply, {{bonding, urn:iec:std:iec:60050-523-06-01}} and assembly,
      electric circuit, and evaluation), basic sciences (such as micro-science and
      engineering) as well as thermodynamics on a micro-scale and {{microtribology,
      urn:iec:std:iec:60050-523-02-02}}.
  - content: '"MEMS" is the acronym of "micro-electromechanical systems", but was
      used in the past for "micro-electromechanical device". The singular and plural
      forms of the term "MEMS" are identical.'
  sources:
