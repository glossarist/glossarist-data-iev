  id: 102-03-01
  notes:
  - content: In the usual three-dimensional space, the directed line segments with
      a specified origin form an example of a vector space over real numbers. Another
      example, corresponding to the extended concept of scalar (see {{IEV 102-02-18,
      urn:iec:std:iec:60050-102-02-18}}, Note 1) is the set of stem:[n-]bit words
      formed of the digits 0 and 1 with addition modulo two, where the set of scalars
      is the set of two elements 0 and 1 subject to Boolean algebra.
