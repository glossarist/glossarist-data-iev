  id: 871-05-05
  notes:
  - content: The internet of things and services no longer consists only of human
      participants but also of things.
  - content: The objective of the internet of things and services is to minimize the
      information gap between the real world and the virtual world. An important step
      towards this objective is the standardization of components and services in
      the internet of things and services.
