  definition:
  - content: pour un faisceau de circuits ou un indicatif de destination donnés et
      pendant un intervalle de temps spécifié, rapport du nombre des tentatives de
      prises qui aboutissent à un signal de réponse, au nombre total des tentatives
      de prise
  examples: []
  id: 715-02-21
  notes:
  - content: En certains points du réseau ce rapport peut se montrer inférieur au
      taux de prises avec réponse vu la possibilité de tentatives de prises infructueuses.
