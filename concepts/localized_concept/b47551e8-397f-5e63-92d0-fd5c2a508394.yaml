  definition:
  - content: grandeur vectorielle *stem:[v]* = d*stem:[r]*/dstem:[t], où *stem:[r]*
      est le rayon vecteur et stem:[t] est le temps
  examples: []
  id: 113-01-32
  notes:
  - content: La vitesse est liée à un point décrit par son rayon vecteur. Le point
      peut localiser une particule ou être attaché à tout autre objet tel qu’un corps
      ou une onde.
  - content: 'La vitesse dépend du choix du référentiel. Une transformation appropriée
      entre référentiels doit être utilisée: galiléenne pour une description non relativiste,
      lorentzienne pour une description relativiste.'
  - content: L’unité SI cohérente de vitesse est le mètre par seconde, m/s.
