  definition:
  - content: the ratio of the probabilities of exceeding the same value of a random
      quantity characterizing the transmission with and without diversity reception
  examples: []
  id: 713-10-26
  notes:
  - content: The characteristic quantity may be, for instance, the received power,
      the transmission loss, the noise power, or the error ratio.
  - content: The order of the two probabilities is chosen so as to obtain a ratio
      greater than one.
  terms:
  - type: expression
    normative_status: preferred
    designation: diversity improvement factor
