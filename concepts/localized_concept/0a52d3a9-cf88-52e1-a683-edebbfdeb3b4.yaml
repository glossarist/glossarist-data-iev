  definition:
  - content: ratio of the luminous output of a source evaluated according to the CIE
      scotopic {{spectral luminous efficiency, urn:iec:std:iec:60050-845-21-035}},
      stem:[V′](stem:[λ]), to the luminous output evaluated according to the CIE photopic
      spectral luminous efficiency, stem:[V](stem:[λ])
  examples: []
  id: 845-21-113
  notes:
  - content: The S/P ratio can be expressed bystem:[R_("SP") = frac(K^(prime)_("m")
      int_("0")^(oo) S "(" lambda ")" " " V^(prime) "(" lambda ")" " " "d" lambda)(K_("m")
      int_("0")^(oo) S "(" lambda ")" " " V "(" lambda ")" " " "d" lambda)]where stem:[K]′~m~ ≈ 1 700 lm·W^−1^
      is the maximum luminous efficacy for scotopic vision, stem:[K]~m~ ≈ 683 lm·W^−1^
      is the maximum luminous efficacy for photopic vision, stem:[S](stem:[λ]) is
      the {{relative spectral distribution, urn:iec:std:iec:60050-845-21-030}} of
      the source, and stem:[λ] is the wavelength.
  - content: The S/P ratio has unit one.
  terms:
