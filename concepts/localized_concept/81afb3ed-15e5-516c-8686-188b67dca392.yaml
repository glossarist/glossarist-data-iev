  definition:
  - content: "an atmosphere in which the refractivity is determined by the equation:
      \r\nstem:[N (h)] = 315 exp (-0,136 stem:[h])\r\nwhere stem:[h] is the altitude
      in kilometres above sea-level"
  examples: []
  id: 705-05-18
  notes:
  - content: Up to a height of 1 km, the reference atmosphere for refraction may in
      practice be regarded as identical to the standard radio atmosphere.
