  definition:
  - content: the velocity vector at a point, in a propagation medium, of a signal
      which may be ideally represented by two superimposed sinusoidal waves of equal
      amplitude and slightly different frequencies approaching a common limiting value
  examples: []
  id: 702-02-22
  notes:
  - content: "In the most general case the reciprocal of the magnitude stem:[|vec(v)_(\"g\")|]
      of the group velocity vector is equal to the derivative of the reciprocal of
      the wavelength stem:[λ] with respect to the frequency stem:[f]:\r\nstem:[frac(1)(|vec(v)_(\"g\")|)
      = frac(\"d\" (lambda^(- 1)))(\"d\" f)]"
  terms:
  - type: expression
    normative_status: preferred
    designation: group velocity
  - type: symbol
    designation: stem:[|vec(v)_("g")|]
