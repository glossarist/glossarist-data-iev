---
data:
  definition:
  - content: 'pour un bipôle inductif de bornes A et B, quotient du flux totalisé
      stem:[Ψ] entre les bornes par le courant électrique stem:[i] dans le bipôle
      stem:[L = frac(Psi)(i)] où le signe du flux totalisé est déterminé en prenant
      la tension électrique, dans l''intégrale qui le définit, comme la différence
      des potentiels électriques en A et B et où le courant est pris positif si le
      sens du courant est de A vers B et négatif si son sens est de B vers ANote 1
      à l’article: Une inductance ne peut pas être négative. Note 2 à l’article: En
      français, le terme «inductance» désigne aussi elliptiquement une bobine d’inductance,
      en anglais «inductor» ({{151-13-25, urn:iec:std:iec:60050-151-13-25}}). Note
      3 à l’article: L’unité SI cohérente de l’inductance est le henry, H.'
