---
data:
  definition:
  - content: "aptitude à fonctionner tel que requis sans défaillance, pendant un intervalle
      de temps donné et dans des conditions données\r\nNote 1 à l’article: La durée
      de l’intervalle de temps peut être exprimée en unités appropriées à l’entité
      concernée, par exemple, temps calendaire, cycles de fonctionnement, distance
      parcourue, etc. Il convient de toujours énoncer clairement les unités. Note
      2 à l’article: Les conditions données incluent les aspects ayant un impact sur
      la fiabilité, tels que: le mode de fonctionnement, les niveaux de contrainte,
      les conditions environnementales et la maintenance."
