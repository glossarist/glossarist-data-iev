data:
  definition:
  - content: 'méthode de formation d''une couche mince supraconductrice principalement
      par utilisation de l''évaporation physiqueNote 1 à l’article: Pour l''essentiel,
      le dépôt physique en phase vapeur permet d''obtenir un film mince utilisant
      l''évaporation sous vide d’espèces atomiques ou le dépôt par pulvérisation sous
      vide monocible ou multicible en atmosphère inerte ou réactive (par exemple,
      pulvérisation magnétron radiofréquence, pulvérisation cathodique, épitaxie par
      jet moléculaire, ablation laser).'
