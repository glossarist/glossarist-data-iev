  definition:
  - content: contractual agreement on the quality and quantity of services (including
      AAL services and IT services) to be provided using clearly verifiable and comprehensible
      criteria (service level) accepted by both the AAL user and the service provider,
      that define a set of service level objectives and related key performance indicators
      (KPI)
  examples: []
  id: 871-01-06
  notes:
  - content: These service level objectives can concern aspects of the services (including
      AAL services and IT services) including availability, performance, security
      and measurable thresholds of service attributes, which the service provider
      aims to meet in respect of the service to be delivered.
