  definition:
  - content: time required for a detector output to rise from a stated low percentage
      to a stated high percentage of the maximum value when a steady input is instantaneously
      applied
  examples: []
  id: 845-25-067
  notes:
  - content: A value of 10&#160;% is usually considered to be the low percentage value,
      whereas a value of 90&#160;% is usually considered to be the high percentage
      value.
  - content: The rise time is expressed in seconds (s).
  - content: This entry was numbered 845-05-60 in IEC 60050-845:1987.
