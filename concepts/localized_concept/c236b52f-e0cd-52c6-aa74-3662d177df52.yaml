  definition:
  - content: angle subtended by a real or apparent source at a given point in space
  examples: []
  id: 845-25-085
  notes:
  - content: The point in space could be the eye of an observer or a point of measurement
      or any other defined point.
  - content: Subtended angles are denoted by the full included angle, not the half
      angle.
  - content: The light output of a source will often be modified by the incorporation
      of lenses and mirrors as projection optics, in which case the angular subtense
      of the apparent source can differ from the angular subtense of the physical
      source.
  - content: The angular subtense of a non-symmetrically-shaped source is determined
      by the arithmetic mean of the maximum and minimum angular dimension of the source.
  - content: The angular subtense is expressed in radian (rad) or degree (°).
  terms:
