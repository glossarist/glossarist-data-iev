data:
  definition:
  - content: 'relation binaire ℛ entre des éléments stem:[a] et stem:[b] d''un ensemble
      donné, ayant les propriétés suivantes: * réflexivité: aℛa, * symétrie: si aℛb
      alors bℛa, * transitivité: si aℛb et bℛc alors aℛc, pour des éléments quelconques
      a, b et c de l''ensemble donné'
  examples: []
  id: 102-01-08
  notes:
  - content: Des exemples sont l'égalité d'éléments d'un ensemble, le parallélisme
      de droites dans un espace affine, la relation entre nombres entiers dont la
      différence est paire.
