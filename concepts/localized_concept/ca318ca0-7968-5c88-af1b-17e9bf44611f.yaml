data:
  definition:
  - content: 'angle dont la tangente est le rapport de la résistance stem:[R] à la
      valeur absolue de la réactance stem:[X] d''une impédance stem:[delta = "a" "r"
      "c" "t" "a" "n" frac(R)(|X|)]Note 1 à l’article: L’angle de perte est défini
      en {{151-15-48, urn:iec:std:iec:60050-151-15-48}} comme l’angle dont la tangente
      est le facteur de dissipation, ou rapport de la puissance active à la valeur
      absolue de la puissance réactive. D’autres angles de pertes sont définis en
      électromagnétisme (voir {{121-12-17, urn:iec:std:iec:60050-121-12-17}} et {{121-12-35,
      urn:iec:std:iec:60050-121-12-35}}).'
