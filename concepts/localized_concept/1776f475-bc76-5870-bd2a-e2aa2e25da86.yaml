  definition:
  - content: phenomenon in which a moving structure is stuck to another structure
      or {{substrate, urn:iec:std:iec:60050-521-05-28}} by adhesion forces
  examples: []
  id: 523-02-04
  notes:
  - content: When structures become smaller, stiction appears significant owing to
      the {{scale effect, urn:iec:std:iec:60050-523-02-01}}, meaning that surface
      forces predominate over body forces. Stiction frequently occurs in the MEMS
      fabrication process when small structures are released during wet etching processes
      owing to the {{surface tension, urn:iec:std:iec:60050-113-03-42}} of liquid.
      Representative adhesion forces that cause stiction are van der Waals force,
      electrostatic force, and surface tension of liquid between structures.
