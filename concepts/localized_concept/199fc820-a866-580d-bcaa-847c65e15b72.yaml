  definition:
  - content: "of a material saturated by a magnetostatic field, the complex permeability
      when it is subjected to a plane electromagnetic wave propagating in the direction
      of, and having an stem:[vec(H)] -field component perpendicular to, the magnetostatic
      field strength:\r\nstem:[underline(mu)_(exists) = frac(underline(mu)_(\"r\")^(2)
      - underline(kappa)_(\"r\")^(2))(underline(mu)_(\"r\"))]\r\nwhere stem:[<u>μ</u>]~r~
      and stem:[<u>κ</u>]~r~ are components of Polder's tensor permeability"
