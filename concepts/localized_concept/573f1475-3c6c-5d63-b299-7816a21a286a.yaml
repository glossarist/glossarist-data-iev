  definition:
  - content: confirmation, through the provision of objective evidence, that specified
      requirements have been fulfilled
  examples: []
  id: 192-01-17
  notes:
  - content: The term “verified” is used to designate the corresponding status.
  - content: Design verification is the application of tests and appraisals to assess
      conformity of a design to the specified requirement.
  - content: In the case of software, verification is conducted at various stages
      of development, examining the software and its constituents to determine conformity
      to the requirements specified at the beginning of that stage.
