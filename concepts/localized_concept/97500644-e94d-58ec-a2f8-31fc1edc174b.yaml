  definition:
  - content: for a capacitive two-terminal element with terminals A and B, quotient
      of the electric charge stem:[q] at A by the voltage ({{131-11-56, urn:iec:std:iec:60050-131-11-56}})
      stem:[u]~AB~ between the terminals  stem:[C = frac(q)(u_(rm(AB)))] where the
      sign of the electric charge is determined by taking the electric current in
      the time integral defining this charge as positive if its direction is from
      A to B and negative if its direction is from B to A
  examples: []
  id: 131-12-13
  notes:
  - content: A capacitance cannot be negative.
  - content: The coherent SI unit of capacitance is farad, F.
