  definition:
  - content: energy associated with an electromagnetic field
  examples: []
  id: 121-11-64
  notes:
  - content: "In a linear medium the electromagnetic energy within a domain V is given
      by the volume integral\r\nstem:[frac(1)(2) int_(\"V\") (E * D + H * B) \" \"
      \"d\" \" \" V]   \r\nwhere stem:[*E*], stem:[*D*], stem:[*H*] and stem:[*B*]
      are the four vector quantities determining the electromagnetic field."
