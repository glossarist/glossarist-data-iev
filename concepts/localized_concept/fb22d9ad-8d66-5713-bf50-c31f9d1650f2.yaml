  definition:
  - content: forme d’énergie liée au comportement microscopique chaotique d'un système,
      égale à la différence entre l'accroissement de l’énergie totale d’un système
      fermé et le travail effectué sur ce système, pendant un processus de transfert
      d'énergie
  examples: []
  id: 113-04-11
  notes:
  - content: La quantité de chaleur est une grandeur de processus, non une grandeur
      d’état. Elle dépend de la manière dont le changement d’un état à un autre a
      été obtenu et est seulement partiellement transformable en travail.
  - content: Un apport de chaleur peut correspondre à une augmentation de la température
      thermodynamique ou à d’autres effets, tels que des transitions de phase ou des
      processus chimiques.
  - content: L'unité SI cohérente de quantité de chaleur est le joule, J.
