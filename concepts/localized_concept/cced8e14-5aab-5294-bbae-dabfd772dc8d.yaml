  definition:
  - content: identity resulting from the divergence theorem applied to the vector
      field stem:[f_(1) " " mathbf(grad) " " f_(2)], where stem:[f]~1~ and stem:[f]~2~
      are two scalar fields given at each point of a three-dimensional domain V limited
      by a closed surface S stem:["P{iiint}"_("V") (mathbf(grad) " " f_(1) * mathbf(g
      r a d) " " f_(2) + f_(1) " " rm(Delta) " " f_(2)) rm(d) V = underset("S")("P{oiint}")
      f_(1) " " mathbf(g r a d) " " f_(2) * e_("n") rm(d) A] where dstem:[V] is the
      volume element, *stem:[e]*~n~dstem:[A] is the vector surface element and Δ is
      the Laplacian operator
