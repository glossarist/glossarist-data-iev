  definition:
  - content: "functional unit with two or several inputs and one output the value
      of the output variable of which is equal to the algebraic sum of the values
      of the input variables multiplied by constant weighting factors according to
      the formula:stem:[v (t) = K_(1) * u_(1) (t) + K_(2) * u_(2) (t) + ...]where<table>\r\n<tr>\n<td>stem:[t]</td>\n<td>is
      the time;</td>\n</tr>\r\n<tr>\n<td>\nstem:[K]~1~, stem:[K]~2~\n</td>\n<td>are
      the weighting factors;</td>\n</tr>\r\n<tr>\n<td>\nstem:[u]~1~, stem:[u]~2~\n</td>\n<td>are
      the input variables;</td>\n</tr>\r\n<tr>\n<td>stem:[v]</td>\n<td>is the summing
      result.</td>\n</tr>\r\n</table>"
