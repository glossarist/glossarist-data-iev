  definition:
  - content: a tariff in which the charge is based on a series of different kilowatthour
      rates applying to successive kilowatthour blocks of given size, supplied during
      a specified period
  examples: []
  id: 691-05-11
  notes:
  - content: "The size of the blocks may be:\r\n- either fixed (x) for example:\n\nthe
      first 50 kWh per month at a rate stem:[p]~1~,\n\nthe next 50 kWh per month at
      a rate stem:[p]~2~,\n\nremaining monthly consumption at a rate stem:[p]~3~,
      - or variable (xx) according to the size of premises the supplied (number of
      rooms, area, etc.), for example:\n\nfor premises of 1 room:\n\nthe first 200
      kWh per year at a rate stem:[p]~1~,\n\nremaining annual consumption at a rate
      stem:[p]~2~,\n\nfor premises of 2 rooms:\n\nthe first 300 kWh per year at a
      rate stem:[p]~1~,\n\nremaining annual consumption at a rate stem:[p]~2~,\n\nfor
      premises of 3 rooms, etc. - or variable, according to the demand or some other
      parameters, for example:\n\n100 kWh per kVA of the subscribed demand and per
      month at a rate stem:[p]~1~,\n\nremaining monthly consumption at a rate stem:[p]~2~.
      The size of the blocks and the kilowatthour rates may vary in certain cases
      according to the season of the year (e.g., winter, summer)."
  terms:
  - type: expression
    normative_status: preferred
    designation: block tariff
