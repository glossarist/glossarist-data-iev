  definition:
  - content: visual photometer in which the observer sees either an undivided field
      illuminated successively, or two adjacent fields illuminated alternately, by
      two sources to be compared, the {{frequency, urn:iec:std:iec:60050-103-06-02}}
      of alteration being conveniently chosen so that it is above the {{critical flicker
      frequency, urn:iec:std:iec:60050-845-22-093}} for colours but below the fusion
      frequency for brightness
