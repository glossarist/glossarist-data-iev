  definition:
  - content: quotient of luminous flux and the corresponding radiant flux for a specified
      photometric condition
  examples: []
  id: 845-21-090
  notes:
  - content: The photometric condition should be specified (e.g. photopic, scotopic,
      mesopic). If it is not specified, photopic vision is assumed and the symbol
      stem:[K] is used. For other photometric conditions, the respective symbol for
      identification shall be used.
  - content: Luminous efficacy of radiation for photopic vision is expressed bystem:[K
      = frac(Phi_("v"))(Phi_("e"))]where stem:[Φ]~v~ is luminous flux and stem:[Φ]~e~
      is radiant flux.
  - content: 'The value of the luminous efficacy of radiation for photopic vision
      for {{monochromatic radiation, urn:iec:std:iec:60050-845-21-014}} of {{frequency,
      urn:iec:std:iec:60050-103-06-02}} stem:[ν]~cd~ = 540 × 10^12^ Hz is defined
      as 683 lm·W^−1^ and denoted as stem:[K]~cd~. The corresponding wavelength, stem:[lambda_("cd")
      \  = n^(- 1) "P{cdotp}" c_(0) "P{cdotp}" nu_("cd")^(- 1)] (where stem:[n] is
      refractive index and stem:[c]~0~ is the {{speed of light in vacuum, urn:iec:std:iec:60050-113-01-34}})
      in standard air, i.e. dry air at 15 °C and 101 325 Pa, containing 0,045 % of
      carbon dioxide by volume (see P.E. Ciddor: _Refractive index of air: new equations
      for the visible and near infrared, Appl. Opt. Vol 35, No. 9_, 1996, pp. 1566-1573),
      is accepted to be 555,017 nm (rounded from 555,017 069 nm). This is very close
      to 555 nm, the wavelength where stem:[V](stem:[λ]) reaches its maximum. For
      photometric measurements made in air under real environmental conditions, the
      influence of the variation of the refractive index on stem:[λ]~cd~ with respect
      to standard air is typically in the range of a few picometres and can be neglected
      in most cases.'
  - content: See also "{{spectral luminous efficacy, urn:iec:std:iec:60050-845-21-091}}".
  - content: The luminous efficacy of radiation is expressed in lumen per watt (lm·W^−1^).
  - content: This entry was numbered 845-01-56 in IEC 60050-845:1987.
