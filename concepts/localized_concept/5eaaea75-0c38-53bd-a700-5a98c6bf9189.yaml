data:
  definition:
  - content: "condensateur dont le premier conducteur est une plaque métallique, le
      diélectrique est une très fine couche d’oxyde formée sur le métal et le second
      conducteur est un électrolyte\r\nNote 1 à l’article: Les condensateurs électrolytiques
      ont une grande capacité parce que le diélectrique est très mince. Note 2 à l’article:
      Il convient de ne pas confondre le condensateur électrolytique avec les supercondensateurs
      (114-03-03). Note 3 à l’article: La définition 436-03-05 dans la CEI 60050-436:1990
      ne mentionne pas d’électrolyte."
