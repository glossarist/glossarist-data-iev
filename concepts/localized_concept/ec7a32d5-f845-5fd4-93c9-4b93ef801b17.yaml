  - content: 'type de commande en boucle ouverte à actions de commande étape par étape,
      dans lequel la transition d''une étape à la suivante est déterminée par un programme
      en accord avec des conditions de transition spécifiéesNote 1 à l’article: Les
      étapes de la commande séquentielle correspondent aux conditions de fonctionnement
      discrètes consécutives du processus technique, par exemple plusieurs variables
      commandées finales ou plusieurs variables de référence.'
