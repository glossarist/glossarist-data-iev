  definition:
  - content: 'pour un élément multiposition, toute valeur de la variable d''entrée
      pour laquelle la valeur de la variable de sortie change VOIR: Figures 19 et
      20.Note 1 à l’article: La variation de la variable de sortie peut se produire
      à une paire de valeurs de commutation qui est à des valeurs différentes de la
      variable d’entrée en fonction de la direction de la variation; la différence
      de ces valeurs est appelée recouvrement (voir 351-50-25).'
