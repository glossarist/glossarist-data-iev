---
data:
  definition:
  - content: référence à une ou plusieurs {{norme, urn:iec:std:iec:60050-901-02-02}}s
      se substituant à l'énoncé de {{disposition, urn:iec:std:iec:60050-901-05-01}}s
      détaillées dans un {{règlement, urn:iec:std:iec:60050-901-02-10}}
  examples: []
  id: 901-06-14
  notes:
  - content: Une référence aux normes peut être datée, non datée ou générale; elle
      peut être exclusive ou indicative.
  - content: Une référence aux normes peut être liée à une disposition légale plus
      générale se référant à l'{{état actuel de la technique, urn:iec:std:iec:60050-901-01-04}}
      ou à des {{règles techniques reconnues, urn:iec:std:iec:60050-901-01-05}}. Une
      telle disposition peut également se suffire à elle-même.
