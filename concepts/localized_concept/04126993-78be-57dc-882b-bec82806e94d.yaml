---
data:
  definition:
  - content: 'pour un bipôle résistif, élémentaire ou non, de bornes A et B, quotient
      de la tension électrique ({{131-11-56, urn:iec:std:iec:60050-131-11-56}}) stem:[u]~AB~
      entre les bornes par le courant électrique stem:[i] dans le bipôle stem:[R =
      frac(u_(rm(AB)))(i)] où le courant est positif si le sens du courant est de
      A vers B et négatif si son sens est de B vers ANote 1 à l’article: Une résistance
      ne peut pas être négative. Note 2 à l’article: Le terme «résistance» désigne
      aussi elliptiquement la résistance en courant alternatif ({{131-12-45, urn:iec:std:iec:60050-131-12-45}}).
      Note 3 à l’article: En français, le terme «résistance» désigne aussi un dispositif,
      en anglais «resistor» (voir {{151-13-19, urn:iec:std:iec:60050-151-13-19}}).
      Note 4 à l’article: L’unité SI cohérente de résistance est l’ohm, Ω.'
