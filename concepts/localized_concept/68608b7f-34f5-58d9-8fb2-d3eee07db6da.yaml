data:
  definition:
  - content: coefficient de luminance multiplié par le cube du cosinus de l'angle
      d'incidence de la lumière en un point d'une surface
  examples: []
  id: 845-21-103
  notes:
  - content: Le coefficient de luminance réduite peut être exprimé par l'équationstem:[r] =
      stem:[q](cos stem:[ε])^3^^où^ stem:[q] est le coefficient de luminance en stéradian
      à la puissance moins un (sr^−1^), et stem:[ε] est l'angle d'incidence en degré
      (°).
  - content: L'angle d'observation, stem:[α], affecte la valeur de stem:[r]. Par convention,
      cet angle est fixé à 1° pour les calculs associés à l'éclairage routier.
  - content: Le coefficient de luminance réduite est exprimé en stéradian à la puissance
      moins un (sr^−1^).
