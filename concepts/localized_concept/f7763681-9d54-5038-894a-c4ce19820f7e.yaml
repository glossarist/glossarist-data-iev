  definition:
  - content: section de groupe primaire ou suite de sections de groupe primaire, située
      entre les points de deux répartiteurs de groupes primaires, ou des points équivalents,
      auxquels sont connectés les terminaux où les groupes primaires sont produits
      ou aboutissent
  examples: []
  id: 704-11-06
  notes:
  - content: Sauf spécification contraire une liaison en groupe primaire assure une
      transmission dans les deux sens.
  - content: On définit de la même manière la "liaison en groupe secondaire", la "liaison
      en groupe tertiaire", la "liaison en groupe quaternaire", la "liaison en hypergroupe"
      ou "liaison en assemblage de 15 groupes secondaires".
