---
data:
  definition:
  - content: loi empirique énonçant que si deux stimuli de couleurs A et B sont perçus
      comme ayant la même luminosité, et si deux autres stimuli de couleurs C et D
      sont également perçus comme ayant la même luminosité, alors les mélanges additifs
      de A et C et de B et D sont aussi perçus comme ayant la même luminosité
  examples: []
  id: 845-23-035
