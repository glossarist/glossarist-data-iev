  definition:
  - content: property of a function stem:[f ( t )] for a value stem:[t]~0~ of its
      argument, characterised by the existence of a positive number stem:[ε] such
      that stem:[f ( t_(0) ) lt f ( t )] for any stem:[t] with stem:[0 lt | t - t_(0)
      | lt epsilon]
  examples: []
  id: 103-05-16
  notes:
  - content: If the condition stem:[f ( t_(0) ) lt f ( t )] is replaced with stem:[f
      ( t_(0) ) le f ( t )], the property may occur for an interval of values of the
      argument.
