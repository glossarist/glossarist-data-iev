data:
  definition:
  - content: résistance entre deux électrodes en contact avec la surface à mesurer,
      exprimée en ohms
  examples: []
  id: 426-25-06
  notes:
  - content: 'Une configuration commune (donnée, par exemple, dans l''IEC 60079-0,
      _Atmosphères explosives – Partie 0: Matériel – Exigences générales_) utilise
      des électrodes parallèles, de 100 mm de long et espacées de 10 mm.'
  - content: La résistance superficielle dépend de la configuration des électrodes.
      La résistance superficielle mesurée avec la configuration d'électrodes citée
      en exemple est dix fois inférieure à la résistivité superficielle.
  - content: Il est préférable d'utiliser des électrodes conductrices revêtues de
      bandes de caoutchouc plutôt que des électrodes revêtues d'une peinture argentée.
