  definition:
  - content: type of control for which the performance index reaches a largest or
      smallest value under specified conditions
  examples: []
  id: 351-47-41
  notes:
  - content: Performance index is a mathematical expression which characterises the
      quality of control under given conditions.
  - content: The determination of optimal control parameters frequently results from
      minimising integral criteria which are often called control areas from the geometric
      interpretation of the integral. The most important ones are:stem:[I_("IAE")
      = int_(0)^(oo) |e (t)| * "d" t] Criterion of Integral Absolute Errorstem:[I_("ISE")
      = int_(0)^(oo) e^(2) (t) * "d" t] Criterion of Integral Squared Errorstem:[I_("ITAE")
      = int_(0)^(oo) t * |e (t)| * "d" t] Criterion of Integral of Time multiplied
      Absolute value of ErrorTherein stem:[e](stem:[t]) is the control difference
      variable as a function of time as answer to an input appropriate to the technological
      task, for example a response to a stepwise change of the reference variable.
  - content: This entry was numbered 351-26-35 in IEC 60050-351:2006.
