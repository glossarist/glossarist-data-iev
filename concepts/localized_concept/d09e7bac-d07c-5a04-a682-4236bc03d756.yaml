  definition:
  - content: the voltage which appears across the terminals of a pole of a switching
      device or a fuse after the breaking of the current
  examples: []
  id: 441-17-25
  notes:
  - content: This voltage may be considered in two successive intervals of time, one
      during which a transient voltage exists, followed by a second one during which
      the power frequency or the steady-state recovery voltage alone exists.
