  definition:
  - content: for a sinusoidal quantity stem:[a ( t ) = hat(A) "cos" ( omega " " t
      + vartheta_(0) )], complex quantity stem:[underline(a) ( t ) = hat(A) &amp;lsqb;
      "cos" ( omega " " t + vartheta_(0) ) + rm(j) " " "s" "i" "n" ( omega " " t +
      vartheta_(0) ) &amp;rsqb; = hat(A) "exp" &amp;lsqb; rm(j) ( omega " " t + vartheta_(0)
      ) &amp;rsqb; = hat(A) "exp" ( rm(j) omega " " t ) "exp" ( rm(j) vartheta_(0)
      )] where j is the imaginary unit, stem:[hat(A)] is complex amplitude, stem:[omega]
      is angular frequency, and stem:[vartheta_(0)] is initial phase
  examples: []
  id: 103-07-12
  notes:
  - content: The instantaneous value of the quantity is the real part of its complex
      representation.
