  - content: L'expression "ligne de transmission" et le mot "ligne" dans un terme
      composé désignent souvent de façon restrictive une ligne destinée à guider des
      ondes électromagnétiques dans le mode TEM, ordinairement un ensemble de deux
      fils parallèles ou de deux conducteurs coaxiaux.
