  definition:
  - content: "скрученная токопроводящая жила, в которой промежутки между составляющими
      элементами уменьшены путем механического обжатия, вытягивания или за счет соответствующего
      выбора формы и расположения проволок\r\nПримечание. Французский термин «ame
      en paves» означает частично уплотненная токопроводящая жила большого сечения
      состоящая из нескольких проволок фасонного сечения"
