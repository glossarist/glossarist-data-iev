  definition:
  - content: "{{energy not supplied, urn:iec:std:iec:60050-692-09-06}} by an {{electric
      power system, urn:iec:std:iec:60050-692-01-02}} during a given incident divided
      by the annual peak load"
  examples: []
  id: 692-11-03
  notes:
  - content: If the energy not supplied is expressed in megawatt-minutes, and the
      annual peak load in megawatts, this index is often referred to as "system-minutes".
      One minute of this quantity is equivalent in energy to an interruption of the
      total system load for one minute at the time when the annual system peak load
      occurs.
  - content: The annual system peak load refers to the highest load in that year.
  - content: This entry was numbered 191-30-03 in IEC 60050-191:1990.
