  definition:
  - content: ensemble de grandeurs associé à un ensemble de relations non contradictoires
      entre ces grandeurs
  examples: []
  id: 112-01-07
  notes:
  - content: Les grandeurs ordinales, telles que la dureté C de Rockwell, ne sont
      généralement pas considérées comme faisant partie d'un système de grandeurs,
      parce qu'elles ne sont reliées à d'autres grandeurs que par des relations empiriques.
      Les propriétés qualitatives, telles que la couleur d’une lumière, ne sont pas
      des grandeurs et ne font donc pas partie d’un système de grandeurs.
