  definition:
  - content: "en un point donné à l’intérieur d’un élément d’espace de volume quasi-infinitésimal
      stem:[V], grandeur vectorielle égale au quotient, par le volume stem:[V], de
      la somme, étendue à tous les porteurs de charge libres situés à l'intérieur
      de l’élément d’espace, des produits de leur charge électrique par leur vitesse:\r\nstem:[J
      = frac(1)(V) sum_(i = 1)^(n) Q_(i) \" \" v_(i)]   \r\noù stem:[n] est le nombre
      de porteurs de charge libres à l'intérieur de l’élément d’espace, stem:[Q]~stem:[i]~
      \ la charge électrique du porteur de rang stem:[i] et *stem:[v]*~stem:[i]~ sa
      vitesse."
  examples: []
  id: 121-11-11
  notes:
  - content: "Le flux de la densité de courant électrique stem:[*J*]  à travers une
      surface orientée quelconque S est égal au courant électrique stem:[I] à travers
      cette surface:\r\nstem:[I = int_(\"S\") J * e_(n) \"d\" A]\r\noù stem:[*e*]~n~dstem:[A]
      est l'élément vectoriel de surface."
