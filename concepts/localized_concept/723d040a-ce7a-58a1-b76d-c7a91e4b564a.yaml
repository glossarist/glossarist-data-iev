      spécifiée.
  - content: La puissance de seuil est considérée comme étant égale à la puissance
      isotrope rayonnée équivalente (PIRE), selon l'UIT-R BS.561-2, _Definitions of
      radiation in LF, MF and HF broadcasting bands_.
