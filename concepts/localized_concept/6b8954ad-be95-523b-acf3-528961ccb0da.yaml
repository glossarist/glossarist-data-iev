  definition:
  - content: quantity of dimension 1 characterizing the relative importance of forced
      convection and thermal conduction, defined by stem:[P e = frac(rho " " c_(p)
      " " v " " l)(lambda) = frac(v " " l)(alpha)], where stem:[ρ] is mass density,
      stem:[c~p~] is specific heat capacity at constant pressure, stem:[v] is speed,
      stem:[l] is a specified length, stem:[λ] is thermal conductivity, and stem:[α]
      is thermal diffusivity
  examples: []
  id: 113-04-57
  notes:
  - content: The Péclet number is the product of the Reynolds number stem:[Re] and
      the Prandtl number stem:[Pr], thus stem:[Pe] = stem:[Re] ⋅ stem:[Pr].
