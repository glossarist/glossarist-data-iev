data:
  definition:
  - content: "défaillances des différentes entités caractérisées par le même mode
      de défaillance\r\nNote 1 à l’article: Les défaillances de mode commun peuvent
      avoir des causes différentes. Note 2 à l’article: Les défaillances de mode commun
      peuvent également être des défaillances de cause commune ({{IEV 192-03-18, urn:iec:std:iec:60050-192-03-18}}).
      Note 3 à l’article: L’éventualité de défaillances de mode commun réduit l’efficacité
      de la redondance du système."
