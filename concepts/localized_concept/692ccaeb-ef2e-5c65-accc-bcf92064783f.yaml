  definition:
  - content: at a point on the surface separating two media with different thermodynamic
      temperatures, magnitude of the density of heat flow rate *stem:[φ]* divided
      by the absolute value of temperature difference Δstem:[T], thus stem:[K = frac(|phi|)(|Delta
      " " T|)]
  examples: []
  id: 113-04-39
  notes:
  - content: The coefficient of heat transfer is zero for an adiabatic boundary and
      infinity for a diathermic boundary.
  - content: The name “thermal transmittance” and the symbol stem:[U] are mainly used
      in building technology.
  - content: The coherent SI unit of coefficient of heat transfer is watt per square
      metre kelvin, W/(m^2^·K).
