  definition:
  - content: mean value of the {{joint information content, urn:iec:std:iec:60050-171-07-20}}
      of the events in a finite set of mutually exclusive and jointly exhaustive events
      stem:[H ( X , Y ) = sum_(i = 1)^(n) sum_(j = 1)^(m) p ( x_(i) , y_(j) ) * I
      ( x_(i) , y_(j) )]  where stem:[X = {x_(1) , " " ... , " " x_(n)}] is the set
      of events stem:[x_(i) (i = 1, " " ... , " " n)], stem:[Y = {y_(1) , " " ...
      , " " y_(m)}] is the set of events stem:[y_(j) (j = 1, " " ... , " " m)], stem:[I
      (x_(i) , y_(j))] is the joint information content of stem:[x_(i)] and stem:[y_(j)],
      and stem:[p (x_(i) , y_(j))] the joint probability that both events occur
