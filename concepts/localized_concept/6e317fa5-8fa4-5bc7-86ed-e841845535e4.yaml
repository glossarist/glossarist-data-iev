  definition:
  - content: "{{transmission channel, urn:iec:std:iec:60050-701-02-01}} associated
      with the {{forward channel, urn:iec:std:iec:60050-721-11-06}} permitting the
      dispatch of acknowledge and other function control signals in the direction
      opposite to that of the forward channel"
  examples: []
  id: 721-11-07
  notes:
  - content: In the case of simultaneous transfer of information in both directions,
      the backward channel is at any instant in the direction opposite to that of
      the transfer of user's information.
