  definition:
  - content: "unité fonctionnelle qui génère sa variable de sortie en fonction de
      sa variable d'entrée selon une fonction mathématique définie et invariante dans
      le tempsstem:[v (t) = f &amp;lsqb; u (t) &amp;rsqb;]où<table>\r\n<tr>\n<td>stem:[t]</td>\n<td>est
      le temps;</td>\n</tr>\r\n<tr>\n<td>\nstem:[u](stem:[t])</td>\n<td>est la variable
      d’entrée;</td>\n</tr>\r\n<tr>\n<td>stem:[f]</td>\n<td>est la fonction;</td>\n</tr>\r\n<tr>\n<td>\nstem:[v](stem:[t])</td>\n<td>est
      la variable de sortie.</td>\n</tr>\r\n</table>"
