  definition:
  - content: improvement of superconducting characteristics of a superconducting coil
      after it has been cycled in temperature or magnetic field and quenched several
      times
  examples: []
  id: 815-15-49
  notes:
  - content: The operating characteristics, usually the current-carrying capacity
      of the superconducting wire, tend to improve toward short-sample characteristics.
  - content: 'Short sample characteristics: the current-carrying capacity of a superconducting
      wire as measured on a short sample usually less than several meters long in
      a background magnetic field transverse to the direction of current flow.'
