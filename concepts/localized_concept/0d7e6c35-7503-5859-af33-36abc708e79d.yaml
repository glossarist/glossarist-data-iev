  definition:
  - content: frequency of an electromagnetic disturbance causing an unintended response
      from a given equipment
  examples: []
  id: 161-06-06
  notes:
  - content: "In the case of a receiver tuned to frequency stem:[f]~0~, many spurious
      frequencies stem:[f]~s~ can be found from the following formulae:\r\nstem:[f_(\"s\")
      = frac(1)(m) (n f_(\"L\") pm f_(\"I\"))]\r\nor\n\nstem:[f_(\"s\") = frac(f_(0))(h)]\r\nwhere
      \r\nstem:[f]~L~ is the local oscillator frequency,\n\nstem:[f]~I~ is the intermediate
      frequency,\n\nstem:[m], stem:[n], and stem:[h] are integers."
