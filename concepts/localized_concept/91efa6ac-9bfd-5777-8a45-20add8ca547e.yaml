---
data:
  definition:
  - content: "modification d’un logiciel permettant d’en éliminer les pannes, de l’adapter
      à un nouvel environnement ou d’améliorer ses performances\r\nNote 1 à l’article:
      Les opérations de maintenance logicielle effectuées pour atteindre ces trois
      objectifs sont appelées respectivement maintenance corrective ({{192-06-06,
      urn:iec:std:iec:60050-192-06-06}}), maintenance adaptative ({{192-06-16, urn:iec:std:iec:60050-192-06-16}})
      et maintenance améliorante ({{192-06-17, urn:iec:std:iec:60050-192-06-17}}).
      Note 2 à l’article: Après une maintenance, l’état d’un logiciel est différent
      de son état précédent."
