---
data:
  definition:
  - content: ensemble de particules solides fines, de taille nominale 500 µm ou moins,
      qui peuvent former des mélanges explosifs avec l'air dans des conditions de
      pression atmosphérique et de température normales
  examples: []
  id: 426-02-18
  notes:
  - content: Tous les types de poussière définis dans l'ISO 4225:1994, _Qualité de
      l'air – Aspects généraux – Vocabulaire_ sont compris.
  - content: Le terme de "particules solides" désigne les particules en phase solide
      et non les phases liquides ou gazeuses, mais n'exclut pas une particule creuse.
