data:
  definition:
  - content: 'fréquence pour laquelle la valeur de l''admittance d''un résonateur
      sans pertes devient nulleNote 1 à l’article: Lorsque le facteur de couplage
      électromécanique est faible, une valeur approchée de cette fréquence est donnée
      par l''expression stem:[f_("p") " " " " " " " " = " " " " " " " " " " " " " "
      " " frac(1)(2 pi " " " " " " sqrt(L_(1) frac(C_(1) C_(0))(C_(1) + C_(0))))]où
      stem:[C]~0~ représente la capacité parallèle et stem:[L]~1~ et stem:[C]~1~ respectivement
      l’inductance dynamique et la capacité dynamique. L’expression peut être déduite
      de la Figure 2 avec stem:[R]~1~ = 0. image::/assets/images/parts/561/[] *Figure
      2 – Circuit équivalent d’un vibrateur piézoélectrique (résonateur monoporte)*'
