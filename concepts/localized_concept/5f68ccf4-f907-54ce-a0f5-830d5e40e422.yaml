  definition:
  - content: qualifie un élément de circuit ou un circuit dans lequel l’intégrale
      de la puissance instantanée n'est pas toujours positive sur tout intervalle
      de temps commençant avant la première alimentation en énergie électrique
  examples: []
  id: 131-11-36
  notes:
  - content: En régime périodique, l'intervalle d'intégration peut comporter un nombre
      fini de périodes au lieu de commencer à moins l'infini. L'intégrale de la puissance
      instantanée est alors nulle.
