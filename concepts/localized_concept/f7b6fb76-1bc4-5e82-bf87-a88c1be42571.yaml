  definition:
  - content: ratio, usually expressed in decibels, between the power supplied by the
      transmitter of a radio link and the power supplied to the corresponding receiver
      in actual installation, propagation and operational conditions
  examples: []
  id: 713-02-09
  notes:
  - content: "– It is necessary to specify in each case the points at which the power
      supplied by the transmitter and the power supplied to the receiver are determined,
      for example: \r\n– before or after the radio-frequency filters or multiplexers
      that may be employed at the sending or the receiving end, \r\n– at the input
      or at the output of the transmitting and receiving antenna feed lines."
