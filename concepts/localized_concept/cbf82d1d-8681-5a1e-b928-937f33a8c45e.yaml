  definition:
  - content: the difference between the basic transmission loss and the free-space
      basic transmission loss, expressed in decibels
  examples: []
  id: 705-08-07
  notes:
  - content: "Loss relative to free space may be divided into losses of different
      types, such as:\r\n- absorption loss, for example by ionospheric, atmospheric
      gases or hydrometeors;\n\n- diffraction loss, as for ground waves;\n\n- effective
      reflection or scattering loss as in the ionospheric case including the results
      of any ionospheric focussing or defocussing;\n\n- polarization coupling loss,
      which can arise from any polarization mismatch between the antennas for the
      particular ray path considered;\n\n- antenna gain degradation, as in tropospheric
      scatter propagation;\n\n- losses due to phase interference between the direct
      ray and rays reflected from the ground, other obstacles or atmospheric layers."
  terms:
