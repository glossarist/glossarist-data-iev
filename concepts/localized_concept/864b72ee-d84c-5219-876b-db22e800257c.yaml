data:
  definition:
  - content: notation symbolique exprimée formellement comme un vecteur, utilisée
      pour représenter des opérateurs différentiels scalaires ou vectoriels s'appliquant
      en tout point d'un domaine déterminé de l'espace à des scalaires ou à des vecteurs,
      et qui, en coordonnées cartésiennes orthonormées, est représentée par  stem:[mathbf(nabla)
      = e_(x) frac(del)(del " " x) + e_(y) frac(del)(del " " y) + e_(z) frac(del)(del
      " " z)] où stem:[e_(x) ", " e_(y) ", " e_(z)] sont les vecteurs unités des axes
      stem:[x], stem:[y], stem:[z]
  examples: []
  id: 102-05-18
  notes:
  - content: Il est recommandé d'imprimer le symbole *∇* en gras.
