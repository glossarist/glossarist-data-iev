  definition:
  - content: qualifie un élément de circuit ou un circuit pour lequel les relations
      entre les grandeurs intégrales sont linéaires
  examples: []
  id: 131-11-18
  notes:
  - content: "Une relation stem:[y] = stem:[F(x)] entre deux grandeurs stem:[x] et
      stem:[y], où stem:[F] est un opérateur, est linéaire si\n\nstem:[F](stem:[α]
      stem:[x]~1~ + stem:[β]stem:[x]~2~) = stem:[α] stem:[F](stem:[x]~1~) + stem:[β]
      stem:[F](stem:[x]~2~) \r\nstem:[α] et stem:[ß] étant des nombres réels ou complexes."
  - content: En anglais, le terme "linear" a un autre sens dans IEV {{112-03-14:2010,
      urn:iec:std:iec:60050-112-03-14}} et {{113-06-41:2011, urn:iec:std:iec:60050-113-06-41}}.
      En français, le terme équivalent est "linéique".
