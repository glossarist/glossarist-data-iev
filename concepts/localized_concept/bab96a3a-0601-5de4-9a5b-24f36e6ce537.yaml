  examples: []
  id: 845-24-041
  notes:
  - content: Fluorescent materials absorb energy from optical radiation in the shorter
      wavelength regions of the visible spectrum and/or in the ultraviolet region
      and re-radiate some of this energy at longer wavelengths, producing narrow bands
      of emission in the visible region.
  - content: See also "{{photoluminescent material, urn:iec:std:iec:60050-845-24-040}}",
      "{{daylight fluorescent colour, urn:iec:std:iec:60050-845-22-055}}".
