---
data:
  definition:
  - content: "{{polarisation, urn:iec:std:iec:60050-705-01-13}} telle que, pour un
      observateur regardant dans la {{direction de propagation, urn:iec:std:iec:60050-705-02-15}}
      ou dans une direction de référence spécifiée, le vecteur {{champ électrique,
      urn:iec:std:iec:60050-121-11-18}} ou un vecteur de champ spécifié tourne, en
      fonction du temps, dans un plan fixe normal à cette direction et dans le sens
      des aiguilles d'une montre"
  examples: []
  id: 705-01-18
  notes:
  - content: Il est nécessaire de spécifier la direction de référence quand la direction
      de propagation est parallèle au {{plan de polarisation, urn:iec:std:iec:60050-705-01-22}}.
