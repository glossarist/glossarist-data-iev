  definition:
  - content: overvoltage with a duration of a few milliseconds or less, oscillatory
      or non-oscillatory, usually highly damped
  examples: []
  id: 614-03-14
  notes:
  - content: Transient overvoltages may be immediately followed by temporary overvoltages.
      In such cases the two overvoltages are considered as separate events.
  - content: IEC 60071-1 defines three types of transient overvoltages, namely slow-front
      overvoltages, fast-front overvoltages and very fast-front overvoltages according
      to their time to peak, tail or total duration, and possible superimposed oscillations.
