  examples: []
  id: 713-03-05
  notes:
  - content: In the ITU Radio Regulations, the land mobile service is a terrestrial
      radiocommunication service.
  - content: The land mobile service includes radiocommunications within tunnels and
      underground mines and in certain cases, for example in citizen's bands, includes
      coastal maritime areas.
