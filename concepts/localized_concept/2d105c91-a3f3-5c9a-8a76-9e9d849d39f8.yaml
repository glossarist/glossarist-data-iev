  definition:
  - content: deformation of a body due to electric polarization arising from an applied
      electric field and identical on reversal of the electric field strength
  examples: []
  id: 121-12-26
  notes:
  - content: For an isotropic substance, electrostriction increases the volumic mass
      of the body proportionally to the square of the magnitude of the electric field
      strength.
