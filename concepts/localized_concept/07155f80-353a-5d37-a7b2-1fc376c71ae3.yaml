  definition:
  - content: diffusion d'un rayonnement par la matière suivant des directions formant
      des angles supérieurs à 90° par rapport à sa direction initiale
  examples: []
  id: 881-03-20
  notes:
  - content: En radiothérapie, ce terme s'applique particulièrement au rayonnement
      diffusé vers la peau par les tissus sous-jacents. Dans les mesures de radioactivité,
      il s'applique à la diffusion des particules dans le dispositif de mesure par
      la matière sur laquelle est monté l'échantillon.
