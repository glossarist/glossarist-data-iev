  definition:
  - content: time required for the output to change, after a step variation from one
      steady input to another steady input, by the fraction (1&#160;&minus;&#160;1/e)
      of its total change in value, where the total change in value is the difference
      between the initial value and the final (asymptotic) value
  examples: []
