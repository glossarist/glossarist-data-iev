  id: 561-02-77
  notes:
  - content: The impulse response of a transversal filter is given by the convolution
      of the impulse response of the first IDT with the conjugate complex impulse
      response of the second IDT. The frequency response is given by the Fourier transform
      of the impulse response. A simple example of a transversal filter is shown in
      Figure 16. image::/assets/images/parts/561/[] *Figure 16 – Transversal filter*
