  definition:
  - content: potentiel vecteur de l'induction magnétique
  examples: []
  id: 121-11-23
  notes:
  - content: |-
      Le rotationnel du potentiel vecteur magnétique stem:[*A*] est l'induction magnétique stem:[*B*]:

      *rot*stem:[*A*] = stem:[*B*]
  - content: Le potentiel vecteur magnétique n'est pas unique puisqu’un champ vectoriel
      irrotationnel quelconque peut être ajouté à un potentiel vecteur magnétique
      donné sans changer son rotationnel. En régime statique le potentiel vecteur
      magnétique est souvent choisi de telle sorte que sa divergence soit nulle.
