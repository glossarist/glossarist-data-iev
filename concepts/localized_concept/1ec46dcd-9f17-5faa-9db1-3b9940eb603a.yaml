data:
  definition:
  - content: "{{télécommunication, urn:iec:std:iec:60050-701-01-05}} {{unilatérale,
      urn:iec:std:iec:60050-701-03-18}} à l'intention d'un grand nombre de destinataires
      qui disposent des installations de réception appropriées, effectuée par des
      moyens radioélectriques ou par des réseaux de câbles"
  examples:
  - content: Radiodiffusion sonore, radiodiffusion visuelle, {{vidéographie diffusée,
      urn:iec:std:iec:60050-701-01-18}}, diffusion de signaux horaires ou d'avis aux
      navigateurs, diffusion des actualités par les agences de presse.
  id: 701-01-32
  notes:
  - content: La télédiffusion est une {{communication point à zone, urn:iec:std:iec:60050-713-02-16}}.
  - content: Lorsque le mot "broadcasting" est employé en anglais sans qualificatif,
      il convient de considérer, sauf indication contraire du contexte, que sa signification
      est celle de "télédiffusion par ondes radioélectriques".
