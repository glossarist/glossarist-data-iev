      température relativement basse, à l’aide d’un gaz porteur jusqu''à la zone de
      réaction. Après réaction, les produits sont déposés sur un substrat (par exemple:
      MOCVD, CVD halogène, CVD assisté par plasma, CVD assisté par laser).'
