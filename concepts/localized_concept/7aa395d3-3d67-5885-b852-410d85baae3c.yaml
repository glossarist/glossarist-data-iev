  definition:
  - content: a mechanical switching device, the moving contacts of which return to
      and remain in the open position when the opening operation is initiated after
      the initiation of the closing operation, even if the closing command is maintained
  examples: []
  id: 441-16-31
  notes:
  - content: To ensure proper breaking of the current which may have been established,
      it may be necessary that the contacts momentarily reach the closed position.
  terms:
  - type: expression
    normative_status: preferred
    designation: trip-free mechanical switching device
