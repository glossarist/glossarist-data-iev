  definition:
  - content: the justification ratio that occurs when the digit rate of the original
      digital signal is at its lower tolerance limit and the digit rate of the channel
      provided for conveying it by justification is at its upper tolerance limit
  examples: []
  id: 704-21-14
  notes:
  - content: The maximum justification ratio is the limiting value that can actually
      occur under practical operating conditions.
