  definition:
  - content: product of geometric extent and the squared refractive index of a medium
      through which the beam propagates
  examples: []
  id: 845-21-048
  notes:
  - content: The optical extent is invariant and remains constant when the beam is
      propagating through successive non-diffusing media.
  - content: See also "{{geometric extent, urn:iec:std:iec:60050-845-21-047}}".
  - content: The optical extent is expressed in square metre times steradian (m^2^·sr).
