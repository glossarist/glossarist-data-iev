  definition:
  - content: logarithm of the number of events in a finite set of stem:[n] mutually
      exclusive events stem:[H]~0~&equals;log stem:[n]
  examples:
  - content: "The decision content of a set of three events is:\r\nstem:[[[H_(\"0\")
      \"=\" (\"lb 3\") \"Sh\" approx \"1\" \",585\" \" \" \"Sh\"], [\" \" \" \" \" \"
      \"=\" (\"ln 3\") \"nat\" approx \"1\" \",099\" \" \" \"nat\"], [\" \" \" \"
      \" \" \"=\" (\"lg 3\") \"Hart\" approx \"0\" \",477\" \" \" \"Hart\"]]]"
  id: 171-07-10
  notes:
  - content: 'The base of the logarithm determines the unit used. Commonly used units
      are: shannon (symbol Sh) for logarithms of base 2, natural unit (symbol nat)
      for logarithms of base e, hartley (symbol Hart) for logarithms of base 10. Conversion
      table: stem:[[[1   " " "Sh", approx, 0,693   " " "nat", approx, 0,301   " "
      "Hart"], [1   " " "nat", approx, 1,433   " " "Sh", approx, 0,434 " "   "Hart"],
      [1   " " "Hart", approx, 3,322   " " "Sh", approx, 2,303   " " "nat"]]]'
  - content: The decision content is independent of the probabilities of the occurrence
      of the events.
  - content: The number of decisions needed to select a specific event out of a finite
      set of mutually exclusive events equals the smallest integer which is greater
      than or equal to the decision content when the base of the logarithm is the
      number of choices on each decision.
  - content: When the same integer base is used for the same number of events, the
      decision content equals the {{maximum entropy, urn:iec:std:iec:60050-171-07-16}}.
