  definition:
  - content: linear time-invariant transfer element created by the additive combination
      of a proportional element, an integral element and a derivative element
  examples: []
  id: 351-50-19
  notes:
  - content: "The transfer function of an ideal proportional plus integral plus derivative
      element is given bystem:[frac(V (s))(U (s)) = K_(\"Ρ\") * (1 + frac(1)(T_(\"i\")
      * s) + T_(\"d\") * s)]where<table>\r\n<tr>\n<td>\nstem:[K]~P~\n</td>\n<td>is
      the proportional action coefficient;</td>\n</tr>\r\n<tr>\n<td>\nstem:[T]~d~\n</td>\n<td>is
      the rate time;</td>\n</tr>\r\n<tr>\n<td>\nstem:[T]~i~\n</td>\n<td>is the reset
      time;</td>\n</tr>\r\n<tr>\n<td>stem:[s]</td>\n<td>is the complex variable of
      the Laplace transform;</td>\n</tr>\r\n<tr>\n<td>\nstem:[U](stem:[s])</td>\n<td>is
      the input transform;</td>\n</tr>\r\n<tr>\n<td>\nstem:[V](stem:[s])</td>\n<td>is
      the output transform.</td>\n</tr>\r\n</table>"
