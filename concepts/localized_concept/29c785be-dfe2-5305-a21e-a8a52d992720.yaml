  id: 705-03-23
  notes:
  - content: "L'impédance intrinsèque d'un milieu homogène et isotrope est:\r\nstem:[Z_(\"i\")
      = sqrt(frac(mu_(0) underline(mu)_(\"r\"))(epsilon_(0) underline(epsilon)_(\"r\")))]\r\noù\n\nstem:[μ]~0~
      est la constante magnétique,\n\nstem:[<u>μ</u>]~r~ est la perméabilité relative
      complexe,\n\nstem:[ε]~0~ est la constante électrique,\n\nstem:[<u>ε</u>]~r~
      est la permittivité relative complexe"
