data:
  definition:
  - content: "{{distorsion, urn:iec:std:iec:60050-702-07-43}} d'un {{signal, urn:iec:std:iec:60050-101-12-02}}
      qui résulte de la {{quantification, urn:iec:std:iec:60050-702-04-07}} d'un signal
      original"
  examples: []
  id: 702-07-69
  notes:
  - content: L'emploi des termes "distorsion de quantification" et "bruit de quantification"
      est généralement limité au cas où les valeurs à quantifier sont dans la {{plage
      de fonctionnement, urn:iec:std:iec:60050-704-24-10}} du quantificateur.
  - content: Le terme "bruit de quantification" peut être employé parce que le signal
      quantifié apparaît généralement comme la superposition d'un signal porteur d'{{informations,
      urn:iec:std:iec:60050-101-12-01}} et d'un {{bruit aléatoire, urn:iec:std:iec:60050-161-02-14}}.
