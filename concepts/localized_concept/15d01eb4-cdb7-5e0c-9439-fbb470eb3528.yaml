  definition:
  - content: any of the stem:[n] scalar quantities stem:[Q_(1) ", " Q_(2) ", " ...
      ", " Q_(n)] in the representation of a vector quantity *stem:[Q]* as the linear
      combination stem:[Q_(1) a_(1) + Q_(2) a_(2) + ... + Q_(n) a_(n)] of the base
      vectors stem:[a_(1) ", " a_(2) ", " ... ", " a_(n)]
  examples: []
  id: 102-03-22
  notes:
  - content: "Instead of treating each component of a vector quantity as a quantity
      (i.e. the product of a numerical value and a unit of measurement), the vector
      quantity *stem:[Q]* may be represented as a vector of numerical values multiplied
      by the unit:\n\nstem:[Q = {Q_(1)} \" \" &amp;lsqb; Q &amp;rsqb; \" \" e_(1)
      + {Q_(2)} \" \" &amp;lsqb; Q &amp;rsqb; \" \" e_(2) + {Q_(3)} \" \" &amp;lsqb;
      Q &amp;rsqb; \" \" e_(3) = ({Q_(1)} \" \" e_(1) + {Q_(2)} \" \" e_(2) + {Q_(3)}
      \" \" e_(3)) \" \" &amp;lsqb; Q &amp;rsqb;] \nwhere stem:[{Q_(1)} , \" \" {Q_(2)}
      , \" \" {Q_(3)}] are numerical values, stem:[&amp;lsqb; Q &amp;rsqb;] is the
      unit, and stem:[e_(1) \", \" e_(2) \", \" e_(3) \" \"] are the unit vectors.
      Similar considerations apply to tensor quantities."
  - content: The components of a vector quantity are transformed by a coordinate transformation
      like the coordinates of a position vector.
  - content: The term "coordinate" is generally used when the vector quantity is a
      position vector. This usage is consistent with the definition of the coordinates
      of a vector in mathematics ({{IEV 102-03-09, urn:iec:std:iec:60050-102-03-09}}).
