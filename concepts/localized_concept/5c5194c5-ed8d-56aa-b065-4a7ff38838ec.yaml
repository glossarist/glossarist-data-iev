  definition:
  - content: "{{unidirectional, urn:iec:std:iec:60050-701-03-18}} {{telecommunication,
      urn:iec:std:iec:60050-701-01-05}} intended for a large number of users having
      appropriate receiving facilities, and carried out by means of radio or by cable
      networks"
  examples:
  - content: "Sound broadcasting, television broadcasting, {{broadcast videography,
      urn:iec:std:iec:60050-701-01-18}}, distribution of time signals and navigational
      warnings, distribution of news from press agencies. \r\nNote 1  to entry: Broadcasting
      is a {{point-to-area communication, urn:iec:std:iec:60050-713-02-16}}."
  id: 701-01-32
  notes:
  - content: In English, it should be assumed that “broadcasting by radio waves” is
      intended where the word “broadcasting” is used without qualification, unless
      the context indicates otherwise.
