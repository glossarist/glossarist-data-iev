  definition:
  - content: "pour une tôle magnétique, rapport exprimé en pourcentage de la différence
      entre les pertes magnétiques, stem:[P~α~], mesurées sous un angle stem:[α] par
      rapport à la direction du laminage, et les pertes magnétiques, stem:[P]~0~,
      mesurées dans la direction du laminage, à cette valeur stem:[P]~0~:\r\nstem:[T_(\"L\")
      = frac(P_(alpha) - P_(0))(P_(0)) xx 100 \" \" \" \" %]"
  examples: []
  id: 221-03-39
  notes:
  - content: Les mesures de stem:[P~α~] et stem:[P]~0~ sont à faire dans les mêmes
      conditions.
  - content: Le facteur d'anisotropie des pertes sous un angle donné diffère du facteur
      d'anisotropie des pertes stem:[T] ({{IEV 221-03-38, urn:iec:std:iec:60050-221-03-38}})
      tant par la notion qu'il représente que par sa valeur numérique.
