  definition:
  - content: "ratio of the product of ion molality stem:[b] and a correction factor
      stem:[γ] to the molality stem:[b]° of the same ion in a standard solution under
      standardized conditions\r\nstem:[a] = stem:[bγ] / stem:[b]°"
  examples: []
  id: 114-01-20
  notes:
  - content: The correction factor is called activity coefficient and it is determined
      experimentally.
  - content: Normally a standard solution is a solution of the ion at a molality of
      1 mol/kg (exactly). Standardized conditions are normally 1 013,25 hPa and 25
      °C.
  - content: This entry was numbered 111-15-26 in IEC 60050-111:1996. It has been
      modified.
