  definition:
  - content: "the quantity which characterizes that part of profile dispersion due
      to a variation of refractive index contrast with wavelength given by:\r\nstem:[P
      (lambda) = frac(n_(1 \" \") lambda \" \" \"d\" \"Delta\")(N_(1) \" \" \"Delta\"
      \" \" \"d\" lambda)]\r\nwhere\r\nstem:[n]~1~ is the maximum refractive index
      of the core,\n\nstem:[N]~1~ is the group index corresponding to stem:[n]~1~
      calculated from the formula:\r\nstem:[N]~1~ = stem:[n]~1~ = stem:[λ] (dstem:[n]~1~
      / dstem:[λ])\r\nΔ is the refractive index contrast,\n\nstem:[λ] is the wavelength
      in vacuum"
