data:
  definition:
  - content: "modification préjudiciable de l’aptitude à satisfaire à des exigences
      VOIR: état dégradé ({{192-02-25, urn:iec:std:iec:60050-192-02-25}}).\r\nNote
      1 à l’article: Une dégradation peut se produire lors du stockage ou de l’utilisation,
      par suite de processus internes ou des effets de l’environnement. Note 2 à l’article:
      Une dégradation au-delà des limites spécifiées peut constituer un état dégradé
      ou une défaillance. Note 3 à l’article: Dans le contexte d’un système, une dégradation
      peut aussi être provoquée par des défaillances à l’intérieur du système."
