---
data:
  definition:
  - content: "monocouche auto-organisée de molécules adsorbées par une liaison chimique
      sur une surface en raison de l'affinité spécifique des molécules\r\nNote 1 à
      l’article: Dans une monocouche auto-assemblée, les molécules sont typiquement
      fortement liées au {{substrat, urn:iec:std:iec:60050-521-05-28}} par une liaison
      chimique, alors que les molécules des films de Langmuir-Blodgett sont faiblement
      liées par adsorption physique, par exemple une force électrostatique. \r\nNote
      2 à l’article: Le terme abrégé \"SAM\" est dérivé du terme anglais développé
      correspondant \"self-assembled monolayer\"."
