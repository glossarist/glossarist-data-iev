  definition:
  - content: 'for a linear time-invariant system with sinusoidal input variable in
      steady state of the output variable the phase difference between the phase of
      the output variable and the phase of the corresponding input variable at a given
      angular frequency SEE: Figure 10.'
  examples: []
  id: 351-45-45
  notes:
  - content: The phase angle is the argument of the frequency response at a given
      angular frequency.
