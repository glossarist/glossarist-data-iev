---
data:
  definition:
  - content: luminance énergétique effective avec pondération spectrale de la luminance
      énergétique de même nature, stem:[L~λ~], par la fonction de pondération spectrale
      du danger thermique rétinien, stem:[r](stem:[λ])
  examples: []
  id: 845-26-050
  notes:
  - content: La plage de longueurs d'onde pour la "luminance énergétique thermique
      rétinienne" est la "{{région spectrale de danger pour la rétine, urn:iec:std:iec:60050-845-26-048}}".
  - content: Cette définition est basée sur l'hypothèse selon laquelle un spectre
      d'action est adopté pour l'effet pris en considération, et selon laquelle sa
      valeur maximale est égale à 1.
  - content: Il est essentiel de spécifier quel spectre d'action est utilisé, dans
      la mesure où l'unité est la même pour tout spectre d'action.
  - content: La luminance énergétique thermique rétinienne est exprimée en watt par
      mètre carré par stéradian (W·m^−2^·sr^−1^).
