  definition:
  - content: subset of a set, which is different from the set
  examples: []
  id: 102-01-05
  notes:
  - content: The notation stem:[A subset B] expresses that the set stem:[A] is a proper
      subset of the set stem:[B]. The symbol stem:[underset(ne)(subset)] is sometimes
      used instead of stem:[subset] but is not recommended, and it should be used
      when the latter is used for any subset of stem:[B]. stem:[A] is also said to
      be properly included in stem:[B].
