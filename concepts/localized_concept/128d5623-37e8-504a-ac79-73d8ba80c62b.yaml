---
data:
  definition:
  - content: élément d'un {{espace vectoriel, urn:iec:std:iec:60050-102-03-01}}
  examples: []
  id: 102-03-04
  notes:
  - content: |-
      Un vecteur à stem:[n] dimensions est représenté par un ensemble ordonné de stem:[n] scalaires, généralement des nombres réels ou complexes, qui dépendent du choix de la base. En notation matricielle, ces scalaires sont généralement représentés par une matrice-colonne:

      stem:[mathbf(U) = ([U_(1)], [U_(2)], [vdots], [U_(n)])]
  - content: Un vecteur dans un espace euclidien est caractérisé par sa {{norme, urn:iec:std:iec:60050-102-03-23}}
      et, s'il n'est pas nul, par sa {{direction, urn:iec:std:iec:60050-102-03-12}}.
  - content: 'Un vecteur complexe *stem:[U]* est défini par une partie réelle et une
      partie imaginaire: stem:[U = A + rm(j) B] où *stem:[A]* et *stem:[B]* sont des
      vecteurs réels.'
  - content: 'Un vecteur est représenté par un symbole littéral en gras et en italique
      ou par un symbole en maigre et en italique surmonté d''une flèche: *stem:[U]*
      ou stem:[vec(U)]. Le vecteur *stem:[U]* de coordonnées stem:[U_(i)] peut être
      représenté par stem:[(U_(i))].'
  - content: 'Le terme «vecteur» est aussi employé pour une {{grandeur vectorielle,
      urn:iec:std:iec:60050-102-03-21}}.Note 6 à l’article: En géométrie, le terme
      «vecteur» est souvent employé pour désigner un segment de droite orienté dans
      un {{espace affine, urn:iec:std:iec:60050-102-03-02}}.'
