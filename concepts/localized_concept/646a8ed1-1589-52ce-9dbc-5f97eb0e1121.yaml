  definition:
  - content: quotient of the reflected luminance at a point on a surface of a non-self-radiating
      medium in a given direction and that of the perfect reflecting diffuser identically
      irradiated and viewed
  examples: []
  id: 845-21-105
  notes:
  - content: The reflected luminance factor for a spectrally non-neutral surface depends
      upon the {{relative spectral distribution, urn:iec:std:iec:60050-845-21-030}}
      of the illumination. This quantity has to be specified.
  - content: The reflected luminance factor has unit one.
