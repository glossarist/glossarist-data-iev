  definition:
  - content: linear time-invariant transfer element the output variable of which reproduces
      the input variable shifted by an interval equal to the dead time
  examples: []
  id: 351-50-31
  notes:
  - content: "The transfer function of a dead-time element is given bystem:[frac(V
      (s))(U (s)) = \"e\"^(- s * T_(\"t\"))]\r\nwhere<table>\r\n<tr>\n<td>\nstem:[T]~t~\n</td>\n<td>is
      the dead time;</td>\n</tr>\r\n<tr>\n<td>stem:[s]</td>\n<td>is the complex variable
      of the Laplace transform;</td>\n</tr>\r\n<tr>\n<td>\nstem:[U](stem:[s])</td>\n<td>is
      the input transform;</td>\n</tr>\r\n<tr>\n<td>\nstem:[V](stem:[s])</td>\n<td>is
      the output transform.</td>\n</tr>\r\n</table>"
  - content: Transportation lags of mass, energy or information are described by dead-time
      elements.
  - content: This entry was numbered 351-28-42 in IEC 60050-351:2006.
