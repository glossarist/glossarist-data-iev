---
data:
  definition:
  - content: intervalle de temps répétitif constituant un cycle complet pour la transmission
      des {{salves de trafic, urn:iec:std:iec:60050-725-14-27}} des différents {{terminaux,
      urn:iec:std:iec:60050-701-02-08}}, et pendant lequel certaines fonctions de
      commande, mais pas nécessairement toutes, sont exécutées une fois
  examples: []
  id: 725-14-18
  notes:
  - content: En anglais, le terme "frame" a divers sens dans les domaines de la transmission
      numérique (voir {{IEV 704-14-01, urn:iec:std:iec:60050-704-14-01}}), de la commutation
      (voir {{IEV 714-15-09, urn:iec:std:iec:60050-714-15-09}}), de la télévision
      (voir {{IEV 723-05-25, urn:iec:std:iec:60050-723-05-25}}), de l'accès multiple
      par répartition temporelle (voir {{IEV 725-14-18, urn:iec:std:iec:60050-725-14-18}}),
      du traitement numérique (voir {{IEV 807-01-03, urn:iec:std:iec:60050-807-01-03}}),
      des machines électriques tournantes (voir {{IEV 811-14-02, urn:iec:std:iec:60050-811-14-02}}),
      et des réseaux embarqués de train (voir {{IEV 811-37-40, urn:iec:std:iec:60050-811-37-40}}).
      Dans certains pays anglophones, le terme "frame" est également employé en télévision
      pour désigner une subdivision de la {{trame, urn:iec:std:iec:60050-723-05-17}}
      d'une image.
  - content: En français, le terme "trame" a divers sens dans les domaines de la concentration
      et la déviation des faisceaux des tubes électroniques (voir {{IEV 531-14-20,
      urn:iec:std:iec:60050-531-14-20}}), de la transmission numérique (voir {{IEV
      704-14-01, urn:iec:std:iec:60050-704-14-01}}), de la commutation (voir {{IEV
      714-15-09, urn:iec:std:iec:60050-714-15-09}}), de la télévision (voir {{IEV
      723-05-17, urn:iec:std:iec:60050-723-05-17}}), de l'accès multiple par répartition
      temporelle (voir {{IEV 725-14-08, urn:iec:std:iec:60050-725-14-08}}), du traitement
      numérique (voir {{IEV 807-01-03, urn:iec:std:iec:60050-807-01-03}}), et des
      réseaux embarqués de train (voir {{IEV 811-37-40, urn:iec:std:iec:60050-811-37-40}}).
