data:
  definition:
  - content: unité SI de flux lumineux
  examples: []
  id: 845-21-084
  notes:
  - content: " lm est égal au flux lumineux d'un faisceau de {{radiation monochromatique,
      urn:iec:std:iec:60050-845-21-014}} dont la {{fréquence, urn:iec:std:iec:60050-103-06-02}}
      est de 540 × 10^12^ Hz et dont le flux énergétique est 1/683 W."
  - content: Selon la 9^e^ Conférence Générale des Poids et Mesures (1948), le lumen
      est défini comme le flux lumineux émis dans l'angle solide unité (stéradian)
      par une {{source ponctuelle uniforme, urn:iec:std:iec:60050-845-21-098}} ayant
      une intensité lumineuse de 1 cd.
  - content: Cet article était numéroté 845-01-51 dans l'IEC 60050-845:1987.
