  definition:
  - content: mathematical relation between quantities in a given system of quantities,
      independent of units of measurement
  examples: []
  id: 112-01-31
  notes:
  - content: |-
      The general form of a quantity equation is stem:[f](stem:[Q]~1~, stem:[Q]~2~, ... stem:[Q~n~]) = 0, where stem:[Q]~1~, stem:[Q]~2~, ... stem:[Q~n~] denote different quantities. A simple form of a quantity equation is stem:[Q]~1~ = stem:[ζ] stem:[Q]~2~ stem:[Q]~3~, where stem:[ζ] is a numerical factor.  Examples:

      * T = (1/2) mv2, where T is the kinetic energy and v the speed of a specified particle of mass m;* n = I·t/F, where n is the amount of substance of a univalent component, I is the electric current and t the duration of the electrolysis, and where F is the Faraday constant.
