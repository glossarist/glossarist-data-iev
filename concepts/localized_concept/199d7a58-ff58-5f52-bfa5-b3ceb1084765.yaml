  definition:
  - content: "évaluation quantitative du papillotement sur un intervalle de temps
      spécifié\r\nNote 1 à l’article: L’indicateur de papillotement de courte durée,
      stem:[P]~st~, est généralement mesuré sur une durée de 10 min.\r\nNote 2 à l’article:
      L’indicateur de papillotement de longue durée, stem:[P]~lt~, est généralement
      mesuré à partir de 12 valeurs successives du stem:[P]~st~ sur une durée de 2 h."
