  definition:
  - content: "en un point donné à l’intérieur d’un domaine de volume quasi-infinitésimal
      stem:[V], grandeur vectorielle égale au quotient, par le volume stem:[V], du
      moment magnétique stem:[*m*] de la substance contenue dans le domaine d’espace:\r\nstem:[M
      = frac(m)(V)]"
  examples: []
  id: 121-11-52
  notes:
  - content: |-
      L’aimantation stem:[*M*] vérifie la relation

      stem:[*B*] = stem:[μ]~0~(stem:[*H*] + stem:[*M*])

      où stem:[*B*] est l’induction magnétique, stem:[*H*] le champ magnétique et stem:[μ]~0~ la constante magnétique.
