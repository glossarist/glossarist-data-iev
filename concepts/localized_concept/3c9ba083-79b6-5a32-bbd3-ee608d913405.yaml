  - content: 'câble possédant une ou plusieurs âmes entourées de plus d''une couche
      de fils disposés en héliceNote 1 à l’article: Câble à pas constant: les couches
      ont toutes un pas égal, mais sont disposées selon des directions alternées.
      Note 2 à l’article: Câble à âme parallèle: câble possédant une ou plusieurs
      âmes entourées de couches de brins parallèles et entourées par une couche de
      brins disposés en hélice. Note 3 à l’article: Câble unidirectionnel: les couches
      sont toutes disposées selon la même direction, mais leur pas s’accroît d’une
      couche à l’autre. Note 4 à l’article: Câble à direction constante: les couches
      ont toutes le même pas et sont toutes disposées selon la même direction.'
