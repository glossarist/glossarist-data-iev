  definition:
  - content: évaluation quantitative du degré d'accord entre la couleur psychophysique
      d'un objet éclairé par l'illuminant en essai et celle du même objet éclairé
      par l'illuminant de référence, l'état d'adaptation chromatique ayant été correctement
      pris en compte
