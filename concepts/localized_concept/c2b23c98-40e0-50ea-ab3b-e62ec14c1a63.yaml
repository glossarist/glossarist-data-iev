  definition:
  - content: quotient of radiant flux weighted by the {{spectral luminous efficiency,
      urn:iec:std:iec:60050-845-21-035}} and the corresponding radiant flux for a
      specified photometric condition
  examples: []
  id: 845-21-094
  notes:
  - content: The photometric condition should be specified (e.g. photopic, scotopic,
      mesopic). If it is not specified, photopic vision is assumed and the symbol
      stem:[V] is used. For other photometric conditions, the respective symbol for
      identification shall be used.
  - content: Luminous efficiency for photopic vision is expressed bystem:[V = frac(int_(0)^(oo)
      Phi_("e" , lambda) ( lambda ) V ( lambda ) "d" lambda)(int_(0)^(oo) Phi_("e"
      , lambda) ( lambda ) "d" lambda) = frac(K)(K_("m"))]where stem:[Φ]~e,~stem:[~λ~]
      is spectral radiant flux, stem:[V](stem:[λ]) is spectral luminous efficiency,
      stem:[λ] is wavelength, stem:[K] is luminous efficacy of radiation, and stem:[K]~m~
      is maximum luminous efficacy.
  - content: The luminous efficiency has unit one.
  - content: This entry was numbered 845-01-57 in IEC 60050-845:1987.
  terms:
  - type: expression
    normative_status: preferred
    designation: luminous efficiency
    usage_info: for a specified photometric condition
  - type: symbol
    designation: |-
      stem:[V], <for photopic vision> <pour la vision photopique>
      stem:[V]′, <for scotopic vision> <pour la vision scotopique>
      stem:[V]~mes;~stem:[~m~], <for mesopic vision> <pour la vision mésopique>
      stem:[V]~10~, <for the CIE 10° photopic photometric observer> <pour l'observateur photométrique photopique 10° CIE>
      stem:[V]~M~, <for the CIE 1988 modified 2° spectral luminous efficiency function for photopic vision> <pour la fonction d'efficacité lumineuse relative spectrale de 2° pour vision photopique (CIE 1988 modifiée)>
