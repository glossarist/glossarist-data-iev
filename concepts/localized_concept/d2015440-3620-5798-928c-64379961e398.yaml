  definition:
  - content: change in {{hue, urn:iec:std:iec:60050-845-22-067}} produced by changing
      the luminance (within the range of photopic vision) of a colour stimulus while
      keeping its chromaticity constant
  examples: []
  id: 845-22-071
  notes:
  - content: With certain monochromatic stimuli, hue remains constant over a wide
      range of luminances (for a given condition of adaptation). The wavelengths of
      these stimuli are sometimes referred to as "invariant wavelengths".
  - content: With increasing intensity, below 510&#160;nm hues shift more towards
      blue, and above 510&#160;nm hues shift more towards yellow (reds become yellower
      with increasing brightness).
  - content: This entry was numbered 845-02-39 in IEC 60050-845:1987.
