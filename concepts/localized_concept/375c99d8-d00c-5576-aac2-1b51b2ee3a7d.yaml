  definition:
  - content: champ magnétique coercitif dans une substance lorsqu’on ramène à une
      valeur nulle, soit l'induction magnétique, soit la polarisation magnétique et
      l'aimantation, à partir de la valeur à la saturation magnétique, par variation
      monotone du champ magnétique appliqué
  examples: []
  id: 121-12-69
  notes:
  - content: 'La grandeur qui est ramenée à zéro doit être précisée et le symbole
      correspondant utilisé : stem:[H~cB~], stem:[H~cJ~] ou stem:[H~cM~]  respectivement
      pour la coercitivité relative à l’induction magnétique, à la polarisation magnétique
      ou à l''aimantation, avec  stem:[H~cJ~] = stem:[H~cM~].'
