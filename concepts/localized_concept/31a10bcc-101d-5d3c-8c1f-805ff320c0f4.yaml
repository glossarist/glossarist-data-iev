---
data:
  definition:
  - content: valeur moyenne de l'éclairement énergétique sur la surface courbe extérieure
      d'un très petit cylindre (réel ou fictif) orienté verticalement en un point
      dans l'espace
  examples: []
  id: 845-21-055
  notes:
  - content: L'éclairement cylindrique énergétique est parfois également défini comme
      la moyenne arithmétique de l'éclairement énergétique vertical stem:[E]~e,v~
      en un pointstem:[E_("e" ",c") = frac(1)(2 pi) int_(0)^(2 pi) E_("e" ",v") "d"
      phi]où stem:[E]~e,v~ est l'éclairement énergétique vertical pour un élément
      de surface, avec sa perpendiculaire dans la direction stem:[φ], et stem:[φ]
      est l'angle dans le plan perpendiculaire à l'axe du cylindre.
  - content: La grandeur photométrique correspondante est l'"éclairement lumineux
      cylindrique". La grandeur correspondante pour les photons est l'"éclairement
      cylindrique énergétique photonique".
  - content: L'éclairement cylindrique énergétique est exprimé en watt par mètre carré
      (W·m^−2^).
  - content: Cet article était numéroté 845-01-41 dans l'IEC 60050-845:1987.
