---
data:
  definition:
  - content: essai des performances d'une {{cellule élémentaire à combustible, urn:iec:std:iec:60050-485-08-01}}
      à partir d'une {{pile à combustible, urn:iec:std:iec:60050-485-06-01}}
  examples: []
  id: 485-22-06
  notes:
  - content: L'essai d'une pile implique des variables qui peuvent être liées aux
      cellules individuelles (température, tension) ou à l'ensemble de la pile (telles
      que la température, la {{courant surfacique, urn:iec:std:iec:60050-485-12-01}},
      les débits de combustible et d'oxydant, etc.) à ajuster pour obtenir des données
      sur une gamme étendue de conditions. Le résultat de l'essai d'une pile peut
      être une {{courbe de polarisation, urn:iec:std:iec:60050-485-15-06}}, une représentation
      de la stabilité en tension des {{cellules élémentaires, urn:iec:std:iec:60050-485-05-02}},
      ou d'autres données relatives aux performances de la cellule élémentaire à combustible.
