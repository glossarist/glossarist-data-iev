  definition:
  - content: light, reflected from an imaging medium, that has not been modulated
      by the means used to produce the image
  examples: []
  id: 845-32-066
  notes:
  - content: Veiling glare lightens and reduces the contrast of the darker parts of
      an image.
  - content: Formerly the English term "ambient flare" and the French term "lumière
      parasite ambiante" were used, but these terms are deprecated.
