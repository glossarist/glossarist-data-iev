  - content: member of a finite set of {{integers, urn:iec:std:iec:60050-102-02-02}}
      used to represent {{information, urn:iec:std:iec:60050-701-01-01}}
  examples: []
  id: 702-05-02
  notes:
  - content: A digit can be represented by a {{signal element, urn:iec:std:iec:60050-702-05-01}}.
  - content: In apparatus used in {{digital transmission, urn:iec:std:iec:60050-704-01-08}},
      a digit can be represented by a specified physical condition, e.g. a binary
      magnetic condition of a ferrite core.
  - content: The English term “digit” is translated in French by "chiffre" when used
      in decimal numeration system to represent 1, 2, ..., 9, 0 (see {{IEV 714-07-06,
      urn:iec:std:iec:60050-714-07-06}})
