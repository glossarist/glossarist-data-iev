  definition:
  - content: perturbation qui dépasse la limite d'une perturbation continue qui n’est
      pas plus long que 200 ms et qui est séparée d'une perturbation subséquente par
      au moins 200 ms
  examples: []
  id: 851-15-13
  notes:
