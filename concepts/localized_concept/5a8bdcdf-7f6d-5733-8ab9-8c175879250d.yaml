  id: 351-56-02
  notes:
  - content: A functional unit produces the interactive effect between input variables
      and output variables.
  - content: A functional unit may be implemented by one or several physical units
      or program modules.
  - content: If compound terms are used to designate functional units, the following
      should be used as the last word (in ascending order of rank),* element,* system.
