  definition:
  - content: cable protection and cable support products
  examples: []
  id: 442-02-01
  notes:
  - content: |-
      Cable management includes:

      * Rigid conduits and fittings of metal and of non-metallic and composite materials;

      * Flexible and pliable conduits and fittings of metal and of non-metallic and composite materials;

      * Electrical trunking and ducting systems of metal and of non-metallic and composite materials;

      * Channel support, tray and ladder systems of metal and of non-metallic and composite materials;

      * Cables ties of metal and of non-metallic and composite materials;

      * The arrangement methods and the wiring rules of the above products.
