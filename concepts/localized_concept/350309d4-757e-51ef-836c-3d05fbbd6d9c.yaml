---
data:
  definition:
  - content: valeur de courant correspondant à l’intersection des courbes donnant
      les caractéristiques de la durée maximale de coupure en fonction du courant
      pour deux dispositifs de protection à maximum de courant
  examples: []
  id: 442-05-61
  notes:
  - content: Le courant d'intersection est la valeur limite au dessus de laquelle,
      pour deux dispositifs de protection à maximum de courant placés en série, le
      dispositif de protection amont assure généralement, mais pas nécessairement,
      une protection de secours pour l'autre dispositif de protection.
  - content: "{{Les caractéristiques stem:[I]^2^stem:[t], urn:iec:std:iec:60050-442-05-59}}
      peuvent être utilisées à la place des caractéristiques temps–courant."
