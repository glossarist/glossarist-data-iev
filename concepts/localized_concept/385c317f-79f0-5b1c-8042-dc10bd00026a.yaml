  definition:
  - content: 'for a step response the duration of the time interval between the instant
      of the step change of an input variable and the intersection point of the tangent
      of the step response at the inflection point with the horizontal axis corresponding
      to the initial value SEE: Figure 6.'
  examples: []
  id: 351-45-34
  notes:
  - content: This definition applies only to systems without overshoot of the step
      response.
