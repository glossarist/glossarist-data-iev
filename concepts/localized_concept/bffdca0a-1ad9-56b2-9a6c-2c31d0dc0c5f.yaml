---
data:
  definition:
  - content: "structure de membrane flexible qui sépare l’espace\r\nNote 1 à l’article:
      Dans une région microscopique, des matériaux tels que le silicium cristallin,
      le polysilicium, entre autres, sont utilisés pour la structure de diaphragme.
      La structure est généralement fabriquée par {{gravure anisotrope, urn:iec:std:iec:60050-523-05-09}}.
      L’épaisseur de la structure peut être contrôlée entre quelques micromètres et
      plusieurs dizaines de micromètres, en fonction de l’application. La structure
      peut être utilisée pour détecter les variations de pression ou pour provoquer
      un déplacement. Par exemple, elle est utilisée dans la partie sensible à la
      pression d’un {{capteur, urn:iec:std:iec:60050-151-13-48}} de pression pour
      les moteurs d’automobile et les microphones à membrane de silicium. De même,
      elle est utilisée comme membrane pour modifier la pression des {{microvannes,
      urn:iec:std:iec:60050-523-04-17}} et {{micropompes, urn:iec:std:iec:60050-523-04-16}}."
