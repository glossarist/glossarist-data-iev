  definition:
  - content: vertical axis through the photometric centre of a luminaire when it is
      at its tilt during measurement
  examples: []
  id: 845-25-098
  notes:
  - content: The poles of the (C, stem:[gamma]) coordinate system lie in this axis.
  - content: The first axis is tilted when the attitude of the luminaire is changed
      from its attitude during measurement.
  - content: See CIE 121, _The Photometry and Goniophotometry of Luminaires_ for more
      information on the first axis of a luminaire.
