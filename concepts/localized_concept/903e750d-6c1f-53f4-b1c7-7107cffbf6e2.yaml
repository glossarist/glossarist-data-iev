  definition:
  - content: a line of positions on a recording medium which in turn are influenced
      by, or influence, the same writing or reading device respectively
  examples:
  - content: "1 - The ring-shaped portion of the surface of a magnetic drum associated
      with one head.\r\n2 - The line of positions on a tape which could be perforated
