  definition:
  - content: "functional unit that generates an output variable the value of which
      is equal to the absolute value of its input variable according to the formulastem:[v
      (t) = |u (t)|]where<table>\r\n<tr>\n<td>stem:[t]</td>\n<td>is the time;</td>\n</tr>\r\n<tr>\n<td>\nstem:[u](stem:[t])</td>\n<td>is
      the input variable;</td>\n</tr>\r\n<tr>\n<td>\nstem:[v](stem:[t])</td>\n<td>is
      the output variable.</td>\n</tr>\r\n</table>"
