  id: 581-27-07
  notes:
  - content: "Le taille d’un contact peut être définie par l’un des systèmes suivants:
      \r\na) codification: la dimension du contact et celle du conducteur pouvant
      s’y adapter est caractérisée par un nombre,\r\nb) courant assigné: la dimension
      du contact est caractérisée par I’intensité du courant qu’il peut supporter,\r\nc)
      section: la dimension du contact est caractérisée par la section la plus élevée
      du conducteur qui peut lui être raccordé."
