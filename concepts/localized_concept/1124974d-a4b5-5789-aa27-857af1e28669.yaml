  - content: longueur d'onde du stimulus monochromatique qui, mélangé additivement
      dans des proportions convenables au stimulus achromatique spécifié, égalise
      le stimulus de couleur pris en considération dans le diagramme de chromaticité
      stem:[x], stem:[y] CIE 1931
