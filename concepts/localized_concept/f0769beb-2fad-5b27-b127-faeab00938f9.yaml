  definition:
  - content: valeur de la composante alternative du courant différentiel présumé qu'un
      dispositif de coupure différentiel, sans protection incorporée contre les courts-circuits,
      mais protégé par un dispositif de protection contre les courts-circuits placé
      en série, peut supporter dans des conditions spécifiées d'emploi et de comportement
