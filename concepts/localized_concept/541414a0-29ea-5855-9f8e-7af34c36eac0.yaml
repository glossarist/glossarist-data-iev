---
data:
  definition:
  - content: niveau d’automatisation de l’exploitation des trains auquel un système
      de transport guidé urbain (UGT) peut être exploité, et résultat de la répartition,
      entre le personnel d'exploitation et le système de contrôle/commande et de gestion
      du transport guidé urbain (UGTMS), de la responsabilité de fonctions de base
      données de l'exploitation des trains
  examples: []
  id: 821-01-58
  notes:
  - content: 'Les niveaux d''automatisation suivants sont définis: GOA0 exploitation
      en conduite à vue ({{IEV 821-09-12, urn:iec:std:iec:60050-821-09-12}}); GOA1
      exploitation non automatisée des trains ({{IEV 821-09-11, urn:iec:std:iec:60050-821-09-11}});
      GOA2 exploitation semi-automatisée des trains ({{IEV 821-09-13, urn:iec:std:iec:60050-821-09-13}});
      GOA3 exploitation des trains sans conducteurs ({{IEV 821-09-10, urn:iec:std:iec:60050-821-09-10}});
      GOA4 exploitation sans personnel à bord des trains ({{IEV 821-09-14, urn:iec:std:iec:60050-821-09-14}}).'
