  definition:
  - content: radio links in tandem between a transmitting station and a receiving
      station through one or more satellites and, in some cases, one or more intermediate
      earth stations
  examples: []
  id: 725-12-26
  notes:
  - content: The end stations of a connection by satellite may be two earth stations,
      two space stations or one earth station and one space station.
  - content: "In French, the ITU Radio Regulations, restrict the meaning of the term
      \"liaison par satellite\" to a satellite link.\r\nimage::/assets/images/parts/725/[]"
