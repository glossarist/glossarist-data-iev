  definition:
  - content: "ligne électrique destinée à alimenter des véhicules en énergie électrique,
      par l'intermédiaire d'organes de prise de courantNote 1 à l’article: Cela comprend
      tous les conducteurs pour le captage du courant, les barres conductrices et
      rails de contact, y compris:* les lignes de renforcement;* les lignes transversales
      d'alimentation;* les sectionneurs;* les isolateurs de section;* les dispositifs
      de protection contre les surtensions;* les supports qui ne sont pas isolés des
      conducteurs;* les isolateurs reliés aux parties sous tension;* les pendules;*
      les câbles auxiliaires de caténaire;* les câbles à Y.Ne sont pas compris:\r\n*
      les lignes parallèles d'alimentation;* les câbles de terre et les conducteurs
      de retour de courant."
