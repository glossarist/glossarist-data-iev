  - content: "application of the “3-step-methodology” (see Figure 1) to reduce the
      {{residual risk, urn:iec:std:iec:60050-903-01-11}} of a product, process or
      service below the level of {{tolerable risk, urn:iec:std:iec:60050-903-01-12}}\r\nimage::/assets/images/parts/903/ACOS-Guide116_2010_F1_en.jpg[]"
