  definition:
  - content: dispositif de coupure conçu pour établir ou couper le courant dans un
      circuit électrique au moyen de la conductivité contrôlée d'un semiconducteur
      dans ce circuit
  examples: []
  id: 442-04-19
  notes:
  - content: Dans un circuit où le courant passe par zéro (périodiquement ou autrement),
      le fait de ne pas rétablir le courant après un tel passage à zéro est équivalent
      à la coupure du courant.
