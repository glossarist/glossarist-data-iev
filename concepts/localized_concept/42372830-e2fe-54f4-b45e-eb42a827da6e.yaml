---
data:
  definition:
  - content: 'relation binaire ℛ entre éléments stem:[a] et stem:[b] d''un ensemble
      donné, ayant les propriétés suivantes: * réflexivité: aℛa, * antisymétrie: si
      aℛb et bℛa alors a = b, * transitivité: si aℛb et bℛc alors aℛc, pour des éléments
      quelconques a, b et c de l''ensemble donné'
  examples: []
  id: 102-01-09
  notes:
  - content: On dit que l'ensemble donné est ordonné par la relation ℛ.
  - content: Une relation d'ordre est un ordre total si l'une au moins des relations
      stem:[a]ℛstem:[b] et stem:[b]ℛstem:[a] est vraie pour tout couple d'éléments
      stem:[a] et stem:[b]. L'ordre usuel des nombres réels est un ordre total car
      stem:[a] ≤ stem:[b] ou stem:[b] ≤ stem:[a].
  - content: Une relation d'ordre est un ordre partiel si, pour au moins deux éléments
      stem:[a] et stem:[b], ni stem:[a]ℛstem:[b] ni stem:[b]ℛstem:[a] n'est vraie.
      Des exemples sont la relation de divisibilité pour les nombres entiers naturels
      et l'inclusion pour les sous-ensembles d'un ensemble donné contenant au moins
      deux éléments.
