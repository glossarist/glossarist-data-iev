  definition:
  - content: the time distortion of a received signal at the output of a transmission
      channel when the signal at the input is a perfect discrete signal
  examples: []
  id: 721-07-11
  notes:
  - content: The inherent distortion includes all the distortions produced in the
      channel such as bias distortion, characteristic distortion and fortuitous distortion.
  - content: The concept of inherent distortion can be extended to the constituents
      such as a telegraph relay, telegraph repeater or exchange.
  terms:
