---
data:
  definition:
  - content: "{{nano-objet, urn:iec:std:iec:60050-511-01-07}} ayant une dimension
      externe à l'{{échelle nanométrique, urn:iec:std:iec:60050-511-01-03}} et les
      deux autres dimensions externes significativement plus grandes\r\nNote 1 à l’article:
      La plus petite des dimensions externes est l’épaisseur de la nanoplaque.Note
      2 à l’article: Les deux dimensions externes significativement plus grandes diffèrent
      de la dimension à l'échelle nanométrique d’un facteur supérieur à trois.Note
      3 à l’article: Les dimensions externes les plus grandes ne sont pas nécessairement
      à l'échelle nanométrique."
