data:
  definition:
  - content: "{{exigence, urn:iec:std:iec:60050-901-05-05}} d'un {{document normatif,
      urn:iec:std:iec:60050-901-02-01}} qui doit être satisfaite comme condition du
      respect d'une option particulière offerte par ce document"
  examples: []
  id: 901-05-07
  notes:
  - content: Une exigence facultative peut être. une parmi deux ou plusieurs exigences
      possibles; ou. une exigence supplémentaire qui ne doit être remplie que si elle
      est applicable, faute de quoi il serait admis de ne pas en tenir compte.
