  definition:
  - content: the medium in which a variable electric field produces an electric current
      density vector stem:[vec(J)] whose magnitude in a given direction is large relative
      to that of the vector stem:[frac(del vec(D))(del t)] in a particular frequency
      band
  examples: []
  id: 705-03-09
  notes:
  - content: "For a sinusoidal wave in an isotropic medium, the medium is conductive
      if the following relation is satisfied:\r\nstem:[frac(sigma)(epsilon_(0) omega)
      gg epsilon_(\"r\")^(prime)]\n\nwhere stem:[epsilon_(\"r\")^(prime)] is the relative
      real permittivity, stem:[ε]~0~ is the electric constant, stem:[σ] is the conductivity,
      stem:[ω] is the angular frequency."
  - content: An anisotropic medium may be conducting only in certain directions.
  terms:
  - type: expression
    normative_status: preferred
    designation: conducting medium
