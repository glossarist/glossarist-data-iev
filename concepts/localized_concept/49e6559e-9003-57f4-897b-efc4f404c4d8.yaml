  definition:
  - content: supplements a {{quantity name, urn:iec:std:iec:60050-112-01-02}} for
      a quantity expressing a flux or a current within three-dimensional space to
      indicate the quotient of such a quantity by the area of a surface
  examples:
  - content: "{{density of heat flow rate, urn:iec:std:iec:60050-113-04-37}} or areic
      heat flow rate, electric current density (see {{IEV 121-11-11, urn:iec:std:iec:60050-121-11-11}}),
      {{magnetic flux density, urn:iec:std:iec:60050-121-11-19}}."
  id: 112-03-13
  notes:
  - content: In English, "density" also, and more commonly, means specific mass. In
      French, the term "densité" means relative mass density (or relative density).
