  definition:
  - content: addition d'un nombre constant d'éléments de signal à intervalles réguliers
      dans un signal numérique pour porter le débit numérique de sa valeur originale
      à une valeur supérieure spécifiée
  examples: []
  id: 704-16-23
  notes:
  - content: Les éléments de signal ajoutés ne servent pas normalement à transmettre
      des informations.
  - content: Le rapport du débit numérique supérieur au débit numérique inférieur
      n'est pas nécessairement entier, mais doit être rationnel, par exemple 64/62.
