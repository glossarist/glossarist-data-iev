data:
  definition:
  - content: résistance ohmique à l'intérieur de la {{cellule élémentaire à combustible,
      urn:iec:std:iec:60050-485-08-01}}, mesurée entre les {{collecteurs de courant,
      urn:iec:std:iec:60050-485-06-07}}, due à des résistances électroniques et ioniques
      des différents composants (électrodes, électrolyte, plaques bipolaires et collecteurs
      de courant)
  examples: []
  id: 485-15-04
  notes:
  - content: Le terme ohmique fait référence au fait que la relation entre la chute
      de tension et le courant est linéaire et obéit à la {{loi d'Ohm, urn:iec:std:iec:60050-131-15-08}}.
