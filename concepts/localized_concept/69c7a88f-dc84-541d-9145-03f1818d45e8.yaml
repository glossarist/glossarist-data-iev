  definition:
  - content: 'espérance mathématique du nombre d''heures ou de jours dans une année
      pour lesquels la puissance de pointe, respectivement horaire ou journalière,
      n’est pas satisfaite par suite d''une insuffisance de capacité de productionNote
      1 à l’article: La capacité de production inclut généralement les importations
      par des interconnexions avec d’autres {{réseaux de production-transport, urn:iec:std:iec:60050-692-01-04}}.
      Note 2 à l’article: Cet article portait le numéro 191-29-02 dans l’IEC 60050-191:1990.'
