  definition:
  - content: for a two-terminal element or a two-terminal circuit under periodic conditions,
      quantity equal to the square root of the difference of the squares of the apparent
      power stem:[S] and the active power stem:[P]  stem:[Q_("P{sim}") = sqrt(S^(2)
      - P^(2))]
  examples: []
  id: 131-11-43
  notes:
  - content: Under sinusoidal conditions, the non-active power is the absolute value
      of the reactive power stem:[Q] or the imaginary part of the complex power stem:[underline(S)],
      thus stem:[Q_("P{sim}") = |Q| = |rm(Im) underline(S)|].
  - content: The coherent SI unit for non-active power is voltampere, VA. The special
      name "var" and its symbol "var" are also used. See {{131-11-45, urn:iec:std:iec:60050-131-11-45}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: non-active power
  - type: symbol
    designation: |-
      stem:[Q_("P{sim}")]
      stem:[Q^(prime)]
    international: true
