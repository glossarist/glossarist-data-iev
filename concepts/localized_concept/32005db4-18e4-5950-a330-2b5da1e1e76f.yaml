  definition:
  - content: the ratio of the absorbed dose of a reference radiation to the absorbed
      dose of the radiation of interest, generally X-ray or gamma ray, that produces
      the same level of biological effect
  examples: []
  id: 881-17-03
  notes:
  - content: The term should only be used in radiobiology.
