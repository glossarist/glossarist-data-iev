  definition:
  - content: an antenna composed of two or more parallel closely-spaced conductors
      usually connected together at their ends, with one of the conductors fed across
      a gap at its centre, the other conductors being without a gap
  examples: []
  id: 712-04-27
  notes:
  - content: The term "folded dipole", when used without qualification, implies in
      most cases the use of two conductors.
