  definition:
  - content: illuminance level due to lighting in the viewing environment, excluding
      that from the display, measured in the plane of the display
  examples: []
  id: 845-32-035
  notes:
  - content: The natural viewing environment in image capture and reproduction is
      highly complex. Light can be generated by the image, by the display device,
      by the area immediately surrounding the display device and by the space in which
      the image is being displayed. The ambient illuminance level describes the light
      that reaches the observer that does not originate with the image, with the surround
      or with the background.
