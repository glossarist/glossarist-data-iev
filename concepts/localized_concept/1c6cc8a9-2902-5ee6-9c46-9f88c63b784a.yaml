  definition:
  - content: "function expressing the probability stem:[P](stem:[E]), for a particle
      obeying Fermi statistics, that it will occupy a permitted energy level stem:[E]\n\nstem:[P
      (E) = frac(1)(1 + \"exp\" ( frac(E - E_(\"F\"))(k T) ))] \r\nwhere\n\nstem:[k]
      is the Boltzmann constant\n\nstem:[T] is the thermodynamic temperature\n\nstem:[E]~F~
      is the Fermi-level\n\nand where this level is quantized and may contain 0, 1
      or 2 electrons."
