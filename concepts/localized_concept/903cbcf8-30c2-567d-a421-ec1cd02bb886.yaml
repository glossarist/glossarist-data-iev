data:
  definition:
  - content: 'pour un bipôle linéaire non rayonnant, élémentaire on non, en régime
      sinusoïdal, rapport de la valeur absolue de la puissance réactive à la puissance
      activeNote 1 à l’article: Le facteur de qualité caractérise les pertes, généralement
      non désirées, en particulier dans un condensateur ou une bobine d''inductance.
      Il est égal au rapport de la valeur absolue de la réactance à la résistance
      ou, de façon équivalente, au rapport de la valeur absolue de la susceptance
      à la conductance. Note 2 à l’article: Le facteur de qualité dépend généralement
      de la fréquence et de la tension. Note 3 à l’article: En français, le terme
      «facteur de surtension» est d’usage courant, même en l’absence de surtension.'
