---
data:
  definition:
  - content: observateur de référence dont les fonctions colorimétriques s'écartent
      de celles de l'observateur de référence colorimétrique CIE d'une manière définie
  examples: []
  id: 845-23-051
  notes:
  - content: Les écarts définis peuvent être appliqués à l'observateur de référence
      colorimétrique CIE 1931 ou à l'observateur de référence colorimétrique CIE 1964.
  - content: L'utilisation de l'observateur de référence d'écartement CIE est destinée
      à générer des différences typiques de celles constatées lorsque les égalisations
      de couleurs sont effectuées par différents observateurs réels dont la vision
      des couleurs est classée comme normale.
  - content: 'Voir aussi CIE 80, _Special Metamerism Index: Change in Observer_.'
