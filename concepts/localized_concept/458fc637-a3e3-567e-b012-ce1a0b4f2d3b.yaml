  definition:
  - content: uniform chromaticity scale diagram produced by plotting in rectangular
      coordinates stem:[v]′ against stem:[u]′, quantities defined by the equations:*
      u′ = 4 X / (X + 15Y + 3Z) = 4x / (−2x + 12y + 3) * v′ = 9 Y / (X + 15Y + 3Z) =
      9y / (−2x +12y + 3) where stem:[X], stem:[Y], stem:[Z] are the {{tristimulus
      values, urn:iec:std:iec:60050-845-23-038}} in the CIE 1931 or 1964 standard
      colorimetric systems, and stem:[x], stem:[y] are the corresponding chromaticity
      coordinates of the colour stimulus considered
  examples: []
  id: 845-23-073
  notes:
  - content: 'The CIE 1976 uniform-chromaticity-scale diagram is a modification of,
      and supersedes, the CIE 1960 uniform-chromaticity-scale diagram in which stem:[v]
      was plotted against stem:[u] in rectangular coordinates. The relationships between
      the two pairs of coordinates are: stem:[u]′ = stem:[u]; stem:[v]′ = 1,5 stem:[v].'
  - content: This entry was numbered 845-03-53 in IEC 60050-845:1987.
