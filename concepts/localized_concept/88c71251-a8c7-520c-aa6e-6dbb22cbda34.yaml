  definition:
  - content: "a measure of the relative difference in refractive index of the core
      and the cladding of an optical fibre, given by:\r\nstem:[Delta = frac(n_(1)^(2)
      - n_(2)^(2))(2 n_(1)^(2))]\r\nwhere stem:[n]~1~ and stem:[n]~2~ are, respectively,
      the maximum in the core and the refractive index of the innermost homogeneous
      cladding"
