  - content: 'mesure de la stabilité de fréquence dans le domaine de fréquenceNote
      1 à l’article: La pureté spectrale est en général représentée par le spectre
      de puissance du bruit latéral du signal, exprimée en décibels, par rapport à
      la puissance totale du signal, par largeur de bande hertzienne. Cette pureté
      spectrale comprend la puissance acoustique non déterministe, les composantes
      de distorsion harmonique et les interférences de fréquence parasite.'
