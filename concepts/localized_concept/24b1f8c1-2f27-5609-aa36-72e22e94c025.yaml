---
data:
  definition:
  - content: quotient de la somme des aires du plan de travail et du plan des luminaires
      par la somme de l'aire des parois délimitée par le plan de travail et le plan
      des luminaires, utilisé dans le calcul du facteur d'utilisation ou de l'utilance
  examples: []
  id: 845-29-071
  notes:
  - content: L'indice du local est exprimé par la formulestem:[K = frac(a " " b)(h
      (a + b))]où stem:[a] et stem:[b] sont les dimensions des côtés du local et stem:[h]
      la distance entre le plan de travail et le plan des luminaires.
  - content: Voir aussi "{{indice du plafond, urn:iec:std:iec:60050-845-29-073}}"
      et "{{indice du sol, urn:iec:std:iec:60050-845-29-075}}".
  - content: L'unité d'indice du local est un.
  - content: Cet article était numéroté 845-09-55 dans l'IEC 60050-845:1987.
