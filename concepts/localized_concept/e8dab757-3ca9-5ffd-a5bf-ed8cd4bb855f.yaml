  definition:
  - content: conventional number equal to the numerical value 6,022 140 76 × 10^23^
      of the {{Avogadro constant, urn:iec:std:iec:60050-113-02-08}} expressed in reciprocal
      {{mole, urn:iec:std:iec:60050-112-02-09}}
  examples: []
  id: 113-02-18
  notes:
  - content: The Avogadro number is chosen such that the molar mass of carbon 12 is
      0,012 kg/mol with a relative standard uncertainty of 4,5 × 10^−10^.
  - content: Sometimes the synonym “Loschmidt number” is used, denoted by the symbol
      “stem:[L]”.
