      pour la vision photopique, stem:[V](stem:[λ]).
  - content: L'emploi de ce terme est raisonnable uniquement si des éléments constitutifs
      du rayonnement optique se situent dans le domaine visible et ainsi stem:[int
      Phi_("e" "," lambda) ( lambda ) * V ( lambda ) * "d" lambda ne 0].
