  definition:
  - content: quotient du flux énergétique pondéré par le danger de la lumière bleue
      par le flux énergétique pondéré stem:[V](stem:[λ])stem:[a_("B" ",v") = frac(int
      Phi_("e" "," lambda) ( lambda ) * B ( lambda ) * "d" lambda)(int Phi_("e" ","
      lambda) ( lambda ) * V ( lambda ) * "d" lambda)]où stem:[λ] est la longueur
      d'onde, stem:[Φ]~e,stem:[λ]~(stem:[λ]) est le flux énergétique spectral, stem:[B](stem:[λ])
      est la fonction de pondération spectrale du danger de la lumière bleue et stem:[V](stem:[λ])
      est la fonction d'{{efficacité lumineuse relative spectrale, urn:iec:std:iec:60050-845-21-035}}
      de la CIE pour la vision photopique
