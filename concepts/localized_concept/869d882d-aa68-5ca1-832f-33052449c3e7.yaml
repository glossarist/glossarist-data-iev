  definition:
  - content: "probabilité par unité de temps pour que le noyau d'un radionucléide
      se désintègre spontanément. Elle est donnée par:\r\nstem:[lambda = - frac(1)(N)
      * frac(\"d\" N)(\"d\" t)]\r\noù stem:[N] est le nombre de noyaux existant à
      l'instant stem:[t]"
