  definition:
  - content: fault that disappears without intervention
  examples: []
  id: 192-04-05
  notes:
  - content: The disappearance may be due to self-recovery.
  - content: In IEC 60050-191:1990 (now withdrawn; replaced by IEC 60050-192:2015),
      this concept was termed "intermittent fault", with "volatile fault" and "transient
      fault" as synonyms, but not all transient faults are intermittent faults ({{192-04-06,
      urn:iec:std:iec:60050-192-04-06}}).
  - content: IEC 60050-191:1990 (now withdrawn; replaced by IEC 60050-192:2015) identified
      “volatile fault” as a synonym, which is deprecated as it is not true in all
      applications.
