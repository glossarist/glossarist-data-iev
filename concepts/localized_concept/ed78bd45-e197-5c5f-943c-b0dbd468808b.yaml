  definition:
  - content: |-
      under sinusoidal conditions in a medium where the phasors stem:[<u>B</u>] and stem:[<u>H</u>] representing respectively the magnetic flux density and the magnetic field strength are linearly related, complex quantity stem:[<u>μ</u>]~r~ defined by the relation

      stem:[<u>B</u>] = stem:[μ]~0~stem:[<u>μ</u>]~r~ stem:[<u>H</u>]

      where stem:[μ]~0~ is the magnetic constant
  examples: []
  id: 121-12-30
  notes:
  - content: The complex relative permeability is generally frequency dependent. For
      an isotropic medium the complex relative permeability is a scalar; for an anisotropic
      medium it is a tensor.
  - content: Generally stem:[<u>μ</u>]~r~ is expressed as stem:[<u>μ</u>]~r~ = stem:[μ]'~r~
      − jstem:[μ]''~r~  where stem:[μ]'~r~ is the real relative permeability and stem:[μ]''~r~
      is the magnetic loss index which represents the magnetic losses.
  terms:
  - type: expression
    normative_status: preferred
    designation: complex relative permeability
  - type: symbol
    designation: stem:[<u>μ</u>]~r~
