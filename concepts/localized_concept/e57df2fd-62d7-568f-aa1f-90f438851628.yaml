  definition:
  - content: ensemble de stem:[m] grandeurs intégrales sinusoïdales étroitement liées,
      de même nature, de même période et en général de phases différentes, où stem:[m]
      est un entier supérieur à un
  examples: []
  id: 141-01-03
  notes:
  - content: Dans certains cas, les phases diffèrent d’un multiple entier, y compris
      zéro, de 2stem:[π].
  - content: Des systèmes polyphasés de tensions, de courants et de flux totalisés
      sont couramment utilisés.
  - content: Les termes "diphasé", "triphasé", "tétraphasé", "hexaphasé", "dodécaphasé"
      sont utilisés pour désigner respectivement des systèmes pour lesquels stem:[m]
      = 2, 3, 4, 6 ou 12.
  - content: La notion de système polyphasé peut, sous certaines conditions, être
      étendue à des grandeurs périodiques non sinusoïdales.
