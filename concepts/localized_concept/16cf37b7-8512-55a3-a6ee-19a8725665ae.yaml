---
data:
  definition:
  - content: pour un ensemble ordonné de stem:[n] vecteurs dans un espace à stem:[n]
      dimensions muni d'une base donnée, scalaire attribué à cet ensemble par la seule
      forme multilinéaire qui prend la valeur 0 lorsque les vecteurs sont linéairement
      dépendants et la valeur 1 pour les vecteurs de base
  examples: []
  id: 102-03-37
  notes:
  - content: 'Lorsque les coordonnées des stem:[n] vecteurs stem:[U_(1) ", " U_(2)
      ", " ... , " " U_(n)] sont disposés selon les colonnes ou les lignes d''une
      matrice stem:[n xx n] , le déterminant des vecteurs est égal au déterminant
      de la matrice:'
  - content: Selon le signe du déterminant, l'ensemble de vecteurs et la base donnée
      ont la même orientation ou des orientations contraires.
  - content: Pour l'espace euclidien à trois dimensions, le déterminant de trois vecteurs
      est le produit mixte des vecteurs.
