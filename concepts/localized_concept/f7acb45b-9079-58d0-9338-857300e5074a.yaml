data:
  definition:
  - content: 'logarithme de l''inverse de la probabilité conditionnelle stem:[p (x
      | y)] de réalisation de l''événement stem:[x] lorsque s''est réalisé un autre
      événement stem:[y] stem:[I (x | y) = log frac(1)(p ( x | y ))]Note 1 à l’article:
      La quantité d''information conditionnelle est aussi égale à l''excès de la {{quantité
      d''information conjointe, urn:iec:std:iec:60050-171-07-20}} des deux événements
      sur la {{quantité d''information, urn:iec:std:iec:60050-171-07-14}} du second:
      stem:[I (x | y) = I (x , y) - I (y)].'
