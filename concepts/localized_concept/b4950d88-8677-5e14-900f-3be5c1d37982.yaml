  definition:
  - content: quadripôle pour lequel la somme des puissances instantanées aux deux
      paires de bornes est identiquement égale à zéro et pour lequel le rapport des
      tensions électriques à l’entrée et à la sortie a une valeur constante stem:[K]
  examples: []
  id: 131-12-78
  notes:
  - content: Un transformateur idéal peut être considéré comme un multipôle inductif
      linéaire à deux paires de bornes caractérisé par une matrice d’inductances singulière.
  - content: "Pour un transformateur idéal, la tension à l’entrée stem:[u]~1~, la
      tension à la sortie stem:[u]~2~ le courant à l’entrée stem:[i]~1~ et le courant
      à la sortie stem:[i]~2~ sont reliés par la formule:\r\nstem:[frac(u_(1))(u_(2))
      = - frac(i_(2))(i_(1)) = K]   \r\navec les conventions de référence usuelles
      pour les tensions et courants aux accès données pour les quadripôles dans la
      CEI 60375:2003, Article 7."
  - content: "En régime sinusoïdal, l'impédance stem:[<u>Z</u>]~1~ vue de l'accès
      d'entrée est le produit de l'impédance de fermeture stem:[<u>Z</u>] à l'accès
      de sortie par le carré de la constante stem:[K]:\r\nstem:[<u>Z</u>]~1~ = stem:[K]^2^stem:[<u>Z</u>]"
  - content: Un transformateur idéal est un élément de circuit qui n'emmagasine pas
      et ne dissipe pas d'énergie. Le transformateur en tant que dispositif est défini
      dans la CEI 60050-151.
