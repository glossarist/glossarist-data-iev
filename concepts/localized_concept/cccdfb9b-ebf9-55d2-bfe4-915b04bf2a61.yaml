  definition:
  - content: attribute of a visual perception according to which a luminous environment
      appears to contain more or less light
  examples: []
  id: 845-22-060
  notes:
  - content: Spatial brightness can be perceived while immersed within a space or
      when a space is observed remotely but fills a large part of the visual field.
  - content: Spatial brightness does not necessarily relate to the brightness of any
      individual objects or surfaces in the environment, but can be influenced by
      the brightness of these individual items.
