  definition:
  - content: apparatus used to stop auricular or ventricular fibrillation or to treat
      certain arrythmias by means of an electric shock delivered by electrodes in
      contact with the heart either directly or indirectly (via the skin of the thorax)
  examples: []
  id: 891-05-27
  notes:
  - content: The shock is generally produced by discharge of a capacitor, using appropriate
      waveform shaping.
