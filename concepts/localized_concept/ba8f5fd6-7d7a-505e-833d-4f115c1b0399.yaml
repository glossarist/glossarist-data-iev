  definition:
  - content: longueur du chemin qui serait parcouru à la {{vitesse de la lumière dans
      le vide, urn:iec:std:iec:60050-113-01-34}} dans une {{durée, urn:iec:std:iec:60050-113-01-13}}
      égale au {{temps de propagation de phase, urn:iec:std:iec:60050-702-02-16}}
      d'une {{onde électromagnétique, urn:iec:std:iec:60050-121-11-63}} donnée entre
      deux points spécifiés
  examples: []
  id: 705-02-14
  notes:
  - content: "Entre deux points d'un même trajet, le chemin optique est égal à l'{{intégrale
      curviligne, urn:iec:std:iec:60050-102-05-03}} de l'{{indice de réfraction, urn:iec:std:iec:60050-702-02-19}}
      prise le long du trajet: \r\nstem:[int_(\"c\") n \"d\" s]\r\noù stem:[n] est
      l'indice de réfraction du milieu en un point dans la direction du trajet et
      dstem:[s] l'élément de longueur dans la direction de ce trajet."
