  definition:
  - content: "excès stem:[M] sur l'unité, exprimé en millionièmes, de l'indice de
      réfraction modifié:\r\nstem:[M = \"10\"^(\"6\") (n + frac(h)(a) - \"1\") = N
      + \"10\"^(\"6\") frac(h)(a)]\r\noù\n\nstem:[n] est l'indice de réfraction,\n\nstem:[N]
      le coïndice,\n\nstem:[h] l'altitude, et\n\nstem:[a] le rayon de la Terre"
