---
data:
  definition:
  - content: représentation algébrique ou vectorielle de l'égalité de deux stimuli
      de couleurs dont l'un, par exemple, peut être un mélange additif de trois stimuli
      de couleurs de référence
  examples:
  - content: '&lsqb;stem:[C]&rsqb; ≡ stem:[X]&lsqb;X&rsqb; + stem:[Y]&lsqb;Y&rsqb;
      + stem:[Z]&lsqb;Z&rsqb;Dans cette équation, Le signe "≡" signifie l''égalisation
      de couleur et se lit "égalise" ; les lettres sans crochets indiquent les quantités
      des stimuli représentés par ces mêmes lettres entre crochets : ainsi stem:[R]&lsqb;R&rsqb;
      signifie stem:[R] unités du stimulus &lsqb;R&rsqb;; le signe "+" indique un
      mélange additif de stimuli de couleur. Dans une telle équation, un signe moins
      signifie que le stimulus est ajouté à ceux de l''autre membre de l''équation
      lors de l''égalisation de couleur.'
  id: 845-23-040
  notes:
  - content: 'Les stimuli de référence sont représentés par les lettres &lsqb;R&rsqb;,
      &lsqb;G&rsqb; et &lsqb;B&rsqb; auquel cas, il convient d''utiliser le signe
      "≡", qui se lit "égalise". En variante, l''équation chromatique peut être écrite
      en caractères latins en gras lorsqu''il convient d''utiliser le signe "&equals;",
      qui se lit "égale": *C* = stem:[X]*X* + stem:[Y]*Y* + stem:[Z]*Z*.'
  - content: Cet article était numéroté 845-03-24 dans l'IEC 60050-845:1987.
