  definition:
  - content: "{{fundamental physical constant, urn:iec:std:iec:60050-112-03-09}} governing,
      among others, quantum effects and the relation between the {{frequency, urn:iec:std:iec:60050-103-06-02}}
      stem:[f] of {{electromagnetic radiation, urn:iec:std:iec:60050-731-01-01}} and
      the {{energy, urn:iec:std:iec:60050-113-03-45}} stem:[E] = stem:[hf] of the
      corresponding {{photons, urn:iec:std:iec:60050-113-05-14}}, the value of which
      is set to 6,626 070 15 × 10^−34^ {{J, urn:iec:std:iec:60050-113-03-46}} {{s,
      urn:iec:std:iec:60050-112-02-04}}"
  examples: []
  id: 113-05-07
  notes:
  - content: The Planck constant is used in the {{SI, urn:iec:std:iec:60050-112-02-02}}
      to define the {{kilogram, urn:iec:std:iec:60050-112-02-06}}.
