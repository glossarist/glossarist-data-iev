  definition:
  - content: 'binary relation ℛ between elements stem:[a] and stem:[b] of a given
      set having the following properties: * reflexivity: aℛa, * antisymmetry: if
      aℛb and bℛa then a = b, * transitivity: if aℛb and bℛc then aℛc, for any elements
      a, b and c of the given set'
  examples: []
  id: 102-01-09
  notes:
  - content: The given set is said to be ordered by the relation ℛ.
  - content: An order relation is a total order if at least one of the relations stem:[a]ℛstem:[b]
      and stem:[b]ℛstem:[a] is true for any elements stem:[a] and stem:[b]. The usual
      order for real numbers is a total order because stem:[a] ≤ stem:[b] or stem:[b]
      ≤ stem:[a].
  - content: An order relation is a partial order if, for at least two elements stem:[a]
      and stem:[b], neither stem:[a]ℛstem:[b] nor stem:[b]ℛstem:[a] is true. Examples
      are the divisibility relation for natural numbers and the inclusion relation
      for subsets of a set with at least two elements.
