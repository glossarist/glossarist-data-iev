  definition:
  - content: "unit of {{modulation rate, urn:iec:std:iec:60050-721-03-26}} in {{telegraphy,
      urn:iec:std:iec:60050-701-01-07}} and {{data communication, urn:iec:std:iec:60050-701-01-12}}
      and of {{line digit rate, urn:iec:std:iec:60050-704-17-03}} in {{digital transmission,
      urn:iec:std:iec:60050-704-01-08}}, equal to one second to the power minus one\r\n1
      Bd := 1 s^−1^"
  examples: []
  id: 702-05-24
  notes:
  - content: For example, if the duration of the unit interval is 20 ms, the modulation
      rate is 50 Bd.
  - content: The term “rapidité de modulation” is used in French in all cases, with
      the synonym “débit en ligne” in the case of digital transmission; in English
      the terms “modulation rate” and “line digit rate” are used in different fields.
