  definition:
  - content: quotient of the sum of the areas of the floor and the working plane and
      the sum of the area of the walls bounded by the floor and the working plane,
      used in the calculation of the utilization factor or utilance
  examples: []
  id: 845-29-075
  notes:
  - content: The floor cavity index is given by the formulawhere stem:[a] and stem:[b]
      are the dimensions of the sides of the room and stem:[h]~f~ is the distance
      from the floor to the utilization plane.
  - content: See also "{{ceiling cavity index, urn:iec:std:iec:60050-845-29-073}}"
      and "{{room index, urn:iec:std:iec:60050-845-29-071}}".
  - content: The floor cavity index has unit one.
