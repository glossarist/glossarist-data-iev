  definition:
  - content: value of the test voltage to be applied under specified conditions in
      a withstand test, during which a specified number of disruptive discharges is
      tolerated
  examples: []
  id: 581-21-20
  notes:
  - content: "The withstand voltage is designated as:\r\na) conventional assumed withstand
      voltage, when the number of disruptive discharges tolerated is zero. It is deemed
      to correspond to a withstand probability stem:[P]~W~ = 100 % (this is in particular
      the case in the low-voltage technology);\r\nb) statistical withstand voltage,
      when the number of disruptive discharges tolerated is related to a specified
      withstand probability, for instance stem:[P]~W~ = 90 %."
