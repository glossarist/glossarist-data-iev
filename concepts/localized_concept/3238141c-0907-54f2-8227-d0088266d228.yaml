  definition:
  - content: "functional unit that generates an output variable the value of which
      depends on the sign of the value of its input variable according to the formulastem:[v
      ( t ) = { [[V_(1)], [0], [- V_(1)]] [[\" \" \"for\" \" \" u ( t ) gt 0], [\" \"
      \"for\" \" \" u ( t ) = 0], [\" \" \"for\" \" \" u ( t ) lt 0]]]where<table>\r\n<tr>\n<td>stem:[t]</td>\n<td>is
      the time;</td>\n</tr>\r\n<tr>\n<td>\nstem:[u](stem:[t])</td>\n<td>is the input
      variable;</td>\n</tr>\r\n<tr>\n<td>\nstem:[v](stem:[t])</td>\n<td>is the output
      variable.</td>\n</tr>\r\n<tr>\n<td>\nstem:[V]~1~\n</td>\n<td>is a constant value
      of the output variable.</td>\n</tr>\r\n</table>"
