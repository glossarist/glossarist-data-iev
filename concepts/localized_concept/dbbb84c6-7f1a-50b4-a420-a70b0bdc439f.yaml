  definition:
  - content: co-ordination of the operating characteristics of two or more overcurrent
      protective devices such that, on the incidence of overcurrents within stated
      limits, the device intended to operate within these limits does so, while the
      other(s) does (do) not
  examples: []
  id: 441-17-15
  notes:
  - content: Distinction is made between series discrimination, involving different
      overcurrent protective devices passing substantially the same overcurrent, and
      network discrimination involving identical protective devices passing different
      proportions of the overcurrent.
  terms:
  - type: expression
    normative_status: preferred
    designation: overcurrent discrimination
