---
data:
  definition:
  - content: "état caractérisé par l’aptitude à fonctionner tel que requis\r\nNote
      1 à l’article: L’absence de ressources externes nécessaires peut empêcher le
      fonctionnement, mais n’a aucun impact sur l’état de disponibilité. Voir état
      d’incapacité externe ({{192-02-23, urn:iec:std:iec:60050-192-02-23}}). Note
      2 à l’article: L’état de disponibilité est lié à la disponibilité de l’entité.
      Note 3 à l’article: Une entité peut être considérée comme étant en état de disponibilité
      pour certaines fonctions et en même temps en état d’indisponibilité pour d’autres
      fonctions. Note 4 à l’article: L’adjectif «disponible» qualifie une entité dans
      un état de disponibilité."
