data:
  definition:
  - content: "miroir qui balaie un faisceau de lumière\r\nNote 1 à l’article: Les
      miroirs de balayage sont développés pour les imprimantes laser, les parties
      de balayage des {{capteurs, urn:iec:std:iec:60050-151-13-48}} optiques, les
      têtes de lecture pour les disques optiques, les afficheurs, entre autres. Un
      ensemble de miroirs de balayage peut être fabriqué sur une {{tranche, urn:iec:std:iec:60050-521-05-29}}
      de silicium avec un {{actionneur, urn:iec:std:iec:60050-151-13-49}}, grâce à
      la technologie de micro-usinage."
