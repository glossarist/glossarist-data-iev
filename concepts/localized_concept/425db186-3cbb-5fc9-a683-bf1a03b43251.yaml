---
data:
  definition:
  - content: 'élément chimique et ses composés, à l’état naturel ou obtenus par un
      quelconque {{processus, urn:iec:std:iec:60050-904-01-05}} de fabrication, y
      compris d’éventuels additifs nécessaires pour en préserver la stabilité et les
      éventuelles impuretés résultant du processus utilisé, mais à l’exclusion de
      tout solvant qui peut en être séparé sans affecter sa stabilité ou modifier
      sa composition Note 1 à l’article: La définition est extraite du _Système général
      harmonisé de classification  et d’étiquetage des produits chimiques (SGH)_:
      2003, Chapitre 1.2, Définitions et Abréviations.'
