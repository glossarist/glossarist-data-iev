data:
  definition:
  - content: chaque suite d'opérations effectuée par un usager d'un {{réseau de télécommunication,
      urn:iec:std:iec:60050-701-02-07}} pour essayer d'obtenir l'usager, le {{terminal,
      urn:iec:std:iec:60050-715-01-06}} ou le service voulu
  examples: []
  id: 701-03-04
  notes:
  - content: Une telle suite est suffisante dans les cas favorables; elle peut ne
      pas l'être dans des circonstances telles qu'{{encombrements, urn:iec:std:iec:60050-715-02-15}},
      {{pannes, urn:iec:std:iec:60050-192-04-01}} etc.
  - content: En un point donné du réseau, une tentative d'appel se manifeste par une
      unique {{tentative de prise, urn:iec:std:iec:60050-715-02-03}} inefficace, ou
      par une tentative de prise qui aboutit et par toute autre activité ultérieure
      liée à l'établissement de la {{chaîne de connexion, urn:iec:std:iec:60050-701-03-01}}.
