  definition:
  - content: "space radiocommunication service in which:\r\n– information relating
      to the characteristics of the Earth and its natural phenomena is obtained from
      active or passive sensors on Earth satellites;\r\n– similar information is collected
      by an Earth satellite from airborne or Earth-based platforms which transmit
      automatically or by interrogation;\r\n– such information may be distributed
      to Earth stations"
  examples: []
  id: 713-05-07
  notes:
  - content: "– This radiocommunication service may also include feeder links necessary
      for its operation and intersatellite links."
