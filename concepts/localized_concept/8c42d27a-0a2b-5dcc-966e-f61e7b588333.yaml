  definition:
  - content: luminous flux emitted within a specified cone angle, stem:[α], determined
      from the luminous intensity distribution, stem:[I]~v~(stem:[θ],stem:[φ]), of
      the light sourcestem:[Phi_("v" ",p" "," alpha) = int_(phi = 0)^(2 pi) int_(theta
      = 0)^(alpha / 2) I_("v") ( theta , phi ) " " sintheta " " "d" theta " " "d"
      phi]
  examples: []
  id: 845-21-110
  notes:
  - content: "(stem:[θ],stem:[φ]) = (0,0) is the direction of the cone axis, which
      can be coincident with the mechanical axis or optical beam axis of the light
      source or any other direction, and should be specified."
  - content: The cone angle, stem:[α], which can be expressed either in degree (°)
      or radian (rad), is given by the full conic angle and has to be specified, e.g.
      stem:[Φ]~p,90°~ or stem:[Φ]~p,π/2~.
  - content: The term "cone luminous flux" is also used in some applications with
      the same meaning.
  - content: See also "{{useful luminous flux, urn:iec:std:iec:60050-845-21-111}}".
  - content: The partial luminous flux is expressed in lumen (lm).
  terms:
  - type: expression
    normative_status: preferred
    designation: partial luminous flux
    usage_info: of a light source
  - designation: |-
      stem:[Φ]~v,p,~stem:[~α~]
      stem:[Φ~α~]
