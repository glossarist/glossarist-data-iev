  definition:
  - content: electric stimulus originating from a current flowing through the human
      body between electrodes whose polarities change once during the application
      of current
  examples: []
  id: 891-01-07
  notes:
  - content: Bipolar stimuli are generally balanced in such a way that no electric
      charge resulting from the current applied for the electric stimulus remains
      in the human body at the end of the time interval during which the current is
      applied.
