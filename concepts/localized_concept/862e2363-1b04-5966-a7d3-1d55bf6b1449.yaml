  definition:
  - content: "grandeur stem:[R]~eq~ ayant les dimensions d'une résistance et servant
      à exprimer la force électromotrice de bruit stem:[E]~n~ d'un monoporte par la
      relation:\r\nstem:[R_(\"eq\") = frac(E_(\"n\")^(2))(4 \" \" k \" \" T_(0) \"Delta\"
      f)]\r\noù stem:[T]~0~ est la température thermodynamique de référence fixée
      conventionnellement au voisinage de 290 K, Δstem:[f] la largeur de bande considérée,
      et stem:[k] la constante de Boltzmann"
  examples: []
  id: 702-08-52
  notes:
  - content: Une antenne de réception vue de son accès de sortie peut être assimilée
      à un monoporte.
