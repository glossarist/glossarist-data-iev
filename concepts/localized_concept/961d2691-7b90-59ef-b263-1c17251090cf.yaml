  definition:
  - content: en un point donné à l’intérieur d’un domaine tridimensionnel de volume
      quasi-infinitésimal dstem:[V], grandeur scalaire égale au quotient de la masse
      dstem:[m] située à l'intérieur du domaine par le volume dstem:[V], soit stem:[ρ]
      = dstem:[m]/dstem:[V]
  examples: []
  id: 113-03-07
  notes:
  - content: La masse volumique est une grandeur intensive qui décrit une propriété
      locale d'une substance.
  - content: Le concept de masse volumique peut aussi s'appliquer à la masse stem:[m]
      d'un domaine D de volume stem:[V], conduisant à la masse volumique moyenne stem:[rho_("av")
      = frac(m)(V) = frac(1)(V) int_("D") rho d V].
  - content: L'unité SI cohérente de masse volumique est le kilogramme par mètre cube,
      kg/m^3^. D’autres unités sont la tonne par mètre cube, t/m^3^ (1 t/m^3^ = 1
      000 kg/m^3^ = 1 g/cm^3^), et le kilogramme par litre, kg/l (1 kg/l = 1 000 kg/m^3^).
