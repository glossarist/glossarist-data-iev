  definition:
  - content: 'pour un système linéaire invariant dans le temps avec une variable d''entrée
      sinusoïdale en régime établi de la variable de sortie, différence de phase entre
      la phase de la variable de sortie et la phase de la variable d''entrée correspondante
      à une pulsation donnée VOIR: Figure 10.Note 1 à l’article: Le déphasage est
      l’argument de la réponse en fréquence à une pulsation donnée.'
