  definition:
  - content: "scalar line integral of a magnetic vector potential *stem:[A]* along
      a curve C:\r\nstem:[Psi = int_(\"C\") A * \"d\" r]\r\nwhere d*stem:[r]* is the
      vector line element"
  examples: []
  id: 121-11-24
  notes:
  - content: "For a closed curve C, the linked flux is equal to the magnetic flux
      through any surface S bounded by the curve:\n\nstem:[oint_(\"C\") A * \"d\"
      r \" \" = \" \" int_(\"S\") B * e_(\"n\") \"d\" A]\r\nwhere *stem:[B]* is the
      magnetic flux density and *stem:[e]*~n~dstem:[A] the vector surface element."
  - content: For a coil with N turns, the linked flux is approximately equal to stem:[NΦ]
      where stem:[Φ] is the magnetic flux through any surface bounded by one turn.
