data:
  definition:
  - content: 'travail sur ou près d''une {{installation électrique, urn:iec:std:iec:60050-651-26-01}},
      en présence d’un {{phénomène électrique dangereux, urn:iec:std:iec:60050-651-26-05}}
      et pour lequel le travailleur possède des connaissances techniques et une expérience
      en électricitéNote 1 à l’article: Le travail électrique inclut des travaux tels
      que essais et mesures, réparation, remplacement, modification, extension, construction
      et vérification. Note 2 à l’article: Les travailleurs en formation, surveillés
      de façon appropriée, peuvent entreprendre un travail électrique sous réserve
      que la réglementation nationale l’autorise. Note 3 à l’article: Cet article
      était numéroté 651-01-12 dans la CEI 60050-651:1999. Il a été modifié de façon
      à supprimer une exigence et à harmoniser le texte français avec le texte anglais.'
