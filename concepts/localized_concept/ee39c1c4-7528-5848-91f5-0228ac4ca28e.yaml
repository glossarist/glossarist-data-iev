  definition:
  - content: rapport de l'amplitude, en un point donné, d'une onde électromagnétique
      spécifiée qui a subi des effets de convergence à l'amplitude de l'onde qui aurait
      existé au même point en l'absence de ces effets
  examples: []
  id: 705-04-25
  notes:
  - content: Dans le cas où l'onde spécifiée est une onde réfléchie par une surface
      courbe, le facteur correspondant peut être considéré comme un facteur qui multiplie
      le facteur de réflexion de la surface réfléchissante supposée plane.
