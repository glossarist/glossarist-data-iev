  definition:
  - content: scalar Δstem:[f] associated at each point of a given space region with
      a scalar stem:[f], equal to the divergence of the gradient of the scalar field
      Δstem:[f] = div *grad* stem:[f]
  examples: []
  id: 102-05-28
  notes:
  - content: 'In orthonormal Cartesian coordinates, the Laplacian of a scalar field
      quantity is: stem:[rm(Delta) " " f = frac(del^(2) f)(del " " x^(2)) + frac(del^(2)
      f)(del " " y^(2)) + frac(del^(2) f)(del " " z^(2))].'
  - content: The Laplacian of the scalar field stem:[f] is denoted Δstem:[f] or ∇^2^stem:[f],
      where Δ is the Laplacian operator.
