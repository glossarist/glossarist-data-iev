  definition:
  - content: ratio of the r.m.s. value of the total distortion content to the r.m.s.
      value of the fundamental component or the reference fundamental component of
      an alternating quantity
  examples: []
  id: 551-20-14
  notes:
  - content: The total distortion ratio depends on the choice of the fundamental component.
      If it is not clear from the context which one is used an indication should be
      given.
  - content: The total distortion ratio may be approximated to a certain harmonic
      order. This is to be stated.
