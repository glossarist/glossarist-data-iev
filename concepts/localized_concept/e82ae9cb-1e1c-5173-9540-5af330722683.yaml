  definition:
  - content: "quotient de dstem:[H] par dstem:[t], où dstem:[H] est l'accroissement
      de l'équivalent de dose pendant l'intervalle de temps dstem:[H]\r\nstem:[overset(˙)(H)
      = frac(\"d\" H)(\"d\" t)]"
  examples: []
  id: 881-14-02
  notes:
  - content: "L'unité SI de débit d'équivalent de dose est le joule par kilogramme
      et par seconde, dont le nom est le sievert par seconde; les sous-multiples tels
      que μSv • h^−1^ sont utilisés en pratique. Le rem par seconde (ou ses sous-multiples)
      peuvent être utilisés temporairement.\r\n1 Sv • s^−1^ = 100 rem • s^−1^ = 1 J
      • kg^−1^ • s^−1^"
