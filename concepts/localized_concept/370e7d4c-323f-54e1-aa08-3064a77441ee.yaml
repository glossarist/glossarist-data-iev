  definition:
  - content: "for a radionuclide, the probability per unit time for the spontaneous
      decay if one of its nuclei. It is given by:\r\nstem:[lambda = - frac(1)(N) *
      frac(\"d\" N)(\"d\" t)]\n\nin which stem:[N] is the number of nuclei of concern
      existing at time stem:[t]"
