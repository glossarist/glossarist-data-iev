  definition:
  - content: quotient impulse response Δstem:[v]~δ~(stem:[t]) divided by the impulse
      area stem:[K]~δ~ of the impulse function, the quotient described bystem:[g (t)
      = frac(1)(K_("delta")) * Delta v_(delta) (t)]
  examples: []
  id: 351-45-29
  notes:
  - content: The unit-impulse response stem:[g](stem:[t]) of a system contains all
      properties of the system and is used to calculate the response Δstem:[v](stem:[t])
      of the system to any input variable Δstem:[u](stem:[t]) by the convolution integralstem:[Delta
      v (t) = int_(- oo)^(oo) g (tau) * Delta u (t - tau) "d" tau].
  - content: "The systems frequency response stem:[G (\"j\" * omega)] may be calculated
      by Fourier transformation of stem:[g](stem:[t]):\r\nstem:[G (\"j\" * omega)
      = ℱ {g (t)}]."
  - content: The unit-impulse response of a system mathematically may be considered
      to result from application of a unit impulse to an input variable.
  - content: This entry was numbered 351-24-19 in IEC 60050-351:2006.
