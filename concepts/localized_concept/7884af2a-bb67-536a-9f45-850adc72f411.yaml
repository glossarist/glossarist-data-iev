  definition:
  - content: completely determined finite sequence of instructions by which the values
      of the output variables may be calculated from the values of the input variables
  examples: []
  id: 351-42-27
  notes:
  - content: The behaviour of a system with discrete-value input and output variables
      (for example a switching system) may be described completely by an algorithm.
      For a system with continuous-value and continuous-time input and output variables
      the algorithm is given by or derived from the mathematical relationship between
      the input and output variables.
  - content: This entry was numbered 351-21-37 in IEC 60050-351:2006.
