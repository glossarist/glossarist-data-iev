data:
  definition:
  - content: "probabilité pour qu’une opération donnée de maintenance, réalisée dans
      des conditions définies et à l’aide de procédures et ressources spécifiées,
      puisse être effectuée dans un intervalle de temps (stem:[t]~1~, stem:[t]~2~)
      donné lorsque l’opération a démarré à stem:[t] = 0\r\nNote 1 à l’article: Si
      stem:[t]~1~= 0 et stem:[t]~2~ = stem:[t], alors stem:[M](0, stem:[t]) est indiqué
      simplement sous la forme stem:[M](stem:[t]) et appelé fonction de maintenabilité.
      Note 2 à l’article: Voir aussi maintenabilité <d’une entité> ({{192-01-27, urn:iec:std:iec:60050-192-01-27}})."
