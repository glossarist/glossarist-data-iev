  definition:
  - content: "complex value where the real part is the refractive index and the imaginary
      part is related to the spectral absorption index\r\nstem:[hat(n) (lambda) =
      n (lambda) - \"i\" kappa (lambda)]\r\nwhere where stem:[n](stem:[λ]) is the
      refractive index at wavelength stem:[λ], stem:[κ](stem:[λ]) is the spectral
      absorption index and stem:[\"i\" = sqrt(- 1)]"
