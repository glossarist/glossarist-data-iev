  examples:
  - content: 'Let stem:[{a , b , c}] be a set of three events and let stem:[p ( a
      ) = 0,5], stem:[p ( b ) = 0,25] and stem:[p ( c ) = 0,25] be the probabilities
      of their occurrences. The relative entropy of this set is: stem:[H_("r") = 1,5
      Sh / 1,585 " " Sh approx 0,95].'
