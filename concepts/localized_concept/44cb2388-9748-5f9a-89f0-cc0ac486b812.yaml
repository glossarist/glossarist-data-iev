data:
  definition:
  - content: "{{constante physique fondamentale, urn:iec:std:iec:60050-112-03-09}}
      qui régit, entre autres, des effets quantiques et la relation entre la {{fréquence,
      urn:iec:std:iec:60050-103-06-02}} stem:[f] d’un {{rayonnement électromagnétique,
      urn:iec:std:iec:60050-731-01-01}} et l’{{énergie, urn:iec:std:iec:60050-113-03-45}}
      stem:[E] = stem:[hf] des {{photons, urn:iec:std:iec:60050-113-05-14}} correspondants,
      dont la valeur est fixée à exactement 6,626 070 15 × 10^−34^ {{J, urn:iec:std:iec:60050-113-03-46}} {{s,
      urn:iec:std:iec:60050-112-02-04}}"
