  definition:
  - content: "{{nano-object, urn:iec:std:iec:60050-511-01-07}} with one external dimension
      in the {{nanoscale, urn:iec:std:iec:60050-511-01-03}} and the two other external
      dimensions significantly larger"
  examples: []
  id: 511-01-11
  notes:
  - content: The smallest external dimension is the thickness of the nanoplate.
  - content: The two significantly larger external dimensions are considered to differ
      from the nanoscale dimension by more than three times.
  - content: The larger external dimensions are not necessarily in the nanoscale.
