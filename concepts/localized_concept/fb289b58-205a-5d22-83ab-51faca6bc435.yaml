  definition:
  - content: température théorique basée sur une représentation simplifiée du comportement
      thermique et électrique d’un dispositif à semiconducteurs
  examples: []
  id: 521-05-14
  notes:
  - content: La température virtuelle n’est pas nécessairement la température la plus
      élevée du dispositif.
  - content: "Basée sur la puissance dissipée et sur la résistance ou impédance thermique
      qui correspond à ce mode de fonctionnement, la température virtuelle peut être
      calculée à l’aide de la relation:\r\nstem:[T_(\"j\") = T_(\"boitier\") + frac(P)(R_(\"th\"))]\r\nou
      stem:[T_(\"j\") = T_(\"amb\") + frac(P)(R_(\"th\"))]"
