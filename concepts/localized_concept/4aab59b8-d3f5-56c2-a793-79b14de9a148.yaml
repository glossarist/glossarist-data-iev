  id: 102-03-18
  notes:
  - content: 'In an stem:[n]-dimensional space with orthonormal base vectors the Hermitian
      product of two vectors *stem:[U]* and *stem:[V]* is the sum of the products
      of each coordinate stem:[U_(i)]of the vector *stem:[U]* and the conjugate of
      the corresponding coordinate stem:[V_(i)] of the vector *stem:[V]*:'
  - content: For two complex vectors or two complex vector quantities *stem:[U]* and
      *stem:[V]* either the Hermitian product stem:[U * V^(*)] or a conjugate Hermitian
      product stem:[U^(*) * V] may be used depending on the application. The Hermitian
      product stem:[U * U^(*)] or stem:[U^(*) * U] is a real scalar or a real scalar
      quantity, respectively.
  - content: The Hermitian product is denoted by a half-high dot (·) between the two
      symbols representing one vector and the conjugate of the other.
