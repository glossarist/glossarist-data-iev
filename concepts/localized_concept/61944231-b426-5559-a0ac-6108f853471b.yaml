  definition:
  - content: rapport, généralement exprimé en décibels, de la puissance apparente
      en un point d'une voie de transmission après insertion d'un biporte donné immédiatement
      en amont de ce point, à la puissance en ce point avant l'insertion de ce biporte
  examples: []
  id: 702-07-09
  notes:
  - content: Si le rapport qui détermine le gain d'insertion est inférieur à l'unité,
      sa valeur en décibels est négative, et on peut utiliser son inverse ou sa valeur
      en décibels changée de signe appelée "affaiblissement d'insertion".
