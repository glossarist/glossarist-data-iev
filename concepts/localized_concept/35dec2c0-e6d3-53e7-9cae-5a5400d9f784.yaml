  definition:
  - content: "1 – aptitude d'un récepteur radioélectrique à fournir un signal de sortie
      de niveau et de qualité spécifiés à partir d'un signal d'entrée faible\r\n2
      – niveau minimal du signal à l'entrée d'un récepteur radioélectrique qui fournit
      à la sortie un signal de niveau et de qualité spécifiés"
  examples: []
  id: 713-10-52
  notes:
  - content: La qualité du signal de sortie est, en général, exprimée par un rapport
      signal sur bruit ou par un taux d'erreurs.
