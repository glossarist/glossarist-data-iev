  id: 617-01-01
  notes:
  - content: La fiabilité quantifie la capacité d'un système électrique d’un réseau
      d’énergie à fournir des services adéquats de façon quasi continue avec quelques
      interruptions, sur une longue période de temps.
  - content: La fiabilité est le principal objectif de la conception et de l’exploitation
      d’un réseau d’énergie électrique.
