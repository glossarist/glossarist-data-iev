  definition:
  - content: pour une particule, masse de celle-ci lorsqu'elle est en mouvement dans
      un référentiel inertiel
  examples: []
  id: 113-03-06
  notes:
  - content: Une particule de masse au repos stem:[m]~0~ et de vitesse stem:[v] a
      une masse relativiste égale à stem:[m_(0) / sqrt(1 - v^(2) / c_(0)^(2))], où
      stem:[c]~0~ est la vitesse de la lumière. Lorsque la vitesse stem:[v] n'est
      pas nulle, la masse relativiste est plus grande que la masse au repos.
  - content: En théorie de la relativité, le terme «masse» désigne en général la masse
      relativiste.
