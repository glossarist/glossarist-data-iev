  definition:
  - content: "impulsion unidirectionnelle définie en fonction du temps stem:[t] par
      les expressions:\r\nstem:[y] = k sin^2^ (stem:[π t]/2 stem:[T]) pour 0 ≤ stem:[t]
      ≤ 2 stem:[T]\n\nstem:[y] = 0 pour stem:[t] < 0 et stem:[t] > 2stem:[T]\r\noù:\n\nstem:[y]
      est la valeur instantanée de la grandeur caractéristique,\n\nk est la valeur
      de crête de l'impulsion,\n\n2stem:[T] est la durée totale de l'impulsion, stem:[T]
      étant la durée de l'intervalle de temps au cours duquel la grandeur caractéristique
      de l'impulsion est supérieure à k/2"
