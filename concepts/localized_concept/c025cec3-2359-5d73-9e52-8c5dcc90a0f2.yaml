---
data:
  definition:
  - content: attribut d'une perception visuelle selon lequel un environnement lumineux
      semble être soumis plus ou moins à une source de lumière
  examples: []
  id: 845-22-060
  notes:
  - content: La luminosité spatiale peut être perçue alors qu'elle est immergée dans
      un espace ou lorsqu'un espace observé à distance remplit néanmoins une grande
      partie du champ visuel.
  - content: La luminosité spatiale n'est pas nécessairement associée à la luminosité
      des objets ou des surfaces individuels dans l'environnement, mais peut être
      influencée par la luminosité de ces éléments individuels.
