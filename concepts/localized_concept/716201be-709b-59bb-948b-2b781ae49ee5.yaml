  definition:
  - content: "représentation graphique en coordonnées polaires du facteur de réflexion
      complexe stem:[<u>r</u>], pour une ligne de transmission uniforme sans pertes,
      d'impédance caractéristique stem:[Z]~0~:\r\nstem:[underline(r) = frac(underline(Z)
      - Z_(0))(underline(Z) + Z_(0)) = frac(underline(Z) / Z_(0) - 1)(underline(Z)
      / Z_(0) + 1)]\n\nen fonction de l'impédance complexe stem:[<u>Z</u>] à l'aide
      de deux familles de cercles orthogonaux sur chacun desquels soit la résistance
      stem:[R], soit la réactance stem:[X] a une valeur constante, stem:[<u>Z</u>]
      = stem:[R] + jstem:[X] étant l'impédance complexe dans la direction de propagation
      de l'onde incidente au point de détermination du facteur de réflexion complexe"
  examples: []
  id: 726-19-01
  notes:
  - content: L'abaque de Smith peut être employé avec des impédances stem:[<u>Z</u>],
      des admittances stem:[underline(Y) = frac(1)(underline(Z))], des impédances
      normées stem:[frac(underline(Z))(Z_(0))] ou des admittances normées stem:[frac(underline(Y))(Y_(0))
      = frac(Z_(0))(underline(Z))]
  - content: L'abaque de Smith est habituellement limité aux valeurs positives de
      stem:[R] ; tout l'abaque est alors compris à l'intérieur d'un cercle où le module
      du facteur de réflexion est égal à l'unité.
  - content: L'abaque de Smith permet, par lecture directe, de convertir le facteur
      de réflexion complexe en parties réelle et imaginaire de l'impédance ou de l'admittance
      et inversement; cette représentation simplifie aussi la transformation des impédances
      ou des admittances d'un point à un autre d'une ligne radioélectrique.
