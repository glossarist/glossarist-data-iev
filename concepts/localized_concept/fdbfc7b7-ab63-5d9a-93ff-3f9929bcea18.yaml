  definition:
  - content: subject being considered
  examples: []
  id: 192-01-01
  notes:
  - content: The item may be an individual part, component, device, functional unit,
      equipment, subsystem, or system.
  - content: The item may consist of hardware, software, people or any combination
      thereof.
  - content: The item is often comprised of elements that may each be individually
      considered. See sub item ({{192-01-02, urn:iec:std:iec:60050-192-01-02}}) and
      indenture level ({{192-01-05, urn:iec:std:iec:60050-192-01-05}}).
  - content: IEC 60050-191:1990 (now withdrawn; replaced by IEC 60050-192:2015) identified
      the term “entity” as an English synonym, which is not true for all applications.
  - content: The definition for item in IEC 60050-191:1990 (now withdrawn; replaced
      by IEC 60050-192:2015) is a description rather than a definition. This new definition
      provides meaningful substitution throughout this document. The words of the
      former definition form new note 1.
