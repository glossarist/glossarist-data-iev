  - content: durée totale de la vie active d’un élément ou d'une batterie en fonctionnement
  examples: []
  id: 482-03-46
  notes:
  - content: Pour les piles, la durée de vie en service correspond au temps total
      ou à la capacité totale de décharge dans des conditions spécifiées.
  - content: Pour les accumulateurs et batteries d’accumulateurs, la durée de vie
      en service peut être exprimée en temps, nombre de cycles charge/décharge ou
      capacité en ampères heures (Ah).
