  definition:
  - content: "a figure of merit often used to characterize optical detector performance
      defined by the formula:\r\nstem:[D^(ast) = D sqrt(A * \"Delta\" f)]\r\nwhere
      stem:[D] is the detectivity, stem:[A] the area of the photosensitive region
      of the detector and Δstem:[f] the effective noise bandwidth"
