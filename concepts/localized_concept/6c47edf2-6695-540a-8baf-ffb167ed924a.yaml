  definition:
  - content: substance dont la conductivité due aux porteurs de charges des deux signes
      est normalement comprise entre celle des conducteurs et celle des isolants,
      et dont les nombres volumiques des porteurs de charge peuvent être modifiés
      par des excitations extérieures
  examples: []
  id: 121-12-06
  notes:
  - content: Le terme "semiconducteur" s'applique généralement au cas où les porteurs
      de charge sont des électrons ou des trous.
