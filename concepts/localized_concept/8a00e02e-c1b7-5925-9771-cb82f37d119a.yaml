---
data:
  definition:
  - content: "défaillance se produisant régulièrement dans des conditions particulières
      de manipulation, de stockage ou d’utilisation\r\nNote 1 à l’article: Une défaillance
      systématique peut être reproduite en appliquant délibérément les mêmes conditions,
      mais toutes les défaillances reproductibles ne sont pas systématiques. Note
      2 à l’article: La cause d’une défaillance systématique provient de la spécification,
      de la conception, de la fabrication, de l’installation, du fonctionnement ou
      de la maintenance de l’entité."
