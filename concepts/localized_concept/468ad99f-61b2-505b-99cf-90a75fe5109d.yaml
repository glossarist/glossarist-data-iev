  definition:
  - content: ability to perform as required, without failure, for a given time interval,
      under given conditions
  examples: []
  id: 192-01-24
  notes:
  - content: The time interval duration can be expressed in units appropriate to the
      item concerned, e.g. calendar time, operating cycles, distance run, etc., and
      the units should always be clearly stated.
  - content: 'Given conditions include aspects that affect reliability, such as: mode
      of operation, stress levels, environmental conditions, and maintenance.'
  - content: 'Reliability can be quantified using measures defined in http://www.electropedia.org/iev/iev.nsf/SearchView?SearchView&Query=field+SearchFields+contains+192-05+and+field+Language=en&SearchOrder=4&SearchMax=0[Section
