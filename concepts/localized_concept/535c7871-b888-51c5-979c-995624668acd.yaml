  definition:
  - content: "at a given point within a domain of quasi-infinitesimal volume stem:[V],
      vector quantity equal to the electric dipole moment stem:[*p*]  of the substance
      contained within the domain divided by the volume stem:[V]:\r\nstem:[P = \" \"
      \" \" frac(p)(V)]"
  examples: []
  id: 121-11-37
  notes:
  - content: |-
      The electric polarization stem:[*P*] satisfies the relation

      stem:[*D*] = stem:[ε]~0~stem:[*E*] + stem:[*P*]

      where stem:[*D*] is the electric flux density, stem:[*E*]  the electric field strength and stem:[ε]~0~ the electric constant.
