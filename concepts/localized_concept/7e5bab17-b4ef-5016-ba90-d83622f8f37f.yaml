data:
  definition:
  - content: "{{système, urn:iec:std:iec:60050-192-01-03}} conçu pour fournir un {{éclairage,
      urn:iec:std:iec:60050-845-29-001}}"
  examples: []
  id: 845-27-010
  notes:
  - content: Un système d'éclairage peut être dédié au. soutien d'une ou de plusieurs
      tâches visuelles spécifiées dans des conditions spécifiées compte tenu d'autres
      exigences telles que le confort humain, la sécurité, l'aspect de l'environnement
      immédiat et la consommation d'énergie;. soutien de tâches autres que les tâches
      humaines.
  - content: Un système d'éclairage peut inclure un ensemble de sources de lumière,
      d'autres composants physiques, des protocoles de communication des interfaces
      utilisateurs, des logiciels et des réseaux afin d'assurer des fonctions de commande
      et de surveillance.
  - content: La ou les sources de lumière et le matériel associé peuvent être intégrés
      en un seul élément, par exemple, un module LED, une lampe ou un luminaire.
  - content: Un système d'éclairage peut être mis en réseau afin d'assurer des fonctions
      de commande et de surveillance centrales ou distantes.
  - content: Un système d'éclairage peut être connecté ou intégré à d'autres systèmes
      ou dispositifs.
