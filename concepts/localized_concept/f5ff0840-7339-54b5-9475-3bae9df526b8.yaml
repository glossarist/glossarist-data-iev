  definition:
  - content: qualifie un accès ou un dispositif par l'intermédiaire duquel un signal
      est appliqué, une énergie ou une puissance est fournie, ou des informations
      sont fournies, à un dispositif ou à un équipement; par extension, qualifie ce
      signal, cette énergie ou puissance, ces informations, ou toute grandeur associée
