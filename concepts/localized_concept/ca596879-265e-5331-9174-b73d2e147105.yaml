  definition:
  - content: unité non SI employée pour l'éclairement rétinien nominal et la luminance
      de la pupille naturelle
  examples: []
  id: 845-22-038
  notes:
  - content: Lorsque l'œil observe une surface de luminance uniforme, la valeur numérique
      de l'éclairement rétinien nominal ou de la luminance de la pupille naturelle,
      exprimée en troland, est égale au produit de la surface en millimètres carrés
      de la pupille limitante, naturelle ou artificielle, par la luminance de la surface
      en candela par mètre carré.
  - content: Cet article était numéroté 845-02-16 dans l'IEC 60050-845:1987.
