  definition:
  - content: affaiblisseur à absorption variable constitué par un tronçon de guide
      d'ondes circulaire fonctionnant selon le mode stem:[ТЕ]~11~ et dans lequel l'élément
      absorbant se compose d'une lame dont le plan contient l'axe du guide d'ondes
      et qui peut tourner autour de cet axe
  examples: []
  id: 726-12-08
  notes:
