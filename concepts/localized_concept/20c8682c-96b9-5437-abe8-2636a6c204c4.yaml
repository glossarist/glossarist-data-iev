---
data:
  definition:
  - content: phénomène électromagnétique susceptible de dégrader le fonctionnement
      d'un dispositif, d'un équipement ou d'un système, ou d'affecter défavorablement
      la matière vivante ou inerte
  examples: []
  id: 161-01-05
  notes:
  - content: Une perturbation électromagnétique peut être un {{bruit électromagnétique,
      urn:iec:std:iec:60050-161-01-02}}, un {{signal non désiré, urn:iec:std:iec:60050-161-01-03}}
      ou une modification du milieu de propagation lui-même.
  - content: En français, les termes "{{perturbation électromagnétique, urn:iec:std:iec:60050-161-01-05}}"
      et "{{brouillage électromagnétique, urn:iec:std:iec:60050-161-01-06}}" désignent
      respectivement la cause et l’effet et ne devraient pas être utilisés l’un pour
      l’autre.
  - content: En anglais, les termes "{{electromagnetic disturbance, urn:iec:std:iec:60050-161-01-05}}"
      et "{{electromagnetic interference, urn:iec:std:iec:60050-161-01-06}}" désignent
      respectivement la cause et l’effet et ne devraient pas être utilisés l’un pour
      l’autre.
