  definition:
  - content: 'luminance that, when added by superposition to the luminance of both
      the adapting background and the object, makes the luminance threshold or the
      luminance difference threshold the same under the two following conditions:
      (1) glare present, but no additional luminance; (2) additional luminance present,
      but no glare'
  examples: []
  id: 845-22-104
  notes:
  - content: The equivalent veiling luminance is expressed in candela per square metre
      (cd·m^−2^).
  - content: This entry was numbered 845-02-58 in IEC 60050-845:1987.
  terms:
  - type: expression
    normative_status: preferred
    designation: equivalent veiling luminance
    usage_info: for disability glare or veiling reflections
