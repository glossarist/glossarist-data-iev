  definition:
  - content: method of measurement in which the value of a measurand is obtained directly,
      without the necessity for supplementary calculations based on a functional relationship
      between the measurand and other quantities actually measured
  examples: []
  id: 311-02-01
  notes:
  - content: The value of the measurand is considered to be obtained directly even
      when the scale of a measuring instrument has values which are linked to corresponding
      values of the measurand by means of a table or a graph.
  - content: The method of measurement remains direct even if it is necessary to make
      supplementary measurements to determine the values of influence quantities in
      order to make corrections.
