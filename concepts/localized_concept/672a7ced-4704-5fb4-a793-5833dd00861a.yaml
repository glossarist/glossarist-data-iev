---
data:
  definition:
  - content: '{{organisme, urn:iec:std:iec:60050-901-03-01}} constitué d’une organisation
      responsable et de tierces parties, qui propose, en sa qualité de contact, une
      assistance continue aux personnes qui utilisent des {{systèmes d’aide intelligents,
      urn:iec:std:iec:60050-871-04-30}} ou d’autres services AAD, et qui coordonne
      le service des {{assistants techniques AAD, urn:iec:std:iec:60050-871-02-03}}Note
      1 à l’article: Voir également la définition de "{{centre de soins télémédicaux,
      urn:iec:std:iec:60050-871-06-09}}", qui évalue les signes vitaux et les données
      métaboliques entrants et prend des mesures, alors que le centre de téléservices
      ne traite pas de la surveillance des signes vitaux et des données métaboliques
      ou d’autres services télémédicaux. Voir également assistant technique AAD.Note
      2 à l’article: Les heures de fonctionnement d’un centre de téléservices peuvent
      varier.'
