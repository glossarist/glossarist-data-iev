  definition:
  - content: number quantifying the acidic or the alkaline character of a solution,
      equal to the negative of the decimal logarithm of ion activity stem:[a]~H^+^~
      of the hydrogen cation H^+^ pH = −10 lg stem:[a]~H^+^~
  examples: []
  id: 114-01-21
  notes:
  - content: 'At about 25 °C aqueous solutions with:  *  pH < 7 are acidic; *  pH
      = 7 are neutral; *  pH > 7 are alkaline.  At temperatures far from 25 °C the
      pH of a neutral solution differs significantly from 7.'
  - content: For more details, see ISO 80000-9:2009, Annex C.
  - content: This entry was numbered 111-15-37 in IEC 60050-111:1996. It has been
      modified.
