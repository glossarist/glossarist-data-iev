  definition:
  - content: "une des trois composantes symétriques qui n'existe que dans un système
      triphasé déséquilibré de grandeurs sinusoïdales et qui est définie par l'expression
      mathématique complexe ci-après:\r\nstem:[<u>X</u>]~0~ = 1/3 (stem:[<u>X</u>]~L1~
      + stem:[<u>X</u>]~L2~ + stem:[<u>X</u>]~L3~)\n\noù stem:[<u>X</u>]~L1~, stem:[<u>X</u>]~L2~
      et stem:[<u>X</u>]~L3~ sont les expressions complexes des grandeurs de phase
      considérées, avec stem:[<u>X</u>] désignant les phaseurs de courant ou de tension
      du réseau"
