  definition:
  - content: appareil constitué d'un émetteur et d'un récepteur radioélectriques comportant
      des éléments de circuit communs et utilisant habituellement la même antenne
      pour l'émission et la réception
  examples: []
  id: 713-08-02
  notes:
  - content: Un émetteur-récepteur radioélectrique est souvent employé comme station
