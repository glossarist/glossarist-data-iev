---
data:
  definition:
  - content: "reprise sur erreur dans laquelle un système, un programme, une base
      de données ou une autre ressource du système est rétabli dans un état antérieur
      lui permettant d’accomplir les fonctions requises\r\nNote 1 à l’article: La
      reprise sur erreur par régression est utilisée dans un logiciel d’exploitation.
      Note 2 à l’article: La reprise sur erreur par régression implique d’enregistrer
      l’état interne de l’entité à certains stades de son fonctionnement."
