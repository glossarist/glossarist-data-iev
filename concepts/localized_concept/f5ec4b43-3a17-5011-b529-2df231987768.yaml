  definition:
  - content: the property of a colour characterized by the proportion of a monochromatic
      colour stimulus, in an additive mixture with a specified achromatic stimulus,
      which matches the stimulus of the colour under consideration
  examples: []
  id: 723-08-40
  notes:
  - content: In television the concept of saturation is analogous to the concept of
      colour purity utilized in colorimetry.
  - content: The saturation of a colour becomes the greater as it approaches a monochromatic
      colour.
  - content: In the case of purple stimuli the monochromatic stimulus is replaced
      by a stimulus which corresponds to a point on the purple boundary.
