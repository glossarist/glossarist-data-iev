---
data:
  definition:
  - content: quotient du flux énergétique pondéré par l'{{efficacité lumineuse relative
      spectrale, urn:iec:std:iec:60050-845-21-035}} sur le flux énergétique correspondant
      pour une condition photométrique spécifiée
  examples: []
  id: 845-21-094
  notes:
  - content: Il convient de spécifier la condition photométrique (par exemple, photopique,
      scotopique, mésopique). En l'absence de spécification, la vision photopique
      est par hypothèse utilisée, de même que le symbole stem:[V.] Pour les autres
      conditions photométriques, le symbole respectif pour l'identification doit être
      utilisé.
  - content: L'efficacité lumineuse relative pour la vision photopique est exprimée
      parstem:[V = frac(int_(0)^(oo) Phi_("e" , lambda) ( lambda ) V ( lambda ) "d"
      lambda)(int_(0)^(oo) Phi_("e" , lambda) ( lambda ) "d" lambda) = frac(K)(K_("m"))]où
      stem:[Φ]~e,~stem:[~λ~] est le flux énergétique spectral, stem:[V](stem:[λ])
      est l'efficacité lumineuse relative spectrale, stem:[λ] est la longueur d'onde,
      stem:[K] est l'efficacité lumineuse du rayonnement, et stem:[K]~m~ est l'efficacité
      lumineuse maximale.
  - content: L'unité d'efficacité lumineuse relative est un.
  - content: Cet article était numéroté 845-01-57 dans l'IEC 60050-845:1987.
