  definition:
  - content: résultat d'un processus [ISO 9000:2000, 3.4.2]
  examples: []
  id: 902-02-03
  notes:
  - content: 'Quatre catégories génériques de produits sont définies dans l''ISO 9000:2000,
      à savoir les services (exemple: le transport), les logiciels (exemple: logiciel,
      dictionnaire), les matériels (exemple: moteur, pièce mécanique), les produits
      transformés (exemple: lubrifiant). De nombreux produits sont constitués d''éléments
      appartenant à différentes catégories génériques de produits. Le produit est
      appelé service, logiciel, matériel ou produit transformé en fonction de l''élément
      dominant.'
  - content: La déclaration de conformité décrite dans la Note 1 en {{902-04-02, urn:iec:std:iec:60050-902-04-02}}
      peut être considérée comme un produit d'{{attestation, urn:iec:std:iec:60050-902-04-02}}.
