---
data:
  definition:
  - content: "procédé de {{collage, urn:iec:std:iec:60050-523-06-01}} direct de deux
      {{substrats, urn:iec:std:iec:60050-521-05-28}} en augmentant l'énergie de surface
      de chaque substrat, en utilisant un faisceau ionique ou un rayonnement plasma\r\nNote
      1 à l’article: Le collage avec activation de surface est efficace pour réduire
      les contraintes thermiques, car la température du procédé de collage est relativement
      faible.  Le collage avec activation de surface est susceptible d'être appliqué
      aux  {{dispositifs, urn:iec:std:iec:60050-151-11-20}} à MEMS, pour le collage
      hermétique du substrat."
