---
data:
  definition:
  - content: fonctionnement du matériel conforme électriquement et mécaniquement à
      la spécification de conception et utilisé dans les limites spécifiées par le
      constructeur
  examples: []
  id: 426-04-10
  notes:
  - content: Les limites spécifiées par le constructeur peuvent inclure des conditions
      de fonctionnement continu, par exemple le fonctionnement dans un cycle de service.
  - content: La variation de la tension d'alimentation dans des limites établies et
      toute autre tolérance fonctionnelle fait partie des conditions normales de fonctionnement.
  - content: 'Pour les machines électriques, le fonctionnement normal est spécifié
      en fonction du service type (S1…S10 selon l''IEC 60034-1, _Machines électriques
      tournantes – Partie 1: Caractéristiques assignées et caractéristiques de fonctionnement_).'
