  definition:
  - content: "grandeur qui caractérise la dispersion de profil due à la variation
      du contraste d'indice en fonction de la longueur d'onde par l'expression:\r\nstem:[P
      (lambda) = frac(n_(1 \" \") lambda \" \" \"d\" \"Delta\")(N_(1) \" \" \"Delta\"
      \" \" \"d\" lambda)]\n\noù\r\nstem:[n]~1~ est l'indice de réfraction maximal
      dans le coeur,\n\nstem:[N]~1~ est l'indice de groupe du coeur, calculé par la
      formule:\r\nstem:[N]~1~ = stem:[n]~1~ = stem:[λ] (dstem:[n]~1~ / dstem:[λ])\r\nΔ
      est le contraste d'indice,\n\nstem:[λ] est la longueur d'onde dans le vide"
