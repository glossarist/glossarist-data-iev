---
data:
  definition:
  - content: "pour un bipôle résistif, élémentaire ou non, de bornes A et B, quotient
      du courant électrique stem:[i] dans le bipôle par la tension électrique stem:[u]~AB~
      ({{131-11-56, urn:iec:std:iec:60050-131-11-56}}) entre les bornes stem:[G =
      frac(i)(u_(rm(AB)))]\r\noù le courant est positif si le sens du courant est
      de A vers B et négatif si son sens est de B vers ANote 1 à l’article: La conductance
      d'un bipôle est l'inverse de sa résistance. Note 2 à l’article: Le terme «conductance»
      désigne aussi elliptiquement la conductance en courant alternatif ({{131-12-53,
      urn:iec:std:iec:60050-131-12-53}}). Note 3 à l’article: L’unité SI cohérente
      de résistance est le siemens, S."
