  definition:
  - content: région de l'espace où les composantes prépondérantes du champ électromagnétique
      sont celles qui correspondent à une propagation d'énergie et où la répartition
      du champ en fonction de la direction est pratiquement indépendante de la distance
      à l'antenne
  examples: []
  id: 712-02-02
  notes:
  - content: Dans la région de champ lointain, toutes les composantes du champ décroissent
      de façon inversement proportionnelle à la distance à l'antenne.
  - content: Pour une antenne à rayonnement transversal dont la dimension maximale
      stem:[D] est grande par rapport à la longueur d'onde stem:[λ], on considère
      généralement que la région de champ lointain est située au-delà d'une distance
      à l'antenne égale à 2stem:[D]^2^/stem:[λ] dans la direction du maximum de rayonnement.
