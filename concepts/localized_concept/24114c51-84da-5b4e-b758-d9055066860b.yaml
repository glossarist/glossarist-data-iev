---
data:
  definition:
  - content: "technique de dépôt de couches minces dont la résolution en épaisseur
      est de l'ordre de l'atome\r\nNote 1 à l’article: En modifiant de manière séquentielle
      les gaz précurseurs, le procédé de dépôt chimique peut être contrôlé jusqu'à
      l'échelle atomique ou moléculaire. Dans le procédé d'{{épitaxie, urn:iec:std:iec:60050-521-03-12}}
      par faisceaux moléculaires, qui est une des techniques connexes, la couche déposée
      a la même structure cristalline que celle d'un {{substrat, urn:iec:std:iec:60050-521-05-28}}
      monocristallin. \r\nNote 2 à l’article: Le terme abrégé \"ALD\" est dérivé du
      terme anglais développé correspondant \"atomic layer deposition\"."
