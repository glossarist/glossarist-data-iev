  definition:
  - content: modulation à spectre étalé dans laquelle la fréquence porteuse est modifiée
      automatiquement à intervalles rapprochés, par choix pseudoaléatoire, dans un
      ensemble de fréquences qui couvre une bande de fréquences de largeur beaucoup
      plus grande que celle qui serait nécessaire pour les informations à transmettre
  examples: []
  id: 725-14-32
  notes:
  - content: La cadence des sauts de fréquence peut être plus rapide ou plus lente
      que le débit numérique du signal à transmettre.
