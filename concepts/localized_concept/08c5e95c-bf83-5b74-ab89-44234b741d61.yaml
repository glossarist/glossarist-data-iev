  definition:
  - content: modification for the purposes of software fault removal, adaptation to
      a new environment, or improvement of performance
  examples: []
  id: 192-06-15
  notes:
  - content: 'Software maintenance activities carried out for these three purposes
      are referred to as: corrective maintenance ({{192-06-06, urn:iec:std:iec:60050-192-06-06}});
      adaptive maintenance ({{192-06-16, urn:iec:std:iec:60050-192-06-16}}); and perfective
      maintenance ({{192-06-17, urn:iec:std:iec:60050-192-06-17}}), respectively.'
  - content: Following maintenance, the state of a software item is different than
      its previous state.
