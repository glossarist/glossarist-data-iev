  definition:
  - content: domain wall in which the vector component of the magnetic area moment
      perpendicular to the plane of the wall is substantially constant, within and
      on either side of the wall
  examples: []
  id: 121-12-55
  notes:
  - content: Bloch walls are normally found only in bulk materials and thick films;
      in thinner films below a critical thickness, the formation of Néel walls is
      favourable from energy considerations.
