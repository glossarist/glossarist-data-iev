data:
  definition:
  - content: "technologie formant des couches épaisses sur le {{substrat, urn:iec:std:iec:60050-521-05-28}}\r\nNote
      1 à l’article: Une couche épaisse est une couche d’une épaisseur d’environ 5
      µm ou plus, formée par le revêtement d’une pâte à l’encre ou d’une impression
      par pulvérisation, et d’un étuvage postérieur. Les couches épaisses sont appliquées
      dans la fabrication des {{actionneurs, urn:iec:std:iec:60050-151-13-49}} piézoélectriques
      ou magnétiques."
