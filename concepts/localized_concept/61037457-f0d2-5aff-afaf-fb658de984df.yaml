data:
  definition:
  - content: 'technique de refroidissement dans laquelle l''objet à refroidir est
      immergé dans un réfrigérant liquide ou gazeux, ce réfrigérant passant sur l''objet
      par circulation naturelle ou forcéeNote 1 à l’article: Refroidissement par convection
      forcée: technique de refroidissement par circulation forcée d''un réfrigérant
      liquide ou gazeux autour de l''objet à refroidir. Note 2 à l’article: Refroidissement
      par convection naturelle: technique de refroidissement par circulation d''un
      réfrigérant liquide ou gazeux, due au chauffage localisé du fluide près de la
      surface de l''objet à refroidir.'
