  definition:
  - content: 'phénomène se produisant dans un système, lorsqu''un élément à action
      par intégration est suivi par un élément non linéaire fonctionnant dans son
      domaine de saturation; il en résulte un retard de la réponse de la variable
      de sortie à un changement de signe de la variable d''entréeNote 1 à l’article:
      Dans une boucle d''asservissement, ce retard dans la réponse de la variable
      de sortie peut provoquer un dépassement excessif de la variable commandée.'
