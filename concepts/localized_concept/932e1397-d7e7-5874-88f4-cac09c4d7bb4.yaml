  definition:
  - content: having an intermediate resistivity or resistance that lies between the
      conductive and insulating ranges
  examples: []
  id: 426-25-02
  notes:
  - content: Dissipative materials or objects are neither conductive nor insulating
      but, like conductive items, safely limit contact charging and/or dissipate even
      the maximum charging currents associated with their designed application when
      in contact with the earth.
  - content: 'Boundary limits for the dissipative range for solid materials, enclosures,
      some objects and for bulk materials are given in IEC TS 60079-32-1, _Explosive
      atmospheres – Part 32-1: Electrostatic hazards, guidance_.'
  - content: Product standards often include specific definitions of "dissipative"
      which apply only to items covered by those standards and can be different to
      the definitions given here.
