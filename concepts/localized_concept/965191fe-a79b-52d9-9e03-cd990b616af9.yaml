data:
  definition:
  - content: 'qualifie un matériau pouvant présenter le phénomène de supraconductivité
      dans des conditions appropriéesNote 1 à l’article: Les conditions appropriées
      concernent la température, le champ magnétique, la déformation et la densité
      de courant électrique. Note 2 à l’article: En français, on utilise l’adjectif
      "supraconducteur" aussi bien pour "superconducting" que pour "superconductive"
      en anglais. Note 3 à l’article: Le terme "supraconducteur" est également utilisé
      pour décrire un dispositif constitué d’un ou de plusieurs composants supraconducteurs.'
