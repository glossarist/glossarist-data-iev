  definition:
  - content: parameter, associated with the result of a measurement, that characterizes
      the dispersion of the values that could reasonably be attributed to the measurand
  examples: []
  id: 815-17-19
  notes:
  - content: 'This formal definition of the term “uncertainty of measurement” was
      developed for use in ISO/IEC Guide 98-3:2008, _Uncertainty of measurement –
      Part 3: Guide to the expression of uncertainty in measurement (GUM 1995)_, and
      ISO/IEC Guide 99:2007, _International vocabulary of metrology – Basic and general
      concepts and associated terms (VIM)_.'
