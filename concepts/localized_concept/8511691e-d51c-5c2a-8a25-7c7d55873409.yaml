  definition:
  - content: satellite dont la mission principale est de retransmettre des données
      provenant d'un ou de plusieurs satellites ou sondes spatiales vers une ou plusieurs
      stations terriennes
  examples: []
  id: 725-12-53
  notes:
  - content: Un satellite relais de données peut aussi établir des communications
      dans l'autre sens, d'une station terrienne vers un satellite d'observation ou
      une sonde spatiale. De plus, il peut être utilisé comme relais pour l'exploitation
      des engins spatiaux.
  - content: "Les satellites relais de données sont généralement des satellites géostationnaires.\r\nimage::/assets/images/parts/725/[]"
