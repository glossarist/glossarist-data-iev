  definition:
  - content: vision by the normal eye in which rods are the principal active photoreceptors
  examples: []
  id: 845-22-017
  notes:
  - content: Scotopic vision normally occurs when the eye is adapted to levels of
      luminance of less than 0,005 cd·m^−2^.
  - content: In comparison with photopic vision, scotopic vision is characterized
      by the lack of colour perception and by a shift of the visual sensitivity function
      towards shorter wavelengths.
  - content: This entry was numbered 845-02-10 in IEC 60050-845:1987.
