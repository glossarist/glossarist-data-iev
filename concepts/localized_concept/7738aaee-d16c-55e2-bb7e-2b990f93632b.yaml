  definition:
  - content: "for a given chemical reaction stem:[α]A + stem:[β]B + … ↔ stem:[σ]S
      + stem:[τ]T + …, quantity given by \r\nstem:[r = frac(1)(alpha) frac(\"d\" c
      ( \"A\" ))(\"d\" t) = frac(1)(beta) frac(\"d\" c ( \"B\" ))(\"d\" t) = frac(1)(sigma)
      frac(\"d\" c ( \"S\" ))(\"d\" t) = frac(1)(tau) frac(\"d\" c ( \"T\" ))(\"d\"
      t)]\n\nwhere A, B, ... denote reactants, S, T, ... denote products, −stem:[α],
      −stem:[β], …, stem:[σ], stem:[τ], … are the corresponding stoichiometric numbers,
      and stem:[c](A), stem:[c](B), …, stem:[c](S), stem:[c](T), … are the amount-of-substance
      concentrations of A, B, ... S, T, ..., respectively"
  examples: []
  id: 114-02-02
  notes:
  - content: The coherent SI unit of reaction rate is mole per cubic metre second,
      mol m^−3^ s^−1^.
