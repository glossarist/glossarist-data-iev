---
data:
  definition:
  - content: quotient de l'éclairement lumineux en un point d'un plan donné, dû à
      la lumière reçue directement et indirectement d'un ciel dont la distribution
      des luminances est réputée ou connue, par l'éclairement lumineux sur un plan
      horizontal provenant d'un hémisphère sans obstruction de ce ciel, la contribution
      de la lumière solaire directe à ces deux éclairements lumineux étant exclue
  examples: []
  id: 845-29-121
  notes:
  - content: Les influences des vitrages, des salissures, etc. sont incluses.
  - content: Pour le calcul de l'{{éclairage, urn:iec:std:iec:60050-845-29-001}},
      la contribution de la lumière solaire directe doit être prise en considération
      séparément.
  - content: L'unité de facteur de lumière du jour est un.
  - content: Cet article était numéroté 845-09-97 dans l'IEC 60050-845:1987.
