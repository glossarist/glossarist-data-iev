  definition:
  - content: "service de radiocommunication spatiale dans lequel:\r\n– des renseignements
      relatifs aux caractéristiques de la Terre et de ses phénomènes naturels sont
      obtenus à partir de capteurs actifs ou passifs situés sur des satellites de
      la Terre;\r\n– des renseignements analogues sont recueillis par un satellite
      de la Terre à partir de plate-formes aéroportées ou situées sur la Terre qui
      émettent automatiquement ou sur interrogation;\r\n– ces renseignements peuvent
      être distribués à des stations terriennes"
  examples: []
  id: 713-05-07
  notes:
  - content: Ce service de radiocommunication peut aussi comprendre les liaisons de
      connexion nécessaires à son exploitation et des liaisons intersatellites.
