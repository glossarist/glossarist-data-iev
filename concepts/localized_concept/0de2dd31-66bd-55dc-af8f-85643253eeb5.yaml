  definition:
  - content: "the fractional change of effective permeability due to a change in temperature
      divided by that change in temperature:\r\nstem:[alpha_(mu e) = frac((mu_(\"e\"))_(theta)
      - (mu_(\"e\"))_(\"ref\"))((mu_(\"e\"))_(\"ref\") (theta - theta_(\"ref\")))]\r\nwhere
      (stem:[µ]~e~)stem:[~θ~] and (stem:[µ]~e~)~ref~ are the effective permeabilities
      at temperatures stem:[θ] and stem:[θ]~ref~ respectively"
