  definition:
  - content: in a given direction, the ratio of the available power at the terminals
      of a receiving antenna to the power flux density of a plane wave of specified
      polarization incident on the antenna from that direction
  examples: []
  id: 712-02-46
  notes:
  - content: If no direction is specified, the direction corresponding to maximum
      available power is implied.
  - content: "In free space, for a given polarization and direction, the partial effective
      area stem:[A]~ep~ of an antenna used for reception is related to the partial
      gain stem:[G]~p~ of the same antenna used for transmission, by the equation:stem:[G_(\"p\")
      = frac(4 pi A_(\"ep\"))(lambda^(2))]\r\nwhere stem:[λ] is the wavelength."
  terms:
  - type: expression
    normative_status: preferred
    designation: partial effective area
