  definition:
  - content: the velocity vector at a given point and in a given direction of the
      movement of a wavefront of a sinusoidal travelling wave, defined by a specified
      phase
  examples: []
  id: 705-02-16
  notes:
  - content: If no direction is specified, the phase velocity to be considered is
      that in the direction of propagation.
  - content: In the direction of propagation, the magnitude of the phase velocity
      has a minimum value equal to the angular frequency divided by the absolute value
      of the real component of the wave vector.
  terms:
  - type: expression
    normative_status: preferred
    designation: phase velocity (vector)
