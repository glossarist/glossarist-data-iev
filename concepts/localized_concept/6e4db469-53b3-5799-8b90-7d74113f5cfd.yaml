  - content: densité du flux photonique incident par rapport à l'aire en un point
      d'une surface réelle ou fictivestem:[E_("p") = frac("d" Phi_("p"))("d" A)]où
      stem:[Φ]~p~ est le flux photonique et stem:[A] est l'aire qui reçoit ce flux
