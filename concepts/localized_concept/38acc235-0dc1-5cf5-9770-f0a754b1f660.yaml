  definition:
  - content: |-
      grandeur scalaire complexe stem:[<u>n</u>], sans dimension, caractérisant un milieu en un point et dans une direction donnée, lorsque peut y exister une onde électromagnétique sinusoïdale dont le vecteur d'onde stem:[vec(underline(K))] a ses parties réelle stem:[vec(K^(prime))] et imaginaire stem:[vec(K^(dprime))] colinéaires dans la direction donnée; cette grandeur est définie par la relation:

      stem:[vec(underline(K)) = vec(K^(prime)) + rm(j) vec(K^(dprime)) = underline(n) frac(omega)(c_(0)) vec(u)]

      où stem:[ω] est la pulsation, stem:[c]~0~ la vitesse de propagation des ondes électromagnétiques dans le vide et stem:[vec(u)] le vecteur unitaire de la direction donnée
  examples: []
  id: 705-03-20
  notes:
  - content: Dans un milieu isotrope, l'indice de réfraction complexe est la racine
      carrée du produit de la permittivité relative complexe par la perméabilité relative
      complexe.
  - content: Dans un milieu anisotrope, il y a en général, pour chaque direction,
      deux vecteurs d'onde distincts et deux valeurs de l'indice de réfraction complexe.
