  definition:
  - content: phenomenon by which {{energy, urn:iec:std:iec:60050-113-03-45}} in the
      form of {{electromagnetic waves, urn:iec:std:iec:60050-121-11-63}} or {{photons,
      urn:iec:std:iec:60050-113-05-14}} emanates from a source and is transferred
      through space
  examples: []
  id: 702-02-07
  notes:
  - content: The term “electromagnetic radiation” is also used for the electromagnetic
      waves or photons produced (see {{IEV 705-02-01, urn:iec:std:iec:60050-705-02-01}}).
  - content: The physical concepts of photons and electromagnetic waves are used to
      describe the same phenomenon of transmission of radiant energy in different
      ways, depending on the nature of the interaction of the energy with the physical
      world (wave-particle dualism).
