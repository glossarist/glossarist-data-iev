data:
  definition:
  - content: 1) pour une variable aléatoire discrète stem:[X] prenant les valeurs
      stem:[x]~i~ avec les probabilités stem:[p]~i~, somme stem:[E](stem:[X]) = ∑stem:[~i~]
      stem:[p~i~x~i~] étendue à toutes les valeurs stem:[x]~i~ susceptibles d'être
      prises par stem:[X] 2) pour une variable aléatoire continue stem:[X] de densité
      de probabilité stem:[f](stem:[x]), valeur de l'intégrale stem:[E](stem:[X])
      = ∫stem:[xf(x)]dstem:[x]
