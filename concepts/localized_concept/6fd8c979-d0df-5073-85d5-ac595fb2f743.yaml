  definition:
  - content: number of {{supply interruptions, urn:iec:std:iec:60050-692-07-01}} experienced
      by the individual customers affected at least once during a time interval, divided
      by the product of the number of affected customers and the duration of that
      time interval
  examples: []
  id: 692-08-02
  notes:
  - content: "If stem:[N]~NS~ is the number of customers affected and the supply of
      customer stem:[j] is interrupted stem:[n]~stem:[j]~ times during a time interval
      of duration stem:[T], then the interruption frequency per customer interrupted
      is given bystem:[f_(\"CI\") = frac(sum_(j) n_(j))(N_(\"NS\") T)]\r\nWhen determining
      stem:[N]~NS~, each customer affected must be counted only once, regardless of
      the number of interruptions experienced during that time interval."
  - content: Usually, only {{sustained interruptions, urn:iec:std:iec:60050-692-07-02}}
      are considered.
  - content: The term "customer" represents the end user and not some intermediate
      distribution system or company.
  - content: Interruption frequency per customer interrupted can be used to describe
      past performance or to estimate expected future performance.
  - content: This entry was numbered 191-27-02 in IEC 60050-191:1990.
  terms:
