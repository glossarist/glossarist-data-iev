  notes:
  - content: 'Les coordonnées du produit tensoriel d''un tenseur stem:[T] et d''un
      vecteur *stem:[U]* sont: stem:[(T ox U)_(i j k) = T_(i j) U_(k)].'
  - content: Le produit tensoriel d'un tenseur et d'un vecteur est noté stem:[T ox
      U].
