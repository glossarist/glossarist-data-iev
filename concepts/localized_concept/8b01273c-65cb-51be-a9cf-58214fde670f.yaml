  definition:
  - content: tenseur du troisième ordre défini par la forme trilinéaire égale au produit
      de la forme bilinéaire qui définit un tenseur du deuxième ordre sur un espace
      euclidien donné et de la forme linéaire identifiée à un vecteur du même espace
  examples: []
