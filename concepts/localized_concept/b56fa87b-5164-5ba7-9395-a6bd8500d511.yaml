  definition:
  - content: quotient of the total luminous flux of the luminaire, measured under
      specified practical conditions with its own lamp(s) and equipment, and the sum
      of the individual luminous fluxes of the same lamp(s) when operated outside
      the luminaire with the same equipment, under specified conditions
  examples: []
  id: 845-29-052
  notes:
  - content: For luminaires using incandescent lamps only, the optical light output
      ratio and the light output ratio are the same in practice.
  - content: The light output ratio has unit one.
  - content: This entry was numbered 845-09-39 in IEC 60050-845:1987.
  - content: This note applies to the French language only.
