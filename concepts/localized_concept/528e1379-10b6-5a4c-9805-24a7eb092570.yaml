  definition:
  - content: "circulation d’un potentiel vecteur magnétique *stem:[A]* le long d’une
      courbe C:\r\nstem:[Psi = int_(\"C\") A * \"d\" r]\r\noù d*stem:[r]* est l’élément
      vectoriel d’arc"
