  notes:
  - content: "Pour une courbe fermée C, le flux totalisé est égal au flux magnétique
      à travers toute surface S délimitée par la courbe:\r\nstem:[oint_(\"C\") A *
      \"d\" r \" \" = \" \" int_(\"S\") B * e_(\"n\") \"d\" A]\r\noù *stem:[B]* est
      l’induction magnétique et *stem:[e]*~n~dstem:[A] l’élément vectoriel de surface."
  - content: Pour une bobine de stem:[N] tours, le flux totalisé est approximativement
      égal à stem:[NΦ] où stem:[Φ] est le flux magnétique à travers toute surface
      délimitée par un tour.
