  definition:
  - content: time integral of the blue light hazard radiance, stem:[L]~B~, as integrated
      with respect to the exposure duration
  examples: []
  id: 845-26-058
  notes:
  - content: This definition is based on the assumption that an action spectrum is
      adopted for the actinic effect considered, and that its maximum value is 1.
  - content: It is essential to specify which actinic action spectrum is used, as
      the unit is the same for any action spectrum.
  - content: See also "{{radiance dose, urn:iec:std:iec:60050-845-21-067}}".
  - content: The blue light hazard radiance dose is expressed in joule per square
      metre per steradian (J·m^−2^·sr^−1^).
