  definition:
  - content: timescale which forms the basis of a coordinated radio dissemination
      of standard frequencies and time signals. It corresponds exactly in rate with
      international atomic time, but differs from it by an integral number of seconds
  examples: []
  id: 713-05-20
  notes:
  - content: Coordinated universal time is established by the International Bureau
      of Weights and Measures (BIPM) and the International Earth Rotation Service
      (IERS).
  - content: The UTC scale is adjusted by the insertion or deletion of seconds, so
      called positive or negative leap seconds, to ensure approximate agreement with
      UT1.
