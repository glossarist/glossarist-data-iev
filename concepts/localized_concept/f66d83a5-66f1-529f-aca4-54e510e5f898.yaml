data:
  definition:
  - content: fonction nulle pour toute valeur négative de la variable indépendante
      et égale à un pour toute valeur positive
  examples: []
  id: 103-03-01
  notes:
  - content: Voir la Figure 1 ci-dessous pour une représentation graphique de ε(stem:[t]).
      La valeur ε(0) peut rester indéfinie ou être définie selon le contexte.
  - content: ε(stem:[x] − stem:[x]~0~) représente un échelon unité à la valeur stem:[x]~0~
      de la variable indépendante stem:[x].
  - content: La notation H(stem:[x]) est aussi utilisée. La notation ϑ(stem:[t]) est
      utilisée pour la fonction échelon unité du temps. La notation ϒ(stem:[x]) a
      aussi été utilisée.
