  definition:
  - content: valeur d’une grandeur spécifiée dans une norme
  examples: []
  id: 151-16-07
  notes:
  - content: Une norme est un document, établi par consensus et approuvé par un organisme
      reconnu, qui fournit, pour des usages communs et répétés, des règles, des lignes
      directrices ou des caractéristiques, pour des activités ou leurs résultats,
      garantissant un niveau d'ordre optimal dans un contexte donné. La CEI et l’ISO
      sont des organismes internationaux reconnus.
