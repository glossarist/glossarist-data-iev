  definition:
  - content: stimulus de couleur de chromaticité équivalente à celle du {{blanc adopté,
      urn:iec:std:iec:60050-845-32-058}}
  examples: []
  id: 845-32-001
  notes:
  - content: Lorsqu'il est indiqué qu'une zone d'image est un neutre colorimétrique,
      il est nécessaire de désigner le blanc adopté. Dans le cas des {{copies papier,
      urn:iec:std:iec:60050-845-32-045}} par réflexion, le blanc adopté est généralement
      considéré comme étant soit le blanc du support ou une surface réfléchissante
      parfaitement diffuse éclairée par la source d'éclairage.
  - content: Le blanc adopté du neutre colorimétrique peut ou non correspondre au
      {{blanc adapté, urn:iec:std:iec:60050-845-23-081}} selon un observateur.
