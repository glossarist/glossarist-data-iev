  definition:
  - content: retour du matériau d’un état de déchet à l'état utile antérieur en éliminant
      les composants nuisibles
  examples: []
  id: 212-13-18
  notes:
  - content: "Exemples de régénération:\r\n– régénération du caoutchouc par élimination
      des agents de vulcanisation;\r\n– régénération des isolants liquides par élimination
      des impuretés solubles et insolubles par des moyens d'absorption chimique, en
      plus des moyens mécaniques, afin de rétablir des propriétés se rapprochant le
      plus possible de leurs valeurs initiales; l’utilisation d’antioxydants est également
      possible."
