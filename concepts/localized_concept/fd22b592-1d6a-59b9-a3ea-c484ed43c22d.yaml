  definition:
  - content: électrode capable d’émettre des porteurs de charge positifs vers le milieu
      de plus faible conductivité ou de collecter des porteurs de charge négatifs
      qui en proviennent
  examples: []
  id: 841-22-31
  notes:
  - content: Le sens du courant électrique va du circuit extérieur vers le milieu
      de plus faible conductivité à travers l’anode.
  - content: Dans certains cas (par exemple pour les éléments électrochimiques), le
      terme "anode" désigne l’une ou l’autre électrode selon le régime électrique
      du dispositif. Dans d’autres cas (par exemple pour les tubes électroniques et
      les dispositifs semi-conducteurs), le terme "anode" désigne une électrode particulière.
