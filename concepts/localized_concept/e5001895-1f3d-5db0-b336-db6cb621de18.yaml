  definition:
  - content: "the quotient of dstem:[E]~col~ by the product of stem:[ρ] and dstem:[l],
      where dstem:[E]~col~ is the energy lost by a charged particle of specified energy
      by collisions in traversing the path length dstem:[l] in a material of density
      stem:[ρ] :\r\nstem:[frac(S_(\"col\"))(rho) = frac(1)(rho) * (frac(\"d\" E)(\"d\"
      l))_(\"col\")]"
  examples: []
  id: 881-12-50
  notes:
  - content: The energy losses included are those that produce excitation and ionization
      of atoms as well as those producing recoil atoms.
  terms:
  - type: expression
    normative_status: preferred
    designation: collision mass stopping power
