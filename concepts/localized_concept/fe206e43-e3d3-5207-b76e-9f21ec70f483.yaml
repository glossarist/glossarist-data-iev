  definition:
  - content: numerical value of the Celsius temperature expressed in degrees Celsius,
      up to which a material possesses known, satisfactory service performance in
      a specified application
  examples: []
  id: 212-12-15
  notes:
  - content: A material with known ATE may be used as control material in comparative
      tests of materials without established ATE.
  - content: The value of the ATE may vary between different applications for the
      same material.
  - content: The ATE is sometimes referred to as absolute thermal endurance index.
