  definition:
  - content: ideal {{thermal radiator, urn:iec:std:iec:60050-845-24-003}} that absorbs
      completely all incident radiation, whatever the wavelength, the direction of
      incidence or the polarization
  examples: []
  id: 845-24-004
  notes:
  - content: A Planckian radiator has, for any wavelength and any direction, the maximum
