  definition:
  - content: 'multi-postion element the output variable of which may assume one of
      two discrete values SEE: Figure 19.'
  examples: []
  id: 351-50-21
  notes:
  - content: The change of the output variable can occur at a pair of switching values,
      that is at different values of the input variable depending on direction of
      change; the difference in these values is called the differential gap (see 351-50-25).
