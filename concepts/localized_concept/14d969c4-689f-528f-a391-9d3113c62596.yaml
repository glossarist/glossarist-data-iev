data:
  definition:
  - content: "représentation d'une grandeur intégrale sinusoïdale par une grandeur
      complexe dont l'argument est égal à la phase à l'origine et le module est égal
      à la valeur efficace ({{103-02-03, urn:iec:std:iec:60050-103-02-03}})Note 1
      à l’article: Pour une grandeur \n\nle phaseur est stem:[A \" \" exp\" \" rm(j)
      vartheta_(0)]. On utilise souvent le phaseur de courant électrique stem:[underline(I)]
      et le phaseur de tension électrique stem:[underline(U)]. Note 2 à l’article:
      La représentation semblable où le module est égal à l'amplitude est parfois
      aussi appelée «phaseur». Voir {{103-07-14, urn:iec:std:iec:60050-103-07-14}}.
      Note 3 à l’article: Un phaseur peut aussi être représenté graphiquement."
