  definition:
  - content: milieu dans lequel un champ électrique variable produit un vecteur densité
      de courant électrique stem:[vec(J)], dont la projection selon une direction
      donnée a une norme grande par rapport à celle de la projection du vecteur stem:[frac(del
      vec(D))(del t)], dans une bande de fréquence déterminée
  examples: []
  id: 705-03-09
  notes:
  - content: "Dans un milieu isotrope, la propriété d'être conducteur se traduit en
      régime sinusoïdal par la condition:\r\nstem:[frac(sigma)(epsilon_(0) omega)
      gg epsilon_(\"r\")^(prime)]\n\noù  stem:[epsilon_(\"r\")^(prime)] est la permittivité
      relative réelle, stem:[ε]~0~ est la constante électrique, stem:[σ] est la conductivité,
      stem:[ω] est la pulsation."
  - content: Un milieu anisotrope peut n'être conducteur que dans certaines directions.
