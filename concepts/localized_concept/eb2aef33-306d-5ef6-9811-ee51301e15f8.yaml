data:
  definition:
  - content: série de réactions nucléaires de fission dans lesquelles le neutron nécessaire
      à une fission est lui-même produit par la fission précédente
  examples: []
  id: 395-02-59
  notes:
  - content: Selon que le nombre des réactions ainsi provoquées directement par une
      réaction est en moyenne inférieur, égal ou supérieur à l’unité, la réaction
      est convergente (sous-critique), auto-entretenue (critique) ou divergente (surcritique).
