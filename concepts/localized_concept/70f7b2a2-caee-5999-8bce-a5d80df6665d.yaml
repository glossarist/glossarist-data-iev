  definition:
  - content: différence entre les potentiels électriques en deux points
  examples: []
  id: 121-11-26
  notes:
  - content: "La différence de potentiel électrique stem:[V]~b~ − stem:[V]~a~ entre
      deux points a et b est égale à l'opposé de la circulation, le long d’un chemin
      quelconque joignant les points a et b, du vecteur irrotationnel\r\nstem:[(E
      + frac(del A)(del t))], où stem:[*E*] est le champ électrique, stem:[*A*] un
      potentiel vecteur magnétique et stem:[t] le temps:\r\nstem:[V_(\"b\") - \" \"
      \" \" V_(\"a\") = \" \" - \" \" int_(r_(mathbf(a)))^(r_(mathbf(b))) (E + frac(del
      \" \" A)(del \" \" t)) * \"d\" r]\r\noù stem:[*r*]~a~ et stem:[*r*]~b~ sont
      les rayons vecteurs de a et b respectivement et dstem:[*r*] est l'élément vectoriel
      d'arc."
