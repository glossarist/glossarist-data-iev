---
data:
  definition:
  - content: "interconnexion électronique pénétrant perpendiculairement entre les
      deux surfaces d'un {{substrat, urn:iec:std:iec:60050-521-05-28}} de silicium\r\nNote
      1 à l’article: Les trous de liaison à travers le silicium s'appliquent principalement
      aux {{dispositifs à semiconducteurs, urn:iec:std:iec:60050-521-04-01}} encapsulés
      selon un empilement tridimensionnel. Dans le cas des MEMS, les trous de liaison
      à travers le silicium s'appliquent à la technologie de l'{{encapsulation au
      niveau de la tranche, urn:iec:std:iec:60050-523-06-07}}. Certains trous de liaison
      à travers le silicium sont constitués de trous de liaison traversants, d'isolants
      et de matériaux d'{{électrode, urn:iec:std:iec:60050-151-13-01}}.  Les électrodes
      sont constituées de brasures, de cuivre, de polysilicium dopé, etc."
