  id: 395-02-43
  notes:
  - content: La transition nucléaire peut comporter la transformation nucléaire, par
      exemple, une désintégration alpha ou bêta, ou un changement d'état énergétique
      par émission ou absorption d'un photon, d'un électron orbital ou d'une paire
      d'électrons.
