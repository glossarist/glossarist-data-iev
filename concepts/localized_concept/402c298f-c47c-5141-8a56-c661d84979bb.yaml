  definition:
  - content: a primary digital group of PCM channels, usually 30, assembled by PCM
      multiplex equipment which uses the CCITT quantizing law A; the composite digital
      signal has a frame consisting of 32 octet time-slots and operates at a digit
      rate of 2 048 kbit/s
