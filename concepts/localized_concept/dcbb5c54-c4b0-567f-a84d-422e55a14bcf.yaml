  definition:
  - content: point, ligne ou surface où, dans un système d'ondes stationnaires, une
      grandeur caractéristique spécifiée a une amplitude essentiellement nulle
  examples: []
  id: 801-23-16
  notes:
  - content: Dans la pratique, cette amplitude n'est généralement pas nulle, mais
      seulement minimale. Le noeud est alors dit imparfait.
  - content: 'Le mot "noeud" doit être accompagné du nom de la grandeur considérée:
      noeud de déplacement, de vitesse d''une particule, de pression acoustique.'
