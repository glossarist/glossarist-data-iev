  definition:
  - content: énergie émise, transférée ou reçue sous forme d'ondes électromagnétiques
  examples: []
  id: 845-21-041
  notes:
  - content: L'énergie rayonnante peut être exprimée par l'intégrale par rapport au
      temps du flux énergétique, stem:[Φ]~e~, pendant une durée donnée Δstem:[t]:stem:[Q_("e")
      = int_(Delta t) Phi_("e") " " "d" t]
  - content: L'énergie rayonnante est exprimée soit en fonction de la longueur d'onde,
      stem:[λ], en fonction de la {{fréquence, urn:iec:std:iec:60050-103-06-02}},
      stem:[ν], ou en fonction du {{nombre d'onde, urn:iec:std:iec:60050-845-21-026}},
      stem:[σ].
  - content: La grandeur photométrique correspondante est l'"{{énergie lumineuse,
      urn:iec:std:iec:60050-845-21-037}}". La grandeur correspondante pour les photons
      est l'"énergie photonique".
  - content: L'énergie rayonnante est exprimée en joules (J&#160;= W&middot;s).
  - content: Cet article était numéroté 845-01-27 dans l'IEC 60050-845:1987.
