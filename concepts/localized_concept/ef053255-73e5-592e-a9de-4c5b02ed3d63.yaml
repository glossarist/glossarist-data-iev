  definition:
  - content: "{{optical radiation, urn:iec:std:iec:60050-845-21-002}} capable of causing
      a visual sensation directly"
  examples: []
  id: 845-21-003
  notes:
  - content: There are no precise limits for the spectral range of visible radiation
      since they depend upon the amount of radiant flux reaching the retina and the
      responsivity of the observer. The lower limit is generally taken between 360&#160;nm
      and 400&#160;nm and the upper limit between 760&#160;nm and 830&#160;nm.
  - content: This entry was numbered 845-01-03 in IEC 60050-845:1987.
