data:
  definition:
  - content: "quotient de la quantité de matière stem:[n]~B~ du soluté B par la masse
      stem:[m] du solvant stem:[b]~B~ = stem:[n]~B~ / stem:[m]\r\nNote 1 à l’article:
      Il convient d’éviter le symbole alternatif stem:[m]~B~ dans les situations où
      il peut être confondu avec la masse du constituant B. Note 2 à l’article: L’unité
      SI cohérente de molalité est la mole par kilogramme, mol/kg. Note 3 à l’article:
      Cet article était numéroté 111-15-28 dans la CEI 60050-111:1996. Il a été modifié
      comme suit: une formule a été ajoutée."
