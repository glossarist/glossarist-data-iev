  definition:
  - content: vecteur vitesse de déplacement, en un point d'un milieu de propagation,
      d'un signal qui peut être représenté idéalement par la superposition de deux
      ondes sinusoïdales de même amplitude dont les fréquences tendent vers une limite
      commune
  examples: []
  id: 702-02-22
  notes:
  - content: "Dans le cas le plus général l'inverse de la norme stem:[|vec(v)_(\"g\")|]
      du vecteur vitesse de groupe est égal à la dérivée de l'inverse de la longueur
      d'onde stem:[λ] par rapport à la fréquence stem:[f]:\r\nstem:[frac(1)(|vec(v)_(\"g\")|)
      = frac(\"d\" (lambda^(- 1)))(\"d\" f)]"
