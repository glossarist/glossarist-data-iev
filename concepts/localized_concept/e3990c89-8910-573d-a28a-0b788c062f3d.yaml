  definition:
  - content: 'unité physique qui combine – dans un module, un sous-ensemble ou un
      dispositif – un sélecteur de mode, un dispositif d’ajustage destiné à la commande
      manuelle de la commande d’actionnement et, au besoin, un dispositif d’ajustage
      de la variable de référence destiné au régulateurNote 1 à l’article: Le dispositif
      de commande peut être complété par une unité d’affichage pour la variable de
      référence, la variable commandée et la variable réglante.'
