  definition:
  - content: regular square matrix *stem:[A]* with complex elements for which the
      inverse *stem:[A]*^−1^ is equal to the Hermitian conjugate matrix *stem:[A]*^H^
  examples: []
  id: 102-06-28
  notes:
  - content: 'For a unitary matrix with elements stem:[A~ij~]:  stem:[sum_(i) A_(i
      j) A_(i k)^(*) = rm(delta)_(j k)] and stem:[sum_(k) A_(i k) A_(j k)^(*) = rm(delta)_(i
      j)] where stem:[rm(delta)_(j k)] and stem:[rm(delta)_(i j)] are Kronecker deltas.'
  - content: Any orthogonal matrix with real elements is a unitary matrix.
