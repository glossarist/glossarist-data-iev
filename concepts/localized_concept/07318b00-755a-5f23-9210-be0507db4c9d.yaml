---
data:
  definition:
  - content: système permettant l'évaluation des {{composantes trichromatiques, urn:iec:std:iec:60050-845-23-038}}
      d'une répartition spectrale d'énergie quelconque en utilisant l'ensemble des
      stimuli de couleurs de référence &amp;lsqb;X~10~&amp;rsqb;, &amp;lsqb;Y~10~&amp;rsqb;,
      &amp;lsqb;Z~10~&amp;rsqb; et les trois fonctions colorimétriques CIE stem:[bar(x)_(10)
      ( lambda ) , " " bar(y)_(10) ( lambda ) , " " bar(z)_(10) ( lambda )] adoptés
      en 1964 par la CIE
  examples: []
  id: 845-23-046
  notes:
  - content: Le système de référence colorimétrique CIE 1964 est applicable aux champs
      d'observation en vision centrale d'étendue angulaire supérieure à environ' 4°
      (0,07 rad).
  - content: Lorsque le système de référence colorimétrique CIE 1964 est utilisé,
      tous les symboles représentant les grandeurs colorimétriques sont associés à
      l'indice 10.
  - content: Voir aussi CIE 15, stem:[Colorimetry].
  - content: Cet article était numéroté 845-03-29 dans l'IEC 60050-845:1987.
