  definition:
  - content: "coefficient of proportionality stem:[R]~H~ in the Hall effect quantitative
      relation:\r\nstem:[vec(E)_(\"H\") = R_(\"H\") (vec(J) xx vec(B))]\r\nstem:[vec(E)_(\"H\")]
      is the resulting transverse electric field strength\n\nstem:[vec(J)] is the
      current density\n\nstem:[vec(B)] is the magnetic flux density"
