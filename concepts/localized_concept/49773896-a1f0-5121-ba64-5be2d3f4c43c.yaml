  definition:
  - content: a change of longitude, measured in the frame of reference defined by
      the primary body and the stars, of a characteristic point in a satellite orbit,
      such as the ascending node
  examples: []
  id: 725-11-26
  notes:
  - content: Precession of the orbit of a satellite is caused by a perturbation of
      its orbital motion, due for instance to non-uniformities in the distribution
      of mass in the primary body.
  - content: Precession of the orbit of a satellite should not be confused with precession
      of a rotating body.
  terms:
  - type: expression
    normative_status: preferred
    designation: precession
