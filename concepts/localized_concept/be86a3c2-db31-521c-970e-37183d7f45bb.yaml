  definition:
  - content: of an electroacoustic transducer for sound reception, for a specified
      frequency, quotient of the output open-circuit voltage by the sound pressure
      acting on the part of the transducer designed to receive sound
  examples: []
  id: 801-25-53
  notes:
  - content: If the load impedance is other than that of an open circuit, it shall
      be specified.
