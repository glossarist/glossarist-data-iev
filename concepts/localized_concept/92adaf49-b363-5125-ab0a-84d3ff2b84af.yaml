  definition:
  - content: "grandeurs dont les valeurs numériques définissent le régime de prise.
      Les grandeurs de prise comprennent pour chaque enroulement et pour chaque prise:\r\na)
      une tension de prise,\n\nb) une puissance de prise,\n\nc) un courant de prise"
  examples: []
  id: 421-05-10
  notes:
  - content: Les grandeurs de prise sont rattachées à une connexion de prise donnée
      du transformateur et s'appliquent donc à tout enroulement, même s'il n'a pas
      de prises.
