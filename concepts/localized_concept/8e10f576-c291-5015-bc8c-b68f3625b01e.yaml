  definition:
  - content: en un point d'une surface, plan, s'il existe, qui contient toutes les
      tangentes en ce point aux courbes de la surface passant par le point
  examples: []
  id: 102-04-34
  notes:
  - content: Pour une surface définie par stem:[r = f ( u , " " v )], où stem:[( u
      , v ) in "U" subseteq R^("2")], le plan tangent en *stem:[r]*(stem:[u]~0~, stem:[v]~0~)
      est défini par les vecteurs stem:[(frac(del f)(del u))_([[u = u_(0)], [v = v_(0)]])]
      et stem:[(frac(del f)(del v))_([[u = u_(0)], [v = v_(0)]])] s'ils sont linéairement
      indépendants.
