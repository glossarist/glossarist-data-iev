  definition:
  - content: "those quantities the numerical values of which define the tapping duty.The
      tapping quantities include for each winding and for each tapping:\r\na) a tapping
      voltage,\n\nb) a tapping power,\n\nc) a tapping current"
  examples: []
  id: 421-05-10
  notes:
  - content: Tapping quantities are related to a given tapping connection of the transformer
      and apply therefore to any winding, including any untapped winding.
