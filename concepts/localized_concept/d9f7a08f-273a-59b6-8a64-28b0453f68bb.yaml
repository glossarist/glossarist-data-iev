  definition:
  - content: spherical irradiance spectrally weighted with a stated photobiological
      action spectrum
  examples: []
  id: 845-26-039
  notes:
  - content: This definition is based on the assumption that an action spectrum is
      adopted for the photobiological effect considered, and that its maximum value
      is 1.
  - content: It is essential to specify which action spectrum is used, as the unit
      is the same for any action spectrum.
  - content: The photobiological fluence rate is expressed in watt per square metre
      (W·m^−2^).
