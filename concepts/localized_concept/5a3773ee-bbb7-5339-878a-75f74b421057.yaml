  definition:
  - content: a single-phase induction motor with an auxiliary circuit which is connected
      in parallel with the main winding, including an auxiliary winding displaced
      in magnetic position from the main winding, a phase displacement between the
      currents in these two primary windings being arranged
  examples: []
  id: 411-33-13
  notes:
  - content: Generally the auxiliary circuit is opened when the motor has attained
      an appropriate speed.
