  definition:
  - content: for a given listener, minimum sound pressure level of a specified sound
      that is capable of evoking an auditory sensation. The sound reaching the ears
      from other sources is assumed to be negligible
  examples: []
  id: 801-29-18
  notes:
  - content: 'The general conditions of the measurement are to be specified: listening
      by one ear, two ears, in free field, with earphone, method of constant stimulus
      or with interrupted sound, number of trials, etc.'
  terms:
  - type: expression
    normative_status: preferred
    designation: threshold of hearing
  - type: expression
    designation: threshold of audibility
