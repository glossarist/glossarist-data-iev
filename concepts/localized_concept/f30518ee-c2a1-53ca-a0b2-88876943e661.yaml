  definition:
  - content: an entity which, in terms of its magnetic field at all points at distances
      sufficiently large compared with its dimensions, can be replaced by a plane
      current loop
  examples: []
  id: 221-01-03
  notes:
  - content: A magnetic dipole may be any current loop, orbital or spinning charged
      particles, or any combination of these, such as a magnetized body.
