  definition:
  - content: the maximum active power that can be theoretically delivered at a given
      frequency by a source having an impedance of positive real part to a directly
      connected load when the impedance of the load is widely varied
  examples: []
  id: 702-07-10
  notes:
  - content: The available power is obtained when the resistance of the load is equal
      to that of the source and its reactance is equal in magnitude but of opposite
      sign.
  - content: In some cases, conditions such as overheating or overvoltage prevent
      the available power from being obtained.
  terms:
  - type: expression
    normative_status: preferred
    designation: available power
