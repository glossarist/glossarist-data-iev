  definition:
  - content: mathematical relation between base units, coherent derived units or other
      units of measurement
  examples: []
  id: 112-01-32
  notes:
  - content: "For the quantities stem:[Q]~1~, stem:[Q]~2~, and stem:[Q]~3~ related
      by the quantity equation stem:[Q]~1~ = stem:[ζ] stem:[Q]~2~ stem:[Q]~3~, the
      unit equation is &lsqb;stem:[Q]~1~&rsqb; = &lsqb;stem:[Q]~2~&rsqb; &lsqb;stem:[Q]~3~&rsqb;,
      where &lsqb;stem:[Q]~1~&rsqb;, &lsqb;stem:[Q]~2~&rsqb;, and &lsqb;stem:[Q]~3~&rsqb;
      denote the units of stem:[Q]~1~, stem:[Q]~2~, and stem:[Q]~3~, respectively,
      provided that these units are in a coherent system of units.   Examples: \r\n*
      J := kg m2 s−2, where J, kg, m, and s are the symbols for the joule, kilogram,
      metre, and second, respectively (the symbol := denotes “is by definition equal
      to”); * 1 km/h = (1/3,6) m/s."
