  definition:
  - content: effective irradiance with the spectral irradiance, stem:[E~λ~], spectrally
      weighted with the erythema spectral weighting function, stem:[s]~er~(stem:[λ]),
      normalized to 1 at its maximum
  examples: []
  id: 845-26-067
  notes:
  - content: This definition is based on the assumption that an action spectrum is
      adopted for the actinic effect considered, and that its maximum value is 1.
  - content: It is essential to specify which action spectrum is used, as the unit
      is the same for any action spectrum.
  - content: The erythemal irradiance is expressed in watt per square metre (W·m^−2^).
