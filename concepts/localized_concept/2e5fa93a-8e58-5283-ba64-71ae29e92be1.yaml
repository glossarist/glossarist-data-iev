---
data:
  definition:
  - content: "nombre permettant de chiffrer le caractère acide ou basique d'une solution,
      égal à l’opposé du logarithme décimal de l’activité ionique stem:[a]~H^+^~ du
      cation hydrogène H^+^\r\npH = −10 lg stem:[a]~H^+^~ Note 1 à l’article: A une
      température voisine de 25 °C, les solutions aqueuses sont:  *  acides lorsque
      pH < 7; *  neutres lorsque pH = 7; *  basiques lorsque pH > 7.  A des températures
      éloignées de 25 °C, le pH d'une solution neutre s'écarte sensiblement de 7.
      Note 2 à l’article: Pour plus de détails, voir l’ISO 80000-9:2009, Annexe C.
      Note 3 à l’article: Cet article était numéroté 111-15-37 dans la CEI 60050-111:1996.
      Il a été modifié."
