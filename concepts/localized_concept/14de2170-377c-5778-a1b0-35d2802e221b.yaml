  definition:
  - content: standard observer whose colour-matching functions deviate from those
      of the CIE standard colorimetric observer in a defined manner
  examples: []
  id: 845-23-051
  notes:
  - content: The defined deviations can be applied to the CIE 1931 standard colorimetric
      observer or the CIE 1964 standard colorimetric observer.
  - content: The use of the CIE standard deviate observer is intended to generate
      differences that are typical of those that occur when colour matches are made
      by different real observers whose colour vision is classified as normal.
  - content: 'See also CIE 80, _Special Metamerism Index: Change in Observer_.'
