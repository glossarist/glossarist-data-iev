  definition:
  - content: |-
      the quotient of the energy dstem:[E]~col~ lost by a charged particle of specified energy, by collision in traversing a path length dstem:[l] in a material:

      stem:[S_("col") = (frac("d" E)("d" l))_("col")]
  examples: []
  id: 881-12-47
  notes:
  - content: The energy losses included are those that produce excitation and ionization
      of atoms as well as those producing recoil atoms.
