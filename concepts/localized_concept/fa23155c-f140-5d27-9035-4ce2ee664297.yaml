  definition:
  - content: at a point of a surface, plane, if it exists, which contains all the
      tangents at this point to the curves of the surface passing through the point
  examples: []
  id: 102-04-34
  notes:
  - content: For a surface defined by stem:[r = f ( u , " " v )], where stem:[( u
      , v ) in "U" subseteq R^("2")], the tangent plane at point *stem:[r]*(stem:[u]~0~,
      stem:[v]~0~) is defined by the vectors stem:[(frac(del f)(del u))_([[u = u_(0)],
      [v = v_(0)]])] and stem:[(frac(del f)(del v))_([[u = u_(0)], [v = v_(0)]])]
      if they are linearly independent.
