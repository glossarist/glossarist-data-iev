  definition:
  - content: constante des équations de la chaînette et de la parabole représentée
      géométriquement par le rayon de courbure au point où la tangente à la courbe
      est horizontale
  examples: []
  id: 466-03-14
  notes:
  - content: "Le paramètre stem:[ρ] est égal au quotient de la tension horizontale
      du conducteur stem:[T]~o~ à une température donnée (voir Figure 466-1) par le
      poids linéique stem:[ω] du conducteur, en tenant compte des surcharges éventuelles
      de givre ou de vent.\r\nstem:[rho = frac(T_(\"o\"))(omega)]\n\nimage::/assets/images/parts/466/[]"
