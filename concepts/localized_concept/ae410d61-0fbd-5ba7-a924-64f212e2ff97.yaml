  definition:
  - content: the addition of a constant number of signal elements at regular intervals
      to a digital signal to increase the digit rate from its original value to a
      predetermined higher value
  examples: []
  id: 704-16-23
  notes:
  - content: The added signal elements are not normally used to transmit information.
  - content: The ratio of the digit rates need not be an integer but must be a rational
      number, e.g. 64/62.
