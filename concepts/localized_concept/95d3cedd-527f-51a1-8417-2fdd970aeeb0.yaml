  definition:
  - content: distance from a radio station in a given direction beyond which {{radio-frequency
      interference, urn:iec:std:iec:60050-161-01-14}} to, or from, other radio stations
      sharing the same {{frequency band, urn:iec:std:iec:60050-103-09-01}} can be
      neglected for planning purposes
  examples: []
  id: 705-08-39
  notes:
  - content: In practice, a coordination distance can be defined for an {{Earth station,
      urn:iec:std:iec:60050-713-02-05}} or a {{terrestrial station, urn:iec:std:iec:60050-713-02-04}},
      but not for a {{space station, urn:iec:std:iec:60050-713-02-06}}.
