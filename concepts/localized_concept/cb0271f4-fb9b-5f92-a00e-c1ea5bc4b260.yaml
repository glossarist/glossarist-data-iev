  definition:
  - content: 'for a step response the duration of the time interval between the intersection
      points of the tangent at the inflection point with the horizontal axis corresponding
      to the initial value and with its parallel through the final steady-state value
      SEE: Figure 6.'
  examples: []
  id: 351-45-35
  notes:
  - content: This definition applies only to systems without overshoot of the step
      response.
