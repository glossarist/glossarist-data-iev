  definition:
  - content: emission on a frequency or frequencies which are outside the necessary
      bandwidth and the level of which may be reduced without affecting the corresponding
      transmission of information. Spurious emissions include harmonic emissions,
      parasitic emissions, intermodulation products and frequency conversion products,
      but exclude out-of-band emissions
  examples: []
  id: 161-06-01
  notes:
  - content: Necessary bandwidth is defined in Radio Regulation 146.
  - content: The English word "emission" used here has the sense defined in 161-01-09.
