  definition:
  - content: "{{body, urn:iec:std:iec:60050-901-03-01}}, consisting of a responsible
      organization and third parties, that is available as a contact providing continuous
      assistance for persons using {{smart assistive systems, urn:iec:std:iec:60050-871-04-30}}
      or other AAL services and which coordinates the service of {{AAL technical assistants,
      urn:iec:std:iec:60050-871-02-03}}"
  examples: []
  id: 871-02-13
  notes:
  - content: See also {{telemedical care centre, urn:iec:std:iec:60050-871-06-09}},
      which evaluates incoming vital signs and metabolic data and initiates measures,
      whereas the teleservice centre does not deal with the supervision of vital signs
      and metabolic data or other telemedical services. See also AAL technical assistant.
  - content: The operating hours of a teleservice centre can vary.
  terms:
  - type: expression
    normative_status: preferred
    designation: teleservice centre
