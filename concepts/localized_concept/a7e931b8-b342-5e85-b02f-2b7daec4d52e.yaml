  definition:
  - content: temps écoulé entre les instants où la grandeur de l’impulsion aux bornes
      de sortie atteint des limites respectivement supérieure et inférieure spécifiées
      quand un dispositif à semi-conducteurs est commuté de son état conducteur à
      son état non conducteur
  examples: []
  id: 521-05-24
  notes:
  - content: Les limites supérieure et inférieure sont habituellement respectivement
      90 % et 10 % de l’amplitude initiale de l’impulsion de sortie.
