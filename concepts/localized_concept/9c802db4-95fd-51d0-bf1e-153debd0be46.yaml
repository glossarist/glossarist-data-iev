  definition:
  - content: additive non-negative scalar quantity, characterizing a particle or a
      sample of matter in the phenomena of inertia and gravitation
  examples: []
  id: 113-03-03
  notes:
  - content: Due to equivalence between mass and energy, the mass of a system depends
      on the binding energy between its parts, thus the mass of a stable system is
      always less than the sum of the masses of its parts. In classical mechanics,
      the mass corresponding to binding energy is considered to be negligible. From
      the point of view of the general theory of relativity, inertial mass of a system
      in motion and heavy mass of the system in gravitation are equivalent.
  - content: Mass is one of the seven base quantities in the International System
      of Quantities, ISQ, on which the International System of Units, SI, is based.
      The coherent SI unit of mass is kilogram, kg (see IEC 60050-112, {{112-02-06,
      urn:iec:std:iec:60050-112-02-06}}). A non-SI unit accepted for use with the
      SI is tonne, or metric ton, symbol t (1 t ≔ 1 000 kg).
