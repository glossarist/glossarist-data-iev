data:
  definition:
  - content: "pour un bipôle linéaire, élémentaire ou non, en régime sinusoïdal, grandeur
      égale au produit de la puissance apparente stem:[S] et du sinus du déphasage
      tension-courant stem:[φ] stem:[Q = S sinphi]\r\nNote 1 à l’article: La puissance
      réactive est la partie imaginaire de la puissance complexe stem:[underline(S)],
      soit stem:[Q = \" \" Im \" \" underline(S)]. Sa valeur absolue est égale à la
      puissance non active, soit stem:[|Q| = Q_(\"P{sim}\")]. Note 2 à l’article:
      L’unité SI cohérente de puissance réactive est le voltampère, VA. Le nom spécial
      var et son symbole var sont aussi utilisés. Voir {{131-11-45, urn:iec:std:iec:60050-131-11-45}}."
