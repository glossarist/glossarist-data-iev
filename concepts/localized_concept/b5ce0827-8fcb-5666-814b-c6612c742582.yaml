---
data:
  definition:
  - content: valeur maximale d'une surintensité monophasée qui, en l'absence de courant
      différentiel résiduel, peut traverser un dispositif de coupure différentiel
      (quel que soit le nombre de pôles) sans qu'il ne fonctionne
  examples: []
  id: 442-05-71
  notes:
  - content: Dans le cas d'une surintensité dans le circuit principal, en l'absence
      de courant différentiel résiduel, le dispositif de détection peut fonctionner
      en raison de la dissymétrie existant dans le dispositif de détection lui-même.
