---
data:
  definition:
  - content: distance, dans la direction de la propagation d'une onde périodique,
      entre deux positions successives auxquelles la phase est la même
  examples: []
  id: 845-21-025
  notes:
  - content: 'La longueur d''onde dans un milieu est égale au quotient de la longueur
      d''onde dans le vide par l''indice de réfraction du milieu. En photométrie,
      sauf mention contraire, les longueurs d''onde sont généralement données dans
      l''air. L''indice de réfraction de l''air normal (pour la spectroscopie: stem:[T] =
      15 °C, stem:[p] = 101 325 Pa) est compris entre 1,000 27 et 1,000 29 pour les
      {{rayonnements visibles, urn:iec:std:iec:60050-845-21-003}}.'
  - content: Dans certaines applications spécifiques, telles que les mesurages de
      la fluorescence, le symbole stem:[μ] est utilisé pour les longueurs d'onde du
      rayonnement d'excitation.
  - content: λ = stem:[v] / ν, où λ est la longueur d'onde dans un milieu, stem:[v]
      est la vitesse de phase dans ce milieu et ν est la {{fréquence, urn:iec:std:iec:60050-103-06-02}}.
  - content: La longueur d'onde est exprimée en mètres (m), ou en sous-multiples décimaux
      du mètre.
  - content: En rayonnement optique, les unités nanomètre (nm) et micromètre (stem:[mu]m)
      sont généralement utilisées.
  - content: Cet article était numéroté 845-01-14 dans l'IEC 60050-845:1987.
