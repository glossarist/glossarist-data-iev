  definition:
  - content: sound absorption defined by the Sabine reverberation-time equation
  examples: []
  id: 801-31-10
  notes:
  - content: "The Sabine reverberation-time equation is:\n\nstem:[T = frac((24 \" \"
      \"ln\" \" \" \"10\") V)(c A) = frac(55,3)(c A) \" \" V]\r\nwhere:\n\nstem:[T]
      is the reverberation time, in seconds\n\nstem:[V] is the volume of the room,
      in cubic metres\n\nstem:[c] is the speed of sound in the air contained in the
      room, in metres per second\n\nstem:[A] is the sum of all Sabine absorptions
      in the room, in decibel metre-squared."
  - content: The unit of Sabine absorption is the decibel metre-squared, sometimes
      known as the metric sabin.
