data:
  definition:
  - content: "panne qui disparaît sans intervention\r\nNote 1 à l’article: La disparition
      peut être le résultat d’un rétablissement automatique.\r\nNote 2 à l’article:
      Dans l’IEC 60050-191:1990 (supprimée; remplacée par l'IEC 60050-192:2015), ce
      concept était désigné comme «panne intermittente», avec «panne temporaire» comme
      synonyme, mais toutes les pannes temporaires ne sont pas des pannes intermittentes
      ({{192-04-06, urn:iec:std:iec:60050-192-04-06}}).\r\nNote 3 à l’article: Cette
      note ne s’applique qu’à la langue anglaise."
