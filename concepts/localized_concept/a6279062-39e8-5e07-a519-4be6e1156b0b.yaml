  definition:
  - content: earthing or earthing and short-circuiting {{equipment, urn:iec:std:iec:60050-651-21-16}}
      using one or several lances as {{earthing and short-circuiting device, urn:iec:std:iec:60050-651-25-02}}
  examples: []
  id: 651-25-07
  notes:
  - content: The lance earthing is comprised of a conductive part (lance), an insulating
      handle with hand guard and/or an {{earthing stick, urn:iec:std:iec:60050-651-25-05}}
      or a coupling {{device, urn:iec:std:iec:60050-651-21-15}} for an additional
      insulating element.
  - content: The lance is pushed longitudinally and guided into lance contact.
  - content: 'This entry was numbered 651-14-13 in IEC 60050-651:1999. It has been
