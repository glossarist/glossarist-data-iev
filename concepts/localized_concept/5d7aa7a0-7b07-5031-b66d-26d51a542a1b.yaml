  definition:
  - content: an antenna consisting of a part of a paraboloidal reflector fed with
      an off-set horn which physically intersects the reflector, part of the wall
      of the horn being removed to form the antenna aperture
  examples: []
  id: 712-05-58
  notes:
  - content: The horn is usually either pyramidal or conical, with an axis perpendicular
      to that of the paraboloid.
