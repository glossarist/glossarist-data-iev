  definition:
  - content: valeur minimale du champ d'un émetteur permettant en un point donné une
      réception ayant la qualité voulue, dans des conditions spécifiées d'installation
      et d'exploitation, en présence de bruits et de brouillages soit existant dans
      la réalité, soit déterminés conventionnellement ou par des plans de fréquence
  examples: []
  id: 705-08-32
  notes:
  - content: Lorsque les bruits et brouillages peuvent être affectés de fluctuations,
      on doit spécifier le pourcentage de temps pendant lequel la qualité voulue doit
      être assurée.
  - content: "Les conditions spécifiées comprennent entre autres:\r\n- le type de
      transmission, le type de service et la bande de fréquences utilisés;\n\n- les
      caractéristiques de l'installation de réception: gain de l'antenne, bande passante
      du récepteur, lieu d'installation;\n\n- les conditions d'exploitation du récepteur,
      en particulier la zone géographique, l'heure et la saison."
