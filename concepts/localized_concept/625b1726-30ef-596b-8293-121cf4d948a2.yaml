  definition:
  - content: unit of {{amount of data, urn:iec:std:iec:60050-171-02-09}}, corresponding
      to one {{byte, urn:iec:std:iec:60050-171-02-12}}
  examples: []
  id: 171-02-13
  notes:
  - content: The unit byte can be combined with SI prefixes, e.g. kilobyte (kB), or
      with binary prefixes, e.g. kibibyte (KiB). For binary multiples (powers of 2),
      the use of binary prefixes is recommended to avoid ambiguity.
  - content: The unit byte can be combined with other units, e.g. byte per second
      (B/s).
  - content: The unit symbol o is generally used in French.
