  definition:
  - content: quotient of the reflected radiance at a point on a surface of a non-self-radiating
      medium in a given direction and that of the perfect reflecting diffuser identically
      irradiated and viewed
  examples: []
  id: 845-21-104
  notes:
  - content: In general, the reflected radiance factor from a surface does not depend
      upon the {{relative spectral distribution, urn:iec:std:iec:60050-845-21-030}}
      of the irradiation. This is not the case for a photoluminescent surface, where
      it is necessary to specify this quantity.
  - content: The reflected radiance factor has unit one.
