  definition:
  - content: "quantité caractérisant la différence relative entre les indices de réfraction
      du coeur et de la gaine d'une fibre optique par l'expression:\n\nstem:[Delta
      = frac(n_(1)^(2) - n_(2)^(2))(2 n_(1)^(2))]\r\noù stem:[n]~1~ est l'indice de
      réfraction maximal dans le coeur et stem:[n]~2~ l'indice de réfraction de la
      gaine homogène la plus interne"
