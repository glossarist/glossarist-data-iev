---
data:
  definition:
  - content: "pour un bipôle, élémentaire ou non, en régime périodique, grandeur égale
      à la racine carrée de la différence des carrés de la puissance apparente stem:[S]
      et de la puissance active stem:[P] stem:[Q_(\"P{sim}\") = sqrt(S^(2) - P^(2))]\r\nNote
      1 à l’article: En régime sinusoïdal, la puissance non active est la valeur absolue
      de la puissance réactive stem:[Q] ou de la partie imaginaire de la puissance
      complexe stem:[underline(S)], soit stem:[Q_(\"P{sim}\") = |Q| = |rm(Im) underline(S)|].
      Note 2 à l’article: L’unité SI cohérente de puissance non active est le voltampère,
      VA. Le nom spécial \"var\" et son symbole \"var\" sont aussi utilisés. Voir
      {{131-11-45, urn:iec:std:iec:60050-131-11-45}}."
