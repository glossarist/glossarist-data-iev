  definition:
  - content: 1,25 times the interval between the times when the time integral of the
      square of the instantaneous acoustic pressure at a point reaches 10 % and when
      it reaches 90 % of its final value
  examples: []
  id: 802-01-11
  notes:
  - content: The final value of the time integral of the square of the instantaneous
      acoustic pressure is the pulse-pressure-squared integral.
