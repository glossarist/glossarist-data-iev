  definition:
  - content: "surface définie comme pouvant être touchée (ou accessible) dans la norme
      du produit final, prenant en compte l'installation prévue de l'équipement et
      des surfaces {{à portée, urn:iec:std:iec:60050-903-03-03}}, autres que:\r\n*
      les surfaces fonctionnelles chaudes;* les surfaces adjacentes; et* les poignées
      ou boutons de commande, y compris les pavés numériques, claviers et équipements
      analogues, qu'un utilisateur doit toucher pour faire fonctionner ou régler un
      équipement"
  examples: []
  id: 903-03-04
  notes:
  - content: "Voir la Figure 1 pour les exemples de types de surfaces qui peuvent
      être rencontrés.\r\nimage::/assets/images/parts/903/acos-guide117_2010_f1_fr.jpg[]\r\nFigure
      1 – Identification des parties d'équipement pouvant être touchées (zones hachurées)"
  - content: L'équipement doit être installé conformément aux instructions du fabricant.
      Cela signifie que pour un four destiné à être encastré, il convient de suivre
      les instructions du fabricant avant l'identification des surfaces pouvant être
      touchées.
