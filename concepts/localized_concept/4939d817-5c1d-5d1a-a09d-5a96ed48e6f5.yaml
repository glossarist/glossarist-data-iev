  definition:
  - content: voltage across the specified output terminals of the instrument when
      the load impedance is equal to the rated source impedance, the carrier wave
      not being modulated
  examples: []
  id: 314-08-13
  notes:
  - content: The value of the voltage is expressed as an r.m.s. value for sinewaves
