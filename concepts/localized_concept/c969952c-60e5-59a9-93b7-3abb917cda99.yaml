  examples: []
  id: 461-05-04
  notes:
  - content: In North America, the term sheath is generally used for metallic coverings,
      whereas the term jacket is used only for non-metallic coverings.
  - content: In case of special bonding, the oversheath may provide electrical insulation
      of the underlying conducting covering.
