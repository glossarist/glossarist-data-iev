  definition:
  - content: pole without an overcurrent release, but otherwise generally capable
      of the same performance as a protected pole of the same residual current operated
      circuit-breaker with integral overcurrent protection
  examples: []
  id: 442-05-41
  notes:
  - content: The unprotected pole can be of the same construction as the protected
      pole(s), or of a particular construction.
  - content: If the short-circuit making and breaking capacity of the unprotected
      pole is different from that of the protected pole(s), this should be indicated
      by the manufacturer.
