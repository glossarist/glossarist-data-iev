  definition:
  - content: "scalar constant stem:[μ]~0~ linking the electromagnetic quantities and
      the mechanical quantities, obtained from the relation\n\nstem:[frac(F)(l) =
      frac(mu_(0))(2 pi) \" \" * \" \" frac(|I_(1) I_(2)|)(d)]\r\nwhere stem:[F/l]
      is the magnitude of the lineic force between two straight parallel conductors
      of infinite length and negligible circular cross-section, placed at a distance
      stem:[d] apart in vacuum and carrying electric currents stem:[I]~1~ and stem:[I]~2~"
  examples: []
  id: 121-11-14
  notes:
  - content: "In vacuum, the product of the magnetic constant and the magnetic field
      strength stem:[*H*] is equal to the magnetic flux density stem:[*B*]:\r\nstem:[*B*]
      = stem:[μ]~0~stem:[*H*]"
  - content: |-
      The magnetic constant is related to the electric constant stem:[ε]~0~ and to the speed of light in vacuum stem:[c]~0~ by the relation

      stem:[μ]~0~stem:[ε]~0~stem:[c]~0~^2^ = 1
  - content: "The value of the magnetic constant is exactly equal to\r\n4π × 10^−7^
      m kg s^−2^ A^−2^ = 1,256 637 061 4... μH/m"
