  definition:
  - content: "the quotient of dstem:[E] by the product of stem:[ρ] and dstem:[l] where
      dstem:[E] is the energy lost by a charged particle of specified energy in traversing
      a path length dstem:[l] in a material of density stem:[ρ]\r\nstem:[frac(S)(rho)
      = frac(1)(rho) frac(\"d\" E)(\"d\" l)]"
  examples: []
  id: 881-12-52
  notes:
  - content: For energies at which nuclear interaction can be neglected, the total
      mass stopping power is the sum of the collision mass stopping power and the
      radiative mass stopping power.
  terms:
  - type: expression
    normative_status: preferred
    designation: total mass stopping power
