  definition:
  - content: "{{electromagnetic disturbance, urn:iec:std:iec:60050-161-01-05}} having
      components in the {{radio-frequency, urn:iec:std:iec:60050-702-01-10}} range"
  examples: []
  id: 161-01-13
  notes:
  - content: A radio-frequency disturbance can be {{radio noise, urn:iec:std:iec:60050-161-01-12}},
      an {{unwanted signal, urn:iec:std:iec:60050-161-01-03}} or a change in the propagation
      medium itself.
  - content: In accordance with {{IEV 701-02-12, urn:iec:std:iec:60050-701-02-12}},
      the radio-frequency range is by convention a frequency lower than 3 000 GHz.
