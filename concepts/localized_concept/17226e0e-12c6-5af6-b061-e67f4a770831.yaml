  definition:
  - content: the frequency of rotation of a charged particle of specified nature describing,
      in the presence of a uniform magnetic field, a helical curve around the lines
      of force of the field
  examples: []
  id: 705-06-09
  notes:
  - content: "The gyro-frequency stem:[f]~c~ is given by the expression: \r\nstem:[f_(\"c\")
      = frac(1)(2 pi) frac(q B)(m)]\n\nwhere stem:[B] is the magnetic flux density,
      stem:[m] and stem:[q] are the mass and the charge of the particle respectively."
