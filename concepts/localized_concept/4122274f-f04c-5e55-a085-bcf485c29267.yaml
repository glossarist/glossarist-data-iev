---
data:
  definition:
  - content: processus par lequel le 7‑déhydrocholestérol, précurseur de la vitamine
      D3, produit la prévitamine D3 par absorption d'un {{rayonnement ultraviolet,
      urn:iec:std:iec:60050-845-21-008}} de 240 nm à 315 nm et la transforme par ailleurs
      en vitamine D3 via un processus d'isomérisation thermique
  examples: []
  id: 845-26-080
  notes:
  - content: Le terme "vitamine D" est un terme générique qui désigne la vitamine
      D2 et/ou la vitamine D3. La synthèse de la vitamine D dans la peau des mammifères
      produit la vitamine D3. La vitamine D2 se constitue dans les végétaux selon
      un processus analogue lorsque le rayonnement ultraviolet active l'ergostérol.
