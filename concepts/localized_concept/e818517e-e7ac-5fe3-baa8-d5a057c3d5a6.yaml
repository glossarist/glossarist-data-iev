---
data:
  definition:
  - content: lampe électrique dans laquelle la lumière est produite, directement ou
      indirectement, par {{décharge électrique, urn:iec:std:iec:60050-845-27-018}}
      dans un gaz, une vapeur métallique ou un mélange de plusieurs gaz et vapeurs
  examples: []
  id: 845-27-024
  notes:
  - content: 'Selon que la lumière est essentiellement produite par un gaz ou par
      une vapeur métallique, les lampes à décharge peuvent être catégorisées comme
      suit: lampes à décharge à gaz, par exemple, lampes au xénon, lampes au néon,
      lampes à hélium, lampes à azote, lampes à anhydride carbonique, ou lampes à
      vapeur métallique, telles que les {{lampes aux halogénures métalliques, urn:iec:std:iec:60050-845-27-033}},
      les {{lampes à mercure à haute pression, urn:iec:std:iec:60050-845-27-028}}
      ou les {{lampes à sodium à haute pression, urn:iec:std:iec:60050-845-27-031}}.'
  - content: Cet article était numéroté 845-07-17 dans l'IEC 60050-845:1987.
