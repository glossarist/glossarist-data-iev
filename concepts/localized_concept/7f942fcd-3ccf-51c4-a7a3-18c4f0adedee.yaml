---
data:
  definition:
  - content: partie du flux lumineux d'une source de lumière qui contribue essentiellement
      à l'éclairage
  examples: []
  id: 845-21-111
  notes:
  - content: Pour les sources de lumière non dirigée, le flux lumineux utile est le
      flux lumineux total de la source de lumière.
  - content: Pour les sources de lumière dirigée, le flux lumineux utile est le flux
      lumineux partiel dans un angle conique défini, l'axe du cône étant l'axe optique
      du faisceau de la source de lumière.
  - content: L'angle conique, stem:[α], qui peut être exprimé soit en degré (°) soit
      en radian (rad), est donné par l'angle conique complet et doit être précisé,
      par exemple stem:[Φ]~u,90°~ ou stem:[Φ]~u,π/2~.
  - content: L'axe du faisceau optique d'une source de lumière est l'axe de symétrie
      essentielle de l'intensité lumineuse.
  - content: Le flux lumineux utile est exprimé en lumen (lm).
