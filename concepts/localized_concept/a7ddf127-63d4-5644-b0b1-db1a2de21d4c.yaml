  definition:
  - content: quotient of the radiant flux of the radiation emitted by a {{photoluminescent
      material, urn:iec:std:iec:60050-845-24-040}} and the radiant flux of the radiation
      absorbed by that material
  examples: []
  id: 845-24-034
  notes:
  - content: The term "photoluminescence radiant yield" is also used for the elementary
      process with a similar meaning, namely the quotient of the energy of the emitted
      photon and the energy of the absorbed photon which gave rise to it.
  - content: The photoluminescence radiant yield has unit one.
  - content: This entry was numbered 845-04-31 in IEC 60050-845:1987.
