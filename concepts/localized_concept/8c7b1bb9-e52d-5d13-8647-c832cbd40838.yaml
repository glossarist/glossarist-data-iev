  definition:
  - content: antenne constituée par une source primaire et un réflecteur composé d'éléments
      disposés sur une surface et réglés de façon que l'onde réfléchie par chacun
      d'eux ait la phase voulue pour que l'ensemble possède le diagramme de rayonnement
      désiré
  examples: []
  id: 712-05-35
  notes:
  - content: Les éléments du réflecteur sont en général des tronçons de guide d'ondes
      contenant des déphaseurs électriques et terminés par des courts-circuits.
