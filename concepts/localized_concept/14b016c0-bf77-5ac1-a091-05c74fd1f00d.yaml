  definition:
  - content: dans un ensemble de canaux radioélectriques ordonnés suivant leurs fréquences
      centrales croissantes, canal dont le rang est immédiatement supérieur ou inférieur
      à celui d'un canal donné
  examples: []
  id: 713-06-21
  notes:
  - content: Le canal adjacent de rang supérieur au canal donné est appelé "canal
      adjacent supérieur", celui de rang inférieur "canal adjacent inférieur".
  - content: Deux canaux adjacents peuvent avoir une partie commune; on parle alors
      de recouvrement en fréquence ou de canaux partiellement superposés.
