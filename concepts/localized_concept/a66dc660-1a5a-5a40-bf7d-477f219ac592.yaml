  id: 103-02-04
  notes:
  - content: The geometric mean value of a periodic quantity is usually taken over
      an integration interval the range of which is the period multiplied by a natural
      number.
  - content: The geometric mean value of a quantity is denoted by adding the subscript
      g to the symbol of the quantity.
