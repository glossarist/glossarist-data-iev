data:
  definition:
  - content: "aptitude à être maintenu ou rétabli dans un état permettant de fonctionner
      tel que requis, dans des conditions données d’utilisation et de maintenance\r\nNote
      1 à l’article: Les conditions données incluent notamment les aspects ayant un
      impact sur la maintenabilité, tels que: l’emplacement de maintenance, l’accessibilité,
      les procédures et les ressources de maintenance."
