  definition:
  - content: "en régime sinusoïdal, dans un milieu tel qu'une relation linéaire existe
      en chaque point entre les phaseurs stem:[<u>B</u>] et stem:[<u>H</u>] représentant
      respectivement l'induction magnétique et le champ magnétique, grandeur complexe
      stem:[<u>μ</u>]~r~ définie par la relation\n\nstem:[<u>B</u>] = stem:[μ]~0~stem:[<u>μ</u>]~r~
      stem:[<u>H</u>]\r\noù stem:[μ]~0~ est la constante magnétique"
  examples: []
  id: 121-12-30
  notes:
  - content: La perméabilité relative complexe, généralement fonction de la fréquence,
      est une grandeur scalaire dans un milieu isotrope, une grandeur tensorielle
      dans un milieu anisotrope.
  - content: On écrit en général stem:[<u>μ</u>]~r~ = stem:[μ]'~r~ − jstem:[μ]''~r~
      où stem:[μ]'~r~ est la perméabilité relative réelle et stem:[μ]''~r~ est l'indice
      de pertes magnétiques qui caractérise l'ensemble des pertes magnétiques.
