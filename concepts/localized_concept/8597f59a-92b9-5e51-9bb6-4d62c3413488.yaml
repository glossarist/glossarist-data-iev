  definition:
  - content: property of a phenomenon, body, or substance, where the property has
      no magnitude
  examples:
  - content: sex of a human being, colour of a paint sample, ISO two-letter country
      code, sequence of amino acids in a polypeptide.
  id: 112-01-39
  notes:
  - content: While the colour of a paint sample is sometimes considered to be a nominal
      property, it is also recognized that a pure colour can be characterized by the
      wavelength of electromagnetic radiation, which is a quantity that can be measured.
  - content: A nominal property has a value, which can be expressed in words, by alpha-numerical
      codes, or by other means. This value is not to be confused with the nominal
      value of a quantity (see {{IEV 151-16-09, urn:iec:std:iec:60050-151-16-09}}).
  - content: Nominal properties are distinguished from quantities, which are properties
      that have a magnitude, i.e. they can be compared in terms of greater or lesser.
