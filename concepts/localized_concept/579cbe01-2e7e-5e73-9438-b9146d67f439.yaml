  - content: 'partie d’un {{réseau d’énergie électrique, urn:iec:std:iec:60050-692-01-02}}
      comprenant les moyens de production et de transport de l’énergie électriqueNote
      1 à l’article: L''étendue du réseau de production-transport est généralement
      limitée aux moyens de production et de transport d''énergie électrique vers
      les plus gros consommateurs industriels et les centres de distribution d''électricité.
      Note 2 à l’article: En anglais, le terme "composite system" est aussi utilisé.'
