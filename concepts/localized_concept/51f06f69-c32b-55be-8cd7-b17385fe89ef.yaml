---
data:
  definition:
  - content: radiamètre destiné à la mesure de grandeurs telles que la dose absorbée
      ou l’équivalent de dose
  examples: []
  id: 395-05-02
  notes:
  - content: Dans un sens plus large, ce terme est utilisé pour les appareils destinés
      à la mesure d’autres grandeurs relatives aux rayonnements, telles que l’exposition,
      la fluence, etc. Un tel emploi est déconseillé.
  - content: Cet appareil peut nécessiter l’utilisation d’un lecteur séparé pour lire
      la dose absorbée ou l’équivalent de dose.
  - content: Cet article était numéroté 394-22-08 dans la CEI 60050-394:2007.
