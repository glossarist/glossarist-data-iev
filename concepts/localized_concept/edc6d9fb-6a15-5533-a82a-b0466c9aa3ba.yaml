data:
  definition:
  - content: "flux magnétique virtuel à travers une surface limitée par un contour
      C stem:[Phi_(\"C\") = Phi + mu_(0) \" \" lambda^(2) int_(\"C\") J * rm(d) l]\r\noù
      stem:[Φ] est le flux magnétique à travers la surface, stem:[λ] la profondeur
      de pénétration, *stem:[J]* la densité de courant supraconducteur, stem:[μ]~0~
      la constante magnétique et d*stem:[l]* un élément vectoriel d'arcNote 1 à l’article:
      Le fluxoïde dans un supraconducteur est un multiple du quantum de flux stem:[Φ]~0~.
      Note 2 à l’article: Le fluxoïde est parfois utilisé à la place du fluxon qui
      est loin de la surface d’un supraconducteur."
