  definition:
  - content: grandeur sans dimension caractérisant l’importance relative de la convection
      forcée et de la conduction thermique, définie par stem:[P e = frac(rho " " c_(p)
      " " v " " l)(lambda) = frac(v " " l)(alpha)], où stem:[ρ] est la masse volumique,
      stem:[c~p~] est la capacité thermique massique à pression constante, stem:[v]
      est la vitesse, stem:[l] est une longueur spécifiée, stem:[λ] est la conductivité
      thermique, et stem:[α] est la diffusivité thermique
  examples: []
  id: 113-04-57
  notes:
  - content: Le nombre de Péclet est le produit du nombre de Reynolds stem:[Re] et
      du nombre de Prandtl stem:[Pr], soit stem:[Pe] = stem:[Re] ⋅ stem:[Pr].
