  definition:
  - content: part of the input voltages for which the amplitude and either the phase
      or the polarity are the same, which exists between each of the input terminals
      and a reference point
  examples: []
  id: 312-01-03
  notes:
  - content: This reference point can be the chassis terminal, or the measuring earth
