  definition:
  - content: 'processus par lequel une ou plusieurs grandeurs variables, en tant que
      variables d''entrée, influent sur d''autres grandeurs variables, comme des variables
      de sortie, selon les propres lois du systèmeNote 1 à l’article: Une caractéristique
      de la commande en boucle ouverte est la chaîne d''action ouverte, ou en cas
      de chaîne d''action fermée, le fait que les variables de sortie, étant influencées
      par les variables d''entrée, ne soient pas continuellement ou séquentiellement
      influencées elles-mêmes et pas par les mêmes variables d''entrée.'
