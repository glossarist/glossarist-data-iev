  definition:
  - content: a device for joining two transmission lines of identical or different
      transverse cross-sections that are terminated with connecting devices of different
      types or dimensions
  examples: []
  id: 726-10-09
  notes:
  - content: A waveguide adapter may consist of a conveniently short length of waveguide
      having the required mating flanges. If the waveguides to be connected have different
      transverse cross-sections the adapter may also include a matching conversion
      section. If the modes of propagation also differ, the adapter may function as
      a mode converter.
