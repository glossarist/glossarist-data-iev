  definition:
  - content: principle that, if the input variable is displaced in time, the time
      response remains unchanged except that it is also displaced by the same time
      interval
  examples: []
  id: 351-45-02
  notes:
  - content: The principle of shifting implies that the set of equations describing
      the transfer element and their coefficients are time-invariant.
