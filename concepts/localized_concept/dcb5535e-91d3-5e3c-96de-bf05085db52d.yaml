  definition:
  - content: combination of two {{transmission channels, urn:iec:std:iec:60050-701-02-01}}
      permitting {{transmission, urn:iec:std:iec:60050-701-01-03}} in both directions
      between two points
  examples: []
  id: 701-02-03
  notes:
  - content: If the {{telecommunication, urn:iec:std:iec:60050-701-01-05}} is by nature
      {{unidirectional, urn:iec:std:iec:60050-701-03-18}}, e.g. long-distance {{television,
      urn:iec:std:iec:60050-701-01-15}} transmission, the term “circuit” is sometimes
      used to designate the single transmission channel providing the facility, but
      this usage is deprecated.
  - content: In some countries the term “communication channel” or its abbreviation
      “channel” is used to mean “telecommunication circuit”, i.e. to encompass the
      two directions of transmission. This usage is deprecated.
  - content: The adjective "telecommunication" can be replaced by an adjective indicating
      the nature or characteristics of the transmitted {{signals, urn:iec:std:iec:60050-101-12-02}};
      for example, {{telephone circuit, urn:iec:std:iec:60050-722-06-07}}, {{telegraph
      circuit, urn:iec:std:iec:60050-721-11-04}}, {{data circuit, urn:iec:std:iec:60050-721-11-05}},
      digital circuit.
  - content: Characteristics of the transmission channels such as {{frequency bandwidth,
      urn:iec:std:iec:60050-702-01-03}}, or {{digit rate, urn:iec:std:iec:60050-702-05-23}},
      can be different in the two directions of transmission.
  - content: In telephony, usage of the term “telephone circuit” is generally limited
      to a telecommunication circuit directly connecting two {{switching centres,
      urn:iec:std:iec:60050-722-06-05}}.
  - content: 'In switching, the two transmission channels associated in a telecommunication
      circuit can be: a) permanently associated together; b) selected from separate
      sets for association together throughout a {{call, urn:iec:std:iec:60050-701-03-05}};
      c) selected from time to time during a call and then released, the selection
      and release processes being determined, separately in the two directions, by
      the varying characteristics of the information being transmitted over the telecommunication
      circuit.'
  terms:
