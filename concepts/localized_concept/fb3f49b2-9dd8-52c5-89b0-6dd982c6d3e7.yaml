---
data:
  definition:
  - content: "{{norme, urn:iec:std:iec:60050-901-02-02}} alignée sur une autre norme,
      de sorte que les produits, processus, services, {{essais, urn:iec:std:iec:60050-902-03-02}}
      et informations fournis selon la première norme sont conformes aux {{exigence,
      urn:iec:std:iec:60050-901-05-05}}s de la seconde, mais non inversement"
  examples: []
  id: 901-06-08
  notes:
  - content: Une norme alignée unilatéralement n'est ni harmonisée avec, ni équivalente
      à la norme sur laquelle elle est alignée.
  - content: Les {{règlements techniques, urn:iec:std:iec:60050-901-02-11}} peuvent
      être harmonisés comme des normes. Les termes et définitions correspondants sont
      obtenus en remplaçant «normes» par «règlements techniques» dans les définitions
      {{IEV 901-06-01, urn:iec:std:iec:60050-901-06-01}} à {{IEV 901-06-09, urn:iec:std:iec:60050-901-06-09}},
      et «organismes à activités normatives» par «autorités» dans la définition {{IEV
      901-06-01, urn:iec:std:iec:60050-901-06-01}}.
