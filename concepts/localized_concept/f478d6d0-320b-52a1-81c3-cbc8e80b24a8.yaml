  notes:
  - content: 'From a mother wavelet stem:[psi ( t )], daughter wavelets are obtained
      through shifting and scaling (expansion or compression): stem:[psi_(a , b) (
      t ) = frac(1)(sqrt(a)) psi (frac(t - b)(a))], where stem:[a] is a scale parameter
      and stem:[b] a position parameter.'
