  definition:
  - content: "pour un élément à action proportionnelle et par dérivation, dont la
      variable d’entrée et de sortie sont de même type, durée de l’intervalle de temps
      nécessaire pour que la réponse en rampe atteigne une valeur double de celle
      obtenue immédiatement après l’application de la rampeNote 1 à l’article: Le
      temps de dosage de dérivation est donné parstem:[T_(\"d\") \"=\" frac(K_(\"D\"))(K_(\"Ρ\"))]où<table>\r\n<tr>\n<td>\nstem:[K]~D~\n</td>\n<td>est
      le coefficient d’action par dérivation;</td>\n</tr>\r\n<tr>\n<td>\nstem:[K]~P~\n</td>\n<td>est
      le coefficient d’action proportionnelle;</td>\n</tr>\r\n<tr>\n<td>\nstem:[T]~d~\n</td>\n<td>est
