  definition:
  - content: "of a charged particle in a medium; the quotient of dstem:[E] by dstem:[l]
      where dstem:[l] is the distance traversed by a particle and dstem:[E] is the
      energy loss due to collisions with energy transfer less than a specified value
      stem:[Δ] usually expressed in electron volts\r\nstem:[L_(Delta) = (frac(\"d\"
      E)(\"d\" l))_(Delta)]"
  examples: []
  id: 881-12-53
  notes:
  - content: "Although the definition specifies an energy cutoff and not a range cutoff
      the energy losses are sometimes called \"energy locally imparted\".\r\nExamples:
      stem:[L]~100~ means linear energy transfer for collisions with energy transfers
      less than 100 eV; stem:[L]~∞~ means linear energy transfer when all possible
      energy transfers are included.\r\nstem:[L]~∞~ = stem:[S]~col~"
  terms:
  - type: expression
    normative_status: preferred
    designation: linear energy transfer
  - type: expression
    normative_status: preferred
    designation: restricted linear collision stopping power
  - designation: stem:[L]~stem:[Δ]~
