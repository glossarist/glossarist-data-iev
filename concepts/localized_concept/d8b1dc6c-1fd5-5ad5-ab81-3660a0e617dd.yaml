  definition:
  - content: quotient of the {{speed of light in vacuum, urn:iec:std:iec:60050-113-01-34}}
      and the speed of light in a medium
  examples: []
  id: 845-24-109
  notes:
  - content: The value of the refractive index can depend on the {{frequency, urn:iec:std:iec:60050-103-06-02}},
      polarization, and direction.
  - content: The refractive index is expressed by stem:[n] = stem:[c]~0~/stem:[c,]
      where stem:[c]~0~ is the speed of light in vacuum and stem:[c] is the speed
      of light in the medium.
  - content: See also "{{complex refractive index, urn:iec:std:iec:60050-845-24-111}}.
  - content: The refractivity is expressed by stem:[n] − 1, where stem:[n] is refractive
      index.
  - content: The refractive index has unit one.
  - content: This entry was numbered 845-04-101 in IEC 60050-845:1987.
