  definition:
  - content: colour television system in which the baseband colour video signal is
      obtained by time multiplexing, during the period of one scanning line, the various
      components, generally the luminance signal and one or two chrominance components,
      the components having previously been subject to analogue temporal compression
  examples: []
  id: 723-08-13
  notes:
  - content: Currently, the resultant MAC picture signal is broadcast in analogue
      form.
  - content: In most MAC systems, any associated sound channels are time multiplexed
      with the components of the colour video signal.
  - content: MAC is an abbreviation of "Multiplexed Analogue Components".
  terms:
  - type: expression
    normative_status: preferred
    designation: MAC (colour television) system
  - type: expression
    designation: MAC
