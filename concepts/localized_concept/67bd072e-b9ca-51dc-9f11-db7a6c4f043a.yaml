  definition:
  - content: device intended to transform, with a specified accuracy and according
      to a given law, the measurand, or a quantity already transformed therefrom,
      into an electrical quantity
  examples: []
  id: 312-02-15
  notes:
  - content: If the input quantity is electrical, the input and output quantities
      may not be of the same kind, for example, a voltage and a current.
  - content: In certain instances, measuring transducers also have a specific name
      in respect of their function, (for example, amplifier, converter, transformer,
      frequency transducer, etc.).
