  notes:
  - content: Des exemples d'équipements et de machines auxiliaires qui consomment
      la puissance sont les ventilateurs, les pompes, les systèmes de chauffage, les
      capteurs. La charge parasite peut fortement dépendre de la sortie de puissance
      du système et des conditions ambiantes.
