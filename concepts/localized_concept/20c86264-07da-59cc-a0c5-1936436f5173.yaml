data:
  definition:
  - content: ensemble des programmes, des procédures, des règles, de la documentation
      et des données d’un système de traitement de l’information
  examples:
  - content: 'Exigences fonctionnelles et spécifications de conception; listage du
      code source; listes de contrôle et commentaires; texte d’aide et messages d’affichage
      sur l’interface homme-ordinateur; instructions d’installation et d’utilisation;
      guides pour la maintenance du matériel et du logiciel. Note 1 à l’article: Le
      logiciel est une création intellectuelle indépendante du support sur lequel
      il est enregistré. Note 2 à l’article: Le logiciel requiert la présence de dispositifs
      matériels pour exécuter des programmes et pour stocker et transmettre des données.
      Note 3 à l’article: Les micrologiciels, les logiciels d’exploitation et les
      logiciels d’application sont des types de logiciel.'
