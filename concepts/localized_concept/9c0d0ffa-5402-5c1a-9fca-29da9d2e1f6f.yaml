  definition:
  - content: "élément placé sur le trajet de l'arc et n'ayant aucune liaison extérieure;
      il peut:\r\n1) agir sur le flux de gaz ou de vapeur\n\nou 2) agir sur le flux
      d'énergie rayonnante\n\nou 3) agir sur la répartition du courant\n\nou 4) aider
      à désioniser le gaz ou la vapeur après conduction\n\nou 5) réduire les dépôts
      de matières actives sur d'autres surfaces"
