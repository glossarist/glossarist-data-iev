  definition:
  - content: dispositif, électrique ou mécanique, qui empêche la mise sous tension
      d'une fiche avant qu'elle ne soit suffisamment engagée dans un socle de prise
      de courant ou dans une prise mobile, et qui empêche l'extraction de la fiche
      tant qu'elle est sous tension ou qui la met hors tension avant la séparation
