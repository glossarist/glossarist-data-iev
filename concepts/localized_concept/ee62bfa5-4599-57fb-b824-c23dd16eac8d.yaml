  definition:
  - content: "perméabilité relative obtenue à partir de la variation totale de l'induction
      magnétique et de la variation correspondante du champ magnétique quand chacune
      de ces grandeurs est alternative avec une forme arbitraire entre des limites
      spécifiées:\r\nstem:[mu_(\"p\") = frac(1)(mu_(0)) frac(Delta B)(Delta H)]"
  examples: []
  id: 221-03-11
  notes:
  - content: La perméabilité impulsionnelle dépend fortement des limites entre lesquelles
      varie l'induction ou le champ. Ces limites ne sont pas nécessairement symétriques
      par rapport à zéro.
  - content: La perméabilité impulsionnelle se réfère souvent au cas où des impulsions
      de tension rectangulaires sont appliquées à un bobinage d'excitation. La forme
      de l'induction est alors approximativement triangulaire à condition que la saturation
      ne soit pas atteinte.
