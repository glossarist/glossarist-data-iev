  definition:
  - content: phénomène existant dans un système, siège d'une oscillation forcée telle
      que toute variation, si petite soit elle, de la fréquence de l'excitation, provoque
      une diminution d'une réponse du système
  examples: []
  id: 801-24-05
  notes:
  - content: La grandeur, qui sert à mesurer la réponse, doit être indiquée; par exemple,
      résonance de vitesse.
