  definition:
  - content: |-
      système polyphasé de stem:[m] grandeurs, qui ont la même amplitude et les phases à l'origine

      stem:[vartheta_(0) - 2 pi frac((i - 1) k)(m)] où stem:[vartheta_(0)] est la phase à l'origine d'une des grandeurs, stem:[i] prend les valeurs 1, 2, ..., stem:[m], et stem:[k] est une caractéristique du système, égale à l'un des entiers 0, 1, 2, ..., stem:[m] − 1
  examples: []
  id: 141-01-05
  notes:
  - content: Le système polyphasé symétrique est un système polyphasé dégénéré pour
      stem:[k] = 0 et pour certaines combinaisons de stem:[k] et stem:[m].
