  definition:
  - content: numerical value of the Celsius temperature expressed in degrees Celsius
      characterizing the thermal capability of an insulating material or an insulation
      system
  examples: []
  id: 212-12-11
  notes:
  - content: In case of insulating materials, the temperature index is derived from
      the thermal endurance relationship at a given time, normally 20 000 hours. It
      may be used as basis for determination of the material’s temperature class.
  - content: In case of insulation systems, the temperature index may be derived from
      known service experience or from a known comparative functional evaluation of
      an evaluated and established reference insulation system as basis.
