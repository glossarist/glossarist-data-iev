data:
  definition:
  - content: 'espace délimité extérieur à la {{zone de travail sous tension, urn:iec:std:iec:60050-651-21-03}}
      où des précautions spécifiques sont prises pour empêcher de pénétrer dans la
      zone de travail sous tensionNote 1 à l’article: Pénétrer dans la zone de travail
      sous tension, c’est se mettre en présence d’un {{phénomène électrique dangereux,
      urn:iec:std:iec:60050-651-26-05}}. Note 2 à l’article: Les limites extérieures
      de la zone de voisinage et les précautions spécifiques à appliquer sont généralement
      définies dans la réglementation nationale ou dans la réglementation de l''entreprise.
      Note 3 à l’article: Cet article était numéroté 651-01-07 dans la CEI 60050-651:1999.
      Il a été modifié comme suit: De plus amples détails sont fournis en ce qui a
      trait aux précautions à prendre dans la zone de voisinage.'
