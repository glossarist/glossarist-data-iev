  definition:
  - content: échelle de température adoptée par le Comité international des poids
      et mesures (CIPM) en 1989 pour les mesures pratiques
  examples: []
  id: 113-04-18
  notes:
  - content: Les grandeurs correspondant à la température thermodynamique et à la
      température Celsius définies par cette échelle sont notées respectivement stem:[T]~90~
      et stem:[t]~90~, où stem:[t]~90~ = stem:[T]~90~ − stem:[T]~0~ avec stem:[T]~0~:=
      273,15 K.
  - content: Les unités de stem:[T]~90~ et stem:[t]~90~ sont respectivement le kelvin,
      symbole K, et le degré Celsius, symbole °C.
