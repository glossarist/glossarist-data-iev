  definition:
  - content: "distorsion de la forme d'onde de la tension causée par une relation
      non linéaire entre l'induction magnétique et le champ électrique dans un noyau
      en ferrite et exprimée en décibels par:\r\nstem:[THD] &amp;equals; 20 lg(stem:[V]~m~/stem:[V]~f~)
      dB\n\noù\r\nstem:[V_(\"m\") = sqrt(sum_(n = 1)^(oo) V_(n)^(2))]\r\nstem:[V]~stem:[n]~
      est l'amplitude du stem:[n]-ième harmonique de la forme d'onde et stem:[V]~f~
      est l'amplitude du fondamental"
