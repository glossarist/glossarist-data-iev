  definition:
  - content: "time relay in which the output immediately switches to the operate condition
      and the time delay starts when applying the power supply and the control signal;
      the output switches to the release condition after the setting time has elapsed
      and if the control signal is not operated during the setting time\r\nimage::/assets/images/parts/445/[]"
  examples: []
  id: 445-01-15
  notes:
  - content: "– Cycling the control signal during the time delay will retrigger the
      time delay."
