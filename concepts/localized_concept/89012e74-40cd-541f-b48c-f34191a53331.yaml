  definition:
  - content: "quotient dstem:[N]/stem:[N] par stem:[ρ] dstem:[l] où dstem:[N]/stem:[N]
      est la fraction des particules indirectement ionisantes qui subissent des interactions
      lorsqu'elles traversent une distance dstem:[l] dans un milieu de masse spécifique
      stem:[ρ]\r\nstem:[frac(mu)(rho) = frac(1)(rho N) frac(\"d\" N)(\"d\" l)]"
  examples: []
  id: 881-04-27
  notes:
  - content: Le coefficient d'atténuation total massique stem:[frac(mu)(rho)] pour
      les rayons X et gamma peut s'exprimer par la somme de plusieurs parties dont
      chacune est attribuable à un phénomène particulier; stem:[frac(tau)(rho)] pour
      l'effet photoélectrique; stem:[frac(sigma_("c"))(rho)] pour l'effet Compton;
      stem:[frac(sigma_("coh"))(rho)] pour la diffusion cohérente et stem:[frac(kappa)(rho)]
      pour la formation de paires.
