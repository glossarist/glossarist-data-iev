  definition:
  - content: pour une surface plane S et un axe spécifié dans le plan de la surface,
      grandeur scalaire additive égale à l’intégrale stem:[I_("a") = int_("S") R^(2)
      rm(d) A], où stem:[R] est la distance entre un élément de surface d'aire dstem:[A]
      et l'axe
  examples: []
  id: 113-03-29
  notes:
  - content: Le moment quadratique axial d'une aire plane est parfois appelé incorrectement
      «moment d'inertie», mais ne doit pas être confondu avec la grandeur «moment
      d'inertie».
  - content: L'unité SI cohérente de moment quadratique axial d'une aire plane est
      le mètre à la puissance quatre, m^4^.
