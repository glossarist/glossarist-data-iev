---
data:
  definition:
  - content: quotient de la {{luminance, urn:iec:std:iec:60050-845-21-050}} à un élément
      de surface d'un milieu dans une direction donnée par l'{{éclairement, urn:iec:std:iec:60050-845-21-060}}
      du milieustem:[q_("v") = frac(L_("v"))(E_("v"))]où stem:[L]~v~ est la luminance
      et stem:[E]~v~ est l'éclairement
  examples: []
  id: 845-24-079
  notes:
  - content: La fonction de répartition bidirectionnelle du facteur de réflexion (BRDF
      ou bi-directional reflectance distribution function en anglais) est similaire
      au coefficient de luminance sauf qu'elle est définie pour un rayonnement incident
      directionnel.
  - content: Le coefficient de luminance est exprimé en stéradian à la puissance moins
      un (sr^−1^).
  - content: Cet article était numéroté 845-04-71 dans l'IEC 60050-845:1987.
