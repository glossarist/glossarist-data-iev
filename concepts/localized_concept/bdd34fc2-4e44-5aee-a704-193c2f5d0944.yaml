  definition:
  - content: unit of measurement that is adopted by convention for a base quantity
  examples: []
  id: 112-01-18
  notes:
  - content: In each coherent system of units, there is only one base unit for each
      base quantity. In the SI for example, the metre is the base unit of length.
      The centimetre and the kilometre are also units of length, but they are not
      base units in the SI. However, in the CGS systems, the centimetre is the base
      unit of length.
  - content: A base unit may also serve for a derived quantity of the same dimension.
      For example, rainfall, when defined as volume per area (areic volume), has the
      metre as a coherent derived unit in the SI. The ampere, base unit of electric
      current, is also the coherent derived unit of scalar magnetic potential.
  - content: For the quantity “number of entities”, the number one, symbol 1, can
      be regarded as a base unit in any system of units.
