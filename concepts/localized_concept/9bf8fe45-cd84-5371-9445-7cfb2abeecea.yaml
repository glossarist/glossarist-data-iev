  definition:
  - content: théorème de théorie des circuits en régime sinusoïdal, exprimant que,
      lorsque l'impédance d'une branche d'un réseau linéaire change de valeur, la
      variation du courant dans une branche quelconque est égale au courant qui serait
      produit dans cette branche par une tension de source insérée dans la branche
      modifiée, de valeur égale au produit du courant dans cette branche avant la
      variation d'impédance par la variation d'impédance
  examples: []
  id: 131-15-15
  notes:
  - content: On peut étendre le théorème de compensation à un régime non sinusoïdal.
