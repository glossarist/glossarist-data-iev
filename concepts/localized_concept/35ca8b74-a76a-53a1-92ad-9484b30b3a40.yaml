  definition:
  - content: "pour un système linéaire invariant dans le temps décrit par l'équation
      différentielle du deuxième ordrestem:[frac(\"d\"^(2) x)(\"d\" t^(2)) + 2 * vartheta
      * omega_(0) * frac(\"d\" x)(\"d\" t) + omega_(0)^(2) * x = 0]la valeur du coefficient
      stem:[vartheta],où<table>\r\n<tr>\n<td>stem:[t]</td>\n<td>est le temps;</td>\n</tr>\r\n<tr>\n<td>stem:[x]</td>\n<td>est
      une variable d’état du système;</td>\n</tr>\r\n<tr>\n<td>\nstem:[ω]~0~\n</td>\n<td>est
      la pulsation caractéristique du système</td>\n</tr>\n</table>Note 1 à l’article:
      Quand stem:[vartheta lt 1], stem:[omega_(\"d\") = omega_(0) * sqrt(1 - vartheta^(2))]
      est la pulsation propre du système"
