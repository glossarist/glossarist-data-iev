  definition:
  - content: "pour un multipôle capacitif linéaire à stem:[n] bornes, matrice stem:[m]
      × stem:[m], où stem:[m] &amp;equals; stem:[n] − 1, servant à exprimer les charges
      électriques stem:[q]~stem:[i]~ ({{131-12-11, urn:iec:std:iec:60050-131-12-11}})
      en stem:[m] bornes, en fonction des tensions électriques ({{131-11-56, urn:iec:std:iec:60050-131-11-56}})
      stem:[u]~stem:[jn]~ entre ces bornes et la borne restante notée stem:[n]:\r\nstem:[([q_(1)],
      [q_(2)], [vdots], [q_(i)], [vdots], [q_(m)]) = ([C_(11), C_(12), cdots, C_(1
      j), cdots, C_(1 m)], [C_(21), C_(22), cdots, C_(2 j), cdots, C_(2 m)], [vdots,
      vdots, ddots, vdots, ddots, vdots], [C_(i 1), C_(i 2), cdots, C_(i j), cdots,
      C_(i m)], [vdots, vdots, ddots, vdots, ddots, vdots], [C_(m 1), C_(m 2), cdots,
      C_(m j), cdots, C_(m m)]) * ([u_(1 n)], [u_(2 n)], [vdots], [u_(j n)], [vdots],
      [u_(m n)])]"
  examples: []
  id: 131-12-32
  notes:
  - content: Une matrice des capacités est toujours symétrique et définie positive.
  - content: Une matrice des capacités peut aussi être déterminée pour un ensemble
      d’éléments de circuit électrique comportant des couplages capacitifs entre chaque
      paire d’éléments.
