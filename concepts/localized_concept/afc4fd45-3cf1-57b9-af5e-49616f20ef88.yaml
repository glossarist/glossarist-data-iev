  id: 121-12-23
  notes:
  - content: Dans une substance ferroélectrique des groupes d’atomes voisins interagissent
      de telle sorte que leurs moments électriques soient approximativement alignés
      dans la même direction à l’intérieur de certaines régions; l’alignement des
      moments électriques résultants des régions augmente jusqu’à une certaine limite
      quand un champ électrique croissant est appliqué.
