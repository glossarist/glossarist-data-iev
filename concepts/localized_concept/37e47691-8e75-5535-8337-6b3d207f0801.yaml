---
data:
  definition:
  - content: "variation de la gravure ionique réactive (RIE) qui peut produire des
      structures à {{rapport largeur/longueur, urn:iec:std:iec:60050-523-07-04}} élevé
      avec des parois verticales\r\nNote 1 à l’article: Par exemple, des structures
      à rapport largeur/longueur élevé peuvent être produites en introduisant alternativement
      un gaz de gravure et un gaz de formation de film de protection dans un équipement
      de gravure ionique réactive. \r\nNote 2 à l’article: Le terme abrégé \"DRIE\"
      est dérivé du terme anglais développé correspondant \"deep reactive ion etching\"."
