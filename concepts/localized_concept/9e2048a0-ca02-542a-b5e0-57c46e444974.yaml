  - content: source potentielle de {{dommage, urn:iec:std:iec:60050-903-01-01}}
  examples: []
  id: 903-01-02
  notes:
  - content: En anglais, le terme «hazard» peut être qualifié afin de définir l’origine
      du phénomène dangereux ou la nature du dommage attendu (par exemple, «electric
      shock hazard», «crushing hazard», «cutting hazard», «toxic hazard», «fire hazard»,
      «drowning hazard»).
  - content: En français, le synonyme «risque» est employé avec un qualificatif ou
      un complément afin de définir l’origine du phénomène dangereux ou la nature
      du dommage attendu (par exemple, «risque de choc électrique», «risque d'écrasement»,
      «risque de coupure», «risque toxique», «risque d'incendie», «risque de noyade»).
  - content: En français, le terme «risque» désigne aussi la combinaison de la probabilité
      d'un dommage et de sa gravité, en anglais «risk» (voir {{903-01-07, urn:iec:std:iec:60050-903-01-07}}).
