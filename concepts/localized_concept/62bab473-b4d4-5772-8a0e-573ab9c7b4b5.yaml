  definition:
  - content: flat {{protective cover, urn:iec:std:iec:60050-651-22-11}} made of flexible
      insulating material, used to provide electrical insulation between the feet
      of the worker and the surface on which the worker is standing
  examples: []
  id: 651-22-13
  notes:
  - content: The electric potential of the surface on which the worker is standing
      is usually that of earth.
