  definition:
  - content: vélocité alternative qui serait communiquée à une pointe de lecture de
      dimensions négligeables, équipant une tête de lecture d'impédance mécanique
      nulle et suivant le sillon d'un disque tournant à vitesse constante
  examples: []
  id: 806-14-56
  notes:
  - content: La vélocité du signal enregistré est représentée pour les disques stéréophoniques
      par un vecteur ayant une composante latérale et une composante verticale.
  - content: La vélocité du signal enregistré peut être mesurée par la méthode de
      Buchmann et Meyer. On doit toujours spécifier si les valeurs en cause sont des
      valeurs efficaces ou des valeurs de crête.
