  definition:
  - content: composante magnéto-ionique qui, en incidence verticale, se réfléchit
      à l'altitude où la densité électronique est telle que la fréquence de plasma
      est égale à la fréquence de l'onde
  examples: []
  id: 705-07-39
  notes:
  - content: Cette composante a une polarisation elliptique dextrorsum ou senestrorsum
      suivant que sa direction de propagation fait un angle obtus ou aigu avec le
      vecteur champ magnétique terrestre.
  - content: Lorsque la direction de propagation est perpendiculaire au champ magnétique
      terrestre, cette composante a une polarisation rectiligne, le vecteur induction
      électrique étant dans le plan défini par la direction de propagation et le champ
      magnétique.
