  definition:
  - content: for two sinusoidal quantities of the same frequency in a given order,
      difference between their initial phases with possible addition of a multiple
      of 2stem:[pi] so that the difference is greater than &minus;stem:[pi] and not
      greater than stem:[pi]
  examples: []
  id: 103-07-06
  notes:
  - content: For the quantities stem:[a^(prime) ( t ) = hat(A^(prime)) "cos" ( omega
      " " t + vartheta^(prime)_(0) )] and stem:[a^(dprime) ( t ) = hat(A^(dprime))
      "cos" ( omega " " t + vartheta^(dprime)_(0) )], the phase difference is stem:[phi
      = vartheta^(dprime)_(0) - vartheta^(prime)_(0) + 2 pi n], where stem:[n] is
      an integer, chosen so that stem:[- pi lt phi le pi].
  terms:
  - type: expression
    normative_status: preferred
    designation: phase difference
  - type: symbol
    designation: stem:[φ]
