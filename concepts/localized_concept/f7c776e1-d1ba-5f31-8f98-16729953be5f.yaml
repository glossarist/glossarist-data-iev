---
data:
  definition:
  - content: "procédé de micro-usinage dans lequel une couche intermédiaire intercalée
      entre deux couches d’un matériau différent est de préférence (de manière sacrificielle)
      gravée et retirée sélectivement\r\nNote 1 à l’article: Habituellement, la sélectivité
      de gravure est élevée entre la couche intermédiaire et les deux couches sandwich.
      L’objet de la couche sacrificielle est de relâcher mécaniquement une couche
      sandwich ou les deux. L’oxyde de silicium est une couche sacrificielle communément
      utilisée."
