  definition:
  - content: vector Δ*stem:[U]* associated at each point of a given space region with
      a vector *stem:[U]*, equal to the gradient of the divergence of the vector field
      minus the rotation of the rotation of this vector field Δ*stem:[U]* = *grad*
      div *stem:[U]* − *rot rot stem:[U]*
  examples: []
  id: 102-05-29
  notes:
  - content: 'In orthonormal Cartesian coordinates, the three components of the Laplacian
      of a vector field are: stem:[frac(del^(2) U_(x))(del " " x^(2)) + frac(del^(2)
      U_(x))(del " " y^(2)) + frac(del^(2) U_(x))(del " " z^(2)) " " " " , " " " "
      " " frac(del^(2) U_(y))(del " " x^(2)) + frac(del^(2) U_(y))(del " " y^(2))
      + frac(del^(2) U_(y))(del " " z^(2)) " " " " , " " " " " " frac(del^(2) U_(z))(del
      " " x^(2)) + frac(del^(2) U_(z))(del " " y^(2)) + frac(del^(2) U_(z))(del " "
      z^(2))].'
  - content: The Laplacian of the vector field *stem:[U]* is denoted by Δ*stem:[U]*
      or ∇^2^*stem:[U]*, where Δ is the Laplacian operator.
