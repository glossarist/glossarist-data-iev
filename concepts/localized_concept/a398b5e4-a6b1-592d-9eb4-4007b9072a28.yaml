  definition:
  - content: density of a radiant or luminous or photon quantity, stem:[X](stem:[λ]),
      with respect to wavelength, stem:[λ], at the wavelength stem:[λ]stem:[X_(lambda)
      = frac("d" X ( lambda ))("d" lambda)]
  examples: []
  id: 845-21-029
  notes:
  - content: The term "spectral distribution" is to be preferred to the equivalent
      term "spectral concentration" when dealing with the function stem:[X~λ~](stem:[λ])
      over a range of wavelengths, not at a particular wavelength.
  - content: Usually stem:[X~λ~] is also a function of stem:[λ] and in this case,
      in order to stress this, can be written stem:[X~λ~](stem:[λ]) without any change
      of meaning.
  - content: The spectral distribution of radiant flux is expressed in watt per nanometre
      (W·nm^−1^), the spectral distribution of luminous flux is expressed in lumen
      per nanometre (lm·nm^−1^), the spectral distribution of photon flux is expressed
      in nanometre to the power minus one (nm^−1^). The units of spectral distributions
      of other quantities are expressed accordingly.
  - content: The quantity stem:[X] can also be expressed as a function of {{frequency,
      urn:iec:std:iec:60050-103-06-02}}, stem:[ν], {{wavenumber, urn:iec:std:iec:60050-845-21-026}},
      stem:[σ], etc.; the corresponding symbols are stem:[X](stem:[ν]), stem:[X](stem:[σ]),
      etc. and the corresponding densities with respect to frequency, stem:[ν], wavenumber,
      stem:[σ], etc. are stem:[X~ν~], stem:[X~σ~], etc., in which case the expression
      of units will also change accordingly.
  - content: This entry was numbered 845-01-17 in IEC 60050-845:1987.
  terms:
