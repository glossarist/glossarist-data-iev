  definition:
  - content: sum of durations of all interruptions of supply to individual customers
      served during a time interval, divided by the product of the total number of
      customers served and the duration of that time interval
  examples: []
  id: 692-08-03
  notes:
  - content: If stem:[t]~stem:[ij]~ is the duration of the stem:[i]th interruption
      of supply to customer stem:[j] during a time interval of duration stem:[T],
      and stem:[N]~S~ the total number of customers served, then the service unavailability
      per customer served is given bystem:[U_("CS") = frac(sum_(i) sum_(j) t_(i j))(N_("S")
      T)]
  - content: Only {{sustained interruptions, urn:iec:std:iec:60050-692-07-02}} are
      considered.
  - content: If the duration of the time interval is expressed in years, the quantity
      is called the "average yearly downtime per customer served".
  - content: The term "customer" represents the end user and not some intermediate
      distribution system or company.
  - content: Service unavailability per customer served can be used to describe past
      performance or to estimate expected future performance.
  - content: This entry was numbered 191-27-03 in IEC 60050-191:1990.
