---
data:
  definition:
  - content: densité du flux lumineux exitant par rapport à l'aire en un point d'une
      surface réelle ou fictivestem:[M_("v") = frac("d" Phi_("v"))("d" A)]où stem:[Φ]v
      est le flux lumineux et stem:[A] est l'aire de laquelle part ce flux
  examples: []
  id: 845-21-081
  notes:
  - content: L'exitance lumineuse peut être dérivée de la répartition spectrale de
      l'exitance énergétique parstem:[M_("v") = K_("m") int_(0)^(oo) M_("e" "," lambda)
      ( lambda ) " " V ( lambda ) " " "d" lambda]où stem:[K]~m~ est l'efficacité lumineuse
      maximale, stem:[M]~e,~stem:[~λ~](stem:[λ]) est l'exitance spectrale énergétique
      à la longueur d'onde stem:[λ] et stem:[V](stem:[λ]) est l'{{efficacité lumineuse
      spectrale, urn:iec:std:iec:60050-845-21-035}}.Les limites de l'intégrale peuvent
      être confinées selon la {{sensibilité, urn:iec:std:iec:60050-845-25-061}} spectrale
      des récepteurs utilisés comme capteurs.
  - content: La grandeur radiométrique correspondante est l'"exitance énergétique".
      La grandeur correspondante pour les photons est l'"exitance photonique".
  - content: L'exitance lumineuse est exprimée en lumen par mètre carré (lm·m^−2^).
  - content: Cet article était numéroté 845-01-48 dans l'IEC 60050-845:1987.
