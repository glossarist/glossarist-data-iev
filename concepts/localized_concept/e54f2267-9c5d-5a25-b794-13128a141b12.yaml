  definition:
  - content: quotient of the number of {{digits, urn:iec:std:iec:60050-702-05-02}}
      transferred in a {{time interval, urn:iec:std:iec:60050-113-01-10}}, by the
      {{duration, urn:iec:std:iec:60050-113-01-13}} of this time interval
  examples: []
  id: 702-05-23
  notes:
  - content: 'The term "digit rate" can be qualified, for example: "{{binary digit
      rate, urn:iec:std:iec:60050-704-16-07}}", "{{ternary digit rate, urn:iec:std:iec:60050-704-16-08}}",
      "{{stem:[n]-ary digit rate, urn:iec:std:iec:60050-704-16-09}}" when the {{number
      of significant conditions, urn:iec:std:iec:60050-702-05-22}} is respectively
      two, three, stem:[n].'
  - content: The term "digit rate" should not be used to express the transmission
      rate of a {{line signal, urn:iec:std:iec:60050-704-04-13}}) for which the appropriate
      term is "{{line digit rate, urn:iec:std:iec:60050-704-17-03}}".
