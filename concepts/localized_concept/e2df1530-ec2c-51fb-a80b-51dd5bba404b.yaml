  id: 113-05-12
  notes:
  - content: Fermions undergo Fermi-Dirac statistics and obey the Pauli exclusion
      principle, which asserts that only a single particle can be assigned to a given
      quantum state.
  - content: Fermions are e.g. the electron, all neutrinos and quarks, and all particles
      constituted from an odd number of fermions (e.g., proton, neutron, helium nucleus
      ^3^He).
