  definition:
  - content: the oscillation frequency at which a plasma, locally disturbed by an
      excess or depletion of electrons, reverts to its macroscopic state of neutral
      equilibrium, supposing that the ions remain fixed in position
  examples: []
  id: 705-06-10
  notes:
  - content: "The plasma frequency stem:[f]~p~ is given by the equation: \r\nstem:[f_(p)
      = frac(e)(2 pi) sqrt(frac(n_(\"e\"))(m epsilon_(0)))]\n\nwhere stem:[e] is the
      electron charge, stem:[m] is the electron mass, stem:[n]~e~ is the electron
      density, stem:[ε]~0~ is the electric constant."
  terms:
  - type: expression
    normative_status: preferred
    designation: plasma frequency
