  definition:
  - content: macro-état qui ne change pas spontanément dans le temps et est stable
      vis-à-vis de petites perturbations
  examples: []
  id: 113-04-07
  notes:
  - content: Un état d'équilibre est atteint par un système isolé après une durée
      suffisamment longue, qui dépend du processus considéré.
  - content: L'état d'équilibre est le macro-état ayant le nombre maximal de micro-états
      différents parmi tous les macroétats d'un système isolé.
  - content: Des fluctuations existent même dans l'état d'équilibre, mais elles ne
      sont pas prises en compte dans ce concept.
