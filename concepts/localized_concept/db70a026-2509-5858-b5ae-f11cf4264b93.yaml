  definition:
  - content: "{{nanoscale device, urn:iec:std:iec:60050-511-01-13}} or embedded system
      involving one or more electronic and non-electronic components enabling the
      integration of electric and mechanical functionality of the system"
  examples: []
  id: 511-01-13
  notes:
  - content: The components can be organic, inorganic or hybrid nanotechnology-based
      and function on the {{nanoscale, urn:iec:std:iec:60050-511-01-03}} for sensing,
      actuation, signal processing, display, or {{control, urn:iec:std:iec:60050-351-42-19}}.
  - content: The components can be micro- or nano-machined to produce free surfaces
      and volumes that will be able to couple with the environment so that a physical,
      optical, chemical, or biological phenomenon is transduced to an electric signal.
  sources:
  - origin:
