  definition:
  - content: combinatorial circuit which performs a Boolean operation in one or two
      stages
  examples: []
  id: 351-52-05
  notes:
  - content: |-
      Examples of binary-logic elements are:<table>
      <tr>
      <td>NOT element</td>
      <td>complementation;</td>
      </tr>
      <tr>
      <td>AND element</td>
      <td>logical product;</td>
      </tr>
      <tr>
      <td>OR element</td>
      <td>logical sum;</td>
      </tr>
      <tr>
      <td>NAND element</td>
      <td>complemented logical product;</td>
      </tr>
      <tr>
      <td>NOR element</td>
      <td>complemented logical sum;</td>
      </tr>
      <tr>
      <td>XOR element</td>
      <td>exclusive OR.</td>
      </tr>
      </table>
