  definition:
  - content: photovoltaic {{device, urn:iec:std:iec:60050-511-01-01}} in which its
      optical properties are modified by incorporating metallic {{nanoparticles, urn:iec:std:iec:60050-511-01-12}}
      to the {{semiconductor, urn:iec:std:iec:60050-121-12-06}} layer of the device
  examples: []
  id: 511-02-07
  notes:
  - content: The {{nanostructure, urn:iec:std:iec:60050-511-01-08}} of the metallic
      particles increases the {{absorption, urn:iec:std:iec:60050-705-02-07}} and
      {{scattering, urn:iec:std:iec:60050-705-04-46}} of incident light and supports
      strong localized collective electron excitations known as surface plasmons.
  - content: Plasmon-resonance-generating metallic nanostructures are provided on
      the semiconductor layer of the device for resonantly coupling light into the
      absorbing layer and transporting photo-induced {{charge carriers, urn:iec:std:iec:60050-113-06-25}}
      out of the absorbing layer, thereby improving the performance of the device.
  sources:
