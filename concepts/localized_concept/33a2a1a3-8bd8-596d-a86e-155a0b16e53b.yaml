  - content: électrode négative d’une torche à plasma d’arc en courant continu
  examples: []
  id: 841-31-42
  notes:
  - content: La cathode peut être constituée d’un matériau à forte conductivité électrique
      et thermique, tel que le cuivre, et d’un métal réfractaire ou refroidi à l'eau,
      tel que le tungstène, refroidi à l’eau si nécessaire.
  - content: Dans une torche à plasma d’arc transféré, l’électrode de retour de courant
      joue parfois le rôle de cathode.
