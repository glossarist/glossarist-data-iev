data:
  definition:
  - content: neutron d’énergie cinétique supérieure à l‘énergie du seuil cadmium effectif
  examples: []
  id: 395-02-16
  notes:
  - content: L'énergie du seuil, pour une configuration donnée, est déterminée par
      la condition que, si une couche de cadmium entourant un détecteur était remplacée
      par une couche fictive opaque aux neutrons, dont l’énergie est inférieure à
      cette valeur et transparente aux neutrons dont l’énergie est supérieure à cette
      valeur, la réponse fournie par ce détecteur ne changerait pas.
  - content: Cet article était numéroté 393-12-76 dans la CEI 60050-393:2003.
