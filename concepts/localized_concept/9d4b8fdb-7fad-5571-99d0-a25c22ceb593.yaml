  definition:
  - content: quotient of the coefficient of luminous intensity, stem:[R], of a plane
      retroreflective surface and its area, stem:[A]stem:[R_(A) = frac(R)(A) = frac(I
      / E_(exists))(A)]where stem:[I] is the luminous intensity of the retroreflector
      in the direction of observation, and stem:[E_(exists)] is the illuminance at
      the retroreflector on a plane perpendicular to the direction of the incident
      light
  examples: []
  id: 845-24-103
  notes:
  - content: The coefficient of retroreflection is particularly suitable for describing
      materials in sheet form.
  - content: Formerly, the symbol stem:[R]′ was used for this quantity.
  - content: The coefficient of retroreflection is expressed in candela per lux per
      square metre (cd·lx^−1^·m^−2^).
  - content: This entry was numbered 845-04-97 in IEC 60050-845:1987.
