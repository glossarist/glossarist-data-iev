  definition:
  - content: simultaneous colour television system using, in baseband, a composite
      colour signal comprising a luminance signal and two chrominance components,
      which are transmitted as quadrature amplitude modulation of a subcarrier
  examples: []
  id: 723-08-10
  notes:
  - content: In most actual applications of NTSC, the scanning system uses 525 lines
      and 60 fields/second. The colour signal is transmitted using vestigial side
      band amplitude modulation, and the sound is transmitted as frequency modulation
      of a separate radio-frequency carrier.
  - content: The term NTSC is an abbreviation of "National Television System Committee".
