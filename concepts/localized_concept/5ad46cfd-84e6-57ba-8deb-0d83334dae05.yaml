  definition:
  - content: energy emitted, transferred or received in the form of electromagnetic
      waves
  examples: []
  id: 845-21-041
  notes:
  - content: Radiant energy can be expressed by the time integral of radiant flux,
      stem:[Φ]~e~, over a given duration, Δstem:[t]:stem:[Q_("e") = int_(Delta t)
      Phi_("e") " " "d" t]
  - content: Radiant energy is expressed as a function of wavelength, stem:[λ], as
      a function of {{frequency, urn:iec:std:iec:60050-103-06-02}}, stem:[ν], or as
      a function of {{wavenumber, urn:iec:std:iec:60050-845-21-026}}, stem:[σ].
  - content: The corresponding photometric quantity is "{{luminous energy, urn:iec:std:iec:60050-845-21-037}}".
      The corresponding quantity for photons is "photon energy".
  - content: The radiant energy is expressed in joule (J&#160;= W&middot;s).
  - content: This entry was numbered 845-01-27 in IEC 60050-845:1987.
