  definition:
  - content: dispositif composé d'un boîtier contenant une bande magnétique multispire
      en forme de boucle sans fin enroulée sur un seul noyau et qui se déroule à partir
      de la spire centrale et s'enroule sur la spire périphérique
  examples: []
  id: 806-15-39
  notes:
  - content: Le dispositif peut s'insérer aisément et instantanément sur un appareil
      enregistreur-lecteur ou lecteur conçu à cet effet, sans manipulation de la bande
      magnétique.
