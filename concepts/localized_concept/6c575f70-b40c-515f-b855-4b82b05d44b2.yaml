  definition:
  - content: "a) for polyphase transformers or reactors and polyphase banks of single-phase
      transformers or reactors:\n\nthe terminal(s) connected to the common point (the
      neutral point) of a star-connected or zigzag-connected winding\r\nb) for single-phase
      transformers or reactors:\n\nthe terminal intended for connection to a neutral
      point of a network"
