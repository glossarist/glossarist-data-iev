  definition:
  - content: zone de la surface de la Terre, associée à une station spatiale, à l'intérieur
      de laquelle, dans des conditions techniques déterminées, une radiocommunication
      de nature déterminée peut être établie avec une ou plusieurs stations terriennes,
      qu'il s'agisse d'émission, de réception ou des deux la fois
  examples: []
  id: 725-13-01
  notes:
  - content: Plusieurs zones de couverture distinctes peuvent être associées à une
      même station, par exemple pour un satellite à plusieurs faisceaux d'antennes.
  - content: La zone de couverture en l'absence de brouillage est limitée par un contour
      de puissance surfacique spécifiée.
  - content: La notion de "zone de couverture" ne s'applique de façon simple qu'à
      une station spatiale embarquée sur un satellite géostationnaire.
