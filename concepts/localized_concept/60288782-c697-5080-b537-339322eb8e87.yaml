  definition:
  - content: "pour tout rayonnement ionisant, quotient de la somme dstem:[Q] des charges
      électriques de tous les ions de même signe produits dans un élément de volume
      d'air par la masse dstem:[m] de ce volume\r\nstem:[J = frac(\"d\" Q)(\"d\" m)]\r\nL'unité
      SI de dose ionique est le coulomb par kilogramme (C kg^−1^). L'ancienne unité
      spéciale encore utilisée temporairement est le röntgen\n\n1 R = 2,58 × 10^−4^
      C kg^−1^."
