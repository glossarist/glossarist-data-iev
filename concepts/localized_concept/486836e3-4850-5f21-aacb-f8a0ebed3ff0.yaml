  definition:
  - content: système d'unités, fondé sur un système de grandeurs donné, dans lequel
      l'unité de mesure de chaque grandeur dérivée est une unité dérivée cohérente
  examples: []
  id: 112-01-22
  notes:
  - content: Un système d'unités ne peut être cohérent que par rapport à un système
      de grandeurs et aux unités de base adoptées.
  - content: Pour un système cohérent d'unités, les équations aux valeurs numériques
      ont la même forme, y compris les facteurs numériques, que les équations aux
      grandeurs correspondantes.
  - content: Un exemple de système cohérent d’unités est l’ensemble des unités SI
      cohérentes muni des relations entre elles.
