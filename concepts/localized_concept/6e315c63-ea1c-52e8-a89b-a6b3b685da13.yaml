  definition:
  - content: three colour stimuli on which a trichromatic system is based
  examples: []
  id: 845-23-037
  notes:
  - content: These stimuli are either real colour stimuli or theoretical stimuli which
      are defined by linear combinations of real colour stimuli.
  - content: In the CIE standard colorimetric systems, the reference colour stimuli
      are represented by the symbols &lsqb;R&rsqb;, &lsqb;G&rsqb;, &lsqb;B&rsqb;;
      &lsqb;X&rsqb;, &lsqb;Y&rsqb;, &lsqb;Z&rsqb;; &lsqb;R~10~&rsqb;, &lsqb;G~10~&rsqb;,
      &lsqb;B~10~&rsqb; or &lsqb;X~10~&rsqb;, &lsqb;Y~10~&rsqb;, &lsqb;Z~10~&rsqb;.
  - content: This entry was numbered 845-03-21 in IEC 60050-845:1987.
