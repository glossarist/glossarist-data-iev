  definition:
  - content: general principle that, in the absence of losses, the elementary radiant
      flux or luminous flux, dstem:[Φ], between two elementary areas dstem:[A] and
      dstem:[A]′ defining an elementary beam is proportional to the elementary projected
      areas dstem:[A] cos stem:[θ] and dstem:[A]′ cos stem:[θ] ′ in the direction
      of the beam and inversely proportional to the squared distance, stem:[l], between
      the areas
  examples: []
  id: 845-25-088
  notes:
  - content: The basic law of radiometry and photometry is expressed bystem:["d" Phi
      = L * frac("d" A costheta * "d" A^(prime) costheta^(prime))(l^(2))]where the
      proportionality factor for this geometrical condition is equal to the radiance
      or luminance, respectively, within the elementary beam.
  - content: The basic law of radiometry and photometry is based on the geometric
      extent.
