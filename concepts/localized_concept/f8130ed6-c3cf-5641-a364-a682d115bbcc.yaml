  definition:
  - content: "{{SI, urn:iec:std:iec:60050-112-02-02}} {{unit, urn:iec:std:iec:60050-112-01-14}}
      of time, equal to 9 192 631 770 {{periods, urn:iec:std:iec:60050-103-06-01}}
      of the {{ground-state, urn:iec:std:iec:60050-113-06-08}} hyperfine transition
      of the unperturbed caesium 133 {{atom, urn:iec:std:iec:60050-113-05-20}}"
  examples: []
  id: 112-02-04
  notes:
  - content: 'The definition in the SI Brochure is: "The second, symbol s, is the
      SI unit of time. It is defined by taking the fixed numerical value of the caesium
      frequency Δstem:[ν]~Cs~, the unperturbed ground-state hyperfine transition frequency
      of the caesium 133 atom, to be 9 192 631 770 when expressed in the unit Hz,
      which is equal to s^−1^."'
  - content: The reference to an unperturbed atom is intended to make it clear that
      the definition of the second is based on an isolated caesium atom that is unperturbed
      by any external field, such as ambient black-body radiation.
  - content: As explained in {{IEV 113-01-13, urn:iec:std:iec:60050-113-01-13}}, Note
      5, the quantity name “duration” is more precise than the loose term “time”.
  - content: 'The second is one of the seven SI {{base units, urn:iec:std:iec:60050-112-01-18}}:
      second (s), {{metre, urn:iec:std:iec:60050-112-02-05}} (m), {{kilogram, urn:iec:std:iec:60050-112-02-06}}
      (kg), {{ampere, urn:iec:std:iec:60050-112-02-07}} (A), {{kelvin, urn:iec:std:iec:60050-112-02-08}}
      (K), {{mole, urn:iec:std:iec:60050-112-02-09}} (mol) and {{candela, urn:iec:std:iec:60050-112-02-10}}
      (cd).'
