  definition:
  - content: process or device by which the {{gain, urn:iec:std:iec:60050-702-02-11}}
      of an {{amplifier, urn:iec:std:iec:60050-151-13-50}} is controlled by the level
      of the {{output, urn:iec:std:iec:60050-151-15-14}} {{signal, urn:iec:std:iec:60050-101-12-02}}
      so as to reduce changes in this level as compared with the changes in the {{input,
      urn:iec:std:iec:60050-151-15-13}} signal
