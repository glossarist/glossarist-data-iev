  definition:
  - content: a controllable valve device which latches when it is turned on, that
      means it remains in the on state when the trigger signal has ended
  examples: []
  id: 551-14-07
  notes:
  - content: Most latching valve devices can be turned off only by suppressing the
      current through the conducting path by external means.
  - content: A gate turn-off (GTO) thyristor is a latching valve device which can
      be turned off by a control signal.
  - content: A latching valve device may be reverse blocking or non-reverse blocking.
  terms:
  - type: expression
    normative_status: preferred
    designation: latching valve device
