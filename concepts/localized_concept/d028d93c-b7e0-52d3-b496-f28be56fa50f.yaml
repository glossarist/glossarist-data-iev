  definition:
  - content: "pour un réseau contenant stem:[n] noeuds et stem:[b] branches, dont
      chacune est munie d'un sens de référence, matrice de format stem:[n] × stem:[b]
      dont l'élément stem:[a]~stem:[ij]~ est égal à\r\n* 0 si la branche j n'est pas
      incidente au noeud i* 1 si la branche j est orientée à partir du noeud i* −1
      si la branche j est orientée vers le noeud i"
