  definition:
  - content: |-
      pour un bipôle résistif, élémentaire ou non, de bornes A et B, dérivée de la tension électrique stem:[u]~AB~ &amp;lsqb;{{131-11-56, urn:iec:std:iec:60050-131-11-56}}&amp;rsqb; entre les bornes par rapport au courant électrique stem:[i] dans le bipôle:

      stem:[R_(rm(d)) = frac(rm(d) u_(rm(AB)))(rm(d) i)]

      où le courant est positif si le sens du courant est de A vers B et négatif dans le cas contraire
