  notes:
  - content: The single cell test is typically a laboratory scale test in which several
      variables can be adjusted in order to obtain data over a wide range of conditions,
      such as temperature, {{current density, urn:iec:std:iec:60050-485-12-01}}, fuel
      and oxidant flow rates, etc. The outcome of a single cell test can be a {{polarization
      curve, urn:iec:std:iec:60050-485-15-06}}, a voltage stability plot, or other
      data related to fuel cell performance.
