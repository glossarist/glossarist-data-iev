  definition:
  - content: |-
      une des trois composantes symétriques qui existe dans les systèmes triphasés équilibrés et déséquilibrés de grandeurs sinusoïdales et qui est définie par l'expression mathématique complexe ci-après:

      stem:[<u>X</u>]~1~ = 1/3(stem:[<u>X</u>]~L1~ + stem:[a]stem:[<u>X</u>]~L2~ + stem:[a]^2^stem:[<u>X</u>]~L3~)

      où stem:[a] est l'opérateur correspondant à une rotation de 120 degrés et où stem:[<u>X</u>]~L1~, stem:[<u>X</u>]~L2~ et stem:[<u>X</u>]~L3~ sont les expressions complexes des grandeurs de phase considérées, avec stem:[<u>X</u>] désignant les phaseurs de courant ou de tension du réseau
