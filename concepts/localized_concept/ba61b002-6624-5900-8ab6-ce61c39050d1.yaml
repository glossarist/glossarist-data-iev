---
data:
  definition:
  - content: loi associant le contraste apparent stem:[C~d~], d'un objet sur un fond
      de ciel à une distance d'observation donnée, stem:[d], au contraste propre stem:[C]~0~,
      de cet objet et à la transmissivité atmosphérique stem:[T] réputée uniformestem:[C_(d)
      = C_(0) T^(d / d_(0))]où stem:[d]~0~ est la longueur spécifiée pour la définition
      de stem:[T]
  examples: []
  id: 845-31-020
  notes:
  - content: La formule est parfois écrite sous la formestem:[C_(d) = C_(0) T^(delta)]où
      l'exposant, stem:[δ], dans stem:[T^δ^] est la valeur numérique de stem:[d] mesurée
      avec stem:[d]~0~ comme "unité".
  - content: Compte tenu de la relation entre la transmissivité atmosphérique stem:[T],
      et la portée optique météorologique, stem:[v], donnée à la Note 2 à l'article
      de la définition "{{portée optique météorologique, urn:iec:std:iec:60050-845-31-018}}",
      la loi de Koschmieder peut aussi s'écrire sous la formestem:[C_(d) = C_(0) (
      0,05^(d / v) )]
  - content: Le contraste est considéré comme étant le quotient de la différence entre
      la luminance de l'objet et la luminance du fond par la luminance du fond.
  - content: Cet article était numéroté 845-11-22 dans l'IEC 60050-845:1987.
