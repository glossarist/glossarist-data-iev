  definition:
  - content: 'at a point fixed in a medium with a temperature field, scalar quantity
      stem:[λ] characterizing the ability of the medium to transmit heat through a
      surface element containing that point: *stem:[φ]* = −stem:[λ] *grad* stem:[T],
      where *stem:[φ]* is the density of heat flow rate and stem:[T] is thermodynamic
      temperature'
  examples: []
  id: 113-04-38
  notes:
  - content: In an anisotropic medium, thermal conductivity is a tensor quantity.
  - content: The coherent SI unit of thermal conductivity is watt per metre kelvin,
      W/(m·K).
