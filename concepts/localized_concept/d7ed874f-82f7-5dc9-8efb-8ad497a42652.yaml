  notes:
  - content: "Table 1 provides a structured overview as an aid to understanding this
      and other concepts relating to energy efficiency and power consumption applicable
      in electrotechnical products. Additional terms to fulfil the particular needs
      of particular product sectors should be defined within the structure of the
      concepts shown in Table 1.\r\n*Table 1 – Operating conditions of equipment in
      respect to power demand*\r\nimage::/assets/images/parts/904/111-62542_2013_T-1_en.png[]\r\nAs
      the number of functions increases from left to right in Table 1, the relevant
      modes will generally have higher energy consumption. The existence of a mode
      in Table 1 does not imply that a particular piece of equipment will offer that
      mode."
