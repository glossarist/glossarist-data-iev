  notes:
  - content: En français, les termes "{{perturbation électromagnétique, urn:iec:std:iec:60050-161-01-05}}"
      et "{{brouillage électromagnétique, urn:iec:std:iec:60050-161-01-06}}" désignent
      respectivement la cause et l’effet et ne devraient pas être utilisés l’un pour
      l’autre.
  - content: En anglais, les termes "{{electromagnetic disturbance, urn:iec:std:iec:60050-161-01-05}}"
      et "{{electromagnetic interference, urn:iec:std:iec:60050-161-01-06}}" désignent
      respectivement la cause et l’effet, et ne devraient pas être utilisés l’un pour
      l’autre.
