  definition:
  - content: "système de radiodiffusion stéréophonique en modulation de fréquence
      dans lequel le signal modulant de la porteuse principale est un signal multiplex
      constitué par:\r\n– le signal stéréophonique somme préaccentué,\n\n– le signal
      résultant d'une modulation d'amplitude à porteuse supprimée par le signal stéréophonique
      différence préaccentué,\n\n– un signal pilote destiné à la restitution du signal
      stéréophonique différence à la réception"
