  - date: '1995-09-01T00:00:00+00:00'
    type: amended
  definition:
  - content: the ratio, usually expressed in decibels, between the radio-frequency
      power supplied by the transmitter of a radio link and the radio-frequency power
      supplied to the corresponding receiver in real installation, propagation and
      operational conditions
  examples: []
  id: 705-08-01
  notes:
  - content: "It is necessary to specify in each case the points at which the power
      supplied by the transmitter and the power to the receiver are determined, for
      example:\r\n- before or after the radio-frequency filters or multiplexers that
      may be employed at the sending or the receiving end,\n\n- at the input or at
      the output of the transmitting and receiving antenna feed lines."
  terms:
  - type: expression
    normative_status: preferred
    designation: total loss
