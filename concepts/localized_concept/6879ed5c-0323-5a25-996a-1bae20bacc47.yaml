  definition:
  - content: real vector being tangent to a given oriented curve at a given point,
      the magnitude of which is the absolute value of the scalar line element at the
      given point and the direction of which corresponds to the orientation of the
      curve
  examples: []
  id: 102-05-02
  notes:
  - content: A vector line element is preferably designated by stem:[e_("t") rm(d)
      s] or by stem:[rm(d) r], or sometimes by stem:[t rm(d) s], where stem:[e_("t")
      = t] is a unit vector tangential to the curve, stem:[rm(d) s] is a scalar line
      element, stem:[rm(d) r] is the differential of the position vector *stem:[r]*
      describing the curve with respect to an origin point.
  terms:
  - type: expression
    normative_status: preferred
    designation: vector line element
  - type: expression
    designation: vector path element
