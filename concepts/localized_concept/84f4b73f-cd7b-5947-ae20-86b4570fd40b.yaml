data:
  definition:
  - content: fonctionnement du matériel en conformité avec sa spécification de conception
      et dans les limites spécifiées par le fabricant
  examples: []
  id: 426-28-07
  notes:
  - content: Des défaillances (la rupture de garnitures d'étanchéité de pompe ou de
      joints d'étanchéité de brides ou des dégagements accidentels de substances,
      par exemple) qui entraînent une réparation ou un arrêt ne sont pas considérées
      comme faisant partie du fonctionnement normal.
  - content: Les dégagements mineurs de matériau inflammable peuvent faire partie
      du fonctionnement normal. Par exemple, les dégagements de substances provenant
      de joints dont l'efficacité vient du mouillage par le fluide pompé sont considérés
      comme étant des dégagements mineurs.
