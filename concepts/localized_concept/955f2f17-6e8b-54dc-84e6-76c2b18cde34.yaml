  definition:
  - content: mechanical {{device, urn:iec:std:iec:60050-151-11-20}} that controls
      the flow of fluid in a microscopic channel
  examples: []
  id: 523-04-17
  notes:
  - content: Microvalves, which are composed of such {{components, urn:iec:std:iec:60050-151-11-21}}
      as {{actuators, urn:iec:std:iec:60050-151-13-49}} and diaphragms, made of silicon,
      etc., control the flow in microscopic channels (narrower than several micrometres).
      For example, a gas flow control valve is composed of a stacked {{piezoelectric
      actuator, urn:iec:std:iec:60050-523-04-10}} and a diaphragm. To control high-viscosity
      fluids such as blood, it is necessary to enlarge the channel and increase the
      stroke of the valve drive. A mechanism using a shape-memory alloy coil and a
      bias spring has been developed experimentally for this purpose, as well as a
      mechanism that alters the channel by an electrostatic, magnetic, or piezoelectric
      actuator.
