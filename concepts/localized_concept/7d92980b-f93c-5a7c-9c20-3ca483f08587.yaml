  - content: "La différence entre deux stimuli, Δstem:[E]*, est définie par la distance
      euclidienne entre leurs points représentatifs dans l'espace stem:[U]*stem:[V]*stem:[W]*
      et calculée par l'équation:\r\n*\n\nΔ\r\nE\n\n*\n\n=\n\n&lsqb;\n\n(\n\nΔ\r\nU\n\n*\n\n)\r\n2\n\n+\n\n(\n\nΔ\r\nV\n\n*\n\n)\r\n2\n\n+\n\n(\n\nΔ\r\nW\n\n*\n\n)\r\n2\n\n&rsqb;\n\n1/2\n\n.\n\nNote
