  definition:
  - content: property of a liquid resulting from internal flow resistance opposing
      the relative movement of adjacent layers
  examples: []
  id: 212-18-03
  notes:
  - content: "In ISO 80000-4, (dynamic) viscosity stem:[η] is defined by means of
      the equation\r\nstem:[τ]~xz~ = stem:[η]stem:[dv]~x~ /stem:[dz] \r\nwhere stem:[τ]~xz~
      is the shear stress in a fluid moving with a velocity gradient dvx/dz perpendicular
      to the plane of shear."
