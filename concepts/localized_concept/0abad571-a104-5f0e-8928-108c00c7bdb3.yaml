  id: 192-01-03
  notes:
  - content: A system is considered to have a defined real or abstract boundary.
  - content: External resources (from outside the system boundary) may be required
      for the system to operate.
  - content: A system structure may be hierarchical, e.g. system, subsystem, component,
      etc.
  - content: Conditions of use and maintenance should be expressed or implied within
      the requirement.
