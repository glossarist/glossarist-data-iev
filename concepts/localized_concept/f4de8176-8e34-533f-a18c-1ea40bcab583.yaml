  definition:
  - content: a measure of the extent to which radiation can be considered to be coherent
  examples: []
  id: 731-01-14
  notes:
  - content: "The magnitude of the degree of coherence is equal to the visibility,
      V, of the fringes of a 2-beam interference experiment:\r\nstem:[\"V\" = frac(S_(\"max\")
      - S_(\"min\"))(S_(\"max\") + S_(\"min\"))]\r\nwhere stem:[S]~max~ is the irradiance
      at a maximum of the interference pattern, and stem:[S]~min~ is the irradiance
      at a minimum."
  - content: Optical radiation is considered highly coherent when the degree of coherence
      exceeds 0.88, partially coherent for values less than 0.88 and incoherent for
      values significantly less than 0.88.
  terms:
  - type: expression
    normative_status: preferred
    designation: degree of coherence
