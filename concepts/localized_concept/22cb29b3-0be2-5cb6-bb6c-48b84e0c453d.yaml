  definition:
  - content: demi-angle au sommet du cône qui contient la puissance rayonnante susceptible
      de produire des modes liés à l'entrée d'une fibre optique
  examples: []
  id: 731-03-84
  notes:
  - content: "L'angle d'admission dépend de la position sur la face d'entrée de la
      fibre si l'indice de réfraction varie radialement dans le coeur. Il est alors
      égal à: stem:[\"arcsin\" &amp;lsqb; n^(2) (r) - n_(2)^(2) &amp;rsqb;^(1 / 2)]\r\noù
      stem:[n](stem:[r]) est l'indice à la distance stem:[r] de l'axe de la fibre
      et stem:[n]~2~ l'indice minimal dans la gaine."
  - content: La puissance rayonnante extérieure au cône qui définit l'angle d'admission
      peut produire des modes de fuite.
