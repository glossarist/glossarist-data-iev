data:
  definition:
  - content: suite de niveaux de {{multiplexage numérique, urn:iec:std:iec:60050-704-20-01}}
      dans laquelle chaque niveau est caractérisé par un débit binaire déterminé et
      écoule un {{signal numérique, urn:iec:std:iec:60050-704-01-05}}  formé par un
      assemblage de signaux numériques dont les débits sont ceux d'un niveau inférieur
