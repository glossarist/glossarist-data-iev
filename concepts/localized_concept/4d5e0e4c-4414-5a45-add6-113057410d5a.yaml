  definition:
  - content: at a given point within a three-dimensional domain of quasi-infinitesimal
      volume dstem:[V], scalar quantity equal to the mass dstem:[m] within the domain
      divided by the volume dstem:[V], thus stem:[ρ] = dstem:[m]/dstem:[V]
  examples: []
  id: 113-03-07
  notes:
  - content: Mass density is an intensive quantity describing a local property of
      a substance.
  - content: The concept of mass density may also be applied to the mass stem:[m]
      in a domain D with volume stem:[V], leading to the average density stem:[rho_("av")
      = frac(m)(V) = frac(1)(V) int_("D") rho d V].
  - content: The coherent SI unit of mass density is kilogram per cubic metre, kg/m^3^.
      Other units are tonne per cubic metre, t/m^3^ (1 t/m^3^ = 1 000 kg/m^3^ = 1
      g/cm^3^), and kilogram per litre, kg/l (1 kg/l = 1 000 kg/m^3^).
