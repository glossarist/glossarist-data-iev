data:
  definition:
  - content: quotient du flux énergétique réfléchi, stem:[Φ]~r~, par le flux énergétique
      incident, stem:[Φ]~m~stem:[rho = frac(Phi_("r"))(Phi_("m"))]
  examples: []
  id: 845-24-064
  notes:
  - content: Le facteur de réflexion est également définie spectralement par rapport
      à la longueur d'onde, auquel cas "spectrale" est ajouté devant le nom de la
      grandeur.
  - content: En raison de la conservation de l'énergie, stem:[α] + stem:[ρ] + stem:[τ] =
      1 sauf lors de l'observation d'un {{rayonnement polarisé, urn:iec:std:iec:60050-845-21-017}},
      où stem:[α] est le facteur d'absorption et stem:[τ] est le facteur de transmission.
  - content: 'Le facteur de réflexion, stem:[ρ], est la somme du facteur de réflexion
      régulière, stem:[ρ]~r~, et du facteur de réflexion diffuse, stem:[ρ]~d~: stem:[ρ] =
      stem:[ρ]~r~ + stem:[ρ]~d~.'
  - content: L'unité de facteur de réflexion est un.
  - content: Cet article était numéroté 845-04-58 dans l'IEC 60050-845:1987.
