  definition:
  - content: nouvelle impression d'un {{document normatif, urn:iec:std:iec:60050-901-02-01}}
      où sont incorporées les modifications apportées à l'édition précédente
  examples: []
  id: 901-04-10
  notes:
  - content: Même si les seuls changements apportés au texte d'un document normatif
      portent sur des points consignés dans des feuilles de {{correction, urn:iec:std:iec:60050-901-04-06}}
      ou d'{{amendement, urn:iec:std:iec:60050-901-04-07}}, le nouveau texte obtenu
      constitue une nouvelle édition.
