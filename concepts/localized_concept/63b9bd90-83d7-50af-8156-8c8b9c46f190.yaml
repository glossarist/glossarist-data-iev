  definition:
  - content: phenomenon by which {{energy, urn:iec:std:iec:60050-113-03-45}} in the
      form of {{waves, urn:iec:std:iec:60050-103-10-01}} or {{particles, urn:iec:std:iec:60050-113-05-01}}
