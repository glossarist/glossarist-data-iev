  definition:
  - content: a channel that has a standardized bandwidth suitable for the transmission
      of telephone quality speech in multichannel carrier transmission, and that occupies
      one of a number of specified positions in the frequency spectrum
  examples: []
  id: 704-10-07
  notes:
  - content: An FDM telephone channel normally has a standardized bandwidth of 4 kHz,
      this being sufficient for a signal occupying a frequency band of 300-3 400 Hz,
      for outband signalling, and for the required guard bands.
  - content: Signals, other than speech signals, having appropriate specified characteristics
      may occupy the whole or a part of an FDM telephone channel.
