data:
  definition:
  - content: Mode de Protection dans lequel les parties de matériel qui sont capables
      d'enflammer une atmosphère explosive par étincelle ou échauffement sont enfermées
      dans un composé de sorte à éviter l'inflammation d'une couche ou d'un nuage
      de poussière dans des conditions de fonctionnement ou d'installation
  examples: []
  id: 426-12-11
  notes:
  - content: 'Le Mode de Protection "mD" a été remplacé par le Mode de Protection
      "m", conformément à l''IEC 60079-18, _Atmosphères explosives – Partie 18: Protection
      du matériel par encapsulage "m"_.'
  - content: Cette entrée portait le numéro 426-18-01 dans l'IEC 60050-426:2008.
