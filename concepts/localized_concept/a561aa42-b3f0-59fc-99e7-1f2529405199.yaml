  definition:
  - content: transformateur de courant destiné à transmettre un signal d'information
      à des dispositifs de protection ou de commande
  examples: []
  id: 321-02-19
  notes:
  - content: La classe de précision d'un transformateur de courant pour protection
      est désignée par son indice de classe, suivi de la lettre "P" (signifiant "Protection").
      L'indice de classe indique la limite supérieure de la valeur absolue de l'erreur
      composée, au courant limite de précision assigné prescrit pour la classe considérée,
      en pourcentage de ce courant.
