  id: 102-01-23
  notes:
  - content: 'The ratio of two quantities of the same kind is a {{quantity of dimension
      one, urn:iec:std:iec:60050-112-01-13}}. Examples: transfer ratio, signal-to-noise
      ratio, transformation ratio.'
  - content: The ratio stem:[a / b] is expressed by the words “ratio of stem:[a] to
      stem:[b]”.
  - content: 'For the ratio of two quantities, the term “index” is sometimes used
      in place of ratio. Examples: refractive index, loss index.'
