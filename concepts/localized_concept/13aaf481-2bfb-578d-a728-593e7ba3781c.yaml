  definition:
  - content: "for a network containing stem:[n] nodes and stem:[b] branches and in
      which a reference direction is chosen for each branch, matrix of type stem:[n] × stem:[b]
      where the element stem:[a]~stem:[ij]~ is:\r\n* 0 if branch j is not incident
      at node i* 1 if branch j is pointing away from node i* −1 if branch j is pointing
      towards node i"
