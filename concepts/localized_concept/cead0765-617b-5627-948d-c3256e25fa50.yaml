  notes:
  - content: Lors de l'indication de l'éclairement lumineux moyen, il est nécessaire
      de définir clairement le type d'éclairement lumineux aux points de la surface;
      c'est-à-dire horizontal, vertical, sphérique, cylindrique ou semi-cylindrique.
  - content: L'éclairement lumineux moyen est exprimé en lux (lx &equals; lm·m^−2^).
