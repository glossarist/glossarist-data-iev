  definition:
  - content: the modulus of the reciprocal of the reflection factor, generally expressed
      in decibels
  examples: []
  id: 702-07-25
  notes:
  - content: "When impedances can be defined, the return loss is given by the formula:\r\nstem:[-
      \" \" 20 \" \" \"lg\" \" \" |r| = 20 \" \" \"lg\" \" \" |frac(underline(Z) -
      underline(Z)^(prime))(underline(Z) + underline(Z)^(prime))|]\n\nwhere stem:[<u>Z</u>]
      is the characteristic impedance of a transmission line ahead of a discontinuity,
      or the impedance of a source, and stem:[<u>Z</u>]′ is the impedance after the
      discontinuity or the load impedance seen from the junction between the source
      and the load."
