  definition:
  - content: 'for a linear time-invariant system with a sinusoidal input variable
      in steady state of the output variable the ratio of the phasor of the output
      variable to the phasor of the corresponding input variable, represented as a
      function of the angular frequency stem:[ω] SEE: Figures 9 and 10.'
  examples: []
  id: 351-45-41
  notes:
  - content: The frequency response coincides with the transfer function taken on
      the imaginary axis of the complex plane.
