---
data:
  definition:
  - content: 'unité de {{quantité de données, urn:iec:std:iec:60050-171-02-09}}, correspondant
      à un {{élément binaire, urn:iec:std:iec:60050-171-02-10}}Note 1 à l’article:
      L’unité bit peut être combinée avec des préfixes SI, par exemple kilobit (kbit),
      ou avec des préfixes binaires, par exemple kibibit (Kibit). Pour des multiples
      binaires (puissances de 2), il est recommandé d’employer des préfixes binaires
      pour éviter toute ambiguïté. Note 2 à l’article: L’unité bit peut être combinée
      avec d’autres unités, par exemple bit par seconde (bit/s).'
