  definition:
  - content: qualifie un bipôle, élémentaire ou non, pour lequel les relations entre
      les grandeurs intégrales restent valables si on remplace la valeur de chaque
      grandeur par son opposé
  examples: []
  id: 131-11-20
  notes:
  - content: Un exemple de bipôle élémentaire symétrique est un élément résistif caractérisé
      par une relation fonctionnelle impaire entre la tension instantanée et le courant
      instantané.
  - content: Le terme "symétrique" a d'autres sens lorsqu'il est appliqué à un biporte
      ou à un système polyphasé.
