data:
  definition:
  - content: quotient de la somme des aires du plafond et du plan des luminaires par
      la somme de l'aire des parois délimitée par le plafond et le plan des luminaires,
      utilisé dans le calcul du facteur d'utilisation ou de l'utilance
  examples: []
  id: 845-29-073
  notes:
  - content: L'indice du plafond est donné par la formuleoù stem:[a] et stem:[b] sont
      les dimensions des côtés du local et stem:[h]~c~ la distance entre le plafond
      et le plan des luminaires.
  - content: Voir aussi "{{indice du sol, urn:iec:std:iec:60050-845-29-075}}" et "{{indice
      du local, urn:iec:std:iec:60050-845-29-071}}".
  - content: L'unité d'indice du plafond est un.
