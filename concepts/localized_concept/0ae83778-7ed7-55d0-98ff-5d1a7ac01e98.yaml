  definition:
  - content: éclairement lumineux produit par la lumière solaire directe sur une surface
      terrestre perpendiculaire à la direction d'éclairage par le Soleil
  examples: []
  id: 845-29-129
  notes:
  - content: L'éclairement lumineux solaire normal n'est pas identique à l'éclairement
      lumineux solaire direct, qui est mesuré sur une surface horizontale terrestre,
      non nécessairement perpendiculairement à la direction d'éclairage par le Soleil.
  - content: L'éclairement lumineux solaire normal est exprimé en lux (lx = lm·m^−2^).
