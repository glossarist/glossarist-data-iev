  definition:
  - content: a subscriber who has the facility of priority or absolute priority for
      all calls or for certain calls only to his terminal. This facility is activated
      by the sending of an appropriate signal by the calling terminal
  examples: []
  id: 721-18-16
  notes:
  - content: There may be several priority levels, each conferring relative or absolute
      priority with respect to lower levels.
