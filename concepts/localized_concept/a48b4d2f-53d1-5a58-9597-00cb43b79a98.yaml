  definition:
  - content: "racine carrée stem:[Z]~0~ du quotient de la constante magnétique stem:[μ]~0~
      par la constante électrique stem:[ε]~0~\r\nstem:[Z_(0) = sqrt(frac(mu_(0))(epsilon_(0)))]"
  examples: []
  id: 705-03-24
  notes:
  - content: "Dans le Système International d'unités (SI) l'impédance intrinsèque
      du vide est égale à:\r\nstem:[Z]~0~ = stem:[c]~0~ · 4π × 10^−7^ H/m\n\nstem:[c]~0~
      étant la vitesse de propagation des ondes électromagnétiques dans le vide; stem:[Z]~0~
      est approximativement égal à 120π Ω ou 377 Ω."
