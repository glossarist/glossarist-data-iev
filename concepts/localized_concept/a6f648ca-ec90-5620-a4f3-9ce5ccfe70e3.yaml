  notes:
  - content: "stem:[Y], stem:[u], stem:[v] describe the colour stimulus considered,
      and stem:[u]~n~, stem:[v]~n~ describe a specified white achromatic stimulus,
      where stem:[u = u^(prime)], stem:[v = frac(2)(3) v^(prime)]; stem:[u_(\"n\")^(=)
      u_(\"n\")^(')], stem:[v_(\"n\") = frac(2)(3) v_(\"n\")^(')].\r\nSee also \"{{CIE
      1976 uniform-chromaticity-scale diagram, urn:iec:std:iec:60050-845-23-073}}\"."
  - content: "The difference between two stimuli, Δstem:[E]*, is defined as the Euclidean
      distance between the points representing them in stem:[U]*stem:[V]*stem:[W]*
      space and calculated as:\r\n*\n\nΔ\r\nE\n\n*\n\n=\n\n&lsqb;\n\n(\n\nΔ\r\nU\n\n*\n\n)\r\n2\n\n+\n\n(\n\nΔ\r\nV\n\n*\n\n)\r\n2\n\n+\n\n(\n\nΔ\r\nW\n\n*\n\n)\r\n2\n\n&rsqb;\n\n1/2\n\n."
  - content: The CIE 1964 uniform colour space is obsolete (except that it is still
      used in the calculation of the colour rendering index). The currently recommended
      object colour spaces are the {{CIE 1976 L*a*b* colour space, urn:iec:std:iec:60050-845-23-076}}
      and the {{CIE 1976 L*u*v* colour space, urn:iec:std:iec:60050-845-23-074}}.
