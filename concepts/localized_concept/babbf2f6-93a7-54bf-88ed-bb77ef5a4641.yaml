  definition:
  - content: for a polyphase line mean value, taken over one period, of the instantaneous
      power
  examples: []
  id: 141-03-11
  notes:
  - content: For a three-phase line under symmetric and sinusoidal conditions, the
      active power is stem:[P = U I sqrt(3) " " "cos" " " phi], where stem:[U] is
      the RMS value of any line-to-line voltage, stem:[I] is the RMS value of any
      line current and stem:[ϕ]  is the displacement angle between any line-to-neutral
      voltage and the corresponding line current.
