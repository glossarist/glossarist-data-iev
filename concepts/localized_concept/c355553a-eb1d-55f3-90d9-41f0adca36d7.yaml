  definition:
  - content: for a square matrix *stem:[A]* of order stem:[n] with the real or complex
      elements stem:[A~ij~], non-negative number  stem:[normAnorm = sqrt(rm(tr) (
      A A^(rm(H)) )) = sqrt(sum_(i , j = 1)^(n) |A_(i j)|^(2))]
  examples: []
  id: 102-06-22
  notes:
  - content: The described norm is the "Euclidean norm" or the "Hermitian norm" for
      the real and the complex case, respectively. Several other norms of a matrix
      can be defined. Any norm of a matrix has properties similar to the properties
      of the magnitude of a vector (see Note 1 to entry in {{IEV 102-03-23, urn:iec:std:iec:60050-102-03-23}}).
