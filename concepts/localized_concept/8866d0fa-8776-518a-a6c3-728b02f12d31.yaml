  definition:
  - content: rapport du nombre d'événements élémentaires dénombrables à la sortie
      et à l'entrée d'un dispositif quantique
  examples: []
  id: 731-06-34
  notes:
  - content: Pour une source optique semiconductrice, le rendement quantique est le
      rapport du nombre de photons émis au nombre d'électrons dans le courant appliqué.
  - content: Pour un photodétecteur, le rendement quantique est le rapport du nombre
      d'électrons dans le courant photoélectrique au nombre de photons dans le rayonnement
      incident.
