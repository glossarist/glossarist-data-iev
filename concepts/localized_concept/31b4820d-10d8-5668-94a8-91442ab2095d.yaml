  definition:
  - content: |-
      élément de circuit à deux paires de bornes et à paramètres répartis selon une dimension, caractérisé par une inductance linéique stem:[l], une capacité linéique stem:[c], une résistance linéique stem:[r] et une conductance linéique stem:[g], qui peuvent toutes être fonction de la même coordonnée spatiale stem:[x], et où la tension stem:[u](stem:[x, t]) et le courant stem:[i](stem:[x, t]), où stem:[t] est le temps, sont liés par les équations aux dérivées partielles:stem:[- frac(del u ( x , t ))(del x) = r i + l frac(del i ( x , t ))(del t)]

      stem:[- frac(del i ( x , t ))(del x) = g u + c frac(del u ( x , t ))(del t)]
