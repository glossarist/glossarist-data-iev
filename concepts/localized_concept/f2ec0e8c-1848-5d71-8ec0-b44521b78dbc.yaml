data:
  definition:
  - content: "entité qui peut, dans des conditions données après une défaillance,
      être remise dans un état lui permettant de fonctionner tel que requis\r\nNote
      1 à l’article: Les «conditions données» peuvent inclure des considérations techniques,
      économiques et autres. Note 2 à l’article: Une entité réparable dans certaines
      conditions données peut être non réparable dans d’autres conditions."
