  definition:
  - content: energy of electromagnetic waves weighted by the {{spectral luminous efficiency,
      urn:iec:std:iec:60050-845-21-035}} multiplied by maximum luminous efficacy of
      a specified photometric condition
  examples: []
  id: 845-21-037
  notes:
  - content: Luminous energy for photopic vision is expressed bystem:[Q_("v") = K_("m")
      int_(0)^(oo) Q_("e" "," lambda) ( lambda ) " " V ( lambda ) " " "d" lambda]where
      stem:[Q]~e,stem:[λ]~(stem:[λ]) is the spectral radiant energy at wavelength
      stem:[λ], stem:[V](stem:[λ]) is spectral luminous efficiency, and stem:[K]~m~
      is maximum luminous efficacy.
  - content: The term "quantity of light" is no longer used.
  - content: Luminous energy can be emitted, transferred or received.
  - content: "Luminous energy can be expressed by the time integral of the luminous
      flux, stem:[Φ]~v~, over a given duration, Δstem:[t]:\r\nstem:[Q_(\"v\") = int_(Delta
      t) Phi_(\"v\") \" \" \"d\" t]"
  - content: The corresponding radiometric quantity is "radiant energy". The corresponding
      quantity for photons is "photon energy".
  - content: The luminous energy is expressed in lumen second (lm&middot;s) or lumen
      hour (lm&middot;h).
  - content: This entry was numbered 845-01-28 in IEC 60050-845:1987.
