---
data:
  definition:
  - content: grandeur intervenant dans l'observation visuelle d'une source de lumière,
      lorsqu'un observateur la regarde directement d'une distance assez grande pour
      qu'elle n'ait pas de diamètre apparent appréciable
  examples: []
  id: 845-21-096
  notes:
  - content: L'éclat apparent se mesure par l'éclairement que produit la source sur
      un plan passant par la pupille de l'observateur et perpendiculaire à la direction
      de la source.
  - content: L'éclat apparent est exprimé en lux (lx = lm·m^−2^).
  - content: Cet article était numéroté 845-01-59 dans l'IEC 60050-845:1987.
