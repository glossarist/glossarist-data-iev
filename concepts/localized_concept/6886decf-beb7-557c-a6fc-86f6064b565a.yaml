  definition:
  - content: pour une particule, masse de celle-ci dans un référentiel inertiel où
      elle a une vitesse nulle
  examples: []
  id: 113-03-04
  notes:
  - content: Lorsque la vitesse de la particule est négligeable par rapport à la vitesse
      de la lumière, la différence entre masse et masse au repos est aussi négligeable.
  - content: La masse au repos de la particule X est notée stem:[m ( "X)"] ou stem:[m]~X~;
      par exemple stem:[m]~e~ est la masse de l’électron.
