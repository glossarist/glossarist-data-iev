  definition:
  - content: "the quotient of dstem:[D] by dstem:[t], where dstem:[D] is the increment
      of absorbed dose in time interval dstem:[D]\r\nstem:[overset(˙)(D) = frac(\"d\"
      D)(\"d\" t)]"
  examples: []
  id: 881-12-07
  notes:
  - content: "The SI unit of absorbed dose rate is joule per kilogram and second,
      whose special name is gray per second. The earlier special unit of absorbed
      dose rate, still in temporary\r\nuse, was the rad per second.\r\n1 Gy • s =
      100 rad • s^−1^ = 1 J kg ^−1^ • s^−1^"
