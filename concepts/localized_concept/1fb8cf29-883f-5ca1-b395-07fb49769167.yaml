  definition:
  - content: open-loop control with stepwise control actions in which the transition
      from one step to the following is determined by a program in accordance with
      specified transition conditions
  examples: []
  id: 351-47-59
  notes:
  - content: The steps of the sequential control correspond to the consecutive discrete
      operating conditions of the technical process, for example several final controlled
      variables or several reference variables.
