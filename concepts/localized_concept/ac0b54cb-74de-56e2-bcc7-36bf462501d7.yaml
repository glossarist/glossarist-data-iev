---
data:
  definition:
  - content: quantité dont il faudrait, à une {{fréquence, urn:iec:std:iec:60050-103-06-02}}
      donnée, augmenter la {{température de bruit, urn:iec:std:iec:60050-702-08-54}}
      d'un {{monoporte, urn:iec:std:iec:60050-131-12-64}} connecté à l'entrée d'un
      {{biporte, urn:iec:std:iec:60050-131-12-65}} linéaire donné, si le bruit produit
      par ce biporte était momentanément supprimé, afin que la {{densité spectrale
      de puissance, urn:iec:std:iec:60050-702-04-50}} de bruit à la fréquence de sortie
      correspondant à la fréquence d'entrée soit la même que celle du bruit total
      du monoporte et du biporte donné
  examples: []
  id: 702-08-56
  notes:
  - content: Cette définition suppose que les effets quantiques sont négligeables.
  - content: La température équivalente de bruit d'un biporte dépend de l'impédance
      du monoporte connecté à l'entrée.
