  definition:
  - content: measure of the degree to which the psychophysical colour of an object
      illuminated by the test illuminant conforms to that of the same object illuminated
      by the reference illuminant, suitable allowance having been made for the state
      of chromatic adaptation
  examples: []
  id: 845-22-109
