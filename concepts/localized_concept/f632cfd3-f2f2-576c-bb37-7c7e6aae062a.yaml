  definition:
  - content: function representing the relative spectral effectiveness of {{optical
      radiation, urn:iec:std:iec:60050-845-21-002}}, for a specified biological effect,
      in a specified system
  examples: []
  id: 845-26-027
  notes:
  - content: The normalized action spectrum is the wavelength dependence of the inverse
      of the dose of {{monochromatic radiation, urn:iec:std:iec:60050-845-21-014}}
      required to induce a certain (biologic) response; the action spectrum is commonly
      normalized to a value of 1 at the wavelength of "maximum action", i.e. where
      the smallest dose suffices to induce the required effect.
  - content: This entry was numbered 845-06-14 in IEC 60050-845:1987.
