  definition:
  - content: "the quotient of dstem:[E]~tr~/stem:[E]~stem:[N]~ by stem:[ρ] dstem:[l],
      where stem:[E]~stem:[N]~ is the energy of each particle (excluding rest energy),
      stem:[N] is the number of particles, and dstem:[E]~tr~/stem:[E]~stem:[N]~ is
      the fraction of incident particle energy that is transferred to kinetic energy
      of charged particles by interactions in traversing a distance dstem:[l] in the
      material of density stem:[ρ]\r\nstem:[frac(mu_(\"tr\"))(rho) = frac(1)(E_(N)
      rho) * frac(\"d\" E_(\"tr\"))(\"d\" l)]"
  examples: []
  id: 881-04-32
  notes:
  - content: "For a given monoenergetic radiation, the relationship between kerma
      (stem:[K]) and energy fluence (stem:[Ψ]) may be written\r\nstem:[K = Psi frac(mu_(tr))(rho)]"
