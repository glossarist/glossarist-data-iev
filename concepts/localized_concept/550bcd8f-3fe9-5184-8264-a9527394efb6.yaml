  definition:
  - content: simultaneous line sequential colour television system using, in baseband,
      a composite colour signal comprising a luminance signal and two chrominance
      components each of which is transmitted sequentially, as frequency modulation
      of a separate subcarrier. The receiver is provided with a line period delay
      line to permit the simultaneous display of the three colour components
  examples: []
  id: 723-08-11
  notes:
  - content: In most applications of SECAM, the scanning system uses 625 lines and
      50 fields/second. The colour signal is transmitted using vestigial sideband
      amplitude modulation, and the sound is transmitted as amplitude or frequency
      modulation of a separate radio-frequency carrier.
  - content: SECAМ is derived from "Sequential Couleur à Мémоire".
  - content: There are different versions of SECAM defined in CCIR Report 624.
