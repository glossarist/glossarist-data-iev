  definition:
  - content: quantité numériquement égale à la plus petite fréquence de modulation
      pour laquelle le module de la fonction de transfert en bande de base devient
      égal à une fraction spécifiée, généralement la moitié, de sa valeur à la fréquence
      zéro
  examples: []
  id: 731-01-52
  notes:
  - content: La largeur de bande est principalement limitée dans les fibres multimodales
      par la distorsion modale et la dispersion du matériau, dans les fibres unimodales
      par la dispersion du matériau et la dispersion de guidage.
