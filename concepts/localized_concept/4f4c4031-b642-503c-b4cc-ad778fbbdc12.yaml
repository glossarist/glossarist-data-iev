  definition:
  - content: ensemble des opérations utilisées pour vérifier si les indications, dans
      des conditions spécifiées, correspondent à un ensemble donné de mesurandes connus,
      à l’intérieur des limites du diagramme d’étalonnage prédéterminé
  examples: []
  id: 311-01-13
  notes:
  - content: Ce terme est utilisé dans l’approche "incertitude".
  - content: L’incertitude connue du mesurande utilisé pour la vérification est généralement
      négligeable par rapport à l’incertitude assignée à l’appareil dans le diagramme
      d’étalonnage.
