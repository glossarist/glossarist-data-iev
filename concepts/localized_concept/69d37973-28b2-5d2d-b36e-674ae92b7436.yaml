  definition:
  - content: facteur d'absorption acoustique attribué à une surface et relié à la
      durée de réverbération par la formule d'Eyring
  examples: []
  id: 801-31-09
  notes:
  - content: "La formule d'Eyring s'écrit:\r\nstem:[T = frac((24 \" \" \"ln\" \" \"
      10) \" \" V)(- c S \" \" \" \" \"ln\" \" \" (1 - bar(alpha)))]\r\noù:\n\nstem:[T]
      est la durée de réverbération\n\nstem:[V] est le volume de la salle\n\nstem:[c]
      est la célérité du son dans l'air contenu dans la salle\n\nstem:[S] = Σ stem:[S]~stem:[i]~
      est l'aire totale des surfaces de la salle\n\nstem:[bar(alpha) = \"Sigma\" S_(i)
      alpha_(i) / S] est le facteur d'Eyring moyen pour toutes les surfaces\n\nstem:[S]~stem:[i]~
      est l'aire de la surface de rang stem:[i]\n\nstem:[α]~stem:[i]~ est le facteur
      d'absorption acoustique (d'Eyring) attribué à la surface de rang stem:[i]. L'aire
      d'absorption équivalente de la surface de rang stem:[i] est stem:[S]~stem:[i]~stem:[α]~stem:[i]~."
