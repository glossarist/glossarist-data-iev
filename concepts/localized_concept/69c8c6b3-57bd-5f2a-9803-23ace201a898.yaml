  id: 221-01-20
  notes:
  - content: La valeur numérique indiquée est celle adoptée par l'Union internationale
      de physique pure et appliquée (UIPPA).
  - content: Le moment magnétique d'un électron libre résultant de son spin est approximativement
      égal à 1,001 stem:[µ]~B~.
