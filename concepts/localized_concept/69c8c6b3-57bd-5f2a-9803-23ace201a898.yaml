  definition:
  - content: "constante physique servant à exprimer le moment magnétique d'un électron\r\nstem:[e
      h]/4stem:[ π m] ≈ (9,274 078 ± 0,000 036) x 10^−24^ Am^2^\r\noù stem:[e] est
      la charge électrique élémentaire, stem:[h] la constante de Planck et stem:[m]
      la masse au repos de l'électron"
