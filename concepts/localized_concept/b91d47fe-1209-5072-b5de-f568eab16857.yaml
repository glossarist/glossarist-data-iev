  definition:
  - content: débit de l’énergie acoustique dans le sens de propagation par unité d’aire
      perpendiculaire au sens de propagation
  examples: []
  id: 802-01-10
  notes:
  - content: "L’intensité instantanée est le produit de la pression acoustique instantanée
      et de la vitesse acoustique instantanée des particules. Il est difficile de
      mesurer l’intensité dans la plage de fréquences ultrasoniques. À des fins de
      mesure et s’il est raisonnable de prendre pour hypothèse que la pression acoustique
      instantanée et la vitesse instantanée des particules sont substantiellement
      en phase le long de l’axe (d’alignement) du faisceau pour une fréquence donnée,
      alors l’intensité instantanée, [stem:[I(t)]], est approchée comme suit\r\nstem:[p(t)]^2^/stem:[ρc]\r\noù\r\nstem:[p(t)]
      est la pression acoustique instantanée;\r\nstem:[ρ]  est la densité du milieu;\r\nstem:[c]
      \ est la vitesse du son dans le milieu."
