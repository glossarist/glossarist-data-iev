  definition:
  - content: property of a system which implies that its state variables return to
      the original steady state after an initial displacement
  examples: []
  id: 351-42-21
  notes:
  - content: This is equally the case, when the state variables are displaced from
      a steady state by a disturbance of the input variable and the disturbance has
      ceased.
