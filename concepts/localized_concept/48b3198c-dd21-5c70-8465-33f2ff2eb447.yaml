  definition:
  - content: "{{standard, urn:iec:std:iec:60050-901-02-02}} that is aligned with another
      standard so that products, processes, services, {{tests, urn:iec:std:iec:60050-902-03-02}}
      and information provided according to the former standard meet the {{requirement,
      urn:iec:std:iec:60050-901-05-05}}s of the latter standard but not vice versa"
  examples: []
  id: 901-06-08
  notes:
  - content: A unilaterally aligned standard is not harmonized (or equivalent) with
      the standard with which it is aligned.
  - content: "{{Technical regulations, urn:iec:std:iec:60050-901-02-11}} can be harmonized
      like standards. Corresponding terms and definitions are obtained by replacing
      “standards” by “technical regulations” in the definitions {{IEV 901-06-01, urn:iec:std:iec:60050-901-06-01}}
      to {{IEV 901-06-09, urn:iec:std:iec:60050-901-06-09}}, and “standardizing bodies”
      by “authorities” in definition {{IEV 901-06-01, urn:iec:std:iec:60050-901-06-01}}."
