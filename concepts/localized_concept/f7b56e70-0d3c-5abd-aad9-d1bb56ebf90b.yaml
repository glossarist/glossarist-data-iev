  definition:
  - content: caractéristique représentant l'amplitude de la composante fondamentale
      du signal de sortie d'un biporte en fonction de la fréquence d'un signal d'entrée
      sinusoïdal d'amplitude spécifiée indépendante de la fréquence
  examples: []
  id: 702-07-35
  notes:
  - content: Dans le cas d'un biporte linéaire invariable dans le temps, la caractéristique
      amplitude-fréquence est représentée par le module de la fonction de transfert
      isochrone.
  - content: La fréquence de la composante fondamentale du signal de sortie peut différer
      de la fréquence du signal d'entrée.
