  - content: 'entité pris en considération, défini selon sa fonction ou son effetNote
      1 à l’article: Une unité fonctionnelle produit un effet interactif entre les
      variables d''entrée et les variables de sortie.Note 2 à l’article: Une unité
      fonctionnelle peut être mise en application par une ou plusieurs unités physiques
      ou modules de programme.Note 3 à l’article: Si des termes composés sont utilisés
      pour désigner des unités fonctionnelles, il convient d''utiliser les termes
      suivants comme premier terme (dans l''ordre d''importance croissant),* élément,*  système.'
