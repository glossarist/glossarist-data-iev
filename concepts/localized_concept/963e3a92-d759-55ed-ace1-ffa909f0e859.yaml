  definition:
  - content: electromagnetic radiation in which the electric field vector rotates
      at the radiation frequency, but varies in magnitude at a rate equal to twice
      the radiation frequency with the terminal point of the electric field vector
      describing an ellipse
  examples: []
  id: 845-21-019
  notes:
  - content: Elliptically polarized radiation is described as right-handed (or left-handed)
      if the rotation of the electric field vector is clockwise (or anticlockwise)
      as viewed by an observer receiving the radiation.
  terms:
  - type: expression
    normative_status: preferred
    designation: elliptically polarized radiation
