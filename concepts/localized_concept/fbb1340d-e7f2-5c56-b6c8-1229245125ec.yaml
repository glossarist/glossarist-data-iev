  definition:
  - content: grandeur d'un sous-ensemble choisi par convention dans un système de
      grandeurs donné de façon à ce qu'aucune grandeur du sous-ensemble ne puisse
      être exprimée en fonction des autres
  examples: []
  id: 112-01-08
  notes:
  - content: Le sous-ensemble mentionné dans la définition est appelé l'ensemble des
      grandeurs de base. Le Système international de grandeurs (ISQ) est défini par
      un ensemble de sept grandeurs de base.
  - content: Les grandeurs de base sont considérées comme mutuellement indépendantes
      puisqu'une grandeur de base ne peut être exprimée par un produit de puissances
      des autres grandeurs de base.
  - content: On peut considérer la grandeur « nombre d'entités » comme une grandeur
      de base dans tout système de grandeurs.
