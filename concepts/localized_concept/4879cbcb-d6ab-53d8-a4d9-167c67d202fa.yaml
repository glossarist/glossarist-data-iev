  definition:
  - content: event wherein all loads in one or more parts of the control area are
      shed, and further generation tripping and system divisions can occur
  examples: []
  id: 692-01-17
  notes:
  - content: The causes of such an event can include component failures, system instability,
      severe {{system disturbance, urn:iec:std:iec:60050-692-01-10}}, cascading component
      outages, system voltage collapse, and combinations thereof.
  - content: System collapse can be the cause of system {{blackout, urn:iec:std:iec:60050-692-01-18}}.
