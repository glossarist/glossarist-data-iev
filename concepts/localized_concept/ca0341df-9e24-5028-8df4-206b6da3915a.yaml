  definition:
  - content: quotient of the {{luminance, urn:iec:std:iec:60050-845-21-050}} at a
      surface element of a medium in a given direction and the {{illuminance, urn:iec:std:iec:60050-845-21-060}}
      on the mediumstem:[q_("v") = frac(L_("v"))(E_("v"))]where stem:[L]~v~ is luminance
      and stem:[E]~v~ is illuminance
  examples: []
  id: 845-24-079
  notes:
  - content: The bi-directional reflectance distribution function (BRDF) is similar
      to the luminance coefficient except that it is defined for directional incident
      radiation.
  - content: The luminance coefficient is expressed in steradian to the power minus
      one (sr^−1^).
  - content: This entry was numbered 845-04-71 in IEC 60050-845:1987.
