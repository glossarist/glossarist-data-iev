data:
  definition:
  - content: "série de coefficients complexes obtenus par décomposition en série de
      Fourier de l'aimantation en alternatif stem:[M(t)]Note 1 à l’article: L'aimantation
      en alternatif, stem:[M(t),] en présence d'un champ magnétique stem:[h_(0) cosomega
      t] se développe comme suit:\r\nstem:[M ( t ) = h_(0) sum_(n = 0)^(oo) &amp;lsqb;
      kappa_(n)^(prime) cosn omega t ) + kappa_(n)^(dprime) sinn omega t ) &amp;rsqb;]\r\noù
      stem:[kappa_(n)^(prime)] et stem:[kappa_(n)^(dprime)] sont les parties réelle
      et imaginaire de la susceptibilité magnétique alternative pour le rang stem:[n].
      Note 2 à l’article: Les composantes fondamentales stem:[kappa_(1)^(prime)] et
      stem:[kappa_(1)^(dprime)] sont surtout utilisées pour les mesures de transition
      supraconductrice. Note 3 à l’article: La densité de puissance des pertes en
      courant alternatif stem:[W] est donnée par:\r\nstem:[W = rm(pi) mu_(0) h_(0)^(2)
      kappa_(1)^(dprime)]"
