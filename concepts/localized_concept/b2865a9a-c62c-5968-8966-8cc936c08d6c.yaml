  definition:
  - content: in an optical fibre, a mode whose field decays monotonically in the transverse
      direction everywhere external to the core and which does not lose power to radiation
  examples: []
  id: 731-03-53
  notes:
  - content: "Where the refractive index decreases with distance from the axis and
      where there is no central refractive index dip a bound mode is one for which
      :\r\nstem:[n](stem:[a])stem:[k] ≤ stem:[β] ≤ stem:[n](0)stem:[k]\r\nwhere stem:[β]
      is the imaginary part (phase coefficient) of the axial propagation coefficient,\n\nstem:[n](stem:[a])
      is the refractive index at stem:[r] = stem:[a], the radius,\n\nstem:[n](0) is
      the refractive index at stem:[r] = 0,\n\nstem:[k] is the angular free space
      wavenumber 2 π/λ and λ is the wavelength."
  - content: Bound modes correspond to guided light rays in the terminology of geometric
      optics.
  - content: In a multimode fibre, the power in bound modes is predominantly contained
      in the core of the fibre.
  terms:
