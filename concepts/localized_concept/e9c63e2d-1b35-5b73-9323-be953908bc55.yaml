  definition:
  - content: mean value of the {{transinformation content, urn:iec:std:iec:60050-171-07-26}}
      stem:[T](stem:[x~i~],stem:[x~j~]) of two events stem:[x~i~] and stem:[y~j~],
      each in one of two finite sets of mutually exclusive and jointly exhaustive
      events stem:[T (X , Y) = sum_(i = 1)^(n) sum_(j = 1)^(m) p ( x_(i) , y_(j) )
      * T ( x_(i) , y_(j) )] where stem:[X] &amp;equals; {stem:[x]~1~, …, stem:[x]~stem:[n]~}
      is the set of events stem:[x~i~] (stem:[i] &amp;equals; 1, …, stem:[n]), stem:[Y]
      &amp;equals; {stem:[y]~1~, …, stem:[y]~stem:[m]~} is the set of events stem:[y~j~]
      (stem:[j] &amp;equals; 1, …, stem:[m]) and stem:[p](stem:[x~i~],stem:[y~j~])
      the joint probability that both events occur
  examples: []
  id: 171-07-27
  notes:
  - content: 'The mean transinformation content is symmetric in stem:[X] and stem:[Y].
      It is also equal to the difference between the {{entropy, urn:iec:std:iec:60050-171-07-15}}
      of one of the two sets of events and the {{conditional entropy, urn:iec:std:iec:60050-171-07-23}}
      of this set relative to the other: stem:[T (X | Y) = H ( X ) - H ( X | Y ) =
      H ( Y ) - H ( Y | X ) = T ( X | Y )].'
  - content: The mean transinformation content is a quantitative measure of information
      transmitted through a channel, when stem:[X] is a specific set of messages at
      the message source and stem:[Y] is a specific set of messages at the message
      sink. It is equal to the difference between the entropy at the message source
      and the {{equivocation, urn:iec:std:iec:60050-171-07-24}}, or the difference
      between the entropy at the message sink and the {{irrelevance, urn:iec:std:iec:60050-171-07-25}}.
