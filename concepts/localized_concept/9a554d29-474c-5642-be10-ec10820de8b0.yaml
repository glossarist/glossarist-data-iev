data:
  definition:
  - content: en tout point d'un domaine déterminé de l'espace, scalaire stem:[φ] dont
      l'opposé du gradient est le vecteur *stem:[U]* d'un champ donné*stem:[U]* =
      −*grad* stem:[φ]
  examples: []
  id: 102-05-24
  notes:
  - content: Le champ vectoriel *stem:[U]* est un {{champ conservatif, urn:iec:std:iec:60050-102-05-34}}
      et on dit qu’il dérive du potentiel scalaire stem:[φ].
  - content: Le potentiel scalaire n'est pas unique puisqu'un scalaire constant quelconque
      peut être ajouté à un potentiel scalaire donné sans changer son gradient.
  - content: Des exemples de potentiel sont le {{potentiel électrique, urn:iec:std:iec:60050-121-11-25}}
      et le potentiel en mécanique (voir {{IEV 113-03-19, urn:iec:std:iec:60050-113-03-19}}).
  - content: Le terme «potentiel scalaire» n'est employé à la place du terme «potentiel»
      que pour le distinguer du terme «potentiel vecteur».
