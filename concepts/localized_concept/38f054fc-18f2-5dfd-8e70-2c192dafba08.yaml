  definition:
  - content: quantity, in a system of quantities, defined in terms of the base quantities
      of that system
  examples: []
  id: 112-01-10
  notes:
  - content: For example, in a system of quantities having the base quantities length
      and mass, mass density is a derived quantity defined as the quotient of mass
      by volume (length to the third power).
