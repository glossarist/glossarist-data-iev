  definition:
  - content: maximum level of exposure of a surface, usually the eye or skin, that
      is not expected to result in adverse biological effects
  examples: []
  id: 845-26-072
  notes:
  - content: Exposure limits for human safety of {{optical radiation, urn:iec:std:iec:60050-845-21-002}},
      stem:[H]~L~, are normally recommended by the International Commission on Non-Ionizing
      Radiation Protection (ICNIRP).
  - content: Exposure limits are often based on irradiance (e.g. for the skin), but
      where relevant, can also be based on radiance (e.g. the blue light hazard of
      extended sources).
