  definition:
  - content: attribut d'une perception visuelle selon lequel une surface paraît présenter
      une couleur perçue plus ou moins chromatique
  examples: []
  id: 845-22-072
  notes:
  - content: Pour un stimulus de couleur d'une chromaticité donnée et, dans le cas
      de couleurs non isolées, d'un facteur de luminance donné, le niveau de coloration
      augmente habituellement lorsque la luminance est accrue, sauf si la luminosité
      est très élevée.
