  definition:
  - content: "{{standard, urn:iec:std:iec:60050-901-02-02}}s on the same products,
      processes or services, approved by different {{standardizing bodies, urn:iec:std:iec:60050-901-03-03}},
      in which different {{requirement, urn:iec:std:iec:60050-901-05-05}}s are based
      on the same characteristics and assessed by the same methods, thus permitting
      unambiguous comparison of differences in the requirements"
  examples: []
  id: 901-06-09
  notes:
  - content: Comparable standards are not {{harmonized (or equivalent) standards,
      urn:iec:std:iec:60050-901-06-01}}.
  - content: "{{Technical regulations, urn:iec:std:iec:60050-901-02-11}} can be harmonized
      like standards. Corresponding terms and definitions are obtained by replacing
      “standards” by “technical regulations” in the definitions {{IEV 901-06-01, urn:iec:std:iec:60050-901-06-01}}
      to {{IEV 901-06-09, urn:iec:std:iec:60050-901-06-09}}, and “standardizing bodies”
      by “authorities” in definition {{IEV 901-06-01, urn:iec:std:iec:60050-901-06-01}}."
