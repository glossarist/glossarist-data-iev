  definition:
  - content: law relating the illuminance, stem:[E]~v~, produced on a surface (which
      is normal to the direction of the light source and sufficiently distant for
      the light source to be considered as a {{point source, urn:iec:std:iec:60050-845-21-033}})
      by a light source to the luminous intensity, stem:[I]~v~, of the light source
      in the direction of the surface, to the distance, stem:[d], between the surface
      and the light source, and to the atmospheric transmissivity, stem:[T], which
      is assumed to be uniformstem:[E_("v") = frac(I_("v"))(d^(2)) T^(d / d_(0))]where
      stem:[d]~0~ is the length specified in the definition of stem:[T]
  examples: []
  id: 845-31-025
  notes:
  - content: The formula in the definition is sometimes written:stem:[E_("v") = frac(I_("v"))(d^(2))
      T^(delta)]where the exponent, stem:[δ], in stem:[T^δ^] is the numerical value
      of the distance, stem:[d], measured with stem:[d]~0~ as "unit".
  - content: Taking into account the relationship between atmospheric transmissivity,
      stem:[T], and {{meteorological optical range, urn:iec:std:iec:60050-845-31-018}},
      stem:[v], given in Note 2 to entry of the definition of "meteorological optical
      range", Allard's law can also be written as:stem:[E_("v") = frac(I_("v"))(d^(2))
      " " ( 0,05^(d / v) )].
  - content: This entry was numbered 845-11-27 in IEC 60050-845:1987.
  terms:
