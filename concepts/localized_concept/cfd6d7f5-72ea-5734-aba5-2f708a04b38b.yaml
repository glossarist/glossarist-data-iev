  definition:
  - content: "one-dimensionally distributed two-terminal-pair circuit element characterized
      by lineic inductance stem:[l], lineic capacitance stem:[c], lineic resistance
      stem:[r] and lineic conductance stem:[g] which may all be functions of the same
      space coordinate stem:[x], where the voltage stem:[u](stem:[x, t]) and the electric
      current stem:[i](stem:[x, t]), where stem:[t] is the time, are related by the
      partial differential equations:\r\nstem:[- frac(del u ( x , t ))(del x) = r
      i + l frac(del i ( x , t ))(del t)]stem:[- frac(del i ( x , t ))(del x) = g
      u + c frac(del u ( x , t ))(del t)]"
  examples: []
  id: 131-12-86
  notes:
  - content: For the qualifier "lineic", see IEC 60050-111.
