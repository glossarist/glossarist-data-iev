  definition:
  - content: function representing the relative spectral sensitivity of the human
      eye to blue light hazards, based upon the relative spectral effectiveness of
      {{optical radiation, urn:iec:std:iec:60050-845-21-002}} to induce retinal photochemical
      injury (e.g. photic maculopathy)
  examples: []
  id: 845-26-060
  notes:
  - content: The wavelength range for the blue light hazard spectral weighting function
      is specified in ICNIRP-recommendations as stem:[λ] = 300 nm to stem:[λ] = 700 nm.
  - content: The blue light hazard spectral weighting function has unit one.
