  definition:
  - content: macrostate which does not change spontaneously with time and is stable
      against small perturbations
  examples: []
  id: 113-04-07
  notes:
  - content: Equilibrium state is achieved by an isolated system after sufficiently
      long time, depending on the considered process.
  - content: The equilibrium state is the macrostate having the highest number of
      different microstates among all macrostates of an isolated system.
  - content: Fluctuations exist even in the equilibrium state, but they are not considered
      in this concept.
