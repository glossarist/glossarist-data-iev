  definition:
  - content: tarif pour l'application duquel la consommation d'une période déterminée
      est répartie en tranches successives d'importance fixée auxquelles s'appliquent
      des prix de kilowattheures différents
  examples: []
  id: 691-05-11
  notes:
  - content: "L'importance des tranches peut être:\r\n- soit uniforme (x), par exemple:\n\nles
      50 premiers kWh mensuels à un prix stem:[p]~1~,\n\nles 50 kWh mensuels suivants
      à un prix stem:[p]~2~,\n\nle reste de la consommation mensuelle à un prix stem:[p]~3~,
      - soit variable (xx) selon l'importance du local alimenté (nombre de pièces,
      superficie, etc.), par exemple:\n\npour un local de 1 pièce:\n\nles 200 premiers
      kWh annuels à un prix stem:[p]~1~,\n\nle reste de la consommation annuelle à
      un prix stem:[p]~2~,\n\npour un local de 2 pièces:\n\nles 300 premiers kWh annuels
      à un prix stem:[p]~1~,\n\nle reste de la consommation annuelle à un prix stem:[p]~2~,\n\npour
      un local de 3 pièces: etc. - soit variable selon la puissance ou d'autres paramètres,
      par exemple:\n\n100 kWh par kVA de puissance souscrite et par mois à un prix
      stem:[p]~1~,\n\nle reste de la consommation mensuelle à un prix stem:[p]~2~.
      L'importance des tranches et les prix du kilowattheure peuvent, dans certains
      cas, varier selon les époques de l'année (par exemple: hiver, été)."
