  definition:
  - content: "supply system intended to maintain the operation of essential electrical
      installation and equipment:\r\n– for the health and safety of persons and livestock,
      and/or\n\n– if required by national regulations, to avoid damage to the environment
      and to other equipment"
  examples: []
  id: 826-10-04
  notes:
  - content: The supply system includes the source and the electric circuits up to
      the terminals of electric equipment. In certain cases it may also include the
      equipment.
