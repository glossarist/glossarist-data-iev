  definition:
  - content: lighting design technique where the light falls on objects from a direction
      opposite to that of the traffic
  examples: []
  id: 845-31-096
  notes:
  - content: Counter-beam lighting is characterized by using luminaires that show
      a luminous intensity distribution that is asymmetric in relation to the plane
      normal to the direction of the traffic, where the maximum luminous intensity
      is aimed against the direction of the traffic. The term refers only to the direction
      of normal travel.
  - content: See also "{{pro-beam lighting, urn:iec:std:iec:60050-845-31-095}}", "{{symmetric
      lighting, urn:iec:std:iec:60050-845-31-097}}".
  - content: This note applies to the French language only.
  terms:
  - type: expression
    normative_status: preferred
    designation: counter-beam lighting
    usage_info: in a road tunnel
