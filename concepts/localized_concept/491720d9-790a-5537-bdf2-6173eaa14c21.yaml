  definition:
  - content: sinusoidal component of the Fourier series of a periodic quantity having
      the frequency to which all other components are referred and which is not the
      fundamental component
  examples: []
  id: 551-20-02
  notes:
  - content: If it is clearly stated in a context that the reference fundamental component
      is used, the word “reference” may be omitted, but this standard does not recommend
      such practice.
  - content: For practical analysis, an approximation of the periodicity may be necessary.
  - content: In power electronics often the component having the frequency of the
      AC supply system or of the converter output quantities is chosen as reference
      fundamental component.
