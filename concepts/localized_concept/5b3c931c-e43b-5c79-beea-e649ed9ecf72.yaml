  definition:
  - content: scattering of radiation by material through angles greater than 90° with
      respect to its initial direction
  examples: []
  id: 881-03-20
  notes:
  - content: In radiotherapy, it is particularly applied to radiation scattered back
      to the skin from underlying tissues. In measurements of radioactivity, it applies
      to the scattering of particles into the measuring device by the material on
      which the sample is mounted.
