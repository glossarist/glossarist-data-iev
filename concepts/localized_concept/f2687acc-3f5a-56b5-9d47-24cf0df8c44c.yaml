---
data:
  definition:
  - content: "méthode de mesure optique dans laquelle l'échantillon est irradié successivement
      par des rayonnements lumineux monochromatiques de différentes longueurs d'onde;
      l'épaisseur des couches et leur {{ indice de réfraction, urn:iec:std:iec:60050-845-04-101}}
      peuvent être obtenus simultanément à partir de la réflexion polarisée\r\nNote
      1 à l’article: Un rayonnement lumineux monochromatique provenant d'un spectroscope
      est polarisé linéairement sous un polariseur.  Le rayonnement lumineux est ensuite
      irradié sur la couche mince et l'intensité du rayonnement lumineux réfléchi
      des composants polarisés est mesurée. L'épaisseur et l'indice de réfraction
      complexe peuvent être calculés à partir des résultats des mesures."
