  definition:
  - content: sum of all {{equivalent peak interruption durations, urn:iec:std:iec:60050-692-11-03}}
      in a {{bulk electric system, urn:iec:std:iec:60050-692-01-04}} during one year
  examples: []
  id: 692-11-05
  notes:
  - content: If the {{energy not supplied, urn:iec:std:iec:60050-692-09-06}} is expressed
      in megawatt-minutes, and the annual peak load expressed in megawatts, then the
      bulk power energy curtailment index provides the system minutes aggregated over
      one year, and is expressed in minutes per year.
  - content: This entry was numbered 191-30-05 in IEC 60050-191:1990.
