  definition:
  - content: "{{polarization, urn:iec:std:iec:60050-485-15-01}} caused by the resistance
      to the flow of ions in the {{electrolyte, urn:iec:std:iec:60050-485-03-01}}
      and of electrons in the {{electrodes, urn:iec:std:iec:60050-485-02-01}}, {{bipolar
      plates, urn:iec:std:iec:60050-485-06-04}}, and {{current collectors, urn:iec:std:iec:60050-485-06-07}}"
  examples: []
  id: 485-15-03
  notes:
  - content: The term "ohmic" refers to the fact that the voltage drop follows {{Ohm's
      law, urn:iec:std:iec:60050-131-15-08}} proportional to the current with an ohmic
      resistance (called "{{internal resistance, urn:iec:std:iec:60050-485-15-04}}"
      of the cell) as the proportionality constant.
