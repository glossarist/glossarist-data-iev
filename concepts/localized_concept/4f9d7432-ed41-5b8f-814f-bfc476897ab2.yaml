  definition:
  - content: the equilibrium position towards which the indicating device of a measuring
      instrument which needs an auxiliary supply tends, when the instrument is in
      service and the value of the measurand is zero
  examples: []
  id: 311-03-20
  notes:
  - content: The electrical zero does not necessarily coincide with the mechanical
