  - content: There is a total order on the set of natural numbers.
  - content: The set of natural numbers is denoted by ℕ (N with oblique bar doubled),
      or *N*, or sometimes N with left vertical bar doubled. This set without zero
      is denoted by an asterisk to the symbol, for example ℕ*.
