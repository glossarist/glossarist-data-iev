  definition:
  - content: "{{transmission, urn:iec:std:iec:60050-701-01-03}} d'un {{signal, urn:iec:std:iec:60050-101-12-02}}
      qui résulte de la {{modulation, urn:iec:std:iec:60050-701-03-08}} d'une ou de
      plusieurs {{porteuses, urn:iec:std:iec:60050-702-06-03}} par un ou plusieurs
      signaux"
  examples: []
  id: 704-08-10
  notes:
  - content: 'Le terme "transmission par courant porteur" est généralement qualifié
      par la méthode de modulation, par exemple: "transmission par courant porteur
      {{à bande latérale unique, urn:iec:std:iec:60050-702-06-26}}".'
  - content: Un système de transmission employant la transmission par courant porteur
      est appelé "système à courant porteur".
