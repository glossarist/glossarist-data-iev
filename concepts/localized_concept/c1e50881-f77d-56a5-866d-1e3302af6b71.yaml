  definition:
  - content: shortest distance or the sum of the shortest distances along the surface
      on an insulator between two conductive parts which normally have the operating
      voltage between them
  examples: []
  id: 471-01-04
  notes:
  - content: The surface of cement or of any other non-insulating jointing material
      is not considered as forming part of the creepage distance.
  - content: If a high resistance coating is applied to parts of the insulating part
      of an insulator, such parts are considered to be effective insulating surfaces
      and the distance over them is included in the creepage distance.
  terms:
  - type: expression
    normative_status: preferred
    designation: creepage distance
