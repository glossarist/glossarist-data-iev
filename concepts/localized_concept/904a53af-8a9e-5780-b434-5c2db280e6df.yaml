  definition:
  - content: "the disaccommodation of permeability after magnetic conditioning divided
      by the logarithm (to the base of 10) of the ratio of the time intervals between
      the cessation of that conditioning and the second and first measurement respectively:\r\nstem:[d
      = frac(D)(lg frac(t_(2))(t_(1)))]\r\nwhere, in this context, stem:[D] is the
      disaccommodation measured over the interval between stem:[t]~1~ and stem:[t]~2~
      after magnetic conditioning"
