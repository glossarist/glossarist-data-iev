  examples: []
  id: 192-03-10
  notes:
  - content: A systematic failure can be reproduced by deliberately applying the same
      conditions, although not all reproducible failures are systematic.
  - content: The cause of a systematic failure originates in the specification, design,
      manufacture, installation, operation or maintenance of the item.
