  definition:
  - content: the ratio, generally expressed in decibels, of the power of the carrier
      of a wanted signal to the power of the radio-frequency noise, evaluated in specified
      conditions, at the input of the receiver
  examples: []
  id: 713-11-21
  notes:
  - content: "The specified conditions comprise among others: \r\n– the nature and
      characteristics of radio-frequency noise, \r\n– the bandwidth in which the noise
      is evaluated."
