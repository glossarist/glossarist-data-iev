---
data:
  definition:
  - content: peinture, pigment ou colorant fluorescents par suite d'une exposition
      à la lumière du jour
  examples: []
  id: 845-22-055
  notes:
  - content: Les couleurs fluorescentes lumière du jour absorbent l'énergie de la
      lumière du jour dans les régions de longueurs d'onde plus courtes du spectre
      visible et/ou dans la région des ultraviolets et réémettent une partie de cette
      énergie à des longueurs d'onde plus grandes, produisant un rayonnement dans
      une petite plage de longueurs d'onde dans la région visible.
  - content: Voir également "{{matériau photoluminescent, urn:iec:std:iec:60050-845-24-040}}",
      "{{matériau fluorescent, urn:iec:std:iec:60050-845-24-041}}".
