  id: 721-11-01
  notes:
  - content: "A telegraph channel can be qualified by the number of significant conditions
      and by the modulation rate it is designed to admit.\r\nExample: A 50 baud channel
      for two-condition modulation."
  - content: Several telegraph channels can share a common path; for example each
      channel is allocated a particular frequency band or a particular time-slot.
