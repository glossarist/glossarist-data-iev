  definition:
  - content: use of a {{product, urn:iec:std:iec:60050-902-02-03}}, including its
      transport and storage, or a process, in accordance with the provided information
      for use or, in the absence of such, in accordance with generally understood
      patterns of usage
  examples: []
  id: 871-04-22
  notes:
  - content: Normal use should not be confused with {{intended use, urn:iec:std:iec:60050-871-04-17}}.
      While both include the concept of use as intended by the manufacturer, intended
      use focuses on the purpose while normal use incorporates not only the purpose,
      but transport and storage as well.
  terms:
  - type: expression
    normative_status: preferred
    designation: normal use
