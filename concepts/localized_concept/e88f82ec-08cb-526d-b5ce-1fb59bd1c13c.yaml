  definition:
  - content: rapport, exprimé en valeur numérique ou en %, de la consommation, au
      cours d'une période déterminée (année, mois, jour, etc.), à la consommation
      qui aurait résulté de l'utilisation permanente de la puissance maximale, ou
      de toute valeur particulière de la puissance observée pendant cette période
  examples: []
  id: 691-10-02
  notes:
  - content: Ce terme ne doit pas être utilisé sans qu'il soit précisé à quelle puissance
      et à quelle période il se rapporte.
  - content: Le facteur d'utilisation pour une puissance donnée est aussi égal au
      rapport de la durée d'utilisation à la durée en heures de la même période.
