data:
  definition:
  - content: quotient de radiance réfléchie en un point d'une surface d'un milieu
      non autorayonnant dans une direction donnée par la radiance du diffuseur parfait
      par réflexion irradié et observé de manière identique
  examples: []
  id: 845-21-104
  notes:
  - content: En général, le facteur de luminance énergétique par réflexion d'une surface
      ne dépend pas de la {{répartition spectrale relative, urn:iec:std:iec:60050-845-21-030}}
      de l'irradiation. Tel n'est pas le cas pour une surface photoluminescente, pour
      laquelle il est nécessaire de préciser cette grandeur.
  - content: L'unité de facteur de luminance énergétique par réflexion est un.
