---
data:
  definition:
  - content: 'composante du système de management d''une {{organisation, urn:iec:std:iec:60050-901-03-02}}
      utilisée pour développer et mettre en œuvre sa politique environnementale et
      gérer ses {{aspects environnementaux, urn:iec:std:iec:60050-904-01-02}} Note
      1 à l’article: Un système de management est un ensemble d''éléments liés entre
      eux, utilisé pour établir une politique et des objectifs et pour atteindre ces
      objectifs. Note 2 à l’article: Un système de management comprend la structure
      organisationnelle, les activités de planification, les responsabilités, les
      pratiques, les procédures, les {{processus, urn:iec:std:iec:60050-904-01-05}}
      et les ressources.'
