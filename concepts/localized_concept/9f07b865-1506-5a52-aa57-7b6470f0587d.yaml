data:
  definition:
  - content: grandeur relative à la différence de luminance entre deux surfaces
  examples: []
  id: 845-22-091
  notes:
  - content: Les définitions communément admises comprennent:* C = (L1 − L2)/L1 avec
      L1 > L2 (contraste positif), * C = (L1 − L2)/L1 avec L1 < L2 (contraste négatif),
      * C = (L1 − L2)/(L1 + L2) avec L1 > L2,  où stem:[C] est le contraste de luminance
      et stem:[L]~1~ et stem:[L]~2~ sont les luminances des deux surfaces.
  - content: Bien que le contraste de luminance soit destiné à être associé au contraste
      de clarté, il est possible qu'il ne le soit pas directement car le contraste
      de clarté dépend d'autres facteurs tels que séparation angulaire, gradient de
      luminance, et toute différence de taille entre les deux surfaces.
