  definition:
  - content: qualifie ou complète un {{nom de grandeur, urn:iec:std:iec:60050-112-01-02}}
      pour désigner le quotient de cette grandeur par une longueur d'onde ou une fréquence
  examples: []
  id: 112-03-16
  notes:
  - content: 'La longueur d''onde est utilisée principalement en optique, et la fréquence
      en radioélectricité, acoustique et théorie du signal. Exemples: {{densité spectrale
      de puissance, urn:iec:std:iec:60050-103-09-05}} ou puissance spectrique, éclairement
      énergétique spectrique ou densité spectrale d’éclairement (voir {{IEV 731-01-30,
      urn:iec:std:iec:60050-731-01-30}}).'
  - content: L’adjectif "spectral" est aussi employé pour désigner des grandeurs qui
      dépendent de la longueur d’onde ou de la fréquence, mais qui n’ont pas le caractère
      d’une densité spectrale, par exemple l’émissivité spectrale. Voir {{IEV 845-01-16,
      urn:iec:std:iec:60050-845-01-16}}.
