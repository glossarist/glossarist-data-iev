  definition:
  - content: conventional physical constant which relates the {{thermodynamic temperature,
      urn:iec:std:iec:60050-113-04-14}} and {{energy, urn:iec:std:iec:60050-113-03-45}},
      the value of which is set to 1,380 649 × 10^−23^ {{J, urn:iec:std:iec:60050-113-03-46}}/{{K,
      urn:iec:std:iec:60050-112-02-08}}
  examples: []
  id: 113-02-17
  notes:
  - content: "The Boltzmann constant relates the average kinetic energy stem:[E] of
      particles in an ideal gas to the thermodynamic temperature stem:[T] of the gas
      as follows:\r\nstem:[E = frac(3)(2) k T]."
  - content: The Boltzmann constant is used in the {{SI, urn:iec:std:iec:60050-112-02-02}}
      to define the {{kelvin, urn:iec:std:iec:60050-112-02-08}}.
