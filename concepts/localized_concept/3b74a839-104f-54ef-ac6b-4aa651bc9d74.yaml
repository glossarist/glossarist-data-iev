  definition:
  - content: "one or more radio transmitters or receivers, or a combination of transmitters
      and receivers, including associated equipment, at one given location for carrying
      on a radiocommunication service or for radio astronomy purposes\r\n<"
  examples: []
  id: 713-02-01
  notes:
  - content: ". – Each radio station shall be designated by the service in which it
      operates permanently or temporarily."
  - content: The given location may be fixed or mobile, on land, at sea, in the air,
      or in space.
