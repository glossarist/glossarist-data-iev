  definition:
  - content: circuit of a measuring instrument to which is applied the voltage of
      the circuit to which the measuring instrument is connected
  examples: []
  id: 312-01-02
  notes:
  - content: |-
      This voltage can be:

      – the voltage directly involved in the measurement,

      – a proportional voltage supplied by an external voltage transformer or voltage divider,

      – derived by means of an external series resistor or impedance.
