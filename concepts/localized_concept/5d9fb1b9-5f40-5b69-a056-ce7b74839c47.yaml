  definition:
  - content: 'pour un système linéaire invariant dans le temps avec une variable d''entrée
      sinusoïdale en régime établi de la variable de sortie, rapport du phaseur de
      la variable de sortie au phaseur de la variable d''entrée correspondante, représenté
      en fonction de la pulsation stem:[ω] VOIR: Figures 9 et 10.Note 1 à l’article:
      La réponse en fréquence coïncide avec la fonction de transfert prise sur l''axe
      imaginaire du plan complexe.'
