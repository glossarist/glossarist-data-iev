  - content: 'simulation de la présence physique de l’utilisateur dans un environnement
      produit avec l’aide d’un ordinateur, lui permettant d’interagir avec cet environnementNote
      1 à l’article: La réalité virtuelle peut reproduire un environnement réel ou
      créer un univers imaginaire. Les environnements de réalité virtuelle sont principalement
      des expériences visuelles affichées sur des écrans, mais certaines simulations
      ajoutent d’autres informations sensorielles, comme des sons, des informations
      tactiles ou d’autres sensations.'
