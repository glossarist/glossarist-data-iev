  definition:
  - content: valeur du champ coercitif dans une substance aimantée lorsque l'induction
      magnétique, la polarisation magnétique ou l'aimantation est alternative avec
      une amplitude correspondant au cycle d'hystérésis à saturation
  examples: []
  id: 221-02-37
  notes:
  - content: 'Il y a lieu de préciser la grandeur considérée et d''employer le symbole
      approprié : stem:[H'']~cstem:[B]~ pour la coercitivité cyclique relative à l''induction,
      stem:[H'']~cstem:[J]~ pour la coercitivité cyclique relative à la polarisation
      et stem:[H'']~cstem:[M]~ pour la coercitivité cyclique relative à l''aimantation.
      Les deux premiers symboles remplacent stem:[~B~H'']~c~ et stem:[~J~H'']~c~.'
