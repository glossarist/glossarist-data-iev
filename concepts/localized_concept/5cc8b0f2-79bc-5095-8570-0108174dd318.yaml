  definition:
  - content: for a substance within a domain, vector quantity equal to the vector
      sum of the electric dipole moments of all elementary electric dipoles included
      in the domain
  examples: []
  id: 121-11-36
  notes:
  - content: |-
      The electric dipole moment of a substance within a domain V is the volume integral of the electric polarization *stem:[P]*:

      stem:[p = int_("V") P " " "d" V]
  terms:
