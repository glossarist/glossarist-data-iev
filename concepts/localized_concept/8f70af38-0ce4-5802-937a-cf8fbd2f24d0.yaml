  definition:
  - content: "force *stem:[F]*  exerted on a particle having electric charge stem:[Q]
      \ and velocity *stem:[v]* , given by the relation\n\n*stem:[F]* = stem:[Q](*stem:[E]*
      + *stem:[v]* x *stem:[B]*)\r\nwhere *stem:[E]*  is the electric field strength
      and *stem:[B]*  the magnetic flux density"
  examples: []
  id: 121-11-20
  notes:
  - content: The component vector stem:[Q] *stem:[E]*  is the Coulomb force.
  - content: The component vector stem:[Q] *stem:[v]* × *stem:[B]*  is the Lorentz
      force.
  terms:
  - type: expression
    normative_status: preferred
    designation: Coulomb-Lorentz force
