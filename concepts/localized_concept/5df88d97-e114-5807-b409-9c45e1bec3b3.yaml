  definition:
  - content: quotient of dstem:[E]~tr~ by dstem:[m] where dstem:[E]~tr~ is the sum
      of the initial kinetic energies of all charged ionizing particles liberated
      by uncharged ionizing particles in a mass dstem:[m] of material  stem:[K] =
      dstem:[E]~tr~/dstem:[m]
  examples: []
  id: 395-01-36
  notes:
  - content: The unit for kerma is gray (1 Gy = 1 J kg^−1^).
  - content: Kerma is derived from “kinetic energy released per unit mass”.
  - content: In the case where the material is air the name is air kerma.
  - content: This entry was numbered 393-14-65 in IEC 60050-393:2003.
