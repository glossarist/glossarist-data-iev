  definition:
  - content: the ratio, generally expressed in decibels, of the power of the wanted
      signal to that of the coexistent noise at a specified point in a transmission
      channel, usually at the receiver output, under specified conditions
  examples: []
  id: 713-11-19
  notes:
  - content: The signal cannot generally be separated from noise, and in practice
      the ratio (signal+noise) to noise is measured.
  - content: "The specified conditions comprise among others: \r\n– the nature and
      characteristics of the wanted signal,\n\n– the nature and characteristics of
      the noise,\n\n– the receiver and antenna characteristics such as the bandwidth."
