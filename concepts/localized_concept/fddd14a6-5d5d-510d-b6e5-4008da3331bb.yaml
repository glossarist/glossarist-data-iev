  definition:
  - content: "attente impliquant un préchauffage avant de pouvoir satisfaire à une
      demande de fonctionnement\r\nNote 1 à l’article: Une attente à froid peut s’appliquer
      à des entités redondantes ou autonomes. Note 2 à l’article: Dans ce contexte,
      le «préchauffage» implique la satisfaction aux conditions nécessaires pour fonctionner
      tel que requis (par exemple, atteindre la température, la vitesse, la pression
      requises)."
