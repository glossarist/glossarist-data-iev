  definition:
  - content: quotient of five times the sum of the area of the walls bounded by the
      ceiling and the plane of the luminaires and the sum of the areas of the ceiling
      and the plane of the luminaires, used in the calculation of the utilization
      factor or utilance
  examples: []
  id: 845-29-074
  notes:
  - content: The ceiling cavity ratio is given by the formulawhere stem:[a] and stem:[b]
      are the dimensions of the sides of the room and stem:[h]~c~ is the distance
      from the ceiling to the plane of the luminaires.
  - content: See also "{{floor cavity ratio, urn:iec:std:iec:60050-845-29-076}}" and
      "{{room cavity ratio, urn:iec:std:iec:60050-845-29-072}}".
  - content: The ceiling cavity ratio has unit one.
