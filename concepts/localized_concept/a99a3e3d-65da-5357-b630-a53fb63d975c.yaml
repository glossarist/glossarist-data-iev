  definition:
  - content: complex quantity stem:[underline(gamma) = alpha + "j" beta] appearing
      in the complex representation of a wave stem:[A_(0) "exp" ( - underline(gamma)
      " " x + "j" omega " " t + "j" vartheta_(0) )], where its real part stem:[A_(0)
      "exp" ( - alpha " " x ) "cos" ( - beta " " x + omega " " t + vartheta_(0) )]
      represents, along a line parallel to the stem:[x]-axis, a characteristic quantity
      of a guided sinusoidal wave or a plane sinusoidal wave, at angular frequency
      stem:[ω] and initial phase stem:[vartheta_(0)]
