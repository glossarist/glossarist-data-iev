  notes:
  - content: The concept of propagation coefficient has a meaning only when stem:[A_(0)]
      and stem:[underline(gamma)] are substantially independent of stem:[x.]
  - content: The propagation coefficient has the dimension of reciprocal length and
      is usually a function of frequency.
