  definition:
  - content: "concevoir un processus ou entreprendre une action pour créer un processus
      tel que le critère de performance utilisé pour évaluer les conditions du processus
      pour une tâche donnée prend une valeur aussi grande que possible ou aussi petite
      que possible, avec des limitations données (voir \r\n{{351-47-36, urn:iec:std:iec:60050-351-47-36}})"
  examples: []
  id: 351-43-14
  notes:
  - content: Le critère de performance peut être utilisé pour exprimer des cibles
      d'optimisation comme une rentabilité élevée, un rendement élevé et un flux de
      production important.
  - content: Cet article était numéroté 351-22-10 dans la CEI 60050-351:2006.
