  definition:
  - content: an effect occurring in digital television images resulting from the use
      of an insufficient number of quantizing intervals to convey the original analogue
      signal
  examples: []
  id: 723-10-79
  notes:
  - content: In English, the term "contour distortion" is used when this effect is
      unwanted, and the term "posterization" is used when this effect is used to provide
      special effects.
  - content: In French, the term "distorsion de contour" is used only when the effect
      is unwanted.
  terms:
  - type: expression
    normative_status: preferred
    designation: contour distortion
  - type: expression
    designation: contouring
  - type: expression
    designation: posterization
