  definition:
  - content: dispositif transformant une tension symétrique par rapport à la masse
      en une tension asymétrique ou inversement
  examples: []
  id: 712-06-03
  notes:
  - content: Un symétriseur est utilisé par exemple pour relier une antenne symétrique
      à une ligne d'alimentation asymétrique.
  - content: Le terme anglais "balun" est une contraction de l'expression "balanced
      to unbalanced transformer".
  - content: Un symétriseur peut être réalisé en pratique au moyen d'un transformateur
      ou d'un réseau à éléments localisés ou à éléments répartis, qui peut comprendre
      des éléments actifs.
  - content: Un symétriseur peut effectuer une transformation d'impédance de rapport
      différent de l'unité.
