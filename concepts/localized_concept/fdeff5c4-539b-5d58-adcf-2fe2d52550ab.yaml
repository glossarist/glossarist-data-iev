---
data:
  definition:
  - content: "méthode systématique de détermination des différentes tâches de maintenance
      et des fréquences associées, en fonction de la probabilité des défaillances
      et de leurs conséquences\r\nNote 1 à l’article: Les études relatives à la maintenance
      fondée sur la fiabilité peuvent être réalisées à n’importe quel niveau dans
      l’arborescence d’un système. Note 2 à l’article: Les données utilisées peuvent
      être déduites d’analyses (AMDEC, par exemple) ou de l’expérience (LTIAC, par
      exemple). Note 3 à l’article: Les études relatives à la maintenance fondée sur
      la fiabilité peuvent permettre d’entreprendre des modifications de la conception
      ou des procédures d’amélioration."
