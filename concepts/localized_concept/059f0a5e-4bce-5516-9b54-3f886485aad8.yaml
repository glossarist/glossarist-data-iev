  definition:
  - content: "{{SI, urn:iec:std:iec:60050-112-02-02}} {{unit, urn:iec:std:iec:60050-112-01-14}}
      of {{mass, urn:iec:std:iec:60050-113-03-03}}, taking the fixed numerical value
      of the {{Planck constant, urn:iec:std:iec:60050-113-05-07}} stem:[h] to be 6,626
      070 15 × 10^−34^ when expressed in the unit s^−1^ m^2^ kg, where the {{metre,
      urn:iec:std:iec:60050-112-02-05}} and the {{second, urn:iec:std:iec:60050-112-02-04}}
      are chosen as units of {{length, urn:iec:std:iec:60050-113-01-19}} and {{time,
      urn:iec:std:iec:60050-113-01-13}}, respectively"
  examples: []
  id: 112-02-06
  notes:
  - content: 'The definition in the SI Brochure is: "The kilogram, symbol kg, is the
      SI unit of mass. It is defined by taking the fixed numerical value of the Planck
      constant stem:[h] to be 6,626 070 15 × 10^−34^ when expressed in the unit J
      s, which is equal to kg m^2^ s^−1^, where the metre and the second are defined
      in terms of stem:[c] and Δstem:[ν]~Cs~."'
  - content: 'The definition of the kilogram in IEV 112-02-06:2010-01 was: "SI unit
      of mass, equal to the mass of the object called the “international prototype
      of the kilogram” kept at the International Bureau of Weights and Measures (BIPM)."'
  - content: 'The kilogram is one of the seven SI {{base units, urn:iec:std:iec:60050-112-01-18}}:
      {{second, urn:iec:std:iec:60050-112-02-04}} (s), {{metre, urn:iec:std:iec:60050-112-02-05}}
      (m), kilogram (kg), {{ampere, urn:iec:std:iec:60050-112-02-07}} (A), {{kelvin,
      urn:iec:std:iec:60050-112-02-08}} (K), {{mole, urn:iec:std:iec:60050-112-02-09}}
      (mol) and {{candela, urn:iec:std:iec:60050-112-02-10}} (cd).'
