---
data:
  definition:
  - content: quotient du flux énergétique pondéré par le danger de la lumière bleue,
      stem:[Φ]~B~, par le flux lumineux, stem:[Φ]~v~stem:[K_("B" ",v") = frac(Phi_("B"))(Phi_("v"))
      = frac(int Phi_("e" "," lambda) ( lambda ) * B ( lambda ) * "d" lambda)(K_("m")
      * int Phi_("e" "," lambda) ( lambda ) * V ( lambda ) * "d" lambda)]où stem:[λ]
      est la longueur d'onde, stem:[Φ]~e,stem:[λ]~(stem:[λ]) est le flux énergétique
      spectral, stem:[B](stem:[λ]) est la fonction de pondération spectrale du danger
      de la lumière bleue, stem:[V](stem:[λ]) est la fonction d'{{efficacité lumineuse
      relative spectrale, urn:iec:std:iec:60050-845-21-035}} de la CIE pour la vision
      photopique, et stem:[K]~m~ est l'efficacité lumineuse maximale (≈ 683 lm·W^−1^)
  examples: []
  id: 845-26-061
  notes:
  - content: Le terme "rayonnement lumineux" fait référence à un {{rayonnement optique,
      urn:iec:std:iec:60050-845-21-002}} pondéré par la fonction d'efficacité lumineuse
      relative spectrale de la CIE pour la vision photopique, stem:[V](stem:[λ]).
  - content: L'emploi de ce terme est raisonnable uniquement si des éléments constitutifs
      du rayonnement optique se situent dans le domaine visible et ainsi stem:[Φ]~v~
      ≠ 0.
  - content: L'efficacité d'un rayonnement lumineux avec danger de la lumière bleue
      est exprimée en watt par lumen (W·lm^−1^), éventuellement avec un préfixe de
      mesure.
