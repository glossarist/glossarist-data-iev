  id: 212-11-13
  notes:
  - content: Pour les matériaux isolants, la résistivité superficielle est habituellement
      déterminée au moyen d’électrodes de mesure disposées sur une feuille du matériau.
  - content: La résistivité superficielle comprend l'effet d'éventuels phénomènes
      de polarisation aux électrodes.
  - content: La valeur numérique de la résistivité superficielle est indépendante
      de la taille du superficie.
