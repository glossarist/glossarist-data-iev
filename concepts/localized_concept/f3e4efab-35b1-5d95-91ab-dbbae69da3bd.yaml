  definition:
  - content: "1. an assembly, obtained by frequency division multiplexing of a specified
      number of groups, normally 5, in adjacent positions in a frequency band of specified
      width\r\n2. a frequency band of standardized width, 240 kHz, in a multichannel
      carrier system and occupying one of a number of specified positions in the spectrum"
  examples: []
  id: 704-10-15
  notes:
  - content: A supergroup is normally an assembly of 60 FDM telephone channels.
  - content: Signals, other than those derived from an assembly of groups but having
      specified characteristics, may occupy the whole or a part of a frequency band
      assigned to a supergroup.
