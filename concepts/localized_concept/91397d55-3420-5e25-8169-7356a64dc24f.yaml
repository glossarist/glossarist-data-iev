  definition:
  - content: ratio of the phasor representing the reflected electric current to the
      phasor representing the incident current at a port of an electric network or
      close to a discontinuity in a transmission line
  examples: []
  id: 131-15-32
  notes:
  - content: "When impedances can be defined, the complex current reflection factor
      equals: \r\nstem:[underline(r)_(I) = frac(underline(Z) - underline(Z) prime)(underline(Z)
      + underline(Z) prime)] \r\nwhere <u>stem:[Z]</u> is the characteristic impedance
      of the transmission line ahead of the discontinuity or the impedance of the
      source, and <u>stem:[Z]</u>′ is the impedance after the discontinuity or the
      load impedance seen from the junction between the source and the load."
  - content: The term "complex current reflection factor" may be shortened by omitting
      the qualifier "complex" in an appropriate context.
  terms:
