  definition:
  - content: the exchangeable power at the terminals of a one port device due solely
      to its sources of noise
  examples: []
  id: 702-08-53
  notes:
  - content: A receiving antenna can be regarded as a one-port device when viewed
      from its output port.
  - content: If the impedance of the device has a constant real part at thermodynamic
      temperature stem:[T] and if quantum effects are neglected, the exchangeable
      noise power spectral density due solely to thermal noise of the device is independent
      of frequency and equal to stem:[kT] where stem:[k] is Boltzmann's constant.
