  definition:
  - content: 4π multiplied by the square of backscattered sound pressure multiplied
      by the square of distance from the acoustic centre of the scatterer divided
      by the square of the sound pressure incident on the scatterers in the stated
      volume. The angle of incidence must be indicated, and the angle of scattering
      if other than backward
