  definition:
  - content: pour une onde sinusoïdale en un point donné, vitesse, dans la direction
      de propagation, de la surface d'onde correspondant à une phase déterminée
  examples: []
  id: 103-10-13
  notes:
  - content: La norme de la vitesse de phase est égale au produit de la fréquence
      par la longueur d'onde et au quotient de la pulsation par le nombre d'onde angulaire.
  - content: En présence à la fois de vitesses de phase et d'autres vitesses, il convient
      d'utiliser stem:[c] pour les premières et stem:[v] (vé) pour les secondes.
