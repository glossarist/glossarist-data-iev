  definition:
  - content: 'a channel-associated signalling method for transferring signalling information
      between transmission equipment and switching equipment over leads designated
      e and m: the "e" lead transmits to the switching equipment and the "m" lead
      transmits to the transmission equipment'
  examples: []
  id: 714-09-15
  notes:
  - content: '"e" and "m" are respectively the abbreviations of "ear" and "mouth".'
