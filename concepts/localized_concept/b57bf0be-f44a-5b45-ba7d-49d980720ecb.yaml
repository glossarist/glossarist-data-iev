  definition:
  - content: qualifies or supplements a {{quantity name, urn:iec:std:iec:60050-112-01-02}}
      to indicate the quotient of that quantity by the wavelength or the frequency
  examples: []
  id: 112-03-16
  notes:
  - content: 'The wavelength is used mainly in optics, and the frequency in radioelectricity,
      acoustics, and signal theory. Examples: {{power spectral density, urn:iec:std:iec:60050-103-09-05}},
      {{spectral irradiance, urn:iec:std:iec:60050-731-01-30}}.'
  - content: The adjective “spectral” is also used to designate quantities which are
      functions of wavelength or frequency, but which are not spectral concentrations,
      for example spectral emissivity. See {{IEV 845-01-16, urn:iec:std:iec:60050-845-01-16}}.
