      disconnectors;* section insulators;* over-voltage protection devices;* supports
      that are not insulated from the conductors;* insulators connected to live parts;*
      dropper;* auxiliary catenary wire;* stitch wire;but excluding other conductors,
      such as the following:* along-track feeders;* earth wires and return conductors.
