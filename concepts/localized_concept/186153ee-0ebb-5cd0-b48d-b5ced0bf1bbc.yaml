  definition:
  - content: valeur numérique de la température en degrés Celsius, jusqu'à laquelle
      un matériau possède des aptitudes en service connues et satisfaisantes dans
      une application spécifiée
  examples: []
  id: 212-12-15
  notes:
  - content: Un matériau avec un indice d’endurance thermique évalué  connu peut être
      utilisé comme matériau de contrôle dans des essais comparatifs de matériaux
      sans indice d’endurance thermique évalué établi.
  - content: La valeur d’indice d’endurance thermique évalué peut varier entre différentes
      applications pour un même matériau.
  - content: L’indice d’endurance thermique évalué est parfois désignée sous le nom
      d’indice d’endurance thermique ”absolue”.
