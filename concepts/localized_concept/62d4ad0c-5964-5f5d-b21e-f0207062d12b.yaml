---
data:
  definition:
  - content: |-
      pour un bipôle, élémentaire ou non, de bornes A et B, produit de la tension électrique stem:[u_(rm(AB))] entre les bornes et du courant stem:[i] dans le bipôle stem:[p = u_(rm(AB)) * i]

      où stem:[u_(rm(AB))] est l'intégrale curviligne du champ électrique de A à B et où le courant dans le bipôle est positif si le sens du courant électrique est de A vers B et négatif si son sens est de B vers ANote 1 à l’article: Le sens du courant électrique est celui défini en {{131-11-29, urn:iec:std:iec:60050-131-11-29}}. Note 2 à l’article: En théorie des circuits, le champ électrique est généralement irrotationnel et par conséquent stem:[u_(rm(AB)) = v_(rm(A)) - v_(rm(B))], où stem:[v_(rm(A))] et stem:[v_(rm(B))]

      sont respectivement les potentiels électriques aux bornes A et B. Note 3 à l’article: L’unité SI cohérente de puissance instantanée est le watt, W.
