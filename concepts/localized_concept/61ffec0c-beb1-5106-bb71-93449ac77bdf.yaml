  definition:
  - content: scalar quantity equal to the scalar line integral of a force *stem:[F]*
      acting on a particle along a given path C, thus stem:[W] &equals; ∫~C~ *stem:[F]* ⋅ d*stem:[r]*,
      where d*stem:[r]* is vector line element
  examples: []
  id: 113-03-44
  notes:
  - content: Work is energy transferred in a special manner and thus is a process
      quantity ({{113-04-10, urn:iec:std:iec:60050-113-04-10}}). Work stem:[W] changes
      the internal energy stem:[E] ({{113-04-20, urn:iec:std:iec:60050-113-04-20}})
      of a body for Δstem:[E] = stem:[W], where stem:[E] is a state quantity ({{113-04-09,
      urn:iec:std:iec:60050-113-04-09}}).
  - content: 'In applications, work is often calculated as the time integral of power
      stem:[P]: stem:[W = int_(t_(1))^(t_(2)) P d t].'
  - content: The coherent SI unit of work is joule, J.
  terms:
  - type: expression
    normative_status: preferred
    designation: work
  - type: symbol
    designation: |-
      stem:[W]
      stem:[A]
    international: true
