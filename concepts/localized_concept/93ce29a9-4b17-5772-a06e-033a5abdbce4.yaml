data:
  definition:
  - content: lésion rétinienne provoquée par une exposition énergétique intense brève
      de la rétine à partir de longueurs d'onde dans la région spectrale de danger
      pour la rétine (380 nm à 1 400 nm) dans laquelle les milieux oculaires normaux
      transmettent un {{rayonnement optique, urn:iec:std:iec:60050-845-21-002}} à
      la rétine
  examples: []
