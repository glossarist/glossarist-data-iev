  definition:
  - content: polyphase system in which the stem:[m] quantities have the same amplitude
      and initial phases given by stem:[vartheta_(0) - 2 pi frac((i - 1) k)(m)] where
      stem:[vartheta_(0)] is the initial phase of one of the quantities which is arbitrarily
      chosen out of the set stem:[i] = 1, 2, ..., stem:[m], and stem:[k] is a characteristic
      of the system, equal to one of the integers 0, 1, 2, ..., stem:[m] − 1
  examples: []
  id: 141-01-05
  notes:
  - content: The symmetric polyphase system is a degenerated polyphase system for
      stem:[k] = 0 and for some combinations of stem:[k] and stem:[m].
  terms:
  - type: expression
    normative_status: preferred
    designation: symmetric polyphase system
