  id: 102-03-16
  notes:
  - content: A bilinear form over an stem:[n]-dimensional vector space can be represented
      by a square matrix stem:[(k_(i j))] and the scalar is stem:[f ( U "," " " V
      ) = sum_(i j) k_(i j) U_(i) V_(j)].
  - content: The bilinear forms over a given stem:[n]-dimensional vector space constitute
      an stem:[n^(2)]-dimensional vector space.
  - content: The concept of bilinear form extends to "linear form" in the case of
      one vector and to "multilinear form" (or stem:[m]-linear form) in the case of
      an ordered set of stem:[m] vectors.
