  definition:
  - content: pour une surface plane S et un axe spécifié perpendiculaire au plan de
      la surface, grandeur scalaire additive égale à l’intégrale stem:[I_("p") = int_("S")
      R^(2) rm(d) A], où stem:[R] est la distance entre un élément de surface d'aire
      dstem:[A] et l'axe
  examples: []
  id: 113-03-30
  notes:
  - content: Le moment quadratique polaire d'une aire plane est parfois appelé incorrectement
      «moment d'inertie», mais ne doit pas être confondu avec la grandeur «moment
      d'inertie».
  - content: L'unité SI cohérente de moment quadratique polaire d'une aire plane est
      le mètre à la puissance quatre, m^4^.
