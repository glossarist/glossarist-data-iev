data:
  definition:
  - content: quotient du flux énergétique absorbé, stem:[Φ]~a~, par le flux énergétique
      incident, stem:[Φ]~m~stem:[alpha = frac(Phi_("a"))(Phi_("m"))]
  examples: []
  id: 845-24-082
  notes:
  - content: Le facteur d'absorption est également définie spectralement par rapport
      à la longueur d'onde, auquel cas, "spectral" est ajouté devant le nom de la
      grandeur.
  - content: En raison de la conservation de l'énergie, stem:[α] + stem:[ρ] + stem:[τ] =
      1 sauf lors de l'observation d'un {{rayonnement polarisé, urn:iec:std:iec:60050-845-21-017}},
      où stem:[ρ] est le facteur de réflexion et stem:[τ] est le facteur de transmission.
  - content: L'unité de facteur d'absorption est un.
  - content: Cet article était numéroté 845-04-75 dans l'IEC 60050-845:1987.
