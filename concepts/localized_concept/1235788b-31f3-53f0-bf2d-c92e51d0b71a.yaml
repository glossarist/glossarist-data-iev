  definition:
  - content: "scalar quantity equal to the line integral of the magnetic field strength
      stem:[*H*] along a specified path linking two points a and b:\r\nstem:[V_(\"m\"
      \",ab\") = int_(r_(\"a\"))^(r_(\"b\")) H * rm(d) r]\n\nwhere stem:[*r*]~a~ and
      stem:[*r*]~b~ are the position vectors for a and b, respectively, and dstem:[*r*]
      \ is the vector line element"
