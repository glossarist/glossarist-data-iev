  definition:
  - content: "critère caractérisant le degré de rugosité d'une surface, pour une onde
      électromagnétique sinusoïdale d'angle d'inclinaison donné, par la valeur de
      la quantité:\r\nstem:[frac(h sintheta)(lambda)]\r\noù:\n\nstem:[h] est la hauteur
      moyenne des irrégularités de la surface,\n\nstem:[θ] est l'angle d'inclinaison
      par rapport à la surface moyenne,\n\nstem:[λ] est la longueur d'onde"
  examples: []
  id: 705-04-15
  notes:
  - content: "Dans la pratique, la rugosité est négligeable et la surface est considérée
      comme lisse si:\r\nstem:[frac(h sintheta)(lambda) lt frac(1)(1 0 0)]"
