  definition:
  - content: 'rang des partiels successifs d''un mode de vibration donné, dans l''ordre
      des fréquences croissantes en commençant par le fondamental comme unité de fréquenceNote
      1 à l’article: Pour le mode de cisaillement et le mode d''extension, l''ordre
      d''un partiel est égal au quotient de la fréquence du partiel par la fréquence
      du fondamental, arrondi à l''entier le plus proche.'
