  definition:
  - content: 'équipement, système, matériel informatique, logiciel ou service utilisé
      pour augmenter, maintenir ou améliorer les capacités des personnesNote 1 à l’article:
      "technologie d’aide" est un terme général plus large que "{{produits d’assistance,
      urn:iec:std:iec:60050-871-04-04}}".Note 2 à l’article: La technologie d’aide
      peut inclure les services d’aide et les services professionnels nécessaires
      à l’évaluation, la recommandation et la mise à disposition.'
