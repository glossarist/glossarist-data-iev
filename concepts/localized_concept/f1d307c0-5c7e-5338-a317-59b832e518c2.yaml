  definition:
  - content: condition in which some peak values of the {{modulating signal, urn:iec:std:iec:60050-702-06-04}}
      exceed the maximum value for which the {{transmission system, urn:iec:std:iec:60050-704-04-19}}
      or the equipment considered is designed
