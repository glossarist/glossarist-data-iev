---
data:
  definition:
  - content: "méthode qualitative d’analyse qui consiste à étudier les modes de défaillance
      possibles et les pannes dans les sous-entités, ainsi que leurs effets à divers
      niveaux dans l’arborescence\r\nNote 1 à l’article: Le terme «analyse des modes
      de panne et de leurs effets» de l’IEC 60050-191:1990 (supprimée; remplacée par
      l'IEC 60050-192:2015) est déconseillé, parce qu’une panne ({{192-04-01, urn:iec:std:iec:60050-192-04-01}})
      est un état et ne peut pas logiquement comporter un mode, alors qu’un mode de
      défaillance ({{192-03-17, urn:iec:std:iec:60050-192-03-17}}) est un changement
      d’état."
