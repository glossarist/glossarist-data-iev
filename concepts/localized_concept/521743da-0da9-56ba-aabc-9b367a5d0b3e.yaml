  definition:
  - content: least upper bound, if it exists, of the lengths of any polygonal lines
      determined by successive points of the curve between the two points corresponding
      to the limiting values of the parameter interval
  examples: []
  id: 102-04-18
  notes:
  - content: For a curve from A to B defined by the position vector stem:[r = f (
      u )] as a function of the parameter stem:[u] in the given interval &amp;lsqb;stem:[a],
      stem:[b]&amp;rsqb; where stem:[a le b], the length of the curve is the line
      integral stem:[int_("A")^("B") |rm(d) r| = int_(a)^(b) |frac(rm(d) f)(rm(d)
      u)| rm(d) u].
  - content: In the usual geometrical space, the length of a curve is a quantity of
      the dimension length.
  terms:
  - type: expression
    normative_status: preferred
    designation: length
    usage_info: of a curve
