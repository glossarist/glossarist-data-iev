  definition:
  - content: vecteur vitesse, en un point et selon une direction spécifiée, du déplacement
      d'une surface d'onde de phase donnée d'une onde progressive sinusoïdale
  examples: []
  id: 705-02-16
  notes:
  - content: Si aucune direction n'est spécifiée, la vitesse de phase considérée est
      celle dans la direction de propagation.
  - content: Dans la direction de propagation, la norme de la vitesse de phase a sa
      valeur minimale qui est égale au quotient de la pulsation par la norme de la
      partie réelle du vecteur d'onde.
