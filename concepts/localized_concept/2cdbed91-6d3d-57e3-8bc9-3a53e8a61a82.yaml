  definition:
  - content: "pour un élément à action proportionnelle et par intégration, dont la
      variable d’entrée et de sortie sont de même type, durée de l’intervalle de temps
      nécessaire pour que la réponse à un échelon atteigne une valeur double de celle
      obtenue immédiatement après l’application de l’échelon VOIR: Figure 17.Note
      1 à l’article: Le temps de dosage d'intégration est donné parstem:[T_(\"i\")
      = frac(K_(\"Ρ\"))(K_(\"I\"))]\r\noù<table>\r\n<tr>\n<td>\nstem:[K]~I~\n</td>\n<td>est
      le coefficient d’action par intégration;</td>\n</tr>\r\n<tr>\n<td>\nstem:[K]~P~\n</td>\n<td>est
      le coefficient d’action proportionnelle;</td>\n</tr>\r\n<tr>\n<td>\nstem:[T]~i~\n</td>\n<td>est
      le temps de dosage d’intégration;</td>\n</tr>\r\n</table>"
