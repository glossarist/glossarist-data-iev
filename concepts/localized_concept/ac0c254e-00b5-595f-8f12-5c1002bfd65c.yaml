---
data:
  definition:
  - content: "pour un bipôle linéaire passif, élémentaire ou non, de bornes A et B,
      en régime sinusoïdal, quotient du phaseur stem:[underline(U)_(rm(AB))] représentant
      la tension électrique ({{131-11-56, urn:iec:std:iec:60050-131-11-56}}) entre
      les bornes par le phaseur stem:[underline(I)] représentant le courant électrique
      dans le bipôle \r\nstem:[underline(Z) = frac(underline(U)_(\"A\" \"B\"))(underline(I))]\r\noù
      la tension sinusoïdale stem:[u_(\"A\" \"B\") = v_(\"A\") - v_(\"B\")] représentée
      par le phaseur stem:[underline(U)_(rm(AB))] est la différence des potentiels
      électriques stem:[v_(\"A\")] en A et stem:[v_(\"B\")] en B, et où le courant
      sinusoïdal représenté par le phaseur stem:[underline(I)] est positif si son
      sens est de A vers B et négatif si son sens est de B vers ANote 1 à l’article:
      L’impédance d'un bipôle est l’inverse de son admittance. Elle est égale à \r\nstem:[underline(Z)
      = R + rm(j) X = Z rm(e)^(rm(j) phi)], où stem:[R] est la résistance en courant
      alternatif, stem:[X] est la réactance, stem:[Z] est l’impédance apparente et
      stem:[φ] est le déphasage tension-courant. Note 2 à l’article: Avec un qualificatif
      convenable, le mot impédance est utilisé pour former des termes composés désignant
      des grandeurs de même nature qu’une impédance, par exemple: impédance de transfert,
      impédance caractéristique. Note 3 à l’article: L’unité SI cohérente d’impédance
      est l’ohm, Ω."
