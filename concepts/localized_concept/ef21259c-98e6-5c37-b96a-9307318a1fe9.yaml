  definition:
  - content: environnement dans lequel le risque de choc électrique dû au soudage
      à l'arc est accru par rapport aux conditions normales du soudage à l'arc
  examples: []
  id: 851-15-09
  notes:
  - content: "De tel environnement se trouve\r\na) dans des emplacements où la liberté
      de mouvement restreinte oblige l'opérateur à souder dans une position inconfortable
      (à genoux, assis, allongé), en contact physique avec des éléments conducteurs;\r\nb)
      dans des emplacements, totalement ou partiellement limités par des éléments
      conducteurs, présentant un risque élevé de contact involontaire ou accidentel
      par l'opérateur;\r\nc) dans des emplacements mouillés, humides ou chauds lorsque
      l'humidité ou la transpiration réduit considérablement la résistance de la peau
      du corps humain et les propriétés isolantes des accessoires."
  - content: Il n'y a pas environnement avec risque accru de choc électrique dans
      les emplacements où les parties conductrices au voisinage immédiat de l'opérateur
      pouvant causer le risque accru ont été isolées.
