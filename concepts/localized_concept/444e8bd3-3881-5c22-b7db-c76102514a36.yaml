  definition:
  - content: "rapport de la profondeur de pénétration stem:[λ] à la longueur de cohérence
      stem:[ξ]\r\nstem:[kappa_(\"GL\") = lambda / xi]\r\nNote 1 à l’article: Pour
      un supraconducteur de type II, stem:[kappa_(\"GL\") gt \"1\" / sqrt(\"2\")];
      stem:[kappa_(\"GL\") = H_(\"c2\") / (sqrt(\"2\") H_(\"c\"))], où stem:[H_(\"c2\")]
      est le champ magnétique critique supérieur et stem:[H_(\"c\")] le champ magnétique
      critique. Note 2 à l’article: Pour un supraconducteur de type I, stem:[kappa_(\"GL\")
      lt \"1\" / sqrt(\"2\")]."
