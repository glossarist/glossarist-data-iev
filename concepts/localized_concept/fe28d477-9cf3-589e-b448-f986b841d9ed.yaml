data:
  definition:
  - content: 'aptitude à tolérer un {{événement plausible, urn:iec:std:iec:60050-692-01-08}}
      sans {{perte de charge, urn:iec:std:iec:60050-692-01-16}}, surcharge d’éléments
      de réseau ou écart par rapport aux tolérances de tension et de fréquence spécifiées
      image::/assets/images/parts/692/692-fig1-fr.png[Figure 1 - Relation entre la
      fiabilité de l’alimentation, l’adéquation de réseau et la sécurité de réseau]Note
      1 à l’article: Cette notion s’applique généralement aux {{réseaux de production-transport,
      urn:iec:std:iec:60050-692-01-04}}. Note 2 à l’article: En Amérique du Nord,
      la sécurité est généralement définie en considérant seulement l''apparition
      d''instabilité, d''écroulement de tension ou de {{déclenchements en cascade,
      urn:iec:std:iec:60050-692-03-08}}. Note 3 à l’article: Voir également le terme
      connexe "tolérance aux pannes" ({{IEV 192-10-09, urn:iec:std:iec:60050-192-10-09}}).
      Note 4 à l’article: Cet article portait le numéro 191-21-03 dans l’IEC 60050-191:1990.'
