  definition:
  - content: energy due to the position in a force field, equal to the opposite of
      the line integral along a curve C of a conservative force *stem:[F]*, thus stem:[V
      = - int_("C") F * d r], where d*stem:[r]* is vector line element
  examples: []
  id: 113-03-48
  notes:
  - content: A force is conservative when the force field *stem:[F]*(*stem:[r]*) is
      static and irrotational, i.e. *rot* *stem:[F]* = *0*, in a simply connected
      domain.
  - content: Force *stem:[F]* is the gradient of potential energy stem:[V], thus *stem:[F]*
      = *grad* stem:[V]. See also “potential” (113-03-19).
  terms:
  - type: expression
    normative_status: preferred
    designation: potential energy
  - type: symbol
    designation: |-
      stem:[V]
      stem:[E]~p~
