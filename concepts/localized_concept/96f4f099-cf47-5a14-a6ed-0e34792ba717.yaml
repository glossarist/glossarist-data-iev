  definition:
  - content: device consisting of one or more ferromagnetic cores with windings, by
      means of which an alternating or direct current or voltage can be varied by
      an independent voltage or current, utilizing saturation phenomena in the magnetic
      circuit
  examples: []
  id: 431-01-01
  notes:
  - content: 'The French term transducteur magnétique (English: transductor) should
      not be confused with the more general French term transducteur (English: transducer).
      The use of the term transducteur in the sense of transducteur magnétique is
      permissible when no ambiguity is possible.'
