  definition:
  - content: logarithme du rapport de la moyenne, effectuée sur un intervalle de temps
      spécifié, du carré de la pression acoustique, pondérée suivant une pondération
      fréquentielle normalisée, au carré de la pression acoustique de référence de
      20 μPa. Exprimé en décibels, ce niveau est égal à dix fois le logarithme décimal
      de ce rapport
  examples: []
  id: 801-22-16
  notes:
  - content: Si aucune pondération en fréquence n'est précisée, on supposera qu'il
      s'agit de la pondération A.
  - content: En principe, la mesure ne comporte pas de pondération temporelle exponentielle.
  terms:
