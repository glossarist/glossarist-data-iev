  definition:
  - content: for two vectors *stem:[U]* and *stem:[V]* in an stem:[n]-dimensional
      Euclidean space, tensor of the second order defined by the bilinear form stem:[f
      ( X "," " " Y ) = ( U * X ) ( V * Y )], where *stem:[X]* and *stem:[Y]* are
      any vectors in the same space
  examples: []
  id: 102-03-41
  notes:
  - content: The bilinear form can be represented by stem:[f (X , Y) = (sum_(i) U_(i)
      X_(i)) (sum_(j) V_(j) Y_(j)) = sum_(i j) U_(i) V_(j) X_(i) Y_(j)] in terms of
      the coordinates of the vectors. The dyadic product is then the tensor with components
      stem:[T_(i j) = U_(i) V_(j)].
  - content: The dyadic product of two vectors is denoted by stem:[U ox V] or stem:[U
      V].
  terms:
  - type: expression
    normative_status: preferred
    designation: dyadic product
  - type: expression
    designation: tensor product
    usage_info: of two vectors
