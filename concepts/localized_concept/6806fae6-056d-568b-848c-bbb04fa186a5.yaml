  definition:
  - content: in the field of thermonuclear fusion, temperature increase of the plasma
      needed to produce fusion reactions
  examples: []
  id: 395-07-146
  notes:
  - content: To initiate these reactions the plasma ions need to be brought to temperatures
      of several tens of millions of degrees Celsius.
  - content: 'In the inertial confinement fusion, the energy deposited by the laser
      beams in the vicinity of: external surface of the target was transported to
      the centre of the target by heat conduction of free electrons of the plasma.'
  - content: In magnetic confinement fusion, plasma is subjected to heating by the
      ohmic electric current induced by the magnetic field created in the poloidal
      coils.
  - content: In either case, these processes do not generally achieve the goal and
      additional heating systems are used.
  terms:
  - type: expression
    normative_status: preferred
    designation: plasma heating
