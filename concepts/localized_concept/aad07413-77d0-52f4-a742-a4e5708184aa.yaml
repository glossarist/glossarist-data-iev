---
data:
  definition:
  - content: "technologie de découpage de {{tranches, urn:iec:std:iec:60050-521-05-29}}
      utilisant un rayonnement lumineux laser balayant des lignes de découpe formant
      des dés sur un {{substrat, urn:iec:std:iec:60050-521-05-28}}\r\nNote 1 à l’article:
      Lorsqu'il est compliqué d'utiliser des lames pour le découpage en dés, la méthode
      de découpage en dés au laser est largement utilisée. Cette méthode utilise un
      rayonnement lumineux laser focalisé sur le substrat et des couches modifiées
      sont formées sous les lignes de découpe. Finalement, la tranche est découpée
      en dés par une expansion mécanique."
