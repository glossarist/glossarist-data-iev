  definition:
  - content: bringing material back from waste condition to earlier useful state by
      removing harmful components
  examples: []
  id: 212-13-18
  notes:
  - content: "Examples of reclaiming:\r\n– reclaiming of rubber by removal of vulcanizing
      agents;\r\n– reclaiming of insulating liquids by removal of soluble and insoluble
      impurities by chemical absorption means in addition to mechanical means in order
      to restore properties as close as possible to the original values, possibly
      also by use of antioxidants."
