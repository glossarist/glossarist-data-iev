  id: 102-03-17
  notes:
  - content: 'Dans un espace à stem:[n] dimensions muni de vecteurs de base orthonormés,
      le produit scalaire de deux vecteurs *stem:[U]* et *stem:[V]* est la somme des
      produits de chaque coordonnée stem:[U_(i)] du vecteur *stem:[U]* par la coordonnée
      correspondante stem:[V_(i)] du vecteur *stem:[V]*: stem:[U * V = sum_(i) U_(i)
      V_(i)]'
  - content: Pour deux vecteurs complexes *stem:[U]* et *stem:[V]*, on peut selon
      l'application utiliser soit le produit scalaire stem:[U * V], soit un produit
      hermitien stem:[U * V *].
  - content: On peut définir de la même manière, pour un couple constitué d'un vecteur
      polaire et d'un vecteur axial un produit scalaire qui est un pseudo-scalaire,
      et pour un couple de deux vecteurs axiaux un produit scalaire qui est un scalaire.
  - content: Le produit scalaire de deux grandeurs vectorielles est le produit scalaire
      des vecteurs unitaires associés multiplié par le produit des grandeurs scalaires.
  - content: Le produit scalaire est noté par un point à mi-hauteur (·) entre les
      deux symboles représentant les vecteurs.
