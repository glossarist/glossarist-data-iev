  definition:
  - content: "{{device, urn:iec:std:iec:60050-511-01-01}} in which the material elements
      or assembly of such elements exhibit performance or function only possible with
      nanotechnology"
  examples: []
  id: 511-01-16
  notes:
  - content: The material element is a {{nanomaterial, urn:iec:std:iec:60050-511-01-04}}.
  - content: The performance or function exhibited is measurable and significant for
      the application of the nano-enabled device.
  - content: Applications of nano-enabled devices can include, but are not limited
      to, energy storage devices ({{capacitors, urn:iec:std:iec:60050-151-13-28}},
      materials for {{lithium ion battery, urn:iec:std:iec:60050-482-05-07}}, fuel
      cell membrane, etc.), photovoltaic, {{organic electronics, urn:iec:std:iec:60050-511-02-03}},
      and electro-optical devices.
