  definition:
  - content: representation in space, in the form of a surface expressed in polar
      coordinates, of the angular distribution of (relative) radiant intensity or
      luminous intensity or of (relative) radiance or luminance of an element of the
      surface of a medium that diffuses by reflection or transmission
  examples: []
  id: 845-24-098
  notes:
  - content: For a narrow incident beam of radiation, it is convenient to represent
      the scattering indicatrix in Cartesian coordinates. If the angular distribution
      has rotational symmetry, a meridian section of the surface is sufficient.
  - content: The term "indicatrix" is often used to denote, instead of the surface,
      the curve obtained in a similar manner in a plane normal to the element concerned.
  - content: This entry was numbered 845-04-91 in IEC 60050-845:1987.
  terms:
  - type: expression
    normative_status: preferred
    designation: scattering indicatrix
    usage_info: for a specified incident beam
  - type: expression
    designation: indicatrix of diffusion
    usage_info: for a specified incident beam
