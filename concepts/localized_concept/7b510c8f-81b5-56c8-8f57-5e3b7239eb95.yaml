  definition:
  - content: "virtual magnetic flux in an area surrounded by a loop C\r\nstem:[Phi_(\"C\")
      = Phi + mu_(0) \" \" lambda^(2) int_(\"C\") J * rm(d) l]\r\nwhere stem:[Φ] is
      the magnetic flux in the area, stem:[λ] is the penetration depth, *stem:[J]*
      is the superconducting current density, stem:[μ]~0~ is the magnetic constant
      and d*stem:[l]* is a vector line element."
  examples: []
  id: 815-10-15
  notes:
  - content: The fluxoid in a superconductor is quantized to a multiple of the flux
      quantum stem:[Φ]~0~.
  - content: The fluxoid is sometimes used instead of the fluxon which exists far
      from the surface of a superconductor.
