---
data:
  definition:
  - content: 'connaissance qui réduit ou supprime l''incertitude concernant la réalisation
      d''un événement particulier appartenant à un ensemble déterminé d''événements
      possiblesNote 1 à l’article: En théorie de l''information, le mot "événement"
      a le sens qu''il prend dans le calcul des probabilités. Un événement peut être,
      par exemple:* la présence d''un élément donné d''un ensemble; * l''existence
      d''un caractère particulier, ou d''un mot particulier, dans un message déterminé
      ou dans une position déterminée d''un message;* n''importe lequel des résultats
      possibles d''une expérience.'
