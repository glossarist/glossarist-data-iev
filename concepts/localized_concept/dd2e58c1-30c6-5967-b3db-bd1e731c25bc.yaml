  definition:
  - content: maximum current which should be delivered by a cell or battery into an
      external circuit with zero electric resistance, or an external circuit which
      depresses the cell or battery voltage to approximately zero volt
  examples: []
  id: 482-03-26
  notes:
  - content: Zero electric resistance is a hypothetical condition and in practice
      the short-circuit current is the peak current flowing in a circuit of very low
      resistance compared to the internal resistance of the battery.
