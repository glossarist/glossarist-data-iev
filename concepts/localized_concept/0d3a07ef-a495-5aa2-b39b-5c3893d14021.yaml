  definition:
  - content: for a linear two-terminal-pair network or stem:[n]-terminal-pair network,
      quotient of the phasor representing the electric current at an input port by
      the phasor representing the voltage at an output port, when all other ports
      are connected to specified terminating immittances
  examples: []
  id: 131-14-16
  notes:
  - content: The input is usually connected to an ideal current source.
