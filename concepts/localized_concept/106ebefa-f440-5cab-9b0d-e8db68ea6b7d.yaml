  definition:
  - content: logarithm of the ratio of a given (vibratory) acceleration to the reference
      acceleration. Acceleration level in decibels is 20 times the logarithm to the
      base ten of the ratio
  examples: []
  id: 801-22-09
  notes:
  - content: Unless otherwise specified, the reference acceleration is 1 μm/s^2^.
  - content: Unless otherwise specified, the accelerations are understood to be expressed
      in root-mean-square values.
