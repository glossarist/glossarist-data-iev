  definition:
  - content: transformateur qui ne respire pas, c'est-à-dire qui est scellé de sorte
      qu'il ne peut pas se produire d'échange notable entre ses composants internes
      et l'atmosphère externe
  examples: []
  id: 421-01-18
  notes:
  - content: Dans le cas de transformateurs immergés dans l'huile, l'appareil peut
      ou non être doté d'un coussin d'air (ou autre gaz).
  - content: "Les transformateurs hermétiques entrent dans deux catégories:\r\na)
      les appareils dans lesquels le volume total d'huile, d'air (ou autre gaz), ou
      de toute combinaison reste constant dans toute la plage de température.\r\nb)
      les appareils dans lesquels le volume total d'huile, d'air (ou autre gaz), ou
      de toute combinaison varie dans toute la plage de température, cette variation
      étant absorbée par un réservoir flexible hermétique ou une membrane souple."
