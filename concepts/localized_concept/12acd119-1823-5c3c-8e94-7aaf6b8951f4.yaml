  definition:
  - content: 'pour un élément de commande, variation de la variable d''entrée requise
      pour produire sur la variable de sortie, sous le seul effet de l''élément proportionnel,
      une variation de toute l''étendue de cette variableNote 1 à l’article: La bande
      proportionnelle d’un élément de régulation est l''inverse de son gain exprimé
      en pourcentage de l''intervalle de mesure.'
