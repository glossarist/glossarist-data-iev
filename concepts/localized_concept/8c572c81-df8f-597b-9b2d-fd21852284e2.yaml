  definition:
  - content: |-
      grandeur vectorielle obtenue en un point donné en soustrayant l'aimantation stem:[*M*] du quotient de l'induction magnétique stem:[*B*] par la constante magnétique stem:[μ]~0~:

      stem:[H = frac(B)(mu_(0)) - M]
  examples: []
  id: 121-11-56
  notes:
  - content: |-
      Dans le vide le champ magnétique est en tout point égal au quotient de l'induction magnétique par la constante magnétique:

      stem:[H = frac(B)(mu_(0))]
  - content: |-
      Le rotationnel du champ magnétique est égal à la densité de courant total *stem:[J]*~t~:

      *rot stem:[H]* = *stem:[J]*~t~
  - content: L’induction magnétique stem:[*B*] est parfois appelée "champ magnétique",
      ce qui peut entraîner une confusion avec le champ magnétique stem:[*H*].
