  definition:
  - content: "law giving the force between two charged particles, expressed by the
      relation\r\nstem:[F_(12) = k * frac(Q_(1) Q_(2))(r^(2)) * frac(r_(21))(r) =
      k * frac(Q_(1) Q_(2))(r^(2)) * e_(21)]\n\nwhere stem:[*F*]~12~ is the force
      exerted on the particle with electric charge stem:[Q]~1~ by the particle with
      electric charge stem:[Q]~2~ , stem:[k] a positive constant, stem:[*r*]~21~ the
      vector from the particle with electric charge stem:[Q]~2~ to the particle with
      electric charge stem:[Q]~1~, stem:[r] = |stem:[*r*]~21~| the distance between
      particles and stem:[*e*]~21~ the unit vector stem:[*r*]~21~/stem:[r]"
  examples: []
  id: 121-11-02
  notes:
  - content: In vacuum the constant stem:[k] is equal to 1/4πstem:[ε]~0~ where stem:[ε]~0~
      is the electric constant.
