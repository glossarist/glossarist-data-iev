---
data:
  definition:
  - content: loi stipulant que lorsqu'un point de la rétine est excité par un stimulus
      lumineux dont la valeur photométrique subit des variations périodiques de {{fréquence,
      urn:iec:std:iec:60050-103-06-02}} supérieure à la {{fréquence critique de papillotement,
      urn:iec:std:iec:60050-845-22-093}}, la perception visuelle produite est identique
      à celle qui est obtenue par un stimulus de valeur constante égale à la valeur
      moyenne du stimulus variable émis pendant une période
