  definition:
  - content: maximum value of {{spectral luminous efficacy, urn:iec:std:iec:60050-845-21-091}}
      for a specified photometric condition
  examples: []
  id: 845-21-092
  notes:
  - content: The photometric condition should be specified (e.g. photopic, scotopic,
      mesopic). If it is not specified, photopic vision is assumed and the symbol
      stem:[K]~m~ is used. For other photometric conditions, the respective symbol
      for identification shall be used.
  - content: The value of maximum luminous efficacy for photopic vision is calculated
      bystem:[K_("m") = frac("683")(V "(" lambda_("cd") ")") "cd" * "sr" * "W"^(-
      "1") approx 683 " lm" * "W"^(- 1)]where stem:[V](stem:[λ]) is the {{spectral
      luminous efficiency, urn:iec:std:iec:60050-845-21-035}} for photopic vision
      and stem:[λ]~cd~ is the wavelength in air corresponding to the {{frequency,
      urn:iec:std:iec:60050-103-06-02}} 540 × 10^12^ Hz specified in the definition
      of the SI unit candela.
  - content: The maximum luminous efficacy is expressed in lumen per watt (lm·W^−1^).
  terms:
  - type: expression
    normative_status: preferred
    designation: maximum luminous efficacy
    usage_info: for a specified photometric condition
