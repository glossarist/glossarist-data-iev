  definition:
  - content: integrated MEMS {{device, urn:iec:std:iec:60050-151-11-20}}, in which
      complementary metal-oxide-semiconductor (CMOS) signal-processing circuits and
      MEMS elements are formed on the same silicon {{substrate, urn:iec:std:iec:60050-521-05-28}}
  examples: []
  id: 523-04-25
  notes:
  - content: CMOS MEMS is one form of the MEMS device that integrates CMOS signal-processing
      circuits and MEMS elements. Usually, the CMOS MEMS is fabricated by performing
      a MEMS process on the CMOS preformed {{wafer, urn:iec:std:iec:60050-521-05-29}},
      and therefore it is necessary that the MEMS process does not damage the CMOS
      circuit.
