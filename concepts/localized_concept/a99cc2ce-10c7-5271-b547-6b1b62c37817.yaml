---
data:
  definition:
  - content: en un point donné d'une surface donnée, aire d'un élément de cette surface
      contenant le point et contenu dans une sphère de rayon infinitésimal
  examples: []
  id: 102-05-06
  notes:
  - content: Pour une surface définie par *stem:[r]* = *stem:[f]*(stem:[u], stem:[v]),
      où stem:[( u , v ) in "U" subseteq R^("2")], l'élément scalaire de surface est
      stem:[|frac(del f)(del u) xx frac(del f)(del v)| * rm(d) u rm(d) v].
  - content: Pour une surface définie par l'équation stem:[z] = stem:[f](stem:[x],
      stem:[y]), l'élément scalaire de surface est stem:[sqrt(1 + (frac(del f)(del
      x))^(2) + (frac(del f)(del y))^(2)) rm(d) x rm(d) y].
