  definition:
  - content: process by which a {{radio transmitter, urn:iec:std:iec:60050-713-08-01}}
      produces {{radio-frequency, urn:iec:std:iec:60050-702-01-10}} {{energy, urn:iec:std:iec:60050-113-03-45}}
      for the purpose of {{radiocommunication, urn:iec:std:iec:60050-701-01-31}}
  examples: []
  id: 702-02-05
  notes:
  - content: In radiocommunication, the term “emission” should not be used in the
      more general sense of radio-frequency {{emission, urn:iec:std:iec:60050-702-02-03}}.
      For example, the production of the part of {{electromagnetic energy, urn:iec:std:iec:60050-121-11-64}}
      from the {{local oscillator, urn:iec:std:iec:60050-713-10-06}} that is transferred
      to external space, is a {{radiation, urn:iec:std:iec:60050-702-02-06}} and not
      an emission.
  - content: The term “emission” is also used for the radio waves or signals produced
      (see {{IEV 161-01-09, urn:iec:std:iec:60050-161-01-09}}), for the production
      of any waves or particles (see {{IEV 702-02-03, urn:iec:std:iec:60050-702-02-03}}),
      as a synonym for a {{programme, urn:iec:std:iec:60050-723-01-02}} in broadcasting
      and for {{transmission, urn:iec:std:iec:60050-723-01-03}} in broadcasting, and
      for a release into the environment (see {{IEV 904-01-11, urn:iec:std:iec:60050-904-01-11}}).
  - content: In French, the term “{{émission, urn:iec:std:iec:60050-702-02-04}}” is
      also used for the concept represented by the English term “{{sending, urn:iec:std:iec:60050-702-02-04}}”
      of a signal.
