  definition:
  - content: |-
      scalar quantity equal to the flux of the displacement current density *stem:[J]*~stem:[D]~ through a given directed surface S:

      stem:[I_(D) = int_("S") J_(D) * " " e_("n") "d" A]

      where *stem:[e]*~n~dstem:[A] is the vector surface element
