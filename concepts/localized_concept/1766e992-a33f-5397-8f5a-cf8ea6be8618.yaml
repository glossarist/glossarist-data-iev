  definition:
  - content: process by which radiation is returned by a surface or a medium, without
      change in the {{frequency, urn:iec:std:iec:60050-103-06-02}} of its monochromatic
      components
  examples: []
  id: 845-24-047
  notes:
  - content: Part of the radiation falling on a medium is reflected at the surface
      of the medium ("surface reflection"); another part can be scattered back from
      the interior of the medium ("volume reflection").
  - content: The frequency is unchanged only if there is no Doppler effect due to
      the motion of the materials from which the radiation is returned.
  - content: This entry was numbered 845-04-42 in IEC 60050-845:1987.
