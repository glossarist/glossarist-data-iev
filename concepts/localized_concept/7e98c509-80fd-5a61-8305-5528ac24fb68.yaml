data:
  definition:
  - content: quotient du flux lumineux émis par la puissance consomméestem:[eta_("v")
      = frac(Phi_("v"))(P)]où stem:[Φ]~v~ est le flux lumineux et stem:[P] est la
      puissance consommée par la source de lumière
  examples: []
  id: 845-21-089
  notes:
  - content: Il faut spécifier si la puissance consommée par la source de lumière
      inclut ou non la puissance dissipée par d'éventuels équipements auxiliaires
      tels que des ballasts.
  - content: L'efficacité lumineuse d'une source de lumière est exprimée en lumen
      par watt (lm·W^−1^).
