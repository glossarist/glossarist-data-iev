data:
  definition:
  - content: "{{nano-objet, urn:iec:std:iec:60050-511-01-07}} ayant les trois dimensions
      externes à l'{{échelle nanométrique, urn:iec:std:iec:60050-511-01-03}}\r\nNote
      1 à l’article: Si les longueurs du plus grand et du plus petit axe du nano-objet
      diffèrent de manière significative (généralement d’un facteur supérieur à trois),
      les termes {{nanofibre, urn:iec:std:iec:60050-511-01-10}} ou {{nanoplaque, urn:iec:std:iec:60050-511-01-11}}
      sont destinés à être utilisés à la place du terme nanoparticule."
