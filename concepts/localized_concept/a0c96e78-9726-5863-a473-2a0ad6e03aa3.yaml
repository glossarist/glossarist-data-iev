data:
  definition:
  - content: fonction dont l'argument est un ensemble ordonné de stem:[n] nombres
      ou grandeurs scalaires
  examples: []
  id: 103-01-06
  notes:
  - content: La valeur d'une fonction stem:[f] de stem:[n] variables stem:[x_(1) ,
      " " x_(2) , " " ... , " " x_(n)] est notée stem:[f ( x_(1) , " " x_(2) , " "
      ... , " " x_(n) )].
  - content: Dans de nombreuses applications en électrotechnique, on utilise des fonctions
      d'une seule variable. Cette variable est souvent la durée et la fonction est
      alors appelée «fonction du temps» et notée stem:[f](stem:[t]). Mais les variables
      peuvent aussi être des variables spatiales (par exemple des coordonnées), la
      fréquence, etc.
