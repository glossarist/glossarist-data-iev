  definition:
  - content: "fonction qui exprime la probabilité stem:[P](stem:[E]) pour qu'une particule
      satisfaisant à la statistique de Fermi occupe un niveau d'énergie autorisé stem:[E]\r\nstem:[P
      (E) = frac(1)(1 + \"exp\" ( frac(E - E_(\"F\"))(k T) ))]\n\noù\n\nstem:[k] est
      la constante de Boltzmann\n\nstem:[T] est la température thermodynamique\n\nstem:[E]~F~
      est le niveau de Fermi\n\net où ce niveau est quantifié et peut contenir 0,
      1 ou 2 électrons."
