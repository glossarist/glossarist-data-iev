  definition:
  - content: application-neutral {{computer programs, urn:iec:std:iec:60050-192-01-34}}
      providing services to application software in a way that the complexity of these
      application software and their infrastructure remains hidden
  examples: []
  id: 871-05-09
  notes:
  - content: The term "middleware" also denotes a distribution platform, i.e. a {{protocol,
      urn:iec:std:iec:60050-351-56-14}} at a higher level than that of ordinary computer
      communication.
  - content: In contrast to lower-level network services handling simple communication
      between computers, middleware supports the communication between processes.
  - content: In the AAL context, AAL middleware provides components and services for
      AAL applications.
  terms:
  - type: expression
    normative_status: preferred
    designation: middleware
