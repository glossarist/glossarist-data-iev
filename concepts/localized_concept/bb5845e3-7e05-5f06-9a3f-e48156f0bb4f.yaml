  definition:
  - content: "pour un bipôle résistif, élémentaire ou non, de bornes A et B, dérivée
      du courant électrique  i dans le bipôle par rapport à la tension électrique
      u~AB~ ({{131-11-56, urn:iec:std:iec:60050-131-11-56}}) entre les bornes:\r\nstem:[G_(\"d\")
      = frac(rm(d) i)(rm(d) u_(rm(AB)))]\r\noù le courant est positif si le sens du
      courant est de A vers B et négatif dans le cas contraire"
  examples: []
  id: 131-12-07
  notes:
  - content: Pour une résistance idéale, la conductance différentielle G~d~ est égale
      à sa conductance G.
