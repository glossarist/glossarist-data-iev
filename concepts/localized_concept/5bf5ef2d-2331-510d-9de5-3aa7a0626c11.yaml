  definition:
  - content: quotient of the number of specified {{data elements, urn:iec:std:iec:60050-171-02-01}}
      {{transferred, urn:iec:std:iec:60050-171-06-01}} in a time interval by the duration
      of this interval
  examples:
  - content: "{{Digit rate, urn:iec:std:iec:60050-702-05-23}}, stem:[r]~d~ or stem:[ν]~d~;
      transfer rate for bytes, stem:[r]~B~, stem:[r]~o~, stem:[ν]~B~, or stem:[ν]~o~;
      {{binary digit rate, urn:iec:std:iec:60050-704-16-07}} (or bit rate), stem:[r]~b~,
      stem:[r]~bit~, stem:[ν]~b~, or stem:[ν]~bit~."
  id: 171-06-03
  notes:
  - content: The transfer rate is expressed in seconds to the power of minus one (s^−1^).
      In practice, it is expressed in digits per second, for example in bits per second
      (bit/s) or in bytes per second (B/s). These units can be combined with decimal
      multiple prefixes, for example kilobyte per second (kB/s).
