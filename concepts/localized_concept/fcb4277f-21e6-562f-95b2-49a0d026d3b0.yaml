  definition:
  - content: direct or indirect release from a product or process into the environment
  examples:
  - content: The release could include one or more substances, heat, light, sound,
      electromagnetic fields, etc.
  id: 904-01-11
  notes:
  - content: The term “emission” is also used for the radio waves or signals produced
      (see {{IEV 161-01-09, urn:iec:std:iec:60050-161-01-09}}), for the production
      of any waves or particles (see {{IEV 702-02-03, urn:iec:std:iec:60050-702-02-03}}),
      for a process in radiocommunication (see {{IEV 702-02-05, urn:iec:std:iec:60050-702-02-05}}),
      for a {{programme, urn:iec:std:iec:60050-723-01-02}} in broadcasting, and as
      a synonym for {{transmission, urn:iec:std:iec:60050-723-01-03}} in broadcasting.
  - content: In French, the term “{{émission, urn:iec:std:iec:60050-702-02-04}}” is
      also used for the concept represented by the English term “{{sending, urn:iec:std:iec:60050-702-02-04}}”
      of a signal.
