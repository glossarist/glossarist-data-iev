  definition:
  - content: "valeur moyenne du nombre relatif international de taches solaires pour
      le mois de rang n, obtenue par la formule suivante:\r\nstem:[R_(12) = frac(1)(12)
      [) frac(R_(n - 6) + R_(n + 6))(2) + sum_(k) R_(k) ])]\n\npour stem:[k] = stem:[n]
      − 5, stem:[n] − 4, ..., stem:[n], ..., stem:[n] + 5\r\noù stem:[R]~stem:[k]~
      est le nombre relatif international de taches solaires moyen pour le mois de
      rang stem:[k]"
