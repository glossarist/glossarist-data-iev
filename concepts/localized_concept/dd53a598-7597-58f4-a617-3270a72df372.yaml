  definition:
  - content: qualifies the ratio of a quantity to a reference quantity other than
      a unit of measurement
  examples: []
  id: 112-03-07
  notes:
  - content: Any relative quantity is of dimension one.
  - content: 'Examples: relative permittivity, relative permeability, relative density,
      relative resistances and relative reactances in the theory of electric machines.'
  - content: 'The symbol of a relative quantity is generally deduced from the symbol
      of the original quantity by adding the subscript r. Examples: stem:[ε]~r~, stem:[µ]~r~.'
  - content: The qualifier "per unit" (p.u.) is sometimes used but is not recommended.
