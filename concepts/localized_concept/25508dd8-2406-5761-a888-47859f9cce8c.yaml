  definition:
  - content: 'functional unit that generates in closed-loop control the reference
      variable at its output from the command variable at its input SEE: Figure 2.'
  examples:
  - content: Electronic ramp-function generator the output signal of which follows
      variations of the input signal only up to a maximum permissible rate of change.
      If the rate of change of the input signal exceeds the permissible limit, the
      output signal follows only at a preset maximum rate of change.
  - content: A turbine wall temperature measuring device ensures that the turbine
      output power is varied at such a rate that the temperature difference between
      the various zones of the turbine wall does not exceed permissible values.
  id: 351-49-10
  notes:
  - content: Reference-variable generating elements are in many cases used to prevent
      critical limit values of the reference variable, its derivatives or other process
      variables being exceeded.
  - content: This entry was numbered 351-28-10 in IEC 60050-351:2006.image::/assets/images/parts/351/351-fig2-en.png[Figure
