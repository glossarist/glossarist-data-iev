  definition:
  - content: milieu dans lequel un champ électrique variable produit un vecteur densité
      de courant électrique stem:[vec(J)] dont la projection selon une direction donnée
      a une norme petite par rapport à celle de la projection du vecteur stem:[frac(del
      vec(D))(del t)] dans une bande de fréquences déterminée
  examples: []
  id: 705-03-07
  notes:
  - content: "Pour un milieu isotrope, la propriété d'être diélectrique se traduit
      en régime sinusoïdal par la condition:\r\nstem:[frac(sigma)(epsilon_(0) omega)
      ll epsilon_(\"r\")^(prime)]\r\noù stem:[epsilon_(\"r\")^(prime)] est la permittivité
      relative réelle, stem:[ε]~0~ est la constante électrique, stem:[σ] est la conductivité,
      stem:[ω] est la pulsation."
  - content: Un milieu anisotrope peut n'être diélectrique que dans certaines directions.
