  definition:
  - content: the product of the mass energy transfer coefficient stem:[(frac(mu_("tr"))(rho))]
      for that energy and (1– stem:[g]) where stem:[g] is the fraction of the energy
      of secondary charged particles that is lost to bremsstrahlung in the material
  examples: []
  id: 881-04-33
  notes:
  - content: When the material is air, stem:[frac(mu_("en"))(rho)] is proportional
      to the quotient of exposure by energy fluence in the usual case of constant
      W.
