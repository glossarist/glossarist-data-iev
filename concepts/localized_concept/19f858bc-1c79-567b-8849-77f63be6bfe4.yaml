  definition:
  - content: perturbed state wherein the system, even when not disturbed, will not
      remain in a {{steady state, urn:iec:std:iec:60050-692-02-01}}, or cannot spontaneously
      return to a {{steady state, urn:iec:std:iec:60050-692-02-01}} after being subjected
      to a {{disturbance, urn:iec:std:iec:60050-692-01-09}} of prescribed magnitudeimage::/assets/images/parts/692/692-fig2-en.png[Figure
      2 - Electric power system states]image::/assets/images/parts/692/692-fig3-en.png[]
  examples: []
  id: 692-02-03
  notes:
  - content: The arrows indicate the most important state transitions caused by credible
      events. Recovery transitions, in opposite directions, are effected by operator
      intervention.*Figure 3 – Examples of transitions within electric power system
      states*
  - content: In an unstable state, the {{electric power system, urn:iec:std:iec:60050-692-01-02}}
      is experiencing {{cascade tripping, urn:iec:std:iec:60050-692-03-08}}, voltage
      instability or other instability likely to result in {{system collapse, urn:iec:std:iec:60050-692-01-17}}.
  - content: This entry was numbered 191-22-02 in IEC 60050-191:1990.
