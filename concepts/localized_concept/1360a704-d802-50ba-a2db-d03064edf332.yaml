  definition:
  - content: insulating component equipped with a permanent or detachable {{end fitting,
      urn:iec:std:iec:60050-651-22-02}} for installing clamps, short-circuiting bars
      or conductive extension components onto {{electrical installation, urn:iec:std:iec:60050-651-26-01}}
  examples: []
  id: 651-25-05
  notes:
  - content: The earthing stick can be fixed to the {{earthing and short-circuiting
      device, urn:iec:std:iec:60050-651-25-02}} or be detachable.
  - content: The insulating element of the earthing stick is intended to provide the
      adequate safety distance and insulation to the worker.
  - content: This entry was numbered 651-14-10 in IEC 60050-651:1999. It has been
      modified to add a second preferred term and to provide greater detail regarding
      the description of the {{device, urn:iec:std:iec:60050-651-21-15}}.
