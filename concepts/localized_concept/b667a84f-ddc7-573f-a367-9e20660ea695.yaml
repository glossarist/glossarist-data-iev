data:
  definition:
  - content: "{{absorption, urn:iec:std:iec:60050-705-02-07}} qui se produit dans
      les {{fibres optiques, urn:iec:std:iec:60050-704-02-07}} et composants associés"
  examples: []
  id: 731-03-14
  notes:
  - content: L'absorption dans une fibre optique est due à des mécanismes intrinsèques,
      tels que les queues des bandes d'absorption dans le rayonnement ultraviolet
      et le rayonnement infrarouge, et à des mécanismes extrinsèques tels que les
      impuretés (par exemple les ions OH et les ions des métaux de transition) et
      les défauts (par exemple ceux qui résultent de l'histoire thermique et de l'exposition
      à des rayonnements nucléaires).
