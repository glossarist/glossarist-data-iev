  definition:
  - content: the speed of light in vacuum, divided by the magnitude of the group velocity
      of the mode
  examples: []
  id: 731-03-30
  notes:
  - content: "For a plane wave of wavelength stem:[λ], it is related thus to the refractive
      index stem:[n]:\r\nstem:[N = n - lambda frac(\"d\" n)(\"d\" lambda)]\r\nwhere
      stem:[λ] is the wavelength."
  - content: Each mode has its own group index.
