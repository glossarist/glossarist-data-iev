  definition:
  - content: "of electrical steel, the ratio of the difference between the magnetic
      losses stem:[P~α~], measured at an angle stem:[α] to the direction of rolling,
      and the magnetic losses, stem:[P]~0~, measured along the direction of rolling,
      to stem:[P]~0~, the ratio being expressed as a percentage:\r\nstem:[T_(\"L\")
      = frac(P_(alpha) - P_(0))(P_(0)) xx 100 \" \" \" \" %]"
  examples: []
  id: 221-03-39
  notes:
  - content: The measurements of stem:[P~α~] and stem:[P]~0~ are to be made under
      the same conditions.
  - content: The loss anisotropy factor at a given angle differs both conceptually
      and numerically from the loss anisotropy factor stem:[T] ({{IEV 221-03-38, urn:iec:std:iec:60050-221-03-38}}).
  terms:
