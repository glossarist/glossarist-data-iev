  definition:
  - content: for a linear two-terminal-pair network or stem:[n]-terminal-pair network,
      quotient of the phasor representing the voltage at an output port by the phasor
      representing the electric current at an input port, when all other ports are
      connected to specified terminating immittances
  examples: []
  id: 131-14-13
  notes:
  - content: The output is usually open-circuited.
