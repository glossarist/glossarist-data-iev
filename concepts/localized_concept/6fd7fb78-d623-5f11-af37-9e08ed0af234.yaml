  definition:
  - content: quotient of the above-average luminous energy to the total luminous energy
      over a period of time
  examples: []
  id: 845-22-094
  notes:
  - content: The above-average luminous energy is the {{luminous energy, urn:iec:std:iec:60050-845-21-037}}
      calculated from the amount that the instantaneous luminous flux exceeds the
      average luminous flux. When the instantaneous luminous flux is less than the
      average luminous flux, the above-average luminous energy is zero, i.e. it does
      not add negatively.
  - content: "For the region under the curve of a graph of the instantaneous luminous
      flux versus time, the flicker index is equivalent to the ratio of the area above
      the average luminous flux to the total area. This is expressed mathematically
      as stem:[I_(\"F\") = \" \" frac(A_(\"1\"))(A_(\"1\") + A_(\"2\"))], where stem:[A]~1~
      is the area above the average luminous flux and stem:[A]~2~ is the area below
      the average luminous flux as indicated in the following figure:image::/assets/images/parts/845/usemap[]\r\n<map
      name=\"845-22-094-en\">\n\n<area target=\"_self\" alt=\"luminous flux\" title=\"luminous
      flux\" href=\"IEV845-21-039\" coords=\"7,90,22,11\" shape=\"rect\">\n\n<area
      target=\"_self\" alt=\"time\" title=\"time\" href=\"IEV113-01-03\" coords=\"466,182,503,198\"
      shape=\"rect\">\n\n<area target=\"_self\" alt=\"period\" title=\"period\" href=\"IEV103-06-01\"
      coords=\"212,26,254,7\" shape=\"rect\">\r\n</map>"
  - content: The flicker index has to be calculated over an integral number of periods
      over which the signal is repetitive. For sources run at 50 Hz, this is normally
      20 ms or 40 ms or 60 ms, etc., while for sources run at 60 Hz, this is normally
      16,67 ms or 33,33 ms or 50 ms, etc.
  - content: Although the flicker index is defined here in terms of the luminous energy
      of the source, it can also be obtained through measurements of other luminous
      quantities such as luminous intensity, illuminance and luminance.
  - content: The flicker index does not take into account the effect of modulation
      frequency and the effect of multiple frequencies in case of more complex light
      waveform modulations. See also CIE TN 006:2016, _Visual Aspects of Time-Modulated
      Lighting Systems – Definitions and Measurement Models_.
  - content: The flicker index has unit one.
