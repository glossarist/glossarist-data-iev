  definition:
  - content: technique de caractérisation d'une fibre optique qui consiste à injecter
      une impulsion optique à une extrémité de la fibre, puis à mesurer en fonction
      du temps la puissance rayonnante rétrodiffusée ou réfléchie vers cette extrémité
  examples: []
  id: 731-07-08
  notes:
  - content: La méthode de rétrodiffusion permet d'évaluer l'affaiblissement linéique
      pour des fibres uniformes et d'identifier et localiser des défauts ou d'autres
      sources localisées d'affaiblissement.
