  definition:
  - content: ratio of the {{RMS value, urn:iec:std:iec:60050-103-02-03}} of the {{fundamental
      component, urn:iec:std:iec:60050-103-07-19}} of an alternating quantity to the
      RMS value of the quantity
  examples: []
  id: 103-07-23
  notes:
  - content: For an alternating quantity stem:[x] with RMS value stem:[X_("eff")]
      and RMS fundamental component stem:[X_("1 eff")], the fundamental factor is
      stem:[g = X_("1 eff") / X_("eff")].
  - content: The extension to a {{reference fundamental component, urn:iec:std:iec:60050-103-07-20}}
      is given in {{IEV 551-20-17, urn:iec:std:iec:60050-551-20-17}}.
