  definition:
  - content: appareil de mesure qui affiche une indication
  examples: []
  id: 311-03-02
  notes:
  - content: L’indication peut être analogique (continue ou discontinue), numérique
      ou codée.
  - content: L’appareil peut indiquer simultanément les valeurs de plusieurs grandeurs.
  - content: Un appareil de mesure afficheur peut, de plus, fournir un enregistrement.
  - content: L’affichage peut consister en un signal de sortie non directement lisible
      par un observateur humain, mais capable d’interprétation par un dispositif convenable.
