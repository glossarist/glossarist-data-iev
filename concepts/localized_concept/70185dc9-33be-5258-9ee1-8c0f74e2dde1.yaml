  definition:
  - content: "ratio between the time period (stem:[t]~1~), in which the output voltage
      is above a specified level, and the time period (stem:[t]~2~), in which the
      output voltage is below the specified levelimage::/assets/images/parts/561/[]\r\n*Figure
      17 – Characteristics of an output waveform*"
  examples: []
  id: 561-03-35
  notes:
  - content: The symmetry is expressed in percent of the duration of the full signal
      period.
  - content: |-
      The specified level may be the arithmetic mean between levels stem:[V]~OL~ and stem:[V]~OH~, or 50 % of the peak-to-peak amplitude. The ratio is expressed as:

      stem:[frac(100 " " " " " " " " t_(1))(t_(1) + t_(2)) : frac(100 " " " " " " " " " " t_(2))(t_(1) + t_(2))]
