  definition:
  - content: conductive gaseous medium consisting of free electrons, ions and neutral
      atoms or molecules, the proportions of the various particles being such that
      on a macroscopic scale the medium is electrically neutral
  examples: []
  id: 395-02-24
  notes:
  - content: In the thermonuclear domain, a plasma is called hot when its state depends
      on the radiation and a plasma is called cold when the thermal agitation is neglected.
