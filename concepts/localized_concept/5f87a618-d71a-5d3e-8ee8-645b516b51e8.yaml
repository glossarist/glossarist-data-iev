  definition:
  - content: quotient of dstem:[N/]dstem:[a], where dstem:[N] is the number of particles
      incident on a cross-sectional area dstem:[a]
  examples: []
  id: 395-01-15
  notes:
  - content: The numerical value of particle fluence is the same as the numerical
      value of the time integral of the particle flux.
  - content: Normally the use of the term particle refers to a specific elementary
      particle, for example neutron fluence. This quantity is expressed in particles
      divided by area (m^−2^, cm^−2^).
  - content: This entry was numbered 393-14-25 in IEC 60050-393:2003.
