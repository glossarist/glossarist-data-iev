  definition:
  - content: quotient of transmitted radiant flux, stem:[Φ]~t~, and incident radiant
      flux, stem:[Φ]~m~stem:[tau = frac(Phi_("t"))(Phi_("m"))]
  examples: []
  id: 845-24-065
  notes:
  - content: Transmittance is also defined spectrally in terms of wavelength, in which
      case "spectral" is added before the quantity name.
  - content: Due to energy conservation, stem:[α] + stem:[ρ] + stem:[τ] = 1 except
      when {{polarized radiation, urn:iec:std:iec:60050-845-21-017}} is observed,
      where stem:[α] is absorptance and stem:[ρ] is reflectance.
  - content: 'Transmittance, stem:[τ], is the sum of regular transmittance, stem:[τ]~r~,
      and diffuse transmittance, stem:[τ]~d~: stem:[τ] = stem:[τ]~r~ + stem:[τ]~d~.'
  - content: The transmittance has unit one.
  - content: This entry was numbered 845-04-59 in IEC 60050-845:1987.
