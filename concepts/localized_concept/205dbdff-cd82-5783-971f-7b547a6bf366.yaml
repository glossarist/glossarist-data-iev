  definition:
  - content: 'representation of a system or element with one or more input variables
      and one or more output variables, symbolized primarily by a rectangle in which
      the functional relationship between the input and output variables is given
      SEE: Figures 1 and 2.'
  examples: []
  id: 351-44-02
  notes:
  - content: The functional relationship may be given by an arithmetic instruction,
      a transfer function, a differential or difference equation, a characteristic
      curve or a family of characteristic curves, or a switching function.
