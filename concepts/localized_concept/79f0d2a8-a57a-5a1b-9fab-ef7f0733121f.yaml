  definition:
  - content: for a linear two-terminal element or two-terminal circuit, under sinusoidal
      conditions, quantity equal to the product of the apparent power stem:[S] and
      the sine of the displacement angle stem:[φ]   stem:[Q = S sinphi]
  examples: []
  id: 131-11-44
  notes:
  - content: The reactive power is the imaginary part of the complex power stem:[underline(S)],
      thus stem:[Q = " " Im " " underline(S)]. Its absolute value is equal to the
      non-active power, thus stem:[|Q| = Q_("P{sim}")].
  - content: The coherent SI unit for reactive power is voltampere, VA. The special
      name var and its symbol var are also used. See {{131-11-45, urn:iec:std:iec:60050-131-11-45}}.
