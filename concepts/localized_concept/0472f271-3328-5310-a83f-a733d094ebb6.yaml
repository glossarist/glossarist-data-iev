  definition:
  - content: an arrangement of one or more protection equipments, and other devices
      intended to perform one or more specified protection functions
  examples: []
  id: 448-11-04
  notes:
  - content: A protection system includes one or more protection equipments, instrument
      transformer(s), wiring, tripping circuit(s), auxiliary supply(s) and, where
      provided, communication system(s). Depending upon the principle(s) of the protection
      system, it may include one end or all ends of the protected section and, possibly,
      automatic reclosing equipment.
  - content: The circuit-breaker(s) are excluded.
