data:
  definition:
  - content: mesure quantitative de l'{{information, urn:iec:std:iec:60050-171-07-03}}
      concernant la réalisation d'un événement stem:[x] de probabilité déterminée
      stem:[p](stem:[x]), égale au logarithme de l'inverse de cette probabilitéstem:[I
      ( x ) = log frac(1)(p ( x )) = - log p ( x )]
  examples:
  - content: 'Soit stem:[{a , b , c}] un jeu de trois événements dont les probabilités
      de réalisation sont stem:[p ( a ) = 0,5], stem:[p ( b ) = 0,25] et stem:[p (
      c ) = 0,25]. Les quantités d''information de ces événements sont: stem:[I (
      a ) = lb frac(1)(0,50) Sh = 1 " " Sh], stem:[I ( b ) = lb frac(1)(0,25) Sh =
      2 " " Sh], stem:[I ( c ) = lb frac(1)(0,25) Sh = 2 " " Sh].Note 1 à l’article:
      Pour un ensemble d''événements équiprobables, la quantité d''information de
      chaque événement est égale à la {{quantité de décision, urn:iec:std:iec:60050-171-07-10}}
      de l''ensemble.'
