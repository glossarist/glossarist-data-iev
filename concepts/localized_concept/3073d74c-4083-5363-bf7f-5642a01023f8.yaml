  definition:
  - content: portion of the {{electric power system, urn:iec:std:iec:60050-692-01-02}}
      comprising the facilities used for the generation and transmission of electric
      energy
  examples: []
  id: 692-01-04
  notes:
  - content: The extent of the bulk electric system is usually limited to the larger
      generation facilities connected directly to high voltage transmission system
      for the purpose of production and transmission of electric energy to major industrial
      and distribution centres.
  - content: In English, the term "composite system" is also used for this concept.
