  definition:
  - content: a value of prospective current that a switching device or a fuse is capable
      of breaking at a stated voltage under prescribed conditions of use and behaviour
  examples: []
  id: 441-17-08
  notes:
  - content: The voltage to be stated and the conditions to be prescribed are dealt
      with in the relevant publications.
  - content: For switching devices, the breaking capacity may be termed according
      to the kind of current included in the prescribed conditions, e.g. line-charging
      breaking capacity, cable charging breaking capacity, single capacitor bank breaking
      capacity, etc.
  terms:
  - type: expression
    normative_status: preferred
    designation: breaking capacity
