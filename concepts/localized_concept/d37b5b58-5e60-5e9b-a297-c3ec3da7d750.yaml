  definition:
  - content: a process of reaching equilibrium in a magnetic system after it has been
      subjected to a disturbance, the process taking a finite time due to the dynamics
      of atomic or subatomic particles
  examples: []
  id: 221-02-57
  notes:
  - content: When unqualified, this term usually relates to short-term processes having
      time constants in the order of microseconds.
