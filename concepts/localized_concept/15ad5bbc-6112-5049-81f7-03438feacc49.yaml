  definition:
  - content: tensor of the second order defined by a bilinear form such that stem:[f
      ( U "," " " V ) = - f ( V "," " " U )]
  examples: []
  id: 102-03-43
  notes:
  - content: The components of an antisymmetric tensor are such that stem:[T_(i j)
      = - T_(j i)], and in particular stem:[T_(i i) = 0].
  - content: 'An antisymmetric tensor defined on a three-dimensional space has three
      strict components which can be considered as the coordinates stem:[W_(1) ",
      " W_(2) ", " W_(3)] of an axial vector: stem:[([0, W_(3), - W_(2)], [- W_(3),
      0, W_(1)], [W_(2), - W_(1), 0])] The axial vector associated with the antisymmetric
      tensor stem:[U ox V - V ox U] is the vector product of the two vectors.'
  terms:
  - type: expression
    normative_status: preferred
    designation: antisymmetric tensor
