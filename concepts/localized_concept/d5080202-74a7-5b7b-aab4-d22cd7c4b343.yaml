  definition:
  - content: time required for an output to fall from a stated high percentage to
      a stated lower percentage of the maximum value when a steady input is instantaneously
      removed
  examples: []
  id: 845-25-068
  notes:
  - content: A value of 90&#160;% is usually considered to be the high percentage
      value, whereas a value of 10&#160;% is usually considered to be the low percentage
      value.
  - content: The fall time is expressed in seconds (s).
  - content: This entry was numbered 845-05-61 in IEC 60050-845:1987.
