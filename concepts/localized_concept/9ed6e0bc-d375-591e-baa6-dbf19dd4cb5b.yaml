  definition:
  - content: "{{electromagnetic wave, urn:iec:std:iec:60050-121-11-63}} the energy
      of which, during propagation, remains confined between surfaces or in the vicinity
      of surfaces by reason of a sharp or progressive variation in the electromagnetic
      properties of the medium in the directions normal to these surfaces"
