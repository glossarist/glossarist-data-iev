  definition:
  - content: the phase displacement between the fundamental components of the magnetic
      flux density and the magnetic field strength
  examples: []
  id: 221-03-28
  notes:
  - content: Where a phase displacement can be associated with eddy currents, hysteresis
      or residual losses, the loss angle may be designated by stem:[δ]~F~ for eddy
      current loss, stem:[δ]~h~ for hysteresis loss and stem:[δ]~r~ for residual loss.
  - content: "The tangent of loss angle is often used to express the losses in a magnetic
      material:\r\nstem:[\"tan\" \" \" \" \" delta_(\"m\") = frac(mu^(dprime))(mu^(prime))]\r\nwhere
      stem:[µ]′ and stem:[µ]″ are the real and imaginary components respectively of
      the complex permeability (symb.: stem:[<u>µ</u>])."
