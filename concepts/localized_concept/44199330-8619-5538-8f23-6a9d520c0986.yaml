  definition:
  - content: indivisible amount of electromagnetic radiation, such that the radiation
      only changes in a discrete manner by one or more such amounts, that is considered
      as a particle of energy stem:[h]stem:[ν], where stem:[h] is the Planck constant
      and stem:[ν] the frequency of the radiation
