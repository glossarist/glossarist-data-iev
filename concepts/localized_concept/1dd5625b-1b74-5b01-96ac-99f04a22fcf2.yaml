  definition:
  - content: "pour un élément à action proportionnelle et par dérivation avec retard
      additionnel du premier ordre, rapport du gain maximal résultant d'une action
      proportionnelle et par dérivation, avec un retard du premier ordre, au gain
      dû à la seule action proportionnelle VOIR: Figure 18.Note 1 à l’article: La
      fonction de transfert d’un élément PD avec un retard du premier ordre eststem:[frac(V
      (s))(U (s)) = K_(\"Ρ\") * frac(1 + T_(\"d\") * s)(1 + T_(1) * s)]et utilisant
      le gain d'action par dérivation stem:[a] = stem:[T]~d~/T~1~, la fonction de
      transfert peut être écritestem:[frac(V (s))(U (s)) = K_(\"Ρ\") * frac(1 + T_(\"d\")
      * s)(1 + frac(T_(\"d\") * s)(a))]où<table>\r\n<tr>\n<td>\nstem:[K]~P~\n</td>\n<td>est
      le coefficient d’action proportionnelle;</td>\n</tr>\r\n<tr>\n<td>\nstem:[T]~d~\n</td>\n<td>est
      le temps de dosage de dérivation;</td>\n</tr>\r\n<tr>\n<td>\nstem:[T]~1~\n</td>\n<td>est
      la constante de temps;</td>\n</tr>\r\n<tr>\n<td>stem:[a]</td>\n<td>est le gain
      d’action par dérivation, 1 &lt; stem:[a] &lt; ∞;</td>\n</tr>\r\n<tr>\n<td>stem:[s]</td>\n<td>est
      la variable complexe de la transformée de Laplace;</td>\n</tr>\r\n<tr>\n<td>\nstem:[U](stem:[s])</td>\n<td>est
      la transformée de la variable d’entrée;</td>\n</tr>\r\n<tr>\n<td>\nstem:[V](stem:[s])</td>\n<td>est
      la transformée de la variable de sortie.</td>\n</tr>\r\n</table>"
