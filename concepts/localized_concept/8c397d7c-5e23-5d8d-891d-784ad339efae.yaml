  definition:
  - content: optical device that modifies a beam of {{optical radiation, urn:iec:std:iec:60050-845-21-002}}
      to produce a beam with a unique state of polarization irrespective of the state
      of polarization of the incident radiation
  examples: []
  id: 845-24-014
  notes:
  - content: A polarizer is called a linear, circular or elliptical polarizer depending
      on the state of polarization produced.
  - content: The unqualified term "polarizer" is frequently used to describe a linear
      polarizer.
  - content: A distinction is made between a perfect polarizer that transmits only
      a unique state of polarization and an imperfect polarizer that, in addition
      to transmitting a unique state of polarization, does not completely exclude
      all other polarization states.
  terms:
  - type: expression
    normative_status: preferred
    designation: polarizer
