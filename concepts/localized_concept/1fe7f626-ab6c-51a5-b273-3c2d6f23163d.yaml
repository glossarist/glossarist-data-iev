---
data:
  definition:
  - content: densité du flux photonique par rapport à un angle solide dans une direction
      spécifiéestem:[I_("p") = frac("d" Phi_("p"))("d" Omega)]où stem:[Φ]~p~ est le
      flux photonique émis dans la direction donnée, et stem:[Ω] est l'angle solide
      contenant cette direction
  examples: []
  id: 845-21-046
  notes:
  - content: La répartition des intensités photoniques en fonction de la direction
      d'émission, par exemple, donnée par les angles polaires (stem:[ϑ], stem:[φ]),
      permet de déterminer le flux photonique stem:[Φ]~v~, dans un certain angle solide,
      stem:[Ω], d'une source:stem:[Phi_("p") = "P{iint}"_(Omega) I_("p") (vartheta
      , phi) "sin" vartheta " d" phi " d" vartheta].
  - content: La grandeur radiométrique correspondante est l'"intensité énergétique".
      La grandeur photométrique correspondante est l'"intensité lumineuse".
  - content: L'intensité photonique est exprimée en seconde à la puissance moins un
      multipliée par le stéradian à la puissance moins un (s^−1^·sr^−1^).
  - content: Cet article était numéroté 845-01-32 dans l'IEC 60050-845:1987.
