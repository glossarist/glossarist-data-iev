---
data:
  definition:
  - content: dose actinique, utilisant la fonction de pondération spectrale d'un érythème,
      qui produit un érythème actinique juste décelable sur la peau précédemment non
      exposée d'un seul individu
  examples: []
  id: 845-26-068
  notes:
  - content: 'La dose érythémale minimale est une mesure subjective basée sur le rougissement
      de la peau. Elle dépend de nombreuses variables, par exemple, sensibilité individuelle
      au {{rayonnement ultraviolet, urn:iec:std:iec:60050-845-21-008}}, caractéristiques
      radiométriques de la source, pigmentation de la peau, site anatomique, temps
      écoulé entre l''irradiation et l''observation du rougissement (valeur type:
      24 h). Étant donné que la dose érythémale minimale varie avec chaque individu,
      il convient de réserver cette grandeur seulement aux études d''observation des
      humains et d''autres animaux.'
  - content: Voir aussi "{{dose érythémale normalisée, urn:iec:std:iec:60050-845-26-069}}".
  - content: La dose érythémale minimale est exprimée en joule par mètre carré (J·m^−2^).
  - content: Cet article était numéroté 845-06-24 dans l'IEC 60050-845:1987.
