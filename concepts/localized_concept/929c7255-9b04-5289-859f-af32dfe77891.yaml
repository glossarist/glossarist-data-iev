data:
  definition:
  - content: "moitié de la somme, étendue aux différents types d'ions d'une solution,
      des produits de leur molalité stem:[b]~stem:[i]~ par le carré de leur nombre
      de charge stem:[z]~stem:[i]~ stem:[I = frac(1)(2) sum z_(i)^(2) b_(i)]\r\nNote
      1 à l’article: Le nombre de charge est une grandeur sans dimension définie en
      113-05-17. Note 2 à l’article: L’unité SI cohérente de force ionique est la
      mole par kilogramme, mol/kg. Note 3 à l’article: Cet article était numéroté
      111-15-29 dans la CEI 60050-111:1996. Il a été modifié comme suit: une formule
      a été ajoutée."
