  definition:
  - content: "élément linéaire de transfert invariant dans le temps, dont la fonction
      de transfert peut être écrite comme un quotient de deux polynômes en stem:[sG
      (s) = frac(V (s))(U (s)) = frac(b_(0) + b_(1) * s + ... + b_(m) * s^(m))(a_(0)
      + a_(1) * s + ... + a_(n) * s^(n))] avec stem:[a~j~] et stem:[b~j~] réel, stem:[a~n~]
      ≠ 0, stem:[b~m~] ≠ 0oú<table>\r\n<tr>\n<td>\nstem:[ai], stem:[bi]\n</td>\n<td>sont
      les polynom coefficients;</td>\n</tr>\r\n<tr>\n<td>stem:[s]</td>\n<td>est la
      variable complexe de la transformée de Laplace;</td>\n</tr>\r\n<tr>\n<td>\nstem:[U](stem:[s])</td>\n<td>est
      la transformée de la variable d’entrée;</td>\n</tr>\r\n<tr>\n<td>\nstem:[V](stem:[s])</td>\n<td>est
      la transformée de la variable de sortie.</td>\n</tr>\n</table>Note 1 à l’article:
      Dans les systèmes commandés réels, stem:[m] &lt; stem:[n]. Eu égard à la dénomination
      mathématique, ces éléments devraient être nommés \"élément de transfert rationnel
      à fraction propre\" mais ce terme n’est pas usité.Note 2 à l’article: Un élément
      avec temps mort est un exemple d'élément de transfert non-rationnel."
