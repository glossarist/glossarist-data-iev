  definition:
  - content: courant délivré par une {{cellule élémentaire à combustible, urn:iec:std:iec:60050-485-08-01}},
      à une tension donnée, faisant référence à la masse de l'{{électrocatalyseur,
      urn:iec:std:iec:60050-485-01-02}}dans les {{électrodes, urn:iec:std:iec:60050-485-02-01}}
  examples: []
  id: 485-02-11
  notes:
  - content: L'activité spécifique peut aussi faire référence à la {{surface électrochimique,
      urn:iec:std:iec:60050-485-02-09}} ou au volume de la {{couche catalytique, urn:iec:std:iec:60050-485-02-06}}.
      Ces derniers peuvent faire référence à l'activité spécifique de la surface ou
      à l'activité spécifique du volume, respectivement.
  - content: L'activité spécifique est exprimée généralement en A/g, et peut être
      exprimée en A/cm^2^ ou A/cm^3^.
