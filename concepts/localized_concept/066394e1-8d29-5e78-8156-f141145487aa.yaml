  definition:
  - content: dispositif destiné à l'étalonnage des vibrateurs à conduction osseuse,
      conçu pour présenter une impédance mécanique spécifiée à un vibrateur  appliqué
      avec une force statique spécifiée, et équipé d'un transducteur électromécanique
      qui permet de déterminer le niveau de force vibratoire la surface de contact
      entre le vibrateur et le coupleur mécanique
