  definition:
  - content: grandeur obtenue en soustrayant d’une grandeur alternative sa composante
      fondamentale ou sa composante fondamentale de référence
  examples: []
  id: 551-20-11
  notes:
  - content: Le résidu total de distorsion contient les composantes harmoniques et,
      s’il y en a, les composantes interharmoniques.
  - content: Le résidu total de distorsion dépend du choix de la composante fondamentale.
      En cas d'ambiguïté dans le contexte on indique de quelle composante il s'agit.
  - content: Le résidu total de distorsion est une fonction du temps.
  - content: Une grandeur alternative est une grandeur périodique dont la composante
      continue est nulle.
