  definition:
  - content: time difference between the end time, stem:[t]~e~, and the start time,
      stem:[t]~s~, of an {{optical radiation, urn:iec:std:iec:60050-845-21-002}} exposure
  examples: []
  id: 845-26-071
  notes:
  - content: For a single pulse, the exposure duration is the duration between the
      half-peak power point of the leading edge and the corresponding point on the
      trailing edge. For a train of pulses (or subsections of a train of pulses),
      the exposure duration is the duration between the first half-peak power point
      of the leading pulse and the last half-peak power point of the trailing pulse.
  - content: The exposure duration is expressed in seconds (s).
