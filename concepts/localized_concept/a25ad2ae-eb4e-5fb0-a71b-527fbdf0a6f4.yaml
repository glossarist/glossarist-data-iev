  definition:
  - content: 'ordre qui est émis dès que l''étape correspondante est activée et qui
      cesse lorsqu''un intervalle de temps spécifié s''est écoulé ou lorsque l''étape
      correspondante est désactivée avant que l''intervalle de temps spécifié ne se
      soit écouléNote 1 à l’article: L''ordre limité dans le temps est identifié dans
      la CEI 60848, _Langage de spécification GRAFCET pour diagrammes fonctionnels
      en séquence_, par la lettre conventionnelle "L".'
