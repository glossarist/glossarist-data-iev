  definition:
  - content: contact designed for the attachment of the conductor by solder
  examples: []
  id: 581-22-11
  notes:
  - content: "Solder contacts may assume but are not limited to the following types:\r\na)
      the wire is surrounded by the terminal, barrel, bucket, cup, well, etc.\r\nb)
      the wire surrounds the terminal: post, standoff, tag etc.\r\nc) the wire passes
      through the terminal: eyelet, hook, etc.\r\nd) no wire is involved, as in printed
      circuit applications: solder pinpost, SMT terminations (e.g. gull wings) spill,
      tail, etc."
