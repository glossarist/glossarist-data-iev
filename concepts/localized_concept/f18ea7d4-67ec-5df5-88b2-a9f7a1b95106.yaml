---
data:
  definition:
  - content: "composant spécifié d'un point de vue informatique qui possède une interface
      de commande et des jeux déclarés\r\n. d'interfaces d'exploitation dans lesquelles
      il joue un rôle de serveur (interfaces offertes),. d'interfaces d'exploitation
      dans lesquelles il joue un rôle de client (interfaces requises),. d'interfaces
      d'exploitation qui produisent des annonces qui transportent des notifications
      d'événements affectés d'un type (sources d'événement),. d'interfaces d'exploitation
      qui consomment des annonces qui transportent des notifications d'événements
      affectés d'un type (collecteurs d'événement), et. d'interfaces d'exploitation
      qui prennent en charge les accesseurs et les mutateurs pour les attribut (attributs)"
