  definition:
  - content: 'aptitude d’un système à calculateur de processus à reprendre les tâches
      après une défaillance ou une panneNote 1 à l’article: L’exigence pour que ceci
      soit réalisé est que l’état de la tâche doit toujours être stocké juste avant
      la panne ou le défaut. Le redémarrage peut suivre automatiquement.'
