  definition:
  - content: length of the path that would be travelled at the {{speed of light in
      vacuum, urn:iec:std:iec:60050-113-01-34}} in a {{duration, urn:iec:std:iec:60050-113-01-13}}
      equal to the {{phase delay, urn:iec:std:iec:60050-702-02-16}} of a given {{electromagnetic
      wave, urn:iec:std:iec:60050-121-11-63}} between two given points
  examples: []
  id: 705-02-14
  notes:
  - content: "Between two points in the same ray path, the optical path length equals
      the {{line integral, urn:iec:std:iec:60050-102-05-03}} of the {{refractive index,
      urn:iec:std:iec:60050-702-02-19}} along the ray path:\r\nstem:[int_(c) n \"d\"
      s]\n\nwhere stem:[n] is the refractive index of the medium at each point in
      the direction of the path and dstem:[s] the curve element along the path."
