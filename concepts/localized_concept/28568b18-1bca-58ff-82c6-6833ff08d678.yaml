  notes:
  - content: 'À partir d''une ondelette mère stem:[psi ( t )], des ondelettes filles
      sont obtenues par décalage et changement d''échelle (dilatation et compression):
      stem:[psi_(a , b) ( t ) = frac(1)(sqrt(a)) psi (frac(t - b)(a))], où stem:[a]
      est un paramètre d''échelle et stem:[b] un paramètre de position.'
