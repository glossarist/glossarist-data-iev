data:
  definition:
  - content: "{{polarisation, urn:iec:std:iec:60050-705-01-13}} d'une {{onde électromagnétique,
      urn:iec:std:iec:60050-121-11-63}} telle que l'extrémité du vecteur {{induction
      électrique, urn:iec:std:iec:60050-121-11-40}} en un point décrit une ellipse
      fixe centrée en ce point"
  examples: []
  id: 705-01-17
  notes:
  - content: Dans un milieu linéaire et de propriétés indépendantes du temps, toute
      {{onde sinusoïdale, urn:iec:std:iec:60050-103-10-03}} est en général à polarisation
      elliptique, la {{polarisation rectiligne, urn:iec:std:iec:60050-705-01-14}}
      et la {{polarisation circulaire, urn:iec:std:iec:60050-705-01-20}} étant des
      cas particuliers.
