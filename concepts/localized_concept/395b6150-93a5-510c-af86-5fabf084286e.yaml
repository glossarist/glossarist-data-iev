  definition:
  - content: structure or equipment providing semi-permanent {{interconnection, urn:iec:std:iec:60050-151-12-10}}
      of {{transmission channels, urn:iec:std:iec:60050-701-02-01}}, circuits or equipment
      by terminating them and providing means for connecting them together in any
      required manner
  examples: []
  id: 702-09-18
  notes:
  - content: A distribution frame permits any interconnection of {{subscriber's lines,
      urn:iec:std:iec:60050-701-02-09}} and line {{terminals, urn:iec:std:iec:60050-701-02-08}},
      {{multiplexers, urn:iec:std:iec:60050-704-08-13}}, and switching, signalling
      and other equipment. The interconnections can be changed as required from time
      to time.
  - content: Examples of the technology used for the interconnections are {{wires,
      urn:iec:std:iec:60050-151-12-28}}, U-links and {{plugs, urn:iec:std:iec:60050-151-12-21}}
      and {{sockets, urn:iec:std:iec:60050-151-12-20}}, all of which are set up and
      rearranged manually, and electromagnetic or electronic switches, which can be
      operated locally or remotely.
  terms:
  - type: expression
    normative_status: preferred
    designation: distribution frame
