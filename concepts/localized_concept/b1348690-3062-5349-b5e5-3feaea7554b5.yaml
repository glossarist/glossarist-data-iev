  definition:
  - content: "the mean value of the international relative sunspot number for the
      month n obtained by the following equation:\r\nstem:[R_(12) = frac(1)(12) [)
      frac(R_(n - 6) + R_(n + 6))(2) + sum_(k) R_(k) ])]\n\nfor stem:[k] = stem:[n]
      − 5, stem:[n] − 4, ..., stem:[n], ..., stem:[n] + 5\r\nwhere stem:[R]~stem:[k]~
      is the mean international relative sunspot number for the stem:[k]th month"
