  definition:
  - content: irradiation or measurement of reflecting materials at 8° to the normal,
      at one azimuth angle
  examples: []
  id: 845-25-095
  notes:
  - content: Eight-degree geometry is used to substitute the 0° directional geometry
      in many practical applications of reflection measurements, as it permits differentiation
      between specular-component-included and specular-component-excluded measurements.
  - content: This geometry is restricted to measurements using an integrating sphere
      as described in CIE 15, stem:[Colorimetry].
