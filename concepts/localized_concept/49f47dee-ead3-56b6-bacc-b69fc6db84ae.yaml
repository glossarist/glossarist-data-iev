  definition:
  - content: rapport, exprimé en décibels, de la tension du signal utile à la tension
      de bruit, à la sortie d'un magnétophone
  examples: []
  id: 806-16-22
  notes:
  - content: La tension de sortie du signal est exprimée en tenant compte d'un taux
      de distorsion harmonique spécifié, obtenu par enregistrement d'une fréquence
      spécifiée sur un support spécifié.
  - content: La tension de bruit est mesurée en valeur pondérée ou non pondérée en
      l'absence de signal utile.
