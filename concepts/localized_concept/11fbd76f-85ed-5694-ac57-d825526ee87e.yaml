  definition:
  - content: an antenna composed of a spherically symmetric (radio wave) lens, whose
      index of refraction varies only in a radial direction, and a feed located on
      or near the surface of the sphere
  examples: []
  id: 712-05-80
  notes:
  - content: There are a number of modified Luneburg lenses including an axially symmetric
      cylindrical lens.
  - content: The Luneburg lens may be constructed of an artificial dielectric.
