  definition:
  - content: ratio of the absolute value of the mutual permeance stem:[Λ]stem:[~ij~]
      related to two circuit elements stem:[i] and stem:[j] to the geometric average
      of their self-permeances stem:[Λ]stem:[~ii~] and stem:[Λ]stem:[~jj~]  stem:[k_(i
      j) = frac(|Lambda_(" " i j)|)(sqrt(Lambda_(" " i i) Lambda_(j j)))]
  examples: []
  id: 131-12-41
  notes:
  - content: The inductive coupling factor can also be expressed as  stem:[k_(i j)
      = frac(|L_(" " i j)|)(sqrt(L_(" " i i) L_(j j)))] where stem:[L~ii~] and stem:[L~jj~]
      are the self-inductances of the elements and stem:[L~ij~] their mutual inductance.
