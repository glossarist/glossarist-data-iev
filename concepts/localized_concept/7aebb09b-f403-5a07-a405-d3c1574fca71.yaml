  definition:
  - content: 'plate-forme sur poteau, plate-forme avec rambarde ou nacelle sur laquelle
      ou dans laquelle les travailleurs, réalisant des {{travaux sous tension, urn:iec:std:iec:60050-651-21-01}},
      se tiennentNote 1 à l’article: Les plates-formes de travail sont utilisées pour
      la construction, la réparation, l’inspection ou des travaux similaires. Elles
      peuvent être déplacées pour atteindre la position de travail. Note 2 à l’article:
      Lorsque cela est applicable, la plate-forme de travail peut recevoir les {{outils,
      urn:iec:std:iec:60050-651-21-14}} et les {{équipements, urn:iec:std:iec:60050-651-21-16}}.
      Note 3 à l’article: Cet article était numéroté 651-08-02 dans la CEI 60050-651:1999.
      Il a été modifié pour plus de précision.'
