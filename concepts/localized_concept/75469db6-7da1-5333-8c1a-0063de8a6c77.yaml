---
data:
  definition:
  - content: "exclusion des données obtenues dans une évaluation particulière après
      une durée donnée ou un nombre d’événements donné\r\nNote 1 à l’article: En général,
      les événements sont des défaillances, mais, dans un essai de maintenabilité,
      il peut s’agir de rétablissements. Note 2 à l’article: Un essai terminé alors
      qu’il reste encore des entités non défaillantes peut être appelé «essai censuré»;
      les données de durée d’essai provenant de ces essais sont appelées «données
      censurées»."
