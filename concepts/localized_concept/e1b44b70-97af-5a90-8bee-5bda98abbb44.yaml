  definition:
  - content: nuclear reaction initiated by neutrons, gamma radiation or charged particles
      which results in the division of the atomic nucleus into two fragments (more
      rarely three) whose mass is of the same order of magnitude and which is accompanied
      by the emission of neutrons, gamma radiation and a high level of kinetic energy
  examples: []
  id: 395-02-67
  notes:
  - content: Nuclear fission can happen naturally for certain radionuclides and is
      called spontaneous fission.
  - content: This entry was numbered  393-12-38 in IEC 60050-393:2003.
