  definition:
  - content: representation of a sinusoidal integral quantity by a complex quantity
      whose argument is equal to the initial phase and whose modulus is equal to the
      root-mean-square value ({{103-02-03, urn:iec:std:iec:60050-103-02-03}})
  examples: []
  id: 131-11-26
  notes:
  - content: For a quantity  the phasor is stem:[A " " exp" " rm(j) vartheta_(0)].
      Electric current phasor stem:[underline(I)] and voltage phasor stem:[underline(U)]
      are often used.
  - content: The similar representation with the modulus equal to the amplitude is
      sometimes also called "phasor". See {{103-07-14, urn:iec:std:iec:60050-103-07-14}}.
  - content: A phasor can also be represented graphically.
  terms:
