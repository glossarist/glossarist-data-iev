---
data:
  definition:
  - content: "procédé de planarisation d'un {{substrat, urn:iec:std:iec:60050-521-05-28}}
      par combinaison de polissage mécanique et de gravure chimique\r\nNote 1 à l’article:
      Le polissage mécano-chimique est principalement utilisé lors des étapes de planarisation
      sur un substrat dans le cadre du procédé de fabrication de {{semiconducteurs,
      urn:iec:std:iec:60050-521-02-01}}. Puisque ces étapes sont composées de plusieurs
      matériaux tels que des substrats, des diélectriques et des métaux, différentes
      boues sont utilisées pour retirer chaque matériau de manière sélective. Dans
      les {{dispositifs microélectromécaniques, urn:iec:std:iec:60050-523-01-01}},
      le polissage mécano-chimique est utilisé pour rendre les surfaces de liaison
      planes dans le procédé d'{{encapsulation au niveau de la tranche, urn:iec:std:iec:60050-523-06-07}}.
      \r\nNote 2 à l’article: Le terme abrégé \"CMP\" est dérivé du terme anglais
      développé correspondant \"chemical mechanical polishing\"."
