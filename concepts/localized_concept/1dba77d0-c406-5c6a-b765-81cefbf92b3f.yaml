  definition:
  - content: "the quotient of dstem:[E]~rad~ by the product of stem:[ρ] and dstem:[l],
      where dstem:[E]~rad~ is the energy lost by a charged particle of specified energy
      by radiation in traversing a path length dstem:[l] in a material of density
      stem:[ρ]:\r\nstem:[frac(S_(\"rad\"))(rho) = frac(1)(rho) (frac(\"d\" E)(\"d\"
      l))_(\"rad\")]"
  examples: []
  id: 881-12-51
  notes:
  - content: The energy losses included are those that produce bremsstrahlung.
