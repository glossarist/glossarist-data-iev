  definition:
  - content: "{{multiplexing, urn:iec:std:iec:60050-701-03-09}} in which several independent
      {{signals, urn:iec:std:iec:60050-701-01-02}} are allotted separate wavelengths
      for {{transmission, urn:iec:std:iec:60050-701-01-03}} over a common optical
      {{transmission medium, urn:iec:std:iec:60050-704-02-01}}"
  examples: []
  id: 704-08-06
  notes:
  - content: Wavelength division multiplexing is a form of {{frequency division multiplexing,
      urn:iec:std:iec:60050-704-08-05}}. The use of the distinct term "wavelength
      division multiplexing" allows this concept to be distinguished from that in
      which frequency division multiplexing is used in assembling the {{baseband,
      urn:iec:std:iec:60050-702-01-06}} signal that has to be carried over the optical
      link at one {{wavelength, urn:iec:std:iec:60050-103-10-10}}.
  terms:
