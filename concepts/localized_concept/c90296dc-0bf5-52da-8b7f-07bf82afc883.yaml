  definition:
  - content: marque attribuée à un instant au moyen d'une échelle de temps spécifiée
  examples: []
  id: 113-01-12
  notes:
  - content: Sur une échelle de temps formée d'échelons successifs, deux instants
      distincts peuvent être exprimés par la même date (voir la Note 1 du terme «échelle
      de temps» en {{113-01-11, urn:iec:std:iec:60050-113-01-11}}).
  - content: Par rapport à l'échelle de temps spécifiée, on peut aussi considérer
      la date d'un instant comme la durée entre l'origine de l'échelle de temps et
      cet instant.
  - content: Dans le langage courant, le terme «date» est principalement employé lorsque
      l'échelle de temps est un calendrier en tant que suite de jours.
