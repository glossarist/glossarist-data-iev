  definition:
  - content: sound power absorption coefficient attributed to a surface by the Eyring
      reverberation-time equation
  examples: []
  id: 801-31-09
  notes:
  - content: "The Eyring reverberation-time equation is:\r\nstem:[T = frac((24 \" \"
      \"ln\" \" \" 10) \" \" V)(- c S \" \" \" \" \"ln\" \" \" (1 - bar(alpha)))]\r\nwhere:\n\nstem:[T]
      is the reverberation time\n\nstem:[V] is the volume of the room\n\nstem:[c]
      is the speed of sound in the contained air\n\nstem:[S] = Σ stem:[S]~stem:[i]~
      is the total area of surfaces of the room\n\nstem:[bar(alpha) = \"Sigma\" S_(i)
      alpha_(i) / S] is the area-weighted mean Eyring coefficient of all the surfaces\n\nstem:[S]~stem:[i]~
      is the area of the stem:[i]-th surface\n\nstem:[α]~stem:[i]~ is Eyring sound
      power absorption coefficient attributed to the stem:[i]-th surface. The equivalent
      absorption area of the stem:[i]-th surface is stem:[S]~stem:[i]~stem:[α]~stem:[i]~."
