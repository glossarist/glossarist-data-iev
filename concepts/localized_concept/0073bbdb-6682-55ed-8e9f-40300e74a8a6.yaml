---
data:
  definition:
  - content: pour deux vecteurs *stem:[U]* et *stem:[V]* d'un espace euclidien à stem:[n]
      dimensions, tenseur du deuxième ordre défini par la forme bilinéaire stem:[f
      ( X "," " " Y ) = ( U * X ) ( V * Y )], où *stem:[X]* et *stem:[Y]* sont des
      vecteurs quelconques du même espace
  examples: []
  id: 102-03-41
  notes:
  - content: La forme bilinéaire peut être représentée par stem:[f (X , Y) = (sum_(i)
      U_(i) X_(i)) (sum_(j) V_(j) Y_(j)) = sum_(i j) U_(i) V_(j) X_(i) Y_(j)] en fonction
      des coordonnées des vecteurs. Le produit tensoriel est donc le tenseur de coordonnées
      stem:[T_(i j) = U_(i) V_(j)].
  - content: Le produit tensoriel est noté stem:[U ox V] ou stem:[U V].
