data:
  definition:
  - content: "aptitude à être en état de fonctionner tel que requis\r\nNote 1 à l’article:
      La disponibilité dépend conjointement des caractéristiques de fiabilité ({{192-01-24,
      urn:iec:std:iec:60050-192-01-24}}), de récupérabilité ({{192-01-25, urn:iec:std:iec:60050-192-01-25}})
      et de maintenabilité ({{192-01-27, urn:iec:std:iec:60050-192-01-27}}) de l’entité,
      ainsi que de l’efficacité de la logistique de maintenance ({{192-01-29, urn:iec:std:iec:60050-192-01-29}})."
