  definition:
  - content: an operation by means of energy stored in the mechanism itself prior
      to the completion of the operation and sufficient to complete it under predetermined
      conditions
  examples: []
  id: 441-16-15
  notes:
  - content: "This kind of operation may be subdivided according to:\r\n1. The manner
      of storing the energy (spring, weight, etc.);\n\n2. The origin of the energy
      (manual, electric, etc.);\n\n3. The manner of releasing the energy (manual,
      electric, etc.)."
