  examples: []
  id: 102-03-18
  notes:
  - content: 'Dans un espace à stem:[n] dimensions muni de vecteurs de base orthonormés,
      le produit hermitien de deux vecteurs *stem:[U]* et *stem:[V]* est la somme
      des produits de chaque coordonnée stem:[U_(i)] du vecteur *stem:[U]* par le
      conjugué de la coordonnée correspondante stem:[V_(i)] du vecteur *stem:[V]*:'
  - content: Pour deux vecteurs complexes ou deux grandeurs vectorielles complexes
      *stem:[U]* et *stem:[V]*, on peut selon l'application utiliser soit le produit
      hermitien stem:[U * V^(*)], soit un produit hermitien conjugué stem:[U^(*) *
      V]. Le produit hermitien stem:[U * U^(*)] ou stem:[U^(*) * U] est respectivement
      un scalaire réel ou une grandeur scalaire réelle.
  - content: Le produit hermitien est indiqué par un point à mi-hauteur (·) entre
      les deux symboles représentant l'un des vecteurs et le conjugué de l'autre.
