  definition:
  - content: effective radiance with the spectral radiance, stem:[L~λ~], spectrally
      weighted with the retinal thermal hazard spectral weighting function, stem:[r](stem:[λ])
  examples: []
  id: 845-26-050
  notes:
  - content: The wavelength range for "retinal thermal radiance" is the "{{retinal
      hazard spectral region, urn:iec:std:iec:60050-845-26-048}}".
  - content: This definition is based on the assumption that an action spectrum is
      adopted for the effect considered, and that its maximum value is 1.
  - content: It is essential to specify which action spectrum is used, as the unit
      is the same for any action spectrum.
  - content: The retinal thermal radiance is expressed in watt per square metre per
      steradian (W·m^−2^·sr^−1^).
