---
data:
  definition:
  - content: "représentation d'une {{grandeur intégrale, urn:iec:std:iec:60050-131-11-01}}
      sinusoïdale par une grandeur complexe dont l'argument est égal à la phase à
      l'origine et le module est égal à la {{valeur efficace, urn:iec:std:iec:60050-103-02-03}}\r\nNote
      1 à l’article: Pour une grandeur stem:[a ( t ) = hat(A) \"cos\" ( omega \" \"
      t + vartheta_(0) )] le phaseur est stem:[underline(A) = A \"exp\" ( rm(j) vartheta_(0)
      )], où stem:[A = frac(hat(A))(sqrt(2))] est la valeur efficace et stem:[vartheta_(0)]
      est la phase à l’origine. Un phaseur peut aussi être représenté graphiquement.\r\nNote
      2 à l’article: On utilise souvent le phaseur de courant électrique stem:[underline(I)]
      et le phaseur de tension électrique stem:[underline(U)]. \r\nNote 3 à l’article:
      La représentation semblable où le module est égal à l'amplitude est parfois
      aussi appelée «phaseur»."
