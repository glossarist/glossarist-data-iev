---
data:
  definition:
  - content: "{{unité, urn:iec:std:iec:60050-112-01-14}} de {{courant électrique,
      urn:iec:std:iec:60050-121-11-13}} du {{SI, urn:iec:std:iec:60050-112-02-02}},
      égale au courant électrique correspondant à l’écoulement de (1/1,602 176 634)
      × 10^19^ {{charges électriques élémentaires, urn:iec:std:iec:60050-113-05-16}}
      par {{seconde, urn:iec:std:iec:60050-112-02-04}}\r\nNote 1 à l’article: La définition
      donnée dans la Brochure sur le SI est la suivante: \"L’ampère, symbole A, est
      l’unité de courant électrique du SI. Il est défini en prenant la valeur numérique
      fixée de la charge élémentaire, stem:[e], égale à 1,602 176 634 × 10^−19^ lorsqu’elle
      est exprimée en C, unité égale à A s, la seconde étant définie en fonction de
      Δstem:[ν]~Cs~.\"\r\nNote 2 à l’article: La définition de l’ampère dans l'IEV
      112-02-07:2010-01 était: \"unité SI de courant électrique, égale au courant
      continu qui, maintenu constant dans deux conducteurs parallèles rectilignes,
      de longueur infinie et de section circulaire d'aire négligeable, placés à une
      distance de 1 mètre l’un de l’autre dans le vide, produirait entre ces conducteurs
      une force linéique égale à 2 × 10^−7^ N/m\". \r\r\nNote 3 à l’article: La nouvelle
      définition de l’ampère fixe la valeur de la charge élémentaire stem:[e] au lieu
      de la constante magnétique, stem:[μ]~0~. Par suite, la valeur de stem:[μ]~0~
      doit être déterminée expérimentalement.\r\nNote 4 à l’article: L’ampère est
      l’une des sept {{unités de base, urn:iec:std:iec:60050-112-01-18}} SI: {{seconde,
      urn:iec:std:iec:60050-112-02-04}} (s), {{mètre, urn:iec:std:iec:60050-112-02-05}}
      (m), {{kilogramme, urn:iec:std:iec:60050-112-02-06}} (kg), ampère (A), {{kelvin,
      urn:iec:std:iec:60050-112-02-08}} (K), {{mole, urn:iec:std:iec:60050-112-02-09}}
      (mol) et {{candela, urn:iec:std:iec:60050-112-02-10}} (cd)."
