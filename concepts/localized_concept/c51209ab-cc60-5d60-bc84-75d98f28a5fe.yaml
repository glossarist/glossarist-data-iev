---
data:
  definition:
  - content: dispositif à transmission régulière servant à modifier le niveau de flux
      absolu (énergétique ou lumineux), ou la {{répartition spectrale relative, urn:iec:std:iec:60050-845-21-030}},
      ou les deux, du rayonnement qui le traverse
  examples: []
  id: 845-24-113
  notes:
  - content: Une distinction est faite entre les filtres sélectifs et les filtres
      non sélectifs ou neutres selon qu'ils modifient ou non la répartition spectrale
      relative, du rayonnement. Un filtre sélectif qui modifie notablement la chromaticité
      du rayonnement est appelé filtre coloré; un filtre sélectif qui modifie la {{répartition
      spectrale, urn:iec:std:iec:60050-845-21-029}}, mais qui, par métamérisme, transmet
      un rayonnement dont la chromaticité est voisine de celle du rayonnement incident,
      peut être appelé filtre gris.
  - content: Cet article était numéroté 845-04-105 dans l'IEC 60050-845:1987.
