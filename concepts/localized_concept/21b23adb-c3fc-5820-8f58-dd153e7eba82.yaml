  definition:
  - content: for a uniform transmission line, load impedance for which the input impedance
      is equal to the load impedance
  examples: []
  id: 131-15-28
  notes:
  - content: For a symmetrical two-port network, this term may be applied to denote
      the common value assumed by the two image impedances and the two iterative impedances.
  - content: Another definition is given in IEC 60050-726 and the term has another
      meaning for free space in IEC 60050-705.
