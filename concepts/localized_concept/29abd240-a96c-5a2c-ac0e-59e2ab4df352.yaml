  definition:
  - content: |-
      cloudless sky for which the relative luminance distribution is given by the luminance gradation function, stem:[φ](stem:[Z]), which relates the luminance of a sky element to its zenith angle, stem:[Z]:stem:[phi ( Z ) = 1 - e^(frac(- 0,32)(cosZ))] if stem:["0" le Z "unicode[:&lt;]" frac(pi)(2)], and stem:[phi ( Z ) = 1]

      if stem:[Z "=" frac(pi)(2)] (at the horizon)
