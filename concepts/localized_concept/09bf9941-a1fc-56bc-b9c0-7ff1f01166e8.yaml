data:
  definition:
  - content: 'procédé de fabrication de fils supraconducteurs de Nb~3~Sn dans lequel
      un élément formé de poudre de Nb compactée est plongé dans un bain de Sn afin
      d’être infiltré par SnNote 1 à l’article: Le fil est alors formé par des procédés
      de réduction de section tels qu''étirage ou laminage. Un traitement thermique
      est ensuite appliqué pour obtenir les composés Nb~3~Sn. Note 2 à l’article:
      Un procédé similaire est utilisé pour les fils supraconducteurs de type Nb~3~Al.'
