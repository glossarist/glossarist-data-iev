data:
  definition:
  - content: "défaillance dont la probabilité d’occurrence augmente avec le temps
      par suite d’une détérioration cumulative\r\nNote 1 à l’article: Le vieillissement
      est un phénomène physique ou chimique impliquant des modifications des caractéristiques
      du matériau au fil du temps, liées dans certaines circonstances à une interaction
      avec son environnement. Note 2 à l’article: Dans certains cas, la distinction
      entre les phénomènes d’usure et de vieillissement peut s’avérer difficile."
