  definition:
  - content: logarithme du rapport de la valeur efficace d'une pression acoustique
      donnée à la valeur de la pression acoustique prise comme référence.
  examples: []
  id: 415-06-01
  notes:
  - content: Exprimé en décibels, le niveau de pression acoustique est égal à 20 fois
      le logarithme décimal de ce rapport
  - content: Pour les aérogénérateurs, la pression acoustique de référence est prise
      égale à 20 µPa.
