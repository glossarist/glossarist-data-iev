  definition:
  - content: square matrix *stem:[A]* for which the inverse *stem:[A]*^−1^ is equal
      to the transpose matrix *stem:[A]*^T^
  examples: []
  id: 102-06-26
  notes:
  - content: 'For an orthogonal matrix with elements stem:[A~ij~]: stem:[sum_(i) A_(i
      j) A_(i k) = delta_(j k)] and stem:[sum_(k) A_(i k) A_(j k) = delta_(i j)] where
      δ~stem:[jk]~ and δ~stem:[ij]~ are Kronecker deltas.'
