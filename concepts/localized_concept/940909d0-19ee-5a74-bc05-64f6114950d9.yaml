  id: 103-02-01
  notes:
  - content: The mean value of a periodic quantity is usually taken over an integration
      interval the range of which is the period multiplied by a natural number.
  - content: The mean value of the quantity stem:[x] may be denoted by stem:[bar(X)],
      by 〈stem:[X]〉, or by stem:[X]~a~. Subscripts ar, av and moy are also used.
  - content: The adjective "arithmetic" is only used to qualify the terms "mean" and
      "average" in order to distinguish them from the terms "geometric mean" and "geometric
      average", as well from "harmonic mean" and "harmonic average".
  - content: The mean value can be generalized for a function of stem:[n] variables,
      e.g. with a surface integral or an integral over a three-dimensional domain
      divided by the corresponding area or volume. See the examples in IEC 60050-102.
