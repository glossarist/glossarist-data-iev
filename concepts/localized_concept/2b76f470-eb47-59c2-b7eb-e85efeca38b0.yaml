  definition:
  - content: 'functional unit that generates the manipulated variable, required to
      drive the final controlling element, from the output variable of the controlling
      element SEE: Figures 1 and 2.'
  examples:
  - content: A practical example of an actuator acting directly on the final controlling
      element is a DC drive. The control unit takes the function of an actuator. The
      final controlling element is formed by the thyristor assembly that delivers
      a variable DC voltage as an output variable. The control unit and the thyristor
      assembly together form the final controlling equipment.
  id: 351-49-07
  notes:
  - content: If the final controlling element is mechanically actuated, it is controlled
      via an actuating drive. The actuator drives the actuating drive in this case.
  - content: This entry was numbered 351-28-07 in IEC 60050-351:2006.image::/assets/images/parts/351/351-fig1-en.png[Figure
