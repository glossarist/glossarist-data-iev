  definition:
  - content: "grandeur sans dimension définie pour une fibre optique par la formule:\r\nstem:[V
      = frac(2 pi a)(lambda) (n_(1)^(2) - n_(2)^(2))^(1 / 2)] \r\noù:\n\nstem:[a]
      est le rayon du coeur,\n\nstem:[λ] est la longueur d'onde dans le vide,\n\nstem:[n]~1~
      est l'indice de réfraction maximal dans le coeur,\n\nstem:[n]~2~ est l'indice
      de réfraction de la gaine homogène la plus interne"
