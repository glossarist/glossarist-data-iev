  definition:
  - content: any variable physical phenomenon apparently not conveying information
      and which may be superimposed on, or combined with, a wanted signal
  examples: []
  id: 702-08-03
  notes:
  - content: In certain cases a noise may convey information on some characteristics
      of its source, for example its nature and location.
  - content: An aggregate of signals may appear as noise, when they are not separately
      identifiable.
