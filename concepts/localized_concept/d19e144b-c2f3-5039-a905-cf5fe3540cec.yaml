  definition:
  - content: "scalar or tensor quantity the product of which by the magnetic field
      strength *stem:[H]* is equal to the magnetization *stem:[M]* \r\n*stem:[M]*
      = stem:[κ]*stem:[H]*"
  examples: []
  id: 815-17-11
  notes:
  - content: In an isotropic medium the magnetic susceptibility is a scalar, and in
      an anisotropic medium it is a tensor.
  - content: In some literature, the symbol stem:[χ]~m~ (rather than stem:[κ]) is
      used for the "magnetic susceptibility".
