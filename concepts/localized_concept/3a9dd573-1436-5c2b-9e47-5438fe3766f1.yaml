  definition:
  - content: "designation of an insulating material or system by a number that is
      equal to the numerical value of the Celsius maximum temperature\r\nexpressed
      in degrees Celsius for which the material or system is appropriate in normal
      use"
  examples: []
  id: 212-12-31
  notes:
  - content: It may be necessary to assign different thermal classes to the same material
      or system for different service conditions.
  - content: The description of  an electrotechnical product as being of a particular
      thermal class does not mean, and must not be taken to imply that each insulating
      material used in its construction is of the same thermal capability.
