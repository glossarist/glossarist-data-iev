  definition:
  - content: "for a radionuclide emitting photons, the quotient of stem:[l^(2) overset(˙)(K)_(delta)]
      by stem:[A], where stem:[K~δ~] is the air kerma-rate due to photons of energy
      greater than δ, at a distance 1 from a point source of this nuclide having an
      activity stem:[A]\r\nstem:[Gamma_(delta) = frac(l^(2) overset(˙)(K)_(delta))(A)]"
  examples: []
  id: 881-04-53
  notes:
  - content: "The SI unit of air kerma-rate constant is m^2^ • J • kg^−1^.\r\nWhen
      the special names gray (Gy) and becquerel (Bq) are used m^2^ • J • kg^−1^ becomes
      m^2^ • Gy • Bq^−1^ • s^−1^.\r\nWhen the earlier special units of activity (the
      curie) and kerma (the rad) are used\n\nstem:[1 \" \" \" \" \" \" \"rad\" * \"
      m\"^(2) * \"Ci\"^(- 1) * \"s\"^(- 1) = frac(10^(- 12))(3,7) \" \" \"m\"^(2)
      * \"J\" * \"kg\"^(- 1) (\"exactly\")]"
  terms:
  - type: expression
    normative_status: preferred
    designation: air kerma-rate constant
  - type: symbol
    designation: stem:[Γ~δ~]
