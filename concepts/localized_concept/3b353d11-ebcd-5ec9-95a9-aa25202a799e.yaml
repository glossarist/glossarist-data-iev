  notes:
  - content: Le terme "rendement énergétique de photoluminescence" est aussi utilisé
      pour le phénomène élémentaire avec une signification semblable, à savoir le
      quotient de l'énergie du photon émis par l'énergie du photon absorbé qui lui
      a donné naissance.
