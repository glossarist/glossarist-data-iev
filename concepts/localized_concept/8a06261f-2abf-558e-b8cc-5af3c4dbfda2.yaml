  definition:
  - content: luminous intensity of a source that has a constant output, of the same
      {{relative spectral distribution, urn:iec:std:iec:60050-845-21-030}} as the
      flashing light, which would have the same {{luminous range, urn:iec:std:iec:60050-845-31-026}}
      (or {{visual range, urn:iec:std:iec:60050-845-31-052}} in aviation terminology)
      as the flashing light under identical conditions of observation
  examples: []
  id: 845-31-016
  notes:
  - content: For practical purposes, a conventional effective intensity can be evaluated
      for a flashing light from photometric data by an agreed method.
  - content: The effective intensity is expressed in candela (cd).
