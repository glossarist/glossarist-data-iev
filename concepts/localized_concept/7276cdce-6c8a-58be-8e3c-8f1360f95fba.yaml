  definition:
  - content: for wave propagation which originates from a source ending at a given
      instant, the surface separating that region of space presently affected by the
      wave from that portion which is no longer affected significantly by the wave
  examples: []
  id: 705-01-06
  notes:
  - content: If propagation takes place along a surface or a line, the wavefront is
      defined respectively by a line or a point.
