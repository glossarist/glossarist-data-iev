---
data:
  definition:
  - content: "procédé de création d'une microstructure qui peut être utilisé en tant
      que moule en utilisant la lithographie profonde, basé sur des rayons X suivi
      d'un électroformage\r\nNote 1 à l’article: Le terme abrégé \"LIGA\" est dérivé
      du terme allemand développé correspondant \"Lithographie, Galvanoformung und
      Abformung\", signifiant lithographie, {{électroformage, urn:iec:std:iec:60050-523-05-17}}
      et moulage. Les caractéristiques du procédé LIGA incluent la capacité de produire
      en masse des microstructures à {{rapport largeur/longueur, urn:iec:std:iec:60050-523-07-04}}
      élevé, avec une largeur de trait de 1 µm à 10 µm et une hauteur de plusieurs
      centaines de micromètres, l’utilisation potentielle d’une large gamme de matériaux,
      y compris le plastique, les métaux et la céramique, et la combinaison possible
      avec les éléments à {{semiconducteurs, urn:iec:std:iec:60050-521-02-01}} de
      silicium, etc."
