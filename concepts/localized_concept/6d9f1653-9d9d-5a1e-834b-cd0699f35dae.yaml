  definition:
  - content: rapport, généralement exprimé en décibels, de la puissance de la porteuse
      d'un signal utile à la puissance du bruit radioélectrique, évalué dans des conditions
      déterminées, à l'entrée du récepteur
  examples: []
  id: 713-11-21
  notes:
  - content: "Les conditions déterminées comprennent entre autres: \r\n– la nature
      et les caractéristiques du bruit radioélectrique, \r\n– la largeur de bande
      dans laquelle on évalue le bruit."
