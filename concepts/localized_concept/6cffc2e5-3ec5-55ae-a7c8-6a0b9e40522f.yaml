  definition:
  - content: les deux positions de part et d'autre d'un noeud, le long d'une ligne
      de mesure fendue, dans lesquelles la puissance extraite par la sonde de couplage
      est le double de celle extraite à ce noeud
  examples: []
  id: 726-19-09
  notes:
  - content: Afin de mesurer avec plus de précision un rapport d'onde stationnaire
      très élevé, le point milieu entre ces deux points est utilisé pour déterminer
      la position exacte du minimum, et le rapport d'onde stationnaire est déduit
      de la distance entre ces deux points.
  terms:
