  definition:
  - content: "one of the following two quotients:\r\na) for transduction of an electric
      signal into an acoustic signal, quotient of the resulting sound pressure in
      the blocked acoustical system by the excitation voltage in the electrical system;\r\nb)
      for transduction of an acoustic signal into an electric signal, quotient of
      the resulting short-circuit current in the electrical system by the excitation
      volume velocity in the acoustical system"
  examples: []
  id: 801-25-49
  notes:
  - content: These definitions are best applied to a reciprocal electroacoustic transducer
      with transformer coupling, for example an electrostatic or piezoelectric transducer,
      in which case the two quotients have equal magnitude.
  terms:
  - type: expression
    normative_status: preferred
    designation: electroacoustic coupling coefficient (2)
