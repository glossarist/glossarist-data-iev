---
data:
  definition:
  - content: fourniture d'une affirmation, basée sur une décision qui fait suite à
      la {{revue, urn:iec:std:iec:60050-902-04-01}}, démontrant que des {{exigences
      spécifiées, urn:iec:std:iec:60050-902-02-01}} sont respectées
  examples: []
  id: 902-04-02
  notes:
  - content: L'affirmation qui en résulte, désignée dans l'ISO/CEI 17000 sous le nom
      de «déclaration de conformité», donne l'assurance que les exigences spécifiées
      ont été respectées. Une telle assurance ne procure, en soi, aucune garantie
      contractuelle, juridique ou autre.
  - content: Les activités d'attestation de la conformité par première et tierce partie
      se distinguent par les termes donnés en {{902-04-04, urn:iec:std:iec:60050-902-04-04}}
      à {{902-04-06, urn:iec:std:iec:60050-902-04-06}}. Pour l'attestation de la conformité
      par seconde partie, aucun terme particulier n'est disponible.
