data:
  definition:
  - content: 'activités qui utilisent une idée ou une {{exigence, urn:iec:std:iec:60050-901-05-05}}
      et la transforment en un produit Note 1 à l’article: Le {{processus, urn:iec:std:iec:60050-904-01-05}}
      de conception et de développement suit généralement une série d’étapes définies
      qui commencent avec une idée de départ et transforment celle-ci en une spécification
      formalisée débouchant sur la création d’un prototype de travail et sur la documentation
      nécessaire pour permettre la production des biens ou la fourniture du service.'
