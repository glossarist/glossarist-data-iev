  definition:
  - content: set of sudden, small, irregular departures from the ideal value of a
      characteristic of a {{signal, urn:iec:std:iec:60050-101-12-02}}, such as the
      position in time, {{pulse duration, urn:iec:std:iec:60050-702-03-04}} or magnitude
  examples: []
  id: 702-07-74
  notes:
  - content: A definition of "jitter" specific to digital signals is given in {{IEV
      704-16-13, urn:iec:std:iec:60050-704-16-13}}.
  - content: In English, the term "jitter" has different meanings in the fields of
      television (see {{IEV 723-06-09, urn:iec:std:iec:60050-723-06-09}}) and video
      technology (see {{IEV 806-17-23, urn:iec:std:iec:60050-806-17-23}}).
  - content: In French, the term "gigue" has a different meaning in television (see
      {{IEV 723-06-11, urn:iec:std:iec:60050-723-06-11}}).
