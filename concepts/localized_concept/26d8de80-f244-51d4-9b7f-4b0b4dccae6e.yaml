  definition:
  - content: vector quantity with magnitude equal to the heat flow rate dstem:[Φ]
      through a surface element divided by the area dstem:[A] of the element, and
      direction *stem:[e]*~stem:[φ]~ in the direction of propagation of heat, thus
      stem:[phi = frac(d Phi)(d A) e_(phi)]
  examples: []
  id: 113-04-37
  notes:
  - content: At a fixed point in a medium, the direction of propagation of heat is
      opposite to the temperature gradient. At a point on the surface separating two
      media with different temperatures, the direction of propagation of heat is normal
      to the surface, from higher to lower temperatures.
  - content: The coherent SI unit of density of heat flux rate is watt per square
      metre, W/m^2^.
  terms:
