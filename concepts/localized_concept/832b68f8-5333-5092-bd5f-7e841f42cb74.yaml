  definition:
  - content: ratio expressed in decibels, of a wanted signal voltage to the noise
      voltage at the output of a tape recorder
  examples: []
  id: 806-16-22
  notes:
  - content: The signal output voltage is expressed with respect to a given amount
      of harmonic distortion, obtained by recording a specified frequency signal on
      a specified recording medium.
  - content: The noise voltage is measured, weighted or unweighted in the absence
      of a wanted signal.
  terms:
  - type: expression
    normative_status: preferred
    designation: signal-to-noise ratio of a tape recorder
