  definition:
  - content: 'control structure with interconnected subprocesses in which each partial
      control equipment takes into account only the information from its associated
      subprocess to form its output information SEE: Figure 24.'
  examples: []
  id: 351-55-10
  notes:
  - content: A compact process computer system realises decentralized control structures
      if simple controllers are used for every control loop, without taking into consideration
      any links between subprocesses.
  - content: This entry was numbered 351-31-10 in IEC 60050-351:2006.
