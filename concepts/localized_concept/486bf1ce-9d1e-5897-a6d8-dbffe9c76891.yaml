  definition:
  - content: a single, comprehensive procedure for the evaluation of the radiation
      hazards incidental to the production, use, release, disposal, or existence of
      radioactive materials or other sources of radiation under a specific set of
      conditions
  examples: []
  id: 881-16-01
  notes:
  - content: "Such evaluation customarily includes:\r\n— a physical survey of the
      disposition of materials, equipment, and barriers;\n\n— measurements or estimates
      of the levels of radiation that may be involved;\n\n— a sufficient knowledge
      of processes using or affecting these materials to estimate dose equivalents
      resulting from expected or possible changes in materials, equipment, production
      processes, and modes of operation."
  terms:
  - type: expression
    normative_status: preferred
    designation: protection survey
  - type: expression
