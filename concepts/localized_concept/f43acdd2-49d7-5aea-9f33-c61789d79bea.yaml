---
data:
  definition:
  - content: interface particulière d'un matériel qui assure son couplage avec l'environnement
      électromagnétique ({{161-01-01, urn:iec:std:iec:60050-161-01-01}}) extérieur
      et à travers laquelle il est influencé par cet environnement
  examples:
  - content: "Des exemples d’accès présentant un intérêt sont indiqués à la Figure
      1. L’accès d'enveloppe est la frontière physique de l’appareil (par exemple
      l’enveloppe). L’accès d'enveloppe concerne le transfert d’énergie par rayonnement
      et par décharges électrostatiques ({{161-01-22, urn:iec:std:iec:60050-161-01-22}}),
      alors que les autres accès concernent  le transfert d’énergie par conduction.\r\nimage::/assets/images/parts/161/acec-guide107_2009_f1_fr.png[]\r\n*Figure
      1 – Exemples d’accès*"
  id: 161-01-27
  notes:
