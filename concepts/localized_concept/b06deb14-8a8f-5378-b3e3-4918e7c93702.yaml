  definition:
  - content: mean value of the {{information content, urn:iec:std:iec:60050-171-07-14}}
      of the events in a finite set of mutually exclusive and jointly exhaustive events
      stem:[H = sum_(i = 1)^(n) p ( x_(i) ) * I ( x_(i) ) = sum_(i = 1)^(n) p ( x_(i)
      ) * log ( frac(1)(p ( x_(i) )) )] where stem:[X = {x_(1) , " " ... , " " x_(n)}]
      is the set of events stem:[x_(i) " " (i = 1, " " ... , " " n)], stem:[I ( x_(i)
      )] are their information contents and stem:[p ( x_(i) )] the probabilities of
      their occurrences, subject to stem:[sum_(i = 1)^(n) p ( x_(i) ) = 1]
  examples:
  - content: Let stem:[{a , b , c}] be a set of three events and let stem:[p ( a )
      = 0,5], stem:[p ( b ) = 0,25] and stem:[p ( c ) = 0,25] be the probabilities
      of their occurrences. The entropy of this set is stem:[H ( X ) = p ( a ) * I
      ( a ) + p ( b ) * I ( b ) + p ( c ) * I ( c ) = 1,5 " " Sh].
