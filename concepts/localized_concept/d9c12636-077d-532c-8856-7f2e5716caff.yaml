  definition:
  - content: for a substance within a domain, vector quantity equal to the vector
      sum of the magnetic area moments of all elementary magnetic dipoles included
      in the domain
  examples: []
  id: 121-11-50
  notes:
  - content: |-
      The magnetic area moment of an element of substance within a domain V is the volume integral of the magnetization stem:[*M*]:

      stem:[m = int_("V") M " " "d" V]
