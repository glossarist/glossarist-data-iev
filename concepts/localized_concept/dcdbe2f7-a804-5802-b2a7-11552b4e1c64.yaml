  definition:
  - content: 'partie d’un {{réseau d’énergie électrique, urn:iec:std:iec:60050-692-01-02}}
      qui est déconnectée électriquement du reste du {{réseau d’énergie électrique,
      urn:iec:std:iec:60050-692-01-02}} interconnecté, mais reste sous tension à partir
      de sources locales d’énergie électriqueNote 1 à l’article: Un réseau séparé
      peut résulter de l’action de protections automatiques ou d’une action délibérée.
      Note 2 à l’article: Un réseau séparé peut être stable ou instable.'
