data:
  definition:
  - content: chambre d’ionisation utilisant un dépôt sensible de matières susceptible
      de fissionner pour détecter les neutrons
  examples: []
  id: 395-03-12
  notes:
  - content: L’ionisation initiale est due aux fragments de fission produits par réaction
      nucléaire des neutrons sur la matière fissionnable.
  - content: Suivant la nature du dépôt, il est possible de détecter les neutrons
      thermiques, les neutrons rapides ou tous les neutrons.
  - content: Voir les définitions de nucléide fissile (CEI 60050-393:2003, 393-11-26)
      et nucléidefissionnable (CEI 60050-393:2003, 393-11-28).
  - content: Cet article était numéroté 394-25-10 dans la CEI 60050-394:2007.
