  definition:
  - content: time integral of the voltage stem:[u]~AB~ ({{131-11-56, urn:iec:std:iec:60050-131-11-56}})
      between two terminals A and B of a two-terminal or stem:[n]-terminal element  stem:[Psi
      ( t ) = int_(t_(0))^(t) u_(rm(AB)) ( tau ) "d" tau] where stem:[t]~0~ is any
      instant before the first supply of electric energy
  examples: []
  id: 131-12-17
  notes:
  - content: The concept is only useful in the case of an inductive element.
  - content: The definition of linked flux in circuit theory is consistent with the
      more general definition {{121-11-24, urn:iec:std:iec:60050-121-11-24}} given
      in electromagnetism. The linked flux in circuit theory is described by inverting
      the procedure for calculating induced voltage ({{121-11-28, urn:iec:std:iec:60050-121-11-28}}).
