  definition:
  - content: mean per {{character, urn:iec:std:iec:60050-702-05-10}} of the {{mean
      transinformation content, urn:iec:std:iec:60050-171-07-27}} for all possible
      messages from a {{stationary message source, urn:iec:std:iec:60050-171-07-09}}
      stem:[T^(prime) = underset(m vec oo)(lim) frac(T_(m))(m)] where stem:[T~m~]
      is the mean transinformation content for all pairs of corresponding input and
      output sequences of stem:[m] characters each
