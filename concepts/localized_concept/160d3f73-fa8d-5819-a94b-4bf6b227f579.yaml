  definition:
  - content: phenomenon where the time interval between the first and the following
      pulse is too short to allow the counting system to respond correctly to either
      pulse
  examples: []
  id: 395-03-108
  notes:
  - content: Pile-up will result in deterioration of resolution and may cause significant
      error.
  - content: Modern systems can automatically detect and reject significant fractions
      of the piled up pulses.
  - content: This entry was numbered 394-39-14 in IEC 60050-394:2007.
