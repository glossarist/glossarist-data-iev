  definition:
  - content: electric discharge that only partially bridges the insulation between
      conductors
  examples: []
  id: 212-11-39
  notes:
  - content: A partial discharge may occur inside the insulation or adjacent to a
      conductor.
  - content: Scintillations of low energy on the surface of insulating materials are
      often described as partial discharges but should rather be considered as disruptive
      discharges of low energy, since they are the result of local dielectric breakdowns
      of high ionization density, or small arcs, according to the conventions of physics.
