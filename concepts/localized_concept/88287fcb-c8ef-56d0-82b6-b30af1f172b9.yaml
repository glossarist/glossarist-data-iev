---
data:
  definition:
  - content: vecteur réel tangent à une courbe orientée donnée en un point donné,
      dont la norme est la valeur absolue de l'élément scalaire d'arc au point donné
      et dont la direction correspond à l'orientation de la courbe
  examples: []
  id: 102-05-02
  notes:
  - content: Un élément vectoriel d'arc est désigné de préférence par stem:[e_("t")
      rm(d) s] ou par stem:[rm(d) r], ou parfois par stem:[t rm(d) s], où stem:[e_("t")
      = t] est un vecteur unité tangent à la courbe, stem:[rm(d) s] un élément scalaire
      d'arc, stem:[rm(d) r] la différentielle du rayon vecteur *stem:[r]* décrivant
      la courbe par rapport à un point origine.
