  definition:
  - content: quotient of the {{spectral distribution, urn:iec:std:iec:60050-845-21-029}}
      of radiance due to fluorescence at wavelength stem:[λ] and the sum of the tabulated
      values of this distribution across the fluorescence band
  examples: []
  id: 845-21-031
  notes:
  - content: Fluorescence is understood to include both fluorescent and phosphorescent
      phenomena with time constants short enough to be ignored for the application.
  - content: The relative spectral fluorescence distribution, stem:[F](stem:[λ]),
      when multiplied by the spectral external radiant efficiency of the fluorescent
      specimen, stem:[Q], for excitation at wavelength, stem:[μ], gives the bispectral
      luminescent radiance factor, stem:[β]~L,~stem:[~λ~](stem:[μ]), of a {{photoluminescent
      material, urn:iec:std:iec:60050-845-24-040}} according to:stem:[β]~L,~stem:[~λ~](stem:[μ]) =
      stem:[F](stem:[λ])·stem:[Q](stem:[μ])
  - content: The relative spectral fluorescence distribution has unit one.
