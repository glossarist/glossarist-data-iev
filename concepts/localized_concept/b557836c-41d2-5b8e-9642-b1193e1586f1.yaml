---
data:
  definition:
  - content: "{{lampe à décharge à haute intensité, urn:iec:std:iec:60050-845-27-027}}
      dans laquelle la lumière est surtout produite, directement ou indirectement,
      par le rayonnement du mercure dont la pression partielle, pendant le fonctionnement,
      est supérieure à 100 kPa"
  examples: []
  id: 845-27-028
  notes:
  - content: Le terme "lampe à mercure à haute pression" inclut les lampes à ampoule
      claire, les lampes à ballon fluorescent et les {{lampes à lumière mixte, urn:iec:std:iec:60050-845-27-029}}.
      Dans une lampe à décharge à ballon fluorescent, la lumière est produite en partie
      par la vapeur de mercure et en partie par une couche de substance luminescente
      excitée par le {{rayonnement ultraviolet, urn:iec:std:iec:60050-845-21-008}}
      de la décharge.
  - content: Cet article était numéroté 845-07-20 dans l'IEC 60050-845:1987.
