      longueur de référence est utilisée, qui est stem:[k] fois plus grande que la
      longueur de référence initiale, la valeur de stem:[alpha_("i" ",o")^(() lambda
      ) = 1 - tau_("i" ",o") ( lambda )] devient alors stem:[alpha^(prime)_("i" ",o")^(()
      lambda ) = 1 - &amp;lsqb; tau_("i" ",o") ( lambda ) &amp;rsqb;^(k)]
  - content: L'unité d'absorptivité spectrale est un.
