  definition:
  - content: 'structure de commande avec des sous-processus interconnectés, dans lesquels
      chaque équipement de commande partiel prend en compte les informations de son
      sous-processus associé, pour constituer ses informations de sortie VOIR: Figure
      24.Note 1 à l’article: Un système à calculateur de processus compact constitue
      des structures de commande décentralisées si des régulateurs uniques sont utilisés
      pour chaque boucle d''asservissement, sans prendre en compte les liens entre
      les sous-processus.'
