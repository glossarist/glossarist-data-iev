  definition:
  - content: the time required, following a sudden change in operating conditions,
      for the slowly changing component of the open-circuit armature winding voltage
      which is due to quadrature-axis flux, to decrease to 1/e, that is 0,368 of its
      initial value, the machine running at rated speed
