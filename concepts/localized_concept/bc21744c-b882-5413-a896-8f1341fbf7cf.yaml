  definition:
  - content: "совокупность элементов, состоящих из:\r\n-  одной или нескольких изолированных
      жил;\r\n-  их индивидуальных экранов (если есть);\r\n-  поясной изоляции, экрана,
      оболочки (если есть);\r\n-  защитного покрова (ов) (если есть).\r\nВ конструкцию
      кабеля может быть включена дополнительная неизолированная жила(ы)"
