  - content: "état ne permettant pas de fonctionner tel que requis, pour quelque raison
      que ce soit\r\nNote 1 à l’article: L’adjectif «incapable» qualifie une entité
      se trouvant dans un état d’incapacité. Note 2 à l’article: Le terme «interruption»
      est déconseillé dans ce sens car il est synonyme de temps d’incapacité ({{192-02-19,
      urn:iec:std:iec:60050-192-02-19}})."
