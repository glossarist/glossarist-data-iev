  definition:
  - content: unit of measurement obtained by dividing a given measurement unit by
      an integer greater than one
  examples: []
  id: 112-01-25
  notes:
  - content: The millimetre (mm) is a decimal submultiple of the metre (m). For plane
      angle, the second (") is a non-decimal submultiple of the minute (').
  - content: Submultiples of a unit are often named by adding a unit prefix to the
      name of the unit.
