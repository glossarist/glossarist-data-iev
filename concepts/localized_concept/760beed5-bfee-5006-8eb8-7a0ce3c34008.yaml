  definition:
  - content: ability of an electric power system to operate in such a way that credible
      events do not give rise to loss of load, stresses of system components beyond
      their ratings, bus voltages or system frequency outside tolerances, instability,
      voltage collapse, or cascading
  examples: []
  id: 617-01-02
  notes:
  - content: This ability may be measured by one or several appropriate indices.
  - content: This concept is normally applied to bulk power systems.
  - content: In North America, this concept is usually defined with reference to instability,
      voltage collapse and cascading only.
