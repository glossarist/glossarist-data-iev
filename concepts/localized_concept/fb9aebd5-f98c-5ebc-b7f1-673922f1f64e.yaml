  definition:
  - content: 'ensemble de {{processus, urn:iec:std:iec:60050-904-01-05}} qui spécifient
      les besoins en données, les exigences ou limites de programmes ou projets et
      qui servent de critères pour sélectionner les méthodes appropriées permettant
      de répondre à ces besoins de manière économique Note 1 à l’article: Les critères
      peuvent être publiés dans des {{règlements, urn:iec:std:iec:60050-901-02-10}},
      des documents d''instructions techniques, des autorisations, des plans de travail
      ou des ordonnances d''exécution.'
