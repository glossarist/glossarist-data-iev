  definition:
  - content: perpendicularly penetrating electro interconnection between both surfaces
      of a silicon {{substrate, urn:iec:std:iec:60050-521-05-28}}
  examples: []
  id: 523-06-08
  notes:
  - content: Through-silicon-vias are mainly applied to three-dimensionally stacked
      {{packaging, urn:iec:std:iec:60050-523-06-06}} of {{semiconductor devices, urn:iec:std:iec:60050-521-04-01}}.
      In the MEMS fields, the through-silicon-vias are applied to {{wafer level packaging,
      urn:iec:std:iec:60050-523-06-07}} technology. Some through-silicon-vias consist
      of through-via, insulator and {{electrode, urn:iec:std:iec:60050-151-13-01}}
      material. Solder, copper, doped-poly-silicon and so on are used as electrode
      materials.
  - content: This note applies to the French language only.
