---
data:
  definition:
  - content: "confirmation par des preuves tangibles que les exigences spécifiées
      ont été satisfaites\r\nNote 1 à l’article: Le terme «vérifié» qualifie l’état
      correspondant. Note 2 à l’article: La vérification de conception est l’application
      d’essais et d’évaluations afin d’estimer la conformité aux exigences spécifiées.
      Note 3 à l’article: Dans le cas des logiciels, la vérification est menée à différents
      stades du développement, en examinant le logiciel et ses composants afin de
      déterminer la conformité aux exigences spécifiées au début de ce stade."
