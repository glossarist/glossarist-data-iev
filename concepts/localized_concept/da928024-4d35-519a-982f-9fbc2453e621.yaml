  definition:
  - content: commande émanant d'un poste de conduite et donnant une instruction type
      aux agents de service de la salle de commande d'un poste comportant un personnel
      de conduite
  examples:
  - content: '"Mettre en marche les groupes" ou "Régler la puissance fournie par le
      groupe à ... MW".'
  id: 371-03-17
  notes:
  - content: La commande d'instruction se distingue des instructions transmises par
      les moyens non spécialisés de télécommunication (téléimprimeur d'un réseau télex
      par exemple) par le fait qu'elle est transmise par l'intermédiaire des dispositifs
      utilisés à d'autres fins dans les réseaux de téléconduite, et qu'elle doit donc
      être programmée d'une façon semblable aux autres types de commande.
