  definition:
  - content: différence de phase entre les composantes fondamentales de l'induction
      magnétique et du champ magnétique
  examples: []
  id: 221-03-28
  notes:
  - content: Lorsqu'une différence de phase peut être associée aux pertes par courants
      de Foucault, aux pertes par hystérésis ou aux pertes résiduelles, l'angle de
      pertes peut être représenté par stem:[δ]~F~ pour les pertes par courant de Foucault,
      stem:[δ]~h~ pour les pertes par hystérésis et stem:[δ]~r~ pour les pertes résiduelles.
  - content: "La tangente de l'angle de perte est fréquemment utilisée pour exprimer
      les pertes dans un matériau magnétique:\r\nstem:[\"tan\" \" \" \" \" delta_(\"m\")
      = frac(mu^(dprime))(mu^(prime))]\n\noù stem:[µ]′ et stem:[µ]″ sont respectivement
      la partie réelle et la partie imaginaire de la perméabilité complexe (symb.:
      stem:[<u>µ</u>])."
