data:
  definition:
  - content: évaluation qualitative ou quantitative des mouvements de caisse et de
      bogie d'un véhicule circulant en ligne
  examples: []
  id: 811-08-01
  notes:
  - content: La caisse et les bogies d'un véhicule en marche peuvent être animés de
      mouvements perturbateurs, en translation et en rotation, définis à l'aide d'un
      repère trirectangulaire lié à la voie, dont les axes sont respectivement parallèle
      aux rails (sens longitudinal), perpendiculaire aux rails dans le plan horizontal
      (sens transversal) et perpendiculaire au plan de roulement (sens dit vertical).
