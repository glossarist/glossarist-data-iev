  definition:
  - content: "vecteur complexe stem:[vec(underline(K)) = vec(K^(prime)) + \"j\" vec(K^(dprime))]
      caractérisant une onde électromagnétique sinusoïdale en un point lorsque chacun
      des vecteurs du champ électromagnétique peut être représenté, dans un domaine
      au voisinage de ce point, par une expression de la forme:\n\nstem:[vec(underline(V)_(\"i\"))
      = vec(underline(V)_(\"oi\")) \" \" \"e\"^(\"j\" (omega t - vec(underline(K))
      * vec(r)))]\r\ndans laquelle:\r\n- les vecteurs stem:[vec(underline(V)_(\"oi\"))
      \" \"], généralement complexes, sont indépendants du temps et pratiquement constants
      dans le domaine considéré,\n\n- le vecteur stem:[vec(underline(K))] est pratiquement
      constant dans le domaine considéré,\n\n- stem:[ω] est la pulsation,\n\n- stem:[t]
      est le temps,\n\n- stem:[vec(r)] est le vecteur joignant l'origine des coordonnées
      au point considéré du domaine"
  examples: []
  id: 705-01-28
  notes:
  - content: Si l'onde peut être caractérisée en chaque point d'un domaine par un
      vecteur d'onde, il existe une surface d'onde passant par ce point et normale
      à la partie réelle stem:[vec(K^(prime))] du vecteur d'onde. La norme de stem:[vec(underline(K))]
      est le quotient de 2π par la longueur d'onde
  - content: L'onde est à polarisation elliptique si la partie imaginaire de chaque
      vecteur stem:[vec(underline(V)_("oi")) " "] n'est ni nulle ni colinéaire à sa
      partie réelle, elle est à polarisation rectiligne dans les autres cas.
