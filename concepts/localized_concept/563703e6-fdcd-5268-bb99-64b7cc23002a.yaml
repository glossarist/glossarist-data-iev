  definition:
  - content: visual signal that emanates from a light source
  examples: []
  id: 845-31-148
  notes:
  - content: A light signal can be a reflected image of the light source, for example
      the use of heliographs.
  - content: The term "light signal" is sometimes used for an object or apparatus
      that emits a light signal, but this usage is not recommended (see "signal light").
