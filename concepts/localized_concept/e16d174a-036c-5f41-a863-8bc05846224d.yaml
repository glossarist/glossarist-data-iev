  definition:
  - content: law relating the illuminance, stem:[E], on a real or imaginary surface
      to the luminous intensity, stem:[I], of an illuminating {{point source, urn:iec:std:iec:60050-845-21-033}}
      wherebystem:[E = frac(I costheta)(d^(2))]where stem:[θ] is the angle between
      the normal to the surface and the line between the surface and the source and
      stem:[d] is the distance between the source and the surface
  examples: []
  id: 845-25-104
  notes:
  - content: The photometric distance law strictly only applies for a point source.
      However, it can also be applied for non-point sources at sufficiently large
      distances within acceptable limits of error or measurement uncertainty; in this
      case the degree of approximation at the distance used should be confirmed by
      measurement.
  - content: For radiometric sources the equivalent term is "radiometric distance
      law".
  terms:
