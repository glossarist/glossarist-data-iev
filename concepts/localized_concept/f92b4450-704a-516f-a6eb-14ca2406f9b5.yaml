data:
  definition:
  - content: autorisation écrite de l'organisme d'acceptation attestant que le dossier
      de compatibilité est acceptable pour autoriser la mise en service de nouveaux
      systèmes ou de systèmes modifiés
  examples: []
  id: 821-03-46
  notes:
  - content: 'Il convient que les relations avec la législation soient déterminées
      au niveau national.Note 2 à l’article: L’utilisation du terme "certificat d’acceptation"
      avec cette signification est particulière à la pratique actuelle dans le domaine
      ferroviaire. Le terme équivalent dans un autre domaine/secteur pourrait être
      "déclaration d’acceptation".'
