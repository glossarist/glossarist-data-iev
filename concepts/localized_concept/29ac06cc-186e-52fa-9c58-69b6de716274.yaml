---
data:
  definition:
  - content: "production ou reproduction par dépôt électrolytique sur un mandrin ou
      un moule d'un article qui est ensuite séparé de son support\r\nNote 1 à l’article:
      Une résine ou une autre matrice est rendue conductrice par placage autocatalytique,
      et est utilisée comme une cathode pour déposer par électrolyse le métal souhaité,
      en couche épaisse et rapidement. Le produit est obtenu en libérant le métal
      de la matrice. La méthode d'électroformage est utilisée dans la fabrication
      de matrices pour les disques compacts et les disques laser, car la forme et
      la rugosité de surface de la matrice sont reproduites précisément."
