  definition:
  - content: "a criterion which characterizes the degree of roughness of a surface,
      for a given grazing angle of an electromagnetic wave according to the value
      of the quantity:\r\nstem:[frac(h sintheta)(lambda)]\n\nwhere\n\nstem:[h] is
      the average height of the surface irregularities,\n\nstem:[θ] is the grazing
      angle relative to the average surface,\n\nstem:[λ] is the wavelength"
  examples: []
  id: 705-04-15
  notes:
  - content: "In practice, roughness is negligible and the surface is considered specular
      if:\r\nstem:[frac(h sintheta)(lambda) lt frac(1)(1 0 0)]"
  terms:
  - type: expression
    normative_status: preferred
    designation: Rayleigh criterion
