  definition:
  - content: 'unique positive value, if it exists, associated with a three-dimensional
      domain, with the following properties: * for a rectangular parallelepiped, the
      value is the product of the three side lengths, * for a disjoint union of domains,
      the value is the sum of the values associated to these domains, * for more complicated
      domains, the value can be approximated by sums and given by an integral'
  examples: []
  id: 102-04-40
  notes:
  - content: The volume stem:[V] of the three-dimensional domain D is determined by
      the volume integral stem:["P{iiint}"_("D") rm(d) V], where dstem:[V] is the
      volume element ({{IEV 102-05-10, urn:iec:std:iec:60050-102-05-10}}).
  - content: In the usual geometrical space, the volume is a quantity of dimension
      length cubed.
