  definition:
  - content: ensemble d'une antenne et des dispositifs mécaniques et électriques nécessaires
      à son fonctionnement
  examples: []
  id: 712-01-02
  notes:
  - content: En français, le terme "système d'antenne" est utilisé seulement dans
      certains cas lorsque ces dispositifs mécaniques et électriques sont très importants
      par rapport à l'antenne proprement dite.
  - content: En anglais, on utilise le terme "antenna system" aussi bien pour une
      seule antenne que pour un groupe d'antennes.
