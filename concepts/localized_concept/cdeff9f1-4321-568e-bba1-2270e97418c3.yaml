  definition:
  - content: optical device that modifies a beam of {{optical radiation, urn:iec:std:iec:60050-845-21-002}}
      to produce a beam of {{unpolarized radiation, urn:iec:std:iec:60050-845-21-021}}
      irrespective of the state of polarization of the incident radiation
  examples: []
  id: 845-24-015
  notes:
  - content: No simple and completely satisfactory way of depolarizing a beam of radiation
      is known. The methods employed usually produce a large variety of polarization
      states with respect to time, wavelength or the aperture of the beam. Devices
      functioning on this principle are usually known as pseudo-depolarizers.
  terms:
  - type: expression
    normative_status: preferred
    designation: depolarizer
