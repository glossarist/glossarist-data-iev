  - content: "{{stable state, urn:iec:std:iec:60050-692-02-02}} in which some system
      components are stressed beyond their ratings, or some bus voltages or system
      frequency are outside tolerancesimage::/assets/images/parts/692/692-fig2-en.png[Figure
