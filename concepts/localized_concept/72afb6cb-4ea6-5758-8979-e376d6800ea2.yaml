  examples: []
  id: 692-02-06
  notes:
  - content: The arrows indicate the most important state transitions caused by credible
      events. Recovery transitions, in opposite directions, are effected by operator
      intervention.*Figure 3 – Examples of transitions within electric power system
      states*image::/assets/images/parts/692/692-fig6-en.png[Figure 6 - Examples of
      electric power system states and corresponding system operation status]
  - content: In an emergency state, urgent actions (such as load shedding; reducing
      voltage; and starting emergency generators) are required to prevent equipment
      damage and/or further degradation of system state.
  - content: Although {{loss of load, urn:iec:std:iec:60050-692-01-16}} can occur,
      it is not a criterion for an emergency state.
