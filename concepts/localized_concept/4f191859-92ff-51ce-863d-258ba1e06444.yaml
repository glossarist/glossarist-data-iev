  definition:
  - content: en un point d'une surface séparant deux milieux de températures thermodynamiques
      différentes, quotient de la norme du flux thermique surfacique *stem:[φ]* par
      la valeur absolue de la différence de température Δstem:[T], soit stem:[K =
      frac(|phi|)(|Delta " " T|)]
  examples: []
  id: 113-04-39
  notes:
  - content: Le coefficient de transmission thermique est nul pour une limite adiabatique
      et infini pour une limite diathermique.
  - content: Le nom «transmittance thermique» et le symbole stem:[U] sont surtout
      utilisés en technologie des bâtiments.
  - content: L'unité SI cohérente de coefficient de transmission thermique est le
      watt par mètre carré kelvin, W/(m^2^·K).
