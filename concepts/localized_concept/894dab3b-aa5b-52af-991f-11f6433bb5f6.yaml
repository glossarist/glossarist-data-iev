  definition:
  - content: qualifie le rapport d'une grandeur à une grandeur de référence autre
      qu'une unité de mesure
  examples: []
  id: 112-03-07
  notes:
  - content: Toute grandeur relative est sans dimension.
  - content: 'Exemples: permittivité relative, perméabilité relative, masse volumique
      relative (ou densité), résistances relatives et réactances relatives dans la
      théorie des machines électriques.'
  - content: 'Le symbole d''une grandeur relative est généralement déduit de celui
      de la grandeur d''origine par adjonction de l’indice r. Exemples: stem:[ε]~r~,
      stem:[µ]~r~.'
  - content: L'expression «stem:[per unit]» et son abréviation «p.u.» sont quelquefois
      utilisées en anglais.
