  definition:
  - content: relation d'égalité entre des grandeurs d'un système de grandeurs donné,
      indépendante des unités de mesure
  examples: []
  id: 112-01-31
  notes:
  - content: "La forme générale d'une équation aux grandeurs est stem:[f](stem:[Q]~1~,
      stem:[Q]~2~, ... stem:[Q~n~]) = 0, où stem:[Q]~1~, stem:[Q]~2~, ... stem:[Q~n~]
      notent différentes grandeurs. Une forme simple d'une équation aux grandeurs
      est stem:[Q]~1~ = stem:[ζ] stem:[Q]~2~ stem:[Q]~3~, où stem:[ζ] est un facteur
      numérique. Exemples: \r\n* T = (1/2) mv2, où T est l'énergie cinétique et v
      la vitesse d’une particule spécifiée de masse m;* n = I·t/F, où n est la quantité
      de matière d'un composé univalent, I est le courant électrique et t la durée
      de l’électrolyse, et F est la constante de Faraday."
