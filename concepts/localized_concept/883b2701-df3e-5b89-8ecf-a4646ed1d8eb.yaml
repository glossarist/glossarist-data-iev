  definition:
  - content: the part stem:[a] of a complex number stem:[c = a + rm(j) b], where stem:[a]
      and stem:[b] are real numbers
  examples: []
  id: 102-02-11
  notes:
  - content: The real part of a complex number stem:[c] is denoted by stem:[Re " "
      c] or sometimes by stem:[c]′ in electrotechnology.
  - content: The concept of real part may be applied to complex scalar, vector or
      tensor quantities or to matrices of complex elements.
