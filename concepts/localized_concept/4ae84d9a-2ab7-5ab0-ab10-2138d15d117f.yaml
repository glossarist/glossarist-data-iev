  definition:
  - content: "a fundamental reference system of the CCITT comprising:\r\nthe reference
      apparatus for the determination of transmission performance ratings or ARAEN;\n\na
      band-pass filter cutting off at 300 and 3400 Hz;\n\na device allowing specified
      electrical background noise to be injected at the input of the receiving system
      of the ARAEN"
  examples: []
  id: 722-16-23
  notes:
  - content: The SRAEN is described in the CCITT Recommendation P44 from the Volume
      V of the Yellow Book, 1981.
