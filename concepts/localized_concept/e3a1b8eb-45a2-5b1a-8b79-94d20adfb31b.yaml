  definition:
  - content: "{{polarization, urn:iec:std:iec:60050-705-01-13}} such that the {{electric
      field strength, urn:iec:std:iec:60050-121-11-18}} vector or a specified field
      vector rotates as a function of time in an anticlockwise sense in any fixed
      plane normal to the {{direction of propagation, urn:iec:std:iec:60050-705-02-15}}
      or to a specified reference direction, as seen by an observer looking in this
      direction"
  examples: []
  id: 705-01-19
  notes:
  - content: The reference direction shall be specified when the direction of propagation
      is parallel to the {{plane of polarization, urn:iec:std:iec:60050-705-01-22}}.
