  definition:
  - content: the degree of backoff under specified operating conditions, calculated
      as the ratio of the output power of a single carrier at saturation to the total
      power of the output signal under the specified conditions
  examples: []
  id: 725-14-07
  notes:
  - content: Output backoff is usually expressed in decibels as a positive quantity.
