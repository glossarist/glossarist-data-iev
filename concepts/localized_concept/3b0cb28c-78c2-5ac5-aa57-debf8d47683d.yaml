  definition:
  - content: the disappearance of the supply voltage for a time interval whose duration
      is between two specified limits
  examples: []
  id: 161-08-20
  notes:
  - content: A short interruption is considered to be a reduction of the supply voltage
      to less than 1 % of the nominal voltage, with the lower limit of the duration
      typically a few tenths of a second, and its upper limit typically in the order
      of one minute (or, in some cases up to three minutes).
  terms:
  - type: expression
    normative_status: preferred
    designation: short interruption (of supply voltage)
