  definition:
  - content: the transmission loss, usually expressed in decibels, that would occur
      if the antennas were replaced by isotropic antennas located in a perfectly dielectric,
      homogeneous, isotropic and unlimited environment, the distance between the antennas
      being retained
  examples: []
  id: 705-08-05
  notes:
  - content: "If the distance d between the antennas is much greater than the wavelength
      stem:[λ], the free-space attenuation in decibels will be:\r\nstem:[A_(0) = 20
      log (frac(4 pi d)(lambda))]"
