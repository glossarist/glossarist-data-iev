  - content: device within a bus
  examples: []
  id: 811-37-31
  notes:
  - content: On the wire train bus, the device address has 8 bits, the least significant
      6 bits being the node address.
  - content: A device connected to several busses can have a different device address
      for each bus.
  - content: Special devices such as repeaters only participate at the physical layer
      and have no device address.
