  definition:
  - content: rapport, généralement exprimé en décibels, de la puissance d'un signal
      utile, en un point spécifié d'une voie de transmission, le plus souvent à la
      sortie du récepteur, à la puissance du bruit associé au même point, évalué dans
      des conditions déterminées
  examples: []
  id: 713-11-19
  notes:
  - content: En pratique, le signal ne pouvant pas être généralement séparé du bruit,
      on mesure le rapport (signal + bruit) sur bruit.
  - content: "Les conditions déterminées comprennent, entre autres: \r\n– la nature
      et les caractéristiques du signal utile,\n\n– la nature et les caractéristiques
      du bruit,\n\n– les caractéristiques du récepteur et de l'antenne, en particulier
      la largeur de bande."
