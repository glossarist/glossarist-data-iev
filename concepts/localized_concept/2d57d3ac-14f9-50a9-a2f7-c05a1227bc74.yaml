data:
  definition:
  - content: 'protection des informations contre toute divulgation, transmission,
      modification ou destruction non autorisées, qu''elles soient accidentelles ou
      intentionnellesNote 1 à l’article: Par ailleurs, des propriétés, telles que
      l’authenticité, l’imputabilité, la non-répudiation et la fiabilité peuvent être
      concernées.Note 2 à l’article: La sécurité des informations est un terme général
      qui peut être utilisé quel que soit le format potentiel des données (par exemple,
      électronique, physique).'
