  - content: For a vector *stem:[U]* in the three-dimensional Euclidean or Hermitian
      space with orthonormal base, the magnitude is given by stem:[|U| = sqrt(|U_(1)|^(2)
      + |U_(2)|^(2) + |U_(3)|^(2))].
  - content: The terms "Euclidean norm" and "Hermitian norm" may be used for the real
      or the complex case, respectively.
  - content: The magnitude of a vector *stem:[U]* is represented by stem:[|U|] or
      by stem:[U]; stem:[normUnorm] is also used.
