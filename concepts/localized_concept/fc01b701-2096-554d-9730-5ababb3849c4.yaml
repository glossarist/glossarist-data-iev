  definition:
  - content: the ratios of the coefficients of the linear combination of independent
      modes of propagation that represents a degenerate mode in a waveguide
  examples: []
  id: 726-04-14
  notes:
  - content: If there are exactly stem:[n] independent modes of propagation there
      will be at most stem:[n] —1 independent ratios that describe completely the
      polarization of a given degenerate mode.
  - content: In a waveguide with square or circular cross-section there are two independent
      modes of propagation, and a single ratio describes the polarization of a given
      degenerate mode.
