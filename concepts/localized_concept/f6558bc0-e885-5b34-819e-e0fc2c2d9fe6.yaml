data:
  definition:
  - content: 'quotient de l''{{entropie moyenne par caractère, urn:iec:std:iec:60050-171-07-28}}
      stem:[H]^′^ par la durée moyenne d''un caractère stem:[H]^*^ &amp;equals; stem:[H]^′^/stem:[t](stem:[X])
      où stem:[X] &amp;equals; {stem:[x]~1~, …, stem:[x]~stem:[n]~} est l''ensemble
      des caractères stem:[x~i~] (stem:[i] &amp;equals; 1, …, stem:[n]) et où stem:[t
      (X) = sum_(n = 1)^(n) p ( x_(i) ) * t ( x_(i) )] est l''espérance mathématique
      de la durée stem:[t](stem:[x~i~]) d''un caractère stem:[x~i~] ayant une probabilité
      de réalisation stem:[p](stem:[x~i~])Note 1 à l’article: Le débit moyen d''entropie
      peut être exprimé à l''aide d''une unité telle que le shannon par caractère
      et seconde.'
