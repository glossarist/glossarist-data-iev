  definition:
  - content: function describing the spectral distribution of the colour stimulus
  examples: []
  id: 845-23-003
  notes:
  - content: The colour stimulus function is generated by the {{spectral distribution,
      urn:iec:std:iec:60050-845-21-029}} of a radiometric quantity, such as radiance
      or radiant flux.
  - content: For object colours, the colour stimulus function, stem:[φ~λ~](stem:[λ]),
      is equal to the product of the {{relative spectral distribution, urn:iec:std:iec:60050-845-21-030}},
      stem:[S](stem:[λ]), and either the spectral reflectance, stem:[ρ](stem:[λ]),
      or the spectral radiance factor, stem:[β](stem:[λ]), or the spectral transmittance,
      stem:[τ](stem:[λ]), depending on the application.
  - content: This entry was numbered 845-03-03 in IEC 60050-845:1987.
