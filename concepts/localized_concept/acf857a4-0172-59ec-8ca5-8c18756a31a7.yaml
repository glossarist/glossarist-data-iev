  definition:
  - content: density of incident photon number with respect to area at a point on
      a real or imaginary surfacestem:[H_("p") = frac("d" N_("p"))("d" A)]where stem:[N]~p~
      is photon number and stem:[A] is the area on which the photons are incident
  examples: []
  id: 845-21-073
  notes:
  - content: The corresponding radiometric quantity is "radiant exposure". The corresponding
      photometric quantity is "luminous exposure".
  - content: The photon exposure is expressed in metre to the power minus two (m^−2^).
  - content: This entry was numbered 845-01-44 in IEC 60050-845:1987.
