  definition:
  - content: sequence of sound and/or visual content specially designed and prepared
      for broadcasting
  examples: []
  id: 723-01-02
  notes:
  - content: "By common usage, programmes can be classified as follows:\r\n* by type:
      sound programmes, television programmes, music programmes, talk shows, etc.
      * by purpose: news programmes, educational programmes, entertainment programmes,
      etc. * by origin: broadcasts from a given transmitter, broadcasts from a given
      organization, live broadcasts, recorded broadcasts, etc."
  - content: The term “emission” is also used for the radio waves or signals produced
      (see {{IEV 161-01-09, urn:iec:std:iec:60050-161-01-09}}), for the production
      of any waves or particles (see {{IEV 702-02-03, urn:iec:std:iec:60050-702-02-03}}),
      for a process in radiocommunication (see {{IEV 702-02-05, urn:iec:std:iec:60050-702-02-05}}),
      as a synonym for {{transmission, urn:iec:std:iec:60050-723-01-03}} in broadcasting,
      and for a release into the environment (see {{IEV 904-01-11, urn:iec:std:iec:60050-904-01-11}}).
  - content: In French, the term “{{émission, urn:iec:std:iec:60050-702-02-04}}” is
      also used for the concept represented by the English term “{{sending, urn:iec:std:iec:60050-702-02-04}}”
      of a signal.
