  definition:
  - content: numerical classification preceded by the symbol IP applied to the enclosure
      of equipment to provide:* protection of persons against contact with, or approach
      to, live parts and against contact with moving parts (other than smooth rotating
      shafts and the like) inside the enclosure,* protection of the equipment against
      ingress of solid foreign objects, and* where indicated by the classification,
      protection of the equipment against harmful ingress of water
  examples: []
  id: 426-04-02
  notes:
  - content: The conditions for other than rotating machines are specified in IEC
      60529, _Degrees of protection provided by enclosures (IP Code)_.
  - content: 'The detailed test requirements for rotating electric machines are in
      IEC 60034-5, _Rotating electrical machines – Part 5: Degrees of protection provided
      by the integral design of rotating electrical machines (IP code) – Classification_.'
  - content: The enclosure which provides the degree of protection IP is not necessarily
      the same as the equipment enclosure providing the Type of Protection.
  - content: An enclosure which provides the degree of protection required by one
      of the Types of Protection will have been subjected to other tests prior to
      the tests for degree of protection.
  terms:
  - type: expression
    normative_status: preferred
    designation: degree of protection of enclosure
  - type: expression
    designation: IP
