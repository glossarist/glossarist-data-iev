  definition:
  - content: signalisation par canal sémaphore dans laquelle des unités de signalisation
      de longueur fixe sont émises sans interruption à débit binaire uniforme sur
      une voie sémaphore et dans laquelle le terminal récepteur fonctionne avec la
      relation temporelle correcte pour recevoir ces unités
  examples: []
  id: 714-13-14
  notes:
  - content: Les deux voies sémaphores de sens opposés d'un même canal sémaphore ne
      sont pas nécessairement synchronisées entre elles.
