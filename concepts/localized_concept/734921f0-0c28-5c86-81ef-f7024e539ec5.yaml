  definition:
  - content: "{{frequency band, urn:iec:std:iec:60050-103-09-01}} occupied by one
      {{signal, urn:iec:std:iec:60050-701-01-02}} or by a number of multiplexed signals
      at specified input and output points of a {{transmission system, urn:iec:std:iec:60050-704-04-19}}"
  examples: []
  id: 702-01-06
  notes:
  - content: In radiocommunication, the baseband is that frequency band occupied by
      the signal modulating the {{radio transmitter, urn:iec:std:iec:60050-713-08-01}}.
  - content: When the transmission involves {{multiple modulation, urn:iec:std:iec:60050-702-06-07}},
      it is generally considered that the baseband is that frequency band occupied
      by the signal which is applied to the first modulation stage, and not the frequency
      band occupied by an intermediate modulated signal.
