  definition:
  - content: for two complex-valued functions, stem:[underline(f)] and stem:[underline(g)],
      defined on the interval stem:[&amp;lsqb; a , b &amp;rsqb;] of ℝ, complex number
      stem:[〈 underline(f) , underline(g) 〉 = int_(a)^(b) underline(() x ) underline(g)^(ast)
      ( x ) "d" x], where stem:[underline(g)^(ast)] is the conjugate of stem:[underline(g)]
  examples: []
  id: 103-01-08
  notes:
  - content: 'The inner product has the following properties: stem:[〈 underline(f)
      , underline(g) 〉 = 〈 underline(g) , underline(f) 〉^(ast)] and stem:[〈 underline(alpha)
      " " underline(f) + underline(beta) " " underline(g) , underline(h) 〉 = underline(alpha)
      〈 underline(f) , underline(h) 〉 + underline(beta) 〈 underline(g) , underline(h)
      〉] where stem:[underline(alpha) , underline(beta) in] ℂ.'
  - content: The inner product for complex functions is similar to the Hermitian product
      for vectors (see IEC 60050-102, {{102-03-18, urn:iec:std:iec:60050-102-03-18}}).
      For real functions, it is similar to the scalar product (see IEC 60050-102,
      {{102-03-17, urn:iec:std:iec:60050-102-03-17}}).
