  definition:
  - content: a frequency independent antenna whose conducting surfaces have shapes
      generated by equiangular spirals having a common axis and the same defining
      parameter
  examples: []
  id: 712-04-93
  notes:
  - content: The antenna usually has two arms fed by a balanced feedline. It may have
      multiple pairs of arms. A common design requires two pairs oriented 90° apart
      about their common axis and fed in phase quadrature.
  - content: The arms of the spirals can conform to planar or conical surfaces, in
      which case they are referred to as planar or conical equiangular spiral antennas
      respectively.
  - content: These antennas are usually designed so that the non-conducting portion
      of the surface to which the antenna conforms is of the same shape and size as
      the spiral arms. This design is said to be self-complementary.
  terms:
  - type: expression
    normative_status: preferred
    designation: equiangular spiral antenna
