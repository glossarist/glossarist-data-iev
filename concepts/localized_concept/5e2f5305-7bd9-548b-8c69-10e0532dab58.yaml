  definition:
  - content: niveau de la pression acoustique produite dans une bande de fréquence
      spécifiée
  examples: []
  id: 801-22-12
  notes:
  - content: 'La bande peut être spécifiée par les fréquences de coupure inférieure
      ou supérieure, ou par la valeur de la fréquence moyenne géométrique (médiane)
      et la largeur de la bande. La largeur de la bande peut être décrite par des
      expressions telles que: niveau de pression acoustique par bande d''octave, de
      demi-octave ou de tiers d''octave.'
