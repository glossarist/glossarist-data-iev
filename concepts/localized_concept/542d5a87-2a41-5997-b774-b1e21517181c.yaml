  definition:
  - content: 'for a proportional plus integral element the input and output variable
      of which are of the same kind, the duration of the time interval required by
      the step response to reach twice the value that occurred immediately after the
      step was applied SEE: Figure 17.'
  examples: []
  id: 351-50-12
  notes:
