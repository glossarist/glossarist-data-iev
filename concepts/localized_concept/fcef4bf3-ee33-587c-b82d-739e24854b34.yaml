---
data:
  definition:
  - content: "{{norme, urn:iec:std:iec:60050-901-02-02}}s concernant les mêmes produits,
      processus ou services, approuvées par différents {{organismes à activités normatives,
      urn:iec:std:iec:60050-901-03-03}} et dont les diverses {{exigence, urn:iec:std:iec:60050-901-05-05}}s
      sont fondées sur les mêmes caractéristiques et évaluées selon les mêmes méthodes,
      ce qui permet de comparer sans ambiguïté les différences entre les exigences
      respectives de ces normes"
  examples: []
  id: 901-06-09
  notes:
  - content: Les normes comparables ne sont pas des {{normes harmonisées, urn:iec:std:iec:60050-901-06-01}}
      (ni des {{normes équivalentes, urn:iec:std:iec:60050-901-06-01}}).
  - content: Les {{règlements techniques, urn:iec:std:iec:60050-901-02-11}} peuvent
      être harmonisés comme des normes. Les termes et définitions correspondants sont
      obtenus en remplaçant «normes» par «règlements techniques» dans les définitions
      {{IEV 901-06-01, urn:iec:std:iec:60050-901-06-01}} à {{IEV 901-06-09, urn:iec:std:iec:60050-901-06-09}},
      et «organismes à activités normatives» par «autorités» dans la définition {{IEV
      901-06-01, urn:iec:std:iec:60050-901-06-01}}.
