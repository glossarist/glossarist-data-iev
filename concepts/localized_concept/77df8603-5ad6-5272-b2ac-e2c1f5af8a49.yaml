---
data:
  definition:
  - content: "actionneur électrostatique, constitué d’une série de doigts parallèles,
      en position fixe, engagés et entrelacés avec un second ensemble de doigts mobiles\r\nNote
      1 à l’article: L’application d’une charge électrostatique à la première série
      de doigts attire les doigts de la seconde série, de sorte qu’ils s'insèrent
      plus à fond dans les espaces interdigitaux de la première série. La charge statique
      est alors enlevée et évacuée, et la seconde série de doigts revient à sa position
      initiale par la tension du ressort micro-usiné."
