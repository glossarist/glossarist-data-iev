---
data:
  definition:
  - content: publication d'un {{document normatif, urn:iec:std:iec:60050-901-02-01}}
      national sur la base de la {{norme internationale, urn:iec:std:iec:60050-901-02-03}}
      correspondante ou entérinement de ladite norme internationale avec le même statut
      qu'un document normatif national, tout écart par rapport à la norme internationale
      étant identifié
  examples: []
  id: 901-06-10
  notes:
  - content: Le terme «adoption» est parfois employé dans le sens de «reprise», par
      exemple «adoption d'une norme internationale dans une norme nationale».
  - content: 'Un document normatif peut être mis en œuvre de deux façons: soit par
      mise en application dans la production, le commerce, etc., soit par reprise,
      totale ou partielle, dans un autre document normatif. Il peut être alors mis
      en application par le biais de ce second document ou repris de nouveau dans
      un autre document normatif.'
  sources:
