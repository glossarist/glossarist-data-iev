  definition:
  - content: numeral characterizing the expected pollution of the micro-environment
  examples: []
  id: 851-15-17
  notes:
  - content: "For the purpose of evaluating creepage distances and clearances, the
      following four pollution degrees in the microenvironment are established in
      2.5.1 of IEC 60664-1:1992.\r\na)  pollution degree 1: No pollution or only dry,
      non-conductive pollution occurs. The pollution has no influence.\r\nb)  pollution
      degree 2: Only non-conductive pollution occurs except that occasionally a temporary
      conductivity caused by condensation is to be expected.\r\nc)  pollution degree
      3: Conductive pollution occurs, or dry, non-conductive pollution occurs which
      becomes conductive due to condensation is to be expected\r\nd)  pollution degree
      4: The pollution generates persistent conductivity caused by conductive dust
      or by rain or snow."
