  definition:
  - content: commande d'un appareil électrique conçue pour agir de façon différente
      sur les alternances positives et négatives d'une tension ou d'un courant alternatif
  examples: []
  id: 161-07-12
  notes:
  - content: Une commande par réglage de phase généralisé est asymétrique si la forme
      du courant est différente pour les alternances positives ou négatives.
  - content: Une commande par trains d'alternances est asymétrique si chaque intervalle
      de conduction comporte un nombre inégal d'alternances positives et négatives.
