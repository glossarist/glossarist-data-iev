  definition:
  - content: a four-port device intended to distribute the power fed into any one
      port equally between two other ports, transferring minimum power, ideally zero,
      to the fourth port
  examples: []
  id: 702-09-65
  notes:
  - content: The ideal distribution of power usually requires that all ports be terminated
      with matched impedances, the differential coupler being then said to be "balanced".
  - content: A differential coupler may be used to combine two signals incident on
      two ports and feeding a single output port.
  terms:
  - type: expression
    normative_status: preferred
    designation: differential coupler
  - type: expression
    designation: hybrid coupler
