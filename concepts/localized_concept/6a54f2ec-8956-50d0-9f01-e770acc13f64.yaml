  definition:
  - content: "for a linear passive two-terminal-pair network terminated with its image
      impedances, half the natural logarithm of the product of the phasors <u>stem:[U]</u>~1~
      and <u>stem:[I]</u>~1~ representing the voltage and the electric current at
      the input divided by the product of the phasors <u>stem:[U]</u>~2~ and <u>stem:[I]</u>~2~
      representing the voltage and the current at the output:\r\nstem:[frac(1)(2)
      ln frac(underline(U)_(1) underline(I)_(1))(underline(U)_(2) underline(I)_(2))]"
  examples: []
  id: 131-15-25
  notes:
  - content: The imaginary part of the logarithm must be appropriately chosen.
  terms:
  - type: expression
    normative_status: preferred
    designation: image transfer coefficient
