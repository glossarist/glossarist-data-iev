  definition:
  - content: pour une ligne polyphasée, valeur moyenne, prise sur une période, de
      la puissance instantanées
  examples: []
  id: 141-03-11
  notes:
  - content: Pour une ligne triphasée en marche symétrique et sinusoïdale, la puissance
      active vaut stem:[P = U I sqrt(3) " " "cos" " " phi], où stem:[U] est la valeur
      efficace des tensions composées, stem:[I] la valeur efficace des courants de
      ligne et stem:[ϕ] le déphasage entre chacune des tensions simples et le courant
      de ligne correspondant.
