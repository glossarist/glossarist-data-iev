data:
  definition:
  - content: "densité du flux énergétique incident par rapport à l'aire en un point
      d'une surface réelle ou fictive\r\nstem:[E_(\"e\") = frac(\"d\" Phi_(\"e\"))(\"d\"
      A)]où stem:[Φ]~e~ est le flux énergétique et stem:[A] est l'aire qui reçoit
      ce flux"
  examples: []
  id: 845-21-053
  notes:
  - content: La grandeur photométrique correspondante est l'"éclairement lumineux".
      La grandeur correspondante pour les photons est l'"éclairement énergétique photonique".
  - content: L'éclairement énergétique est exprimé en watt par mètre carré (W·m^−2^).
  - content: Cet article était numéroté 845-01-37 dans l'IEC 60050-845:1987.
