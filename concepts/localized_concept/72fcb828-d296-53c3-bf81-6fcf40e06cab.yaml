  definition:
  - content: "{{electric line, urn:iec:std:iec:60050-151-12-27}} with one or more
      conductors or a cable supported above ground by appropriate means"
  examples: []
  id: 151-12-33
  notes:
  - content: An overhead line may consist of only one conductor when the circuit is
      closed by the Earth.
  - content: An overhead line may be constructed with bare conductors, generally supported
      by insulators, or with insulated conductors.
  - content: The concept of overhead line generally includes the supporting elements.
