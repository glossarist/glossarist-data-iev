  id: 102-03-01
  notes:
  - content: Dans l'espace usuel à trois dimensions, les segments orientés ayant une
      origine spécifiée constituent un espace vectoriel sur les nombres réels. Un
      autre exemple, correspondant à l'extension du concept de scalaire (voir {{IEV
      102-02-18, urn:iec:std:iec:60050-102-02-18}}, Note 1), est l'ensemble des mots
      de stem:[n] bits formés des chiffres 0 et 1 avec addition modulo deux, où l'ensemble
      de scalaires est l'ensemble des deux éléments 0 et 1 muni de l'algèbre de Boole.
