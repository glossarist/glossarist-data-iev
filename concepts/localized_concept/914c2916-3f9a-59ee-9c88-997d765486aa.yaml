  definition:
  - content: a hydroelectric power station in which the filling period of the reservoir
      based on the cumulative water flows permits the storage of water over a period
      of a few weeks at the most
  examples: []
  id: 602-01-06
  notes:
  - content: In particular, a pondage station permits the cumulative water flows to
      be stored during periods of low load to enable the turbine to operate during
      high load periods on the same or following days.
  terms:
  - type: expression
    normative_status: preferred
    designation: pondage power station
