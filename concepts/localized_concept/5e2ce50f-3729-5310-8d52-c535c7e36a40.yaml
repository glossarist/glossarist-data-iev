---
data:
  definition:
  - content: 'méthode permettant de déterminer les coefficients de la susceptibilité
      magnétique en courant alternatif en mesurant le flux magnétique induit dans
      une bobine de détection lorsque l’échantillon est introduit dans un champ magnétique
      alternatif de basse fréquence (de plusieurs Hz à plusieurs kHz) et de faible
      amplitude (de l’ordre de 1 mT ou moins)Note 1 à l’article: Cette méthode est
      utilisée pour obtenir la densité de courant critique et la ligne d’irréversibilité.'
