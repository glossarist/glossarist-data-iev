  definition:
  - content: process of changing the {{digit rate, urn:iec:std:iec:60050-702-05-23}}
      of a {{digital signal, urn:iec:std:iec:60050-702-04-05}} in a controlled manner
      without loss or mutilation of information
  examples: []
  id: 704-21-01
  notes:
  - content: Pulse stuffing is usually employed as an adjunct to {{digital multiplexing,
      urn:iec:std:iec:60050-704-20-01}} to enable the multiplexing to be applied to
      tributary channels that are not synchronized to the {{multiplexer, urn:iec:std:iec:60050-704-08-13}}.
      Where this is done, the original signal of each channel is independently justified.
  - content: Associated verbs are “to stuff” and “to justify”.
