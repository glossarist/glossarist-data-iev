---
data:
  definition:
  - content: appareil qui contient des contacts produisant des étincelles à énergie
      limitée et dont les circuits (y compris les composants et dispositifs de limitation
      d'énergie) fournissent la puissance à énergie limitée à ces contacts, ainsi
      que la source d'alimentation à énergie non limitée au circuit
  examples: []
  id: 426-13-10
  notes:
  - content: 'Le dispositif ne produisant pas d''étincelles "nA" a été remplacé par
      "ec" dans l''IEC 60079-7, _Atmosphères explosives – Partie 7: Protection du
      matériel par sécurité augmentée "e"_.'
  - content: 'Le matériel à énergie limitée "nL" a été remplacé par "ic" dans l''IEC
      60079-11, _Atmosphères explosives – Partie 11: Protection de l''équipement par
      sécurité intrinsèque "i"_.'
  terms:
