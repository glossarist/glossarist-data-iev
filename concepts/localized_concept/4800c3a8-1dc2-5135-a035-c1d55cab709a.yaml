data:
  definition:
  - content: 'passage d’un {{état de disponibilité, urn:iec:std:iec:60050-192-02-01}}
      à un {{état d’incapacité, urn:iec:std:iec:60050-192-02-18}}image::/assets/images/parts/692/692-fig5-fr.png[Figure
      5 - Relations entre survenances d’indisponibilité]Note 1 à l’article: L’état
      de disponibilité peut être l’{{état de fonctionnement, urn:iec:std:iec:60050-192-02-04}},
      l’{{attente, urn:iec:std:iec:60050-192-02-10}} ou l’{{état vacant, urn:iec:std:iec:60050-192-02-14}}.
      Note 2 à l’article: La survenance d''indisponibilité est liée à une ou plusieurs
      transitions, simultanées ou séquentielles, se traduisant par un état d’indisponibilité
      d''une ou plusieurs entités. Note 3 à l’article: La survenance d''indisponibilité
      est une {{défaillance, urn:iec:std:iec:60050-192-03-01}} si l’état d’incapacité
      qui en résulte est une {{panne, urn:iec:std:iec:60050-692-01-06}}.'
