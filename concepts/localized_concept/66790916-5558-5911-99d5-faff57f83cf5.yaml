  definition:
  - content: vector quantity equal to the integral of force *stem:[F]* with respect
      to time stem:[t], thus stem:[I = int_(t_(1))^(t_(2)) F "d" t] over a time interval
      &amp;lsqb;stem:[t]~1~, stem:[t]~2~&amp;rsqb;
  examples: []
  id: 113-03-20
  notes:
  - content: For a time interval &lsqb;stem:[t]~1~, stem:[t]~2~&rsqb;, impulse is
      equal to the change of momentum *stem:[p]*, thus *stem:[I]* = *stem:[p]*(stem:[t]~2~)
      − *stem:[p]*(stem:[t]~1~) = Δ *stem:[p]*.
  - content: In French, the term "impulsion" has also another meaning corresponding
      to English "pulse".
  - content: The coherent SI unit of impulse is newton second, N&sdot;s.
  terms:
