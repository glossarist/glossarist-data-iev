  definition:
  - content: "limit, if it exists, of the quotient of the mean number of failures
      of a repairable item within time interval (stem:[t], stem:[t] + Δstem:[t]),
      by Δstem:[t], when Δstem:[t] tends to zero \r\nstem:[z ( t ) = underset(\"Delta\"
      t vec 0 +)(\"lim\") frac(E &amp;lsqb; N ( t + \"Delta\" t ) - N ( t ) &amp;rsqb;)(\"Delta\"
      t)]\r\nwhere stem:[N](stem:[t]) is the number of failures in the time interval
      (0, stem:[t]), where stem:[E] denotes the expectation."
