  definition:
  - content: "for a sinusoidal wave of angular frequency stem:[ω], the vector product:\r\nstem:[frac(1)(2)
      vec(underline(E)) xx vec(underline(H))^(ast)]\n\nwhen the electric field vector
      stem:[vec(() t )] and the magnetic field vector stem:[vec(() t )] are represented
      at the same point, in complex notation, by the equations:\r\n\n\n\r\nwhere stem:[vec(underline(E))]
      and stem:[vec(underline(H))] are not time-dependent and are generally complex,
      stem:[vec(underline(H))^(ast)] being the complex conjugate of stem:[vec(underline(H))]"
  examples: []
  id: 705-02-10
  notes:
  - content: The real part of the complex Poynting vector is the average of the Poynting
      vector during one cycle.
  - content: The imaginary part of the complex Poynting vector is a vector of which,
      with certain reservations, the direction may be considered as being that of
      reactive energy propagation, and the magnitude may be regarded as the reactive
      power flux per unit surface area perpendicular to this direction, with a sign
      assigned conventionally.
