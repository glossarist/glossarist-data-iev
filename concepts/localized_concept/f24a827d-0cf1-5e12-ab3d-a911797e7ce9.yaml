data:
  definition:
  - content: quotient du flux énergétique transmis, stem:[Φ]~t~, par le flux énergétique
      incident, stem:[Φ]~m~stem:[tau = frac(Phi_("t"))(Phi_("m"))]
  examples: []
  id: 845-24-065
  notes:
  - content: Le facteur de transmission est également définie spectralement par rapport
      à la longueur d'onde, auquel cas "spectrale" est ajouté devant le nom de la
      grandeur.
  - content: En raison de la conservation de l'énergie, stem:[α] + stem:[ρ] + stem:[τ] =
      1 sauf lors de l'observation d'un {{rayonnement polarisé, urn:iec:std:iec:60050-845-21-017}},
      où stem:[α] est le facteur d'absorption et stem:[ρ] est le facteur de réflexion.
  - content: 'Le facteur de transmission, stem:[τ], est la somme du facteur de transmission
      régulière, stem:[τ]~r~, et du facteur de transmission diffuse, stem:[τ]~d~:
      stem:[τ] = stem:[τ]~r~ + stem:[τ]~d~.'
  - content: L'unité de facteur de transmission est un.
  - content: Cet article était numéroté 845-04-59 dans l'IEC 60050-845:1987.
