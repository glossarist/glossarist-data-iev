  definition:
  - content: "for a sinusoidal wave, the angle δ~E~ defined by the equation:\r\nstem:[delta_(\"E\")
      = \"arctan\" \" \" (frac(epsilon_(\"r\")^(dprime))(epsilon_(\"r\")^(prime)))]\n\nwhere
      stem:[epsilon_(\"r\")^(dprime)] and stem:[epsilon_(\"r\")^(prime)] are the negative
      imaginary part and the real part, respectively, of the relative complex permittivity
      <u>stem:[ε]</u>~r~"
