  definition:
  - content: quotient of the recombination rate by the product of the number densities
      stem:[n]^+^ and stem:[n]^−^ of the recombining charge carriers, thus stem:[-
      frac("d" n^(+))("d" t) = - frac("d" n^(-))("d" t) = alpha " " n^(+) n^(-)]
  examples: []
  id: 113-06-47
  notes:
  - content: The coherent SI unit of recombination coefficient is metre cube per second,
      m^3^ / s.
