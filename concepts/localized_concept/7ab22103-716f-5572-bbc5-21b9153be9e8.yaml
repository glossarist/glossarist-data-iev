  definition:
  - content: for an {{electromagnetic wave, urn:iec:std:iec:60050-121-11-63}} incident
      on a plane boundary between two regions having different {{refractive indices,
      urn:iec:std:iec:60050-702-02-19}}, that {{angle of incidence, urn:iec:std:iec:60050-705-04-03}}
      at which the {{reflectance, urn:iec:std:iec:60050-845-04-58}} is zero for  a
      wave that has one of its vectors of {{electric field, urn:iec:std:iec:60050-121-11-67}}
      in the plane defined by the {{direction of propagation, urn:iec:std:iec:60050-103-10-05}}
      and the normal to the surface
  examples: []
  id: 705-04-20
  notes:
  - content: The vector of electric field is the electric field strength in optics,
      and the electric flux density in {{radiocommunication, urn:iec:std:iec:60050-701-01-31}}.
  - content: In radiocommunication, the term Brewster's angle is often used for the
      complement of the angle defined above.
  - content: For propagation from a medium of refractive index stem:[n]~1~ to a medium
      of refractive index stem:[n]~2~, Brewster's angle is arctan (stem:[n]~2~/stem:[n]~1~).
  terms:
