  definition:
  - content: "{{distance relay, urn:iec:std:iec:60050-447-01-32}}, whose characteristic,
      when plotted on a rectangular coordinate system with {{resistance, urn:iec:std:iec:60050-131-12-04}}
      as X axis and {{reactance, urn:iec:std:iec:60050-131-12-46}} as Y axis, is a
      circle, the circumference of which does not pass through the origin"
