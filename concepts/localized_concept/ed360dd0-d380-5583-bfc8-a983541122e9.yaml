---
data:
  definition:
  - content: démonstration que des {{exigences spécifiées, urn:iec:std:iec:60050-902-02-01}}
      relatives à un {{produit, urn:iec:std:iec:60050-902-02-03}}, processus, système,
      personne ou organisme sont respectées
  examples: []
  id: 902-01-01
  notes:
  - content: Le domaine de l'évaluation de la conformité comprend des activités définies
      ailleurs dans l'ISO/CEI 17000 telles que les {{essais, urn:iec:std:iec:60050-902-03-02}},
      l'{{inspection, urn:iec:std:iec:60050-902-03-03}} et la {{certification, urn:iec:std:iec:60050-902-04-05}},
      de même que l'{{accréditation, urn:iec:std:iec:60050-902-04-06}} des {{organismes
      d'évaluation de la conformité, urn:iec:std:iec:60050-902-01-05}}.
  - content: L'expression «objet de l'évaluation de la conformité» ou «objet» est
      utilisée dans  l'ISO/CEI 17000 pour désigner le matériau, le produit, l'installation,
      le processus, le système, la personne ou l'organisme particulier auquel l'évaluation
      de la conformité est appliquée. Le service est couvert par la définition de
      produit (voir Note 1 en {{IEV 902-02-03, urn:iec:std:iec:60050-902-02-03}}).
