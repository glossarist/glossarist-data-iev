  definition:
  - content: "élément d'un vecteur *stem:[x]*(stem:[t]) dans un système d'équations
      différentielles<table>\r\n<tr>\n<td>stem:[overset(˙)(x) (t) = f &amp;lsqb; x
      (t) , \" \" \" \" u (t) &amp;rsqb;]</td>\n<td>équation d'état</td>\n</tr>\r\n<tr>\n<td>stem:[v
      (t) = g &amp;lsqb; x (t) , \" \" \" \" u (t) &amp;rsqb;]</td>\n<td>équation
      de sortie,</td>\n</tr>\r\n</table>\r\net pour les systèmes linéaires<table>\r\n<tr>\n<td>stem:[overset(˙)(x)
      (t) = A * x (t) + B * u (t)]</td>\n<td>équation d'état</td>\n</tr>\r\n<tr>\n<td>stem:[v
      (t) = C * x (t) + D * u (t)]</td>\n<td>équation de sortie,</td>\n</tr>\r\n</table>à
      partir desquelles la course des éléments du vecteur de sortie *stem:[v]*(stem:[t])
      peut être calculée, avec des valeurs initiales connues des éléments du vecteur
      stem:[x](stem:[t]) à tout instant stem:[t]~0~ (souvent avec stem:[t]~0~ = 0),
      avec une course connue des éléments du vecteur d’entrée *stem:[u]*(stem:[t]),
      et en partant de stem:[t]~0~ VOIR: Figure 3."
  examples: []
  id: 351-41-08
  notes:
  - content: "En cas de variables à temps discret, les équations sont les suivantes:<table>\r\n<tr>\n<td>\n\nstem:[x]~stem:[i]+1~
      =\n\nstem:[f] (\n\nstem:[x]~stem:[i]~,\n\nstem:[u]~stem:[i]~)</td>\n<td>équation
      d'état</td>\n</tr>\r\n<tr>\n<td>\n\nstem:[v]~stem:[i]~ =\n\nstem:[g] (\n\nstem:[x]~stem:[i]~,\n\nstem:[u]~stem:[i]~)</td>\n<td>équation
      de sortie,</td>\n</tr>\r\n</table>et pour les systèmes linéaires<table>\r\n<tr>\n<td>\n\nstem:[x]~stem:[i]+1~
      =\n\nstem:[Φ]·\n\nstem:[x]~stem:[i]~ +\n\nstem:[H]·\n\nstem:[u]~stem:[i]~\n</td>\n<td>équation
      d'état</td>\n</tr>\r\n<tr>\n<td>\n\nstem:[v]~stem:[i]~ =\n\nstem:[C]·\n\nstem:[x]~stem:[i]~
      +\n\nstem:[D]·\n\nstem:[u]~stem:[i]~\n</td>\n<td>équation de sortie.</td>\n</tr>\r\n</table>"
