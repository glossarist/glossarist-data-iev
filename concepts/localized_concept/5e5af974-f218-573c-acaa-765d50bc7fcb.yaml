  definition:
  - content: |-
      vector field quantity stem:[*B*]  which exerts on any charged particle having velocity stem:[*v*] a force stem:[*F*]  equal to the product of the vector product stem:[*v*] x stem:[*B*]  and the electric charge  stem:[Q] of the particle:

      stem:[*F*] = stem:[Q]stem:[*v*] x stem:[*B*]
  examples: []
  id: 121-11-19
  notes:
  - content: |-
      The divergence of stem:[*B*]  is zero at all points:

      div stem:[*B*] = 0
  - content: The magnetic flux density stem:[*B*] is sometimes called “magnetic field”,
      risking confusion with the magnetic field strength stem:[*H*] .
  terms:
  - type: expression
    normative_status: preferred
    designation: magnetic flux density
  - type: expression
    designation: magnetic induction
  - type: symbol
    designation: stem:[*B*]
    international: true
