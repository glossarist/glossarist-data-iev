  definition:
  - content: rapport, généralement exprimé en décibels, de la puissance de la porteuse
      d'un signal utile à la puissance d'un signal brouilleur, évalué dans des conditions
      déterminées, ces puissances étant considérées à l'entrée du récepteur
  examples: []
  id: 713-11-20
  notes:
  - content: En présence de plusieurs signaux brouilleurs indépendants, on doit considérer
      la somme de leurs puissances.
  - content: "Les conditions déterminées comprennent entre autres: \r\n– la nature
      et les caractéristiques du signal brouilleur, \r\n– les caractéristiques du
      récepteur et de l'antenne, en particulier la largeur de bande."
