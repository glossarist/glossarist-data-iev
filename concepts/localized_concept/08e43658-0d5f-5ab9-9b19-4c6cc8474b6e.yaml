  definition:
  - content: mobile service intended to provide links with vessels which are not permanently
      moored, or between these vessels, or between associated on-board communication
      stations
  examples: []
  id: 713-03-13
  notes:
  - content: In the ITU Radio Regulations, the maritime mobile service is a terrestrial
      radiocommunication service.
  - content: Survival craft stations and emergency position-indicating radio beacons
      may participate in the maritime mobile service.
