  definition:
  - content: "{{system, urn:iec:std:iec:60050-192-01-03}} designed to provide {{lighting,
      urn:iec:std:iec:60050-845-29-001}}"
  examples: []
  id: 845-27-010
  notes:
  - content: A lighting system can be dedicated to. the support of one or more specified
      visual tasks under specified conditions considering other requirements such
      as human comfort, safety, the appearance of the surrounding environment and
      energy consumption;. the support of other than human tasks.
  - content: A lighting system can include a set of light sources, other physical
      components, communication protocols, user interfaces, software and networks
      to provide control and monitoring functions.
  - content: The light source(s) and the related equipment can be integrated in a
      single item, e.g. an LED module, a lamp or a luminaire.
  - content: A lighting system can be networked to provide central or remote control
      and monitoring functions.
  - content: A lighting system can be connected to or integrated with other systems
      or devices.
