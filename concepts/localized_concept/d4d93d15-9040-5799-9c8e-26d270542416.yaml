  definition:
  - content: additive {{scalar quantity, urn:iec:std:iec:60050-102-02-19}}, attributed
      to any {{particle, urn:iec:std:iec:60050-113-05-01}} and, generally, any system
      of particles, to characterize its {{electromagnetic interactions, urn:iec:std:iec:60050-881-03-26}}
  examples: []
  id: 113-02-10
  notes:
  - content: Electric charge is always an integral multiple of the {{elementary electric
      charge, urn:iec:std:iec:60050-113-05-16}}, except for quarks. The result can
      be positive, negative, or zero. Owing to additivity, electric charge for any
      system of particles is exactly equal to the sum of their charges.
  - content: Electric charge is subject to a conservation law. It is invariant under
      Lorentz transformation, and thus not dependent on the choice of a reference
      frame.
  - content: Electric charges obey {{Coulomb's law, urn:iec:std:iec:60050-121-11-02}}.
  - content: The electric current through a surface is the time derivative of the
      electric charge transferred through that surface.
  - content: A charged capacitor is not an electrically charged body carrying a positive
      or negative electric charge. For this reason, the electric charge is defined
      in circuit theory as the time integral of the electric current at a terminal
      (see {{IEV 131-12-11, urn:iec:std:iec:60050-131-12-11}}).
  - content: The term "quantity of electricity" is deprecated for this concept. In
      the IEV it is used only in relation to electrolytic devices, such as secondary
      cells and batteries (see, for example, {{IEV 482-03-14, urn:iec:std:iec:60050-482-03-14}}).
  - content: 'The coherent SI unit of electric charge is coulomb, C. The unit ampere
      hour is used for electrolytic devices, such as storage batteries: 1 A·h = 3,6
      kC.'
  - content: To denote the charge of a point object, symbol stem:[q] is often used.
