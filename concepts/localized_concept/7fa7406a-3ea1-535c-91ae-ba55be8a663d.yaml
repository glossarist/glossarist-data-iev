---
data:
  definition:
  - content: ensemble ordonné de stem:[n] vecteurs linéairement indépendants stem:[a_(1)
      "," " " a_(2) "," " " ... "," " " a_(n)] dans un {{espace vectoriel, urn:iec:std:iec:60050-102-03-01}}
      à stem:[n] dimensions, choisi pour exprimer tout vecteur *stem:[U]* comme combinaison
      linéaire unique de ces stem:[n] vecteursstem:[U = U_(1) a_(1) + U_(2) a_(2)
      + ... + U_(n) a_(n)] où stem:[U_(1) "," " " U_(2) "," " " ... "," " " U_(n)]
      sont des scalaires
  examples: []
  id: 102-03-08
  notes:
  - content: Dans un espace euclidien ou hermitien, on choisit généralement une base
      orthonormée. Dans l'espace vectoriel formé par l'ensemble des mots de stem:[n]
      bits (voir la Note 1 à l’article dans {{IEV 102-03-01, urn:iec:std:iec:60050-102-03-01}},
      espace vectoriel), une base est constituée par l'ensemble des mots n'ayant qu'un
      seul bit non nul.
  - content: Tout vecteur d'une base est appelé «vecteur de base».
