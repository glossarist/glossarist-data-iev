  definition:
  - content: process whereby conduction occurs through the potential barrier of a
      PN junction and in which electrons pass in either direction between the conduction
      band in the N-region and the valence band in the P-region
  examples: []
  id: 521-02-83
  notes:
  - content: Tunnel action, unlike the diffusion of charge carriers, involves electrons
      only. The transit time is practically negligible.
