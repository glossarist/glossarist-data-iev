  definition:
  - content: major functional group of an {{IoT system, urn:iec:std:iec:60050-741-02-07}}
  examples: []
  id: 741-02-05
  notes:
  - content: Every {{entity, urn:iec:std:iec:60050-741-01-18}} in an IoT system participates
      in one or more IoT domains and is said to be included or contained by that domain.
  - content: "The IoT domain consists of six domains: user domain (UD), operation
      & management domain (OMD), {{application, urn:iec:std:iec:60050-741-01-02}}
      & {{service, urn:iec:std:iec:60050-741-01-28}} domain (ASD), resource access
      & interchange domain (RAID), sensing & controlling domain (SCD), {{physical
      entity, urn:iec:std:iec:60050-741-01-26}} domain (PED).\r\nimage::/assets/images/parts/741/[]"
