  definition:
  - content: 'unité fonctionnelle disposée à l''entrée d''un système commandé et faisant
      partie de ce dernier, excitée par la variable réglante et influençant la circulation
      de masse ou d''énergie VOIR: Figures 1 et 2.Note 1 à l’article: Si l''élément
      de commande final est actionné mécaniquement, un actionneur supplémentaire (positionneur)
      est utilisé dans certains cas.Note 2 à l’article: La variable de sortie de l''équipement
      de commande final n''est habituellement pas exempte de réaction. Il convient
      que l''interface entre l''actionneur et l''élément de commande final soit donc
      choisie telle que la variable réglante ne soit pas affectée par la réaction
      provenant de l''élément de commande final.'
