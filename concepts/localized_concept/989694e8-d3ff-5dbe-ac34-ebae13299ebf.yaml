  definition:
  - content: grandeur sans dimension caractérisant le transfert de chaleur par convection
      forcée dans un fluide, définie par stem:[S t = frac(K)(rho " " v " " " " c_(p))],
      où stem:[K] est le coefficient de transmission thermique, stem:[ρ] est la masse
      volumique, stem:[v] est la vitesse du fluide et stem:[c]~stem:[p]~ est la capacité
      thermique massique à pression constante,
  examples: []
  id: 113-04-44
  notes:
  - content: 'Le nombre de Stanton est le rapport du nombre de Nusselt stem:[Nu] au
      nombre de Péclet stem:[Pe], soit: stem:[St] = stem:[Nu]/stem:[Pe]. Il est combiné
      avec le nombre de Prandtl dans le facteur de transfert de chaleur ({{113-04-55,
      urn:iec:std:iec:60050-113-04-55}}).'
