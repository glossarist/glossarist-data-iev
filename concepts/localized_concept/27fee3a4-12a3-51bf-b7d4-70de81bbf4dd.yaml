---
data:
  definition:
  - content: densité du flux énergétique par rapport à l'angle solide dans une direction
      spécifiéestem:[I_("e") = frac("d" Phi_("e"))("d" Omega)]où stem:[Φ]~e~ est le
      flux énergétique émis dans une direction spécifiée, et stem:[Ω] est l'angle
      solide contenant cette direction
  examples: []
  id: 845-21-044
  notes:
  - content: La définition s'applique strictement et uniquement à une {{source ponctuelle,
      urn:iec:std:iec:60050-845-21-033}}.
  - content: La répartition des intensités rayonnantes en fonction de la direction
      d'émission, par exemple, donnée par les angles polaires (stem:[ϑ], stem:[φ]),
      permet de déterminer le flux énergétique, stem:[Φ]~e~, selon un certain angle
      solide, stem:[Ω], d'une source:stem:[Phi_("e") = "P{iint}"_(Omega) I_("e") (vartheta
      , phi) sinvartheta " " "d" phi \  "d" vartheta].
  - content: La grandeur photométrique correspondante est l'"intensité lumineuse".
      La grandeur correspondante pour les photons est l'"intensité photonique".
  - content: L'intensité énergétique est exprimée en watt par stéradian (W·sr^−1^).
  - content: Cet article était numéroté 845-01-30 dans l'IEC 60050-845:1987.
