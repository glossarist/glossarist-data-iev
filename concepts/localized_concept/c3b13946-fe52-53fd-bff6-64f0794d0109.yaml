data:
  definition:
  - content: grandeur en relation avec l'aspect plus ou moins lumineux d'une étoile,
      et définie par la formulestem:[m] = stem:[m]~o~ − 2,5 log~10~(stem:[E]~pb~/stem:[E]~o~)où
      stem:[E]~pb~ est l'éclat apparent de l'étoile prise en considération, stem:[m]~o~
      et stem:[E]~o~ sont des constantes dont la valeur résulte des magnitudes attribuées
      à certaines étoiles de référence
  examples: []
  id: 845-21-097
  notes:
  - content: Outre la magnitude apparente (visuelle) définie ici, d'autres magnitudes
      apparentes (photographiques, bolométriques, etc.) sont définies par la même
      formule, mais stem:[E]~pb~ et stem:[E]~o~ sont alors les réponses d'un récepteur
      ayant une sensibilité spectrale spécifiée.
  - content: L'unité de magnitude apparente est un.
