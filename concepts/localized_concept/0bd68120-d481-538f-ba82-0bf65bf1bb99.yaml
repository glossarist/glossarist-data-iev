  definition:
  - content: un des stators de la turbine à vapeur sur lequel sont disposés les aubages
      directeurs
  examples: []
  id: 602-02-50
  notes:
  - content: |-
      Selon la pression de la vapeur à l'admission, dans une turbine à 3 corps, on distingue:

      - corps H.P. (haute pression)

      - corps M.P. (moyenne pression)

      - corps B.P. (basse pression).
  - content: 'Par extension, on appelle également corps: l''ensemble du stator et
      du rotor.'
