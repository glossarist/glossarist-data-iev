  definition:
  - content: grandeur vectorielle additive caractérisant des interactions extérieures
      sur une particule ou un corps
  examples: []
  id: 113-03-14
  notes:
  - content: 'Les forces font varier la quantité de mouvement *stem:[p]* = stem:[mv]
      de la particule ou du corps conformément à la deuxième loi de Newton: d*stem:[p]*/dstem:[t] = *stem:[F]*
      (dans un référentiel inertiel), où *stem:[F]* est la résultante de toutes les
      forces agissantes. Cette formule s’applique aussi en théorie de la relativité.'
  - content: Une force peut entraîner la déformation du corps.
  - content: Dans un référentiel inertiel, une force résultante *stem:[F]* agissant
      sur un corps de masse constante stem:[m] cause une accélération *stem:[a]* = *stem:[F]*/stem:[m]
      du centre de masse du corps.
  - content: L'unité SI cohérente de force est le newton, N.
