  definition:
  - content: relation entre l'{{exitance énergétique, urn:iec:std:iec:60050-845-21-080}},
      stem:[M]~e~, d'un radiateur de Planck et sa température, stem:[T], donnée parstem:[M]~e~ =
      stem:[σ] stem:[T]^4^où stem:[σ] est la constante de Stefan-Boltzmann et stem:[T]
      est la température thermodynamique
  examples: []
  id: 845-24-007
  notes:
  - content: La constante de Stefan-Boltzmann peut être calculée par stem:[sigma =
      frac(2 pi^(5) k^(4))(15 h^(3) c_(0)^(2))] où stem:[h] est la constante de Planck,
      stem:[c]~0~ est la {{vitesse de la lumière dans le vide, urn:iec:std:iec:60050-113-01-34}},
      et stem:[k] est la constante de Boltzmann.
  - content: Pour la valeur de la constante de Stefan-Boltzmann, stem:[σ,] voir CODATA.
