  definition:
  - content: spectral radiance distribution as seen by an image capture or measurement
      device and converted to colour signals that are considered to be perfectly achromatic
      and to have an observer adaptive luminance factor of unity
  examples: []
  id: 845-32-058
  notes:
  - content: The colour signals are considered to correspond to a perfect white diffuser.
  - content: The adopted white can vary within a scene.
  - content: No assumptions should be made concerning the relation between the {{adapted
      white, urn:iec:std:iec:60050-845-23-081}} or adopted white and measurements
      of nearly perfect reflecting diffusers in a scene, because measurements of such
      diffusers will depend on the illumination and viewing geometry, and other elements
      in the scene that can affect perception. It is easy to arrange conditions for
      which a nearly perfect reflecting diffuser will appear to be grey or coloured.
  - content: The adopted white can be a visual percept or a computational attribute.
