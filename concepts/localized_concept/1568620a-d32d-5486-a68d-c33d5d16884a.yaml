---
data:
  definition:
  - content: "traitement de surface de niveau atomique et moléculaire (manipulation
      atomique) utilisant un microscope à effet tunnel à balayage (STM)\r\nNote 1
      à l’article: L'usinage STM, dont un exemple emploie des atomes pour écrire des
      caractères, est bien connu et peut être utilisé pour réaliser le traitement
      aux niveaux moléculaire et atomique. Cette technologie est extrêmement sensible
      aux vibrations, ce qui rend son application difficile. \r\nNote 2 à l’article:
      Le terme abrégé \"STM\" est dérivé du terme anglais développé correspondant
      \"scanning tunnelling microscope\"."
