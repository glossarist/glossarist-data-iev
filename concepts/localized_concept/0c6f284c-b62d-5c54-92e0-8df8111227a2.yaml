data:
  definition:
  - content: distance à partir d'une station radioélectrique, dans une direction donnée,
      au-delà de laquelle le {{brouillage radioélectrique, urn:iec:std:iec:60050-161-01-14}}
      causé ou subi par toute autre station radioélectrique partageant la même {{bande
      de fréquences, urn:iec:std:iec:60050-103-09-01}} est considéré comme négligeable
      pour les besoins de la planification
  examples: []
  id: 705-08-39
  notes:
  - content: En pratique, une distance de coordination se définit pour une {{station
      terrienne, urn:iec:std:iec:60050-713-02-05}} ou une {{station de Terre, urn:iec:std:iec:60050-713-02-04}},
      mais non pour une {{station spatiale, urn:iec:std:iec:60050-713-02-06}}.
