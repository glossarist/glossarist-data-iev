  definition:
  - content: for a non-linear element with a sinusoidal input variable in steady state
      of the output variable the frequency response obtained by taking only the fundamental
      component of the output variable
  examples: []
  id: 351-45-50
  notes:
  - content: The describing function may depend on the angular frequency and on the
      amplitude of the input variable, or only on the amplitude of the input variable.
  - content: This entry was numbered 351-24-42 in IEC 60050-351:2006.
