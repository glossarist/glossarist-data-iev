  definition:
  - content: demonstration that {{specified requirement, urn:iec:std:iec:60050-902-02-01}}s
      relating to a {{product, urn:iec:std:iec:60050-902-02-03}}, process, system,
      person or body are fulfilled
  examples: []
  id: 902-01-01
  notes:
  - content: The subject field of conformity assessment includes activities defined
      elsewhere in ISO/IEC 17000, such as {{testing, urn:iec:std:iec:60050-902-03-02}},
      {{inspection, urn:iec:std:iec:60050-902-03-03}} and {{certification, urn:iec:std:iec:60050-902-04-05}},
      as well as the {{accreditation, urn:iec:std:iec:60050-902-04-06}} of {{conformity
      assessment bodies, urn:iec:std:iec:60050-902-01-05}}.
  - content: The expression “object of conformity assessment” or “object” is used
      in ISO/IEC 17000 to encompass any particular material, product, installation,
      process, system, person or body to which conformity assessment is applied. A
      service is covered by the definition of a product (see Note 1 to {{IEV 902-02-03,
      urn:iec:std:iec:60050-902-02-03}}).
