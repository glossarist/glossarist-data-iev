  definition:
  - content: local acceleration equal to the vector sum of the acceleration due to
      gravity and the centrifugal acceleration in the reference frame fixed to rotating
      Earth
  examples: []
  id: 113-01-39
  notes:
  - content: The concept of acceleration of free fall may be used for any other astronomical
      object.
  - content: The fall of a body in the atmosphere is also influenced by other effects
      such as Coriolis force and buoyancy. These additional effects are not taken
      into account in the definition of free fall acceleration.
  terms:
  - type: expression
    normative_status: preferred
    designation: acceleration of free fall
  - type: expression
    designation: acceleration due to gravity
