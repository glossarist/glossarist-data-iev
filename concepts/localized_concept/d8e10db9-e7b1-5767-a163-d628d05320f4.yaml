  definition:
  - content: transfert dans le spectre des fréquences de l'ensemble des composantes
      spectrales d'un signal de façon que les différences des fréquences des composantes
      de tout couple de composantes soient conservées, ainsi que leurs amplitudes
      relatives et leurs phases relatives
