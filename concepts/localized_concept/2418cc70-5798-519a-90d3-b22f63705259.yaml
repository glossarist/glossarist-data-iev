data:
  definition:
  - content: 'phénomène associé à la défaillance de l''isolation en cas de contrainte
      électrique incluant un écroulement de la tension et le passage de courantNote
      1 à l’article: Le terme s''applique au claquage électrique dans des diélectriques
      solides, liquides et gazeux et aux combinaisons de ceux-ci.Note 2 à l’article:
      Une décharge disruptive dans un diélectrique solide produit une perte permanente
      de la tenue diélectrique; dans un diélectrique liquide ou gazeux la perte peut
      être seulement temporaire.'
