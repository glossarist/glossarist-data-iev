  definition:
  - content: "quotient du coefficient de température de la perméabilité par la perméabilité
      à la température stem:[Θ]\n\nstem:[alpha_(\"F\") = frac(alpha_(mu))(mu_(Theta))
      = frac(mu_(Theta) - mu_(\"ref\"))(mu_(Theta) mu_(\"ref\") (Theta - Theta_(\"ref\")))]\r\nou\r\nstem:[alpha_(\"F\")
      = frac(alpha_(mu))(mu_(\"ref\")) = frac(mu_(Theta) - mu_(\"ref\"))(mu_(\"ref\")^(2)
      (Theta - Theta_(\"ref\")))]\n\nsi stem:[µ]~stem:[Θ]~ et stem:[µ]~ref~ diffèrent
      de manière insignifiante"
