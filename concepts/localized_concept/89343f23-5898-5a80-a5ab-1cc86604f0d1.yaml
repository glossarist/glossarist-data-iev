---
data:
  definition:
  - content: introduction de petites quantités d'air (environ 5 %) dans le flux de
      combustible, en amont de l'entrée du combustible dans la {{cellule élémentaire
      à combustible, urn:iec:std:iec:60050-485-08-01}} ou dans le compartiment {{anodique,
      urn:iec:std:iec:60050-485-02-04}}
  examples: []
  id: 485-09-07
  notes:
  - content: Le but de l'injection d'air est d'atténuer l'{{empoisonnement du catalyseur,
      urn:iec:std:iec:60050-485-01-04}} par des éléments tels que le monoxyde de carbone
      par une oxydation catalytique de l'élément poison dans le compartiment anodique
      de la cellule élémentaire à combustible.
