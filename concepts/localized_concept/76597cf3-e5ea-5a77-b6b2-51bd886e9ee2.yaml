  definition:
  - content: lighting design technique where the light falls on objects in the same
      direction as the traffic
  examples: []
  id: 845-31-095
  notes:
  - content: Pro-beam lighting is characterized by using luminaires that show a luminous
      intensity distribution that is asymmetric in relation to the C90-C270 plane
      (the plane normal to the direction of the traffic), where the maximum luminous
      intensity is aimed in the same direction as the direction of the traffic.
  - content: See also "{{symmetric lighting, urn:iec:std:iec:60050-845-31-097}}",
      "{{counter-beam lighting, urn:iec:std:iec:60050-845-31-096}}".
  - content: This note applies to the French language only.
