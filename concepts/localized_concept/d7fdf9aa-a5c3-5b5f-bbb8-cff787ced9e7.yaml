  definition:
  - content: 'pour une réponse unitaire à un échelon, durée de l''intervalle de temps
      compris entre les points d''intersection de la tangente au point d''inflexion
      avec l''axe horizontal correspondant à la valeur initiale et avec la parallèle
      à cet axe passant par la valeur de régime établi final VOIR: Figure 6.Note 1
      à l’article: Cette définition ne s''applique qu''aux systèmes ne présentant
      pas de dépassement dans la réponse unitaire à un échelon.'
