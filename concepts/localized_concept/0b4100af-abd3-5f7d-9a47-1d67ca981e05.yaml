      AC systems usually stem:[U]~m~/√3). For line-to-earth insulation, this definition
      will result in a value that is √3 times that given by the definition of specific
      creepage distance in IEC 60815 (1986).
  - content: For ‘stem:[U]~m~’ see IEV 604-03-01.
  - content: It is generally expressed in mm/kV
