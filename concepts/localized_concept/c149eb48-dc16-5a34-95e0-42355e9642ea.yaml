  definition:
  - content: logarithme du rapport de la valeur d'une accélération acoustique donnée
      à la valeur de l'accélération acoustique prise comme référence. Exprimé en décibels,
      le niveau d'accélération acoustique est égal à 20 fois le logarithme décimal
      de ce rapport
  examples: []
  id: 801-22-09
  notes:
  - content: Sauf spécification contraire, l'accélération de référence est 1 μm/s^2^.
  - content: Sauf spécification contraire, les accélérations sont exprimées en valeurs
      efficaces.
