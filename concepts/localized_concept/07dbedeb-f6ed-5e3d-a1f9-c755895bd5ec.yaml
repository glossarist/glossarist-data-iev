  definition:
  - content: single variable, monotonic mathematical function applied individually
      to one or more colour channels
  examples: []
  id: 845-32-004
  notes:
  - content: Colour component transfer functions are frequently used to account for
      the non-linear response of a reference device and/or to improve the visual uniformity
      of a colour space.
  - content: Generally, colour component transfer functions will be non-linear functions
      such as a power-law (i.e. "gamma") function or a logarithmic function. However,
      in some cases a linear colour component transfer function can be used.
  - content: For more information on "colour channels" see Note 2 to entry to "{{colour
      space encoding, urn:iec:std:iec:60050-845-32-018}}".
