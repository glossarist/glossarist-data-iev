  definition:
  - content: for a tensor of the second order stem:[T = ( T_(i j) )] and a vector
      *stem:[U]* = (stem:[U~k~]), vector the components of which are given by stem:[(T
      * U)_(i) = sum_(m) T_(i m) U_(m)]
  examples: []
  id: 102-03-47
  notes:
  - content: The inner product of two vectors is their scalar product, because a tensor
      of the first order is considered as a vector.
  - content: An example is the relation stem:[D = vec(vec(epsilon)) * E] between the
      electric field strength *stem:[E]* and the electric flux density *stem:[D]*,
      where stem:[vec(vec(epsilon))] is the absolute permittivity of an anisotropic
      medium.
  - content: The inner product of a tensor and a vector is denoted by a half-high
      dot (·) between the two symbols.
