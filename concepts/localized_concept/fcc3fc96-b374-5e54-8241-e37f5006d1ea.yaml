---
data:
  definition:
  - content: phénomène par lequel la répartition spatiale d'un faisceau de rayonnement
      est modifiée lorsque le faisceau est dévié dans de multiples directions par
      une surface ou par un milieu, sans variation de {{fréquence, urn:iec:std:iec:60050-103-06-02}}
      de ses composantes monochromatiques
  examples: []
  id: 845-24-049
  notes:
  - content: Une distinction est faite entre la {{diffusion sélective, urn:iec:std:iec:60050-845-24-050}}
      et la {{diffusion non sélective, urn:iec:std:iec:60050-845-24-051}} selon que
      les propriétés de diffusion dépendent ou non de la longueur d'onde du rayonnement
      incident.
  - content: La fréquence ne varie pas uniquement s'il ne se produit pas d'effet Doppler
      provenant du mouvement des matériaux qui renvoient le rayonnement.
  - content: Cet article était numéroté 845-04-44 dans l'IEC 60050-845:1987.
