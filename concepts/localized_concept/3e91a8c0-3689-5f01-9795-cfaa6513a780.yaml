---
data:
  definition:
  - content: longueur d'un trajet dans l'atmosphère nécessaire pour réduire de 95
      % le flux lumineux d'un faisceau collimaté, émanant d'une source de température
      de couleur 2 700 K
  examples: []
  id: 845-31-018
  notes:
  - content: La valeur de la réduction de telle sorte que la portée optique météorologique
      conduise à une mesure approximative de la notion couramment employée de visibilité
      météorologique.
  - content: La portée optique météorologique stem:[v] est reliée à la transmissivité
      atmosphérique stem:[T,] réputée uniforme par les formulesstem:[v = d_(0) frac(log
      " " " " 0,05)(log " " " " T)] ou stem:[T = 0,05^(d_("0") / v)]où stem:[d]~0~
      est la longueur spécifiée dans la définition de la transmissivité atmosphérique.Ces
      formules sont parfois écrites sous la formestem:[v = frac(log " " " " 0,05)(log
      " " " " T)] ou stem:[T = 0,05^(1 / v)]avec stem:[d]~0~ définie comme unité.
  - content: Cet article était numéroté 845-11-20 dans l'IEC 60050-845:1987.
