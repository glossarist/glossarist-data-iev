  examples: []
  id: 845-21-003
  notes:
  - content: Il n'existe pas de limites précises pour le domaine spectral du rayonnement
      visible puisqu'elles dépendent du flux énergétique qui atteint la rétine et
      de la sensibilité de l'observateur. La limite inférieure est prise généralement
      entre 360&#160;nm et 400&#160;nm et la limite supérieure entre 760&#160;nm et
      830&#160;nm.
