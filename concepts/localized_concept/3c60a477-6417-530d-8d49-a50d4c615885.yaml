  definition:
  - content: ability to tolerate a {{credible event, urn:iec:std:iec:60050-692-01-08}}
      without {{loss of load, urn:iec:std:iec:60050-692-01-16}}, over-stress of system
      components, or deviation from specified voltage and frequency tolerances image::/assets/images/parts/692/692-fig1-en.png[Figure
      1 - Relationship between service reliability, system adequacy and system security]
  examples: []
  id: 692-01-11
  notes:
  - content: This concept is normally applied to {{bulk electric systems, urn:iec:std:iec:60050-692-01-04}}.
  - content: In North America, security is usually defined with reference to instability,
      voltage collapse and {{cascade tripping, urn:iec:std:iec:60050-692-03-08}} only.
  - content: See also the related term "fault tolerance" ({{IEV 192-10-09, urn:iec:std:iec:60050-192-10-09}}).
  - content: This entry was numbered 191-21-03 in IEC 60050-191:1990.
