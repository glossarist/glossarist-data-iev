  definition:
  - content: object colour stimuli that correspond to objects whose luminance factors
      have maximum possible values for each chromaticity when their spectral luminance
      factors do not exceed unity for any wavelength
  examples: []
  id: 845-23-005
  notes:
  - content: Optimal colour stimuli correspond, in general, to objects whose spectral
      luminance factors have values of either unity or zero, with not more than two
      transitions between them.
  - content: The luminance factors and chromaticity coordinates of optimal colour
      stimuli define the boundaries of a colour solid corresponding to non-fluorescent
      objects.
  - content: For a given luminance factor, optimal colour stimuli define the maximum
      purity possible for non-fluorescent objects.
  - content: See also "{{object colour, urn:iec:std:iec:60050-845-22-042}}", "{{colour
      stimulus, urn:iec:std:iec:60050-845-23-002}}".
  - content: This entry was numbered 845-03-40 in IEC 60050-845:1987.
