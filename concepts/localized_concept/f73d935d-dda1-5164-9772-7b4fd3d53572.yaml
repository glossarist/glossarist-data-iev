  definition:
  - content: "functional unit with two inputs and one output the value of the output
      variable of which is equal to the quotient of the value of the first input variable
      multiplied by a constant weighting factor to the second input variable multiplied
      by a constant weighting factor according to the formulastem:[v (t) = K_(0) *
      frac(K_(1) * u_(1) (t))(K_(2) * u_(2) (t))]where<table>\r\n<tr>\n<td>stem:[t]</td>\n<td>is
      the time;</td>\n</tr>\r\n<tr>\n<td>\nstem:[K]~0~, stem:[K]~1~ ...</td>\n<td>are
      the weighting factors;</td>\n</tr>\r\n<tr>\n<td>\nstem:[u]~1~, stem:[u]~2~\n</td>\n<td>are
      the input variables;</td>\n</tr>\r\n<tr>\n<td>stem:[v]</td>\n<td>is the division
      result.</td>\n</tr>\r\n</table>"
