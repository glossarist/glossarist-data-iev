  definition:
  - content: "1. an assembly, obtained by frequency division multiplexing, of 15 supergroups
      in adjacent positions in a frequency band of specified width, with guard bands
      between adjacent supergroups\r\n2. a frequency band of standardized width, 3
      716 kHz, in a multichannel carrier system and occupying one of a number of specified
      positions in the spectrum"
  examples: []
  id: 704-10-27
  notes:
  - content: '"15-supergroup assembly" is the only term in use by the CCITT.'
  - content: The French word "hypergroupe" or the English word "hypergroup" is sometimes
      used for a supergroup assembly different from that standardized by CCITT. Accordingly,
      this term should be qualified by the number of super-groups used in each application.
  - content: A 15-supergroup assembly is normally an assembly of 900 FDM telephone
      channels.
  - content: Signals, other than those derived from an assembly of supergroups but
      having specified characteristics, may occupy the whole or a part of a frequency
      band assigned to a 15-supergroup assembly.
  terms:
  - type: expression
    normative_status: preferred
    designation: 15-supergroup assembly
  - type: expression
    designation: "(15-supergroup) hypergroup"
