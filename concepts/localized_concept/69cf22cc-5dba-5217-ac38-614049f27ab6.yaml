  definition:
  - content: for an integral element the reciprocal of the integral action coefficient
      if its input and output variables are variable quantities of same kind
  examples: []
  id: 351-50-10
  notes:
  - content: The integral action time then is given bystem:[T_("I") = frac(1)(K_("I"))]where
      stem:[K]~I~ is the integral action coefficient.
  - content: The integral action time can also be given as the duration of the time
      interval required by the step response of an integral element to vary itself
      about the value of the stepwise variation of its input variable.
  - content: This entry was numbered 351-28-21 in IEC 60050-351:2006.
