  definition:
  - content: quotient of the total luminous flux of the luminaire, measured under
      specified conditions, and the sum of the individual luminous fluxes of the lamps
      when they are inside the luminaire
  examples: []
  id: 845-29-051
  notes:
  - content: For luminaires using incandescent lamps only, the optical light output
      ratio and the light output ratio are the same in practice.
  - content: The optical light output ratio has unit one.
  - content: This entry was numbered 845-09-38 in IEC 60050-845:1987.
