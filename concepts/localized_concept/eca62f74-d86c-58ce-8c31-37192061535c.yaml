  definition:
  - content: ability to perform as and when required
  examples: []
  id: 192-01-22
  notes:
  - content: Dependability includes availability ({{192-01-23, urn:iec:std:iec:60050-192-01-23}}),
      reliability ({{192-01-24, urn:iec:std:iec:60050-192-01-24}}), recoverability
      ({{192-01-25, urn:iec:std:iec:60050-192-01-25}}), maintainability ({{192-01-27,
      urn:iec:std:iec:60050-192-01-27}}), and maintenance support performance ({{192-01-29,
      urn:iec:std:iec:60050-192-01-29}}), and, in some cases, other characteristics
      such as durability ({{192-01-21, urn:iec:std:iec:60050-192-01-21}}), safety
      and security.
  - content: Dependability is used as a collective term for the time-related quality
      characteristics of an item.
