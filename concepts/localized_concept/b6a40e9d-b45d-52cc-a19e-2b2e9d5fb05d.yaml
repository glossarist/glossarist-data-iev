---
data:
  definition:
  - content: 'variation brusque non programmée de l’état de fonctionnement d’un {{réseau
      d’énergie électrique, urn:iec:std:iec:60050-692-01-02}} qui occasionne des problèmes
      ou des {{interruptions, urn:iec:std:iec:60050-692-04-01}} généralisés de la
      qualité de l’énergieNote 1 à l’article: Une perturbation du réseau peut avoir
      pour origine une {{panne, urn:iec:std:iec:60050-692-01-06}} du réseau de transport,
      le déclenchement d’un groupe de production, des {{pertes de charge, urn:iec:std:iec:60050-692-01-16}}
      ou toute combinaison de ces phénomènes. La perturbation du réseau peut entraîner
      des plages anormales de fréquence ou de tension, une perte de stabilité du réseau
      d’énergie ou des indisponibilités en cascade des circuits de transport de l’énergie,
      ainsi qu’une interruption généralisée de la consommation.'
