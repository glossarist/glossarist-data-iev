  definition:
  - content: 'rapport de la variation de la variable commandée avec commande en boucle
      fermée à sa variation sans commande, en cas de changement de la variable de
      référence ou de la variable perturbatrice, dans des conditions donnéesNote 1
      à l’article: En cas de variables d''entrée sinusoïdales, le facteur de commande
      complexe est le quotient des phaseurs de ces valeurs en fonction de la pulsation.Note
      2 à l’article: En cas de variation en échelon des variables d''entrée, le facteur
      de commande réel est le quotient de ces valeurs, après la fin des processus
      transitoires. S''il y a un ou plusieurs éléments à action par intégration dans
      la chaîne d''action, la valeur du facteur de commande réel est zéro.Note 3 à
      l’article: En cas de commande en boucle fermée avec un comportement proportionnel
      de la boucle ouverte, le facteur de commande réel est donné par la formule stem:[R
      = frac(1)(1 + K_(0))] où stem:[K]~0~ est le gain en boucle.'
