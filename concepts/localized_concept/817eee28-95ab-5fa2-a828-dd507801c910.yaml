data:
  definition:
  - content: lésion de la rétine produite par une exposition visible ou aux {{IR-A,
      urn:iec:std:iec:60050-845-21-005}} intense
  examples: []
  id: 845-26-022
  notes:
  - content: Le terme "brûlure rétinienne" est généralement utilisé pour décrire une
      lésion rétinienne thermique (voir " {{lésion thermique rétinienne, urn:iec:std:iec:60050-845-26-023}}");
      toutefois, ce terme est parfois appliqué à une lésion rétinienne photochimique.
      Des termes plus spécifiques sont également utilisés pour une "brûlure" photochimique,
      c'est-à-dire une "{{maculopathie photique, urn:iec:std:iec:60050-845-26-010}}"
      ou une "photorétinite par lumière bleue" (à partir de lésions dues à une lumière
      bleue), ou pour une lésion thermique rétinienne, une "lésion thermique choriorétinienne".
