  definition:
  - content: quotient of the emitted luminous flux and the power consumedstem:[eta_("v")
      = frac(Phi_("v"))(P)]where stem:[Φ]~v~ is luminous flux and stem:[P] is the
      power consumed by the light source
  examples: []
  id: 845-21-089
  notes:
  - content: It has to be specified whether or not the power dissipated by auxiliary
      equipment such as ballasts, if any, is included in the power consumed by the
      light source.
  - content: The luminous efficacy of a light source is expressed in lumen per watt
      (lm·W^−1^).
  - content: This entry was numbered 845-01-55 in IEC 60050-845:1987.
