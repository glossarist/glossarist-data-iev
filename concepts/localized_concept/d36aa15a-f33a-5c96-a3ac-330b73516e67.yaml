  definition:
  - content: a radio link from an earth station at a given location to a space station,
      or vice versa, conveying information for a space radiocommunication service
      other than the fixed-satellite service
  examples: []
  id: 725-12-34
  notes:
  - content: The given location may be at a specified fixed point, or at any fixed
      point within specified areas.
  - content: "Examples of feeder links:\r\n- an up-link for a broadcasting satellite;\n\n-
      the part of a forward link to a space station or a return link from a space
      station which is between the earth station and a data relay satellite;\n\n-
      an up-link and down-link between a coast earth station and a satellite in the
      maritime mobile-satellite service.\r\nimage::/assets/images/parts/725/[]"
