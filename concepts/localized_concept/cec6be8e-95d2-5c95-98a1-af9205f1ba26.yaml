  - content: Quantity names are given in the various parts of ISO 80000, IEC 80000,
      and IEC 60027.
  - content: 'In principle, a quantity name should not refer to any unit name, although  there
      are exceptions: for example, {{voltage, urn:iec:std:iec:60050-121-11-27}} and
      as a qualifier for a quantity name as in "{{molar, urn:iec:std:iec:60050-112-03-15}}".'
