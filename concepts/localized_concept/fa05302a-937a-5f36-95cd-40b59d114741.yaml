  definition:
  - content: "en régime sinusoïdal de pulsation stem:[ω], produit vectoriel:\n\nstem:[frac(1)(2)
      vec(underline(E)) xx vec(underline(H))^(ast)]\r\nlorsque le vecteur champ électrique
      stem:[vec(() t )] et le vecteur champ magnétique stem:[vec(() t )] sont représentés
      au même point, en notation complexe, par les expressions:\r\n\r\noù stem:[vec(underline(E))]
      et stem:[vec(underline(H))] sont indépendants du temps généralement complexes,
      stem:[vec(underline(H))^(ast)] désignant le vecteur complexe conjugué de stem:[vec(underline(H))]"
  examples: []
  id: 705-02-10
  notes:
  - content: La partie réelle du vecteur de Poynting complexe est la moyenne du vecteur
      de Poynting pendant une période.
  - content: La partie imaginaire du vecteur de Poynting complexe est un vecteur dont
      on peut, sous certains réserves, considérer la direction comme celle de la propagation
      de l'énergie réactive, et le module, affecté d'un signe conventionnel, comme
      le flux de la puissance réactive par unité de surface perpendiculaire à cette
      direction.
