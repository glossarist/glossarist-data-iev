  definition:
  - content: amount by which the {{decision content, urn:iec:std:iec:60050-171-07-10}}
      stem:[H]~0~ exceeds the {{entropy, urn:iec:std:iec:60050-171-07-15}} stem:[H]
      stem:[R] &equals; stem:[H]~0~ − stem:[H]
  examples:
  - content: 'Let stem:[{a , b , c}] be a set of three events and let stem:[p ( a
      ) = 0,5], stem:[p ( b ) = 0,25] and stem:[p ( c ) = 0,25] be the probabilities
      of their occurrences. The redundancy of this set is: stem:[R = 1,585 " Sh" -
      1,50 " Sh " = 0,085 " Sh"].'
  id: 171-07-18
  notes:
  - content: Usually, messages can be represented with fewer characters by using suitable
      codes; the redundancy can be considered as a measure of the decrease of the
      average length of the messages accomplished by appropriate coding.
