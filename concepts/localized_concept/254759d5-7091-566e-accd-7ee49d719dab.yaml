---
data:
  definition:
  - content: 'une des deux fréquences d''un résonateur piézoélectrique associé dans
      des conditions spécifiées à une capacité de charge en série ou en parallèle,
      auxquelles l’impédance de la combinaison est résistiveNote 1 à l’article: La
      fréquence de résonance avec capacité de charge est la plus faible des deux fréquences
      lorsque la capacité de charge est en série, et la plus élevée lorsqu’elle est
      en parallèle.'
