  definition:
  - content: in digital transmission, the number of signal elements of the line signal
      transmitted per second, expressed in bauds
  examples: []
  id: 704-17-03
  notes:
  - content: In English, the term "modulation rate" is used in telegraphy and data
      communication; it is the reciprocal of the duration of the unit interval or
      of the shortest signal element. In French, the term "rapidité de modulation"
      is the only term used in this field.
