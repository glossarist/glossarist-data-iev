  definition:
  - content: designation used to differentiate one contact from another
  examples: []
  id: 581-27-07
  notes:
  - content: "The contact size may be denoted by one of the following systems:\r\na)
      numbering system: assigned numbers used to denote the size of the contact and
      its related conductor accommodation,\r\nb) current rating system: the related
      current-carrying capacity is used to denote the size of the contact,\r\nc) cross-sectional
      area system: reference is made to the cross-sectional area of the maximum conductor
      accommodation to denote the size of the contact."
