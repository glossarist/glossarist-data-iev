  - content: Pour un vecteur *stem:[U]* dans l'espace vectoriel euclidien ou hermitien
      à trois dimensions muni d'une base orthonormée, la norme est donnée par stem:[|U|
      = sqrt(|U_(1)|^(2) + |U_(2)|^(2) + |U_(3)|^(2))].
  - content: Les termes «norme euclidienne» et «norme hermitienne» peuvent être employés
      dans les cas réel et complexe, respectivement.
  - content: La norme d'un vecteur *stem:[U]* est notée stem:[|U|] ou stem:[U]; stem:[normUnorm]
      est aussi utilisé.
