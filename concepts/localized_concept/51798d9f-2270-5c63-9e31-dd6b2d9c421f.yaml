  definition:
  - content: element intended to carry electric current
  examples: []
  id: 151-12-05
  notes:
  - content: The term "conductor" is often used for an element the length of which
      is large with respect to the cross-sectional dimensions, e.g. conductors of
      a line or of a cable.
  - content: The English term "conductor" and the French term "conducteur" have also
      the meaning of "conducting medium".
  - content: In French, the term "conducteur" is also used as an adjective corresponding
      to the English "conductive".
