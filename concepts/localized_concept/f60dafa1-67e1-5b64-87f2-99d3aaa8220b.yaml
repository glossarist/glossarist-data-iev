  definition:
  - content: subdivision of the {{frame, urn:iec:std:iec:60050-723-05-25}} in the
      vertical sense consisting of a series of equidistantly spaced sequential scanning
      lines covering the whole picture area, the repetition rate of the series being
      a multiple of that for the picture
  examples: []
  id: 723-05-17
  notes:
  - content: In English, the term "frame" has different meanings in the fields of
      time division multiplexing (see {{IEV 704-14-01, urn:iec:std:iec:60050-704-14-01}}),
      switching (see {{IEV 714-15-09, urn:iec:std:iec:60050-714-15-09}}), television
      (see {{IEV 723-05-25, urn:iec:std:iec:60050-723-05-25}}), time division multiple
      access (see {{IEV 725-14-18, urn:iec:std:iec:60050-725-14-18}}), digital processing
      (see {{IEV 807-01-03, urn:iec:std:iec:60050-807-01-03}}), rotating electric
      machines (see {{IEV 811-14-02, urn:iec:std:iec:60050-811-14-02}}) and train
      communication networks (see {{IEV 811-37-40, urn:iec:std:iec:60050-811-37-40}}).
      In some English-speaking countries, the term “frame” is also used to mean a
      subdivision of the frame defined in this IEV entry, i.e. a {{field, urn:iec:std:iec:60050-723-05-17}}.
  - content: In French, the term "trame" has different meanings in the fields of beam
      focusing and deflection in electronic tubes (see {{IEV 531-14-20, urn:iec:std:iec:60050-531-14-20}}),
      time division multiplexing (see {{IEV 704-14-01, urn:iec:std:iec:60050-704-14-01}}),
      switching (see {{IEV 714-15-09, urn:iec:std:iec:60050-714-15-09}}), television
      (see {{IEV 723-05-17, urn:iec:std:iec:60050-723-05-17}} and  {{IEV 723-05-25,
      urn:iec:std:iec:60050-723-05-25}}), time division multiple access (see {{IEV
      725-14-18, urn:iec:std:iec:60050-725-14-18}}), digital processing (see {{IEV
      807-01-03, urn:iec:std:iec:60050-807-01-03}}), and train communication networks
      (see {{IEV 811-37-40, urn:iec:std:iec:60050-811-37-40}}).
