  notes:
  - content: "Dans l’ISO 80000-4, la viscosité (dynamique) stem:[η] est définie au
      moyen de l’équation\r\nstem:[τ]~xz~ = stem:[η]stem:[dv]~x~ /stem:[dz] \r\noù
      stem:[τ]~xz~ est la contrainte de cisaillement d’un fluide se déplaçant avec
      un gradient de vitesse dvx/dz perpendiculaire au plan de cisaillement."
