  definition:
  - content: dispositif destiné à transformer, avec une précision spécifiée et suivant
      une loi déterminée, le mesurande, ou la grandeur déjà transformée à partir du
      mesurande, en une grandeur électrique
  examples: []
  id: 312-02-15
  notes:
  - content: Si la grandeur d'entrée est électrique, les grandeurs d'entrée et de
      sortie peuvent ne pas être de même nature, par exemple une tension et un courant.
  - content: Dans certains cas, les transducteurs de mesure ont également compte tenu
      de leur fonction, une dénomination spécifique, (par exemple, amplificateur,
      convertisseur, transformateur, transducteur de fréquence, etc.).
