  definition:
  - content: "density of photon intensity with respect to projected area in a specified
      direction at a specified point on a real or imaginary surfacestem:[L_(\"p\")
      = frac(\"d\" I_(\"p\"))(\"d\" A) frac(1)(cosalpha)]\r\nwhere stem:[I]~p~ is
      photon intensity, stem:[A] is area and stem:[α] the angle between the normal
      to the surface at the specified point and the specified direction"
  examples: []
  id: 845-21-051
  notes:
  - content: "In a practical sense, the definition of photon radiance can be thought
      of as dividing a real or imaginary surface into an infinite number of infinitesimally
      small surfaces which can be considered as {{point sources, urn:iec:std:iec:60050-845-21-033}},
      each of which has a specific photon intensity, stem:[I]~p~, in the specified
      direction. The photon radiance of the surface is then the integral of these
      photon radiance elements over the whole surface.\r\nThe equation in the definition
      can mathematically be interpreted as a derivative (i.e. a rate of change of
      photon intensity with projected area) and could alternatively be rewritten in
      terms of the average photon intensity, stem:[bar(I)_(\"p\")], as:\r\nstem:[L_(\"p\")
      = underset(A vec \"0\")(\"lim\") frac(bar(I)_(\"p\"))(A) \" \" frac(\"1\")(cosalpha)].\r\nHence,
      photon radiance is often considered as a quotient of averaged quantities; the
      area, stem:[A], should be small enough so that uncertainties due to variations
      in photon intensity within that area are negligible; otherwise, the quotient
      stem:[bar(L)_(\"p\") = frac(bar(I)_(\"p\"))(A) \" \" frac(\"1\")(cosalpha)]
      gives the average photon radiance and the specific measurement conditions have
      to be reported with the result."
  - content: For a surface being irradiated, an equivalent formula in terms of photon
      irradiance, stem:[E]~p~, and solid angle, stem:[Ω], is stem:[L_("p") = frac("d"
      E_("p"))("d" Omega) " " frac("1")(costheta)], where stem:[θ] is the angle between
      the normal to the surface being irradiated and the direction of irradiation.
      This form is useful when the source has no surface (e.g. the sky, the plasma
      of a discharge).
  - content: An equivalent formula is stem:[L_("p") = frac("d" Phi_("p"))("d" G)],
      where stem:[Φ]~p~ is photon flux and stem:[G] is geometric extent.
  - content: "Photon flux can be obtained by integrating photon radiance over projected
      area, stem:[A]·cos stem:[α], and solid angle, stem:[Ω]:\r\nstem:[Phi_(\"p\")
      = \"​\" \"P{iint}\" L_(\"p\") * cosalpha \" \" \"d\" A \" \" \"d\" Omega]."
  - content: Since the optical extent, expressed by stem:[G·n]^2^, where stem:[G]
      is geometric extent and stem:[n] is refractive index, is invariant, the quantity
      expressed by stem:[L]~p~stem:[·n]^−2^ is also invariant along the path of the
      beam if the losses by absorption, reflection and diffusion are taken as 0. That
      quantity is called "basic photon radiance".
  - content: "The equation in the definition can also be described as a function of
      photon flux, stem:[Φ]~p~. In this case, it is mathematically interpreted as
      a second partial derivative of the photon flux at a specified point (stem:[x], stem:[y])
      in space in a specified direction (stem:[ϑ], stem:[φ]) with respect to projected
      area, stem:[A]·cos stem:[α], and solid angle, stem:[Ω],\r\nstem:[L_(\"p\") (
      x , y , vartheta , phi ) = frac(del^(2) Phi_(\"p\") ( x , y , vartheta , phi
      ))(del A ( x , y ) * cosalpha * del Omega (vartheta , phi)) \" \"]\r\nwhere
      stem:[α] is the angle between the normal to that area at the specified point
      and the specified direction."
  - content: The corresponding radiometric quantity is "radiance". The corresponding
      photometric quantity is "luminance".
  - content: The photon radiance is expressed in second to the power minus one per
      square metre per steradian (s^−1^·m^−2^·sr^−1^).
  - content: This entry was numbered 845-01-36 in IEC 60050-845:1987.
