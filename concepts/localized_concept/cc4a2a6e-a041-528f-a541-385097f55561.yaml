---
data:
  definition:
  - content: "inaptitude à fonctionner tel que requis, due à un état interne\r\nNote
      1 à l’article: La panne d’une entité est due soit à une défaillance de l’entité
      elle-même, soit à une imperfection lors d’une étape précédente du cycle de vie,
      telle que la spécification, la conception, la fabrication ou la maintenance.
      Voir panne latente ({{192-04-08, urn:iec:std:iec:60050-192-04-08}}). Note 2
      à l’article: La cause d’une panne peut être indiquée par un complément, par
      exemple, panne due à la spécification, à la conception, à la fabrication, à
      la maintenance, à un mauvais emploi ou une fausse manoeuvre. Note 3 à l’article:
      Le type de panne peut être associé au type de la défaillance correspondante,
      par exemple, panne par usure et défaillance par usure. Note 4 à l’article: Le
      terme «en panne» qualifie une entité faisant l’objet d’une ou plusieurs pannes."
