---
data:
  definition:
  - content: 'pour un bipôle capacitif de bornes A et B, quotient de la charge électrique
      stem:[q] en A par la tension électrique ({{131-11-56, urn:iec:std:iec:60050-131-11-56}})
      stem:[u]~AB~ entre les bornes stem:[C = frac(q)(u_(rm(AB)))] où le signe de
      la charge électrique est déterminé en prenant, dans l’intégrale par rapport
      au temps qui définit cette charge, le courant électrique positif si le sens
      du courant est de A vers B et négatif si son sens est de B vers ANote 1 à l’article:
      Une capacité ne peut pas être négative. Note 2 à l’article: L’unité SI cohérente
      de capacité est le farad, F.'
