---
data:
  definition:
  - content: ensemble des {{disposition, urn:iec:std:iec:60050-901-05-01}}s qui contiennent
      la substance d'un {{document normatif, urn:iec:std:iec:60050-901-02-01}}
  examples: []
  id: 901-05-11
  notes:
  - content: Dans le cas d'une {{norme, urn:iec:std:iec:60050-901-02-02}}, le corps
      comprend des éléments généraux relatifs à son objet et à ses définitions, et
      des éléments principaux qui comportent les dispositions.
  - content: Certaines parties du corps d'un document normatif peuvent prendre la
      forme d'annexes («annexes normatives»), pour des raisons pratiques, mais d'autres
      annexes (informatives) peuvent n'être constituées que par des {{éléments complémentaires,
      urn:iec:std:iec:60050-901-05-12}}.
