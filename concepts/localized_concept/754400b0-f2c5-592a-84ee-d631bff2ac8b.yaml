  id: 103-09-07
  notes:
  - content: The autocorrelation function of a deterministic function or a stationary
      random function is the inverse Fourier transform of its power spectral density.
  - content: 'When a stationary random function can be considered as ergodic, its
      autocorrelation function can be calculated from a particular sample: stem:[C
      ( t ) = underset(T vec oo)("lim") frac(1)(2 T) int_(" " - T)^(" " + T) f ( tau
      ) f ( t + tau ) rm(d) tau]'
