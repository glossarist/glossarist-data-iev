  definition:
  - content: transformateur dans lequel le circuit magnétique est en forme de colonnes
  examples: []
  id: 421-01-07
  notes:
  - content: Généralement les transformateurs à colonne comportent des enroulements
      concentriques.
  - content: Puisqu'il y a des types de transformateurs qui n'entrent pas de façon
      bien définie dans les catégories des transformateurs "à colonnes" et des transformateurs
      "cuirassés", l'usage de ces termes est déconseillé. Ils peuvent généralement
      être évités en indiquant le type des enroulements, à savoir "concentriques"
      ou "alternés" et/ou si le circuit magnétique comporte ou non des culasses magnétiques
      de retour non bobinées.
