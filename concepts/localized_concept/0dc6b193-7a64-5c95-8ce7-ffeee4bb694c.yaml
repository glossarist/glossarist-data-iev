data:
  definition:
  - content: "{{multiplexage, urn:iec:std:iec:60050-701-03-09}} selon lequel des longueurs
      d'ondes distinctes sont attribuées à plusieurs {{signaux, urn:iec:std:iec:60050-701-01-02}}
      indépendants en vue de leur {{transmission, urn:iec:std:iec:60050-701-01-03}}
      sur un support de transmission (voir {{IEV 704-02-01, urn:iec:std:iec:60050-704-02-01}})
      optique commun"
  examples: []
  id: 704-08-06
  notes:
  - content: Le multiplexage en longueur d'onde est une forme de {{multiplexage en
      fréquence, urn:iec:std:iec:60050-704-08-05}}. L'emploi du terme distinct "multiplexage
      en longueur d'onde" permet de distinguer ce concept de celui dans lequel le
      multiplexage en fréquence est employé pour assembler le signal en {{bande de
      base, urn:iec:std:iec:60050-702-01-06}} destiné à être acheminé sur le support
      optique à une certaine {{longueur d'onde, urn:iec:std:iec:60050-103-10-10}}.
