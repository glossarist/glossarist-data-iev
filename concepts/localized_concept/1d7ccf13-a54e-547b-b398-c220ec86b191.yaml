data:
  definition:
  - content: "{{valeur assignée, urn:iec:std:iec:60050-151-16-08}} de la tension de
      tenue efficace fixée par le fabricant aux matériels ou à une partie d'entre
      eux, caractérisant la capacité de tenue spécifiée (à long terme) de son isolation"
  examples: []
  id: 312-06-02
  notes:
  - content: La tension assignée d'isolement n'est pas nécessairement égale à la tension
      assignée des matériels qui est principalement liée aux caractéristiques fonctionnelles.
