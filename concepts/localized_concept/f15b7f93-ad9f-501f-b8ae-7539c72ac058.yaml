  definition:
  - content: the radiating element of a reflector or lens antenna which is coupled
      to the transmitter or receiver directly, or through a feed line, and which illuminates
      the reflector or the lens
  examples: []
  id: 712-05-39
  notes:
  - content: An antenna may include more than one primary radiator.
  - content: In the case of a multiple reflector antenna, the primary radiator illuminates
