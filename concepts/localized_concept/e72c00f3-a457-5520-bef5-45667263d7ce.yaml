  definition:
  - content: "of a material for indirectly ionizing particles, the quotient dstem:[N]/stem:[N]
      by stem:[ρ] dstem:[l],where dstem:[N]/stem:[N] is the fraction of particles
      that experience interactions in traversing a distance dstem:[l] in a medium
      of density stem:[ρ]\r\nstem:[frac(mu)(rho) = frac(1)(rho N) frac(\"d\" N)(\"d\"
      l)]"
  examples: []
  id: 881-04-27
  notes:
  - content: The mass attenuation coefficient stem:[frac(mu)(rho)] for X-radiation
      and gamma-radiation may be expressed as the sum of several parts, each attributed
      to a particular phenomenon; stem:[frac(tau)(rho)] for the photoelectric effect;
      stem:[frac(sigma_(c))(rho)] for the Compton effect; stem:[frac(sigma_("coh"))(rho)]
      for coherent scattering; and stem:[frac(kappa)(rho)] for pair production.
  terms:
