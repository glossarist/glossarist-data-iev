  definition:
  - content: the time interval between unhooking and either receipt by the calling
      party of some indication of the success or failure of the call attempt or abandonment
      of the call attempt
  examples: []
  id: 722-10-15
  notes:
  - content: The calling duration is the sum of the dial tone delay, the dialling
      duration and the post-dialling delay.
