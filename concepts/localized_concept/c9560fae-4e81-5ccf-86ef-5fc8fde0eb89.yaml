  definition:
  - content: rapport du rayon terrestre équivalent au rayon réel de la Terre
  examples: []
  id: 705-05-41
  notes:
  - content: "Le facteur multiplicatif stem:[k] du rayon terrestre est lié au gradient
      vertical dstem:[n]/dstem:[h] de l'indice de réfraction et au rayon réel stem:[a]
      de la Terre par la relation:\r\nstem:[k = frac(1)(1 + a frac(\"d\" n)(\"d\"
      h))]"
  - content: Pour une atmosphère ayant un gradient normal du coïndice, la valeur de
      stem:[k] est prise égale à 4/3, ce qui correspond à un rayon terrestre équivalent
      voisin de 8 500 km.
