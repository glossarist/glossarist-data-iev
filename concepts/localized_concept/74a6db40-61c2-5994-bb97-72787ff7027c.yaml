  definition:
  - content: process in which a {{signal, urn:iec:std:iec:60050-701-01-02}} is sampled
      and the difference between each {{sample, urn:iec:std:iec:60050-702-04-06}}
      and its predicted value derived from the succession of previous samples or quantized
      values is {{quantized, urn:iec:std:iec:60050-351-41-13}}, and the resulting
      succession of quantized values is converted by {{encoding, urn:iec:std:iec:60050-702-05-13}}
      into a {{digital signal, urn:iec:std:iec:60050-702-04-05}}
