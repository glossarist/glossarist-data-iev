  definition:
  - content: paint, pigment or dye that exhibits fluorescence as the result of exposure
      to daylight
  examples: []
  id: 845-22-055
  notes:
  - content: Daylight fluorescent colours absorb energy from daylight in the shorter
      wavelength regions of the visible spectrum and/or in the ultraviolet region
      and re-radiate some of this energy at longer wavelengths, producing radiation
      in a small range of wavelengths in the visible region.
  - content: See also "{{photoluminescent material, urn:iec:std:iec:60050-845-24-040}}",
      "{{fluorescent material, urn:iec:std:iec:60050-845-24-041}}".
