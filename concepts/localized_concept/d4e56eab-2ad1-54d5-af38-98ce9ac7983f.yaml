  definition:
  - content: propriété d'un système qui implique que ses variables d'état puissent
      être changées d'un état initial en un état final désiré, en un temps fini, par
      l'intermédiaire de variations temporelles adéquates des variables d'entrée
  examples: []
  id: 351-42-22
  notes:
  - content: Si ce changement est possible quels que soient les états initial et final
      le système est dit entièrement commandable.
