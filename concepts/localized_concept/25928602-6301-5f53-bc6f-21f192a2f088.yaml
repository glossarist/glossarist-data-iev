---
data:
  definition:
  - content: champ électrique dont le gradient de tension entre électrodes n'est pas
      essentiellement constant
  examples: []
  id: 442-09-03
  notes:
  - content: La condition de champ hétérogène d'une configuration point par rapport
      à une électrode plane est le cas le plus contraignant vis-à-vis de la tenue
      aux surtensions et est représenté par le cas A dans l'IEC 60664-1. Elle est
      représentée par une électrode point ayant un rayon de 30 stem:[mu]m et une surface
      plane de 1 m &times; 1 m.
  - content: Pour les fréquences dépassant 30 kHz, le champ est considéré comme étant
      non homogène, lorsque le rayon de courbure des parties conductrices est inférieur
      à 20 % de la distance d’isolement.
