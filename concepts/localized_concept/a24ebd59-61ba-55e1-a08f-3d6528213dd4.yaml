---
data:
  definition:
  - content: élément de l'ensemble totalement ordonné et illimité {..., &minus;2,
      &minus;1, 0, 1, 2, ...}
  examples: []
  id: 102-02-02
  notes:
  - content: L'ensemble des nombres entiers est le plus petit ensemble d'entités mathématiques
      qui contient les nombres entiers naturels et pour lequel la soustraction est
      définie pour tout couple d'entités. Les opérations d'addition et de multiplication
      sont aussi définies pour tout couple d'entiers. Tout nombre entier a un opposé.
  - content: L'ensemble des entiers est noté ℤ (Z avec la barre oblique doublée) ou
      *Z*. L'ensemble sans zéro est noté en ajoutant un astérisque au symbole, par
      exemple ℤ*.
