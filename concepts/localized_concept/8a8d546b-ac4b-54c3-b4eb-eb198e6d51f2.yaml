  definition:
  - content: "a stable telephone transmission system intended for measurement of loudness
      ratings and provided with:\r\na sending system and a receiving system with handsets
      the defined sensitivity/frequency responses of which are restricted in bandwidth
      to typify those of sending and receiving systems of a complete telephone connection;\n\na
      device for calibrating, in terms of absolute units, the above sending and receiving
      systems;\n\nan attenuator capable of adjustment to any desirable value"
  examples: []
  id: 722-16-29
  notes:
  - content: The CCITT intermediate reference system is described in the CCITT Recommendation
      P48 from the Volume V of the Blue Book, 1989.
