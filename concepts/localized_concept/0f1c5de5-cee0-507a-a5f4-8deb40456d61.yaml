---
data:
  definition:
  - content: opération effectuée sur un ensemble pour lequel une multiplication commutative
      est définie, dont le résultat, pour deux éléments stem:[a] et stem:[b] de l'ensemble,
      est l'élément unique stem:[q], s'il existe dans l'ensemble, telle que stem:[b
      * q = a]
  examples: []
  id: 102-01-21
  notes:
  - content: La division est définie pour les nombres rationnels et étendue à d'autres
      classes de nombres, sauf la division par zéro, et à des entités mathématiques
      telles que les polynômes, ainsi qu'aux grandeurs et aux unités.
  - content: Dans une division stem:[a / b], le premier élément stem:[a] est appelé
      «dividende» et le deuxième «diviseur».
  - content: La division des entités stem:[a] et stem:[b] est exprimée par les mots
      «stem:[a] divisé par stem:[b]» ou «stem:[a] par stem:[b]» et est notée stem:[frac(a)(b)],
      stem:[a / b] ou stem:[a b^(- 1)].
