---
data:
  definition:
  - content: dispositif optique qui modifie un faisceau de {{rayonnement optique,
      urn:iec:std:iec:60050-845-21-002}} afin de produire un faisceau de {{rayonnement
      non polarisé, urn:iec:std:iec:60050-845-21-021}} indépendamment de l'état de
      polarisation du rayonnement incident
  examples: []
  id: 845-24-015
  notes:
  - content: Aucune méthode simple et entièrement satisfaisante de dépolarisation
      d'un faisceau de rayonnement n'est identifiée. Les méthodes habituelles produisent
      différents états de polarisation par rapport au temps, à la longueur d'onde
      ou à l'ouverture du faisceau. Les dispositifs fonctionnant suivant ce principe
      sont généralement appelés pseudo-dépolariseurs.
  terms:
