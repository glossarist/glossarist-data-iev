---
data:
  definition:
  - content: 'unité de {{quantité de données, urn:iec:std:iec:60050-171-02-09}}, correspondant
      à un {{octet, urn:iec:std:iec:60050-171-02-12}}Note 1 à l’article: L’unité octet
      peut être combinée avec des préfixes SI, par exemple kilooctet (ko), ou avec
      des préfixes binaires, par exemple kibioctet (Kio). Pour des multiples binaires
      (puissances de 2), il est recommandé d’employer des préfixes binaires pour éviter
      toute ambiguïté. Note 2 à l’article: L’unité octet peut être combinée avec d’autres
      unités, par exemple octet par seconde (o/s). Note 3 à l’article: Le symbole
      d’unité o est généralement employé en français.'
