---
data:
  definition:
  - content: "ensemble d’entités reliées entre elles qui satisfont collectivement
      à une exigence\r\nNote 1 à l’article: Un système est considéré comme ayant une
      frontière définie, réelle ou abstraite. Note 2 à l’article: Des ressources externes
      (provenant d’au-delà de la frontière) peuvent être nécessaires au fonctionnement
      du système. Note 3 à l’article: La structure d’un système peut être hiérarchique,
      par exemple, système, sous-système, composant, etc. Note 4 à l’article: Il convient
      d’exprimer ou de sous-entendre les conditions d’utilisation et de maintenance
      dans l’exigence."
