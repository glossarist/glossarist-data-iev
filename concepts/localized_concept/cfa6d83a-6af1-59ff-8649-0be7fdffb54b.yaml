  definition:
  - content: surrounding earthed metallic layer which serves to confine the electric
      field within the cable and/or to protect the cable from external electrical
      influence
  examples: []
  id: 461-03-04
  notes:
  - content: Metallic sheaths, foils, braids, armours and earthed concentric conductors
