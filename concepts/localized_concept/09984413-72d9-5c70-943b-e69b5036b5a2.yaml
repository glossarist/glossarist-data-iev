  definition:
  - content: a function equal to the ratio of Fourier transforms of corresponding
      signals at output and input of a linear and time-invariant two port device
  examples: []
  id: 702-07-29
  notes:
  - content: The frequency response of a two-port device equals the ratio of the Laplace
      transforms of output and input signals for the purely imaginary values of the
      complex frequency, the variable of Laplace transform. It is then the Fourier
      transform of the unit pulse response of the two-port device.
