  id: 102-01-04
  notes:
  - content: The notation stem:[A subseteq B] expresses that the set stem:[A] is a
      subset of the set stem:[B]. The symbol stem:[subset] is sometimes used instead
      of stem:[subseteq], but this is not recommended. stem:[A] is also said to be
      included in stem:[B].
