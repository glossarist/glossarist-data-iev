  definition:
  - content: vector *stem:[k]* in the expression stem:[omega " " t - k * r + vartheta_(0)]
      of the phase of a sinusoidal wave
  examples: []
  id: 103-10-09
  notes:
  - content: The wave vector is normal to the wave front and its magnitude is the
      angular wavenumber.
  - content: This concept can be generalized to complex wave vector in order to take
      attenuation in account (see IEC 60050-705).
