---
data:
  definition:
  - content: variation dans le temps de l'énergie lumineusestem:[Phi_("v") = frac("d"
      Q_("v"))("d" t)]où stem:[Q]~v~ est l'énergie lumineuse émise, transférée ou
      reçue, et stem:[t] est le temps
  examples: []
  id: 845-21-039
  notes:
  - content: Le flux lumineux est la grandeur dérivée du flux énergétique, stem:[Φ]~e~,
      par l'évaluation du rayonnement d'après son action sur l'{{observateur de référence
      photométrique CIE, urn:iec:std:iec:60050-845-21-036}}. Le flux lumineux peut
      être dérivé de la répartition spectrale du flux énergétique parstem:[Phi_("v")
      = K_("m") int_(0)^(oo) Phi_("e" "," lambda) ( lambda ) " " " " V ( lambda )
      " " "d" lambda]où stem:[K]~m~ est l'efficacité lumineuse maximale, stem:[Φ]~e,stem:[λ]~(stem:[λ])
      est le flux énergétique spectral, stem:[V](stem:[λ]) est l'efficacité lumineuse
      spectrale et stem:[λ] est la longueur d'onde.
  - content: La répartition des intensités lumineuses en fonction de la direction
      d'émission, par exemple, donnée par les angles polaires (stem:[ϑ], stem:[φ]),
      permet de déterminer le flux lumineux, stem:[Φ]~v~, selon un certain angle solide,
      stem:[Ω], d'une source:stem:[Phi_("v") = "P{iint}"_(Omega) I_("v") (vartheta
      , phi) "sin" vartheta " d" phi " d" vartheta].
  - content: La grandeur radiométrique correspondante est le "flux énergétique". La
      grandeur correspondante pour photons est le "flux photonique".
  - content: Le flux lumineux est exprimé en lumen (lm).
  - content: Cet article était numéroté 845-01-25 dans l'IEC 60050-845:1987.
