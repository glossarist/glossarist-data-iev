  definition:
  - content: quotient of the {{character mean entropy, urn:iec:std:iec:60050-171-07-28}}
      stem:[H]^′^ by the mean duration of a character stem:[H]^*^ &amp;equals; stem:[H]^′^/stem:[t](stem:[X])
      where stem:[X] &amp;equals; {stem:[x]~1~, …, stem:[x]~stem:[n]~} is the set
      of input characters stem:[x~i~] (stem:[i] &amp;equals; 1, …, stem:[n]) and stem:[t
      (X) = sum_(n = 1)^(n) p ( x_(i) ) * t ( x_(i) )] is the mean value of the duration
      stem:[t](stem:[x~i~]) of a character stem:[x~i~] which occurs with probability
      stem:[p](stem:[x~i~])
