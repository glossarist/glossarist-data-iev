  definition:
  - content: set of rules for data transmission in a system interlinking several participants
  examples: []
  id: 351-56-14
  notes:
  - content: A protocol may define the conditions for establishing a connection to
      a transmission medium, the rules governing access to the medium, the procedures
      for error protection, the functional and procedural means of data exchange,
      the transport mechanisms, the communication control, the representation of data
      and the exchange of application data.Protocols define, for example:* data units
      transferred between participants,* the meaning of data units (semantics),* the
      format of data units (syntax) and* the logic time sequence of data exchange.
  - content: The protocols used in a system may be organized in accordance with the
      OSI/ISO seven-layer reference model, for example.
  - content: This entry was numbered 351-32-13 in IEC 60050-351:2006.
