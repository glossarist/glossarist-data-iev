data:
  definition:
  - content: 'conception des produits et services principaux accessibles et utilisables
      par toutes les personnes, y compris tout particulièrement les personnes présentant
      des handicaps et les personnes ayant des besoins spécifiques dès leur naissanceNote
      1 à l’article: Les termes tels que conception universelle, conception accessible,
      conception pour tous, aménagement à accès facile, conception inclusive et conception
      transgénérationnelle sont souvent utilisés indifféremment, avec la même signification.'
