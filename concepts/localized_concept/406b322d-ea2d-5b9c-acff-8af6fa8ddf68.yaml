  - content: radiation caractérisée par une seule {{fréquence, urn:iec:std:iec:60050-103-06-02}}
      ou une seule longueur d'onde
  examples: []
  id: 845-21-014
  notes:
  - content: Si la longueur d'onde est utilisée pour caractériser une radiation monochromatique,
      le milieu doit être indiqué.
  - content: Dans la pratique, la radiation monochromatique est le rayonnement s'étendant
      sur un très petit domaine de fréquences ou de longueurs d'onde et qui peut être
      décrit par l'indication d'une seule fréquence ou d'une seule longueur d'onde.
