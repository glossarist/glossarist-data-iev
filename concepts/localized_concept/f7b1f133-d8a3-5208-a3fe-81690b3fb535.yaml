  definition:
  - content: "{{quantity, urn:iec:std:iec:60050-112-01-01}} which can be represented
      by a {{vector, urn:iec:std:iec:60050-102-03-04}} multiplied by a {{scalar quantity,
      urn:iec:std:iec:60050-102-02-19}}"
  examples: []
  id: 102-03-21
  notes:
  - content: 'The vector defining a vector quantity is generally a unit vector in
      the usual two- or three-dimensional geometrical space. A vector quantity can
      then be represented as an oriented line segment characterized by its point of
      acting, its direction and its magnitude, where the magnitude is a non-negative
      number multiplied by a unit of measurement. The components are also the product
      of a numerical value and the unit. Examples of vector quantities are: velocity,
      force, electric field strength.'
  - content: A vector quantity may be considered either as attached to a point of
      acting (localized or bound vector), or as having any point of acting on a straight
      line parallel to it (sliding vector), or as having any point of acting in the
      space (free vector).
  - content: Operations defined for vectors apply to vector quantities. For example,
      the product of a scalar quantity stem:[p] and the vector quantity stem:[Q =
      q e] is the vector quantity stem:[p Q = p q e], where *stem:[e]* is a unit vector.
