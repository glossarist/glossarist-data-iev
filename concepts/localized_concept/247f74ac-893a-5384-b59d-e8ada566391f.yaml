  definition:
  - content: "élément de transfert linéaire invariant dans le temps dont la fonction
      de transfert a exactement un pôle de valeur réelle négative et pas de zéroNote
      1 à l’article: La fonction de transfert d'un élément de retard de premier ordre
      est donnée parstem:[frac(V (s))(U (s)) = frac(K_(\"Ρ\"))(1 + T_(1) * s)]où<table>\r\n<tr>\n<td>\nstem:[K]~P~\n</td>\n<td>est
      le coefficient d’action proportionnelle;</td>\n</tr>\r\n<tr>\n<td>\nstem:[T]~1~\n</td>\n<td>est
      la constante de temps;</td>\n</tr>\r\n<tr>\n<td>stem:[s]</td>\n<td>est la variable
      complexe de la transformée de Laplace;</td>\n</tr>\r\n<tr>\n<td>\nstem:[U](stem:[s])</td>\n<td>est
      la transformée de la variable d’entrée;</td>\n</tr>\r\n<tr>\n<td>\nstem:[V](stem:[s])</td>\n<td>est
      la transformée de la variable de sortie.</td>\n</tr>\r\n</table>"
