data:
  definition:
  - content: "en régime sinusoïdal, produit du phaseur stem:[underline(U)]\n\nreprésentant
      la tension électrique aux bornes d’un bipôle linéaire, élémentaire ou non, et
      du conjugué du phaseur stem:[underline(I)]\n\nreprésentant le courant électrique
      dans le bipôle stem:[underline(S) = underline(U) underline(I) *]\r\nNote 1 à
      l’article: La puissance complexe est égale à stem:[P + rm(j) Q], où stem:[P]
      est la puissance active et stem:[Q] la puissance réactive. Note 2 à l’article:
      L’unité SI cohérente de puissance complexe est le voltampère, VA."
