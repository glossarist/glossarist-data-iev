  definition:
  - content: the assembly, by digital multiplexing, of a specified number of digital
      signals constituting the first level of a digital multiplex hierarchy
  examples: []
  id: 704-20-08
  notes:
  - content: The primary digital groups standardized by CCITT operate at a digit rate
      of 1 544 or 2 048 kbit/s; they comprise digital signals occupying channel time-slots,
      each of which has normally 8 digit time-slots and an effective digit rate of
      64 kbit/s.
  - content: The term "digroup" is used to designate a primary digital group operating
      at a digit rate of 1 544 kbit/s.
