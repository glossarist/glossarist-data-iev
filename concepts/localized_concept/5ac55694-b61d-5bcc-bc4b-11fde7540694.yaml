  definition:
  - content: "pour un ensemble de stem:[n] éléments de circuit magnétiques formant
      un circuit magnétique, matrice exprimant les flux magnétiques stem:[Φ]~stem:[i]~
      dans les éléments en fonction des courants totalisés stem:[Ө]~stem:[j]~  des
      éléments:\r\nstem:[([Phi_(1)], [Phi_(2)], [vdots], [Phi_(n)]) = ([Lambda_(11),
      Lambda_(12), ..., Lambda_(1 n)], [Lambda_(21), , , vdots], [vdots, , , vdots],
      [Lambda_(n 1), ..., ..., Lambda_(n n)]) * ([Theta_(1)], [Theta_(2)], [vdots],
      [Theta_(n)])]"
  examples: []
  id: 131-12-37
  notes:
  - content: Une matrice des perméances est toujours symétrique et définie positive.
  - content: En électromagnétisme, la matrice des perméances peut être définie, pour
      un ensemble de contours fermés, comme la matrice exprimant les relations linéaires
      entre les flux magnétiques qui traversent des surfaces limitées par les contours
      et les courants totalisés dans ces contours.
