  definition:
  - content: phase/neutral or phase/phase voltage value assigned to the connecting
      device by the manufacturer, this device being intended to be used in installations,
      the voltage supply of which does not exceed the rated insulation voltage of
      the connecting device itself
  examples: []
  id: 442-06-39
  notes:
  - content: Rated insulation voltage is always understood to be between live parts
      and not between live parts and earth (ground).
