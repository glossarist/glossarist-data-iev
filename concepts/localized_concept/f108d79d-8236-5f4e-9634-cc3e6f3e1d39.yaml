  definition:
  - content: design of a physical unit or a device so that the output variable does
      not change its value if the output is burdened with the inputs of other physical
      units or devices
  examples:
  - content: outputs for phantom circuits
  - content: outputs with tristate characteristic
  - content: diode-decoupled outputs.
