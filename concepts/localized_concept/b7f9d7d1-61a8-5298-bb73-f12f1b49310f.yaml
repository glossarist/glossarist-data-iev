  definition:
  - content: mean value of irradiance on the outer curved surface of a very small
      (real or imaginary) sphere at a point in space
  examples: []
  id: 845-21-054
  notes:
  - content: The spherical irradiance can be expressed bystem:[E_("e,o") = int_(4
      pi) L_("e") " " "d" Omega]where stem:[Ω] is solid angle and stem:[L]~e~ is radiance.
  - content: The spherical irradiance is the quotient of the radiant flux of all the
      radiation incident on the outer surface of an infinitely small sphere centred
      at the specified point and the area of the diametrical cross-section of that
      sphere.
  - content: The analogous quantities "spherical illuminance", stem:[E]~v,o~, and
      "photon spherical irradiance", stem:[E]~p,o~, are defined in a similar way,
      replacing radiance, stem:[L]~e~, by luminance, stem:[L]~v~, and photon radiance,
      stem:[L]~p~, respectively.
  - content: The spherical irradiance is the appropriate radiometric quantity for
      describing a dose rate for a photobiological or photochemical effect in a scattering
      medium (e.g. light in skin). The spherical irradiance is also the appropriate
      quantity for describing the irradiation of microorganisms. The spherical irradiance
      is frequently used incorrectly as a substitute for irradiance in some publications.
  - content: The spherical irradiance is expressed in watt per square metre (W·m^−2^).
  - content: This entry was numbered 845-01-40 in IEC 60050-845:1987.
