  definition:
  - content: fonction de tout le message sans clé secrète
  examples: []
  id: 821-11-27
  notes:
  - content: Par opposition au code d’authentification de message, aucune clé secrète
      n’est impliquée. Par "tout le message", on comprend également toute donnée implicite
      du message qui n’est pas envoyé au système de transmission. Le code de détection
      de manipulation est souvent basé sur une fonction de brouillage.
