  definition:
  - content: the controlled loss or gain of a set of consecutive digit time-slots
      in a digital signal to enable it to accord with a digit rate different from
      its own digit rate, and in which this loss or gain of digit time-slots cannot
      be corrected
  examples: []
  id: 704-18-13
  notes:
  - content: The term may be qualified, for example, controlled octet slip, controlled
      frame slip.
