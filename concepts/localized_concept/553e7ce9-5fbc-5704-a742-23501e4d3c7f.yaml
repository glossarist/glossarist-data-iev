      the time;</td>\n</tr>\r\n<tr>\n<td>\nstem:[u](stem:[t])</td>\n<td>is the input
      variable;</td>\n</tr>\r\n<tr>\n<td>stem:[f]</td>\n<td>is the function;</td>\n</tr>\r\n<tr>\n<td>\nstem:[v](stem:[t])</td>\n<td>is
      the output variable.</td>\n</tr>\r\n</table>"
