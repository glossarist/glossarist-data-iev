  definition:
  - content: 'unité fonctionnelle utilisée pour piloter des éléments de commande finals
      actionnés mécaniquementNote 1 à l’article: Des exemples de commandes d''actionnement
      sont les dispositifs d''actionnement électriques, hydrauliques ou pneumatiques,
      les systèmes à diaphragme ou les actionneurs à vérins.Note 2 à l’article: Aucune
      commande d''actionnement n''est nécessaire à un élément de commande final, si
      la variable réglante à la sortie du régulateur est capable d''influencer directement
      la circulation de la masse ou de l''énergie, c’est-à-dire sans aucune grandeur
      variable intermédiaire mécanique.'
