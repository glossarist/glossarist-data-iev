  definition:
  - content: the dimension along a scanning line of the smallest recognizable detail
      of the image produced by the shortest signal capable of actuating a facsimile
      receiver under specified conditions
  examples: []
  id: 721-14-13
  notes:
  - content: In phototelegraphy, the longitudinal and transverse dimensions of the
      finest detail correspond to those of the picture element.
  - content: In document facsimile, the longitudinal resolution is determined by the
      length of the line produced by the shortest nominal black or nominal white signal
      capable of actuating the receiver.
  terms:
  - type: expression
    normative_status: preferred
    designation: longitudinal resolution
