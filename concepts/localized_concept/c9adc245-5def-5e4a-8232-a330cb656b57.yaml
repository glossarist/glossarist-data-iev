  definition:
  - content: "élément de transfert pour lequel la valeur de la variable de sortie
      est proportionnelle à la dérivée par rapport au temps de la variable d'entréeNote
      1 à l’article: La fonction de transfert d'un élément à action par dérivation
      est donnée parstem:[frac(V (s))(U (s)) = K_(\"D\") * s]où<table>\r\n<tr>\n<td>\nstem:[K]~D~\n</td>\n<td>est
      le coefficient d’action par dérivation;</td>\n</tr>\r\n<tr>\n<td>stem:[s]</td>\n<td>est
      la variable complexe de la transformée de Laplace;</td>\n</tr>\r\n<tr>\n<td>\nstem:[U](stem:[s])</td>\n<td>est
      la transformée de la variable d’entrée;</td>\n</tr>\r\n<tr>\n<td>\nstem:[V](stem:[s])</td>\n<td>est
      la transformée de la variable de sortie.</td>\n</tr>\r\n</table>"
