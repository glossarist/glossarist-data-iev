  examples: []
  id: 192-01-20
  notes:
  - content: Degradation may occur with storage or use, brought about by internal
      processes or effects of the environment.
  - content: Degradation beyond specified limits may constitute a degraded state or
      failure.
  - content: In a system context, degradation may also be caused by failures within
      the system.
