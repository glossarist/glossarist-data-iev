  examples: []
  id: 581-26-15
  notes:
  - content: Un connecteur de baie et tiroir est habituellement muni d’un dispositif
      d’alignement qui permet un accouplement correct. Il n’a normalement aucun dispositif
      d’accouplement, celui-ci étant obtenu par le déplacement du tiroir dans la baie
      (ne s’applique pas aux cartes imprimées).
