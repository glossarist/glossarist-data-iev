  definition:
  - content: an hypothetical radiating element consisting of a conductor of vanishingly
      small length traversed by a time-varying electric current having at any instant
      the same value at all points
  examples: []
  id: 712-04-21
  notes:
  - content: The continuity conditions relating current to charges require that opposite
      ends of the current element be terminated by equal and opposite electric charges,
      these charges being also time-varying. The field of the hertzian dipole can
      be computed either from the current or from the charges.
  terms:
  - type: expression
    normative_status: preferred
    designation: hertzian (electric) dipole
  - type: expression
    designation: "(elementary) electric dipole"
  - type: expression
    designation: infinitesimal dipole
