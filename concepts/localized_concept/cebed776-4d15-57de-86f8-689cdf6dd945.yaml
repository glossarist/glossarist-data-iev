  definition:
  - content: at a stated operating point and frequency, the quotient of (1) the fundamental
      frequency component of the short-circuit current into the accessible terminal
      of an electrode by (2) the sinusoidal voltage applied to the terminal of another
      electrode to cause the current, all other terminal potentials being maintained
      constant
