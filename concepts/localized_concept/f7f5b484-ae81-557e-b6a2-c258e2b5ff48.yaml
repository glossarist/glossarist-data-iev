  definition:
  - content: pour une onde incidente de direction donnée, grandeur qui caractérise
      la puissance rétrodiffusée par un hydrométéore existant dans l'atmosphère
  examples: []
  id: 705-05-24
  notes:
  - content: "Pour une précipitation pluvieuse homogène, le coefficient de réflectivité
      radar est donné par l'expression:\r\nstem:[Z = frac(sum N_(i) D_(i)^(\"6\"))(V)]\r\noù
      stem:[N]~stem:[i]~ est le nombre de particules de diamètres stem:[D]~stem:[i]~
      dans le volume stem:[V]. Le coefficient stem:[Z] s'exprime généralement en mm^6^/m^3^."
