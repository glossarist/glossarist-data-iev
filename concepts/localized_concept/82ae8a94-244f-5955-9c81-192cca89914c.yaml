  definition:
  - content: electromagnetic phenomenon that can degrade the performance of a device,
      equipment or system, or adversely affect living or inert matter
  examples: []
  id: 161-01-05
  notes:
  - content: An electromagnetic disturbance can be an {{electromagnetic noise, urn:iec:std:iec:60050-161-01-02}},
      an {{unwanted signal, urn:iec:std:iec:60050-161-01-03}} or a change in the propagation
      medium itself.
  - content: In French, the terms "{{perturbation électromagnétique, urn:iec:std:iec:60050-161-01-05}}"
      and "{{brouillage électromagnétique, urn:iec:std:iec:60050-161-01-06}}" designate
      respectively the cause and the effect, and should not be used indiscriminately.
  - content: In English, the terms "{{electromagnetic disturbance, urn:iec:std:iec:60050-161-01-05}}"
      and "{{electromagnetic interference, urn:iec:std:iec:60050-161-01-06}}" designate
      respectively the cause and the effect, and should not be used indiscriminately.
  terms:
  - type: expression
    normative_status: preferred
    designation: electromagnetic disturbance
