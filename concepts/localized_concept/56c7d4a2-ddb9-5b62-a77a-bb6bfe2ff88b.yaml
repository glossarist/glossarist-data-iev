  definition:
  - content: luminous flux emitted by the light source under operating conditions,
      within a cone having a vertically downward axis and enclosing the solid angle
  examples: []
  id: 845-29-044
  notes:
  - content: The cumulative flux is expressed in lumen (lm).
  - content: In radiometry, the term "cumulative flux" is also used with respect to
      radiant flux instead of luminous flux and in that case is expressed in watt
