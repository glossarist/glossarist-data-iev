data:
  definition:
  - content: intégrale de temps de la luminance énergétique avec danger de la lumière
      bleue, stem:[L]~B~, intégrée par rapport à la durée d'exposition
  examples: []
  id: 845-26-058
  notes:
  - content: Cette définition est basée sur l'hypothèse selon laquelle un spectre
      d'action est adopté pour l'effet actinique pris en considération, et selon laquelle
      sa valeur maximale est égale à 1.
  - content: Il est essentiel de spécifier quel spectre d'action actinique est utilisé,
      dans la mesure où l'unité est la même pour tout spectre d'action.
  - content: Voir aussi "{{dose de radiance, urn:iec:std:iec:60050-845-21-067}}".
  - content: La dose de luminance énergétique avec danger de la lumière bleue est
      exprimée en joule par mètre carré par stéradian (J·m^−2^ sr^−1^).
