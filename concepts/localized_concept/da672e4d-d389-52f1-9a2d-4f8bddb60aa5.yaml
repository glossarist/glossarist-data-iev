  definition:
  - content: milieu qui peut être polarisé électriquement et dans lequel un champ
      électrique variable en fonction du temps produit une densité de courant électrique
      dont la composante suivant une direction donnée a une norme petite par rapport
      à celle de la composante suivant cette direction de la densité de courant de
      déplacement, dans une bande de fréquences déterminée
  examples: []
  id: 121-12-10
  notes:
  - content: "Pour un milieu isotrope, la propriété d’être diélectrique se traduit
      en régime sinusoïdal par la condition:\n\nstem:[frac(gamma)(epsilon_(0) omega)
      gg epsilon^(prime)_(\"r\")]\r\noù stem:[γ] est la conductivité, stem:[ε]~0~
      la constante électrique, stem:[ω] la pulsation et stem:[ε]′~r~ la permittivité
      relative réelle."
  - content: Un milieu anisotrope peut n’être diélectrique que dans certaines directions.
