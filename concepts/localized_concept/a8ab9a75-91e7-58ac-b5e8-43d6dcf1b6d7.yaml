  definition:
  - content: illuminant standardized by the CIE for the purpose of harmonization
  examples:
  - content: 'Examples of CIE standard illuminants are:* CIE standard illuminant A:
      relative spectral distribution of radiant flux based on Planckian radiation
      at a temperature of about 2 855,5 K;* CIE standard illuminant D65: relative
      spectral distribution of radiant flux representing a phase of daylight with
      a correlated colour temperature of approximately 6 500 K (called also "nominal
      correlated colour temperature of the daylight illuminant").'
  id: 845-23-021
  notes:
  - content: CIE standard illuminants should be used whenever appropriate in order
      to facilitate the comparison of published results.
  - content: See also CIE 15, stem:[Colorimetry].
  - content: 'See also ISO 11664-2/CIE S 014-2, _Colorimetry – Part 2: CIE Standard
      llluminants for Colorimetry_, in which examples are given for applications of
      use of CIE standard illuminants.'
  - content: Illuminants B, C and other {{daylight illuminants, urn:iec:std:iec:60050-845-23-020}},
      previously denoted as "standard illuminants", should now be termed "{{CIE illuminants,
      urn:iec:std:iec:60050-845-23-019}}".
  - content: This entry was numbered 845-03-12 in IEC 60050-845:1987.
