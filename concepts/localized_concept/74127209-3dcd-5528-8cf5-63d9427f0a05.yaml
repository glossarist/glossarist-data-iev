  definition:
  - content: protection which is intended to operate when a system fault is not cleared,
      or abnormal condition not detected, in the required time because of failure
      or inability of other protection to operate or failure of the appropriate circuit-breaker(s)
      to trip
  examples: []
  id: 448-11-14
  notes:
  - content: In the USA, the term "backup protection" designates a form of protection
      that operates independently of specified devices in the main protection system.
      The backup protection may duplicate the main protection or may be intended to
      operate only if the main protection system fails or is temporarily out of service.
  terms:
  - type: expression
    normative_status: preferred
    designation: backup protection
