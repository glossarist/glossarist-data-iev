  definition:
  - content: "quotient NC/ND of two collinear distances on the chromaticity diagram
      of the CIE 1931 or 1964 standard colorimetric systems, the first distance being
      that between the point C representing the colour stimulus considered and the
      point N representing the specified achromatic stimulus, the second distance
      being that between the point N and the point D on the spectrum locus at the
      dominant wavelength of the colour stimulus considered, leading to the following
      expressions:stem:[p_(\"e\") = frac(y - y_(\"n\"))(y_(\"d\") - y_(\"n\"))]\r\nand\r\nstem:[p_(\"e\")
      = frac(x - x_(\"n\"))(x_(\"d\") - x_(\"n\"))]where (stem:[x], stem:[y]), (stem:[x]~n~,
      stem:[y]~n~), (stem:[x]~d~, stem:[y]~d~) are the stem:[x], stem:[y] chromaticity
      coordinates of the points C, N and D respectively"
  examples: []
  id: 845-23-066
  notes:
  - content: In the case of purple stimuli, the monochromatic stimulus is replaced
      by a stimulus whose chromaticity is represented by a point on the purple boundary.
  - content: The formulae in stem:[x] and stem:[y] are equivalent, but greater precision
      is given by the formula which has the greater value in the numerator.
  - content: The excitation purity, stem:[p]~e~, is related to the colorimetric purity,
      stem:[p]~c~, by the equation:stem:[p_("e") = frac(p_("c") y)(y_("d"))]
  - content: The excitation purity has unit one.
  - content: This entry was numbered 845-03-48 in IEC 60050-845:1987.
  terms:
