  definition:
  - content: scalar, vector or tensor quantity, existing at each point of a defined
      space region and depending on the position of the point
  examples: []
  id: 102-05-17
  notes:
  - content: A field quantity may be a function of time or any other parameter.
  - content: In English the term "field quantity", in French "grandeur de champ",
      is also used to denote a quantity, the square of which is proportional to power,
      whereas quantities proportional to power are called "power quantities", whether
      or not the quantities depend on the position of a point (see {{IEV 702-02-08,
      urn:iec:std:iec:60050-702-02-08}}). According to ISO 80000-1:2009, Annex C,
      the preferred term is then “root-power quantity”.
