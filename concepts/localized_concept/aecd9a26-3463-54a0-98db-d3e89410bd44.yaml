  definition:
  - content: "quotient of the temperature coefficient of permeability by the permeability
      at temperature stem:[Θ]\n\nstem:[alpha_(\"F\") = frac(alpha_(mu))(mu_(Theta))
      = frac(mu_(Theta) - mu_(\"ref\"))(mu_(Theta) mu_(\"ref\") (Theta - Theta_(\"ref\")))]\r\nor\r\nstem:[alpha_(\"F\")
      = frac(alpha_(mu))(mu_(\"ref\")) = frac(mu_(Theta) - mu_(\"ref\"))(mu_(\"ref\")^(2)
      (Theta - Theta_(\"ref\")))]\n\nwhen stem:[µ]~stem:[Θ]~ and stem:[µ]~ref~ differ
      insignificantly"
  examples: []
  id: 221-02-49
  notes:
  - content: "The temperature factor of permeability is a material property which
      enables to calculate the temperature coefficient of effective permeability stem:[α]~stem:[µ]e~
      by multiplying stem:[α]~F~ by stem:[µ]~e~:\r\nstem:[alpha_(mu \"e\") = alpha_(\"F\")
      * mu_(\"e\"^(*))]"
  terms:
