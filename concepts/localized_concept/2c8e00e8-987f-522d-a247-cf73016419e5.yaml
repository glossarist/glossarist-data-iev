  definition:
  - content: phénomène dans lequel les noyaux atomiques entrent en résonance en réponse
      au rayonnement électromagnétique d'une certaine fréquence lorsqu'ils sont placés
      dans un champ magnétique constant
  examples: []
  id: 891-04-59
  notes:
  - content: La résonance magnétique nucléaire peut être utilisée pour identifier
      à l'intérieur des molécules des atomes inconnus, ou pour déterminer la concentration
      d'atomes connus.
