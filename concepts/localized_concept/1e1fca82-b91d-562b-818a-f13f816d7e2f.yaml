  definition:
  - content: "{{facteur, urn:iec:std:iec:60050-112-03-04}} exprimé habituellement
      en pourcentage ou en une fraction décimale quelconque, telle que millième ou
      millionième\r\nNote 1 à l’article: L’emploi du terme \"rate\" dans ce sens est
      souvent déconseillé en anglais en faveur de \"ratio\". Par exemple, il est recommandé
      d’utiliser \"error ratio\" et non \"error rate\" pour le taux d’erreurs (voir
      {{IEV 702-07-39, urn:iec:std:iec:60050-702-07-39}}). Dans d'autre exemples,
      comme {{taux d'harmoniques, urn:iec:std:iec:60050-103-07-32}} et {{taux de modulation,
      urn:iec:std:iec:60050-702-06-19}}, \"factor\" est employé en anglais."
