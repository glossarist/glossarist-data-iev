  definition:
  - content: in a radio receiver using frequency translation, the frequency symmetrical
      to the frequency of the radio-frequency signal considered at the input, with
      respect to the frequency of the first local oscillator
  examples: []
  id: 713-10-12
  notes:
  - content: There is an image frequency only if the frequency of the local oscillator
      is at least equal to half the frequency of the input signal.
  terms:
  - type: expression
    normative_status: preferred
    designation: image frequency
