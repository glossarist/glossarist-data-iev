  definition:
  - content: qualifies a circuit element or a circuit for which the integral quantities
      are linearly related
  examples: []
  id: 131-11-18
  notes:
  - content: "A relation stem:[y] = stem:[F(x)] between two quantities stem:[x] and
      stem:[y], where stem:[F] is an operator, is linear if\r\nstem:[F](stem:[α x]~1~+
      stem:[ß x]~2~) = stem:[α F](stem:[x]~1~) + stem:[ß F](stem:[x]~2~)\r\nwhere
      stem:[α] and stem:[ß] are real or complex numbers."
  - content: In English, the term "linear" has another meaning in IEV {{112-03-14:2010,
      urn:iec:std:iec:60050-112-03-14}} and {{113-06-41:2011, urn:iec:std:iec:60050-113-06-41}}.
      In French, the equivalent term is "linéique".
