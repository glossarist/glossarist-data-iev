  definition:
  - content: an antenna comprised of a number of generally identical radiating elements,
      arranged, oriented and excited to obtain a prescribed radiation pattern
  examples: []
  id: 712-01-05
  notes:
  - content: In most cases radiating elements are identical and congruent by translation
      or by rotation about an axis; moreover they are in general regulary spaced.
  - content: In French, unless otherwise specified, the use of the term "antenne en
      réseau" implies that radiating elements are congruent by a simple translation.
