      de référence est utilisée, qui est stem:[k] fois plus grande que la longueur
      de référence initiale, la valeur de stem:[τ]~i,o~(stem:[λ]) devient alors stem:[tau^(prime)_("i"
      ",o")^(() lambda ) = &amp;lsqb; tau_("i" ",o") ( lambda ) &amp;rsqb;^(k)].
  - content: L'unité de transmissivité spectrale est un.
