  definition:
  - content: function, zero for all negative values of the independent variable and
      equal to one for all positive values
  examples: []
  id: 103-03-01
  notes:
  - content: See Figure 1 below for a graphical representation of ε(stem:[t]). The
      value ε(0) may remain undefined or may be defined according to the context.
  - content: ε(stem:[x] − stem:[x]~0~) denotes a unit step at the value stem:[x]~0~
      of the independent variable stem:[x].
  - content: Notation H(stem:[x]) is also used. Notation ϑ(stem:[t]) is used for the
