data:
  definition:
  - content: 'différence positive ou négative de fréquence qu''il convient d''ajouter
      à la fréquence nominale spécifiée de l''oscillateur lorsqu''on ajuste la fréquence
      de cet oscillateur pour un cas particulier de conditions de fonctionnement afin
      de minimiser les écarts par rapport à la fréquence nominale dans une plage spécifiée
      des conditions de fonctionnementNote 1 à l’article: Pour minimiser les écarts
      de fréquence par rapport à la fréquence nominale dans toute la gamme des températures,
      un décalage de fréquence peut être indiqué pour procéder à un ajustement à la
      température de référence (voir Figure 18). image::/assets/images/parts/561/[]
      *Figure 18 – Exemple d’utilisation de décalage de fréquence*'
