  examples: []
  id: 521-05-14
  notes:
  - content: The virtual temperature is not necessarily the highest temperature in
      the device.
  - content: "Based on the power dissipation and the thermal resistance or impedance
      that corresponds to the mode of operation, the virtual junction temperature
      can be calculated from the formula:\r\nstem:[T_(\"j\") = T_(\"case\") + frac(P)(R_(\"th\"))]
      or stem:[T_(\"j\") = T_(\"amb\") + frac(P)(R_(\"th\"))]"
