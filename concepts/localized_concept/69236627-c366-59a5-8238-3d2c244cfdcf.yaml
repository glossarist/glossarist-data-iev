  definition:
  - content: 'energy transmitted by ionizing radiation to the matter in a given volume
      such that:  stem:[ε] = stem:[R]~1~ – stem:[R]~2~ + ∑stem:[Q] where*  R1 is the
      radiant energy incident on the volume, i.e. the sum of the energies, excluding
      rest energies, of all those directly and indirectly ionizing particles which
      enter the volume, *  R2 is the radiant energy emerging from the volume, i.e.
      the sum of the energies, excluding rest energies, of all those directly and
      indirectly ionizing particles which leave the volume, and *  ∑Q is the sum of
      all changes of the rest mass energy of atomic nuclei and elementary particles
      in any nuclear transformations which occur in the volume; a positive sign is
      used when the change is a decrease and a negative sign when the change is an
      increase'
  examples: []
  id: 395-01-34
  notes:
  - content: The energy imparted is a stochastic quantity, identical to the integral
      absorbed dose in that volume, and expressed in joules (J).
  - content: This entry was numbered 393-14-60 in IEC 60050-393:2003.
