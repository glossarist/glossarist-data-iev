---
data:
  definition:
  - content: "{{unité, urn:iec:std:iec:60050-112-01-14}} de {{longueur, urn:iec:std:iec:60050-113-01-19}}
      du {{SI, urn:iec:std:iec:60050-112-02-02}}, égale à la longueur du trajet parcouru
      par la lumière dans le vide pendant une {{durée, urn:iec:std:iec:60050-113-01-13}}
      de 1/299 792 458 {{s, urn:iec:std:iec:60050-112-02-04}}\r\nNote 1 à l’article:
      La définition donnée dans la Brochure sur le SI est la suivante: \"Le mètre,
      symbole m, est l’unité de longueur du SI. Il est défini en prenant la valeur
      numérique fixée de la vitesse de la lumière dans le vide, stem:[c], égale à
      299 792 458 lorsqu’elle est exprimée en m s^−1^, la seconde étant définie en
      fonction de Δstem:[ν]~Cs~.\"\r\nNote 2 à l’article: Le mètre est l’une des sept
      {{unités de base, urn:iec:std:iec:60050-112-01-18}} du SI: {{seconde, urn:iec:std:iec:60050-112-02-04}}
      (s), mètre (m), {{kilogramme, urn:iec:std:iec:60050-112-02-06}} (kg), {{ampère,
      urn:iec:std:iec:60050-112-02-07}} (A), {{kelvin, urn:iec:std:iec:60050-112-02-08}}
      (K), {{mole, urn:iec:std:iec:60050-112-02-09}} (mol) et {{candela, urn:iec:std:iec:60050-112-02-10}}
      (cd)."
