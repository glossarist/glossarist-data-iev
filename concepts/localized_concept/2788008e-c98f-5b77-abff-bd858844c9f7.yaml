  definition:
  - content: dispositif à quatre accès destiné à répartir une énergie incidente sur
      l'un quelconque des accès de façon égale vers deux des autres accès, de telle
      sorte que, idéalement, aucune énergie ne soit transmise vers le quatrième accès
  examples: []
  id: 702-09-65
  notes:
  - content: La répartition idéale des énergies n'est généralement réalisée que si
      chaque accès est fermé sur l'impédance convenable, le coupleur différentiel
      étant alors dit "équilibré".
  - content: Un coupleur différentiel peut être utilisé pour combiner deux signaux
      incidents sur deux accès, de façon à alimenter ainsi un seul accès de sortie.
