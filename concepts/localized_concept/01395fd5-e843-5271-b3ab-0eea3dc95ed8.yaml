  definition:
  - content: "{{SI, urn:iec:std:iec:60050-112-02-02}} {{unit, urn:iec:std:iec:60050-112-01-14}}
      of {{length, urn:iec:std:iec:60050-113-01-19}}, equal to the length of the path
      travelled by light in vacuum in a {{duration, urn:iec:std:iec:60050-113-01-13}}
      of 1/299 792 458 {{s, urn:iec:std:iec:60050-112-02-04}}"
  examples: []
  id: 112-02-05
  notes:
  - content: 'The definition in the SI Brochure is: "The metre, symbol m, is the SI
      unit of length. It is defined by taking the fixed numerical value of the speed
      of light in vacuum stem:[c] to be 299 792 458 when expressed in the unit m s^−1^,
      where the second is defined in terms of the caesium frequency Δstem:[ν]~Cs~."'
  - content: 'The metre is one of the seven SI {{base units, urn:iec:std:iec:60050-112-01-18}}:
      {{second, urn:iec:std:iec:60050-112-02-04}} (s), metre (m), {{kilogram, urn:iec:std:iec:60050-112-02-06}}
      (kg), {{ampere, urn:iec:std:iec:60050-112-02-07}} (A), {{kelvin, urn:iec:std:iec:60050-112-02-08}}
      (K), {{mole, urn:iec:std:iec:60050-112-02-09}} (mol) and {{candela, urn:iec:std:iec:60050-112-02-10}}
      (cd).'
