  definition:
  - content: pertains to a configuration of points in the Euclidean three-dimensional
      space when the configuration is unchanged by a given mapping of the space into
      itself which preserves Euclidean distances
  examples:
  - content: "* symmetric by translation for a periodic configuration, * symmetric
      by rotation of 2π/n, where n is an integer, or by any rotation, * symmetric
      by mirroring, * and combinations thereof."
