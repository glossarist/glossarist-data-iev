  definition:
  - content: "pour un bipôle capacitif de bornes A et B, dérivée de la charge électrique
      stem:[q] en A par rapport à la tension électrique stem:[u]~AB~ ({{131-11-56,
      urn:iec:std:iec:60050-131-11-56}}) entre les bornes:\r\nstem:[C_(\"d\") = frac(rm(d)
      q)(rm(d) u_(\"A\" \"B\"))]\r\noù le signe de la charge électrique est déterminé
      en prenant positif le courant électrique qui la définit si le sens du courant
      est de A vers B et négatif dans le cas contraire"
  examples: []
  id: 131-12-14
  notes:
  - content: Pour une capacité idéale, la capacité différentielle stem:[C]~d~ est
      égale à sa capacité stem:[C].
