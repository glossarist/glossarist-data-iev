  definition:
  - content: the ratio, generally expressed in decibels, of the power of the carrier
      of a wanted signal to the power of an interfering signal, evaluated in specified
      conditions, these powers being considered at the input of the receiver
  examples: []
  id: 713-11-20
  notes:
  - content: If several interference signals are present, the sum of their powers
      should be considered.
  - content: "The specified conditions comprise among others: \r\n– the nature and
      characteristics of the interfering signal, \r\n– the receiver and antenna characteristics
      such as the bandwidth."
