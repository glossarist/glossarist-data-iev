  definition:
  - content: the power required at the input of a lossless reference antenna to produce,
      in a given direction at any specified distance, the same power flux density
      as that radiated by a given device
  examples: []
  id: 161-04-16
  notes:
  - content: For the ITU and in Chapter 712, the term "effective radiated power" without
      qualification is used only when the reference antenna is a half-wave dipole.
