  definition:
  - content: "{{rated value, urn:iec:std:iec:60050-151-16-08}} of the voltage assigned
      by the manufacturer to a component, device or equipment and to which operation
      and performance characteristics are referred"
  examples: []
  id: 442-09-10
  notes:
