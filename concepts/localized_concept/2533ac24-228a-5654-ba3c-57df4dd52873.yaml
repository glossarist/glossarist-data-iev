  definition:
  - content: "scalar quantity equal to the flux of the electric current density *stem:[J]*
      through a given directed surface S:\r\nstem:[I = int_(\"S\") J * e_(\"n\") \"d\"
      A]\r\nwhere stem:[*e*]~n~dstem:[A] is the vector surface element"
  examples: []
  id: 121-11-13
  notes:
  - content: The electric current through a surface is equal to the limit of the quotient
      of the electric charge transferred through that surface during a time interval
      by the duration of this interval when this duration tends to zero.
  - content: For charge carriers confined to a surface, the electric current is defined
      through a curve of this surface (see the note to term “lineic electric current”).
