  definition:
  - content: protection of information against unauthorized disclosure, transfer,
      modification, or destruction, whether accidental or intentional
  examples: []
  id: 871-04-16
  notes:
  - content: In addition, properties, such as authenticity, accountability, non-repudiation,
      and reliability can be involved.
  - content: Information security is a broad term that can be used regardless of the
      form the data can take (e.g. electronic, physical).
