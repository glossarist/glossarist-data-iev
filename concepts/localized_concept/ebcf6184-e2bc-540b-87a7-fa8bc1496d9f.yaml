  - content: "réaction parallèle non souhaitée\r\nNote 1 à l’article: Dans un générateur
      électrochimique, des réactions parasites peuvent entraîner des déficiences ou
      des pertes de performance. Note 2 à l’article: Dans le CEI 60050-482:2004, 482-03-13,
      une réaction parallèle est définie comme étant toujours non souhaitée et le
      terme «réaction parasite» est donné en synonyme de «réaction parallèle»."
