  definition:
  - content: an antenna consisting of a feed and an array of reflecting elements arranged
      on a surface and adjusted so that the phase of the reflected wave from each
      element is such that a prescribed radiation pattern is obtained
  examples: []
  id: 712-05-35
  notes:
  - content: The reflecting elements are generally waveguides containing electrical
      phase shifters and terminated by short circuits.
  terms:
  - type: expression
    normative_status: preferred
    designation: reflective array antenna
  - type: expression
    designation: reactive reflector antenna
