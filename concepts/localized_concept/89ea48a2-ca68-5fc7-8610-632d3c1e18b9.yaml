  definition:
  - content: colour stimulus having the same chromaticity as the {{adopted white,
      urn:iec:std:iec:60050-845-32-058}}
  examples: []
  id: 845-32-001
  notes:
  - content: When stating that an image area is a colorimetric neutral, it is necessary
      to designate the adopted white. For reflection {{hardcopies, urn:iec:std:iec:60050-845-32-045}},
      the adopted white is typically considered to be either the media white or a
      perfectly diffuse reflecting surface illuminated by the light source.
  - content: The adopted white of colorimetric neutral can or cannot correspond to
      the {{adapted white, urn:iec:std:iec:60050-845-23-081}} according to an observer.
