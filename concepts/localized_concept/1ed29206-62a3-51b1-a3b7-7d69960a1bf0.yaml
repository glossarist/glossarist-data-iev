  definition:
  - content: a signalling method in which the signals for the traffic carried by a
      single transmission channel are transmitted over the channel itself or over
      a signalling channel permanently associated with it
  examples: []
  id: 714-09-01
  notes:
  - content: The term may also be applied when the signals for a telecommunication
      circuit are transmitted over that channel.
