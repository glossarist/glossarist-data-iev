  examples: []
  id: 523-04-04
  notes:
  - content: Rotational and vibrational gyroscopes are based on the Coriolis force.
      Ring laser gyroscopes and optical fibre gyroscopes are based on the Sagnac effect.
      Among these types of gyroscope, vibrational gyroscopes (the tuning fork- and
      resonant piece-types) are suitable for miniaturization and are being developed
      for miniaturized applications.
