  definition:
  - content: sampling of a picture where the points on the scanning lines corresponding
      to the sampling instants are not aligned in the picture perpendicularly to the
      scanning line direction
  examples: []
  id: 723-10-25
  notes:
  - content: In the case of progressive scanning, the points in a scanning line are
      not aligned with those points in the temporally adjacent lines of the same field;
      in the case of interlaced scanning, the points in a scanning line are not aligned
      with those points in the spatially adjacent lines of the preceding field.
  terms:
  - type: expression
    normative_status: preferred
    designation: non-orthogonal sampling
