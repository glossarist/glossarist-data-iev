  definition:
  - content: ionizing radiation that reaches an object from a radioactive source through
      scattering by the air
  examples: []
  id: 395-05-38
  notes:
  - content: The term is typically used to describe the scattering over the top of
      a shielding wall.
  - content: Sometimes the term includes the radiation scattered from the neighbouring
      structures.
