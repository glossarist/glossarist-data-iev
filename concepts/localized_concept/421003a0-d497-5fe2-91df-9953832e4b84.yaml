  notes:
  - content: Un module LED indépendant garantit toute la protection nécessaire concernant
      la sécurité selon sa classification et son marquage.
  - content: Un système dans lequel la connexion du module LED avec la tête du luminaire
      s'effectue par l'intermédiaire d'une fibre de verre constitue un exemple de
      module LED indépendant.
