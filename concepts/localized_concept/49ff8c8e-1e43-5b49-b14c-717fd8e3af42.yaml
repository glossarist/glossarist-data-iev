  definition:
  - content: fréquence des oscillations par lesquelles un plasma, perturbé localement
      sous la forme d'un excès ou d'un déficit d'électrons, tend à revenir vers son
      état d'équilibre de neutralité macroscopique, en supposant que les ions restent
      fixes
  examples: []
  id: 705-06-10
  notes:
  - content: "La fréquence de plasma stem:[f]~p~ est donné par l'expression: \r\nstem:[f_(p)
      = frac(e)(2 pi) sqrt(frac(n_(\"e\"))(m epsilon_(0)))]\r\noù stem:[e] est la
      charge de l'électron, stem:[m] est la masse de l'électron, stem:[n]~e~ est la
      densité électronique, stem:[ε]~0~ est la constante électrique."
