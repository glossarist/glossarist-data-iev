  definition:
  - content: use in accordance with information provided with a product or system,
      or, in the absence of such information, by generally understood patterns of
      usage
  examples: []
  id: 871-04-17
  notes:
  - content: Intended use should not be confused with {{normal use, urn:iec:std:iec:60050-871-04-22}}.
      While both include the concept of use as intended by the manufacturer, intended
      use focuses on the purpose while normal use incorporates not only the purpose,
      but transport and storage as well.
