  definition:
  - content: fonctionnement d'un tube électronique de façon telle que le courant de
      sortie circule pendant sensiblement moins de la moitié de chaque cycle électrique
      lorsque le signal d'entrée est sinusoïdal pur
  examples: []
  id: 531-18-22
  notes:
  - content: |-
      Le suffixe 1 peut être utilisé pour indiquer que le courant d'entrée ne circule pas.

      Le suffixe 2 peut être utilisé pour indiquer que le courant d'entrée circule pendant une partie du cycle.
