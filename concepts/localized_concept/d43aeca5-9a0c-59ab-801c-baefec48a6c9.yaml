data:
  definition:
  - content: 'ensemble d''activités corrélées ou interactives qui transforme des {{éléments
      entrants, urn:iec:std:iec:60050-901-07-05}} en {{éléments sortants, urn:iec:std:iec:60050-901-07-06}}
      Note 1 à l’article: Les éléments entrants d''un processus sont généralement
      les éléments sortants d''autres processus. Note 2 à l’article: Les processus
      d''une {{organisation, urn:iec:std:iec:60050-901-03-02}} sont généralement planifiés
      et mis en œuvre dans des conditions maîtrisées afin d''apporter une valeur ajoutée.'
