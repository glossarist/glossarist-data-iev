  definition:
  - content: in the three-dimensional Euclidean space, mathematical entity which can
      be represented by a vector independently of the space orientation
  examples: []
  id: 102-03-34
  notes:
  - content: The term "polar vector" is only used in place of the term "vector" to
      distinguish it from the term "axial vector".
  - content: Examples of polar vectors are a geometric displacement and the gradient
      of a scalar field, and examples of polar vector quantities are velocity and
      electric field strength.
