  definition:
  - content: "{{high-intensity discharge lamp, urn:iec:std:iec:60050-845-27-027}}
      in which the major portion of the light is produced, directly or indirectly,
      by radiation from mercury operating at a partial pressure in excess of 100 kPa"
  examples: []
  id: 845-27-028
  notes:
  - content: The term "high-pressure mercury lamp" includes clear lamps, phosphor-coated
      (mercury fluorescent) lamps and {{blended lamps, urn:iec:std:iec:60050-845-27-029}}.
      In a fluorescent mercury discharge lamp, the light is produced partly by the
      mercury vapour and partly by a layer of phosphors excited by the {{ultraviolet
      radiation, urn:iec:std:iec:60050-845-21-008}} of the discharge.
  - content: This entry was numbered 845-07-20 in IEC 60050-845:1987.
