  definition:
  - content: sum of durations of all {{supply interruptions, urn:iec:std:iec:60050-692-07-01}}
      to individual customers during a time interval, divided by the number of these
      supply interruptions
  examples: []
  id: 692-08-05
  notes:
  - content: If stem:[t]~stem:[ij]~ is the duration of the stem:[i]th interruption
      of supply to customer stem:[j] and stem:[n]~stem:[j]~ is the number of times
      customer stem:[j] is affected during a time interval of duration stem:[T], then
      the mean duration of a customer interruption is given bystem:[T_("I") = frac(sum_(i)
      sum_(j) t_(i j))(sum_(j) n_(j))]
  - content: Only {{sustained interruptions, urn:iec:std:iec:60050-692-07-02}} are
      considered.
  - content: The term "customer" represents the end user and not some intermediate
      distribution system or company.
  - content: Mean duration of a customer interruption can be used to describe past
      performance or to estimate expected future performance.
  - content: This measure is also equal to {{service unavailability per customer served,
      urn:iec:std:iec:60050-692-08-03}} divided by {{interruption frequency per customer
      served, urn:iec:std:iec:60050-692-08-01}}.
  - content: This entry was numbered 191-27-05 in IEC 60050-191:1990.
