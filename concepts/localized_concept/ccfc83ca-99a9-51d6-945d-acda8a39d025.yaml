      sans perte d'éléments ou mutilation du signal
  examples: []
  id: 704-21-01
  notes:
  - content: Une justification est habituellement employée en {{multiplexage numérique,
      urn:iec:std:iec:60050-704-20-01}}, de façon à permettre le multiplexage de signaux
      affluents qui ne sont pas en synchronisme avec le {{multiplexeur, urn:iec:std:iec:60050-704-08-13}};
      chaque signal affluent est alors justifié séparément.
