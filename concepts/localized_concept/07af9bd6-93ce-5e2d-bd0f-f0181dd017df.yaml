---
data:
  definition:
  - content: 'valeur de la tension fixée par un constructeur, ou une autre entité,
      pour le fonctionnement spécifié d’un composant, dispositif ou matérielNote 1
      à l’article: La valeur de la tension assignée des matériels à haute tension
      est généralement fixée à partir de la liste des tensions les plus élevées pour
      le matériel des Tableaux 3, 4 et 5 de L''IEC 60038:2009.Note 2 à l’article:
      La valeur de la tension assignée des matériels à basse tension est généralement
      fixée à partir de la liste des tensions nominales des Tableaux 1 et 6 de l''IEC
      60038:2009.Note 3 à l’article: Les matériels peuvent avoir plus d’une tension
      assignee ou peuvent avoir une plage de tension assignée.'
