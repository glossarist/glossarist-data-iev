  definition:
  - content: 'tension de choc appliquée au cours d’essais diélectriques, de forme
      spécifiée, de durée conventionnelle de front de l’ordre de 1 μs et de durée
      jusqu’à la mi-valeur de l’ordre de 50 μsNote 1 à l’article: La tension de choc
      de foudre se définit en énonçant successivement les deux nombres qui mesurent
      des durées en microsecondes; en particulier, la tension de choc de foudre normalisée
      est 1,2/50 μs.'
