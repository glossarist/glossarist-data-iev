  definition:
  - content: 'relation between two entities stem:[a] and stem:[b] having the following
      properties: * reflexivity: a = a, * symmetry: if a = b then b = a, * transitivity:
      if a = b and b = c then a = c, where c is a third entity, * if a = b and ℛ{u}
      is any statement involving the entity u, then ℛ{a} is true if and only if ℛ{b}
      is true'
  examples: []
  id: 102-01-01
  notes:
  - content: The equality of two entities stem:[a] and stem:[b] is denoted by stem:[a]
      = stem:[b] and expressed by "stem:[a] is equal to stem:[b]".
