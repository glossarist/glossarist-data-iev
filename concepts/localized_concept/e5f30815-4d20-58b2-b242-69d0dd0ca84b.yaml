  definition:
  - content: material which exhibits photoluminescence as the result of exposure to
      {{optical radiation, urn:iec:std:iec:60050-845-21-002}}
  examples: []
  id: 845-24-040
  notes:
  - content: Photoluminescent materials absorb energy from optical radiation in the
      shorter wavelength regions of the visible spectrum and/or in the ultraviolet
      region and re-radiate some of this energy at longer wavelengths, producing narrow
      bands of emission in the visible region.
  - content: See also "{{fluorescent material, urn:iec:std:iec:60050-845-24-041}}",
      "{{daylight fluorescent colour, urn:iec:std:iec:60050-845-22-055}}".
