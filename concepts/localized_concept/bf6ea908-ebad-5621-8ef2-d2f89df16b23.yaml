  definition:
  - content: unité fonctionnelle qui s’interpose sur tout le trafic passant entre
      deux réseaux et protège l’un d’eux, ou une partie de l’un d’eux, contre tout
      accès non autorisé
  examples: []
  id: 732-06-01
  notes:
  - content: "– Le réseau protégé est généralement un réseau privé interne à un organisme."
  - content: "– Un pare-feu autorise le transfert de messages ou de fichiers vers
      une station de travail de haute sécurité dans le réseau interne, sans permettre
      de transfert dans le sens opposé."
  - content: "– Un pare-feu peut être réalisé de plusieurs façons, par exemple passerelle
      à double anneau, sous-réseau filtré, routeur de filtrage ou passerelle hôte
      filtrée."
  - content: "– Voir Figure 3.\r\nimage::/assets/images/parts/732/[]"
