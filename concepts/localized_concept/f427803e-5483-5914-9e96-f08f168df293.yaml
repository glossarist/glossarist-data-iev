      des unités fonctionnelles de traitement de données, dans lequel un dispositif
      central, avec une fonction de commande de réseau, affecte les raccordements
      entre tous les autres participants sans fonction de commande de réseau et organise
      la communication qui est exclusivement gérée par le dispositif central de commande
