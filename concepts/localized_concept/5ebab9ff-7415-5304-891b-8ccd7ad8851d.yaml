---
data:
  definition:
  - content: "{{unité, urn:iec:std:iec:60050-112-01-14}} de {{quantité de matière,
      urn:iec:std:iec:60050-113-02-07}} du {{SI, urn:iec:std:iec:60050-112-02-02}},
      égale à la quantité de matière d’un {{système, urn:iec:std:iec:60050-151-11-27}}
      qui contient 6,022 140 76 × 10^23^ entités élémentaires spécifiées \r\nNote
      1 à l’article: La définition donnée dans la Brochure sur le SI est la suivante:
      \"La mole, symbole mol, est l’unité de quantité de matière du SI. Une mole contient
      exactement 6,022 140 76 × 10^23^ entités élémentaires. Ce nombre, appelé 'nombre
      d’Avogadro', correspond à la valeur numérique fixée de la constante d’Avogadro,
      stem:[N]~A~, lorsqu’elle est exprimée en mol^−1^.\r\nLa quantité de matière,
      symbole stem:[n], d’un système est une représentation du nombre d’entités élémentaires
      spécifiées. Une entité élémentaire peut être un atome, une molécule, un ion,
      un électron, ou toute autre particule ou groupement spécifié de particules.\"\r\nNote
      2 à l’article: La définition de la mole dans l'IEV 112-02-09:2010-01 fixait
      la valeur de la masse molaire du carbone 12, stem:[M](^12^C) comme étant exactement
      égale à 0,012 kg/mol. Selon l’actuelle définition de la mole, stem:[M](^12^C)
      n’est plus connue avec exactitude et doit être déterminée expérimentalement.\r\nNote
      3 à l’article: La mole est l’une des sept {{unités de base, urn:iec:std:iec:60050-112-01-18}}
      du SI: {{seconde, urn:iec:std:iec:60050-112-02-04}} (s), {{mètre, urn:iec:std:iec:60050-112-02-05}}
      (m), {{kilogramme, urn:iec:std:iec:60050-112-02-06}} (kg), {{ampère, urn:iec:std:iec:60050-112-02-07}}
      (A), {{kelvin, urn:iec:std:iec:60050-112-02-09}} (K), mole (mol) et {{candela,
      urn:iec:std:iec:60050-112-02-10}} (cd)."
