---
data:
  definition:
  - content: "{{unité, urn:iec:std:iec:60050-112-01-14}}  de {{masse, urn:iec:std:iec:60050-113-03-03}}
      du {{SI, urn:iec:std:iec:60050-112-02-02}}, définie en prenant la valeur\n\nnumérique
      fixée de la {{constante de Planck, urn:iec:std:iec:60050-113-05-07}} stem:[h]
      égale à 6,626 070 15 × 10^−34^ lorsqu’elle est exprimée en unité s^−1^ m^2^
      kg, le {{mètre, urn:iec:std:iec:60050-112-02-05}} et la {{seconde, urn:iec:std:iec:60050-112-02-04}}
      étant choisis respectivement comme unités de {{longueur, urn:iec:std:iec:60050-113-01-19}}
      et de {{temps, urn:iec:std:iec:60050-113-01-13}}\r\nNote 1 à l’article: La définition
      donnée dans la Brochure sur le SI est la suivante: \"Le kilogramme, symbole
      kg, est l’unité de masse du SI. Il est défini en prenant la valeur numérique
      fixée de la constante de Planck, stem:[h], égale à 6,626 070 15 × 10^−34^ lorsqu’elle
      est exprimée en J s, unité égale à kg m^2^ s^−1^, le mètre et la seconde étant
      définis en fonction de stem:[c] et Δstem:[ν]~Cs~.\"\r\nNote 2 à l’article: La
      définition du kilogramme dans l'IEV 112-02-06:2010-01  était la suivante: \"unité
      SI de masse, égale à la masse de l’objet appelé 'prototype international du
      kilogramme', conservé au Bureau international des poids et mesures (BIPM)\".\r\nNote
      3 à l’article: Le kilogramme est l’une des sept {{unités de base, urn:iec:std:iec:60050-112-01-18}}
      du SI: {{seconde, urn:iec:std:iec:60050-112-02-04}} (s), {{mètre, urn:iec:std:iec:60050-112-02-05}}
      (m), kilogramme (kg), {{ampère, urn:iec:std:iec:60050-112-02-07}} (A), {{kelvin,
      urn:iec:std:iec:60050-112-02-08}} (K), {{mole, urn:iec:std:iec:60050-112-02-09}}
      (mol) et {{candela, urn:iec:std:iec:60050-112-02-10}} (cd)."
