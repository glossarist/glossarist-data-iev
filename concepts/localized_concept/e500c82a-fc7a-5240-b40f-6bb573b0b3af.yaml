  definition:
  - content: pour une particule, quotient de la charge électrique stem:[q] par la
      charge élémentaire stem:[e], soit stem:[c] = stem:[q]/stem:[e]
  examples: []
  id: 113-05-17
  notes:
  - content: Le nombre de charge d’une particule électriquement chargée peut être
      positif ou négatif. Celui d’une particule électriquement neutre est nul.
  - content: Le nombre de charge d’une particule peut être présenté comme un exposant
      au symbole de cette particule, par exemple H^+^, He^++^, Al^3+^, Cl^−^, S^=^,
      N^3−^.
