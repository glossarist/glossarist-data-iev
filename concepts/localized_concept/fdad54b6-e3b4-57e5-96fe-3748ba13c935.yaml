---
data:
  definition:
  - content: limite du quotient de la probabilité conditionnelle pour que l'instant
      stem:[T] d'une défaillance d'un produit soit compris dans un intervalle de temps
      donné (stem:[t], stem:[t] &plus; Δstem:[t]) par la durée Δstem:[t]de l'intervalle
      de temps lorsque Δstem:[t] tend vers zéro, en supposant que l'entité soit en
      état de disponibilité au début de l'intervalle de temps
  examples: []
  id: 821-12-21
  notes:
  - content: Pour les applications où la distance parcourue ou le nombre de cycles
      d’exploitation est mieux adaptée que le temps, l’unité de temps peut être remplacée
      par l’unité de distance ou le nombre de cycles, suivant le cas.
  - content: Le terme “taux de défaillance” est souvent utilisé dans le sens du “taux
      moyen de défaillance” définit en {{IEV 192-05-07, urn:iec:std:iec:60050-192-05-07}}.
