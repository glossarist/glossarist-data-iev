  definition:
  - content: the value of the coercive field strength in a material when the magnetic
      flux density, magnetic polarization or magnetization is alternating at an amplitude
      corresponding to the saturation hysteresis loop
  examples: []
  id: 221-02-37
  notes:
  - content: 'The relevant parameter should be stated, and the appropriate symbol
      used as follows : stem:[H'']~cstem:[B]~ for the cyclic coercivity relating to
      the flux density, stem:[H'']~cstem:[J]~ for the cyclic coercivity relating to
      the polarization, stem:[H'']~cstem:[M]~ for the cyclic coercivity relating to
      the magnetization. The first two symbols supersede stem:[~B~H'']~c~ and stem:[~J~H'']~c~.'
  terms:
  - type: expression
    normative_status: preferred
    designation: cyclic coercivity
