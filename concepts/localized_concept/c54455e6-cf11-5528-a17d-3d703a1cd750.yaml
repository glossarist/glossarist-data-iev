  definition:
  - content: system for determining the {{tristimulus values, urn:iec:std:iec:60050-845-23-038}}
      of any spectral power distribution using the set of reference colour stimuli
      &amp;lsqb;X~10~&amp;rsqb;, &amp;lsqb;Y~10~&amp;rsqb;, &amp;lsqb;Z~10~&amp;rsqb;
      and the three CIE colour-matching functions stem:[bar(x)_(10) ( lambda ) , " "
      bar(y)_(10) ( lambda ) , " " bar(z)_(10) ( lambda )] adopted by the CIE in 1964
  examples: []
  id: 845-23-046
  notes:
  - content: The CIE 1964 standard colorimetric system is applicable to centrally
      viewed fields of angular subtense greater than about 4° (0,07 rad).
  - content: When the CIE 1964 standard colorimetric system is used, all symbols that
      represent colorimetric measures are distinguished by use of the subscript 10.
  - content: See also CIE 15, stem:[Colorimetry].
  - content: This entry was numbered 845-03-29 in IEC 60050-845:1987.
