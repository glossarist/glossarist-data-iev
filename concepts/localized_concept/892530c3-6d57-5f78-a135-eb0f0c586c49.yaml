---
data:
  definition:
  - content: "confirmation par des preuves tangibles que les exigences pour une utilisation
      ou une application prévue spécifique ont été satisfaites\r\nNote 1 à l’article:
      Le terme «validé» qualifie l’état correspondant. Note 2 à l’article: Les conditions
      d’utilisation pour la validation peuvent être réelles ou simulées. Note 3 à
      l’article: Dans la conception et le développement, la validation concerne le
      processus d’examen d’une entité afin de déterminer la conformité aux besoins
      de l’utilisateur. Note 4 à l’article: En règle générale, la validation est réalisée
      sur le produit final dans les conditions d’exploitation définies, bien qu’elle
      puisse également avoir lieu au cours des étapes précédentes. Note 5 à l’article:
      Plusieurs validations peuvent être exécutées si différentes utilisations sont
      prévues."
