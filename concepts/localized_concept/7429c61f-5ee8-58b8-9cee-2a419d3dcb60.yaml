  definition:
  - content: "{{code, urn:iec:std:iec:60050-101-12-04}} according to which a larger
      number of characters, symbols or signal elements than strictly necessary are
      used to represent {{information, urn:iec:std:iec:60050-701-01-01}}"
  examples:
  - content: "{{Error detecting code, urn:iec:std:iec:60050-702-05-19}}; {{error correcting
      code, urn:iec:std:iec:60050-702-05-20}}."
  id: 702-05-18
  notes:
  - content: In telegraphy, a five-unit code using all the characters of {{International
      Telegraph Alphabet No. 2, urn:iec:std:iec:60050-721-09-10}} is not redundant.
      A seven-unit code such as {{International Telegraph Alphabet No. 3, urn:iec:std:iec:60050-721-09-11}}
      which uses only signals made of four elements of {{A condition, urn:iec:std:iec:60050-721-03-19}}
      and three elements of {{Z condition, urn:iec:std:iec:60050-721-03-20}} is redundant.
