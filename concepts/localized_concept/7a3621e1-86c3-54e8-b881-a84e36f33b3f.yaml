  definition:
  - content: particular interface of an equipment which couples this equipment with
      the external electromagnetic environment ({{161-01-01, urn:iec:std:iec:60050-161-01-01}})
      and through which the equipment is influenced by this environment
  examples:
  - content: "Examples of ports of interest are shown in Figure 1. The enclosure port
      is the physical boundary of the apparatus (e.g. enclosure). The enclosure port
      provides for radiated and electrostatic discharge ({{161-01-22, urn:iec:std:iec:60050-161-01-22}})
      energy transfer, whereas the other ports provide for conducted energy transfer.\r\nimage::/assets/images/parts/161/acec-guide107_2009_f1_en.png[]\r\n*Figure
      1 – Examples of ports*"
  id: 161-01-27
  notes:
  - content: Ports in the subject area of electromagnetic compatibility are specific
      cases of the port defined in {{131-12-60, urn:iec:std:iec:60050-131-12-60}}.
