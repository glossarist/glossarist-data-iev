  definition:
  - content: the ratio, expressed as a numerical value or as a percentage, of the
      consumption within a specified period (year, month, day, etc.), to the consumption
      that would result from continuous use of the maximum or other specified demand
      occurring within the same period
  examples: []
  id: 691-10-02
  notes:
  - content: This term should not be used without specifying the demand and the period
      to which it relates.
  - content: The load factor for a given demand is also equal to the ratio of the
      utilization time to the time in hours within the same period.
  terms:
  - type: expression
    normative_status: preferred
    designation: load factor
