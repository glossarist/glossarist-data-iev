  definition:
  - content: quotient of the upward luminous flux of a luminaire, measured under specified
      conditions with its own lamp(s) and equipment, and the sum of the individual
      luminous fluxes of the same lamp(s) when operated outside the luminaire with
      the same equipment, under specified practical conditions
  examples: []
  id: 845-29-065
  notes:
  - content: The upward light output ratio has unit one.
  - content: This note applies to the French language only.
