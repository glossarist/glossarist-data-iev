  definition:
  - content: pertaining to an alternating quantity represented by the product of a
      real constant and a sine or cosine function whose argument is a linear function
      of the independent variable
  examples: []
  id: 103-07-01
  notes:
  - content: The real constant may be a scalar, vector or tensor quantity.
  - content: Examples are stem:[a ( t ) = hat(A) "cos" ( omega " " t + vartheta_(0)
      )] and stem:[a ( x ) = hat(A) "cos" &amp;lsqb; k ( x - x_(0) ) &amp;rsqb;].
