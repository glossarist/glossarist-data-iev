data:
  definition:
  - content: variation de la luminosité d'une couleur perçue, produite en augmentant
      la pureté d'un stimulus de couleur tout en conservant sa luminance constante
      dans les limites du domaine de la vision photopique
  examples: []
  id: 845-22-066
  notes:
  - content: Pour des couleurs non isolées, une variation de clarté peut aussi se
      produire lorsque la pureté est augmentée tout en conservant constant le facteur
      de luminance du stimulus de couleur.
