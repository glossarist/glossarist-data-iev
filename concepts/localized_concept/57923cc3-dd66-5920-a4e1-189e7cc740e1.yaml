  definition:
  - content: relation d'égalité entre des unités de base, des unités dérivées cohérentes
      ou d'autres unités de mesure
  examples: []
  id: 112-01-32
  notes:
  - content: "Pour les grandeurs stem:[Q]~1~, stem:[Q]~2~ et stem:[Q]~3~ reliées par
      l'équation aux grandeurs stem:[Q]~1~ = stem:[ζ] stem:[Q]~2~ stem:[Q]~3~, l'équation
      aux unités est &lsqb;stem:[Q]~1~&rsqb; = &lsqb;stem:[Q]~2~&rsqb; &lsqb;stem:[Q]~3~&rsqb;,
      où &lsqb;stem:[Q]~1~&rsqb;, &lsqb;stem:[Q]~2~&rsqb; et &lsqb;stem:[Q]~3~&rsqb;
      représentent respectivement les unités de stem:[Q]~1~, stem:[Q]~2~ et stem:[Q]~3~,
      pourvu que ces unités soient dans un système cohérent d'unités. Exemples:\r\n*
      J := kg m2 s−2, où J, kg, m et s sont respectivement les symboles du joule,
      du kilogramme, du mètre et de la seconde (le symbole := signifie «est par définition
      égal à»);* 1 km/h = (1/3,6) m/s."
