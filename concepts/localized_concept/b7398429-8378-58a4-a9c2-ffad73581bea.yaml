  definition:
  - content: the distortion produced by a linear two-port device or a linear transmission
      medium when, in the useful frequency band, the amplitude/frequency characteristic
      is not a constant or the phase/frequency characteristic is not represented by
      a straight line for which the zero frequency intercept on the phase axis is
      zero or a multiple of π radians
