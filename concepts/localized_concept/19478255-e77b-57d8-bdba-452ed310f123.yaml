  definition:
  - content: electrical apparatus that contains both energy-limited and non-energy-limited
      circuits and is constructed so that the non-energy-limited circuits cannot adversely
      affect the energy-limited circuits
  examples: []
  id: 426-13-09
  notes:
  - content: 'Associated energy-limited apparatus is:. additionally protected by an
      alternative method of protection included in IEC 60079-15,Explosive atmospheres
      – Part 15: Equipment protection by Type of Protection "n", for use in the appropriate
      explosive gas atmosphere &lsqb;nC or nR&rsqb;; or. additionally protected by
      an alternative Type of Protection listed in IEC 600790, Explosive atmospheres
      – Part 0: Equipment – General requirements, for use in the appropriate explosive
      gas atmosphere; or. not protected by a Type of Protection suitable for use in
      the appropriate explosive atmosphere and therefore is not to be used within
      an explosive atmosphere, for example, a recorder that is not of itself in an
      explosive gas atmosphere but is connected to a thermocouple situated within
      an explosive gas atmosphere where only the recorder input circuit is energy-limited
      &lsqb;Ex nL&rsqb;'
  - content: 'Associated energy-limited apparatus "&lsqb;nL&rsqb;" has been replaced
      by "&lsqb;ic&rsqb;" in IEC 60079-11, _Explosive atmospheres – Part 11: Equipment
      protection by intrinsic safety "i"_.'
  terms:
