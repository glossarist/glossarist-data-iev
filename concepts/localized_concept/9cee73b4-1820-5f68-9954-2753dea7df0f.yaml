  definition:
  - content: "{{polarization, urn:iec:std:iec:60050-705-01-13}} of an elliptically
      polarized wave or circularly polarized wave for which the {{electric field strength,
      urn:iec:std:iec:60050-121-11-18}} vector at a given point in space rotates in
      the same plane and in an opposite sense to that of a reference elliptically
      polarized wave of the same {{direction of propagation, urn:iec:std:iec:60050-103-10-05}},
      the axial ratios of both {{polarization ellipses, urn:iec:std:iec:60050-705-01-21}}
      being the same and their major axes at right angles"
  examples: []
  id: 705-01-23
  notes:
  - content: In English, the term “cross polarization” has another connotation (see
      {{IEV 705-08-52, urn:iec:std:iec:60050-705-08-52}}).
  terms:
  - type: expression
    normative_status: preferred
    designation: orthogonal polarization
    usage_info: of an elliptically or circularly polarized wave
  - type: expression
    normative_status: deprecated
    designation: cross-polarization
