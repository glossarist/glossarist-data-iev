  definition:
  - content: 'description graphique avec représentation symbolique des systèmes de
      commande séquentielsNote 1 à l’article: La représentation symbolique des étapes,
      commandes, transitions et liaisons orientées est basée sur des variables booléennes
      d''entrée et de sortie ainsi que sur des variables internes d''état et sur des
      éléments binaires de retard.Note 2 à l’article: Les éléments, règles et structures
      de base des diagrammes fonctionnels sont données dans la norme CEI 60848, _Langage
      de spécification GRAFCET pour diagrammes fonctionnels en séquence_. Les termes
      351-53-09 à 351-53-16 ci-dessous sont à utiliser dans ce contexte.'
