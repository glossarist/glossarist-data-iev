  definition:
  - content: wetting of a {{substrate, urn:iec:std:iec:60050-521-05-28}} controlled
      by the voltage between a droplet and the substrate covered with a dielectric
      film
  examples: []
  id: 523-02-03
  notes:
  - content: The contact angle of a liquid droplet, typically an {{electrolyte, urn:iec:std:iec:60050-114-01-02}},
      on a substrate can be electrically controlled because the solid-liquid surface
      {{interfacial tension, urn:iec:std:iec:60050-212-18-10}} can be controlled with
      the energy stored in the electric {{double layer, urn:iec:std:iec:60050-114-02-19}}
      which works as a {{capacitor, urn:iec:std:iec:60050-151-13-28}}. Covering the
      {{electrode, urn:iec:std:iec:60050-151-13-01}} with a {{dielectric material,
      urn:iec:std:iec:60050-561-01-16}} of determined thickness, the {{capacitance,
      urn:iec:std:iec:60050-131-12-13}} can be determined with ease. Electro-wetting
      on dielectric is used typically in microfluidic {{devices, urn:iec:std:iec:60050-151-11-20}}.
  - content: This note applies to the French language only.
