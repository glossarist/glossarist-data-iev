  definition:
  - content: "quotient de l'énergie moyenne stem:[\"d\" bar(epsilon)] communiquée
      par un rayonnement ionisant à une matière par la masse dstem:[m] de cette matière\r\nstem:[D
      = frac(\"d\" bar(epsilon))(\"d\" m)]"
  examples: []
  id: 881-12-06
  notes:
  - content: "L'unité SI de dose absorbée est le joule par kilogramme et a reçu le
      nom de gray (Gy). L'ancienne unité de dose absorbée, utilisée encore temporairement,
      est le rad.\r\n1 Gy = 1 J kg^−1^ = 100 rad"
