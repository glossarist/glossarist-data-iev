  definition:
  - content: lowest voltage at which partial discharges are initiated in the test
      arrangement when the voltage applied to the test object is gradually increased
      from a lower value at which no such discharges are observed
  examples: []
  id: 411-36-20
  notes:
  - content: With sinusoidal applied voltage, the partial discharge inception voltage
      is defined as the r.m.s. value of the voltage. With impulse voltages, the partial
      discharge inception voltage is defined as the peak-to-peak voltage.
  terms:
  - type: expression
    normative_status: preferred
    designation: partial discharge inception voltage
