  definition:
  - content: photoluminescence whose radiation is located in a spectral region of
      shorter wavelengths than that of the exciting radiation
  examples: []
  id: 845-24-025
  notes:
  - content: Anti-Stokes luminescence happens, for instance, when the energy of the
