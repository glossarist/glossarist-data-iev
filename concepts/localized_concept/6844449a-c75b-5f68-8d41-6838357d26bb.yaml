data:
  definition:
  - content: degré selon lequel des produits, systèmes, services, environnements et
      installations peuvent être utilisés par des membres d'une population présentant
      le plus large éventail possible des besoins des utilisateurs, de caractéristiques
      et de capacités en vue d'atteindre des objectifs identifiés dans des contextes
      d'utilisation identifiés
  examples: []
  id: 871-01-01
  notes:
  - content: Le contexte d'utilisation comprend l'utilisation directe ou l'utilisation
      supportée par des technologies d'aide.
