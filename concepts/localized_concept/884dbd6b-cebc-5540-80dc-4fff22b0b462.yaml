---
data:
  definition:
  - content: quotient de la valeur intégrée du flux énergétique de toutes les longueurs
      d'onde émis par fluorescence (bande de fluorescence) par la puissance d'excitation
      énergétique qui irradie le {{matériau fluorescent, urn:iec:std:iec:60050-845-24-041}}
      pour une longueur d'onde d'excitation donnée
  examples: []
  id: 845-24-042
  notes:
  - content: Le rendement énergétique fluorescent est une mesure du rendement énergétique
      externe du matériau fluorescent; le rendement énergétique interne est obtenu
      en prenant un quotient du rayonnement émis par la puissance d'excitation énergétique
      absorbée par le matériau fluorescent.
  - content: Dans cette définition, la longueur d'onde d'excitation est considérée
      comme monochromatique. Toutefois, dans la pratique, le rayonnement d'excitation
      est associé à une plage et une répartition des longueurs d'onde.
  - content: La fluorescence comprend à la fois des phénomènes fluorescents et des
      phénomènes phosphorescents avec des constantes de temps suffisamment courtes
      pour ne pas être prises en compte pour l'application.
  - content: L'unité de rendement énergétique fluorescent est un.
