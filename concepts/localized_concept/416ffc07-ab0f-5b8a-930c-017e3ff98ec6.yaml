---
data:
  definition:
  - content: ensemble d'un nombre et d'une référence constituant l'expression quantitative
      d'une {{grandeur, urn:iec:std:iec:60050-112-01-01}}
  examples: []
  id: 112-01-28
  notes:
  - content: "Selon le type de référence, la valeur d'une grandeur est soit:. le produit
      d'un nombre et d'une unité de mesure (l'unité un est généralement omise pour
      les grandeurs sans dimension, comme dans les exemples f et g): \r\na) Longueur
      d'une tige donnée: 5,34 m  ou  534 cm\r\nb) Masse d'un corps donné: 0,152 kg
      \ ou  152 g\r\nc) Courbure d'un arc donné: 112 m–1 (cent douze mètres à la puissance
      moins un)\r\nd) Température Celsius d'un spécimen donné: –5 °C\r\ne) Impédance
      électrique d'un élément de circuit donné à une fréquence donnée, où j est l'unité
      imaginaire: (7,5 + 3,2 j) Ω\r\nf) Indice de réfraction d'un spécimen donné de
      verre: 1,32\r\ng) Fraction massique de cadmium dans un spécimen donné de cuivre:
      3 µg/kg  ou  3 × 10–9\r\nh) Molalité de Pb+2 dans un spécimen donné d'eau: 1,76
      mmol/kg. un nombre et la référence à une procédure de mesure: \r\nDureté C d’un
      spécimen donné: 43,5 HCR. un nombre et un matériau de référence: \r\nConcentration
      arbitraire en quantité de matière de lutropine dans un spécimen donné de plasma
      sanguin humain en utilisant l'étalon international 80/552 de l'OMS: 5,0 UI/l,
      où \"UI\" signifie \"unité internationale de l'OMS\"\n\nDans le premier cas,
      la valeur d'une grandeur stem:[Q] est généralement notée {stem:[Q]}[[stem:[Q]]]
      où {stem:[Q]} est la valeur numérique et [[stem:[Q]]] est l'unité de mesure."
  - content: Le nombre peut être complexe (voir l’exemple e dans la Note 1 à l'article).
  - content: La valeur d'une grandeur peut être représentée de plus d'une façon (voir
      les exemples a, b et g dans la Note 1 à l'article).
  - content: "Dans le cas de grandeurs vectorielles ou tensorielles, chaque composante
      a une valeur et de même pour la norme d'une grandeur vectorielle. Exemple:\r\nforce
      agissant sur une particule donnée, par exemple en composantes cartésiennes\n\n(stem:[F]~stem:[x]~;
      stem:[F]~stem:[y]~; stem:[F]~stem:[z]~) = (–31,5; 43,2; 17,0) N"
