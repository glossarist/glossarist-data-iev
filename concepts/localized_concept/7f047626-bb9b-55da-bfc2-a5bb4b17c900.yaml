data:
  definition:
  - content: 'intégrale de la tension électrique stem:[u]~AB~ ({{131-11-56, urn:iec:std:iec:60050-131-11-56}})
      entre deux bornes A et B d’un bipôle ou d’un multipôle stem:[Psi ( t ) = int_(t_(0))^(t)
      u_(rm(AB)) ( tau ) "d" tau] où stem:[t]~0~ est un instant quelconque avant la
      première alimentation en énergie électriqueNote 1 à l’article: Le concept n''est
      utile que dans le cas d''un élément inductif. Note 2 à l’article: La définition
      du flux totalisé en théorie des circuits est compatible avec la définition plus
      générale {{121-11-24, urn:iec:std:iec:60050-121-11-24}} donnée en électromagnétisme.
      Le flux totalisé en théorie des circuits est obtenu en inversant la procédure
      de calcul de la tension induite ({{121-11-28, urn:iec:std:iec:60050-121-11-28}}).'
