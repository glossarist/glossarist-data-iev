---
data:
  definition:
  - content: luminaire constitué d'un assemblage de lampes électriques montées en
      série, en parallèle ou en combinaison série/parallèle, interconnectées par des
      conducteurs isolés
  examples: []
  id: 845-30-029
  notes:
  - content: Pour les guirlandes lumineuses utilisant des lampes électriques non normalisées
      (lampes de type à enfoncement, par exemple), les lampes électriques sont considérées
      comme faisant partie de la guirlande.
  - content: Pour les guirlandes lumineuses équipées de lampes électriques non démontables,
      les lampes électriques sont considérées comme faisant partie de la guirlande.
  - content: Une guirlande lumineuse peut incorporer des dispositifs de commande (émetteurs
      d'éclat, par exemple).
  - content: Cet article était numéroté 845-10-24 dans l'IEC 60050-845:1987.
