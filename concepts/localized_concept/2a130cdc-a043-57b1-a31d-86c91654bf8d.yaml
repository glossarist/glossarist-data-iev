  - content: "{{circuit de sortie, urn:iec:std:iec:60050-447-04-01}} qui est soit
      fermé par un contact ou à l'état passant quand le {{relais de mesure, urn:iec:std:iec:60050-447-01-02}}
      ou l'{{équipement de protection, urn:iec:std:iec:60050-447-01-49}} est à l'{{état
