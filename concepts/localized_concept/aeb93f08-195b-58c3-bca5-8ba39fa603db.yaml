  definition:
  - content: grandeur scalaire égale à la circulation d’une force *stem:[F]* agissant
      sur une particule le long d’un trajet donné C, soit stem:[W] = ∫~C~ *stem:[F]* ⋅ d*stem:[r]*,
      où d*stem:[r]* est l'élément vectoriel d'arc
  examples: []
  id: 113-03-44
  notes:
  - content: Le travail est une énergie transférée d'une manière particulière et est
      donc une grandeur de processus ({{113-04-10, urn:iec:std:iec:60050-113-04-10}}).
      Le travail stem:[W] fait varier de Δstem:[E] = stem:[W] l'énergie interne stem:[E]
      ({{113-04-20, urn:iec:std:iec:60050-113-04-20}}) d'un corps, où stem:[E] est
      une grandeur d'état ({{113-04-09, urn:iec:std:iec:60050-113-04-09}}).
  - content: 'Dans les applications, un travail est souvent calculé en intégrant une
      puissance stem:[P] dans le temps: stem:[W = int_(t_(1))^(t_(2)) P d t].'
  - content: L'unité SI cohérente de travail est le joule, J.
