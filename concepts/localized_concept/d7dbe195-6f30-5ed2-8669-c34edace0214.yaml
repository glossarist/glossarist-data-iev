  definition:
  - content: vector quantity *stem:[v]* = d*stem:[r]*/dstem:[t], where *stem:[r]*
      is position vector and stem:[t] is time
  examples: []
  id: 113-01-32
  notes:
  - content: The velocity is related to a point described by its position vector.
      The point may localize a particle, or be attached to any other object such as
      a body or a wave.
  - content: 'The velocity depends on the choice of the reference frame. Proper transformation
      between frames must be used: Galilean for non-relativistic description, Lorentzian
      for relativistic description.'
  - content: The coherent SI unit of velocity is metre per second, m/s.
