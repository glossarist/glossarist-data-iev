data:
  definition:
  - content: "{{signal, urn:iec:std:iec:60050-171-01-03}} dont la caractéristique
      support d’informations ne peut prendre que des {{valeurs discrètes, urn:iec:std:iec:60050-171-01-06}},
      généralement une seule valeur dans chacun d’un certain nombre d’intervalles
      adjacents de valeursNote 1 à l’article: Les intervalles adjacents de valeurs
      sont contigus, sans séparation et sans recouvrement, et n’ont pas nécessairement
      la même taille. Note 2 à l’article: Un signal discret peut être un {{signal
      à temps continu, urn:iec:std:iec:60050-171-01-10}}, tel qu’un signal quantifié,
      ou un {{signal temporel discret, urn:iec:std:iec:60050-171-01-12}}, et donc
      un {{signal numérique, urn:iec:std:iec:60050-171-01-13}}."
