  definition:
  - content: the minimum value of the field strength from a transmitter permitting
      reception of required quality at a given point, for specified installation and
      operating conditions, in the presence of noise and interference, either as actually
      existing or determined by agreement or in accordance with frequency plans
  examples: []
  id: 705-08-32
  notes:
  - content: If either noise or interference is subject to fluctuations, the percentage
      of the time during which the required quality is to be met must be specified.
  - content: "The specified conditions include:\r\n- the transmission mode, the type
      of service and the frequency band used;\n\n- the characteristics of the reception
      installation: antenna gain, receiver pass-band, site;\n\n- the operating conditions
      at the receiver, especially the geographical area, the time of day, and the
      season of the year."
  terms:
  - type: expression
    normative_status: preferred
    designation: usable field strength
