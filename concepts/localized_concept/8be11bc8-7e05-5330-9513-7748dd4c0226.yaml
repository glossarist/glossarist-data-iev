  definition:
  - content: relation entre différents résultats d'évaluation de la conformité suffisante
      pour fournir le même niveau d'assurance de la conformité quant aux mêmes {{exigences
      spécifiées, urn:iec:std:iec:60050-902-02-01}}
  examples: []
  id: 902-06-04
  notes:
  - content: L'expression générique «résultat d'une évaluation de la conformité» est
      employée de {{902-06-04, urn:iec:std:iec:60050-902-06-04}} à {{902-06-09, urn:iec:std:iec:60050-902-06-09}}
      pour signifier le {{produit, urn:iec:std:iec:60050-902-02-03}} d'une activité
      d‘évaluation de la conformité (par exemple un rapport ou un certificat) et peut
      comprendre un constat de non-conformité.
