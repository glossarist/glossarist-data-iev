  definition:
  - content: grandeur définie, dans un système de grandeurs, en fonction des grandeurs
      de base
  examples: []
  id: 112-01-10
  notes:
  - content: Par exemple, dans un système de grandeurs ayant pour grandeurs de base
      la longueur et la masse, la masse volumique est une grandeur dérivée définie
      comme le quotient d'une masse par un volume (longueur au cube).
