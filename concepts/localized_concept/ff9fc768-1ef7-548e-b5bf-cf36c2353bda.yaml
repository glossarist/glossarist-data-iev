---
data:
  definition:
  - content: "{{onde radioélectrique, urn:iec:std:iec:60050-701-02-12}} ou {{signal,
      urn:iec:std:iec:60050-701-01-02}} produit par un {{émetteur radioélectrique,
      urn:iec:std:iec:60050-713-08-01}} à des fins de {{radiocommunication, urn:iec:std:iec:60050-701-01-31}}"
  examples: []
  id: 161-01-09
  notes:
  - content: En radiocommunication, il convient de ne pas employer le terme "émission"
      dans le sens plus général d’"émission radioélectrique" (l'énergie électromagnétique
      qui émane d'une source sous la forme d'ondes radioélectriques). Par exemple,
      la partie de l'énergie produite par un {{oscillateur local, urn:iec:std:iec:60050-713-10-06}}
      qui est transférée vers l'espace extérieur ne constitue pas une émission mais
      un {{rayonnement, urn:iec:std:iec:60050-702-02-06}}.
  - content: Le terme "émission" désigne également la production de toutes ondes ou
      particules (voir {{IEV 702-02-03, urn:iec:std:iec:60050-702-02-03}}), un processus
      en radiocommunication (voir {{IEV 702-02-05, urn:iec:std:iec:60050-702-02-05}}),
      les signaux ou ondes radioélectriques produits par un émetteur de radiodiffusion
      (voir {{IEV 723-01-03, urn:iec:std:iec:60050-723-01-03}}), un rejet dans l'environnement
      (voir {{IEV 904-01-11, urn:iec:std:iec:60050-904-01-11}}), et est employé en
      tant que synonyme du terme "{{programme, urn:iec:std:iec:60050-723-01-02}}"
      en radiodiffusion et en télédistribution.
  - content: Le terme français "{{émission, urn:iec:std:iec:60050-702-02-04}}" s'applique
      également au concept représenté par le terme anglais "{{sending, urn:iec:std:iec:60050-702-02-04}}".
