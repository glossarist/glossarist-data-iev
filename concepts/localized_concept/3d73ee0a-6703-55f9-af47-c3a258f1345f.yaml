  definition:
  - content: relation between the {{radiant exitance, urn:iec:std:iec:60050-845-21-080}},
      stem:[M]~e~, of a Planckian radiator and its temperature, stem:[T], given bystem:[M]~e~ =
      stem:[σ] stem:[T]^4^where stem:[σ] is the Stefan-Boltzmann constant and stem:[T]
      is the thermodynamic temperature
  examples: []
  id: 845-24-007
  notes:
  - content: The Stefan-Boltzmann constant can be calculated by stem:[sigma = frac(2
      pi^(5) k^(4))(15 h^(3) c_(0)^(2))] where stem:[h] is the Planck constant, stem:[c]~0~
      is the {{speed of light in vacuum, urn:iec:std:iec:60050-113-01-34}}, and stem:[k]
      is the Boltzmann constant.
  - content: For the value of the Stefan-Boltzmann constant, stem:[σ,] see CODATA.
  - content: This entry was numbered 845-04-07 in IEC 60050-845:1987.
