  definition:
  - content: "{{dyadic Boolean operation, urn:iec:std:iec:60050-171-03-08}} whose
      result has the Boolean value 1 if and only if the {{operands, urn:iec:std:iec:60050-171-03-04}}
      have different Boolean values"
  examples: []
  id: 171-03-16
  notes:
  - content: The exclusive-or operation applied to variables stem:[a] and stem:[b]
      is noted stem:[a oplus b] (U+2295). Other notations are also used like stem:[a
      "P{nequiv}" b] (U+2262), stem:[a ↮ b] (U+21AE), stem:[a "P{nLeftrightarrow}"
      b] (U+21CE), stem:[a "P{veeodot}" b] (U+2A52), stem:[a "P{varveebar}" b] (U+2A61).
