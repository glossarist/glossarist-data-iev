  definition:
  - content: "unité fonctionnelle qui génère une variable de sortie dont la valeur
      est égale à la valeur absolue de sa variable d'entrée, suivant la formulestem:[v
      (t) = |u (t)|]où<table>\r\n<tr>\n<td>stem:[t]</td>\n<td>est le temps;</td>\n</tr>\r\n<tr>\n<td>\nstem:[u](stem:[t])</td>\n<td>est
      la variable d’entrée;</td>\n</tr>\r\n<tr>\n<td>\nstem:[v](stem:[t])</td>\n<td>est
      la variable de sortie.</td>\n</tr>\r\n</table>"
