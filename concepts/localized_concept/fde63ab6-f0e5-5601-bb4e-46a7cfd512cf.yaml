  definition:
  - content: phenomenon by which {{energy, urn:iec:std:iec:60050-113-03-45}} emanates
      from a source in the form of {{waves, urn:iec:std:iec:60050-103-10-01}} or {{particles,
      urn:iec:std:iec:60050-113-05-01}}
  examples: []
  id: 702-02-03
  notes:
  - content: The term “emission” is also used for the radio waves and signals produced
      (see {{IEV 161-01-09, urn:iec:std:iec:60050-161-01-09}}) in radiocommunication,
      for a process in radiocommunication (see {{IEV 702-02-05, urn:iec:std:iec:60050-702-02-05}}),
      as a synonym for a {{programme, urn:iec:std:iec:60050-723-01-02}} in broadcasting
      and for {{transmission, urn:iec:std:iec:60050-723-01-03}} in broadcasting, and
      for a release into the environment (see {{IEV 904-01-11, urn:iec:std:iec:60050-904-01-11}}).
  - content: In French, the term “{{émission, urn:iec:std:iec:60050-702-02-04}}” is
      also used for the concept represented by the English term “{{sending, urn:iec:std:iec:60050-702-02-04}}”
      of a signal.
