  definition:
  - content: "plasma haute densité produit par un {{champ électromagnétique, urn:iec:std:iec:60050-121-11-61}}
      à haute intensité couplé inductivement\r\nNote 1 à l’article: Le plasma à couplage
      inductif est utilisé dans les procédés de gravure tels que la {{gravure ionique
      réactive profonde, urn:iec:std:iec:60050-523-05-13}}.  \r\nNote 2 à l’article:
      Le terme abrégé \"ICP\" est dérivé du terme anglais développé correspondant
      \"inductively coupled plasma\"."
