  definition:
  - content: "the quotient of stem:[\"d\" bar(epsilon)] by dstem:[m], where stem:[\"d\"
      bar(epsilon)] is the mean energy imparted by ionizing radiation to matter of
      mass dstem:[m]\r\nstem:[D = frac(\"d\" bar(epsilon))(\"d\" m)]"
  examples: []
  id: 881-12-06
  notes:
  - content: "The SI unit of absorbed dose is joule per kilogram, whose special name
      is gray (Gy). The earlier special unit of absorbed dose, still in temporary
      use, was the rad.\r\n1 Gy = 1 J kg^−1^ = 100 rad"
