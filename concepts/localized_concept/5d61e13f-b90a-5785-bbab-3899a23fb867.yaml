  id: 723-10-100
  notes:
  - content: Les éléments binaires du bloc à protéger sont pris comme coefficients
      d'un polynôme que l'on divise modulo 2 par un polynôme générateur spécifié ;
      les coefficients du reste de cette division sont ajoutés au bloc initial sous
      forme d'un bloc de contrôle.
