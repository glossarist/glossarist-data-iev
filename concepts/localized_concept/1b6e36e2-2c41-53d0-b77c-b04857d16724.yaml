  definition:
  - content: electric lamp in which the light is produced, directly or indirectly,
      by an {{electric discharge, urn:iec:std:iec:60050-845-27-018}} through a gas,
      a metal vapour or a mixture of several gases and vapours
  examples: []
  id: 845-27-024
  notes:
  - content: According to whether the light is mainly produced in a gas or in a metal
      vapour, discharge lamps can be categorized as gaseous discharge lamps, for example
      xenon lamps, neon lamps, helium lamps, nitrogen lamps or carbon dioxide lamps,
      or as metal vapour lamps, such as {{metal halide lamps, urn:iec:std:iec:60050-845-27-033}},
      {{high-pressure mercury lamps, urn:iec:std:iec:60050-845-27-028}} or {{high-pressure
      sodium lamps, urn:iec:std:iec:60050-845-27-031}}.
  - content: This entry was numbered 845-07-17 in IEC 60050-845:1987.
  terms:
