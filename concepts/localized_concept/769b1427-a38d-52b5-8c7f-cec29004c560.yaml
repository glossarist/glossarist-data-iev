  definition:
  - content: reference to one or more {{standard, urn:iec:std:iec:60050-901-02-02}}s
      in place of detailed {{provision, urn:iec:std:iec:60050-901-05-01}}s within
      a {{regulation, urn:iec:std:iec:60050-901-02-10}}
  examples: []
  id: 901-06-14
  notes:
  - content: A reference to standards is either dated, undated or general, and at
      the same time either exclusive or indicative.
  - content: A reference to standards may be linked to a more general legal provision
      referring to the {{state of the art, urn:iec:std:iec:60050-901-01-04}} or {{acknowledged
      rules of technology, urn:iec:std:iec:60050-901-01-05}}. Such a provision may
      also stand alone.
