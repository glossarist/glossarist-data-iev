  definition:
  - content: quotient of the radiant flux or luminous flux stem:[Φ]~2~ (or stem:[Φ]~1~)
      that surface S~1~ (or S~2~) sends to surface S~2~ (or S~1~) and the {{radiant
      exitance, urn:iec:std:iec:60050-845-21-080}} or {{luminous exitance, urn:iec:std:iec:60050-845-21-081}}
      stem:[M]~1~ (or stem:[M]~2~)stem:[g = frac(Phi_(2))(M_(1)) = frac(Phi_(1))(M_(2))]
  examples: []
  id: 845-29-092
  notes:
  - content: Since stem:[M] = πstem:[L], and in the particular case where all points
      on S~1~ are seen from all points on S~2~stem:[g = frac(1)(pi) int_(A_(2)) int_(A_(1))
      frac(costheta_(1) costheta_(2))(l^(2)) "d" A_(1) "d" A_(2) = frac(1)(pi) G]where
      stem:[l] is the distance between the elements of areas dstem:[A]~1~ and dstem:[A]~2~
      on the surfaces S~1~ and S~2~, stem:[G] is the geometric extent of the beam
      delimited by the boundaries of S~1~ and S~2~, and stem:[θ]~1~ and stem:[θ]~2~
      are the angles between the surface normals of the two elementary areas dstem:[A]~1~
      and dstem:[A]~2~ respectively and the line joining the two elementary areas.
  - content: For two elementary areas dA~1~ and dA~2~stem:["d" g = frac(1)(pi) "d"
      A_(1) "d" Omega_(1) cos theta_(1) = frac(1)(pi) "d" A_(2) "d" Omega_(2) cos
      theta_(2)]where dstem:[Ω]~1~ (or dstem:[Ω]~2~) is the solid angle which the
      area dstem:[A]~2~ (or dstem:[A]~1~) subtends from the centre of dstem:[A]~1~
      (or dstem:[A]~2~).
  - content: The radiance or luminance stem:[L] of the beam delimited by the boundaries
      of dA~1~ and dA~2~ isstem:[L = frac(1)(pi) frac("d" Phi)("d" g)].
  - content: The mutual exchange coefficient is expressed in square metre (m^2^).
  - content: This entry was numbered 845-09-71 in IEC 60050-845:1987.
