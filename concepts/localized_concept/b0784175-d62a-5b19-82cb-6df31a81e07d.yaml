  definition:
  - content: equilibrium position to which the indicating device tends to return,
      due only to mechanical restoring forces, when the measuring element is not energized
  examples: []
  id: 311-05-05
  notes:
  - content: In instruments with a mechanically suppressed zero, the equilibrium position
      is outside the scale marking.
  - content: In certain instruments such as flux meters and quotient-meters, the mechanical
      zero is indeterminate.
