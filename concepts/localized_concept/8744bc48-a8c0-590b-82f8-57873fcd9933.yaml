---
data:
  definition:
  - content: "{{dispositif, urn:iec:std:iec:60050-511-01-01}} photovoltaïque dont
      les propriétés optiques sont modifiées en déposant des {{nanoparticules, urn:iec:std:iec:60050-511-01-12}}
      métalliques sur la couche {{semiconductrice, urn:iec:std:iec:60050-121-12-06}}
      du dispositif"
  examples: []
  id: 511-02-07
  notes:
  - content: La {{nanostructure, urn:iec:std:iec:60050-511-01-08}} des particules
      métalliques augmente l'{{absorption, urn:iec:std:iec:60050-705-02-07}} et la
      {{diffusion, urn:iec:std:iec:60050-705-04-46}} de la lumière incidente et supporte
      de fortes excitations collectives localisées d'électrons connues sous le nom
      de plasmons de surface.
  - content: Les nanostructures métalliques qui génèrent une résonance plasmonique
      sont déposées sur la couche semiconductrice du dispositif pour produire, par
      résonance, un couplage de la lumière dans la couche absorbante et pour transporter
      les {{porteurs de charge, urn:iec:std:iec:60050-113-06-25}} photo-induits hors
      de la couche absorbante, améliorant ainsi la performance du dispositif.
  sources:
