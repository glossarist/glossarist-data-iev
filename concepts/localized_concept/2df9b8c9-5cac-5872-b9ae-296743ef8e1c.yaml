  definition:
  - content: logarithm of the reciprocal of the conditional probability stem:[p (x
      | y)] of the event stem:[x] given the occurrence of the event stem:[y] stem:[I
      (x | y) = log frac(1)(p ( x | y ))]
  examples: []
  id: 171-07-21
  notes:
  - content: 'The conditional information content is also the amount by which the
      {{joint information content, urn:iec:std:iec:60050-171-07-20}} of the two events
      exceeds the {{information content, urn:iec:std:iec:60050-171-07-14}} of the
      second: stem:[I (x | y) = I (x , y) - I (y)].'
