data:
  definition:
  - content: "grandeur scalaire ou tensorielle dont le produit par le champ magnétique
      *stem:[H]* est égal à l’aimantation *stem:[M]*\r\n*stem:[M]* = stem:[κ]*stem:[H]*Note
      1 à l’article: Dans un milieu isotrope, la susceptibilité magnétique est une
      grandeur scalaire alors que dans un milieu anisotrope c’est une grandeur tensorielle.
      Note 2 à l’article: Dans certains documents, le symbole stem:[χ]~m~ (au lieu
      de stem:[κ]) est utilisé pour la \"susceptibilité magnétique\"."
