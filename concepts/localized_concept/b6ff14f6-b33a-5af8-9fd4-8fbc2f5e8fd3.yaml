  definition:
  - content: température, généralement exprimée en kelvins, à laquelle devrait être
      portée une résistance pour que sa densité spectrale de puissance disponible
      de bruit soit la même que celle qui existe aux bornes d'une antenne donnée,
      à une fréquence et dans des conditions d'installation et d'emploi spécifiées
  examples: []
  id: 712-02-54
  notes:
  - content: La température de bruit d'une antenne résulte à la fois de son bruit
      propre et des bruits provenant des sources extérieures.
