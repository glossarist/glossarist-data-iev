  definition:
  - content: quotient of the vertical optical thickness of a real turbid atmosphere
      and the vertical optical thickness of the pure and dry atmosphere (Rayleigh
      atmosphere), related to the visible part of the solar spectrum
  examples: []
  id: 845-29-108
  notes:
  - content: The luminous turbidity factor can be expressed bystem:[T_("v") = frac(-
      lnE_("vs") / E_("v") ))(a_("v") m)]where stem:[E]~vs~ is the direct-beam illuminance
      on a horizontal surface (at the ground), stem:[E]~v~ is the extraterrestrial
      horizontal illuminance, stem:[a]~v~ is the luminous extinction coefficient,
      and stem:[m] is the relative optical air mass.
  - content: The luminous turbidity factor has unit one.
  terms:
  - type: expression
    normative_status: preferred
    designation: luminous turbidity factor
  - type: symbol
    designation: stem:[T]~v~
