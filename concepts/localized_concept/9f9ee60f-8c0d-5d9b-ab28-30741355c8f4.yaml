data:
  definition:
  - content: pour tout élément stem:[a] d'un ensemble pour lequel une multiplication
      avec un élément neutre stem:[u] est définie, élément unique stem:[a^(- 1)] de
      l'ensemble, s'il existe, tel que stem:[a * a^(- 1) = a^(- 1) * a = u]
  examples: []
  id: 102-01-24
  notes:
  - content: En anglais, le terme «reciprocal» est préféré pour les nombres.
  - content: L'inverse de l'élément stem:[a] est noté stem:[a^(- 1)]. Pour un nombre
      non nul, ou pour une grandeur ou une unité, on peut aussi noter l'inverse stem:[1
      / a] ou stem:[frac(1)(a)].
