---
data:
  definition:
  - content: niveau maximal d'exposition d'une surface, habituellement l'œil ou la
      peau, dont il n'est pas prévu qu'il entraîne des effets biologiques indésirables
  examples: []
  id: 845-26-072
  notes:
  - content: Les limites d'exposition pour la sécurité humaine des {{rayonnements
      optiques, urn:iec:std:iec:60050-845-21-002}}, stem:[H]~L~, sont normalement
      recommandées par la Commission internationale pour la protection contre les
      rayonnements non ionisants (ICNIRP).
  - content: Les limites d'exposition sont souvent basées sur l'éclairement énergétique
      (par exemple, pour la peau), mais lorsque cela est approprié, peuvent également
      être basées sur la luminance énergétique (par exemple, le danger de la lumière
      bleue des sources étendues).
