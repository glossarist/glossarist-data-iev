data:
  definition:
  - content: "{{constante physique fondamentale, urn:iec:std:iec:60050-112-03-09}}
      égale au {{quantum, urn:iec:std:iec:60050-113-05-06}} de la {{charge électrique,
      urn:iec:std:iec:60050-113-02-10}}, dont la valeur est fixée à exactement 1,602 176 634 × 10^−19^ {{C,
      urn:iec:std:iec:60050-113-02-11}}\r\nNote 1 à l’article: La charge électrique
      élémentaire est égale à la charge du proton et opposée à la charge de l’électron.\r\nNote
      2 à l’article: La charge électrique élémentaire est employée dans le {{SI, urn:iec:std:iec:60050-112-02-02}}
      pour définir l’{{ampère, urn:iec:std:iec:60050-112-02-07}}."
