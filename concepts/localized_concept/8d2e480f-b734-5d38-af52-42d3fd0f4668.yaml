  definition:
  - content: "système de commutation dans lequel les valeurs des variables de sortie,
      à un instant donné, dépendent des valeurs des variables d’entrée et des valeurs
      des variables d’état, à ce même moment, tandis que les valeurs des variables
      d’état du système à l’instant suivant dépendent des valeurs des variables d’état
      et des valeurs des variables d’entrée à l’instant spécifiéVOIR: Figure 22.Note
      1 à l’article: Un circuit séquentiel est décrit par les équations<table>\r\n<tr>\n<td>\n\nstem:[x]~stem:[i]+1~
      =\n\nstem:[f](\n\nstem:[x]~stem:[i]~,\n\nstem:[u]~stem:[i]~)</td>\n<td>fonction
      de transition, consistant en un nombre fini de variables d’état</td>\n</tr>\r\n<tr>\n<td>\n\nstem:[v]~stem:[i]~
      =\n\nstem:[g](\n\nstem:[x]~stem:[i]~,\n\nstem:[u]~stem:[i]~)</td>\n<td>fonction
      de sortie</td>\n</tr>\r\n</table>où<table>\r\n<tr>\n<td>\n\nstem:[x]~stem:[i]~\n</td>\n<td>est
      le vecteur d’état à l’instant stem:[ti];</td>\n</tr>\r\n<tr>\n<td>\n\nstem:[x]~stem:[i]+1~\n</td>\n<td>est
      le vecteur d’état à l’instant stem:[t]~stem:[i]+1~;</td>\n</tr>\r\n<tr>\n<td>\n\nstem:[u]~stem:[i]~\n</td>\n<td>est
      le vecteur d’entrée à l’instant stem:[ti];</td>\n</tr>\r\n<tr>\n<td>\n\nstem:[v]~stem:[i]~\n</td>\n<td>est
      le vecteur de sortie à l’instant stem:[ti].</td>\n</tr>\r\n</table>Note 2 à
      l’article: Une circuit séquentiel existe bien pour l'automate fini. Cette stabilité
      exprime la propriété que la variable d'entrée qui a causé la transition à un
      état particulier ne peut pas interagir avec cet état ou ne peut pas provoquer
      une autre transition en interagissant avec cet état."
