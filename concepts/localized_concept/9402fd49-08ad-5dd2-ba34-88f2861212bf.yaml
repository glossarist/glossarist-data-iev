  id: 102-02-09
  notes:
  - content: Toutes les propriétés des nombres réels (opérations et limites) s'étendent
      aux nombres complexes, sauf la relation d'ordre.
  - content: Le nombre complexe défini par le couple (stem:[a], stem:[b]) est noté
      stem:[c = a + rm(j) b] où j est l'unité imaginaire ({{IEV 102-02-10, urn:iec:std:iec:60050-102-02-10}})
      représentée par le couple (0, 1), stem:[a] est la partie réelle et stem:[b]
      la partie imaginaire. Un nombre complexe peut aussi être représenté par stem:[c
      = |c| ( cosphi + rm(j) " " sinphi ) = |c| e^(rm(j) phi)] où stem:[|c|] est un
      nombre réel positif ou nul appelé module et stem:[φ] un nombre réel appelé argument.
  - content: En électrotechnique, un nombre complexe est généralement représenté par
      un symbole littéral souligné, par exemple stem:[underline(c)].
  - content: L'ensemble des nombres complexes est noté ℂ (C avec une barre verticale
      dans l'arc gauche) ou *C*. L'ensemble sans zéro est noté en ajoutant un astérisque
      au symbole, par exemple ℂ*.
