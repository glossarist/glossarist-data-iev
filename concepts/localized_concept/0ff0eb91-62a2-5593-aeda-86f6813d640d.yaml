  definition:
  - content: for a single radioactive decay process, the time stem:[(T_(frac(1)(2)))]
      in which the activity of the radionuclide is reduced to half of its initial
      value by that process
  examples: []
  id: 881-04-46
  notes:
  - content: "The radioactive half-life is related to the decay constant by:\r\nstem:[T_(frac(1)(2))
      = frac(ln2)(lambda) \"P{simeq}\" frac(0,693)(lambda)]\r\nstem:[λ] = decay constant"
