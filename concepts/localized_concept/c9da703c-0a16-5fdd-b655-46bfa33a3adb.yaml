  definition:
  - content: measure of the proportions of the amounts of the monochromatic stimulus
      and of the specified achromatic stimulus that, when additively mixed, match
      the colour stimulus considered
  examples: []
  id: 845-23-064
  notes:
  - content: In the case of purple stimuli, the monochromatic stimulus is replaced
      by a stimulus whose chromaticity is represented by a point on the purple boundary.
  - content: The proportions can be measured in various ways (see "{{colorimetric
      purity, urn:iec:std:iec:60050-845-23-065}}" and "{{excitation purity, urn:iec:std:iec:60050-845-23-065}}").
  - content: This entry was numbered 845-03-46 in IEC 60050-845:1987.
