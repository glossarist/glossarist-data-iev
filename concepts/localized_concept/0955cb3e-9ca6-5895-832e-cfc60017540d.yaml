  examples: []
  id: 448-11-03
  notes:
  - content: |-
      A protection equipment is part of a protection system.

      Examples: Distance protection equipment, phase comparison protection equipment. (One-phase comparison equipment is part of one line-end of a phase comparison protection system.)
