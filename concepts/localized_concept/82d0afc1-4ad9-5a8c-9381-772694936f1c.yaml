  definition:
  - content: "{{fuel cell power system, urn:iec:std:iec:60050-485-09-01}} that is
      connected and fixed in place\r\nimage::/assets/images/parts/485/usemap[]\r\n<map
      name=\"image-map\">\n\n<area title=\"fuel cell module\" href=\"http://www.electropedia.org/iev/iev.nsf/display?openform&amp;ievref=485-09-03\"
      shape=\"rect\" coords=\"272,138,351,212\" target=\"_self\" alt=\"fuel cell module\">\r\n</map>\r\n*Key*
      Discharge water – water discharged from the fuel cell power system including
      waste water and condensate. EMD ({{electromagnetic disturbance, urn:iec:std:iec:60050-161-01-05}})
      – electromagnetic phenomenon that can degrade the performance of a device, equipment
      or system, or adversely affect living or inert matter. EMI ({{electromagnetic
      interference, urn:iec:std:iec:60050-161-01-06}}) – degradation in the performance
      of equipment or transmission channel or a system caused by an electromagnetic
      disturbance. Recovered heat – thermal energy that has been recovered for useful
      purposes. Waste heat – thermal energy released and not recovered."
