  definition:
  - content: retinal lesion produced by intense visible or {{IR-A, urn:iec:std:iec:60050-845-21-005}}
      radiation exposure
  examples: []
  id: 845-26-022
  notes:
  - content: The term "retinal burn" is generally used to describe a thermal retinal
      lesion (see "{{retinal thermal injury, urn:iec:std:iec:60050-845-26-023}}");
      however, it is sometimes applied to a photochemical retinal lesion. More specific
      terms are also used for a photochemical "burn", i.e. a "{{photic maculopathy,
      urn:iec:std:iec:60050-845-26-010}}" (from blue-light-induced injuries), or for
      a retinal thermal injury, a "chorioretinal thermal injury".
