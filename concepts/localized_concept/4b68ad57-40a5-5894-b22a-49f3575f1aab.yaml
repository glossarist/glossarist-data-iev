  definition:
  - content: quotient of the flux transmitted by a specimen in a given optical system
      and the flux transmitted when the specimen is removed from the sampling aperture
  examples:
  - content: Comparison of the radiation penetrating a slide situated in a {{projector,
      urn:iec:std:iec:60050-845-30-030}} and reaching a screen to the radiation when
      the slide is removed from the projector and only an empty slide mount is in
      the projector.
  id: 845-24-074
