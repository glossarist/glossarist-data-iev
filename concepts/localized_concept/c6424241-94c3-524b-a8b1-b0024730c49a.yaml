data:
  definition:
  - content: "limite, si elle existe, du quotient de la probabilité conditionnelle
      d’achèvement de la réparation dans l’intervalle de temps (stem:[t], stem:[t]
      + Δstem:[t]) par Δstem:[t], lorsque Δstem:[t] tend vers zéro, en supposant que
      la réparation a commencé à stem:[t] = 0 et ne s’est pas terminée avant le temps
      stem:[t]\r\nNote 1 à l’article: Le taux de réparation est lié au temps de réparation
      ({{192-07-19, urn:iec:std:iec:60050-192-07-19}}) et à ses constituants. Note
      2 à l’article: L’unité de mesure du taux de réparation est l’unité de temps
      à la puissance − 1."
