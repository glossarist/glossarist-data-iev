  notes:
  - content: 'The SI unit of angle is the radian (symbol rad). Other units are the
      degree (symbol °), the minute (symbol &prime;) and the second (symbol &Prime;):
      1° = (stem:[pi]/180) rad, 1&prime; = (1/60)°, 1&Prime; = (1/60)&prime;.'
  - content: The term "plane angle" is only used in place of the term "angle" to distinguish
      it from the term "{{solid angle, urn:iec:std:iec:60050-102-04-46}}".
  - content: The angle between a straight line and a plane and the angle between two
