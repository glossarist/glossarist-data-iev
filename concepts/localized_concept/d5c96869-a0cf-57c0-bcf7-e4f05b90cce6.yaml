  definition:
  - content: case, or other protective housing, provided by the equipment manufacturer
      to mount the equipment and to protect it from accidental damage, and occasionally
      from EMC or environmental effects
  examples: []
  id: 821-01-54
  notes:
  - content: The equipment housing can offer protection to personnel, e.g. from electric
      shock. Where the equipment housing provides the full required environmental
      protection, then it is treated as a cubicle to define the relevant environmental
      parameters. The equipment housing normally contains only a single supplier’s
      equipment, and is only a part of a signalling or telecommunications system.
