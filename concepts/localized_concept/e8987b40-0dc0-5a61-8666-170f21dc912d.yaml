  definition:
  - content: use of a {{normative document, urn:iec:std:iec:60050-901-02-01}} in production,
      trade, etc.
  examples: []
  id: 901-06-11
  notes:
  - content: A normative document can be said to be “implemented” in two different
      ways. It may be applied in production, trade, etc., and it may be taken over,
      wholly or in part, in another normative document. Through the medium of this
      second document, it may then be applied, or it may again be taken over in yet
      another normative document.
