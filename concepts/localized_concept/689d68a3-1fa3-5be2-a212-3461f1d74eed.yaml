  definition:
  - content: résistance volumique d’un cube de volume unité
  examples: []
  id: 212-11-11
  notes:
  - content: Pour les matériaux isolants, la résistivité volumique est habituellement
      déterminée au moyen d’électrodes de mesure disposées sur une feuille du matériau.
  - content: 'La Partie 121 de l''IEV: Electromagnétisme, définit la “conductivité“
      comme “grandeur scalaire ou tensorielle dont le produit par le champ électrique
      dans un milieu est égal à la densité du courant électrique“, et la “résistivité“
      comme “l’inverse de la conductivité lorsque cette inverse existe”. Mesurée de
      cette façon, la résistivité volumique est une moyenne de la résistivité sur
      les hétérogénéités éventuelles dans le volume incluses dans la mesure; elle
      comprend l''effet d''éventuels phénomènes de polarisation aux électrodes.'
