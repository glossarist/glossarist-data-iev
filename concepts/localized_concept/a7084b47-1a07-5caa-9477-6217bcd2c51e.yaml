  definition:
  - content: "the magneto-ionic component which, at vertical incidence, is reflected
      at the height at which the electron density and the Earth's magnetic field are
      such that:\r\nstem:[f]~p~^2^ = stem:[f] ^2^ -stem:[f f] ~B~\r\nwhere stem:[f]~p~
      is the plasma frequency, stem:[f] is the wave frequency, and stem:[f] ~B~ is
      the electron gyro frequency"
  examples: []
  id: 705-07-40
  notes:
  - content: This component has left-handed or right-handed elliptical polarization
      depending on whether the direction of propagation is at an obtuse or acute angle
      to the Earth's magnetic field vector.
  - content: When the direction of propagation is perpendicular to the Earth's magnetic
      field this component has linear polarization with the electric flux density
      vector perpendicular to the plane defined by the direction of propagation and
      the magnetic field.
  terms:
  - type: expression
    normative_status: preferred
    designation: extraordinary wave
