---
data:
  definition:
  - content: "{{capteur, urn:iec:std:iec:60050-151-13-48}} qui utilise des substances
      organiques dans le {{dispositif, urn:iec:std:iec:60050-151-11-20}}, destiné
      à la mesure de sous-systèmes liés aux organismes ou qui imite un organisme\r\nNote
      1 à l’article: Un biocapteur typique est constitué du matériau spécifique d’origine
      biologique tel qu’un enzyme ou un anticorps, qui identifie l’objet de la mesure,
      et le dispositif qui mesure une modification de grandeur physique ou chimique
      liée à la réaction d’identification. Un capteur à {{semiconducteurs, urn:iec:std:iec:60050-521-02-01}}
      ou tout autre type d’{{électrode, urn:iec:std:iec:60050-151-13-01}} (par exemple
      {{ISFET, urn:iec:std:iec:60050-523-04-03}}, électrode à micro-oxygène, capteur
      optique de détection de fluorescence) préparé par la technologie de micro-usinage
      du silicium peut être utilisé comme ce dispositif. Les biocapteurs sont utilisés
      pour les systèmes d’analyses sanguines, les capteurs de glucose, les microrobots,
      etc."
