  definition:
  - content: "pour un élément inductif linéaire à stem:[m] paires de bornes, matrice
      stem:[m] × stem:[m] servant à exprimer les flux totalisés stem:[Ψ]~stem:[i]~
      ({{131-12-17, urn:iec:std:iec:60050-131-12-17}}) entre les bornes de chaque
      paire en fonction des courants électriques stem:[i]~stem:[j]~ à la première
      borne de chaque paire:\r\nstem:[([Psi_(1)], [Psi_(2)], [vdots], [Psi_(i)], [vdots],
      [Psi_(m)]) = ([L_(11), L_(12), cdots, L_(1 j), cdots, L_(1 m)], [L_(21), L_(22),
      cdots, L_(2 j), cdots, L_(2 m)], [vdots, vdots, ddots, vdots, ddots, vdots],
      [L_(i 1), L_(i 2), cdots, L_(i j), cdots, L_(i m)], [vdots, vdots, ddots, vdots,
      ddots, vdots], [L_(m 1), L_(m 2), cdots, L_(m j), cdots, L_(m m)]) * ( [[i_(1)],
      [i_(2)], [vdots], [i_(j)], [vdots], [i_(m)]] )]"
  examples: []
  id: 131-12-34
  notes:
  - content: Une matrice des inductances est toujours symétrique et définie positive.
  - content: Une matrice des inductances peut aussi être déterminée pour un ensemble
      des éléments électriques comportant des couplages inductifs entre chaque paire
      d’éléments.
