  definition:
  - content: for a sinusoidal wave at a given point, velocity in the direction of
      propagation of the wavefront corresponding to a specified phase
  examples: []
  id: 103-10-13
  notes:
  - content: The magnitude of the phase velocity is equal to the product of frequency
      and wavelength, and to the quotient of angular frequency by angular wavenumber.
  - content: If both phase velocities and other velocities are involved, then stem:[c]
      should be used for the former and stem:[v] (vee) for the latter.
  terms:
  - type: expression
    normative_status: preferred
    designation: phase velocity
  - designation: |-
      stem:[c]~stem:[φ]~
      stem:[v]~stem:[φ]~
      stem:[c]
      stem:[v]
