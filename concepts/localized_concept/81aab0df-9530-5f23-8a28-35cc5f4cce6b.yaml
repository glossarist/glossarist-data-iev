  definition:
  - content: reduction in the brightness of a predominantly long-wavelength colour
      stimulus relative to that of a predominantly short-wavelength colour stimulus,
      when the luminances are reduced in the same proportion from photopic to mesopic
      or scotopic levels, without changing the respective relative spectral distributions
      of the stimuli involved
  examples: []
  id: 845-22-036
  notes:
  - content: In passing from photopic vision to mesopic vision or scotopic vision,
      the spectral luminous efficiencies change, the wavelength of maximum efficiency
      being displaced towards the shorter wavelengths.
  - content: This entry was numbered 845-02-14 in IEC 60050-845:1987.
  terms:
  - type: expression
    normative_status: preferred
    designation: Purkinje phenomenon
