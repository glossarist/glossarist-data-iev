  definition:
  - content: at a given point of a filiform tube of current, vector quantity equal
      to the product of the electric current and the vector line element at that point
  examples: []
  id: 121-11-17
  notes:
  - content: A current element is expressed by  stem:[I]dstem:[*r*]  or by stem:[I]stem:[*e*]~t~dstem:[s]
      where stem:[I]  is the electric current and dstem:[*r*] = stem:[*e*]~t~dstem:[s]
      the vector line element.
