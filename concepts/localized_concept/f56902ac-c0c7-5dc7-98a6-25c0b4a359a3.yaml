  definition:
  - content: mode of operation in which stabilized power supplies are interconnected
      and in which the slave supplies have their outputs always maintained equal or
      proportional to the output of the "master" supply
  examples: []
  id: 314-05-04
  notes:
  - content: A configuration in which the slave has a polarity opposite to that of
      the "master" with respect to the common output terminal, is called "complementary
      tracking".
  terms:
  - type: expression
    normative_status: preferred
    designation: slave tracking operation
