  definition:
  - content: grandeur qui résulte du comptage d'objets ou d'évènements identifiés
      individuellement
  examples: []
  id: 112-01-09
  notes:
  - content: Un nombre d'entités est une grandeur sans dimension.
  - content: On peut considérer la grandeur « nombre d'entités » comme une grandeur
      de base dans tout système de grandeurs.
  - content: Les valeurs des nombres d'entités sont exprimées par des nombres entiers,
      mais des traitements statistiques peuvent être effectués.
  - content: |-
      Exemples de nombre d’entités:

      • nombre d'habitants d'un pays donné à une date donnée;

      • nombre de tours dans une bobine;

      • nombre de molécules dans un spécimen donné;

      • dégénérescence des niveaux d'énergie d’un système quantique.
