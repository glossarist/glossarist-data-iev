  definition:
  - content: 'système de transfert de données entre plusieurs participants, qui sont
      des unités fonctionnelles de traitement de données, par l''intermédiaire d''une
      voie de transmission commune, les participants n’étant pas impliqués dans le
      transfert des données entre d''autres participantsNote 1 à l’article: La définition
      logique et fonctionnelle d’un bus s’applique indépendamment de la configuration
      topologique et de la mise en œuvre physique du bus. Un bus peut avoir une configuration
      linéaire ou en anneau.Note 2 à l’article: Dans certains cas, les droits de transmission
      sont distribués par un autre participant, par exemple, par un administrateur
      de bus.'
