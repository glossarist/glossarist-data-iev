  definition:
  - content: suite de sections élémentaires amplifiées sur lesquelles le signal en
      ligne et une ou plusieurs ondes pilotes de régulation de ligne sont transmis
      de bout en bout et passent en des points intermédiaires par les mêmes régulateurs
      d'amplitude
  examples: []
  id: 704-12-07
  notes:
  - content: A la fin d'une section de régulation de ligne, les ondes pilotes émises
      à l'origine sont, selon le cas, supprimées, reconstituées ou remplacées par
      de nouvelles ondes pilotes émises au niveau de référence.
