---
data:
  definition:
  - content: équipement qui intègre un ou plusieurs {{relais de protection, urn:iec:std:iec:60050-447-01-14}}
      et, si nécessaire, des éléments logiques conçus pour assurer une ou plusieurs
      fonctions de protection spécifiées
  examples:
  - content: Dispositif de protection de distance, dispositif de protection à comparaison
      de phases.
  id: 447-01-49
  notes:
  - content: 'à l''article: Un "équipement de protection" fait partie d''un {{"système
      de protection", urn:iec:std:iec:60050-448-11-04}}. Par exemple, un équipement
      de protection à comparaison de phase fait partie, à une extrémité, d''un système
      de protection à comparaison de phases.'
