  definition:
  - content: ordered pair of integers representing a rational number
  examples: []
  id: 102-02-04
  notes:
  - content: A rational number can be represented by an infinity of fractions.
  - content: For the ordered pair (stem:[p], stem:[q]), the fraction is denoted by
      stem:[p]/stem:[q] or stem:[frac(p)(q)].
  - content: In a fraction stem:[p]/stem:[q], the first element stem:[p] is called
      "numerator" and the second is called "denominator".
