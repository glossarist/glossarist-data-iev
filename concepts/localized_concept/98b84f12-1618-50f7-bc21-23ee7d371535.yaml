  definition:
  - content: 'représentation d''un système ou d''un élément comportant une ou plusieurs
      variables d''entrée et une ou plusieurs variables de sortie, symbolisé principalement
      par un rectangle dans lequel la relation fonctionnelle entre les variables d''entrée
      et de sortie est donnée VOIR: Figures 1 et 2.Note 1 à l’article: La relation
      fonctionnelle peut être donnée par une instruction arithmétique, une fonction
      de transfert, une équation différentielle ou aux différences, une courbe ou
      une famille de courbes caractéristiques ou encore par une fonction de commutation.'
