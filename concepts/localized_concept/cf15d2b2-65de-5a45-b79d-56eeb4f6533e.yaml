  definition:
  - content: fréquence de rotation d'une particule chargée de nature spécifiée décrivant,
      en présence d'un champ magnétique uniforme, une courbe en forme d'hélice autour
      des lignes de force de ce champ
  examples: []
  id: 705-06-09
  notes:
  - content: "La gyrofréquence stem:[f]~c~ est donné par l'expression:\r\nstem:[f_(\"c\")
      = frac(1)(2 pi) frac(q B)(m)]\r\noù stem:[B] est l'induction magnétique, stem:[m]
      et stem:[q] sont respectivement la masse et la charge de la particule."
