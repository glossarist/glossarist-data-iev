  definition:
  - content: quotient of the {{character mean transinformation content, urn:iec:std:iec:60050-171-07-30}}
      stem:[T]^′^ by the mean duration of a pair of input and output characters stem:[T]^*^
      &amp;equals; stem:[T]^′^/stem:[t](stem:[X],stem:[Y]) where stem:[X] &amp;equals;
      {stem:[x]~1~, …, stem:[x]~stem:[n]~} is the set of input characters stem:[x~i~]
      (stem:[i] &amp;equals; 1, …, stem:[n]), stem:[Y] &amp;equals; {stem:[y]~1~,
      …, stem:[y]~stem:[m]~} is the set of output characters stem:[y~j~] (stem:[j]
      &amp;equals; 1, …, stem:[m]) and stem:[t (X , Y) = sum_(i = 1)^(n) sum_(j =
      1)^(m) p ( x_(i) , y_(j) ) * t ( x_(i) , y_(j) )] is the mean value of the duration
      stem:[t](stem:[x~i~],stem:[y~j~]) of the pair of characters (stem:[x~i~],stem:[y~j~])
      which occurs with joint probability stem:[p](stem:[x~i~],stem:[y~j~]).
  examples: []
