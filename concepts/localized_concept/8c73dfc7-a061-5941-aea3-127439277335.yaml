  definition:
  - content: one-piece probe combining a microprobe and a signal processing circuit
  examples: []
  id: 523-04-02
  notes:
  - content: The smaller the sensitive part of the {{sensor, urn:iec:std:iec:60050-151-13-48}},
      1) the less interference with the measuring object, 2) the higher the {{signal-to-noise
      ratio, urn:iec:std:iec:60050-161-06-04}} in the measurement, and 3) the more
      small-area local data can be obtained. An integrated microprobe is a {{device,
      urn:iec:std:iec:60050-151-11-20}} consisting of a microprobe prepared by micromachining
      silicon to an ultra-microscopic needle and incorporating a signal processing
      circuit. Integrated microprobes, made by machining silicon needles to a diameter
      of from several nanometres to several micrometres and combining them with an
      impedance conversion circuit, etc., are in actual use as microscopic {{electrodes,
      urn:iec:std:iec:60050-891-01-17}} for organisms, scanning tunnelling microscopes
      (STMs), and {{atomic force microscopes, urn:iec:std:iec:60050-523-07-02}} (AFMs).
