---
data:
  definition:
  - content: 'tout {{dispositif, urn:iec:std:iec:60050-651-21-15}} extensible, articulé,
      ou les deux, composé essentiellement de composants isolants qui est principalement
      conçu et utilisé pour positionner du personnel à un potentiel électrique différent
      de celui de la terreNote 1 à l’article: Un dispositif élévateur isolant peut
      aussi être utilisé pour soutenir du matériel lorsqu’il est conçu et équipé pour
      ce faire. Note 2 à l’article: Un dispositif élévateur isolant ne comprend pas
      de châssis. Quand un dispositif élévateur isolant est monté sur un châssis mobile,
      il devient un composant d’une plate-forme élévatrice mobile de personnel (PEMP).'
