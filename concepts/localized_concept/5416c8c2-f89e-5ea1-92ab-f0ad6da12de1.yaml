  definition:
  - content: for stem:[n] given sets stem:[A_("1") ", " A_("2") , cdots , A_(n)],
      set, the elements of which are the ordered stem:[n]-tuples (stem:[a_(1) ", "
      a_(2) , cdots , a_(n)]) of elements stem:[a_(1) in A_(1) ", " a_(2) in A_(2)
      , cdots , a_(n) in A_(n)]
  examples: []
  id: 102-01-06
  notes:
  - content: The Cartesian product of sets stem:[A_(1) ", " A_(2) , cdots , A_(n)]
      is denoted by stem:[A_(1) xx " " A_(2) xx cdots xx A_(n)]. The Cartesian product
      of the set stem:[A] by itself stem:[n] times is denoted by stem:[A^n^].
