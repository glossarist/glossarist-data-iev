data:
  definition:
  - content: "défaillance due à une détérioration cumulative provoquée par les contraintes
      imposées en cours d’utilisation\r\nNote 1 à l’article: En règle générale, la
      probabilité d’occurrence d’une défaillance par usure augmente avec le temps
      cumulé de fonctionnement, le nombre de fonctionnements ou les contrainte appliquées.
      Note 2 à l’article: Dans certains cas, la distinction entre les phénomènes d’usure
      et de vieillissement peut s’avérer difficile."
