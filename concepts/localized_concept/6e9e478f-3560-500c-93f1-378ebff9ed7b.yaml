  definition:
  - content: "énergie communiquée par un rayonnement ionisant à un volume donné de
      matière, égale à: \r\nstem:[epsilon = sum epsilon_(\"in\") - sum epsilon_(\"ex\")
      + sum Q]\r\noù Σstem:[ε]~in~ est la somme des énergies, à l'exclusion des énergies
      au repos, de toutes les particules directement et indirectement ionisantes ayant
      pénétré dans le volume; Σstem:[ε]~ex~ est la somme des énergies, à l'exclusion
      des énergies au repos, de toutes les particules directement ou indirectement
      ionisantes ayant quitté le volume; Σstem:[Q] est la somme de toutes les énergies
      \ développées dans les réactions nucléaires, transformations et interactions
      entre particules élémentaires qui ont eu lieu dans ce volume"
