---
data:
  definition:
  - content: diagramme de chromaticité uniforme obtenu en portant en coordonnées rectangulaires
      les grandeurs stem:[u]' et stem:[v]' définies par les équations:* u′ = 4 X /
      (X + 15Y + 3Z) = 4x / (−2x + 12y + 3) * v′ = 9 Y / (X + 15Y + 3Z) = 9y / (−2x
      +12y + 3) où stem:[X], stem:[Y], stem:[Z] sont les {{composantes trichromatiques,
      urn:iec:std:iec:60050-845-23-038}} dans les systèmes de référence colorimétriques
      CIE 1931 ou 1964, et stem:[x], stem:[y] les coordonnées trichromatiques correspondantes
      du stimulus de couleur pris en considération
  examples: []
  id: 845-23-073
  notes:
  - content: 'Le diagramme de chromaticité uniforme CIE 1976 modifie et remplace le
      diagramme de chromaticité uniforme CIE 1960 dans lequel les grandeurs stem:[v]
      et stem:[u] étaient portées en coordonnées rectangulaires. Les relations entre
      les deux paires de coordonnées sont les suivantes: stem:[u]′ = stem:[u]; stem:[v]′ =
      1,5 stem:[v].'
  - content: Cet article était numéroté 845-03-53 dans l'IEC 60050-845:1987.
