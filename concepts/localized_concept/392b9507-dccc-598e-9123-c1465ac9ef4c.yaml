  definition:
  - content: temps stem:[(T_(frac(1)(2)))] au cours duquel, dans un processus unique
      de décroissance radioactive, l'activité d'un radionucléide déterminé est réduite
      à la moitié de sa valeur initiale
  examples: []
  id: 881-04-46
  notes:
  - content: "La période radioactive est liée à la constante de désintégration par
      la relation:\r\nstem:[T_(frac(1)(2)) = frac(ln2)(lambda) \"P{simeq}\" frac(0,693)(lambda)]\n\nstem:[λ]
      = constante de désintégration"
