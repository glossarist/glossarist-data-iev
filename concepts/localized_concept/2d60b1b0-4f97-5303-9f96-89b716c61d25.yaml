  definition:
  - content: 'sens du chemin de l''action au sein d''un schéma fonctionnelNote 1 à
      l’article: Dans un bloc fonctionnel, le sens de l''action va de l''entrée du
      bloc à la sortie du bloc; pour une ligne d''action, le sens de l''action est
      indiqué par une flèche (voir Figures 1 et 2).Note 2 à l’article: Le sens de
      l''action n''est pas nécessairement le même que celui de la circulation de la
      masse ou de l''énergie.'
