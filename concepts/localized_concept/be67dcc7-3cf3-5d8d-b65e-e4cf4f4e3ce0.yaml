  - content: entity belonging to a given set
  examples: []
  id: 102-01-03
  notes:
  - content: The notation stem:[x] ∈ stem:[A] expresses that the entity stem:[x] is
      an element of the set stem:[A]. The notation stem:[x] ∉ stem:[A] expresses that
      the entity stem:[x] is not an element of the set stem:[A]. Another wording is
      "stem:[x] belongs to stem:[A]" or "stem:[x] does not belong to stem:[A]".
