data:
  definition:
  - content: "limite, si elle existe, du quotient par Δstem:[t] de l’espérance mathématique
      du nombre de défaillances d’une entité réparable pendant l’intervalle de temps
      (stem:[t], stem:[t] + Δstem:[t]), lorsque Δstem:[t] tend vers zéro \r\nstem:[z
      ( t ) = underset(\"Delta\" t vec 0 +)(\"lim\") frac(E &amp;lsqb; N ( t + \"Delta\"
      t ) - N ( t ) &amp;rsqb;)(\"Delta\" t)]\r\noù stem:[N](stem:[t]) est le nombre
      de défaillances dans l’intervalle de temps (0, stem:[t]), et où stem:[E] désigne
      l’espérance mathématique.\r\nNote 1 à l’article: D’autres termes sont utilisés
      pour désigner l’intensité instantanée de défaillance: «taux d’occurrence des
      défaillances» et «fréquence de défaillance»."
