  definition:
  - content: quantity which is not the subject of the measurement and whose change
      affects the relationship between the indication and the result of the measurement
  examples: []
  id: 311-06-01
  notes:
  - content: This term is used in the "uncertainty" approach.
  - content: Influence quantities can originate from the measured system, the measuring
      equipment or the environment.
  - content: As the calibration diagram depends on the influence quantities, in order
      to assign the result of a measurement it is necessary to know whether the relevant
      influence quantities lie within the specified range.
