data:
  definition:
  - content: système de coordonnées utilisé couramment dans la photométrie des luminaires
      dans laquelle les plans C sont des demi-plans qui tournent autour de la verticale
      par le centre photométrique du luminaire, et les angles γ sont mesurés jusqu'à
      180° par rapport à la direction de la perpendiculaire à l'axe de rotation des
      plans C
  examples: []
  id: 845-25-090
  notes:
  - content: Il existe également d'autres systèmes de coordonnées &lsqb;système de
      coordonnées (A, α) et système de coordonnées (B, β)&rsqb;. Voir CIE 121, _The
      Photometry and Goniophotometry of Luminaires_.
