  definition:
  - content: document that provides rules, guidelines or characteristics for activities
      or their results
  examples: []
  id: 901-02-01
  notes:
  - content: The term “normative document” is a generic term that covers such documents
      as {{standard, urn:iec:std:iec:60050-901-02-02}}s, {{technical specification,
      urn:iec:std:iec:60050-901-02-08}}s, {{codes of practice, urn:iec:std:iec:60050-901-02-09}}
      and {{regulation, urn:iec:std:iec:60050-901-02-10}}s.
  - content: A “document” is to be understood as any medium with information recorded
      on or in it.
  - content: The terms for different kinds of normative documents are defined considering
      the document and its content as a single entity.
