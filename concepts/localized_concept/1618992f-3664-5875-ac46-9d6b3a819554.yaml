  definition:
  - content: process by which the spatial distribution of a beam of radiation is changed
      when it is deviated in many directions by a surface or by a medium, without
      change in {{frequency, urn:iec:std:iec:60050-103-06-02}} of its monochromatic
      components
  examples: []
  id: 845-24-049
  notes:
  - content: A distinction is made between {{selective scattering, urn:iec:std:iec:60050-845-24-050}}
      and {{non-selective scattering, urn:iec:std:iec:60050-845-24-051}} according
      to whether or not the scattering properties vary with the wavelength of the
      incident radiation.
  - content: The frequency is unchanged only if there is no Doppler effect due to
      the motion of the materials from which the radiation is returned.
  - content: This entry was numbered 845-04-44 in IEC 60050-845:1987.
