  definition:
  - content: quantité indivisible de rayonnement électromagnétique, celui-ci ne variant
      que d’une manière discrète à raison d’une ou plusieurs fois cette quantité,
      qui est considérée comme une particule d’énergie stem:[h]stem:[ν], où stem:[h]
      est la constante de Planck et stem:[ν] la fréquence du rayonnement
  examples: []
  id: 113-05-14
  notes:
  - content: Un photon est une particule élémentaire dont le nombre quantique de spin
      est 1 et dont la masse au repos est nulle.
  - content: Les photons sont les particules médiatrices de l’interaction électromagnétique.
