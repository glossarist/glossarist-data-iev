  definition:
  - content: rapport de la puissance disponible aux bornes d'une antenne de réception,
      à la puissance surfacique d'une onde plane incidente de direction de propagation
      et de polarisation données
  examples: []
  id: 712-02-46
  notes:
  - content: Si aucune direction n'est spécifiée, on considère celle qui correspond
      au maximum de puissance disponible.
  - content: "En espace libre, pour une polarisation et une direction de propagation
      données, l'aire équivalente partielle stem:[A]~ep~ d'une antenne utilisée à
      la réception est liée au gain isotrope partiel stem:[G]~p~ de la même antenne
      utilisée à l'émission par la relation:\r\nstem:[G_(\"p\") = frac(4 pi A_(\"ep\"))(lambda^(2))]\r\noù
      stem:[λ] est la longueur d'onde."
