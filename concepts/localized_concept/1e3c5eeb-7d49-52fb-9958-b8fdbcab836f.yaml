  definition:
  - content: area associated with a transmitting station for a given radiocommunication
      service, within which reception or the operation of radiocommunication links
      is protected against interference by agreements in accordance with regulations
  examples: []
  id: 713-02-18
  notes:
  - content: The term “service area” is sometimes used instead of the terms “coverage
      area” or “capture area” to express that, within this area, a radiocommunication
      service is provided with a given quality of service. This use is deprecated.
