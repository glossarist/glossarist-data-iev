  definition:
  - content: affaiblissement de transmission habituellement exprimé en décibels qui
      serait obtenu si les antennes étaient remplacées par des antennes isotropes
      placées dans un milieu diélectrique parfait, homogène, isotrope et illimité,
      la distance entre les antennes étant conservée
  examples: []
  id: 705-08-05
  notes:
  - content: "Si la distance d entre les antennes est beaucoup plus grande que la
      longueur d'onde stem:[λ], l'affaiblissement d'espace libre est égal, en décibels,
      à:\r\nstem:[A_(0) = 20 log (frac(4 pi d)(lambda))]"
