  definition:
  - content: ensemble des règles qui régissent l'établissement des chaînes de connexion
      dans un réseau à commutation de circuits
  examples: []
  id: 715-09-03
  notes:
  - content: "Ces règles définissent notamment: \r\n- la catégorie de chaque commutateur,\r\n-
      les faisceaux de circuits reliant deux commutateurs, et les faisceaux de lignes
      de rattachement,\r\n- au moins un chemin possible pour chaque communication,
      entre les points terminaux mis en jeu."
