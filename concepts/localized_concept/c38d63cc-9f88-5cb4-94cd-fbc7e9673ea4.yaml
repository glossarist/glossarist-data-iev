  definition:
  - content: for a non-zero complex number stem:[c], the real number stem:[φ] restricted
      to stem:[- pi lt phi le pi], such that stem:[c = |c| e^(rm(j) phi)]
  examples: []
  id: 102-02-17
  notes:
  - content: |-
      The argument stem:[arg " " c] of the complex number stem:[c = a + rm(j) b = |c| e^(rm(j) phi)] is equal to:
       if stem:[b ge 0] and  if stem:[b lt 0], where stem:[0 le arccos" " x le pi].
      It is not defined if stem:[a = b = 0].
  - content: The concept of argument may be applied to complex scalar quantities.
