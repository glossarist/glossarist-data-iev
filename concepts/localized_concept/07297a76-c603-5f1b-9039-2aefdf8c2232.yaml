data:
  definition:
  - content: nombre complexe déduit d'un nombre complexe donné en remplaçant la partie
      imaginaire par son opposée
  examples: []
  id: 102-02-14
  notes:
  - content: Le conjugué du nombre complexe stem:[c = a + rm(j) b = |c| e^(rm(j) phi)]
      est stem:[c * = a - rm(j) b = |c| e^(- rm(j) phi)]. En mathématiques, le conjugué
      de stem:[c] est souvent noté stem:[bar(c)].
  - content: Le concept de conjugué peut s'appliquer aux grandeurs scalaires, vectorielles
      ou tensorielles complexes et aux matrices d'éléments complexes.
