  definition:
  - content: "unité fonctionnelle avec deux entrées ou plus et une seule sortie, dont
      la variable de sortie a pour valeur le produit des valeurs des variables d'entrée
      multipliées par des facteurs de pondérationstem:[v (t) = K_(0) * K_(1) * u_(1)
      (t) * K_(2) * u_(2) (t) * K_(3) * u_(3) (t) * ...]où<table>\r\n<tr>\n<td>stem:[t]</td>\n<td>est
      le temps;</td>\n</tr>\r\n<tr>\n<td>\nstem:[K]~0~, stem:[K]~1~ ...</td>\n<td>sont
      les facteurs de pondération;</td>\n</tr>\r\n<tr>\n<td>\nstem:[u]~1~, stem:[u]~2~
      ...</td>\n<td>sont les variables d’entrée;</td>\n</tr>\r\n<tr>\n<td>stem:[v]</td>\n<td>est
      le résultat de multiplication.</td>\n</tr>\r\n</table>"
