  definition:
  - content: grandeur vectorielle égale à l'intégrale de la force *stem:[F]* par rapport
      au temps stem:[t], soit stem:[I = int_(t_(1))^(t_(2)) F "d" t] étendue à l’intervalle
      de temps &amp;lsqb;stem:[t]~1~, stem:[t]~2~&amp;rsqb;
  examples: []
  id: 113-03-20
  notes:
  - content: Pour un intervalle de temps &lsqb;stem:[t]~1~, stem:[t]~2~&rsqb;, l'impulsion
      est égale à la variation de la quantité de mouvement *stem:[p]*, soit *stem:[I]*
      = *stem:[p]*(stem:[t]~2~) − *stem:[p]*(stem:[t]~1~) = Δ *stem:[p]*.
  - content: En français, le terme «impulsion» a aussi un autre sens correspondant
      à l'anglais «pulse».
  - content: L'unité SI cohérente d’impulsion est le newton seconde, N&sdot;s.
