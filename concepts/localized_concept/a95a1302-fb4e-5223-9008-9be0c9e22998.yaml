  definition:
  - content: 'élément d''un diagramme fonctionnel qui participe à la définition de
      l''état du système à un instant donné, cet élément pouvant alors être soit actif
      ou inactifNote 1 à l’article: Les étapes sont séparées par des transitions.Note
      2 à l’article: L''ensemble des étapes actives définit l’état du système considéré.Note
      3 à l’article: Des ordres ou des actions peuvent être associés à chaque étape.
      Une étape ne peut activer un ordre que si elle est active.'
