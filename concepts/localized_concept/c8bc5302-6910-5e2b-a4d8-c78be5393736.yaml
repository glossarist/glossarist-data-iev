  - content: 'élément dont la variable de sortie peut prendre toutes les valeurs dans
      un ensemble de valeurs discrètesNote 1 à l’article: La variation de la variable
      de sortie peut se produire à une paire de valeurs de commutation qui est à des
      valeurs différentes de la variable d’entrée en fonction de la direction de la
      variation; la différence de ces valeurs est appelée recouvrement (voir 351-50-25).'
