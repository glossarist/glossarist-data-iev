---
data:
  definition:
  - content: pour un champ vectoriel *stem:[U]* qui est donné en tout point d’un domaine
      tridimensionnel V délimité par une surface fermée S orientée vers l’extérieur,
      théorème énonçant que l’intégrale de volume étendue à V de la divergence du
      champ *stem:[U]* est égale au flux de ce champ à travers la surface S stem:["P{iiint}"_("V")
      rm(div) " " U rm(d) V = "P{oiint}"_("S") U * e_("n") rm(d) A] où dstem:[V] est
      l’élément de volume et *stem:[e]*~n~dstem:[A] est l'élément vectoriel de surface
  examples: []
  id: 102-05-30
  notes:
  - content: Le théorème de la divergence peut être généralisé à l'espace euclidien
      à stem:[n] dimensions.
  - content: En électrostatique, le théorème de la divergence est appliqué pour exprimer
      que le flux électrique sortant d'une surface fermée est égal à la charge électrique
      totale contenue dans le domaine délimité par la surface. Il est alors appelé
      «théorème de Gauss».
