  id: 721-14-04
  notes:
  - content: Dans le cas de la phototélégraphie, la tache d'exploration est la partie
      du support d'enregistrement photosensible qui, à un instant donné, est soumise
      à l'exposition.
  - content: Dans le cas de l'enregistrement direct, la tache d'exploration est la
      partie de la surface du support d'enregistrement sur laquelle se fait le contact
      avec l'organe explorateur.
