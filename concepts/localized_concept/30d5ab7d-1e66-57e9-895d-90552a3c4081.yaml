  definition:
  - content: flat conductive surface that is at the same {{electric potential, urn:iec:std:iec:60050-121-11-25}}  as
      {{reference ground, urn:iec:std:iec:60050-195-01-01}}, which is used as a common
      reference, and which contributes to a reproducible parasitic capacitance with
      the surroundings of the equipment under test (EUT)
  examples: []
  id: 161-04-36
  notes:
  - content: A reference-ground plane is needed for the measurements of {{conducted
      disturbances, urn:iec:std:iec:60050-161-03-27}}, and serves as reference for
      the measurement of unsymmetrical and asymmetrical {{disturbance voltages, urn:iec:std:iec:60050-161-04-01}}.
  - content: In some regions, the term ‘earth’ is used in place of ‘ground’.
