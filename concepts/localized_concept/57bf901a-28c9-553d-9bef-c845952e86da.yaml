  definition:
  - content: unité de mesure d'une grandeur dérivée
  examples: []
  id: 112-01-19
  notes:
  - content: Certaines unités dérivées dans le SI ont des noms spéciaux, par exemple
      le hertz pour la fréquence et le joule pour l'énergie, tandis que d'autres ont
      des noms composés, par exemple le mètre par seconde pour la vitesse. Les unités
      ayant des noms spéciaux sont aussi utilisées dans des noms composés, par exemple
      le volt par mètre pour le champ électrique et le newton mètre pour le moment
      de torsion. Voir en particulier l'ISO 31 et l'ISO/CEI 80000.
  - content: On peut aussi exprimer les unités dérivées en utilisant des multiples
      et des sous-multiples. Par exemple, le mètre par seconde, symbole m/s, et le
      centimètre par seconde, symbole cm/s, sont des unités dérivées de vitesse dans
      le SI. Le kilomètre par heure, symbole km/h, est une unité de vitesse en dehors
      du SI mais en usage avec le SI, parce que l'heure est une unité en usage avec
      le SI. Le nœud, égal à un mille marin par heure, est une unité de vitesse en
      dehors du SI, qui répond aux besoins spécifiques de certains groupes d’utilisateurs.
