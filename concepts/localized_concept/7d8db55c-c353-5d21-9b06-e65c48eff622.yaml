---
data:
  definition:
  - content: 'utilisation conforme aux informations fournies avec un produit ou un
      système ou, en l’absence de telles informations, conforme aux profils d’utilisation
      généralement entendusNote 1 à l’article: Il convient de ne pas confondre utilisation
      prévue et {{utilisation normale, urn:iec:std:iec:60050-871-04-22}}. Alors que
      les deux termes intègrent la notion d’utilisation prévue par le fabricant, l’utilisation
      prévue cible le but, tandis que l’utilisation normale comprend non seulement
      le but, mais également le transport et le stockage.'
