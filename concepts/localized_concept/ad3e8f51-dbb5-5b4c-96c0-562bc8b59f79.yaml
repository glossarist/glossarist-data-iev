  definition:
  - content: "for a magnetic core of given geometry, divided into a series of longitudinal
      elements of constant cross-section, the sum of the quotients of the lengths
      stem:[l] of the elements measured along the assumed mean magnetic path and the
      square of the corresponding cross-sectional areas stem:[A]\r\nstem:[C_(2) =
      sum frac(l)(A^(2))]"
