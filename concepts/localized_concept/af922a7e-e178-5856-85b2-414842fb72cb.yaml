  definition:
  - content: state of being able to perform as required
  examples: []
  id: 192-02-01
  notes:
  - content: The absence of necessary external resources may prevent operation, but
      do not affect the up state. See externally disabled state ({{192-02-23, urn:iec:std:iec:60050-192-02-23}}).
  - content: Up state relates to the availability of the item.
  - content: An item may be considered to be in an up state for some functions and
      in a down state for others, concurrently.
  - content: The adjectives "up" and “available” designate an item in an up state.
