data:
  definition:
  - content: 'température, mesurée sur le boîtier, à laquelle certaines mesures sont
      faitesNote 1 à l’article: Pour les résonateurs à température contrôlée, la température
      de référence est le point médian de la plage de températures contrôlées. Pour
      les résonateurs à température non contrôlée, la température de référence est
      en principe de 25 °C ± 2 °C.'
