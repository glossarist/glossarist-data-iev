  definition:
  - content: "{{dispositif IdO, urn:iec:std:iec:60050-741-02-04}} qui mesure des propriétés
      d'une ou plusieurs {{entités physiques, urn:iec:std:iec:60050-741-01-26}} et
      qui génére en sortie des données numériques qui peuvent être transmises par
      l'intermédiaire d'un {{réseau, urn:iec:std:iec:60050-741-01-25}}"
  examples: []
