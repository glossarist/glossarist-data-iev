---
data:
  definition:
  - content: interaction, dans un dispositif ou dans un milieu de transmission {{non
      linéaire, urn:iec:std:iec:60050-131-11-19}}, entre les {{composantes spectrales,
      urn:iec:std:iec:60050-702-04-41}} d'un ou plusieurs signaux {{d'entrée, urn:iec:std:iec:60050-151-15-13}},
      faisant apparaître à la sortie de nouvelles composantes spectrales dont les
      fréquences sont des combinaisons linéaires à coefficients entiers des fréquences
      des composantes spectrales à l'entrée
  examples: []
  id: 161-06-20
  notes:
  - content: L'intermodulation peut se produire avec un seul signal d'entrée non sinusoïdal
      ou avec plusieurs signaux, sinusoïdaux ou non, appliqués à la même entrée ou
      à des entrées différentes.
