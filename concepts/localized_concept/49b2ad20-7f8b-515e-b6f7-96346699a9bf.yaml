---
data:
  definition:
  - content: "dépôt d'une couche formée à une vitesse de gravure très faible à une
      profondeur contrôlée qui termine efficacement le procédé de gravure\r\nNote
      1 à l’article: L'arrêt de gravure est parfois utilisé comme la couche de fin
      du procédé de gravure. Il existe deux grands types de méthodes d'arrêt de gravure
      utilisés en micro-usinage: l'arrêt de gravure au dopant et l'arrêt de gravure
      électrochimique."
