  - content: 'durée de l’intervalle de temps pendant lequel une entité est dans un
      état d’indisponibilitéNote 1 à l’article: Le temps d’indisponibilité exclut
      le temps d’incapacité dû au manque de ressources externes, mais inclut le temps
      de maintenance. Note 2 à l’article: Cet article portait le numéro 603-05-18
      dans l’IEC 60050-603:1986.'
