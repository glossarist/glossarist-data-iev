  - content: "entre deux bornes A et B, grandeur stem:[u]~AB~ égale à la différence
      des potentiels électriques stem:[v]~A~ en A et stem:[v]~B~ en B: \r\nstem:[u]~AB~
      = stem:[v]~A~ – stem:[v]~B~"
  examples: []
  id: 131-11-56
  notes:
