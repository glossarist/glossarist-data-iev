  definition:
  - content: "the relative permeability obtained from the total change in magnetic
      flux density and the corresponding change in the magnetic field strength when
      either quantity is alternating with an arbitrary waveform between stated limits:\r\nstem:[mu_(\"p\")
      = frac(1)(mu_(0)) frac(Delta B)(Delta H)]"
  examples: []
  id: 221-03-11
  notes:
  - content: The value of the pulse permeability depends strongly on the limits of
      the flux density or field strength excursions; these limits need not be symmetrical
      with respect to zero.
  - content: Often pulse permeability refers to the special case of rectangular voltage
      pulses being applied to an exciting winding, the flux density waveform is then
      approximately triangular provided saturation is not approached.
  terms:
  - type: expression
    normative_status: preferred
    designation: pulse permeability
  - type: symbol
    designation: stem:[μ]~p~
