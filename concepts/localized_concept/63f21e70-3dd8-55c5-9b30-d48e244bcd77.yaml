data:
  definition:
  - content: "reprise sur erreur dans laquelle un système, un programme, une base
      de données ou une autre ressource du système est rétabli dans un nouvel état
      non occupé antérieurement lui permettant d’accomplir les fonctions requises\r\nNote
      1 à l’article: La reprise sur erreur par progression est utilisée dans un logiciel
      d’exploitation."
