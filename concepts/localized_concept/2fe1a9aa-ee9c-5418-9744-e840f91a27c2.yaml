  definition:
  - content: voltage between the two terminals of a phase element
  examples: []
  id: 141-02-12
  notes:
  - content: For star connection of a polyphase element which is connected to line
      conductors and to a neutral conductor, the phase-element voltages are equal
      to the line-to-neutral voltages.
  - content: For polygonal connection of a polyphase element which is connected to
      line conductors, the phase-element voltages are equal to the line-to-line voltages.
