  definition:
  - content: perturbation électromagnétique dont l’effet sur un dispositif ou un appareil
      donné peut être décomposé en une suite d’effets distincts
  examples: []
  id: 161-02-28
  notes:
  - content: Il est reconnu que cette définition ne caractérise pas la perturbation
      indépendamment de l'effet qu'elle produit. En pratique, il convient de pouvoir
      rapporter toute mesure d'une perturbation à son effet sur un dispositif susceptible.
