  definition:
  - content: non-SI unit for conventional retinal illuminance and natural pupil luminance
  examples: []
  id: 845-22-038
  notes:
  - content: When the eye is viewing a surface of uniform luminance, the numerical
      value of the conventional retinal illuminance or the natural pupil luminance,
      expressed in troland, is equal to the product of the area in square millimetres
      of the limiting pupil, natural or artificial, by the luminance of the surface
      in candela per square metre.
  - content: This entry was numbered 845-02-16 in IEC 60050-845:1987.
