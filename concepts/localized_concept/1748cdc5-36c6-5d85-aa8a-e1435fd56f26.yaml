  definition:
  - content: a removable part of an assembly that can be moved to one or more positions
      in which an isolating distance or a segregation between open contacts is established
      while the part remains mechanically attached to the assembly
  examples: []
  id: 441-13-09
  notes:
  - content: The isolating distance or the segregation always relates to the main
      circuit. It may or may not refer to the auxiliary circuits or to control circuits.
