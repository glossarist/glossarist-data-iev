  definition:
  - content: 'at a given point of a body, tensor quantity stem:[vec(vec(tau))] characterizing
      the relation between the force d*stem:[F]* acting on a surface element containing
      that point with the area dstem:[A] of the element: stem:[d F = vec(vec(tau))
      * e " " rm(d) A], where *stem:[e]* dstem:[A] is the vector surface element'
  examples: []
  id: 113-03-62
  notes:
  - content: If d*stem:[F]* and *stem:[e]* dstem:[A] are parallel, stress may be described
      by a scalar.
  - content: The coherent SI unit of stress is pascal, Pa.
