  definition:
  - content: "{{SI, urn:iec:std:iec:60050-112-02-02}} {{unit, urn:iec:std:iec:60050-112-01-14}}
      of {{thermodynamic temperature, urn:iec:std:iec:60050-113-04-14}}, taking the
      fixed numerical value of the {{Boltzmann constant, urn:iec:std:iec:60050-113-02-17}}
      stem:[k] to be 1,380 649 × 10^−23^ when expressed in the unit J/K, which is
      equal to kg m^2^ s^−2^ K^−1^, where the {{kilogram, urn:iec:std:iec:60050-112-02-06}},
      {{metre, urn:iec:std:iec:60050-112-02-05}} and {{second, urn:iec:std:iec:60050-112-02-04}}
      are defined in terms of stem:[h], stem:[c] and stem:[ν]~Cs~"
  examples: []
  id: 112-02-08
  notes:
  - content: 'The definition in the SI Brochure is: "The kelvin, symbol K, is the
      SI unit of thermodynamic temperature. It is defined by taking the fixed numerical
      value of the Boltzmann constant stem:[k] to be 1,380 649 × 10^−23^  when expressed
      in the unit J K^−1^, which is equal to kg m^2^ s^−2^ K^−1^, where the {{kilogram,
      urn:iec:std:iec:60050-112-02-06}}, {{metre, urn:iec:std:iec:60050-112-02-05}}
      and {{second, urn:iec:std:iec:60050-112-02-04}} are defined in terms of stem:[h],
      stem:[c] and Δstem:[ν]~Cs~."'
  - content: For 1 {{mol, urn:iec:std:iec:60050-112-02-09}} of an ideal gas, the {{internal
      energy, urn:iec:std:iec:60050-113-04-20}} is stem:[U] = (3/2)stem:[k]stem:[T]stem:[N]~A~,
      where stem:[k] is the Boltzmann constant, stem:[T] is the thermodynamic temperature,
      and stem:[N]~A~ is the {{Avogadro constant, urn:iec:std:iec:60050-113-02-08}}.
  - content: 'The definition of the kelvin in IEV 112-02-08:2010-01 was: “SI unit
      of thermodynamic temperature, equal to the fraction 1/273,16 of the thermodynamic
      temperature of the triple point of water”.'
  - content: 'The kelvin is one of the seven SI {{base units, urn:iec:std:iec:60050-112-01-18}}:
      {{second, urn:iec:std:iec:60050-112-02-04}} (s), {{metre, urn:iec:std:iec:60050-112-02-05}}
      (m), {{kilogram, urn:iec:std:iec:60050-112-02-06}} (kg), {{ampere, urn:iec:std:iec:60050-112-02-08}}
      (A), kelvin (K), {{mole, urn:iec:std:iec:60050-112-02-09}} (mol) and {{candela,
      urn:iec:std:iec:60050-112-02-10}} (cd).'
