  definition:
  - content: "the quotient of stem:[E] by stem:[bar(N)], where stem:[bar(N)] is the
      mean number of ion pairs formed when the initial kinetic energy stem:[E] of
      a charged particle is completely dissipated in the gas\r\nstem:[W = frac(E)(bar(N))]"
  examples: []
  id: 881-12-46
  notes:
  - content: The ions produced by the bremsstrahlung emitted by the charged particle
      must be counted in stem:[bar(N)].
  terms:
  - type: expression
    normative_status: preferred
    designation: mean energy expended in a gas per ion pair formed
  - designation: stem:[W]
