---
data:
  definition:
  - content: processus par lequel un {{émetteur radioélectrique, urn:iec:std:iec:60050-713-08-01}}
      produit de l'{{énergie, urn:iec:std:iec:60050-113-03-45}} radioélectrique pour
      assurer une {{radiocommunication, urn:iec:std:iec:60050-701-01-31}}
  examples: []
  id: 702-02-05
  notes:
  - content: En radiocommunication, il convient de ne pas employer le terme "émission"
      dans le sens plus général d"'{{émission, urn:iec:std:iec:60050-702-02-03}} radioélectrique".
      Par exemple, la partie de l'{{énergie électromagnétique, urn:iec:std:iec:60050-121-11-64}}
      produite par un {{oscillateur local, urn:iec:std:iec:60050-713-10-06}} qui est
      transférée vers l'espace extérieur ne constitue pas une émission mais un {{rayonnement,
      urn:iec:std:iec:60050-702-02-06}}.
  - content: Le terme "émission" désigne également la production d'ondes et de signaux
      (voir {{IEV 161-01-09, urn:iec:std:iec:60050-161-01-09}}) en radiocommunication,
      les signaux ou ondes radioélectriques produits par un émetteur de radiodiffusion
      (voir {{IEV 723-01-03, urn:iec:std:iec:60050-723-01-03}}), un rejet dans l'environnement
      (voir {{IEV 904-01-11, urn:iec:std:iec:60050-904-01-11}}), et est employé en
      tant que synonyme du terme "{{programme, urn:iec:std:iec:60050-723-01-02}}"
      en radiodiffusion et en télédistribution.
  - content: Le terme français "{{émission, urn:iec:std:iec:60050-702-02-04}}" s'applique
      également au concept représenté par le terme anglais "{{sending, urn:iec:std:iec:60050-702-02-04}}".
  terms:
