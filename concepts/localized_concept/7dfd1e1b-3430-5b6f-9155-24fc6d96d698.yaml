  definition:
  - content: unit of measurement obtained by multiplying a given unit of measurement
      by a number greater than one
  examples: []
  id: 112-01-24
  notes:
  - content: The kilometre (km) is a decimal multiple of the metre (m). The hour (h)
      is a non-decimal integer multiple of the second (s). The light year is a non-integer
      multiple of the metre (in the VIM, only integer multiples are considered).
  - content: Multiples of a unit are often named by adding a unit prefix to the name
      of the unit.
