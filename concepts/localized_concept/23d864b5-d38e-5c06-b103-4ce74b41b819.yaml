  definition:
  - content: dimension perpendiculairement à une ligne d'exploration, du plus petit
      détail d'image discernable produit par le signal le plus court susceptible d'actionner
      un récepteur de télécopie dans des conditions spécifiées
  examples: []
  id: 721-14-14
  notes:
  - content: En phototélégraphie, les dimensions longitudinale et transversale du
