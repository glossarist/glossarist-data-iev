  definition:
  - content: 'système de commutation comportant une chaîne d’action fermée, contenant
      au moins un élément de mémoire binaire, de sorte qu’en commençant par une commande
      de démarrage, une variable réglante constante influe sur le système commandé
      pour réduire la valeur absolue de la différence (stem:[w]−stem:[x]) jusqu’à
      ce que la valeur de la variable commandée stem:[x] atteigne la valeur de la
      variable de référence stem:[w] pour la première foisVOIR: Figure 12.Note 1 à
      l’article: Un circuit de réarmement a une action ouverte, bien que la structure
      ait une chaîne d''action fermée (voir Figure 12).'
