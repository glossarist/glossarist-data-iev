  definition:
  - content: "a dimensionless complex scalar quantity stem:[<u>n</u>], characteristic
      of a medium at a given point and in a given direction, when there can exist
      in the medium a sinusoidal electromagnetic wave whose wave vector stem:[vec(underline(K))]
      has colinear real and imaginary parts stem:[vec(K^(prime))] and stem:[vec(K^(dprime))],
      in the given direction; this quantity is defined by the equation:\r\nstem:[vec(underline(K))
      = vec(K^(prime)) + rm(j) vec(K^(dprime)) = underline(n) frac(omega)(c_(0)) vec(u)]\n\nwhere
      stem:[ω] is the angular frequency, stem:[c]~0~ is the velocity of propagation
      of electromagnetic waves in vacuum and stem:[vec(u)] is the unit vector in the
      given direction"
  examples: []
  id: 705-03-20
  notes:
  - content: For an isotropic medium, the complex refractive index is the square root
      of the product of the relative complex permittivity and the relative complex
      permeability.
  - content: For each direction in an anisotropic medium, there are generally two
      distinct wave vectors and two values of the complex refractive index.
  terms:
  - type: expression
    normative_status: preferred
    designation: complex refractive index (in a given direction)
