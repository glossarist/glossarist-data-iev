  definition:
  - content: random noise caused by the surface irregularity or granular nature of
      a medium through which an electric current flows
  examples: []
  id: 702-08-47
  notes:
  - content: 'Examples of irregular or granular media are: a junction between semiconductors,
      an oxide coated cathode and a granular resistor.'
  - content: Flicker noise has a continuous spectrum and its power spectral density
      is important only at very low frequencies where it approximates to 1/stem:[f]
      noise.
