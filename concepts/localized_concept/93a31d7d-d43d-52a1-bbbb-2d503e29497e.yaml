data:
  definition:
  - content: "rapport du produit de la molalité stem:[b] d’un ion et d’un facteur
      de correction stem:[γ] à la molalité stem:[b]° du même ion dans une solution
      de référence dans des conditions normalisées\r\nstem:[a] = stem:[bγ] / stem:[b]°
      \ Note 1 à l’article: Le facteur de correction, appelé facteur d’activité, est
      déterminé expérimentalement. Note 2 à l’article: Une solution de référence est
      généralement une solution de l’ion ayant une molalité de 1 mol/kg (exactement).
      Les conditions normalisées sont généralement 1 013,25 hPa et 25 °C. Note 3 à
      l’article: Cet article était numéroté 111-15-26 dans la CEI 60050-111:1996.
      Il a été modifié."
