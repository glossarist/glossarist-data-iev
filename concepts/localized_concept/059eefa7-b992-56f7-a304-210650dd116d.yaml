  definition:
  - content: for a uniformly magnetized body, the ratio of the self-demagnetizing
      field strength to the magnetization
  examples: []
  id: 221-04-04
  notes:
  - content: If the magnetization is not uniform, an average value may be assigned
      to the demagnetization factor provided the conditions are stated.
  - content: In permanent magnet technology, a demagnetization factor is sometimes
      used to represent the slope of the load line.
