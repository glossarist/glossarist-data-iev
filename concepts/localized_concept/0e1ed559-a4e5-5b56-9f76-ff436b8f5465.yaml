data:
  definition:
  - content: chambre d’ionisation comportant des électrodes planes et une électrode
      intermédiaire supplémentaire, appelée grille de Frisch, qui est portée à un
      potentiel intermédiaire, en vue de réduire l’influence des ions et augmenter
      l’efficacité
  examples: []
  id: 395-03-09
  notes:
  - content: Une chambre d’ionisation à grille est une chambre d’ionisation à impulsions
      généralement utilisée pour mesurer l’énergie des particules alpha ou des fragments
      de fission.
