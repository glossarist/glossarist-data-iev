  definition:
  - content: unplanned sudden change in {{electric power system, urn:iec:std:iec:60050-692-01-02}}
      operating condition that causes widespread power quality problems or {{interruptions,
      urn:iec:std:iec:60050-692-04-01}}
  examples: []
  id: 692-01-10
  notes:
  - content: A system disturbance can be initiated by a {{fault, urn:iec:std:iec:60050-692-01-06}}
      in the transmission system, a trip of a generation unit, {{loss of load, urn:iec:std:iec:60050-692-01-16}},
      or any combination thereof. System disturbance can lead to abnormal ranges of
      frequency or voltage, loss of power system stability or cascading outages of
      power transmission circuits and as well widespread interruption of customer
      load.
