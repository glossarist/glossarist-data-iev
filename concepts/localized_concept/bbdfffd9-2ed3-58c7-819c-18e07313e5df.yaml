  notes:
  - content: La caractéristique peut être, par exemple, la {{caractéristique amplitude-fréquence,
      urn:iec:std:iec:60050-702-07-35}}, la {{caractéristique phase-fréquence, urn:iec:std:iec:60050-702-07-36}},
      ou la {{caractéristique temps de propagation-fréquence, urn:iec:std:iec:60050-702-07-37}}.
