  definition:
  - content: medium which can be electrically polarized and in which a time-varying
      electric field produces an electric current density the vector component of
      which in a given direction has a magnitude small compared with that of the vector
      component of the displacement current density in this direction, in a particular
      frequency band
  examples: []
  id: 121-12-10
  notes:
  - content: "For sinusoidal conditions in an isotropic medium, the medium is dielectric
      if the following relation is satisfied:\n\nstem:[frac(gamma)(epsilon_(0) omega)
      gg epsilon^(prime)_(\"r\")]\r\nwhere stem:[γ] is the conductivity, stem:[ε]~0~
      the electric constant, stem:[ω] the angular frequency and stem:[ε]′~r~ the real
      relative permittivity."
  - content: An anisotropic medium may be dielectric only in certain directions.
