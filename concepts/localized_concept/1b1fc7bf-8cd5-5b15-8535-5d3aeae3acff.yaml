data:
  definition:
  - content: aptitude d’une entité à effectuer une fonction requise pendant un intervalle
      de temps donné dans des conditions de fonctionnement spécifiées
  examples: []
  id: 395-07-131
  notes:
  - content: On suppose généralement que l’entité est en état d’effectuer la  fonction
      requise au début de l’intervalle de temps.
  - content: La fiabilité d’une entité est généralement quantifiée par des mesures
      appropriées. Dans certaines applications; une de ces mesures est une probabilité,
      appelée aussi fiabilité.
