  definition:
  - content: "méthode de justification employée lorsque la suite des créneaux temporels
      élémentaires destinée à la transmission d'un signal numérique a constamment
      un débit numérique supérieur à celui du signal original; à chaque instant justifiable
      et selon la relation temporelle à cet instant:\r\na) soit aucun élément numérique
      du signal original n'est transmis, mais un élément numérique de justification
      est inséré dans le créneau temporel élémentaire justifiable;\r\nb) soit un élément
      numérique du signal original est inséré dans le créneau temporel élémentaire
      justifiable;\r\nces deux cas sont distingués par des signaux particuliers formés
      à l'aide des éléments numériques de service de justification"
