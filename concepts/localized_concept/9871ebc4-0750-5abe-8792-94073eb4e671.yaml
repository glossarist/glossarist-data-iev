  definition:
  - content: manoeuvre effectuée au moyen d'énergie emmagasinée dans le mécanisme
      lui-même avant l'achèvement de la manoeuvre et suffisante pour achever la manoeuvre
      dans des conditions prédéterminées
  examples: []
  id: 441-16-15
  notes:
  - content: "Ce type de manoeuvre peut être subdivisé suivant:\r\n1. le mode d'accumulation
      de l'énergie (ressort, poids, etc.);\n\n2. la provenance de l'énergie (manuelle,
      électrique, etc.);\n\n3. le mode de libération de l'énergie (manuel, électrique,
      etc.)."
