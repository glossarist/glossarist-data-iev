  definition:
  - content: "for an antenna consisting of several, fed or not, radiating elements,
      the coefficient stem:[Z]~ij~, with i different from j, relating the current
      in the element of rank j to the voltage stem:[E]~i~ at its terminals of the
      element of rank i, in the set of linear equations:\r\nstem:[E]~i~ = Σstem:[Z]~ij~
      stem:[I]~j~"
