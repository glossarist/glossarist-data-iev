---
data:
  definition:
  - content: "{{champ électromagnétique, urn:iec:std:iec:60050-121-11-61}} tel que,
      au moins dans une direction, chaque composante d'un des vecteurs du champ a
      la même {{phase, urn:iec:std:iec:60050-103-07-04}} au même instant en tout point,
      et une {{amplitude, urn:iec:std:iec:60050-103-07-02}} qui décroît très rapidement
      pour devenir négligeable à quelques {{longueurs d'onde, urn:iec:std:iec:60050-103-10-10}},
      sans que cette décroissance soit due à l'{{absorption, urn:iec:std:iec:60050-705-02-07}}"
  examples: []
  id: 705-04-70
  notes:
  - content: Un champ évanescent ne transfère pas d'énergie et n'est donc pas une
      {{onde, urn:iec:std:iec:60050-103-10-01}}.
