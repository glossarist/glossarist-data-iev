  definition:
  - content: "1 – diminution, entre deux points, d'une puissance électromagnétique\r\n2
      – expression quantitative de la diminution d'une puissance par le rapport des
      valeurs en deux points d'une puissance ou d'une grandeur qui est liée à la puissance
      par une relation bien définie"
