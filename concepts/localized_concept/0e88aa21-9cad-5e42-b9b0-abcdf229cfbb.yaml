  definition:
  - content: |-
      a) the quotient of (1) the photoelectric current of the device by (2) the incident luminous flux, usually expressed in amperes per lumen

      b) the quotient of (1) the photoelectric current of the device by (2) the incident illuminance, usually expressed in amperes per lux
