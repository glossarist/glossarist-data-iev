  definition:
  - content: image state associated with image data that represents the colour space
      coordinates of the elements of a {{hardcopy, urn:iec:std:iec:60050-845-32-045}}
      or {{softcopy, urn:iec:std:iec:60050-845-32-046}}, encompassing both original-referred
      image data and output-referred image data
  examples: []
  id: 845-32-053
  notes:
  - content: When the phrase "picture-referred" is used as a qualifier to an object,
      it implies that the object is in a picture-referred image state. For example,
      picture-referred image data are image data in a picture-referred image state.
  - content: Picture-referred image data will generally be colour rendered for a specific
      real or virtual imaging medium and viewing condition.
  - content: Picture-referred image data can include image data that do not originate
      from an original scene, such as text, line art, vector graphics and other forms
      of original artwork.
  terms:
  - type: expression
    normative_status: preferred
    designation: picture-referred image state
