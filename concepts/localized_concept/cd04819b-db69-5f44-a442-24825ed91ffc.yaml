data:
  definition:
  - content: "{{outil, urn:iec:std:iec:60050-651-21-14}} tenu à la mainNote 1 à l’article:
      Les outils à main peuvent être des {{outils à main isolés, urn:iec:std:iec:60050-651-21-20}},
      des {{outils à main isolants, urn:iec:std:iec:60050-651-21-21}} ou des {{outils
      à main hybrides, urn:iec:std:iec:60050-651-21-22}}. Note 2 à l’article: Les
      outils à main sont normalement des outils tels que tournevis, pinces, clés ou
      couteaux. Note 3 à l’article: Les outils à main sont conçus pour fournir au
      travailleur une protection contre le choc électrique. Note 4 à l’article: Cet
      article était numéroté 651-01-27 dans la CEI 60050-651:1999. Il a été modifié
      dans le but de préciser et clarifier la définition."
