  - content: 'à un potentiel électrique différent de celui de la terre du lieu de
      travail et présentant un {{phénomène électrique dangereux, urn:iec:std:iec:60050-651-26-05}}Note
      1 à l’article: Une partie est sous tension lorsqu''elle est raccordée électriquement
      à une source d''énergie électrique. Elle peut être aussi sous tension lorsqu''elle
      est chargée électriquement et/ou sous l''influence d''un champ électrique ou
      magnétique. Note 2 à l’article: Cet article était numéroté 651-01-14 dans la
      CEI 60050-651:1999. Il a été modifié comme suit: Suppression du mot “significativement”
      qui n’était pas quantifiable et alignement sur le texte anglais.'
