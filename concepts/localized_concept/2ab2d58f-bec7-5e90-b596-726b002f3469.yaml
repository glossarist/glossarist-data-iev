  definition:
  - content: |-
      {{vector product, urn:iec:std:iec:60050-102-03-36}} of the {{electric field strength, urn:iec:std:iec:60050-121-11-18}} stem:[*E*] and the {{magnetic field strength, urn:iec:std:iec:60050-121-11-56}} stem:[*H*] of the {{electromagnetic field, urn:iec:std:iec:60050-121-11-61}} at a given point

      stem:[*S*] = stem:[*E*] × stem:[*H*]
  examples: []
  id: 121-11-66
  notes:
  - content: The flux of the Poynting vector through a closed surface is equal to
      the electromagnetic power passing through this surface.
  - content: For a periodic electromagnetic field, the time average of the Poynting
      vector is a vector the direction of which, with certain reservations, can be
      considered as being the {{direction of propagation, urn:iec:std:iec:60050-705-02-15}}
      of {{electromagnetic energy, urn:iec:std:iec:60050-121-11-64}} and the {{magnitude,
      urn:iec:std:iec:60050-102-03-23}} can be considered as being the average {{power
      flux density, urn:iec:std:iec:60050-705-02-03}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: Poynting vector
  - type: symbol
    designation: stem:[*S*]
