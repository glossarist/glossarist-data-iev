  definition:
  - content: 'pour un élément à action par intégration, inverse du coefficient d''action
      par intégration, si ses variables d''entrée et de sortie sont des grandeurs
      variables dans la même unitéNote 1 à l’article: La constante de temps d''intégration
      est alors donnée parstem:[T_("I") = frac(1)(K_("I"))]où stem:[K]~I~ est le coefficient
      d''action par intégration.Note 2 à l’article: La constante de temps d’intégration
      peut également être donnée comme la durée de l’intervalle de temps nécessaire
      pour que la réponse à un échelon d’un élément par intégration atteigne la même
      valeur qu’une variation en échelon de la variable d’entrée.'
