  definition:
  - content: 'binary relation ℛ between elements stem:[a] and stem:[b] of a given
      set having the following properties: * reflexivity: aℛa, * symmetry: if aℛb
      then bℛa, * transitivity: if aℛb and bℛc then aℛc for any elements a, b and
      c of the given set'
  examples: []
  id: 102-01-08
  notes:
  - content: Examples are the equality of elements of a set, the parallelism of straight
      lines in a point space, the relation between integers whose difference is even.
