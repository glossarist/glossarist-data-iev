  definition:
  - content: "{{fundamental physical constant, urn:iec:std:iec:60050-112-03-09}} equal
      to the {{quantum, urn:iec:std:iec:60050-113-05-06}} of {{electric charge, urn:iec:std:iec:60050-113-02-10}},
      the value of which is set to exactly 1,602 176 634 × 10^−19^ {{C, urn:iec:std:iec:60050-113-02-11}}"
  examples: []
  id: 113-05-16
  notes:
  - content: The elementary electric charge is equal to the charge of the proton and
      opposite to the charge of the electron.
  - content: The elementary electric charge is used in the {{SI, urn:iec:std:iec:60050-112-02-02}}
      to define the {{ampere, urn:iec:std:iec:60050-112-02-07}}.
