  definition:
  - content: the placement of the irradiated object so that its surface nearer the
      X-ray film is separated from the film holder by a distance of air
  examples: []
  id: 881-10-16
  notes:
  - content: By this procedure, part of the scattered radiation from the object does
      not impinge on the film beneath the object. However, the use of a distance technique
      makes enlarged radiographs and increases the unsharpness of shadows of the object.
  terms:
  - type: expression
    normative_status: preferred
    designation: distance technique
  - type: expression
    designation: air-gap technique
