  definition:
  - content: "1) a wave, which appears beyond a surface separating two different media
      when an incident wave meets the surface, which propagates away from the surface,
      generally in a different direction, and which is interpretable by geometrical
      optics\r\n2) a wave which propagates in a medium with properties varying continuously
      in space and which is interpretable by geometrical optics"
  examples: []
  id: 705-04-07
  notes:
  - content: In the first case but not in the second one, the refracted wave is associated
      with a reflected wave.
  terms:
  - type: expression
    normative_status: preferred
    designation: refracted wave
