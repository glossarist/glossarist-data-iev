data:
  definition:
  - content: "intervalle de temps au début de la vie d’une entité au cours duquel
      l’intensité instantanée de défaillance, pour une entité réparable, ou le taux
      instantané de défaillance, pour une entité non réparable, décroît de façon importante
      en fonction du temps\r\nNote 1 à l’article: La décroissance considérée comme
      importante dépend de l’application."
