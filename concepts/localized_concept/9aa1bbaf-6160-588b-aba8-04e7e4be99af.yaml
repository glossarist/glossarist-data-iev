data:
  definition:
  - content: mesure de la proportion des quantités du stimulus monochromatique et
      du stimulus achromatique spécifié qui, mélangées additivement, égalisent le
      stimulus de couleur pris en considération
  examples: []
  id: 845-23-064
  notes:
  - content: Dans le cas de stimuli pourpres, le stimulus monochromatique est remplacé
      par un stimulus dont la chromaticité est représentée par un point sur la limite
      des pourpres.
  - content: La proportion peut être mesurée de différentes façons (voir "{{pureté
      colorimétrique, urn:iec:std:iec:60050-845-23-065}}" et "{{pureté d'excitation,
      urn:iec:std:iec:60050-845-23-065}}").
