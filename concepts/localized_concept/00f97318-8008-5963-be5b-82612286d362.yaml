---
data:
  definition:
  - content: valeur moyenne de l'éclairement photonique sur la surface courbe extérieure
      d'un très petit cylindre (réel ou fictif) orienté verticalement en un point
      dans l'espace
  examples: []
  id: 845-21-069
  notes:
  - content: L'éclairement cylindrique énergétique photonique est parfois également
      défini comme la moyenne arithmétique de l'éclairement photonique vertical, stem:[E]~p,v~,
      en un pointstem:[E_("p" ",c") = frac(1)("2" pi) int_(0)^(2 pi) E_("p" ",v")
      "d" phi]où stem:[E]~p,v~ est l'éclairement photonique vertical pour un élément
      de surface avec sa perpendiculaire dans la direction stem:[φ], et stem:[φ e]st
      l'angle dans le plan perpendiculaire à l'axe du cylindre.
  - content: La grandeur radiométrique correspondante est l'"éclairement cylindrique
      énergétique". La grandeur photométrique correspondante est l'"éclairement cylindrique".
  - content: L'éclairement cylindrique énergétique photonique est exprimé en seconde
      à la puissance moins un par mètre carré (s^−1^·m^−2^).
