---
data:
  definition:
  - content: "canal produit par micro-usinage\r\nNote 1 à l’article: Les microcanaux
      sont souvent utilisés dans les  {{dispositifs, urn:iec:std:iec:60050-151-11-20}}
      fluidiques tels que le {{dispositif de laboratoire sur puce, urn:iec:std:iec:60050-523-08-05}}.
      Le débit dans un microcanal est différent de celui du canal macroscopique, et
      la formulation du débit est l’une des questions clés des microsciences et des
      microtechniques. Un microcanal peut être utilisé en tant que guide acoustique."
