  definition:
  - content: milieu dans lequel un champ électrique variable en fonction du temps
      produit une densité de courant électrique dont la composante suivant une direction
      donnée a une norme grande par rapport à celle de la composante suivant cette
      direction de la densité de courant de déplacement, dans une bande de fréquences
      déterminée
  examples: []
  id: 121-12-02
  notes:
  - content: "Dans un milieu isotrope, la propriété d’être conducteur se traduit en
      régime sinusoïdal par la condition:\r\nstem:[frac(gamma)(epsilon_(0) omega)
      gg epsilon^(prime)_(\"r\")]\n\noù stem:[γ] est la conductivité, stem:[ε]~0~
      la constante électrique, stem:[ω] la pulsation et stem:[ε′]~r~ la permittivité
      relative réelle. En régime statique, le milieu est conducteur si la conductivité
      n’est pas nulle."
  - content: Un milieu anisotrope peut n’être conducteur que dans certaines directions.
  - content: Le terme "conducteur" désigne aussi tout élément destiné à assurer le
      passage d’un courant électrique.
