---
data:
  definition:
  - content: quotient de la {{vitesse de la lumière dans le vide, urn:iec:std:iec:60050-113-01-34}}
      par la vitesse de la lumière dans un milieu
  examples: []
  id: 845-24-109
  notes:
  - content: La valeur de l'indice de réfraction peut dépendre de la {{fréquence,
      urn:iec:std:iec:60050-103-06-02}}, de la polarisation et de la direction.
  - content: L'indice de réfraction est exprimé par stem:[n] = stem:[c]~0~/stem:[c,]
      où stem:[c]~0~ est la vitesse de la lumière dans le vide et stem:[c] est la
      vitesse de la lumière dans le milieu.
  - content: Voir aussi "{{indice de réfraction complexe, urn:iec:std:iec:60050-845-24-111}}".
  - content: La réfractivité est exprimée par stem:[n] − 1, où stem:[n] est l'indice
      de réfraction.
  - content: L'unité d'indice de réfraction est un.
  - content: Cet article était numéroté 845-04-101 dans l'IEC 60050-845:1987.
