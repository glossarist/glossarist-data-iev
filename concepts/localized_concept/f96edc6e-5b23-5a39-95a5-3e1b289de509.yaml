  definition:
  - content: dans un milieu homogène et isotrope d'épaisseur pratiquement infinie
      limité par une surface plane, profondeur à laquelle le champ électrique d'une
      onde plane uniforme sinusoïdale pénétrant dans un milieu et s'y propageant normalement
      à cette surface, est affaibli dans le rapport 1/e
  examples: []
  id: 705-03-25
  notes:
  - content: La profondeur de pénétration exprimée en mètres est égale à l'inverse
      de l'affaiblissement linéique exprimé en népers par mètre du milieu dans lequel
      l'onde pénètre.
