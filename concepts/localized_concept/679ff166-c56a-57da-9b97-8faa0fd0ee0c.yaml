---
data:
  definition:
  - content: "mouillage d'un {{substrat, urn:iec:std:iec:60050-521-05-28}} contrôlé
      par la tension entre une goutte et le substrat recouvert d'un film diélectrique\r\nNote
      1 à l’article: L'angle de contact d'une goutte de liquide, typiquement un {{électrolyte,
      urn:iec:std:iec:60050-114-01-02}}, sur un substrat peut être contrôlé électriquement
      parce que la {{tension interfaciale, urn:iec:std:iec:60050-212-18-10}} de surface
      entre solide et liquide peut être contrôlée avec l'énergie stockée dans la {{double-couche,
      urn:iec:std:iec:60050-114-02-19}} électrique jouant le rôle d'un {{condensateur,
      urn:iec:std:iec:60050-151-13-28}}. La {{capacité, urn:iec:std:iec:60050-131-12-13}}
      peut être aisément déterminée en recouvrant l'{{électrode, urn:iec:std:iec:60050-151-13-01}}
      avec une {{substance diélectrique, urn:iec:std:iec:60050-561-01-16}} d'épaisseur
      déterminée. L'électro-mouillage sur diélectrique est typiquement utilisé dans
      les {{dispositifs, urn:iec:std:iec:60050-151-11-20}} microfluidiques. \r\nNote
      2 à l’article: Le terme abrégé \"EWOD\" est dérivé du terme anglais développé
      correspondant \"electro-wetting on dielectric\"."
