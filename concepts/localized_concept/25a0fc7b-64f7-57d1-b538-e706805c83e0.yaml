  definition:
  - content: the ratio of the power flux density of a reflected wave and an incident
      wave, in a same point, in the corresponding directions of propagation of energy
      after and before reflection
  examples: []
  id: 731-03-25
  notes:
  - content: In optics, frequently expressed as reflectance density or as a percentage;
      in communication applications, generally expressed in decibels.
