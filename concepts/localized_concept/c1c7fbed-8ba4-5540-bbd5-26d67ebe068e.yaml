  notes:
  - content: In the Internet, the top-level domain name is a two-letter designation
      of a country or territory, in most cases an ISO country name, but also "eu",
      or another designation of a region (e.g. "asia"), or a generic designation such
      as "biz", "com", "int", "museum", "name", "net", "org".
