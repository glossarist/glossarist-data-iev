data:
  definition:
  - content: 'valeur maximale du {{débit moyen de transinformation, urn:iec:std:iec:60050-171-07-31}},
      qui peut être atteinte avec une {{probabilité d''erreur, urn:iec:std:iec:60050-171-06-08}}
      arbitrairement faible grâce à l''emploi d''un {{code, urn:iec:std:iec:60050-171-01-15}}
      appropriéNote 1 à l’article: La capacité temporelle de canal est un moyen d’exprimer
      quantitativement l''aptitude d''un canal soumis à des contraintes spécifiées
      à transmettre les messages d''une source de messages donnée. Note 2 à l’article:
      La capacité temporelle de canal peut être exprimée à l''aide d''une unité telle
      que le shannon par seconde (Sh/s).'
