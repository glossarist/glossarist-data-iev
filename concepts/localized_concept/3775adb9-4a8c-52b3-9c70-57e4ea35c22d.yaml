  definition:
  - content: coordinates expressing the quotients of each of a set of three {{tristimulus
      values, urn:iec:std:iec:60050-845-23-038}} and their sum
  examples: []
  id: 845-23-053
  notes:
  - content: As the sum of the three chromaticity coordinates is equal to 1, two of
      them are sufficient to define a chromaticity.
  - content: In the CIE standard colorimetric systems, the chromaticity coordinates
      are represented by the symbols stem:[x], stem:[y], stem:[z] or stem:[x]~10~,
      stem:[y]~10~, stem:[z]~10~.
  - content: The chromaticity coordinates have unit one.
  - content: This entry was numbered 845-03-33 in IEC 60050-845:1987.
