  definition:
  - content: set of activities involved in the development and operation of software
      during a period of time that starts at a concept phase with the software requirements
      specification and finishes when the software is withdrawn from use
  examples: []
  id: 395-07-47
  notes:
  - content: The software life cycle typically includes a specification phase, design
      phase, implementation phase, test phase, installation and check-out phase and
      an operation and maintenance phase.
