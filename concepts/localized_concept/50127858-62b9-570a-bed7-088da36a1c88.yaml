  definition:
  - content: activity of establishing, with regard to actual or potential problems,
      {{provision, urn:iec:std:iec:60050-901-05-01}}s for common and repeated use,
      aimed at the achievement of the optimum degree of order in a given context
  examples: []
  id: 901-01-01
  notes:
  - content: In particular, the activity consists of the processes of formulating,
      issuing and implementing {{standard, urn:iec:std:iec:60050-901-02-02}}s.
  - content: Important benefits of standardization are improvement of the suitability
      of products, processes and services for their intended purposes, prevention
      of barriers to trade and facilitation of technological cooperation.
