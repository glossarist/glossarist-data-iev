  definition:
  - content: device predominantly using scattering to alter the spatial distribution
      of radiation from a {{source, urn:iec:std:iec:60050-845-21-032}}
  examples: []
  id: 845-30-039
  notes:
  - content: If all the radiation reflected or transmitted by the diffuser is scattered
      with no regular reflection or regular transmission, the diffuser is said to
      be completely diffusing, independent of whether or not the reflection or transmission
      is isotropic.
  - content: Besides scattering, a diffuser can also have a slight reflection and
      absorption effect.
  - content: This entry was numbered 845-10-34 in IEC 60050-845:1987.
