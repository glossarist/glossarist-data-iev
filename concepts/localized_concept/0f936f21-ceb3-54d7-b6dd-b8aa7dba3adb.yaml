  definition:
  - content: quotient of the luminance, stem:[L], of a plane retroreflective surface
      in the direction of observation and the illuminance, stem:[E_(exists)], at the
      retroreflector on a plane perpendicular to the direction of the incident lightstem:[R_(L)
      = frac(L)(E_(exists))]
  examples: []
  id: 845-24-104
  notes:
  - content: The coefficient of retroreflected luminance is particularly suitable
      for describing materials in sheet form.
  - content: The coefficient of retroreflected luminance is expressed in candela per
      square metre per lux (cd·m^−2^·lx^−1^).
  - content: This entry was numbered 845-04-98 in IEC 60050-845:1987.
