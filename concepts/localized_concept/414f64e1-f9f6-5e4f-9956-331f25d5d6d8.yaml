---
data:
  definition:
  - content: 'procédé de fabrication de conducteurs au cours duquel le supraconducteur
      est formé dans sa position finale dans le conducteur à partir de son ou de ses
      matériaux précurseursNote 1 à l’article: Les mélanges Cu/Nb ou Cu/V dans lesquels
      les dendrites de Nb ou de V se forment à partir de la fusion sont conditionnés
      en fils ou en bandes pour donner des filaments fins de Nb ou de V dans une matrice
      de cuivre, et les composés de type Nb~3~Sn ou V~3~Ga sont formés par le procédé
      de diffusion. Note 2 à l’article: Le procédé in-situ comprend aussi un processus
      de fabrication d’une couche mince supraconductrice formée en une seule étape.
      Note 3 à l’article: Le procédé in-situ comprend aussi un processus de fabrication
      de fils MgB~2~ au cours duquel un tube de métal est rempli d’un mélange de poudres
      de magnésium et de bore ou leurs composés, avec traitement thermique de réaction
      après l’étirage.'
