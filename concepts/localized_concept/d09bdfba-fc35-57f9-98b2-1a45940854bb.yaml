  definition:
  - content: clothing made of natural or synthetic material(s) with integral interwoven
      conductive fibres or layers used to provide electrical continuity between all
      parts of the clothing and a reduction of the electric field inside the clothing
  examples: []
  id: 651-23-06
  notes:
  - content: The term “conductive clothing” includes conductive jacket, trousers,
      coverall (one-piece clothing), gloves or mitts, hood, overshoe socks and socks.
  - content: "{{Conductive footwear, urn:iec:std:iec:60050-651-23-07}} and a conductive
      helmet are component parts used in conjunction with the conductive clothing."
  - content: This entry was numbered 651-07-06 in IEC 60050-651:1999. It has been
      modified such that greater details are provided regarding the composition of
      the clothing.
