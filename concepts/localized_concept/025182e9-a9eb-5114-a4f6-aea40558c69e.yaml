  definition:
  - content: "of electrical steel, the ratio of the difference between the peak value
      of the magnetic field strength stem:[hat(H)_(alpha)] measured at an angle stem:[α]
      to the direction of rolling, and the peak value of the magnetic field strength
      stem:[hat(H)_(0)] measured along the direction of rolling, to stem:[hat(H)_(0)],
      at a stated peak value of the magnetic flux density, the ratio being expressed
      as a percentage:\r\nstem:[T_(H) = frac(hat(H)_(alpha) - hat(H)_(0))(hat(H)_(0))
      xx 100 \" \" \" \" %]"
  examples: []
  id: 221-03-40
  notes:
  - content: The measurements of stem:[hat(H)_(alpha)] andstem:[hat(H)_(0)] are to
      be made under the same conditions.
  terms:
  - type: expression
    normative_status: preferred
    designation: magnetic field strength anisotropy factor
