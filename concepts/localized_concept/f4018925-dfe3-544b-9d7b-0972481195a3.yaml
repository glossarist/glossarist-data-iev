  definition:
  - content: basic constituent particle of any substance, electrically neutral, consisting
      of a single central part having a positive electric charge and nearly all the
      mass, surrounded by electrons
  examples: []
  id: 113-05-20
  notes:
  - content: The motions and combinations of atoms explain macroscopic properties
      of the substance.
  - content: If an atom loses or accepts one or more electrons, it becomes an ion.
  - content: The electric charge of the central part, called atomic nucleus, determines
      the number of electrons; and by this the chemical behaviour of the atom, i.e.
      its ability to produce combinations with other atoms. A chemical element consists
      of atoms, the atomic nuclei of which have the same number of protons.
