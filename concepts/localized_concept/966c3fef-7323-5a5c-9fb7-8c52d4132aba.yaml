  definition:
  - content: "rate of photon number per time intervalstem:[Phi_(\"p\") = frac(\"d\"
      N_(\"p\"))(\"d\" t)]\r\nwhere stem:[N]~p~ is photon number, transmitted or received,
      and stem:[t] is time"
  examples: []
  id: 845-21-040
  notes:
  - content: Photon flux, stem:[Φ]~p~, is related to radiant flux, stem:[Φ]~e~, of
      {{monochromatic radiation, urn:iec:std:iec:60050-845-21-014}} bystem:[Phi_("p")
      = frac(Phi_("e"))(h " " nu) " "]where stem:[h] is the Planck constant, and stem:[ν]
      is the frequency of the corresponding electromagnetic wave.
  - content: For a beam of radiation whose spectral distribution is stem:[frac("d"
      Phi_("e") (lambda))("d" lambda)] or stem:[frac("d" Phi_("e") (nu))("d" nu)],
      the photon flux can be expressed by stem:[Phi_("p") = int_(0)^(oo) frac("d"
      Phi_("e") ( lambda ))("d" lambda) * frac(lambda)(h c_(0)) "d" lambda = int_(0)^(oo)
      frac("d" Phi_("e") ( nu ))("d" nu) * frac(1)(h nu) "d" nu], where stem:[h] is
      Planck's constant and stem:[c]~0~ is the {{speed of light in vacuum, urn:iec:std:iec:60050-113-01-34}}.
  - content: The corresponding radiometric quantity is "radiant flux". The corresponding
      photometric quantity is "luminous flux".
  - content: The photon flux is expressed in second to the power minus one (s^−1^).
  - content: This entry was numbered 845-01-26 in IEC 60050-845:1987.
  terms:
