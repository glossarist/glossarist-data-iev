---
data:
  definition:
  - content: matériel électrique qui contient à la fois des circuits de sécurité intrinsèque
      et de sécurité non intrinsèque et qui est construit de telle sorte que les circuits
      de sécurité non intrinsèque ne peuvent pas affecter les circuits de sécurité
      intrinsèque
  examples: []
  id: 426-11-03
  notes:
  - content: Le matériel associé est:. soit équipé d'une protection supplémentaire
      fournie par un Mode de Protection adapté à une utilisation dans l'atmosphère
      explosive appropriée, ou. soit non équipé d'une protection fournie par un Mode
      de Protection adapté à une utilisation dans l'atmosphère explosive appropriée
      et, par conséquent, ne doit pas être utilisé dans une atmosphère explosive.
