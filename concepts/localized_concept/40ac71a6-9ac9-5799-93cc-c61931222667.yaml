  definition:
  - content: grandeur d’état positive proportionnelle à l’énergie cinétique des particules
      en mouvement chaotique qui constituent un système localement en équilibre
  examples: []
  id: 113-04-14
  notes:
  - content: Les températures peuvent être classées quantitativement en utilisant
      diverses échelles de valeurs telles que les échelles Celsius et Fahrenheit.
      Toutes ces échelles sont maintenant rattachées à l’échelle de température thermodynamique.
  - content: La température thermodynamique est une des sept grandeurs de base du
      Système international de grandeurs, ISQ, sur lequel repose le Système international
      d'unités, SI. L'unité SI cohérente de température thermodynamique est le kelvin,
      K (voir la CEI&nbsp;60050-112:2010, 112-02-08). La température thermodynamique
      du point triple de l’eau est 273,16&nbsp;K.
