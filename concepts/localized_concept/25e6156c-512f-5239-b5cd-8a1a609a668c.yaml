  definition:
  - content: quantity equal to the mass dstem:[m] of substance crossing a given surface
      during a time interval with infinitesimal duration dstem:[t], divided by this
      duration, thus stem:[q]~stem:[m]~ = dstem:[m] / dstem:[t]
  examples: []
  id: 113-03-71
  notes:
  - content: stem:[q]~stem:[m]~ = stem:[ρq]~stem:[v]~ where stem:[ρ] is mass density
      and stem:[q]~stem:[v]~ is volume flow rate ({{113-03-72, urn:iec:std:iec:60050-113-03-72}}).
  - content: The coherent SI unit of mass flow rate is kilogram per second, kg/s.
  terms:
  - type: expression
    normative_status: preferred
    designation: mass flow rate
  - type: symbol
    designation: |-
      stem:[q]~stem:[m]~
