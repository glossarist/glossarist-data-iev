data:
  definition:
  - content: type de préchauffage des électrodes d'une lampe à décharge dans lequel
      les électrodes sont alimentées par des circuits séparés
  examples: []
  id: 845-27-132
  notes:
  - content: Chaque électrode est généralement reliée à un enroulement à basse tension
      qui peut faire partie du ballast et qui fournit le courant de chauffage. Dans
      certains circuits, cette basse tension est automatiquement réduite après amorçage
      de l'arc.
  - content: Cet article était numéroté 845-07-73 dans l'IEC 60050-845:1987.
