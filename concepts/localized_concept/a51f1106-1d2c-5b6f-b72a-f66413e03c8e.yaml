  definition:
  - content: appareil de télécopie contrastée qui utilise une compression de la largeur
      de la bande de fréquences du signal pour obtenir un temps de transmission d'environ
      trois minutes sur une voie de type téléphonique pour une page de format ISO
      A4 avec une définition nominale de quatre lignes par millimètre
  examples: []
  id: 721-13-02
  notes:
  - content: La compression de la largeur de la bande de fréquences peut être assurée
      par un codage et par l'emploi d'une modulation à bande latérale résiduelle.
