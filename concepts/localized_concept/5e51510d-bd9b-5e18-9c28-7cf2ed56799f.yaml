  definition:
  - content: self-organized monolayer of molecules that are adsorbed by chemical bonding
      on a surface due to the specific affinity of the molecule
  examples: []
  id: 523-05-16
  notes:
  - content: In a self-assembled monolayer, molecules are typically bonded to the
      {{substrate, urn:iec:std:iec:60050-521-05-28}} strongly with chemical bonding
      while molecules in Langmuir-Blodgett films are bonded weakly with physisorption,
      such as electrostatic force.
  - content: This note applies to the French language only.
