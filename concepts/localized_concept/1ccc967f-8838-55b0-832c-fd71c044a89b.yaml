  definition:
  - content: rayonnement sur une ou des fréquences situées en dehors de la largeur
      de bande nécessaire et dont le niveau peut être réduit sans affecter la transmission
      de l'information correspondante; ces émissions comprennent les rayonnements
      harmoniques, les rayonnements parasites, les produits d'intermodulation et de
      conversion de fréquence, à l'exclusion des émissions hors bande
  examples: []
  id: 161-06-01
  notes:
  - content: La largeur de bande nécessaire est définie dans le Règlement des Radiocommunications
      146.
  - content: Le mot anglais "emission" est employé avec le sens défini en 161-01-09.
