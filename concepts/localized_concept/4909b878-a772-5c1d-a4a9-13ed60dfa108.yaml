  definition:
  - content: 'quotient de la réponse de rampe Δstem:[v]~ρ~(stem:[t]) divisé par la
      pente de rampe stem:[K]~ρ~ de la fonction en rampe, le quotient étant décrit
      parstem:[r (t) = frac(1)(K_("rho")) * Delta v_("rho") (t)]Note 1 à l’article:
      La réponse unitaire de la rampe peut être calculée à partir de la réponse unitaire
      à un échelon avec l’équation suivante stem:[r (t) = int_(- oo)^(t) h (tau) "d"
      tau].Note 2 à l’article: La réponse unitaire de la rampe d’un système peut mathématiquement
      être considérée comme le résultat de l’application d’une rampe unitaire à une
      variable d’entrée.'
