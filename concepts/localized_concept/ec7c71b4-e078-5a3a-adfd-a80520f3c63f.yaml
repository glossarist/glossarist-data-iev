  examples: []
  id: 426-25-06
  notes:
  - content: 'One common configuration (e.g. in IEC 60079-0, _Explosive atmospheres
      – Part 0: Equipment – General requirements_) uses parallel electrodes, 100 mm
      long and 10 mm apart.'
  - content: The surface resistance is dependent upon the electrode configuration.
      The surface resistance measured with the example electrode configuration is
      ten times lower than the surface resistivity.
  - content: Conductive rubber strip electrodes are preferred over silver paint electrodes.
