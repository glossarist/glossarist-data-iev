  definition:
  - content: 'pour un élément à trois positions sans recouvrement, domaine compris
      entre les deux valeurs de commutation et pour un élément à trois positions avec
      recouvrement, domaine compris entre les deux paires de valeurs de commutation
      en fonction d’un accord spécial VOIR: Figure 20.Note 1 à l’article: Au cas où
      l’élément à trois positions présente des recouvrements, l’encadrement est normalement
      défini comme étant la différence entre les valeurs moyennes des deux paires
      de valeurs de commutation.'
