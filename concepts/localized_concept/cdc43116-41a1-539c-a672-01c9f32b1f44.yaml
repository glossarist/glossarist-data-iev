  definition:
  - content: technique used for concealing light source(s) and surfaces of high luminance
      from direct view in order to reduce glare, or to reduce light emission above
      the horizontal
  examples: []
  id: 845-30-034
  notes:
  - content: In outdoor lighting, cut-off classifications define the luminous intensity
      limits in two illumination zones that occur within the range of 80° to 180°
      above nadir. Light emitted in the 80° to 90° zone is more likely to contribute
      to glare, and light emitted above the horizontal is more likely to contribute
      to sky glow.
  - content: In public lighting, distinction is made between full-cut-off luminaires,
      semi-cut-off luminaires and non-cut-off luminaires.
  - content: This entry was numbered 845-10-29 in IEC 60050-845:1987.
