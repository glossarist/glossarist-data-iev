  definition:
  - content: "système de référence du CCITT comprenant:\r\nl'appareil de référence
      pour la détermination des affaiblissements équivalents pour la netteté ou ARAEN;\n\nun
      filtre passe-bande ayant des fréquences de coupure de 300 et 3400 Hz;\n\nun
      dispositif permettant d'appliquer à l'entrée du système récepteur de l'ARAEN
      un bruit de fond électrique spécifié"
  examples: []
  id: 722-16-23
  notes:
  - content: Le SRAEN est décrit dans la Recommandation P44 du CCITT contenue dans
      le Tome V du Livre Jaune, 1981.
