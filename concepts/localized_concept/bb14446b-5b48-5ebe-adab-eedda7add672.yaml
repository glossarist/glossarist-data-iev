  definition:
  - content: "grandeur définie par:\r\nstem:[Phi = K_(\"m\") int_(0)^(oo) V ( lambda
      ) P ( lambda ) rm(d) lambda]\r\noù:\r\nstem:[P](stem:[λ]) est la puissance spectrique
      rayonnée par la source à la longueur d'onde stem:[λ];\n\nstem:[V](stem:[λ])
      est l'efficacité lumineuse relative spectrale en vision photoptique;\n\nstem:[K]~m~
      est une constante"
  examples: []
  id: 723-08-27
  notes:
  - content: Dans le système d'unités SI, où stem:[P](stem:[λ]) est exprimé en watts
      par mètre, le flux lumineux stem:[Ф] s'exprime en lumens, et stem:[K]~m~ = 683
      lm/W.
