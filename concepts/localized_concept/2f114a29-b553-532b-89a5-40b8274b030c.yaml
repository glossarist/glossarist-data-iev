---
data:
  definition:
  - content: matériel électrique qui contient à la fois des circuits à énergie limitée
      et des circuits à énergie non limitée et qui est construit de telle sorte que
      les circuits à énergie non limitée ne peuvent pas affecter négativement les
      circuits à énergie limitée
  examples: []
  id: 426-13-09
  notes:
  - content: 'Le matériel associé à énergie limitée est:. soit équipé d''une protection
      supplémentaire fournie par une méthode alternative de protection comprise dans
      l''IEC 60079-15, Atmosphères explosives – Partie 15: Protection du matériel
      par mode de protection "n", adaptée à une utilisation dans l''atmosphère explosive
      gazeuse appropriée &lsqb;nA, nC, nR&rsqb;;. soit équipé d''une protection supplémentaire
      fournie par un Mode alternatif de Protection cité dans l''IEC 60079-0, Atmosphères
      explosives – Partie 0: Matériel – Exigences générales, adaptée à une utilisation
      dans l''atmosphère explosive gazeuse appropriée;. soit non équipé d''une protection
      fournie par un Mode de Protection adapté à une utilisation dans l''atmosphère
      explosive appropriée et, par conséquent, ne doit pas être utilisé dans une atmosphère
      explosive gazeuse, par exemple, un enregistreur qui ne se trouve pas lui-même
      dans une atmosphère explosive gazeuse, mais qui est relié à un thermocouple
      situé dans une atmosphère explosive gazeuse dans laquelle seul le circuit d''entrée
      de l''enregistreur est à énergie limitée &lsqb;Ex nL&rsqb;.'
  - content: 'Le matériel associé à énergie limitée "&lsqb;nL&rsqb;" a été remplacé
      par "&lsqb;ic&rsqb;" dans l''IEC 60079-11, _Atmosphères explosives – Partie
      11: Protection de l''équipement par sécurité intrinsèque "i"_.'
