  - content: La notation stem:[x] ∈ stem:[A] exprime que l'entité stem:[x] est un
      élément de l'ensemble stem:[A]. La notation stem:[x] ∉ stem:[A] exprime que
      l'entité stem:[x] n'est pas un élément de l'ensemble stem:[A]. On dit aussi
      que stem:[x] appartient à stem:[A] ou n'appartient pas à stem:[A].
