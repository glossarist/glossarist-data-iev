---
data:
  definition:
  - content: quotient de l'éclairement lumineux produit par l'installation d'éclairage
      après un certain {{intervalle de temps, urn:iec:std:iec:60050-113-01-10}} par
      l'éclairement lumineux produit par une installation neuve
  examples: []
  id: 845-29-146
  notes:
  - content: Le terme anglais "light loss factor" et le terme français "facteur de
      perte de lumière" ne sont plus usités.
  - content: Le terme terme anglais "light loss factor" et le terme français "facteur
      de dépréciation" étaient anciennement employés pour désigner l'inverse du quotient
      ci-dessus.
  - content: Le facteur de conservation tient compte des pertes de lumière dues au
      cumul des salissures sur les luminaires et les surfaces (de locaux) ou d'autres
      surfaces appropriées (en extérieur, le cas échéant), et à la baisse du flux
      lumineux des lampes.
  - content: L'unité de facteur de conservation est un.
  - content: Le terme abrégé "MF" est dérivé du terme anglais développé correspondant
      "maintenance factor".
