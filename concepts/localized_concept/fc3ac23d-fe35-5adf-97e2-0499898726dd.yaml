  definition:
  - content: |-
      scalar quantity given by the flux of the total current density *stem:[J]*~t~ through a given directed surface S:

      stem:[I_("t") = int_("S") J_("t") * e_("n") "d" A]

      where *stem:[e]*~n~dstem:[A] is the vector surface element
  examples: []
  id: 121-11-45
  notes:
  - content: |-
      The total electric current *stem:[I]*~t~ is given by

      *stem:[I]*~t~ = *stem:[I]* + *stem:[I]*~stem:[D]~

      where *stem:[I]* is the electric current and *stem:[I]*~stem:[D]~ the displacement current.
  terms:
  - type: expression
    normative_status: preferred
    designation: total electric current
  - designation: |-
      *stem:[I]*~t~
      *stem:[I]*~tot~
