  definition:
  - content: electrode capable of emitting positive charge carriers to and/or receiving
      negative charge carriers from the medium of lower conductivity
  examples: []
  id: 841-22-31
  notes:
  - content: The direction of electric current is from the external circuit, through
      the anode, to the medium of lower conductivity.
  - content: In some cases (e.g. electrochemical cells), the term "anode" is applied
      to one or another electrode, depending on the electric operating condition of
      the device. In other cases (e.g. electronic tubes and semiconductor devices),
      the term "anode" is assigned to a specific electrode.
