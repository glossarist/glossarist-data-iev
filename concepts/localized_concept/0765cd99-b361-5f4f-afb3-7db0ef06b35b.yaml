  definition:
  - content: a shaped-beam antenna designed in such a way that when its beam intersects
      a given surface the lines of equal power flux density incident upon the surface
      form specified contours
  examples: []
  id: 712-03-13
  notes:
  - content: For a satellite antenna, the area limited, on the surface of the Earth,
      by the line along which the power flux density has a specified value, is called
      "footprint of the beam".
