  definition:
  - content: set of stem:[m] interrelated sinusoidal integral quantities of the same
      kind, where stem:[m] is an integer greater than one, all quantities having the
      same period but usually different phases
  examples: []
  id: 141-01-03
  notes:
  - content: In some cases the phases differ by an integral multiple, including zero,
      of 2stem:[π] .
  - content: Polyphase systems of voltages, electric currents and linked fluxes are
      commonly used.
  - content: The qualifiers two-phase, three-phase, four-phase, six-phase and twelve-phase
      are used for stem:[m] = 2, 3, 4, 6, 12, respectively.
  - content: The concept of polyphase system can, under certain conditions, be extended
      to non-sinusoidal periodic quantities.
  terms:
  - type: expression
    normative_status: preferred
    designation: polyphase system
  - type: expression
    designation: stem:[m]-phase system
