  definition:
  - content: |-
      scalar or tensor quantity the product of which by the magnetic field strength stem:[*H*]  in a medium is equal to the magnetic flux density stem:[*B*] :

      stem:[*B*] = stem:[μ] stem:[*H*]
  examples: []
  id: 121-12-28
  notes:
  - content: For an isotropic medium the absolute permeability is a scalar; for an
      anisotropic medium it is a tensor.
