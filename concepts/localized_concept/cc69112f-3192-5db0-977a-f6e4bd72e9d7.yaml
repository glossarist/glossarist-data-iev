---
data:
  definition:
  - content: fonction qui attribue un scalaire, un vecteur ou un tenseur, ou un ensemble
      de tels éléments liés entre eux, à chaque point d'un domaine déterminé de l'espace
      euclidien à trois dimensions
  examples: []
  id: 102-05-12
  notes:
  - content: Un champ peut représenter un phénomène physique, comme par exemple un
      champ de pression acoustique, un champ de pesanteur, le champ magnétique terrestre,
      un champ électromagnétique.
  - content: Un champ peut dépendre du temps.
  - content: En anglais, le terme «field» a aussi en mathématiques le sens de «corps»
      (voir {{IEV 102-02-18, urn:iec:std:iec:60050-102-02-18}}, Note 2).
