  definition:
  - content: for an eigenvalue stem:[λ] of a square matrix *stem:[A]*, non-zero column
      matrix *stem:[U]* such that *stem:[AU]* = λ*stem:[U]*
  examples: []
  id: 102-06-24
  notes:
  - content: The term "eigenvector" is used because a square matrix represents often
      a tensor quantity transforming a vector quantity into another vector quantity.
      In this case the eigenvectors of the matrix are vectors.
