  definition:
  - content: contact destiné à la fixation d’un conducteur par soudure
  examples: []
  id: 581-22-11
  notes:
  - content: "Les contacts à souder peuvent comprendre, notamment, les types suivants:\r\na)
      le fil est entouré par la sortie: fût, godet, coupe, puits, etc., \r\nb) le
      fil entoure la sortie: poteau, borne, queue, etc., \r\nc) le fil passe à travers
      la sortie: œillet, crochet, etc.,\r\nd) aucun fil n’est mis en œuvre comme dans
      les applications pour circuit imprimé: bornes de broches à souder, sorties TMS
      (par exemple ailes en plier) coulée, queue, etc."
