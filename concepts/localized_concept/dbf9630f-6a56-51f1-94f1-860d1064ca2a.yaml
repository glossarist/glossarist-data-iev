  definition:
  - content: spectral internal transmittance of a layer of an absorbing material such
      that the path of the radiation is of dimension length, and under conditions
      in which the boundary of the material has no influence
  examples: []
  id: 845-24-094
  notes:
  - content: The unit of length has to be specified. If a new unit of length is used
      that is stem:[k] times the magnitude of the original one, then the value of
      stem:[τ]~i,o~(stem:[λ]) will change to stem:[tau^(prime)_("i" ",o")^(() lambda
      ) = &amp;lsqb; tau_("i" ",o") ( lambda ) &amp;rsqb;^(k)].
  - content: The spectral transmissivity has unit one.
  - content: This entry was numbered 845-04-87 in IEC 60050-845:1987.
