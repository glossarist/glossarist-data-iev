  definition:
  - content: arrangement whereby more than two parties recognize or accept one another's
      conformity assessment results
  examples: []
  id: 902-06-09
  notes:
  - content: The general expression “conformity assessment result” is used in {{902-06-04,
      urn:iec:std:iec:60050-902-06-04}} to {{902-06-09, urn:iec:std:iec:60050-902-06-09}}
      to mean the {{product, urn:iec:std:iec:60050-902-02-03}} of any conformity assessment
      activity (e.g. a report or certificate) and may include a finding of nonconformity.
