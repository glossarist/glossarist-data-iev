data:
  definition:
  - content: identité résultant de l'application du théorème d'Ostrogradski au champ
      vectoriel stem:[f_(1) " " mathbf(grad) " " f_(2)], où stem:[f]~1~ et stem:[f]~2~
      sont deux champs scalaires donnés en tout point d'un domaine tridimensionnel
      V délimité par une surface fermée S stem:["P{iiint}"_("V") (mathbf(grad) " "
      f_(1) * mathbf(g r a d) " " f_(2) + f_(1) " " rm(Delta) " " f_(2)) rm(d) V =
      underset("S")("P{oiint}") f_(1) " " mathbf(g r a d) " " f_(2) * e_("n") rm(d)
      A] où dstem:[V] est l’élément de volume, *stem:[e]*~n~dstem:[A] est l’élément
      vectoriel de surface et Δ est l'opérateur laplacien
