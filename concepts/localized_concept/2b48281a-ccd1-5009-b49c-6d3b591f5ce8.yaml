  definition:
  - content: area in a specified plane perpendicular to the beam axis, consisting
      of all points at which the pulse-pressure-squared integral is greater than a
      specified fraction of the maximum value of the pulse-pressure-squared integral
      in that plane
  examples: []
  id: 802-01-19
  notes:
  - content: Some commonly specified levels are 0,25 and 0,01 for the −6 dB and −20
      dB beam areas, respectively.
