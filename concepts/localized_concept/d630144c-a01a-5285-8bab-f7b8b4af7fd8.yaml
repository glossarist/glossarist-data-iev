  definition:
  - content: for a continuous body in a domain D, with mass density stem:[ρ](*stem:[r]*),
      point with position vector stem:[r_("G") = frac(int_("D") r rho d V)(int_("D")
      rho d V)]
  examples: []
  id: 113-03-12
  notes:
  - content: For a system of particles with masses stem:[m]~stem:[i]~ and position
      vectors *stem:[r]*~stem:[i]~, the centre of mass is the point with position
      vector stem:[r_("G") = frac(sum_(i) m_(i) r_(i))(sum_(i) m_(i))].
  - content: In non-relativistic physics, the centre of mass doesn’t depend on the
      chosen reference frame.
