  definition:
  - content: function for which the argument is an ordered set of stem:[n] numbers
      or scalar quantities
  examples: []
  id: 103-01-06
  notes:
  - content: The value of the function stem:[f] of stem:[n] variables stem:[x_(1)
      , " " x_(2) , " " ... , " " x_(n)] is denoted by stem:[f ( x_(1) , " " x_(2)
      , " " ... , " " x_(n) )].
  - content: In many practical applications in electrotechnology, functions of one
      variable are used. This variable is often the duration and the function is then
      called "function of time" and denoted by stem:[f](stem:[t]). But the variables
      may also be space variables (e.g. coordinates), frequency, etc.
