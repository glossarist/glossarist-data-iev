  definition:
  - content: réflexion pour laquelle le module du facteur de réflexion complexe d'une
      surface lisse séparant deux milieux diélectriques est égal à l'unité
  examples: []
  id: 705-04-19
  notes:
  - content: La réflexion totale se produit lorsque l'indice de réfraction du second
      milieu est inférieur à celui du premier, et que l'angle d'incidence est supérieur
      à un angle limite.
  - content: Lors d'une réflexion totale, il existe un champ évanescent dans le deuxième
      milieu.
