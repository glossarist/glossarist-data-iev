  definition:
  - content: maximum possible {{average transinformation rate, urn:iec:std:iec:60050-171-07-31}},
      which can be achieved with an arbitrary small {{error probability, urn:iec:std:iec:60050-171-06-08}}
      by use of an appropriate {{code, urn:iec:std:iec:60050-171-01-15}}
  examples: []
  id: 171-07-33
  notes:
  - content: The channel time capacity is one way to express quantitatively the ability
      of a given channel subject to specific constraints to transmit messages from
      a specified message source.
  - content: The channel time capacity can be expressed in a unit such as the shannon
      per second (Sh/s).
