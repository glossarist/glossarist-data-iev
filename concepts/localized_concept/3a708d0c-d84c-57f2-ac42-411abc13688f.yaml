  definition:
  - content: the time response of a device produced by the application of a Dirac
      delta-function to the input of the device
  examples: []
  id: 731-01-55
  notes:
  - content: The impulse response is the inverse Laplace or Fourier transform of the
      transfer function. Its convolution with the input function gives the output
      function.
