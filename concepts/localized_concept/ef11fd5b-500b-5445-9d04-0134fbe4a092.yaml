  definition:
  - content: degradation of the reception of a wanted signal caused by a radio-frequency
      disturbance
  examples: []
  id: 713-11-05
  notes:
  - content: The English words “interference” and “disturbance” are often used indiscriminately.
      The expression “radio-frequency interference” is also commonly applied to a
      radio-frequency disturbance or an unwanted signal.
  - content: Various levels of interference are defined for administrative purposes
      in the ITU Radio Regulations viz. permissible interference, accepted interference
      and harmful interference.
