  definition:
  - content: système d'équations reliant les quatre grandeurs vectorielles qui déterminent
      le champ électromagnétique dans un milieu matériel ou dans le vide et les deux
      grandeurs densité de courant électrique et charge électrique volumique
  examples: []
  id: 121-11-62
  notes:
  - content: "Les équations de Maxwell, sous leur forme différentielle, sont:\n\nstem:[mathbf(rot)
      \" \" E = - \" \" frac(del \" \" B)(del \" \" t)]\n\nstem:[\"div\" \" \" \" \"
      D = rho]\n\nstem:[mathbf(rot) \" \" H = J + \" \" frac(del \" \" D)(del \" \"
      t)]\n\nstem:[\"div\" \" \" \" \" B = 0]\r\noù *rot* et div désignent respectivement
      le rotationnel et la divergence, stem:[*E*] , stem:[*D*] , stem:[*H*]  et stem:[*B*]
      \ sont les quatre grandeurs vectorielles déterminant le champ électromagnétique,
      \ stem:[*J*] est la densité de courant électrique, stem:[ρ]  la charge électrique
      volumique et stem:[t]  le temps."
  - content: Les équations de Maxwell ne déterminent entièrement le champ électromagnétique
      dans un milieu donné que si on leur adjoint les relations spécifiques du milieu,
      appelées souvent relations constitutives; dans le cas d'un milieu linéaire,
      ces relations font intervenir la permittivité, la perméabilité et la conductivité
      du milieu.
