  definition:
  - content: quantity relating to the difference in luminance between two surfaces
  examples: []
  id: 845-22-091
  notes:
  - content: Widely accepted definitions include:* C = (L1 − L2)/L1 with L1 > L2 (positive
      contrast),* C = (L1 − L2)/L1 with L1 < L2 (negative contrast), * C = (L1 − L2)/(L1
      + L2) with L1 > L2, where stem:[C] is the luminance contrast and stem:[L]~1~
      and stem:[L]~2~ are the luminances of the two surfaces.
  - content: Although luminance contrast is intended to correlate with brightness
      contrast, it is possible that it does not do so directly because brightness
      contrast depends on other factors such as the angular separation, the luminance
      gradient, and any size difference between the two surfaces.
  terms:
