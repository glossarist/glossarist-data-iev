  definition:
  - content: at a given point of a given surface, area of a surface element containing
      the point and contained in a sphere of infinitesimal radius
  examples: []
  id: 102-05-06
  notes:
  - content: For a surface defined by *stem:[r]* = *stem:[f]*(stem:[u], stem:[v])
      where stem:[( u , v ) in "U" subseteq R^("2")], the scalar surface element is
      given by stem:[|frac(del f)(del u) xx frac(del f)(del v)| * rm(d) u rm(d) v].
  - content: For a surface defined by the equation stem:[z] = stem:[f](stem:[x], stem:[y]),
      the scalar surface element is given by  stem:[sqrt(1 + (frac(del f)(del x))^(2)
      + (frac(del f)(del y))^(2)) rm(d) x rm(d) y].
  terms:
