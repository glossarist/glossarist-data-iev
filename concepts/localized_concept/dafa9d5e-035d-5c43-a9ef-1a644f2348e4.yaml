data:
  definition:
  - content: 'relation entre deux entités stem:[a] et stem:[b], ayant les propriétés
      suivantes: * réflexivité: a = a, * symétrie: si a = b alors b = a, * transitivité:
      if a = b et b = c alors a = c, où c est une troisième entité, * si a = b et
      ℛ{u} est un énoncé quelconque concernant l''entité u, alors ℛ{a} est vrai si
      et seulement si ℛ{b} est vrai'
