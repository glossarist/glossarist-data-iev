  id: 103-02-05
  notes:
  - content: The harmonic mean value of a periodic quantity is usually taken over
      an integration interval the range of which is the period multiplied by a natural
      number.
  - content: The harmonic mean value of a quantity is denoted by adding the subscript
      h to the symbol of the quantity.
