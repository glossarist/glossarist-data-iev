      ou d'une {{exigence, urn:iec:std:iec:60050-901-05-05}}
  examples: []
  id: 901-05-01
  notes:
  - content: Ces types de dispositions se distinguent par leur formulation; ainsi
      les instructions sont-elles exprimées généralement à l'infinitif, parfois à
      l'impératif; les recommandations s'accompagnent généralement de la formule «il
      convient de», tandis que les exigences utilisent plutôt la formule «doit».
