  definition:
  - content: expression figurant dans le contenu d'un {{document normatif, urn:iec:std:iec:60050-901-02-01}}
      prenant la forme d'un {{énoncé, urn:iec:std:iec:60050-901-05-02}}, d'une {{instruction,
