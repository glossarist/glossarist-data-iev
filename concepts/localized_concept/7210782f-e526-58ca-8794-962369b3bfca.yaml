  definition:
  - content: the condition which exists when the receiving polarization of an antenna
      in a specified direction is the same as the polarization of the wave received
      from that direction
  examples: []
  id: 712-02-09
  notes:
  - content: If no direction is specified, the direction is assumed to be that of
      the maximum received power.
