  definition:
  - content: a method of source coding using the difference between the value of a
      sample and a predicted value
  examples: []
  id: 723-10-47
  notes:
  - content: For signals having strong correlation between successive samples, a reduction
      of bit rate can be attained by differential coding, since fewer quantization
      intervals may be used to quantize differences than would be required for quantizing
      sample values with comparable precision.
