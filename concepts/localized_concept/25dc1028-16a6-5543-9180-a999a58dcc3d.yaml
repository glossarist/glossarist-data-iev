---
data:
  definition:
  - content: 'durée stem:[t]~SU~ entre l’application de la tension d’alimentation
      de l’oscillateur et le temps pendant lequel le signal de sortie RF de la fréquence
      souhaitée par le résonateur à quartz remplit les conditions spécifiées suivantes:
      . pour les formes d’onde quasi-sinusoïdales, l’enveloppe du signal représente
      90 % de l’amplitude crête à crête en régime établi ; . pour les formes d’onde
      d’impulsion, la séquence d’impulsion de sortie est de type périodique proche
      de la fréquence en régime établi, son niveau bas VLO restant inférieur à VOL
      et son niveau élevé VHI dépassant VOH définitivement, où VOH et VOL sont définis
      par la famille de logique applicable'
