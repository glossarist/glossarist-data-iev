  definition:
  - content: "garniture insérée entre les faces de raccordement de deux brides de
      guide d'ondes afin d'assurer au moins une des fonctions essentielles suivantes:\r\na)
      réduire les fuites de gaz qui altèrent la pression interne du guide d'ondes,\n\nb)
      prévenir l'introduction de tout corps étranger à l'intérieur d'un guide d'ondes,\n\nc)
      réduire les fuites d'énergie et les amorçages d'arcs"
