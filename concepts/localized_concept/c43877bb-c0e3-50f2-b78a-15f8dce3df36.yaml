  definition:
  - content: pour un circuit magnétique construit avec différents matériaux ou avec
      des matériaux non homogènes, perméabilité d'une substance homogène fictive qui,
      si on l'utilisait pour construire un circuit de dimensions identiques, fournirait
      la même réluctance
  examples: []
  id: 221-03-17
  notes:
  - content: "Lorsque les différents matériaux sont disposés en série sur le parcours
      du champ magnétique et que la perméabilité peut être supposée constante sur
      toute la surface d'une section droite quelconque, la formule suivante est applicable:\r\nstem:[frac(1)(mu_(\"e\"))
      sum frac(l)(A) = sum frac(l)(mu_(\"r\") A)]\r\noù stem:[l] est la longueur,
      mesurée le long du parcours du champ magnétique, de chaque élément du noyau
      de section droite constante stem:[A] et de perméabilité homogène stem:[µ]~r~."
  - content: La perméabilité effective est particulièrement utilisée pour les noyaux
      comportant un entrefer et son usage est habituellement restreint au cas où le
      flux de fuite est relativement faible.
