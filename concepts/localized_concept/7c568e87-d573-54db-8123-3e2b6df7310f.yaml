  definition:
  - content: for a given point of an oriented curve with an origin point, real number,
      the absolute value of which is the length of the curve between the origin and
      the given point, and the sign is positive or negative depending on whether the
      path from the origin to the given point is consistent or not with the orientation
      of the curve
  examples: []
  id: 102-04-22
  notes:
  - content: For a curve defined by the position vector stem:[r = f ( u )] as a function
      of the parameter stem:[u], with an origin O corresponding to stem:[u = 0], the
      abscissa of the point M corresponding to stem:[u] = stem:[u]~M~ is the line
      integral stem:[int_("O")^("M") |rm(d) r| = int_("0")^(u_("M")) |frac(rm(d) f)(rm(d)
      u)| rm(d) u].
  - content: In the usual geometrical space, the abscissa along a curve is a quantity
      of the dimension length.
  terms:
