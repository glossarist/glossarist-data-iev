data:
  definition:
  - content: "répartition des exigences relatives à la sûreté de fonctionnement d’une
      entité entre les sous-entités constitutives\r\nNote 1 à l’article: L’allocation
      est une méthode quantitative qui peut être appliquée à des caractéristiques
      mesurables, comme la fiabilité, la maintenabilité et la disponibilité. Note
      2 à l’article: L’allocation est normalement menée à l’aide d’un modèle. Note
      3 à l’article: Voir aussi modèle de fiabilité ({{192-11-02, urn:iec:std:iec:60050-192-11-02}})
      et diagramme de fiabilité ({{192-11-03, urn:iec:std:iec:60050-192-11-03}})."
