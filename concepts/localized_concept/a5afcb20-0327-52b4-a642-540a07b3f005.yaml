  definition:
  - content: "the fractional decrease of permeability of a magnetic material measured
      at constant temperature at the beginning and at the end of a given time interval:\r\nstem:[D
      = frac(mu_(1) - mu_(2))(mu_(1))]\r\nwhere stem:[µ]~1~ and stem:[µ]~2~ are the
      values of the permeabilities at the beginning and at the end of the given interval
      respectively"
