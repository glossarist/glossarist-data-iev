      de paires d'ions formées lorsqu'une particule directement ionisante d'énergie
      initiale stem:[E] est complètement arrêtée par le gaz\r\nstem:[W = frac(E)(bar(N))]"
  examples: []
  id: 881-12-46
  notes:
