  definition:
  - content: the wave impedance for a travelling wave in a specific medium
  examples: []
  id: 705-03-23
  notes:
  - content: "The characteristic impedance of a homogeneous isotropic medium is given
      by:\r\nstem:[Z_(\"i\") = sqrt(frac(mu_(0) underline(mu)_(\"r\"))(epsilon_(0)
      underline(epsilon)_(\"r\")))]\n\nwhere\n\nstem:[μ]~0~ is the magnetic constant,\n\nstem:[<u>μ</u>]~r~
      is the relative complex permeability,\n\nstem:[ε]~0~ is the electric constant,\n\nstem:[<u>ε</u>]~r~
      is the relative complex permittivity."
