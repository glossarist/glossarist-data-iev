data:
  definition:
  - content: 'mesure facultative de la stabilité de fréquence dans le domaine de fréquenceNote
      1 à l’article: La modulation de fréquence résiduelle est mieux décrite en termes
      de spectre du signal de bande de base résultant en appliquant le signal de l’oscillateur
      à un circuit discriminateur idéal de caractéristiques spécifiques. Note 2 à
      l’article: Si la largeur de bande de détection est correctement spécifiée, la
      modulation de fréquence résiduelle peut être exprimée comme une proportion relative
      de la fréquence de sortie (par exemple: 2 x 10^–8^ rms dans une bande de 10
      kHz).'
