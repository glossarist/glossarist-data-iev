data:
  definition:
  - content: 'déconnexion de la charge de clients de la source d’alimentation électriqueNote
      1 à l’article: Elle consiste en l’arrêt de l''alimentation d''un ou de plusieurs
      clients. Note 2 à l’article: Certaines normes définissent l’interruption de
      fourniture comme un état dans lequel la tension aux bornes d’alimentation des
      clients est inférieure à un pourcentage donné de la tension déclarée. Note 3
      à l’article: Les interruptions de fourniture sont parfois classées comme fixées
      à l’avance (catégorie selon laquelle les clients sont informés afin de permettre
      l’exécution des travaux programmés sur le réseau) ou accidentelles (interruptions
      occasionnées par des pannes permanentes ou transitoires, principalement liées
      à des événements externes, des défaillances de matériel ou des perturbations).
      Note 4 à l’article: Cet article portait le numéro 603-05-11 dans l’IEC 60050-603:1986.'
