---
data:
  definition:
  - content: espérance mathématique de la {{quantité d'information, urn:iec:std:iec:60050-171-07-14}}
      des événements d'un ensemble exhaustif d'événements s'excluant mutuellement
      stem:[H = sum_(i = 1)^(n) p ( x_(i) ) * I ( x_(i) ) = sum_(i = 1)^(n) p ( x_(i)
      ) * log ( frac(1)(p ( x_(i) )) )] où stem:[X = {x_(1) , " " ... , " " x_(n)}]
      est l'ensemble des événements stem:[x_(i) " " (i = 1, " " ... , " " n)], stem:[I
      ( x_(i) )] sont leurs quantités d'information et stem:[p ( x_(i) )] leurs probabilités
      de réalisation, avec stem:[sum_(i = 1)^(n) p ( x_(i) ) = 1]
  examples:
  - content: Soit stem:[{a , b , c}] un jeu de trois événements dont les probabilités
      de réalisation sont stem:[p ( a ) = 0,5], stem:[p ( b ) = 0,25] et stem:[p (
      c ) = 0,25]. L'entropie de ce jeu est stem:[H ( X ) = p ( a ) * I ( a ) + p
      ( b ) * I ( b ) + p ( c ) * I ( c ) = 1,5 " " Sh].
