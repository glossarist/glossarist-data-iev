  definition:
  - content: conventional physical constant which relates the {{amount of substance,
      urn:iec:std:iec:60050-113-02-07}} to the number of entities in a given sample,
      the value of which is set to 6,022 140 76 × 10^23^ {{mol, urn:iec:std:iec:60050-112-02-09}}^−1^
  examples: []
  id: 113-02-08
  notes:
  - content: 'The definition of the Avogadro constant in IEV 113-02-08:2014-05 was:
      "fundamental physical constant equal to the number stem:[N] of elementary entities
      in a given sample of matter, divided by the amount of substance stem:[n] of
      that sample, stem:[N]~A~=stem:[N]/stem:[n]", incorrectly describing the Avogadro
      constant as a "fundamental physical constant".'
  - content: The Avogadro constant is used in the {{SI, urn:iec:std:iec:60050-112-02-02}}
      to define the {{mole, urn:iec:std:iec:60050-112-02-09}}.
  - content: The term “Avogadro number” is deprecated since a number is a quantity
      with unit one, and it is used for a different concept (see {{IEV 113-02-18,
      urn:iec:std:iec:60050-113-02-18}}).
