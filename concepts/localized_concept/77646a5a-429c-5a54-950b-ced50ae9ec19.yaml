  definition:
  - content: "constante scalaire stem:[μ]~0~ reliant les grandeurs électromagnétiques
      et les grandeurs mécaniques, obtenue d'après la relation\r\nstem:[frac(F)(l)
      = frac(mu_(0))(2 pi) \" \" * \" \" frac(|I_(1) I_(2)|)(d)]\r\noù stem:[F/l]
      est la norme de la force linéique s'exerçant entre deux conducteurs parallèles,
      rectilignes, de longueur infinie, de section circulaire négligeable, placés
      à une distance stem:[d] l'un de l'autre dans le vide et parcourus par des courants
      électriques stem:[I]~1~ et stem:[I]~2~"
  examples: []
  id: 121-11-14
  notes:
  - content: "Dans le vide, le produit de la constante magnétique par le champ magnétique
      stem:[*H*] est égal à l'induction magnétique stem:[*B*]:\r\nstem:[*B*] = stem:[μ]~0~stem:[*H*]"
  - content: |-
      La constante magnétique est liée à la constante électrique stem:[ε]~0~ et à la vitesse de la lumière dans le vide stem:[c]~0~ par la relation

      stem:[μ]~0~stem:[ε]~0~stem:[c]~0~^2^ = 1
  - content: "La valeur de la constante magnétique est égale exactement à\r\n4π ×
      10^−7^ m kg s^−2^ A^−2^ = 1,256 637 061 4... μH/m"
