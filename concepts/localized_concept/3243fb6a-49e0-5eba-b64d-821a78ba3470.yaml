  definition:
  - content: "one of the three symmetrical sequence components which exists only in
      an unsymmetrical three-phase system of sinusoidal quantities and which is defined
      by the following complex mathematical expression:\r\nstem:[<u>X</u>]~0~ = 1/3
      (stem:[<u>X</u>]~L1~ + stem:[<u>X</u>]~L2~ + stem:[<u>X</u>]~L3~)\n\nwhere stem:[<u>X</u>]~L1~,
      stem:[<u>X</u>]~L2~ and stem:[<u>X</u>]~L3~ are the complex expressions of the
      phase quantities concerned, and where stem:[<u>X</u>] denotes the system current
      or voltage phasors"
