  definition:
  - content: qualifie chacun de deux phénomènes variables dans le temps, de deux trames
      temporelles ou de deux signaux dont les instants significatifs homologues apparaissent
      à la même cadence, les écarts entre les cadences réelles étant maintenus entre
      des limites spécifiées
