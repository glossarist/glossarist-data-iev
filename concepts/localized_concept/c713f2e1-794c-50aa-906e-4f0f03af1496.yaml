      de sa propre structure mécanique
  examples: []
  id: 551-14-13
  notes:
  - content: Des termes similaires sont utilisés pour des blocs ou des ensembles comprenant
      des valves électroniques particulières, par exemple bloc de diodes (composé
      uniquement de diodes de redressement), ensemble de thyristors (composé de thyristors
      seuls ou combinés avec des diodes de redressement).
