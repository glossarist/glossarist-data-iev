  definition:
  - content: a signalling method in which fixed length signal units are transmitted
      continuously at a uniform bit rate over a signalling channel, and in which the
      receiving terminal is operated in the correct time relationship for the reception
      of the signal units
  examples: []
  id: 714-13-14
  notes:
  - content: The two signalling channels in opposite directions in a signalling link
      are not necessarily synchronized to each other.
  terms:
  - type: expression
    normative_status: preferred
    designation: synchronous signalling
