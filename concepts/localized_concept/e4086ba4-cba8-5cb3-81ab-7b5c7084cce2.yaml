  definition:
  - content: ensemble des chiffres et éventuellement d'autres caractères qui, en un
      point du réseau de télécommunication, déterminent l'extrémité demandée ou sont
      nécessaires pour l'acheminement
  examples: []
  id: 714-07-05
  notes:
  - content: Les chiffres constituant l'adresse émise par le demandeur peuvent être
      modifiés par la traduction ou par l'absorption de chiffres à mesure que la chaîne
      de connexion est établie progressivement à travers le réseau, mais les chiffres
      nouveaux ou restants en chaque point constituent l'adresse en ce point.
