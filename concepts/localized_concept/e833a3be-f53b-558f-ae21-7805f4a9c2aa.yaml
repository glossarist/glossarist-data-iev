  definition:
  - content: "the arithmetic difference between the no-load voltage of a winding and
      the voltage developed at the terminals of the same winding at a specified load
      and power factor, the voltage supplied to (one of) the other winding(s) being
      equal to:\r\n- its rated value if the transformer is connected on the principal
      tapping (the no-load voltage of the former winding is then equal to its rated
      value);\n\n- the tapping voltage if the transformer is connected on another
      tapping.\r\nThis difference is generally expressed as a percentage of the no-load
      voltage of the former winding"
  examples: []
  id: 421-07-03
  notes:
  - content: For multi-winding transformers, the voltage drop or rise depends not
      only on the load and power factor of the winding itself, but also on the load
      and power factor of the other windings.
  terms:
  - type: expression
    normative_status: preferred
    designation: voltage drop or rise for a specified load condition
  - type: expression
    designation: voltage regulation for a specified load condition
