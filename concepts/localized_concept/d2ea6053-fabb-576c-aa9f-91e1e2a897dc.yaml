  definition:
  - content: zone où la réception d'un émetteur de radiodiffusion sonore, faisant
      partie d'un réseau synchronisé, est affectée d'évanouissements et de distorsions
      dues à l'interférence entre l'onde de sol de cet émetteur et les ondes ionosphériques
      des autres émetteurs du réseau
  examples: []
  id: 723-03-66
  notes:
  - content: Cette notion ne s'applique en pratique qu'aux émetteurs en ondes kilométriques
      et hectométriques.
