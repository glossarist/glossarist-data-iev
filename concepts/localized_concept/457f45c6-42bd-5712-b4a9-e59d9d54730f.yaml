  definition:
  - content: change in radiant energy with timestem:[Phi_("e") = frac("d" Q_("e"))("d"
      t)]where stem:[Q]~e~ is the radiant energy emitted, transferred or received,
      and stem:[t] is time
  examples: []
  id: 845-21-038
  notes:
  - content: The corresponding photometric quantity is "luminous flux". The corresponding
      quantity for photons is "photon flux".
  - content: The term "radiant flux" is the preferred term for most radiometric applications,
      with the notable exception of laser radiometry where the term "radiant power"
      is more commonly used.
  - content: The radiant flux is expressed in watt (W).
  - content: This entry was numbered 845-01-24 in IEC 60050-845:1987.
  terms:
