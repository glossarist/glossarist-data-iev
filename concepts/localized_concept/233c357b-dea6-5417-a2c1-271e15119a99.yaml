  definition:
  - content: matériel constitué d'un ou plusieurs éléments de chauffage par résistance
      associés avec tous les dispositifs nécessaires pour assurer que la température
      limite n'est pas dépassée
  examples: []
  id: 426-08-09
  notes:
  - content: Il n'est pas imposé que les dispositifs de sécurité nécessaires pour
      assurer que la température limite n'est pas dépassée soient du Mode de Protection
      "e" ou d'un quelconque autre Mode de Protection, lorsqu'ils sont placés à l'extérieur
      de l'emplacement dangereux.
