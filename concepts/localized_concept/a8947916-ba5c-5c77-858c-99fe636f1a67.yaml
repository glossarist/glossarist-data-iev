data:
  definition:
  - content: suite des étapes identifiables que traverse une entité, de sa conception
      à sa mise au rebut
  examples:
  - content: 'Le cycle de vie classique d’un système comprend les phases suivantes:
      faisabilité et définition, conception et développement, fabrication et mise
      en service, exploitation et maintenance, rénovation en cours de vie ou prolongation
      de la durée de vie, mise hors service et mise au rebut. Note 1 à l’article:
      Les étapes identifiées varient en fonction de l’application.'
