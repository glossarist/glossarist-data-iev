  definition:
  - content: product of the luminance in a specified direction and the apparent area
      of the pupil (natural or artificial) seen from that direction
  examples: []
  id: 845-22-010
  notes:
  - content: Conventional retinal illuminance applies to situations where the eye
      is viewing a surface of uniform luminance larger than the area of the natural
      or artificial pupil.
  - content: The conventional retinal illuminance is expressed in candela (cd), candela
      per square metre times square millimetre (cd·m^−2^·mm^2^), or {{troland, urn:iec:std:iec:60050-845-22-038}}.
