  definition:
  - content: stem:[delta ( epsilon ) = - ln frac(Phi^(prime)_("e"))(Phi_("e"))]where
      stem:[Φ]~e~ is the radiant flux of a collimated beam entering the upper limit
      layers of the atmosphere at an angle stem:[ε] to the vertical, and stem:[Phi^(prime)_("e")]
      is the attenuated radiant flux of that beam reaching the surface of the Earth
