  definition:
  - content: hollow sphere, the interior of which is formed from, or coated with,
      a diffusely-reflecting material that is as spectrally neutral and as spatially
      uniform as possible
  examples: []
  id: 845-25-028
  notes:
  - content: Owing to the internal reflections within the sphere, the illuminance
      on any part of the inside surface of the sphere for which the direct flux is
      hidden is theoretically proportional to the luminous flux entering the sphere
      or produced inside the sphere. The illuminance of the internal sphere wall can
      be measured via a small window.
  - content: The window of an integrating sphere is often used in radiometric measurement
      systems to provide a source with good spatial uniformity and with an angular
      distribution of radiance or luminance that is close to Lambert's cosine law.
  - content: This entry was numbered 845-05-24 in IEC 60050-845:1987.
