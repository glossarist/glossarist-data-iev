  definition:
  - content: "pour un réseau contenant stem:[l] boucles orientées et stem:[b] branches,
      chacune des branches étant munie d'un sens de référence, matrice de format stem:[l] × stem:[b]
      dont l'élément stem:[a]~stem:[ij]~ est égal à\r\n* 0 si la branche j n'est pas
      dans la boucle i* 1 si la branche j est dans la boucle i avec le même sens*
      −1 si la branche j est dans la boucle i avec le sens opposé"
  examples: []
  id: 131-13-22
  notes:
  - content: "– La figure représente un réseau et la matrice d'incidence branche-maille
      correspondante lorsque les deux boucles 1 et 2 sont orientées en sens contraire
      des aiguilles d'une montre.\r\nimage::/assets/images/parts/131/[]"
