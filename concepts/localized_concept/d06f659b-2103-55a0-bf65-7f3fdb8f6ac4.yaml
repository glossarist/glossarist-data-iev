  definition:
  - content: pour deux matrices *stem:[A]* de format stem:[m] × stem:[p] et *stem:[B]*
      de format stem:[p] × stem:[n], dont les éléments sont respectivement stem:[A~ik~]
      et stem:[B~kj~], matrice *stem:[AB]* de format stem:[m] × stem:[n] dont les
      éléments sont stem:[(A B)_(i j) = sum_(k = 1)^(p) A_(i k) B_(k j)].
