  definition:
  - content: an hypothetical radiating element consisting of a closed loop of vanishingly
      small dimensions traversed by a time-varying current having at any instant the
      same value at all points
  examples: []
  id: 712-04-22
  notes:
  - content: The radiation from this element is the same as that from a fictitious
      time-varying magnetic current element perpendicular to the plane of the loop.
