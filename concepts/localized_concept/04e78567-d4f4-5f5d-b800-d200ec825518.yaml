  definition:
  - content: one or more conduits that supply fluid to or collect it from the {{fuel
      cell, urn:iec:std:iec:60050-485-08-01}} or the {{fuel cell stack, urn:iec:std:iec:60050-485-06-01}}
  examples: []
  id: 485-06-15
  notes:
  - content: External manifold design refers to a fuel cell stack where the gas mixtures
      are supplied from a central source to large fuel and oxidant inlets covering
      adjacent sides of the fuel cell stack and sealed with properly designed gaskets.
      The exhaust gases are collected on the opposite sides with similar systems.
  - content: Internal manifold design refers to a system of ducts inside the fuel
      cell stack and penetrating the {{bipolar plates, urn:iec:std:iec:60050-485-06-04}}
      that distributes the gas flows among the cells.
