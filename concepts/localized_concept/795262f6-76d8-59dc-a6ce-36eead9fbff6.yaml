  definition:
  - content: "dans un noyau magnétique fonctionnant dans le domaine de Rayleigh, quotient
      de la tangente de l'angle de pertes magnétiques par hystérésis par le produit
      de la valeur de crête stem:[î] du courant dans la bobine associée au noyau et
      de la racine carrée de l'inductance stem:[L] de la bobine:\r\nstem:[eta_(i)
      = frac(\"tan\" \" \" \" \" delta_(\"h\"))(î sqrt(L))]"
  examples: []
  id: 221-03-34
  notes:
  - content: "La relation entre la constante hystérétique d'un matériau stem:[η]~B~
      et la constante hystérétique d'un noyau est:\r\nstem:[eta_(i) = eta_(B) sqrt(frac(mu_(0)
      \" \" mu_(\"e\")^(3))(V_(\"e\")))]\r\noù stem:[μ]~e~ est la perméabilité effective
      et stem:[V]~e~ le volume équivalent."
