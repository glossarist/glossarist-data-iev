  definition:
  - content: 'matériau présentant le phénomène de supraconductivité dans des conditions
      appropriéesNote 1 à l’article: Se dit souvent de fils électriques, en masses
      ou films minces, constitués d’un matériau supraconducteur. Note 2 à l’article:
      Les conditions appropriées concernent la température, le champ magnétique, la
      déformation et la densité de courant électrique.'
