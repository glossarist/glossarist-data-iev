  definition:
  - content: smallest contrast, produced at the eye of an observer by a given object,
      which renders the object perceptible against a given background
  examples: []
  id: 845-31-019
  notes:
  - content: For meteorological observations, the object has to be rendered recognizable,
      and hence a higher threshold is to be expected. The value of 0,05 has been adopted
      as the basis for the measurement of {{meteorological optical range, urn:iec:std:iec:60050-845-31-018}}.
  - content: This entry was numbered 845-11-21 in IEC 60050-845:1987.
