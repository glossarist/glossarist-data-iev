  definition:
  - content: "наложенный на кабель заземленный металлический слой, ограничивающий
      электрическое поле в пределах кабеля и (или) защищающий кабель от внешнего электрического
      воздействия\r\nПримечание. Металлические оболочки, фольга, оплетки, броня и
      заземленные концентрические токопроводящие жилы могут также служить в качестве
      общих экранов"
