  definition:
  - content: 'for a complex matrix *stem:[A]* with elements stem:[A~ij~], matrix denoted
      by *stem:[A]*^H^, equal to the complex conjugate of the transpose matrix: *stem:[A]*^H^
      = (*stem:[A]*^T^)* or for elements stem:[(A^(H))_(i j) = A_(j i)^(*)]'
  examples: []
  id: 102-06-19
  notes:
  - content: If the matrix *stem:[A]* is real, the Hermitian conjugate matrix reduces
      to the transpose matrix.
  - content: The Hermitian conjugate matrix of a matrix *stem:[A]* is denoted by *stem:[A]*^H^
      or sometimes *stem:[A]*^†^. The notation *stem:[A]** is also used in mathematics.
