  definition:
  - content: "telecommunication services supplementing conventional telegraphic or
      telephonic services, generally using teleprocessing techniques to permit a user
      to receive or send public or private information, or to effect operations such
      as file consultation, reservations, commercial or banking transactions\r\nExamples
      of telematics services: facsimile, teletex, videography, telewriting."
  examples: []
  id: 701-01-16
  notes:
  - content: Telematics services do not include broadcasting of sound or television
      programmes.
