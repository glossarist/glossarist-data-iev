  definition:
  - content: conditionnement d’une éprouvette pour effacer ou neutraliser partiellement
      l’effet de son histoire antérieure, principalement en ce qui concerne la température
      et l’humidité auxquelles elle a été exposée
  examples: []
  id: 212-12-02
  notes:
  - content: Le préconditionnement est parfois désigné en anglais par le terme «normalizing».
  - content: Le préconditionnement précède d’ordinaire le conditionnement de l’éprouvette.
      Lorsque la température et l’humidité prévues pour le conditionnement sont les
      mêmes que celles qui sont prescrites pour le préconditionnement, ce dernier
      peut remplacer le conditionnement.
