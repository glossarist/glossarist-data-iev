  definition:
  - content: pseudo-scalar, denoted by (*stem:[U]*,*stem:[V]*,*stem:[W]*), assigned
      to an ordered set of three vectors *stem:[U]*, *stem:[V]*, *stem:[W]* in the
      three-dimensional Euclidean space, equal to the scalar product stem:[U * ( V
      xx W )]
  examples: []
  id: 102-03-38
  notes:
  - content: 'The scalar triple product of three vectors *stem:[U]*, *stem:[V]*, *stem:[W]*
      is the determinant of the vectors relative to a given orthonormal base: stem:[(U
      , "​" " " " " V , " " W) = |[U_("1"), U_("2"), U_("3")], [V_("1"), V_("2"),
      V_("3")], [W_("1"), W_("2"), W_("3")]|]'
  - content: The scalar triple product of three position vectors is the volume of
      the parallelepiped built from the vectors with a sign depending on the space
      orientation.
  terms:
