  id: 845-22-081
  notes:
  - content: In the horizontal plane meridian the field of vision extends to nearly
      190° with both eyes open, the area seen binocularly is about 120°, and the area
      seen by one eye only is about 154°.
  - content: The extent of the field of vision tends to diminish with age.
