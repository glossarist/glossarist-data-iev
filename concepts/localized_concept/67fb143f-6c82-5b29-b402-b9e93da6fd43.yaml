  definition:
  - content: propriété du résultat d’une mesure ou de la valeur d’un étalon telle
      qu’elle puisse être reliée à des références déterminées, généralement des étalons
      nationaux ou internationaux, par l’intermédiaire d’une chaîne ininterrompue
      de comparaisons ayant toutes des incertitudes déterminées
  examples: []
  id: 311-01-15
  notes:
  - content: Ce concept est souvent exprimé par l’adjectif traçable.
  - content: La chaîne ininterrompue de comparaisons est appelée chaîne de raccordement
      aux étalons ou chaîne d’étalonnage.
  - content: En français la manière dont s’effectue la liaison aux étalons est appelée
      raccordement aux étalons.
