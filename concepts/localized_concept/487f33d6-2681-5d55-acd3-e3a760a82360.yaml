  definition:
  - content: "unité fonctionnelle avec deux entrées ou plus et une seule sortie, dont
      la variable de sortie a pour valeur la somme algébrique des valeurs des variables
      d'entrée multipliées par des facteurs de pondération constantsstem:[v (t) =
      K_(1) * u_(1) (t) + K_(2) * u_(2) (t) + ...]où<table>\r\n<tr>\n<td>stem:[t]</td>\n<td>est
      le temps;</td>\n</tr>\r\n<tr>\n<td>\nstem:[K]~1~, stem:[K]~2~\n</td>\n<td>sont
      les facteurs de pondération;</td>\n</tr>\r\n<tr>\n<td>\nstem:[u]~1~, stem:[u]~2~\n</td>\n<td>sont
      les variables d’entrée;</td>\n</tr>\r\n<tr>\n<td>stem:[v]</td>\n<td>est le résultat
      de sommation.</td>\n</tr>\r\n</table>"
