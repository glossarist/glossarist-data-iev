  definition:
  - content: "in a magnetic core operating in the Rayleigh region, the tangent of
      the magnetic loss angle due to hysteresis divided by the product of the peak
      current stem:[î] in, and the square root of the inductance stem:[L] of, the
      measuring coil:\r\nstem:[eta_(i) = frac(\"tan\" \" \" \" \" delta_(\"h\"))(î
      sqrt(L))]"
  examples: []
  id: 221-03-34
  notes:
  - content: "The relation between the hysteresis material constant stem:[η]~B~ and
      the hysteresis core constant is:\r\nstem:[eta_(i) = eta_(B) sqrt(frac(mu_(0)
      \" \" mu_(\"e\")^(3))(V_(\"e\")))]\r\nwhere stem:[μ]~e~ is the effective permeability
      and stem:[V]~e~ the effective volume."
