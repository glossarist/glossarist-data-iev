---
data:
  definition:
  - content: "{{dispositif, urn:iec:std:iec:60050-511-01-01}} dont les éléments matériels
      ou l'assemblage de tels éléments présentent des performances ou des fonctions
      qui ne sont possibles qu'avec les nanotechnologies"
  examples: []
  id: 511-01-16
  notes:
  - content: L'élément matériel est un {{nanomatériau, urn:iec:std:iec:60050-511-01-04}}.
  - content: Les performances ou les fonctions présentées sont mesurables et significatives
      pour l'application du dispositif nanotechnologique.
  - content: Les applications de dispositifs nanotechnologiques peuvent inclure, entre
      autres, les dispositifs de stockage de l'énergie ({{condensateurs, urn:iec:std:iec:60050-151-13-28}},
      matériaux pour les {{batteries ion-lithium, urn:iec:std:iec:60050-482-05-07}},
      les membranes pour les piles à combustible, etc.), les applications photovoltaïques,
      l'{{électronique organique, urn:iec:std:iec:60050-511-02-03}} et les dispositifs
      électro-optiques.
