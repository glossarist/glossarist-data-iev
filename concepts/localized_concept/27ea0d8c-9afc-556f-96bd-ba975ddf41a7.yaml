  definition:
  - content: "pour une réaction chimique donnée stem:[α]A + stem:[β]B + … ↔ stem:[σ]S
      + stem:[τ]T + …, grandeur donnée par stem:[r = frac(1)(alpha) frac(\"d\" c (
      \"A\" ))(\"d\" t) = frac(1)(beta) frac(\"d\" c ( \"B\" ))(\"d\" t) = frac(1)(sigma)
      frac(\"d\" c ( \"S\" ))(\"d\" t) = frac(1)(tau) frac(\"d\" c ( \"T\" ))(\"d\"
      t)]\r\noù A, B,... désignent les réactifs, S, T,... désignent les produits,
      −stem:[α], −stem:[β], …, stem:[σ], stem:[τ], … sont les nombres stœchiométriques
      correspondants, et stem:[c](A), stem:[c](B), …, stem:[c](S), stem:[c](T), …
      sont respectivement les concentrations en quantité de matière de A, B, ... S,
      T, ...\r\nNote 1 à l’article: L’unité SI cohérente de vitesse de réaction est
      la mole par mètre cube seconde, mol m^−3^ s^−1^."
