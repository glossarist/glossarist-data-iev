  definition:
  - content: illuminance produced by direct sunlight on a surface on the Earth that
      is perpendicular to the direction of illumination by the Sun
  examples: []
  id: 845-29-129
  notes:
  - content: Normal solar illuminance is not the same as direct solar illuminance,
      which is measured on a horizontal surface on the Earth, not necessarily perpendicular
      to the direction of illumination by the Sun.
  - content: The normal solar illuminance is expressed in lux (lx = lm·m^−2^).
