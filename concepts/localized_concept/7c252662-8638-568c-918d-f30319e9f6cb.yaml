  definition:
  - content: "{{transducer, urn:iec:std:iec:60050-151-13-34}} that generates an electric
      output corresponding to the incident light"
  examples: []
  id: 523-04-19
  notes:
  - content: 'Photoelectric transducers are divided into two groups according to their
      applications: 1) a photodetector that handles light signals, and 2) a photovoltaic
      power system, such as a solar battery, that responds to light energy. In the
      former case, sensitivity and response speed are important, while in the latter
      case, energy conversion efficiency is important. Classified by their operating
      principles, photoelectric transducers can be divided into a photoconductive
      type, typified by {{photoconductive cells, urn:iec:std:iec:60050-521-04-33}}
      and image pick-up tubes, and a photovoltaic type, typified by {{photodiodes,
      urn:iec:std:iec:60050-521-04-32}} and solar batteries.'
