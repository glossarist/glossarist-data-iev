  definition:
  - content: minimum distance in air to be maintained between any part of the body
      of a worker, including any object (except {{tools, urn:iec:std:iec:60050-651-21-14}}
      appropriate for {{live working, urn:iec:std:iec:60050-651-21-01}}) being handled
      directly, and any part(s) at different electric potential(s)
  examples: []
  id: 651-21-11
  notes:
  - content: The minimum approach distance is the sum of the {{electrical distance,
      urn:iec:std:iec:60050-651-21-12}} appropriate for the maximum nominal voltage
      and of the selected {{ergonomic distance, urn:iec:std:iec:60050-651-21-13}}.
  - content: 'This entry was numbered 651-01-20 in IEC 60050-651:1999. It has been
      modified as follows: The preferred term has been changed.'
