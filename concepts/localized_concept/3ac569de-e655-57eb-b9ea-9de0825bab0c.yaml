  definition:
  - content: temperature of a Planckian radiator having the chromaticity nearest the
      chromaticity associated with the given {{spectral distribution, urn:iec:std:iec:60050-845-21-029}}
      on a modified 1976 UCS diagram where stem:[u^(prime) , " " frac(2)(3) v^(prime)]
      are the coordinates of the Planckian locus and the test stimulus
  examples: []
  id: 845-23-068
  notes:
  - content: The concept of correlated colour temperature should not be used if the
      chromaticity of the test source differs more than stem:["Delta" C = &amp;lsqb;
      (u^(prime)_("t") - u^(prime)_("p"))^(2) + frac(4)(9) (v^(prime)_("t") - v^(prime)_("p"))^(2)
      &amp;rsqb;^(frac(1)(2)) = 5 xx 10^(- 2)] from the Planckian radiator, where
      stem:[u^(prime)_("t") , " " v^(prime)_("t")] refer to the test source, and stem:[u^(prime)_("p")
      , " " v^(prime)_("p")] to the Planckian radiator.
  - content: Correlated colour temperature can be calculated by a simple minimum search
      computer program that searches for that Planckian temperature that provides
      the smallest chromaticity difference between the test chromaticity and the Planckian
      locus, or for example by a method recommended by Robertson, A.R. "Computation
      of correlated color temperature and distribution temperature", _J. Opt. Soc.
      Am_. *58*, 1528-1535, 1968. (Note that the values in some of the tables in this
      reference are not up to date.)
  - content: The chromaticity diagram originally used to determine the correlated
      colour temperature was the CIE 1960 uniform-chromaticity-scale diagram. The
      CIE 1976 uniform-chromaticity-scale diagram is a modified version of the CIE
      1960 uniform-chromaticity-scale diagram and is equivalent to the (u, 3/2 v)
      diagram.
  - content: The correlated colour temperature is expressed in kelvin (K).
  - content: This entry was numbered 845-03-50 in IEC 60050-845:1987.
  - content: This note applies to the French language only.
