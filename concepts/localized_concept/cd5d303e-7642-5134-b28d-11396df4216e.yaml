  definition:
  - content: fonction égale au quotient des transformées de Fourier des signaux qui
      se correspondent à la sortie et à l'entrée d'un biporte linéaire invariable
      dans le temps
  examples: []
  id: 702-07-29
  notes:
  - content: La fonction de transfert isochrone coïncide avec la fonction de transfert
      isomorphe pour les valeurs imaginaires de la fréquence complexe qui est la variable
      de la transformée de Laplace. C'est la transformée de Fourier de la réponse
      impulsionnelle du biporte.
