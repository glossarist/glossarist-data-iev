  definition:
  - content: density of luminous flux with respect to solid angle in a specified directionstem:[I_("v")
      = frac("d" Phi_("v"))("d" Omega)]where stem:[Φ]~v~ is the luminous flux emitted
      in a specified direction, and stem:[Ω] is the solid angle containing that direction
  examples: []
  id: 845-21-045
  notes:
  - content: For practical realization of the quantity, the source is approximated
      by a {{point source, urn:iec:std:iec:60050-845-21-033}}.
  - content: The distribution of the luminous intensities as a function of the direction
      of emission, e.g. given by the polar angles (stem:[ϑ], stem:[φ]), is used to
      determine the luminous flux, stem:[Φ]~v~, within a certain solid angle, stem:[Ω],
      of a source:stem:[Phi_("v") = "P{iint}"_(Omega) I_("v") (vartheta , phi) "sin"
      vartheta " d" phi " d" vartheta].
  - content: Luminous intensity can be derived from the spectral radiant intensity
      distribution bystem:[I_("v") = \  K_("m") int_(0)^(oo) I_("e" "," lambda) (
      lambda ) V ( lambda ) " " "d" lambda]where stem:[K]~m~ is maximum luminous efficacy,
      stem:[I]~e,stem:[λ]~(stem:[λ]) is the spectral radiant intensity at wavelength
      stem:[λ], and stem:[V](stem:[λ]) is {{spectral luminous efficiency, urn:iec:std:iec:60050-845-21-035}}.
  - content: The corresponding radiometric quantity is "radiant intensity". The corresponding
      quantity for photons is "photon intensity".
  - content: The luminous intensity is expressed in candela (cd = lm·sr^−1^).
  - content: This entry was numbered 845-01-31 in IEC 60050-845:1987.
  terms:
