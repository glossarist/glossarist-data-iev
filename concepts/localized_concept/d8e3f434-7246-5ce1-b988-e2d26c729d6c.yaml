data:
  definition:
  - content: "gravité d’un effet par rapport à des critères d’évaluation spécifiés\r\nNote
      1 à l’article: En principe, les critères d’évaluation de la criticité incluent
      les effets de la panne ou de la défaillance: sur l’élément lui-même, sur le
      système dont il fait partie et sur des entités au-delà de la frontière du système.
      Note 2 à l’article: Pour l’analyse de la criticité, voir analyse des modes de
      défaillance, de leurs effets et de leur criticité ({{192-11-06, urn:iec:std:iec:60050-192-11-06}})."
