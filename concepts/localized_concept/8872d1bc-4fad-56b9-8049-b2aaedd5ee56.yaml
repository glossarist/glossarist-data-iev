---
data:
  definition:
  - content: technique de conception d'éclairage dans laquelle la lumière éclaire
      les objets dans une direction opposée au sens de circulation
  examples: []
  id: 845-31-096
  notes:
  - content: L'éclairage dans la direction contraire à celle du faisceau se caractérise
      par l'utilisation de luminaires qui présentent une répartition de l'intensité
      lumineuse asymétrique par rapport au plan perpendiculaire au sens de circulation,
      dans lequel la direction de ciblage de l'intensité lumineuse maximale est contraire
      à celle du sens de circulation. Le terme se rapporte uniquement au sens de circulation
      normal.
  - content: Voir aussi "{{éclairage dans la direction du faisceau, urn:iec:std:iec:60050-845-31-095}}",
      "{{éclairage symétrique, urn:iec:std:iec:60050-845-31-097}}".
  - content: Le terme abrégé "CBL" est dérivé du terme anglais développé correspondant
      "counter-beam lighting".
