  definition:
  - content: an additional circuit derived from the conductors of a metallic circuit,
      with these two conductors effectively being used in parallel, and with return
      through the earth or the sea between the end points
  examples:
  - content: A telegraph circuit superposed on a telephone circuit, with earth-return.
