  definition:
  - content: for a plane surface S and a specified axis in the plane of the surface,
      additive scalar quantity equal to the integral stem:[I_("a") = int_("S") R^(2)
      rm(d) A], where stem:[R] is the distance between a surface element with area
      dstem:[A] and the axis
  examples: []
  id: 113-03-29
  notes:
  - content: The second axial moment of area is sometimes given the wrong name "moment
      of inertia" but should not to be confused with the quantity "moment of inertia".
  - content: The coherent SI unit of second axial moment of area is metre to the power
      four, m^4^.
  terms:
  - type: expression
    normative_status: preferred
    designation: second axial moment of area
  - designation: stem:[I]~a~
