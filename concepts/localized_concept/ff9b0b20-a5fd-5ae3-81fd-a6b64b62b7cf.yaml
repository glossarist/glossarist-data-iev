  definition:
  - content: complex number obtained from a given complex number by replacing the
      imaginary part by its negative
  examples: []
  id: 102-02-14
  notes:
  - content: The conjugate of the complex number stem:[c = a + rm(j) b = |c| e^(rm(j)
      phi)] is stem:[c * = a - rm(j) b = |c| e^(- rm(j) phi)]. In mathematics, the
      conjugate of stem:[c] is often denoted by stem:[bar(c)].
  - content: The concept of conjugate may be applied to complex scalar, vector or
      tensor quantities or to matrices of complex elements.
