  definition:
  - content: pour un point en rotation autour d’un axe fixe, quotient de la longueur
      parcourue par le point, par la distance du point à l’axe, prise positivement
      ou négativement selon que la rotation se fait respectivement dans le sens inverse
      des aiguilles d’une montre ou dans le sans des aiguilles d’une montre, pour
      un observateur regardant dans la direction opposée à celle de l’axe
  examples: []
  id: 113-01-43
  notes:
  - content: L’angle de rotation peut prendre toute valeur réelle, tandis que l’angle
      ou angle plan défini en géométrie (voir la CEI 60050-102:2007, 102-04-14) est
      non négatif et limité à l’intervalle fermé [0, stem:[pi]].
  - content: 'L''unité SI cohérente d''angle est le radian (symbole rad). D''autres
      unités dont l’usage est accepté avec le SI sont le degré (symbole °), la minute
      (symbole &prime;) et la seconde (symbole &Prime;): 1° = (stem:[pi]/180) rad,
      1&prime; = (1/60)°, 1&Prime; = (1/60)&prime;. Une unité en-dehors du SI est
      le tour (symbole r).'
