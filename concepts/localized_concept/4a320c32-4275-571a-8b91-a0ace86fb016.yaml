  definition:
  - content: additive axial vector quantity equal to the integral of moment of force
      *stem:[M]* with respect to time stem:[t] over a time interval &amp;lsqb;stem:[t]~1~,
      stem:[t]~2~&amp;rsqb;, thus stem:[H = int_(t_(1))^(t_(2)) M "d" t]
  examples: []
  id: 113-03-28
  notes:
  - content: For a time interval &lsqb;stem:[t]~1~, stem:[t]~2~&rsqb;, angular impulse
      is equal to the variation of angular momentum *stem:[L]*, thus *stem:[H]* = *stem:[L]*(stem:[t]~2~) − *stem:[L]*(stem:[t]~1~) = Δ*stem:[L]*.
  - content: The coherent SI unit of angular impulse is newton metre second, N·m·s.
  terms:
