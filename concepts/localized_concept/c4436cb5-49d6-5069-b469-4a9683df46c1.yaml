  definition:
  - content: "état d’une entité logicielle qui l’empêche de fonctionner tel que requis\r\nNote
      1 à l’article: Les pannes logicielles sont des pannes dues à la spécification,
      à la conception, à la programmation, à la compilation, ou des pannes introduites
      lors de la maintenance logicielle. Note 2 à l’article: Une panne logicielle
      peut être dormante tant qu’elle n’a pas été activée par un déclencheur ({{192-03-23,
      urn:iec:std:iec:60050-192-03-23}}) particulier."
