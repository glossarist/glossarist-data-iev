  definition:
  - content: "expression mathématique utilisée pour l’évaluation des caractéristiques
      de matériaux magnétiques et exprimée en décibels par:\r\nstem:[T H D_(\"F\")
      = 20 \" \" lg (frac(V_(\"m\") / V_(\"f\"))(mu_(\"ea\") / C C F))]\n\noù\r\nstem:[V_(\"m\")
      = sqrt(sum_(n = 1)^(oo) V_(n)^(2))], où stem:[V~n~] est l'amplitude du stem:[n]-ième
      harmonique de la forme d'onde,\n\nstem:[V]~f~  est l'amplitude du fondamental,\n\nstem:[μ]~ea~
      \ est la perméabilité d’amplitude,\n\nstem:[CCF]  désigne au facteur de correction
      du circuit"
  examples: []
  id: 221-03-43
  notes:
  - content: Dans la pratique, stem:[C C F = 1 / sqrt(1 + (3 omega L_(1) / R_("s"))^(2))]
      correspond au facteur de correction du circuit et est donné dans l’approximation
      de la troisième harmonique, qui est valable pour les mesures sans courant continu
      superposé. stem:[L]~1~ est l’inductance primaire. stem:[R]~s~ est la résistance
      totale de la source (50 Ω).
  - content: stem:[THD]~F~ est parfois donné en décibels.
