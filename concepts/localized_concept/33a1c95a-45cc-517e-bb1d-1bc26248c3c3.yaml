  definition:
  - content: éclairement énergétique produit par la lumière solaire directe sur une
      surface terrestre perpendiculairement à la direction d'irradiation par le Soleil
  examples: []
  id: 845-29-134
  notes:
  - content: L'éclairement solaire normal énergétique n'est pas identique à l'{{éclairement
      solaire direct énergétique, urn:iec:std:iec:60050-845-29-133}}, qui est mesuré
      sur une surface horizontale terrestre, non nécessairement perpendiculairement
      à la direction d'irradiation par le Soleil.
  - content: L'éclairement solaire normal énergétique est exprimé en watt par mètre
      carré (W·m^−2^).
