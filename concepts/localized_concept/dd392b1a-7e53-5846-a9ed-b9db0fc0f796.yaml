---
data:
  definition:
  - content: température la plus élevée pouvant être atteinte en service dans les
      conditions de fonctionnement les plus défavorables (mais à l'intérieur des tolérances
      reconnues) par toute partie ou toute surface d'un matériel, système de protection
      ou composant pouvant générer une inflammation de l'atmosphère explosive environnante
  examples: []
  id: 426-28-05
  notes:
  - content: La température maximale de surface marquée sur le matériel comprend les
      marges de sécurité selon l'EPL du matériel.
  - content: La température de surface qui est pertinente peut être interne ou externe,
      tel que spécifié par le Mode de Protection mis en œuvre.
  - content: Pour les {{Matériels Ex, urn:iec:std:iec:60050-426-01-14}} situés dans
      une atmosphère explosive de poussière, cette température survient sur la surface
      externe de l'enveloppe et peut comprendre une condition définie de la couche
      de poussière.
  sources:
