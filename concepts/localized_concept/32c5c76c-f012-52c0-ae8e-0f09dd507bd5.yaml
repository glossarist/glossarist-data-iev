  definition:
  - content: rapport de l'énergie totale utilisable ({{puissance électrique nette,
      urn:iec:std:iec:60050-485-14-03}} et chaleur récupérée) à l'enthalpie totale
      fournie au{{système à pile à combustible, urn:iec:std:iec:60050-485-09-01}}
  examples: []
  id: 485-10-05
  notes:
  - content: Il convient d'associer l'enthalpie totale fournie (y compris l'enthalpie
      de réaction) du {{combustible brut, urn:iec:std:iec:60050-485-07-01}} à la valeur
      calorifique inférieure (LVH) pour une meilleure comparaison avec d'autres types
      de systèmes de conversion d'énergie.
