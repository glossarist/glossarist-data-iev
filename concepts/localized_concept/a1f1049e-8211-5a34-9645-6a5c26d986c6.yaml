  definition:
  - content: an assembly, obtained by frequency division multiplexing, of a specified
      number of FDM telephone channels in adjacent positions in a frequency band of
      specified width, and normally used as an intermediate stage in the formation
      of a group. The number of channels in a sub-group is a sub-multiple of the number
      of channels in a group
  examples: []
  id: 704-10-12
  notes:
  - content: A sub-group may sometimes be transmitted without subsequent formation
      into a complete group.
