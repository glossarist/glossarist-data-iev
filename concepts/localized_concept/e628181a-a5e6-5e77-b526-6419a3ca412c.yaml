      formule de Kasten–Young est utilisée:stem:[m = frac(1)(&amp;lsqb; "sin " gamma_("s")
      \  + \  0, "5" 0 "5 72" (gamma_("s") \  + \  "6" ,0 "79 95")^(- "1" , "636"
