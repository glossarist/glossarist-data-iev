  definition:
  - content: "ratio of the change in electrical {{resistance, urn:iec:std:iec:60050-131-12-04}}
      divided by the product of the original resistance (stem:[R]~o~, resistance in
      the undeformed configuration) and the engineering strain (stem:[e])\r\nstem:[G]~F~&equals;(stem:[R]−stem:[R]~o~)/stem:[R]~o~stem:[e]\r\nwhere
      stem:[R] is the electrical resistance in the deformed configuration."
