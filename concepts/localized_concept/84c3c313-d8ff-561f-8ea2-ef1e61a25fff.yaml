  definition:
  - content: "pour un transducteur électroacoustique réciproque, à une fréquence spécifiée:\r\na)
      quotient de la sensibilité en tension du transducteur fonctionnant en récepteur
      de son (par exemple un microphone), par la sensibilité au courant du même transducteur
      fonctionnant en émetteur de son; ou \r\nb) quotient de la sensibilité en courant
      du transducteur fonctionnant en récepteur de son (par exemple un microphone),
      par la sensibilité à la tension du même transducteur, fonctionnant en émetteur
      de son"
