  definition:
  - content: system for determining the {{tristimulus values, urn:iec:std:iec:60050-845-23-038}}
      of any spectral power distribution using the set of reference colour stimuli
      &amp;lsqb;X&amp;rsqb;, &amp;lsqb;Y&amp;rsqb;, &amp;lsqb;Z&amp;rsqb; and the
      three CIE colour-matching functions stem:[bar(() lambda ) , " " bar(() lambda
      ) , " " bar(() lambda )] adopted by the CIE in 1931
  examples: []
  id: 845-23-045
  notes:
  - content: stem:[bar(() lambda )] is identical to stem:[V](stem:[λ]) and hence the
      tristimulus values stem:[Y] are proportional to values of luminance.
  - content: The CIE 1931 standard colorimetric system is applicable to centrally
      viewed fields of angular subtense between about 1&#176; and about 4&#176; (0,017
      rad and 0,07 rad).
  - content: The CIE 1931 standard colorimetric system can be derived from the CIE
      1931 RGB colorimetric system using a transformation based on a set of three
      linear equations. The CIE 1931 RGB system is based on three real monochromatic
      reference stimuli.
  - content: See also CIE 15, stem:[Colorimetry].
  - content: This entry was numbered 845-03-28 in IEC 60050-845:1987.
