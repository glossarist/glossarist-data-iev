  definition:
  - content: "mathematical expression used for the evaluation of characteristics of
      magnetic materials and expressed in decibels by:\r\nstem:[T H D_(\"F\") = 20
      \" \" lg (frac(V_(\"m\") / V_(\"f\"))(mu_(\"ea\") / C C F))]\r\nwhere\r\nstem:[V_(\"m\")
      = sqrt(sum_(n = 1)^(oo) V_(n)^(2))], where stem:[V~n~] is the amplitude of the
      stem:[n]-th harmonic component of the waveform,\n\nstem:[V]~f~ is the amplitude
      of its fundamental component,\n\nstem:[μ]~ea~  is the amplitude permeability,\n\nstem:[CCF]
      \ is the Circuit Correction Factor"
  examples: []
  id: 221-03-43
  notes:
  - content: In practice, stem:[C C F = 1 / sqrt(1 + (3 omega L_(1) / R_("s"))^(2))]
      stands for the Circuit Correction Factor and is given in the approximation for
      the third harmonic, which is valid for measurements without applied DC bias.
      stem:[L]~1~ is the primary inductance. stem:[R]~s~ is the total source resistance
      (50 Ω).
  - content: stem:[THD]~F~ is sometimes expressed in decibels.
  terms:
  - type: expression
    normative_status: preferred
    designation: "(magnetic) total harmonic distortion factor"
  - type: symbol
    designation: stem:[THD]~F~
