  definition:
  - content: current delivered by a {{fuel cell, urn:iec:std:iec:60050-485-08-01}},
      at a given voltage, referred to the mass of {{electrocatalyst, urn:iec:std:iec:60050-485-01-02}}
      in the {{electrodes, urn:iec:std:iec:60050-485-02-01}}
  examples: []
  id: 485-02-11
  notes:
  - content: The specific activity can also be referred to the {{electrochemical surface
      area, urn:iec:std:iec:60050-485-02-09}}, or the volume of the {{catalyst layer,
      urn:iec:std:iec:60050-485-02-06}}. These can be referred to as area specific
      activity or volume specific activity, respectively.
  - content: The specific activity is usually expressed in A/g, and can be expressed
      as A/cm^2^ or A/cm^3^.
