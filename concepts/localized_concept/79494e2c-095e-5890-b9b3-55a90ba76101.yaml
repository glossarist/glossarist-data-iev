  - content: |-
      état dans lequel tous les états internes (des parties mobiles et/ou des intégrateurs, etc.) et les {{circuits de sortie, urn:iec:std:iec:60050-447-04-01}} d'un {{relais de mesure, urn:iec:std:iec:60050-447-01-02}} ou d'un {{équipement de protection, urn:iec:std:iec:60050-447-01-49}} sont soit à l'état de repos complet, soit dans un état spécifié en fonction de l'{{état de travail, urn:iec:std:iec:60050-447-02-01}}<simg usemap="#1-60050-447-Ed2-IS-CDV-Fig2a-fr-4web"><map name="1-60050-447-Ed2-IS-CDV-Fig2a-fr-4web"> <area title="grandeur caractéristique (pour relais à minimum de ...)" href="IEV447-01-24" shape="rect" coords="53,75,220,110" target="_self" alt="grandeur caractéristique minimum"> <area title="grandeur caractéristique (pour relais à maximum de ...)" href="IEV447-01-23" shape="rect" coords="47,216,220,250" target="_self" alt="grandeur caractéristique maximum"> <area title="mettre au repos" href="IEV447-02-05" shape="rect" coords="514,4,608,22" target="_self" alt="mettre au repos"> <area title="état de repos" href="IEV447-02-02" shape="rect" coords="566,41,642,57" target="_self" alt="état de repos"> <area title="valeur de repos" href="IEV447-02-12" shape="rect" coords="382,106,471,125" target="_self" alt="valeur de repos"> <area title="valeur de repos" href="IEV447-02-12" shape="rect" coords="391,196,478,214" target="_self" alt="valeur de repos"> <area title="temps de mise au repos" href="IEV447-05-06" shape="rect" coords="503,397,561,443" target="_self" alt="temps de mise au repos">
