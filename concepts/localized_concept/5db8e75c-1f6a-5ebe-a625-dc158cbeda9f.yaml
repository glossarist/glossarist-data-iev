  definition:
  - content: zone d’un plan particulier perpendiculaire à l’axe d'alignement du faisceau
      composé de tous les points auxquels l’intégrale de pression d'impulsion au carré
      est supérieure à une fraction spécifiée de la valeur maximale de l’intégrale
      de pression d'impulsion au carré du dit plan
  examples: []
  id: 802-01-19
  notes:
  - content: Certains niveaux couramment spécifiés sont 0,25 et 0,01 pour les surfaces
      de faisceau −6 dB et −20 dB, respectivement.
