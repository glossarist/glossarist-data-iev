  definition:
  - content: couple ordonné de nombres entiers représentant un nombre rationnel
  examples: []
  id: 102-02-04
  notes:
  - content: Un nombre rationnel peut être représenté par une infinité de fractions.
  - content: La fraction correspondant au couple ordonné (stem:[p], stem:[q]) est
      notée stem:[p]/stem:[q] ou stem:[frac(p)(q)].
  - content: Dans une fraction stem:[p]/stem:[q], le premier élément stem:[p] est
      appelé «numérateur» et le deuxième est appelé «dénominateur».
