---
data:
  definition:
  - content: 'méthode permettant de déterminer les pertes dues au courant alternatif,
      et qui consiste à soumettre un échantillon à un champ ou un courant alternatif
      et à mesurer la chaleur produite à l''intérieur de l’échantillonNote 1 à l’article:
      Dans le cas des matériaux supraconducteurs, l''échantillon est habituellement
      immergé dans du liquide cryogénique et la quantité de liquide évaporée est mesurée
      pour calculer l''apport de chaleur.'
