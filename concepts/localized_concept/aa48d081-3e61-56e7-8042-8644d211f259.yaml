  definition:
  - content: period of time for which a {{normative document, urn:iec:std:iec:60050-901-02-01}}
      is current, that lasts from the date on which it becomes effective (“effective
      date”), resulting from a decision of the {{body, urn:iec:std:iec:60050-901-03-01}}
      responsible for it, until it is withdrawn or replaced
  examples: []
  id: 901-04-04
  notes:
  - content: The expression “period of time” refers to the "duration" of the time
      interval as defined in {{IEV 113-01-13, urn:iec:std:iec:60050-113-01-13}}.
