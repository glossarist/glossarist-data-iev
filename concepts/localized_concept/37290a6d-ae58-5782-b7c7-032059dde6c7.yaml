  definition:
  - content: constant representing the efficiency of electromechanical coupling
  examples: []
  id: 561-05-03
  notes:
  - content: "It represents the efficiency of converting electric energy into mechanical
      energy by the electro-mechanical coupling effect, and it is defined as the square
      root of the ratio of the mechanical energy stored (stem:[U]~m~) to the total
      input electric energy transferred (stem:[U]~i~):\r\nstem:[k = sqrt(frac(U_(\"m\")
      \" \")(U_(\"i\")))]"
