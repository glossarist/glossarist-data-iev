  definition:
  - content: value attributed to a particular quantity and accepted, sometimes by
      convention, as having an uncertainty appropriate for a given purpose
  examples: []
  id: 311-01-06
  notes:
  - content: This term is used in the "uncertainty" approach.
  - content: The "conventional true value" is sometimes called "assigned value", "best
      estimate of the value", "conventional value" or "reference value". The term
      "reference value", in this sense, should not be confused with "reference value"
      in the sense used in 311-07-01.
  - content: Frequently, a large number of results of measurement of a quantity are
      used to establish a conventional true value.
  - content: Traditional definitions, based on the true value approach, treated the
      conventional true value as a value approximating to a true value of the quantity
      such that the difference could be neglected for the purposes for which that
      value was used.
