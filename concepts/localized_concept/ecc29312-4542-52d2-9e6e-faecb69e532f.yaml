  definition:
  - content: "{{coherent system of units, urn:iec:std:iec:60050-112-01-22}} based
      on the {{International System of Quantities, urn:iec:std:iec:60050-112-02-01}}
      (ISQ), their names and symbols, including a series of prefixes and their names
      and symbols, together with rules for their use, adopted by the General Conference
      on Weights and Measures (CGPM)"
  examples: []
  id: 112-02-02
  notes:
  - content: "The SI is founded on the seven base quantities of the ISQ and the names
      and symbols of the corresponding base units that are contained in the following
      table:\n\n<table style=\"width: 430px;\" cellpadding=\"5\" border=\"solid\">\r\n<tbody>\r\n<tr>\r\n<td
      style=\"width: 300.95px;\">\n\n<strong><span>Base quantity</span></strong></p>\r\n</td>\r\n<td
      colspan=\"2\" style=\"width: 146.05px;\">\n\n<strong><span>Base unit</span></strong></p>\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
      style=\"width: 300.95px;\">\n\n<strong><span>Name</span></strong></p>\r\n</td>\r\n<td
      style=\"width: 77.05px;\">\n\n<strong><span>Name</span></strong></p>\r\n</td>\r\n<td
      style=\"width: 69px;\">\n\n<strong><span>Symbol</span></strong></p>\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
      style=\"width: 300.95px;\">\n\n<span>length</span></p>\r\n</td>\r\n<td style=\"width:
      77.05px;\">\n\n<span>metre</span></p>\r\n</td>\r\n<td style=\"width: 69px;\">\n\n<span>m</span></p>\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
      style=\"width: 300.95px;\">\n\n<span>mass</span></p>\r\n</td>\r\n<td style=\"width:
      77.05px;\">\n\n<span>kilogram</span></p>\r\n</td>\r\n<td style=\"width: 69px;\">\n\n<span>kg</span></p>\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
      style=\"width: 300.95px;\">\n\n<span>time, duration</span></p>\r\n</td>\r\n<td
      style=\"width: 77.05px;\">\n\n<span>second</span></p>\r\n</td>\r\n<td style=\"width:
      69px;\">\n\n<span>s</span></p>\r\n</td>\r\n</tr>\r\n<tr>\r\n<td style=\"width:
      300.95px;\">\n\n<span>electric current</span></p>\r\n</td>\r\n<td style=\"width:
      77.05px;\">\n\n<span>ampere</span></p>\r\n</td>\r\n<td style=\"width: 69px;\">\n\n<span>A</span></p>\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
      style=\"width: 300.95px;\">\n\n<span>thermodynamic temperature</span></p>\r\n</td>\r\n<td
      style=\"width: 77.05px;\">\n\n<span>kelvin</span></p>\r\n</td>\r\n<td style=\"width:
      69px;\">\n\n<span>K</span></p>\r\n</td>\r\n</tr>\r\n<tr>\r\n<td style=\"width:
      300.95px;\">\n\n<span>amount of substance</span></p>\r\n</td>\r\n<td style=\"width:
      77.05px;\">\n\n<span>mole</span></p>\r\n</td>\r\n<td style=\"width: 69px;\">\n\n<span>mol</span></p>\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
      style=\"width: 300.95px;\">\n\n<span>luminous intensity</span></p>\r\n</td>\r\n<td
      style=\"width: 77.05px;\">\n\ncandela</p>\r\n</td>\r\n<td style=\"width: 69px;\">\n\ncd</p>\r\n</td>\r\n</tr>\r\n</tbody>\r\n</table>"
  - content: The base units and the coherent derived units of the SI form a coherent
      set, designated the "set of coherent SI units".
  - content: For a full description and explanation of the International System of
      Units, see the current edition of the SI brochure published by the International
      Bureau of Weights and Measures (BIPM) and available on the BIPM website.
  - content: In quantity calculus, the quantity "number of entities" is often considered
      to be a base quantity, with the base unit one, symbol 1.
  - content: The SI prefixes for multiples and submultiples of units are given in
      {{IEV 112-02-03, urn:iec:std:iec:60050-112-02-03}}.
