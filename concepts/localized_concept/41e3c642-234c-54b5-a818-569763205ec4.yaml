data:
  definition:
  - content: "défaillances de différentes entités, qui résultent d’une cause unique,
      mais auraient pu être considérées comme indépendantes\r\nNote 1 à l’article:
      Les défaillances de cause commune peuvent également être des \"défaillances
      de mode commun\" ({{IEV 192-03-19, urn:iec:std:iec:60050-192-03-19}}). Note
      2 à l’article: L’éventualité de défaillances de cause commune réduit l’efficacité
      de la redondance du système."
