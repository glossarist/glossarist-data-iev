---
data:
  definition:
  - content: densité du flux lumineux incident par rapport à l'aire en un point d'une
      surface réelle ou fictive, exprimée parstem:[E_("v") = frac("d" Phi_("v"))("d"
      A)]où stem:[Φ]~v~ est le flux lumineux et stem:[A] est l'aire qui reçoit ce
      flux
  examples: []
  id: 845-21-060
  notes:
  - content: L'éclairement peut être dérivé de la distribution de l'éclairement spectral
      énergétique parstem:[E_("v") \  = \  K_("m") int_(0)^(oo) E_("e" "," lambda)
      ( lambda ) " " V ( lambda ) " " "d" lambda]où stem:[K]~m~ est l'efficacité lumineuse
      maximale, stem:[E]~e,stem:[λ]~(stem:[λ]) est l'éclairement spectral énergétique
      à la longueur d'onde stem:[λ] et stem:[V](stem:[λ]) est l'{{efficacité lumineuse
      spectrale, urn:iec:std:iec:60050-845-21-035}}.
  - content: La grandeur radiométrique correspondante est l'"éclairement énergétique".
      La grandeur correspondante pour les photons est l'"éclairement photonique".
  - content: L'éclairement est exprimé en lux (lx = lm·m^−2^).
  - content: Cet article était numéroté 845-01-38 dans l'IEC 60050-845:1987.
