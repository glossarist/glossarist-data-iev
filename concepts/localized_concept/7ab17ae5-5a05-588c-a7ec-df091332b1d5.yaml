---
data:
  definition:
  - content: 'composant isolant muni d’un {{embout de perche, urn:iec:std:iec:60050-651-22-02}}
      permanent ou détachable, destiné à installer les pinces ou étaux, les barres
      de court-circuit ou les rallonges conductrices sur une {{installation électrique,
      urn:iec:std:iec:60050-651-26-01}}Note 1 à l’article: La perche de mise à la
      terre peut être fixée au {{dispositif de mise à la terre et en court-circuit,
      urn:iec:std:iec:60050-651-25-02}} ou être détachable. Note 2 à l’article: L’élément
      isolant d’une perche de mise à la terre est destiné à fournir une distance de
      sécurité et une isolation adéquates pour le travailleur. Note 3 à l’article:
      Cet article était numéroté 651-14-10 dans la CEI 60050-651:1999. Il a été modifié
      de façon à fournir de plus amples détails sur la description du {{dispositif,
      urn:iec:std:iec:60050-651-21-15}}.'
