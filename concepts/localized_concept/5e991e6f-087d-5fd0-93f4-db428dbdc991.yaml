  definition:
  - content: optical measurement method where the sample is successively irradiated
      with several-wavelength monochromatic light and both the thickness and the {{refractive
      index, urn:iec:std:iec:60050-845-04-101}} of the layers can be obtained simultaneously
      from the polarized reflection
  examples: []
  id: 523-07-03
  notes:
  - content: Monochromatic light from a spectroscope is linear-polarized using a polarizer.  Then
      the light is irradiated on the thin film, and the reflected light intensity
      of the polarized components is measured. The thickness and the complex refractive
      index can be calculated from the measurement results.
