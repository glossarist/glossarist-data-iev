  definition:
  - content: product of {{spectral luminous efficiency, urn:iec:std:iec:60050-845-21-035}}
      and maximum luminous efficacy for a specified photometric condition
  examples: []
  id: 845-21-091
  notes:
  - content: The photometric condition should be specified (e.g. photopic, scotopic,
      mesopic). If it is not specified, photopic vision is assumed and the symbol
      stem:[K](stem:[λ]) is used. For other photometric conditions, the respective
      symbol for identification shall be used.
  - content: Spectral luminous efficacy for photopic vision is expressed bystem:[K](stem:[λ]) =
      stem:[K]~m~ stem:[V](stem:[λ])where stem:[K]~m~ is maximum luminous efficacy,
      stem:[V](stem:[λ]) is spectral luminous efficiency and stem:[λ] is wavelength.
  - content: The spectral luminous efficacy is expressed in lumen per watt (lm·W^−1^).
  terms:
