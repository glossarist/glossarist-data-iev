  definition:
  - content: "{{polarization, urn:iec:std:iec:60050-705-01-13}} of an {{electromagnetic
      wave, urn:iec:std:iec:60050-121-11-63}} such that the extremity of the {{electric
      flux density, urn:iec:std:iec:60050-121-11-40}} vector relative to a given point
      describes an ellipse whose centre coincides with this point"
  examples: []
  id: 705-01-17
  notes:
  - content: In a linear medium with properties independent of time, generally all
      {{sinusoidal waves, urn:iec:std:iec:60050-103-10-03}} are elliptically polarized,
      with {{linear polarization, urn:iec:std:iec:60050-705-01-14}} and {{circular
      polarization, urn:iec:std:iec:60050-705-01-20}} being special cases.
