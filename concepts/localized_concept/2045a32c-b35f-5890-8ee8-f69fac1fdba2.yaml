  definition:
  - content: total radiation dose incurred by a population
  examples: []
  id: 395-06-08
  notes:
  - content: The value of this quantity is equal to the product of the number of individuals
      exposed to a radiation source and their average radiation dose.
  - content: The collective dose is expressed in man-sieverts (man-Sv).
  - content: This entry was numbered 393-19-08 in IEC 60050-393:2003.
