  definition:
  - content: 'en un point fixe d’un milieu où existe un champ de température, grandeur
      scalaire stem:[λ]  caractérisant l’aptitude du milieu à transmettre la chaleur
      à travers un élément de surface contenant le point: *stem:[φ]* = −stem:[λ] *grad*
      stem:[T], où *stem:[φ]* est le flux thermique surfacique et stem:[T] est la
      température thermodynamique'
  examples: []
  id: 113-04-38
  notes:
  - content: Dans un milieu anisotrope, la conductivité thermique est une grandeur
      tensorielle.
  - content: L'unité SI cohérente de conductivité thermique est le watt par mètre
      kelvin, W/(m·K).
