---
data:
  definition:
  - content: bande de fréquences occupée par un {{signal, urn:iec:std:iec:60050-701-01-02}},
      ou par un ensemble de signaux multiplexés, en des points spécifiés à l'entrée
      et à la sortie d'un {{système de transmission, urn:iec:std:iec:60050-704-04-19}}
  examples: []
  id: 702-01-06
  notes:
  - content: Dans une radiocommunication, la bande de base est la bande de fréquences
      occupée par le signal qui module l'{{émetteur radioélectrique, urn:iec:std:iec:60050-713-08-01}}.
  - content: Dans une transmission comportant une {{modulation multiple, urn:iec:std:iec:60050-702-06-07}},
      on considère généralement comme bande de base la bande de fréquences occupée
      par le signal appliqué au premier étage de modulation et non la bande de fréquences
      occupée par un modulat intermédiaire.
