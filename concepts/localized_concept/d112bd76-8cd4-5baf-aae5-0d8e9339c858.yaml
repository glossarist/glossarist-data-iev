  definition:
  - content: character or combination of characters denoting a {{quantity, urn:iec:std:iec:60050-112-01-01}}
  examples: []
  id: 112-01-03
  notes:
  - content: A simple quantity symbol is preferably one, or in some cases two, letters
      of the Latin or Greek alphabet and may include subscripts, superscripts, or
      other modifying signs. The letters are in italic (sloping) type, using preferably
      a font with serifs. The subscripts and superscripts are printed either in roman
      (upright) type, or, when they denote quantities, variables, or running numbers,
      in italic (sloping) type. See ISO 80000-1  and IEC 60027-1 for more details
      and for the combination of symbols.
  - content: "Quantity symbols are given in the various parts of ISO 80000, IEC 80000,
      and IEC 60027. Examples\n\n<table style=\"width: 384px;\" cellpadding=\"2\"
      border=\"solid\">\r\n<tbody>\r\n<tr>\r\n<td style=\"width: 294px;\">\n\n<strong>Quantity
      name</strong>\r\n</td>\r\n<td style=\"width: 70px;\">\n\n<strong>Quantity symbol</strong>\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
      style=\"width: 294px;\">\n\ntime, duration\r\n</td>\r\n<td style=\"width: 70px;\">\n\nstem:[t]\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
      style=\"width: 294px;\">\n\nwavelength\r\n</td>\r\n<td style=\"width: 70px;\">\n\nstem:[λ]\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
      style=\"width: 294px;\">\n\nsolid angle\r\n</td>\r\n<td style=\"width: 70px;\">\n\nstem:[Ω]\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
      style=\"width: 294px;\">\n\nelectric resistance\r\n</td>\r\n<td style=\"width:
      70px;\">\n\nstem:[R]\r\n</td>\r\n</tr>\r\n<tr>\r\n<td style=\"width: 294px;\">\n\nstatic
      friction factor\r\n</td>\r\n<td style=\"width: 70px;\">\n\nstem:[µ]~s~\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
      style=\"width: 294px;\">\n\nvolume flow rate\r\n</td>\r\n<td style=\"width:
      70px;\">\n\nstem:[qV]\r\n</td>\r\n</tr>\r\n<tr>\r\n<td style=\"width: 294px;\">\n\nstem:[k]^th^
      force in a system of forces\r\n</td>\r\n<td style=\"width: 70px;\">\n\nstem:[Fk]\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
      style=\"width: 294px;\">\n\nelectric field strength\r\n</td>\r\n<td style=\"width:
      70px;\">\n\nstem:[E]\r\n</td>\r\n</tr>\r\n<tr>\r\n<td style=\"width: 294px;\">\n\nstem:[x]
      component of electric field strength\r\n</td>\r\n<td style=\"width: 70px;\">\n\nstem:[Ex]\r\n</td>\r\n</tr>\r\n<tr>\r\n<td
      style=\"width: 294px;\">\n\nReynolds number\r\n</td>\r\n<td style=\"width: 70px;\">\n\nstem:[Re]\r\n</td>\r\n</tr>\r\n</tbody>\r\n</table>"
