  definition:
  - content: qualitative method of analysis that involves the study of possible failure
      modes and faults in sub items, and their effects at various indenture levels
  examples: []
  id: 192-11-05
  notes:
  - content: The term "fault mode and effects analysis" in IEC 60050-191:1990 (now
      withdrawn; replaced by IEC 60050-192:2015) is deprecated, since a fault ({{192-04-01,
      urn:iec:std:iec:60050-192-04-01}}) is a state and cannot logically have a mode,
      whereas a failure mode ({{192-03-17, urn:iec:std:iec:60050-192-03-17}}) is a
      change of state.
