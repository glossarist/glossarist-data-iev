  - content: "{{substance, urn:iec:std:iec:60050-904-02-01}} et {{groupe de substances,
      urn:iec:std:iec:60050-904-02-04}} qui satisfont aux critères établis dans la
      IEC 62474, et spécifiés dans la base de données de la IEC 62474Note 1 à l’article:
      Les substances déclarables et groupes de substances déclarables sont répertoriés
      dans la base de données de l'IEC 62474 avec une exigence de déclaration obligatoire
      ou facultative au-dessus du seuil spécifié dans la base de données de l'IEC
      62474."
