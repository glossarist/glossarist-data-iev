  definition:
  - content: the ratio, generally expressed in decibels, of the radiation intensity
      produced by an antenna in a given direction to the radiation intensity that
      would be obtained if the power accepted by the antenna were radiated equally
      in all directions
  examples: []
  id: 713-09-21
  notes:
  - content: If no direction is specified, the direction of maximum radiation intensity
      from the given antenna is implied.
  - content: When the absolute gain is expressed in decibels, the notation dBi is
      recommended by the International Telecommunication Union as a unit symbol.
  - content: The radiation intensity from an antenna in a given direction is the power
      radiated per unit solid angle.
