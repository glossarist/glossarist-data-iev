  definition:
  - content: ratio of the luminous flux of an electric light source at a given time
      in its operational life to its initial luminous flux, the electric light source
      being operated under specified conditions
  examples: []
  id: 845-27-114
  notes:
  - content: In IEC standards, “lumen maintenance” is also commonly used with the
      same meaning.
  - content: The luminous flux maintenance factor has unit one and is usually expressed
      in per cent.
  - content: This entry was numbered 845-07-65 in IEC 60050-845:1987.
