  definition:
  - content: device composed of a case containing two coplanar or superimposed hubs
      or reels on which a magnetic tape is wound, so that the tape can move from hub
      to hub or reel to reel during recording, reproduction, a fast forward movement
      or rewinding
  examples: []
  id: 806-15-40
  notes:
  - content: The device can be easily and instantaneously inserted in a recording/reproducing
      equipment or in a reproducer designed for this purpose without handling the
      magnetic tape.
