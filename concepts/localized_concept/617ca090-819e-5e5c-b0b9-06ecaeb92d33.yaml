  definition:
  - content: ensemble de valeurs attribuées à un mesurande
  examples: []
  id: 311-01-01
  notes:
  - content: Ce terme est utilisé dans l’approche "incertitude".
  - content: La valeur centrale de l’ensemble peut être choisie comme valeur du mesurande
      et un paramètre caractérisant la dispersion comme incertitude.
  - content: Le résultat de mesure est relié à l’indication de l’instrument par les
      valeurs de correction obtenues par étalonnage et par l'utilisation d'un modèle.
  - content: L’ensemble des valeurs peut être considéré comme représentant le mesurande
      à condition qu’il soit compatible avec toutes les autres mesures du même mesurande.
  - content: L'ensemble, et donc l’incertitude, ne peuvent être donnés qu’avec un
      niveau de confiance déterminé.
