  definition:
  - content: "the integral of the square of the current over a given time interval:\r\nstem:[I^(2)
      t = int_(t_(0))^(t_(1)) i^(2) rm(d) t]"
  examples: []
  id: 441-18-23
  notes:
  - content: The pre-arcing stem:[I]^2^stem:[t] is the stem:[I]^2^stem:[t] integral
      extended over the pre-arcing time of the fuse.
  - content: The operating stem:[I]^2^stem:[t] is the stem:[I]^2^stem:[t] integral
      extended over the operating time of the fuse.
  - content: The energy in joules liberated in one ohm of resistance in a circuit
      protected by a fuse is equal to the value of the operating stem:[I]^2^stem:[t]
      expressed in stem:[A]^2^ • stem:[s].
