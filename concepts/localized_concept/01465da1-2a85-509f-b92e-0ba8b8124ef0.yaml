  definition:
  - content: 'principe tel que, si la variable d’entrée est décalée dans le temps,
      la réponse temporelle reste inchangée, sauf qu’elle est décalée du même intervalle
      de tempsNote 1 à l’article: Le principe de décalage implique que l’ensemble
      des équations qui décrit le système et leurs coefficients soient invariants
      dans le temps.'
