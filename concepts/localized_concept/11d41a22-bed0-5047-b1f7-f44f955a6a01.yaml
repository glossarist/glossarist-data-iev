data:
  definition:
  - content: "{{valeur assignée, urn:iec:std:iec:60050-151-16-08}} de la tension,
      fixée par le fabricant à un composant, à un dispositif ou à un matériel et à
      laquelle on se réfère pour le fonctionnement et pour les caractéristiques fonctionnelles"
  examples: []
  id: 442-09-10
  notes:
  - content: Les matériels peuvent avoir plusieurs valeurs ou une plage de tensions
      assignées.
  - content: Dans le cas d’une {{alimentation électrique, urn:iec:std:iec:60050-151-13-75}}
      triphasée, la {{tension entre phases, urn:iec:std:iec:60050-195-05-01}} s'applique.
