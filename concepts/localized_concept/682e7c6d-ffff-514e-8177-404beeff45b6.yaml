  definition:
  - content: physical unit used for driving mechanically actuated final controlling
      elements
  examples: []
  id: 351-56-16
  notes:
  - content: Examples of actuating drives are electric, hydraulic or pneumatic actuating
      drives, diaphragm systems or piston actuators.
  - content: No actuating drive is required for a final controlling element if the
      manipulated variable at the controller output is capable of directly influencing
      the mass flow or energy flow, i.e. without any mechanical intermediate variable
      quantity.
  - content: This entry was numbered 351-32-24 in IEC 60050-351:2006.
