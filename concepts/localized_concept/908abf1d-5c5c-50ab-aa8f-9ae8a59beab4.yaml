  definition:
  - content: for a vector field *stem:[U]* that is given at each point of a three-dimensional
      domain V limited by a closed surface S having an orientation towards exterior,
      theorem stating that the volume integral over V of the divergence of the field
      *stem:[U]* is equal to the flux of this field through the surface S stem:["P{iiint}"_("V")
      rm(div) " " U rm(d) V = "P{oiint}"_("S") U * e_("n") rm(d) A] where dstem:[V]
      is the volume element and *stem:[e]*~n~dstem:[A] is the vector surface element
  examples: []
  id: 102-05-30
  notes:
  - content: The divergence theorem can be generalized to the stem:[n]-dimensional
      Euclidean space.
  - content: In electrostatics, the divergence theorem is applied to express that
      the electric flux through a closed surface is equal to the total electric charge
      in the domain enclosed by the surface. It is then called "Gauss law".
