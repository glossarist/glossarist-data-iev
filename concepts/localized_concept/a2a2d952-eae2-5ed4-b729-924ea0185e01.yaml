---
data:
  definition:
  - content: loi donnant la {{répartition spectrale, urn:iec:std:iec:60050-845-21-029}}
      de la luminance énergétique d'un {{radiateur de Planck, urn:iec:std:iec:60050-845-24-004}}
      en fonction de la longueur d'onde et de la températurestem:[L_("e" , lambda)
      ( lambda , T ) = frac(del L_("e") ( lambda , T ))(del lambda) = frac(c_(1))(pi)
      lambda^(- 5) ("e"^(frac(c_(2))(lambda T)) - 1)^(- 1)]où stem:[L]~e,~stem:[~λ~]
      est la luminance spectrale, stem:[λ] est la longueur d'onde dans le vide, stem:[T]
      est la température thermodynamique, stem:[c_(1) \  = 2 \  pi \  h \  c_(0)^(2)],
      stem:[c_(2) \  = h \  c_(0) \  / \  k], stem:[h] est la constante de Planck,
      stem:[c]~0~ est la {{vitesse de la lumière dans le vide, urn:iec:std:iec:60050-113-01-34}},
      et stem:[k] est la constante de Boltzmann
  examples: []
  id: 845-24-005
  notes:
  - content: La formule s'écrit parfois avec stem:[frac(c_(1))(pi " " Omega_(0))]
      au lieu de stem:[frac(c_(1))(pi)], où stem:[Ω]~0~ est l'angle solide de 1 sr.
  - content: Pour un récepteur dans un milieu d'indice de réfraction stem:[n], la
      luminance énergétique mesurée est stem:[n]^2^stem:[L]~e,~stem:[~λ~](stem:[λ],
      stem:[T]).
  - content: La loi de Planck peut aussi être exprimée pour donner la répartition
      spectrale de l'exitance énergétique, stem:[M]~e,~stem:[~λ~](stem:[λ], stem:[T]);
      dans la formule, le premier facteur est alors stem:[c]~1~ au lieu de stem:[frac(c_(1))(pi)].
  - content: Les deux grandeurs (luminance et exitance énergétiques) s'appliquent
      au {{rayonnement non polarisé, urn:iec:std:iec:60050-845-21-021}} tel qu'il
      est émis.
  - content: Pour les valeurs actualisées de la constante de Planck, stem:[h], la
      {{vitesse de la lumière dans le vide, urn:iec:std:iec:60050-113-01-34}}, stem:[c]~0~,
      et la constante de Boltzmann, stem:[k], voir CODATA.
  - content: Cet article était numéroté 845-04-05 dans l'IEC 60050-845:1987.
