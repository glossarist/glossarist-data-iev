  definition:
  - content: "{{amount of data, urn:iec:std:iec:60050-171-02-09}} that can be contained
      in a {{storage device, urn:iec:std:iec:60050-171-04-14}}, expressed as a number
      of specified {{data elements, urn:iec:std:iec:60050-171-02-01}}"
  examples:
  - content: Storage capacity for bits, stem:[M]~b~ or stem:[M]~bit~; storage capacity
      for bytes, stem:[M]~B~ (or for octets, stem:[M]~o~).
  id: 171-04-16
  notes:
  - content: The specified data elements depend on the organization of the storage
      device, for example, {{binary elements, urn:iec:std:iec:60050-171-02-10}}, {{bytes,
      urn:iec:std:iec:60050-171-02-12}}, {{words, urn:iec:std:iec:60050-171-02-27}}
      of a given number of bits, {{blocks, urn:iec:std:iec:60050-721-03-11}}. A subscript
      referring to a specified data element can be added to the symbol.
  - content: For {{registers, urn:iec:std:iec:60050-171-04-19}}, the term "register
      length" is used with the same meaning.
