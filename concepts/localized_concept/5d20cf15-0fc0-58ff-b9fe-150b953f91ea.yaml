  definition:
  - content: zone de jonction entre le nerf optique et la rétine ne comportant pas
      de photorécepteurs
  examples: []
  id: 845-22-005
  notes:
  - content: Du fait de l'absence de photorécepteurs au niveau de la tache aveugle,
      la rétine ne peut pas réagir à la lumière au niveau de cette zone.
  - content: La position rétinienne de la tache aveugle est à environ 15° d'un axe
      nasal par rapport à la fovéa selon l'angle visuel, et correspond à un angle
      de 7° environ en hauteur et un angle de 5° environ en largeur.
