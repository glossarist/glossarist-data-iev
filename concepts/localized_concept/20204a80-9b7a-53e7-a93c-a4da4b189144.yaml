  definition:
  - content: "{{electromagnetic noise, urn:iec:std:iec:60050-161-01-02}} having its
      source in man-made {{apparatus, urn:iec:std:iec:60050-151-11-22}} or {{installations,
      urn:iec:std:iec:60050-151-11-26}}"
  examples: []
  id: 161-01-18
  notes:
  - content: In English, the term "man-made noise"  is also used in radiocommunications,
      where the electromagnetic noise is a radio noise (see {{IEV 713-11-28, urn:iec:std:iec:60050-713-11-28}}).
  - content: In French, the terms "bruit artificiel" and "parasite artificiel" are
      also used in radiocommunications, where the electromagnetic noise is a radio
      noise (see {{IEV 713-11-28, urn:iec:std:iec:60050-713-11-28}}).
