data:
  definition:
  - content: 'événement consistant en un délestage de toutes les charges d’une ou
      de plusieurs parties de la zone sous commande, et qui peut entraîner d’autres
      déclenchements de production et divisions de réseauNote 1 à l’article: Les causes
      de ce type d’événement peuvent inclure les défaillances d’éléments, l’instabilité
      de réseau, une grave {{perturbation du réseau, urn:iec:std:iec:60050-692-01-10}},
      les indisponibilités d’éléments en cascade, l’écroulement de la tension de réseau
      et les combinaisons de ces phénomènes. Note 2 à l’article: L’écroulement de
      réseau peut être la cause d’une {{coupure, urn:iec:std:iec:60050-692-01-18}}
      de réseau.'
