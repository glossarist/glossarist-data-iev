  definition:
  - content: an ideal dielectric medium in which a variable electric field produces
      an electric current density vector stem:[vec(J)] of zero magnitude in a given
      direction in a particular frequency band
  examples: []
  id: 705-03-08
  notes:
  - content: For a homogeneous medium, the medium is a perfect dielectric in a given
      direction if the conductivity stem:[σ] may be considered zero in this direction.
  - content: Vacuum is a perfect dielectric at any frequency.
