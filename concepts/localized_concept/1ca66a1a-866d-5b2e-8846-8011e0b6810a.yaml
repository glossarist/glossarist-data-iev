  definition:
  - content: "of a material saturated by a magnetostatic field, the complex permeability
      when it is subjected to an electromagnetic wave having a circularly polarized
      stem:[vec(H)] field component in the plane perpendicular to the magnetostatic
      field strength:\r\nstem:[<u>μ</u>]~+~ = stem:[<u>μ</u>]~r~ + stem:[<u>κ</u>]~r~\n\nstem:[<u>μ</u>]~−~
      = stem:[<u>μ</u>]~r~ − stem:[<u>κ</u>]~r~\r\nwhere stem:[<u>μ</u>]~r~ and stem:[<u>κ</u>]~r~
      are components of Polder's tensor permeability"
  examples: []
  id: 221-03-04
  notes:
  - content: The subscript of stem:[µ] corresponds to the sign in the mathematical
      expression; stem:[<u>μ</u>]~+~ is applicable where the stem:[vec(H)] field rotates
      counterclockwise as a function of time when seen in the direction of the applied
      magnetostatic field; stem:[<u>μ</u>]~−~ is applicable to the reverse rotation.
  terms:
  - type: expression
    normative_status: preferred
    designation: scalar permeability for circularly polarized fields
  - type: symbol
    designation: stem:[<u>μ</u>]~+~,  stem:[<u>μ</u>]~−~
