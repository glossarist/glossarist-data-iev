  definition:
  - content: any temporary or permanent disturbance of the functioning of the ear,
      or of the nervous system, which may be caused to the user of a telephone earphone
      by a sudden sharp rise in the acoustic pressure produced by it
  examples: []
  id: 722-15-20
  notes:
  - content: An acoustic shock usually results from the occurrence, in abnormal circumstances,
      of short-lived high voltages at the terminals of a telephone set.
  terms:
  - type: expression
    normative_status: preferred
    designation: acoustic shock
