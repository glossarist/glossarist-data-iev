  definition:
  - content: for an inductive two-terminal element with terminals A and B, quotient
      of the linked flux stem:[Ψ] between the terminals by the electric current stem:[i]
      in the element  stem:[L = frac(Psi)(i)] where the sign of the linked flux is
      determined by taking the voltage, in the time integral defining it, as the difference
      of the electric potentials at terminals at A and B, and where the current is
      taken as positive if its direction is from A to B and negative if its direction
      is from B to A
  examples: []
  id: 131-12-19
  notes:
  - content: An inductance cannot be negative.
  - content: In French, the term “inductance” is also a short term for “bobine d’inductance”,
      in English “inductor” ({{151-13-25, urn:iec:std:iec:60050-151-13-25}}).
  - content: The coherent SI unit of inductance is henry, H.
