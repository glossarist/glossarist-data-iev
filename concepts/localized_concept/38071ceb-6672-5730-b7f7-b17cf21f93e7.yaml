  definition:
  - content: distance la plus importante entre deux points d’un axe spécifié perpendiculaire
      à l’axe d'alignement du faisceau, où l’intégrale de pression d'impulsion au
      carré est inférieure à sa valeur maximale sur l’axe spécifié par une quantité
      donnée
  examples: []
  id: 802-01-20
  notes:
  - content: Les largeurs de faisceau communément utilisées sont spécifiées à des
      niveaux –6 dB, –12 dB et –20 dB en dessous de la valeur maximale. Le calcul
      de décibel implique l’utilisation de 10 fois le logarithme (en base 10) des
      rapports des intégrales.
