  definition:
  - content: luminous flux leaving the LED and propagating within a given cone angle,
      stem:[α], (centred from the LED's mechanical axis) that is determined by a circular
      aperture of 50 mm in diameter and the distance measured from the tip of the
      LED
  examples: []
  id: 845-21-112
  notes:
  - content: A detailed method of measurement is given in CIE 127, _Measurement of
      LEDs_.
  - content: Partial LED flux is a quantity that applies to a single LED only and
      should not be confused with the term "{{partial luminous flux, urn:iec:std:iec:60050-845-21-110}}".
  - content: The partial LED flux is expressed in lumen (lm).
  terms:
