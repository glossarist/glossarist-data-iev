  definition:
  - content: number and reference together expressing magnitude of a {{quantity, urn:iec:std:iec:60050-112-01-01}}
  examples: []
  id: 112-01-28
  notes:
  - content: "According to the type of reference, the value of a quantity is either:\r\n.
      a product of a number and a unit of measurement (the unit one is generally omitted
      for quantities of dimension one, as in examples f and g):\r\na) Length of a
      given rod: 5,34 m or 534 cm\r\nb) Mass of a given body: 0,152 kg  or 152 g\r\nc)
      Curvature of a given arc: 112 m–1, expressed in words by \"one hundred and twelve
      per metre\"\r\nd) Celsius temperature of a given sample: –5 °C\r\ne) Electric
      impedance of a given circuit element at a given frequency, where j is the imaginary
      unit: (7,5 + 3,2 j) Ω\r\nf) Refractive index of a given sample of glass: 1,32\r\ng)
      Mass fraction of cadmium in a given sample of copper: 3 µg/kg or  3 × 10–1\r\nh)
      Molality of Pb2+ in a given sample of water: 1,76 mmol/kg. a number and a reference
      to a measurement procedure:\r\nRockwell C hardness of a given sample: 43,5 HCR.
      a number and a reference material:\r\nArbitrary amount-of-substance concentration
      of lutropin in a given sample of human blood plasma (WHO International Standard
      80/552 used as a calibrator): 5,0 IU/l, where \"IU\" stands for \"WHO International
      Unit\"\n\nIn the first case, the value of a quantity stem:[Q] is generally denoted
      {stem:[Q]}[[stem:[Q]]] where {stem:[Q]} is the numerical value and [[stem:[Q]]]
      is the unit of measurement."
  - content: The number can be complex (see example e in Note 1 to entry).
  - content: The value of a quantity can be presented in more than one way (see examples
      a, b, and g in Note 1 to entry).
  - content: "In the case of vector or tensor quantities, each component has a value,
      and the same for the magnitude of a vector quantity. Example:\r\nforce acting
      on a given particle, e.g. in Cartesian components\n\n(stem:[F]~stem:[x]~; stem:[F]~stem:[y]~;
      stem:[F]~stem:[z]~) = (–31,5; 43,2; 17,0) N"
