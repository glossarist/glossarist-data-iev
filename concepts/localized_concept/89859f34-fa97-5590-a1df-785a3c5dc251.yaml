  definition:
  - content: bruit radioélectrique produit par des décharges électriques naturelles
      au-dessous de l'ionosphère et atteignant le point de réception suivant des trajectoires
      situées dans le milieu fortement dispersif de la plasmasphère
  examples: []
  id: 713-11-26
  notes:
  - content: Les sifflements se produisent en ondes kilométriques, myriamétriques
      et plus longues et comprennent habituellement une ou plusieurs composantes dont
      la fréquence instantanée décroît régulièrement dans la gamme des fréquences
      acoustiques en un temps allant d'une fraction de seconde à plusieurs secondes.
