---
data:
  definition:
  - content: "{{dispositif, urn:iec:std:iec:60050-151-11-20}} mécanique qui saisit
      des objets microscopiques\r\nNote 1 à l’article: Les micropinces ont deux rôles.
      Elles peuvent être utilisées comme outils pour assembler des {{micromachines,
      urn:iec:std:iec:60050-523-01-03}} ou comme les mains des microrobots, etc. Dans
      l’un ou l’autre cas, la micropince comporte des doigts pour saisir des objets
      et un {{actionneur, urn:iec:std:iec:60050-151-13-49}} pour les manipuler. Comparées
      à une main de microrobot, les micropinces possèdent une grande structure, mais
      nécessitent un dispositif de commande précis. Comme la fonction d’une micropince
      est simplement de saisir un objet, une préhension autorisant plusieurs degrés
      de liberté nécessite la combinaison de manipulateurs adaptés. Comparée à une
      manipulation de type sans contact utilisant un faisceau laser, la manipulation
      de type à contact fondée sur une micropince ou un dispositif analogue autorise
      une meilleure commande d’orientation de l’objet. Cependant, si la taille de
      l’objet à manipuler est inférieure à plusieurs dizaines de micromètres, les
      forces d’attraction entre les surfaces des doigts de la micropince et l’objet
      manipulé rendent la manipulation difficile."
