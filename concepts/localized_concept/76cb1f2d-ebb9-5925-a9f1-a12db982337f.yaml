  definition:
  - content: a device for transforming an unbalanced voltage to a balanced voltage
      or vice-versa
  examples: []
  id: 712-06-03
  notes:
  - content: A balun is used, for example, to couple a balanced antenna to an unbalanced
      feed line.
  - content: The term is derived from "balanced to unbalanced transformer".
  - content: A balun may be realized in practice by using a transformer or a lumped
      parameter or distributed parameter network which may include active devices.
  - content: A balun may exhibit inherent impedance transformation differing from
      unity.
