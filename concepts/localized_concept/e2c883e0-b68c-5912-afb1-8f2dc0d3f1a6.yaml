  definition:
  - content: quotient of the spectral radiant flux absorbed between the internal entry
      and exit surfaces of the layer and the spectral flux that enters into the layer
      after crossing the entry surface
  examples: []
  id: 845-24-089
  notes:
  - content: For a given layer the spectral internal absorptance depends on the path
      length of the radiation in the layer, and hence, in particular, on the angle
      of incidence.
  - content: The spectral internal absorptance has unit one.
  - content: This entry was numbered 845-04-82 in IEC 60050-845:1987.
