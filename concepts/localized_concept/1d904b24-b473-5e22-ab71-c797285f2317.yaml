data:
  definition:
  - content: 'rapport entre la période de temps (stem:[t]~1~), au cours duquel la
      tension de sortie est supérieure à un niveau spécifié, et la période de temps
      (stem:[t]~2~), au cours duquel la tension de sortie est inférieure au niveau
      spécifiéimage::/assets/images/parts/561/[] *Figure 17 – Caractéristiques d’une
      forme d’onde de sortie* Note 1 à l’article: La symétrie est exprimée en pourcentage
      de la durée de la période totale du signal. Note 2 à l’article: Le niveau spécifié
      peut être la moyenne arithmétique des niveaux stem:[V]~OL~ et stem:[V]~OH~ ou
      50 % de l’amplitude crête à crête. Le rapport est exprimé comme suit: stem:[frac(100
      " " " " " " " " t_(1))(t_(1) + t_(2)) : frac(100 " " " " " " " " " " t_(2))(t_(1)
      + t_(2))]'
