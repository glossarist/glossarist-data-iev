  definition:
  - content: luminance coefficient multiplied by the cube of the cosine of the angle
      of incidence of the light on a point on a surface
  examples: []
  id: 845-21-103
  notes:
  - content: The reduced luminance coefficient can be expressed by the equationstem:[r] =
      stem:[q](cos stem:[ε])^3^^where^ stem:[q] is the luminance coefficient in steradian
      to the power minus one (sr^−1^), and stem:[ε] is the angle of incidence in degree
      (°).
  - content: The angle of observation, stem:[α], affects the value of stem:[r]. By
      convention this angle is fixed at 1° for road lighting calculations.
  - content: The reduced luminance coefficient is expressed in steradian to the power
      minus one (sr^−1^).
