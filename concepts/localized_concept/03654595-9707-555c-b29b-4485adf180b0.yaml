data:
  definition:
  - content: "intervalle de temps dans la vie d’une entité pendant lequel l’intensité
      instantanée de défaillance, pour une entité réparable, ou le taux instantané
      de défaillance, pour une entité non réparable, augmente de façon importante
      en fonction du temps\r\nNote 1 à l’article: L’augmentation considérée comme
      importante dépend de l’application."
