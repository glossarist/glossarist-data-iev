  definition:
  - content: quotient of the total radiant flux of all wavelengths emitted by the
      fluorescent process for an excitation wavelength and the total radiant excitation
      power irradiating the {{fluorescent material, urn:iec:std:iec:60050-845-24-041}}
  examples: []
  id: 845-21-088
  notes:
  - content: This quantity is also measured in relative terms by comparison to the
      radiant flux reflected from the perfect reflecting diffuser identically irradiated
      and viewed for a given excitation wavelength.
  - content: Fluorescence is understood to include both fluorescent and phosphorescent
      phenomena with time constants short enough to be ignored for the application.
  - content: The spectral external radiant efficiency of the fluorescent specimen
      has unit one.
  terms:
  - type: expression
    normative_status: preferred
    designation: spectral external radiant efficiency of the fluorescent specimen
