  definition:
  - content: "{{binary digit rate, urn:iec:std:iec:60050-704-16-07}} equivalent to
      a {{transfer rate, urn:iec:std:iec:60050-171-06-03}} for specified {{data elements,
      urn:iec:std:iec:60050-171-02-01}}"
  examples: []
  id: 171-06-04
  notes:
  - content: The data signalling rate is the minimum value of the binary digit rate
      strictly necessary to convey the same information in the same duration as a
      given digital signal at a given transfer rate.
  - content: The data signalling rate in parallel transmission is given by stem:[sum_(i
      = 1)^(m) frac(1)(T_(i)) log_("2") " " n_(i)], where stem:[m] is the number of
      parallel transmission channels, stem:[T~i~] is the duration of the significant
      interval for the stem:[i]-th channel, stem:[n~i~] is the number of significant
      conditions in the stem:[i]-th channel.
  - content: The unit of data signalling rate is the bit per second (bit/s).
