---
data:
  definition:
  - content: luminance d'un champ de comparaison dont le rayonnement de {{fréquence,
      urn:iec:std:iec:60050-103-06-02}} 540 × 10^12^ Hz a la même luminosité que le
      champ pris en considération dans les conditions de mesure photométrique spécifiées
      et le champ de comparaison doit avoir une dimension et une forme définies qui
      peuvent être différentes de celles du champ pris en considération
  examples: []
  id: 845-21-095
  notes:
  - content: Le rayonnement à une fréquence de 540 × 10^12^ Hz a une longueur d'onde
      dans l'air normal de 555,017 nm environ.
  - content: Un champ de comparaison, dont le rayonnement a une {{répartition spectrale
      relative, urn:iec:std:iec:60050-845-21-030}} quelconque peut également être
      utilisé, si la luminance équivalente de ce champ est connue dans les mêmes conditions
      de mesure.
  - content: La luminance équivalente est exprimée en candela par mètre carré (cd·m^−2^).
  - content: Cet article était numéroté 845-01-58 dans l'IEC 60050-845:1987.
