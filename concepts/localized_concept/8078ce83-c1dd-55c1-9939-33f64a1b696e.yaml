  definition:
  - content: modification of the vaporization state involving a quick and large reduction
      of the thermal exchange at the wall caused by departure from nucleate to film
      boiling
  examples: []
  id: 395-07-30
  notes:
  - content: In the core, this phenomenon can cause a temperature elevation and some
      damages on the fuel elements.
  - content: In the steam generator, this phenomenon can cause performance degradation,
      corrosion and formation of sediments on the dried parts.
  - content: This entry was numbered 393-17-56 in IEC 60050-393:2003.
