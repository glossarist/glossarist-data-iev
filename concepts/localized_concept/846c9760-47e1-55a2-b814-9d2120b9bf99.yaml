  definition:
  - content: "relative change in permittivity due to a change in temperature divided
      by the change in temperature \r\nstem:[T C epsilon = frac(epsilon_(T) – epsilon_(\"ref\"))(epsilon_(\"ref\")
      (T – T_(\"ref\")))]\r\nwhere stem:[ε]~stem:[T]~ is the permittivity at temperature
      stem:[T]; stem:[ε]~ref~ is the permittivity at reference temperature stem:[T]~ref~"
  examples: []
  id: 561-06-07
  notes:
  - content: The temperature coefficient of permittivity is generally expressed in
      megakelvins to the power minus one (1/MK).
