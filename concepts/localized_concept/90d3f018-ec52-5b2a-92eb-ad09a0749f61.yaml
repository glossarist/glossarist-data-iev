  id: 121-11-58
  notes:
  - content: The negative of the gradient of the scalar magnetic potential is the
      irrotational magnetic field strength.
  - content: The scalar magnetic potential is not unique since any constant scalar
      quantity can be added to a given scalar magnetic potential without changing
      its gradient.
