  notes:
  - content: Une fonction stem:[D](stem:[x]) peut être considérée comme une distribution
      stem:[D] associant à une fonction stem:[f](stem:[x]) la valeur  stem:[D ( f
      ) = int_(- oo)^(+ oo) D ( x ) f ( x ) "d" x] si cette intégrale existe.
  - content: La dérivée d'une distribution stem:[D] est une autre distribution stem:[D]′
      définie pour toute fonction stem:[f](stem:[x]) par stem:[D^(prime) ( f ) = -
      D ( "d" f / " " "d" x )].
