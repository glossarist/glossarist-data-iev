  definition:
  - content: fonctionnelle linéaire continue qui associe un nombre réel ou complexe
      à toute fonction de variable réelle ou complexe appartenant à la classe des
      fonctions indéfiniment dérivables nulles en dehors d'un intervalle ou domaine
      borné
  examples: []
