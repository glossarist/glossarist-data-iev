---
data:
  definition:
  - content: matériau qui présente une fluorescence par suite d'une exposition à un
      {{rayonnement optique, urn:iec:std:iec:60050-845-21-002}}
  examples: []
  id: 845-24-041
  notes:
  - content: Les matériaux fluorescents absorbent l'énergie d'un rayonnement optique
      dans les régions de longueurs d'onde plus courtes du spectre visible et/ou dans
      la région des ultraviolets et réémettent une partie de cette énergie à des longueurs
      d'onde plus grandes, produisant des bandes d'émission étroites dans la région
      visible.
  - content: Voir aussi "{{matériau photoluminescent, urn:iec:std:iec:60050-845-24-040}}",
      "{{couleur fluorescente lumière du jour, urn:iec:std:iec:60050-845-22-055}}".
