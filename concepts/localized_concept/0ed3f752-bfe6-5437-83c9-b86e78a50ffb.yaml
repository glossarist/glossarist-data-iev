  definition:
  - content: functional unit for the transfer of data between several participants,
      these being functional units for data processing, via a common transmission
      path, wherein participants are not involved in the transfer of data between
      other participants
  examples: []
  id: 351-56-10
  notes:
  - content: The logic and functional definition of a bus applies independently of
      the topological configuration and physical implementation of the bus. A bus
      may have a line or a ring configuration.
  - content: In some cases, transmission rights are distributed by another participant,
      for example by a bus arbitrator.
  - content: This entry was numbered 351-32-10 in IEC 60050-351:2006.
