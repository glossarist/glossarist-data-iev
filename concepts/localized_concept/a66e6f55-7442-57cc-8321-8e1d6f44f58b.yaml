---
data:
  definition:
  - content: ensemble des moyens nécessaires pour assurer la {{transmission, urn:iec:std:iec:60050-701-01-03}}
      de {{signaux, urn:iec:std:iec:60050-101-12-02}} dans un seul sens entre deux
      points
  examples: []
  id: 701-02-01
  notes:
  - content: Plusieurs voies de transmission peuvent partager un support commun; par
      exemple, une {{bande de fréquences, urn:iec:std:iec:60050-103-09-01}} particulière
      ou bien un {{créneau temporal, urn:iec:std:iec:60050-704-13-08}} particulier
      est réservé à chaque voie de transmission.
  - content: L'adjectif "de transmission" peut être remplacé par un adjectif indiquant
      la nature des signaux transmis, par la {{largeur de bande de fréquences, urn:iec:std:iec:60050-702-01-03}}
      ou le {{débit numérique, urn:iec:std:iec:60050-702-05-23}}; par exemple, voie
      téléphonique, {{voie télégraphique, urn:iec:std:iec:60050-721-11-01}}, {{voie
      de données, urn:iec:std:iec:60050-714-12-01}}, voie de 10 MHz, voie à 34 Mbit/s.
