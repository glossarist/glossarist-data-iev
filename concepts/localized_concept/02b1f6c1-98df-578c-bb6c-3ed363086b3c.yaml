---
data:
  definition:
  - content: "constante physique conventionnelle qui relie la {{température thermodynamique,
      urn:iec:std:iec:60050-113-04-14}} et l’{{énergie, urn:iec:std:iec:60050-113-03-45}},
      dont la valeur est fixée à 1,380 649 × 10^−23^ {{J, urn:iec:std:iec:60050-113-03-46}}/{{K,
      urn:iec:std:iec:60050-112-02-08}}\r\nNote 1 à l’article: La constante de Boltzmann
      établit la relation entre l’énergie cinétique moyenne stem:[E] des particules
      dans un gaz idéal et la température thermodynamique stem:[T] du gaz comme suit:\r\nstem:[E
      = frac(3)(2) k T].\r\nNote 2 à l’article: La constante de Boltzmann est employée
      dans le {{SI, urn:iec:std:iec:60050-112-02-02}} pour définir le {{kelvin, urn:iec:std:iec:60050-112-02-08}}."
