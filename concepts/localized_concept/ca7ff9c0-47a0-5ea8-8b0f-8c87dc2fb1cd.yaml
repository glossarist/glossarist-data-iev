  definition:
  - content: the part stem:[b] of a complex number stem:[c = a + rm(j) b], where stem:[a]
      and stem:[b] are real numbers
  examples: []
  id: 102-02-12
  notes:
  - content: The imaginary part of a complex number stem:[c] is denoted by stem:["I"
      m " " c] (where I is an uppercase i) or sometimes by stem:[c]″ in electrotechnology.
  - content: The concept of imaginary part may be applied to complex scalar, vector
      or tensor quantities or to matrices of complex elements.
