  definition:
  - content: transfer element the behaviour of which obeys the principle of superposition
  examples: []
  id: 351-45-04
  notes:
  - content: The principle of superposition implies that such a transfer element may
      be described by a set of linear equations.
  - content: A transfer element, which does not have this property, is called non-linear
      transfer element.
  - content: This entry was numbered 351-24-04 in IEC 60050-351:2006.
