  id: 702-07-25
  notes:
  - content: "Si on peut définir des impédances, le facteur d'adaptation est donné
      par la formule:\r\nstem:[- \" \" 20 \" \" \"lg\" \" \" |r| = 20 \" \" \"lg\"
      \" \" |frac(underline(Z) - underline(Z)^(prime))(underline(Z) + underline(Z)^(prime))|]\r\noù
      stem:[<u>Z</u>] est l'impédance caractéristique d'une ligne de transmission
      avant une discontinuité ou l'impédance d'une source, et stem:[<u>Z</u>]′ est
      l'impédance après la discontinuité ou l'impédance de la charge vue de l'accès
      commun à la source et à la charge."
