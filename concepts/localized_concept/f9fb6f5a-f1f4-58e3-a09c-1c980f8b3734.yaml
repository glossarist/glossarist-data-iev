  definition:
  - content: the ratio of the magnitude of the phase velocity vector of a sinusoidal
      wave in a given direction to the frequency of the wave
  examples: []
  id: 705-02-17
  notes:
  - content: The wavelength has its minimum value in the direction of propagation;
      if no direction is specified. the wavelength is that in the direction of propagation.
  - content: The wavelength in any direction is 2stem:[π] divided by the absolute
      value of the component, in this direction, of the real part of the wave vector.
