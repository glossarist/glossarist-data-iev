---
data:
  definition:
  - content: "microscope qui mesure la géométrie microscopique en contrôlant le {{déplacement,
      urn:iec:std:iec:60050-113-01-29}} d'un microlevier provoqué par la force atomique
      entre l’extrémité du microlevier et le spécimen, au cours du balayage du microlevier
      en une configuration de {{trame, urn:iec:std:iec:60050-531-14-20}}\r\nNote 1
      à l’article: La méthode du levier optique est utile pour contrôler le déplacement
      du microlevier. Le déplacement du microlevier est mesuré en détectant la lumière
      réfléchie par le microlevier. Il existe trois types de mouvements de microlevier
      dans les mesures: 1) la méthode dans laquelle le microlevier touche le spécimen;
      2) la méthode qui contrôle les variations d’{{amplitude, urn:iec:std:iec:60050-523-03-11}}
      du microlevier vibrant avec contact cyclique (mode contact intermittent); 3)
      la méthode qui contrôle les variations de fréquence du microlevier vibrant sans
      contact entre le microlevier et le spécimen. \r\nNote 2 à l’article: Le terme
      abrégé \"AFM\" est dérivé du terme anglais développé correspondant \"atomic
      force microscope\"."
