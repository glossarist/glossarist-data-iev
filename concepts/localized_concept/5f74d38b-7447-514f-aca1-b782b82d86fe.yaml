  definition:
  - content: 'pour un élément à action par dérivation, quantité égale au coefficient
      d''action par dérivation, si ses variables d''entrée et de sortie sont des grandeurs
      variables de même nature Note 1 à l’article: La constante de temps de dérivation
      est alors donnée par stem:[T]~D~ = stem:[K]~D~, où stem:[K]~D~ est le coefficient
      d''action par dérivation.Note 2 à l’article: La constante de temps de dérivation
      peut également être donnée comme la durée de l''intervalle de temps nécessaire
      pour qu''une variation en rampe de la variable d''entrée d’un élément par dérivation
      atteigne la même valeur que la variation en échelon de la variable de sortie
      correspondante.'
