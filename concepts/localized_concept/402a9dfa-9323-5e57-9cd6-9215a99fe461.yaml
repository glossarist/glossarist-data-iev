  definition:
  - content: any {{device, urn:iec:std:iec:60050-651-21-15}}, extensible, articulating,
      or both, made essentially of insulating components and which is primarily designed
      and used to position personnel at an electric potential different from that
      of earth
  examples: []
  id: 651-22-17
  notes:
  - content: An insulating aerial device may also be used to handle material if designed
      and equipped for that purpose.
  - content: An insulating aerial device does not include a chassis. When an insulating
      aerial device is mounted on a mobile chassis it becomes a component of a mobile
      elevating work platform (MEWP).
