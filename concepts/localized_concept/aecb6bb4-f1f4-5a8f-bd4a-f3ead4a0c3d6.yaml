  id: 702-02-15
  notes:
  - content: Le déphasage linéique d'une ligne de transmission ou d'un guide d'ondes
      est la limite du quotient de la variation de phase d'une grandeur de champ entre
      deux points sur l'axe par la distance des deux points, lorsque cette distance
      tend vers zéro.
