  definition:
  - content: law stating that when a point on the retina is excited by a light stimulus
      that undergoes periodic variations in magnitude at a {{frequency, urn:iec:std:iec:60050-103-06-02}}
      that exceeds the {{critical flicker frequency, urn:iec:std:iec:60050-845-22-093}},
      the visual perception produced is identical to that produced by a steady stimulus
      whose magnitude is equal to the mean magnitude of the variable stimulus taken
      over one period
  examples: []
