  definition:
  - content: "for a network containing stem:[l] directed loops and stem:[b] branches,
      and in which a reference direction is chosen for each branch, matrix of type
      stem:[l] × stem:[b] where the element stem:[a]~stem:[ij]~ is:\r\n* 0 if branch
      j is not in loop i* 1 if branch j is in loop i with the same direction* −1 if
      branch j is in loop i with opposite direction"
  examples: []
  id: 131-13-22
  notes:
  - content: "– The figure gives a network and the corresponding branch-mesh incidence
      matrix when both loops 1 and 2 are directed anticlockwise."
