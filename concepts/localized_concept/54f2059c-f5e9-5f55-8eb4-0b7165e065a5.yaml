  examples: []
  id: 714-06-01
  notes:
  - content: A signal may stem from the state or change of state of the system which
      sends it.
  - content: 'A signal may intentionally change the state of the system which receives
      it: the state of the receiving system may be indeterminate whilst the signal
      is being applied to it.'
