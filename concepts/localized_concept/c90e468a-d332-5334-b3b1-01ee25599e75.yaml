  definition:
  - content: rapports des coefficients de la forme linéaire qui représente un mode
      dégénéré en fonction des modes de propagation indépendants dans un guide d'ondes
  examples: []
  id: 726-04-14
  notes:
  - content: S'il y a exactement stem:[n] modes de propagation indépendants, la polarisation
      d'un mode dégénéré donné est déterminée entièrement par stem:[n] —1 rapports
      de polarisation au plus.
  - content: Dans un guide d'ondes de section droite, carrée ou circulaire, il y a
      deux modes de propagation indépendants, et la polarisation d'un mode dégénéré
      donné est déterminée par un seul rapport de polarisation.
