  definition:
  - content: ratio of two quantities, used as a multiplier to express the proportionality
      equation between them
  examples: []
  id: 112-03-04
  notes:
  - content: The term "factor" is also used to designate each element in a product
      of two or more elements, e.g. a numerical factor in a quantity equation, the
      dimension of a base quantity in the dimension of a quantity.
  - content: 'A factor is a quantity of dimension one. Examples: coupling factor,
      quality factor, peak factor, power factor.'
