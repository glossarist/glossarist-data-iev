  definition:
  - content: radiation detector which reveals optical defects produced by ionizing
      radiation in the material constituting the detector
  examples: []
  id: 395-03-56
  notes:
  - content: For example, the track etch detector is a neutron radiation detector
      consisting of a light plastic material (e.g. CR39) in which the incoming radiation
      physically displace the nuclei of that material.
  - content: The observation of the tracks of the incoming particles by etching allows
      the establishment of a relationship between the number of tracks and incoming
      particle fluence.
  - content: This entry was numbered 394-24-09 in IEC 60050-394:2007.
