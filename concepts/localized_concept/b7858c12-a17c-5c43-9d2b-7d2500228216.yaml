  definition:
  - content: quotient of absorbed radiant flux, stem:[Φ]~a~, and incident radiant
      flux, stem:[Φ]~m~stem:[alpha = frac(Phi_("a"))(Phi_("m"))]
  examples: []
  id: 845-24-082
  notes:
  - content: The absorptance is also defined spectrally in terms of wavelength, in
      which case, "spectral" is added before the quantity name.
  - content: Due to energy conservation, stem:[α] + stem:[ρ] + stem:[τ] = 1 except
      when {{polarized radiation, urn:iec:std:iec:60050-845-21-017}} is observed,
      where stem:[ρ] is reflectance and stem:[τ] is transmittance.
  - content: The absorptance has unit one.
  - content: This entry was numbered 845-04-75 in IEC 60050-845:1987.
