  definition:
  - content: solid-state device embodying a p-n junction, emitting incoherent {{optical
      radiation, urn:iec:std:iec:60050-845-21-002}} when excited by an electric current
  examples: []
  id: 845-27-050
  notes:
  - content: This definition is independent from the existence of enclosure(s) and
      of terminals.
  - content: The output of an LED is a function of its physical construction, the
      material from which the LED is constructed and the exciting current. The optical
      emission can be in the ultraviolet, visible, or infrared wavelength regions.
  - content: The term "LED" represents the LED die (or chip), or LED package. It is
      also used as part of a compound term, e.g. "LED technology", "LED television".
  - content: The term "LED" shall not be used as an adjective for reporting product
      performance as for example "LED luminous flux", "LED colour rendering" or "LED
      lifetime". Instead, use for example "luminous flux of the LED package", "colour
      rendering of the LED module" or "lifetime of the LED lamp".
  - content: This entry was numbered 845-04-40 in IEC 60050-845:1987.
