  definition:
  - content: "1. in theory, a mutually synchronized network in which all the clocks
      are of equal status and directly exert equal amounts of control on all the other
      clocks\r\n2. in practice, a mutually synchronized network in which all the clocks
      are of equal status and in which each clock directly exerts equal amounts of
      control on a few other clocks"
  examples: []
  id: 704-15-05
  notes:
  - content: In the theoretical case, the network operating frequency or digit rate
      is the mean of the natural frequencies of all the clocks.
  terms:
  - type: expression
    normative_status: preferred
    designation: democratic mutually synchronized network
