  definition:
  - content: random noise due to the fact that electric current is constituted by
      movement of discrete charges
  examples: []
  id: 702-08-46
  notes:
  - content: Shot noise appears essentially in semiconductor devices or electron tubes.
  - content: Shot noise has a continuous spectrum and may be considered as white noise
      in a frequency band between very low frequencies and the higher frequencies
      where effects such as transit time become dominant.
