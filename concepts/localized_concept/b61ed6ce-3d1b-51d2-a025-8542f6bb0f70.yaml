  definition:
  - content: integral numbers given to the successive overtones of a given mode of
      vibration, in order of increasing frequency commencing with the fundamental
      as unity frequency
  examples: []
  id: 561-01-65
  notes:
  - content: For shear and extension modes, the overtone order is the quotient of
      the frequency of the overtone by the fundamental frequency rounded to the nearest
      whole number.
  - content: This entry was numbered 561-02-04 in IEC 60050-561:1991.
