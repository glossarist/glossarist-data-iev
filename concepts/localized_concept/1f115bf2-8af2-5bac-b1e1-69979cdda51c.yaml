  definition:
  - content: at a given point within a domain of quasi-infinitesimal volume stem:[V],
      vector quantity equal to the electric dipole moment *stem:[p]* of the substance
      contained within the domain divided by the volume, stem:[V] *stem:[P]* stem:[=]
      *stem:[p]* stem:[/]*stem:[V]*
  examples: []
  id: 561-05-05
  notes:
  - content: "The electric polarization *stem:[P]* satisfies the relation \r\nstem:[D
      = epsilon_(0) E + P]\r\nwhere *stem:[D]* is the electric flux density; *stem:[E]*
      is the electric field strength; \r\nstem:[epsilon_(0)] is the dielectric constant
      in free space."
