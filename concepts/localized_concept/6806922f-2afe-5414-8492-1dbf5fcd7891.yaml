  definition:
  - content: "dans une représentation graphique de la relation entre l'induction magnétique
      et le champ magnétique à l'intérieur d'un matériau, domaine autour de l'origine
      dans lequel l'induction peut être représentée par une fonction quadratique du
      champ:\r\nstem:[frac(B)(mu_(0)) = (mu_(\"i\") + v \" \" hat(H)) H pm frac(v)(2)
      (hat(H)^(2) - H^(2))]\r\noù stem:[B] est l'induction magnétique\n\nstem:[µ]~0~
      est la constante magnétique\n\nstem:[µ]~i~ est la perméabilité initiale\n\nstem:[H]
      est le champ magnétique\n\nstem:[hat(H)] est la valeur de crête de stem:[H]\n\net
      stem:[v] est le coefficient d'hystérésis de Rayleigh"
