  definition:
  - content: matériau magnétique présentant une coercitivité faible.
  examples: []
  id: 221-01-15
  notes:
  - content: Une valeur spécifique de la coercitivité définissant la frontière entre
      les matériaux magnétiques durs et doux est difficile à préciser. Elle se situe
      dans la région de 1 à 10 kA/m.
  - content: Certains aciers magnétiques doux, tels que les aciers au silicium utilisés
      dans la construction électrique, sont parfois appelés en anglais "electrical
      steels" et peuvent se présenter sous forme de tôles magnétiques.
