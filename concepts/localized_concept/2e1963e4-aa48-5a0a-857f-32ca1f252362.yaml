  definition:
  - content: number of specified {{data elements, urn:iec:std:iec:60050-171-02-01}}
      that are or can be contained in a given storage device or that are or can be
      transferred in a given time interval
  examples: []
  id: 171-02-09
  notes:
  - content: The specified data elements are, for example, {{binary digits, urn:iec:std:iec:60050-171-02-10}},
      {{bytes, urn:iec:std:iec:60050-171-02-12}}, {{words, urn:iec:std:iec:60050-171-02-27}}
      of a given number of bits, {{blocks, urn:iec:std:iec:60050-721-03-11}}.
  - content: For {{storage devices, urn:iec:std:iec:60050-171-04-14}}, the terms "storage
      capacity" and "storage size" (see {{IEV 171-04-16, urn:iec:std:iec:60050-171-04-16}})
      are used with the same meaning. For {{registers, urn:iec:std:iec:60050-171-04-19}},
      the term "register length" is used with the same meaning.
