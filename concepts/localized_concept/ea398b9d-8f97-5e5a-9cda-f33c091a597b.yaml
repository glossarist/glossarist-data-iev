  id: 581-27-37
  notes:
  - content: During connector module engaging (insertion), at least one contact of
      the higher level shall connect before any contact of a lower contact level;
      whilst during connector module disengaging (withdrawal), at least one contact
      of the higher level will not disconnect before any contact of a lower contact
      level.
