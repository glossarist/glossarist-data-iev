  definition:
  - content: contacteur muni d'un dispositif d'accrochage empêchant ses éléments mobiles
      de retourner à leur position de repos quand on cesse d'actionner le dispositif
      de commande
  examples: []
  id: 441-14-34
  notes:
  - content: L'accrochage et le déclencheur d'accrochage peuvent être mécaniques,
      électromagnétiques, pneumatiques, etc.
  - content: Du fait de son accrochage, le contacteur à accrochage possède en fait
      une seconde position de repos et, d'après la définition du contacteur il n'est
      pas à proprement parler un contacteur. Cependant, étant donné que le contacteur
      à accrochage, tant par son utilisation que par sa conception, se rapproche davantage
      d'un contacteur en général que de toute autre sorte d'appareil de connexion,
      on admet qu'il réponde aux spécifications des contacteurs dans la mesure du
      possible.
