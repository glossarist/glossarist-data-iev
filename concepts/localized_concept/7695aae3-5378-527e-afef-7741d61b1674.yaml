  definition:
  - content: dispositif de mesure de la puissance qui contient un élément absorbant
      l'énergie dont le changement de résistance, déterminé par son coefficient de
      température, est employé comme moyen de mesure de la puissance
  examples: []
  id: 726-21-04
  notes:
