  definition:
  - content: "pour une tôle magnétique, rapport exprimé en pourcentage de la différence
      entre la valeur de crête du champ magnétique appliqué stem:[hat(H)_(alpha)]
      mesurée sous un angle stem:[α] par rapport à la direction du laminage, et la
      valeur de crête du champ magnétique stem:[hat(H)_(0)] mesurée dans la direction
      du laminage, à cette valeur stem:[hat(H)_(0)], pour une valeur de crête déterminée
      de l'induction magnétique:\r\nstem:[T_(H) = frac(hat(H)_(alpha) - hat(H)_(0))(hat(H)_(0))
      xx 100 \" \" \" \" %]"
  examples: []
  id: 221-03-40
  notes:
  - content: Les mesures de stem:[hat(H)_(alpha)] et stem:[hat(H)_(0)] sont à faire
      dans les mêmes conditions.
