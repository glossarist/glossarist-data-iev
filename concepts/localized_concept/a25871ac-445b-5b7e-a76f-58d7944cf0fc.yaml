  definition:
  - content: for all types of ions in a solution, half the sum of the products of
      their molality stem:[b]~stem:[i]~ and the square of their charge number stem:[z]~stem:[i]~
      stem:[I = frac(1)(2) sum z_(i)^(2) b_(i)]
  examples: []
  id: 114-01-24
  notes:
  - content: Charge number is a quantity of dimension one defined in 113-05-17.
  - content: The coherent SI unit of ionic strength is mole per kilogram, mol/kg.
  - content: 'This entry was numbered 111-15-29 in IEC 60050-111:1996. It has been
