  definition:
  - content: 'Hermitian matrix *stem:[A]* such that, for any non-zero column matrix
      *stem:[U]* with complex elements, the 1 × 1 matrix *stem:[U]*^H^*stem:[AU]*
      has a unique element which is real and positive: (*stem:[U]*^H^*stem:[AU]*)~11~
      > 0'
  examples: []
  id: 102-06-29
  notes:
  - content: A symmetric matrix *stem:[A]* with real elements is a positive definite
      matrix if *stem:[U]*^T^*stem:[AU]* > 0 for any non-zero column matrix *stem:[U]*
      with real elements.
  - content: All eigenvalues of a positive definite matrix are positive.
  terms:
