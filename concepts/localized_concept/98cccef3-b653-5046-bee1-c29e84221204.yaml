  definition:
  - content: length of the path in the atmosphere that is required to attenuate by
      95&#160;% the luminous flux in a collimated beam from a source at a colour temperature
      of 2&#160;700&#160;K
  examples: []
  id: 845-31-018
  notes:
  - content: The value of the attenuation has been chosen so that the meteorological
      optical range provides an approximate measure of the commonly used concept of
      meteorological visibility.
  - content: The meteorological optical range, stem:[v], is related to the atmospheric
      transmissivity, stem:[T], assumed to be uniform, by the formulastem:[v = d_(0)
      frac(log " " " " 0,05)(log " " " " T)] or stem:[T = 0,05^(d_("0") / v)]where
      stem:[d]~0~ is the length specified in the definition of atmospheric transmissivity.These
      formulae are sometimes writtenstem:[v = frac(log " " " " 0,05)(log " " " " T)]
      or stem:[T = 0,05^(1 / v)] with stem:[d]~0~ set to unity.
  - content: This entry was numbered 845-11-20 in IEC 60050-845:1987.
  terms:
