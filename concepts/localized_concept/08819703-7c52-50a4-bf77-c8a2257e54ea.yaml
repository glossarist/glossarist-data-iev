data:
  definition:
  - content: sous-ensemble d'un ensemble, qui est différent de l'ensemble
  examples: []
  id: 102-01-05
  notes:
  - content: La notation stem:[A subset B] exprime que l'ensemble stem:[A] est un
      sous-ensemble strict de l'ensemble stem:[B]. Le symbole stem:[underset(ne)(subset)]
      est parfois employé au lieu de stem:[subset] mais n'est pas recommandé, et il
      convient qu’il soit employé lorsque ce dernier est employé pour un sous-ensemble
      quelconque de stem:[B]. On dit aussi que stem:[A] est strictement inclus dans
      stem:[B].
