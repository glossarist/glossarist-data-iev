  definition:
  - content: means of {{transmission, urn:iec:std:iec:60050-701-01-03}} of {{signals,
      urn:iec:std:iec:60050-101-12-02}} in one direction between two points
  examples: []
  id: 701-02-01
  notes:
  - content: 'Several transmission channels can share a common path: for example,
      where each transmission channel is allocated a particular {{frequency band,
      urn:iec:std:iec:60050-103-09-01}} or a particular {{time-slot, urn:iec:std:iec:60050-704-13-08}}.'
  - content: The adjective "transmission" can be replaced by an adjective indicating
      the nature of the transmitted signals, or the {{frequency bandwidth, urn:iec:std:iec:60050-702-01-03}},
      or the {{digit rate, urn:iec:std:iec:60050-702-05-23}}; for example, telephone
      channel, {{telegraph channel, urn:iec:std:iec:60050-721-11-01}}, {{data channel,
      urn:iec:std:iec:60050-714-12-01}}, 10 MHz channel, 34 Mbit/s channel.
