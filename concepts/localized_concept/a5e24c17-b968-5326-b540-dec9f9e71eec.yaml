  definition:
  - content: "in an optical fibre a dimensionless quantity, denoted by stem:[V], given
      by\r\nstem:[V = frac(2 pi a)(lambda) (n_(1)^(2) - n_(2)^(2))^(1 / 2)] \r\nwhere:\n\nstem:[a]
      is the fibre core radius,\n\nstem:[λ] is wavelength in vacuum, and\n\nstem:[n]~1~
      and stem:[n]~2~ are the maximum refractive index in the core and refractive
      index of the innermost homogenous cladding, respectively"
