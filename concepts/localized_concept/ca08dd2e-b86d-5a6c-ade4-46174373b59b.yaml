  definition:
  - content: quotient of the sum of the areas of the ceiling and the plane of the
      luminaires and the sum of the area of the walls bounded by the ceiling and the
      plane of the luminaires, used in the calculation of the utilization factor or
      utilance
  examples: []
  id: 845-29-073
  notes:
  - content: The ceiling cavity index is given by the formulawhere stem:[a] and stem:[b]
      are the dimensions of the sides of the room and stem:[h]~c~ is the distance
      from the ceiling to the plane of the luminaires.
  - content: See also "{{floor cavity index, urn:iec:std:iec:60050-845-29-075}}" and
      "{{room index, urn:iec:std:iec:60050-845-29-071}}".
  - content: The ceiling cavity index has unit one.
