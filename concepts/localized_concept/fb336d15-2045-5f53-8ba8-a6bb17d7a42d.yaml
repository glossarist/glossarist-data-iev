  - content: change in brightness of perceived colour, produced by increasing the
      purity of a colour stimulus while keeping its luminance constant within the
      range of photopic vision
  examples: []
  id: 845-22-066
  notes:
  - content: For related colours, a change in lightness can also occur when the purity
