  definition:
  - content: qualifie un système {{duplex, urn:iec:std:iec:60050-701-03-171}} dans
      lequel les courants se divisent dans des directions opposées à l'extrémité émettrice
      de manière à équilibrer leurs effets dans le dispositif de réception de cette
      extrémité tandis que les courants reçus à l'extrémité réceptrice passent dans
      la même direction et font fonctionner l'appareil
