  definition:
  - content: ensemble des moyens nécessaires pour assurer la transmission de signaux
      télégraphiques dans un seul sens entre deux points
  examples: []
  id: 721-11-01
  notes:
  - content: "Une voie télégraphique peut être qualifiée par le nombre d'états significatifs,
      et par la rapidité de modulation qu'elle peut admettre.\r\nExemple: voie télégraphique
      bivalente à 50 bauds."
  - content: Plusieurs voies télégraphiques peuvent partager un support commun; par
      exemple, une bande de fréquences particulière ou bien un intervalle de temps
      particulier répété périodiquement est réservé à chaque voie.
