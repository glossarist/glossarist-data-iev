  definition:
  - content: "système d'alimentation prévu pour maintenir le fonctionnement de matériels
      et d'installations électriques essentiels:\r\n– pour la santé et la sécurité
      des personnes et des animaux domestiques, et/ou\n\n– pour éviter des dégâts
      à l'environnement et à d'autres matériels, si cela est exigé par les réglementations
      nationales"
  examples: []
  id: 826-10-04
  notes:
  - content: Le système d'alimentation inclut la source et les circuits électriques
      jusqu'aux bornes des matériels électriques. Dans certains cas, il peut aussi
      inclure ces matériels.
