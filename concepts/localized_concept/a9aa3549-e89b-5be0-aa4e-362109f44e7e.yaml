  examples: []
  id: 523-05-20
  notes:
  - content: STM machining, an example of which uses atoms to write characters, is
      well known and can be used to perform processing at the molecular and atomic
      levels. This technology is extremely sensitive to vibration, which makes its
      application difficult.
