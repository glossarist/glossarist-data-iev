  definition:
  - content: the provision of a switching path from outlet to inlet in the same switching
      stage, in order to access equipment associated with special services such as
      those provided by operators
  examples: []
  id: 714-04-35
  notes:
  - content: Not to be confused with an entraide where the purpose of re-entering
      the call is to attempt to reduce the probability of switching congestion on
      a given call by allowing a new possibility of choice of path from the new inlet
      to a trunk in the desired route.
