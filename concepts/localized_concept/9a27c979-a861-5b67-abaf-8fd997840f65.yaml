  definition:
  - content: position d'équilibre vers laquelle tend le dispositif indicateur d'un
      appareil de mesure, sous la seule action des forces mécaniques antagonistes,
      lorsque l'élément de mesure n'est pas alimenté
  examples: []
  id: 311-05-05
  notes:
