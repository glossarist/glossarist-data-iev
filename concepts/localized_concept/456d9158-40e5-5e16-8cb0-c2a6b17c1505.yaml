  definition:
  - content: communication between several participants by means of a computer network,
      in which each participant has access to messages from other participants
  examples: []
  id: 732-03-02
  notes:
  - content: Participation may be limited by some authority. Submission of messages
      may be restricted to a group of participants. Some conferences are moderated
      or have content filters.
  - content: Messages in general have no specified recipient.
  - content: Messages may contain text, graphics, software, voice, sounds, or video,
      or a combination thereof. They may be stored for a certain period of time.
