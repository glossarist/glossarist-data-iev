  definition:
  - content: section numérique ou suite de sections numériques interconnectées permettant
      de transmettre des signaux numériques de même débit numérique spécifié entre
      les points de deux répartiteurs numériques, ou des points équivalents, auxquels
      sont connectés des terminaux ou des commutateurs
  examples: []
  id: 704-19-03
  notes:
  - content: Les terminaux sont ceux où les signaux ayant le débit spécifié sont produits
      ou aboutissent.
  - content: Une liaison numérique peut être qualifiée pour indiquer son débit numérique
      ou son ordre de multiplexage.
