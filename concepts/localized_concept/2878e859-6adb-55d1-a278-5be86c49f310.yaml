  definition:
  - content: process for {{bonding, urn:iec:std:iec:60050-523-06-01}} two {{substrates,
      urn:iec:std:iec:60050-521-05-28}} directly by increasing the surface energy
      of each substrate using ion beam or plasma irradiation
  examples: []
  id: 523-06-04
  notes:
  - content: Surface-activated bonding is effective in reducing thermal stress because
      the temperature in the bonding process is comparably low.  In MEMS {{devices,
      urn:iec:std:iec:60050-151-11-20}}, surface-activated bonding is expected to
      be applied to the substrate bonding such as hermetic sealing.
  - content: This note applies to the French language only.
