---
data:
  definition:
  - content: l'un des éléments d'un ensemble fini de {{nombres entiers, urn:iec:std:iec:60050-102-02-02}}
      employé pour représenter des {{informations, urn:iec:std:iec:60050-701-01-01}}
  examples: []
  id: 702-05-02
  notes:
  - content: Un élément numérique peut être représenté par un {{élément de signal,
      urn:iec:std:iec:60050-702-05-01}}.
  - content: Dans les appareils utilisés pour la {{transmission numérique, urn:iec:std:iec:60050-704-01-08}},
      un élément numérique peut être représenté par un état physique spécifié, par
      exemple, l'état magnétique binaire d'un noyau de ferrite.
  - content: Le terme anglais "digit" se traduit en français par "chiffre" lorsqu'il
      est utilisé en numération décimale pour désigner 1, 2, ..., 9, 0 (voir {{IEV
      714-07-06, urn:iec:std:iec:60050-714-07-06}}).
