  definition:
  - content: une des coordonnées qui est utilisée pour décrire la position à l’intérieur
      d’un système, où stem:[i] = 1, 2, …, stem:[N] et stem:[N] est le degré de liberté
      ou plus petit nombre de coordonnées nécessaire pour définir complètement la
      position
  examples: []
  id: 113-03-73
  notes:
  - content: L’unité dépend du type de représentation du système. En mécanique, la
      coordonnée généralisée peut être une longueur ou un angle.
