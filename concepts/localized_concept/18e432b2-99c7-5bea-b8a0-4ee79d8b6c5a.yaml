  definition:
  - content: rapport, généralement exprimé en décibels, de l'intensité de rayonnement
      d'une antenne dans une direction donnée, à l'intensité de rayonnement qui serait
      obtenue si la totalité de la puissance fournie à l'antenne était rayonnée également
      dans toutes les directions de l'espace
  examples: []
  id: 713-09-21
  notes:
  - content: Si aucune direction n'est spécifiée, on considère celle dans laquelle
      l'intensité de rayonnement de l'antenne est maximale.
  - content: Lorsque le gain isotrope est exprimé en décibels, la notation dBi est
      recommandée par l'Union internationale des télécommunications comme symbole
      d'unité.
  - content: L'intensité de rayonnement d'une antenne dans une direction est la puissance
      rayonnée par unité d'angle solide.
