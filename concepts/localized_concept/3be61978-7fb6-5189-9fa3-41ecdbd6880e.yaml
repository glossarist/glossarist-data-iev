  definition:
  - content: function that attributes a scalar, a vector or a tensor, or an interrelated
      set of such elements, to each point in a given region of the three-dimensional
      Euclidean space
  examples: []
  id: 102-05-12
  notes:
  - content: A field may represent a physical phenomenon such as an acoustic pressure
      field, a gravity field, the Earth's magnetic field, an electromagnetic field.
  - content: A field can be time-dependent.
  - content: In English, the term "field" has also another meaning in mathematics
      (in French "corps"), see {{IEV 102-02-18, urn:iec:std:iec:60050-102-02-18}},
      Note 2.
