---
data:
  definition:
  - content: angle sous-tendu par une source réelle ou apparente à un point donné
      dans l'espace
  examples: []
  id: 845-25-085
  notes:
  - content: Le point dans l'espace peut être l'œil d'un observateur, un point de
      mesure ou tout autre point défini.
  - content: Les angles sous-tendus sont désignés par l'angle complet et non le demi-angle.
  - content: Le flux lumineux d'une source est souvent modifié par l'incorporation
      de lentilles et de miroirs comme optique de projection, auquel cas l'étendue
      angulaire de la source apparente peut différer de l'étendue angulaire de la
      source physique.
  - content: L'étendue angulaire d'une source de forme non symétrique est déterminée
      par la moyenne arithmétique de la dimension angulaire maximale et minimale de
      la source.
  - content: L'étendue angulaire est exprimée en radian (rad) ou degré (°).
