  definition:
  - content: standard that is designated or widely acknowledged as having the highest
      metrological qualities and whose value is accepted without reference to other
      standards of the same quantity
  examples: []
  id: 311-04-02
  notes:
  - content: The concept of a primary standard is equally valid for base quantities
      and derived quantities.
  - content: A primary standard is never used directly for measurement other than
      for comparison with other primary standards or reference standards.
