data:
  definition:
  - content: 'moyenne par {{caractère, urn:iec:std:iec:60050-702-05-10}} de la {{transinformation
      moyenne, urn:iec:std:iec:60050-171-07-27}}, étendue à tous les messages issus
      d''une {{source de messages stationnaire, urn:iec:std:iec:60050-171-07-09}}
      stem:[T^(prime) = underset(m vec oo)(lim) frac(T_(m))(m)] où stem:[T~m~] est
      la transinformation moyenne de toutes les paires de suites correspondantes émises
      et reçues, de stem:[m] caractères chacuneNote 1 à l’article: La transinformation
      moyenne par caractère peut être exprimée à l''aide d''une unité telle que le
      shannon par caractère.'
