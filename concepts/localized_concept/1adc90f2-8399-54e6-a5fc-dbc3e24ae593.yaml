  definition:
  - content: a graphical representation of the distribution in space of a quantity
      which characterizes the electromagnetic field produced by an antenna
  examples: []
  id: 712-02-15
  notes:
  - content: For example, a radiation pattern may be a plot of the magnitude of a
      far field component, or alternatively contours of equal value of a far field
      component, at a given distance from the antenna, as a function of the direction.
  - content: In French, the term "diagramme de directivité" is the preferred term
      when the quantity used to characterize the field does not depend upon the power
      fed to the antenna.
  terms:
  - type: expression
    normative_status: preferred
    designation: radiation pattern
  - type: expression
    designation: radiation diagram
