data:
  definition:
  - content: 'pince faisant partie d’un {{dispositif de mise à la terre et en court-circuit,
      urn:iec:std:iec:60050-651-25-02}} qui est reliée au câble de court-circuit,
      ou à la barre de mise en court-circuit ou à la rallonge conductrice, soit directement,
      soit par des liaisons de connexionNote 1 à l’article: La pince de conducteur
      est utilisée pour se raccorder aux conducteurs (conducteur de ligne, jeu de
      barres ou autre conducteur transportant du courant) ou au point de connexion.
      Note 2 à l’article: Cet article était numéroté 651-14-08 dans la CEI 60050-651:1999.
      Il a été modifié de façon à fournir de plus amples détails sur la description
      du {{dispositif, urn:iec:std:iec:60050-651-21-15}}.'
