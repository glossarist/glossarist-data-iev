  definition:
  - content: operation defined on the set of square matrices of a given order, which
      associates to any ordered pair (*stem:[A]*, *stem:[B]*) of matrices their product
      *stem:[AB]*
  examples: []
  id: 102-06-11
  notes:
  - content: The multiplication of square matrices is associative, (*stem:[AB]*)*stem:[C]*
      = *stem:[A]*(*stem:[BC]*), but not commutative, generally *stem:[AB]* ≠ *stem:[BA]*.
