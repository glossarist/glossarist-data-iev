data:
  definition:
  - content: "nombre conventionnel égal à la valeur numérique  6,022 140 76 × 10^23^
      de la {{constante d’Avogadro, urn:iec:std:iec:60050-113-02-08}} exprimée en
      inverse de la {{mole, urn:iec:std:iec:60050-112-02-09}}\r\nNote 1 à l’article:
      Le nombre d’Avogadro est choisi de telle manière que la masse molaire du carbone
      12 soit de 0,012 kg/mol avec une incertitude relative de 4,5 × 10^−10^.\r\nNote
      2 à l’article: Le synonyme \"nombre de Loschmidt\" est parfois utilisé, exprimé
      par le symbole \"stem:[L]\"."
