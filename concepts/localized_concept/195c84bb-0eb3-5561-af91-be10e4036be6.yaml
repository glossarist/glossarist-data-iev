  definition:
  - content: propriété d'un élément de surface dont la luminance énergétique est la
      même dans toutes les directions de l'hémisphère au-dessus de la surface
  examples: []
  id: 731-01-37
  notes:
  - content: Pour un élément de surface dont le rayonnement a une répartition angulaire
      conforme à la loi du cosinus de Lambert, l'intensité énergétique dans une direction
      est proportionnelle au cosinus de l'angle entre cette direction et la normale
      à la surface et atteint donc son maximum dans la direction de la normale.
