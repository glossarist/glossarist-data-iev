  definition:
  - content: dispositif à semiconducteurs qui est spécifié pour accomplir une fonction
      élémentaire et qui n'est pas divisible en composants séparés fonctionnels par
      eux-mêmes
  examples: []
  id: 521-04-02
  notes:
  - content: Il n'existe pas de délimitation claire entre dispositifs discrets et
      circuits intégrés. En principe, un dispositif discret comporte un seul élément
      de circuit. Cependant, un dispositif vendu et spécifié en tant que dispositif
      discret peut comporter plusieurs éléments internes de circuit.
