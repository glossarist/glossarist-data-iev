---
data:
  definition:
  - content: bâti ou équipement destiné à assurer l'{{interconnexion, urn:iec:std:iec:60050-151-12-10}}
      semi-permanente de {{voies de transmission, urn:iec:std:iec:60050-701-02-01}},
      de circuits ou d'équipements en les munissant de terminaisons et en permettant
      de les connecter les uns aux autres de toutes les façons voulues
  examples: []
  id: 702-09-18
  notes:
  - content: Un répartiteur permet par exemple d'assurer l'interconnexion de {{lignes
      d'abonnés, urn:iec:std:iec:60050-701-02-09}} et d'appareils tels que des {{terminaux,
      urn:iec:std:iec:60050-701-02-08}} de lignes, des {{multiplexeurs, urn:iec:std:iec:60050-704-08-13}},
      des organes de commutation et de signalisation, ces interconnexions pouvant
      être modifiées de temps en temps selon les besoins.
  - content: Les techniques employées pour réaliser les interconnexions sont, par
      exemple, des {{fils, urn:iec:std:iec:60050-151-12-28}}, des cavaliers ou des
      {{fiches, urn:iec:std:iec:60050-151-12-21}} et {{socles, urn:iec:std:iec:60050-151-12-20}},
      qui sont mis en place et réarrangés manuellement, ou bien des commutateurs électromécaniques
      ou électroniques, qui peuvent être actionnés localement ou à distance.
  terms:
