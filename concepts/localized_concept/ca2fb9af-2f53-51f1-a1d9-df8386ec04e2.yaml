---
data:
  definition:
  - content: quotient par la constante de Boltzmann de la {{densité spectrale de puissance,
      urn:iec:std:iec:60050-702-04-50}} échangeable de bruit d'un {{monoporte, urn:iec:std:iec:60050-131-12-64}}
      à une {{fréquence, urn:iec:std:iec:60050-103-06-02}} donnée
  examples: []
  id: 702-08-54
  notes:
  - content: Cette définition suppose que les effets quantiques sont négligeables.
  - content: La température de bruit d'un monoporte est de même signe que la partie
      réelle de son {{impédance, urn:iec:std:iec:60050-131-12-43}}. Si celle-ci est
      positive, la {{puissance échangeable, urn:iec:std:iec:60050-702-07-11}} se réduit
      à la {{puissance disponible, urn:iec:std:iec:60050-702-07-10}}.
  - content: Si le monoporte a une impédance de partie réelle positive, sa température
      de bruit à une fréquence donnée est égale à la {{température thermodynamique,
      urn:iec:std:iec:60050-113-04-14}} à laquelle devrait être portée une {{résistance,
      urn:iec:std:iec:60050-151-13-19}} égale à la partie réelle de l'impédance pour
      obtenir une puissance disponible de {{bruit thermique, urn:iec:std:iec:60050-702-08-45}}
      égale à la puissance disponible de bruit du monoporte à la même fréquence.
  - content: Une antenne de réception vue de son {{accès de sortie, urn:iec:std:iec:60050-131-12-62}}
      peut être assimilée à un monoporte.
