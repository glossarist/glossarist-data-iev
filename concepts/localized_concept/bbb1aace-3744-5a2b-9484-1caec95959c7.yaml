  definition:
  - content: modulation numérique dans laquelle le signal radiofréquence peut prendre
      plus de quatre valeurs soit de fréquence, soit de phase, soit d'amplitude, à
      l'instant d'échantillonnage
  examples: []
  id: 713-07-18
  notes:
  - content: Le terme "modulation multiniveau" se réfère au nombre de valeurs du signal
