  definition:
  - content: for a magnetic core operating within the Rayleigh region, and having
      given geometry and material properties, the magnetic path length, the cross-sectional
      area and the volume that a hypothetical toroidal core of the same material properties
      and of radially thin uniform cross-section should possess to be magnetically
      equivalent to the given core
  examples: []
  id: 221-04-31
  notes:
  - content: "The effective dimensions are as follows: \r\neffective cross-sectional
      area\r\nstem:[A_(\"e\") = frac(C_(1))(C_(2))]\r\neffective magnetic path length,\r\nstem:[l_(\"e\")
      = frac(C_(1)^(2))(C_(2))]\r\neffective volume,\r\nstem:[V_(\"e\") = frac(C_(1)^(3))(C_(2)^(2))]\r\nwhere
      stem:[C]~1~ and stem:[C]~2~ are the appropriate core factors hence: \r\nstem:[C_(1)
      = frac(l_(\"e\"))(A_(\"e\"))]stem:[C_(2) = frac(l_(\"e\"))(A_(\"e\")^(2))]stem:[V_(\"e\")
      = l_(e) A_(\"e\")]"
  - content: These formulae can also apply to a magnetic circuit operating outside
      the limit of the Rayleigh region provided the magnetization can be assumed to
      be uniform, for example as in an Epstein square.
