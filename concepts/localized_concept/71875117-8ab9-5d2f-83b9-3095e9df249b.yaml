  definition:
  - content: interaction in a {{non-linear, urn:iec:std:iec:60050-131-11-19}} device
      or transmission medium between the {{spectral components, urn:iec:std:iec:60050-702-04-41}}
      of the {{input, urn:iec:std:iec:60050-151-15-13}} signal or signals producing
      new spectral components having frequencies equal to linear combinations with
      integral coefficients of the frequencies of the input spectral components
  examples: []
  id: 161-06-20
  notes:
  - content: Intermodulation can result from a single non-sinusoidal input signal
      or from several sinusoidal or non-sinusoidal input signals applied to the same
      or to different inputs.
