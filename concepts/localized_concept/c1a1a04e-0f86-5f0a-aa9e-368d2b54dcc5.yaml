  definition:
  - content: part of an {{electric power system, urn:iec:std:iec:60050-692-01-02}}
      that is electrically disconnected from the remainder of the interconnected {{electric
      power system, urn:iec:std:iec:60050-692-01-02}} but remains energized from the
      local electric power sources
  examples: []
  id: 692-02-11
  notes:
  - content: An electric island can be either the result of the action of automatic
      protections or the result of a deliberate action.
  - content: An electric island can be stable or unstable.
