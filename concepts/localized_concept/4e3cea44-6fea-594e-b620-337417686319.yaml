  definition:
  - content: grandeur sans dimension caractérisant un transfert de chaleur, définie
      par stem:[N u " " = " " frac(K l)(lambda)], où stem:[K] est le coefficient de
      transmission thermique, stem:[l] est une longueur caractérisant la configuration
      et stem:[λ] est la conductivité thermique
  examples: []
  id: 113-04-43
  notes:
  - content: Le nombre de Nusselt est souvent calculé par des formules empiriques
      en fonction d'autres nombres caractéristiques (nombre de Reynolds stem:[Re],
      nombre de Prandtl stem:[Pr], nombre de Péclet stem:[Pe], nombre de Grashof stem:[Gr]),
      et utilisé ensuite pour déterminer le coefficient de transmission thermique
      stem:[K].
  - content: On utilise le nom «nombre de Biot», symbole stem:[Bi], lorsqu’on réserve
      le nombre de Nusselt aux échanges de chaleur par convection.
