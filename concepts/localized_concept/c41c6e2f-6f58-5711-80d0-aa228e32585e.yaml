  definition:
  - content: neutron with a kinetic energy close to that of neutrons in thermal equilibrium
      with the atomic nuclei of the surrounding medium
  examples: []
  id: 395-02-17
  notes:
  - content: In the case of a maxwellian nuclei distribution, the most probable energy
      is equal to 0,025 eV (1/40 eV) at 293 K.
  - content: In practice the upper limit is about 1 eV.
