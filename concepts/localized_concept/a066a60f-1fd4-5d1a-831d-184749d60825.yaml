  definition:
  - content: "quantité complexe <u>γ</u> figurant dans l'expression:\r\n<u>a</u>(t)
      = Ae^j(ωt - φ) - <u>γ</u>stem:[x]^\r\noù A et <u>γ</u> sont en principe indépendants
      de stem:[x], lorsque cette expression peut représenter, le long d'une droite
      parallèle à l'axe Ostem:[x], une composante stem:[<u>a</u>(t)] d'un champ électromagnétique
      sinusoïdal de pulsation ω et de phase origine φ, notamment en propagation guidée
      parallèlement à Ostem:[x], ou pour une onde plane uniforme"
