  definition:
  - content: a phenomenon by virtue of which all or part of the power of a radio wave
      transmitted with a defined polarization, no longer has any defined polarization
      after propagation
  examples: []
  id: 705-08-51
  notes:
  - content: The term "depolarization" is sometimes used to designate the change from
      a defined polarization to another defined polarization.
