  definition:
  - content: "perméabilité complexe d'une substance saturée par un champ magnétique
      statique lorsqu'elle est soumise à une onde électromagnétique plane qui se propage
      dans la direction du champ magnétostatique avec son vecteur stem:[vec(H)] perpendiculaire
      à ce champ:\r\nstem:[underline(mu)_(exists) = frac(underline(mu)_(\"r\")^(2)
      - underline(kappa)_(\"r\")^(2))(underline(mu)_(\"r\"))]\r\noù stem:[<u>μ</u>]~r~
      et stem:[<u>κ</u>]~r~ sont les composantes de la perméabilité tensorielle de
      Polder"
