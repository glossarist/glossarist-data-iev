  definition:
  - content: dispositif comportant un ou plusieurs relais de protection ainsi que,
      si nécessaire, un ou plusieurs éléments logiques, et destiné à assurer une ou
      plusieurs fonctions spécifiées de protection
  examples: []
  id: 448-11-03
  notes:
  - content: |-
      Un dispositif de protection fait partie d'un système de protection.

      Exemples: Dispositif de protection de distance, dispositif de protection à comparaison de phases. (Un dispositif de protection à comparaison de phases fait partie, à une extrémité de ligne, d'un système de protection à comparaison de phases).
