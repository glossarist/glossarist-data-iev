  definition:
  - content: energy that emanates from a source in the form of {{electromagnetic waves,
      urn:iec:std:iec:60050-121-11-63}} or {{photons, urn:iec:std:iec:60050-113-05-14}}
      and is transferred through space
  examples: []
  id: 705-02-01
  notes:
  - content: The term “electromagnetic radiation” is also used for the phenomenon
      producing the electromagnetic waves or photons (see {{IEV 702-02-07, urn:iec:std:iec:60050-702-02-07}}).
  - content: The physical concepts of photons and electromagnetic waves are used to
      describe the same phenomenon of transmission of radiant energy in different
      ways, depending on the nature of the interaction of the energy with the physical
      world (wave-particle dualism).
  - content: The French term "radiation électromagnétique" applies preferably to a
      single element of any electromagnetic radiation, characterized by one frequency
      or by one wavelength in vacuum.
