data:
  definition:
  - content: coordonnées exprimant les quotients de chaque composante trichromatique
      d'un ensemble de trois {{composantes trichromatiques, urn:iec:std:iec:60050-845-23-038}}
      par leur somme
  examples: []
  id: 845-23-053
  notes:
  - content: La somme des trois coordonnées trichromatiques étant égale à 1, deux
      suffisent pour définir une chromaticité.
  - content: Dans les systèmes de référence colorimétriques CIE, les coordonnées trichromatiques
      sont représentées par les symboles stem:[x], stem:[y], stem:[z] ou stem:[x]~10~,
      stem:[y]~10~, stem:[z]~10~.
  - content: L'unité de coordonnées trichromatiques est un.
