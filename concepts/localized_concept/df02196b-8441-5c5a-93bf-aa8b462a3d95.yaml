  definition:
  - content: rapport, généralement exprimé en décibels, de la puissance fournie par
      l'émetteur d'une liaison radioélectrique, à la puissance fournie au récepteur
      correspondant, dans les conditions réelles d'installation, de propagation et
      d'exploitation
  examples: []
  id: 713-02-09
  notes:
  - content: "– Il y a lieu de préciser dans chaque cas les points où sont déterminées
      la puissance fournie par l'émetteur et la puissance fournie au récepteur, par
      exemple: \r\n– avant ou après les filtres ou multiplexeurs à radiofréquence
      qui peuvent être employés à l'émission ou à la réception, \r\n– à l'entrée ou
      à la sortie des lignes d'alimentation des antennes d'émission et de réception."
