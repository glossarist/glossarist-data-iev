  notes:
  - content: Ce processus, qui consiste à soumettre un équipement ou un composant
      à des contraintes compatibles avec des lois connues de dégradation mesurables,
      physiques et chimiques, a pour but d'obtenir des propriétés physiques et électriques
      identiques à celles que cet équipement ou ce composant aurait eues à l'issue
      d'une longue utilisation dans des conditions de fonctionnement normal.
