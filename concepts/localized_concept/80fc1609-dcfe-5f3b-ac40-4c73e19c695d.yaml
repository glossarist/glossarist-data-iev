  definition:
  - content: "{{entropy, urn:iec:std:iec:60050-171-07-15}} of a set of events when
      they are equiprobable, i.e. stem:[p](stem:[x]~stem:[i]~) &equals; 1/stem:[n]
      for stem:[i] &equals; 1, …, stem:[n]"
  examples: []
  id: 171-07-16
  notes:
