  - content: wave which can be represented by a sinusoidal field quantity with phase
      stem:[omega " " t - k * r + vartheta_(0)] where *stem:[k]* is a vector characteristic
      of the wave, *stem:[r]* is position vector, stem:[ω] is angular frequency, stem:[t]
      is time, and stem:[vartheta_(0)] is initial phase
