data:
  definition:
  - content: 'quotient de la {{transinformation moyenne par caractère, urn:iec:std:iec:60050-171-07-30}}
      stem:[T]^′^ par la durée moyenne d''une paire de caractères à la source et au
      collecteur stem:[T]^*^ &amp;equals; stem:[T]^′^/stem:[t](stem:[X],stem:[Y])
      où stem:[X] &amp;equals; {stem:[x]~1~, …, stem:[x]~stem:[n]~} est l''ensemble
      d''événements stem:[x~i~] (stem:[i] &amp;equals; 1, …, stem:[n]), stem:[Y] &amp;equals;
      {stem:[y]~1~, …, stem:[y]~stem:[m]~} est l''ensemble d''événements stem:[y~j~]
      (stem:[j] &amp;equals; 1, …, stem:[m]) et où stem:[t (X , Y) = sum_(i = 1)^(n)
      sum_(j = 1)^(m) p ( x_(i) , y_(j) ) * t ( x_(i) , y_(j) )] est l''espérance
      mathématique de la durée stem:[t](stem:[x~i~],stem:[y~j~]) d''une paire de caractères
      (stem:[x~i~],stem:[y~j~]) ayant une probabilité de réalisation simultanée stem:[p](stem:[x~i~],stem:[y~j~])Note
      1 à l’article: Le débit moyen de transinformation peut être exprimé à l''aide
      d''une unité telle que le shannon par caractère et seconde.'
