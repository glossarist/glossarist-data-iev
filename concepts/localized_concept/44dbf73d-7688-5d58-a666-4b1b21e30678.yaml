  definition:
  - content: temps écoulé entre les instants où la grandeur de l’impulsion aux bornes
      de sortie atteint des limites respectivement inférieure et supérieure spécifiées
      quand le dispositif à semi-conducteurs est commuté de son état non conducteur
      à son état conducteur
  examples: []
  id: 521-05-22
  notes:
  - content: Les limites inférieure et supérieure sont habituellement respectivement
