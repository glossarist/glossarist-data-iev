  definition:
  - content: mode d'une fibre optique tel que l'amplitude de chaque composante des
      vecteurs du champ électromagnétique décroît de façon monotone en dehors du coeur
      en fonction de la distance à l'axe et qui ne perd pas d'énergie par rayonnement
  examples: []
  id: 731-03-53
  notes:
  - content: "Dans une fibre optique dont l’indice de réfraction stem:[n] décroît
      radialement dans le coeur, sauf éventuellement dans un creux central, un mode
      lié est caractérisé par un déphasage  linéique longitudinal stem:[β] tel que
      :\r\nstem:[n](stem:[a])stem:[k] ≤ stem:[β] ≤ stem:[n](0)stem:[k]\r\noù :\n\nstem:[β]
      est la partie imaginaire (coefficient de phase) du coefficient de propagation
      axiale,\n\nstem:[n](stem:[a]) est le rayon du coeur,\n\nstem:[n](0) est l'indice
      sur l'axe,\n\nstem:[k] est le nombre d'onde angulaire dans le vide, égale au
      quotient de 2π par la longueur d'onde stem:[λ] dans le vide."
  - content: Les modes liés correspondent aux rayons guidés de l'optique géométrique.
  - content: Dans une fibre optique multimodale, l'énergie des modes liés se propage
      principalement dans le coeur.
