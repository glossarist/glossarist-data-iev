---
data:
  definition:
  - content: relation entre deux éléments quelconques d'un ensemble donné, qui est
      vraie pour certains couples ordonnés spécifiés d'éléments et fausse pour les
      autres couples
  examples: []
  id: 102-01-07
  notes:
  - content: La relation binaire est vraie ou fausse selon que le couple appartient
      ou non à un sous-ensemble spécifié du produit cartésien de l'ensemble par lui-même.
      In existe une correspondance biunivoque entre les relations binaires dans un
      ensemble et les sous-ensembles de ce produit cartésien.
  - content: Une relation binaire entre les éléments stem:[a] et stem:[b] est notée
      stem:[a]stem:[ℛ]stem:[b].
