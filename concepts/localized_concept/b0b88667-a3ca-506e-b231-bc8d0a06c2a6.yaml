  definition:
  - content: absorption acoustique définie par l'équation de Sabine donnant la durée
      de réverbération
  examples: []
  id: 801-31-10
  notes:
  - content: "L'équation de Sabine donnant la durée de réverbération s'écrit:\r\nstem:[T
      = frac((24 \" \" \"ln\" \" \" \"10\") V)(c A) = frac(55,3)(c A) \" \" V]\n\noù:\n\nstem:[T]
      est la durée de réverbération, en secondes\n\nstem:[V] est le volume de la salle,
      en mètres cubes\n\nstem:[c] est la célérité du son dans l'air contenu dans la
      salle, en mètres par seconde\n\nstem:[A] est la somme des absorptions de Sabine,
      en décibels mètres carrés."
  - content: L'unité d'absorption de Sabine est le décibel mètre carré quelquefois
      connu sous le nom de sabine métrique.
