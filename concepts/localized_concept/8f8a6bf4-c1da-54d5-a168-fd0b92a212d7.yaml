---
data:
  definition:
  - content: 'activité au cours de laquelle un travailleur entre en contact avec des
      parties {{sous tension, urn:iec:std:iec:60050-651-21-08}} ou pénètre dans la
      {{zone de travail sous tension, urn:iec:std:iec:60050-651-21-03}}, soit avec
      des parties de son corps soit avec des {{outils, urn:iec:std:iec:60050-651-21-14}},
      des {{dispositifs, urn:iec:std:iec:60050-651-21-15}} ou des {{équipements, urn:iec:std:iec:60050-651-21-16}}Note
      1 à l’article: Des exemples de travaux sous tension incluent le remplacement
      d’isolateurs et d’entretoises, le nettoyage d’isolateurs et de parties sous
      tension et le remplacement de composants. Note 2 à l’article: Le travail sous
      tension est réalisé en utilisant des méthodes spécifiques telles que: * le travail
      à distance,* le travail au contact,* le travail au potentiel. Note 3 à l’article:
      Cet article était numéroté 651-01-01 dans la CEI 60050-651:1999. Il a été modifié
      afin de clarifier le concept des travaux sous tension.'
