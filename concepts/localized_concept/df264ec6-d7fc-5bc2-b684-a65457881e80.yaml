  definition:
  - content: logarithme du rapport de la valeur d'une puissance acoustique donnée
      à la valeur de la puissance acoustique prise comme référence. Exprimé en décibels,
      le niveau de puissance acoustique est égal à dix fois le logarithme décimal
      de ce rapport
  examples: []
  id: 801-22-05
  notes:
  - content: Sauf spécification contraire, la puissance acoustique de référence est
