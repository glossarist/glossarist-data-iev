  definition:
  - content: at a given frequency, quotient of a dynamic field quantity (such as force,
      sound pressure) by a kinematic field quantity (such as vibration velocity, particle
      velocity), or quotient of a voltage by a current
  examples: []
  id: 801-25-13
  notes:
  - content: The term impedance is generally applied to a linear system and to steady
      sinusoidal signals.
  - content: In the case of a transient, impedance as a function of frequency is the
      quotient of the respective Fourier or Laplace transforms.
  - content: An impedance is the quotient of two quantities the product of which has
      the dimensions of power or power per unit area.
