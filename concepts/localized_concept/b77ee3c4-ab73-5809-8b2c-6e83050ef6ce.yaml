  definition:
  - content: axial vector stem:[U xx V], orthogonal to two given vectors *stem:[U]*
      and *stem:[V]*, such that the three vectors *stem:[U]*, *stem:[V]* and stem:[U
      xx V] form a right-handed trihedron or a left-handed trihedron according to
      the space orientation, with its magnitude equal to the product of the magnitudes
      of the given vectors and the sine of the angle stem:[vartheta] between themstem:[|U
      xx V| = |U| * |V| * sinvartheta]
  examples: []
  id: 102-03-36
  notes:
  - content: In the three-dimensional Euclidean space with given space orientation,
      the vector product of two vectors *stem:[U]* and *stem:[V]* is the unique axial
      vector stem:[U xx V] such that for any vector *stem:[W]* in the same vector
      space the scalar triple product (*stem:[U]*,*stem:[V]*,*stem:[W]*) is equal
      to the scalar product stem:[( U xx V ) * W].
  - content: For two vectors stem:[U = U_(x) e_(x) + U_(y) e_(y) + U_(z) e_(z)] and
      stem:[V = V_(x) e_(x) + V_(y) e_(y) + V_(z) e_(z)], where stem:[e_(x) ", " e_(y)
      ", " e_(z)] is an orthonormal base, the vector product is expressed by stem:[U
      xx V = ( U_(y) V_(z) - U_(z) V_(y) ) e_(x) + ( U_(z) V_(x) - U_(x) V_(z) ) e_(y)
      + ( U_(x) V_(y) - U_(y) V_(x) ) e_(z)]. The vector product can also be expressed
      as stem:[U xx " " V = |[e_(x), e_(y), e_(z)], [U_(x), U_(y), U_(z)], [V_(x),
      V_(y), V_(z)]|] using a sum similar to the sum used to obtain the determinant
      of a matrix. The vector product is therefore the axial vector associated with
      the antisymmetric tensor stem:[U ox V - V ox U] (see {{IEV 102-03-43, urn:iec:std:iec:60050-102-03-43}}).
  - content: For two complex vectors *stem:[U]* and *stem:[V]*, either the vector
      product stem:[U xx V] or one of the vector products stem:[U^(*) xx V] or stem:[U
      xx V^(*)] may be used depending on the application.
  - content: A vector product can be similarly defined for a pair consisting of a
      polar vector and an axial vector and is then a polar vector, or for a pair of
      two axial vectors and is then an axial vector.
  - content: In the usual three-dimensional space, the vector product of two vector
      quantities is the vector product of the associated unit vectors multiplied by
      the product of the scalar quantities.
  - content: The vector product operation is denoted by a cross (&times;) between
      the two symbols representing the vectors. The use of the symbol &and; is deprecated.
