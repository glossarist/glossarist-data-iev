  definition:
  - content: "composante magnéto-ionique qui, en incidence verticale, se réfléchit
      à l'altitude où la densité électronique et le champ magnétique terrestre sont
      tels que:\r\nstem:[f]~p~^2^ = stem:[f] ^2^ -stem:[f f] ~B~\r\noù stem:[f]~p~
      est la fréquence de plasma, stem:[f] celle de l'onde, et stem:[f] ~B~ la gyro-fréquence
      électronique"
  examples: []
  id: 705-07-40
  notes:
  - content: Cette composante a une polarisation elliptique senestrorsum ou dextrorsum
      suivant que sa direction de propagation fait un angle obtus ou aigu avec le
      vecteur champ magnétique terrestre.
  - content: Lorsque la direction de propagation est perpendiculaire au champ magnétique
      terrestre, cette composante a une polarisation rectiligne, le vecteur induction
      électrique étant perpendiculaire au plan défini par la direction de propagation
      et le champ magnétique.
