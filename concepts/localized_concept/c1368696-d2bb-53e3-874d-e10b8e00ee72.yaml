  definition:
  - content: pour un noyau magnétique de géométrie donnée en un matériau donné, fonctionnant
      dans le domaine de Rayleigh, longueur du chemin magnétique, section transversale
      et volume qu'un tore fictif constitué du même matériau et de section droite
      homogène et radialement mince devrait avoir pour être magnétiquement équivalent
      au noyau donné
  examples: []
  id: 221-04-31
  notes:
  - content: "Les dimensions équivalentes sont les suivantes:\n\nsection droite équivalente
      (ou effective)\r\nstem:[A_(\"e\") = frac(C_(1))(C_(2))]\r\nlongueur de chemin
      magnétique équivalente (ou effective)\r\nstem:[l_(\"e\") = frac(C_(1)^(2))(C_(2))]\r\nvolume
      équivalent (ou effectif)\r\nstem:[V_(\"e\") = frac(C_(1)^(3))(C_(2)^(2))]\r\noù
      stem:[C]~1~, et stem:[C]~2~ sont les coefficients de noyau appropriés; il en
      résulte:\r\nstem:[C_(1) = frac(l_(\"e\"))(A_(\"e\"))]stem:[C_(2) = frac(l_(\"e\"))(A_(\"e\")^(2))]stem:[V_(\"e\")
      = l_(\"e\") A_(\"e\")]"
  - content: Ces formules peuvent aussi s'appliquer à un circuit magnétique fonctionnant
      hors des limites du domaine de Rayleigh si l'aimantation peut être considérée
      comme uniforme, par exemple dans le cadre d'Epstein.
