  definition:
  - content: any real or complex number for which the product by itself is equal to
      a given real or complex number
  examples: []
  id: 102-02-15
  notes:
  - content: Every non-zero real or complex number has two square roots, each being
      the negative of the other. For a non-negative real number stem:[a], the non-negative
      square root is denoted by stem:[a^(1 / 2)] or stem:[sqrt(a)]. For a negative
      real number stem:[a], the number stem:[- a] is positive and the two square roots
      are imaginary numbers, conjugate of each others, denoted by stem:[rm(j) sqrt(-
      a)] and stem:[- rm(j) sqrt(- a)]. For a complex number stem:[c = |c| e^(rm(j)
      phi)], the two square roots are stem:[sqrt(|c|) e^(rm(j) phi / 2)] and stem:[sqrt(|c|)
      e^(rm(j) ( frac(phi)(2) + pi ))].
  - content: The concept of square root may be applied to scalar quantities.
