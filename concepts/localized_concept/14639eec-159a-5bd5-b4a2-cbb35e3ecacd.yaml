  definition:
  - content: "rapport du nombre d’événements de dissociation au nombre maximal d’événements
      de dissociation théoriquement possibles\r\nNote 1 à l’article: La dissociation
      peut se produire par étapes, comme dans l’exemple suivant:\r\nH~3~PO~4~ → H^+^+
      H~2~(PO~4~)^−^\r\nH~3~PO~4~ → 2H^+^+ H(PO~4~)^−2^\r\nH~3~PO~4~ → 3H^+^+ (PO~4~)^−3^Les
      degrés de dissociation sont respectivement 1/3, 2/3 et 1 pour les trois réactions
      ci-dessus."
