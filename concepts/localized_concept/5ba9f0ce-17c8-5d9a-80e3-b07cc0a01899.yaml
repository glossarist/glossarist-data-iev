  definition:
  - content: "{{radio wave, urn:iec:std:iec:60050-701-02-12}} or {{signal, urn:iec:std:iec:60050-701-01-02}}
      produced by a {{radio transmitter, urn:iec:std:iec:60050-713-08-01}} for the
      purpose of {{radiocommunication, urn:iec:std:iec:60050-701-01-31}}"
  examples: []
  id: 161-01-09
  notes:
  - content: In radiocommunication, the term “emission” should not be used in the
      more general sense of radio-frequency emission, i.e. the electromagnetic energy
      that emanates from a source in the form of radio waves. For example, that part
      of the energy from a {{local oscillator, urn:iec:std:iec:60050-713-10-06}} transferred
      to external space is a radio-frequency {{radiation, urn:iec:std:iec:60050-702-02-06}}
      and not an emission.
  - content: The term “emission” is also used for the production of any waves or particles
      (see {{IEV 702-02-03, urn:iec:std:iec:60050-702-02-03}}), for a process in radiocommunication
      (see {{IEV 702-02-05, urn:iec:std:iec:60050-702-02-05}}), as a synonym for a
      programme ({{IEV 723-01-02, urn:iec:std:iec:60050-723-01-02}}) in broadcasting
      and for {{transmission, urn:iec:std:iec:60050-723-01-03}} in broadcasting, and
      for a release into the environment (see {{IEV 904-01-11, urn:iec:std:iec:60050-904-01-11}}).
  - content: In French, the term “{{émission, urn:iec:std:iec:60050-702-02-04}}” is
      also used for the concept represented by the English term “{{sending, urn:iec:std:iec:60050-702-02-04}}”
      of a signal.
