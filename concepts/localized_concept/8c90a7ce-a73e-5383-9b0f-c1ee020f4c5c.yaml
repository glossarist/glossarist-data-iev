  - content: En anglais, le terme "electricity" est aussi utilisé au sens d'énergie
      électrique. En français, l'emploi du terme "électricité" est déconseillé dans
      ce sens. Par exemple, l'expression "distribution of electricity", employée en
      anglais, correspond en français à "distribution d'énergie électrique".
