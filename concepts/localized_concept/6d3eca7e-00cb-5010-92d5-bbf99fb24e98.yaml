data:
  definition:
  - content: scalaire Δstem:[f] associé en chaque point d'un domaine déterminé de
      l'espace à un scalaire stem:[f], défini par la divergence du gradient du champ
      scalaireΔstem:[f] = div *grad* stem:[f]
  examples: []
  id: 102-05-28
  notes:
  - content: 'En coordonnées cartésiennes orthonormées, le laplacien scalaire est:
      stem:[rm(Delta) " " f = frac(del^(2) f)(del " " x^(2)) + frac(del^(2) f)(del
      " " y^(2)) + frac(del^(2) f)(del " " z^(2))].'
  - content: Le laplacien scalaire du champ scalaire stem:[f] est noté Δstem:[f] ou
      ∇^2^stem:[f], où Δ est l'opérateur laplacien.
