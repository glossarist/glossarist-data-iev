  definition:
  - content: process for protecting  {{components, urn:iec:std:iec:60050-151-11-21}}
      by mounting them in a container having external terminals
  examples: []
  id: 523-06-06
  notes:
  - content: The purpose of packaging is to minimize external chemical and physical
      damage to the components. As the {{device, urn:iec:std:iec:60050-151-11-20}}
      is miniaturized, strain due to the packaging stress is possibly troublesome.
      To prevent this, amongst other things, the {{bonding, urn:iec:std:iec:60050-523-06-01}}
      technology that joins microcomponents and so on to a silicon chip is important.
      In the field of {{sensor, urn:iec:std:iec:60050-151-13-48}} systems, a hybrid
      integration technology is necessary, which has resulted in special packaging
      techniques being studied.
