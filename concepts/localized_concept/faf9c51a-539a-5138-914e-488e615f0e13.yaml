data:
  definition:
  - content: 'moyenne par {{caractère, urn:iec:std:iec:60050-702-05-10}} de l''{{entropie,
      urn:iec:std:iec:60050-171-07-15}}, étendue à tous les messages issus d''une
      {{source de messages stationnaire, urn:iec:std:iec:60050-171-07-09}} stem:[H^(prime)
      = underset(m vec oo)(lim) frac(H_(m))(m)] où stem:[H~m~] est l''entropie de
      l''ensemble de toutes les suites de stem:[m] caractères issues de la sourceNote
      1 à l’article: L''entropie moyenne par caractère peut être exprimée à l''aide
      d''une unité telle que le shannon par caractère. Note 2 à l’article: La limite
      pourrait ne pas exister si la source n''était pas stationnaire.'
