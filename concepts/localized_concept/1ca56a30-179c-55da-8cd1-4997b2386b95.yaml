  definition:
  - content: "a) relativement aux câbles d'énergie:\r\nmode de pose des câbles unipolaires
      tel que chaque phase occupe successivement, sur des longueurs de circuit approximativement
      égales, chacune des positions de la configuration géométrique des câbles posés\r\nb)
      relativement à un conducteur écran:\r\nmode de pose d'un conducteur en parallèle
      le long d'une section élémentaire de câbles non transposés tels que, dans le
      plan de symétrie de la configuration géométrique des câbles posés, il occupe
      sur une moitié de la longueur de la section la position symétriquement opposée
      à celle qu'il a dans l'autre moitié"
