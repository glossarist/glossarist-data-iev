  definition:
  - content: a telecommunication circuit that provides four-wire transmission
  examples: []
  id: 704-04-17
  notes:
  - content: An example of a four-wire circuit is one formed from two pairs of metallic
      conductors arranged as two channels, one in each direction.
  - content: Certain types of four-wire circuit, such as frequency separation of go
      and return channels over the same pair, were formerly known as four-wire type
      circuits. The term "four-wire type circuit" is deprecated.
