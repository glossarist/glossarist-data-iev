  definition:
  - content: quotient of the detector output, stem:[Y], and the detector input, stem:[X]stem:[s
      = frac(Y)(X)]
  examples: []
  id: 845-25-061
  notes:
  - content: If the detector signal is stem:[Y]~0~ in the absence of input, and is
      stem:[Y]~t~ when there is an input stem:[X], the responsivity is stem:[s = frac(Y_("t")
      - Y_("0"))(X)].
  - content: The term "sensitivity" is no longer used.
  - content: This entry was numbered 845-05-54 in IEC 60050-845:1987.
