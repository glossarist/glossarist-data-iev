  definition:
  - content: "{{SI, urn:iec:std:iec:60050-112-02-02}} {{unit, urn:iec:std:iec:60050-112-01-14}}
      of {{amount of substance, urn:iec:std:iec:60050-113-02-07}}, equal to the amount
      of substance of a {{system, urn:iec:std:iec:60050-151-11-27}} that contains
      6,022 140 76 × 10^23^ specified elementary entities"
  examples: []
  id: 112-02-09
  notes:
  - content: "The definition in the SI Brochure is: \"The mole, symbol mol, is the
      SI unit of amount of substance. One mole contains exactly 6,022 140 76 × 10^23^
      elementary entities. This number is the fixed numerical value of the Avogadro
      constant, stem:[N]~A~, when expressed in the unit mol^−1^ and is called the
      Avogadro number.\r\nThe amount of substance, symbol stem:[n], of a system is
      a measure of the number of specified elementary entities. An elementary entity
      may be an atom, a molecule, an ion, an electron, any other particle or specified
      group of particles.\""
  - content: The definition of the mole in IEV 112-02-09:2010-01 fixed the value of
      the molar mass of carbon 12, stem:[M](^12^C), as exactly equal to 0,012 kg/mol.
      According to the current definition of the mole, stem:[M](^12^C) is no longer
      known precisely and has to be determined experimentally.
  - content: 'The mole is one of the seven SI {{base units, urn:iec:std:iec:60050-112-01-18}}:
      {{second, urn:iec:std:iec:60050-112-02-04}} (s), {{metre, urn:iec:std:iec:60050-112-02-05}}
      (m), {{kilogram, urn:iec:std:iec:60050-112-02-06}} (kg), {{ampere, urn:iec:std:iec:60050-112-02-08}}
      (A), {{kelvin, urn:iec:std:iec:60050-112-02-08}} (K), mole (mol) and {{candela,
      urn:iec:std:iec:60050-112-02-10}} (cd).'
