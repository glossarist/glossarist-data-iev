  definition:
  - content: a form of non-linearity distortion characterized by the presence of intermodulation
      products in the signal at the output of a non-linear device or transmission
      medium
  examples: []
  id: 702-07-68
  notes:
  - content: Intermodulation distortion can be expressed quantitatively as the ratio
      of the amplitude of intermodulation products of various orders to the amplitude
      of two or more sinusoidal input oscillations of specified amplitude and frequency.
  terms:
  - type: expression
    normative_status: preferred
    designation: intermodulation distortion
