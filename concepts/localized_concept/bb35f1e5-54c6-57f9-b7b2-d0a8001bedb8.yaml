  definition:
  - content: ratio of the effective radius of the Earth to the actual Earth radius
  examples: []
  id: 705-05-41
  notes:
  - content: "This factor stem:[k] is related to the vertical gradient dstem:[n]/dstem:[h]
      of the refractive index n and to the actual Earth radius stem:[a] by the equation:\r\nstem:[k
      = frac(1)(1 + a frac(\"d\" n)(\"d\" h))]"
  - content: For an atmosphere having a standard refractivity gradient the value of
      stem:[k] is taken as 4/3, corresponding to an effective radius of the Earth
      of approximately 8 500 km.
