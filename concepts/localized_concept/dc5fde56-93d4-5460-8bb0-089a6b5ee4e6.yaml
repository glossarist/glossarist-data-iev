  definition:
  - content: environment where the hazard of electric shock by arc welding is increased
      in relation to normal arc welding conditions
  examples: []
  id: 851-15-09
  notes:
  - content: "Such environment is found for example\r\na)  in locations in which freedom
      of movement is restricted, so that the operator is forced to perform the welding
      in a cramped (e.g. kneeling, sitting, lying) position with physical contact
      with conductive parts;\r\nb)  in locations which are fully or partially limited
      by conductive elements, and in which there is a high risk of unavoidable or
      accidental contact by the operator;\r\nc)  in wet or damp or hot locations where
      humidity or perspiration considerably reduces the skin resistance of the human
      body and the insulating properties of accessories."
  - content: Environment with increased hazard of electric shock are not meant to
      include places where electrically conductive parts in the near vicinity of the
      operator which can cause the increased hazard have been insulated.
  terms:
  - type: expression
    normative_status: preferred
    designation: environment with increased hazard of electric shock
