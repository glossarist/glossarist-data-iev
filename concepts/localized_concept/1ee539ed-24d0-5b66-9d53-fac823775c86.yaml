  - content: vector quantity *stem:[a]* = d*stem:[v]*/dstem:[t], where *stem:[v]*
      is velocity and stem:[t] is time
  examples: []
  id: 113-01-38
  notes:
  - content: The acceleration is related to a point described by its position vector.
      The point may localize a particle, or be attached to any other object such as
      a body or a wave.
  - content: The acceleration depends on the chosen reference frame.
  - content: The coherent SI unit of acceleration is metre per second squared, m/s^2^.
