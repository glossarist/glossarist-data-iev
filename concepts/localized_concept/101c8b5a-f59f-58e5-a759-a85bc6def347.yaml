  definition:
  - content: location where the optic nerve joins to the retina and where there are
      no photoreceptors
  examples: []
  id: 845-22-005
  notes:
  - content: Because there are no photoreceptors at the blind spot, the retina cannot
      respond to light at this location.
  - content: The retinal location of the blind spot is about 15° nasal from the fovea
      in the visual angle and subtends about 7° in height and about 5° in width.
