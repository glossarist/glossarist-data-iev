  definition:
  - content: 'diagramme donnant les courbes du gain logarithmique de la réponse en
      fréquence en boucle fermée stem:[frac(G_(0))(1 + G_(0))], tracées en coordonnées
      rectangulaires et de la différence de phase de la réponse en fréquence en boucle
      ouverte stem:[G]~0~Note 1 à l’article: stem:[frac(G_(0))(1 + G_(0))] est la
      réponse en fréquence en boucle fermée pour des variations de la variable de
      référence, dans le cas où la variable de commande stem:[x] serait utilisée directement
      comme variable de réaction stem:[r]. La fonction de transfert de l''élément
      de mesurage est supposée être de un.'
