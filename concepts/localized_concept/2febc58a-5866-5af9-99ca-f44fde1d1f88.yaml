  definition:
  - content: level in decibels equal to ten times the logarithm to the base ten of
      the ratio of the backscattering cross-section of the object to the spherical
      reference area of stem:[4 pi r_(0)^(2)] where stem:[r]~0~ is the reference distance,
      preferably chosen to be 1 m
  examples: []
  id: 801-32-36
  notes:
  - content: Whatever the reference area used, it shall be specified.
  - content: The object scattering differential for a designated direction other than
      backward is similarly defined.
  - content: Otherwise described, the object backscattering differential is the backscattered
      sound pressure level that would exist at the reference distance of stem:[r]~0~
      from the acoustic centre of the scattering object, minus the sound pressure
      level of a plane wave incident on the object.
  - content: "Expressed in letter symbols, the definition reads:\r\nstem:[N_(\"ts\")
      = L_(\"SC\") - L_(\"i\") = 10 \" \" \"log\"_(10) frac(A_(\"ob\"))(4 pi r_(0)^(2))
      \" \" \"dB\"]\r\nwhere:\n\nstem:[N]~ts~ is object backscattering differential
      or target strength\n\nstem:[L]~SC~ is backscattered sound pressure level at
      reference distance\n\nstem:[L]~i~ is incident sound pressure level\n\nstem:[A]~ob~
      is backscattering cross-section of object\n\nstem:[r]~0~ is reference distance\n\nstem:[4
      pi r_(0)^(2)] is reference area for object backscattering differential."
  terms:
  - type: expression
    normative_status: preferred
    designation: object backscattering differential
  - type: expression
