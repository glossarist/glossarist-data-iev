  notes:
  - content: "La largeur de bande est l'étendue de la bande de fréquences, caractérisée
      par une valeur unique. Elle ne dépend pas de la position de la bande dans le
      spectre des fréquences.\r\nNote 2 à l’article: Le terme «largeur de bande» est
      le plus souvent suivi d'un qualificatif, par exemple: largeur de bande de base,
      largeur de bande nécessaire, largeur de bande d'un amplificateur ou autre appareil."
