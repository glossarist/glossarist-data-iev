  definition:
  - content: acoustic energy flow rate in the direction of propagation per unit area
      normal to the direction of propagation
  examples: []
  id: 802-01-10
  notes:
  - content: "Instantaneous intensity is the product of instantaneous acoustic pressure
      and instantaneous particle velocity. It is difficult to measure intensity in
      the ultrasound frequency range. For measurement purposes and if it is reasonable
      to assume that the instantaneous acoustic pressure and instantaneous particle
      velocity are substantially in phase along the beam(-alignment) axis for a given
      frequency, than the instantaneous intensity, [stem:[I(t)]], is approximated
      as\r\nstem:[p(t)]^2^/stem:[ρc]\r\nwhere\r\nstem:[p(t)] is the instantaneous
      acoustic pressure;\r\nstem:[ρ] is the density of the medium;\r\nstem:[c] is
      the velocity of sound in the medium."
