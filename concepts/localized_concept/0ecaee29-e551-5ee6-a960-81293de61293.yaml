  definition:
  - content: quotient du nombre d'{{éléments numériques, urn:iec:std:iec:60050-702-05-02}}
      transmis pendant un {{intervalle de temps, urn:iec:std:iec:60050-113-01-10}}
      par la {{durée, urn:iec:std:iec:60050-113-01-13}} de cet intervalle
  examples: []
  id: 702-05-23
  notes:
  - content: 'Le terme "débit numérique" peut être particularisé, par exemple: "{{débit
      binaire, urn:iec:std:iec:60050-704-16-07}}", "{{débit ternaire, urn:iec:std:iec:60050-704-16-08}}",
      "{{débit stem:[n]-aire, urn:iec:std:iec:60050-704-16-09}}" lorsque la {{valence,
      urn:iec:std:iec:60050-702-05-22}} est respectivement de deux, trois, stem:[n].'
  - content: Le terme "débit numérique" ne doit pas être employé pour désigner le
      débit d'un {{signal en ligne, urn:iec:std:iec:60050-704-04-13}} au lieu du terme
      correct "{{rapidité de modulation, urn:iec:std:iec:60050-704-17-03}}" ou de
      son synonyme "débit en ligne".
