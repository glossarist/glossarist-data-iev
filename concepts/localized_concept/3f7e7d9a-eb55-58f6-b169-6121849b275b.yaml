  definition:
  - content: temps moyen au cours duquel le nombre de radionucléides d'un système
      atomique donné est réduit à la fraction 1/stem:[e] (≈ 0,368) de sa valeur initiale
  examples: []
  id: 881-04-47
  notes:
  - content: "– La vie moyenne est liée à la constante de désintégration stem:[λ]
      et à la période radioactive stem:[T_(frac(1)(2))] par la relation:\r\nstem:[tau
      = frac(1)(lambda) = frac(T_(frac(1)(2)))(ln2) \"P{simeq}\" frac(T_(frac(1)(2)))(0
      , 693) \"P{simeq}\" 1 , 433 \" \" \" \" T_(frac(1)(2))]"
