  definition:
  - content: sum of durations of all {{supply interruptions, urn:iec:std:iec:60050-692-07-01}}
      to individual customers during a time interval, divided by the product of the
      number of customers affected and the duration of that time interval
  examples: []
  id: 692-08-04
  notes:
  - content: If stem:[t]~stem:[ij]~ is the duration of the stem:[i]th interruption
      of supply to customer stem:[j] during a time interval of duration stem:[T],
      and stem:[N]~NS~ the number of customers affected, then the service unavailability
      per customer interrupted is given bystem:[U_("CI") = frac(sum_(i) sum_(j) t_(i
      j))(N_("NS") T)]
  - content: Only {{sustained interruptions, urn:iec:std:iec:60050-692-07-02}} are
      considered.
  - content: The term "customer" represents the end user and not some intermediate
      distribution system or company.
  - content: Service unavailability per customer interrupted can be used to describe
      past performance or to estimate expected future performance.
  - content: This entry was numbered 191-27-04 in IEC 60050-191:1990.
  terms:
