  definition:
  - content: "1. in synchronous transmission, systematic phase difference between
      the position of the receiving distributor and the position of the transmitting
      distributor, in order to take into account the propagation time of the signals
      or delays in the response of the receiving device\r\n2. angular rotation of
      the rest position of the camsleeve of a receiver, with a view to improve its
      margin"
