  definition:
  - content: "élément de transfert invariant dans le temps constitué de la combinaison
      additive d'un élément à action proportionnelle et d'un élément à action par
      dérivationNote 1 à l’article: La fonction de transfert d'un élément à action
      proportionnelle et par dérivation est donnée parstem:[frac(V (s))(U (s)) = K_(\"Ρ\")
      * (1 + T_(\"d\") * s)]\r\noù<table>\r\n<tr>\n<td>\nstem:[T]~d~\n</td>\n<td>est
      le temps de dosage de dérivation;</td>\n</tr>\r\n<tr>\n<td>stem:[s]</td>\n<td>est
      la variable complexe de la transformée de Laplace;</td>\n</tr>\r\n<tr>\n<td>\nstem:[U](stem:[s])</td>\n<td>est
      la transformée de la variable d’entrée;</td>\n</tr>\r\n<tr>\n<td>\nstem:[V](stem:[s])</td>\n<td>est
      la transformée de la variable de sortie.</td>\n</tr>\r\n</table>"
