data:
  definition:
  - content: 'somme de toutes les {{durées de coupure équivalentes à la pointe, urn:iec:std:iec:60050-692-11-03}}
      dans un {{réseau de production-transport, urn:iec:std:iec:60050-692-01-04}}
      pendant une annéeNote 1 à l’article: Si l’{{énergie non fournie, urn:iec:std:iec:60050-692-09-06}}
      est exprimée en mégawatts minutes et la puissance de pointe annuelle en mégawatts,
      alors l’indice annuel d’insuffisance en énergie fournit la durée de coupure
      équivalente à la pointe cumulée sur un an, et est exprimé en minutes par an.
      Note 2 à l’article: Cet article portait le numéro 191-30-05 dans l’IEC 60050-191:1990.'
