---
data:
  definition:
  - content: "quotient de la somme des durées de toutes les {{interruptions de fourniture,
      urn:iec:std:iec:60050-692-07-01}} d'énergie électrique à des clients individuels
      survenues pendant un intervalle de temps, par le nombre de ces interruptions
      de fournitureNote 1 à l’article: Si sur un intervalle de temps de durée stem:[T],
      stem:[t]~stem:[ij]~ est la durée de la stem:[i]ème interruption subie par le
      client stem:[j] et stem:[n]~stem:[j]~ le nombre de fois où le client stem:[j]
      a été affecté, alors la durée moyenne d’une interruption est donnée parstem:[T_(\"I\")
      = frac(sum_(i) sum_(j) t_(i j))(sum_(j) n_(j))]\r\nNote 2 à l’article: Seules
      les {{interruptions longues, urn:iec:std:iec:60050-692-07-02}} sont prises en
      compte. Note 3 à l’article: Le terme \"client\" désigne l’utilisateur final
      et non un réseau ou une compagnie de distribution intermédiaire. Note 4 à l’article:
      La durée moyenne d’une interruption peut être utilisée pour décrire des performances
      réalisées, ou pour estimer les performances futures attendues. Note 5 à l’article:
      Cette mesure est aussi égale au rapport de l’{{indisponibilité par client desservi,
      urn:iec:std:iec:60050-692-08-03}} à la {{fréquence d’interruption par client
      desservi, urn:iec:std:iec:60050-692-08-01}}. Note 6 à l’article: Cet article
      portait le numéro 191-27-05 dans l’IEC 60050-191:1990."
