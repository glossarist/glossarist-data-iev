  definition:
  - content: the ratio of countable elementary events at the input and output of a
      quantum device
  examples: []
  id: 731-06-34
  notes:
  - content: For an optical semiconductor source it is the ratio of the number of
      photons emitted to the number of electrons applied.
  - content: For an optical detector it is the ratio of the number of electrons generated
      in the photocurrent to the number of photons applied.
