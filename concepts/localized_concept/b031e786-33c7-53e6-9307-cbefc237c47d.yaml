  definition:
  - content: product of the Planck constant and {{frequency, urn:iec:std:iec:60050-103-06-02}}stem:[Q]~p~ =
      stem:[h]·stem:[ν]where stem:[h] is the Planck constant and stem:[ν] is the frequency
      of the corresponding electromagnetic wave
  examples: []
  id: 845-21-042
  notes:
  - content: Photon energy can be emitted, transferred or received.
  - content: The energy of {{monochromatic radiation, urn:iec:std:iec:60050-845-21-014}},
      stem:[Q]~PF~, by a photon flux of photons of frequency stem:[ν] is equal to
      the photon number, stem:[N]~p~, times the photon energy (stem:[Q]~PF~ = stem:[N]~p~·stem:[h]·stem:[ν]).
  - content: The corresponding radiometric quantity is "radiant energy". The corresponding
      photometric quantity is "{{luminous energy, urn:iec:std:iec:60050-845-21-037}}".
  - content: The photon energy is expressed in joule (J&#160;= W&middot;s).
