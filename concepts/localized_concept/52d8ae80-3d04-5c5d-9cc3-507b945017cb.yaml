  definition:
  - content: effective radiant exposure with the spectral radiant exposure, stem:[H~λ~],
      spectrally weighted with the blue light hazard spectral weighting function,
      stem:[B](stem:[λ])
  examples: []
  id: 845-26-059
  notes:
  - content: The wavelength range for the blue light hazard radiant exposure is specified
      in ICNIRP-recommendations as stem:[λ] = 300 nm to stem:[λ] = 700 nm.
  - content: This definition is based on the assumption that an action spectrum is
      adopted for the actinic effect considered, and that its maximum value is 1.
  - content: It is essential to specify which actinic action spectrum is used, as
      the unit is the same for any action spectrum.
  - content: The blue light hazard radiant exposure is expressed in joule per square
      metre (J·m^−2^).
