  definition:
  - content: absolute value of the difference between the limiting frequencies of
      a {{frequency band, urn:iec:std:iec:60050-103-09-01}}
  examples: []
  id: 103-09-02
  notes:
  - content: The bandwidth is the range of the frequency band, characterized by a
      single value. It does not depend on the position of the band in the frequency
      spectrum.
  - content: The term “bandwidth” is usually associated with a qualification; for
      example, baseband bandwidth, necessary bandwidth, bandwidth of an amplifier
      or other device.
