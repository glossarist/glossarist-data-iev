  definition:
  - content: factor by which the readings of a physical photometer can be multiplied
      in order to correct for the error caused by differences between the relative
      spectral responsivity of the photometer and the {{spectral luminous efficiency,
      urn:iec:std:iec:60050-845-21-035}} for photopic vision, stem:[V](stem:[λ]),
      that it is intended to simulate when the photometer is used to measure a source
      having a {{relative spectral distribution, urn:iec:std:iec:60050-845-21-030}}
      different from that of the source with which the photometer was calibrated
  examples: []
  id: 845-25-115
  notes:
  - content: Most photometers are designed to simulate the spectral luminous efficiency
      for photopic vision, stem:[V](stem:[λ]), and are calibrated using a source corresponding
      to {{CIE standard illuminant, urn:iec:std:iec:60050-845-23-021}} A. For such
      a photometer, the spectral mismatch correction factor can be calculated using
      the equation:stem:[F^(*) = frac(int_(lambda) S ( lambda ) V ( lambda ) "d" lambda)(int_(lambda)
      S ( lambda ) s_("rel") ( lambda ) "d" lambda) frac(int_(lambda) S_("A") ( lambda
      ) s_("rel") ( lambda ) "d" lambda)(int_(lambda) S_("A") ( lambda ) V ( lambda
      ) "d" lambda)]where stem:[s]~rel~(stem:[λ]) is the relative spectral responsivity
      of the photometer and stem:[S](stem:[λ]) and stem:[S]~A~(stem:[λ]) are the respective
      relative spectral power distributions of the source to be measured and CIE standard
      illuminant A.
  - content: The term "colour correction factor" is no longer used.
  - content: The term spectral mismatch correction factor can also be applied to other
      detectors whose response is intended to simulate a particular observer function,
      such as actinic radiometers.
  - content: The spectral mismatch correction factor has unit one.
