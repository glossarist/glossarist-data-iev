  definition:
  - content: logarithm of the ratio of a given sound pressure to the reference sound
      pressure of 20 μPa, the sound pressure being obtained with a standard frequency
      weighting and with a standard exponential time weighting. Sound level in decibels
      is twenty times the logarithm to the base ten of that ratio
  examples: []
  id: 801-22-14
  notes:
  - content: 'Standard frequency weightings A, В and C and standard exponential time
      weightings fast (F), slow (S) and impulse (I) are given in IEC 651 (1979): Sound
      level meters.'
  - content: Time and frequency weightings employed should be specified, but if not
      stated explicitly, fast (F) exponential time weighting and A-frequency weighting
      are understood.
  terms:
  - type: expression
    normative_status: preferred
    designation: weighted sound pressure level
  - type: expression
    designation: sound level
