  definition:
  - content: a composite waveguide corner formed by more than two waveguide corners
      in succession approximately a quarter of a wavelength apart, each causing by
      itself an amplitude reflection factor approximately proportional in magnitude
      to a coefficient of a binomial series
  examples: []
  id: 726-09-07
  notes:
  - content: The exponent of the binomial will be (stem:[n] —1) where stem:[n] is
      the number of corners.
