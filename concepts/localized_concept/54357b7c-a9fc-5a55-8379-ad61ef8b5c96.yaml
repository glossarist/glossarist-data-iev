  definition:
  - content: pour un corps continu dans un domaine D, de masse volumique stem:[ρ](*stem:[r]*),
      point de rayon vecteur stem:[r_("G") = frac(int_("D") r rho d V)(int_("D") rho
      d V)]
  examples: []
  id: 113-03-12
  notes:
  - content: Pour un système de particules de masses stem:[m]~stem:[i]~ et de rayons
      vecteurs *stem:[r]*~stem:[i]~, le centre de masse est le point de rayon vecteur
      stem:[r_("G") = frac(sum_(i) m_(i) r_(i))(sum_(i) m_(i))].
  - content: En physique non relativiste, le centre de masse ne dépend pas du référentiel
      choisi.
