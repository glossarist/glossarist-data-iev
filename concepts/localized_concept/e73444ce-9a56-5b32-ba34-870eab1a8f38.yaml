  definition:
  - content: diagram showing gain and phase angle contours of the closed-loop frequency
      response stem:[frac(G_(0))(1 + G_(0))] plotted in the rectangular coordinates
      of logarithmic gain and phase difference of the open-loop frequency response
      stem:[G]~0~
  examples: []
  id: 351-46-09
  notes:
  - content: stem:[frac(G_(0))(1 + G_(0))] is the closed-loop frequency response for
      changes of the reference variable in the case that the controlled variable stem:[x]
      is used as the feedback variable stem:[r] directly. The transfer function of
      the measuring element is assumed unity.
