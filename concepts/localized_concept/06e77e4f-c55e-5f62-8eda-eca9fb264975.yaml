  definition:
  - content: "a specified combination of a sending system and a receiving system,
      with associated subscriber's telephone lines and feeding bridges or equivalent
      systems, connected by means of a distortionless variable attenuator, and employed
      under specified conditions to determine by comparison some aspects of the transmission
      performance of other telephone systems or parts\r\nof systems"
  examples: []
  id: 722-16-25
  notes:
  - content: A working standard may be used for determining reference equivalents
      of a telephone complete connection in a given direction, sending reference equivalents
      and receiving reference equivalents.
