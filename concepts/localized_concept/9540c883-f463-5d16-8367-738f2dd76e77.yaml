---
data:
  definition:
  - content: 'matériau ayant une composition et des propriétés d’interaction physique
      similaires à celles du tissu mou dans le corps humain, par rapport au rayonnement
      ionisant pénétrant, dans des limites spécifiées, avec une densité de 1 g cm^−3^
      et une composition massique de: * 76,2 % oxygène,* 10,1 % hydrogène,* 11,1 %
      carbone,* 2,6 % azote'
  examples: []
  id: 395-01-40
  notes:
  - content: L’eau peut être considérée comme équivalent-tissu pour l’ensemble des
      rayonnements rencontrés en radioprotection.
