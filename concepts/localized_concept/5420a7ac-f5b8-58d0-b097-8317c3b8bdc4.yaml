  definition:
  - content: interdependent liaison between the control levers or the electric control
      circuits of different apparatus such as points and signals, which makes it impossible
      to place them in positions which are unsafe
  examples: []
  id: 821-05-02
  notes:
  - content: In English, the term “interlocking” refers also to the place where interlocking
      is achieved.
  - content: In French, the term “enclenchement” refers also to the individual locking
      of an apparatus such as points.
