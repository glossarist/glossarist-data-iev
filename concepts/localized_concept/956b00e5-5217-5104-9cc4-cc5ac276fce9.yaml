  definition:
  - content: "the fractional change of inductance due to a change in temperature divided
      by that change in temperature:\r\nstem:[alpha_(L) = frac(L_(theta) - L_(\"ref\"))(L_(\"ref\")
      (theta - theta_(\"ref\")))]\r\nwhere stem:[L~θ~] and stem:[L]~ref~ are the inductances
      at temperatures stem:[θ] and stem:[θ]~ref~ respectively"
