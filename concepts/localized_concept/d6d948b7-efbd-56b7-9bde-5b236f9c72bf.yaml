  definition:
  - content: electrode capable of emitting negative charge carriers to and/or receiving
      positive charge carriers from the medium of lower conductivity
  examples: []
  id: 841-22-32
  notes:
  - content: The direction of electric current is from the medium of lower conductivity,
      through the cathode, to the external circuit.
  - content: In some cases (e.g. electrochemical cells), the term "cathode" is applied
      to one or another electrode, depending on the electric operating condition of
      the device. In other cases (e.g. electronic tubes and semiconductor devices),
      the term "cathode" is assigned to a specific electrode.
