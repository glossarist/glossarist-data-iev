data:
  definition:
  - content: système permettant l'évaluation des {{composantes trichromatiques, urn:iec:std:iec:60050-845-23-038}}
      d'une répartition spectrale d'énergie quelconque en utilisant l'ensemble des
      stimuli de couleurs de référence &amp;lsqb;X&amp;rsqb;, &amp;lsqb;Y&amp;rsqb;,
      &amp;lsqb;Z&amp;rsqb; et les trois fonctions colorimétriques CIE stem:[bar(()
      lambda ) , " " bar(() lambda ) , " " bar(() lambda )] adoptés par la CIE en
      1931
  examples: []
  id: 845-23-045
  notes:
  - content: stem:[bar(() lambda )] est identique à stem:[V](stem:[λ]) et de fait
      les composantes trichromatiques stem:[Y] sont proportionnelles aux valeurs de
      luminance.
  - content: Le système de référence colorimétrique CIE 1931 est applicable aux champs
      d'observation en vision centrale d'étendue angulaire comprise entre 1&#176;
      environ et 4&#176; environ (0,017 rad et 0,07 rad).
  - content: Le système de référence colorimétrique CIE 1931 peut être déduit du système
      colorimétrique RVB CIE 1931 par transformation basée sur un ensemble de trois
      équations linéaires. Le système RVB CIE 1931 est basé sur trois stimuli de référence
      monochromatiques réels.
  - content: Voir aussi CIE 15, stem:[Colorimetry].
  - content: Cet article était numéroté 845-03-28 dans l'IEC 60050-845:1987.
