data:
  definition:
  - content: réacteur nucléaire utilisant des gaz inertes comme fluide de refroidissement
      et faisant un emploi intensif de matériaux réfractaires dans le cœur avec des
      températures de sortie élevées du fluide de refroidissement
  examples: []
  id: 395-07-142
  notes:
  - content: La température de sortie est habituellement située au-dessus de 900 °C.
  - content: Ce type de réacteur est l’un des six réacteurs de génération IV.
