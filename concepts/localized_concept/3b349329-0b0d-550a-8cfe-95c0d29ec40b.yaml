  examples:
  - content: "* Le courant pour un relais à maximum ou à minimum de courant;* la fréquence
      pour un relais de fréquence dont la grandeur d'alimentation d'entrée peut être
      une tension;* la puissance pour un relais de puissance dont les grandeurs d'alimentation
      d'entrée sont le courant et la tension."
