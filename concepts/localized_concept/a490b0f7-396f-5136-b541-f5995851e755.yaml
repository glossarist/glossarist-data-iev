  definition:
  - content: the number of bound modes that an optical fibre is capable of supporting
  examples: []
  id: 731-03-64
  notes:
  - content: For stem:[V]< 2.405 step index fibre can only support one mode as is
      the case for singlemode fibre.
  - content: For stem:[V]> 5, approximately given by, stem:[V] ^2^/2 and (stem:[V]
      ^2^/2) [g/(g + 2)], for step index and power-law profile fibres, respectively,
      where g is the profile parameter, and stem:[V] is the normalized frequency.
