---
data:
  definition:
  - content: taux du nombre de photons par intervalle de tempsstem:[Phi_("p") = frac("d"
      N_("p"))("d" t)]où stem:[N]~p~ est le nombre de photons, transmis ou reçu, et
      stem:[t] est le temps
  examples: []
  id: 845-21-040
  notes:
  - content: Le flux photonique, stem:[Φ]~p~, est associé au flux énergétique, stem:[Φ]~e~,
      de rayonnement monochromatique, parstem:[Phi_("p") = frac(Phi_("e"))(h " " nu)
      " "]où stem:[h] est la constante de Planck, et stem:[ν] est la {{fréquence,
      urn:iec:std:iec:60050-103-06-02}} de l'onde électromagnétique correspondante.
  - content: Pour un faisceau de rayonnement dont la répartition spectrale est stem:[frac("d"
      Phi_("e") (lambda))("d" lambda)] ou stem:[frac("d" Phi_("e") (nu))("d" nu)],
      le flux photonique peut être exprimé par stem:[Phi_("p") = int_(0)^(oo) frac("d"
      Phi_("e") ( lambda ))("d" lambda) * frac(lambda)(h c_(0)) "d" lambda = int_(0)^(oo)
      frac("d" Phi_("e") ( nu ))("d" nu) * frac(1)(h nu) "d" nu], où stem:[h] est
      la constante de Planck et stem:[c]~0~ est la {{vitesse de la lumière dans le
      vide, urn:iec:std:iec:60050-113-01-34}}.
  - content: La grandeur radiométrique correspondante est le "flux énergétique". La
      grandeur photométrique correspondante est le "flux lumineux".
  - content: Le flux photonique est exprimé en seconde à la puissance moins un (s^−1^).
  - content: Cet article était numéroté 845-01-26 dans l'IEC 60050-845:1987.
