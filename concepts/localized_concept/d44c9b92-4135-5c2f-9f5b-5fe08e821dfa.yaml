  definition:
  - content: quotient of the light reflected by the surfaces of a room after a certain
      {{time interval, urn:iec:std:iec:60050-113-01-10}} and light reflected when
      the installation is considered conventionally as new
  examples: []
  id: 845-29-150
  notes:
  - content: The room surface maintenance factor has unit one.
  - content: The room surface maintenance factor is based on a simplified model for
      the effects of the deterioration of room surface reflectance properties and
      does not accurately account for room geometry and configuration.
  - content: This note applies to the French language only.
