  definition:
  - content: mode d'exploitation du train dans lequel le conducteur est situé dans
      la cabine à l’avant du train pour surveiller la voie et stopper le train en
      cas de situation dangereuse, et où l’accélération et le freinage sont automatisés
      et la vitesse est supervisée de façon continue par le système
