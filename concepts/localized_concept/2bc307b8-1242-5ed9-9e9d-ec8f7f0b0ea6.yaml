  definition:
  - content: under sinusoidal conditions, product of the phasor stem:[underline(U)]
      representing the voltage between the terminals of a linear two-terminal element
      or two-terminal circuit and the complex conjugate of the phasor stem:[underline(I)]
      representing the electric current in the element or circuit  stem:[underline(S)
      = underline(U) underline(I) *]
  examples: []
  id: 131-11-39
  notes:
  - content: Complex power is equal to stem:[P + rm(j) Q], where stem:[P] is active
      power and stem:[Q] is reactive power.
  - content: The coherent SI unit for complex power is voltampere, VA.
