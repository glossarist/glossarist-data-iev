  definition:
  - content: "équipement qui est\r\n* soit de masse limitée et non fixé en place,*
      soit fourni avec des roues, des roulettes ou un autre moyen permettant de faciliter
      les mouvements qu'une personne ordinaire doit exécuter selon son utilisation
      prévue"
  examples: []
  id: 903-04-06
  notes:
  - content: Dans certains domaines, "de masse limitée" est considéré comme étant
      "de masse inférieure ou égale à 18 kg".
