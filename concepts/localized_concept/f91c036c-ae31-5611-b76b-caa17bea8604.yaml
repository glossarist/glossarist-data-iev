  definition:
  - content: "{{risque, urn:iec:std:iec:60050-903-01-07}} qui subsiste après que des
      {{mesures de prévention, urn:iec:std:iec:60050-903-01-17}} ont été prises\r\nimage::/assets/images/parts/903/ACOS-Guide116_2010_F1_fr.jpg[]"
  examples: []
  id: 903-01-11
  notes:
  - content: "Parfois il est possible que le risque tolérable soit déjà atteint par
      l’application de l’étape 1 ou des étapes 1 et 2.\r\n*Figure 1 – Principe d'intégration
      de la sécurité*"
  - content: "Le Guide CEI 116 fait la distinction entre:\r\n* le risque résiduel
      après que des mesures de prévention ont été prises par le concepteur;* le risque
      résiduel restant après que toutes les mesures de prévention ont été mises en
      œuvre par l'utilisateur.\r\n[ISO/IEC Guide 51:1999, définition 3.9, modifiée]"
