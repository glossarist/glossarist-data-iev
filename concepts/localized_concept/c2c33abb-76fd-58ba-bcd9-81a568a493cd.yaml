  notes:
  - content: La valeur moyenne quadratique d'une grandeur périodique est généralement
      prise sur un intervalle d'intégration dont l’étendue est le produit de la période
      par un entier naturel.
  - content: La valeur moyenne quadratique d'une grandeur est notée en ajoutant l'indice
      q au symbole de la grandeur.
  - content: L’abréviation anglaise RMS était anciennement écrite r.m.s. ou rms, mais
      ces notations sont maintenant déconseillées.
