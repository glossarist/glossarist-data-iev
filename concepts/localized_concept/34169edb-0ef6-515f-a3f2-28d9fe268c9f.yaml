  definition:
  - content: the time elapsing between two consecutive passages of a satellite through
      a characteristic point on its orbit
  examples: []
  id: 725-11-35
  notes:
  - content: In the absence of further information, it is understood that the period
      of revolution is the anomalistic period. See also the terms nodal period and
      sidereal period of revolution.
