---
data:
  definition:
  - content: document qui donne des règles, des lignes directrices ou des caractéristiques
      pour des activités ou leurs résultats
  examples: []
  id: 901-02-01
  notes:
  - content: L'expression «document normatif» est un terme générique qui recouvre
      les documents tels que les {{norme, urn:iec:std:iec:60050-901-02-02}}s, les
      {{spécifications techniques, urn:iec:std:iec:60050-901-02-08}}, les {{codes
      de bonne pratique, urn:iec:std:iec:60050-901-02-09}} et les {{règlements, urn:iec:std:iec:60050-901-02-10}}.
  - content: On considère comme «document» tout support d'information avec l'information
      qu'il porte.
  - content: Les termes relatifs aux différents types de documents normatifs sont
      définis comme comprenant le document et son contenu considérés comme un tout.
