  definition:
  - content: Type of Protection whereby parts that are capable of igniting an explosive
      atmosphere by either sparking or heating are enclosed in a compound in such
      a way as to avoid ignition of a dust layer or cloud under operating or installation
      conditions
  examples: []
  id: 426-12-11
  notes:
