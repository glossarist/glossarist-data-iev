data:
  definition:
  - content: |-
      {{produit vectoriel, urn:iec:std:iec:60050-102-03-36}} du {{champ électrique, urn:iec:std:iec:60050-121-11-18}} stem:[*E*] par le {{champ magnétique, urn:iec:std:iec:60050-121-11-56}} stem:[*H*] du {{champ électromagnétique, urn:iec:std:iec:60050-121-11-61}} en un point donné

      stem:[*S*] = stem:[*E*] × stem:[*H*]
  examples: []
  id: 121-11-66
  notes:
  - content: Le flux du vecteur de Poynting à travers une surface fermée est égal
      à la puissance électromagnétique qui traverse cette surface.
  - content: Pour un champ électromagnétique périodique, la moyenne temporelle du
      vecteur de Poynting est un vecteur dont la direction, sous certaines réserves,
      peut être considérée comme étant la {{direction de propagation, urn:iec:std:iec:60050-705-02-15}}
      de l'{{énergie électromagnétique, urn:iec:std:iec:60050-121-11-64}} et la {{norme,
      urn:iec:std:iec:60050-102-03-23}} comme la {{puissance surfacique, urn:iec:std:iec:60050-705-02-03}}
      moyenne.
