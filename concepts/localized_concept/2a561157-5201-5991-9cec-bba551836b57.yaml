  definition:
  - content: issue of a statement, based on a decision following {{review, urn:iec:std:iec:60050-902-04-01}},
      that fulfilment of {{specified requirements, urn:iec:std:iec:60050-902-02-01}}
      has been demonstrated
  examples: []
  id: 902-04-02
  notes:
  - content: The resulting statement, referred to in ISO/IEC 17000 as a “statement
      of conformity”, conveys the assurance that the specified requirements have been
      fulfilled. Such an assurance does not, of itself, afford contractual or other
      legal guarantees.
  - content: First-party and third-party attestation activities are distinguished
      by the terms {{902-04-04, urn:iec:std:iec:60050-902-04-04}} to {{902-04-06,
      urn:iec:std:iec:60050-902-04-06}}. For second-party attestation, no special
      term is available.
