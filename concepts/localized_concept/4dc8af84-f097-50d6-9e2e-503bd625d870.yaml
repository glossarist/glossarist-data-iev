  - content: "{{diagnostic device, urn:iec:std:iec:60050-651-24-01}} used to provide
      clear evidence of the presence or absence of an operating voltage"
  examples: []
  id: 651-24-02
  notes:
  - content: These diagnostic devices are generally described as either capacitive
      type or resistive type.
  - content: Clear evidence is a YES or NO indication with no interpretation needed.
      Sometimes, voltage detectors also have supplementary function(s) such as the
      display of voltage values.
