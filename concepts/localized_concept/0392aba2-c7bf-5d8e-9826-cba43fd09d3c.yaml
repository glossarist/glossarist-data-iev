  definition:
  - content: multiplexeur comprenant généralement un amplificateur à large bande,
      permettant de connecter plusieurs récepteurs à la même antenne sans apporter
      d'interaction indésirable entre les récepteurs, ou de dégradation excessive
      du rapport signal sur bruit
