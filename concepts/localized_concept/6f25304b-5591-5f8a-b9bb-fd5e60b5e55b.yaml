data:
  definition:
  - content: "procédure exécutée pour déterminer une ou plusieurs caractéristiques\r\nNote
      1 à l’article: Un essai est réalisé sur un échantillon d’entités pour établir
      des informations relatives à la population d’entités de laquelle l’échantillon
      a été prélevé. Note 2 à l’article: Un essai peut être effectué pour évaluer
      une caractéristique de sûreté de fonctionnement, comme la fiabilité ou la maintenabilité."
