  definition:
  - content: number of protons in an atomic nucleus
  examples: []
  id: 113-05-33
  notes:
  - content: The proton number is given by stem:[Z] = stem:[A] − stem:[N] where stem:[A]
      is the nucleon number and stem:[N] the neutron number.
  - content: The proton number gives the electric charge of the atomic nucleus in
      number of elementary electric charges.
  - content: Atomic number is the order number of atom in the periodic chemical classification
      and relates to the chemical behaviour of the atom, i.e. its ability to produce
      combinations with other atoms. A chemical element consists of atoms having the
      same atomic number.
