  definition:
  - content: in the three-dimensional Euclidean space, mathematical entity which can
      be represented by a vector for a given space orientation and by the opposite
      vector for the other space orientation
  examples: []
  id: 102-03-33
  notes:
  - content: Examples of axial vectors are the vector product of two polar vectors
      and the rotation of a polar vector field, and examples of axial vector quantities
      are angular velocity and magnetic flux density.
