      \" \" \" \" sqrt(L_(1) frac(C_(1) C_(0))(C_(1) + C_(0))))]\r\nwhere stem:[C]~0~
      represents the shunt capacitance and stem:[L]~1~ and stem:[C]~1~ the motional
      inductance and the motional capacitance respectively. The expression can be
      derived from Figure 2 by letting stem:[R]~1~ = 0. image::/assets/images/parts/561/[]
