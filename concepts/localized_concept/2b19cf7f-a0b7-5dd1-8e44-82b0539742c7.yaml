  definition:
  - content: écart relatif de la vitesse réelle (de défilement ou de rotation) par
      rapport à la vitesse nominale (de défilement ou de rotation)
  examples: []
  id: 806-12-26
  notes:
  - content: L'écart est exprimé en pourcentage, affecté du signe (+) ou du signe
      (-) selon que la vitesse réelle est supérieure ou inférieure à la vitesse nominale.
      Il est donné par l'expression:stem:[frac("vitesse" " " "moyenne" " " "réelle"
      - "vitesse" " " "nominale")("vitesse" " " "nominale") xx 100 " " %]
