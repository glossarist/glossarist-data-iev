  definition:
  - content: law relating the apparent contrast, stem:[C~d~], of an object against
      a sky background, at a given distance of observation, stem:[d], to the inherent
      contrast, stem:[C]~0~, and to the atmospheric transmissivity, stem:[T], which
      is assumed to be uniformstem:[C_(d) = C_(0) T^(d / d_(0))]where stem:[d]~0~
      is the length specified for the definition of stem:[T]
  examples: []
  id: 845-31-020
  notes:
  - content: The formula is sometimes writtenstem:[C_(d) = C_(0) T^(delta)]where the
      exponent, stem:[δ], in stem:[T^δ^] is the numerical value of stem:[d] measured
      with stem:[d]~0~ as "unit".
  - content: Taking into account the relationship between atmospheric transmissivity,
      stem:[T], and meteorological optical range, stem:[v], given in Note 2 to entry
      of "{{meteorological optical range, urn:iec:std:iec:60050-845-31-018}}", Koschmieder's
      law can be also written asstem:[C_(d) = C_(0) ( 0,05^(d / v) )]
  - content: The contrast is taken to be the quotient of the difference between the
      luminance of the object and the luminance of the background, and the luminance
      of the background.
  - content: This entry was numbered 845-11-22 in IEC 60050-845:1987.
  terms:
