  definition:
  - content: quotient of stem:[E] by stem:[bar(N)], where stem:[bar(N)] is the mean
      number of ion pairs formed when the initial kinetic energy stem:[E] of a charged
      particle is completely dissipated stem:[W_("i") = E / bar(N)]
  examples: []
  id: 395-01-31
