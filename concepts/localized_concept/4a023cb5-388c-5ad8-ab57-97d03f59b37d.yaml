  definition:
  - content: "1) the projection of one of the vectors of an electromagnetic field
      onto the radius vector from the source of the field considered as a point source\r\n2)
      the projection of one of the vectors of an electromagnetic field at a point
      of the transverse cross-section of a circular cylindrical structure, such as
      a wire or a waveguide, onto the radius of the cross-section at this point"
