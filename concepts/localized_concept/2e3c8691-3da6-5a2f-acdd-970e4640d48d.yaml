  definition:
  - content: "algebraic equation giving the number dstem:[N] of particles of a quantized
      system in equilibrium, the velocity components of which are included in the
      intervals (stem:[u], stem:[u] + dstem:[u]), (stem:[v], stem:[v] + dstem:[v]),
      (stem:[w], stem:[w] + dstem:[w]) :\n\nrespectively:\r\nstem:[\"d\" \" \" N =
      2 N * frac(m^(3))(h^(3)) * frac(\"d\" \" \" u * \"d \" v * \"d\" \" \" w)(1
      + \"exp\" ( frac(E - E_(\"M\"))(k T) ))] \r\nwhere\n\nstem:[N] is the total
      number of particles\n\nstem:[m] is the mass of the particle\n\nstem:[T] is the
      thermodynamic temperature\n\nstem:[k] is the Boltzmann constant\n\nstem:[h]
      is the Planck constant\n\nstem:[E] is the kinetic energy of a particle,\r\nstem:[E
      = frac(m)(2) (u^(2) + v^(2) + w^(2))] \r\nstem:[E]~M~ is the inner work function\n\ndstem:[N]/stem:[N]
      represents the probability that a particle has its components within the intervals
      considered."
