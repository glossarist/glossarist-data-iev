data:
  definition:
  - content: "fonction considérée comme nécessaire pour satisfaire à une exigence
      donnée\r\nNote 1 à l’article: La fonction requise peut être formulée ou implicite
      (c’est-à-dire ce que l’acheteur serait en droit d’attendre). Note 2 à l’article:
      La fonction requise inclut aussi implicitement ce que l’entité ne doit pas faire.
      Note 3 à l’article: Les fonctions internes essentielles d’un système, que l’utilisateur
      peut ne pas voir, sont également des fonctions requises."
