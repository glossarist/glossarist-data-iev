  definition:
  - content: inability to perform as required, due to an internal state
  examples: []
  id: 192-04-01
  notes:
  - content: A fault of an item results from a failure, either of the item itself,
      or from a deficiency in an earlier stage of the life cycle, such as specification,
      design, manufacture or maintenance. See latent fault ({{192-04-08, urn:iec:std:iec:60050-192-04-08}}).
  - content: Qualifiers, such as specification, design, manufacture, maintenance or
      misuse, may be used to indicate the cause of a fault.
  - content: The type of fault may be associated with the type of associated failure,
      e.g. wear-out fault and wear-out failure.
  - content: The adjective “faulty” designates an item having one or more faults.
