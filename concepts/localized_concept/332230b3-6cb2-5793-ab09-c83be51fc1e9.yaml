  definition:
  - content: ensemble d'un ou plusieurs émetteurs ou récepteurs radioélectriques,
      ou à la fois d'émetteurs et de récepteurs, y compris les équipements associés,
      situé en un emplacement donné et destiné à un service de radiocommunication
      ou à la radioastronomie
  examples: []
  id: 713-02-01
  notes:
  - content: Chaque station radioélectrique est désignée d'après le service auquel
      elle participe d'une façon permanente ou temporaire.
  - content: L'emplacement donné peut être fixe ou mobile, et situé sur terre, sur
      mer, dans l'atmosphère ou dans l'espace.
