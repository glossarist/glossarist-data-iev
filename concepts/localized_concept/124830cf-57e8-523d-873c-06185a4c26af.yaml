---
data:
  definition:
  - content: 'état de l’hélium, sur son diagramme pression-température, représenté
      par la région entourée par l’interface solide-liquide, l’interface liquide-gaz
      et une ligne (ligne stem:[λ]) reliant les deux points dits "point stem:[λ] haut"
      (1,76 K et 3,0 MPa) et "point stem:[λ] bas" (2,18 K et 5,0 kPa)Note 1 à l’article:
      Hélium superfluide saturé: hélium superfluide existant sur l’interface liquide-gaz
      et au-dessous du point stem:[λ] bas du diagramme pression-température. Note
      2 à l’article: Hélium superfluide pressurisé: hélium superfluide existant au-dessus
      de l’interface liquide-gaz et au-dessous du point stem:[λ] bas du diagramme
      pression-température. Note 3 à l’article: L’hélium superfluide est caractérisé
      par une très faible viscosité et une forte conductivité thermique.'
