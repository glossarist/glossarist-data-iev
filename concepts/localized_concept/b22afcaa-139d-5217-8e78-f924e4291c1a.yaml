  definition:
  - content: "unité fonctionnelle avec deux entrées et une sortie; la valeur instantanée
      de la variable de sortie est égale au quotient des valeurs instantanées des
      variables d'entrée (dividende et diviseur) multipliées par des coefficients
      de pondération, suivant la formulestem:[v (t) = K_(0) * frac(K_(1) * u_(1) (t))(K_(2)
      * u_(2) (t))]où<table>\r\n<tr>\n<td>stem:[t]</td>\n<td>est le temps;</td>\n</tr>\r\n<tr>\n<td>\nstem:[K]~0~,
      stem:[K]~1~ ...</td>\n<td>sont les facteurs de pondération;</td>\n</tr>\r\n<tr>\n<td>\nstem:[u]~1~,
      stem:[u]~2~\n</td>\n<td>sont les variables d’entrée;</td>\n</tr>\r\n<tr>\n<td>stem:[v]</td>\n<td>est
      le résultat de division.</td>\n</tr>\r\n</table>"
