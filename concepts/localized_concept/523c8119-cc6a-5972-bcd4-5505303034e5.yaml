  definition:
  - content: "{{energizing quantity, urn:iec:std:iec:60050-447-03-01}} that by itself
      constitutes the {{characteristic quantity, urn:iec:std:iec:60050-447-07-01}},
      or helps to constitute it"
  examples:
  - content: "* Current, for current relay, thermal electric relay and (differential
      relay);* voltage, for voltage relay, frequency relay, volt per hertz relay and
      synchronizing relay;* voltage and current, for impedance relay, directional
      relay and power relay."
  id: 447-03-02
  notes:
  - content: The {{input energizing quantity, urn:iec:std:iec:60050-447-03-02}} can
      be applied to a {{measuring relay, urn:iec:std:iec:60050-447-01-02}} or {{protection
      equipment, urn:iec:std:iec:60050-447-01-49}} either by hardwire from {{instrument
      transformers, urn:iec:std:iec:60050-321-01-01}} or as a data packet over communication
      ports using an appropriate data communication protocol, such as IEC 61850-9-2.
  - content: In IEC 60050-447:2010, "characteristic energizing quantity" was numbered
      447-03-03, as a substitute of {{"input energising quantity", urn:iec:std:iec:60050-447-03-02}},
      and "input energising quantity" was provisionally defined for the existing IEC 60255
      series standards. However, "input energizing quantity" is internationally accepted.
  terms:
  - type: expression
    normative_status: preferred
    designation: input energizing quantity
  - type: expression
    normative_status: deprecated
    designation: characteristic energizing quantity
