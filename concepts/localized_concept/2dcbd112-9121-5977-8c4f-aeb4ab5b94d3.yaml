  definition:
  - content: "unité fonctionnelle qui génère une variable de sortie dont la valeur
      dépend du signe de la valeur de sa variable d'entrée, suivant la formulestem:[v
      ( t ) = { [[V_(1)], [0], [- V_(1)]] [[\" \" \"pour\" \" \" u ( t ) gt 0], [\" \"
      \"pour\" \" \" u ( t ) = 0], [\" \" \"pour\" \" \" u ( t ) lt 0]]]\r\noù<table>\r\n<tr>\n<td>stem:[t]</td>\n<td>est
      le temps;</td>\n</tr>\r\n<tr>\n<td>\nstem:[u](stem:[t])</td>\n<td>est la variable
      d’entrée;</td>\n</tr>\r\n<tr>\n<td>\nstem:[v](stem:[t])</td>\n<td>est la variable
      de sortie;</td>\n</tr>\r\n<tr>\n<td>\nstem:[V]~1~\n</td>\n<td>est une valeur
      constant de la variable de sortie.</td>\n</tr>\r\n</table>"
