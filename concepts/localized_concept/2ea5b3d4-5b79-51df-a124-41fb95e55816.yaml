  definition:
  - content: stress imposed by conditions of operation, environment or test that affects
      the life of an electric insulating material or insulation system
  examples: []
  id: 212-12-05
  notes:
  - content: The term “factor of influence” designates external factors (such as ambient
      temperature) inducing stress in an insulation system as different from stress
      factors being part of the duty cycle of the equipment (e.g. temperature rise
      due to load).
