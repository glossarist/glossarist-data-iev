  definition:
  - content: maximum possible {{character mean transinformation content, urn:iec:std:iec:60050-171-07-30}},
      which can be achieved with an arbitrary small {{error probability, urn:iec:std:iec:60050-171-06-08}}
      by use of an appropriate {{code, urn:iec:std:iec:60050-171-01-15}}
  examples: []
  id: 171-07-32
  notes:
  - content: The channel capacity per character is one way to express quantitatively
      the ability of a given channel subject to specific constraints to transmit messages
      from a specified message source.
  - content: The channel capacity per character can be expressed in a unit such as
      the shannon per character.
