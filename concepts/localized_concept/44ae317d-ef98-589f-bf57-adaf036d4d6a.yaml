  definition:
  - content: result of a process [ISO 9000:2000, 3.4.2]
  examples: []
  id: 902-02-03
  notes:
  - content: 'Four generic product categories are noted in ISO 9000:2000: services
      (e.g. transport); software (e.g. computer program, dictionary); hardware (e.g.
      engine, mechanical part); processed materials (e.g. lubricant). Many products
      comprise elements belonging to different generic product categories. Whether
      the product is then called service, software, hardware or processed material
      depends on the dominant element.'
  - content: The statement of conformity described in Note 1 to {{902-04-02, urn:iec:std:iec:60050-902-04-02}}
      can be regarded as a product of {{attestation, urn:iec:std:iec:60050-902-04-02}}.
