  definition:
  - content: difference between the electric potentials at two points
  examples: []
  id: 121-11-26
  notes:
  - content: "The electric potential difference stem:[V]~b~ − stem:[V]~a~ between
      two points a and b is equal to the negative of the line integral, along any
      path linking points a and b, of the irrotational vector stem:[(E + frac(del
      A)(del t))], where stem:[*E*] is the electric field strength, stem:[*A*] a magnetic
      vector potential and stem:[t] the time:\r\nstem:[V_(\"b\") - \" \" \" \" V_(\"a\")
      = \" \" - \" \" int_(r_(mathbf(a)))^(r_(mathbf(b))) (E + frac(del \" \" A)(del
      \" \" t)) * \"d\" r]\r\nwhere stem:[*r*]~a~ and stem:[*r*]~b~ are the position
      vectors for a and b, respectively, and dstem:[*r*] is the vector line element."
