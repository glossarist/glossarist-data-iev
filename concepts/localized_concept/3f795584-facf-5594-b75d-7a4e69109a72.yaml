  id: 523-04-13
  notes:
  - content: Scanning mirrors are developed for laser printers, the scanning parts
      of optical  {{sensors, urn:iec:std:iec:60050-151-13-48}}, the heads for optical
      disks, displays and so on. An array of scanning mirrors can be fabricated on
      a silicon {{wafer, urn:iec:std:iec:60050-521-05-29}} with an {{actuator, urn:iec:std:iec:60050-151-13-49}}
      by micromachining technology.
