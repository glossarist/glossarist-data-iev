  definition:
  - content: temperature of the Planckian radiator whose {{relative spectral distribution,
      urn:iec:std:iec:60050-845-21-030}}, stem:[S](stem:[λ]) is the same or nearly
      the same as that of the radiation considered in the spectral range of interest
      for which the following integral is minimized by adjustment of stem:[a] and
      stem:[T]:stem:[int_(lambda_(1))^(lambda_(2)) &amp;lsqb; 1 - frac(S_("t") ( lambda
      ))(a " " S_("b") ( lambda , T )) &amp;rsqb;^(2) "d" lambda]where stem:[λ] is
      the wavelength, stem:[S]~t~(stem:[λ]) is the {{relative spectral distribution,
      urn:iec:std:iec:60050-845-21-030}} of the radiation being considered, stem:[S]~b~(stem:[λ],
      stem:[T]) is the relative spectral distribution of the Planckian radiator at
      temperature stem:[T], and stem:[a] is a scaling factor
  examples: []
  id: 845-24-017
  notes:
  - content: |-
      The scaling factor stem:[a] is chosen to make the quotient stem:[frac(S_("t") ( lambda ))(S_("b") ( lambda , T ))] equal to unity at a convenient wavelength which, in photometry and colorimetry is typically 560 nm.stem:[S_("b") ( lambda , T ) = frac(P ( lambda , T ))(P ( 560 " " "nm" , T ))]

      with stem:[P ( lambda , T ) = lambda^(- "5") ("e"^(frac(c_("2"))(lambda T)) - "1")^(- "1")], where stem:[c]~2~ is the second radiation constant.
  - content: Distribution temperature is a meaningful characteristic for radiators
      having a {{relative spectral distribution, urn:iec:std:iec:60050-845-21-030}}
      similar to that of a Planckian radiator, but only if calculated for an expanded
      wavelength range and for radiation whose {{spectral distribution, urn:iec:std:iec:60050-845-21-029}}
      of radiant flux is a continuous function of wavelength in that range.
  - content: In photometry and colorimetry the wavelength range set by stem:[λ]~1~
      and stem:[λ]~2~ is the visible spectral range, and in these cases the range
      from at least stem:[λ]~1~ = 400 nm to stem:[λ]~2~ = 750 nm is recommended.
  - content: In practice, the integral is replaced by a summation. For {{incandescent
      lamps, urn:iec:std:iec:60050-845-27-011}}, equally spaced wavelength intervals
      of 10 nm will usually suffice. All values in the summation are treated with
      equal weight.
  - content: The distribution temperature is expressed in kelvin (K).
  - content: For further information, see CIE 114-1994, _CIE Collection in Photometry
      and Radiometry – 114/4 Distribution Temperature and Ratio Temperature_.
  - content: This entry was numbered 845-04-14 in IEC 60050-845:1987.
  terms:
