  definition:
  - content: "{{optical radiation, urn:iec:std:iec:60050-845-21-002}} for which the
      wavelengths are shorter than those for {{visible radiation, urn:iec:std:iec:60050-845-21-003}}"
  examples: []
  id: 845-21-008
  notes:
  - content: 'The range between 100 nm and 400 nm is commonly subdivided into:* UV-A:
      315 nm to 400 nm;* UV-B: 280 nm to 315 nm;* UV-C: 100 nm to 280 nm.'
  - content: A precise border between ultraviolet radiation and visible radiation
      cannot be defined, because visual sensation at wavelengths shorter than 400&#160;nm
      is noted for very bright sources.
  - content: In some applications the ultraviolet spectrum has also been divided into
      "far," "vacuum," and "near" ultraviolet; however, the borders necessarily vary
      with the application (e.g. in meteorology, optical design, photochemistry, and
      thermal physics).
  - content: This entry was numbered 845-01-05 in IEC 60050-845:1987.
  - content: This note applies to the French language only.
