  definition:
  - content: "{{equipment, urn:iec:std:iec:60050-651-21-16}} which is portable and
      is connected by insulating component(s) to parts of an {{electrical installation,
      urn:iec:std:iec:60050-651-26-01}} for earthing, short-circuiting or earthing
      and short-circuiting purposes"
  examples: []
  id: 651-25-01
  notes:
  - content: The portable equipment for earthing and short-circuiting comprises earthing
      components, short-circuiting components and one or more insulating components,
      for instance {{earthing sticks, urn:iec:std:iec:60050-651-25-05}}.
  - content: This entry was numbered 651-14-01 in IEC 60050-651:1999. It has been
      modified to precise the definition and make use of preferred terms.
