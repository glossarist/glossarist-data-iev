  definition:
  - content: symbolic notation expressed formally as a vector, used to denote scalar
      or vector differential operators operating at each point of a given space region
      on scalars or vectors, and which, in orthonormal Cartesian coordinates, is represented
      by stem:[mathbf(nabla) = e_(x) frac(del)(del " " x) + e_(y) frac(del)(del " "
      y) + e_(z) frac(del)(del " " z)] where stem:[e_(x) ", " e_(y) ", " e_(z)] are
      unit vectors along the stem:[x], stem:[y], stem:[z] axes
  examples: []
  id: 102-05-18
  notes:
  - content: It is recommended to print the symbol *∇* in boldface.
