data:
  definition:
  - content: utilisation de procédés, pratiques, matériaux ou produits qui empêchent,
      réduisent ou maîtrisent la pollution, pouvant inclure le {{recyclage, urn:iec:std:iec:60050-902-02-016}},
      le traitement, les modifications de procédés, les mécanismes de contrôle, l’utilisation
      efficace des matériaux et la substitution de matériaux
  examples: []
  id: 901-07-08
  notes:
  - content: Les bénéfices potentiels de la prévention de la pollution comprennent
      la réduction des {{impacts environnementaux, urn:iec:std:iec:60050-901-07-03}},
      une amélioration du rendement et une réduction des coûts.[ISO 14001:2004, définition
      3.18, modifiée]
