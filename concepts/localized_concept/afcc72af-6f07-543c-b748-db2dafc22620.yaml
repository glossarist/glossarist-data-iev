data:
  definition:
  - content: processus systématique, indépendant et documenté, permettant d'obtenir
      des enregistrements, des énoncés de faits ou d'autres informations pertinentes,
      et de les évaluer de manière objective pour déterminer dans quelle mesure les
      {{exigences spécifiées, urn:iec:std:iec:60050-902-02-01}} sont respectées
  examples: []
  id: 902-03-04
  notes:
  - content: Alors que le terme «audit» s'applique aux systèmes de management, «évaluation»
      s'applique aux organismes d'évaluation de la conformité et s'utilise aussi d'une
      façon plus générale.
