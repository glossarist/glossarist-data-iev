  definition:
  - content: partie d'une antenne conçue pour être le siège des courants ou des champs
      radiofréquences dont dépendent essentiellement les caractéristiques de rayonnement
      de l'antenne
  examples: []
  id: 712-01-04
  notes:
  - content: Une antenne peut comprendre un ou plusieurs éléments rayonnants.
  - content: Un élément rayonnant peut être alimenté ou non.
