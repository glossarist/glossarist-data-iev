  definition:
  - content: "a graded index profile with the square of refractive index in the core
      decreasing according to a law involving a power of the distance from the axis.\r\nstem:[n]^2^
      (stem:[r]) = stem:[n]^2^~1~ [1 – 2 Δ (stem:[r] / stem:[а])^g^]\r\nstem:[r] ≤
      stem:[a] where :\n\nstem:[n](stem:[r]) is the refractive index as a function
      of radius,\n\nstem:[n]~1~ is the refractive index on axis,\n\nstem:[a] is the
      core radius,\n\nstem:[g] is a parameter that defines the shape of the profile\n\nand
      Δ is a parameter which is the same as the refractive index contrast when the
      refractive index of the cladding is constant"
