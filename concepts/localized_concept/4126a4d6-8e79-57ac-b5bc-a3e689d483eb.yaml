  definition:
  - content: command which is issued as soon as the associated step is activated and
      which ends as soon as a specified time interval has elapsed or when the associated
      step is deactivated before the specified time interval has elapsed
  examples: []
  id: 351-51-08
  notes:
  - content: The time limited command is identified in IEC 60848, _GRAFCET specification
      language for sequential function charts_, by the conventional letter “L”.
  - content: This entry was numbered 351-29-35 in IEC 60050-351:2006.
