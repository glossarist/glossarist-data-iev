  definition:
  - content: for an electromagnetic wave incident from a given direction, a quantity
      which characterizes the power back-scattered by hydrometeors existing in the
      atmosphere
  examples: []
  id: 705-05-24
  notes:
  - content: "For homogeneous rain precipitation, the radar reflectivity factor is
      given by the expression:\r\nstem:[Z = frac(sum N_(i) D_(i)^(\"6\"))(V)]\n\nwhere
      stem:[N]~stem:[i]~ is the number of particles of diameter stem:[D]~stem:[i]~
      in a volume stem:[V]. The factor stem:[Z] is generally expressed in mm^6^/m^3^."
  terms:
  - type: expression
    normative_status: preferred
    designation: radar reflectivity factor
