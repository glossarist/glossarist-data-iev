  id: 103-02-01
  notes:
  - content: La valeur moyenne d'une grandeur périodique est généralement prise sur
      un intervalle d'intégration dont l’étendue est le produit de la période par
      un entier naturel.
  - content: La valeur moyenne de la grandeur stem:[x] est représentée par stem:[bar(X)],
      par 〈stem:[X]〉 ou par stem:[X]~a~. Les indices ar, av et moy sont aussi utilisés.
  - content: L'adjectif «arithmétique» n'est employé pour qualifier les termes «moyenne»
      et «valeur moyenne» que pour les distinguer des termes «moyenne géométrique»
      et «valeur moyenne géométrique», ainsi que des termes «moyenne harmonique» et
      «valeur moyenne harmonique».
  - content: La valeur moyenne peut se généraliser à une fonction de stem:[n] variables,
      par exemple au moyen du quotient d'une intégrale de surface par l’aire correspondante
      ou d’une intégrale étendue à un domaine tridimensionnel par le volume correspondant.
      Voir des exemples dans IEC 60050-102.
