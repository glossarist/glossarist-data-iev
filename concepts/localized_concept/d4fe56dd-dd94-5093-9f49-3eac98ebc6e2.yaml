  definition:
  - content: "for a reciprocal electroacoustic transducer, at a specified frequency:\r\na)
      quotient of the voltage sensitivity of the transducer functioning as a receiver
      of sound (e.g. a microphone) by the sensitivity to current of the transducer
      functioning as an emitter of sound; or\r\nb) quotient of the current sensitivity
      of the transducer functioning as a receiver of sound (e.g. a microphone) by
      the sensitivity to voltage of the transducer functioning as an emitter of sound"
