---
data:
  definition:
  - content: "probabilité de fonctionner tel que requis pendant l’intervalle de temps
      (stem:[t]~1~, stem:[t]~2~), dans des conditions données\r\nNote 1 à l’article:
      Les conditions données incluent les aspects ayant un impact sur la fiabilité,
      tels que: le mode de fonctionnement, les niveaux de contrainte, les conditions
      environnementales et la maintenance, le cas échéant. Note 2 à l’article: En
      règle générale, l’entité est supposée se trouver dans un état lui permettant
      d’accomplir la fonction requise au début de l’intervalle de temps. Note 3 à
      l’article: Si stem:[t]~1~= 0 et stem:[t]~2~ = stem:[t], alors stem:[R](0, stem:[t])
      est noté simplement stem:[R](stem:[t]) et est appelé fonction de fiabilité ou
      fonction de survie de l’entité. Voir l'IEC 61703, _Expressions mathématiques
      pour les termes de fiabilité, de disponibilité, de maintenabilité et de logistique
      de maintenance_, pour plus de détails. Note 4 à l’article: Voir aussi fiabilité,
      <d’une entité> ({{192-01-24, urn:iec:std:iec:60050-192-01-24}})."
