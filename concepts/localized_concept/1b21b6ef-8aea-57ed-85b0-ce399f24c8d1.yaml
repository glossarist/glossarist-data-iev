  definition:
  - content: quantity that correlates with the more or less luminous aspect of a star
      and that is defined by the formulastem:[m] = stem:[m]~o~ − 2,5 log~10~(stem:[E]~pb~/stem:[E]~o~)where
      stem:[E]~pb~ is the point brilliance of the star considered, stem:[m]~o~ and
      stem:[E]~o~ are constants based on the magnitudes ascribed to certain standard
      stars
  examples: []
  id: 845-21-097
  notes:
  - content: In addition to the (visual) apparent magnitude defined here, other apparent
      magnitudes (photographic, bolometric, etc.) are defined by the same formula,
      but where stem:[E]~pb~ and stem:[E]~o~ are the responses of a detector having
      a specified spectral responsivity.
  - content: The apparent magnitude has unit one.
  - content: This entry was numbered 845-01-60 in IEC 60050-845:1987.
