  definition:
  - content: point of interconnection of an electric circuit element, an electric
      circuit or a network with other electric circuit elements, electric circuits
      or networks
  examples: []
  id: 131-11-11
  notes:
  - content: For an electric circuit element the terminals are the points at which
      or between which the related integral quantities are defined. At each terminal,
      there is only one electric current from outside into the element.
  - content: The term "terminal" has a related meaning in IEC 60050-151.
