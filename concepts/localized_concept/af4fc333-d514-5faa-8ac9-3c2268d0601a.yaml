  id: 102-02-09
  notes:
  - content: All properties of real numbers (operations and limits) are extended to
      complex numbers except the order relation.
  - content: The complex number defined by the pair (stem:[a], stem:[b]) is denoted
      by stem:[c = a + rm(j) b] where j is the imaginary unit ({{IEV 102-02-10, urn:iec:std:iec:60050-102-02-10}})
      represented by the pair (0, 1), stem:[a] is the real part and stem:[b] the imaginary
      part. A complex number may also be expressed as stem:[c = |c| ( cosphi + rm(j)
      " " sinphi ) = |c| e^(rm(j) phi)] where stem:[|c|] is a non-negative real number
      called modulus and stem:[φ] a real number called argument.
  - content: In electrotechnology, a complex number is usually denoted by an underlined
      letter symbol, for example stem:[underline(c)].
  - content: The set of complex numbers is denoted by ℂ (C with a vertical bar in
      the left arc) or *C*. This set without zero is denoted by an asterisk to the
      symbol, for example ℂ*.
