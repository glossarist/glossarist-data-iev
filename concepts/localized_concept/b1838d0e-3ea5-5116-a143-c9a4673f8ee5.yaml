  definition:
  - content: density of incident {{luminous energy, urn:iec:std:iec:60050-845-21-037}}
      with respect to area at a point on a real or imaginary surfacestem:[H_("v")
      = frac("d" Q_("v"))("d" A)]where stem:[Q]~v~ is luminous energy and stem:[A]
      is the area on which the luminous energy is incident
  examples: []
  id: 845-21-072
  notes:
  - content: The term "light exposure" is no longer used.
  - content: Luminous exposure can be derived from the spectral radiant exposure distribution
      bystem:[H_("v") \  = \  K_("m") int_(0)^(oo) H_("e" "," lambda) ( lambda ) " "
      V ( lambda ) " " "d" lambda]where stem:[K]~m~ is maximum luminous efficacy,
      stem:[H]~e,~stem:[~λ~](stem:[λ]) is the spectral radiant exposure at wavelength
      stem:[λ] and stem:[V](stem:[λ]) is {{spectral luminous efficiency, urn:iec:std:iec:60050-845-21-035}}.
      Integral limits can be confined depending on the spectral {{responsivity, urn:iec:std:iec:60050-845-25-061}}
      of the detectors used as a sensor.
  - content: The corresponding radiometric quantity is "radiant exposure". The corresponding
      quantity for photons is "photon exposure"
  - content: The luminous exposure is expressed in lux second (lx·s = lm·s·m^−2^).
  - content: This entry was numbered 845-01-43 in IEC 60050-845:1987.
  terms:
  - type: expression
    normative_status: preferred
    designation: luminous exposure
  - type: expression
    normative_status: deprecated
    designation: light exposure
  - designation: |-
      stem:[H]~v~
      stem:[H]
