  definition:
  - content: set of values attributed to a measurand
  examples: []
  id: 311-01-01
  notes:
  - content: This term is used in the "uncertainty" approach.
  - content: The central value of the whole can be selected as value of the measurand
      and a parameter caracterising the dispersion as uncertainty.
  - content: The result of a measurement is related to the indication given by the
      instrument and to the values of correction obtained by calibration and by the
      use of a model.
  - content: The set of values can be considered as representing the measurand provided
      that it is compatible with all other measurements of the same measurand.
  - content: The set, and hence the uncertainty, can only be given with a stated level
      of confidence.
