---
data:
  definition:
  - content: logarithme du nombre d'événements dans un ensemble fini de stem:[n] événements
      s'excluant mutuellement stem:[H]~0~&equals;log stem:[n]
  examples:
  - content: "La quantité de décision d’un jeu de trois événements est: stem:[[[H_(\"0\")
      \"=\" (\"lb 3\") \"Sh\" approx \"1\" \",585\" \" \" \"Sh\"], [\" \" \" \" \" \"
      \"=\" (\"ln 3\") \"nat\" approx \"1\" \",099\" \" \" \"nat\"], [\" \" \" \"
      \" \" \"=\" (\"lg 3\") \"Hart\" approx \"0\" \",477\" \" \" \"Hart\"]]]Note
      1 à l’article: La base du logarithme détermine l'unité employée. Les unités
      habituellement utilisées sont les suivantes: shannon (symbole Sh) pour les logarithmes
      de base deux, unité naturelle (symbole nat) pour les logarithmes de base e,
      hartley (symbole Hart) pour les logarithmes de base 10. Table de conversion:\n\nstem:[[[1
      \  \" \" \"Sh\", approx, 0,693   \" \" \"nat\", approx, 0,301   \" \" \"Hart\"],
      [1   \" \" \"nat\", approx, 1,433   \" \" \"Sh\", approx, 0,434 \" \"   \"Hart\"],
      [1   \" \" \"Hart\", approx, 3,322   \" \" \"Sh\", approx, 2,303   \" \" \"nat\"]]]\r\nNote
      2 à l’article: La quantité de décision est indépendante des probabilités de
      réalisation des événements. Note 3 à l’article: Le nombre de décisions élémentaires
      distinctes qui doivent être prises pour choisir un des événements dans un ensemble
      d'événements s'excluant mutuellement est le plus petit entier supérieur ou égal
      à la quantité de décision, la base du logarithme étant le nombre de choix possibles
      à chaque décision. Note 4 à l’article: Lorsqu’on emploie la même base entière
      pour le même nombre d’événements, la quantité de décision est égale à l’{{entropie
      maximale, urn:iec:std:iec:60050-171-07-16}}."
