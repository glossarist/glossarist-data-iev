      2 à l’article: Le temps de détection de panne ({{192-07-11, urn:iec:std:iec:60050-192-07-11}})
      et le délai administratif ({{192-07-12, urn:iec:std:iec:60050-192-07-12}}) ne
      sont pas inclus dans le temps de maintenance."
