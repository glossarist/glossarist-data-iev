  definition:
  - content: angle d'incidence maximal pour lequel la réfraction est possible lorsqu'une
      onde se propageant dans un milieu homogène rencontre une surface de séparation
      avec un autre milieu homogène d'indice de réfraction plus faible
  examples: []
  id: 731-03-23
  notes:
  - content: "L'angle limite est égal a:\r\narcsin (stem:[n]~1~/ stem:[n]~2~)\r\noù
      stem:[n]~1~ est l'indice de réfraction le plus faible et stem:[n]~2~ l'indice
      le plus élevé."
