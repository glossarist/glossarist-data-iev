  definition:
  - content: qualifie le nom d’une grandeur pour désigner le quotient de cette grandeur
      par une longueur
  examples: []
  id: 112-03-14
  notes:
  - content: 'Exemples: masse linéique, densité linéique de courant électrique, ionisation
      linéique.'
  - content: 'Le qualificatif «linéique» est aussi ajouté au nom d’une grandeur seulement
      pour distinguer des grandeurs similaires (exemples: dilatation linéique relative,
      coefficient de dilatation linéique). Le qualificatif «linéique» a un sens différent
      en mathématiques (voir la CEI 60050-102).'
