  definition:
  - content: the direction of the time-average Poynting vector at a fixed point in
      a transmission line
  examples: []
  id: 726-06-04
  notes:
  - content: In a uniform transmission line, the direction of propagation of energy
      is often taken along the longitudinal axis.
  - content: In a uniform lossless waveguide, the direction of propagation of energy
      at every point of a transverse cross-section is parallel to the longitudinal
      axis.
