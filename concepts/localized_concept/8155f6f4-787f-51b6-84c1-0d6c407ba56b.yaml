  definition:
  - content: "density of incident radiant flux with respect to area at a point on
      a real or imaginary surface\r\nstem:[E_(\"e\") = frac(\"d\" Phi_(\"e\"))(\"d\"
      A)]where stem:[Φ]~e~ is radiant flux and stem:[A] is the area on which the radiant
      flux is incident"
  examples: []
  id: 845-21-053
  notes:
  - content: The corresponding photometric quantity is "illuminance". The corresponding
      quantity for photons is "photon irradiance".
  - content: The irradiance is expressed in watt per square metre (W·m^−2^).
  - content: This entry was numbered 845-01-37 in IEC 60050-845:1987.
