  definition:
  - content: "surface defined as touchable (or accessible) in the end-product standard,
      taking into account the intended installation of the equipment and surfaces
      within {{arm’s reach, urn:iec:std:iec:60050-903-03-03}}, other than:\r\n* hot
      functional surfaces;* adjacent surfaces; and* handles or control knobs, including
      keypads, keyboards and the like, that a user needs to touch to operate or adjust
      the equipment"
  examples: []
  id: 903-03-04
  notes:
  - content: "See Figure 1 for examples of the types of surfaces that may be encountered.\r\nimage::/assets/images/parts/903/acos-guide117_2010_f1_en.jpg[]\r\nFigure
      1 – Identification of the touchable parts of equipment (cross-hatched area)"
  - content: The equipment has to be installed according to the manufacturer’s instructions.
      This means that an oven intended for building-in should be installed according
      to the manufacturer’s instructions before identification of the touchable surfaces.
