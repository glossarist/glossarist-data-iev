  definition:
  - content: algebraic or vector representation of the match of two colour stimuli,
      of which, for instance, one can be an additive mixture of three reference colour
      stimuli
  examples:
  - content: '&lsqb;stem:[C]&rsqb; ≡ stem:[X]&lsqb;X&rsqb; + stem:[Y]&lsqb;Y&rsqb;
      + stem:[Z]&lsqb;Z&rsqb;In this equation, the sign "≡" indicates a colour match
      and is read as "matches". The unbracketed symbols represent the amounts of the
      stimuli indicated by the bracketed symbols: thus stem:[R]&lsqb;R&rsqb; means
      stem:[R] units of stimulus &lsqb;R&rsqb;, and the sign "+" means an additive
      mixture of colour stimuli. In such an equation, a minus sign means that the
      stimulus is added to those on the other side of the equation when the colour
      match is made.'
  id: 845-23-040
  notes:
  - content: 'The reference stimuli are represented as &lsqb;R&rsqb;, &lsqb;G&rsqb;
      and &lsqb;B&rsqb; in which case the sign "≡", read as "matches" should be used.
      As an alternative, the colour equation can be written using boldface Roman letters
      when the equal sign "&equals;", read as "equals" should be used: *C* = stem:[X]*X*
      + stem:[Y]*Y* + stem:[Z]*Z*'
  - content: This entry was numbered 845-03-24 in IEC 60050-845:1987.
  terms:
