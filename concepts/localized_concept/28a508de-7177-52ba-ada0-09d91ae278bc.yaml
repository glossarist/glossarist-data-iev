  definition:
  - content: rapidité globale de transmission d'éléments de signal sur une liaison,
      expriméе en éléments binaires par seconde
  examples: []
  id: 721-03-30
  notes:
  - content: "Le débit binaire s'exprime par la formulestem:[sum_(i = 1)^(i = m) frac(1)(T_(i))
      \" \" log_(2) n_(i)]\r\noù stem:[m] est le nombre de voies de transmission en
      parallèle, stem:[T]~stem:[i]~ est la plus courte durée théorique d'un élément
      de signal pour la voie stem:[i], exprimée en secondes, et stem:[n]~stem:[i]~
      est la valence de la voie stem:[i]."
  - content: Le symbole de l'unité de débit binaire est bit/s.
