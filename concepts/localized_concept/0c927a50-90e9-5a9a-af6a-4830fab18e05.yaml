  definition:
  - content: "recherche dans le code source d’éléments susceptibles d’indiquer la
      présence de pannes logicielles\r\nNote 1 à l’article: En général, une analyse
      statique révèle des sections de code impossible à atteindre, des variables non
      utilisées, mal utilisées, définies deux fois ou non initialisées et des chemins
      d’exécution imprévus. Note 2 à l’article: En principe, une analyse statique
      utilise des outils de génie logiciel assisté par ordinateur (GLAO)."
