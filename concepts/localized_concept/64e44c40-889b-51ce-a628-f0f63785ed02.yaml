data:
  definition:
  - content: "processus automatique de détection, contrôle et correction d’un état
      interne erroné\r\nNote 1 à l’article: La reprise sur erreur a pour objet d’éviter
      une défaillance de l’ensemble du système, suite à une défaillance de l’un de
      ses sous-systèmes ou composants. Note 2 à l’article: Voir aussi reprise sur
      erreur par régression ({{192-10-17, urn:iec:std:iec:60050-192-10-17}}) et reprise
      sur erreur par progression ({{192-10-18, urn:iec:std:iec:60050-192-10-18}}).
      Note 3 à l’article: Une reprise sur erreur s’appuie souvent sur la redondance
      et la diversité."
