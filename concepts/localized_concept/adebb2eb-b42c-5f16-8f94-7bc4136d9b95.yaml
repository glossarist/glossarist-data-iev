  definition:
  - content: highest temperature which is attained in service under the most adverse
      conditions (but within the specified tolerances) by any part or surface of {{Ex
      Equipment, urn:iec:std:iec:60050-426-01-14}}
  examples: []
  id: 426-01-04
  notes:
  - content: For Ex Equipment in an explosive gas atmosphere, this temperature may
      occur on an internal component or on the external surface of the enclosure,
      depending upon the Type of Protection employed.
  - content: For Ex Equipment in an explosive dust atmosphere, this temperature occurs
      on the external surface of the enclosure and may include a defined dust layer
      condition.
