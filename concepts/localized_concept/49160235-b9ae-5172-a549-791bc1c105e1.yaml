  definition:
  - content: surface integral, the differential element of which is the scalar product
      of a vector and the vector surface element
  examples: []
  id: 102-05-09
  notes:
  - content: The flux through a surface S of the vector *stem:[V]* is denoted by stem:["P{iint}"_("S")
      V * e_(n) "d" A]. If the surface is closed, the flux is denoted by stem:["P{oiint}"_("S")
      V * e_(n) rm(d) A].
