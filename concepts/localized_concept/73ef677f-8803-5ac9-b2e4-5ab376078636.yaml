  definition:
  - content: qualifies a two-terminal element or a two-terminal circuit for which
      the relations between the integral quantities remain valid if the value of each
      quantity is replaced by its negative
  examples: []
  id: 131-11-20
  notes:
  - content: An example is a resistive element characterized by an odd functional
      relation between instantaneous voltage and instantaneous current.
  - content: The term "symmetric" has other meanings when applied to a two-port network
      or to a polyphase system.
