---
data:
  definition:
  - content: élément mobile d'un réacteur nucléaire dont l'action influe sur la réactivité;
      l’insertion ou le retrait du cœur de cet élément permet la conduite du réacteur
      nucléaire
  examples: []
  id: 395-07-13
  notes:
  - content: Parfois, dans certains pays, en particulier en France, ces éléments sont
      appelés grappes de commande. Dans certains cas, des groupes de barre de commande
      peuvent être déplacés ensemble.
  - content: Cet article était numéroté 393-15-73 dans la CEI 60050-393:2003.
