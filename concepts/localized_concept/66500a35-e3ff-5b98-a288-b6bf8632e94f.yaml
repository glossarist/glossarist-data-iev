  definition:
  - content: "{{disposition, urn:iec:std:iec:60050-901-05-01}} technique reconnue
      par une majorité d'experts représentatifs comme reflétant l'{{état de la technique,
      urn:iec:std:iec:60050-901-01-04}}"
  examples: []
  id: 901-01-05
  notes:
  - content: Si un {{document normatif, urn:iec:std:iec:60050-901-02-01}} sur un sujet
      technique est préparé avec la coopération des parties intéressées par le biais
      de consultations et de procédures de réalisation d'un {{consensus, urn:iec:std:iec:60050-901-01-11}},
      il est censé constituer une règle technique reconnue au moment de son approbation.
