  definition:
  - content: 'duration stem:[t]~SU~ between the application of the supply voltage
      to the oscillator and the time when the RF output signal of desired frequency
      controlled by the quartz resonator fulfils the following specified conditions:
      . for quasi-sinusoidal waveforms, the signal envelope is 90 % of the steady-state
      peak-to-peak amplitude; . for pulse waveforms, the output pulse sequence is
      periodical near the steady-state frequency while its low level VLO remains below
      VOL and its high level VHI exceeds VOH permanently, where VOH and VOL are defined
      by the applicable logic family'
