  definition:
  - content: type de permutation dans lequel trois sections élémentaires consécutives,
      appelées «tronçons», sont considérées comme formant un élément, appelé «section
      ternaire»
  examples: []
  id: 461-14-08
  notes:
  - content: Aux extrémités de chaque section ternaire, les trois écrans sont directement
      interconnectés et peuvent être mis à la terre en ces points. Aux deux points
      intermédiaires entre les tronçons, les câbles sont habituellement transposés
      et les écrans connectés de façon que chaque circuit d'écran occupe la même position
      géométrique dans la configuration des câbles sur toute la longueur de la section
      ternaire. Pour de longs circuits, il peut y avoir plusieurs sections ternaires.
