  definition:
  - content: "the tensor permeability of a material saturated by a static magnetic
      field that is collinear with the time-varying field, with the direction of the
      static field defining the z-axis:\r\nstem:[([\" \" \" \" \" \" \" \" \" \" \" \"
      \" \" \" \" \" \" \" \" \" \" underline(mu)_(_(\"r\")), - j underline(kappa)_(\"r\"),
      0], [underline(underline(mu))_(\"p\") = j underline(kappa)_(\"r\"), underline(mu)_(_(r)),
      0], [\" \" \" \" \" \" \" \" \" \" \" \" \" \" \" \" 0, 0, 1])]\r\nwhere stem:[<u>μ</u>]~r~
      and stem:[<u>κ</u>]~r~ are complex permeabilities"
