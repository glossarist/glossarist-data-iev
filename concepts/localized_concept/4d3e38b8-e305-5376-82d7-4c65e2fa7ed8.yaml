  definition:
  - content: "relation algébrique donnant le nombre de particules dstem:[N] d'un système
      quantifié en équilibre, dont les composantes de vitesse sont comprises dans
      des intervalles (stem:[u], stem:[u] + dstem:[u]), (stem:[v], stem:[v] + dstem:[v]),
      (stem:[w], stem:[w] + dstem:[w]):\r\nstem:[\"d\" \" \" N = 2 N * frac(m^(3))(h^(3))
      * frac(\"d\" \" \" u * \"d \" v * \"d\" \" \" w)(1 + \"exp\" ( frac(E - E_(\"M\"))(k
      T) ))] \r\noù\n\nstem:[N] désigne le nombre total de particules\n\nstem:[m]
      la masse d'une particule\n\nstem:[T] la température thermodynamique\n\nstem:[k]
      la constante de Boltzmann\n\nstem:[h] la constante de Planck\n\nstem:[E] l'énergie
      cinétique d'une particule,\r\nstem:[E = frac(m)(2) (u^(2) + v^(2) + w^(2))]
      \r\nstem:[E]~M~ la fonction de travail interne\n\ndstem:[N]/stem:[N] représente
      la probabilité pour qu'une particule ait ses composantes de vitesse comprises
      dans les intervalles considérés."
