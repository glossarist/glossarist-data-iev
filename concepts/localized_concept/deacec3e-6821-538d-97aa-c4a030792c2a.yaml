      successifsNote 1 à l’article: Un signal temporel discret est composé d'une suite
      temporelle d'éléments, chacun ayant une ou plusieurs caractéristiques telles
      que sa durée, sa position dans le temps, sa forme, son amplitude, qui représentent
      des informations. Note 2 à l’article: Un signal temporel discret peut être un
      {{signal à valeurs continues, urn:iec:std:iec:60050-171-01-09}}, tel qu’un {{
      signal échantillonné, urn:iec:std:iec:60050-351-41-26}}, ou un {{signal discret,
      urn:iec:std:iec:60050-171-01-11}}, et donc un {{signal numérique, urn:iec:std:iec:60050-171-01-13}}."
