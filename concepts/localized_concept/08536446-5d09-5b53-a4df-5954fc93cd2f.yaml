  definition:
  - content: a curve relating the value of a radiation quantity and the thickness
      of material traversed by the radiation
  examples: []
  id: 881-03-31
  notes:
  - content: "If these terms are used it should be stated:\r\n1. which radiation quantity
      is the dependent variable;\n\n2. whether the dependent variable is the logarithm
      of the radiation quantity;\n\n3. whether the incident beam is narrow and collimated
      and the measuring device beyond the attenuator is relatively small and far from
      it (narrow-beam measurements), or the incident beam is broad and not collimated
      and the measuring device beyond the attenuator is relatively near to it (broad-beam
      measurements)."
  terms:
  - type: expression
    normative_status: preferred
    designation: attenuation curve
  - type: expression
    designation: transmission curve
