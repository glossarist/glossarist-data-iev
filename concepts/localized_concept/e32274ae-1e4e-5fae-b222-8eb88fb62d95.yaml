  definition:
  - content: canal radioélectrique ou bande de fréquences radioélectriques à l'intérieur
      duquel l'émission d'une station donnée est autorisée
  examples: []
  id: 713-06-09
  notes:
  - content: La largeur du canal assigné est égale à la largeur de bande nécessaire,
      augmentée du double de la tolérance de fréquence.
  - content: Dans le cas des stations spatiales, la bande de fréquence assignée inclut
      le double du décalage maximal dû à l'effet Doppler pouvant se produire par rapport
      à un point quelconque de la surface de la Terre.
