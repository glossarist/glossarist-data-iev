eng:
  id: 426-04-23
  terms:
  - type: expression
    normative_status: preferred
    designation: certificate
  definition: document that conveys the assurance of the conformity of a product,
    process, system, person, or organization with specified requirements
  language_code: eng
  notes:
  - The certificate is either the supplier's declaration of conformity or the purchaser's
    recognition of conformity or certification (as a result of action by a third party)
    as defined in ISO/IEC 17000, _Conformity assessment – Vocabulary and general principles_.
  examples: []
