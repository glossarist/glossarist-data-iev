eng:
  id: 192-05-08
  terms:
  - type: expression
    normative_status: preferred
    designation: instantaneous failure intensity
  - type: expression
    normative_status: preferred
    designation: failure intensity
  - type: symbol
    designation: stem:[z](stem:[t])
    international: true
  definition: |-
    limit, if it exists, of the quotient of the mean number of failures of a repairable item within time interval (stem:[t], stem:[t] + Δstem:[t]), by Δstem:[t], when Δstem:[t] tends to zero

    stem:[z ( t ) = underset((Delta t -&gt; 0 +))((lim)) ((E N ( t + Delta t ) - N ( t ) ))/((Delta t))]

    where stem:[N](stem:[t]) is the number of failures in the time interval (0, stem:[t]), where stem:[E] denotes the expectation.
  language_code: eng
  notes:
  - Other terms used for failure intensity are “rate of occurrence of failures”, and
    “failure frequency”.
  examples: []
  entry_status: Standard
  classification: Preferred
  date_accepted: '2015-02-01T00:00:00+00:00'
  date_amended: '2015-02-01T00:00:00+00:00'
  review_date: '2015-02-01T00:00:00+00:00'
