eng:
  id: 171-07-28
  terms:
  - type: expression
    normative_status: preferred
    designation: character mean entropy
  - type: expression
    normative_status: preferred
    designation: character mean information content
  - type: expression
    normative_status: preferred
    designation: character average information
  - type: expression
    normative_status: preferred
    designation: content character information rate
  - type: symbol
    designation: stem:[H^( ' )]
    international: true
  definition: |-
    mean per {{character, IEV:702-05-10}} of the {{entropy, IEV:171-07-15}} for all possible messages from a {{stationary message source, IEV:171-07-09}}

    stem:[H^( ' ) = underset((m -&gt; oo))((lim)) ((H_m))/(m)]

    where stem:[Hm] is the entropy of the set of all sequences of stem:[m] characters from the source
  language_code: eng
  notes:
  - The character mean entropy can be expressed in a unit such as the shannon per
    character.
  - The limit might not exist if the source were not stationary.
  examples: []
  entry_status: Standard
  classification: Preferred
