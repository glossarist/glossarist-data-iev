  terms:
  - type: expression
    normative_status: preferred
    designation: entropie moyenne par caractère
    gender: f
    plurality: singular
  definition: |-
    moyenne par {{caractère, IEV:702-05-10}} de l'{{entropie, IEV:171-07-15}}, étendue à tous les messages issus d'une {{source de messages stationnaire, IEV:171-07-09}}

    stem:[H^( ' ) = underset((m -&gt; oo))((lim)) ((H_m))/(m)]

    où stem:[Hm] est l'entropie de l'ensemble de toutes les suites de stem:[m] caractères issues de la source
  language_code: fra
  notes:
  - L'entropie moyenne par caractère peut être exprimée à l'aide d'une unité telle
    que le shannon par caractère.
  - La limite pourrait ne pas exister si la source n'était pas stationnaire.
