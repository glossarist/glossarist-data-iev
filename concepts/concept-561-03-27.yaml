eng:
  id: 561-03-27
  terms:
  - type: expression
    normative_status: preferred
    designation: rise time
  definition: |-
    time interval required for the leading edge of a waveform to change between two defined levels

    image::/assets/images/parts/561/561-fig17-en.png[]

    *Figure 17 – Characteristics of an output waveform*
  language_code: eng
  notes:
  - |-
    These levels may be two logic levels stem:[V]~OL~ and stem:[V]~OH~ or 10 % to 90 % of its maximum amplitude (stem:[V]~HI~ – stem:[V]~LO~), or any other ratio defined in the detail specification

    where

    stem:[V]~OL~  is the low level output voltage

    stem:[V]~OH~  is the high level output voltage

    stem:[V]~HI~  is the upper flat voltage of the pulse waveform

    stem:[V]~LO~  is the low flat voltage of the pulse waveform.
  examples: []
  entry_status: Standard
  date_accepted: '2014-11-01T00:00:00+00:00'
  date_amended: '2014-11-01T00:00:00+00:00'
  review_date: '2014-11-01T00:00:00+00:00'
