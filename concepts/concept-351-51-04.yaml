  definition: |-
    variable de sortie booléenne fournie par le système de régulation, décrit dans le diagramme fonctionnel

    VOIR: Figure 23.
  language_code: fra
  notes:
  - La CEI 60848, _Langage de spécification GRAFCET pour diagrammes fonctionnels en
