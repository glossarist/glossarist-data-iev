    designation: command in a function chart
  - type: expression
    normative_status: preferred
    designation: command
  definition: |-
    output Boolean variable issued by the controlling system described by the function chart

    SEE Figure 23.
  language_code: eng
  notes:
  - Various types of commands, such as not stored command, stored command, delayed
    command, time-limited command, conditional command and their combination are defined
    in IEC 60848, _GRAFCET specification language for sequential function charts_,
    and are identified by a conventional letter.
  - This entry was numbered 351-29-31 in IEC 60050-351:2006.
