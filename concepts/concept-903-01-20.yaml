eng:
  id: 903-01-20
  terms:
  - type: expression
    normative_status: preferred
    designation: safety integration
  definition: |-
    application of the “3-step-methodology” (see Figure 1) to reduce the {{residual risk, IEV:903-01-11}} of a product, process or service below the level of {{tolerable risk, IEV:903-01-12}}

    <simg acos-guide116_2010_f1_en>

    NOTE Sometimes it is possible that tolerable risk is already achieved by applying step 1 or steps 1 and 2.

    *Figure 1 – Principle of safety integration*</simg>
  language_code: eng
  notes:
  - See IEC Guide 116:2010, A.2, for further information.
  examples: []
  entry_status: Standard
  authoritative_source:
  - ref: IEC Guide 116:2010
    clause: '3.17'
    link: https://webstore.iec.ch/publication/7525
    relationship:
      :type: :modified
      :modification: 'The definition has been revised to be more broad: "low voltage
        equipment" has been replaced by "product, process or service". Figure 1 has
        been added. In the Note to entry, "See A.2," has been replaced by "See IEC
        Guide 116:2010, A.2,".'
    original: 'IEC Guide 116:2010, 3.17, modified – The definition has been revised
