  terms:
  - type: expression
    normative_status: preferred
    designation: trigger advance angle
  definition: the time expressed in angular measure by which the trigger pulse is
    advanced with respect to the reference instant
  language_code: eng
  notes:
  - With line, machine or load commutated converters the reference instant is the
    zero crossing instant of the commutating voltage.
