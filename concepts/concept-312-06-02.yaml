eng:
  id: 312-06-02
  terms:
  - type: expression
    normative_status: preferred
    designation: rated insulation voltage
  definition: "{{rated value, IEV:151-16-08}} of the rms withstand voltage assigned
    by the manufacturer to the equipment or to a part of it, characterizing the specified
    (long-term) withstand capability of its insulation"
  language_code: eng
  notes:
  - The rated insulation voltage is not necessarily equal to the rated voltage of
    equipment which is primarily related to functional performance.
  examples: []
  entry_status: Standard
  authoritative_source:
  - ref: IEC 60664-2-1:2011
    clause: '3.31'
    relationship:
      :type: :modified
      :modification: '"value" has been replaced by "rated value" in the definition.'
    original: IEC 60664-2-1:2011, 3.31, modified –  "value" has been replaced by "rated
      value" in the definition.
