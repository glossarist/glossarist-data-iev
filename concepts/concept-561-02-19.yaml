    *Figure 10 – Interdigitated interdigital transducer (IIDT)*
  language_code: eng
  notes:
  - IIDTs (or multi-interdigital transducer) resonator filters are referred to as
    SAW resonator filters composed of a number of IDTs for input and output in a line
    alternating with grating reflectors confirming the interdigital transducer structure
    at both ends.
