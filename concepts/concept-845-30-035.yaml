eng:
  id: 845-30-035
  terms:
  - type: expression
    normative_status: preferred
    usage_info: of a luminaire
    designation: cut-off angle
  definition: angle, measured up from nadir, between the vertical axis and the first
    line of sight at which the light source(s) and the surfaces of high luminance
    are not visible
  language_code: eng
  notes:
  - The cut-off angle is expressed in radian (rad) or degree (°).
  - This entry was numbered 845-10-30 in IEC 60050-845:1987.
  examples: []
