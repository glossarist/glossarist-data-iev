name: publish-gcr

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-gcr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - run: gem install glossarist

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build standard GCR package
        run: |
          glossarist package . -o "iev-${{ steps.version.outputs.version }}.gcr" \
            --shortname iev \
            --version "${{ steps.version.outputs.version }}" \
            --title "IEC Electropedia (IEV)" \
            --owner "IEC TC 1"

      - name: Build full GCR package (with formats)
        run: |
          glossarist package . -o "iev-${{ steps.version.outputs.version }}-full.gcr" \
            --shortname iev \
            --version "${{ steps.version.outputs.version }}" \
            --title "IEC Electropedia (IEV)" \
            --owner "IEC TC 1" \
            --compiled-formats tbx,jsonld,turtle,jsonl

      - name: Create unversioned aliases
        run: |
          cp "iev-${{ steps.version.outputs.version }}.gcr" iev.gcr
          cp "iev-${{ steps.version.outputs.version }}-full.gcr" iev-full.gcr

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "GCR Package v${{ steps.version.outputs.version }}"
          body: "Auto-generated GCR package containing IEV concepts."
          files: |
            iev-${{ steps.version.outputs.version }}.gcr
            iev.gcr
            iev-${{ steps.version.outputs.version }}-full.gcr
            iev-full.gcr
