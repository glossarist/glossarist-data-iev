name: build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch

jobs:
  validate:
    name: Validate YAML files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Validate YAML syntax
        run: |
          gem install psych
          ruby -e '
            require "yaml"
            errors = []
            count = 0
            Dir.glob("concepts/concept-*.yaml").each do |f|
              count += 1
              begin
                YAML.safe_load_file(f, permitted_classes: [Date, Time])
              rescue => e
                errors << "#{f}: #{e.message}"
              end
            end
            puts "Validated #{count} concept files"
            if errors.any?
              puts "#{errors.size} errors found:"
              errors.each { |e| puts "  #{e}" }
              exit 1
            end
          '

  build-release:
    name: Build and release
    needs: validate
    uses: geolexica/ci/.github/workflows/glossary-build.yml@main
    if: github.ref_type == 'tag'

  package-release:
    name: Package and upload
    needs: validate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Package concepts
        run: zip -9 -r concepts.zip concepts/

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: concepts.zip
          generate_release_notes: true
