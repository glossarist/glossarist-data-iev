name: build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate concepts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - run: gem install glossarist

      - name: Validate with glossarist
        run: glossarist validate .

  build-release:
    name: Build and release
    needs: validate
    uses: geolexica/ci/.github/workflows/glossary-build.yml@main
    if: github.ref_type == 'tag'

  package-release:
    name: Package and upload
    needs: validate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Package concepts
        run: zip -9 -r concepts.zip concepts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: concepts.zip
          generate_release_notes: true
